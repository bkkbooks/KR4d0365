front:
  text: 指南前錄
  hash: sha256:ddcf72ea03a85b92cc4350bee2dfbed78cb03cc4aa4748d65f6cf96a87f81fe5
body:
  text: 自序予自呉門被命入衛守獨松闗廼王正二日除浙西大制撫領神臯予辭尹引帳兵二千人詣行在日夕賛陳樞使宜中謀遷三宫分二王於閩廣元夕後予所部兵皆聚於富陽朝廷擬除予江東西廣東西制置大使兼廣東經畧知廣州湖南䇿應大使未及出命陳樞使已去國十九日太皇除予右丞相兼樞宻使都督諸路軍馬時北兵駐臯亭山距脩門三十里是日北帥即引董㕘政以兵屯𣙜木教塲城中兵將官紛紛自往納降予欲召富陽兵入城已不及事三宫九廟百萬生靈立有魚肉之憂㑹使轍交馳彼約當國相見諸執政侍從聚於呉左丞相府不知計所從出交贊予一行國事至此予不得愛身且意彼尚可以口舌動也二十日至臯亭山詰其帥前後失信其帥辭屈且謂决不動三宫九廟决不擾京城百姓留予營中既而吕師孟來予数罵其叔姪愈不放還賈餘慶者逢迎賣國乘風旨使代予位於是北兵入城所以誤吾國陷吾民者講行無虛日比知賣國非予所容也相戒勿令文丞相知未幾賈餘慶呉堅謝堂家鉉翁劉岊皆以府第為祈請使詣北方盖空我朝廷遂將甘心焉二月八日諸使登舟忽北帥遣館伴逼予同往予被逼脅欲即引决又念未死以前無非報國之日姑隠忍就船方在京時富陽兵已退趨婺州予欲俟間還軍若不自脫至是欲從道途謀遁亦不可得至京口留旬日始得鹽商小舟於二月晦夜走真州朔日守苖再成相見論時事慷慨流涕予致書兩淮閫合兵興復苖贊之甚力初三日早制司人來廼出文書謂丞相為賺城欲不利於我苖不以為然送予出門勸奔淮西予謂此北反間也否則托辭以逐客也李公仁人使見予必感動遂之維揚苖遣五十兵四騎從行夜抵西門欲待旦求見呵衛嚴宻鼔角悲惨杜架閣謂李公必不可見徒為矢石所陷不如渡海歸從王室予然之自是日夜奔南出入敵衝犯萬萬死道途苦難不可勝述嗚呼予之得至淮也使予與兩淮合北人懸軍深入犯兵家大忌可以計擒江南一舉而遂定也天時不齊人事好乖一夫頓困不足道而國事不競哀哉予至通聞二王建元帥府於永嘉陳樞使與張少保方以李郭之事為己任狼狽憔悴之餘喜不自制跋涉鯨波將躡屩以從意者天之所以窮餓困乏而拂亂之者其將有所俟乎徳祐二年閏月日廬陵文天祥自序後序徳祐二年二月十九日予除右丞相兼樞宻使都督諸路軍馬時北兵已迫脩門外戰守遷皆不及施縉紳大夫士萃於左丞相府莫知計所出㑹使轍交馳彼邀當國者相見衆謂予一行為可以紓禍國事至此予不得愛身意彼亦尚可以口舌動也初奉使往來無留北者予更欲一覘北軍而求救國之策於是辭相印不拜翌日以資政殿學士行初至北營抗辭慷慨上下頗驚動彼亦未敢遽輕吾國不幸吕師孟搆惡於前賈餘慶獻諂於後予羈縻不得還國事遂不可収拾予自度不得脫則直前詬其帥失信數吕師孟叔姪為逆但欲求死不復顧利害彼雖貌敬實則憤怒二貴酋名曰館伴夜則以兵圍所寓舍而予不得歸矣未幾賈餘慶等以祈請使詣北彼驅予并往而不在使者之目予分當引決然而隠忍以行昔人云將以有為也至京口得間奔真州即具以北虛實告東西二閫約以連兵大舉中興機㑹庶㡬在此留二日維揚帥下逐客之令不得已變姓名詭蹤跡草行露宿日與北騎相出沒於長淮間窮餓無聊追購又急天髙地迥號呼靡及已而得舟避渚洲出海道然後渡揚子江入蘇州洋展轉四明天台以至於永嘉嗚呼予之及於死者不知其㡬矣詆大酋當死罵逆賊當死與貴酋處二十日争曲直屢當死去京口挟匕首以備不測幾自剄死經北艦十餘里為廵船所物色幾從魚腹死真州逐之城門外幾徬徨死如揚州過𤓰洲楊子橋竟使遇哨無不死揚州城下進退不由殆例送死坐桂公塘土圍中騎數千過其門幾落賊手死賈家庄幾為巡徼所陵迫死趍髙郵迷失道幾陷死質明避哨竹林中邏者數十騎幾無所逃死至髙郵制府檄下幾以捕係死行城子河出入亂屍中舟與哨相後先幾邂逅死至海陵如髙沙常恐無辜死道海安如臯凡三百里敵與宼往來其間無日而非可死至通州幾以不納死以小舟涉鯨波出無可奈何而死固付之度外矣嗚呼死生晝夜事也死則死矣而境界危惡層見錯出非人世所堪痛定思痛痛何如哉予在患難中間以詩記所遭今存其本不忍廢道中手自抄錄使北營留北闗外為一巻發北闗外厯呉門毗陵渡𤓰洲復還京口為一巻脫京口趍真州揚州髙郵泰州通州為一巻自海道至永嘉來三山為一巻將蔵之於家使來者讀之悲予志焉嗚呼予之生也幸而幸生也何為所求乎為臣主辱臣死有餘僇所求乎為子以父母之遺體行殆而死有餘責將請罪於君君不許請罪於母母不許請罪於先人之墓生無以救國難死猶為厲鬼以撃賊義也賴天之靈宗廟之福脩我戈矛從王于師以為前驅雪九廟之耻復髙祖之業所謂誓不與賊俱生所謂鞠躬盡力死而後已亦義也嗟夫若予者將無往而不得死所矣向也使予委骨於草莽予雖浩然無所愧怍然㣲以自文於君親君親其謂予何誠不自意返吾衣冠重見日月使旦夕得正丘首復何憾哉復何憾哉是年夏五改元景炎廬陵文天祥自序其詩名曰指南錄赴闕楚月穿春袖呉霜透曉韉壯心欲填海苦膽為憂天役役慙金注悠悠歎瓦全丈夫竟何事一日定千年所懐予自臯亭山為敵所留深悔一出之誤聞故人劉小村陳蒲塘引兵而南流涕不自堪只把初心㸔休將近事論誓為天出力疑有鬼迷魂明月夜推枕春風晝閉門故人萬山外俯仰向誰言自嘆正月十三夜予聞陳樞使將以十五日㑹巴延於長堰予力言不可陳樞使為尼此行予自知非不明後卒自蹈殊不可曉也長安不可詣何故㑹髙亭倦鳥非無翼神龜弗自靈乾坤増感慨身世付飄零回首西湖曉雨餘山更青鐵錯􅆛貅十萬衆日夜望南轅老馬翻迷路羝羊竟觸藩武夫傷鐵錯逹士笑金昏單騎見回紇汾陽豈易言和言字韻予以議論太烈人愈疑憚不得歸闕將校官屬日有叛去世道可歎悠悠天地濶世事與誰論清夜為揮涕白雲空斷魂死生蘇子節貴賤翟公門前輩如瓶戒無言勝有言愧故人九門一夜漲風塵何事癡兒竟誤身子産片言圗捄鄭仲連本志為排秦但知慷慨稱男子不料蹉跎愧故人玉勒雕鞍南上去天髙月冷泣孤臣求客眼㸔銅駝燕雀羞東風花栁自皇州白雲萬里易成夢明月一間都是愁男子鐵心無地着故人血淚向天流鷄鳴曽脫函闗厄還有當年此客不紀事予詣北營辭色慷慨初見大酋巴延語之云講觧一段乃前宰相首尾非予所與知今太皇以予為相予不敢拜先來軍前商量巴延云丞相來勾當大事說得是予云本朝承帝王正統衣冠禮樂之所在北朝欲以為國歟欲毁其社稷歟大酋以奉詔為觧說謂社稷必不動百姓必不殺予謂爾前後約吾使多失信今兩國丞相親定盟好宜退兵平江或嘉興俟講觧之說逹北朝㸔區處如何却續議之時兵已臨京城紓急之策惟有欵北以為後圗故云爾予與之辨難甚至云能如予說兩國成好幸甚不然南北兵禍未巳非爾利也彼辭漸不遜予謂吾南朝狀元宰相但欠一死報國刀鋸鼎鑊非所懼也大酋為之辭屈而不敢怒諸酋相顧動色稱為丈夫是晚諸酋議良久忽留予營中當時覺彼未敢大肆無狀及予既縶維賈餘慶以逢迎繼之而國事遂不可収拾痛哉痛哉三宫九廟事方危狼子心腸未可知若使無人折狂燄東南那箇是男兒春秋人物類能言宗國常因口舌存我亦瀕危専對出北風滿野負乾坤單騎堂堂詣敵軍古今禍福了如陳北方相顧稱男子似謂江南尚有人百邑無厭不可支甘心賣國問為誰豺狼尚畏忠臣在相戒勿令丞相知慷慨輕身墮蒺藜羝羊生乳是歸期豈無從史私袁盎恨我從前少侍兒英雄未肯死前休風起雲飛不自由殺我混同江外去豈無曹翰守幽州紀事正月二十日晚敵留予營中云北朝處分皆面奉聖旨南朝每傳聖㫖而使者實未曽得到簾前今程鵬飛面奏太皇親聽處分程回日却與丞相商量大事畢歸闕既而失信予直前詰責之辭色甚厲不復顧死譯者再四失辭予迫之益急大酋怒且愧諸酋羣起呵斥予益自奮文煥輩勸予去彼之左右皆唶唶嗟嘆稱男子心狼心那顧㰱銅盤舌在縱横撃可汗自分身為虀粉碎彼中方作丈夫㸔紀事正月二十日至敵營適與文煥同坐予不與語越二日予不得回闕詬北人失信盛氣不可止文煥與諸酋勸予坐野中以少遲一二日即入城皆紿辭也先是予赴平江入疏言叛逆遺孽不當待以姑息乞舉春秋誅亂賊之法意指吕師孟朝廷不能行至是文煥云丞相何故罵煥以亂賊予謂國家不幸至今日汝為罪魁汝非亂賊而誰三尺童子皆罵汝何獨我哉煥云襄守六年不救予謂力窮援絶死以報國可也汝愛身惜妻子既負國又隤家聲今合族為逆萬世之賊臣也孟在傍甚忿直前云丞相上疏欲見殺何為不殺取師孟予謂汝叔姪皆降北不族滅汝是本朝之失刑也更敢有面皮來做朝士予實恨不殺汝叔姪汝叔姪能殺我我為大宋忠臣正是汝叔姪周全我我又不怕孟語塞諸酋皆失色動顔索多以告巴延巴延吐舌云文丞相心直口快男子心索多間云丞相罵得吕家好以此見諸酋亦不容之不拚一死報封疆忍使湖山牧虎狼當日本為妻子計而今何面見三光虎頭牌子織金裳北面三年蟻夢長借問一門朱與紫江南㡬世謝君王梟獍何堪共勸酬衣冠塗炭可勝羞袖中若有撃賊笏便使兇渠面血流麟筆嚴於首惡書我將口舌擊姧諛雖非周勃安劉手不愧當年産祿誅信雲父信世昌字雲父東平府人公子無忌之後嘗為元太常丞北方之儒也𨽻索多索多使之來伴予雲父知古今識道理可語中原遺黎甚惓惓於本朝頗輸情焉作詩見贈内兩句云宗廟有靈賢相出羣黎無害大皇明京師為之傳誦雲父大意以為髙麗地方数千里昨䘮其半遂稱藩大元喜其不拒并侵疆歸之今傳世如故大宋衣冠正統非髙麗比北必不敢無禮於吾社稷也雲父念本朝亦願望之辭東魯遺黎老子孫南方心事北方身㡬多江左腰金客便把君王作路人信雲父好為詩而辭極俚近一日問予詩法予因舉宫詞数章比興悠長意在言外雲父恍有所得明日袖出一絶云東風吹落花殘英猶戀枝莫怨東風惡花有再開時言予之不忘王室而王室之必中興也雲父居近闕里漸染孔氏之遺風故其用意深厚而超悟如此肯從悟室課兒書嚙雪風流却減渠我愛信陵冠帶意任教句法問何如則堂敵入京城賈餘慶迎逢賣國既令學士降詔俾天下州郡歸附之又各州付一省劄惟樞宻則堂家先生鉉翁於省劄上不肯押號呉丞相堅號老儒不能自持一切惟賈餘慶之命其愧則堂甚矣程鵬飛見則堂不肯奉命堂中作色欲縛之去則堂云中書省無縳執政之理歸私㕔以待執彼竟不敢誰何予在營以忠義孤立聞其事以自壯云山河四塞舊甌金藝祖髙宗實鑒臨一日盡將輸敵手何人賣國獨甘心中書堂帖下諸城摇首庭中號獨清此後方知樞宻事從今北地轉相驚思蒲塘陳揚旌來冉冉捲斾去堂堂恨我飛無翼思君濟有航麒麟還共處熊虎已何鄉南國應無恙中興事㑹長思方將軍始興溪子下江淮曽為東南再造來如虎如熊今固在將軍何處上金䑓索多索多為予言大元將興學校立科舉丞相在大宋為狀元宰相今為大元宰相無疑丞相常說國存與存國亡與亡這是男子心天下一統做大元宰相是甚次第國亡與亡四箇字休道予哭而拒之索多常恐予之伏死節也虎牌氈笠號公卿不直人間一唾輕但願扶桑紅日上江南匹士死猶榮二王索多䝉古岱一日問度宗㡬子答曰三子問皇帝是第㡬子答曰第二子立嫡也問第一子三子封王乎曰一吉王一信王問今何在曰大臣護之去矣駭云去何處曰非閩則廣宋疆土萬里儘有世界在云既是一家何必逺去曰何為恁地說宗廟社稷所闗豈是細事北朝若待皇帝好則二王為人臣若待皇帝不是即便别有皇帝出來二酋為之愕眙不能對一馬渡江開晋土五龍夾日復唐天内家苗裔真隆凖奠鼎從知萬億年氣槩索多一日問予何以去平江予曰有詔趣入衛問予兵若干予對五萬人喟然嘆曰天也使丞相在平江必不降予問何以知之云相公氣槩如何肯降但累城内百姓予謂果厮打亦未見輸贏唆都大笑氣槩如虹俺得知留呉那肯豎降旗北人不觧欺心語正恐南人作淺窺使北北兵入城既刼詔書布告天下州郡各使歸附又逼天子拜表獻土左丞相呉堅右丞相賈餘慶樞宻使謝堂參政家鉉翁同知劉岊五人捧表北庭號祈請使賈幸國難自詭北人氣燄不可向邇謝無識附和呉老儒畏怯不能争劉狎邪小人方乘時取美官揚揚自得惟家公非願從者猶以為趙祈請意北主或可語冀一見陳説為國家有一綫故引決所未忍也五人之行皆出北意呉初以老病求免且已許之故表中所述賈謝家劉四人呉不與焉二月初八日四人登舟忽巴延趣予與呉丞相俱入北予不在使者列是行何為盖驅逐之使去耳予陷在難中無計自脫初九日與呉丞相同被逼脅黽勉就船先一夕予作家書處置家事擬翌日定行止行則引決不為偷生及見呉丞相家参政呉殊無徇國之意家則以為死傷勇祈而不許死未為晚予以是徘徊隠忍猶冀一日有以報國惟是賈餘慶兇狡殘忍出於天性宻告巴延使啟北庭拘予於沙漠彼則賣國佞北自謂使畢即歸愚不可言也謝堂已宿謝村初九日忽駕舟而回或謂索多為之地巴延得賄而免堂曲意奉北可鄙惡尤多詩記其事自說家鄉古相州白麻風㫖出狂酋中書盡出降元表北渡黄河衣錦逰賈至尊馳表獻燕城肉食那知以死争當代老儒居首揆殿前陪拜率公卿呉江南浪子是何官只當空廬雜劇看撥取公卿如糞土沐猴徒自辱衣冠劉公子方張奉使旗行行且尼復何為似聞傾盡黄金塢辛苦平生只為誰謝廷争堂堂負直聲飄零沙漠若為情程嬰存趙真公志賴有忠良壯此行家初脩降表我無名不是隨班拜發人誰遣附庸祈請使要教北國識忠臣客子漂摇萬里程北征情味似南征小臣事主寜無罪只作幽州謫吏行使旃盡道有回期獨陷羇臣去牧羝中爾含沙渾小事白雲飛處楚天低杜架閣天台杜滸字貴卿號梅壑糾合四千人欲救王室當國者不知省正月十三日見予於西湖上予嘉其有志頗奬異之十九日客賛予使北梅壑斷斷不可客逐之去予果為北所留後二十日驅予北行諸客皆散梅壑憐予孤苦慨然相從天下義士也朝㫖特改宣教郎除禮兵架閣文字仗節辭王室悠悠萬里轅諸君皆雨别一士獨星言啼鳥亂人意落花銷客魂東坡愛巢谷頗恨晚登門昔趍魏公子今事霍將軍世態炎凉甚交情貴賤分黄沙揚暮靄黑海起朝氛獨與君攜手行吟看白雲聞雞自入北營未嘗有雞唱因泊謝村始有聞是夜幾與梅壑逃去二更遣劉百户二三十人擁一舟來逼下船遂不果軍中二十日此夕始聞雞塵暗天街静沙長海路迷銅駞随雨落鐵騎向風嘶曉起呼詹尹何時脫蒺藜命裏二月初十夜為劉百户者所迫中原人尚可告語也賈餘慶語特穆爾曰文丞相心腸别翌日早特穆爾自駕一舟來令命裏千户押予上船凶燄嚇人見者莫不流涕命裏髙鼻而深目面毛而多鬚回回人也熊羆十萬建行䑓單騎誰教免胄來一日捉將沙漠去遭逢碧眼老回回留逺亭十一日宿處岸上有留逺亭北人然火亭前聚諸公列坐行酒賈餘慶有名風子滿口罵坐毁本朝人物無遺者以此獻佞敵惟亹亹笑劉岊数奉以淫䙝為北所薄文煥云國家將亡生出此等人物予聞之悲憤不已及是諸酋専以為笑具於舟中取一村婦至亭中使薦劉寢據劉之交坐諸酋又嗾婦抱劉以為戲衣冠掃地殊不可忍則堂尤憤疾云甘心賣國罪滔天酒後猖狂詐作顛把酒逢迎酋長笑從頭罵坐数時賢賈落得稱呼浪子劉樽前百媚佞旃裘當年鮑老不如此留逺亭前犬也羞劉平江府予過呉門感念悽愴向使朝命不令入衛嚴速予以死守不死於是即至今存可也予托病卧舟中舊吏三五人來遺民聞吾經過無不垂涕者舟到一時頃即觧䌫夜行九十里北似防我云楼䑓俯舟楫城郭滿干戈故吏歸心少遺民出涕多鳩居無鵲在魚網有鴻過使遂睢陽志安危今若何無錫己未予攜弟壁赴廷對嘗從長江入裏河趍京口回首十八年復由此路是行驅之入北感今懐昔悲不自勝金山冉冉波濤雨錫水泯泯草木春二十年前曽去路三千里外作行人英雄未死心為碎父老相逢鼻欲辛夜讀程嬰存趙事一回惆悵一沾巾弔五木予初以朝廷遣張全將淮兵二千救常州以其為淮將必經厯老成遂遣朱華將三千人從之張全無統馭之材自為畦町十月二十六日提淮軍自往横林設伏虞橋北兵至麻士龍死之張全不救走回五木五木乃朱華軍所駐如掘溝塹設鹿角張全皆不許朱華措置殊不曉其意二十七日北兵薄朱華自辰至未朱華與廣軍與之對北兵自路塘直來死於水者不可勝計至晚北兵繞山後薄贑軍尹玉當之曽全胡遇謝雲曽玉先遁走尹玉死焉張提軍隔岸不發一矢有利灾樂禍之心吾軍渡水挽張全軍船張全令諸軍斷挽船者之指於是溺死者甚衆張全并宵遁惟尹玉殘軍五百人與北兵角一夕殺北兵及馬委積田間質明止有四人得歸今易崇尚存嗚呼使此戰張全稍施援手可以大勝㨗一夫無意而事遂闗宗社嗚呼天哉余初欲先斬張全然後取一時敗將並從軍法以張全為朝廷所遣請於都督乃宥張全使自贖予遂不及行法後詣餘杭發京師姑取曽全以徇衆而噬臍多矣過五木弔戰塲為之流涕不可禦續聞張全者淮東之僨將也昨隨許文徳復清河兵已入城張全鳴金散衆許不敢戰斬將自縛觧赴制閫李公以使過期之得不死予不知受其誤其免罪又出於第二次僥倖卒為降賊可歎恨云首赴勤王役成功事則天富平名委地好水淚成川我作招魂想誰為掩骼縁中興須再舉寄語慰重泉哭尹玉尹玉江西憲司將官五木之戰手殺七八十人其麾下與北兵戰併死無一降者朝廷贈濠州團練使立廟與二子官承節即下江西安撫使撥賜良田二百畝其間以捕寇死者何限惟玉得其死所恤典非細哀榮備焉團練濠州廟贑川官其二子賜良田西䑓捕逐多亡將還有焚黄到墓前常州常州宋睢陽郡也北兵憤其堅守殺戮無遺種死者忠義之鬼哀哉山河千里在煙火一家無壯甚睢陽守寃哉馬邑屠蒼天如可問赤子果何辜唇齒提封舊撫膺三嘆吁鎮江至京口予以十八年曾自鎮江趍京今自京趍鎮江俯仰感嘆為之流涕鐵甕山河舊金甌宇宙非昔隨西日上今見朔塵飛豪傑非無志功名自有機中流懐士稚風雨濕雙扉渡𤓰洲諸祈請使十八日至鎮江府阿珠在𤓰洲即請十九日渡江至則鮮腆倨傲令人裂眦諸公皆與之語予始終無言後得之監守者云阿珠言文丞相不語肚裏有偻儸彼知吾不心服也跨江半壁閲千帆虎在深山龍在潭當日本為南制北如今翻被北持南眼前風景異山河無奈諸君笑語何坐上有人正愁絶彼中便道是偻儸弔戰場連年淮水上死者亂如麻魂魄丘中土英雄糞上花士知忠厥主人亦念其家凶徳寜堪久皇天應不差回京口予回京口幸得間問舟為脫去計連日不如志賦是詩早作田文去終無蘇武留偷生寜伏劍忍死欲焚舟逸驥思超乘飛鷹志脫鞲登楼望江上日日数行艘思小村劉春雲惨惨兮春水漫漫思我故人兮行路難君轅以南兮我轅以北去日以逺兮憂不可以終極蹇予馬兮江臯式燕兮以逰遨念我平生兮思君欎陶在師中兮豈造次之可離忠言不聞兮思君忸怩毫釐之差兮天壤易位駟不及舌兮臍不可噬思我故人兮懐我親懐我親兮思故人懐哉懐哉不可忍兮不如速死慨百年之未半兮胡中道而遄止魯連子兮義不帝秦負𤣥徳兮闗不名為人委骨草莽兮時廼天命自古孰無死兮首丘為正我行我行兮夢寐所思故人望我兮胡不歸胡不歸沈頤家予回京口北人欵之府中予不得離岸上得沈頤家坐卧固不意予為逃計也孤舟霜月迥曉起入柴門斷岸行簮影荒畦落履痕江山渾在眼宇宙付無言昨夜三更夢春風滿故園脫京口二月二十九夜予自京口城中間道出江滸登舟泝金山走真州其艱難萬狀各以詩記之定計難予在京城外日夜謀脫不得間者謝村幾去至平江欲逃又不果至鎮江謀益急議趍真州杜架閣滸與帳前將官余元慶實與謀元慶真州人也杜架閣與予云事集萬萬幸不幸謀泄皆當死死有怨乎予指心自誓云死靡悔且辦匕首挾以俱事不濟自殺杜架閣亦請以死自効於計遂定南北人人苦泣岐壯心萬折誓東歸若非斫案判生死夜半何人敢突圍謀人難杜架閣如顛狂人醉遊於市遇有言本朝而感憤追思者即捐金與之宻告以欲遁之謀無不願自効以無舟而輟前後毋慮十數其不謀泄真幸耳一片歸心似亂雲逢人時漏話三分當時若也私謀泄春夢悠悠郭璞墳踏路難京口無城通衢多隘去江尚十里偶得一老校馬引間道出三数巷即荒凉野走至江岸路頗近若使不知間道只行市井正路無可出之理烟火連甍鉄甕闗要尋間道走江干何人肯為將軍地北府老兵思漢官得船難北船滿江百姓無一舟可問杜架閣與人為謀皆以無船長嘆而止是後余元慶遇其故舊為北管船遂宻叩之許以承宣使銀千兩其人云吾為宋救得一丞相回建大功業何以錢為但求批帖為他日趍承之證後授以一批帖約除廉車乃強委之白金義人哉使吾無此一遭遇已矣經營十日苦無舟惨惨椎心淚血流漁父疑為神物遣相逢楊子大江頭紿北難自至鎮江即謀船不可得至二月二十九日方得之喜甚是午催過𤓰洲賈餘慶諸人皆渡矣惟予與呉丞相在河次得報最遲於是托故以來日同呉丞相渡江幸而彼不見疑驅迫稍緩是夕遂逃若非得此一紿從前經營皆枉用心惟有死耳豈不痛哉百計經營夜負舟倉皇誰趣渡𤓰洲若非行紿成宵遁哭死界河天地愁定變難老兵即踏路之人杜架閣日與之飲顔情甚狎是夜逃者十二人二人坐舟猶有十人作一陣走恐出門太冗則事易知覺路必過老兵之門於是遣三人先就老兵家伺過門同遁忽老兵中變醉不省其妻詰問之欲喚四鄰發覺一人亟走報杜架閣亟呼老兵出來直至吾前蔵之帳中三人者同時而回老兵酒醒以銀三百星係其腰云事至與之遂至二更引路而行是舉垂成㡬為老兵老嫗所誤全得杜架閣機警故狙詐之將作敵者又隨作使耳危哉危哉老兵中變意差池倉卒呼來朽索危若使阿婆真一吼目生隨後悔何追出門難元始欵諸宰執於鎮江府惟呉丞相以病不離舟予為遁計宿府治一夕即托故還裏河舟中彼亦不之疑予遂於河近得沈頤家坐卧初彼分遣諸酋監諸宰執從予者曰王千戸狼突可惡相隨上下不離頃刻予在沈頤家彼亦同卧席前後是夜予醉居停主人復醉王千户者伺其寢熟啟門而出使㣲有知覺吾事殆哉羅刹盈庭夜色寒人家燈火半䦨珊夢回跳出鐵門限世上一重人鬼闗出巷難敵遣兵齪巷禁夜不得往來先是有一酋忽入沈頤家予問何人劉百户問何職管夜禁問官勾當何如曰官燈提照往來從便杜架閣聞之即随劉百戸出強與之好已而約為兄弟拉之飲于妓舍杜強劉宿劉俾杜歡杜云我随丞相在此夜安置後方可出怕禁夜耳唵送爾燈唵送小畨隨着不妨事杜遂約後夕果如約予變服色隨杜出諸巷皆不呵問杜至人家漸盡處即以銀與小畨約之便歸來日候於某所小畨方十五六嵗無知於是得遁不時徇鋪路縱横小隊戎衣自出城天假漢児燈一炬旁人只道是官行出隘難敵於市井盡處設險以十餘馬欄路予等至隘所馬驚意甚恐幸北軍皆睡因得脫袖攜匕首學銜枚横度城闗馬欲猜夜静天昏人影散北軍鼾睡正如雷候船難予先遣二校坐舟中宻約待予甘露寺下及至船不知所在意窘甚交謂船已失約奈何予攜匕首不忍自殘甚不得已有投水耳余元慶褰裳涉水尋一二里許方得船至各稽首以更生為賀待船三五立江干眼欲穿時夜漸䦨若使長年期不至江流便作汨羅㸔上江難予既登舟意泝流直上他無事矣乃不知江岸皆北船迷亘數十里鳴梆唱更氣燄甚盛吾船不得已皆從北船邉經過幸而無問者至七里江忽有巡者喝云是何船梢答以河魨船巡者大呼云歹船歹者北以是名反側姧細之稱廵者欲經船前適潮退閣淺不能至是時舟中皆流汗其不來僥倖耳䝉衝兩岸夾長川鼠伏孤篷掉向前七里江邉驚一喝天教潮退閣巡船得風難予方為七里廵船所驚忽有聲如人哨齒甚清麗船梢立船頭拜且禱曰神道來送問何神曰江河田相公也即得順風送上空中哨響到孤篷盡道江河田相公神道自來扶正直中流半夜一帆風望城難初得順風意五更可達真州城下風良久遂静天明尚隔真州二十餘里深恐敵船自後追躡又懼有哨騎在淮岸一時憂迫不可言在舟之人盡力摇槳撐篙可牽處㳂岸拽䌫然心急而力不逮既望見城又不克進甚矣脫虎口之難自來百里半九十望見城頭路愈長薄命只愁追者至人人摇槳渡滄浪上岸難真州濠與江通然潮長舟方可到城是日泊五里遂上岸城外荒凉寂無人影四平如掌一無闗防幸而及城門無他慮當行路時盻盻回首惟恐有追騎之猝至既入城門聞昨日早晨哨馬正到五里頭時三月朔云岸行五里入真州城外荒荒鬼也愁忽聴路人嗟嘆説昨朝哨馬到江頭入城難既至真州城下問者羣望告以文丞相在鎮江走脫徑來投奔城子諸將校皆出即延入城苗守迎見語國事移時感憤流涕即欵之州治中住清邉堂然後從者之始至也引至直司捜身上軍器既知無他然後見信其闗防之嚴宻如此向使恐疑横於胸中閉門不受天地茫茫何所歸嘻危哉輕身漂泊入鑾江太守欣然為避堂若使閉城呼不應人間生死路茫茫真州雜感予既脫虎口至真州喜幸感嘆靡所不有各係之以七言自正月二十羈縻北營至二月二十九一夜京口得脫首尾恰四十日一入真州忽見大宋衣冠如流浪人乍歸故鄉不意重覩天日至此四十羲娥落虎狼今朝騎馬入真陽山川莫道非吾土一見衣冠是故鄉予入真州聚觀者夾道如堵東坡云被天津橋上人看殺久無此境界矣聚觀夾道捲紅樓奪得南朝一狀頭將謂燕人騎屋㸔而今馬首向真州京口船與梢人北人皆有籍予所得船乃並縁北船販私鹽者船與二水手皆籍所不及予是以得濟豈非天哉賣却私鹽一舸回天教壯士果安排子胥流向江南去我獨倉皇夜走淮予以夜遁北人來早方覺而吾已在汶上矣便把長江作界河負舟半夜泝煙波明朝方覺田文去追騎如雲可奈何予逃之明日北人大索民間累南人甚多然予逝矣不可得矣十二男兒夜出闗曉來到處捉南冠博浪力士猶難覔要覔張良更是難三月朔旦予在真州城内賈餘慶在𤓰洲皆淮境也而南北分焉哀哉我作朱金沙上游諸君冠盖渡𤓰洲淮雲一片不相隔南北死生分路頭諸宰執自京城陷後無復逺畧北人之驅去皆俯首從之莫有謀自拔者予犯死逃歸萬一有及國事志亦烈矣公卿北去共低眉世事興亡付不知不是謀歸全趙璧東南那箇是男兒天下趙予至真苖守再成為予言近有樵人破一樹樹中有生成三字曰天下趙亟取木視之果然木一丈二尺圍其字青而深半樹觧揚州半樹留真州三字瞭然不可磨也以此知我朝中興天必將全復故疆真州號迎鑾藝祖發迹於此非在天之靈所為乎皇王著姓復炎圗此是中興受命符獨向迎鑾呈瑞字為言藝祖有靈無議糾合兩淮復興予至真州守將苖再成不知朝信於是數月矣問予京師事慷慨激烈不覺流涕已而諸將校諸幕皆來俱憤極不自堪兩淮兵力足以復興惜天使李公怯不敢進而夏老與淮東薄有嫌隙不得合從得丞相來通兩淮脉絡不出一月連兵大舉先去敵巢之在淮者江南可傳檄定也予問苖守計安出苖云先約夏老以兵出江邉如向建康之狀以牽制之此則以通泰軍義打灣頭以髙郵淮安寳應軍義打楊子橋以揚州大軍向𤓰洲某與趙刺史孟綿以舟師直擣鎮江並同日舉彼不能相救灣頭楊子橋皆㳂江脆兵守之且怨彼王師至即下聚而攻𤓰洲之三面再成則自江中一面薄之雖有智者不能為之謀此策既就然後淮東軍至京口淮西軍入金城彼在兩浙無路得出其帥可生致也予喜不自制不圗中興機㑹在此即作李公書次作夏老書苖各以覆帖副之及欲予致書戎帥及諸郡并曰此意予已作朱渙姜才䝉亨等書諸郡將以次發時與議者皆踴躍有謂李不能自拔者又有謂朱渙姜才各做起來李不自由者又有謂李恨不得脫重負何幸有重臣輔之予既遣書盻盻焉望報天之欲平治天下則吾言庶幾不枘鑿乎清邉堂上老將軍南望天家雨濕巾為道兩淮兵定出相公同作㰱盟人揚州兵了約廬州某向𤓰洲某鷺洲直下南徐侯自管皇親刺史統千舟南八空歸唐壘陷包胥一出楚疆還而今廟社存亡決只㸔元戎進退間出真州予既為李制所逐出真州艱難萬狀不可殫紀痛哉予至真州第三日苖守約云早食後㸔城子予欣然諾之有頃陸都統來導予至小西門城上閑看未幾王都統至迤􅆔出城外王忽云有人在揚州供得丞相不好出制司小引視之乃脫回人供營中所見云有一丞相差往真州賺城王執右語不使予見予方歎惋間二都統忽鞭馬入城小西門閉矣不復得入彷徨城外不知死所早約戎装去㸔城聮鑣壕上嘆風塵誰知闗出西門外憔悴世間無告人制使遣一提舉官至真州疑予為敵用苗守貳於予云决無宰相得脫之理縱得脫亦無十二人得同來之理何不以矢石撃之乃開城門放之使入意使苗守殺予以自明哀哉揚州昨夜有人來誤把忠良按劍猜怪道使君無見觧城門前日不應開制使欲殺我苖守不能決將信將疑而憐之之意多也瓊花堂上意茫然志士忠臣淚徹泉賴有使君知義者人方欲殺我猶憐予幸脫身至真州即議糾帥兩淮以圗恢復制使乃疑予為敵用欲見殺江南與敵營皆知予為忠義而兩淮不予信予平生仕宦聲迹比比不曽至淮天地茫茫與誰語哉秦庭痛哭血成川翻訝中行背可鞭南北共知忠義苦平生只少兩淮縁予少時曽遊真州至是十八年矣初望糾合復興為國家辦大事乃不為制臣所容天乎哀哉一别迎鑾十八秋重來意氣落旄頭平山老子不収拾南望端門淚雨流始見制臣小引偹脫回人朱七二等供云有一丞相往真州賺城予頗疑北有智數見予逃後遣人詐入揚州供吐以行反間既而思之揚州遣提舉官來真州見害乃三月初二日午前發予以二月晦夕逃朔旦敵方覺然不知走何處是日便遣人詐入揚州殆無此理看來只是吾書與苗守覆帖初二日早到制使不暇深省一槩以為姧細而欲殺之哀哉何不審之甚乎天地沉沉夜泝舟鬼神未覺走何州明朝遣問應無是莫恐元戎逐客不予在門外久之忽有二人來曰義兵頭目張路分徐路分也予告以故二人云安撫傳語差某二人來送看相公去那裏予云必不得已惟有去揚州見李相公路分云安撫謂淮東不可往予謂夏老素不識且淮西無歸路予委命於天只往揚州二路分云且行且行良久有五十人弓箭刀劍來隨二路分騎馬以二馬從予予與杜架閣連轡而發人人争勸走淮西莫犯翁翁按劍疑我問平山堂下路忠臣見詘有天知予在小西門外皇皇無告同行杜架閣仰天呼號㡬赴壕死從者皆無人色莫知所為予進不得入城城外不測有兵露立荒坰又乏飲食予心自念豈予死於是乎為之踟蹰心膂如割後得二路分從行苖守又遣衣被包複等來還遂之揚州是日上已日也千金犯險脫羈囚誰料南冠反見仇記取小西門外事年年上已哭江頭二路分引予行数里猶望見真州城五十兵忽齪刀於野駐足不行予自後至二路分請下馬云有事商量景色可駭予下馬問云商量何事云行幾步行稍逺又云且坐且坐予意其殺我於此矣與之立談二路分云今日之事非苗安撫意乃制使遣人欲殺丞相安撫不忍加害故遣某二人來送行今欲何往予云只往揚州更何往彼云揚州殺丞相奈何曰莫管信命去二路分云安撫今送往淮西予云淮西對建康太平池州江州皆敵所在無路可歸只欲見李制使若能信我尚欲連兵以圗恢復否則即從通州路道海還闕二路分云李制使已不容不如只在諸山寨中少避予云做什麽合煞生則生死則死决於揚州城下耳二路分云安撫見辦船在岸下丞相從江行或歸南歸北皆可予驚曰是何言歟如此則安撫亦疑我矣二路分見予辭真確乃云安撫亦疑信之間令某二人便宜從事某見相公一箇恁麽人口口是忠臣某如何敢殺相公既真箇去揚州則某等部送去乃知苖守亦主張不過實使二路分覘予語言趍向而後為之處使一時應酬不當被害原野誰復知之痛哉痛哉時舉所攜銀一百五十兩與五十兵且許以至揚州又與十兩二路分則許以分賜金百兩遂行荒郊下馬問何之死活元來任便宜不是白兵生眼孔一團寃血有誰知二路分既信予忠義與予中路言真州備判司行下有安民牓云文相公已從小西門外押出州界去訖為之嗟嘆不已嗚呼予之不幸乃至於斯其不死於兵豈非天哉戎衣嘖嘖嘆忠臣為說城頭不識人押出相公州界去真州城裏牓安民杜架閣㡬赴壕以救免一行人皆謂當死於真州城下矣後得二路分送行惟恐有敵哨追之危哉危哉有客倉皇欲赴壕一行性命等鴻毛白兵送我揚州去惟恐北軍來捉逃二路分所引路乃淮西路既見予堅欲往揚州遂復取揚州路時天色漸晚張弓挾矢一路甚憂疑指某處𤓰洲也又前某處楊子橋也相距不逺既暮所行皆敵境惟恐彼遣人伏路上寂如銜枚使所過彼有数騎在焉吾等不可逃矣𤓰洲相望隔山椒煙樹光中楊子橋夜静銜枚莫輕語草間惟恐有鴟鴞是日行至暮二路分先辭只留二十人送揚州二十人者又行十數里勒取白金亦辭去不可挽揚州有販鬻者以馬載物夜竊行於途曰馬垜子二十人者但令隨馬垜子即至揚州西門予一行如盲悵悵然行嗚呼客路之危難如此真州送駿已回城暗裏依隨馬垜行一陣西州三十里摘星樓下打初更至揚州予至揚州城下進退維谷其傍徨狼狽之狀以詩志其槩予夜行銜枚至揚州西門憊甚有三十郎廟僅存墻堦屋無矣一行人皆枕藉於地時已三鼓風寒露濕悽苦不可道此廟何神三十郎問郎行客忒琅璫荒堦枕藉無人問風露滿堂清夜長揚州城中打四更一行人遂入近城西門坐漫地上候啟門者無慮百數城上問何人從他人應答予等莫敢語恐聲音不同即眼生隨後譙鼓鼕鼕入四更行行三五入西城隔壕喝問無人應怕恐人來捉眼生予出真州實無所往不得已趨揚州猶兾制臣之或見諒也既至城下風露凄然聞鼓角有殺伐聲傍徨無以處悵悵乾坤靡所之平山風露夜何其翁翁豈有甘心事何故髙樓鼓角悲制臣之命真州也欲見殺若叩揚州門恐以矢石相加城外去楊子橋甚近不測又有哨進退不可城上兠鍪按劍看四郊㳺騎遶團團平生不觧楊朱泣到此方知進退難杜架閣以為制臣欲殺我不如早尋一所逃哨一日却夜趨髙郵求至通州渡海歸江南或見二王伸報國之志徒死城下無益吾戴吾頭向廣陵仰天無告可憐生争如負命投東海猶㑹乘風近玉京金路分謂出門便是哨五六百里而後至通州何以能逹與其為此受苦而死不如死於揚州城下不失為死於南且猶意使臣之或者不殺也海雲渺渺楚天頭滿路烟塵不自由若使一朝俘上去不如制命死揚州予方未知所進退余元慶引一賣柴人至云相公有福相公有福問能導至髙沙否曰能曰何處可暫避一日曰儂家可曰此去幾里曰二三十里曰有哨否曰數日不一至曰今日哨至如何曰看福如何耳路傍邂逅賣柴人為說髙沙可問津此去儂家三十里山坳聊可避風塵予從金之說恐制臣見殺從杜之說恐北騎見捕莫知所决時曉色漸分去数步則金一邉來牽住回数步則杜一邉又來拖行事之難從違未有如此之甚者且行且止正依違髣髴長空曙影㣲從者倉皇心緒急各持議論泣牽衣同行通十二人行止未决余元慶李茂呉亮蕭發遽生叛心所懐白金各一百五十星上下竟攜以走問誰攫去槖中金僮僕雙雙不可尋折節從今交國士死生一片嵗寒心予危急中隨行四人背負而逃外既顛隮内又饑困行数十步喘甚不能進倒荒草中扶起又行如此数十而天曉矣顛崖一陷落千尋奴僕偏生負主心饑火相煎疲欲絶滿山荒草晚沉沉予不得已去揚州城下隨賣柴人趍其家而天色漸明行不能進至十五里頭半山有土圍一所舊是民居毁蕩之餘無椽瓦其間馬糞堆積時惟恐敵有望髙者見一隊人行即來追逐只得入此土圍中暫避為謀拙甚聴死生於天矣戴星欲赴野人家曙色紛紛路愈賖倉卒只從山半住頽垣上有白雲遮既入土圍中四山閴然無一人影時無米可飯有米亦無煙火可炊懐金無救也哀哉路逢敗屋作鷄棲白屋荒荒鬼哭悲袖有金錢無米糴假饒有米亦無炊土圍糞穢不可避但掃净數尺地以所攜衣服貼襯地面睡起復坐坐起復睡日長難過情緒奄奄哀哉掃退蜣蜋枕敗墻一朝何止九回腸睡餘捫虱沉沉坐偏覺人間白日長北軍惟午前出哨午後各歸若是日起程至午後懽曰今日得命矣忽聞人聲喧啾甚自壁窺之乃敵騎数千自東而西於是追咎不死於揚州城下而被捉於此苦矣苦矣時大風忽起黑雲暴興数㸃㣲雨下山色昏㝠若有神功來救助也飄零無緒嘆途窮搔首踟蹰日已中何處大聲似潮泝黑雲驟起滿山風数千騎隨山而行正從土圍後過一行人無復人色傍壁深坐恐門外得見若一騎入來即無噍類矣時門前馬足與箭筒之聲厯落在耳只隔一壁幸而風雨大作騎兵徑去危哉危哉哀哉哀哉晝䦨萬騎忽東行䑕伏荒村命羽輕隔壁但聞風雨過人人顧影賀更生予與杜架閣及金應張慶夏仲吕武王青鄒㨗共八人在土圍中時已過午謂哨不來山下一里有古廟廟中有丐婦居之廟前有井遂遣吕武鄒㨗下山汲水意或可以得米菜少救饑餓不料哨至二人首被獲二人觧所腰白金近三百两悉以與之敵受金得不殺及哨過二人方回相向哀泣又幸性命之茍全青衣山下汲荒泉道遇腥風走不前向晚歸來號且哭游軍只為觧腰纒早從賣柴人行不能前遂至於土圍中約賣柴人入城糴米救性命云不奈何忍飢一日城中衙晡後方開門米至則黄昏矣是日敵數百騎薄西城於是門不開賣柴人竟不得出予等饑窘失措又以土圍中露天不可睡卧於是下山投古廟中與丐婦人同居焉眼穿只候賣柴回今日堡城門不開糴米已無消息至黄昏惆悵下山來既至廟中坐未定忽有人擕梃至良久三四人陸續来吾意不免矣乃知其人自城中來夜討柴來早入城赴賣無惡意也數人煑糁羮出其餘以遺我有未冠者一夕於庭中燒火照明諸樵亦不睡予等且困且睡是不可言既投古廟覔藜羮三五樵夫不識名僮子似知予夢惡生柴燒火到天明予等飢甚樵者飲食輙乞其餘破廟何所風露淒然僅存一身猶不自保哀哉苦作江頭乞食翁一層破廟五更風眼前境界身何許始悟人間萬法空予見諸樵夫幸而可與語吿以患難厚許之使導往髙沙賴其欣然見從謂此處不是髙沙路方駐堡城北門賈家庒少駐一日却為入城糴米買肉以救兩日之饑又僱馬辦乾粮以備行役於是五更隨諸樵夫往焉時樵夫知予無聊又有所擕使􅎯不肖心得財豈不多於所許淮人依本分感激豈亦有天意行其間乎樵夫偏念客途長肻向城中為裹糧晚指髙沙移處泊司徒廟下賈家庒賈家庒予初五日隨三樵夫黎明至賈家庒止土圍中卧近糞壤風露淒然時枵腹已經兩夕一日半懇三樵夫入城糴米買肉至午而得食是夜僱馬趍髙沙行邊無鳥雀卧處有腥臊露打鬚眉硬風捜顴頰髙流離外顛沛饑渴内煎熬多少偷生者孤臣嘆所遭揚州地分官初五至晚地分官五騎咆哮而來揮刀欲撃人凶燄甚於冦亟出濡沫方免毒手急令離地分去告以入城云入城必被殺幸而脫北方之難不意困折於我土地天地雖大無所容身哀哉五騎馳來號徼巡咆哮按劍一何嗔金錢買命方無語何必豺狼罵北人便當縞素駕戎車畏賊何當畏虎如看取摘星樓咫尺可憐城下哭包胥思則堂先生初四日予在桂公塘北騎数千東行莫知其故賈家庒有樵夫云昨夜敵營甘泉西去城四十里有白鬚老子設青罣罳飯於救生寺竈前稱南朝相公問其何如曰面大而體肥以意逆之則堂家先生也因知昨日敵驅奉使北去與其所掠老小輜重偕行予雖不免顛踣道路較諸先生不以彼易此也先生嘗云某四十規行矩步今日乃有此厄流涕二十八字白鬚老子宿招提香積厨邉供晩炊借問魚羮何處少北風安得似南枝髙沙道中予僱騎夜趍髙沙越四十里至板橋迷失道一夕行田畈中不知東西風露滿身人馬飢乏旦行霧中不相辨須㬰四山漸眀忽隠隠見北騎道有竹林亟入避須臾二十餘騎遶林呼噪虞候張慶右眼内中一箭項中二刀割其髻裸於地帳兵王青縛去杜架閣與金應林中被獲出所擕黄金賂邏者得免予蔵處距杜架閣不逺北馬入林過吾傍三四皆不見不自意得全僕夫鄒㨗卧叢篠下馬過踏其足流血縂轄吕武親隨夏仲散避他所是役也予自分必死當其急時萬竅怒號雜亂人聲敵倉卒不盡得疑有神明相之馬既去聞其有焚林之謀亟趍對山復尋叢篁以自蔽既不識路又乏糧食人生窮蹙無以加此未幾吕武報敵騎已還灣頭又如路邉鮎魚埧傳聞不盡信然他無活策黽勉趍去僥倖萬一倉皇匍匐不能行先是自揚州來有引路三人牽馬三人至是或執或逃僅存其二二人出於無聊各操梃相隨有無禮之志逡巡行路無可奈何至晩西忽遇樵者数人如佛下降偶得一籮以繩維之坐於籮中雇夫六人更迭負送馳至髙郵城西天已曉不得渡常恐追騎之奄至也宿陳氏店以茅覆地忍饑而卧黎明過渡而心始安痛定思痛其涕如雨三月初五日索馬平山邉疾馳趍髙沙如走阪上圎夜行二百里望望無人煙迷途呼不應如在盤中旋昏霧腥且濕怒飈狂欲顛流澌在鬚髪塵沬滿櫜鞬紅日髙十丈方辨山與川冦行疾如鬼忽在林之巔誰家苦竹園其葉青戔戔倉皇伏幽篠生死信天縁鐵騎俄四合鳥落無虛弦遶林勢奔軼動地聲喧闐霜蹄破叢翳出入相貫穿既無遁形術又非縮地仙猛虎驅羣羊兎魚落蹄筌一吏射中目頸血僅可濺一𨽻縳上馬無路脫糾纒一厮躪其足吞聲以自全一賓與一從買命得金錢一伻與一校幸不逢戈鋋嗟予何薄命寄身空且懸蕭蕭数竹側往來度飛韉逰鋒㡬及膚怒興空握拳跬步偶不見殘息忽復延當其蹙迫時大風起四邉意者相其間神物來蜿蜒更生不自意如病乍得痊須臾傳火攻燃眉復相煎一行輙一跌奔命度平田幽篁便自托仰天坐且眠晴曦正當晝焦腸火生咽斷罌吸勺水天降甘露鮮青山為我屋白雲為我椽彼草何荒荒彼水何潺潺首陽既無食隂陵不可前便如失目魚一似無足蚿不見道傍骨委積萬有千魂魄親蠅蚋膏脂飽烏鳶使我先朝露其事亦復然丈夫竟如此吁嗟彼蒼天古人擇所安肯蹈不測淵奈何以遺體糞土同棄捐初學蘇子卿終慕魯仲連為我王室故持此金石堅自古皆有死義不汚腥膻求仁而得仁寜願溝壑填秦客載張祿呉人納伍員季布走在魯樊期托於燕國士急人病倜儻何拘攣彼人莫我知此恨付重泉鵲聲從何來忽有吉語傳此去三五里古道方平平行人漸復出哨馬覺已還回首下山阿七人相牽連東野御已窮而復加之鞭跰足如移山擕持姑勉旃行行重狼顧常恐追騎先揚州二㳺手面目輕且儇自言同脫虜波波口流涎白日各持挺其來何翩翩奴輩殊無聊似欲為鷹鸇逡巡不得避黙黙同寒蟬道逢採樵子中流得舟船竹畚當安車六夫共赬肩四肢與百骸屈曲如桮棬路人心為惻從者皆涕漣星奔不可止暮逹城西阡飢卧野人廬藉草為針氊詰朝從東渡始覺安且便人生豈無難此難何迍邅重險復重險今年定何年聖世基岱嶽皇風煽垓埏中興奮王業日月光重宣報國臣有志悔往不可前臣苦不如死一死尚可憐堂上太夫人鬢髪今猶𤣥江南昔卜宅嶺右今受㕓首丘義皇皇倚門望惓惓波濤避江介風雨行淮堧北海轉萬折南洋泝孤騫周游大夫蠡放浪太史遷倘復㳺吾盤終當畊我綿夫人生於世致命各有權慷慨為烈士從容為聖賢稽首望南拜著此泣血篇百年尚哀痛敢謂事已遄敵以髙郵米贍濟維揚故自灣頭夜道騎截諸津鮎魚埧其一予是夜若非迷途四更可逹埧所當一網無遺乃知一夕倉皇失道亦若有鬼神鼓動於其間顛沛之餘雖幸不死何辜至此極也至髙沙予倉皇至髙沙驚魂靡定回思初四土圍中初五竹林裏幾死於是使果不免委骨草莽誰復知之江南自好築金䑓何事風花墮向淮若使兩遭豺虎手而今玉也有誰埋予至髙沙姧細之禁甚嚴時予以籮為轎見者憐之又張慶血流滿面衣衫皆汚人皆知其為遇冦不復以姧細疑然聞制使有文字報諸郡有以丞相來賺城令覺察闗防於是不敢入城急買舟去發髙沙曉發髙沙卧一航平沙漠漠水茫茫舟人為指荒烟㟁南北今年幾戰塲平淮千里莽為丘墟自出髙沙滿目空䁧髙郵水與灣頭通下海陵入射陽過漣水皆其路也二月六日城子河一戰我師大㨗人指某處是戰塲城子河邉委亂尸河隂血肉更稀㣲大行南北燕山外多少逰魂逐馬蹄自至城子河積尸盈野水中流尸無数臭穢不可當上下㡬二十里無間斷乃敵以二月六日載奉使栁岳洪雷震併輜重俱北稽家莊撃其前髙郵撃其腰敵大䘮敗栁岳死焉洪雷震今在髙郵見說敵入江淮惟此戰我師大勝一日經行白骨堆中流失柂為心摧海陵棹子長狼顧水有船來步馬來是日經行戰塲四顧閴然棹人心恙長恐灣頭有人出來又恐岸上有馬來趕正荒急間偶然柂拆整柂良久危哉險哉小泊稽莊月正弦莊官驚問是何船今朝哨馬灣頭出正在青山大路邉自髙郵至稽家莊方有一團人家以水為寨統制官稽聳其子徳潤詣鄉舉其姪昌其館客莆田人林希驥字千里林孔時字願學皆銳意於事功者稽設醴甚至云今早報灣頭馬出到城子河邉不與之相遇公福人也為之嗟嘆不置願學同徳潤送予至泰州稽莊即事乃心王室故日夜莽南征蹈險寜追悔懐忠莫見明鴈聲連水逺山色與天平枉作窮途哭男兒付死生泰州予至海陵問程趍通州凡三百里河道北與寇出没其間真畏途也羈臣家萬里天日鑒孤忠心在坤維外身㳺坎窞中長淮行不斷苦海望無窮晚鵲傳佳耗通州路已通卜神通州三百里茅葦也還無鐵騎虎出没山鼯鬼嘯呼王陽懐畏道阮籍淚窮途人物中興骨神明為國扶旅懐北去通州號畏途固應孝子為回車海陵若也容羈客䞉買菰蒲且寄居天地雖寛靡所容長淮誰是主人翁江南父老還相念只欠一帆東海風昨夜分明夢到家飄䬙依舊客天涯故園門掩東風老無限杜鵑啼落花懐則堂實堂二先生於予厚予之惓惓於二先生知二先生亦惓惓於予也白頭北使駕雙韉沙濶天長淚曉煙中夜想應發深省故人南去地行仙貴卿貴卿與余同患難自二月晦至今日無日不與死為鄰平生交㳺舉目何在貴卿真吾異姓兄弟也天髙併地迥與子獨牢愁初作燕齊客今為淮海逰半生誰俯仰一死共沉浮我視君年長相看此恵州恵州予弟璧也憶太夫人三生命孤苦萬里路酸辛屢險不一險無身復有身不忘聖天子幾負太夫人定省今何處新來夢寐頻即事痛哭辭京闕㣲行訪海門久無鷄可聴新有虱堪捫白髪應多長蒼頭少有存但令身未死隨力報乾坤紀閒九十春光好周流人鬼闗人情輕似土世路險於山俯仰經行處死生談笑間近時最難得旬日海陵閒聲苦萬死奔波落一生飄零淮海命何輕近來學得趙清獻叫苦時時数十聲即事船隻時閒鎖城孤日閉闗驚心時有馬極目奈無山去路相傳險行嚢愈覺慳歸心風絮亂無奈一身閒發海陵自二月十一日海陵登舟連日候伴問占苦不如意㑹通州六校自維揚回有弓箭可仗遂以孤舟於二十一日早徑發十里驚傳馬在塘灣亟回晚乃觧䌫前途吉凶未可知也自海陵來向海安分明如度鬼門闗若將九折回車看倦鳥何年可得還聞馬二十一夜宿白蒲下十里忽五更通州下文字馳舟而過報吾舟云馬來馬來於是速張帆去荒迫不可言二十三日幸逹城西門鎖外越一日聞吾舟過海安未逺即有馬至縣使吾舟遲發一時頃已為囚虜矣危哉過海安來奈若何舟人去後馬臨河若非神物扶忠直世上未應僥倖多如臯如臯縣𨽻有泰州朱省二者受北命為宰率其民桔道路予不知而過之既有聞為之驚嘆雄狐假虎之林臯河水腥風接海濤行客不知身世險一窓春夢送輕舠聞諜予既不為制鉞所容行至通州得諜者云鎮江府走了文相公許浦一路有馬來捉聞之悚然為賦此北來追騎滿江濱那更元戎按劍嗔不是神明扶正直淮頭何處可安身哭金路分應金應以筆札往來吾門二十年性烈而知義不為下流去年從予勤王補兩武資今春特授承信郎東南第六正將贑州駐劄及予使北轉三官授江南西路兵馬都監贑州駐劄予之北行也人情莫不觀望僚從皆散雖親僕亦逃去惟應上下相隨更厯險難奔波數千里以為當然盖委身以從死生休戚俱為一人者至通州住十餘日矣閏月五日忽伏枕命醫三四熱病増劇至十一日午氣絶予哭之痛其歛也以隨身衣服其棺如常翌日𦵏西門雪窖邉棺之上排七小釘又以一小板片覆於七釘之上以為記不敢求備者邉城無主恐貽身後之禍異時遇便取其骨歸𦵏廬陵而後死者之目可閉也傷哉傷哉為賦二詩焚其墓前我為吾君役而從乃主行險夷寜異趣休戚與同情遇賊能無死尋醫劇不生通川一丘土相望淚如傾明朝吾渡海汝魄在它鄉六七年華短三千客路長招魂情黯黯歸骨事茫茫有子應年長平生不汝忘懐楊通州江波無奈暮雲隂一片朝宗只此心今日海頭覔船去始知百煉是精金喚渡江沙眼欲枯羈臣中道落﨑嶇乘船不管千金購漁父真成大丈夫范叔西來變姓名綈袍曽感故人情而今未識春風面傾盖江湖話一生仲連義不帝西秦拔宅逃來住海濱我亦東尋烟霧去扶桑影裏看金輪海船海船與江船不同自冦難以來從淮入浙者必由海而通為孔道也由是海船發盡適三月間方有台州三薑船至已為曹大監鎮所雇通州有下文字自定回張少保恰予之以一船亦是三月方到岸而予適來楊守遂以此舟送予與曹大監俱南向使有薑船而無張少保一舟予不能行有張少保而無薑船予又無伴不我先後適有邂逅殆神施鬼設而至也海上多時斷去舟公來容易渡南州子胥江上逢漁父莫是神明遣汝不發通州予萬死一生得至通州幸有海船以濟閏月十七日發城下十八日宿石港同行有曹大監鎮兩舟徐新班廣夀一舟舟中之人有識予者孤舟漸漸脫長淮星斗當空月照懐今夜分明棲海角未應便道是天涯白骨叢中過一春東將入海避風塵姓名變盡形容改猶有天涯相識人淮水淮山阻且長孤臣性命寄何鄉只從海上尋歸路便是當年不死方石港王陽真畏道季路漸知津山鳥喚醒客海風吹黑人乾坤萬里夢烟雨一年春起看扶桑曉紅黄六六鱗賣魚灣賣魚灣去石港十五里許是日曹大監膠舟候潮方能退風起千灣浪潮生萬頃沙春紅堆蟹子晚白結鹽花故國何時訊扁舟到處家狼山青兩㸃極目是天涯即事宿賣魚灣海潮至漁人隨潮而上買魚者邀而即之魚甚平飄蓬一葉落天涯潮濺青紗日未斜好事官人無勾當呼童上岸買青蝦北海口淮海本東海地於東中云南洋北洋北洋入山東南洋入江南人趍江南而經北洋者以楊子江中渚沙為北所用故經道於北復轉而南盖遼繞数千里云滄海人間别一天只容漁父釣蒼煙而今蜃起樓䑓處亦有北來蕃漢船出海二十一夜宿宋家林泰州界二十二日出海洋極目皆水水外惟天大哉觀乎一團蕩漾水晶盤四畔青天作䕶闌著我扁舟了無礙分明便作混淪看水天一色玉空明便似乘槎上太清我愛東坡南海句兹㳺竒絶冠平生漁舟二十八日乘風行入通州海門界午抛泊避潮忽有十八舟上風冉冉而來疑為暴客四船戒嚴未㡬交語而退是役也非應對足以禦侮即為魚矣危乎殆哉一陣飛帆破碧烟鬼郎驚餌理弓弦舟中自信婁師徳海上誰如魯仲連初謂悠揚真賊艦後聞欸乃是漁船人生漂泊多磨折何日山林清晝眠楊子江自通州至楊子江口兩潮可到為避渚沙及許浦顧諸從行者故繞去出北海然後渡楊子江㡬日隨風北海㳺回從楊子大江頭臣心一片鎡針石不指南方不肯休使風渺渺茫茫逺愈㣲乘風日夜趂東歸半醒半困糢糊處一似醉中騎馬飛蘇州洋一葉漂揺楊子江白雲盡處是蘇洋便如伍子當年苦只少行頭寳劔裝過楊子江心大海中一條自楊子江直上淡者是此乃長江盡處横約百二十里吾舟乘風過之一時即鹹水渺渺乘風出海門一行淡水帶潮渾長江盡處還如此何日岷山看發源入浙東金鰲山在台州界髙宗皇帝曽艤舟於此寺蔵御書四明既陷不知天台存亡憂心如擣見於此詩厄運一百日危機九十遭孤蹤落虎口薄命付鴻毛漠漠長淮路茫茫巨海濤驚魂猶未定消息問金鰲夜潮雨惡風獰夜色濃潮頭如屋打孤篷漂零行路丹心苦夢裏一聲何處鴻亂礁洋自北海渡楊子江至蘇州洋其間最難得山僅得蛇山洋山大小山数山而已自入淛東山漸多入亂礁洋青翠萬疊如畫圗中在洋中者或髙或低或大或小與水相撃觸竒怪不可名狀其在兩傍者如岸上山叢山實則皆在海中非有畔際是日風小浪㣲舟行石間天巧㨗出令人應接不暇殆神仙國也孤憤愁絶中為之心廣目明是行為不虛云海山仙子國邂逅寄孤篷萬象畫圗裏千崖玉界中風揺春浪軟礁激暮潮雄雲氣東南宻龍騰上碧空夜走舟入東海報者云前有賊船行十数里報如前望見十餘舟張帆㠗口意甚惡梢人亟取靈山巖路避之一夕揺船極其荒迫際曉幸得脫去鯨波萬里送歸舟倐忽驚心欲白頭何處赭衣操劍㦸同時黄帽理兠鍪人間風雨真成夢夜半江山縂是愁鴈蕩雙峰片雲隔明朝躡屩作清㳺緑漪堂予自海舟登台岸至城門張氏家盖國初名將永徳之後主人號哲齋闢堂教子扁緑漪為賦八句義方堂上看窓户翠玲瓏硯裏雲壇月席間淇水風清聲隨地到直節與天通庭玉森如笋干霄雨露功過黄巖予至淮即變姓名及天台境哲齋張為予覔緑漪詩予既賦題云清江劉洙書此過黄巖寄二十字魏睢變張禄越蠡改陶朱誰料文山氏姓劉名是洙至温州萬里風霜鬢己絲飄零回首壯心悲羅浮山下雪來未楊子江心月照誰祗謂虎頭非貴相不圗羝乳有歸期乘潮一到中川寺暗讀中興第二碑長溪道中和張自山韻潮風連地吼江雨帶天流宫殿扃春仗衣冠鎖月逰傷心今北府遺恨古東洲王氣如川至龍興海上州東洲常州也夜静呉歌咽春深蜀血流向來蘇武節今日子長逰海角雲為岸江心石作洲丈夫竟何事底用泣神州和自山去年予陷敵自山自京寄詩時予己南歸不及領今聞成誦追和作彼時語痛定思痛痛不可當春晚傷為客月明思見君我方慕蘇武誰復從田文龍背夾紅日鴈聲連白雲琵琶漢宫曲馬上不堪聞林附祖林附祖福州秀才去年三月四日在無錫道中忽為北人擒去指為文相公云你門年四十頭戴笠身著袍脚穿黑靴文書上載了你門如何不是縳至京口辨騐然後得釋附祖名元龍至南劍為予言畫影圗形正捕風書生薄命入罝中北人一似冬烘眼錯認顔標作魯公呈小村予自劍進汀小村過清流來迎不圗此生復相見萬里飄零命羽輕歸來喜有故人迎雷潛九地聲元在月暗千山魄再明疑是倉公回巳死恍如羊祜説前生夜䦨相對真成夢清酒浩歌雙劍横二月晦元年二月晦予從鎮江脫敵難險阻艱難于今再見仲春下澣追感墮淚八句塞上明妃馬江頭漁父船新讐誰共雪舊夢不堪圎遺恨常千古浮生又一年何時暮春者還我浴沂天有感呈景山校書諸丈北風吹春草陽烏日已至天時豈云爽人事胡乃異三月方皇皇衣冠道如墜棟撓榱桷折木顛楨榦悴大者懐端憂燋頭求室燬小者嗟行役泥塗跋其尾長平與新安露胔如櫛比賦分本爾殊適與天時值哲人處眀夷致命以遂志但令守吾貞死生浩無愧即事去年傷北使今日嘆南馳雲濕山如動天低雨欲垂征夫行未己㳺子去何之正好王師出崆峒麥熟時所懐世途嗟孔棘行役苦斯頻良馬比君子清風來故人相看千里月空負一年春便有桃源路吾當少避秦自嘆草宿披宵露松餐立晚風亂離嗟我在艱苦有誰同祖逖闗河志程嬰社稷功身謀百年事宇宙浩無窮補遺題蘇武忠節圗有序余在京口城外日夜求脫不得間謝村去平江欲逃又不果至鎮江事益急議趨真州余杜宻謀杜云事濟萬幸不幸謀泄當死死有怨乎余指心自誓云死靡悔且辦匕首事懼不濟挾以自殺杜云亦請以死自効於是計遂定既至真州城下問者羣至告以余在鎮江走脫城中諸校皆出既延入城苖守遂見語國事移時感慨流涕即往住清邉堂時從亡者始至也引至直司捜身上所蔵軍器既無他然後見信防閑嚴宻如此向使一疑字横於胸中閉門不納天地茫茫何所歸宿嘻其危哉苖守袖出李龍眠畫漢蘇武忠節圗求余詠題撫巻淒凉浩氣憤發使人慷慨激烈有去國思君之念矣遂賦三詩書於巻後時丙子三月二日也文天祥執筆於清邉堂之寓舍忽報忠圗紀嵗華東風吹淚落天涯蘇卿尚有歸時國老相兼無去後家烈士䘮元心不易逹人知命事何嗟生平愛覧忠臣傳不為吾身亦陷車獨伴羝羊海上逰相逢血淚向天流忠貞己向生前定老節須從死後休不死未論生可喜雖生何恨死堪憂甘心賣國人何處曽識蘇公義膽不漠漠愁雲海戍迷十年何處望京師李陵罪在偷生日蘇武功成未死時鐵石心存無鏡變君臣義重與天期縱饒夜久風塵黑百鍊丹心涅不緇文山集巻十八欽定四庫全書文山集巻十九宋文天祥撰
