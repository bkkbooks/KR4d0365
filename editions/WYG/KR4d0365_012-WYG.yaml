body:
  text: 樂語宴交代寧國孟知府致語粉省望郎来向雙溪領牧玉堂學士將從五馬歸班文章太守两風流新舊使君仝意氣三生結習千里逢迎差吉日以交龜秩初筵而式燕恭惟某官一中體叚萬巻工夫風来湖靣月到天心眼小衡峰勘破是間造化胷呑震澤充開裏許規模静觀時仁意無邊自得䖏生香不斷那許山房獨樂便須朝歩髙騫淡月踈星繞建章歩凌紫界燕寢清香森畫㦸駕熟朱轓東逰方喜於行春西嚮又歌於来暮好是當年孟夫子肯為今日謝宣城况也江雲鄰哉雩氷鳯凾飛下又傳岳牧得詞人熊軾馳来重見神仙逰碧落少遲表選即看中環我判府報政趍朝及時受代子孫永好非徒契結金蘭賔主相歡要是味同草木說賣劍買牛故事誦無襦有袴新謡真成宫羽相宣正好豆籩有踐地衣繡毯風袖瑶琴海棠開後燕子来時楊栁舞低猶自青春未减桃花歌徹莫令紅影空摇且從容東野雲龍更領㑹醉翁山水陽坡𤓰好此畨賸講齊盟西掖花香他日重尋舊約某等四工樂部執藝台堦上奉清歡下陳俚語玉堂學士催班鷺粉省潜郎趣佩麟来徃神仙同碧落後先岳牧總詞人陽坡共喜𤓰時及朝路相期桞色新握手論交拼一醉東風散作滿城春宴交代湖南提刑李運使致語錦帳尚書郎手持金節繡衣直指使面授銀龜二十年虎榜同盟第一叚熊湘佳話豆籩初秩英簜増輝某官紫薇垣裏星辰太華峰頭霜雪黄簾緑幕閉朱戶天子門生氷壺玉衡懸清秋神仙人物揷天髙雲霄閥㧞地起湖海樓湧翠浪流玉虹璽書濕濕拊翠濤拍青壁琴轡垂垂依然彈壓舊江山總是快活新條貫綸巾羽扇便追赤壁功名流馬木牛要做中原事業了却燕然山勒石歸来文徳殿宣麻我提刑同看長安花新聼衡陽鴈茅舍竹籬玉堂金馬到䖏無心青天白日芝草鳳皇舊時相識自是平生管鮑合成一會蕭曹共讀禮樂字三千好呑雲夢澤八九瀟湘雨煙寺鐘洞庭月遥看八面玲瓏蓬莱盞金蕉葉海山螺散作九州歡喜某等居叨伶部幸際華筵欲助歡顔敢承韻語河漢䨇星會使槎分明徹夜照長沙轡絲曉轉金龜影衣繡春随錦鵲花雲杏舊隂浮緑净野萍新韻度朱華明年共侍蓬莱宴回首丹墀日未斜宴朱衡守致語粉省郎星来坐朱陵堂上繡衣公子相逢紫盖雲邊麾莭同春豆籩永夕某官寳劍䨇峰意氣錦機五色文章北斗丹梯我玉皇香案吏西方雲界公佛地位中人旗盖東南雲龍上下羅軒冕朝天闕秉刀尺贊仙䑓荒政七州秘閣常平再見勝㳺三峡吏部刺史重来移太微垣二十五星照祝融峯九千餘丈朝樹夜濤入詠汀蘭㟁芷生香桑麻深燕雀成須信隂崖轉暖虎豹逺蛟龍遁從今後戶無塵袴􅃭歌春脚方新絲綸閣天風又下我提刑交情四海王事一家石鼓話頭謾對芳洲杜若玉堂何意要歸茅屋梅花一堂聚㑹天人千里逢迎地主細話巴山雨共酌古酃春好將席上歡聲散作人間和氣鮮鯽銀絲香芹碧澗小對歌筵宫花玉仗御水金溝同催宣宴敬陳吉語聊贊歡顔翩翩紫馬絢銀潢春入梅花新雨香牛斗劍芒浮翼軫岷峨佩影度瀟湘東南麾節精神合上下風雲意氣長且為緑酃拚一醉傳呼聨轡覲明光宴湖南董提舉致語前知瑞州碧落使君来坐皇華堂上繡衣公子相逢紫盖雲邊二十年虎榜同盟第一叚熊湘佳話招呼風月酬獻豆籩恭惟某官精神緑水天河節操丹崖鐡筆一椿獨老霜皮溜雨黛色參天雙萼齊芳紅杏倚雲碧桃和露揷天髙雲霄閥㧞地起湖海樓心白玉堂肘黄金印劍池丹井提携翠越風流天柱祝融脫活青雲標格盡道常平老子移来上界神仙英簜照空霜飛暑路鋒車度曉烟傍衮衣我提刑同看長安花共聼衡陽鴈風雲一氣朱結綬貢彈冠車馬同途翰卜鄰邕識面霄漢瞻佳士瀟湘逢故人共談禮樂字三千好呑雲夢澤八九度斗牛跨麟鶴襟期交注樽罍縹鸞鳯拏虎螭勲業同刋彛鼎某等叨居伶部聊獻工歌西風八月楚江濵争看星槎㑹漢津露􅊜紅綾旗影舊雲連翠簜轡華新東西杜若洲邉月先後瑞芝堂上春回首瓊林拚一醉使還總是鳯池人宴交代權贑州孫提刑致語太守奉親歡迎綵鷁使臣領牧新收銀莵班行两度襟期臺郡百年交好豆籩酬獻金石綢繆某官一襟禹宂氷霜萬大剡溪玉雪淡墨慈㤙塔光射斗牛妙音蓬莱宫清諧韶鳯入領圜橋冠帶出聼湓浦琵琶捫左角歴天田記方流䟽玉水旌旗日暖下太薇垣裏星辰鼓角雲和種千越亭前花木􅃭袴方歌夜雨幨帷又轉春風白馬金盤陀摩挲贑石三百里玉節青絲纜約束江城十一州金池與玉節相輝綉斧共朱轓出色崆山絶䖏移来琴鶴髙寒㢘水光中洗出劍刀清净岩開曉日灘蟄晴雷小駐英凾歌虹流吟翠浪快持荷槖飛鳯尾来虎頭我判府勇撤楚車新依冀部白雲舍近移来簾繡輿籐先月䑓髙記得朝花院桞喚起十年膠漆盡歸一日樽罍麾節同春笙歌永夕海山螺金蕉葉散為八境和風禁苑鳯青𤨏闈行共九天清露某等叨居伶部敢獻俚歌麾節東南㑹一堂蘭亭昨日記流觴六絲星度銀潢影五彩春浮玉翠香院桞舊雲懐燕語野苹新雨挹虹光鳳池對秉他年事佇㸔天街接佩璫又宴前人致語粉省望郎繡衣弭節碧山學士綵袖分符好㸔翠浪垂虹重酌亷泉飛雪某官凾關老子姑射仙人金鍾氷壺玉衡精神流麗青天鳯凰芝草表裏光明昔為天子好門生今是玉皇香案吏移下半空水鏡清照鄱湖鎔成萬疊氷花春浮贑石澄江分一道老氣横九州明弼堂中快活條貫籌思樓外逺大規模發輝清獻江山張王濓溪風月人行曉日吏立秋霜使節上青霄有華冠盖吏部提英鍳佇入鈞樞我判府金石交情塤箎王事上堂拜家慶方報行春知府見監司来依先月更醉燈前花雨共㳺雲外烟林肯為二千石徘徊散作十一州歡喜鮮鯽銀絲香芹碧澗小對歌筵宫花玉仗御水金溝同催春宴某等敢陳吉語上贊台顔簾影晴絲落舞茵崆峒雲晚聚星辰翠虹光度樓臺月香燕先浮霄漢春一道清風華轡逺䨇江緑水綵衣新相逢屢有朝花約又㸔貂蟬會紫宸上梁文山中堂屋上梁文戴符尋隠乆矣買山潘岳奉親昉茲築室未說胷中之全屋姑營靣北之一堂凡私計之綢繆皆上恩之旁薄自昔園林䑓館之勝難乎溪山泉石之全瑯琊两峯似太行之盤谷建陽九曲類武陵之桃源然而有􅆼而深者無曠而夷有清而厲者無堆而峭所在罕并於四美其間各擅於一長而况索之於杖屨之餘去人逺甚未有納之於戶庭之近奉親居之主人白髪重闈綵衣四世出随園鵠付軒冕於何心歸對林烏覺簞瓢之有味頃闢上㳺之叢翳偶逢小隱之坡陀江村八九家得重洲小溪澄潭淺渚之勝山行六七里有詭石怪木竒卉羙箭之饒攀飛雪而窺空谾度脩蕪而陟穹巘雲奔虎闘根穴相呀斗折蛇行嵁巗差互看􅡞川畫如登南垞過華子岡讀黄溪詩如上西山至袁家渇其遐詭足以騁懐而逰目其深靚足以飬道而棲真自天作之非人力也未為仙翁釋子之所物色惟有樵童牧豎之相徃来偶然幻出種竹齋見山堂尚欲敞為拂雲亭澄虛閣先生酒壺釣具無日不来夫人歩輿輕軒有時而至乃若波濤洶歘雪月紛披烟雨吐呑虹霞變現將使山間四時之樂盡為堂上百嵗之娯啜菽水盡其歡先廬固在得諼草植之背别墅何妨乃相南隅乃規中奥有䕶田一水排闥两山之勢得栽芋百區種魚千里之基問之隂陽天與我時地與我所若有神物水増而廣山増而髙不管相如四壁之蕭條且作樂天三間之瀟洒窓中列岫庭際俯林舍北生雲籬東出日或積土室編蓬戸㦯通竹􅘇縳柴門宛然林壑坻島之中更有花木樓䑓之意眼前突兀見此屋人生富貴須何時茍美苟完爰居爰處謳吟月露供燕喜之詩判斷煙霞博平反之笑何必瑶池崑崙閬風𤣥圃方是神仙不須終南太華天台赤城亦云山水被褐而環堵郤􅁤而杜門彈琴以詠先王之風髙卧自謂羲皇之上不知老將至聊復得此生今日幽居便可號為秘書外監他年全宅亦無華於昌黎先生小住郢斤齊聼巴唱東紅日照我茅屋東繞盡湖隂橋上㸔世間無水不流東南說與山人住水南江上梅花都自好莫分枝北與枝南西隄東千頃到隄西徃来各任行人意湖水東流江水西北濁酒一杯北忩北白雲去住總何心或在山南或山北上莫道青天在屋上青山一疊又青山有錢連屋青山上下試看流水在屋下他時戱綵畫堂前褔䘵来崇更来下伏願上梁之後千山歡喜萬竹平安舉壽觴和慈顔兒童稚齒昆弟斑白濯清泉坐荗木虎豹逺跡蛟龍遁藏隂陽調而風雨時神祗安而祖考樂一新門戸永鎮江山山中㕔屋上梁文舍一畆之白雲已開别業屋四圍之流水更啓前榮發揮已定之規模展拓方来之閥閱有相之道迺績於成主人未了書癡頗有山癖先人之敝廬在茍安風雨之餘慈母以輕軒来亦愛園林之近頃斸蒼苔之地昉營諼草之堂雖環堵之間粗云具體然闔廬之制未畢全功相恊厥居聿来胥宇階戺所以行僎价屏著所以肅賔嘉不日成之以時可矣是用戒良梓筮吉辰茀蚴蟉於水端架蜿蜒於雲表然後翼之以廡承之以門移石而立庭臯通泉而周戸外清湍峻嶺為不斷之藩垣野草幽花作自然之丹雘老之將至訖可小休昔晦翁愛武夷而不能家歐公卜潁水而非吾土余何為者乃幸得之未問君王便比賜鑑湖之宅何須將相方謀歸緑野之堂凡與同工齊聴善頌東日光穿竹翠玲瓏坡茅屋柴門在半峰荆風袂欲挹浮丘翁谷南水面沙邊緑正涵荆道人為作小蒲庵坡山上仙風舞檜杉坡西雨過横塘水滿堤豊漁蓑背雨向前溪荆水聲秋碎入簾幃豊北澄碧泓渟涵玉色歐夜深山月吐半璧谷誰来共枕溪中石坡上亂峯深䖏開方丈歐風雨戸牖當塞向谷五更曉色来書幌坡下門前白練長江瀉坡鼓吹却入農桑社坡翠浪舞翻紅䆉稏坡伏願上梁之後山輝川媚神比天同俾耆俾艾俾熾俾昌壽母多祉爰居爰䖏爰笑爰語君子攸寕自此定居永為安宅代曽衢教秀峰上梁文居香城初任衢教日永新歐陽楚芳自其邑買見屋除拆浮江而来兒郎偉香城㧞地為廬陵之名山大厦連雲新廣文之甲第結廬在人境幽居近物情竊以買宅買鄰元號千百萬之價有廬有屋或待三十年之勤未有不崇朝之間而能使二美之具誰為之地乃有此竒一片乾坤澹庵先生之里隔墻鍾鼎文昌兄弟之家况方其何蕃之在齊已有為戴公而起宅至今日歸之斯受亦有數行乎其間川浮陸運以無遺水到渠成而甚易移彼置此換舊添新疑半天之飛来忽平地而卓起尋引䋲墨䂓矩曰用舊人丹雘塗塈垣墉特其餘事多助之至不日而成彼有室築而道謀此則事半而功倍我府博才髙一柱胸洞八窓太學館中飛黄騰去大成殿下釋褐歸来安能鬱鬱居乎是以汲汲如也向時荼壘曽寫千萬間之心此日規模便作十二樓之様由柯山而徑上遡木天而横飛何官不為餘地甚綽青山如許聊且號工部草堂緑野後来以此為太祝㕔事輒陳韻語共舉修梁東穹秀峥嶸華盖峰卓筆雲霄天下獨曹劉班馬避詞鋒南翡翠英中碧玉篸一抺罘罳生畫色府中氣象已潭潭西鄰有文昌瑞色齊乃祖紹興光價在重嘘真氣磔鯨鯢北山腰帶曵清江曲滄江歴歴現䨇魚彷彿黄金繫横玉上一朶紅雲只尋大瓊樓髙䖏不勝寒轇轕乾坤􅇒萬象下不是求田并問舍要令突兀在眼前俯拾八荒歸廣厦伏願上梁之後閥閱増髙室家嚮用堂前龜鶴親見金桃天上麒麟聨輝玉樹大耐官職自立門庭以無媿於前修用永傳於佳話公牘與湖南大帥江丞相論秦冦事宜劄子某干犯帥嚴輒有申請秦冦之在廣西擾動二十五郡為梗累年去年破賀之富川官民荼毒不細經司不問今破我永明殺死知縣殺傷縣尉主學捲去縣印屠居民擄婦女掠去財物繼而又破永明之下澤又冦我江華移某所以毒廣西者施之湖南此而不討失刑莫大廣西以前獨力不能捕㓕今何幸湖南肯與㑹合宿兵以待師期朝廷之主張方新言路之指陳甚力此掃清巢穴之一機為两路官民舒洩寃憤不可失之時也前經帥不足望滿望新經帥之来不料意見参差施行矛盾茲得經司牒報補賊以官授賊以職犒賊以酒賞賊以錢凡懐忠憤無不彈指自昔化賊為民固有稱為盛徳事者盖賊有出於田里之饑荒激於官吏之貪黷弄兵之情出不獲已故仁人處之念其為赤子姑惟安之勿庸勝之今秦冦招募亡徒建置將校横行两路嘯聚千羣􅆷天子之命吏刼公府之鑄印殺人盈野罪如丘山既非脅從又非烏合渠魁縱有求降之說官司亦在不受之科而况初無出首之真情僅取改過之文狀謾曰囬郷而安業何曽束身以歸官得之廣人所云一靣受招一面刼殺刑政無章宜其至此天下之大勢相維所仗名義而已若名義不著大之不可以立國小之不可以立家今觀廣西成何宇宙先生不忍斯人之塗炭一再調兵必欲罪人斯得然後已此真扶持人極綱維世變盛心之所推也但今来廣西既作此可笑舉措未必不以龔遂渤海之事自詭上惑聖聴本路冒然進兵非惟蹊徑不熟乏隅總鄊導之助有悔吝之慮亦恐鄰閫反以本路為張皇壊其見成之前功或者隂設䧟穽今直須申審朝省看指揮如何若朝㫖主招諭本路只得撤兵後有衝突廣西當任其咎朝㫖如以招諭為不然自是督两路會合至時湖南不求廣西而廣西自當約湖南共事此利害自是坦然謹具公申欲望備申朝省仍乞鈞翰與當揆商訂必須計一例斷行下曰招則招曰捕則捕使人無中立之疑則亦無事後之悔所有永明縣見駐劄有使閫之兵有本州之兵有謝隅官之義丁約近千人日費舂陵供億比来徐守已費支吾郡力凋薄亦可為念今髙節所部兵若到山前不過又是坐食愚意謂不若候朝㫖行下􅃀許討捕然後調徃今乞且喚回髙節一行軍兵歸營聴候朝命某非敢違使閫約束本司去山前頗近的見利害如此恃師門相與之真故敢傾臆以請拱聼處分以凴遵守授刑節制司與安撫司平冦循環厯某猥以迂踈承乏湘臬適值冦發昭賀两路弗寕兹承大使丞相與廣西經畧都承選將調兵各以重僚為之督是行賊不足平矣某偶以職事獲忝與聞奉令承教於两閫間自是無虛日公移失幾宻私櫝近文貌求其脉絡貫穿報應迅速莫若循環厯為便司存以紫袋從郵置徃来去潭日有半去桂可三日從其中而禀命焉庶幾昔人道二國之言無私之義云爾某謹書於厯首為序十月十三日某荐準牒報大閫調兵一千人以宇文帥參玉環衛任其事甚盛舉也自秦㓂之作廣西前此調兵不過五百人以下去年吕帥方調一千人而皆委之小小將校氣勢單薄不能為功今南窻調三千人以唐貳軍督之以趙總制統之而使閫與之掎角大作規模賊授首行有日矣事闗西戸國家之所嘉賴豈直兩路之所䝉福而已然聞之兵家利鈍不能逆覩蜂蠆有毒困獸猶鬬語曰臨事而懼好謀而成某數月以來職思其憂亦頗采取衆議薄有管見及今山前之所當行者因悉數之於前乞賜鈞照一秦孟四者累據山前探報其狡兎之窟稱在賀州管下地名下界然實無一定可攻之巢穴亦無一定可撃之隊伍前此經司非不起兵臨之然兵来則賊散兵去則賊聚見吾强則避之知吾弱則乘之方官軍之始至也整齪精明部分齊一問冦則失之矣無可蹤跡者而秦之黨或為平民買賣於軍市之間甚者秦孟四亦在焉及淹旬越月之後我軍氣竭意裒䦨珊零落冦則忽以百十輩突出草莽以掩我軍從前往往僨軍蹶將大率坐此今兩間會兵鼓行而前冦出故智必且散去及其久也則有乗虛襲我之憂此一不可不知也一秦孟四所出没巢穴處其山重岡複嶠連跨數州林翳深宻薈蔚延袤山猺木客聚族其間將四面而裹之則山脚綿亘無合圍之理將赭山而蹙之則林木踈曠無延燎之勢我軍望之遥遥空駐山下而彼之軼出他境猖獗自如且如近年嘗遣二將曰吳曰孫屯駐屏山者年餘僅能免静江境内之擾而不能禁昭賀諸州之剽掠是也我軍若入其巢捜原剔藪豈不甚快然彼又竄入大山愈去愈逺迄不可誰何如近年蕭路分日張者提兵徑擣其巢而不獲一人是也今两閫兵力甚重非前此千百人單弱之比雖山勢連延不可合圍只是一歩䟎一歩可直造其所謂下界者然吾極其辛苦得至其間彼則又已遁散且兵在山前又無救於彼之横出此二不可不知也一所在平冦專藉土人惟今廣西則不然方秦冦之起也某村被害訴於閫閫為之調兵已而賊不可追撒軍而去未幾而冦已復至尋仇於所訴之家曰汝敢訴我從而盡殺滅之官不能為之主而適重其荼毒自此應有被刼者皆不復告官此一類是主人畏賊而不敢與為敵者也又秦冦所至攫剽財物之外出其餘以散之貧者善良被害惡少蒙利是以鄉井間略無被髪纓冠之義常有幸灾樂禍之心此一類是土人喜賊而不復與為仇者也今两閫會兵而前若無土人嚮導是猶盲者索途何徃而可然由前言之則或平民畏冦後禍而不欲為我軍之用或惡少以冦為㤙而不樂為我軍之役縱强而驅之未必不首䑕二三陽順官而隂附賊此處最是誤事此三不可不知也一今日之事全在两路督捕察前三者之弊各作一䇿䖏之必使有以避三者之病然後一舉而得志不然必堕賊計中南方用兵如今日大舉者自有數此行必須如狄武襄之於儂蠻了事而後可已君子作事謀始則籌之也可不熟而講之也可不精乎一聞有張虎者石壁嘗遣之將兵幾擒秦孟四嘗有張大蟲来我便怕之語若取賊之所怕者表而用之亦破賊膽之一也張虎者近為郭察所劾押下邕管効用今以鈞閫求之以屬王環衛使之以功補過其人勇悍有餘必能自効此上計也一今自湖南入昭賀有两塗一曰全州灌陽自灌陽入昭賀皆經縣鎮即近日被擄去處而去秦孟四下界巢頗逺一曰道州永明自永明入昭州界曰平源便是賊巢自平源至下界賊寨連珠相望其去秦孟四巢甚近今两督捕先合商量打併附和諸賊此却宜以告諭為先告諭之說以為两路之所誅者惟秦孟四汝曹脅從在不殺之科若得一寨下我軍直是不殺則所謂連珠賊寨必從風而靡非惟可以離賊之黨因而用之則擒秦孟四或在此徒未可知也但一賊寨来降其中有老幼有財物軍人不免殺戮攫拏此須督捕總統先明秋毫無犯不殺一人之令使降者以我為信則可此收捕之第一機也一昨来使閫所調不過戍寨二百人又令本司擇將當時頭勢稍輕所以且差桂文政總統桂雖淮將體統不為嚴重故鈐束倍覺費力向嘗以紊鈞聴乞賜改差未蒙垂許今幸王環衛此来即當抽囬桂文政盡以其兵付王環衛伏乞鈞照一髙節二百人今在全州灌陽駐劄合係王環衛總統伏乞鈞照一聞諸軍取十六日戒嚴以行二十後可到衡陽應平冦之說筆舌所不盡者候宇文帥參王環衛相㑹又得對面較量伏乞鈞照大使司回萬里承示循環厯讀之綱目備具公而幾宻之周防私而文貌之簡約甚徑便也所當遵而守之十月十六日報十二日所批畫如後一来示前四畫備見臨事好謀詳謹之至已即語之帥參計議其至明䑓必親從節下求商確也一所諭張虎者使䑓既聞其可用必詳審之矣但其人為言路所劾朝㫖押下邕筦自効本司若只求之桂閫恐桂閫亦必以申取朝㫖為辭且桂閫若知其人可用彼必自取而用之亦應未必肯以與我也但得其能辦此賊則州来在吳猶在楚正不必付王環衛也更唯髙明裁之一行師之道亦須任事者擇利而行當令就節下决所嚮一抽併桂路分一項軍人付王環衛此具見使司欲使歸一之意却亦須王環衛至使司熟議然後聴使司處分一髙節一項三百人前此係聴使司調用亦合更俟王環衛議之惟使司所䖏分右報如前其詳已共帥參計議籌之當以靣控也萬里糊塗書鴉不宜載之於櫝輒次第所為對口占以授替此筆者膚率必在所恕也十月二十二日一二十一日宇文帥參王環衛至衡是日留議軍事至三鼓而别二十二日早軍已行一前此奉大閫之命調戍塞兵四項共二百人令本司擇將本司遂差杜通判督捕桂路分總統此一時也今則大閫調兵千人輟元僚貴將以行與廣兵大為掎角此又一時也以事體論之所合抽回佳路分盡以其兵屬王環衛又須令杜通判觧督捕職事盡以軍務屬之宇文帥參庻幾事權盡屬大閫司存不過奉行㫖揮毎事無所專輒此則尊大閫之體也而宇文丈之来傳諭鈞意與其所以自處一切欲使某與聞某以職事而言則盗賊正屬司存固自無以諉其責但當如廣西章憲之所以自處者章憲但為其憲司之所能為若軍事皆是經閫任之章不與知也今某自有章憲様子豈敢事事干與犯僣越之誅而宇文丈堅謂長沙去山前迢逓報應不免遲緩恐誤事機必欲凡事從本目予决行又謂鈞意所望正如此某舊出門墻先生待某如子弟某事先生如父師今不自意以一節趍走閫部之内適門戸間有酬應以子弟自命則所當為父師代勞豈所敢辭者然事固有輕重大小難於概言今已與宇文丈斷應山前文字申到本司在某可以予决不犯專輙者某徑自區處報山前却申大閫照㑹其有非司存所得擅處者則取鈞筆㫖揮如此不失門墻奔走之誼又不失大閫崇重之體所有靣與宇文丈講論數項今一一乞鈞㫖速作施行桂路分已牒報從王環衛調用乞作批牌鈞判更劄付桂路分照應庶一切出於閫命而後事體歸一桂文政只是衡州路分名位尚小鈞判中或加一權攝名色在路分向上者以寵之盖既减其實姑華其名鼓舞之術也一宇文丈自謂以客軍深入實不知地分賊情苦不容本司觧杜通判督捕職事以為杜文任事數月講切諳熟今日正要資其用欲以同督捕處之又道州錢糧倍費支吾山前若有不繼立見利害須得一人通融於其間則杜通判其人也此說亦甚有理欲乞徑作批牌判令杜通判充司督捕職事兼督發錢糧粮官却望鈞茟褒拂數句庶其樂於趍事赴功此一大節奏也一近日道州只供億戍塞二百人錢糧已自斷續可憂今驟添千餘人劵食支遣小郡氣力何以堪之若不念其痛痒先與區處將来必坐困乏關係不細昨得倉漕書亦閔然及此不知還可申明朝廷於苖糴内作一道理否先生寫與都堂必無不從乞鈞照一山前事體重大臨機喝犒為費不貲恨司存寡薄不能出氣力問之宇文丈所携似少宇文丈子細應非妄費者望更那融發下若干就山前凖備若無所扵用仍是庫中之物宇文丈於此甚以為憂而不敢請軍無財士不来軍無賞士不徃勝負之㣲權所係其不敢不備言之取鈞㫖一應山前事宜凡可以助臨事好謀之槩悉從大帥參環衛亹亹道之不必以凟鈞聴者皆不布於此乞鈞照大使司囬十月二十九報二十一所批教者畫一如後一勦暴除兇固在兵力之强尤在心力之一前此或招或捕議論未一故使此賊得延旦夕之命今既一於討矣所謂選將調兵餽糧本司當思一一措置但司存於山前逺而使臺為近周匝體探量度應酬惟使司協一是望来示以廣西經憲為比非所願聞鄭丙為廣西憲激厲流人降卒世堅立功贖罪卒擒劇賊章憲果以是為心前所謂張虎者豈不能率以自效徃徃南窻不以是勉章憲耳萬里舊見胡致堂與張紫巖書云永明之冦未平桂郴之盗方作帥司兵力不支憲司計無從出未嘗不嘆當時既不强於力又不一於謀致使䑕軰猖獗今官軍氣勢已合我軰心事素孚崇臺可徑予决者毋以迹嫌本司所合施行者却望賜報庻不致乆以賊貽中朝之憂幸甚一杜通判桂路分各以處之兼職見之公移矣師克在和更望嚴賜勉勵總統不總統均是要立功督捕同督捕均是要敵愾宇文參議及王環衛之行也萬里嘗以是語之矣一道州錢糧前已申到已劄令其於有係官錢内那融應副却與備申朝省出豁又考之前比例係是運司措辦并告之公朝其申撿亦已見之公移矣一宇文總督所携備用錢特司存遣兵之舊比政恐支遣未敷見議措置樁管俟其申到便與科撥也一山前事宜凡有可以運掉扶植者切望徑自行下總督司䓁是王事䓁是僚屬政不必以本司差官為礙餘有誨日拱俟垂示萬里十一月初五日一當来廣西止有秦孟四一伙賊只因稽於勦捕致上下相挺於是遍昭賀境皆冦今㩀山前連日所申則秦孟四已遁杳不知其蹤跡如近日廣西所報禽毛丫頭唐督捕所約夹攻倪崇七桂路分所申打扶靈源寨皆枝葉去處而渠魁則失之矣某前嘗畫稟以此冦必祖故智逃散今乃果然重兵為錢糧所牽無持乆之理班師則禍本仍存頓兵則吾力不繼此事大欠結束今宇文帥參王環衛兵此時方至山前且㸔申来如何一秦冦實未易驅除若下得細宻功夫千百人亦可取若只持堂堂之陣則髙飛逺舉無如之何今廣西既失了秦賊看来諸軍逢一賊村便打遇一賊寨便攻此等相挺脅從却使得招諭前日之所謂招諭乃是姑息之政若兵臨其境告以禍福使降宜有必下之理此時若憤招安之非策只一槩殺去却又欠斟酌主其事在廣西本路又不得而專大閫以為如何一本路所仇者秦冦耳今兵入廣之後秦不可蹤跡於是亦不免到一處攻一處恐壊生靈過多而失吾尋仇於秦賊之意草間狐兎無盡滅之理大要當去其渠既失其渠所在而專泛及扵其他心甚念之大閫何以處此一廣西備白劄子所陳牒報本路全州有鹽田峒秦小九窟穴在其中此事誠有之陳廵檢者與賊通鹽則未必可信訪聞此峒形如葫蘆前尖後闊所以秦小九入而㩀之盖以其地形險巧故寄跡於其間而前後則不擾全州之境賊不欲召兵意將以自存也今亦安知秦孟四不竄其間但其地既有一夫當關萬夫莫前之勢未容輕於進攻須以術而後可破之前日見王環衛申將来乗破竹之勢一掃空之詞氣若容易然凡言語輕率便有取敗之道當一面報山前子細調用仍與全州土人宻議措置若不甚煩兵力尤為上上䇿也伏乞鈞照大使司回十一月初七日領十一月初五日所批厯備悉本司去山前逺不若使司去差近所報當得其實一行出師皆難坐籌隃制向已申諭帥叅及王環衛在行者遇機應變先申使司一聴行不若一一從本司施行則不貴巧遲矣王事一家政不必以形迹拘也嗣有當從商確者即垂示如前所批則髙明自了了矣萬里冗不及親染十一月十八日一秦冦竟無蹤跡分曉公文中或曰在大明村小明村或曰在大花山或曰在螺溪源南上坪或曰在南團平山白石山脚其說不一已難信慿今得王總統報直謂二十餘日秦孟四全無風路則兩路用兵以來此賊之出没可謂神矣大槩平賊全要地脚土兵之謂也今本路以客軍望望而前固已失之廣西為地主而全無地人問探雖東兵甚多要亦徒孟浪耳某前嘗采之南土皆謂秦賊狡猾詭秘之甚見吾强則避之知吾弱則乗之固嘗畫一塵徹鈞聽矣今果出避他所則目下工夫止當探實秦孟四所在然後可言進計不然泛泛而往果何所為廣西牒報謂湖南兵不當越界深入止宜在兩界上伺候會合殆有所激而云今已報山前且回兵駐泊湖廣界上一面遣人闗會唐督捕探問秦孟四所閃著實若秦賊有的所唐倅有密約方可鼓行而前縁兵在昭賀境内則糧運在路亦不無憂虞偶或為賊所梗立見狼狽是以回師界上乃十分持重之舉亦已語之僉舎載之公文當必先徹鈞覽不免専輙伏乞鈞察一廣西昨報本路荗於生事可畏遇人則殺遇屋則燒遇財則搶此輩素不知紀律所至殘賊可惡已行下杜督捕桂路分嚴與禁戢今續得廣牒以義丁越界深入肆行刼殺大不可令衆庶見只得抽回縁昨來桂路分初遣之時止有二百兵故須義丁為助今使閫調兵既多則亦不須此輩吾運掉自有餘故抽回義丁者所以随時取中也伏乞鈞照一扶靈源打寨之舉頓覺泛泛當來本路止於問罪秦賊朝廷㫖揮所討亦秦賊耳諸軍在扶靈源枉費辛苦一畨可謂失本㫖是役也王總統申来是一說桂分路申来是一說見之宇文帥叅㸃對二將覺已㣲不和又義丁乃桂路分所彈壓而廣西累有云云今既抽回義丁則桂路分亦不當更任事已别作稟議名色喚桂路分赴司而其本兵則令戍將髙成統之一則二將若果不和末流必費處置不若觧於其㣲一則以其不能鈐轄義丁即奪其職亦御諸將之㣲權也伏乞鈞照一道州供億委有可憂縁自七月以来郡中已極其剗刷至近日覺運斡之術漸窮雖曰於有管錢米内通融支遣然苖糴亦自無多此豈可動不得已盡指凖為劵米亦無可繼之䇿若劵錢一項一日須三百千則十日三千緍其何所措畫而可徐守不幸末路當自重擔秋冬間無日不病此月十二日忽至大故雖有數行焉而其因於憂勞亦云至矣甚可痛念今幸而王守已来數日過從欲脫而去之前日得其肯徃約二十四日可交事忽得徐守訃山前生劵間斷中間新守未到已前有數日無官主張於是亟差教授䕶印而以十日軍劵責都副吏以私財應副違從軍制此從權甚不得已之行移也今既抽回義丁約千人既可為道州解小半支吾然尚有千四五百兵留竟上軍劵不可謂少頃刻不容稽違方来者亦不知所措使閫雖申朝廷從運司應辦然㫖揮遲速未可必今合有救急之䇿不全仰於道州若因循處之則道州必有一日乏絶誤事此時噬臍何濟於難此最關係幸先生深入思慮亟謀所以救此某不勝拳拳一全州鹽田峒為秦小九所㩀其峒地形險絶未易以兵力取昨王總統申来云俟囬軍掃清言之甚易某殊以為未然今得宇文帥參公文果亦訝其輕發山前得宇文丈以審重持之亦大濟事此峒中百姓皆耕他人之田田主皆在峒外秦小九不過寄巢其間峒民元不随從之為冦儘可從土人上作工夫某近已得一全州土豪與之計事已畫為三說或誘或逐或擒於中忽濟焉則禍本㧞矣柯倅赴全州迂道来訪已悉計授之若不動聲色而集事又羅飛之者安九五也伏乞鈞照大使司回十二月二十日荅十八日所批畫於後一秦賊蹤跡两路皆不得其的大率擒賊無出地脚之說此李愬用李祐取吳元濟之䇿也以地分言之廣西督捕司體探為便此中既出兵㑹合亦不當專諉其責須是重賞購募土人為之嚮導間探全在軍前審察其人而用之又恐因此反落賊計故不欲見之公移今使司因廣中文移檄回竟上駐劄固便於運餉然若俟廣西的報而後遣兵使其果知秦賊所在則彼欲自取之以為功其肯先聞於我乎回軍竟上以示持重厚募土人以圖進取二說並行計之善者也一廣西所報義丁越界生事恐或有之但此項義丁元與桂路分所部軍參錯在彼不應縱容如此借使桂路分受欺於其黨杜督捕亦豈得全然不知本司頗疑其說故只行下道州宻切契勘或謂廣西以我兵既入彼界連日攻打頗獲賊徒又無軍前申說廣將陳明見賊不捕遂為此說不欲本司兵在彼特借義丁騷擾之名併欲退我師耳盖在彼則自欲飬冦扵我則欲害成或出於此今義丁既已放散固西人之所欲但恐自此脫有緩急再調又難惟髙明審之一道州錢粮切切在念且如軍劵増支一項本司已行下總督司於随軍錢内移文但所憂者朝廷科降之命猝未得分曉又撥一項錢赴軍前恐本州或有不繼今總督司與之暫時挨那支遣近又從司存剗刷别項窠名少應本州乏絶以俟朝廷之命方此降遣已見之公移矣茲承開論敢詳以聞一鹽田峒近見軍前所申欲乗破竹之勢談何容易同官唐書記說鹽田雖號曰峒而實非峒其間多是冨人所居今秋亦有領舉者只擒秦小九一人政不須如此鄭重今台諭土豪三說已得要領矣一永明之冦自廣閫易招安之說為㑹兵之舉其名甚正且疊承諄諭不容不發兵應之桂去賊近兵又先發更不俟本軍之至故秦賊得以逃散今廣兵遇賊不捕本司軍連日攻打終未得其要領使司檄回境上又抽回桂路分放散義丁而桂倅自徑囬舂陵豈逆料此賊為終不可得故示以班師之漸耶重兵屯駝不容越境而問可否之機須要早决若果不可以月日圖當早議撤戍只慮撤戍之後賊復猖獗則本司有諸處戍寨之例斟酌留兵亦可行也使司去山前稍近事體必所深悉幸細籌之萬里不克親染乞恕十一月二十六日一數日前諸處報来事體襞積一則道州以糧道為苦山前謂昭賀路梗宜寄粮於扶靈源口殊覺未便一則我軍連日或打扶靈源或打伸家峒於秦賊不相千而陣亡石損者多恐攻擊不已或落賊姦非細故也一則義丁不依紀律人衆難於加刑廣西報得既可畏而宇文督軍中来亦去然恐末流猖獗難制一則道州以供億為病覺已窘束不可當如人數可减亦是為道州畧省人數之一端一則王總統與路分所申扶靈源事言語參差見之宇文丈㸃對覺已有釁昨與師參議以髙成易之宜及此時舉行元說所以本司一畨區處事冝欲諸軍駐界上欲義丁且抽回欲桂路分来稟議此一時也累日不見山前報来繼得厯中鈞批則未以所行為照某退伏自念殊坐專輙方議所以稟承鈞命今得宇文帥叅申到則已提兵越昭賀入静江之南團與督捕聲迹相聞矣㩀備述陳忠所報云南團十八村村老陳伏乞免洗蕩自認捉出秦孟四則是秦孟四已見端的所在村老既認捉出此即鈞諭所謂地脚者却有可望捕獲之期目今我軍如唐督捕之說與廣軍同在南團西路匝住不容透漏以待村老捉其渠魁是機鋒相凑漸有着落此又一時也即已飛報山前既是唐督捕有明報秦賊有實迹當乗機進􅂑矣一義丁昨者抽回為在昭賀境生事且前無秦賊可攻故随時施宜如此今既同大軍深入静江見匝住南團賊路則此時亦無縁可以抽囬矣已飛報山前盡從便宜調用如仍前生事作過則照元行放散仍十分丁寧頭目極意鈐束以自贖矣一昨以秦賊無蹤跡檄桂路分赴司稟議面授方略今髙成暫總本軍不曽明其有過今覺鈞意亦不欲抽囬亦已報桂路分既是山前已見秦賊踪跡不妨乗機集事知未離軍不須禀議如已在道稟議復任一以前言之秦孟四杳無風路我軍深入真有未便以今日言之村老既認捉出秦孟四我軍又已得廣囬報向前㑹合獲賊有期班師有漸累月為此憂窘今不得伸眉耳一杜通判聞徐守之訃篤同官之誼歸理其後事申来云一見新太守即復徃山前此時想已離舂陵矣一凖牒報已借道州二萬芝楮二千石米中流一壺為濟不小昨見道州申来謂山前一日支錢二百貫米百石以此數凖之使閫所借之錢可支七八日所借之米可支二十日今覺嵗前此事須可結束姑以嵗前約之尚有三十餘日道州儘有米特錢未有從出使閫所申朝廷從運司應辦若早晚便得回降道州尚庻幾焉一鹽田峒之事昨已面與柯權郡議以土豪誘之或誘或逐或擒只消得如此措置却未見柯權郡申来容更宻叩之一伏凖使閫行下議置寨留屯此乃是湖南防制廣冦之第一䇿聞全道州邊廣去處無嵗不避冦大抵兵来則去兵去則来極以為苦若建寨更戍有數百人常在界上則廣冦無敢復犯湖南此一勞永定之規模非但禦今日秦冦而已是議也王判官壵嘗與董倉漕言之倉漕已見報㑹王判官到司已與面議見歸道州與王守條畫申来今不待道州有請而使閫計慮已及之此事甚計緊切不論秦冦已獲未獲此一舉乃是湖南永乆保障計公文申析甚詳更在鈞意裁處大使司囬二十九日答二十六日所批畫一於後一承報軍前所申事與前日規模又異大率兵難隃度只得随機應變使十八村村老果能任責束縳渠賊以来則撤戍可期豈非深望近度此两日必有㨗報尚快聞之亦須宻諭山前所認捉出秦冦者是真秦冦乃可一留屯之議本司固有舊比今詳公移尤為縝宻不妨行下道州及宇文總督一靣商議庻獲賊之後便可摘留兵將伺其囬報又從而審訂之一科撥一事已嘗三申公朝至今未凖回降見議申催更得使司備道州所申與之申請亦一助也一餘說不殊前禀髙明區畫已得其當矣萬里别已專布後來先生授將校以計擒秦孟四冦遂平道體堂謹書文判宣州勸農文太守到郡踰月被命造朝辭允不免且旦夕去矣猶以職事得出郊與爾農父老告語一次因記李㕘政莊簡公名光曽守此土後有一帖云僕頃守宣州今已二十八年東望䨇溪疊嶂之勝感嘆而已因見諸父老為祝率勵子弟為士為農仰事俯育為忠為孝戮力以事田疇先時而畢租稅立身掦名以顯父母是所望也李參政去郡已乆尚拳拳於宣人如此今太守與爾父老方比相處􅃍然去之其拳拳又可知因取李參政之意衍為勸農五詩又别為五詩以寓戒酌酒與爾父老誦之爾父老其以轉語郷曲子弟能從吾戒而不為惡即能從吾勸而為善矣他日太守在他所遇宣人来必問曰爾父老安否爾農曽從吾勸戒否爾等尚勉旃以副太守去後之思第一勸爾勤耕作布種及時休落魄惟有耡頭不悞人飽食暖衣良快樂第二勸爾行孝弟敬重爺娘比天地前人做様後人看滴滴相承簷溜水第三勸爾勤教子有子讀書家道起若還飽暖不知書十萬莊田不禁使第四勸爾常修善糶米救荒極方便但從心上做隂功管取兒孫多貴顯第五勸爾了王租莫教人喚作頑都年年早納早收鈔那有公人来呌呼第一戒爾莫妄狀須知官府難欺誑從来反坐有專條重者徒流輕者杖第二戒爾莫避役既有田園那避得今朝經漕明朝倉到底費錢又何益第三戒爾莫拒追擔刀使棒欲何為有事到官猶可說殺人償命悔時遲第四戒爾莫旡頼故殺子孫罪名大縱逃人禍有天刑害人不得翻自害第五戒爾莫奪路做賊不休終敗露斬斫徒配此中来能得幾錢受此苦湖南憲司咸淳九年隆冬踈决批牌判本司照朝省指揮見以隆冬委官諸州縣踈决凡情輕當放釋者從所委官逐名㸃對取判施行其有情理重惡累經踈决及㤙赦不原而手足未經槌折膂力正自精强者與其幽囚於牢栅之中駸尋而死不若驅於極邉被堅執鋭庶幾死中求生此一種人請所委官令項分剔作一狀指實申来以憑喚上赴司審視發徃荆蜀淮海古之强兵猛將得之於盗賊髠囚者正自不少此亦推明國家忠厚之一事也取各官遵禀申斷配典吏侯必隆判近世以来天下以吏奸為病士大夫臨事惴惴然惟恐吏之欺已馭之以束濕事無大小一切以法䋲之當職以為不必立的無罪不必尋有罪不必恕為得之矣本司諸吏頗似謹畏從前固有違慢者當職諒其不及每毎止於薄懲爾軰非但不敢欺直不忍欺可也侯必隆何為者輙敢於呈押之時脫套花字於行移之後揍掇公文顯然面謾行其胸臆此非先有無忌憚之心而後動於惡乎送之有司自稱為無他情弊殊不思情莫惡於脫套弊莫大於揍掇豈必計囑取受而後謂之情弊哉㸔来此吏於諸吏中頗機警而膽最大以小人之小有才不施之於奉公而施之於罔上若以姑息行之留此人在案中將来必為司存無窮之蠧矧所犯關係臺綱雖欲恕之不可得也侯必隆决脊杖十五刺配千里州軍本當更槌碎右指以為箝紙尾作弊者之戒姑以贓狀未明特免斷訖長枷臺前五日押發仍牓委僉幕審問楊小三死事批牌判使職一日斷一辟事今日看楊小三身死一欵㸔頗不入不能無疑一則當来無大緊要驟有謀殺似不近人情二則殺人無證只㩀三人自說取安知不是揑合三則捉發之初乃因楊小三揣摩而訴三名何為三名恰皆是凶身似不入官信今文字已圓只争一行字則死者配者一成而不可變矣今仰僉㕔一看此欵盡夜入獄喚三名一問若問得果無翻異明日便斷如囚口有不然只得又就此上平反文字是宻封来忽然而徃人所不覺則囚口得矣平反楊小三死事判律諸謀殺人已殺者斬從而加功者絞又律故殺人者斬又律諸同謀共毆傷人者各以下手重者為重罪元謀减一等從者又减一等至死者随所因為重罪今楊小三之死也施念一捽其胸塞其口顔小三斧其脇羅小六擊其吭其慘甚矣再三差官審究則三人者於楊小三元無深忿特其積怨之深故伺其間而共捶打之則謂之同謀共毆至死宜不在謀殺之例顔小三者施斧於脇肋之間為致命是下手重者也然其不用斧之鋒而止以斧腦行打是殆非甚有殺心者羅小六雖不加之以縊楊小三亦必以肋斷致死然始也謀毆之終也遂縊之是其心處以必死非獨下手重而已是故以下手論之顔小三之先傷要害當得重罪以誅心論之羅小六獨坐故殺不止加功准法皆當處死以該咸淳八年明禋霈恩特引貸命顔小三羅小六各决脊杖二十刺配廣南逺惡州軍施念一於同謀為元謀於下手為從合减一等决脊杖十七刺配千里州軍牒州照斷訖申門示茶陵周上舍為訴劉權縣事判孟子曰有人於此其待我以横逆則君子必自反也我必不仁也必無禮也此物奚宜至哉此君子處已法度也子曰居是邦也事其大夫之賢者子貢曰禮居是邦不非其大夫此居鄊法度也今茶陵劉權縣申周監稅父子為豪强把持且謂不法不可枚舉必非無故而為之辭者使周監稅父子果善人也則曰我無是事何恤人言關門逺嫌人誰得以瞷我如此則處已居鄊皆得之矣今因權縣所申周上舍不勝其忿訐其短以相攻擊一則曰劉某二則曰劉某自反之君子肯然乎不非其大夫當如是乎抑大學曰有諸已而後求諸人無諸已而后非諸人併備詞帖劉權縣果如所訴則宜盡與改更布過失於境内洗手以勤公砥行以為政如此而盗賊不畏威豪强不屏迹吾不信也仍門示周上舍宜知自愛文山集巻十七欽定四庫全書文山集巻十八宋文天祥撰
