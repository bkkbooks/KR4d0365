front:
  text: 指南後錄一
  hash: sha256:87d5d74cedcfd5882691ab192546fc5845105d2b1415a38924bddb603e9157de
body:
  text: 過零丁洋辛苦遭逢起一經干戈落落四周星山河破碎風抛絮身世飄揺雨打萍惶恐灘頭説惶恐零丁洋裏歎零丁人生自古誰無死留取丹心照汗青上已日張元帥令李元帥過船請作書招諭張少保投拜遂與之言我自救父母不得乃教人背父母可乎書此詩遺之李不能強持詩以逹張但稱好人好詩竟不能逼元夕南海觀元夕兹遊古未曽人間大競渡水上小燒燈世事争強弱人情尚廢興孤臣腔血滿死不愧廬陵懐趙清逸厓海真何地驅來坐戰塲家人半分合國事决存亡一死不足道百憂何可當故人髯似㦸起舞為君傷二月六日海上大戰國事不濟孤臣某坐北舟中向南痛哭為之詩曰長平一坑四十萬秦人歡欣趙人怨大風揚沙水不流為楚者樂為漢愁兵家勝負常不一紛紛干戈何時畢必有天吏将明威不嗜殺人能一之厥角稽首併二州正氣掃地山川羞身為大臣義當死城下師盟愧牛耳開關歸國洗日光白麻重宣不敢當出師三年勞且苦咫尺長安不得覩非無虓虎士如林一日不幸為人擒樓船千艘下天角两雄相遭争奮搏古來何代無戰争未有鋒鋭交滄溟遊兵日來復日徃相持一月為鷸蚌南人志欲扶崑崙北人志欲黄河吞一朝天昏風雨惡礟火雷飛箭星落誰雌誰䧺勝負分流尸漂血洋水渾昨朝南船滿厓海今朝只有北船在昨夜两邉桴鼓鳴今朝船船鼾睡聲北軍去家八千里椎牛釃酒人人喜惟有孤臣雨淚垂㝠㝠不敢向人啼六龍杳靄知何處大海茫茫隔烟霧我欲借劒斬佞臣黄金横帶為何人又六噫飇風起兮海水飛噫文武盡兮火徳噫鷹鸇欲撃兮靡所施噫鴻鵠欲舉兮将安歸噫櫂歌中流兮任所之噫獨抱春秋兮莫我知噫言志九垠化為魅億醜俘為虜既不能變姓名卒於呉又不能髠鉗奴於魯逺引不如四皓翁髙蹈不如仲連父㝠鴻墮矰繳長鯨陷網罟鷃燕上下争誰何螻蟻等門相爾汝狼藉山河嵗云杪飄零海角春重暮百年落落生涯盡萬里遥遥行役苦我生不辰逢百罹求仁得仁尚何語一死鴻毛或泰山之輕之重安所處婦女低頭守巾幗男兒嚼齒吞刀鋸殺身慷慨猶易免取義從容未輕許仁人志士所植立横絶地維屹天柱以身徇道不茍生道在光明照千古素王不作春秋廢烽烟突騎交中土閏位適在三七間禮樂終當属真主李陵衞律罪通天遺臭至今使人吐種𤓰東門不可得暴骨匈奴固其所平生讀書為誰事臨難何憂復何懼已矣夫易簀不必如曽参結纓猶當效子路南海朅来南海上人死亂如麻腥浪拍心碎飇風吹􅁂華一山還一水無國又無家男子千年志吾生未有涯有感海濶龍深蟄山空鳥雜鳴花隨春共去雲與水俱行壮士千年志征夫萬里程夜凉看星斗何處是欃槍張元帥謂予國已亡矣殺身以忠誰復書之予謂商非不亡夷齊自不食周粟人臣自盡其心豈論書與不書張為改容因成一詩髙人名若凂烈士死如歸智滅猶吞炭商亡正採薇豈因徼後福其肯蹈危機萬古春秋義悠悠雙淚揮登樓茫茫地老與天荒如此男兒鐡石腸七十日来浮海道三千里外望江鄉髙鴻尚覺心期濶􅏝馬何堪脚跡長獨自登樓時拄頰山川在眼淚浪浪海上天邉青鳥逝海上白鷗馴王濟非癡叔陶潜豈醉人得當須報國可隠即逃秦身事蓋棺定挑燈看劍頻贑州滿城風雨送凄凉三四年前此戰塲遺老猶應愧蜂蟻故交已久化豺狼江山不改人心在宇宙方來事會長翠玉樓前天亦泣南音半夜落滄浪出廣州第一宿越王䑓下路搔首歎萍踪城古都招水山髙易得風鼓聲殘雨後塔影暮林中一様連營火山同河不同英徳道中海近山如沃杼深屋半蕪乾坤正風雨軒冕縂泥塗自歎鳶肩薄誰憐鶴影孤少年狂不醒夜夜夢伊吾晚渡青山圍萬疊流落此何邦雲静龍歸海風清馬渡江汲灘供茗椀編竹當蓬忩一井沙頭月羈鴻共影雙珊瑚吟南方有珍禽鳴聲天下竒毛羽黒如漆两眼凝璚脂燕趙佳公子籠檻以自隨童子重丁寜飲食必以時将獻上林苑來巢萬年枝待之豈少恩不免加縶維珊瑚真珊瑚碎琢良自悲中原寒氣深風土非所宜和中甫端午韻不依次黄茅古道外羸馬發南州有客􅅓齊虜何人念楚囚嵗年付流水風雨滿滄洲手把菖蒲看黒頭非所求又呈中齋風雨羊腸道飄零萬死身牛兒朝共載木客夜為隣庾子江南夢蘇郎海上貧悠條看晩渡誰是濟川人又萬里論心晩相看慰亂離丹成俄巳化璧碎尚無緇禾黍西原夢川原落日悲斯文今已矣來世以為期竹間倦来􅂓歇馬隨分此青山流水竹千箇清風沙一灣乾坤醒醉裏身世有無間客路真希絶浮生半日閒越王䑓登臨我向亂離來落落千年一越䑓春事暗隨流水去潮聲空逐暮天廻烟横古道人行少月堕荒村鬼哭哀莫作楚囚愁絶看舊家歌舞此銜盃南華山北行近千里迷復㤀西東行行至南華忽忽如夢中佛化知㡬塵患乃與我同有形終歸滅不滅惟真空笑看曹溪水門前坐松風六祖禅師真身盖數百年矣為亂兵刲其心肝方知有患難佛不免况人乎南安軍梅花南北路風雨濕征衣出嶺誰同出歸鄉如不歸山河千古在城郭一時非餓死真吾志夢中行採薇黄金市閉蓬絶粒始南州我過青山欲首丘廵逺應無兒女態夷齊肯作稻粱謀人間早見黄金市天上猶遲白玉樓先子神遊今二紀夢中揮淚濺松楸萬安縣青山曲折水天平不是南征是北征舉世更無廵逺死當年誰道甫申生遥知嶺外相思處不見灘頭惶恐聲傳語故園猿鶴好夢囘江路月風清泰和書生曽擁碧油幢耻與羣兒共豎降漢節㡬囘登快閣楚囚今度過澄江丹心不改君臣誼清淚難㤀父母邦惟恐鄉人知我瘦下帷絶粒坐蓬忩蒼然亭風打船頭繫夕陽亭前老子舊胡牀青牛過去關山動白鶴歸來城郭荒忠節風流落塵土英䧺遺恨滿滄浪故園水月應無恙江上新松㡬許長别里中諸友青山重囘首風雨暗啼猿楊桞溪頭釣梅花石上尊故人無復見烈士尚誰言長有歸來夢衣冠滿故園發吉州已邜六月初一日蒼然亭下楚囚立山河顛倒紛雨泣乙亥七夕此何夕煌煌牛斗劍光濕戈鋋彗雲雷電撃三百餘年火為徳須臾風雨天地黒皇綱觧紐地維折妾婦偷生自為賊英䧺扼腕怒鬚赤貫日血忠死窮北首陽風流落南國正氣未亡人未息青原萬丈光赫赫大江東去日夜白祭羅開禮諸義士江岸今多嚙城居昔屢焚市人半傖父豎子亦将軍蛟哭金洲雨猿啼玉觀雲周郎墳土上囘首淚成痕予始至南安即絶粒為告祖禰文别諸友詩遣孫禮取黄金市登岸馳歸約六月二日復命於吉城下予以心事白諸幽明即暝目長徃含笑入地矣乃水盛風駛前一日逹廬陵孫禮期不至予且行忍死以待垂至豐城忽有見孫禮於他舟乃悟竟不曽徃為之痛哭流涕暮始見主者取孫禮還舟明早遂送之豐城縣縱其自便追之不可及矣予至是不食巳八日若無事然私念死廬陵不失為首丘今使命不逹委身荒江誰知之者盍少須臾以就義乎復飲食如初昔讀左傳申包胥哭秦庭七日勺飲不入口亦不聞有他乃知餓踣西山非一朝之積也予嘗服腦子二兩不死絶食八日又不死竟不曉其何故從者七人或逃或死或逐今僅存一人曰劉榮楚囚之况宜哉隆興府半生㡬度此登臨流落而今淚滿簮南浦不知春已晩西山但覺日初隂誰憐龜鶴千年語空負鵾鵬萬里心無限故人簾雨外夜深如有廣陵音湖口江湖一都㑹宇宙㡬興亡走馬蘆林外買魚茅舍傍南人撑快槳北客坐危檣江水交岷水東流日夜長安慶府風雨宜城路重來白髪新長江還有險中國自無人梟獍蕃遺育鱣鯨蟄怒鱗泊船休上岸不忍見遺民池州五老湖光逺九華山色昏南冠前進士北部故将軍芳草江頭路斜陽郭外村悤悤十年夢故國暗銷魂魯港方誇金塢築豈料玉牀揺國體真三代江流舊六朝鞭投能㡬日瓦觧不崇朝千古燕山恨西風捲怒潮采石不上峨眉二十嵗重來為墮山河淚今人不見虞允文古人曽有樊若水長江濶處平如驛况此介然衣帶窄欲從謫仙捉月去安得燃犀照神物建康金陵古㑹府南渡舊陪京山勢猶盤礴江流己變更健兒徙幽土新鬼哭䑓城一片清溪月偏於客有情金陵驛草合離宫轉夕暉孤雲飄泊復何依山河風景元無異城郭人民半已非滿地蘆花和我老舊家燕子傍誰飛從今别却江南日化作啼鵑帶血歸萬里金甌失壮圖衮衣顛倒落泥塗空流杜宇聲中血半脱驪龍頷下鬚老去秋風吹我惡夢囘寒月照人孤千年成敗俱塵土消得人間說丈夫懐忠㐮平生王佐心世運蹈衰末齊虜誰復封楚囚詎當脱金陵雖懐古尚友在風烈褒忠侈遺廟夫子我先逹早秋隻影飄零天一涯千秋揺落欲何之朝看帶緩方嫌瘦夜怯衾單始覺衰眼裏游從驚死别夢中兒女慰生離六朝無限江山在搔首斜陽獨立時睡起空堂孤影起聞雞風起髙樓鼓角悲江海無情遊子倦嵗年如夢美人遲平生管鮑成何事千古夷齊在一時坐久日斜庭木落浮雲滅沒漏朝曦中秋不教收骨瘴江邉驅向湖沙着去鞭舊奪宮袍空獨步新飡官飯飽孤眠客程恰與秋天半人影何如月倍圓猶是江南佳麗地徘徊把酒看蒼天南康軍和東坡酹江月廬山依舊凄凉處無限江南風物空翠晴嵐浮汗漫還障天東半壁雁過孤峰猿歸老嶂風急波翻雪乾坤未歇地􅂕尚有人傑堪嗟飄泊孤舟河傾斗落客夢催明發南浦閒雲連草樹囘首旌旂明滅三十年來十年一過空有星星髪夜深愁聴胡笳吹徹寒月和中齋韻過吉作功業飄零五丈原如今局促傍誰轅俛眉北去明妃涙啼血南飛望帝魂骨肉凋殘惟我在形容變盡只聲存江流千古英雄恨蘭作行舟柳作樊再和見說黄沙接五原飄零隻影向南轅江山有恨銷人骨風雨無情㫁客魂淚似空花千㸃落􅁂如碩果數根存肉飛不起真堪歎江水為籠海作樊和友人落落南冠過故都近來我意亦㤀吾騎来驛馬身如寄遣去家書字亦無景伯未囚先立後稽康縱死不為孤江南只有歸來夢休問田園蕪不蕪驛中言别友人水天空濶恨東風不借世間英物蜀鳥呉花殘照裏忍見荒城頽壁銅雀春情金人秋淚此恨慿誰說堂堂劍氣斗牛空認竒傑那信江海餘生南行萬里扁舟齊發正為鷗盟留醉眼細看濤生雲滅睨柱吞嬴囘旗走懿千古衝冠髪伴人無寐秦淮應是孤月和乾坤能大算蛟龍元不是池中物風雨牢愁無着處那更寒蟲四壁横槊題詩登樓作賦萬事空中雪江流如此方來還有英傑堪笑一葉飄零重來淮水正凉風新發鏡裏朱顔都變盡只有丹心難滅去去龍沙向江山囘首青山如髪故人應念杜鵑枝上殘月懐中甫時中甫以病留金陵天慶觀久要何落落末路重依依風雨連兵幕泥塗滿客衣人間龍虎變天外燕鴻違死矣煩公傳北方人是非行宫中齋日十里宫墻一聚塵天津晩過客愁新花啼杜宇歸來血樹掛蒼龍脱去鱗福徳倘存終有晋秣陵未改己無秦秋風禾黍空南北見說銅駞㑹笑人怪底秦淮水長㡬多客淚洒斜陽江流本是限南北地氣何曽减帝王䑓沼漸荒基歴落鶯花猶在意凄凉青天畢竟有情否舊月東來失女牆廣齋謂柳和王昭儀滿江紅韻惜未之見為賦一闋中齋作王母仙桃親曽醉九重春色誰信道鹿銜花去浪翻鼇闕眉鎖嬌娥山宛轉髻梳堕馬雲欹側恨風沙吹透漢宫衣餘香歇霓裳散庭花滅斜陽燕應難說想春深銅雀夢啼殘血空有琵琶傳出塞更無環佩鳴歸月又争知有客夜悲歌壺敲缺和王夫人滿江紅韻以庶㡬后山妾薄命之意燕子樓中又捱過㡬畨秋色相思處青年如夢乘鸞仙闕肌玉暗銷衣帶緩淚珠斜透花鈿側最無端蕉影上忩紗青燈歇曲池合髙䑓滅人間事何堪說向南陽阡上滿襟清血世態便如翻覆雨妾身元是分明月笑樂昌一段好風流菱花缺代王夫人作試問琵琶胡沙外怎生風色最苦是姚黄一朶移根仙闕王母懽闌璚宴罷仙人淚滿金盤側聼行宫半夜雨淋鈴聲聲歇彩雲散香塵滅銅駞恨那堪說想男兒慷慨嚼穿齦血囘首昭陽離落日傷心銅雀迎新月算妾身不願似天家金甌缺王夫人詞太液芙蓉全不是舊時顔色嘗記得恩承雨露玉堦金闕名播蘭簮妃后裏暈潮蓮臉君王側忽一朝鼙鼓揭天来繁華歇龍虎散風雲滅今古恨慿誰說顧山河百二淚流襟血驛舘夜驚塵土夢宫車曉輾關山月若嫦娥於我肯相容從圓缺王夫人至燕題驛中云云中原傳誦惜末句少商量浪陶沙中齋踈雨洗天晴枕簟凉生井梧一葉做秋聲誰念客身輕似葉千里飄零夢㫁古䑓城月淡潮平便擕酒訪新亭不見當時王謝宅烟草青青東海集序東海集者友人客海南以来詩也海南詩而曰東海集者何魯仲連天下士友人之志也友人自為舉子時已大肆力於詩於諸大家皆嘗登其門而涉其流其本贍其養鋭故所詣特深到余嘗評其詩渾涵有英氣鍛錬如自然美則美矣猶未免有意於為詩也自䘮亂後友人挈其家避地遊官嶺海而全家燬於盗孤窮流落困頓萬状然後崖山除禮部侍郎且權直學士矣㑹南風不競御舟漂散友人倉卒蹈海者再為北軍所鉤致遂不獲死以至於今凡十數年間可驚可愕可悲可憤可痛可悶之事友人備嘗無所不至其慘戚感慨之氣結而不信皆於詩乎發之盖至是動乎情性自不能不師杜子美䕫門桞子厚桞州以後文字也余與友人年相若又同里閈以斯文相好然平生落落不相及及居楚囚中而友人在行同患難者數月其自五羊至金陵所賦皆予目撃或相唱和詩余坐金陵驛無所作為乃取友人諸詩筆之於書與相關者并附焉後之覧者因詩以見吾二人之志其必有感慨於斯已邜七月壬申文某叙送行中齋三首秋氣晩正烈客衣早知寒把衣不能别更盡此日歡出門一萬里風沙浩漫漫豈無兒女情為君思汎瀾百年有時盡千載無餘觀明明君臣義公獨為其難願持丹一寸冩入青琅玕㑹有撫巻人孤燈起長歎神龍蕩失水馴擾終未得威鳯雖在藪肯願雞鶩食所以古之人受變心不易亳鼎已遷周西山竟肌􅇤豫子身自漆萇𢎞血成碧何嘗怨廢興而或貳心跡堅白不在緇羔裘良自惜此誼公素明俗見或未識嗟予抱區區疇昔同里閈過從三十年知心不知面零落忽重逢家亡市朝變惸惸蹈海餘踽踽南冠殿劇談泥塗際握手鞍馬倦依依斯文意苦恨十年晚魯仲偶不逢隨世本非願􅂕胥目未抉端欲詣所見及兹萬里别一夕腸百轉余生諒須臾孤感横九縣庶㡬太尉事萬一中丞傳此册為指南後錄第一巻下第二巻起八月二十四日發建康終嵗除有感尚有零丁洋諸詩及後錄本在惠州合𨽻為一巻而所恨者指南前録叙號存而詩已不完侍郎苐姑據所存本使不冺於世一聨半句使天下見之識其為人即吾死無憾矣况萹帙之多乎嵗在庚辰正月二十日文山履善甫書指南後錄二予後錄詩以廣州至金陵為第一今入淮以後為苐二巻云發建康八月二十四日賞心亭下路拍手唱吾歌樓外梁時塔城中秦氏河江山如夢耳天地奈愁何囘首青溪雨長江一雁過江行有感二十五日蒲萄肥汗馬荆棘冷銅駞巫峡朝雲濕洞庭秋水波窮愁空􅋓兀暗淚自滂沱莫恨吾生悞江東才俊多真州驛二十七日山川如識我故舊更無人俯仰干戈跡徃來車馬塵英䧺遺算晚天地暗愁新北首燕山路凄凉夜向晨望揚州阮籍臨廣武杜甫登吹䑓髙情發慷慨前人後人哀江左遘陽運銅駞化飛灰二十四橋月楚囚今日来維揚驛三年别淮水一夕宿揚州南極山川古北風江海秋昭君愁出塞王粲怕登樓千載英䧺淚如今况楚囚過邵伯鎮二十八日今朝車馬地昔日戰争場我有揚州鶴誰存邵伯棠一灣流水小數畝故城荒囘首江南路青山㫁夕陽髙郵懐舊二十九日借問曽遊處髙沙第㡬山潜行鷹攫道直上虎當關一命虛空裏三年􅕿息間自憐今死晚何復望生還發髙郵三十日初出髙沙門輕舫遶城樓一水何曲折百年此綢繆北望渺無際飛鳥翔平疇寒蕪入荒落日薄行人愁行行行湖曲萬頃涵清秋大風吹檣倒如盪彭蠡舟欲寄故鄉淚使入長江流篙人為我言此水通淮頭前與黄河合同作滄海漚踟蹰忽失意拭淚淚不收呉㑹日己逺囘首重悠悠馳驅梁趙郊壮士何離憂吾道久已東陸沈古神州我今戴南冠何異有北投不能裂肝腦直氣摩斗牛但願光岳合休明復商周不使殊方魄終為異物羞寳應道中天濶搏南雁淮途長北驅甘棠成傳舍細柳作康衢田海隨時變山河徃日殊征袍共衮繡夜壁一燈孤淮安軍九月一日楚州城門外白楊吹悲風纍纍死人塚死向鋒鏑中豈無匹婦寃定無萬夫䧺中原在其北登城望何窮過淮河宿闞石有感北征垂半年依依只南土今晨渡淮河始覺非故宇江鄉已無家三年一羇旅龍翔在何方乃我妻子所昔也無奈何忽已置念慮今行日已近使我淚如雨我為綱常謀有身不得頋妻兮莫望夫子兮莫望父天長與地久此恨極千古来生業縁在骨肉當如故發淮安九月二日九月初二日車馬發淮安行行重行行天地何不寛烟火無一家荒草青漫漫恍如泛滄海身坐玻璃盤時時逢北人什伍扶征鞍云我戍江南當軍身属官北人適呉楚所憂地少寒江南有遊子風雪上燕山小清江初三日乍見驚胡婦相嗟遇楚兵北来鴻雁宻南去駱駞輕芳草中原路斜陽故國情明朝五十里錯做武陵行桃源道中初四日漠漠地千里垂垂天四圍隔溪征騎過傍草野雞飛風露吹青笠塵沙薄素衣吾家白雲下都伴北人歸桃源縣清野百年久中原千里賖火烟新聚落山水舊生涯種麥數十畝誅茅千百家我来行正倦何處覔桃花崔鎮驛萬里中原役北風天正凉黄沙漫道路蒼耳滿衣裳野濶人聲小日斜駒影長觧鞍身似夢遊子意茫茫發崖鎮初五日髙雁空秋興寒蛩破曉眠淡烟白似海野水碧於天興廢嗟何及行藏信自然南人乍騎馬北客半乘船發宿遷縣夜夢入星槎曉行随斗柄衣暖露自乾􅁂寒冰欲凝将軍戴鐡笠壮士敲金鐙白眼睨青天我生不有命中原中原方萬里明日是重陽桑棗人家近蓬蒿客路長引弓虛射雁失馬為尋羊見說今年旱青青麥又秧望邳州初六日中原行㡬日今日才見山問山在何處云在徐邳間邳州山徐州水項藉不還韓信死龍争虎鬬不肯止烟草漫漫青萬里古来劉季號英䧺樊崇至今已千嵗徐州道中初七日彭城古官道日中十馬馳咫尺不見人撲面黄塵飛向来漢王縞素師美人燕罷項羽啼一時混戰四十萬天昏地黒睢水湄乃知大風揚沙失白晝自是地利非天時漢王倉皇問道西一兒一女嘻其危太公呂后去不歸爼上寕有生還時未央稱夀太上皇巍然女媧帝中闈終然富貴自有命造物顛倒真小兒彭城行徐州彭城縣連山四圍合呂梁貫其中河南大都㑹故有項王宫晋牧連揚豫虎視北方䧺唐時燕子樓風流張建封西望睢陽城只與汴水通太平黄樓賦尚能想遺風爾来百餘年正朔歸江東遺民死欲盡莽然狐兎叢我從南方来停驂撫遺蹤故河蓄潢潦荒城翳秋蓬凄凉戱馬䑓憔悴巨佛峯滄海變桑田陵谷代不同朝為朱門貴暮作行旅窮乘除信物理感慨繋所逢古来賢逹人一醉萬慮空如此獨醒何悲風逐征鴻燕子樓自别張公子嬋娟不下樓遂令樓上燕百嵗稱風流我遊彭城門来弔楚王闕問樓在何處城東草如雪蛾眉代不乏埋沒安足論因何張家妾名與山川存自古皆有死忠義長不沒但傳美人心不説美人色戱馬䑓九月初九日客遊戱馬䑓黄花弄朝露古人化飛埃今人哀後人後人復今哀世事那可及淚落茱茰杯發彭城今朝正重九行人意遲遲囘首戱馬䑓野花發葳蕤草埋范増塚雲見樊噲旗時節正如此道徳将何之我愛陶淵明甲子題新詩白衣送酒来把菊卧東籬沛歌山東藤山沛縣初十日秦世失其鹿豐沛發龍顔王侯與将相不出徐濟間當時數公起四海王氣閒至今尚想見虹光照人寰我来千載下弔古淚如澘白雲落荒草隠隠芒碭山黄河天下䧺南去不復還乃知盈虛故天道如循環盧王舊封地今日殺函關歌風䑓長陵有神氣萬嵗光如虹有時風雪變魂魄来沛宮壮哉遊子鄉一覧萬宇空撃筑戒復隍帝業慎所終重瞳愛梁父此情豈不同錦衣絢行晝丈夫何淺中緬懐首丘意自足分雌䧺尚惜霸心存慷慨懐勇功不見徃来事烹狗與藏弓早知致兩生禮樂三代隆匹夫事已徃安用責乃翁我来湯沐邑白楊吹悲風永言三侯章隠隠聞兒童葉落皆歸根飄零獨秋蓬登䑓共悽惻目送南飛鴻固陵道中九天雲下垂一雨作秋色塵埃化泥塗原野轉蕭瑟十里一雙堠狐兎卧荆棘見說數年来中州乍蘇息又茅舍荒凉舊固陵漢王城對楚王城徐州烟火連豐沛天下還来屋角争固陵城下兩龍争不見齊王来會兵勒取河山新分地項王之後到韓彭發魚䑓十二日晨炊發魚䑓碎雨飛撃面團團四野周冥冥萬象變疑是江南山烟霧昏不見豈知此中原今古經百戰英䧺化為土飛霧洒郊甸天寒日欲短游子淚如霰自歎瑟瑟秋風悲烈烈寒氣驕蒲桞先已零松栢何後凋天意重肅殺造物無不銷強弱有異禀憂患同一朝惟有南山石千嵗一岧嶤人苦不自足空羡王子喬逺遊黄河流活活太行髙巍巍王屋山以東百泉山以西鄒魯盛文獻燕趙多䧺姿右摩泰山碑左躡函谷泥郏鄏弔周公曲阜拜宣尼或登廣武歎或上北邙啼平生㡬兩屐汗漫以為期絶交天下士要為男子竒呉㑹徧王業中原隔遺黎安得與黄鶴比翼天上飛江河異風景撃楫感且欷陽運遘百六興否俄推移桑田變滄海楚囚發孔悲我本檻車客為我觧縶維青蠅附天驥萬里相追隨人生尚行樂矧復新相知周道思下泉王風懐黍離富貴豈不願憂患那自持人命危且賤忽若朝露晞長恐折我軸中道欲差池去我父母邦我行且遲遲聼我逺遊曲寄我長相思六歌有妻有妻出糟糠自少結髪不下堂亂離中道逢虎狼鳯飛翩翩失其凰将雛一二去何方豈料國破家亦亡不忍舍君羅襦裳天長地久終茫茫牛女夜夜遥相望嗚呼一歌兮歌正長悲風北来起彷徨有妹有妹家流離良人去後擕諸兒北風吹沙塞草凄窮猿惨淡将安歸去年哭母南海湄三男一女同歔欷惟汝不在割我肌汝家零落母不知母知豈有暝目時嗚呼再歌兮歌孔悲鶺鴒在原我何為有女有女婉清揚大者學帖臨鍾王小者讀字聲琅琅朔風吹衣白日黄一雙白璧委道傍雁兒啄啄秋無粱隨母北首誰人将嗚呼三歌兮歌愈傷非為兒女淚淋浪有子有子風骨殊釋氏抱送徐卿雛四月八日摩尼珠榴花犀錢絡繡襦蘭湯百沸香似酥歘隨飛電飄泥􅂗汝兄十三騎鯨魚汝今知在三嵗無嗚呼四歌兮歌以吁燈前老我明月孤有妾有妾今何如大者手将玉蟾蜍次者親抱汗血駒晨妝靚服臨西湖英英雁落飄璚琚風花飛墜鳥鳴呼金莖沆瀣浮汙渠天摧地裂龍鳯殂美人塵土何代無嗚呼五歌兮歌欎紆為爾遡風立斯須我生我生何不辰孤根不識桃李春天寒日短重愁人北風隨我鐡馬塵初憐骨肉鍾竒禍而今骨肉相憐我汝在北兮嬰我懐我死誰當收我骸人生百年何醜好黄粱得䘮俱草草嗚呼六歌兮勿復道出門一笑天地老發潭口十三日吹面北風来拂鬢堅冰至軒冕委道途衮繡易氊毳百年雜醜好始酧四方志浩歌激浮雲亭亭復攬轡羲馭㡬曽停誰當掃幽翳新濟州借問新濟州徐鄆兄弟國昔為大河南今為大河北垂雲隂萬里平原望不極百草盡枯死黄花自秋色時時見桑樹青青雜阡陌路上無人行烟火渺蕭瑟車轍分縱横過者臨岐泣積潦流交衢霜蹄破叢棘江南寒未深銅爐獸花赤為知行路人鐡冷衣裳濕汶陽道中東平路汶陽縣十四日積雨不肯霽行陸如涉川青氊纊我後白氊覆我前我欲正衣冠兩手如紏纒飛沫流被面代我泣涕漣鴻雁紛南朔遊子北人燕平楚渺四極雪風迷逺天昔聞濟上軍又說汶陽田我今履其地弔古愴蒼烟男兒欲了事長虹射寒泉汶陽舘去嵗營舡隩今朝舘汶陽海空沙漠漠河廣草茫茫家國哀千古男兒慨四方老槐秋雨暗孤影照淋浪自汶陽至鄆十五日渺渺中原道勞生歎百非風雨吹打人泥濘飛上衣目力去天短心事與時違夫子昔相魯侵疆自齊歸来平舘憔悴江南客蕭條古鄆州雨聲連五日月色徹中流萬里山河夢千年宇宙愁欲鞭劉豫骨烟草暗荒丘發鄆州喜晴烈風西北来萬竅號髙秋宿雲蔽層空浮潦迷中州行人苦沮洳道阻路且修流澌被鞍􅌱飛沫綴衣裘昏鴉接翅落原野惨以愁城郭何蕭條閉户寒颼颼中宵月色滿餘光散衾裯余子戒明發飛霧靄郊丘微見扶桑紅隠隠如沉浮身遊大荒野海氣吹蜃樓須臾劃當空六合開沉幽千年厭顔色蒼翠光欲流太陽經天行大化不暫留輝光何曽滅晻靄終當收嚴霜下豐草長歌夜悠悠明日東阿道方軌驟驊騮發東阿十七日東原深處所時或見人烟秋雨桑麻地春風桃李天貪程頻問堠快馬緩加鞭多少飛檣過噫吁是北船宿髙唐州博州早發東阿縣暮宿髙唐州哲人逹㡬微志士懐隠憂山河已歴歴天地空悠悠孤舘一夜宿北風吹白頭平原十八日平原太守顔真卿長安天子不知名一朝漁陽動鼙鼓大江以北無堅城公家兄弟奮戈起一十七郡連夏盟賊聞失色分兵還不敢長驅入咸京明皇父子将西狩由是􅂕武起義兵唐家再造李郭力若論牽制公威靈哀哉常山慘鈎舌心歸朝廷氣不懾﨑嶇坎坷不得志出入四朝老忠莭當年幸脱安禄山白首竟陷李希烈希烈安能遽殺公宰相盧杞欺日月亂臣賊子歸何處茫茫烟草中原土公死於今六百年忠精赫赫雷當天發陵州中原似滄海萬頃與雲連大明朝東出皎月正在天逺樹亂如㸃桑麻欎蒼烟一雁入髙空千鴉落平田我行天地中如蟻磨上旋雨痕留故衣霜氣襲重氊健馬嘶北風潜魚樂深淵噫哉南方人囘首空自憐獻州道中三年戎服行五嶺文玉㑹攀躋上崖磴厲揭涉瀟瀨十步九﨑嶇山水何破碎坐令管仲小自覺伯夷隘乃今来中州萬里如一槩四望登原隰桑麻蔚斾斾驊騮出清廟過都真歴塊歴歴古戰塲俯仰生感慨吾常涉重湖東海際南海兹遊冠平生天宇更宏大心與太虛際目空九圍内男兒不出居婦人坐帷盖反身以自觀須彌納一芥以此處死生超然萬形外滹沱河二首過了長江與大河横流數仞絶滹沱蕭王麥飯曽倉卒囘首中天感慨多風沙睢水終亡楚草木公山竟􅕚秦始信滹沱冰合事世間興廢不由人河間夜宿河間恰家則翁寓焉因成三絶空有丹心貫碧霄泮冰亡國不崇朝小臣萬死無遺慨曽見天家十八朝南歸雁蕩報郎君老子精神健十分不為瀛洲復相見阿戎翻隔萬山雲江南車盖走燕山老子旁觀䄂手閒見說新詩題甲子桃源元只在人間保州道中二十一日昨夜渡滹沱今日望太行白雲何渺渺天地何茫茫落葉混西風黄塵昏夕陽牛車過不住氊屋行相望小兒騎􅏝驢壮士駕乗黄髙低葉萬頃黒白草千行村落有古風人間無時妝宋遼舊分界燕趙古戰塲蚩尤亂涿野共工謫幽邦郭隗致樂毅荆軻擕舞陽􅆇盧互反覆安史迭披猖山川一今古人物㡬興亡江南佔畢士徃来習羊腸天馬戴青蠅電秣馳康荘適從何有来如此醉夢鄉感時意踟蹰惜徃淚淋浪厲階起玉環左許右石郎天地行日月萬代乗景光晝夜果可廢春秋誠荒唐吾生直須臾俯仰際八荒来者不可見逺遊賦彷徨保涿州三詩趙太祖墓在保州十二十九日起三日到我行保州塞御河直其東山川猶有􅂕佳氣何欎葱頋我巾車囚厲氣轉秋蓬瓣香欲徃拜惆悵臨長空樓桑故宅近涿縣三十里我過梁門城樓桑在其北元徳已千年青烟遶故宅道傍為揮淚徘徊秋風客天下卧龍人多少空抱膝涿鹿我瞻涿鹿野古来戰蚩尤軒轅此立極玉帛朝諸侯歴歴關河雁隨風鳴寒秋邇来三千年王氣行幽州過梁門一一金甌在雙雙鎮璧全土花開舊國風絮渡江船南北分新統江淮號極邉更和天塹失囘首慘啼鵑白溝河昔時張叔夜統兵赴勤王東都一不守羸馬遷龍荒適過白溝河裂眥鬚欲張絶粒不遄死仰天扼其吭羣臣縂奄奄一土垂天光讀史識其地撫巻為凄凉我生何不辰異世忽相望皇圖遘陽九天塹滿飛堭引兵詣闕下捧土障瀾狂出使義不屈持莭還中郎六飛獨南海金鉞将煌煌武侯空威心出狩驚四方吾属竟為擄世事吁彼蒼思公有竒莭一死何慨慷江淮我分地我欲投滄浪滄浪却不受中原行路長初登項籍宮次覧劉季邦涉足河與濟囘首嵩與恒下車撫梁門上馬指樓桑戴星渡一水慘淡天微茫行人為我言宋遼此分疆懸知公死處為公出涕滂恨不持束芻徘徊官道傍我死還在燕烈烈同肝腸今我為公哀後来誰我傷天地垂日月斯人未云亡文武道不墜我輩終堂堂懐孔明斜谷事不濟将星殞營中至今出師表讀之淚沾胸漢賊明大義赤心貫蒼穹世以成敗論操懿真英䧺劉琨中原蕩分崩壮哉劉越石連蹤起幽并隻手扶晋室福華天意乖匹磾生鬼蜮公死百世名天下分南北祖逖平生祖豫州白首起大事東門長嘯兒為遜一頭地何哉戴若思中道奮螳臂豪傑事垂成今古為短氣顔杲卿常山義旗奮范陽哽喉咽胡雛一狼狽六飛入西川哥舒降且拜公舌膏戈鋋人世誰不死公死千萬年許逺起師哭元元義氣震天地百戰奮雄姿臠妾士揮淚睢陽水東流雙廟垂百世當時令狐潮乃為賊遊說過雪橋琉璃橋小橋度雪度琉璃更有清霜滑馬蹄遊子衣裳和鐡冷殘星荒店野雞啼一作亂鳴雞文山集巻十九欽定四庫全書文山集卷二十宋文天祥撰指南後録三予指南後録第一巻起正月十二日賦零丁洋第二巻起八月二十四日發建康今第三巻盖自庚辰元日為始文山履善甫序五月二日生朝北風吹滿楚冠塵笑捧蟠桃夢裏春㡬歳己無籠鴿客去年猶有送羊人江山如許非吾土宇宙奈何多此身不㓕不生在何許静中聊且養吾真胡笳曲庚辰中秋日水雲慰予囚所援琴作胡笳十八拍取予疾徐指法良可觀也琴罷索予賦胡笳詩而倉卒中未能成就水雲别去是歳十月復來予因集老杜句成拍與水雲共商略之盖囹圄中不能得死聊自遣耳亦不必一一學琰語也水雲索予書之欲藏於家故書以遺之浮休道人文山風塵澒洞昏王室天地慘慘無顔色而今西北自仄胡西望千山萬山赤歎息人間萬事非被驅不異犬與雞不知明月為誰好來歳如今歸未歸右一拍獨立縹緲之飛樓髙視乾坤又何愁江風蕭蕭雲拂地笛聲憤怒哀中流鄰雞野哭如昨日昨日晚晴今日黒倉皇已就長途徃欲徃城南忘南北右二拍三年奔走空皮骨三年笛裏關山月中天月色好誰看豺狼塞路人􅃄絶寒刮飢膚北風利牛馬毛零縮如蝟塞上風雲接地隂咫尺但愁雷雨至右三拍黄河北岸海西軍翻身向天仰射雲胡馬長鳴不知数衣冠南渡多崩奔山木慘慘天欲雨前有毒蛇後猛虎欲問長安無使來終日戚戚忍覉旅右四拍北庭数有關中使飄飄逺自流沙至胡人髙鼻動成羣仍唱胡歌飲都市中原無書歸不得道路只今多擁隔身欲奮飛病在牀時獨看雲淚沾臆右五拍胡人歸來血滿箭白馬将軍若雷電蠻夷雜種錯相干洛陽宫殿燒焚盡干戈兵革鬬未巳魑魅魍魎徒為爾慟哭秋原何處村千村萬落生荆杞右六拍憶昔十五心尚孩莫恠頻頻勸酒杯孤城此日腸堪㫁如何不飲令人哀一去紫䑓連朔漠月出雲通雪山白九度附書歸洛陽故國三年一消息右七拍只今年纔十六七風塵荏苒音書絶胡騎長驅五六年弊裘何啻連百結愁對寒雲雪滿山愁看冀北是長安此身未知歸定處漂泊西南天地間右八拍午夜漏聲催曉箭寒盡春生洛陽殿漢主山河錦繡中可惜春光不相見自胡之反持干戈一生抱恨空咨嗟我已無家尋弟妹此身那得更無家南極一星朝北斗每依南斗望京華右九拍今年臈月凍全消天涯涕淚一身遥諸将亦自軍中至行人弓箭各在腰白馬嚼嚙黄金勒三尺角弓兩斛力胡雁翅􅊜髙飛難一箭正墜雙飛翼右十拍冬至陽生春又來口雖吟咏心中哀長笛誰能亂愁思呼兒且覆掌中杯雲白山青萬餘里壁立石城横塞起元戎小隊出郊坰天寒日暮山谷裏右十一拍洛陽一别四千里邉庭流血成海水自經喪亂少睡眠手脚凍皴皮肉死反鏁衡門守環堵稚子無憂走風雨此時與子空歸來喜得與子長夜語右十二拍大兒九齡色清徹驊騮作駒巳汗血小兒五歳氣食牛氷壺玉衡懸清秋罷琴惆悵月照席人生有情淚沾臆離别不堪無限意更為後㑹知何地酒肉如山又一時只今未醉己先悲右十三拍北歸秦川多鼓鼙禾生隴畝無東西三步回頭五步坐誰家搗練風凄凄已近苦寒月慘慘中膓悲自􅂲二男兒不得相追随去㽞俱失意徘徊感生離十年蹴踘将雛逺目極傷神誰為擕此别還須各努力無使霜露沾人衣右十四拍寒雨颯颯枯樹濕坐卧只多少行立青春欲暮急還郷非關使者徴求急欲别上馬身無力去住彼此無消息關塞蕭條行路難行路難行澁如棘男兒性命絶可憐十日不一見顔色右十五拍乃知貧賤别更苦况我飄轉無定所心懐百憂復千慮世人那得知其故嬌兒不離膝哀哉兩决絶也復可憐人里巷盡嗚􅍋㫁腸分手各風􅃄中間消息兩茫然自㫁此身休問天看射猛虎終殘年右十六拍江頭宫殿鎖千門千家今有百家存面脂首飾雜啼㾗教我歎恨傷精魂自有兩兒郎忽在天一方胡塵暗天道路長安得送我置汝傍右十七拍事殊興極憂思集足繭荒山轉愁疾漢家山東二百州青是烽􅃄白人骨入門依舊四壁空一斛舊水蔵蛟龍年過半百不稱意此曲哀怨何時終右十八拍上巳予自丙子上巳日真州屏之城門外于今憂患通六年俯仰時節為之慨然昔自長淮樹去帆今從燕薊眺東南泥沙一命九分九風雨六年三月三地下故人那可作天涯逰子竟何堪便從餓死傷遲暮面對西山己發慚寒食予不登丘隴拜清明寒食八年矣癸酉湖南甲戊乙亥章貢丙子淮東丁丑梅州戊寅䴡江浦庚寅燕山獄中今辛己猶未得死和上巳韻冩懐苦海周遭㫁去帆東風吹淚向天南龍蛇澤裏清明五燕雀籠中寒食三撲面風沙驚我在滿襟霜露痛誰堪何當歸骨先人墓千古不為丘首慚覽鏡見鬚髯消落為之流涕萬里飄零等一毫滿前風景恨滔滔淚如杜宇喉中血鬚似蘇郎節上旄今日形骸遲一死向來事業竟徒勞青山是我安魂處清夢時時賦大刀讀赤壁賦前後二首昔年仙子謫黄州赤壁磯頭汗澷逰今古興亡真過影乾坤俯仰一虛舟人間憂患何曽少天上風流更有不我亦洞簫吹一曲不知身世是蜉蝣一笑滄波浩浩流隻鷄斗酒更扁舟八龍冩作詩中案孤鶴來為夢裏遊楊桞逺􅃄連北府蘆花新月對南楼玉仙來徃清風夜還識江山似舊不自歎門掩牢愁白日過不應老子坐婆娑雖生得似無生好欲死其如不死何王蠋髙風真可挹魯連大節豈容磨東流不盡銅駝恨四海悠悠總一波端午初度死所初何怨生朝只自知頗懐常杕意忍誦蓼莪詩浮世百年夢髙人千載期楚囚一杯水勝似九霞巵向來松下鶴今日傍誰門夢見瑶池沸愁看玉壘昏所思多死所焉用獨生存可惜菖蒲老風􅃄滿故園端午即事五月五日午贈我一枝艾故人不可見新知萬里外丹心照夙昔鬂髪日己敗我欲從􅂕均三湘隔遼海自述二首當年嚼血灑銅駝風氣悠悠奈若何漢賊已成千古恨楚囚不覺二年過閒來誰似天隨子老去忽如春夢婆試把睢陽雙廟看只今事業愧蹉跎江南啼血送殘春漂泊風沙萬里身漢末固應多死士周餘乃止一遺民乍看鬚少疑非我只要心存尚是人坐擁牢愁書眼倦土牀伸脚任吾真五月十七夜大雨歌去年五月望流水滿一房今年後三夕大雨復沒牀我辭江海來中原路茫茫舟楫不復見車馬馳康莊矧居圜土中得水猶得漿忽如避巨浸倉卒殊徬徨明星尚未啓大風方發狂呌呼人不譍宛轉水中央壁下有水穴羣䑕走踉蹡或如魚潑刺墊溺無所蔵周身莫如物患至不得防業為世間人何處逃禍殃朝來開溝道宛如决陂塘盡室泥濘塗化為糜爛塲炎蒸廹其上臭腐薫其傍惡氣所侵薄疫癘何可當楚囚欲何之寝食此一方羇棲無復望坐待仆且僵乾坤莽空闊何為此凉凉逹人識義命此事關綱常萬物方焦枯皇皇禱穹蒼上帝實好生夜半下龍章但願天下人家家足稻粱我命渾小事我死庸何傷先太師忌日二月二十八萬里先人忌呼號痛不天遺孤餘二紀曠祀忽三年永恨丘園隔遥憐弟妹圓義方如昨日地下想欣然築房子歌自予居狴犴一室以自治二年二大雨地汙實成池圄人為我惻畚土以築之築之可二尺宛然水中坻初運朽壤來臭穢恨莫追掩鼻不可近牛皂鷄于塒須臾傳黒墳千村鳴参差但見如坁平糞土不復疑乃知天下事不在論鎡基茍可掩耳目臭腐誇神竒世人所不辨羊質而虎皮大者莫不然小者又何知深居守我𤣥黙觀道推移何時蝉蛻去忽與濁世違有感己矣勿復道安之如自然閒陪黄妳坐倦退白衣眠一死知何地此生休問天怪哉茨野客宿果堕幽燕正氣歌予囚北庭坐一土室室廣八尺深可四尋單扉低小白間短窄汙下而幽暗當此夏日諸氣萃然雨潦四集浮動牀几時則為水氣塗泥半朝蒸漚歴瀾時則為土氣乍晴暴熱風道四塞時則為日氣簷隂薪㸑助長炎虐時則為火氣倉腐寄頓陳陳逼人時則為米氣駢肩雜遝淋漓汗垢時則為人氣或圊溷或毁屍或腐䑕惡氣雜出時則為穢氣壘是数氣當之者鮮不為厲而予以孱弱俯仰其間于兹二年矣審如是殆有養致然爾然亦安知所養何哉孟子曰我善養吾浩然之氣彼氣有七吾氣有一以一敵七吾何患焉况浩然者乃天地之正氣也作正氣歌一首天地有正氣雜然賦流形下則為河嶽上則為日星於人曰浩然沛乎塞蒼冥皇路當清夷含和吐明庭時窮節乃見一一垂丹青在齊太史簡在晉董狐筆在秦張良椎在漢蘇武節為嚴将軍頭為嵇侍中血為張睢陽髯為顔常山舌或為遼東㡌清操厲氷雪或為出師表鬼神泣壮烈或為渡江楫慷慨吞羌羯或為撃賊笏􅊇豎頭破裂是氣所旁薄凛烈萬古存當其貫日月生死安足論地維頼以立天柱頼以尊三綱實係命道義為之根嗟予遘陽九𨽻也實不力楚囚纓其冠傳車送窮北鼎鑊甘如飴求之不可得隂房闐鬼火春院閟天黒牛驥同一皂雞棲鳳凰食一朝濛霧露分作溝中瘠如此再寒暑百沴自辟易嗟哉沮洳塲為我安樂國豈有他繆巧隂陽不能賊顧此耿耿在仰視浮雲白悠悠我心悲蒼天􅂚有極哲人日巳逺典刑在夙昔風簷展書讀古道照顔色七月二日大雨歌燕山五六月氣候苦不常積隂綿五旬畏景淡無光天漏比西極地濕等南方今何苦常雨昔何苦常𤾉七月二日夜天工為誰忙浮雲黒如墨飄風怒如狂滂沱至夜半天地為低昂勢如蛟龍出平陸俄懐㐮初疑倒巫峽又似翻瀟湘千門各已閉仰視天茫茫但聞屋側聲人力無支當嗟哉此圜土占勝非髙岡赭衣無容足南房并北房北房水二尺聚立唯東廂桎梏猶自可凛然覆窮墻嘈嘈復雜雜烝汗流成漿張目以待旦沈沈漏何長南冠者為誰獨居沮洳塲此夕水彌滿浮動八尺牀壁老如欲壓守者殊皇皇我方鼾鼻睡逍遥遊帝鄉百年一大夢所歴皆黄粱死生已勘破身世如遺忘雄雞呌東白漸聞語聲揚論言苦飄蕩形勢猶倉黄起來立泥塗一笑褰衣裳遺書宛在架吾道終未亡詠懐隂陽相烹煎天地一釜灊人生居其間便同肉在砧熱猶以火燎濕猶以湯燖一歳一煅煉老形忽駸駸吾生四十六弱質本不任矧當五六年患難長侵尋子卿羝羊節少陵杜鵑心酷罰毒我膚深憂煩我襟嗟嗟夏涉秋天道何其滛或時日杲杲或時雨淋淋方如坐烝甑又似立烘煁水火交相禅益熱與益深宛轉兒戱中日夜空呻吟何如真鼎􅀈殊我一寸金脫此寒暑殻誰能復嶇􅋂偶成昨朝門前地寸裂今朝牀下泥尺深人生世間一蒲桞豈堪日炎復雨淋起來髙歌離騷賦睡去細和梁父吟已矣已矣復何道猶有天地知吾心移司即事自大雨後兵馬司墻壁頺落地皆沮洳囚不可居七月五日移司官籍監予以詰朝行詩以記之燕山積雨泥塞道大屋欹傾小屋倒赭衣棘下無容色倉卒移司避流潦行行桎梏如貫魚憐我龍鍾遲明早我來二十有一月若書下下㡬二考夢囬恍憶入新衙不知傳舍何時了幸有癡兒了家事九牛一毛亦云小天門皇皇虎豹立下土孤臣泣雲表莫令赤子盡為魚早願當空日杲杲不睡頻搔白首强憂煎細雨青燈思欲顛南北東西三萬里古今上下㡬千年只因知事翻成惱未到放心那得眠眼不識丁馬前卒隔牀鼾鼻正陶然官籍監兵馬司移寓官籍監予監一室頗瀟洒明忩净壁樹影横斜可愛也賦五絶塵滿南冠歳月深蹔移一室倚㫋林天憐元是青山客分與忩根兩樹隂壁間頗自有龍蛇元是誰人小住家不似為囚似為客倚忩望㫁暮天涯曽過盧溝望塔尖今朝塔影接虛簷道人心事真方丈静坐日長雲滿簾軍衙馬足起黄埃門揜西風夢正回自入燕關人世隔隔墻忽送市聲來新來忩左頗玲瓏盡把前時臭腐空好醜元來都是幻蘧廬一付夢魂中還司即事兵馬司苦於地窄其東偏有大宅官買之以廣治所舊㕔事遂為空閒七月十一日囚自官籍監悉歸獄舊㕔事之西有一室處予其間其地髙燥而空凉蕭然獨徃寂無來人又一境界也五言八句二首幙燕方如寄屠羊忽復旋霜枝空獨立雪窖己三遷漂泊知何所逍遥付自然庭空誰共語拄頰望青天秋聲滿南國一葉此飄蓬墻外千門逈庭臯四壁空誰家驢吼月隔巷犬嘷風燈暗人無寐沉沉夜正中夜起二首惆悵髙歌入睡鄉夢中魂魄尚飛揚起來露立頻搔首夜静無風自在凉三年獨立已成僧欲與何人説葛藤夜夜隔墻囚呌佛三生因果伴孤燈還獄予自官籍監還兵馬司止予舊㕔事西偏之室獄戸既葺以八月七日復返故處向之所謂臭腐濕蒸依然故在回視吾所挾亦浩然而獨存作古風一首人情感故物百年多離憂桑下住三宿應者猶遲㽞矧兹方丈室屏居二春秋夜眠與晝坐隤乎安楚囚自罹大雨水圜土俱盪舟此身委傳舍遷徙無定謀去之巳旬月宫室重綢繆今夕果何夕復此搔白頭恍如流浪人一旦歸舊㳺故家不可復故國已成丘對此重回首汪然涕泗流人生如空花随風任飄浮哲人貴知命樂天復何求偶賦蒼蒼己如此梁父共誰吟袖有忠臣傳牀無壯士金収心歸寂㓕随性過光隂一笑西山晩門前秋雨深送武夷趙王賓道士風流不比賀家狂蕭洒黄冠意自長自有武夷溪九曲鑑湖何必問君王蕭然被褐不求知歸傍仙船理釣絲却笑荆山空自售未應有智不如葵􅂴從原上訪桃花又不青門去種𤓰傳得神仙蝉蛻法君如欲覔問􅃄霞琴棊書􅀞四首送趙道士不知甲子定何年題滿柴桑日醉眠意在不言君觧否壁間琴夲是無絃我愛商仙茹紫芝逍遥勝似橘中時紛紛赤白方龍戰世事笑來一局棊蔡邕去後右軍死誰是風流入品題只有蛟龍太師字至今風骨在浯溪欲覔龍眠舊時筆相傳此手世間無黄金不買昭君夲只買嚴陵歸釣圖讀杜詩平生蹤跡只奔波偏是文章被折磨耳想杜鵑心事苦眼看胡馬淚㾗多千年䕫峽有詩在一夜耒江如酒何黄土一丘随處是故鄉歸骨任蹉跎感懐二首交游兵後似蓬飛流落天涯鵲繞枝唐室老臣唯我在桞州先友託誰碑泥塗猶幸瞻佳士甘雨何如遇故知一死一生情義重莫嫌収拾老牛尸伏龍欲夾太陽飛獨拄擎天力弗支北海風沙漫漢節浯溪􅃄雨暗唐碑書空已恨天時去惜徃徒懐國士知抱膝對人復何語紛紛坐冡卧為尸先兩國初忌九月七日北風吹黄花落木寒蕭颼哀哀我慈母玉化炎海秋日月水東流音容隔悠悠小祥哭下邳大祥哭幽州今此復何夕荏苒三星周嗟哉不肖孤宗職曠不修昔母肉未寒委身堕㓂讎仰藥早云遂庶從地下逰太阿落人手死生不自由南冠坐絶域大期落淹留白華下元髪碧蘚生緇裘心口自相語形影旁無儔空庭鬼火閴天黒對牢愁魚軒在何處魂魄今安否兒女各北歸墳墓委南陬寒食雨凄凄盂飯誰與投荆􅁄􅅶蔓草狐兎縁荒丘長夜良寂寞與我同幽幽我心自勞止我命實不猶昨夕夢堂上樂昔歡綢繆覺來尚恍惚血涕連衾裯晨興一瓣香痛如螫在頭吾家白雲下萬里同關憂遥憐弟與妹几筵羅庶羞既傷母在殯又念兄在囚兄囚不足念毋亦為母謀三聖去已逺穹垠莽洪流緬懐百世慮白骨皆填溝􅁳冥先大夫欝欝蒼松楸防山迄合塟瞑目復何求重陽萬里飄零兩鬢蓬故鄉秋色老梧桐鴈棲新月江湖滿燕别斜陽巷陌空落葉何心定流水黄花無主更西風乾坤遺恨知多少前日龍山如夢中又三絶世事蒙蒙醉不知南山秋意滿東籬黄花何故無顔色應為元嘉以後詩人間萬事轉頭空皂㡌飄蕭一病翁不學孟嘉狂落魄故将白髪向西風老來憂患易凄凉説到悲愁更㫁腸世事不堪逢九九休言今日是重陽夜秋光連夜色萬里客凄凄落木空山杳孤雲故國迷衾寒霜正下燈晚月平西夢過重成夢千門雞亂啼雨雪秋色金䑓路殷勤半馬蹄因風随作雪有雨便成泥過眼驚新夢傷心憶舊題江雲愁萬疊遺恨鷓鴣啼偶成燈影沉沉夜氣清朔風吹夢度江城覺來知打明鐘未忽聼隣家呌佛聲烏兎東西不住天平生奔走亦茫然向來鞅掌真堪笑爛漫如今獨自眠得兒女消息故國斜陽草自春争元作相總成塵孔明已負金刀志元亮猶憐典午身骯髒到頭方是漢娉婷更欲向何人癡兒莫問今生計還種來生未了因為或人賦悠悠成敗百年中笑㸔柯山局未終金馬勝逰成舊雨銅駞遺恨付西風黒頭爾自誇江縂冷齒人能說禇公龍首黄扉真一夢夢回何面見江東世事世事孤鴻外人生落日西棊淫詩興薄書倦夢魂迷汩汩馳還坐悠悠笑即啼一真吾自得開眼縂筌蹄㫁鴈㫁鴈西江逺無家寄萬金乾坤風月老沙漠歳年深白日去如夢青天知此心素琴絃已絶不絶是南音小年燕朔逢窮臘江南拜小年歳時生處樂身世死為縁鴉噪千山雪鴻飛萬里天出門意寥廓四顧但茫然除夜乾坤空落落歳月去堂堂末路驚風雨窮邉飽雪霜命随年欲盡身與世俱忘無復屠蘇夢挑燈夜未央壬午丙子上已前二日予至真州今俯仰六周星矣撫時念事為之流涕聊冩我心質諸鬼神爾憶昔三月朔歳在火䑕鄉朝登迎鑾鎮夜宿清邉堂于時坌飇霧陽精黯無芒欃槍犯彤宫熊羆升御牀慘淡銅駞泣威垂朱鳥翔我欲䟽河嶽借助金與湯吾道率曠野繞樹空徬徨慷慨撫鼇背艱關出羊腸扶日上天門随雲拜東皇祖逖誓興晉鄭畋義扶唐人謀豈云及天命不于常泗水沉洛鼎薊丘植汶篁瑶宫可敦后玉陛單于王革命曠千古被服緜八荒海流忽西注天旋俄右方嗟予俘為馘萬里勞梯航秋風上甌脫夜雪卧桁楊南冠鄭大夫北窖蘇中即龍蛇共窟穴蟻蝨連衣裳周旋溲勃間宛轉沮洳塲漠漠蒼天黒悠悠白日黄風埃滿沙漠歳月稔星霜地下雙氣烈獄中孤憤長唯存葵藿心不改鐵石腸㫁舌奮常山抉齒厲睢陽此志已溝壑餘命終巖墻夷吾不可作仲連乆云亡王衍勸石勒馮道朝徳光末俗正靡靡横流已湯湯餘子不足言丈夫何可當出門仰天笑雲山浩蒼蒼生日憶昔閒居日端二逢始生升堂拜親夀摳衣接賔榮載酒出郊去江花相送迎詩歌和盈軸鏗戞金石聲于時果何時朝野方休明人生足自樂帝力無能名譬如江海魚與水俱忘情詎知君父㤙天地同生成旄頭忽堕地氛霧迷三精黄屋朔風捲園林殺氣平四海靡所騁三年老于行賔僚半蕩覆妻子同飄零無㡬哭慈母有頃遭潰兵束兵獻穹帳囚首送空囹痛甚衣冠烈甘於鼎􅀈烹死生乆已定寵辱安足驚不圖坐羅網四見槐雲青朱顔日復少𤣥髪益以星徃事真蕉鹿浮名一草螢牢愁冩元語初度感騷經朝登蓬萊門暮涉芙蓉城忽復臨故國揺揺我心旌想見家下人念我涕為傾交朋説疇昔惆悵雞豚盟空花從何來為吾舞娉婷莫道無人歌時鳥不可聴逹人貴知命俗士空勞形吾生復安適拄頰觀蒼􅁳端午五月五日午薫風自南至試為問大鈞舉杯三酹地田文當日生屈原當日死生為薛城君死作汨羅鬼髙堂狐兎遊雍門發悲涕人命草頭露榮華風過耳唯有烈士心不隨水俱逝至今荆楚人江上年年祭不知生者榮但知死者貴勿謂死可憎勿謂生可喜萬物皆有盡不㓕唯天理百年如一日一日或千歳秋風汾水辭春暮蘭亭記莫作㽞連悲髙歌舞槐翠自歎三首猛思身世事四十七年無鶴髪俄然在鸞飛乆巳殂二兒化成土六女掠為奴只有南冠在何妨是丈夫北轍更寒暑南冠㡬晦􅁳家山時入夢妻子亦關情惆悵心如失﨑嶇命復輕遭時命如此薄分笑三生疾病連三次形容落九分㡬成白宰相誰識故将軍暗坐羞紅日閒眠想白雲蒼蒼竟何意未肯喪斯文病目近來煩惱障左目忽茫茫聶政心雖碎劉伶醉未忘問天天不應食日日何傷萬想由來假収拾太乙光向來巖下電無故眩生花逹摩面向壁盧仝一塌沙燈前心欲碎鏡裏鬢空華何日看明月沈沈斗柄斜有感心在六虛外不知身網羅病中長日過夢裏好時多夜夜頻能坐時時亦自歌平生此光景囬首笑呵呵拾遺早起曉日半窓紅隣雞振翼雄餘子貪慵睡佳人理髪蓬未忘塵俗慮那免是非攻前山渾不見籠翠霧􅃄中贈許柏溪惟一長風吹飛藿青蛚吟野草流光速代謝興懷令人老遊子中夜起悠悠酣且歌明月委清照江湖秋涉多豈無臨淄魚亦有邯鄲酒懐古招王孫登髙重回首
