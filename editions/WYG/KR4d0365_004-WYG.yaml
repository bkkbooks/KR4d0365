body:
  text: 表牋門謝表臣某言伏凖省札五月二十八日三省同奉聖㫖文某添差簽書寧海軍節度判官㕔公事仍釐務臣以賜第之初未經門謝未敢秪拜劄命申乞指揮續凖省札七月十一日三省同奉聖㫖令朝謝訖之任臣謹遵奉指揮詣闕廷朝謝者御大廷而發策式廣旁招奉清問以攄忠誤承親擢尚阻紫宸之謝遽叨黄紙之除曠世遭逢瞻天感激中謝臣切以賓興下詔同天地宗祀之彝科舉取人代造化爵賢之柄豈曰利人才之進取其間實天道之流行肆萬乘之臨軒受諸侯之貢士占小善者率以録咸造在廷取一人焉拔其尤必有名世豈應庸𤨏可在蒐羅臣禀質既凡聞道尤淺才非洛陽之年少偶玷薦書學非廣川之大儒遽塵舉首自叨異數亦既三年囘思臚唱之䝉恩莫與鳬趍而奉表有懐就日無路箋天方傍徨於丘園乃寵綏其禄秩輒請展為臣之禮幸許修詣闕之恭兹蓋伏遇皇帝陛下徳體乾行道符常久世更三紀逺追成周式化之風嵗啓後庚近接藝祖開基之運凡際風雲之㑹咸依日月之光遂令一介之姓名亦被九重之記録臣敢不誓堅素守勉企前修自揆讀書非為晉生温飽之計願言竭節用副上心忠孝之期臣無任瞻天望聖激切屏營之至謹奉表陳謝以聞湖南提刑到任謝皇帝表帝庭敷命昭闢四門天牧播刑誤頒一節申以遄驅之㫖疇兹已試之庸周隰載馳漢條具布中謝伏念臣本無他技惟有孤忠兩朝特達之知洊塵清要十載行藏之跡祗自悔尤雲雷之義方屯天地之心已復當元日達聰之始在皇華遣使之中聖恩靡許於祝釐臣職敢稽於行道瞻蓋高而下耳冀用譽於折肱兹蓋恭遇皇帝陛下道協重華仁周四表崇徳廣業合乾轉坤翕之功折獄致刑得震動離明之用遂令承乏復忝司平臣敢不祗若咨詢對揚欽恤陳時臬事尚𢎞康乂之圖受王嘉師永迪明清之訓謝皇太后表司平楚甸命出嚴宸告至周原恩歸慈極敢敷睿訓仰謝徽音中謝伏念臣一介寒微兩朝知遇傾葵向闕初無補於使令啜菽杜門祗自深於觀省當元日㑹同之始拜公朝拂拭之仁言遣使臣往陳臬事華省遄頒於趣㫖叢祠竟播于俞音勉臣子之驅馳見吏民而宣布兹蓋恭遇夀和聖福皇太后陛下心超有極道合無疆長信怡愉賛炎圖之昌運太任肅穆開蒼籙之隆平宜擇攸司俾敬爾獄臣敢不丕承欽恤誕布慈仁乂我黎民尚想無刑之治于其王母敢忘介福之元謝皇后牋君子審官道隆儷極皇華遣使命出治朝徳意具宣忱勤告至中謝伏念臣疎庸一介遭遇兩朝早綴班行嘗忝金科之屬繼乘使傳復塵繡指之行曲成每戴於釐明退食難逃於吏議不圖元㑹復錫恩言􅋞拭起家往陳時臬驅馳在道寅奉天威涖止攸司欽哉乃職兹蓋伏遇皇后殿下徳侔坤地位正家人闗雎之化既行用之天下象魏之法使布正自王宫爰取踐更載叨詳讞臣敢不靈承欽恤祗若平反無刑以乂黎民誕敷聖化式敬以長王國永誦徽音皇太子生日賀皇帝表大夏長贏坤二女之紀季千秋似續震一索之揆初瑞彩縁車歡顔丹扆中賀恭惟皇帝陛下徳流芑水業茂蘿圖夀富多男積善必有餘慶本支百世命吉在厥初生記甲觀之瑞分占乙禖之祚逺臣縻身軫埜戴目心星誦億子之宜君首歌周雅祝萬年之為父更續唐詩賀皇太后表福于王母際南面之昌期天以神孫娛東朝之永日晝堂瑞節長樂歡聲中賀恭惟夀和聖福皇太后性藴沖和仁培靜夀思齊所以聖也以御于邦螽斯宜爾子孫克開厥後皇皇穆穆繼繼承承臣迹滯騏原心馳鳯闕本支百世播緜瓞之聲詩怡愉萬年衍含飴之福慶賀皇后牋坤后廣生式協二陽之月震男揆度載逢一索之期慶衍蘿圖喜充椒掖中賀恭惟皇后殿下道柔配地徳厚承天以御于家為今京室之婦則樂有子如古周南之風百世本支萬年福禄臣迹縻牡轡心賀燕謀占斯干之詩已符吉夢美思齊之徳益嗣徽音皇子進封左衛上将軍嘉國公賀皇帝表乾父垂仁茂積蘿圖之慶震男鍾美肇基茅土之邦百世可知四方來賀中賀洪惟昭代愛立親親粤有舊章禮優貴貴昉祥符之七載侈慶國之初封綺仗分班璲珪疏寵庸表人倫之厚適觀王室之彊式于今休監于成憲恭惟皇帝陛下福培周厚和緝堯雍寳厯無疆方萬年而受祐金枝有煒期億子以宜君錫以嘉名汗其大號地營東井詔爵五之最穹天拱北辰炳心三之相照克昌厥後長發其祥臣有蹇牡騑阻隨虎拜祉歌子施遥陳皇矣之詩道盡君嚴願賛家人之易賀皇太后表東朝保艾方隆堯母之仁西國分茅式篤文孫之慶兩宫喜色萬宇歡聲中賀恭惟夀和聖福皇太后陛下徳厚慈元神怡長樂尊之至也上承視膳之勤宜爾繩兮下適含飴之趣瑶池日永玉葉春濃臣逺被繡衣隃瞻綵仗于其王母知介夀之來崇佑我後人願丕圖之有衍賀皇后牋坤稱乎母儼家服於椒塗震索而男赫龍光於茅土長秋喜色方夏歡聲中賀恭惟皇后殿下含𢎞承天博厚配地祥鍾長發熾商後於有娀音繼思齊培文昭於太姒圭瑑焜煌於綺仗芾朱輝映於褘衣臣逺驟華原隃瞻蘂殿想宜君之穆穆茂對王休侈多子之繩繩載歸后美皇女進封同夀公主賀皇帝表乾見大人道夙隆於乾體巽為長女命爰寵於巽申喜溢宫庭歡騰海宇中賀竊惟興君之際必有積善之餘播在正風則曰王姬之美陳于小雅是為女子之祥無非歌福禄之同于以表國家之盛恭惟皇帝陛下和順而理温柔以容苞體深仁既茂緜𤓰之瓞岡陵厚積復培穠李之華始封爰遴於嘉名遐祉永齊于聖夀臣跡縻使事身隔賀班親愛如家遥賛人倫之厚肅雍迪教遹觀王道之成賀皇太后表周家福禄積由任姒之仁堯母聖神親覩娥英之慶宫闈盛典海宇歡聲中賀恭惟夀和聖福皇太后陛下南極景光東朝綦貴有功寳祚既開聖子之傳流澤銀潢爰毓天孫之瑞賛初封於沁水同上夀於瑶池臣逺玷皇華隃瞻長樂怡愉太后諒承婉娩之娛雍肅王姬益表儉慈之教賀皇后牋坤萬物之資生實蕃慶積巽一索之謂長昉對命申喜氣宫闈歡聲海宇中賀恭惟皇后殿下闗睢孝敬芣苡和平灼灼宜家夙範華桃之懿雍雍成徳茂鍾穠李之英賁然錫沁水之封展也同長秋之夀臣逺縻苞杞遥睇塗椒風以周南仰化原之洵美觀于堯女願母道之浚明知贑州到任謝皇帝表九重選牧錫類天寛千里承流奉親地近昉共侯度丕戴王休中謝伏念臣某才本空疎分安孤苦身逢盛代夙自厲於丹心家有重親晚相依於白髪頃叨漢傳往即楚封何敬非刑粗殫審克不遑将母私切懐歸嘗懇懇以陳情冀高高之従欲遄䝉異渥特畀近麾繼肹常以趣征已鞠躬而祗上禄及一門之微賤恩同大造之生成兹蓋伏遇皇帝以堯舜之資行曾閔之道嗣寜王之大歴毖我成功奉太后之萬年與天齊夀遂使忝求芻之寄亦獲共啜菽之歡臣敢不老老及人親親為政由家達國期興讓以興仁以子移臣寓為忠於為孝謝皇太后表東朝鴻慶介夀無疆南國虎符便親有命荷中宸之渙寵望慈極以皈忱中謝伏念臣一介迂疎兩朝遭遇昔備殫於敭歴無以逾人頃間任於驅馳不遑将母質内懷於鳥哺遂上徹於蟻忱果分二水之麾爰易三相之節惟壤地接故可以供菽水之職惟土風習故可以盡芻牧之心自省叨隃若為報稱兹蓋恭遇夀和聖福皇太后陛下徳光堯母功配周姜夀錫萬年享怡愉之福化流四海推慈身之仁遂令下吏之僥榮獲以邇封而就養臣敢不祇承徳意諼布恩言服膺錫類之詩益崇美化拜手牧民之訓隃賛徽音謝皇后牋慈極承天恩深錫類庶車易地職重分符布聖徳之中和便親闈之温凊中謝伏念臣起繇孤逺積有迂疎骯髒半生於事君而何補驅馳近嵗以将母而未能屬為養以陳情荷畀矜而従欲三湘納節二水授麾囘刺史之車庶乎為子捧郡守之檄専以為親僥冐實多糜捐曷稱兹蓋恭遇皇后殿下道隆坤厚徳配乾仁大雅思齊媚周姜而穆穆長秋備禮奉漢母以愉愉遂令疎逺之微臣亦效㫖甘於便壘臣敢不恪恭侯度茂對王休崇闗睢巻耳之風迪惟懿則篤南陔白華之行施及遐萌夀崇節本州賀皇帝表天子有親備四海九州之奉封人祝聖同萬年億載之期凡屬照臨舉同呼舞中賀恭惟皇帝陛下剛健中正緝熙光明燭六合而耀八紘功參天地躋三皇而軼五帝道御家邦紹巍巍蕩蕩之勲盡尊尊親親之養怡愉誕節光大前聞臣獲布寛條幸逢盛際鵷鸞阻綴莫旅賀於東朝螻蟻傾忱惟仰瞻於南極賀皇太后表於萬斯年慈宸有慶誕彌厥月祖佛同生旒冕敬共縉紳舞蹈中賀恭惟夀和聖福皇太后陛下道超太始徳厚重坤闗睢周南之風夙陶美化思齊文王之母懋著徽音袗衣初奏於薰絃宫珮畢朝於慈扆親下衮龍之拜載揚韶鳯之音呼萬嵗者三歡騰朝野等百世而上福衍子孫臣叨守魚符莫陪鴛序我百而爾九十諒喜溢於舉觴心一而臣三千第神馳於拱極賀皇后牋太姒之嗣太任星重慈極長秋之朝長樂天介夀祺流慶九霄比隆千古中賀恭惟皇后殿下明章徳範陶冶化風大練厚繒訓四方之節儉宵衣旰食侑五位之勤勞肖似徽音婉愉誕序厚符坤地吉萃家人臣逖守遐邦忻逢華旦仰瞻帝闕莫陪振鷺之班下與邦民同被闗睢之化夀崇節兵馬鈐轄司賀皇帝表天子盡敬事親丕昭瑞節臣下歸美報上同祝脩齡覆載兩間頌歌四洽中賀恭惟皇帝陛下克勤克儉無怠無荒堯以是傳道莫高於虞舜文所以聖徳益顯於大任有開麗水之祥適際瑶池之㑹臣屬縻戎鍵阻綴班聨北面而朝恍天威之尺五南山之夀效臣子之呼三賀皇太后表金闕日長尊處宸闈之極玉巵春滿誕膺法駕之朝凡在式圍率均擊壤中賀恭惟夀和聖福皇太后陛下心逰恬淡徳著慈仁隆周召之風人倫既正養黄老之性母道獨尊皇穹申方至之休夀命衍無疆之筭臣猥分郡組共貳戎韜迹逺觚稜帷幄隃瞻於長樂忱同葵藿笙璈第想於承華賀皇后牋坐於少廣慶慈極之誕彌朝于寝門助聖人之教愛宫庭溢喜宇宙同和中賀恭惟皇后殿下瑞應俔天光昭遡日正始基化歌二南芣荇之詩視膳問安備六寝褘褕之禮協朱明之律吕鏘綵仗之珮環驩奉玉巵禮同黼扆臣濫紆州紱通領兵符聆舜樂之九成遥瞻南面效堯階之三祝竊比華封乾㑹節本州賀皇帝表一人天拱適符龍御之亨萬國雲従共慶虹流之瑞系隆宗社福被寰瀛中賀恭惟皇帝陛下曰睿曰聰乃文乃武金甌有永紹寜人大寳之休翠蹕早朝娛太后萬年之夀當嵩呼之華旦總夢月之佳辰兩宫同時千載盛事臣猥叨分竹彌切傾葵奉玉巵之恭阻綴班於北闕通銀臺之奏但申頌於西崑賀皇太后表六龍御極增光長發之詩萬國同心推本思齊之聖驩騰宫壼和塞堪輿中賀恭惟夀和聖福皇太后陛下曰希曰夷爰清爰靜以天下養備百禄之熾昌與元氣㳺葆六根之純粹海内樂唐虞之化宫中頌任姒之音臣切預承流遥伸歸美冬温夏清禮嚴東面之朝日升月常福等南山之祝賀皇后牋黼扆端臨交上華封之祝御深内助仰承京室之規喜溢六宫和薫八表中賀恭惟皇后殿下靜専成性徽懿秉姿珥簮進庭燎之箴雞鳴有度弓韣奉高禖之祀燕翼發祥際上帝生商之辰懋塗山興夏之徳仰占七政日月並明俯鑒四方岡陵齊夀臣分符江右化被周南首賛乾亨體天行之不息更祈坤載協地道之無疆乾㑹節鈐司賀皇帝表龍首庶物覩大徳之照臨虎拜萬年對王休而蹈厲堪輿協氣海宇頌聲中賀恭惟皇帝陛下神聖整齊武文經緯諸福畢至一登再登三登我武維揚五伐六伐七伐虹者載臨於盛旦鳯音遥想於明庭臣通領鈐符恪共官次葵傾觀闕阻陪就日之班花覆簮紳隃謝需雲之宴賀皇太后表天下傳歸于子降寳冊之鴻名聖人教愛以親上玉巵之曼夀非常之慶嘉頌攸同中賀恭惟夀和聖福皇太后陛下沖澹頥神儉慈孚化輔佑先帝夙殫巻耳之勤愉佚東朝允著思齊之聖防前殿紀誕彌之旦正羣方傾就望之忱肆應鳯輦之朝親下龍綃之拜臣屬縻戎鍵阻綴班行現五色之雲知獻占於太史舞兩階之羽諒增喜於慈顔賀皇后牋上萬嵗之夀咸頌聖人形四方之風實基王化凡居持載罔不驩呼中賀恭惟皇后殿下生禀靜柔安行雍肅躬河洲采荇之潔列聖顧歆翼寝門視膳之恭慈顔和懌合坤其順遡日而明欣聆嵩嶽之呼並受華封之祝臣俯共武服仰賛夀觴星之逺天之高陛莫瞻於九級漢之廣江之永詩但誦於二南皇子賜名本州賀皇帝表家有嚴君托中興之昌歴天以聖子作大國之宗藩喜溢宫闈慶闗宗社中賀恭惟皇帝陛下懋昭聖徳厚正人倫保天命以宜君四方無侮貽孫謀而翼子百世可知爰錫嘉名載敭大號敬哉有土肇基二水之邦格于皇天式應三星之曜俾耆而艾長發其祥臣縻跡侯方傾心魏闕監王成憲願垂謨烈之休啓我後人益壯本支之盛賀皇太后表東朝介福式彰母道之尊南國分封庸迪孫謀之吉兩宫交慶百世彌昌中賀恭惟夀和聖福皇太后陛下長樂怡愉大庭㳺衍養以天下日永瑶池正于家人春生玉葉賛苴茅於浯水壯緜瓞於宗藩臣逖在侯方阻瞻宸仗思齊所以聖遥頌徽音皇矣莫若周益隆世徳賀皇后牋母資坤徳之生椒塗襲慶男正家人之吉茅土分封宗社延洪宫闈闓懌中賀恭惟皇后殿下承天光大法地靜專成美化於周南言能逮下嗣徽音於京室于以御家屬聖子之勝衣賛嚴君之錫爵臣逺縻外服阻造内班正風俗以厚倫永歌后徳輔皇王之維辟丕傒孫謀皇子賜名鈐司賀皇帝表天佑我家篤生聖嗣國有鉅典肇建宗藩社稷靈長神人孚洽中賀恭惟皇帝陛下禮行貴貴愛立親親撫寳厯之昌期萬年福禄演銀潢之慶澤百世本支爰重燕謀載頒鴻號于疆于理地營浯水之邦有翼有馮星拱周廬之衛克開厥後俾熾而昌臣逺縶戎韜隃瞻文石施于帝祉徳已動於監觀保我後生命更歌於夀考賀皇太后表堯母怡愉介于景福湯孫岐嶷錫以嘉名慶衍宗祊歡隆慈極中賀恭惟夀和聖福皇太后陛下爰清爰靜曰希曰夷佐先帝之中興鷄鳴有度膺嗣王之孝養燕翼成謀爰鍾受於緑車乃分封於赤社臣恪恭武服阻造王庭以御于家隃賛思齊之徳克開厥後佇成皇武之功賀皇后牋坤稱乎母作徳配天震索而男建邦有土慶成宗社喜溢宫庭中賀恭惟皇后殿下芣苡和平闗睢孝敬嗣母徽於京室在廟在宫明子道於家人正内正外歡動勝衣之拜光昭夀社之封臣共武有嚴稱班云逖風以周南之化踰賛螽斯烝哉豐水之謀遹觀燕翼皇帝登寳位本州賀皇帝表天作之君表冠倫之大聖父傳於子昭立嫡之至公歴數維新神人胥協中賀恭惟皇帝陛下以周元子為舜重華大徳生知聰明以臨齊荘以敬一人有慶進退可度容止可觀積素厚而孫謀深謳歌同而神器定無為而治有道之長臣叨領虎符隃瞻龍御建皇極而王天下幸際昌期開明堂而朝羣臣聳觀初政賀太皇太后表肇聖徳之龍飛運開昌歴垂孫謀之燕翼功出慈宸九廟尊安八紘抃蹈中賀恭惟夀和聖福太皇太后陛下道光任姒行邁塗莘範肅東朝性適含飴之樂規重南面養親視膳之榮光昭嫡統之傳丕衍皇家之慶臣叨紆守紱阻適賀班頌皇帝上萬年永言齊夀佑寜人之大歴尚克圖功賀皇太后表震出麗天重明繼序坤稱正位一統䝉休基祚斯皇幅貟胥慶中賀恭惟皇太后陛下輔佐先帝憂勤王家思媚周姜履肅雍於京室訓貽禹子服勤勞於塗山瑞昭南面之符光疊東朝之矩臣屬縻侯服隃企慈帷嫡統無疆已慶大横之兆嗣徽有秩尚稽小毖之謀皇帝登寳位鈐司賀皇帝表乘時御極宣日月之重光居嫡宅尊大春秋之一統幅員愛戴宗社安强中賀恭惟皇帝陛下仁孝生知聰明時乂踐寧王之丕祚大歴維新奉文母之徽音皇天有慶宜首正飛龍之御以上承翼燕之貽無疆維休有相之道臣濫巾戎轄阻簉朝班五百嵗而生幸親見聖萬億年其永不替惟王賀太皇太后表兆協大横運在當命之聖謀貽小毖功歸太上之慈嫡統延洪皇圖鞏固中賀恭惟夀和聖福太皇太后陛下躬基美化教闡徽音彤管光華配豐功於祖烈練衣朴素示懿訓於孫謀聿新歴服之傳式副簾帷之託臣司戎共貳望闕呼三庶民近天子光忻逢昌歴太極為元氣母永迪初基賀皇太后表震主宅尊光紹寧王之命坤元居正遹彰大姒之音一統親傳萬邦胥慶中賀恭惟皇太后陛下功侔持載徳備含𢎞風化二南衍傳家之忠厚本支百世肇繼序之聖明大春秋正嫡之書應日月重光之運臣屬兼鈐紱阻造軒帷在天利見大人已孚文命介福于其王母長詠思齊謝皇帝登極赦文表日月重離開國家之休運雷雨作解溥天地之至仁萬邦咸休一人有慶中賀恭惟皇帝陛下堯文光宅舜徳出寧神聖為君丕受皇天之命春秋立嫡聿昭正統之宗爰肆眚於端門示湛恩於熈代臣猥分銅虎隃企金雞大人繼照四方聳觀初政皇極敷錫五福苐奉寛書太皇太后加尊號本州賀皇帝表御丕圖於南面順應天人崇徽冊於東朝重增宗社億年縟典萬國懽心中賀恭惟皇帝陛下皇極之宗人倫之至性同符於堯舜達孝升聞訓一本於姜任徽音有秩紹寧王之明命彰祖后之尊稱臣分牧有嚴承休胥􅀈介福于王母難名太上之功肖徳以神孫願共無疆之號賀太皇太后表鴻名揚厲用彰重慶之尊龍扆繼承懋舉盡倫之制明廷孚號寰宇傾心中賀恭惟夀和聖福太皇太后陛下徳備儉慈教修愛敬佐我烈祖成天保之憂勤訓于神孫示思齊之雍肅粹美翟褘之服增華琬琰之章臣屬守銅符欣侍寳冊同御延和之殿誕頌前猷尊居慈福之宫永言至養賀皇太后表統繼堯天重華協徳位隆文母太姒嗣音寰宇休明内庭肅穆中賀恭惟皇太后陛下行高配地秘大補天輔先帝以重光憂勤夙至肇嗣王之丕緒福禄方來奉寳冊於重闈夀皇圖於覆載臣屬縻郡紱阻簉廷紳咸曰太皇已慶元和之夀願言帝母永肩長樂之名太皇太后加尊號鈐司賀皇帝表皇圖嗣慶著母道於重坤鉅冊稱尊告王庭而大渙宫闈增重宗社䝉休中賀恭惟皇帝陛下徳為聖人孝治天下侍宣仁之聴㫁元祐同符禀慈福之起居紹熈儷美播無為之懿號隆太上之徽音臣猥介戎鈐聳觀國典思齊文母既彰有徳之雍雍於赫湯孫願共厥聲之穆穆賀太皇太后表離日方升光傳龜寳坤元重慶肇建鴻名福萃三宫歡騰八表中賀恭惟夀和聖福太皇太后陛下佐佑皇祖怡愉東朝徳配姜任植丕基於蒼籙功高馬鄧扶洪業於炎圖宜效美於思齊大歸尊於長樂臣偶叨戎轄阻綴朝班丕哉烈丕哉謨共傒嗣王之政得其名得其夀載揚太上之休賀皇太后表晉大號於重闈位隆長樂紹丕基於萬世慶本慈元命肅治朝禮行廣内中賀恭惟皇太后陛下頤神沖澹履行靜專美紹思齊宜毓文王之聖訓垂訪落實開成后之謀賛重慶於御簾推有尊於臨制臣猥分戎轄隃聴恩綸望少廣之宸居莫班獸舞頌長秋之夀歴同播鴻名皇太后加尊號本州賀皇帝表嗣王受此丕基光膺明命文母介以繁祉祗奉嘉名典冊流輝幅貟有慶中賀恭惟皇帝陛下一人出震五位乘乾玉寳金相嗣延洪之大歴寳禕羽翟奉雍肅之徽音光進瑶編重增鼎祚臣叨分虎壘隃望龍墀保佑恩深已際大明之運怡愉樂永更揚齊夀之休賀太皇太后表毓正神孫方布應門之詔位尊祖后復隆京室之稱重慶萬年丕休四海中賀恭惟夀和聖福太皇太后陛下性超太上徳應黄中元祐大功法宣仁之鞠育紹熙新政燕慈福之起居宜旌坤極之嘉名式趾太任之芳躅臣屬分侯服欽誦王綸天子必有所尊已光載籍聖徳無加於孝長戴兩宫賀皇太后表坤稱正位訓迪嗣王渙號揚庭尊歸文母簾帷介福社稷垂榮中賀共惟皇太后陛下徳著憂勤躬行慈儉虞嬪觀于媯汭宻賛聖謨后稷生於姜嫄美鍾神胄晉長信尊尊之號嗣思齊秩秩之音臣忝守藩維阻趍軒陛得其名得其夀幸同萬國之歡宜爾子宜爾孫永頌兩宫之慶皇太后加尊號鈐司賀皇帝表重明以繼大人瑶圖垂慶介福而于王母玉冊有光瑞溢簾帷重闗宗祏中賀恭惟皇帝陛下敬仁成性歴數在躬惟后綏猷蹈堯舜之孝弟因親教愛奉任姒之肅雍宜申慈極之尊式表聖倫之至臣叨兼兵轄隃企陛簾賛長信之徽稱已光漢制頌塗山之丕訓益大禹功賀太皇太后表嗣皇奉冊尊歸長信之名祖后宣猷夙迪思齊之訓萬年集慶八表䝉休中賀恭惟夀和聖福太皇太后陛下徳邁維莘道高于汭金車玉路備三世之典章寳翟珍禕示六宫之法度美慈宸之疊矩揚大號以同符臣兼領戎鈐竦聆郵綍徳夀早朝之典已慶淳熙延和同御之功益歌元祐賀皇太后表文母克昌厥後光紹皇圖大徳必得其名慶隆寳冊四方來賀百志惟熙中賀恭惟皇太后陛下隂教齊家慈元正位推為美化邁周召之二南著在徽音紹姜任之大雅宜膺渙號增重坤稱臣適貳韜鈐聳聆綸綍踐其位行其禮莫重尊親求厥寧觀厥成遹追來孝大行皇帝升遐本州慰皇帝表堯父宅尊春秋鼎盛杞天吿墜逺邇震驚降割非常銜哀罔極恭以大行皇帝神聖文武濬哲温恭萬千嵗怡愉恪盡東朝之養十一年寅畏遹祗上帝之威期夀考之惟休俄憂勤而積疢詎圖大漸驟至遐征望欲㫁於遺弓命忍傳於憑几中慰恭惟皇帝陛下有仁有孝盡制盡倫克念先猷根聖人之至性誕承慈訓服天下之通喪願少抑於孝思以永綏於神器臣屬縻守紱哀捧告書莫伸奔問之恭徒切攀號之痛慰太皇太后表雞鳴問寝方慈極之深居龍去遺弓忽皇輿之新陟宫闈震悼海宇摧傷中慰恭惟夀和聖福太皇太后陛下徳備周姜道光堯母東朝垂訓曾不改於儉慈南面積憂遽忍違於温清驟罹國疢諒切聖懐少寛憑几之思式副御簾之託云云慰皇太后表皇靈新陟變撫遺弓儷極永懐悲興捐玦六宫哀痛九宇摧傷中慰恭惟皇太后陛下坤道宅中家人佐正脱簮而諫期共濟於中興綴衣于庭忍遽聞於末命雖委裘之悲至切而定鼎之託方新願制䀌傷永綏敷遺云云大行皇帝升遐鈐司慰皇帝表王宜日中方慶垂衣之治父有天下遽傳憑几之言宗社憫凶幅員哀痛共以大行皇帝王道正直帝徳簡寛奉長樂之清温丕昭仁孝聴邇英之勸誦遹紹文明方嗣服於萬年胡委裘於一旦烏號罔極龍御何追中慰共惟皇帝陛下聖徳升聞孝思永慕重華協帝方遏宻於八音冢宰總官将諒隂於三祀願少紓於聖抱以𢎞濟於皇圖臣逖領戎昭哀傳國疚阻伸奔問惟重摧傷云云慰太皇太后表嚴宸居正痛晏駕之奄聞慈極宅尊悵早朝之遽隔哀傳海宇悲結簾帷中慰恭惟夀和聖福太皇太后陛下徳厚承天恩深與子夙行恭儉聖方頌於思齊晚享怡愉變忍聞於顧命諒聖情之結戀鑒輿志之攀號願抑慈懐永謀孫翼云云慰皇太后表變興梧野九土烏號悲結椒塗六宫縞哭宅憂罔極降割何深中慰恭惟皇太后陛下志紹徽音躬行美化冬温夏清佐孝養於東朝海潤星暉演慶源於中壼驟撫鼎湖之戚奚堪與極之哀願抑慈懐聿扶新政云云百日慰皇帝表烏號浸逺九土同悲駒隙易流十旬如隔撫時哀疚易月徬徨中慰恭惟皇帝陛下歴數有歸羮牆如對雖擗踊哭泣曷勝父子之情而朝覲謳歌當慰臣民之望願節宅憂之制益成繼志之圖臣承乏偏城阻趍嚴陛云云慰太皇太后表烏號銜恤悵再隔於月逰龍寝闕朝恍十周於日浹流光何涷哀思欲摧中慰恭惟夀和聖福太皇太后陛下宫壼宅尊簾帷託重雖道揚王命不勝慈極之懐然燕翼孫謀當念皇圖之本願體臣民之戴少寛朝夕之思云云慰皇太后表雲升梧野頓隔千秋日短蓂階駕言十浹委裘禍迫捐玦哀深中慰共惟皇太后陛下教盡人倫慶隆母道雖易月以日難窮伉儷之悲然薦子於天正重攜持之託願俯従於中制用式副於羣情云云期年慰皇帝表追玉几之遺言制嚴易月服練冠於初祭哀重感時霜露深悲乾坤罔極中慰恭惟皇帝陛下孝治天下統承先王雖見堯於牆克篤終身之慕然纉禹之服所期大器之安願従禮制之宜少副輿情之望臣屬縻藩屏阻造闕庭云云慰太皇太后表訓予命汝易月有嚴練而慨然周星何短哀承遺制痛結慈衷中慰恭惟夀和聖福太皇太后陛下徳紹宣仁功侔明肅天經地義扶嫡統於方新日邁月征悵宸旒之愈逺願勉従於衆志姑少抑於至情云云慰皇太后表悲捐玉玦痛極呼天祭服練冠制嚴易月乘雲浸逺濡露何堪中慰恭惟皇太后陛下徳佐先猷慶鍾神胄雖徬徨虞汭望欲㫁於蒼梧然婉變周姜任方隆於京室願少寛於哀抱用丕賛於鴻圖云云再期慰皇帝表龍湖未逺可傷易月之喪駒隙幾何已舉再期之制羮牆如在霜露孔哀中慰共惟皇帝陛下道盡人倫位隆世嫡雖終身慕父難窮至性之悲然億載怡親方疊慈顔之養願重承休之託少寛追逺之懐臣隃綴藩宣阻班軒陛云云慰太皇太后表終天巨釁降割一朝易月通喪寓言再嵗仙逰未逺慈抱難居中慰恭惟夀和聖福太皇太后陛下功在先朝志勤内治雖變生憑几悵闕問於鷄鳴然寄重垂簾方稽謀於燕翼願抑無疆之恤益昌有大之休云云慰皇太后表望㫁乘雲悵龍驂之浸邈制嚴易月愧鳯厯之再周凡屬幬持式同追慕中慰恭惟皇太后陛下承天功大與子仁深雖悼舜陟方不替蒼梧之望然開周嗣歴方隆豐芑之休願少抑於哀悰用永綏於神器云云􅎭祭慰皇帝表龍御何之方切綴衣之痛駒隂未逺已驚釋禫之期易月従宜感時增疚中慰恭惟皇帝陛下恭黙思道愛敬事親天作之君當周艱而即命日致其孝将舜慕以終身願寛追逺之至情丕慰含生之顒望臣濫承郡紱阻綴朝班云云慰太皇太后表衮衣萬嵗痛隔終天禫服一朝權従易月感時憂戀率土盡傷中慰恭惟夀和聖福太皇太后陛下徳著寳禕功藏金匱撫鼎湖之龍去子保何追懐豐水之燕貽孫将有衍願副普天之望式紓慈極之悲云云慰皇太后表宫車輟駕浸逺翠華國典行權恍終素蹕託言釋禫胡忍免喪中慰恭惟皇太后陛下夙著脱簮驟罹捐玦雖梧雲不返永為褘翟之傷然芑水方來共徯簾帷之助願釋居諸之感俯従遐邇之情云云賀皇帝聴政表思皇烈考誕受寳龜於穆嗣王甫攽治象慈簾保佑熈政闓明中賀共惟皇帝陛下徳實天生動為世則入于翼室稱元子以宅宗出自應門㑹諸侯而作誥欽奉怡愉之訓爰親兢業之幾既兩宫垂拱以無為宜四海謳歌而來覲臣屬縻郡國隃戀闕庭御延和殿之正朝願光祖烈奉紫雲樓之盟誓第守藩條賀太皇太后同聴政表綏夀而右文母高拱慈宸肖徳而有神孫共臨幾政徽音洋溢光訓昭宣中賀恭惟夀和聖福太皇太后陛下功邁塗山徳高媯汭施于帝祉已深慶錫之源保我後生益衍夀寧之福章憲垂簾於天聖宣仁稱制於延和紹昔大猷為今懿範臣屬縻守紱欣聴俞綸太易太始太初莫測無為之化四門四聰四目共觀有道之朝天瑞節本州賀皇帝表龍出御天重華于帝虹書流渚長發其祥萬姓驩呼三辰擁佑中賀恭惟皇帝陛下聖徳克肖天性自成光北斗之樞篤生黄帝美南山之夀誕命文王節届千秋時維九月臣縻身侯度拜手王休三千臣同心永言華夀五百年生聖敬賛河清賀太皇太后表聖王垂拱萬年方開燕翼太皇怡愉億載親見虹流海宇春輝宫闈日永中賀恭惟夀和聖福太皇太后陛下身基美化徳著慈元正位而定家人功高配祖介福而于王母慶積貽孫律協素商節書金籙臣濫膺藩屏阻賀簾帷假樂命之慶春秋之鼎盛思齊聖也同日月之離明賀皇太后表龍徳方升祥書載震燕禖有慶福萃重坤旗翼光華幅員熙洽中賀共惟皇太后陛下道侔博厚徳備仁明虞汭來嬪女于舜帝周京作配生此武王方觀日上於扶桑隨虹流於華渚臣濫叨一障隃企千班大域中王既祝華封之夀為天下母願齊西極之年天瑞節鈐司賀皇帝表謳歌與子方開捧日之祥福禄宜王初紀流虹之慶光生宗社歡溢堪輿中賀恭惟皇帝陛下天徳生知乾元首出載震載夙膺天地之珍符繼聖繼明正春秋之嫡統當瑶光之瑞節際金顥之昌辰臣分虎有嚴抃鼇欲舞呼玉巵之萬嵗隃賛王休進金鑑之千秋嗣殫臣職賀太皇太后表萬夀齊天思齊以聖千秋紀日長發其祥廣宇休揚重闈慶洽中賀恭惟夀和聖福太皇太后陛下以女堯舜為今姒任有典有則之貽輔于皇祖立政立事之凖訓乃文孫當月届于素商喜節書於華渚臣猥塵戎轄阻賀宸闈請祝聖人既效堯封之職亦右文母載賡周頌之章賀皇太后表辛嵗重光昔符夢日乾元首出今紀流虹歡溢華封慶歸長信中賀恭惟皇太后陛下徽音大雅美化二南徳配重華觀嬪于汭祥開長發立子生商扶暘谷之初升記高禖之載誕臣領鈐偏郡銜表明廷五百嵗河清既覩聖人之出三千年桃實願同王母之尊大行皇帝諡號本州慰皇帝表祀以配天致聖人之達孝廟可觀徳彰烈考之隆名典冊千年宗祧九鼎恭以端文明武景孝皇帝光宅天下簡在帝心敬直義方煥經天而緯地事名物應昭修政以攘夷大徳大功立親立愛自生民而未有熙鴻號於無窮中慰恭惟皇帝陛下離象重光乾龍首出聖盡倫王盡制始于家邦宗有徳祖有功行其典禮式崇徽譽昭對皇靈臣叨領虎符欽傳駿命告神明頌盛徳已觀國典之光薦郊廟揚洪休尚述侯邦之職慰太皇太后表居長樂之宫興懐鶴駕瞻顧成之廟肇錫鴻名大冊垂榮慈衷悼往中慰恭惟夀和聖福太皇太后陛下以天下養與元氣㳺明肅臨朝親立仁皇之策宣仁在御永懐神考之思丕對皇靈昭升熙號臣屬縻侯紱阻慰宸簾云云慰皇太后表九疑陟逺莫返皇靈七廟升宗聿彰世徳洪名有赫哀抱彌深中慰恭惟皇太后陛下位正家人道隆坤母躬葛覃之節儉厥配有光秉清廟之肅雍于嬪增感於惟大冊肆對皇穹臣跡繫分符神馳望闕云云大行皇帝諡號鈐司慰皇帝表翼室宅宗考先王之制禮觚壇吿帝為烈考以易名大冊遹彰皇靈昭假共以端文明武景孝皇帝體元居正持盈守成端獨化之原文經天地明萬幾之理武定邦家景行有容孝思無極上可以配祖宗之徳下可以垂子孫之休中慰恭惟皇帝陛下弼我丕基鑒于成憲寧王克綏受命篤棐忱辭嚴父莫大配天荅揚光訓奉徽稱於宗祀昭縟典於明時臣通領戎昭竦承帝號堯萬世如見莫名巍蕩之功周諸侯來朝第賛肅雍之相慰太皇太后表盛徳之祀百世肇建嘉名太皇之夀萬年興懐縟典慈宸惻楚穹覆鑒觀中慰恭惟夀和聖福太皇太后陛下懿範兩朝仁恩四海為元氣母克篤貽孫育天下君忍聞祔禰裒時大號對越皇靈臣身貳戎鈐心懐國典云云慰皇太后表大徳得名尊歸昭考嗣王謀廟上奉徽音宗禰休揚宫闈愴極中慰恭惟皇太后陛下儉昭練服中協黄裳嗣任徳之肅雍思齊以聖名堯功之巍蕩煥有其章聿深羽翟之懐於赫觚壇之吿臣猥兼戎轄隃賛邦彞云云冬至節本州慰皇帝表一陽來復感駒隙之易流三祀諒隂悵烏號之浸邈愴深履韈悲著羮牆中慰恭惟皇帝陛下清明在躬恭黙思道水有源木有本方嚴祭祖之時霜既降露既濡不替思親之念少抑居諸之慟仰膺付託之隆臣逖守遐邦阻班嚴陛誦先王省方之戒願謹起居乘諸侯謀廟之忠聿懐奔走慰太皇太后表暖律吹嘘感一陽之初復慈簾擁佑訓三祀之通喪痛在宫闈情均海宇中慰恭惟夀和聖福太皇太后陛下徽音慈福懿範宣仁履韈迎長天休方至冕旒問寝子保奚追願少抑於慈懐以永綏於孫翼臣屬縻侯服隃企御闈云云慰皇太后表復陽在地氣應黄鍾坤徳承天悲深素鞸六宫增疚萬宇永懐中慰恭惟皇太后陛下長信宅尊思齊繼美手扶宫日坐占千嵗之長目㫁臺雲尚想九疑之逺願紓哀於儷極以永翼於皇圖臣逖守江城隃瞻禁闕云云啓􅑼慰皇帝表三年諒隂不言悲深翼室七月同軌畢至告啓菆塗逺日戒嚴終天增慕中慰恭惟皇帝陛下外勤謀廟内奉臨朝制爰舉於因山龍輴将駕情永懐於陟岵鳯紼奚追願寛劒舄之思益重基圖之託臣屬縻斗壘阻慰宸庭云云慰太皇太后表居長樂之漢宫永懐鶴駕卜㑹稽之禹穴垂戒龍輴悲結慈闈痛均薄海中慰恭惟夀和聖福太皇太后陛下憂勤徳備擁佑功高百世可知首正貽孫之則七月而葬豈勝思子之懐願東望以節哀重外朝之同御臣身縻乘障跡阻趍班云云慰皇太后表龍湖言逺椒掖永懐鳳輦戒嚴菆塗載闢六宫雨泣萬宇雷哀中慰恭惟皇太后陛下儷極勲高正家化洽撫軒皇之劒舄祔賁橋山奉舜帝之衣裳思藏梧野向軫乾坤之記願紓朝夕之忠臣身繫分符神馳攀紼云云發引慰皇帝表鸞車既駕陟岵哀深龍匣畢塗崇丘制舉新宫永閟翼室增傷中慰恭惟皇帝陛下思道諒闇送終哀慼居喪讀塟禮不愆復土之期因山不起墳尤切望陵之感兾少寛於孺慕以丕重於宗祧臣縻跡侯藩傾心宸陛云云慰太皇太后表日淪西極悵鶴駕之長逰天拱東朝痛龍湖之永閟重闈悲繫九土慕思中慰恭惟太皇太后陛下福備怡愉功高擁佑撫綴衣於翼室億世貽孫念加斧於畢塗千秋望子願抑思齊之感益昌小毖之謀臣叨領偏城阻趍慈陛云云慰皇太后表國謹重喪龍棺就殯禮襄大事鸞掖興懐海宇同哀山陵告備中慰恭惟皇太后陛下憂勤孔夙哀慼謹終媯汭居諸悵虞琴之已逺㑹稽咫尺望禹穴以奚追願紓既葬之悲式相維新之治臣承流有守伸慰無従云云祔廟慰皇帝表先帝之葬衣冠載虞神祐嗣王之奉宗廟丕祔皇靈昭穆用休典章備舉中慰恭惟皇帝陛下以舜大孝居商諒隂如慕如疑既畢因山之禮以享以祀載嚴升禰之恭勉承翼翼之容深抑㷀煢之感臣屬縻牧訓阻奉駿奔云云慰太皇太后表嗣王宅恤奉先祏以升宗聖母思齊感皇靈而悼往禮容有赫祀事孔明中慰恭惟夀和聖福太皇太后陛下夀考維祺儉慈為寳佑我烈祖有典則以貽子孫保予沖人修宗廟以序昭穆祔既行於永紹哀少釋於慈元臣叨綴蕃宣阻班奔走云云慰皇太后表地隔丹洲畢舉九虞之際天臨濟廟昭升七世之宗檿主思皇椒闈若惕中慰恭惟皇太后陛下性鍾慈儉徳備憂勤嬪虞帝以曰欽陟方浸邈對文王之於穆率祀惟恭願紓坤極之思益衍乾符之慶臣屬縻民牧莫效侯朝云云正旦慰皇帝表王正書月景命維新靈徳在天孝思罔極運開厯數哀動几筵中慰恭惟皇帝陛下思道奉先與時更始王受同瑁祭不替於元辰帝見羮牆禮益嚴於上日願抑居諸之感丕承擁佑之恩臣屬守偏城阻趍嚴陛云云慰太皇太后表正月始和律更太簇昊天不弔痛在思齊歴數維新宫闈孔惻中慰恭惟夀和聖福太皇太后陛下為元氣母與太極㳺孟春而戒遒人撫時其邁上日而受文祖擁治方新願寛丕子之思益重神孫之託臣屬縻宣化阻慰履端云云慰皇太后表羲日更新治開泰象虞雲浸逺悲在坤元駒隙易流烏號何及中慰共惟皇太后陛下光輔先帝敬授人時元㑹衣冠尚想熙明之政月游劒舄忍聞永紹之名願寛悼往之哀悰益撫履端之昌運臣屬縻一障阻慰三朝云云改元賀皇帝表春王㑹於三朝慶開景運皇天佑于一徳治紀初元正朔肇新乾坤有造中賀恭惟皇帝陛下春秋正始歴數在躬仰則定陵開三傳之丕祚近稽哲祖基七葉之昌期攽鳯歴以改絃衍鴻圖而卜鼎臣親逢更化適綴承流揚偉蹟鋪閎休恪共侯度撫太平應昌歴謹授人時賀太皇太后表天王一統為元載於正朔太皇萬年齊夀同御邦家日月重明乾坤更始中賀恭惟夀和聖福太皇太后陛下道符烈祖功擁神孫乾徳太平訓實承於昭憲元祐盛際政共聴於宣仁洊開更瑟之休實繫垂簾之盛臣叨承侯服丕奉慈宸基正始之風已新美化播思齊之頌永戴徽音賀皇太后表春秋以一為元歴開昌運闗睢之化正始本在慈宸正朔更新國家胥慶中賀恭惟皇太后陛下有娀長發大姒思齊齊夀以奉太皇徳惟子肖受福而于王母祐自天申宜渙號以繫年示同文而更始臣猥乘一障丕戴三宫當昌歴應休期已供侯服綏眉夀介繁祉益賛母徽歴日謝皇帝表乘龍御以紀年一元正始詔虎城而頒朔千里承休敬授人時對揚王命中謝恭惟皇帝陛下明哲作則歴數在躬欽若昊天熈春夏秋冬之績建用皇極協雨暘寒燠之疇乃誕布於成書以昭垂於新治臣蕃宣有恪播告惟恭錫厥庶民順中星而平秩佑于一徳歌化日之舒長謝太皇太后表嵗正孟陬一元改紀朝臨長樂萬國頒正春朔㑹同神人和洽中謝恭惟夀和聖福太皇太后陛下怡愉萬嵗擁佑一人肖徳而有神孫光膺昌歴受福而于王母丕輯􅀢禧載頒協律之書式重垂簾之政臣欽承鳯紀誕布伏藩聴􅀈竹之龡誕敷和氣獻蟠桃之頌益賛夀眉謝皇太后表鳯歴頒春東朝介福虎城吿朔北面承休嵗定四時天佑一徳中謝共惟皇太后陛下思齊肅穆少廣怡愉訓示塗山歴開禹子教行渭涘紀協周王春朔攸同乾坤交泰臣承流下障奉令孟陬協和萬邦第賛定時之績嚮用五福益陳曰夀之休疏夀崇節本州進功徳疏九龍吐水當摩耶産佛之辰萬嵗呼嵩上大母延年之請敬憑二氏仰賛千齡夀和聖福皇太后陛下恭願大安大榮至愉至佚慶雲五色現南極之祥光夀域八荒衍西池之長筭鈐司進功徳疏三寳曰慈南極衍太皇之福五兵不試西江陶聖化之風仗仙釋之殊因賛宫闈之丕慶夀和聖福皇太后陛下恭願位隆少廣筭等崐丘仰大慈尊誕節正同於盛旦得無量夀長生永協於先天乾㑹節本州進功徳疏聖瑞虹流開半千之休運官聨虎拜瞻尺五之清光靄玉翠之祥氛裒緇黄之妙果皇帝陛下恭願駿聲克廣龍徳方中地久天長夀命衍洪源之慶河清海晏皇圖鞏磐石之安鈐司進功徳疏天臨寳位夙開繞電之符地領玉鈐載慶呼嵩之祝謹率兵戈之屬䖍修道梵之縁皇帝陛下恭願玉燭四時金湯萬里元龜大貝梯航來川岳之珍歸馬放牛旗葢壯東南之運天瑞節本州進功徳疏飛龍在天大横有兆流虹貫月景命維新演道梵之真詮崇聖明之瑞節皇帝陛下恭願維天其右如日之升五百嵗而生已開昌歴億萬年其永益鞏皇圖鈐司進功徳疏為天下君祥書帝武祝聖人夀歡動戎昭闡二氏之真科崇千秋之誕節皇帝陛下恭願泰元有相長數申休在辛嵗曰重光方升如日以乾元正五位多歴斯年大行皇帝升遐本州進功徳疏帝棄羣臣忍傳末命教宗二氏恭薦殊因慨極烏號戀深蟻慕大行皇帝伏願游神極樂觀化太虛十四聖之在天皇靈陟降億萬年之與子丕祚綿洪鈐司進功徳疏出宫駕晚縞素興哀望闕臺孤緇黄嚴薦恭裒冥福遹相宸逰大行皇帝伏願性悟真如道超無極成慶而垂萬世聿齊九廟之靈後天而彫三光長作百神之主皇帝聖躬違和保安諸廟疏天子萬夀詎期無妄之災臣人一心共徯有神之相惟帝齡之悠久實神貺之扶持名山大川尚鑒蘋蘩之意普天率土不勝葵藿之私本州宫寺保安疏皇極九五福合率土以傾心帝夀千萬年籲慈尊昊天而請命皇帝陛下伏願寅畏享國清明在躬王受命無疆惟休誕迎和氣天行健自强不息丕享脩齡鈐司宫寺保安僧疏惟聖宅尊共祝一人之慶以臣請命敬皈三寳之慈皇帝陛下伏願歴數在躬神明其徳九五福曰夀丕享康寧億萬載齊天式臻永久道疏率土傾心均願聖人之夀籲天請命肅殫臣子之忱同前大行皇帝遺誥本州成服道疏道揚末命忍聞晏駕之音瞻仰昊天上訴遺弓之慟修崇冥果攀慕遐征大行皇帝伏願返于混元光我烈祖洋洋而在上降鑒臣民剡剡以揚靈永綏宗社僧疏捧九天之遺誥帝馭何追皈三寳之真乘臣心欲割鈐司成服道疏昊穹降割悵宸馭之上賓率土興悲望帝庭而哀籲䖍資冥福遹相仙逰大行皇帝伏願靈徳昭回皇明陟降衣冠雖邈㑹烈祖以在天宗廟如存朝百神而為主僧疏昊穹降割慟玉仗之上賓率土興哀望金仙而仰籲䖍資冥福遹相仙㳺本州成服滿散疏制嚴易月痛君父之通喪望極乘雲薦人神天之勝果典露香跼蹐釋絰悲傷大行皇帝伏願堯性常存舜明不隔成慶而垂萬世聿齊九廟之靈後天而彫三光長作百神之主鈐司成服滿散疏捧易月之制書萬邦哀痛修升遐之冥果三寳蓋明穹昊監觀喪紀有嚴孝思罔極大行皇帝伏願羮牆不逺劒舄如生帝鄉而乘白雲真㳺沖漠孫謀之注豐水遺澤深長大行皇帝本州追嚴道場疏惟新陟王悵皇靈之日逺演大乘教無上法資勝果於天㳺悼痛彌深薦嚴有俶大行皇帝伏願性超清淨沖素徳邁圓通希夷生為帝没為神豐功不泯髙配天厚配地明徳無疆鈐司追嚴道場疏皇靈沖舉莫追汗漫之㳺淨業真如真誥昭宣式薦逍遥之果終天哀痛率土慕思大行皇帝伏願陟降太虛超升無極儼橋山之劒舄云云申省狀辭免新除秘書省正字狀具位文某照㑹十月二十六日伏凖省劄十月二日三省同奉聖㫖文天祥除秘書省正字者某猥以疎賤叨被聖恩望闕瞻天莫知所措伏念某自叨親擢未歴外庸以讀書學従政之方以奉祠為書考之日方竊山林之暇敢圖臺省之登負乘非宜循牆無任伏望公朝特賜敷奏令某滿足宫觀兩考日祗被新命其於出處得宜庶幾無負聖明拔擢之意所有省劄未敢祗受除寄本州軍資庫外須至申聞者再狀具位文某照㑹於去年十月二十六日伏凖省劄十月二日三省同奉聖㫖文某除秘書省正字者某伏念一介庸賤叨竊非宜加以従仕以來未有庸歴輒具狀申控乞候宫觀兩考滿日祇被新命十二月二十九日伏凖省劄十二月九日三省同奉聖㫖不允某除已望闕謝恩擇日前來供職外須至申聞者辭免知寧國府狀具位文某照㑹伏凖尚書省劄子四月十七日二省同奉聖㫖文某差知寧國府替朱應元缺者起家超躐望闕徊徨伏念某實無他腸粗有逺志昔年憂國冒當事任之難數嵗杜門寧悔身謀之拙屬明良之胥慶念岳牧之疇庸曾謂栖遲遽叨選用惟是某省愆已至貶秩猶新雖公論至久而愈明而丹書未謂之無過儻不量於出處是自速於顛隮欲望公朝特賜敷奏收囘成命改畀叢祠使某得以讀書養親安身寡過他有驅馳之日無非報效之年所有省劄已寄留吉州軍資庫未敢祗受須至申聞者文山集巻四欽定四庫全書文山集巻五宋文天祥撰書回胡簽判請交割除寧海軍節度判官廳公事日某仰徳襟期比布之竿牘顓飭謝言兹不贅吐首祈崇炯某幸甚區區此來得忝交代意者天將開攀附之縁使之拉湊一至於此惟是天賦偏於愚戅親見聖主懇焉求言意應詔者必有中今日之故側聽逾久無能為國家陳大計者私念上悔悟勇決如此而某蒙恩至厚他人既不言則雖疎逺豈容避其責是以積忱累日冒死投匭以冀一感悟天聽出闗席藁以來首領且不自保况茍官職乎髙誼不薄猶以同寀為情連屈軒車復畀翰墨一吏至又持公文以來周旋曲折無非眷愛某感激不自勝惟如前之義則有不可孤長者之意不敏謂何某尚留此待㫖若數日後威命不下則是上憐其愚而寛宥之某當歸且念咎矣而非所敢望也所有添差簽判㕔公用某一切不曽祇受或郡府不以某為不肖他有情文則恐吏輩為欺而亦某所不與知也本須具狀申府惟身為罪人不敢自擬於屬吏之列得於畫諾之次叙其衷情則某之受賜甚厚也臨風拳拳賀吳提舉西林已未某自九月赴京師時請叩門牆蒙警䇿備至妙語天然式相行色篋笥間至今耿耿有光氣第某解舟至豐城及聞新局肇更鄰麾茂畀細讀仕隠不同轍之句則雲駛月運舟行岸移轉瞬之間已成兩様雖然此非為明公榮也纓冠褰裳世道有賴焉某來上下以鄂鄂故為之􅐓洞聞諸閫雲集而某正不多以此為不足慮獨賜教時則衡陽之事明公葢已及之而中外未之信某以十月晦至修門則聞聚毒已并流波浸漫秣陵荷擔之事葢凜凜已兩月中間新相至則又得月十日定帖耳然我之緩急往往視敵之起息為之則定帖者未可保也譬如一間屋前人放火已燒及旁舍僅僅得全宅未動卒急得一曉事人率衆拯救雖千百擔水未足以頃刻沃滅明公葢防火一大頭項也今事莫如袁吉之急袁已改畀明公而鄉里又得平林為重時有明公諸人必能一心同力以障潰堤之衝藉此無恐惟内間則病根未去履翁掣肘尚多雖言路大開而奸䛕熏注之深搢紳多不能自拔徒聞應詔投匭則學校與布衣而已世變至此可為慨嘆某不量其愚輒上書論其事區區以為宗社有故死亡亦在旦夕不若犯危一言有及於今日之難其得禍與否不計也今出闗待罪已三日而上猶未見施行未知後命如何藉天之靈祖宗之休明公之庇得全首領而以周旋於義旅之後不勝願也而不敢望也封事藁止於一本付璧弟全録以呈似其疎狂知執事不笑且憐之否共惟節鉞交錫旌旗一新誼當専狀為慶顧世變至此明公方任大責重以與上下同憂患某不敢作平世語也惟明公亮之引筆嚮風拳拳不備囘聶吉甫號心逺某比道從鳴珂幸甚獲下膺龍之拜蒙眷愛稠渥侍樽俎間者連夕感激不自勝別後凡百餘日數千里行役貿貿於一來一往之間大可取笑伏承寳墨鐫教備至今天下大勢所以削弱不支實坐於文物制度之宻區區直欲割去繚繞使内外手輕脚便如此而後可以立國書中言規模大槩所以纎悉上下其説則未也朝廷若不鄙而行之則台諭欲列置一帥如古方伯連率者又當再商量也區區之心既不足以行於國退而欲為一鄉一宗之謀正將擇險以為依集衆以為安但事勢浩大不量其綿力而欲舉之善後與否視吾所及何如某乍歸冗劇使命日亟返姑此治報何當一日㑹晤以請所未聞賀何縣尉名時字了翁某頃掲掲入國時江皋祖帳為意腆甚感激之私不自勝別後不圖世變沄沄天下大事幾去某始而駭中而疑繼而憂憤又繼而大聲疾呼以至於流涕出血相去近百日而展轉變化以至若此事變可畏矣哉某學無涵養不能謹其所發倉卒來歸求為杜門循省之計藉慶雲在上以此月七日善達鄉國甫入境側聞一同桑梓若君實庇䕃膏澤之以廉革貪以明易暗以神竒變巽懦大冠縫掖交以程吳歸焉方謀奉狀至屏下而紫氣煌煌已移照鄰次交臂相失懐此悵怏當今事㑹方殷人才不競一杞二杞國家常病之今州縣之於執事亦此類也凋瘵􅐓洞之餘雖近於不可為而開繁破劇如長才得以自見可賀也吉水之為邑得之朋友見謂官錢無定額賦無正籍是以若此其竭澤也平林以鄉人為郡念此至熟也執事軍期之暇為之定制立數求為一定之經恵幸兹邑其庶幾乎上丞相除秘書省正字辭免不允正月吉日具位文某謹再拜奉書于某官某昨䝉朝廷不以不肖授秘書省正字職事某自念非才未有庸厯輒具狀辭控既而省札降不允之㫖鈞翰重促行之命伏惟聖天子之所拔擢大丞相之所提撕徳至渥也某一介晚末跧伏深宻所知不出田里大丞相勒名鼎彛紀功太常坐於廟朝進退百官而佐天子出令下土之人求望其位貌聽其謦欬不可得也惟聞弓旌紛於阿澗束帛徧於巖野元徳碩望麟遊鳳集於省臺之上想望風采以為不圖此生獲見昇平如此詎意今者宸命收録於草茅鈞畫照耀於山谷恩光所被震悸不自持僕惟此舉不見於今世久矣夫大君宗子居天位者也宗子之家相理天職者也自一命以上所以輔賛大君彌縫家相者皆將以分奉天之責者也書曰天工人其代之又曰欽哉惟時亮天功又曰天命有徳天討有罪天叙有典天秩有禮韓愈曰天付人以賢知才能豈使自有餘而已忱畏天命而悲人窮也天命人事常判然不相侔而前言往傳動必以天為訓者人雖藐然萬物備於我茍為凡民則已大之為聖賢秀之為士天地民物孰非一已之責任重致逺皆性命之當然也由此觀之用人者非私於其人為人用者非私於其用近臣之得所為主皆所以事天也此意不明上之人操其公器大柄以自私曰吾能以富貴人下之人失其靈龜貿貿於勢利之途而不知返是以上不知以代天理物為職而無復有以貴下賤之風下不知以畏天悲人自任而無復有比之自内之義天地失位人極不立人物悖其性往往由此者多矣伏惟大丞相勲在王家意在人物方且以不滿假處功以不驕吝處才開忱布公集思廣益嘉與天下賢士大夫以為共理如僕庸愚亦得自列於兼收並蓄之下顧僕不足以稱所舉為大負而由先生此心天命之所流行國家之幸斯世之福也謙之九三勞謙君子有終吉先生之用心以之泰之九二包荒用馮河不遐遺先生之用人以之孟子曰古之人所以大過人者無他善推其所為而已矣由是而言自可比功於隆時垂號於無窮矣僕雖嵬瑣無足齒其於明時不敢自棄求所以無負上帝之衷仰承君相之恵將盡心焉某已於元日祇被新命謹別狀遵稟惟是屬有私役造闕之月日尚此遲之伏惟大丞相矜憫其情而原其後至之罪公爾忘私國爾忘家某之補報知遇將有日也下情不勝懇惻激切之至謹奉書不備通廟堂溥論承心制事某仰恃鈞慈直布心腹某昨歳四月遇先人本生母之喪以服制未定請之朝廷遂作假俟伺㫖揮後來此申未及下而某得劾某以義起禮謂先人若存則於所生母當申心喪先人既已矣則某照承重例遂承心制自謂仁之至義之盡莫如此矣未幾龍溪友議板行天下謂某當有重服匿而不行一時聞者為之疑惑後巽齋歐陽祕書守道為或問衢州曽添教鳳為詳自二先生發此精義禮意昭然大明某竊聞龍溪友議印本以萬本閩廣遐陬莫不有之既不能家至户曉須得朝廷討論墳典禮意憣之邸報著以為令使天下知孝子慈孫之用心而不至為謗者所惑是以拳拳致請乞下太常討究一畨三月末旬伏領鈞翰特䝉先生照見曲折謂其所遇在禮之變所循為禮之正且如昨者臬申巳下禮寺某以為定禮典正流俗在此舉矣四月三日忽得承受人報備至寺狀所申乃引紹興休寧縣尉蔣永吉與寳元集賢校理薛紳為證直指為某合持齊衰三年嘻其誤矣聖人制禮自有隆殺其隆殺本之人情切詳蔣永吉之祖妾直下只有蔣永吉使蔣永吉而不服則其祖妾為若敖氏之鬼矣所以為孫者須持齊衰今先人之本生母自改適劉氏之家有劉氏子孫持重服則主祀固是他姓矣是以某體先人之心則只當承心制也况蔣永吉無祖母今則某有正祖母在堂何縁可為劉母持齊衰乎劉母之子既持齊衰某又自姓文何縁兩姓俱有齊衰之服乎又詳薛紳之母既稱為祖母萬壽縣太君王氏則是嫡祖母也當時朝廷止給假三日只從孫之本服所以薛紳再申指為先人所生母謂服不可絶也故有三年之制此正是承重孫又自與蔣永吉者不同也禮官不讀書不講義不明先王隆殺之意往往只據吏人檢至故事見有父所生母四字便謂事體一般鹵莽申上更不曽子細致辨於同異之間今且未須論某所得服如何且只論先人之服先人之母改適劉氏既有劉氏子為服且先人係出繼別位又非本位之比先人只當有心制不當有齊衰明矣若先人有齊衰則某當以齊衰先人有心制則某只合承心制豈有先人本等止有心制而某乃有齊衰之服乎朝廷所行便作萬世不刋之典毫釐之間所當致辨矧禮意粲然非有嫌疑又何難辨之有某承心制已一年矣今非畏有齊衰不願承服但可惜禮官如此討論萬一誤朝廷備據行下恐國朝㑹要上又錯添一典故不免貽將來朝廷無人之誚耳今看來禮官未必解事先生揆之本心若以為某見行之禮既安徑乞從都省㸃對行萬一已照寺狀施行亦乞改命庶不悖於人心天理之正而古聖人制禮之意得行於今其於綱常豈曰小補之哉後朝命下許令承心制仍著為令道體堂書通江㕘政古心某即時甘雨共惟宫使大㕘相公先生芝山清逸珍館宴超天相有道鈞候動止多福某昨歳獲走一介詣舍人門下伏蒙鈞念勞苦有加祇服訓辭至今亹亹俯仰山林感慨年歳又若是其闊疏矣某官百年幾見一代共宗司馬居洛而相天子活百姓都人西其首而望張紫岩杜門白首而嗣皇嗟嘆用晩倚之以向中原先生今其人也上方舉元祐故事勤於夢卜旦夕爰立言人人同先生不以此覬於當世而當世以此祈於先生惟先生重愛眠食以幸世道某屏伏田野蒙賴鈞天之庇守先人墳墓幸無闕狀追惟兩年間口語横出先生進而廟堂退而江湖徳於其人如出一日傳所謂生死肉骨之情也報答已知言語抑末傾竭犬馬尚庶幾於門牆専人上狀百拜起居衮舄皇皇未遑納拜心之沄沄如此江水仰乞鈞照通潭州安撫大使江丞相某在門牆諸孫輩行中而所以蒙鈞天造就知愛綢繆獨出乎諸生之右然號為登門垂二十年而至今庭下無愈之迹古人負笈從師不間道路之逺某乃不能自拔如此殆不可對人言也兹者誠不自意先生手提玉鉞作鎮於重湖以南而某適以臬事一節奔走於賜履之内昔者詹企台階坐霄壤隔今乃得以詣大府受約束有一日斂板之便豈天殆為小子計乎某始以親老丐祠既趣㫖下再請則瀆於是姑以單車出門葢馳驅數旬又須乞便郡歸養耳某四月八日辭膝下留廬陵城中始聞先生拜乾㑹節於清江亟亟追逐牙纛度宜春醴陵間所蹉跌片雲間耳兹専布狀重謝不敏且致恭先之悃㕘謁邇只遡風距踊與李復卿長弟初赴臨安府司户日某比者吉蠲子墨祇詗涓房留連踰浹再拜答洒蒙不彼外感荷感荷兹專布區區之心璧弟不穎竊第奉常受官京兆初欲鞭䇿向上工夫故多求山林歳月以自為地事不可料欲緩得速東行且有日矣此弟雅欲致一朋友相此逺役大冠峩如大裙襜如服斯服者不少也而流俗薰蒸靈龜磨蝕區區所為例指以為迂而他求所謂不迂者抱膝長嘯寡和奈何執事氣藐餘子言根古人疇昔之日幸接光塵論議之末共為慨然其誠有得於同然者慿恃襟雅僭欲屈致崇峻以副前所期此弟天資每與義理合喪本心以求外物則自保其決無之惟是閎深博邃之學汪洋演迤之文日力方來正將從事執事與之處公餘得商略上下交闡互發他日此弟其殆非吳下蒙乎某敢不知自交際之道莫重乎其初輒拜此紙以將盟言聊資不腆別牋并致不敏萬萬控謝不逺與孫子載季弟與從弟從學某聞古者家有塾黨有庠士生其時而為師者非其家之父兄則其鄉之所與也是以不獨屑屑於言語文字之末而聖賢誠正修齊之學葢皆在所法焉小弟肩項相齊學無以大相過獨其性質之陋而未有以開通氣習之浮而未有以檢束故修業一事也進徳又一事也某於古者父兄之教既不克從事則鄉評之峻卓師範之尊嚴是於執事乎歸焉區區所以屈致之私間嘗致稟千金之諾敬聞命矣交游之道莫重乎其初禮有聘謹肅將以前并令二學生俯伏再拜以立庭下俾之有敬也與胡觀洲季從某童而習之授業解惑有所自來惟今父族母族衿佩而立受道者七人焉將同堂合席以私淑之輙恃鉗鎚之舊為此數子以北面請歳以緡錢百上之𨽻人禮有聘奉芝楮二十千明有初也吾未嘗無誨焉恵徼福於夫子謹謹奉狀伏乞台照與楊學録懋卿字景堯太學前廊某比僕僕來京師幸甚得下膺龍之拜辱賜之不鄙軫顧稠厚闗外之別江皋之餽所以致繾綣者尤甚感激不自勝第恨匆匆聚㑹不及為頃刻之情以慰滿連年契闊之雅回首天上瞻金拳拳兹有稟事朋友蕭文名來新新參之客也此企可入且身事端正無復頂冒異同之弊掲掲而來欲赴春參鄉同舍往往望白雲而歸其巋然為游學瞻仰惟執事耳其所參務本適在徳星躔次之側特來展先達之敬不揆道瀆道其至前得䝉與進稍與之温存使不致落莫區區之望也回祕書巽齋歐陽先生某因朱月窓來伏拜誨帖辱問璧弟意極拳拳近僥倖受縣一出師門玉成之造後生從政未知嚮風惟先生終教之耳金盌在質庫某處約之甚恨未能自取之乃勞先生厚費如此山林中亦無用此物先生儻乏支遣不妨更質愛用第常使可贖足矣吉甫一去連旬頗孤龍頭之約時且向熱矣奈何因便介到城伸紙行筆嚮風馳情金盌乃先生為景獻太子府教授講經徹章上賜也巽齋借而質之故先生云然道體堂書與前人某尋常於術者少所許可而江湖之人登門者日不絶彼誠求飽暖於吾徒之一言吾徒誠閔其衣食之皇皇則來者必譽是故不暇問其術之真何似也先生之於應酧也亦然今是書之作為一星士姓朱名元炳字斗南號月窓則非前者之謂是誠有取於其術矣斗南吉水文昌鄉人去吾里三十起田間談命髙妙精絶盡奄同袍試以百十命應對如流而人品之大槩皆不差異哉術也問其所得何書則當汗漫於卜數家而其末也㑹歸於李吉甫林開之説吉甫之書人多有之以其深而不能詰若林開則人未有得其本者也斗南㑹二為一而又以所得於數十家者間出而證之斯其所以獨步也某既與之訂正二書又詩之以見意其別也欲詣門下求品題某告之曰先生品題甚易至之日為先生請十數命某也如此某也如彼為先生鋪陳之即先生亹亹豈惟品題先生心肯轉相汲引即子命通矣斗南曰諾探其中欣欣然殊無憚色他人泛泛得先生増重多矣未有如斗南肯以術而取先生之知者也是書也某何為而不作事出専白故不他及與前人某前月二十八日因朱月窓來逺迓草草一帖致起居不知是日正先生到家日也後聞稍避訪客住某寺久之然恐訪者即所在相尋亦未必能盡避也某九月十三日方及門值鄉榜未掲此一月中相過者有數近數日漸漸増多來者必數百里或百里不容不少款閒居寒薄殊不能支而妄有干請者紛然多不相亮甚以為苦先生昔者於應酧亦苦之今猶苦此否嘗䝉見示毎許人作一文如置一針胷次今某畏為文詞亦類此矣習懶亦是病先生以為何如念久闊尊候亟起援筆請所以誨朋友以某逺歸間有以羊麪問勞之者某不敢私輒以一羫一石獻之庭下某昨在宣州不敢攜木𤓰宣州人不相忘近却有以此為意者知先生嘗須此為藥物謹并奉四枚一笑留頓幸甚囘劉架閣㑹孟某伏蒙専劄垂示先夫人誌銘伏讀驚愴靡已古心先生藻發清言垂光罔極慈靈有知含笑地下若此可以無媿人子矣逺日倐至栁翣載途追送傾城素車銜尾某於夫人契家子弟以故不能攀望引紼負負幽明不勝愧恨謹成些章一少紀哀愫以授挽者伏想隨車號痛涕如綆縻孝在顯揚願寛毁瘠臨紙下情凄切之至囘衢教曽鳳先生字朝陽號秀峯某數月於師門極間闊顧山水荒唐不自知年歳之運運闕禮多矣尚庶幾先生索之於形骸之外別後得二子丙寅戊戌庚戌丙子丁夘壬寅甲午丙寅命不知孰勝乍嚮風水即得三地此須具眼以為然則然向牛肉坑所結砌者今知其大謬為棄屣矣深之昨所問館成否何所固必新正詣清湖行禮亦不見訪往往泥哭則不歌之意非有他也屋見説漸就緒先生鼓舞倦矣宜作意身事悠悠何為行日可得聞否春和景明其間一造盤谷亦可遍觀先生所謂寳者更願撥剔而後來一來須十日乃可歸爾悉俟面賦此不能盡囘李宫教應革號肯堂某頃以附伯昻令姪書後未悉起居深之令弟來聞病目少寛為之喜幸日欲專价詳問飲食坐卧之節塵坌因循心甚愧之昔人云身在則有餘舉天下紛紛藉藉不如意事屛置度外專精神事醫藥靡有不濟恐吾目所受病方將驅除而又重以吾心之不寧是滋予疾也用敢於岐黄忠愛之外輒奉清心一方為獻願於大學第七章加三思焉偶璧弟有介歸就有京書達左右輒并遣前薄物將忱徒覺塵瀆臨風馳泝與朱太博埴號古平某山中相望數舍而逺乃心精微無往不通僕十年受用順境過當天道反覆咻者旁午七八月以來此血肉軀如立於砧几之上虀粉毒手直立而俟之耳僕何所得罪於人乃知剛介正潔固取危之道而僕不能變者天也僕誠不自意乃於寒舍千步外得一陂陀溪山泉石四妙畢具委曲周遭可十餘里葢其景趣兼盤谷環滁而有之而其曠逺縹緲或謂南樓劣焉騎馬囊飯朝往夕還率以為常而山外事一毫不接耳目矣僕嘗羨君家山水之勝幾欲作意植杖其間而未能也然自以為旦夕必償所願不知吾壺天可以屈公一來乎烟霞泉石此不足與俗子説處知音者自不同正恐不問主人徑造竹所余月心來拱被寳墨惡乎而不用吾情適凝祥觀蕭道士來訪其別也曰吾將造古平為之書以復命且道予懐而假道士為郵焉某比及門即拜狀聞車騎在郊外正欲嗣訊韓星忽來偉然朶雲之贈故人渠渠勞苦行役諸兒那識此意曉起入山新流没岸棊聲未盡石骨依然人生往往如此盈虛消息道體流行仁者謂仁知者謂知可超然一笑承有訪剡之約上已前後擬山行數日須主人在竹所方可乗興分沙一席已戒白鷗退避矣呼燈走筆馳意泬寥極有磊隗欲從執事傾倒一日雲山浩𣺌𣺌焉余懐忽拜羲獻帖宛然玉立之參前倚衡也垂諭前城李氏事讀之甚駭近有假為黄節幹者騙寫其家田莊鄉􅅟既見之發覺昭其迹於牆壁間矣曽鑑何人又肆無狀欺愚嚇聾一至此耶某平生所立謂何豈有退居林麓省咎敬威我自為我而青蠅紛紛每使惡聲至耳莫為而為莫致而致非命也耶勢不得不榜謹納一紙幸轉之李氏以破奸猾者之為使人日為此等救過之事不勝浩嘆某向者因及執事出處常誦伐木之詩今書所云猶若未悟稟答之次臨紙惘惘回鄧縣尉中甫某入山愈深於所尊敬嘻其闊矣前年足下以書議禮得一往復最後賜誨迄今不能報論其形跡何前之恭而後之倨歟坡云人情重往復不報生禍根后山云一詩已經年知子不我怨人之度量固有相逺執事知我宜可以無前日之事今通國識其用心由其未定而言辭之不可以已也如是自其定者而觀之輕重銖兩固皆當然言語文字幾乎閏矣昨書皆精義所發巻為一通謹而藏諸後有作者將為此興起客從巽齋來能言執事日從翁樂甚因款客坐亟亟援筆寫此悁結授客以轉之左右學之不加感慨年歳山澤雖逺尚惠一言臨風拳拳與顔縣尉復古某自春末得一夕承顔色接話言外此皆瞻仰之日追憶是數年來書筒無虛月分袂亦不太久未有如今之疏者也然私竊自解則曰此其迹為然不足深計知足下得我同然與否兹者恭承少迂蓬山之步暫為梅屋之游脂車有嚴滌篆伊邇豈勝贊慶執事自此開張清途摩拂碧落固其分也顧徼富貴利達以自致其身貴且重者崇論宏議所鄙者也不當薦是為賀惟邑於民社為最親惟少府於邑為最要平生學問藉是得以展布潘輿康寧千里迎奉調熊嗜苦式慰兹願是二事深足為年丈賀也某雅聞説者以某日戒途懐是惓惓將祖帳道周桮酒為壽屬有牽制不能來謹上狀并致薄禮以昭區區惟容頓是幸川平陸夷行者有相惟秋深殘暑未央更乞頥輔崇重以前三接九遷之寵隨軒徳輯伏想喜氣方來錫羨山則別後或有鄉邦驅䇿敢不下拜某嵗抄得承便駛遺以􅅛洒故人千里之情藹然可掬感鏤其如之何兹得嗣書於令弟來歸之便尤見崇篤喜審議論於帷幄之親出入於錢穀之㑹滿腔磊隗庶其有以自試矣來教自咎以為浸淪汨於俗吏之歸此意固超人一等孟子論仁賢而必望其有政事財用之效葢績用聲猷不可相戾本末一致焉得就此以遺彼自賢者徒以清浮為髙而無益於實然後小人得以事功自詭今日挽回君心轉移世道吾輩正不得不自力尚可以俗為尤乎伏惟尊同年其懋勉之須承刋委比於敬岩之前亦屢説項非某私於所親名徳如許區區欲自黙本心亹亹白有所不肯此老亦既有所許矣坐席未温遽為林麓之歸一場説話又付畫餅雖然長松在林利錐處囊翹翹傑傑旦夕諸公爭羅致不暇瑣瑣愛助何足為説某奉祠侍親頗於讀書有一日之樂朝市紛紜怨謗之府某雅欲退藏以逺罪咎賜教極得同然之真或政事有足為庸陋矜式毋惜刊曉一二因以具報情悃非筆可既専規嗣布與聶吉甫某於斯文契闊數年於此載酒問竒豈非夙心而相望百里離羣索居甚負此愧以其傾嚮輒私布之先人季子生二十年矣號曰學文實未知方有從弟一人同堂而習年相若而學相似也閣下沛然古作籍甚時名所欲北面而從事者衆區區欲使二子者私造化焉間者疑其不可諗之朋友故以為請不圖閣下不鄙夷而許之敢専書以聞閣下屑與之盟豈惟二子得以受教僕也不敏實嘉君子之賜援筆荒蕪臨風切切某作別近一月是一月中稍從事魏晉間歌行若不能彷彿魏晉間人不可作那復問向上非獨自歎世代亦可感念安得英妙沈著如心逺即日執手共論此事某平生斯文幸甚此數月心迹相親近方自歎解后之晩而執事即欲舍而去之奈何僕恐於主賓之禮實有未盡輒托絜矩謝過并為弭節從容之請憐其至情不曰麾之門牆豈非三生之至願俟命切切回
