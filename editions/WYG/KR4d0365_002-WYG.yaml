body:
  text: 文山集巻一欽定四庫全書文山集巻二宋文天祥撰詩文山即事宇宙風烟闊山林日月長開灘通燕尾伐石割羊腸盤谷堪居李廬山偶姓康知名縂閑事一醉棹滄浪出山日日騎馬來山中歸時明月長在地但願山人一百年一年三百餘畨醉闢山寄朱約山一笠一蓑三釣磯歸來不費買山貲洞天福地深數里石壁湍流清四時樵牧舊蹊今可馬鬼神天巧不容詩先生曽有空同約那裏江山未是竒山中即事攜壺藉草醉斜陽白鶴飛來月下雙蘆葉西風驚别浦芭蕉夜雨隔疎窻千年帝子朱簾夢一曲仙人鐵笛腔若問山翁還瘦否手持漁竹下寒江宿山中用前韻南山之隩北山陽羽扇輕風共影雙畫槳菰蒲明月笛青燈蟋蟀白雲窻半生逰子成行債一夜佳人作别腔倚釣重來此簔笠梅花十里雪空江山中滄洲棹影荻花涼欵乃一聲江水長賴有篿風堪斫膾便無花月亦飛觴山中勢已驚東晉席上人多賦晚唐何處魯羮不可飯蚤􅂸泉石入膏肓山中謾成柬劉方齋名夢桂居南湖太師公𤣥孫東風解凍出行嬉一鬨烟塵隔翠微自有溪山真樂地從來富貴是危機二三輩行惟須醉多少公卿未得歸明日主人酬一座小船旋網鱖魚肥山中載酒用蕭敬夫韻賦江漲拍拍春風滿面浮出門一笑大江流坐中狂客有醉白物外閑人惟奕秋晴抺雨粧縂西子日開雲暝一滁州忽傳十萬軍聲至如在浙江亭上逰山中立夏用坐客韻歸來泉石國日月共溪翁夏氣重淵底春光萬象中窮吟到雲黑淡飲勝裙紅一陣絃聲好人間解愠風山中和韻白扇揮殘暑青鞋踏嫩晴花床尋小隠石鼎引長鳴紗帽有時去酒壺惟意傾山僧癡與坐閑却瘦彌明山中自賦闕門外蒼松一水脩不必清髙逼巢許祗教瀟灑勝由求空花自滿三千界老樹相㸔五百秋坐有鷹揚人物在怕牽昨夢上漁舟入山即事江流風㶁㶁雲薄雨絲絲上馬忙呼繖廵簷静看棋露天厨作濘沙地水生池秉燭留前夕兹逰更絶竒山中感興三首載酒之東郊東郊草新緑一雨生江波洲渚失其足青春豈不惜行樂非所欲采芝復采芝終朝不盈匊大風從何來竒響振空谷我馬何𤣥黄息我西山麓山中有流水霜降石自出驟雨東南來消長不終日故人書問至為言北風急山深人不知塞馬誰得失挑燈看古史感淚縱横發幸生聖明時漁樵以自適桃花何夭夭楊桞何依依去年白鳥集今年黄鵠飛昔為江上潮今為山中雲江上潮有聲山中雲無情一年足自念況復百年長但存松栢心天地真茫茫山中呈聶心逺諸客誰入山來問野舟一篙花外渡深流小顰風樹蹁躚鶴淺約湍沙浩蕩鷗湖上有時思洛社人間何處不滁州徘徊才是黄昏候短笛先吹月上樓再用前韻黄葉婆娑上釣舟喚回舊夢到江流多情政自憐檣燕兩鬢終當付野鷗未説離懐向南浦須知詩意在䕫州朔風昨夜吹沙急早覺寒聲戰玉樓山中六言三首兩兩漁舟摇下雙雙紫燕飛回流水白雲芳草清風明月蒼苔鶴外竹聲簌簌座邊松影疎疎夜静不收棋局日髙猶卧紗厨風暖江鴻海燕雨晴簷鵲林鳩一段青山顔色不隨江水俱流用蕭敬夫韻庭院芭蕉碎緑隂髙山一曲寄瑶琴西風逰子萬山影明月故鄉千里心江上斷鴻隨我老天涯芳草為誰深雪中若作梅花夢約莫孤山人姓林山中烟雲開窈緲荆棘剪離披蠟屐上下齒竹枝長短詞半山江色透獨樹午隂遲世上兒孫老有人猶看棋倐忽當年遇䝉茸㡬度披水霞明晝巻草樹幻騷詞鳥過目不瞬江流意自遲世人空黑白一色看坡棋竹花黄家紫家鬬魏姚夷齊玉立青蕭蕭便是人間小天地不特水上作萍漂夜歸市橋燈火未闌珊一簇人家樹影間想把神仙爭羨我不知我正羨渠閒八月十六日見梅廣寒殿裏玉樓開那得孤山處士來半夜西風半身影夢中騎得雪驢回和蕭秋屋韻蘆花作雪照波流黄葉聲中一半秋明月嬋娟千里夢扁舟汗漫五湖逰星辰活動驚歌笑風露輕寒敵拍浮贏得年年清賞處山河全影入金甌月夜月到中天雲劃開斷橋幻出玉樓臺夜深一鶴掠舟過疑是坡仙赤壁來江行日日看山好山山山色蒼忘機鷗下早戀廐馬行忙松曉清風濕荷秋流水香短蓑吹鐵笛年嵗大江長紙帳紙帳白如雪上有坐客影一白不自由黑光蕩無定人倦影已散依然雪花瑩須臾秉燭眠相忘心目静為劉定伯索油蕨我欲登山去采薇江南秋雨正霏霏仙家解有逡巡手一筯西風落翠微山中小集江山閑勝賞萬戸不須留客醉客多事吾詩吾自酬夕風吹絳蠟春色漾黄流賔客歸來夜滁翁無此逰新年梅花枕上聴司晨起綰金章候拜親喜對慈顔看鋪鬢髪雖疎脱未如銀生日和聶吉甫五月初二日青蒲花未老黄竹笋初生細詠詩工部閑評字率更大江流日影時鳥説春榮共作千年計身謀政自輕生日和謝愛山長句松老字伯華余屏跡山間誦昌黎三星行政自多感亦何有於初度客謝愛山翩然逺來貽我長句嘘拂而繅藉之者至矣倚歌而和愧不成章寓形落落大塊間嘘吸一氣自往還桑弧未了男子事何能局促甘囚山昔年此日作初度賔客如雲劇歡舞今年避影却閉門捧觴自夀白頭母故人憶我能逺來虹光滿袖生瓊瑰一桮相屬慰岑寂使我發笑愁顔開簸揚且聴箕張口丈夫壯氣須衝斗夜闌拂劍碧花寒掘首相期出雲表生日謝朱約山和來韻元豐五年正月日洛中耆英佳話出當時韓公七十九歡噱賡酬老吟筆偉然冠劍照孔鸞鮐背鳩杖蒲輪安韓公而下文寛夫相髙以夀不以官洛塵已隨流水急雲仍相逢松下石顧我行輩真我來兼謩故事强安排約對青山共長乆醉歌要賡滁州守願隨後社著深衣闌風伏雨從是非便令攜樽西墅去山花山烏為歌舞招招瑶毋來庭闈拍手共笑偷桃兒吾山陂陀白雲滿猿鶴司我北門管紫霞隔斷雞犬聲下有琥珀滋長齡向來福地七十二此亦清髙仙地位朝逰昆侖暮空同駕風鞭霆迎我公丹厓翠壁千萬丈與公上上上上上生日山中和蕭敬夫韻山深不用結涼棚風起江蘋暑氣輕處士林泉自今古男兒弧矢付豪英客來不必籠中羽我愛無如橘裏枰一任蒼松栽十里他年猶是茯苓生與朱古平飲山中和蕭敬夫韻古平名埴字聖陶丙辰賦魁大傳倅江山自足飲千杯况有如今此客哉石室只還湖守住蘆峰曽屈晦翁來酒酣剰有詩酬唱步倦何妨車往回逰徧此山方可别北厓莫遣曉雲開所懐英英香蕙瑩朝華收拾東風作一家燕語鶯啼春又夏燈花剔盡暗窻斜山中偶成白鶴飛來牽我衣東風吹我下漁磯常年祇為青山誤直草君王一詔歸次約山賦杏花韻名花韻在午晴初雨沁臙脂臉更敷蒲驛莫妨娯刺史錦坊豈不勝中書時無艶曲臨軒縱公莫巍壇韞匵沽春老緑隂青子近東風來往一吹嘘贈南安黄梅峰清淺風流聖得知黄昏歸鶴月來時嶺頭更有髙寒處却是江南第一枝送人往湖南鴈拖秋月洞庭邊客路凄涼野菊天雲隔酒尊横北海風吹詩史落西川夜深鬼火千山雪春後鵑花一柱烟為我祝融峰上看朝暾白處禮逢仙題張景召簿尉梅墅并餞入南喚醒三影燕支魂一枝半樹専黄昏江南暗香鬱不住霜風吹入羅浮村疎枝不入輞川畫暗香不到東山棋雲階一枕梨花夢參横月落無人知和謝愛山晚吟韻日晚與客散步因誦夕陽雖好不多時之句謝愛山欣然賦之余亦率然口占以和亦一時之樂也日落未落天滄浪懸厓掛壁留餘光紫烟翠霧空迷茫颼颼度壑松風長牛背短笛吹歸忙飄飄逸興空悠揚襟懐灑落萬慮亡須臾薄暝山色藏長歌浩浩相激昻淡雲弄月微昏黄别謝愛山緑綺知音早青燈對語遲那知今雨别又重故人思山隔詩情逺雲含客思悲小樓今夜笛莫向月中吹君今拂衣去我獨枕書眠一片過林雨數聲當戸蟬情長空有恨吟苦不成篇後㑹知何日西風老鴈天和胡琴窻名目宣字徳昭買得青山貴似金瘦笻上下費沈吟花開花落相闗意雲去雲來自在心夜雨一江漁唱小秋風兩䄂客愁深夾堤密與栽楊桞剰有行人待緑隂七月十三夜用燈牌字韻凑成一詩與諸賔一笑赤壁當年賦子虛西風忽復到菰蒲蟾蜍影裏千秋鑑蟋蟀聲中七月圖詩思飄飄入雲漢歌聲隠隠動江湖萬家蕭鼓連燈火見説年來此事無病中作嵗月侵尋見二毛劍花冷落鸊鵜膏睡餘吸海龍身瘦渇裏奔雲馬骨髙百忌不容親酒具千愁那解減詩豪起來大作屠門嚼自笑我非兒女曹又二絶瞿塘隘處真重險勾漏波前又一灘世事不容輕易看翻雲覆雨等閑間病中忽悟通真理静處専尋入定工雨汗淋頭都不管須臾知氣自冲融又賦一病忽兩月蓬頭夏涉秋形羸心自壯手弱筆仍遒昨夜燈如喜今宵蝶莫愁問誰驅五瘧正與五窮謀一病四十日西風草木涼倚床腰見骨覽鏡眼留眶倦䇿吟詩杖頻燒讀易香夜深排果餌乞巧大醫王又賦病中心如故閑中事更生睡猫隨我嬾黠䑕向人鳴羽扇看棋坐黄冠扶杖行燈前翻自喜瘦得此詩清驟雨知何處一溪秋水生苦吟肩鶴瘦多病耳蟬鳴隠几惟便睡挑包正倦行山深明月夜乞我半窻清寄興逃吾病吟詩老此生風髙鴻鴈起晴乆鵓鳩鳴野樹辭秋落溪雲帶雨行晚涼便懶坐移傍竹隂清借道冠有賦病中蕭散服黄冠笑倒羣兒指為彈祕監賀君曽道士翰林蘇子亦祠官酒壺釣具有時樂茶竈筆床隨處安幸有山隂深宻處他年煉就九還丹又賦一畨潮信過時暫脱熬煎心似轆轤轉身如徽纆纒夜聴饑鼠嘯畫看伏雌眠急雨千山動應知為解弦時以草果數百枚作枕遂得汗病甚夢召至帝所獲宥覺而頓愈遂賦臥聴風雷叱天官赦小臣平生無害物不死復為人道徳門庭逺君親念慮新自憐螻蟻輩豈意動蒼旻病愈簡劉小村秋光沁人骨意氣曉來新古鼎龍團雪虛簷麈尾春商山奕棋老赤壁洞簫賔風月真倉扁招呼入屋頻倦餘心似酒病起首如蓬黄竹斷橋雨白蘋長笛風僊僊鷗屢舞咄咄鴈書空孤負秋來眼閑挑爨下桐夜坐偶成蕭蕭秋夜涼明月入我戸攬衣起中庭仰見牛與女坐乆寒露下悲風動紈素不遇王子喬此意誰與語簡琴窓雲屋竹軒諸友世情千萬變險甚劍頭炊嗜傳姑成癖登山且作癡烟霞非疾痼泉石自心馳獨喜精神健山中剰有詩用前韻留琴窻百年矛上淅萬事枕中炊病苦還思老貪嗔未若癡雲低天欲動江長岸如馳明月西風健山頭賦别詩又用韻簡李深之名道大號深齋晩尊和月吸早飯帶星炊鵬鷃從髙下螳蟬任黠癡水澄神自止雲逺意俱馳門外誰車馬故人來課詩早起偶成澹澹池光曙沈沈野色秋片雲生北舍隻鴈過南樓有見皆成趣無言縂是愁芭蕉夜來水嚥罷自搔頭又用韻江山如有意天地可無秋夜月馮驩鋏西風王粲樓露蛩令我喜烟草為誰愁且醉桮中物相看尚黑頭曉起夢破風烟逈衾寒不自由鐘聲到枕曙月影入簾秋鴈過江山老蛩吟草樹愁整冠人共笑兩月不梳頭逺寺鳴金鐸疏窻試寳熏秋聲江一片曙影月三分倦鶴行黄葉癡猿坐白雲道人無一事抱膝看回文夜坐淡烟楓葉路細雨蓼花時宿鴈半江畫寒蛩四壁詩少年成老大吾道付逶遲終有劍心在聞雞坐欲馳和朱松坡學醫未至大醫王笑殺年年折臂傷屏裏江山如出色亭皋松菊已成行細㕘不語禪三昧静對無弦琴一張多謝嶺頭詩寄我滿園梅意弄春光陳貫道摘坡詩如寄以自號達者之流也為賦浩浩歌一首浩浩歌人生如寄可奈何春秋去來傳鴻燕朝暮出沒奔羲娥青絲冉冉上霜雪百年歘若彈指過封侯未必勝𤓰圃青門老子聊婆娑江湖流浪何不可亦曽力士為脫靴清風明月不用買何處不是安樂窩鶴脛豈長鳬豈短䕫足非少蚿非多浩浩歌人生如寄可奈何不能髙飛與逺舉天荒地老縣網羅到頭北邙一抔土萬事