便郡歸養獲忝交承臨發賦詩湘水千里傾葢年華晚行人早發湘白雲虹浪小明月燕花香南浦春何急巴山雨正長祝君加一飯我意為桐鄉贈周東卿畫魚觀君瀟湘圖起我濠上心短褐波濤舊秋雨􅀢蒲深某叨臬衡湘䝉恩以便郡歸養肯齋大卿實寓衡我十年前邦君也一再見間即分南北五言啟之所以致今舊雨之繾綣云李肯齋名芾瀟湘一夜雨湖水十年雲相見皆成老重逢便作分嗁鵑春浩蕩回鴈曉殷勤江闊人方健月明思對君幕客載酒舟中即席序别故人滿江海逰子下瀟湘夢載月千里意行雲一方櫓聲人語小岸影客心長總是浮萍迹飛花莫近檣用韻謝諸客和章傳鼓發船去我秦君向湘持螯思太白占鵲問東方世味秋雲薄交情江水長相期天路曉陣馬度風檣湘潭道中贈丁碧眼相士自詭衡山道士孫至今句法有軒轅世人未見題堯廟盡把昌黎作寓言收拾衡雲作羽衣便如屈子逺逰歸離騷忘却題天柱為立斜陽問翠微咸淳甲戌第二朔予道儲洲里徐畋方諫自長沙來為别問客㡬何曰半年矣臨别為賦君為湘水燕我作衡陽鴈鴈去燕方留白雲草迷岸和衡守宋安序送行詩并序某將指㒺功叨符便養初聮寅誼近依清燕之香末忝交盟親授朱提之印冠葢一時之盛事縉紳百世之深情别集殷勤歌詞鄭重夢回雲舍深懐萱草之詩思乏雪車謾和梅花之賦瞻言作逺覽擲為榮玉立湘西第一州丹梯小為嶽雲留東風城郭人行樂春日旌旗公出逰便趂綈香摩碧漢莫嫌繡影挽清流兩君相見衣冠好記取兒孫好話頭方共衡雲把酒魁春風吹向鬱孤臺鴈將回處驚帆落花未開時怯笛催别草可堪逰子去寄梅應為故人來臨行笑覔疑香譜十駕那追逸驥材贈萍鄉道士道士觀行人半似重相見古云性相近性豈不如面萬形本一世萬心方一殊世固難絶聖亦恐難絶愚白髭行憶昔守宣時白上一根髮去之四五年一化為七八今年客衡湘黑髭已多黄衆黄忽一白驚見如陵陽白髪已為常白髭何足恠歳月不可歇雪霜日長大世人競染緇厭之固足嗤誰服蘆菔湯避老亦奚為少老如春秋造物以為儔吾方樂吾天樂天故不憂將母赴贑道西昌重來鷗閣曉帆影漲新晴倚檻雲來去閉簾花送迎江湖春汗漫歳月老峥嶸手把忘憂草夔夔繞太清快閣遇雨觀瀾一笑登臨晚江流接太虛自慚雲出岫争訝雨隨車慷慨十闈桞周回千里魚故園隄好在夜夢繞吾廬題鬱孤臺城郭春聲闊樓臺晝影遲並天浮雪界葢海出雲旗風雨十年夢江湖萬里思倚闌時北顧空翠濕朝曦子題鬱孤泉筦五湖翁姚濂為之和翁官滿歸里因韻䞇别并謝前辱巢龜君住好涌翠我來遲夜雨呼三韭春風試一旗飛花行客夢芳草故人思何日五湖上同看浴海曦用韻謝前人兹逰良解后吾道未逶遲斗埜横雙劍牛津直兩旗北風應小住明日便相思輸與君家近扶桑五色曦翠玉樓晩雨晩樓一曲轉梅花官事無多報放衙林木蔽虧烟斷續江流曲折雨横斜年華冉冉風前影歳莫悠悠客裏家一鴈近從沙背落更饒片雪入天涯翠玉樓觀雪矯矯臨清泚濛濛認翠微綈春生客袖鐵冷上戎衣桞眼驚何老梅花覺半肥新來有公事白戰破重圍翠玉樓和胡端逸韻客影魚千里年華桞十圍白雲棲石密黄鵠出烟微江海秋風老湖山晩日暉鬱孤臺上望野闊犢初肥翠玉樓昏鴉何處落野渡少人行黄葉聲在地青山影入城江湖行客夢風雨故鄉情試問南來信梅花三兩英合江樓天上名鶉尾人間説虎頭春風千萬岫秋水兩三洲客晩驚黄葉官閑笑白鷗雙江日東下我欲賦扁舟西楚驚鴻晚東淮落木秋蒸相今石鼓句宛古宣州白日聊清賞青山縂舊逰不知滄海水何處接天流皂葢樓一水樓臺繞半空圖畫開蝸涎行薜荔雀影上莓苔碧落人千載青山酒一桮晚烟看不盡待月却歸來石樓曉色重簾捲春聲疊鼓催長垣連草樹逺水照樓臺八境烟濃淡六街人往來平安消息好看到嶺頭梅馬祖巖曽將飛錫破苔㾗一片雲根鎻洞門山外人家山下路石頭心事付無言禪闗秋風吹日上禪闗路入松花第一彎只願四時烟霧少滿樓城閣見青山吸江絶壁千尋俯雪潭春花秋草自䰐鬖當年誤著蒲團坐惹得人稱馬祖巖塵外半山風雨截江城未脱人間縂是塵中夜起看衣上月青天如水露華新雲端半空夭矯起層臺傳道劉安車馬來山上自晴山下雨倚闌平立看風雷清江何漢英再見於空同讀歐陽先生詩感慨為賦采芝雲滿山采檗瀑垂澗當年有清徽為寄南來鴈鴈去人已逝歳月剨云晏流水失聲音西河老憂患往日志士悲窮途行子慣君為梁宋逰我復江漢䆠十年耿相逢千里欠一盼𤣥機寄糟粕美疢墮芻豢贈子歸東方聊薦呉興莧送曽倅巖山官滿歸里名大發贑倅春陵光霽落蒼苔葛水神仙立翠槐萬里雲霞騏驥路三年風月鳯皇臺興同老子復不淺歌曰先生歸去來庾嶺梅花開漸徧一枝就與寄蓬萊和前人賦别翠松三萬頃松雪著神仙桞院催金鑰江花送玉鞭曉巖雲壁立晩棹浪規圓未了醉翁事重尋潁上田當年童子見今見二毛翁海月三秋别江雲一日同鷗心馳舍北龍尾曵天東定有延和奏南來寄一通贈明脈蕭信叔枚乗擅七發郭玉明四難微言起沈痼此道今漫漫云何東海生而乃緒真要砉然以神遇契彼鏡經妙我欲炊彫胡俯鑿菊水泉夀被方輿人六氣何由諐贈林碧鑑相士咸陽宫中四尺鏡照人五臓何烱烱桑田滄海千餘年百鍊依然化為鑛君從何處得此物鑄就雙瞳敵秋月向來照心今照形不事瀾翻三寸舌逺衝風雪肯我過看來猶未深知我我方蓑笠立釣磯萬事浮雲都勘破噫嘻吁只今神目鬼眼紛道途暗中許負應盧胡試問何如林家老碧鑑不知天津橋上復有龍鍾無送吉州陳守解任美人䇿良馬爼節螺江湄歳年忽晼晩桃李已成蹊遥遥一水間漫漫東與西晴川夾修楊行舟何能維朱鳳翔海山層漢揚音徽髙岡有梧桐駕言覽朝暉贈君以白雲白雲不我持贈君以明月明月不我攜白雲與明月逺道相追隨贈蜀醫鍾正甫炎皇覽衆草異種多西州為君望岷峨使我雙淚流向來秦越人朝落夕邯鄲子持鵲經來自西亦徂南江南有羈羽豈不懐故營何當同皇風六氣和且平改題萬安縣凝祥觀古道松花空翠香風前鬢影照滄浪飛泉半壁朝雲濕啼鳥滿山春日長須信神仙元有國不知蠻觸是何鄉道人横笛招歸鶴坐到斜暉上壁璫相如逰獵賦華櫰壁璫注壁璫以玉為椽頭西昌倪氏有山谷書杜陵山水圖障歌作江山堂堂廢其後人以黄書求題䟦感慨一絶杜二已無黄九去長歌大字落江山百年風物今何似春水晩烟飛白鷴山中再次胡徳昭韻不將顔色汙黄金落得灞橋驢上吟是處江山生酒興滿天風雪得梅心觥籌堂裏春聲沸燈火林皋夜色深人世可能行樂耳重逰不用卜隂晴人生桞絮鬬堅牢過眼春光歎伯勞蜀道謾傳千古險廬山方許一人髙眼前見赤徒妨道耳後生風未當豪明月蘆花隨處有扁舟自在不須篙曽見尊前此客哉笑攜麈尾拂莓苔水邊飛鴈年年見湖上新亭日日來酹菊醉餘披草坐探梅吟罷帶花回北厓尚被剛風隔笑殺匆匆馬上桮山中泛舟觴客便作乗槎客蕭蕭骨髮清尊前山月過笛裏水風生半夜魚龍沸未秋河漢明雪堂眠二客夢與白鷗盟病中作六月廿四夜人間熱欲炊病懐如酒困倦睫似書癡夢與千年接心隨萬里馳客來相問訊寄語有新詩山中即事山中方雨笠天外忽晴絲夕釣江登練春行路布棋乾坤供俯仰歳月任差池有酒如澠在何妨日問竒挽㢲齋先生歐陽大著徘徊西河上月落衆星稀哲人萎中道雨絶將安之昔者麗鴻藻玉振舍清暉名理軼晉魏雅言襲軻思連駕勤馳道並坐侍端闈及門懐燕婉升堂接逶迤方期黄鵠闕忽作朝露晞黔婁不葢體延陵有遺悲層阿翳寒樹平楚曖希微惟荒衣廣桞縞冠涕如縻水從章江去雲遶楚山飛已矣如有聞斯文不在兹送劉其發入蜀秋風凄已寒蜀道阻且長虎狼伏原野欲濟川無梁客從何處來云我之西方蕭蕭驌驦鳴熠熠湛盧光昔時榮華地今為争戰塲將軍揚天戈壯士發戎行江南有羈鳥悠悠懐故鄉駕雲與子逰雲天何芒芒周蒼厓入吾山作圖詩贈之三生石上結因縁袍笏横斜學米顛漁父㡬忘山下路仙人時訪嶺頭船烏猨白鶴無根樹淡月疎星一線天為我醉呼添濛澒倦來平卧看雲烟題羅次説竹巖摘藁㳺子西南來出門道何悠文章㑹有用意氣輕身謀紛紛食粱肉藜藿當其憂君看百川水何處不東流挽劉知縣名元髙字仲山實齋之子玉海淵源懿金閨步武髙功名千載意翰墨一時豪天馬含風滑秋鷹折羽毛相逢俱白髮流涕濕征舠文山集巻二欽定四庫全書文山集巻三宋文天祥撰對䇿御試䇿一道臣恭惟皇帝陛下處常之久當泰之交以二帝三王之道會諸心將三紀于此矣臣等鼓舞於鳶飛魚躍之天皆道體流行中之一物不自意得旅進于陛下之庭而陛下且嘉之論道道之不行也久矣陛下之言及此天地神人之福也然臣所未解者今日已當道久化成之時道洽政治之候而方歉焉有志勤道逺之疑豈望道而未之見耶臣請泝太極動靜之根推聖神功化之驗就以聖問中不息一語為陛下勉幸陛下試垂聽焉臣聞天地與道同一不息聖人之心與天地同一不息上下四方之宇往古來今之宙其間百千萬變之消息盈虛百千萬事之轉移闔闢何莫非道所謂道者一不息而已矣道之隠於渾淪藏於未琱未琢之天當是時無極太極之體也自太極分而陰陽則陰陽不息道亦不息陰陽散而五行則五行不息道亦不息自五行又散而為人心之仁義禮智剛柔善惡則乾道成男坤道成女穹壤間生生化化之不息而道亦與之相為不息然則道一不息天地亦一不息天地之不息固道之不息者為之聖人出而為天地立心為生民立命為往聖繼絶學為萬世開太平亦不過以一不息之心充之充之而修身治人此一不息也充之而致知以至齊家治國平天下此一不息也充之而自精神心術以至於禮樂刑政亦此一不息也自有三墳五典以來以至於太平六典之世帝之所以帝王之所以王皆自其一念之不息者始秦漢以降而道始離非道之離也知道者之鮮也雖然其間英君誼辟固有號為稍稍知道矣而又沮於行道之不力知務徳化矣而不能不尼之以黄老知施仁義矣而不能不遏之以多欲知四年行仁矣而不能不畫之以近效上下二三千年間牽補過時架漏度日母怪夫駁乎無以議為也獨惟我朝式克至于今日休陛下傳列聖之心以㑹藝祖之心㑹藝祖之心以叅帝王之心㕘天地之心三十三年間臣知陛下不貳以二不叅以三茫乎天運窅爾神化此心之天混兮闢兮其無窮也然臨御浸久持循浸熟而筭計見效猶未有以大快聖心者上而天變不能以盡無下而民生不能以盡遂人才士習之未甚純國計兵力之未甚充以至盜賊兵戈之警所以貽宵旰之憂者尤所不免然則行道者始無驗也邪臣則以為道非無驗之物也道之功化甚深也而不可以為迂道之證效甚遲也而不可以為速維天之命於穆不已天地之所以為天地也文徳之純純亦不已聖人之所以為聖人也為治顧力行何如耳焉有行道於嵗月之暫而遽責其驗之為迂且逺邪臣之所望於陛下者法天地之不息而已姑以近事言則責躬之言方發而陰雨旋霽是天變未嘗不以道而弭也賑飢之典方舉而都民歡呼是民生未嘗不以道而安也論辯建明之詔一頒而人才士習稍稍渾厚招填條具之㫖一下而國計兵力稍稍充實安吉慶元之小獲維揚瀘水之雋功無非憂勤於道之明驗也然以道之極功論之則此淺效耳速效耳指淺效速效而遽以為道之極功則漢唐諸君之用心是也陛下行帝而帝行王而上而肯襲漢唐事邪此臣所以贊陛下之不息也陛下儻自其不息者而充之則與陰陽同其化與五行同其運與乾坤生生化化之理同其無窮雖充而為三紀之風移俗易可也雖充而為四十年圄空刑措可也雖充而為百年徳洽於天下可也雖充而為卜世過厯億萬年敬天之休可也豈止如聖問八者之事可徐就理而已哉臣謹昧死上愚對臣伏讀聖䇿曰
