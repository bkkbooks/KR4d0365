front:
  text: 王國智某歳前作稟字輒致松栽之請專夫十餘虬孫載道一日塞破吾屋即乗天時遍布滿山矣異時車馬相過山神欣然迎拜必曰此吾東道主云擾甚布答膚率別作謝狀
  hash: sha256:4a2690e7cc53287544a678c5571eddba420f7efce3badd715201537d772cf9ac
