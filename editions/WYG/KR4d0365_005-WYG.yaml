  - {type: page-break, offset: 24, content: '', id: KR4d0365_WYG_005-26a, image: WYG1184/WYG1184-0468a.png}
body:
  text: 與劉司户三異號古桂某自別不獲奉起居忽聞小爽調攝昨見當風輒睡不禁生冷嘗憂其必爾看來衛生之書誠不可忽也心逺云來時及拜問已幸勿藥極以為喜暑天將理正未易某欲助數藥而不知當用何品謾遣芝楮百千為意且宜深自愛䕶候其可出見訪未為晚也南史正本遂可得否便中謾得介意為荷詗候草草他規嗣布與胡端逸自別後日在山間搜竒剔怪得二所曰閎微曰上下四方之宇幽閒曠邈超偉軒張其竒又在中磯兩峰之間之上君再來足以抵掌大笑翠晚又改曰浮嵐暖翠釣雪改曰六月雪特立改曰至大至剛以直我非好怪地適足以當之君謂如何新昌弟一介至門館穀之議諧矣專人導其來庭下請君􅊩盟江南春小天和景明山靈川后畢獻萬狀欣然有應接佳客之意不逺二百里杖屨容與乎其間不亦可乎凌遽信筆未究欲言與黄主簿景登名瀛某輒有所請鄉州有俊傑士曰胡君名天牖端逸其字也十年前學校定交意其旦夕獵獵乗青雲而上尚遲決科葢其命然心甚敬且念之來山中聚首半月且留度重陽問其館穀則未有所嚮也此君有能賦聲於應用更髙好自修飭不為流俗足下若與處日從三益豈曰小補之哉其家事自好而嚴君主之端逸歳得百千上下則從人泰然矣萬一賔廡無虛席則明年君創員以料理之多費以取友美徳也端逸留山中若蒙雅報見及相其受幣而歸是所至願與劉正伯知瑞州日某江滸分攜流光如駛毎荒城雲合笛韻沈沈吾故人之思未嘗不往來於懐也秃筆鉗書曽無暇晷東風順翼乃有飛箋如之何不喜執事垂光虹蜺濯髪雲漢少須暇之駕秋濤而湘春錦矣燒尾光芒薦靈角尺山中猿鶴先侈光榮某癡事未了誤渥徴行三辭弗俞㫖且俟代持其觚落不敏者如之何而任劇哉託愛宿昔不同他人何以教之因風馳泝某久不交訊坐積尊仰忽䝉専价恵報寇事桑梓驚動南望惻然正具復間得鄉里信來乃聞十六日破王山次日破新安吾鄉必不免矣財物所未論屋廬所未論不知一鄉人命是時得脱與否未有嗣音為之哽咽已作書控倉使乞兵𠞰滅某即日交臬事當以滅寇為第一事毋慮尊公朝議近况想安適謹附拜一忱郎君新功日富次者且聯翩而上矣可慶可慶草草修染媿甚膚帥回鍾叔玉三帖某杜門避影久矣出山一事不到夢寐間聞命誤節湘羅笑人方循牆丐祠以安半菽倘拜俞音春晝花隂猿鶴飽卧亦五雲之宻䕃也衮褒渠渠餼禮郁郁固不敢當亦不得不拜草此稟酧尚規裔謝某昨承令嗣於京相過眉目森秀真可喜也承以至徳觀牌為諭便筆偶已染就今謹封納切希視至伏拜寳翰寵有臺餽塗抹無羊之詩珍重來牟之意我之懐矣我之懐矣親戚往來本無所不可受獨其名曰前日嘗為某事也若然敢不重拜以辭吾黨相與誼如一家緩急相赴情之所有而足言謝哉非曰不恭其所操挾如此薄言稟報未既由衷仰幾台亮與隆興黎節判立武探花某自大名震盪以來吾江西一佛出世引領願拜實不知前此固嘗坐下風而揖餘光也去年汗漫一出道過清疊解后捧檄歸省江皋草草相見道舊恍然驚喜過望至洪甚恨匆匆郵亭晤語外無從嗣集蹤跡展轉重見黄花所思天一方令人回首某恃氣類之同輒以士薦漕闈新貢元劉君子俊吾鄉清淑之英也所居門巷相接文學卓然可稱逺器今年以登仕得舉士者以為晩旦夕詣星臺下謂一世龍門以未執鞭為恥敢告賔榮許其漫刺見所未見劉君歸可以語人矣西雨南雲臨筆馳泝與劉民章子俊某自湘花別後其人如玉夜夢見之名網猶兔罝然不足以得横天之翼毎為咄咄三歎空同上得書乃知猶為修門客何留滯周南之甚耶詩云京洛多風塵素衣化為緇又云棲鳥戀舊林池魚思故淵青山屋上流水屋下歸來自有樂地乃欲以外物之盈虛為面顔之有無為執事者左計也乗興而返萬里足下可以逺道為諉乎某昨報舍弟令贊千騎之歸為奉薄贐想已稟達歸哉歸哉臨紙引領文山集巻五欽定四庫全書文山集巻六宋文天祥撰書與梅制幹自去年滄浪使者歸米氏真帖又三四往往多從景明便鴈來也洞門窈深雲山千里騎黄鵠跨白鶴恨不得一日共君其間風雅比興韶鈞交作長軸大册一再寄意而不倦鬼神閟吾山數千百年今而後衣被雲錦草木澤澤光價益倍章之三十二詩四時朝暮之變皆有其象獨以一詩當一境則有不相似者混萬顆珠璣作一片圖畫而江山無異辭矣謹頓首謝頓首謝子秀別三年漸成六考通籍金閨止爭浮圖一穎近書謂赴吏部銓將取一闕人豪如此猶落骰子選豈非朋友之責哉歳月易老功業宜壯早改官去即仗麾建節無滯碍男兒事庶幾哉某當年間亦大參差江西代者激為波濤使人彈指剥剥賴君之庇天日皦然今可以適吾山水之陶陶矣比詩云日日騎馬來山中歸時明月長在地但願山人一百年一年三百餘畨醉君念我悉度欲知我近况不敢不白某惓惓故人之意豈一飯而忘顧數百日内不能専一价附書殷郵又不敢信以是契闊詹仰充塞懐抱而未有以發也李彪請假歸道出琵琶亭下率然伸紙意之所至不擇言語臨書神爽飛動與杜教授抑之字伯揚號帶溪崇仁人李梅亭髙第辱早春第一帖逺佩意真毎一念吾弟輒思老成吾弟一出幸無他微執事教訓何以臻此不知菖蒲前後書琴得至山中否近來心思稍清頗得専意研討亦時不廢吟向嘗令吾弟訪問南史正本與晩唐百家詩想亦可得如未也執事試致意焉古桂留館中日得誦習毛詩因知求選於選止可為選之子孫求選於三百五篇則選之兄弟可進也相見當為執事傾倒之偶遣一价信筆布露馳泝雲表回謝教授愛山四帖雖塊坐深山於時髙人韻士鼎鐺獨無耳乎載酒問竒道之云逺徒有是心而未之能也不圖五鹽道院屈居仙客階蘭砌玉與亭芝相照映毎思吾仲取友必端未嘗不自歎獨學之陋手書寵貽清揚流動雖未見猶既見矣何時簮盍慰此忡惙臨風馳報書不盡言寒簷積雨抖擻無悰得書而讀之昏眼為拭某落落白雲間一疇春緑自飯吾犢浮世榮辱事付之山外褒借所蒙君言過矣然醴露醲郁波及溝㫁企瑞芝而遐眺佩金蘭之永好也美人一方書琴自適為誦停雲三過日於仲氏便价得書振衣快讀恍焉眉宇之迫吾睫可人不來蒼苔滿徑得無忘把酒看山時約耶西風逼人桂香浮動天池鯤化摶扶摇而上之捨愛山其誰屬魁巻紙一幅納之文房衣被琳琅騰翥光景楮生輩亦將侈其逢矣薄言占復掛一漏萬山中度日如年落葉蕭蕭凉月墮砌起視寥泬安得知已握手長吟寫胸中之耿耿以相慰藉耶杪秋餘熱猶壯二豎者雖相戲而不吾虐予亦縱其所為倉扁輩未嘗屑屑然也久之不覺脱然去體是又不治之治有勝於劑餌者寵貽手札問勞渠渠故道其所以然而以復於執事與廬陵劉知縣庭薦采山釣水飲食於大夫之境三年于兹門無公事得至於百里之室幾於魚游江湖而忘江湖矣伏諗解印西歸揚舟東下昔者河陽之李今兹南國之棠諸父兄子弟服習長者教訓恨不留鎮此土雖然此一縣之望也縣私土子人無所不治是中都索包總有相道焉行矣僕將大其所觀某山深閉門杳無城郭信風傳令尹新舊之交未及馳慶乃承手書顓走告別江頭折栁奈何不敏為之慚對將命四壁空寒一無可為載月助者知心天逺解后何年詹泝風㠶江空𣺌𣺌與廬陵李知縣訦孫某邑人也聞令尹之來不能隨父兄子弟迓千騎於郊外敢自訟以書惟髙明察之某兹審承命九天涖封百里初條甫下闔境爭驩諒為慶愜某官氣宇鴻明風猷駿厲脩程步武空萬馬以無前清水鋒鋩解千牛而不頓吾廬陵號壯哉縣詞訟雖繁而詩書之家衆版籍雖廣而期㑹之事省約之以清淨揵之以平易以公之才恢乎有餘地矣㑹成美錦遄趣温綸某骯髒一世之沈浮人也所占籍處在治所之南三舍而逺雞豚可千户民淳俗厚僕也相忘於漁樵而今而後其得一㕓之託矣僕實何者首辱箋函以此事當路之尊貴則有矣區區何足以當之輒裁箋賀上并鍾鼎大名歸璧涓吏伏楮巻巻與廬陵陳知縣堯舉昨歳京華天作解后毎念晏公在陳歐公在潁二宋二蘇千里往訪竟日從容以某不才受知場屋且二十年良覿乃僅如此視子瞻子京諸公不知何地著愧匆匆汰去過荷逺將一目江空暮雲如水渭濱之首寧為他人回哉兹者伏審肅持鳳檢出宰螺山車馬實來旄倪胥舞伏惟驩慶先生聞多而學廣事熟而心精筆力千鈞捕龍蛇而搏虎豹雲衢萬仞騎麒麟而翳鳳凰未秣馬於天津乃著鞭於雷邑竹松林裏不妨編簡之尋桃李蹊邊細數枝柯之長小紆盤錯便起扶摇某閉門山中傳來邸報忽覩先生為吾邦一來古人重師友至有塗竄片言隻字以冀萬分益者鳴絃千室中有老門生在焉知公不能用其恝然矣惟素性疎孏無城市蹤跡謹避聲利不沽借於公私自今以往隂陽和風雨時曉猿夜鶴左花右竹吾君吾相之恩亦吾座主之恵也剽聞前茅在郊謹具劄子候迎臨風馳往回樂安唐知縣元齡深山中俯仰漁釣久闊時箋使者忽來計一往一返殆幾千里君之厚我感無有極他人作縣驚惴若不可以一日先生為之優游政聲洋洋乎盈耳難易殊絶葢必有為之本者旦夕細滿綸綍在道璧弟以斯文受知僥倖通政書來謂注邑當在春季繼此望洋方新尚賴教誨庶幾自淑刊曉寺記微奬予不及此惟平生於浮屠無所見非敢有所攘闢於其家數全不曽從事耳恃愛直布尚寛方命之誅嘉貺頓拜薄物非所以為報臨風悚仄回劉運使應龍號實齋比承一介使人陟我山麓問外自梅外來執事恵綏一日之好其與人也重以周則既感激所蒙致其多謝之私矣未數日從驛吏取近報伏審升班西閣移節南昌提封不隔於故家父老相誇於盛事仰惟慶愜某官揚休山立玉潤金相方其為御史也風采所撼聞者凜栗及其將指於楚越也滿腔惻隠人所不滿之處入麄入細之規模可以槩見歸來麟閣還本等地位已竊遲之西江涸鮒延首福星誰為朕行㺯印未決公未至闕下就道相屬亦曰此公鄉里煩公歳月又將出少府節召公歸矣某嚮者得節亦曰鄉部後來召篤數月而不休嘗試思之近年如宏翁矩翁未嘗不漕本路而二老之所以鎮壓羣動者年徳位望自是過人而持斧之役旁午豪譁又非計使比也今執事繼二老芳躅仁聲賢聞之著於人久矣萬無不及惟有過之此所以宜賀而僕之所以亟拜此書也前茅出嶺聞已多日勢必馳上巽書歸鈞山以俟命上方屬意賢英亟疾其驅恵我江國臨書不勝瞻依之至宏翁包宏齋名恢矩翁曽矩堂名穎茂耕釣山澤飯疏飲水不自知歳年之運運也使者維何云自南浦飛雲五朶居然下之寒谷隂崖冰霜積沍春風不擇地而至有如此者某官天和睟穆地望髙清夜占天文福星直斗牛之分薄蓬萊厭承明為桑梓此來鈞山之下雲霧濆薄油霖甘露流注乎大江之西部人歡呼吾父吾母帝曰勞止歸遂相予僕何幸身親見之某山人也其於當路厥有等威不敢屑屑竿牘致歳時之敬謙尊而光禮出倒置徳盛仁熟悚然稽首落霞孤鶩水天茫茫既不克傴僂請拜棨㦸之下心之精微寄此函尺永言歸嚮江流知之與袁守雷侍郎宜中號省身某前年赴宣州道滕王閣下望山川英氣稽首人物欲擁篲造門而舟車異趣僅能拜書問花竹平安而已亡何蹤跡展轉不遑嗣音歸卧蒼苔益以疎闊其戀戀門牆之心固如水之必東也某比者伏閱邸報竊審小紆紫槖近擁銀符吏竦旌旗人傳襦袴共惟驩慶欽以某官抱經濟之祕稱磊落之豪青天白日鳳凰百年美瑞髙山深林龍虎一代傑魁上方寤寐仄席圖致太平甘泉舊臣不當越在逺服名藩歇馬姑曰起家徑執事樞旦夕有詔某庚午一出殊與戊辰相似去住匆匆取笑當世杜門深念益求寡過未知所以稱塞於知己之道君子不棄尚恵教之某久聞紫馬赴鎮空山不能専介申賀適逢過客輒寫其私以自附於大厦燕雀之後相望一方馳泝切切與中書祭酒知贑州翁丹山名合晨起冠帶輸寫積誠世俗竿牘曽是足為有道者言惟髙明索之形骸之外某青原白鷺書生耳童子何知乍習句讀凡先生之精神意氣粲然於言語文字公之天下以淑後學某皆嘗得以朝斯夕斯焉衣被遺餘曽不自意早以名知於人有我師焉生同吾世驅馳四方乃不得解后某日夜興起謂當何時而後得免於常人也流年堂堂實勞我心共惟某官孕光岳之精㕘天地之運大忠大雅萊公文正之心不倚不偏伊洛考亭之學斯文落落上帝恵顧天門夜下龍虎章授公以柄轇轕璇璣經緯星辰公從兩制稍發蓄積然後坐之廟堂為天子興建禮樂洗千載房杜之陋太平之期適當今日某退歸以來有泉石十里足以為適浮空變態日過其前飯疏飲水自求吾志竊伏思念空同鬱孤如在屋角平生悁結云如之何輒因此時以姓名通之門下一言終身尚庶幾焉圜丘慶成上方親事少府出節必以公歸迎拜東帆螺江之滸以其時可矣山斗髙明臨風切切某伏自空同玉節順江而東獲從中流迎候鷁首雄文鉅册間想象變化如髙山深林龍虎不測不圖解后遂拜堂堂風流雲散一別如雨金聲玉色夢寐以之自先生振衣登朝手提文印以照四海國家誥令典册燁然先秦西漢之上學校之士莫不從風興起彬彬郁郁爭自磨濯以正法眼作大宗師世無歐陽不當在弟子之列某知稽首矣主上尊徳樂道師用賢哲論思獻納日聞正言孔孟不得用於周光禹竟無益於漢才與誠合學與位偶儒者之遇未有榮於此時者也大學之功用至治之福澤何幸身親見之某疏脱之蹤分安山澤起家誤渥忽畀龍藩聞命彷徨莫知所自如聞天上聲光假借非一意若可與從事斯文者自古聖賢之佐英豪之輔莫不垂意人物薦進拔擢燮天功經人極罔不在此共惟盛心卓犖度越流俗而某則非其人也夜瞻紫微徒有頓首脩門懸隔久曠音題屬請事祠官冒馳一介輒鳴忡惙未即趍摳願言玉持金䕶為世道自力臨風切切賀翁丹山兼憲某熟視一世靡然風塵刀筆何從縱横旁午架漏於士民之上而世之言人材者率如是而已安得結輩落落參錯布滿天下使萬物吐氣僕嘗擊節於斯言悠悠空山誰與語此兹者喜審肅將繡節通涖銀符山川不改於空同風采一新於江右共惟某官淵源接乎諸老氣槩聞於當時人物𦕈然真中流之巨屏文章偉甚稱南渡之當家輩行諸公鈞樞十九夜半一札趣歸蓬萊以其時則晩矣上方式敬由獄乃眷西顧非有志念不足以洗􅁈澤物非有力量不足以懲暴詰奸故予環之寧遲而乗傳之若屑太平之責正在方來以公歸兮政枋焉往某碌碌不如人獨有愚戅不能改其素追記前年冒乗君子之器他不足道惟奸宄豪横稍稍鋤擊淺之為日月雖未得盡行吾志庶幾無失職之恨人情卑淺憚繩檢而樂姑息矧猶未免鄉人譁訛朋興以要其得罪於小人也果矣伏惟先生昨者不賜鄙夷心聲往來藹然氣類之意某誠不知何日得以執鞭下風勿覩除綸心目開朗我輩從事俗吏奪氣豈獨為一道賀實足自壯謹専人上狀頓稽庭下少伸門牆燕雀之悃蘋藻薄羞別紙惴悚賀江東憲方逢辰號蛟峯某當公在螭坳時嘗奉一紙書至于閣下書上未幾而公歸蛟峰矣譬諸草木臭味實同詹望雲山臨風切切某兹者恭審升撰秘丘宣威直指西臺與政葢嘗識潁濵之文東路洗寃亦以行濂溪之志六絲初駕一佛懽傳共惟某官色正而芒寒揚休而山立言語妙天下材稱一代之竒出處重本朝望在諸公之右自夾侍玉皇香案等而上之胡不均𢎞俾執事樞國家重更迭之制江湖一節煩公驅馳式敬由獄以長我王國公所學在此歸哉歸哉中詔在道某山林之下靜觀世故其於君子進退安得不致其巻巻芝山父老迎擁星軺以時考之可矣輒馳一介自附於門下燕雀江水東西心期天逺臨紙欲飛賀前人除江西漕某束書歸隠有釣遊之所曰盤中兩山對峙間以小溪日步溪上極目滔汩輒自以為晝夜不舍此溪水㑹有達鍾陵時而某塊守漁樵則曽此水不若耳昨孟君陞從畨昜遣介來嘗為書附申起居相望千里亦不知上徹果何如時也某兹者伏審班仍寳殿節峻冰臺貫索沈沈方轉芝山之曉使星冉冉又回南浦之春一水東西二天今昔伏惟歡慶欽以某官寒芒五緯絶岸孤峰生漢子陵之鄉雲山一日派唐處士之譜風雅百年雖已跨海而望蓬萊猶肯濡絲而諏原隰濓溪道脈雙井詩香流馬木牛既無媿於千古落霞孤鶩應可對於二公所謂旂常特吾懐䄂某硉兀抱虛真無所用於世曩六轡使江之左毎依餘光以自映帶今也一畝之宫環堵之室囿徳宇而處自兹以往夜月如水猿鶴不驚田夫芸子各適所適則何啻如天之福郵傳所至不勝燕雀私情即日謹奉書為賀臨風馳泝回許秘丞自號果齋某火龍之歳從集英門綴行而出風流雲散回首參差不自意去年待罪闕下獲接英游心事流行日星垂而河漢流也湖隂送客風露滿衣移語崇朝英槩亹亹歸去來山中至今夜夢見之新昌小弟夙被奬知嘗寮之情終始一日伻來遞示五雲光怪照室此豈四海九州無情人耶鄉風九頓首尊年丈山立時行日光玉潔長樂鼓鐘西清帷幄終當著身風日不到處轇轕雲漢經緯星辰為天下開文明太平之運某被服光潤實與有焉某既還里閈入山讀書杳不知山外事天上故人重相顧念適逢便武輒謝所䝉餘祈為斯文珍重慰此引領賀倪提舉普號警齋某寄跡提封某水某丘童子所釣遊君侯實照臨之報政將一年矣某猶未能以民禮見自盤谷西南而望城郭在焉相對五雲輒移時不能去某兹審宸綍鼎來庾臺肇建讀皇甫記已蘇今日之疲民傳紫陽心又舉向來之荒政風行新令雷動歡聲欽以某官神驅五兵才入八面作真御史以直道而事君稱明監司行本心而澤物公來青原父母其人屬時常平㺯印六服牧伯無以踰公者西江涸轍久煩公拯活嵗月少府出節中詔又冉冉出建章矣某自聽除綸即欲自附於門下燕雀側聞雅志引卻甚真上方倚賢者以共理烏乎能從臺治一新境内為動某甫及拂紙行墨以贊東注之盛嘻其晏矣世俗所以事尊貴以鱗畨從事公有道人也某不敢出此臨風飛動與新知太平州趙月山名曰起集英殿修撰川人某去年待罪闕下幸甚得一再交書幅中獨樂近在吳門入秋正擬專介候猿鶴起居㑹去國不果黄强立自竹所來相見於六和塔下逺蒙寄聲多謝故人厚意自是而入山愈深杜門掃軌無復南來鴈足矣璧弟學製新昌新年見告二月遣人詣門牆通問輒寄所思寫之竹筒既行伏覩除目欣審仍班内撰領𣙜東藩一札起家千乗載道共惟驩慶執事青天白日之質望之知為正人千兵萬馬之胸識者推為豪傑六合悠悠風埃滿目所謂江左管夷吾公其人也偃薄起伏如神龍天馬不可羈牛渚天門一瞬萬里亦足以發其中之所存矣天下事方有賴於公時來為之孰之能禦某夙昔荷相知出人一等以此不敢自菲薄一別十年浮雲進退何足為達者道而學不加長每每自憐久不見叔度鄙吝固宜自今得聞一言三日後刮目未知於吳下蒙何如也偶遇新昌便意其介尚或未行輒附賀狀并寫戀嫪萬分之一相望泬寥臨紙馳泝某風雪殘年中使者以餽嵗至嘗草草拜狀竟未知果達籖房與否過年百二十日是間何限傾倒毛穎輩不任事姑寄一歎比審放纜長江休鞍盤谷執事自宦遊以來敭厯中外垂三十年曽無一日得從五畝花竹之樂金山鷗鷺甫此尋盟如負者之息其肩行者之休於樹一時瀟灑比軒冕束縛瞠乎逺矣浮雲滿山任其往來太虛真體皦然萬古某歸來兩年處積毁震撼之餘差幸天者之小定自有溪山足以逰釣漫不問其他有詩云日日騎馬來山中歸時明月長在地但願山人一百年一年三百餘畨醉欲知近况此其凢矣念人間清福莫如一閒幸而吾二人皆可以自適獨相去遼絶無從合并江東暮雲長長在眼輒專人奉問潭府居處之槩即辰夏氣方深共惟靜養淳和坐消熱惱神明䕶持式衍方來川至之福臨紙耿耿與知言州江提舉萬頃號古崖某兩年乎山中春猿秋鶴木食澗飲葢頹然世味之外者五雲繽紛麾節夾招摇厯勾陳而下青原白鷺浩有生意某甫與溪倪谷耄額手蒙幸乃大化驅之出束書就道修民禮公堂下俎豆春風簫韶夜月籍之以詩書禮樂之光多矣明公以洞庭五老之胸時雨一路曽未數月春旗霜艘風采軒豁所謂動摇山岳細事耳少須暇之棣萼棠隂先後醲郁夢寐五采衣被八紘持國弟兄盛事再見大江以西之父老子弟豈得以私我公哉某自解維江滸風濤回薄抵昭亭下是為子月丙寅大壊積枵觸手病敗雖日夜爬梳㑹肯綮然肓豎浸淫非匕劑可藥肘後寵靈公不我靳則宣殆庶幾乎惟故山松菊沐浴瑞露而隴蜀之望復切切微疇昔不至此某日墮倥傯神馳棨㦸甫奉陟釐則已魯皋籍獨不愧於心乎嵗將新矣願言滿頌盤椒對揚綈絿此豈無委嚴立下風某伏蒙公劄下問勸分仰見豈弟父母救民水火之盛心某實與邦人額手大賜某所居里凡千餘家常年家中散米一日不收錢諸大家以次接續賑糶可及三十日隔日一糶可當兩月此方儘可無飢他時不待勸率自是舉行明年係緊要年分或須使榜一申嚴之至期却當取稟但四竟委有可憂葢吾州從來以早稻充民食以晩稻充官租今年晩稻半虧顆粒並是入官之數早稻不過二三分則是民食十減七八此其所以皇皇也近見多有趍龍泉永新運糴者覺彼二處米亦有限縣大夫各私其土不肯透泄亦其不得已者此須使司示以意嚮使之斟酌放行庶彼此可以均濟最急莫如通贑州之米近同年李守恵書自謂年穀中熟米價日低某嘗答書云廬陵一歉異於常年田里憔悴不堪舉目惟章貢素無糴事而得嵗又偏鄉人顛頓者往往相率而趍治國民食闗係茍可通融兼愛秦晉公之恵也葢贑浮橋泄米之令素嚴田吉號産米而贑多山少田故為贑計不容旁及鄰郡今嵗事既相反又當通變此須古崖一書與李守通情俟得其要領然後大榜境内許人赴贑收糴此亦權宜之一䇿也區區管見姑復仁明後有利便又須陸續申控某自聞琴鶴言歸即戒笋車擬送別於吉水新淦間初十日始得初八日申時寳翰則知去期甚速始意不可得遂即抖擻作詩馳諸使艎意必可相及僕自城還則知解維已三日臨風悵惋如失廬陵四竟皇皇流離入贑過吾鄉者無虛日豈弟父母久拂衣去之細民嗷嗷皆謂曷不留我公撫我妻兒婦女一無異辭此即公諭在人心不可磨滅處吾輩仕宦得如此即無愧漢循吏傳浮雲得喪何足較也某念受㕓兩年當使君之行不得往送詩又不達歉負為如何亟函元詩并拜此紙從新昌璧弟處借一兵走詣潭府不知紫氣在芝山或在廬山邪引筆馳泝之至大丞相古心老師某不敢容易上問鈞履丐為轉道詹依巻巻賀知吉州黄提舉器之名鏞某宻依使天冰雪深山與猿鶴卧送流年繙故牘於左泉右石間非賜邪每飯牛頃必矯首畫㦸下兹審郡揚帝璽節畀天囷千里光華一道鼓舞伏惟驩抃欽惟某官眼空四海胸著千年振代直聲鼓雷霆而潤風雨鎮浮定力載華嶽而繫星辰衣冠紫槖之神仙氣類青原之忠節旌麾一頓草木交輝地私二千石之陽和天薄十一州之福澤璀璨六絲之遣礌硠五袴之歌即賜召環遂髙聽履某受㕓幸矣公朝念其久廢誤節湘行顛倒綉衣不堪重著陳情丐祠以安菽水之奉尚徼均𢎞俞音旦夕下俾得醉泉飽蕨水之北山之南地主之賜也於馳賀之次仰布其私干瀆峻清臨楮悚悚與前人某日者釋耒山中僕僕湘役走公堂修民禮且申假道之敬蒙主進吏位之堂上再三祖帳殷勤臺餽絡繹視㕓氓且絶等至於開心見誠憂愛亹亹一洗世俗崖岸某鄙吝久矣微大雅無以發此意殆未許諸兒覺也小隊出郊追送作逺自違森㦸雲樹渺然連日欲作書道歸戀之槩征塵在衣筆硯為廢偶宿分宜七里殘日入户輒寫綢繆風濤滔滔􅄔緯忘食金䕶玉持世道將有嘉賴歸鴈草草尚謀裔襞賀楊提刑允恭號髙峯某昔者望七十二峯於洞庭之南以為嵩恒岱華類不可易見五峯三市之近皇華臨之遂得以相望下風未見猶既見矣迺今使㠶凌空泝贑石而上僕家去大江濵可四十里天其予之以一日迎見之便慰此平生云胡不喜某兹者伏審庾政告功刑臺建節褰帷而問風俗猶昔四封持斧而行東南于今三命旌旗初動約束一新仰惟某官識透萬微才當八面陽道州撫字之政所謂吏師元刺史參錯之竒可布天下天子以公篤於倫紀使得以便綵衣堂上之奉乃眷西顧如此江水一節常平二節綉斧式敬由獄以長我王國平反一笑庶其在此公歸廟朝即典風化一家仁一國興仁尚觀大學之顯效某杜門掃軌知事常後忽里巷父老驩傳明使者將至伏􅌴之駑躍躍鉦鼓往事如夢不足細陳某所深自幸賀者三間風雨託諸提封小人有母繼自今得安於其子之養是則君子錫類之賜服之無斁堂堂在目即聽匪伊輒以書先精神孤往與吉州繆知府元徳某昔侍同朝自詭相好兹不得又以繁縟為疏逺惟公勿深訝某行吟孤嶼回首吳山烟雨中書郵來往時從泓穎敘尊仰汰歸深宻姓字不到雲霞外分正如此非於名門有所簡也階符在望徒有稽首某兹者伏審朱轓春動紫馬星移民樂耕桑簡靜方安於晉國州稱富庶勤强更屬於張公兩地送迎二天今昔恭惟驩慶欽以某官霜明月湛玉潔冰清端嚴有大臣風澄不清而撓不濁循良入漢吏傳寛有㫁而愛有威小停櫂於天津頻合符於江國嵗之不易民胡以生將甦青社之飢遂易淮陽之卧竟上爭杜衍雖去住之良難席前問賈生恐傳呼之已迅自天子所以我公歸某茅屋三間在萬山深處借書沽酒外一毫不以為公私撓獨蒔松百畝日騎牛叩角其間天恵仁侯自此吏不打門犬不夜吠猿號鶴嘯各適其適則某受賜多矣候迎之初不勝依倚謹具劄子自陳燕雀之私何當嗣狀某屛居一㕓耳目塗塞忽蒙公牘録示省札竊諗朝廷為李祕丞諸公有請特發諸項椿積賑我廬陵而賢太守敬共其事日夜講行之仰惟施仁發政朝廷甚盛恵也救灾恤患鄉曲諸公甚盛舉也承流宣化切切然惟恐一夫不被其澤君侯甚盛心也某嘉與鄉邦父老人士同一贊歎伏承不鄙特有下問以某之庸愚不足及此細玩諸公所陳如隨縣闊狹分撥米數如發糶之直只依元糴價錢皆㫖揮之所已許而使府已遵而行之甚善至於户口之多寡編排之虛實此則各都各保之事所在都保委有奸欺然物之不齊物之情也若以太守屑屑為此計較恐末流必至多事此惟當嚴責之八縣宰宰若親民若其以實思及人為意必能周思熟慮以求稱塞明指傳所謂心誠求之雖不中不逺是也一縣各有一縣風俗一鄉各有一鄉事凡諸宰申請惟各從其便不患寡而患不均彼必自能斟酌通融而為之説惟吾行所無事自然所濟不細但縣之於郡往往勢分隔絶若專靠公文行移必有展轉遲滯之患若使府明諭諸宰此事今作一項措置不比公事常程每縣各給以數紫袋置循環厯其中使諸宰有所申明只於厯中絡繹稟請從書表司徑達君侯隨手應答如回朋友書信使為宰者得依時稟承其中便減吏奸八九分且閭里細微得常達於黄堂之前物來事至無不曲當是則布宣徳意之一大捷法也某不當出位僭越承問不敢不對或者千慮一得惟君侯矜其愚而勿罪之某繼此若有管見馮恃寛貰又得稟陳回吉州西倅竇檢閲全器某昨嵗待罪闕下明公騎鸞驂鳳下我青原相望寥廓不能以時刷翎振喙從燕雀來不圖天孫雲錦飛墮几格金聲玉色㕘前倚衡固不以既見未見為間然也某官歛嶽翠以為神氣巻湘水以為波瀾駕蓮葉而味玉書仙芳纚纚搴芙蓉而㺯斗柄道運堂堂長樂鼓鐘西清帷幄轇轕星辰經緯雲漢固其分也風月神螺小此盤礴緑綈方底王曰遄歸某旦旦為斯文屬目昨承使者之來即從脩門作意馳謝㑹匆匆去國出處殊科歸卧悠悠書尺盡廢光隂不堪把玩嵗年如許念厚意久不報矍然薰沐祇對主書耕釣一㕓五風在上臨風詹泝之至回江州李都承與號南窓闗西人某頃風颿回薄自湖入江目穿髙牙恨臂不羽一棹從湓浦來五雲絢爛照映清越對桑落而飲故人之酒擊中流而聞夜覺之雞至今使人意氣激昻借力下風飽我蒲腹乃以丙寅視篆茇舍下塵埃抖擻末繇面謝軍將扣門斜封三道突入眼角臺餽便蕃綈袍之私何以持報共惟某官闗洛耆俊韓范聲名㕘井鉞旗聯寳奎之錯落江淮草木被玉節之昭回吟嘯庾樓梅花噴薄老熊當道貉子不敢越一步夷猶岸幘蠡管莫涯方面詠不敢辭圭錫以須勒此堂堂燕然石在某漫浪出山落身枵瓠問官官靡問吏吏荒而民氣則憒憒未醒絲棼莫理如之何其淑後也明公恵念疇昔肘後丹訣其肯為某愛邪臨風切切亟拂吏坌具酬潦約嵗晩寒驕願言金玉體府壽此宗廟社稷之身宣豈無骫骳者三肅以請某去年在宣州一江上下幸甚數數相聞然所甚恨者過湖口時不能轉江西四十里拜屏下共登琵琶亭以庶幾英豪之下風也未幾召去又未幾汰歸一出一處為天下笑知心千里外當亦謂何某比者伏審晉承宻㫖升直淵圖詔璽申褒鋒車交趣共惟驩慶某官闗西遺老江表偉人﨑嶇諸葛之兵間氣吞河渭偃蹇元規之坐處目盡江淮天方祚宋襄戍解嚴公歸本朝坐帷幄老成謀國處置得宜使姦雄伐謀兵端不開將社稷實受其福某􅄔緯小心一飯三禱屏伏深山幸不見棄於君子専使逺來持書問勞將意孔厚猿鶴為驚區區心拜髙誼而杜門齪齪未知所以為報也九江未除人想當宁急賢應不俟代某嘉與海内延頸大用倘得衣被餘光遂為太平幸民公賜大矣江空如許執筆茫然相望一方精神馳往回潘檢閲某伏以嵗華晼晩春事權輿共惟某官鏤玉晶熒凝旒簡注神之相之台候動止萬福某濃熏鵲尾酬敬腆施曩從集英殿門吾榜得人以執事重海臺沙合雲月相輝至今斗牛猶有光氣顧山林僻左繫鴈悠悠天際碧雲明發不寐千里眉目忽照宛陵為之跫然以喜欽以某官歛崑崙以為神氣捲溟渤以為波濤玉質金相宛乎無自眩之色泉清松茂浩然有難進之風乃今紬石室之祕藏為籕書而出色視周六典作宋一經南豐以史學稱進裁大典安定非他人比宜在經筵某鶴夢正臞起廢出坎循牆弗獲被命於征郡枵然虛真山凋水瘵處也敏手爬梳猶懼不蔇况不穎之尤者乎不規而頌非所敢望於同年也稟酬崖約寧不嗣音願言努力明徳對揚王休有昭亭委戒其敢不肅回鍾編校堯俞字君俞號方岩某曉汲凍清以贄萬一之謝首干穹勺某兩年山中風月晃朗望太乙光氣九霄吾書無翰不能時一飛到梅花月影忽疑是君而米家第二帖至矣施稠報眇自省歃如尊執事以黼黻雲漢之胸試金玉典墳之手駕輕就重拾級升髙此逢掖之至榮而搢紳之交羨曽子固晉裁大典為史學優胡康闕宜在經筵非他人比某鶴夢正寒大化驅之出自湖涉江風㠶回薄四十程乃抵宣山凋水瘵眇兮愁予敏手爬梳猶懼不蔇况不穎之尤者乎髙明局外之見何以教之滿硯冰澌濡毫如帚尚規嗣音以寫繾綣回吳制帥華號恕齋某林慚澗愧貿貿此來幸甚在玉節照臨之末九華山下蹉跌望塵拜手雙魚分隔雲漢敢圖下士盛心超越昭代襄報鄭重閟位貌於不有方驚喜未定間五雲寵靈自玉麟堂翩然賁之所施所䝉非敵已以下所可得道徳之味流注翰墨使人之意也消恕齋先生允文允武之才有體有用之學以王謝之衣冠而接風流於江左以朱程之講貫而窺閫奥於魯東顧今吏道便熟袂帷成雲崇詩書而抑刀筆坐俎豆而行甲兵鐡壁東南公其天人也耶經制西事當在朝廷錫命師中不如歸衮某敢誦所聞某生也晩於一世封胡羯未之勝幸甚皆得下拜而於恕齋識獨早眷尤厚癸亥之望神皋戊辰之陪紫又其後來事也今則以列郡而事崇垣何敢仰綴宿昔食芹之美豈無是心非所得僭詎謂臺餽駢羅光照下國自上而施之足以為徳某敢不三肅使人恭承嘉貺若夫以往復為禮則誼之所不敢出也謹三熏三沐祇酧主書干瀆清嚴臨風愧悚回宣州洪倅某馳想芝山屹立如鸞坡鳳閣代有英妙不自意天恵宛陵朱紱斯皇乃肯共堂下探梅清致亭亭雲月邀我敬山不後不先未有如斯之巧者也伏惟執事日光玉潔之襟繩直凖平之度車堅御良之材真所謂喬木百圍秀色干霄望清都太微之垣維尺有咫課丹峴緹屏之最當階而升胡尚綰於緋魚來同看於黄鶴意者康沂之歌愈出愈偉有相之道實畀之以藥石枵然郡政之闕者乎思昔潁水霄立其間而正獻以賢行佐理至今談者猶橋舌不下某於鄉之典刑無能為役而吾執事則真其人也前茅在道旗旄舒舒願疾其驅降此未見至於乗珠委貺鄭甚於先施覺光氣烱烱衝貫斗牛矣懼弗敢當亟鍾鼎而歸於瑶華之側區區甫此滌篆排冗占酧崖畧是恧文山集巻六欽定四庫全書文山集巻七宋文天祥撰書回吳直閣履齋之子某少之時聞東南二石筍玉立九霄陵陽蒼蒼實為緑野午橋佳處鸞鶴神清縹緲何許老成逺矣尚有典型仰惟某官揚休山立之韻日光玉潔之襟文獻堂堂代有英妙未既見只神爽一方某卧青原山中驅馳良倦上恩俾郡越在鳴珂循走彷徨連符趣赴不量此來未知所以淑後喬木婆娑五雲絢畫尚祈薤誨俾就玉成某逺奉瑶音緘貺駢錦先施倒置曽是為容既什襲巾衍輒鐘鼎以歸太乙之府望履非遥臨風毣毣與游提刑汶某以良月之望舉棹東下江空見底乃章貢源頭諸水怒長未幾光燄五朶與空同雲俱來往颿順風航波瀾之澎湃灑石鐘之清越寵靈張王迄抵雙溪子月丙寅俯祇賤役瓣香西望敬謝所蒙明公巻其十二峯之神氣軒軒磊磊照耀東南以宰相才學宰相事天下久望其為家氊出色轡絲周道肯復倭遲恵露瀼瀼江之民幸矣如溥寰何㑹有温綸四輩馳下某不善為斵得郡復枵至之日視官官靡視吏吏荒民氣憒憒如也爬剔棼絲顧氣力所至終覺五技易窮肘後神竒不敢以望之他人惟故山松菊衣被綵雲亦已過數矧兹隴蜀徼恵未涯微疇昔不及此相望二千里外明月此心懇懇側釐掛一漏萬惟青陽將動綈緑光華式金式玉以副前禱此豈無骫辱戒為榮與趙知郡孟藡號菊山某頃從南浦亭邊抖擻般函道所蒙荷且矯首於太乙之府穹林宴坐縹緲絳霄江塗漫漫勞我宵栩執事以玉雪界之精神臨睨八極朝閬風夕𤣥圃識者猶竊遲之錦衣照道紫淦横舟蕩漾栁風嘘吸竹露澗阿樂矣如顒顒望嵗者何建章夜半尺一堂堂畫省紅雲著公髙處惟日望之某不善為斵得郡復枵以子月丙寅視篆昭亭下視官官靡視吏吏荒洗垢爬痒亦曰視吾氣力所至然山凋水瘵非刀圭可療肘後神竒恵徼大福某不敢以望他人也焚㽔瀹雪西鄉奉書以謝以祈鼎珍履絇願言金䕶玉持對揚王休臨風悁結賀前人得盱守某昨在宣州拜書亡何客攜琳琅來京師欣浣如對匆匆去國不成報襄歸里以來杜門深念又無從嗣音為謝徒有清夢夜遶金峯忽讀邸狀欣審丹鳳揚綸銀菟擁鎮八百國封爵莫如同姓之親二千石起家共讚惟良之牧先聲載道闔竟為春伏深歡抃欽以某官景緯光華仙潢清潤淮南桂樹了無貴介之風李白桃園綽有神仙之韻軒陛宜當於三錫轅和肯涖於十同睠惟東盱實介南服紅泉碧澗髣髴丹丘白玉紫烟參差綉陌聊商羊於朱紱供衎燕於清香大宗維翰价人維藩丕動袴􅃭之喜九卿執羔三公執璧言觀衮舄之歸某辱在眷知助喜百倍既不能振翎刷喙從燕雀來謹奉書寄便申慶迓兵當已在道不知開藩涓卜何日某尚當屢賀不一賀臨風馳泝與趙監丞淇號平逺某乃嵗之秋緹騎來山中嶽翠蒼寒琳琅照映章不成報内有欿然寧不嗣音僻左之以世道如許風起雲飛中夜人物之思為此耿耿上念井絡丹詔起家峽月棧雲先聲浩蕩葢有望木牛流馬再立武侯之事業又壁窺萬一意必與南山洎予秀諸公上下雲龍共此光明俊偉之舉縮手袖間臨睨天半此其大本領大經綸政不易涯之野水横舟蒼虬縹緲山君川后日有疏附即日恭惟台候萬福某漁隈半席自分小休誤渥自天俾尋庾謝舊盟意此是抆拭笭箵之陋耳三辟弗可乃以陽月之望束書出山涉重湖越大江整整四十日抵戍以是月丙寅祇賤事凋城敗屋枵然大瓠耳搔首踟蹰望洋氣縮維宣距鄴僅隔一雲東望熏香奉尺書候起處恵徼藥石立我沈痼梅花晴昊拄笏神馳慰前人某昔讀檀弓文子之喪既除喪而後越人來弔其居使之然也伏惟先太傅大丞相冀國公之喪既有日矣地不千里不能往弔一介奉禮今也而後能來死罪死罪嗚呼皇天祚宋國有元老數百年宗社之靈長千萬里風寒之險要蛟龍在淵虎豹在山屹然長城為此突兀天乎不使憗遺遽奪之去主上震悼傾動朝野伏想生平翹館之英俊舊日麾下之將士與夫二邊之百姓四塞之英豪見碑而淚望城而悲者不能已已矧夫家門之竒禍父子之至情攀擗奈何嗚呼痛哉某生也晩當公佩天下安危分不得勇往執鞭今而追恨則已無及獨念袖有瓣香歸依平生亦既不克為公壽惟有為天下慟哭敢西望靈輀揮淚百拜而獻之公而可作尚其我許嗚呼悲哉親喪所自盡也抑先王制禮之意是有節文士君子為孝之道在於顯揚伏惟執事重致意焉即日孝履支持某頓首奉狀起居臨紙哽塞回安福趙宰與􅼭號勿齋某追記疇昔同到蓬萊慈恩之題杏園之宴吾以故不與焉然同年之情豈以四海九州為藐然哉王孫乃龍種世有籋雲鱗今不遡紫清上岧嶤顧得百里之地而君之簾隂晝寂千室鳴絃實鄰吾父母國人誦子産今其時乎某私獨念今天下豈有可為之縣縣不可為而可為者人如君者以可而臨不可於是知材具之超常流百倍矣長書下貽􅂱然春華溜若清風與我之厚昭仞至情多言不足以殫謝意也某守郡無補誤渥為郎縮縮循牆行且歸里當觀棠隂以與邦人共談政化之媺亟推吏塵具報記室揆諸來施不敏流汗比一馬二僮日在泉石深處聞山外塵埃亦頗作惡坐對浮雲亦開口笑不自已耳君解墨綬去意紅光紫氣冉冉帝側乃猶廬陵客琅畫至前矍然起仰黄柑紅柚二美并貺杏苑論情我之懐矣冬江霜涸萬里安流目送征鴻知有順㠶天際如駛伏楮拳拳中書不中書復字蕪纇併希錫察回寧國交代孟兵部之縉某去國之前一二日宣州弛征之命下某既為桐鄉百姓頓足起舞即拜書望雙谿疊障為賢主人賀吾輩讀書臨民正為今日行志凡此者各盡其分固非相與為賜也既汰斥歸里即閉門不與人事山巔水涯翛然獨往而使者忽持五雲來君子之有情於人也既勞問之將以厚禮復申其綢繆焉某誠不自知其何以得此也宣人歌舞賢侯之徳教冠冕像設祝廣成千二百年令公二十四考葢人心之天也某何人斯偶以一日出位言語乃得因見大夫以自附於去思之義某徳微以堪回首碧落山川鬼神猶有餘愧宣敗壊至矣弛之則期㑹散繩之則撫字虧公折回蟻封從容不迫期年而變古語不誣方今論選表無出潁川右者曷不均𢎞俾執事樞某一飯三禱使者之歸也謹東望重柭身心致敬陵峯堂下有日延見父老尚願道山林不忘之私與其所以不敢當之意進之惟命退之惟命某臨書不勝拳拳回寧
