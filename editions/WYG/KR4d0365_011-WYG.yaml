body:
  text: 行實先君子革齋先生事實先君子諱儀字士表生嘉定乙亥八月二十四日寳祐丙辰五月二十八日歿于京次年九月九日封于鄉之佛原嗚呼天乎仁者夀有徳者禄先君子乃止是耶不肖孤上累先君子久於旅飲膳醫藥失節用速禍非天實不徳有惡子至此釁戻丘淵身百莫贖柴骨藥心不自意偷視息至今日得黽勉圖大事猶瀝血苫塊以字先徳嗚呼尚忍言之先君子嘗考次譜系文氏繇成都徙吉五世祖炳然居承和鎮髙祖正中繇永和徙富川曾祖利民妣郭氏祖安世妣劉氏考時用妣鄒氏繼母劉氏世有吉徳鄉以君子長者稱一是方寸留耕于子子孫孫先君子嘗言滯學守故化學來新以一革字志韋佩人皆稱革齋性愛竹依竹闢一室傍竹居或稱竹居不肖孤聞之諸父先君子幼穎慧器質端重進止如有尺寸書經目輒曉大義越時舉全文不一遺見鄉曲前輩必肅容請益暨長天才逸發志聞道嗜書如飴終日忘飲飱夜擎燈密室至丙丁或達旦黎明挾册簷立認蠅字不敢抗聲愕寐者人雖苦之甘焉蕃書山如經史子集皆手自標序無一紊朱黄勘㸃纎屑促密靡不到至天文地理醫卜等書游騖殆徧手録積帙以百揮汗呵凍弗斁鈎引貫穿舉大包小各有條間質難疑剖析響應某事出某書某巻且指數以對為文發持滿無不的中機軸必已出命意時娓娓談他事若莽於尋繹一㧞筆雲行水流無凝滯中年文氣益老拾汗漫歸諸約不峭峭刺目有温醇渾厚之風焉閒居侃侃春意溢出顔面蚤事祖盡敬祖母優游暮齒視藥膳卧興扶持華髪鍾愛父嚴母慈侍夙夜省煥寒一出忱意不視顔色為肅愉事繼母篤至始終無纎芥間一家氣象藹如和風鄉黨稱孝於宗族厚待季父削藩町悲忻同情季父歿不幸子病廢經紀其家撫幼姪等已子䟽從遺孤振翼之俾䝉於成闢居居無居者歲時衣粒各有節度嘗謂宗族一本誼不得不恤愛范文正義田記規模次第曰吾得志當放此行之親婣孤貧者哀矜勞苦撫字無遺力䘮不克理辦之棺至已所服用捐以斂雖在疏末次序情文各惟其稱與人交好大體不為細家廹速户外屨皆滿絶甘分少無疏宻皆被和氣交誼天至聞貧困患難赴急如不及忱意感人有臨終握手欷歔流涕託之以孤者歲大比凢與大夫待博士選者皆有約首誼綿數科間不能與自捐貲籍其名暨充賦就奉為助約所不及以意告傾已有為行資至貸以應誼聲錚然對人氣語和易鄙夫寡人亦曲加體接無一失聲氣去里有蹈非彛悉忠愛援誼開陳聞者感動見後進片善奬予不容口孜孜誘掖如子弟給􅀈數畝畊者多不輸寧令負已不忍直於有司蒔園漁池相傚無一償亦不較間嗤不武則曰彼貧且殆吾奈何攟之有竊負其貲去既而困還不惟不加責恤其人終身將作室絫木齋垣時癘死多露骼惻然曰吾可無居人不可無斂匠棺恵貧者歲賑飢隨所有不給至市粟以應顛連無告過目輒怵惕隨力為誼一日讀書至晏子敝車羸馬事愀然曰使吾族吾親吾鄉人休休有餘至願也惜嗟再三家居門䕃茂木暇日相羊芳陰間惟嗜茶煎瀹多手出時邀朋遊文字語移日樂極浩歌縱奕視世間融融沄沄漠不介胷次性凱樂惟恐咈人事經然諾雖不利於已不悔一言語願盡肺腑無留藏應酬一切任真事不可直濟或道以詭御寧事不濟不為耻已勝語及不卑辭和氣舒無忤色有以欺心至知其私不發且無章於人欺者多愧悔感泣人皆嘆為有徳君子謂當於古人中求之誄者曰我公之徳言矩行規世智黄間我心坦夷市利血刃我範驅馳生平所為事皆可質鬼神而無疑嗚呼是得其槩矣始天祥兄弟幼且長先君子不疾其不令昭蘇䝉滯納之義方日授書痛策礪夜呼近燈誦日課誦竟旁摘曲詰不使早恬以習於弗解小失睡即示顔色雖盛寒暑不縱檢束天祥兄弟慄慄擎槃水無敢色於偷自此名師端友招聘仍年至粥先疇給費久之室罄力弗逮廼率天祥兄弟藏脩于竹居陳所裒籖軸俾抉精剔華鈎索遐奥董網要竟日久弗倦雖貧浩然自怡有未見書輒質衣以市得書注意鑽研又以授天祥俾轉教諸弟繇是程督益峻書警語徧窻壁如三尺在目見為文章撥斸正氣輒不懌必維以法度天祥兄弟奉嚴訓蚤暮侍膝下唯諾怡愉不趐師友或書聲吾伊或斂襟各靜坐潜諷或掩巻相與戚嗟人情世道此時氣象父母俱存兄弟無故天下之樂莫加焉歲乙卯天祥璧俱叨與計偕時仲弟霆孫年十有六未試墨于窻曰出師未捷身先死長使英雄淚滿襟竟以疾先撤棘一月卒先君子及是擥涕竚眙悒悒痛憚天祥璧將進禮部欲董于征顧先君子哭子方新天祥璧復去左右恐益重哀出可寛襟抱且且夕定省得不缺不敢辭以臘月望行次年天祥璧俱僥倖奏名夏五戊戌廷對踰挾先君子病暑投凉劑立甦方徙一靜室規便攝理甲寅集英賜第天祥以不肖冒首唱歸拜寓館移時之期集所越一日聞病復侵告于朝不俟命亟去侍藥省劄下玉音給假三日時先君子雖病神色不改視脈者聚伺變候僉曰無虞戊午向申忽病革進藥郤弗服曰度吾不能起此疾汝兄弟勉之天祥璧震怖號慟請命于天祈促齡夀親算不獲命唯心禱呼冀殞滅以代又不獲命入夜寂然而逝嗚呼痛哉嗚呼痛哉厥明畿漕聞於朝朝命官吏來治䘮事六月庚申朔天祥璧奉柩出國門以歸鄉士庶人無不失聲痛嗟路祭巷哭以返于先廬時七月癸丑也嗚呼先君子一至此耶不肖孤生二十有一載弟方冠且髫承顔菽水歲月幾何天乎不使終養而蹙之於中身耶慘焉逆旋睇親舍越在二千里外天乎不使終于正寢而忍至於客斂耶往時征衣拜堂上舉觴飲餞親賔祖道外期嚮何許天乎遂以是為永訣耶天祥璧奉貢剡時先君子已哀仲弟不見孰謂方階禄釡先君子纔見而禍遄作天乎天祥璧何以竊第為耶嗚呼不肖孤事先君子不孝奉起居無狀有疾病而闇不知不能積忱衷臆倉卒無以動天聴罪生不贖皆血被面摧决肝胷願頓躑躅裁以必死顧屬纊一語忍痛受命不敢不勉恐無以祗訓于前人以忝盛徳廼相宅兆筮曰吉排土濡涕墳以竣役將奉體魄安焉嗚呼𣺌音容隔幽陰終天而止矣先君子妃曽氏今男三人天祥璧璋女三人懿孫淑孫順孫遺墨有寶藏三十卷隨意録二十巻痛惟先君子利澤不施于人名聲不昭于時匪石遺徳恐久遂沈泯天祥不揆不孝裒録事實沈痛刺骨荒忽惝怳世有大手筆能表章幽潛光昭于無窮稽首百拜以請知潮州寺丞東巖先生洪公行狀東巖先生洪公葢陽巖先生文穀公族諸弟也文毅公以孤忠遺直著聞當世其平生言論風旨講切上下公未嘗不在其間文毅公屢召不赴公浸嚮用輒落落不合去時論稱為二洪文毅公既歿泉南文獻之望盡屬公識者謂文毅公未為者將有為也而公又不及大用以死天之生才倐忽代謝安得不深慨於此叙次行事諗諸方來門人之責奚以辭公諱天驥字逸仲自號東巖世晉江縣人嘉定戊辰七月庚戌公以生生有異質沈靜專一自少講求微言通念曉析乃已故於經史諸子百家之辭無不貫串文章自成一家以紹定改元薦于鄉名聲振一時學子蹐門願求模楷者日衆公坦明夷粹專以宿於道為教逮事王大母一夕疾甚殆公不解帶不交睫至剔股肉雜湯藥進公一念之切通于神明然終身不以語人登淳祐七年進士第初筮邵武軍建寧縣尉發摘姦伏當官無所囘撓時有刼寇王若曾嘯聚千餘人騷動兩路諸所委捕多畏沮公奮不顧身提兵擣其巢一舉空之偽造成風為楮幣蠧公宻設方畧動中肯綮李若聶凡三大黨與無不各就縛薙獮之石壁胡公頴秋崖方公岳交章以公善狀聞于朝十二年循從政郎調連州推官未上寶祐改元㫖差監惠民南局四年較藝南宫公考鏡詳宻精力不間晝夕所賞㧞士多根抵理致當時號明有司公雖浸近周行然無所附麗恂恂侃侃望之山立徐公清畧吳公燧馬公光徂顔公頤仲俱剡上其能將用矣會有言者徒步西歸泊如也六年淮閫擇士自從首辟致公為屬景定二年通班授宣教郎知廣州香山縣至之日以教養人才為第一義脩復大成殿明倫有堂主敬美身賓賢登俊有齋皆捐俸入為之斂不及民其為政一裁於義俗譁健戢其尤桀黠者曰此囚牙訟師去則吾民妥矣邑以大治洪公勲趙公汝暨雷公宜中及倉憲交以邑最上咸淳元年轉奉議郎二年差監行在㩁貨務都都茶場四年呉公革馮公夢得趙公順孫劉公黻皆以吏才為薦差監都進奏院轉朝奉郎馮公時為刑侍及户侍劉公應龍交委以書擬本部文字公皆樂為知己盡于時上即位逾年初政新美公輪當陛對宿齋豫戒兾積忱意悟上心取虞廷君臣時幾之説寓規焉其一曰君心勤怠之幾二曰人心離合之幾三曰君子小人消長之幾四曰中國外夷强弱之幾及朱文公天理人欲之辨首尾二千餘言其辭諄復懇切深刺腧髓玉音嘆美又言泉有屯成左翼一軍之興之害米舟捜糴生變之虞而朝廷籍沒翁林二氏之田可歲得穀萬斛以紓戍卒兩月廩食或有不濟寺院及單丁住持令本州覈實區處併撥為軍餉之助餉足則糴寛糴寛則米通民永無貴糴患矣朝論翕然以為論事有陽巖風除大理寺簿五年轉朝散郎知潮州公之在潮也視民事如家視敝政如已疾捐金以裕學廩傾囷以果飢氓梁川以利病涉知無不為為無不盡潮與漳汀接壤鹽寇􅛇民郡聚剽刼累政以州兵單弱山徑多蹊不能討公應變設竒降者相屬又欲於接境置屯多者三百人少者二百人犄角為援郡為創樽節庫以贍之具有條畫悉以言于朝并下之漳汀放此且嚴保伍之令以澄其源大抵公智慮深逺如宿將持重而規畫綿絡不以鄰為壑也又潮有䕶田舊堤多嚙於水貤俸與民築石為堤民號之曰洪公堤且刻賦頌其傍曰此我公東巖生佛所為也去之日垂髫戴白者擁車下不忍去公雅意林壑至是則曰吾可優㳺樂吾真矣九年得㫖主管華州雲臺觀公時益暢於詩数與姻族觴詠從容而學徒有志於考徳問業者多授以外聲利及終身受用之要暇日登臨徜徉愛南安之間風氣明秀取所謂小陂山者曰樂哉斯丘我死則葬焉預飭美檟治夀藏澹然塵外蟬蛻之意十年正月公始属微疾即乞以本官生前致仕八日忽索水自浴衣冠休于正寢翛然而逝嗚呼若公者可謂啓手足而不亂其風流篤厚真足以追配文毅公於九原而無怍者矣某於公之門實丙辰省屋諸生戊辰之春待罪中朝諗日拜公牀下矣未及而去國然於公之踐修出處之概葢心識之恭惟穆陵豐􅉮菁莪之澤涵育天下天下士蝟然勃興温陵邈在海隅人物相望陽巖之氣節煥發乎其前東巖之抱負翼承乎其後使二公誠得盡展拓又未知孰後孰前也嗚呼今復見斯人哉曾祖遇妣陳祖徳明妣李父伯通贈宣教郎妣陳贈安人元妃陳先二十六年卒贈安人繼趙封安人先三年卒子男應午應申應夀俱業進士女四適胡登龍丘公賜王毓竒一尚幼應午力學克肖收拾公遺藁若干卷曰東巖集藏于家將以是年十月已未奉治命以葬趙安人祔殯應午千里貽書俾某狀行姑序其本末以俟立言之君子謹狀墓誌銘知韶州劉容齋墓誌銘咸淳四年四月十二日容齋先生劉公元剛卒于家年八十有二先生官至郡守死之日幾無以為斂附於身者稱家之有無鄉黨之士莫不髙先生之風而哀其志焉其邑子文天祥與人言欷歔慷慨重懼前輩言行久遂沈泯無以訓來者會其子昌孫以先生狀來請銘某雖不敏其可以辭先生字南夫一字南强世為吉州吉水縣人治毛氏詩早為郷校知名士嘉定一年入太學後六年登進士第授廸功郎信州永豐縣主簿陞從政郎調靜江軍節度推官丁外艱服除差江州教授兼濂溪書院山長自故丞相董公槐今丞相江公萬里以下舉親民五員淳祐五年班見以通直郎知撫州崇仁縣縣政以理民以佛子為謡先生奉母天人在官間日與其弟自提板輿相羊為娯邑人化之以憂去十年通判鄂州以磨勘轉奉議郎承議郎董丞相當國入為左藏東庫時將薦先生試館職會董丞相去不果初東庫日進會子紙若干丁丞相以趣辦為才風有司須增十萬先生以職力爭忤其意展磨勘兩年出為泰州添差通判景定元年某月差知韶州皇上登極轉朝奉郎適郡當次稱疾不果行㫖差主管建昌軍仙都觀居二年再任自江上平凡權奸用事所擯斥朝廷奬抜殆盡時論以先生為屈未幾詔還磨勘月日駸駸向用而先生前一月逝矣嗚呼豈非命耶早刻意詞科書無不讀其於佛老精言亦各深到平生居官所至清謹家無餘貲蕭然環堵四方學者執經問字相繼于門先生誘掖懇懇不啻父兄之遇子弟尤工為文章雖游戱之筆鮮不竒古江湖之士得品題一語足自表於其徒與人盡恭應接終日無倦意客至雅言之外談𤣥演空聞者往往忘去世人以聲利為門户先生惡之如惡惡臭登第垂五十年郡縣官吏知敬先生不見其可畏出入不設車徒閒步行井陌中不以為苦其心屢空以至死而不悔噫此真所謂善人長者矣曾祖致道妣周氏祖圭妣李氏考次朔累贈至奉直大夫妣陳氏熊氏俱贈恭人妃涂氏先十六年卒贈安人子男三人昌孫其長也次信孫愚孫皆蚤世女三人長夭次適大學生陳應發又次適進士胡淵孫男一人洵武女一人許適龍氏以某年某月某日葬某縣某鄉某里之原遺墨有詩書孝經論語孟子衍義若干巻詞科類稿若干巻容齋雜著若干卷家庭謾録若干卷任左藏日以孝經論語孟子演義上進有㫖降付資善堂銘曰文彪彪徳恂恂貴如單門死如齊民約而家豐而身我作銘詩永懷古人義陽逸叟曾公墓誌銘公諱玨字天錫號義陽逸叟天祥外王父也天祥不肖賴公教誨由記事以來周旋二十年於公無所不知葢至於其處死生之變然後知他日觀公者未盡而公誠有大過人者焉嗚呼異哉公性頴悟志不樂凡近讀書百家雖涉獵靡不通達所自得往往於佛老氏其見之服行敬恭神天一言動不輕口不御肉月常十四五對人敷闡𤣥寂四座輒悚然傾聴最後遇異人與語幾欲棄人間事求長生之術年踰六十始聞正學恍然自失死生之說鬼神之情狀講探幽𦕈頓改吾意既卧疾服藥外無所問戒左右勿以巫祝從事間祈禳厭勝揜公不知公覺輒撫牀怒呼病且久骨立如束聲吐精爽不變兾猶足支歲月一日召天祥至公乃鈎稽卜筮指諸掌曰今日老夫當訣故令爾來時聞命震愕止公勿易言公曰吾豈不省事哉形神合則為人吾形憊久矣今腰足如斷心火益燥神且游散居常謂不識死死則如是又曰始吾崇信異説今且死目中無怪見顧二子令必不為佛事周身一切雖絲縷亦公所處分殯宫哭位與凡䘮葬祭具有成説天祥弟璧任京府户掾公口授數十言令為書遺之强起字紙尾句讀筆畫曾不顛錯集諸孫各付謹飭語令羅拜牀下辭去衆泣漸揚公曰死生如晝夜不足多憾麾止之索酒飲之三連三言曰吾真去矣聲脱口而逝嗚呼隂陽魂魄升降飛揚氣之適至雖夢寐莫適為主公幽明隔呼吸而從容若此世能言死者不少此非嘗試事臆度料想靡所依據公去來一息實天祥所親見道之粲然莫此深切嗚呼異哉嗚呼異哉公事父母孝待族姻以厚與人交久要不忘倜儻尚義不事生産作業惻隱貧困能推食解衣議論剛正好面折人不藏怒宿怨有古君子之風焉公有子有孫早授家政天祥既奉偏慈迎公就養居數年甚適間出徐步幅巾野服人羨其優游公亦論文賦詩圍棋命酒自謂天壤間陶陶人也得疾於景定辛酉二月九日始復正寢歿之日壬戌二月癸丑得年七十有二曾氏世家盱江徙吉之太和梅溪族號長者曾祖邦寧祖知和考昌權妃張氏先公十九年卒子二棐榘女四適錢光延康師顔于天秩其仲天祥母也孫男六端孺淳孺文孺俊孺良孺明孺女一適郭泳曾孫男甫申以次年九月丙午葬吉水縣永昌鄉藥陂之原成公志也初公先世重卜葬葬師譸張為幻封鬛無定居公憮然曰吾詎忍吾先至此吾不可自求之乎乃從兄瑾載資越境旁參博扣逾十年得其說以歸由是髙曽而下一奠不再徙公對葬師言嘗斷斷不可不售不傳故秘莫得聞焉公命未革命天祥曰老夫一日不起無潛徳傳世記歲月非爾其誰屬臨終申其詞再三天祥泣不敢當重念靖節作孟長史傳東坡書程公逸事往蹟漫滅猶勤追述矧公面命惡得辭顧方繫官于朝不獲哭拜填祖營視丘窆南望欷歔輒紀家世行實而表其死生大事為誌并為銘銘曰維二氏之蔽於死生兮小其用於一身一陷溺而忘返兮鮮不惑於恠神公日昃之離兮羌出駁而入純微臨絶之琅琅兮公幾混於常人朝聞而夕死兮何憾乎幽㝠藥陂之鬱鬱兮遺躅之所經存而以為志兮歿將以為寧既固既安以利嗣人兮萬古萬古如斯銘羅融齋墓誌銘廬陵有隱君曰融齋羅公嗚呼可謂有徳人矣予嘗詣公入其門肅肅如也僮僕訢訢如也公出雍雍如也坐申申如也語愉愉如也予聞公燕居之槩晨起與櫛畢正衣冠堂中就胡牀坐不惰不倚儼然終日雖盛寒暑以為常不好狎不侵悔無易由言對賔客賔客或不自持左右置司馬公家訓一通保家擇婦常自以為名言閨中無敢疾呼女𨽻無敢近几席執事左右唯諾無敢涕唾諸子無敢晏起早卧聞公攬衣謦欬就學惟恐後夜至公所各以所業次第誦説奬掖磨厲交發互出凛然義方之意由是吾里之言家法與善教子者皆曰羅公羅公云公生而頴發五歲即篤志强記容止如成人既長嗜書忘寢食為文不事銛巧惟意所到自然成章學書入楷得蔡氏風度蚤有意塲屋四詣京師試諸生晩年始以此事付兒輩然公所為强學者雖老且病不衰也公未弱冠而孤經紀門户即不為細家廹速先世積逋劵如疊一日悉畀炎火曰是先人所親厚其一切勿問聞者義其勇宗族親黨孤子者貧乏者或給之田或予之金終其身恩意浹至外内無間言四方屨滿户外設榻無虛日推食解衣至者無不得分願而去歲青黄不接會其閭里輟時直幾半隆寒給散有差環公之境無以飢告鄉鄰有難畢力排解幾微不見顔面不摘抉人過有負公者未嘗示以聲色其人久之自愧悔有愧悔且死而恤其妻子益恩者與人語傾盡肺腑已諾必誠不以利害為二三其忠信如此戒庖厨勿殺凡登諸爼者悉自外致有生饋禽魚必解放之其仁厚如此自奉不逮中人衣服有十餘年不改亦不煩澣濯其儉素如此里之稱公無大小必曰君子長者有不善相戒勿為公所知嗚呼真可謂有徳人矣公之中身諸子各㧞穎而起其一兩名薦書登開慶元年第調臨江軍清江縣主簿公時敕簿君曰汝為廉吏即不辱吾子簿素修謹聞訓益厲有名聲於時生母蕭氏以上夀錫封孺人諸孫競秀長幼五葉人世樂事畢赴一門天之扶持信順不爽哉予按春秋名卿賢大夫視其國君諸侯容貌辭氣吉㓙悔吝先定如蓍龜以公平生孰不可書獨嚴重整肅能使人鄙慢消去福徳莫盛於此昔伊川見人靜坐輒嘆其善學徐節孝因安定頭容直一語自此不敢有邪心使公得二先生為之依歸因其資以至於道所成其可限量乎哉公諱士友字兼善一字晉卿融齋所自號景定元年該明堂恩誥授承務郎致仕咸淳二年二月十四日終于正寢年六十有八遺文有史編十卷諸家詩體十五巻羅氏由金陵徙吉之吉水五世祖居廬陵之新安曾祖暉祖時英考莘老妣孫氏趙氏妃蕭氏封孺人子男五人濬煜植畊垕畊簿君也再調贑州濂溪書院山長女一人汝順適今文林郎新廣南東路提㸃刑獄司幹辦公事周夀申先公卒孫男十人女六人曾孫男二人女一人俱幼卜以四年某月某日歸於順化鄉三坡周家山之原其孤前期請銘於予予視公丈人行也公之子於予同充賦於予弟璧同年進士予之任江西臬事也以公子上之公車通家孰先焉矧公行誼著於鄉則所欲稱美而論撰之者豈獨孝子慈孫之心哉銘曰不言躬行萬石君教子義方竇禹鈞行其庭不見其人雖無老成人尚有典刑封孺人羅母墓誌銘廼咸淳九年廬陵融齋居士羅氏生母滿百歲融齋之夫人時年七十六白髪在堂事百歲母如婦禮子孫孫子環侍起居焉男女三十有竒予鄉稱慶門必曰新安羅氏其年二月朔予從里中士奉幣載酒拜百歲母堂上母答拜諸孫皆拜飲母母釂酢賔諸孫各執爵從既成禮夫人視予年家子不聴去為之留三日為詩以歌其事好事者或為圖以傳國家承平休養生息用康于人眉夀無有害傳曰豐水有􅉮數世之仁也夏予將指于湘未數月聞夫人訃欷歔失聲問百歲母安乎曰安母於今葢百踰一矣夫人將葬其孤以是母命來請銘予後母生六十三年得載筆承命銘夫人自昔能言所未有廼叙次其凡繫之辭夫人姓蕭氏吉水人曾祖琢祖曹父異鄉貢進士妣廖氏繼張氏徐氏歸承務郎致仕士友是為融齋居士先七年卒子男五濬先五年卒煜植畊脩職郎前監行在奉口酒庫垕女一適儒林郎侍班周夀申先二十九年卒孫男九寀窩官實寓宜紹顥平女十一長適張棟曾孫男七舉孫頴孫元孫滿孫怡孫真孫復孫女二夫人以庚申明禋恩封孺人卒之年七月十日次年十二月某日封于所居里柘逕之原銘曰昔唐夫人之為崔母兮逮事長孫皇姑兮姑年髙齒落以枯兮升堂乳之劬劬兮姑曰婦恩之不可孤兮願世世子孫之不渝兮夫人吾世崔如兮母年踰百崔所無兮胡不與夀為徒兮為此母憮兮為夫人吁兮鄒月近墓誌銘廬陵南方之上游支水自贑興國而下曰富川鄒氏族焉鄒故出范陽五季始有籍斯土有昶者富而禮瀘溪王公平園周公誠齋楊公艮齋謝公皆與之游川流在門能不愛重貲疊石為屋以脱往來於戹周公記之一時稱為長者其歿也文敏洪公銘其墓鄒氏福禄方來而未艾長者之所種植也昶生將仕郎時飛嘗伏闕上裕民十䇿時飛生大淵大淵生澹是為月近君月近云者君以名亭而鄉人因之以為號也君蚤孤母張氏勤儉自樹立紹定辛卯該東朝恩以夀封安人君於其時奉親愉愉無子弟之失張氏歿始經紀家事循循如不勝衣人不見其聲色而充盈裕大之福自然日進而不止族黨之不自給者親戚之無所歸者友朋之逺役而不能行者君意性所到皆能隨事為義若夫修浮梁甃通逵歲發廩以倡賑荒守望有警則裒丁以耀于衆皆義之凡也俯仰三十年矣君於其間無鄉曲之過君性最緩或以佩弦進曰吾豈不知出此吾所見呌呼號呶自取僨敗者衆吾誠緩不失事葢老而益審焉然君終自無惡名變容動色之警不及乎其門優㳺和平永保終吉嗚呼真可謂長者孫矣君字次清登仕郎生嘉定元年六月丁酉歿咸淳元年九月已未配吳氏廸功郎江州司户叅軍懋之女子三文孫振孫俱登仕郎癸孫幼卜以四年正月葬於順化鄉新安社之原其孤前期以奉議郎劉君惠祖狀來乞銘劉君戚也聞而知之予君鄰也見而知之敢無以銘銘曰長者之澤子孫賴之去之百年有以似之天於善人曷不夀之善人有後天將與之鄒仲翔墓誌銘景定五年余奉親髙安除提㸃江西刑獄謝弗拜適寇起興國之東廬陵犬牙相錯所在騷動余所居鄉一閧千室大家以去為望鄒君仲翔中人之金也率鄉人柵東門山為備山下阻衣帶水君恐倉卒渉者為魚架浮梁以濟明年春冦一日蓐食行三百里薄大和之王山距余鄉半舍而近鄉人扶擕老稚走險微一不善脱君經紀山寨當是時一鄉之命懸於君訖寇去君保䕶無有害時余避節弗獲命會樞宻督以捕逐文移旁午余以鄉部嫌將重以請慨然曰奈何以我辭受坐視龍蛇為赤子困乎於是即日受印下令會兵諸山寨皆署長君與焉未幾寇平余罷歸里於溪之上㳺斬荆莽燔椔翳得竒觀焉君欣然從余山中匹馬一童朝至而暮忘歸率以為常余每集賔從君輒在其間聞余語中理解未嘗不解頤間從余言人生何為碌碌棄家事從公游可乎余謝非余所知君曰吾意决矣乃盡以伏臘屬其子而頹然以休訪余南北厓某水某丘若將終身焉癸酉夏四月余行湘君送余於香城後一月君以疾死余聞之欷歔不自禁湘之歸也未及門望見其子來哽不能言嗚呼余豈私君君與人必以情聞義輒赴見有不善面折不少囘而不藏怒不宿怨曠如也君雖赤手起家而好施出其性歲饑發粟給其比鄰二百户能捐殖以自損道太和甃十里道廬陵甃六十里衣寒者食餓者病者饋藥死者予棺䘮無歸者葬其土度其能為輒不少􅈔君之族前有長者以善植門為益國周文忠公所知去之百年風流相接焉余嘗謂君慈而樂舍大率浮屠家所尚至臨難急病能禦灾捍患以有徳於鄉閭大夫士或愧之君名鳯仲翔其字世為富川人曾祖大明祖人傑考世興妣梁氏娶蕭氏梁氏皆先卒子男一人曰成女三人適郭鏐王鎔劉鋒孫男二人夢龍復生君得年六十有四以甲戌十一月某日葬于其鄉沙洲平之原治命也君之先人嘗卜地於東門山之下曰吾父葬於是泝山而上為龍頭得一丘焉曰吾藏骨焉吾後其有興乎君晩而復游有子治生有孫業於學咸以為騐銘曰東門之原君之父兮東門之麓君之母兮東門之巔君所構兮瞻彼東門相爾後兮劉翁樂菴老人墓誌銘余讀陸賈傳甚美予隣翁樂菴劉氏賈擇田地家好畤出槖中千金析其五男安居過之數擊鮮十日而更以夀終予嘗謂人生晩福優游宜莫如賈當是時彭韓葅醢鄼侯周勃猶不免械繫求為賈一日得乎翁生四子皆有才智四十年即棄家政就養諸子以次第循環五日一更其設饌務為相髙惟恐不得其懽心翁飢來得食渴來得飲早眠晏起一切不顧人間事惟時時接方外士講鉛汞之術間取松柏惟意咀啖翁年過七十而顔色如童攝生有助焉或謂陸生作新語為漢達官非翁匹余曰不然賈艱難嬴頃間從馬一公為客一再使越﨑嶇萬里翁生於世長於世老於世不出鄉終其天年有樂於其身無憂於其心設賈復生校翁失得未必以彼易此翁又有數事異甚里傳鬼車鳴者未夜相戒滅明屏息户内翁開樓大呼願見鬼車卒無有有神以禍福驚人翁過其祠持牛炙如常人莫不危恐翁休休如也嘗有所營造忌某星直某方翁曰犯者殆乎請身當之某星迄不驗為子納婦或云婦不利於長翁不為奪自是諸昏嫁厯家説格不用中年卧疾家人私召女巫謀為厭勝翁亷知之强起逐之出門未屬纊翁黙自念作其像贊若辭而逺遊者顧左右曰吾死勿事緇黄吾志也醫以藥進麾使去問日入乎曰然反面而逝江南之俗尚鬼其人畏死而信巫翁能自不惑非由耳傳口授殆一至之性然也翁名邦美字才卿樂菴其自號也始祖邽長沙人為吉州刺史家西昌九洲後徙廬陵富川三世曰徳逺文煥子玉妣曾氏娶陳氏先三十七年卒繼祁氏其子孫實蕃濟生機洪生桂槐植模深生朴柚鄉貢進士浩生樞楫槐復生癸孫女二適于夢牛曹雷應孫女五適鄒曹許曹羅一幼翁八歲䘮母十六歲䘮父移其事父母事長兄終身歲時上丘塜拜祖禰率諸後生尚有典型翁富夀安逸推其一念孝友殆命物所知諸孫方將以詩書大其門翁必為人宗乎翁生慶元戊午二月庚午歿咸淳癸酉正月丙辰後二年正月葬於淳化鄉鳬塘之原余家距翁一垣翁年吾祖之下吾父之上諗翁有年數矣深與余游且厚來請銘銘曰其生也有涯其死也有時爾世其昌匪我銘其誰劉定伯墓誌銘予東家詩人劉君定伯類晉宋間曠達自予辟山水南北厓落然不可人意君時從予招或不約徑造至則善為言譚名理蠭出意所左右辯者不可詰江山朝暮四時之變嘲詠賞嘯興出物外常使人諷念不可忘嗜奕最入幽𣺌兎起鶻落目不停瞬解剥推擊其勢如風雨不可禦勝敗不落一笑飲酒可一二斗酒酣浩歌聲振林木或投冠袒裼旁若無人或鼻息雷鳴徑卧坐上君豪縱沛然以為自得當其樂時不知天之髙地之下老之將至焉爾予前在宣州君以詩來思致清邁恨不即投印綬從君烟霞之表既歸君好日以怡詩日以張大於是葢年五十三矣廼孟夏二日過予極論當世事抑揚不少挫詰旦報曰君痰厥逝矣予駭亟視之不復可為哭失聲狂三日不能止非予為然凢與君交者談君輒揮涕里之人不問倪旄嘆傷如出一口噫可人在天地間鬼神所忌耶君長身五尺餘堅壯耐寒暑鬚髪如漆性落魄不問家事家才三四口粗了伏臘不為求贏有錢輙不惜雞黍送客無虛日朋友有無相通急難於我乎赴平生於人無詰責鄉人有為芥蔕君一語輙化有不善開譬之無以為望和氣薰浹蒸然善鄰一歲半為四方客主君者所至投轄惟恐亟去雖兒童僕厮無不誠愛君者君破崖岸削邊幅不為拘拘孑孑至道理所在確然守之不變其執䘮為孝子按䘮禮門内不入緇黄一子二姪命以先疇𤓰分而三無贏縮薄厚子曰敢不共命姪曰敢固辭一家興仁興遜鄉曲相傳為盛門非好徳疇至是君始祖邽長沙人為吉州長史家於西昌之九洲十世祖徳逺徙廬陵富川君之三世曰文煥子玉邦賢妣鄒氏娶張氏子男梓女淑容適彭天麟卜以次年咸淳癸酉十一月壬辰封於淳化鄉扶竹坑楓樹塘之原君名澄定伯字也自號前村有詩集自編曰前村初藁君詩不為深苦而清抜雄健如其為人有子能力學不墜義方君死何憾予所憾者君死獨何蚤泣而為之銘銘曰臧其堅也驟折其勁也蚤推命之吉㓙匪繫其材生也達死也何怛君墓我銘我心則結王推官母仇氏墓誌銘東廬王先生母垂葬命其門人文某銘噫某何以銘先生之母之墓哉廼景定三禩進士䇿御前某以覆校待罪殿廬一日初考官第一巻擬上乙覽某稍細復之傳觀同官驚訝得人會一字近廟中嫌名某以才難白詳定官請所以處臨軒之日賜出身乃吾東廬先生也嗚呼使先生以名第取先天下歸拜母堂上斷機調熊庶幾夙昔乃累先生以不釋乎此某其何以銘先生之母之墓哉雖然事孰為大事親為大守孰為大守身為大使先生失身為親憂雖髙科如之何先生雖不得髙科為臣忠為子孝身在焉親固榮也諗先生曰然銘無所辭銘曰母姓仇氏世居廬陵之白沙考諱彦誠生二十二歲歸于贈廸功郎致政君諱化權逮事姑兩世左右無違祭葬以禮相夫子貞調娛中和靡失節度子始就學篝燈夜分督厲吟諷及負笈從師端以正手自紉綴連寒暑彌不倦以子入大學甲寅明禋封孺人從子赴永州户曹禄養夀康稱其命服咸淳七年二月十九日終于家年八十有三子二長大琮先孺人一年卒次國望從政郎前袁州軍事推官四女一夭二適李穆之三適蕭應祥四適劉起岩一與四先卒孫男六長囦餘未名五女長適劉煥次許彭麟餘幼九年三月壬申厝於城西黄腴山之原是為銘贈承事郎徐溪莊墓誌銘咸淳九年夏六月壬午朔天子親擢徐君卿孫為監察御史旌縣最也於是母不佞適叨一節按部湖右親見衡山之父老子弟歌思遺愛餘績於嶽雲湘波間皆曰徐公字我民六年我父母之其敢忘及聞聖天子所以褒擢選表又皆手額距踊為朝端賀為天下賀某退以語客曰麟仲信才且賢何以得此於邑之人去而不忘如此哉木則有本水則有源若靈芝俄現醴泉滃出居然瑞世其鍾和孕秀豈伊一夕之積盍相與論其世可乎客曰徐氏居清江於廬陵東西家御史君之考曰溪莊公溪莊公厚徳人也余聞而心識之亡何麟仲自京以書走湘抵某曰卿孫不夭生而二十有五年而先妣即世又五年先人棄其孤露濡霜降於今二十有五年禄養弗可及已欲報之徳罔極奈何今不肖孤藉先人之教有位於朝乃去秋九月天子有事於明堂推錫類恩我先考妣實該初贈惟先世之志行事治未有以詔子孫傳無窮敢稽顙下拜以請某發書愴然念所見聞不謬因不果辭乃撫御史君所撰行述而書之徐氏祖伯翳宗偃王偃王子孫散處徐揚二州間江右之徐以南州髙士重其後泝豫章而上今家清江縣崇學鄉之檀溪溪莊公諱森字夀叔曾祖諱徹祖諱源皆隱而能詩考諱大經桂山謝公題其所居曰溪雲小隱里人因稱為溪雲先生溪雲性嚴介家人嗃嗃然好客車轍滿門溪莊天分寛平春和玉温撰杖屨侍琴瑟書册左右色養無違族居千指融融怡怡無一間言少游鄉校文聲藉甚嘉定丙子待試成均繼以詞賦為郡諸生第一士論翕然中年幹蠱用譽晩謝場屋益雅淡謙謹疏戚一致未嘗言人過失其尊尊親親賢賢老老幼幼無不得其歡故鄉里逺近一以吉徳厚善歸之而徐為徳門矣淳祐壬子得未疾越五年殁實寶祐丙辰十二月三日也享年六十有七妃熊氏豐城著姓既歸奉尊章相夫子主饋治家延師教子賔嘉喪祭常黽勉有亡間必如禮乃止有昔人剪髪斷機風子男二稺孫先七年卒女二適黄一鶚鄭一䕫孫男三垕震必茂震亦早卒女二曽孫男二以開慶已未十二月奉二柩合葬於所居之西園嗚呼家之將興非必其先世有竒節異事足以聳動流俗耳目也風流篤厚之意多孝友睦婣之味長君子長者之澤有餘而不盡所謂有是父有是子或曰非此母不生此子者非偶然也徐氏之澤始基於溪雲浸大於溪莊今御史君玉立山峙川増日起由邑最結主知歲中三遷遂陟臺端為國綱紀駸駸且大任少頃暇之隴岡之阡何患不表顯墓上之刻不鄙以余屬余其敢不銘諸以昭徐氏徳盛流光之懿以對揚天子之休命銘曰江西徐宗宗處士介臨洪門蓋其徙檀溪源委深且長溪雲為父溪莊子溪莊恂恂允誠篤温兮如玉天鍾美融為瑞芝溢為醴積慶綿綿開御史朝為卓魯暮汲魏公朝旌擢清風起西阡雖舊命則新我銘宰上材可梓立身揚顯殊未已木杪龜趺此其始蕭明允墓誌銘君初名堅字子固後改應新字明允廬陵珠川人廬陵故多蕭氏而珠川亦望族君㧞起其間自幼岐嶷長益嶄絶種績文學􅋕􅋕與逢掖爭鳴三赴天子學鋭不少衰氣岸孤聳與人棘棘不阿號其讀書室曰介林嘗謂吾幸守先人廬弗克規拓是不肯堂構樓其前曰逼雲復出其旁相我攸宇通之為園花竹横從朋賔嘯歌翛然有物表之趣會予釣遊荒閒位置水石君時一造沛然若自得予以是知君所自負翹如也咸淳二年十二月九日以疾終年四十六曾祖炳文祖國老父景伯妣李氏繼母曾氏妃劉氏男曰宋翁女曰淑慈淑慧淑懿皆幼卜以四年正月八日歸於淳化鄉王田雙園之原前期其弟至與其孤造門以銘請銘曰嗟予介林兮孑孑而無成大輿之壯兮羗中道而折衡意衣冠之雖葬兮不能葬其英英瞻雲山之莽蒼兮尚骯髒之如生觀察支使蕭從事墓誌銘徳安府觀察支使蕭君安中中大夫江南西路安撫副使兼知吉州諱逢辰第二子撫使公發聞顯庸克開厥家於時為鉅人長徳自其宗族鄰里鄉黨待公而舉火者百數十家咸淳四年六月不幸公捐館君於是年四十有五矣持抱孤姪臨喪如不勝至經紀其家上下調娯是似是續罔有越厥度哭撫使公者繼於門哭已則私相語曰我公未遽亡乎迄服除如其初邦人士莫不嘉君之志而嗟嘆感發以為撫使公之有子云君字和仲號介軒儼然端重人也喜讀書為文辭倜儻有才氣在膝下幹蠱服勤左右無違及論世事有奮然自樹立事功之意咸淳十二年領江西漕舉寶祐二年以恩授登仕郎後三年銓試第一授修職郎袁州宜春縣主簿開慶元年以撫使公兼鄉郡奏充書寫機宜文字明年改注夀昌軍武昌縣主簿景定五年取舉江西漕咸淳改元循從事郎授支使自吕武公以下舉關陞三員親民四員六年十月以疾卒於正寢乃卜葬於永豐百蛟之原朝奉郎文天祥以其子元永哭請銘為之銘語曰三年無改於父之道可謂孝矣嗚呼蕭君克蹈聖言雖不得禄與不得年見於先人無忝爾生有子有孫亦莫不承祭文祭歐陽㢲齋先生維歲次癸酉正月乙卯朔越七日辛酉學生具位文某謹致祭於故先生殿講大著刑部㢲齋歐陽公棺前嗚呼先生將安歸耶先生之學如布帛菽粟求為有益於世用而不為髙談虛語以自標榜於一時先生之文如水之有源如木之有本與人臣言依於忠與人子言依於孝不為曼衍而支離先生之心其真如赤子寧使人謂我迂寧使人謂我可欺先生之徳其慈如父母常恐一人寒常恐一人飢而寧使我無卓錐其與人也如和風之著物如醇醴之醉人及其義形於色如秋霜夏日有不可犯之威其為性也如槃水之靜如珮玉之徐及其赴人之急如雷電風雨互發而交馳其持身也如履氷如奉盈如處子之自潔及其為人也發於誠心摧山岳沮金石雖謗與毁來而不悔其所為天子以為賢縉紳以為善類海内以為名儒而學者以為師鳯翔千仞遥增擊而去之奈何一蹶而不復支以先生仁人之心而不及試一郡以行其恵愛以先生作者之文而不及登兩制以彷彿乎盤誥之遺以先生之議論而不及與聞國家之大政令以先生之學術而不及朝夕左右獻納而論思抑童而習之白首紛如也雖孔孟聖且賢猶不免與世而差池先生官二著不為小年六十五不為殀有子有孫而又何憾於斯死而死耳所以不死者其文在名山大川詔百世而奚疑某弱冠登先生之門先生愛某如子弟某事先生如執經葢有年於兹先生與他人言或終日不當意至某雖拂意逆意莫不為之解頥世有從師於千里尚友於異代而同人於門適相值而不違其死也哀斯文之不幸弔生民之無禄其葬也隻雞斗飯竊慕古人之義匍匐奔走泫然而哭吾私嗚呼已而已而哀哉尚享祭都承胡石壁文嗚呼世婉孌以偷生公指九天以為正也人巵蠟以自矜公玉雪而不曜明也俗鬼蜮以誑人於㝠㝠公揭日月而撑雷霆也石壁之鋒神入天出金鐵可摧孰為公直石壁之藴尊華賤質㤗華可移孰為公筆四海一雲我卷我舒大川獨航予紼予纚萬微未燭吾蓍吾龜更幾千百載之祝融而復為此竒嗟乎余乎登門何晩哭野何遽操几杖兮焉從持佩玦兮何所紛雲委兮川流化經綸兮為土羗蘭艾兮荃茨蹇離騷兮宿莽茍余情乎得當質九京兮千古余有言兮孰聞寄浪浪兮雕爼祭郭正言閶維公㧞起海隅有志天下處膩如氷知徳者寡鳯音㝠㝠朝光作之烏臺峩峩霜氣薄之公遷諫坡歲月幾何白首丹心之死靡他吁嗟人生死見真實如公一節天地可質神畀東返返於五羊曲江吾師菊老未亡不愧二賢公可千古為酌廉泉一涕如雨祭道州徐守宗斗溫州人文武兩科嗚呼龍虎變化兮人物之英風霆流行兮宇宙之名天下之嗇兮一州之贏三年而一日兮侯度是程及召馹之垂駕兮胡疢之嬰沒而可食於南邦兮憂民憂國之誠某交誼兮雲仍王事兮弟兄樂莫樂兮知心悲莫悲兮余哭之㷀㷀下神輿兮臨東桂棹兮積雪斵氷操弧矢兮上征絶虎虺兮縱横噫至人兮無死歆余奠兮如生祭鄒主簿寧孫嗚呼徳元少吾三歲自其應門及我交際徳元之賢服我以義以我為兄我胡不弟折節讀書收科入仕子簿臨武語子初筮時予赴宣亦有行事同日出户舉觴祝子自予汰歸子告還里雍容進趍循循唯唯士别三日刮目相視人十已千其進未止子之復徃得於吏師幕謀邑事勉焉孜孜子替已久子歸何遲輿疾在寢忽不自持子方壯年何質之衰瞀於鬼神淫於禱祠死不相聞斂不與知殯不及夕棄禮如遺哀哀徳元而至於斯弱稚惸惸青燈一􅄔吾甚憐子亦復何為子尚有後念無已而吾欲匍匐哭子墓垂適有王事載驅載馳明發不寐永懷吾私寄情一奠臨文涕洟祭秘書彭止所嗚呼仲至氣和色莊如水之清如玉之剛出而瑞世麒麟鳯凰南宫第一今世歐陽方其退居深自晦藏蟬蜕衆濁視世如忘展如之人衣錦絅裳覽徳斯下吾道彌章頃者刑臣再玷天綱善類相顧驚疑徬徨君首丐去其氣昂昂聞者為奮進言始昌貽書司諫陳義慨慷表表愈偉于歐有光我年視君匪鴈其行第也同年居也同鄉仕也同館志也同方用折輩行腹心腎腸我之出守君酌我觴君亦有志方外翺翔王宫為師秘書為郎君雖欲去志不果償由此而升紫微玉堂道以光大亦我所望誰歟西來遽報膏肓旦旦引領已劑其良好音不嗣我心皇皇奈何哲人竟罹于殃嗚呼仲至今也則亡如瑳如磨其孰我相凡百君子罔不盡傷况我孔厚如我淚滂我有官守我縶我韁君疾云革莫􅂶造牀君柩來歸莫哭道傍嗟我有心遡風茫茫嗚呼仲至婉其清揚其命也短其存也長生芻一束我意其將庶幾監兹尚有洋洋嗚呼哀哉祭安撫蕭檢詳名逢辰號平林嗚呼江右之望偉哉我公驅馳白首惟孝惟忠異時廊廟謀選元戎惟公老成必在其中開慶之警四國交訌吉為樂邦飄風其衝拜公于家麾節崇崇公起倉卒談笑從容臣有一死惟義之從不敢震鄰不敢震躬事平上印訖不言功優游里居惟以夀終嗚呼尚論公之平生兮撫蒼莾而歔欷命之通塞兮毁譽隨之議論之所從始兮惟桑梓之不可欺方淮漢之落落兮猶日風馬牛之不相追亦既與我父兄同生死兮寧不我知天有萬分於人兮而或猶有怨咨自公之既歿兮使人方感激而追思曰何為予室之不漂摇兮予子之不流離思而不可作兮父老至於涕洟豈非生而有定論兮尚或接於愛憎之私死而愛憎無所麗兮忽天定其奚疑嗟乎見危臨事而不茍兮所以委質而為臣吾亦自盡乎吾心兮固非欲求知於人然自古固非抱屈於一世兮俟百世而方伸亦有百世不可俟兮聴諸天地與鬼神公死而有遺思兮斯人豈不靈是不為無所遇於當時兮尚何憾乎㝠㝠議論定於其鄉兮而傳之天下後世無不本諸人心禦大灾捍大患而得祀兮以不忘其徳音贈以嘉有功兮諡以尊名天下有道兮天王聖明吉山之陽公魄所歸素車盈盈白馬纍纍我思古人兮斗酒隻雞尚不憚於千里兮何百里之辭即公墓兮酹酒以致哀作文以諗地下兮尚有信於方來祝文過家告廟文昔忝荆臬單車載馳家祀孔嚴曠歲弗治靡室靡家中心悵而始告廟朝是縶是維畏此簡書王事敢違悃悃再疏天髙聴卑解我湘組易贑一麾贑實近止神人具宜人豈及是神之相之載欣載奔薄言還歸千里息肩于廟矢辭代富川酹魁星文維極有斗兮垂河漢以耀芒耿衆星之環嚮兮儼黄道之開張瞻前杓之烜赫兮束枕乎龍角之蒼一水盈盈兮咫尺相望一舉手而髙摘兮搴萬丈之虹光吐竒氣於六合兮夕閬風而翊扶桑宇宙之燄燄兮其將見於吾水之涯吾山之陽擊雷鼓兮電煌煌酌金罍兮􅆽天漿代酹解星文維庖人之中肯綮兮奏刀騞然若有物以黙運其肘兮故利器排割而彌堅矧斯文之新發硎兮淬磨乎仁義之淵斫月桂兮髙五百丈剸蛟斷犀兮奚足言視一朝解十二牛兮直游刃乎吾前於戱神哉使我頭角露崢嶸相我筆下生雲烟靡靈旗兮風翩翩舉天瓢兮酌天泉文山集卷十六欽定四庫全書文山集巻十七宋文天祥撰樂府古樂府壽人母珊瑚香㸃臙脂雪芙蓉帳壓春雲熱明朝早弄燈前月㶑灔九霞碧藕折璇杓髙聳婺女明金波漾曉輝郎星赤瓊曲裏長眉青頭上更有瑶池君六九五十四東風西蟠桃花花未紅鳴鸞敲玉聲玲瓏緑毛蒙茸蓮水龜斒斕五色人間稀春多瑞葉不敢飛氷壺光滿魚龍轉笑中低舞玉釵燕明年今日長秋殿安輿入侍金桃宴齊天樂慶湖北漕知鄂州李樓峯南樓月轉銀河曙玉簫又吹梅早鸚鵡沙晴蒲萄水暖一縷爇香清裊瑶池春透想桃露霏霞菊波沁曉袍錦風流御仙花帶瑞虹繞玉關人正未老喚磯頭黄鶴㟁巾談笑劍拂淮青槊横楚黛雨洗一川􅃄草印黄似斗㸔半硯薔薇滿鞍楊桞沙路歸来金貂蟬翼小齊天樂甲戌湘憲種德堂燈屏夜来早得東風信瀟湘一川新緑桞色含晴梅心沁暖春淺千花如束銀蟾乍浴正沙鴈將還海鼇初矗雲擁旌旗笑聲人在畫闌曲星虹瑶樹縹緲珮環鳴碧落瑞籠華屋露耿銅虬氷翻鐡馬簾幙光摇金粟遲遲倚竹更為把瑶樽滿斟醽醁回首宫蓮夜深歸院燭
