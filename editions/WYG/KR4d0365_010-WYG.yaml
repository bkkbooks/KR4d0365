body:
  text: 敬書先人題洞岩觀遺墨後按先君作此詩時天祥甫七嵗後十五年知觀任道士始摹本以來又越三年以次道士朱山月復為軸以相遺維先君子天韻冲逸神情簡曠使一日脫人事之累黄冠野服逍遥林下真所甘心焉為子不徳使先志不獲遂捧軸却立為之泫然跋曽子美萬言書藁名士倬菊坡天人文溪菊坡様人菊坡不可作已願見文溪五仙如在天上寳辰夏五集英殿賜某等進士第入局一日同年曽兄子美來訪議論慷慨知非凡人扣其所宗則傳菊坡法衣密文溪講席者也當布衣時春宫一疏已能發菊坡之所欲言他日為天子御史直氣凛凛必能赤文溪幟悠悠風塵安得若人寳祐丙辰書於期集所跋李景春紹興萬言書藁吾鄉布衣李君景春上書於紹興累累萬言盡疏閭閻隠微之故可謂知無不言矣厥亦惟我髙宗皇帝仁厚惻怛勤求民瘼是以旁通下情庶幾古者詢於蒭蕘之遺意凡我有官君子暨於國人式克於勸讀君之言當時州縣間可嗟嘆者如此今去之百有餘年孰知又有過於君所觀者識者於此又重為世道感跋劉翠㣲罪言藁崔子作亂於齊太史以直筆死其弟嗣書而死者二人書者又不輟遂舍之崔子豈能舍書已者哉人心是非之天終不可奪而亂臣賊子之暴亦遂以窮當檜用事時受密㫖以私意行乎國中簸弄威福之柄以鉗制人之七情而杜其口胡公以封事貶王公送之詩陳公送之啓俱貶檜之窮凶極惡自謂無誰何者矣而翠微劉公猶作罪言以顯刺之公固自處以有罪而檜卒無以加於公噫彼豈舍公哉當其垂役凡一時不附和議者猶將甘心焉公之罪言直未見爾由此觀之賊檜之逆猶浮於崔而公得為太史氏之最後者祖宗教化之深人心義理之正檜獨如之何哉公之孫方大出遺藁示予因感而書跋繆上舍萬年論丁相大全詞案被黜為沙溪塞巡檢讀繆言詞案世固有如此寃事哉掩巻為之太息跋歐陽公與子綿衣帖東坡跋歐陽公與其姪通理書云凡人勉强於外何所不至惟考之其私乃見真偽今觀此帖綿衣之外一語不及其私以此見前輩心事未有不可對人言者跋胡景夫藏澹菴所書讀書堂字此澹菴所𨽻以與夀亭者也夀亭於澹菴為累從弟澹菴臨大難决大議不負所學於國為忠臣於親為孝子斯讀書之所致也公崇敘宗族復以讀書惠幸其弟固曰使之有所顯揚也於其先與有榮焉詩云孝子不匱永錫爾類澹菴以之夀亭曽孫景夫世其家寳澹菴真墨徹堂而新之復其扁用詔於子若孫以追孝也考作室既底法厥子乃弗肯堂景夫逭斯責矣雖無老成人尚有典刑藏修於此者尚勉之哉跋吕逢徳所收平園文字此石刻司馬文正吕正獻為翰苑時贊書跋藁則鄉衮平園周公為直院時手筆也平園此跋屬意於文正之曽孫淳熙距今幾年善本存否未可知而其刪改塗注初藁爛然然則吕氏得之逢徳以示余噫其謹藏諸跋誠齋錦江文藁知瑞州日作誠齋當淳熙之季以少蓬出守距今七十有七年矣某他日嘗讀道院集見所品題甚多及來此則先生一字之跡無復存者惟亭閣尚留其名而屋亦化為烏有矣有則嶔嵌老壓亦未知其為當時屋否也一日得先生錦江尺牘一帙大率吏楷而為先生手筆者四其三蓋在郡時作其一作於還朝以後而附諸帙尾者典刑逺矣於此尚庻幾見之嗚呼庚申一變瑞之文物煨燼十九修復以來得十年間殘編斷簡不啻足矣而况出於七十年之前者乎且方其文物具備之時此帙非郡之所得有收拾散亡之餘乃能有前日之所未嘗有斯不謂之益竒矣乎既勒諸石書以識之跋崔丞相二帖菊坡翁盛徳清風跨映一代歸身海濵當相不拜天下之士以不得見其秉鈞事業為無窮恨今觀兩帖所稱規模意向局西話頭者則文武之道具是矣一朝踐其位固皆舉而措之者也後書論邊計尤切是時楚叛一矣而公以不得盱眙為憂若不可終日者嗚呼寧知三十年後楚之餘燼復然而漣水之迫乃有過於盱眙者乎考引昔今為之永嘆跋李世修藏累科狀元帖國朝踰三百年所謂進士第一者何止百數披圖而觀某如何某如何夫人得而知之李君世修先世多與其顯者游今其家藏墨蹟僅十數紙而其可愛敬可鑒戒者已粲然可見李君又欲厠予語於其間不知後之視予又以為何如也嗚呼是可不凛凛哉跋李龍庚殿策三代以下無良法取士者因仍科舉不能變士雖有聖賢之資倘非俯首時文無自奮之路是以不得不屑於從事而其所謂文蓋非其心之所甚安故茍足以訖事則已矣豐城李君彛甫有文學旦評所尊稱晩乃屈就南廡試名在第三衆共惜之門人好事者取君所對策刻諸梓予得而讀之君信能事矣然由君言之當時寸晷之筆何啻芻狗君姑借此脱韋布蓋將有所行於時而豈以是為有餘哉此非好事者之所得知也君非碌碌意積蓄必有深厚故予獨探其心表而出之跋王元髙詞科擬藁號稼村後國正添倅我朝言治者曰慶厯元祐乾淳厥亦惟歐陽子蘇公兄弟周益國三洪氏以其宗工大手掌朝廷文字以為之繅籍粉澤功光當時垂休無窮豈曰小補之哉國於天地必有與立而尚論其盛則其渾厚醲郁光明俊偉百世之下想望風采必於斯文卒是稽傳曰鼓天下之動者存乎辭辭之不可已也如是往時有博學科有宏詞科士各知所崇尚近世此學寖少於是而小詞科之制立其望於人甚約也而應令者迄亦落落人才於是少衰矣豫章王君義山元髙自為舉子時獨有志於此國家大制詔大誥令擬諸其形容者叢鉅冊其能出章逢佔畢之士矣元髙登進士乙科調永州司户參軍意若不自滿謀卒業以大科致身乃已予謂元髙一命以上皆將有世道之責子歸而求之他日中興太平之盛所謂號令文章煥然可述以與三代同風者安知責不在子而正不必曰吾不得志於進士而退為是也元髙欣然納之遂存其說於帙尾云跋吕元吉先人介軒記後巽齋先生曰徂徠石先生名介質肅唐公名介鄭公俠字介夫半山老人字介甫凡有取乎介者其人必可觀也予嘗評之徂徠之介為孤峭質肅之介為直方鄭公之介為敢决荆公之介為執拗三公之介純於天資荆公之介雜於客氣介則一而其所以介則不同也予獨悲夫強辨堅忍虛名偽行介甫以誤於其君以厲於其時至今天地易位人極不立皆此介之流也徂徠不得為諌官唐公争新法不勝發憤死鄭以一跌碌碌州縣不復能自振迅介美徳也三公得其純坎坷於當世彼其角血氣之私竊名譽之盛而遺毒迨今日而未已嗚呼偽行之誤人而直道之難行久矣吕元吉之先人名介軒予不及識其人諸君品題類以為言和而行果色温而氣剛然則是介也視前三君子有光焉然君止於布衣懐其耿耿不見於用則君之所遇又為不幸者雖然介在我幸不幸在天吾求無怍乎本心可矣何外物之較風氣淺薄其能刻厲矯揉以竊毅然丈夫之名者已不多見若夫以直自懟而毁方為圓以就外物者多矣外物卒不可得見而本心空自喪失是則介軒之罪人也元吉重念之哉跋周蒼崖南嶽六圖扶欹植傾補空續髙吾欲觀於嵩恒岱華其放六合於秋毫也邪跋李孟博東山夢境圖昔有得湘中老人誦黄老之詩於恍惚中者前輩謂其語非太白不能道今圖中武士所授孟博帙甚鉅庻幾亦有格力如此詩者列其中乎願出以示予當許君親見太白何但夢也然萬一太白訝其孫輕發藏寳或復遣六丁下問泄者書何在仍取以去君將無以為東山鎮則不如勿出跋周一愚負母圖己未之變周君一愚家於狗咬石之下最先遇禍君從其兄負母越溪以逃妻子溺死不能救也事平君為圖紀其狀諸公嘉其臨難識所輕重褒之不絶口予謂人子之事其親不幸而處人事之變急所急而緩所輕本心之不能不爾其於天則蓋非有一毫之増益也一愚之處見豈其欲以為髙哉正可悲耳嗚呼自狗咬石之失險江右之父母妻子離棄不知幾人覽君之圖豈獨為其一家哭哉誰謀不臧一至於此昔魏陵繪㐮樊之戰為于禁屈伏龎徳怒罵之状將恥禁也彼禁敗事者見之宜發慚以死然龎憤憤就殞使其骨肉見所畫像尚復何忍君此圖一開巻當一流涕毋為自苦予將請之轉示前之玩敵抽戍者使誤國者死有餘媿而君其庶少寛乎題陳尚書昉雲萍録公守建陽人和政成皇曰來歸從槖斯榮我時在館望公珮珩公不我遐我徳公誠公録班如友朋公卿維公下士敬附氏名題中書直院劉左史震孫雲萍録忠肅公朔人以直節名一代今中書左史負沉厚剛峭之氣以朔名齋蓋於髙曽規矩焉某始聞其風今見其人輒書氏名昭與潔也跋辛龍泉行狀予昔待罪館閣辛君應始改官受龍泉來訪予語以山川風俗之故君離坐傾聽若謹識之他日予持節君適在部内知君㢘且明於縣百姓有恩也會予罷歸後來者於予尋仇幾累君賴仁聖在上君與予俱得免去年予忝為郎君來受倅相見甚歡俯仰且兩年君季子過予則知予去國未幾而君逝矣君仕宦淮襄間勤勞辛苦徳於人者深予生晩不及悉龍泉予父母旁國予親友在焉能言君終始無一日簠簋帷簿之跡事實而有証予是以信君之為賢悼君之不可作也君季子以君狀示予捧巻三讀為之哽塞跋蕭敬夫詩藁累丸承蜩戯之神者也運斤成風伎之神者也文章一小伎詩又小伎之游戲者秋屋蕭君自序其詩乃有不克盡力之恨昔人謂杜子美讀書破萬巻止用資下筆如有神耳讀書固有為而詩不必甚神予謂秋屋藁亦云可矣顧何足恨哉予聞君之為學沉濳堅忍其自得者深充而至之有耿耿詩之上者跋李敬則樵唱藁三百五篇之詩間出於田夫野叟之作當時樵者固多能詩自晉唐來詩始為一道而作者有數矣今李敬則莊翁於詩大用工力然猶不敢自以為傑謙而托諸樵今樵安得此可人其古樵之流亞歟抑君嘗從蔡覺軒學庸齋復贈詩曰男兒不朽事只在自身心君生武夷山下此晦翁理窟山林之日長學問之功深君非徒言語之樵也身心之樵何幸從君講之跋劉玉窻詩文予嘗造玉窻之廬環堵蕭然青山滿户真詩人之資也唐人之於詩㦯謂窮故工本朝諸家詩多出貴人往往文章衍裕出其餘為詩而氣勢自别予觀玉窻不特工於詩諸所為文皆嘗用意而其為人又魁梧端秀疑非久於唐人之窮其駸駸於本朝之風氣者乎玉窻劉氏名芳潤字元方五雲人跋周汝明自鳴集天下之鳴多矣鏘鏘鳳鳴雝雝鴈鳴喈喈雞鳴嘒嘒蟬鳴呦呦鹿鳴蕭蕭馬鳴無不善鳴者而彼此不能相為各一其性也其於詩亦然鮑謝自鮑謝李杜自李杜歐蘇自歐蘇陳黄自陳黄鮑謝之不能為李杜猶歐蘇之不能為陳黄也吾鄉周君性初善為詩署其集曰自鳴予讀之能知其激揚變動音節之可愛而已予亦好吟者然予能為予之言使予髣髴性初一語不可得也予以予鳴性初以性初鳴此之謂自鳴雖然凡音生於人心其所以鳴則固同矣跋胡琴窻詩巻琴窻遊吾山所為詩凡一巻或謂遊吾山如讀少陵詩平淡竒崛無所不有或謂讀琴窻詩如行山陰道中終日應接不暇詩猶山邪山猶詩邪琴窻善鼔琴髙山流水非知音不能聽然則觀琴窻詩必如聽琴窻琴琴窻胡氏名日宣跋趙靖齋詩巻趙史君以靖名齋其與世澹然相㤀而寄思於詩有冲邃閑逺之韻以靖為受用也公殁其壻丞簿段君裒其其詩為帙出示於人而公之所以為靖者始復表暴由公之本心豈計後人之知己哉段君所為其盛徳之不可掩也然則其翕也固所以為張也歟跋王道州仙麓詩巻讀仙麓詩詩材政自滿天地間也杜太苦李太放變踔厲憀慓從李杜間分一段光霽如長慶集中君尊臣卑賔順主穆仙麓疑甚近之香山天資倜儻樂易其居又有疏泉鑿石之勝與一時名輩為宫為商九老圖中槩可想見仙麓屋九仙下其騎氣御風風流正自相接至其當舂陵龍蛇起陸之際山窓晝永石鼎茶香微一日改其吟詠之度是丸倒囊矢破的無地不然也神人瑞士其氣為清淑者為一故心常得其自律自吕之妙仙麓此集宜與長慶並行無疑題勿齋曽魯詩藁勿夫子語顔以作聖工夫也作詩亦有待於此乎曰詩三百一言以蔽之曰思無邪詩固出於性情之正而後可曽君魯擇言未為不精尚勉之哉跋惠上人詩巻齊已賦梅鄭谷為改一字師不覺下拜予材不及谷逺甚讀惠上人編不能措一詞然則谷不可於齊己之不可予則可於惠之可跋道士婁君復詩巻余去年行嶽麓下遇山人譚彌明出處謂八桂堯廟有彌明題墨在焉世見石鼎聯句髙右竒崛謂是昌黎寓言今觀婁君三巻則知彌明嫡孫正自堂堂也何寓言之疑之有跋彭道士虛碧房虛碧天夢境也黄州之夢遊於斯夢夢境也志和結房於山虛碧其顔援黄州夢也命予為之辭記累夢也雖然予焉得以為夢乎夫有大夢有大覺君其問諸希夷先生跋番昜徐應明梯雲帙易之坎為水為雨為雲而雲之象獨著於屯與需屯曰雲雷屯君子以經綸言陰陽始交而未暢猶世道方險阻之日時則君子奮其經綸有亨屯之道焉需曰雲上於天需君子以飲食宴樂言陰陽之氣交感而未成雨猶君子蓄其才徳而未施於用時則君子養其氣體和其心志而居易以俟命焉易象雲者二一以為君子用世之象一以為君子樂天之象易於進退行藏之義各有攸當予聞之聖人畏天命而悲人窮未嘗不皇皇於斯世然方其初也守其義不随世而變晦其行不求知於人修其天爵無所怨懟一日逹可行之天下正已而物正而所性不存焉嗚呼聖賢非坐視民物之屯者而安於需若此則其道之所存也後之學古者宜可以觀矣讀豈華梯雲帙有感而書跋隆興王邦立所藏元祐關書昔者嘗讀圬者王承福傳見其自言操鏝以入貴富之家有一至再至三至而皆為墟焉問之或刑戮也或子孫不能有也或歸之官也圬者棄官勲喪其土田手鏝衣食其色若自得疑若貴富者不可常而不如不有土田之愈也今觀王氏居豫章世守先緒保有元祐關書以迄於今子孫業詩書其門且將有興者則圬者終身親厯之所感慨豈真足以斷千古而信方來也邪雖然圬者為不克肖者言也予為善繼者言也韓公存圬者之辭戒也予為王氏言勸也題賈端老不㤀室凡道各有入處凡學各有悟處程氏以敬張氏以禮示人以從入也而游於程張之門者或得於静坐或得於主一或得於去一矜字悟之不必同也凡入皆以悟凡悟皆可入鹿岩賈君得不㤀二字於水心先生之詩以名其室先生之詩崇好修而黜徇外賤决科而尊天爵一則因言而有悟一則因悟而示之以所入師友淵源之懿去之幾年猶將見之今其孫子純寳其祖訓二字勿替引之知悟幾矣讀水心詩尚求所以入門也哉題張徳從畏心堂徳從取其家横渠翁畏心一語為心法稱鄉前輩其子希明肯堂取而名諸為家法稱賢士夫抑天下危莫危者心天下樂莫樂者心操而存之防其危優而柔之會其樂徳從講學無不盡希明有所受之矣題戴行可進學齋乾稱進徳者三而象曰天行健君子以自強不息聖人復申之曰終日乾乾行事也君子之所以進者無他法天行而已矣進者行之驗行者進之事進百里者吉行三日進千里者吉行一月地有逺行無有不至不至焉者不行也非逺罪也戴君行可以進學名齋垂二十年前之進予不得而考也後之進予不得而量也獨有一言願獻於君者曰行行固君字也書曰行之惟艱語曰仃有餘力中庸曰利行曰勉行曰力行皆行也皆所以為進也不行而望進前輩所謂游心千里之外而本身却只在此雖欲進焉得而進諸戴君求進者也而予言行予將有逺役其知行之理固審君之俯仰是齋也其亦反覆於字之為義也哉跋周應可為蔡徳夫干藥物目子後蔡徳夫病且貧硯庵周應可過而顧之曰是不可坐視問藥於所知斯可謂知義之士矣予方杜門守約於所親厚未能以徧愛其何力及此顧交道久薄硯庵能崇篤如此是亦足勸厲薄俗敢不罄竭以為之從臾云跋彭和甫族譜莆中有二蔡其一派君謨其一派京傳聞京子孫慚京所為與人言每自詭為君謨後孝子慈孫之心固不應爾亦以見世間羞恥事雖為人後猶將愧之彭和甫之派來自博士齊非玕後也今其譜牒併二族為一本為君謨之後而引京以混之人情固大相逺哉予聞晉沈勁恥其父陷於逆致死以滌之卒為忠義唐柳玭有言門地髙者一事墜先訓則無異他人是以修己不得不至諸公皆勸和甫以自立和甫而祖玕猶當為沈勁和甫而祖博士栁玭之言得不勉乎哉跋吳氏族譜自魏晉以來至唐最尚門閥故以譜牒為重近世此事寢廢予每為之浩歎今觀吳氏譜源於禾川之燕市派於西昌之白沙自宋興以來衣冠燦然蓋升學者二十有二舉於鄉者五十有七薦於漕者三奏於禮部及精究科賢良科者九而特科恩封世賞拜爵者又三十有四人盛哉可覩矣自昔以知力持世功利起家有道所忌傳不數世惟詩書之澤綿綿延延愈久而愈不墜赫赫而蹶孰與循循而至者哉天下之理可久者必可大吳氏代有人焉其將有尤者出以其時可矣跋楊宰記曽氏連理木右連理木記誠齋先生叔父百里君筆也乾道距今幾年墨跡如新曽氏之父祖子孫其藏之也謹也季淵來京師擕其所謂連理圖及諸名公詩記凡一軸而是記編於圖詩之間季淵蓋將求表章於當世之有道以廣大其瑞以昌其先志會有取之以往而鄰火夜不戒是軸併以煨燼季淵悼前輩之不復作而家世百年之寳一朝而失之蓋於是記重致意焉初予讀其文愛之命吏私識之别帙以備遺㤀季淵不之知也及善本羽化而楊子精神心術之􅂱然者獨在吾帙間曽氏之故氊似墜而不墜猶賴有此則予昔也讀而愛之愛而識之固黙有以開其衷者夫物之存亾莫不有數而其既亾而不遂亾不存而復終存者雖人力之偶及於是而識者不敢諉之於數之外季淵喜予存曽氏之舊就俾書之而予亦自以為有功於楊子不敢辭季淵得此於鬱攸當無所憾楊子而知斯文之不泯也吾知其亦為子欣然矣豈獨木哉跋彭叔英談命録命者令也天下之事至於不得不然若天實使我為之此之謂令而自然之命也自古忠臣志士立大功業於當世往往適相解后而計其平生有非夢想所及蓋不幸而國有大灾大患不容不出身扞禦天實驅之而非夫人之所欲為也當天下無事仕於是時者不見兵端豈非命之至順蓋至於不得已而用兵犯危渉險以身當之則命之參差為可閔矣士大夫喜言兵非也諱言兵亦非也如以為諱則均是臣子也彼有王事鞅掌不遑啓居至於殺身而不得避是果何辜吾獨何為而取其便如以為喜則是以功業為可願鰓鰓然利天下之有變是誠何心哉是故士大夫不當以為諱亦不當以為喜委贄於君惟君命所使君命即天命惟無所茍而已星翁厯家之說以金火羅計孛皆為主兵之象遇之者即以功業許人十一曜之行於天無日不有無時不然人物之生亦無一日可息是適相值者亦時而有之也治亂本於世道而功業之顯晦關於人之一身審如其說則人之一身常足為世道之軒輕有是理哉聖賢所謂知命俟命致命皆指天理之當然者而言是故非甘石所曉彭叔英儒者也而星翁厯象之說尚不免膠固歐陽巽齋先生既具為之辨予復備論之叔英持以復於先生跋王金斗談命録萬鍾浮雲我有靈龜季子伯仁得印奚為俯仰利害桔橰夏畦彼昏不知彼昏不知噫王君又從而鼔之舞之邪跋劉父老季文畫像州有父老員若干月給廪俸若干太守嵗二月出郊號為勸農則召是二三父老者俾聽勸戒之辭吾農實無所聞其代而聞之者斯人也田里有疾痛或水旱則父老以其職得轉聞之長民者然則其事亦不輕矣劉季文齒望八袠蓋父老之一以一州之人髙年者蓋多矣而劉得以夀考𨽻官之籍且其得禄如在官晩節有光焉一日以其喜像來求贊予觀其田里淳厖之狀山林朴茂之氣得夀於世非曰偶然嗚呼鳶肩火色騰上必速者非人間永器虎頭燕頷當封侯萬里外亦幾勞苦拂亂之甚劉雖貌若甚朴者然終身田里無辛苦之態以至於夀富貴之樂顧足易康寧哉是亦云足矣予未暇贊因備誦其為人聞者倘有利於斯言乎跋李氏譜族譜昉於歐陽繼之者不一而足而求其鑿鑿精實百無二三原其所以蓋由中世士大夫以官為家捐親戚棄墳墓往往而是雖坡公不免焉此昌黎公所以有不去其鄉之說也友人李希元示予家傳自唐西平忠武王子憲至其先人十數世墳墓皆在目睫亦可尚哉使昌黎公見之亦將以美楊少尹者美之矣予家本石室蓋無可疑而自出蜀以來未免與蘇公同是一慨方擬乞身後即六七世墳墓可考者取蘇公族譜引而損益之使世之子孫執為典要且以楊侯不去其鄉而未能也觀李氏之族譜重有感於昌黎之說云贊巽齋先生像贊歐陽巽齋望宗六一辛丑掇科親老謝職色難愉惋思報親恩學通經史有本有根司户䖍州化被蠻貊别駕建昌益樹名節轉官秘著不為茍䛕說書崇政講貫唐虞都官刑曹讞獄羣備考文成均濟濟多士疏抗龍顔宜絶嗜好欲心一萌良心遂耗天子嘉納年髙與祠横經論道一世宗師及門之徒不將即相河汾王通雲龍下上名齋以巽殊非過情六一之學實傳先生贊龔知縣龍龍猶有欲垂頤就豢孰知吾龍頭角霄漢舜卿之筆子輝之徳往來清風霖雨八極贊程縣丞龍蟄於滄洲驤於海垠憫四域之焦枯遽奮爪而張鱗固將神變化水下土豈直嗔蛙躁蟹役役於形氣也邪贊何了翁帳龍淵蟄其真雲發其神為道不泥遇止乗行是為龍之靈是何君之所以名贊三山莊之龍魁星太極初開即有星紀字始蒼頡科始漢氏後人因之為鬼為斗乾元坤元非徳非有朂哉莊君明辨密察在邦必達在家必達贊沈俊之筆厥體孔良厥心孔端資汝心匠達我心官銘彭叔英砥齋銘爵禄之石厲世磨鈍頑夫奔走㢘隅蕩盡中流之柱障山囘瀾岩岩具瞻千古如山嗟今之人􅀈稜義利金銀銅鐡攪為一器淬去穢濁刮出光明他山之石有如斯銘黄山人羅鏡銘陟彼髙岡相其陰陽因以箴之終然允臧辭劉良臣母哀辭維婦徳之中正兮昉乎人彛彼美其盛壯兮甘白首於一􅄔夫仁者必有夀兮及耄而望期頤夫有徳者必有後兮紛四世其蕃滋嗚呼全而生之兮必全而歸之從一以終兮尚得正其何悲贈人鑑蕭才夫談命嵗單閼人鑑蕭才夫過予以予命推之言頗悉是秋迄次年予所遭無有不與其言相符噫人鑑其神已為之辭曰眇陰陽之大化兮布濩垓埏出王游衍之度思兮曽淺淺乎為天自青紫食窮經之心兮怪詭乗之而相挻竊掠五緯之膚兮誑其愚以自賢方疾其拂耳騷心兮羌作炳於𦕈綿將事實與行會兮抑抉幽而鈎𤣥予將窺前靈之逸跡兮就有道而正焉鄒翠屛改葬哀辭霜露成氷兮寒谷悲陽春歸兮草萋萋君一去兮何之造舟為梁兮車馬悠悠朝出遊兮暮歸休君一去兮誰留君故人兮如雲白髪兮繽紛髙臺曲榭兮如昨歌舞兮成陳君自蒔兮桂花昔芳稚兮今婆娑秋香飄兮九霄君不見兮奈何吳伯海自號滄浪為徐徑畈所喜擕諸公詩來訪因有感作滄浪歌并呈巽齋先生世混濁而不清兮蟬翼為重千鈞為輕彼滄浪其無據兮何纓非足何足非纓嗟靈均之好修兮安能受物之汶汶淈泥揚波以相從兮羌不知漁父之用心筦爾而歌鼔枻而行噫漁父其何如兮掉頭乎靈均文山集巻十四欽定四庫全書文山集巻十五宋文天祥撰說答歐陽秘書承心制說龍溪友議好事者為之不知其誰何也巽齋歐陽先生為之辯以書來曰君所處變之又變而或者於無過中求有過援經引古皆不類而又鋟木摹紙流傳四方莫曉用意所在君於國於家公私得失自了然於心雖不必較畢竟此於世教人倫有關係不可以流俗誤方來所以怫然不能自已於言也嗟夫先生所以主張名教愛惜後學至矣抑先生就其為說區别禮文之隆殺極其精微只如此固已明甚然兩家事實猶有非先生所盡知者若某初於倉皇中處此則不過從吾事實順事理之本然者而行之固不待如此鉤索精微而其當然之路自粲然可見也初此母嫁先伯祖生男三長曰行是為先伯次為先人又次曰信是為先叔女一是為吾姑先人生嵗餘嗣先祖後先叔既生而伯祖方殁已邜而後此母適劉鞠劉前室之子曰敏曰午而自生二女一男二女今各有歸男曰欽出繼於黄塘劉氏在文在劉通男女為七非適劉之日淺於適文文有子而劉無所出也當先祖存先人篤於生母則衣食敬共之丙午先祖歿先人始迎致就養然劉之子諱得不養之名嵗輒取養二三月至丙辰以後某始專其飬而嵗時劉之子孫族黨絡繹起居曰母也伯叔母也祖母也伯叔祖母也此母非以在文而諱其在劉劉亦非以其在文而不之母也當其在文特文有能養之資得以遂其敬愛之情而名義之為劉自若也是以殁之日其子午其孫伯參奔喪於西昌其二女各以逺近來赴其劉之族黨縞素哭候於道書銘旌曰劉吾鄉人見者以為是固當然無所不安也固非曰未屬纊為文既屬纊而名之曰劉而制禮為是嚴也彼好事非為文為劉之族黨姻親又非里巷父老知事之悉生於騰謗故亦不問事實如何而侮經慢法茍可以媒蘖者不遺餘力若曰文致綱常之說以壓之則可覆其終身云爾險哉其用心乎先生辯之得其槩矣要其肯綮數語可以破之彼之說曰在某當書申心制姪孫而銘旌當書故伯祖母某氏此十一字殊不類學者語此母從其實則先人本生母也平居無所於名則從其前日之位曰伯祖母如以義斷於稱謂亦恐未安而欲自名曰姪孫得乎心制而曰申稽之禮律曰子為所生父母也曰弟子為師也茍曰姪孫矣則何為下得申心制三字乎劉午之於几筵書曰先妣某氏之靈而書疏謝其鄉人自書曰孤哀子劉某以孤哀子為妣作喪主不為當乃欲書姪孫以主伯祖母之喪語之三尺之童然乎否乎以四十七年婦於劉母於劉而一旦暝目乃使之不得為劉母則劉之子若女哭劉母乎哭文母乎使劉之廟祀文母乎祀劉母乎且夫在文氏則生先人而出繼於先祖在劉氏則生欽而出繼於黄塘之劉其事體一也今欽為人後不得而服本生母亦止於申心制某方之於欽情義若何而曰意其必衰麻其服而乃寂無聞焉何其無稽之甚乎親喪人所自盡以義起禮此母為先父本生母在先父不及申心制在某遂承心制吾所自盡何與乎或人而或人詆毁之至此某非惟不必辯彼亦不足辯也獨此心不可不明於先生故具述於此以復命而不傳焉吳郎中山泉說子在川上曰逝者如斯夫不舍晝夜道體流行之妙往來而易見者惟川流為然聖人發其端倪欲學者體認省察而無一息之間斷也後千數百年程子始黙識而指以教人曰其要只在謹獨聖人言道之㫖學者入道之門於是而深切著明矣尚書郎吳君正夫名䝉因名取象有合於下坎上艮之卦遂自命曰山泉君所以從事則又取二程上蔡和靖晦翁凡諸言敬者識諸座右易以養正為聖功而養之方未之及也吾獨見自得乃從敬入則豈泛然而用吾力也歟夫川之水道之體也山之泉性之象也是故善盡道者以敬而操存之則猶之川而不息焉善盡性者以敬而涵育之則猶之泉而不雜焉蓋有欲則息惟敬為能不息有欲則雜惟敬為能不雜君之所以見易其猶程子之所以見天子歟雖然川上之事純亦不已誠者之天也泉猶性也泉動而出猶性動而為情也是則有幾焉誠無為幾善惡始以敬而持此幾終以幾而逹此誠則山泉其川水之源川水其山泉之流會而通之混然一貫故曰敬者聖學成始而成終者也君講切熟矣愚也不敏方願學乎此尚從君質之徐應明恕齋說自漢儒以大中訓極而極之流遂為茍容至先儒以極為四外標準而學者始知極自唐儒以博愛謂仁而仁之道遂為小惠至先儒以仁為包四徳而學者始識仁自漢唐以來有恕已恕人之說而恕之弊遂為姑息至先儒以恕為如心而學者始明恕聖人浸逺道學無傳於是漢人之中庸唐人之摸稜皆足以自附於此三字之義天下之不見聖久矣尚賴伊洛諸君子出而抉聖經千載之秘而後之學者遂得襲其遺餘以求進於道畨易徐君應明有志於學特以恕為入門則其幸生於道學之世而不至涵忍混貸以淪於漢唐之陋也審矣雖然如心之事亦有所用力焉按傳専言恕者其事有二子曰已所不欲勿施於人大學言上下前後左右有絜矩之道此言如愛己之心而愛人者也大學言有諸己而后求諸人無諸己而后非諸人此言如治己之心而治人者也然而如愛己之心而愛人則先儒必歸之窮理正心如治己之心而治人則先儒必以强於自治為本蓋未能窮理正心則吾之愛惡取舍未必得正而推己及物亦必不得其當然未能强於自治則是以不正之身為標的將使天下之人皆如吾之不正而淪胥以陷則吾之為恕者豈不相逺而吾夫子所謂終身可行者豈若是哉故夫論語一貫之恕中庸違道不逺之恕又必以忠並言蓋惟忠而後所如之心無往非正而凡窮理正心强於自治皆求以不悖乎忠而已也抑予聞之論語之忠恕至誠無息而萬物之各得其所也聖人之事也中庸之忠恕盡己之心而推以及人也學者之事也吾儕小人由前之所以用力者求之以進於中庸之忠恕則聖人忠恕之天豈曰已之菲薄而無足以進諸曽子之唯哉願與徐君講之勉耘說百聖在天六經行世譬之五榖皆美種也錢鎛必庤荼蓼必薅既堅既好實穎實栗不然畧閩蜀之蹲䲭拾燕趙之棗栗而吾未嘗不飽也嗚呼此豈樂飢常法哉彭君竒宗之為學也知所以種而以勉耘顔其堂其必自五榖始是穮是蓘必有豐年竒宗候之何晞程名說予同年何君時任廬陵縣尉尉㕔洛人太中大夫程公珦嘗辱居之後人為建公祠又建堂曰晞程志遺迹也何君生子吏舍温公之父生於池温公生於光名之所起率從其地君之名子以吉宜也而官於吉者多也顧瞻斯堂取義甚大名之以晞程程本為太中設何君名其子則以太中之子望之徴說於予予曰大哉名乎其何如而塞之哉漢司馬慕藺相如自名曰相如本朝有錢希白之類希樂天者也功名文藝之士事為之粗迹筆墨小技抵掌馳志刻心苦思歩驟之不難若夫正心修身窮理盡性通天地之化逹聖賢之藴如程夫子者其何以望於孩提哉雖然大中之在黄陂二夫子生焉其初固亦區區一尉之子耳洎其來廬陵二夫子年甚㓜則亦童䝉也初何以自别於常兒然其後受學於舂陵追繼孔孟卒以其性命道徳之說為諸儒倡聖賢豈别一等天人為之茍有六尺之軀皆道之體不可以其不可能而遂自暴自棄也且夫昔之為程也難今之為程也易中庸之學千數百嵗不傳二程獨發關鍵直睹堂奥此其事百倍其力而後能今讀程之遺書考程之行事作聖塗轍瞭然可尋一日用力事半而功倍吾儕小人獲生斯世講聞私淑之緒餘非如漢唐儒者之寡陋蒙賴福澤深自慶幸不敢以不自勉況夫青原之山川不改少府之堂宇如故二程事親從兄於此誦詩讀書於此思其居處思其笑語思其志意思其所樂思其所嗜百世之下居乎此者猶聞風而起況去之二百年之近乎此何君義方之所為汲汲也至於晞程之工夫當自主敬入然此大學之事今其為赤子何君養其氣質莫重於習古有胎教況於襁褓自其能言能行以至於入小學使之洒掃應對進退周旋先知其所以為敬周匝而無欠深穏而有本然後可以語晞程之事習於上則上習於下則下是一幾也何君謹之哉謹之哉君字了翁臨川人晞程生己未三月王通孫名說王君元剛生子名曰通孫初元剛夢有通守來謁排闥入堂閫驚窹已而左右遂有娠既生名之志所夢也予謂元剛名子之義甚大而其有意於斯夢也殆不其然人者天地之徳陰陽之交鬼神之會五行之秀也人以其血肉之軀而合乎太虛之生氣夫然後絪緼化育人之質已成而健順五常之理附而行焉其聚也翕然其散也霍然天地之化盈虛消息往過來續流行古今如此而已輪迴之說佛者有之茍自孔氏不當以為信然且夫人有此身即有此理詩曰有物有則孟子曰形色天性也聖賢之學主乎踐形而不願乎其外元剛之教子望之以通於性命之正以無負乎天之所以與我者其獨善也邪其遂符所夢也邪其復過之也邪皆非所必計也人之得形於父母而母忝爾所生逹不離道窮不失令名决性命之情以饕富貴富貴未必可得而性命已失其正此天下人子所以陷於失身者多矣予也不敢不勉而有知也不敢不吿諸為人子者元剛為人之父而亦為人之子者也其逹此悉矣予也言之其子之長也庻幾其有聞乎因豫定其字曰思為其長子也以伯冠之濂溪著書曰通微生於思不思則不能通微嗚呼思則得之人人有貴於己者弗思耳尚勉之哉元剛名義端豐城人通孫生戊午今四嵗云陳逢春肖軒說陳逢春景茂介軒先生之子也介軒名鳳官至朝奉郎監行在豐儲倉其為人剛直有守與趙東野齊名於玉虹翠浪間平生遊吳履齋包宏齋嚴華谷諸公之門諸公器之不置也未及用不幸早世景茂幼孤長而有立自號曰肖軒有志乎其先人也夫孝者善繼人之志善述人之事者也世之所謂狼疾人不肖子豈其性然哉志不存焉耳志之所至事亦至焉夫肖之道亦不一矣奮建肖其性者也談遷肖其業者也彪固肖其文者也羲獻肖其書者也瓌頲肖其位者也凡為人子者茍有一節不忝乎其前其亦無愧於名父之子哉蠱初九之象曰幹父之蠱意承考也易之所謂意景茂有之矣書曰若考作室厥子乃弗肯堂景茂必無是也尚勉旃哉送吕元吉麥舟說吕元吉廬陵之名族東萊之近裔也皇皇充充以母喪淺土未畢大事將以石曼卿自命而求以忠宣麥舟之事望於人自薄者而觀今世可復得麥舟乎以愚論之麥舟固可復得借令不得聚麥成舟猶可及也傳曰凡民有喪匍匐救之又曰孝子不匱永錫爾類中原文獻前輩典刑遐乎邈哉不可尚已然親親以及物愛其父母以愛人人心天理油然於不忍人之際者豈以宇宙隔而古今問哉吕君行矣昔人有言子母謂秦無人龍泉縣上宏修橋說修橋闢路佛家以為因果世之求福田利益者所以樂為之趨而佛家者流所以積心竭力勤苦奉承而不之厭也予過泉江道上宏聞有郭公者主石橋之役蓋毁家以成之而僧曇發則朝夕為之督其事頗難其力不倦其心蓋可取焉邀予為之疏惟予不得以與斯舉也郭老矣迫於其請則念儒書中是亦有溱洧濟人之事雖其事之偏而視夫拔一毛不以利人而且朘人以肥已者為有間矣郭公之所為若此是邦之人若士觀感動悟其能以自己於心乎夫善者性之所自然為善者人之所同欲罔俾郭公専美是邦可也而豈必曰福田利益之故哉因書以畀曇發使持示邦之可語者葉校勘社倉說社倉之法阜陵下之四方而周人委積之意復續於二千嵗之後文公請也公畏天命悲人窮汲汲焉於當世天之所以予之者不輕而得於其時者復厚天其有以行之也校勘葉君重開無一命為之階而倡率同志嘉惠閭封已能鑿鑿精實使君得志於世文公之議將次第而充之昔劉煇僉判時得俸不以自贏輒買田贍族或謂范文正公此志三十年非參大政則有不愜焉者矣煇為小官乃能随力為義可不謂賢乎煇之於文正君之於文公事有大小世有難易心之所推則吾無間然矣君雖布衣尚何不滿乎哉與濟和尚西極說天有南極北極北極天帝所居南極惟南海上髣髴可見非天之南北也自中土而論為人世南北之極耳天之所極實不可知淮南子言禹使大章歩自東極至於西極竪亥步自北極至於南極此亦姑舉地之極而言觀禹貢所載禹跡不為甚逺淮南子之說信有之乎惟漢張騫曽窮西方幾萬里而還不知是時騫何以未嘗及佛土後佛自西域來又不知佛生處與騫所經厯相隔幾何敢問濟和尚西方有極處無極處作麽生和尚未對旁有童子謂予曰日入處不知去人幾千萬里吾舉目即見吾不學佛佛何必西方和尚合掌作禮而退慧和尚說予里南禪寺上座曰慧慧早為通人得畫法於里之名手挾是出四方會留京師乃復得相與傳神法於異人自此覽觀山川之勝游歴人物之會足目髙逺逈長數格既數年厭薄世俗謂天下事止如是觀不如削髪遂為僧蓋收湖海豪氣一歸山林者也然技癢卒不能自禁嵗為星源神像軸若干春夏輒有逺役初鬻本祠下神與慧若相宜者大家豪人見輒動心亹亹不愛金繒以致之得之者咸指目以為川僧所為自是四方游山上者無畫以歸謂為徒行争致饋槖中約隔嵗取償慧輒如期往讙曰川僧來矣取畫者填門慧徐開篋笥如約分付不半日畫盡矣若是者年久遂為例今人親戚交友之間才有一錢利害寄諸其手皇皇然惟恐人負之以數千里不相知之僧相期於一嵗之外求之也若懇寄之也如棄人情豈大相逺哉藝之動人一至於此慧之畫其流傳多矣獨相與傳神秘其術不輕售間與予言相頗肯傾臆事多如其言然每會聚輒睥睨不已予知其欲傳神也越數年竟不下一筆予今春偕弟過山中坐定慧忽躍然起倉皇索筆不再注視描畫不踰刻而予兄弟二人嶔􅏟之狀已宛宛如活一坐烘堂一日用繒一幅置予於前予弟於後冠八角巾著道服前者垂臂以執袂後者歛手以銜袪又作幼弟背像手持孝經一巻上紀移忠孝一章若將獻諸二兄左為海潮淘湧澎湃濤頭有數丈之勢一金龜隠見出沒於沆漭之間題曰忠孝歸朝慧之用意亦勤矣因聚觀者與慧共評之為之大噱廼指潮而言曰予寜駕絶海之颿以突魚龍之變怪乎將極目於南龕北赭望洋而不濟乎寧揚清激濁以弔䲭夷子之遺乎將波流瀾趍以嬉戲於杭人之旗鼓乎寧依乗於鰲遊鯤化之會乎將有鹹有腥有滑有腯姑茍膳羞以自活乎寧泅不已以取衝擊乎將知止知足與汐水俱為縮乎寧與波上下屑屑於朝夕之往來乎將觀陰陽之進退察日月之盈虛翶遊於六極之表乎質之予弟予弟笑而不言問之慧慧曰區區何足以知之予於是服慧之得予貌而知慧之猶未得予心也因為紀其能事之本末以謝其勤并具予之所以言者噫亦安得知心之士而與之語哉深衣吉凶通服說深衣篇大槩三節第一節言其制短無見膚長無被土以下是也第二節言其義規者行舉手以為容以下是也第三節言其用可以為文可以為武以下是也此雖三節然畢竟義為之主故篇首曰以應規矩繩權衡其文坦易明白前輩解之悉矣獨吉凶通服猶有可疑或謂考之本篇曰可以為文可以為武可以擯相可以治軍旅而不曰可以弔喪可以受弔曰善衣之次而不曰喪服之次雖其間有孤子則純以素一語近於喪服則又曰鄭氏注年三十以下無父稱孤則是無父而服此衣當用素純耳非孤子於居喪之中可以此代喪服也其必以為吉服之說如此然愚嘗參五經傳博采旁證則此雖吉服未見其不可通於凶事也按擅弓將軍文子之喪既除喪而後越人來弔主人深衣練冠待於廟垂涕洟注云深衣練冠凶服變也蓋既除喪則不當復衣喪服故以深衣受弔以喪服一變而即用深衣則深衣雖謂之喪服之次可也雖與善衣之次之說相反正足以見其互相發明耳按曽子問親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趍喪注云婦人始喪未成服之服蓋成乎婦則成乎婦服惟其未成婦也不可以衰故趍喪以深衣然則此亦凶服之變也今世女子未聞有服深衣者然以此事考之凶事而可服其服於吉事可知也注云禮教久廢故女遂廢此衣耳按雜記大夫卜宅與葬曰有司麻衣布衰注曰麻衣白布深衣而著衰焉此服非純吉亦非純凶也夫衰凶服也深衣吉服也衰之下有深衣焉故非純凶深衣之上有衰焉故非純吉由此論之深衣不専用於吉事又可見也按間傳大祥素縞麻衣注曰麻衣十五升布深衣謂之麻者純用布無采飾也蓋大祥已除衰杖本須服吉然使便用采飾之服則孝子之餘哀未㤀必不安於此故魯人朝祥而暮歌子路笑之有子既祥而絲屨組纓記禮者譏之此所以用深衣者蓋在不衰不采飾之間也按喪服記公子為其母麻衣縓縁注云麻衣小功布深衣以麻為小功布者以大功降云公子之庶昆弟為其母若父卒為母大功父在降大功一等用小功布深衣以此證之深衣固為大祥之服而亦為小功之服但大祥縁以布小功縁以縓耳夫以深衣正篇本専為吉服而言然畧以此數節推之其於凶服亦自可通大槩喪服皆用布而以精粗為輕重之等鄭氏云深衣用十五升布鍛濯灰治斤八十縷則是千二百縷為經此今世極細之布也然則深衣之所以為吉服者以其布之精密又布易得而難損取其貴賤可以通服經所謂完且弗費注所謂可苦衣而易有者也而揆之喪服則用布適同而為色又相似且經鍛濯灰治故止可用於服之輕者耳非如他衣服用繒帛綵色則専當施於吉而不可通於凶也此正如近世涼衫耳阜陵以前士大夫皆以為會聚之常服其後遂於弔喪用之則亦以其顔色可通之故正此類也但是深衣之制領緣不同其間純以績者乃是以盡飾為美此恐専為吉服而不當與凶服通至於用素用縓自是喪服本色獨用青者則通於吉凶之間皆無舛耳若夫冠屨一節却欠商議今人謂服深衣必須用某冠某屨此恐未明蓋冠屨之制深衣正篇既不曽見明言而其散見於他傳者其冠亦各有變如將軍文子之喪主人深衣練冠是受弔之時方用練冠也其施之吉則固有他冠矣如女用深衣之縞總則趍喪而後變用縞總也其在平時必他有以為之總者矣又如漢制乗輿服深衣則用通天冠髙九寸是天子而後有此冠也推而下之諸侯大夫士以至庶人豈當拘於一冠矣乎切意深衣有一定不易之制而本篇所以不載冠屨者恐冠屨當是從時耳何以辨之夏之冠曰母追殷之冠曰章甫周之冠曰委貌又曰元冠三代之冠其制已各不同有虞氏深衣而養老則深衣自虞氏已有之此時自須用虞氏之冠尚不及有三代之冠也又安得所謂某冠者以是推之深衣則古矣而冠屨當無定制也孔子少居魯衣逢掖之衣長居宋冠章甫之冠衣少所居之服冠長所居之冠二者參用各隨其宜初不必曰魯服則魯冠宋冠則必宋服也以聖人之於時且然況今世而服深衣者其為冠屨也既不載於經則其隨時也為得矣必欲用某冠某屨則恐又失之泥也然則所謂隨時者宜何如其以深衣為吉服則今之緇冠為不必易也如其以為凶服則受弔者固當以檀弓練冠為法而往弔者亦須如之𤣥冠不以弔故也嗚呼禮之時義大矣哉器數之精微制度之詳密雖以夫子之聖不敢自謂生知而屈意於一問區區何人乃敢率其胸臆評論千載之上多見其不知量也雖然亦識其所見云爾尚以俟有考者講義西澗書院釋菜講義知瑞州日孟子曰人之患在好為人師韓子犯之而世怪且罵桞子厚所為惴惴然而不敢也某承乏此邦其於教化號為有一日之責蓋嘗吉朔而履乎學宫得聞諸君之所以授受者而親陟臯比與逢掖講師弟子禮則僣之為尤書堂有事乎先賢諸君不鄙而固以請則雖寡陋夫焉得辭某初被命來守嘗啓政路曰古之為諸侯先政化而後簿書期會世之不淑乃倒置此則相與病夫風俗之弊而士行不立且傷夫教道之久廢而未有以救之也固嘗有及於君子徳業之義而重反覆焉輒誦所聞并繹其㫖與諸君茂明之易曰君子進徳修業忠信所以進徳也修辭立其誠所以居業也中心之謂忠以實之謂信無妄之謂誠三者一道也夫所謂徳者忠信而已矣辭者徳之表則立此忠信者修辭而已矣徳是就心上說業是就事上說徳者統言一善固徳也自其一善以至於無一之不善亦徳也徳有等級故曰進忠信者實心之謂一念之實固忠信也自一念之實以至於無一念之不實亦忠信也忠信之心愈持養則愈充實故曰忠信所以進徳修辭者謹飭其辭也辭之不可以妄發則謹飭之故修辭所以立其誠誠即上面忠信字居有守之之意蓋一辭之誠固是忠信以一辭之妄間之則吾之業頓隳而徳亦隨之矣故自其一辭之修以至於無一辭之不修則守之如一而無所作輟乃居業之義徳業如形影徳是存諸中者業是徳之著於外者上言進下言修業之修所以為徳之表也上言修業下言修辭辭之修即業之修也以進徳對修業則修是用力進是自然之進以進徳對居業則進是未見其止居是守之不變惟其守之不變所以未見其止也辭之義有二發於言則為言辭發於文則為文辭子以四教文行忠信雖若岐為四者然文行安有離乎忠信有忠信之行自然有忠信之文能為忠信之文方是不失忠信之行子曰言忠信行篤敬行篤敬則忠信進徳之謂也言忠信則修辭立誠之謂也未有行篤敬而言不忠信者亦未有言不忠信而可以語行之篤敬者也天地間只一箇誠字更攧撲不碎觀徳者只觀人之辭一句誠實便是一徳句句誠實便是徳進而不可禦人之於其辭也其可不謹其口之所自出而茍為之哉嗟乎聖學浸逺人偽交作而言之無稽甚矣誕謾而無當謂之大言悠揚而不根謂之浮言浸潤而膚受謂之游言遁天而倍情謂之放言此數種人其言不本於其心而害於忠信不足論也最是號為能言者卒與之語出入乎性命道徳之奥宜若忠信人也夷考其私則固有行如狗彘而不掩焉者而其於文也亦然滔滔然寫出來無非貫串孔孟引接伊洛辭嚴義正使人讀之肅容歛袵之不暇然而外頭如此中心不如此其實只是脫空誑謾先儒謂這様無縁做得好人為其無為善之地也外面一幅當雖好裏面却踏空永不足以為善蓋由彼以聖賢法語止可借為議論之助而使之實體之於其身則曰此迂濶也而何以便吾私是以心口相反所言與所行如出二人嗚呼聖賢千言萬語教人存心養性所以存養此真實也豈以資人之口體而已哉俗學至此遂使質實之道衰浮偽之意勝而風俗之不競從之其陷於惡而不知反者既以妄終其身而方來之秀習於其父兄之教良心善性亦漸漬汨沒而墮於不忠不信之歸昔人有言今天下溺矣吾黨之士猶幸而不盡溺於波頽瀾倒之衝纓冠束帶相與於此求夫救溺之策則如之何噫宜亦知所勉矣或曰至誠無息不息則久積之自然如此豈卒然旦暮所及哉今有人焉平生無以議為而一旦警省欲於誠學旋生用工夫則前妄猶可贖乎曰無傷也温公五六嵗時一婢子以湯脫胡桃皮公紿其女兄曰自脫也公父呵之曰小子何得謾語公自是不敢謾語然則温公脚踏實地做成九分人蓋自五六嵗時一覺基之温公猶未免一語之疵也元城事温公凡五年得一語曰誠請問其目曰自不妄語入元城自謂予初甚易之及退而自櫽括日之所行與凡所言自相掣肘矛盾者多矣力行七年而後成然則元城選成一箇言行一致表裏相應蓋自五年從遊之久七年持養之熟前乎此元城猶未免乎掣肘矛盾之媿也人患不知方耳有能一日渙然而悟盡改心志求為不謾不妄日積月累守之而不懈則凡所偽人為者出而無所施於外入而無所藏於中自將銷磨泯没不得以為吾之病而縱横妙用莫非此誠乾之君子在是矣或曰誠者道之極致而子直以忠信訓之反以為入道之始其語誠若未安曰誠之為言各有所指先儒論之詳矣如周子所謂誠者聖人之本即中庸所謂誠者天之道蓋指實理而言也如所謂聖誠而已矣即中庸所謂天下至誠指人之實有此理而言也温公元城之所謂誠其意主於不欺詐無矯偽正學者立心之初所當從事非指誠之至者言之也然學者其自温公元城之所謂誠則由乾之君子以至於中庸之聖人若大路然夫何逺之有不敏何足以語誠抑不自省察則不覺而陷於人偽之惡是安得不與同志極論其所終以求自拔於流俗哉愚也請事斯語諸君其服之無斁熙明殿進講敬天圖周易賁卦彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下臣聞賁文飾也色相間則成文故柔來文剛上文柔剛柔相間所以為賁賁離下艮上離之體中以一柔間兩剛是柔來文剛艮之體上以一剛乘兩柔是剛上文柔使獨剛獨柔不相為用則不成文矣此言賁之卦義也天之文為二曜五行象緯交錯故曰觀乎天文此言天之賁也人之文為三綱五常倫理次序故曰觀乎人文此言人之賁也以上係易彖大意臣竊窺先皇帝作圖之㫖以敬天為名其於賁卦實摘取觀乎天文以察時變一條臣謹案圖義而為之辭臣竊惟天一積氣耳凡日月星辰風雨霜露皆氣之流行而發見者流行發見處有光彩便謂之文然有順有逆有休有咎其為証不一莫不以人事為主時時世也彖易聖人不曰天變而曰時變蓋常變雖麗於天而所以常變則係於時人君一身所以造化時世者也故天文順其常則可以知吾之無失政一有變焉咎即在我是故天文者人君之一鏡也觀鏡可以察妍媸觀天文可以察善否且如厯家算日食云某日當食幾分固是定數然君徳足以消弭變異則是日陰雲不見天雖有變而實制於其時又如旱魃灾也才側身修行則為之銷去熒惑妖也才出一善言則為之退舍天道人事實不相逺自古人君凡知畏天者其國未有不昌先皇帝深識此理故凡六經之言天文者類聚而為之圖以便觀覽且恐懼修省焉聖明知敬嚴父之圖即敬天在此矣嗚呼曷其奈何不敬此先生兼崇政殿說書日講篇也講篇非一如講詩之定之方中一篇諷當時修繕事今亾其辭云道體堂謹書與府理錢昇叟天祥此畨京師聚會相與有加於丙辰極以為竒遇在他鄉得此可謂甚幸依依之意至今使人不㤀執事去之一日奸腐恰有復用之命國事至此誼不容黙遂上封章以求一去當國者調停數四迄未能動三乞祠三不允正以為苦天生聖明從諫不咈初給之以假繼許以假滿去之於是而仍令復供本職吾君之美不容不將順遂亟亟祇承今一切又如初矣執事才離國門猶未至鄉國詎料此半月中乃有一陣如此之擾疇昔侍教幾曽有一語及此等事變輪雲非人能測有如此者封事藁拜呈不敢效孔光秉畀炎火於以彰吾君天地之為量也方巖造化初甚危之後來左司過堂一禀化地乃謂初判聚字失記已曽禀來前既有兩編校恩例今合當照行更不必啓矣前此兩月徒爾皇皇天下事皆不容人算度吾徒作事只信天去初無毫髪計校或謂失策觀方巖之事益以自信周起宗者送至申狀紙見說内有差符謹謹緘納所有餘文俟其趂逐到手又以見授當又訪問遣歸也明禋之後區區之跡必可得請一出此時梅嶺行事尚或少遲猶可合并傾敘契闊前數日待罪甚有餘間日勝方巖棋不以局數計今兹再入市叢又如前日倥偬不給乗間作此殊不能擇語伏乞台照文山集巻十五欽定四庫全書文山集巻十六宋文天祥撰
