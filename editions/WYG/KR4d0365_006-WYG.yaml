body:
  text: 與吳提刑觀某頃待罪闕下薄奉函書襆被來歸嗣音杳邈上下人物感念世道未嘗不於門牆拳拳也某比者伏讀邸報欣審玉陛出綸綉衣移節夜醉長沙曉行湘水已著平反風酣章貢日麗崆峒更煩輕熟江湖相望原隰増輝某官宣慈而恵和髙明而正直義豐授受孔孟氏之淵源江左聲名王謝家之門第蚤立登於閶闔遄坐厭於蓬萊竹馬相呼春生襦袴星軺所至雨卧桁楊兹洊捧於英函乃肯臨於梓部刺史故人按事飲酒情法相當忠臣孝子畏道驅車君親交盡靡需席暖已趣詔温某杜門深山去城郭甚逺而於太和差近初謂旦夕使艎泝贑石而前可於快閣上下迎候一拜忽傳英蕩小駐青原某揆之始望則蹉跌矣瞻睇行臺輒易奉狀代敘燕雀之萬一若夫揚清激濁洗寃澤物閭閻欣欣無所患苦使屏退之蹤亦得從畎畝以自放適是則某之所自賀者也臨紙切切與湖南陳提舉合號中山某猶記乙丑之夏從江西提幹得往來行書江濶雲空年光如水每懐世道上下人物未嘗不中夜耿耿某兹者恭審奉少府節駕常平車衡嶽連雲逺挹海山之秀天囷麗漢近垂楚分之光原隰春深旌旗風動伏惟歡慶某前年與公同除郎去年與公同除節不才安得追附名勝自分却立下風猶幸時論不磨得公輩落落㕘錯使民物吐氣國庶幾耳相望千里北斗在天何時執鞭寫此忡惙回林學士希逸號竹溪某夙有幸獲與介弟為寅恭因之有以詢居處著作之萬一不戚戚得喪而言語文章足以詔今傳後竹溪先生何憾哉一日之赫赫者多矣千載而赫赫者幾人為一日計者無千載也決矣云云回贑守李宗丞雷應號樓峰某偃薄林阿不虞使者之涉吾竟也迺自空同來顧我猿鶴米家書畫光怪滿山此豈四海九州同年無情者邪僕家青原深處實與君侯黄童白叟接畛而處自下車以來但見年穀獨登鼪鼯屏息不需數月報政赫然兹豈獨千里能事環君侯四境雞鳴犬吠晝夜相聞實共受賜僕也彈琴讀書於其間其賜多矣敢圖髙誼厚鎮撫之委貺盈箱非所當得睇瞻霄立頓首知歸吾鄉宰邑於使天之下者三人焉其一為陳行夫若羅子逺蔡濟甫皆曲江齊盟者奉令承教必有可觀廬陵一歉異於常年田里憔悴不堪舉目惟章貢素無糴事而得嵗又偏鄉人顛頓者往往相率而趍治國民食闗繫茍可通融兼愛秦晉公之恵也謹復書空山白雲無足持報薄言采藻臨風如馳回交代湖南憲新除湖北漕李宗丞某既専鱗幅奉起居猶有腹心不嫌裔擘某屏卧寛閒無復山外想公朝念其流落畀節起家使之繼明公印綬之後聞命憮然不知所為堂有重諼葢年耄矣湘行且千里舟車迎侍不堪顛頓是以懇悃丐祠冀便私養天髙聽邈促㫖旦頒叱馭回車進退維谷將從鶴髪而來耶則非養志將又以香火請耶是何為者而為是瀆也謀之乃心稟之親老旦夕姑以㫖甘屬弟輩單車將指以明不敢自棄於明時而復以不得將母重告之造命俟驅馳數旬即乞身以歸為臣子稍盡已分耳某於門牆知己論交非一日天又開之以奉令承教之機是其與四海九州之同年其有情益倍倫等誠不圖解后及此古之君子其為人也謀之必忠愛其人也惟恐其不入於徳故敢亹亹陳出處之槩惟執事啓誨而圖利之言不盡意臨風如馳與江西黄提刑震某幸托年盟夙依㕓部竊跡萬山底衣被末光飲墜露餐落英粗安半菽公之餘也久疎晤寫滿目春雲一水盈盈遡詹河漢某兹者共審出綸鳳闕移節虎城春信初傳立變桁楊之舊天光下照重瞻禮樂之新依然故部之江山籍甚先庚之號令伏惟驩慶某官剛不吐而柔不茹寛有㫁而愛有威發為文章正諧韶濩勁沮金石凜然節槩光垂虹蜺聲揚紫微早分潁川二千石之符就秉天囷十三星之節據案叱吏笑比黄河清開門賑飢功過中書考上久簡孟博登車之志公遂為勝之持斧之行春風遍地而狴犴虛夜月當天而鼪鼯伏載馳載驅維騏維駱靡憚周咨來游來歌如圭如璋言觀肆覲某避影杜門久矣不作山外想不圖元㑹之日上恩覃及流落畀相讞於珠玉之側虎䑕同器猿鶴笑人云云回林司業應炎某夢想巍巍堂堂於朝花院栁間追隨猶昨日事也玉烟劒氣轇轕崢嶸杳然在碧雲崔嵬之外江月流水實照沄沄某官以冰輪金井之心胸發黼黻火龍之光燄而又慥慥乎言行皦皦乎進退若汲長孺若陸敬輿若慶厯元祐諸賢充公之為表裏庶幾其無愧領䄂斯文旗翼元命天下以此望公者殆人人同願玉立以需之某自歸來乎山中俯仰半菽不復得與四方書牘從事比從户曹黄文得誨函草木同味玉雪照心欣懌之餘感慨係之某踸踔之蹤何可為者大化驅之一節誤落湘雲避走陳情俞㫖竟閟單車徊徨且此首涂行復求返吾屠羊而已𣺌𣺌天一方重此懸泝専容陸續貢敬回信豐羅宰子逺名椅號澗谷某去年聞雙鳬南上落落空山不如燕雀之為有情也大化驅人作江東客數月爬梳枵瓠未見端倪㑹誤恩召環洿班過當亡何狼狽而去葢疎闊以來居多道路之日出處乖方滋可為笑杜門息影中髙情厚鎮撫之専介持書勞苦臨風馳感可人天一方信豐山水邑見謂讀書松竹晝影滿簾著吟人其中所謂予方有公事此豈錢穀吏比耶勿需終更西清有詔璧弟何為者赴新昌且百日商蚷馳河未知攸濟恵徼如天之福寡過多取數矣贑瑞皆佳邑藹藹吉人鼎立空同真一時之盛當路或令舉所知某幸甚有以藉手薄言修布小附芹心非敢謂報倚筆詹泝某臘前函書往來庶幾契闊之意年光冉冉驚見雙璧葢曽兄季囦専紀綱實來仰惟同年長者所以恵綏荒寒皆可感也某雲卧深山世意落落一起一仆非人為之上天葢髙匪怒伊教敬威念咎安得不力執事昔為之助喜今亦有以救其不逮乎敢請季囦值儒者之窮執事以氣類遇合所以位置之者寵甚萬間寒士公將溥其施於一時所謂兆足以行矣某為之歛袵新年喜雨燈前報命馳想一方臨紙悁悁回羅子逺就賀除京𣙜某俯仰歳年甚知聞間頃知巻斾來歸衣錦有爛且趣舍人裝于于然東矣亟欲擘箋所思雲頽鶴倦不可拈拾竟墮夢寐外時一動寥廓想江邊鷗鷺為之悵然忽得手書賁我空谷華衮流離辟易久之共審帝闕出綸天京司轄姑養簉鴛之望佇傳峩豸之音伏惟驩慶明公契古胸襟吞雲夢者八九外物瑣瑣遲速何心積之厚發之𢎞宇宙間華軌清貫將次第而取之以其時考之則過矣某風雨深山避影却走乃元㑹之日公朝以一節起其流落回首三湘驚心蕉夢請𨽻香火㫖更趣行􅀢親以逺役為憚進退維谷莫甚此時旦夕黽勉拜命姑單騎之戍馳驅數旬乞身歸卧緜上同年有情不隔四海九州之逺毋金玉爾音冀一語以自壯拂拭過情非所敢當也占對梗槩尚猷嗣箋某一之日既端拜敬謝芳題并報信豐簿攝雩之槩二之日謹遣介馳諸席間寅奉起居不敢繁敘首祈委鑑某昨歳入湘後墮身徽纆中詹泝宇下闊焉嗣音繼聞趣戒朝裝榮司京𣙜某念欲箋悦賀厦以申風雲發軔之慶一春屑屑行路浸墮因循既抵空同後潼川趙同年來為縣實在河陽舊桃李處鴻沙指爪猶記東西所以告新者甚厚因得切諗脩門近况大帶深衣長身玉立道徳福澤方來而未艾也吾鄉諸老行輩落落巋然靈光惟今澗谷先生依星辰傍日月一日騎麟翳鳳朝閬風夕𤣥圃勢正順耳某衯隂杏集素辱心期慕王陽之回車學毛義之捧檄得郡山深俯仰半菽君師天地之造知己錫類之餘也惟是求牧力緜未知攸淑回首蔽芾我愛桐鄉豈無一言益其故人并寄父老因風東向頓首以請與汪安撫立信號紫源某仰惟曠度絶人不作邊幅僕安得以書生刀尺從事髙明幸察之某昨者為髙安受容受察於玉斧之下公不以衆人畜我我實徳公未幾公去之而僕亦以憂患連年卧山中蹤跡跋㚄未足為知心道也撫念江流人物如此未嘗不中夜耿耿某兹者伏審揚綸九陛建纛三湘人無異辭國有生氣共惟慶愜欽以某官名髙九牧氣葢羣公江左管夷吾足係英雄之望軍中范老子能寒寇賊之心往者金湯中流忠績簡在上方以南事為慮詔公方面隠然長城一代數人百年幾見公不得不力紀勳旂常歸衮廊廟自此等而上之某退在漁樵未忘􅄔緯聞公此來為世道擊節偶逢黄君强立長沙使介率然上狀仰闖賀床强立名至道某昨嘗薦至館下强立每謂公以意氣動人能使人不愛其軀其感激知己可見今兹適在冀府從諸公遊公不以生客視强立强立奉筆墨以佐大閫豈直一日之長而已慿筆僭越向風如馳回前人某望五雲多處以駑劣下乗幸甚自託於禮樂之下風既奉儷函布親牘修大閫府之敬迺不我後先使者銜命即之於深山中翰墨陸離光動蔀屋拜而後敢讀讀已而亟拜居今天下論人物一方一曲之士隨世以就功名謂之無益於成敗之數可也當大方面建大將旗鼓使國有龍虎馬不敢南向其周公瑾祖士稚之流乎天子召拜樞近修勞還故事少府旦出節付以西北煩公辦此金戈凱馳歸衮廟堂作太平六典四海以此望公亦公志也某少也驅馳嘗有意事功雞鳴奮發壯懐固在然而亦少衰矣被㫖行湘顛倒繡衣豈堪重著惟宿昔於門牆辱知己厚恵徼宇下恃此敢來適三月移卜先塋有山間之役受印之期尚在夏五竊聞四輩在道車馬有行色天殆嗇其一見之機乎何為屢得之而屢失之也追憶前年自直廬汰歸公以書存問推許不薄海内時流得此於名公者正恐無幾今承奬翰益佩巻巻江濤𣺌然事㑹何極何時執鞭寫此傾葢某臨風無任馳泝之至與胡都承穎號石壁某已端具儷櫝候敬籖房心之精微敢嗣陳之某於當代知名夙有取履結韈之願寄書梅外嘗寫我心逺道報襄如見顔色伏自牙纛巻零雨而還鴈闊湘深馳泝寥廓伏惟以任重道逺為心以難進易退為節巍巍堂堂卓然佩安危而繫輕重乃今聖哲馳騖上心焦然金城圖意師表微公孰與於斯追鋒在道不俟駕行矣某家畏壘山下麋鹿之與羣而猿狖之為曹也公朝起其流落山衣易繡舊夢恍然一節走趍幸在通徳里九轉寵靈亹亹肘後某行當掃門以請拜狀梗槩臨風巻巻某一節出山指碧雲崔嵬八風吹不動處知為神龍卧洛所也前者幸甚脱屨堂下進瞻芒寒適子之館授子之粲胸中經綸之竒傾倒敷露中夜慷慨音落九霄使人驚且喜今而後知宇宙間未嘗無劉𤣥徳輩某持以去岣嶁襟袖尚有萬丈光此殆未可與俗人言也某以疎決故一葦下長沙初約先拜見而後往帥垣下偶有牽制稍違息壤之舊今兹回棹潭濵將由便道單車負荆門屏之外輒遣一介先道其私幸豫戒猿鶴勿以俗駕為拒率然馳控倚卜面敘慰饒州胡通判石壁之姪某兹者不圖先令叔某官石壁先生遽捐里館風馳上征哲人云亡邦國殄瘁執事者骨肉至慟為國受弔撫孤大誼定力如山足可以對嶽雲之崔嵬矣顧惟某落落後出辱二阮之知乃在一日之間老仙用意慷慨與之上下今古撫念人物袖中瓣香僅僅拈出一再老仙所以命之者更在度外爨桐之音方希而化人之裾已不可追矣出聲慟哭悲不自持謹裒綴壹鬱賦為奠詞往者如生尚為我惻惟一賜宣燎豈勝感涕之至與安撫李大卿芾號肯齋某已専具儷櫝申敬記室私心梗槩不嫌裔襞某辱知愛門牆非一日之故風流雲散一別如雨毎一念此神爽飛馳江湖一雲本不甚相隔彼此出處解后參差至闊絶乃爾僕之罪多矣明公當世人物巻韜山林四方顒顒望其一出方時多艱􅄔緯忘食然見王茂𢎞者固以為江左有管夷吾某有計日以俟鋒車耳某避影深山久不作馳騖想公朝念其流落畀節起家釋緜上耒而于征未知所以淑後幸甚區區走趍實在中台之里十年契闊一旦逢迎豈命物者開其親炙之機而惠顧之乎如聞閉門謝客雅意絶塵然待故人固自有情猿鶴必不我拒相望寖近凝泝如馳回永州楊守履順巨源之後某尚論一世人物紫朱其綬唱呵車塵若是者駢肩矣求其忠義貫日月處漢賊危疑之間臨大節而不可奪至於殺賊奴取纍纍金印此事付度外豈不凜凜大丈夫哉父老講傳百年間吾見先太師一人而已某官鍾岷峨之秀嗣彛鼎之勲忠臣之門天人之所共祐國士之器君相之所柬知石崖齊天唐中興頌功處也公來其間寧不感慨今蜀道難蜀道難公收拾羣人手揮天戈一節之還從甘棠刻第二頌旂常濯濯光于前聞人某何幸身親見之歸隠空山望湘雲千里不圖使者遽涉吾竟仰惟明公主張斯文經始棘院以相龍飛興賢之盛大張門顔使某也得執事從君侯所以厚我不同他人小人雖無能為役烏乎敢辭貢院二字僭易奉上進之退之惟命未諧握手往來心聲庶幾古道之槩臨紙拳拳回林侍郎卿孫號雲屋在臺時某從望闕山矯首五雲多處寖疎起居長沙少府傅仙恵書并繳貺琳琅之翰仰惟緇衣宛孌古道顔色為之歆拜傅仙不肯望然而來以書先訂出處此意亦頗謹重已遣禮聘之且告以初筮如九層臺基須令堅壯可耐靜以待次不失雅道未知傅仙何所嚮若其來訪敢不惟命戒之共回前知衡州楊祕監文仲某已端飭儷櫝致敬心之精微不嫌裔擘首祈垂烱某於足下非敢以氣類詭流俗之蹤尚想疇昔載色載笑相遇不同他人至今厯厯在夢時方孔艱荆吳多壘坐廟朝籌帷幄折衝俎豆正張趙韓范之事業湘水以西勤勞一障天子曰歸借徑斯文本色俾執事樞歎見之晩某閉闗念咎不復作馳騖想公朝出節誤及荒濵回顧黔驢曷對湘鴈趣命且攽單車于役稍盡君親之誼即尋香火之縁衡雲照人垂執鞭弭乃上天笙鶴不復顧雞犬矣所恃襟期有素且未忘甘棠則其居中庇之誨之某與蒸湘之人均利賴焉昂首慶雲伏楮耿切與劉尚書黻某夜拜文昌朝馳函敬感激亹亹不嫌裔擘首祈穹采某庚午待罪底班望英躔萬丈於絲綸閣天章潤色衣被青黄雋永味言稱於天下曰知己歸伏山阿分霄壤絶不敢以世俗書尺候主進吏熏香宣夜北斗以南共惟某官文章稷言而􅆏謨器度商彛而周鼎陶鎔帝皇轇轕造化燭六合蕩八垠吾道之福布濩流衍翠幄青瑣之從容文劒紫荷之凌厲由八座而間兩社使天下再見希文稚圭之風流某嘉與人士旦旦稽首某瓠落之蹤一意返哺夢寐不到山外公朝未忍捐棄抆拭而起之復令效湘節牛馬走煙霄流眄不進不止葢疇昔之盛心未也某始以私養丐閑廩天髙聽邈且趣之再奉明命以趍一之日甫履回鴈布宣徳意唯謹湘人尚力抵氣味俗輕生蘇息而調服之既竭吾力焉垂天之雲覆燾其上訖濟我後某為之夙夜願言因謝有祈臨風悁結與陳察院文龍號如心某夙在眷知屢牋契闊杓粲奎明經緯碧落曉夕詹馳伏惟執事以光明俊偉之胸負法家拂士之望鳳鳴朝陽萬物吐氣氊厦宻勿熈明日新陸贄處中汲黯居禁精神强而本根充外難不足平也上方屬以經濟俾執事樞某歴落之蹤豈堪使事公朝不忍終棄盡出嘘揚始以私計不使迎侍冒干閒廩趣㫖且攽單車于役以五月一日受印司存既見父老具宣上徳意然兇猾相挺山凋水瘵扶持調習庶幾一日非晩且再陳情為歸養計侯誰在矣張仲孝友儷語循比藉手不足以當劒首之一吷臨楮無任某輒有稟瀆某昔者以臬敗由書生本色只當在斯文一邊不應以刑獄為職故凡寛厚惻怛處人皆由之而不知其有不可以詘令甲者則譁然以為過當所處非其位故也自後諸公速有論列皆不實知其人不過以前疏潤色而為之辭某常願一日有以自見於天下使知吾所謂衡氣機者而未易遂也今年復除憲實不願就丐祠不遂鋭欲再請又念起自廢閒豈當童瀆已甚故且黽勉驅馳亦謂姑以平平處之可也既入竟乃知湖南風俗大不然某若以身事懲創靡然風采懼無以肅一路觀聽又坐失職故初至不免見之榜掲謹録本以達台覽夫如此初未嘗有嚴厲之事特示之以警戒之意葢於職分不得不然然才作此差遺便是惡滋味兩日刷具一路獄案數目甚多莫非劫掠嘯聚等事他時審覆既圓皆不容付之輕典某且獨奈何哉某此來不及侍親處此亦大不安俟疎決後惟有乞身歸養所恃知已肝膽相照臨書不憚傾倒念其久要其必有以教之嚮風巻巻之至與鄧校勘林某頃繇春中走赫蹏闖輦下知上徹五雲閣久矣一節奔走行役曠焉嗣音矯首河漢盈盈一水某蒙賴如天之庇以孟夏八日辭膝下五月朔吉受印於衡陽初見吏民既宣上徳意退坐棘木塵中與徽纆相爾汝為之弊弊焉江去湖不甚相逺始者殊不諗其風氣之悉至此始知尚力抵氣以血人為嬉九城一波莫障其瀾某以為怒之而不教非古祥刑意也見諸榜掲嚴而不為殘楚人亦頗為動悟其肯綮中也然某以書生為之非其本色不諒者衆此十年所以有申韓之謗以至于今日是安得而忘吹虀之想乎且重闈以老不得就養單車徬徨雲舎切切旦夕疎決後且即丐還屠羊使叱馭回車於君親兩不為失此其所以謝夙昔君子之教而庶幾乎年盟之盛心也厚徳錫類某恵徼福於宇下葢方新焉偶逢便武亟詗起居且敘其所以跛躄馳驅者遥對清切臨楮泝詹與陳直院維善名合號中山某隃睇紫霄寅致儷櫝心之精微敢嗣陳之某昨承鵲袍出使馹騎歸班嘗領廬山下所賜手書光氣垂虹下照空谷撫歳年而如雨恍河漢之一水也中山先生文運斤而成風氣振䇿而奔電元龍湖海突兀宇宙支架明堂曲摺萬丈光芒緯國典華帝制天下固以為未也大明奎璧晉執事樞使士者顒顒歌仲淹弼一䕫一卨某落落青山自返吾哺公朝未忍捐棄畀之一節使與衡鴈相周遭草木吾味一引手馮翼之端出緇好某始以私計求閒廩聖恩閟俞且趣之載道遂以朔日見吏民宣徳意然楚俗尚力抵氣殺人為嬉撫存而調習之未易為力明公宿昔褰帷棠隂如屋五雲緯霄影落衡杜某為之夙夜願言因謝有祈臨風依遡某頃侍親抵郡輒持尺素専貢紫清懐今雨之綢繆望下風而慷慨也璧弟來京師拜夫子之門黄河泰華天下鉅麗之觀璧也所遇多矣今天下稱文章大手筆落落可數平園西山諸老之風流散在三光五嶽間日月磅礴河漢經緯吾紫微公實當之南州之士僕將帥以聽某讀書涉獵筆墨空疎方青山蕭然水上之風猶若意㑹一行作吏此事便廢間於故牘中掇拾親親長長之説見於行事邇來千里民氣覺稍洽和書生不知向方能終不迂闊於事否昔人云未識意先感水火流燥記吾味久矣教思無窮勿替引之某豈勝惓惓與曽縣尉先之字孟參某自前拜書後回首鴈峰不勝拳拳水口吳權寨來及承手書備見繾綣故舊之意百單二歳之姥孟參發揚之安序表章之真足以為衡陽一段佳話某六月朔日祖母初度亦及與一城老者相周旋人生七十古來稀是以自七十為始千數百名中其最髙者為九十六延此母於堂進趍語言殊覺不衰惜未有過百者鄉間有羅提幹存叟祖母去歳滿一百歳某嘗偕朋友十餘人往拜之當時有詩歌成軸今年又百單一矣此是大家諸孫皆儒者提幹登科有福有壽又非衡嫗比劉守却未知某旦夕亦當為文以白之贑斗絶與湘問久相隔適有自建昌來者云五月二日廖恕齋過建昌知五月末主人到臺觀上矣司存事首尾闗繫無如孟參在恕齋必不能相舍安序權事半年添此繁劇想一旦釋重負甚以為喜某於賀恕齋書中已備道孟參一段人將爭出我門下此自無説但願足下斂以靜鈍守以亷朴一如平日則天下之竒材青雲之逺業也贑事稍簡親老以下俱平安亶出雲庇但有疲於竿牘以一人之寡應四方之多覺甚苦之鄉人相過者隨分處之亦不至甚相炒中間只一榜禁假託大者歸之臺小者聽之縣或以為得體贑只有出甲一項未易杜絶今春此輩在廣聞某新上皆急於歸就保伍乗其畏向之機近日未免先事諭曉度今冬可得安靖湘中既獲諸渠魁後想道州一帶已無事湘鄉諸處敓攘之風當是久已帖息兹因専介信筆傾倒薄芹并瀆向風如馳與曽架閣某曠不奉狀者累月杜門山居無由四方上下以相從於顧眄咳唾之末馳仰中得㑹李文復卿廉知起居之詳甚慰子曰茍患失之無所不至百千年間天地不位萬物不育推尋其咎常於患失之私基之閣下出其浩然之蓄積與當世之大人論成敗爭曲直言不合艴然竟去榮途引於前禍機怵於後而毅然不變由閣下自處則本心内事也自惴惴持固者觀之則豈不患此失哉歐公所謂我輩中人敬歎敬歎因復卿歸并介以有請先通判託孤於先侍郎先侍郎以其責歸之架閣事至重也執事不以某弟為不穎使昏名門講好以來涉四年矣中間嵗月雖多機㑹甚少以故告成吉禮猶切遲之獨至今日則造物若有巧於其間者執事當驅馳江淮而某赴闕就道執事巻風雲藏林壑而某恰亦骯髒來歸兩家初意誠不期有此暇也某方尋香火之縁自分閒散而執事氣宇葢諸公名聲動中朝扶揺九霄匪蚤伊莫則川駛月流舟飛岸奔非復有此之暇執事終先子之託而某了同氣之責今其時乎區區肺肝已具告之復卿并疏其事冀以闗徹幸執事終恵之囘吉守王提舉佖號敬岩某僻居林薄間望旌麾所涖逺在霄漢道徳朝望蔚乎輝光可仰而不可親是其分也迺蒙寵戒令有聞教之便忻快何如入冬暄寒相薄適有采薪之憂莫醻隆厚滋負皇恐謹具狀謝他容㕘謁并敘區區與廬陵龔知縣日昇號竹鄉自螺水而東望西山廬阜與三江五湖如拱揖知蜿蟺扶輿有名勝宅其間相去蓬弱良覿差池北斗芒耀徒耿耿心目爾不自意桑梓幸㑹牛刀大手姑為此試共惟明和介潔之譽此邑不占已孚跂予望之艱難之秋得君子之政與拜燾覆之貺滌篆云俶未能躬闖賀庭謹具劄子代布忱悃非晩當圖稟謝不敏與贑縣許權縣惟廬陵與安成為比郡山川同在吉志今兹遂得自附於鄉黨之末幸甚休甚某往者於諸公間得聞政事一二有司敬謹莫重於獄後世茍簡幾以民命為戲濓溪為小官不肯殺人以奉其上東坡謂今人爭減半年磨勘雖殺人亦為之聖賢愚不肖之用心其異如此頗傳廉明與同州推官事前後照映辱在同里與切増氣銅章墨綬賁止空同一同風化姑此相屬奏最匪伊騰太清凌扶摇錢公之步武也某疇昔學技曽於名門子姪畧有相知者獨絇履末光未有下拜之日其如傾企何適陳文成甫來以為託身桃李之國輒拜此以識惓惓陳文并乞公庇也率然上狀未繇參侍仍冀自愛不貲之寳以須逺至賀劉敬徳補入太學名欽號絜矩兹審捷來南浦聲振西雍才名三十年説屠龍之老手冠帶億萬計快走馬之脩程儒榮有開士論稱服共惟驩慶某相期半生聞榜折屐無繇造慶謹奉顓函芝楮二百千敬為犒捷之助不腆皇恐臨風馳泝賀鍾有謙補入太學名山甫兹審冰闈獻藝璧水蜚聲月旦評中説八义之老手朝雲飛處艶三合之修名下同與周徳甫為季弟從弟聘某比者牽率朝從一相過兩日夜陪接議論之末極慰翹企獨恨去之匆匆未遑屬饜耳中間妄欲以二弟相累陶冶荷不鄙棄許之以相周旋甚幸甚休鄰敵相交則有盟市道相質則有劵吾徒相與一諾已足政不在要約區區也然君子義以為質禮以行之莘郊之幣際可而幡然雖虞人之微非其招不往非義無以將禮非禮無以昭義交際之道不以節文將之終必有弊况為弟子擇師乎此書之所以不敢廢也嵗禮之數息壤在前無俟贅述官楮一百貫顓人送上以少將聘致之敬告幸麾頓小弟差劣不可大脱鈐束燈前後早賜垂訪乃所願望觀徳聽教行有日矣尚及傾倒其餘文山集巻七欽定四庫全書文山集巻八宋文天祥撰書與文侍郎及翁號本心川人後參政某乆曠起居遞中連得誨帖仰佩至愛邸狀間屢見丐祠尊性樂在簡淡急流勇退仙風道骨人也但老文學為諸儒典刑真侍從為朝路風采上必不聼去耳舍弟璧來拜侍辱以家人進之得與教誨玉成實受尊賜某向在湘承命問一路書籍後某去之匆匆諸州來者不齊今約見存可二百冊贑書為一萬九千三百餘版亦已陸續印背别容一日專兵齎申某治郡以來書生迂闊之説頗有效驗祖母六月生日集城中内外老人自七十一至九十六為男女一千三百九十名犒恤有差老者既踴躍而少者始皆知以老為貴禮遜興行詞訟希省又風雨以時早禾甚稔晩稻亦可望諸縣民皆樂業無持梃為盜如宿昔者稍逭曠瘝皆尊誨所逮宗老去國後今寄居何處想甚清徤恥堂先生居霅川近況如何批示幸甚遇郵拜書不宣備髙恥堂名斯得川人參政本心癸丑榜眼後來廬陵省其叔可則先生時年十八邑校簾試全篇論題曰中道狂狷鄉原如何冠榜遂通譜焉道體堂謹書與楊大卿文仲某頃繇岣嶁申敬羣玉之府爾後僕僕西還為空同之役一息半期海山一碧秋風凌凌翹企不勝五雲紛郁比審䟽榮文石晉武頌臺制作一新搢紳交慶伏深歡抃某官貞元朝士西學宗師玉雪照天寒露清氷之操璧奎行世懸黎垂棘之光屬時訪落朝有老成眞天聖之蓍龜元祐之麟鳯也入告辰猷條天章十事寘之兩社以福溥寰某顒顒延睫烏哺萬山間於芻牧何補亦惟召父杜母之政是則是效蒙被吾味至于今兹璧弟來修門得親炙典刑以濯去舊意浸潤新雨愛其兄施及其弟此感殆未易名言也念間起居輒此馳泝空明并候所以教尚析金玉式副前禱趙户部平逺某嫋嫋秋風中若有天人嘘新雨而沐之者眄摇落之繽紛把鉅麗而舒巻則夏六月錦闈蛟龍字也西平有子惟我有臣春秋書曰季子來歸國人貴之麒麟㳺泰畤鳯凰集阿閣之候乎朝廷清明再天聖元祐對揚訪落為東諸侯先洗耳琅琅為天下誦之某為養承乏于此何補芻牧所以朝夕其民亦惟親親長長之推庶幾萬一云耳諸邑大夫之相承通融一家痛痒一體緇衣之宜兮若田君尤所謂用吾情者執事惠以所知於此見田君益竒而某得納交幸也結幽蘭兮延佇此意襞積專猷嗣箋某繇空同起睨海山虹氣緯霄靡罅不照吾石樓大地一粟也輒倚空明來詗起處惟偉人照以度外某惟明世雜遝英賢以綱紀生人金玉新政豈弟君子來游來歌經緯乎文武轇轕乎風雲伯塤仲篪叔出季處無非吉日車攻問眞實經濟臂指西北本在中書植之風聲旂常世世某拭目延和殿新綸之下烏哺且半期餐毎祗益媿耳旦夕歸命香火奉輕車歸即所安居中引重允然終惠之望泚筆廉泉馳訊碧落豈不嗣音更僕以請臨風無任悁結與陳侍郎伯大號篤齋某熏沐􅅔露闖敬髙寒惠徼五行俱下之矚某玉峽撑空水沙一碧神仙人弭節其間春花秋竹鐘鼓餘閒眞神龍深臥處也咫尺五雲不得時候猿鶴則吏鞅實丹黝之夜瞻明河自訟不置仰惟一代翔鸞神駿騰踔凌厲駕寥廓而振汗漫也舒為慶雲巻為清飈其磅礡帝所則福在海宇其夷猶山澤則望在廟朝六合一握天地一瞬也厥今訪落廟謀雲漢為章詔書出延和公且兩社某嘉與顒顒額手某區區烏鳥之情俯仰半菽枌陰蔽芾實持燾之宿昔拊摩凋疲曽㣲芒忽而􅄠皤皤問亦念家旦夕皈命香火奉輕車即所安玻瓈一江光氣上下某服媚之無斁蕝禮寄之九霄間忘其蒙瀆倘沐涵茹幸甚與宋衡州某介倚心知不敢徒亹亹西曹道邊幅首祈紆省某自抵空同兩厪蜚翰忽殷勤以寫心折芳菲其寄逺春風千里著人如醉至如骫骳之作不足乎楊繅藉而琮璜之大好大慚退却三舍顧區區定交才數月宇宙意氣不啻平生忽飄風其相離不勝回首明河一方如耿耿何某官氷輪金井雪柏霜松西岷太白之精九霄經緯南平莫邪之氣萬丈光芒馳玉軼而坐朱陵轡華絲而當銀漢洗鼪鼯之窟穴飽鴻鴈之稻粱已收暴公子之威名小燕汲淮陽之清淨緑綈方底竚垂岣嶁之雲絳幘曉籌催傍觚稜之月某視郡印已十旬初至如人家風雨四壁逐處經理久之方成綸緒日來甘霔應期粗慰農望想福星所次時雨膏之早熟必已可卜恕齋新上以同里而講交承解后非偶然者逺想楚觀五雲衣冠玉立不任馳羨采采澗芹薄旌一髪不足當莞頓欲往從之湘水深三復是詩神爽飛越與知江州錢運使某日戴五雲茍且為治自省其私則統部中一支壘也等威有截不得以杏園宿昔自詭乃者辱不彼賜之書草本吾味篤實嘔喻畧分際之崇卑申度外之繾綣言念君子終不可諼兮某惟湓浦控上下流古用武之國陶士行庾元規諸公藉此以鷹揚江表虎視河洛乃今天移福星作鎮此土激西江蘇鮒轍屹長淮而斷鯨汲作宋長城真北平變化傑魁人也東南金湯施及虹翠𨽻也受賜多矣某私竊自念贑山長谷荒赤子龍蛇雜襲而處芻牧之責大恨不任而欲以詩書操强暴衣冠化力劔書生迂闊而不至敗缺者幾希明公回首曲江風誼一世果不以九州四海之人例視之則鞭辟其不迨包蓄其未間如天之福也某頓首下風以請謹馳一介上詗起居薄采空青以自附於潢汙有敬之誼犯嚴忸然控露潦畧某撫摇落之繽紛泝空明而延佇龍光射牛斗福星出虛危殆一夕九起也某之為郡寔𨽻照臨月詗有典當不懈益䖍寧不嗣音童瀆是懼五雲九霄凌倒景而下空同劔為清氷溥為膏雨地雖辟絶而天人顧復之益深豈無他人不如我同味之下塤篪五老之嶙峋襟帶九河之汗漫要其胸中磊磊落落倬彼雲漢為章于天者曽未究也忽而身作長城手提半壁嘉與一道桑麻而菽粟之西人之子幸則幸矣然大轡如濡王事一方孰與入坐中書經制天下聞延和殿議召公矣某强顔芻牧何補毫分目前四境無虞年穀粗豐皆澄清餘潤所覃也區區素餐是愧倘使者猶以故人未即舉法旦夕丐香火奉輕軒歸即所安徼福年盟尚終惠之逺道寵賚雜遝充庭翠玉春暉緹襲無斁謹具劄申聞伏覩新綸專容郵賀與廣東曹提刑某曉挹􅅔露注之赫蹏上之東壁府昭有敬也某惟紫微雲烟衣被炎海若經若緯紛郁輪囷施及虹翠間山媚川暉浩蕩何極𨽻也旦旦稽首欽以某官才足以截蛟剸犀文足以鏗鯨躍鳯力量足以扶巨鼇之贔屭東都韓吕家聲猷奕奕經濤如許更當坐玉關為天子當一靣綉衣霄漢尚逶迤五嶺間邪袖青㝠之鈇鉞行黄道之星辰方底緑綈已落天半某丕戴五雲奉重諼空同小院烏鳥私情自揣逾分起視四境山長谷荒赤子龍蛇未易帖服越雞伏鵠卵何以克濟邇只臺容如靣鉄壁某恃此無恐郡中舊例以八九月間申嚴編氓出甲之禁往往此時兇儔陳脚已動履霜不戒堅氷奈何近者妄意預行曉揭使家至户曉人人知所避就今年僥倖梅關以南無一草一木之驚僕之責始塞榜檢求教吏師尚不彼發藥之某比為五羊羅僉判拜書强聒持寸莛撞巨鐘多見其不知量飛剡公車不俟終日明公有意天下士如此感拜盛心謹馳一价修詗節下謝已往而祈方來亹亹如也東望芙蓉玉立萬仞伏楮神馳回汀州陳守某惟自古民流為盜有受病淺者有受病深者淺者調其氣血時其餧飼不待針艾而病已除昔之人有行之者龔少卿施於漢之渤海是已深者參苓之所不能可湯熨之所不能瘳則大承氣湯証矣昔之人有行之者子太叔用於鄭之萑苻是已今者使部弭盜一事鼇峯先生豈弟之心髙明之識見諸已行者其成効固班班著矣賞一人而勸者百罰一人而戒者亦百春風之和秋霜之栗施及鄰境胥有嘉賴特在更酌其受病之淺深而斷以行之是殆非浮想懸度者所敢與知也贑之為州雖曰以五城兵馬鈐轄繫之銜顧建立司存本意不過為贑民出他境使郡將得行通制之權要其實則依然一列城也若有所徴調下郡稟承實視朝命謹布腹心以謝委戒之辱藁秸恐悚與趙大卿孟傅號松壑前知贑州某汲廉泉澡栗尾通忞忞主書吏昭初好也某昨從湘花間奉盈尺牘一舒泄其宿昔雲龍之私明河七襄流麗空碧地中之山謙水上之風渙十襲九緹至今耿耿光氣蓬萊水清淺縹緲環佩渴心湧泉一日千里某兹者共審玉宸渙寵金掌升班維城維翰維藩磐石大宗之續厥貢厥包厥篚綱維六府之司禁籞雲開神塗風動伏惟慶抃欽以某官祥源異稟若木殊輝綺綉揮揚汝陽天人之相龍虎變化北平魁傑之風勞侍從而厭承明經駘盪而出馺娑公不淮海之薄上為宣室之思玉珂金鑰之玲瓏花綬藻衣之舄奕徑摩馳道渙周卿六命之頒不出都門竚唐相九人之拜某頃單車馳岣嶁下鶴髪重重一夕九起效矉洗馬歴歴陳情君師天地之造為擇便州夫子奔逸絶塵乃使𨽻也瞠若乎其後雖鴻燕差池不克靣拜龜組然天開百世之好山川其忘諸惟是求牧力綿未知攸淑一規一隨賴有柯則在我愛桐郷不隔風雨肘後寵靈不彼而惠綏之此固憇堂中父老之所共望賜者也謹具劄子申詗起居未諧良晤願言金護玉持式副前禱應舊治要來敢請其凡與前江西趙倉與椯號端齋某澤露焚蕤闖敬五畝花竹下盡脫犢彛惟髙明垂詧某沐滕㕓舊雨今十六七年立冀部下風則又六年僕以荒落之資跧伏於青原山中如商蚷馳河逺莫致之先生如驚雲㳺龍舒巻九霄其步武不可俄度宜乎其欲往之而瞻望不可及也區區九十之親就養空同今綉衣洛社中輩行也間得訪問獨樂起處先生玩心神明之表游目日月之上蓄為清氛蒸為甘霖一日舉而措之沛然江河孰能禦之我有宗老為國之榦訪子落止以公歸兮某半生出處無足為明公道宿昔受教所以䕶持其元龜者至今不敢渝世人自有一種毁譽道眼自有一等髙下先生度外大觀謂其人竟何如也某因諗趙令君居中台之里又出門下値其良使函裒此墨少敘戀思臨楮馳泝與吉州劉守漢傳某澤頴祓蕤寫忞忞銅壺閣下昭鄰好也某日從郵置得澣我私盈盈一水間鼔宫宫動鼓角角動精神流注絶出筆墨町畦芳菲菲兮浩蕩何極欽以某官吐吞玉櫃之風烟披拂青藜之光燄卿雲甘雨舍天地之至和古栢蒼松炯雪霜而獨立小駐星河之棹頻分江國之符春靄袴􅃭神螺黼黻雨籠絃誦振鷺漣漪鈍為銛而頑為廉痿者膏而憒者醒兵衞森畫㦸小宴清香衣冠拜紫宸佇班黄道某宿盟園杏又尾朝花蒙霧一㕓稽首錫類朅來空同密倚五雲多處楚波之及晉魯柝之聞邾川媚山暉沐浴令雨則所以講信修睦者奈何以簡陋廢采采澗蘋以明有敬玻瓈一碧此心俱東某日摩挲空翠端飭側厘以進之集古主書之側蓋於門牆辱好有三焉園杏之齊盟也朝花之末至也三間風雨託於君侯之土地也而豈但曰小國之於大國也有交鄰之道焉謙齋先生不以小人之美芹者為僭而察其明有敬之私是能容之其𢎞多矣介使踵來辭曰報聘庭實維旅芳菲彌章是何君子施禮之周執徳之信而僕何以當之抑傳有云長者賜不敢辭取數之多亦祗以媿贑去吉一水三百里而氣候風土習俗事事不同未春已花才晴即熱山川之綢繆人物之伉健大槩去南漸近得天地陽氣之偏看來反不可以刑威懾而可以義理動書生出其迂闊之説嘗試一二觀聴之間稍覺丕變奉令承教於君子尚願維今有聞以淑厥後廬陵之政識與不識皆云一佛出世山川出雲時雨流動此為霖之善者機也民歌路謡徹聞京師天子明聖恩光言逺某雖不敏尚能取皇甫公韻歌和之占謝之次寫其輪囷寧不嗣音如此江水回吉州趙倅某首春攜便符歸省道五臺下華􅅂葱蒨照我征衣雪􅘳氷懸灑灑清味至今彷彿宵栩間投膠沸糜不克闖屏星西來以修賀上之禮琳琅金薤忽落虹翠三過跫然以喜某兹者伏審緹軾行春畫堂開曉䄂槐雲之五色俎樓月之千峰共惟歡慶某官瑶簴簫鐘秋濤瑞錦駕玉虹垂蒼兕凌紫清而上之固其所也鞙鞙佩璲乃翱翔石泉松雪間邪輿藤簾綉小燕屏題方底緑緹又看環召某視郡印十旬云云皆矞燾之賜也自省於涓曹正負不敏圓椷鄭重此禮奚宜至哉鯨錦巻還猶有餘媿折寄芳菲今雨何厚頓首拜嘉謹謝將命尚容專致厦成之慶回袁州鄒倅朱明逾半南薫之時共惟襦袴行春旌旗麗曉有燕有翼某對廉泉飭側厘東嚮以謝主書吏某頃叨節南馳得符歸省三峽烟雨中一再獲拜瑶林瓊樹之側亹亹吾味我心寫兮執祛幾何時明月千里惠而好我錯落華音下照虹翠赤脚踏層氷忘其執熱也共審龜臺借重鳯岳疑清時雨誦絃和風條教伏惟歡慶某官東山芝蘭之韻北斗梧竹之標朝發軔兮扶桑夕攬轡兮𤣥圃識者已竊遲之兩樓山水能久著神仙人邪竚文組之即眞以介圭而入覲某禊前一日奉重闈抵空同下既三閲月公事稍清得小遂半菽歡錫類之餘也實篚勤斯芳菲襲子新雨洒濯感在下風采采一芹效矉隴寄非所以報也馳遡一方回臨江婁倅夏鳴仲琯良苖懐新共惟風月滿樓江山入句百神僎价某焚蕤瀹露專謝中㳙若兩廂氍毹五鼎芍藥無庸為仙人瀆某於東都韓吕家鼎鐺獨無耳乎頃一節湘行獲衡陽從廣文君亹亹簷花情味甚舂容也清江之上頡頏飛霞獨不得四方為雲追軼清絶琳琅金薤光墮玉虹執熱以濯我心寫兮欽以某官氷壺玉露之冷冷瑶林瓊樹之英英黄琮蒼璧之熒熒上之清都盛之紫㣲便當還家氊本色石泉松雪可久為麒麟係耶方底緑綈自天子所某將指罔功叨恩便養空同小院粗可從容半菽歡皆矞燾之賜惟芻牧之才單龍蛇之俗險凜乎未知攸濟渠渠逺道頌不以規既謝下風尚沐新雨畫堂髙處槐桂成行春蚓秋蛇覺我形穢明公不以覆瓿而顯設之鉅軸爛然一見頳發謹復將命不勝馳泝回隆興熊倅震龍某撫今雨露清風其契闊未有甚於此時者也俋色絲於浦碧追流水於爨焦其慰浣有甚於斯今乎澹圃先生以氷懸雪􅘳為風骨以鸞漂鳯泊為文章以規圓矩折為政事挈其堂堂著之髙處以經緯河漢舟楫江濤萬夫一喙也陳仲舉千載風流乃獨與歲寒結印倐霆轟飈怒而起有不磊磊落落者乎時來則為當仁無遜某雨别十年無非俯仰林烏之日祖母行年八十有七切切便養承乏此來公朝篤棐人紀之造而諸君子錫類之餘也第五閲朔于此塵而入鞅而出於民無絲分補行矣丐一縷香火縁奉輕軒以歸亹亹襟期明月千里折寄芳菲厚意不敢不拜薄將石間一髪非所以為美芹也廬陵廣文玉戛金鏗長沙識衡山簿猶昂昂雞羣之鶴中峰有以服乎兩峰觀者爲此膽慄何當簪盍上下慷慨目送征翰臨染馳去與楊縣尉如圭某他日上下紫淦間草木吾味未必無解后之雅者也廬陵少仙之庭數有英㳺發軔其間而君年又不可及當官風采東西行者亹亹誦言知為清修知為縝栗培風慈飛霄漢一碧跂予望之某誤恩便壘夢繞松楸間伏戎于莽有乗虛而干法犯禁者霜臺遽以煩執事知敏手為可托也寒泉白骨蒙賴方新惟牽帥從者重愧重愧草草持慁高明臨染無任回唐書記某一節湘行得挹寳烟至氣於芙蓉池渌間亹亹吾味歡如平生岸花催路吹絮滿衣􅂱其五雲落我店月厚意久不報所思逺道回首􅋏然執事以瓊琚玉佩照映東西鸞凰先驅朝閬風夕𤣥圃可也赤雲瑞氣黄花歸期當仁勿遜某花朝前四日扺雲舍又十日奉重闈泝灘而上禊前一日抵空同郡事稍簡俯仰半菽皆矞燾賜也江湖寥落鴻影參差安得素心人相與數晨夕毎誦此詩明發不寐輙持只赤小澣我私采采澗芹臨風如結回黄强立某薄㳺空同繾綣半菽故人知心千里寄瑶華音以繅藉之讀之宛然促膝接語也强立以排淮決漢之胸行駕風鞭霆之氣鑄為雄辭能使京師紙貴新豐舎中誦天下事一日騰上風聲千載某來此訟簡事稀餘力可及故讀四境倍稔絶南剽之跡皆五雲所照映也久缺報襄輒郵專筒薄將聊奉一笑回文教名寳某久徯亢宗無從通譜璧弟幸托年盟雲杏集中不知曽得納拜否己巳之歲千騎過廬陵有意來山中時某適赴鶴書取愧薜荔失此交情悵然一方之感書來空同陳誼天出欲往從之湘水深令人亹亹栁子厚謂南方之靈鍾而為石故有多石少人之諭某常以為未也地氣自北而南古有斯語意者人物之數斯文之運亦莫不然玉篸羅帶之勝中州山川所未有也磅礴鬰積而振發之以其時可矣吾宗丈寔當之乎令業方來雲湧川至樹之風聲快覩燄燄某半生落魄無足為宗盟道去年單車馳岣嶁下堂有重慈白雲間之陳情至於一再遂授今壘闔門就禄亶出過數力綿求牧未知向方宗丈宦遊海外坐隔一關一介相先是不以他人待同姓者委貺所及拜而受之薄物非所以報何當嗣音與胡節推幼黃某他日盤之中辱玉山朗然照之舉帆淩斗牛掛席拾海月已占吾成玉堂堂於此時矣空同落葉間快讀千佛喜見榜花雙峰巽山嶙峋蒼翠布濩轇轕何盛大如之國家三百年代有英傑樹之風聲五緯聚奎之符彪炳未已滅没草根者固復何限吾成王一大振起之青原劖空忠節生氣是則草木同味也隃計晝綉娛雙親時某當以奉祠歸里尚從郷稚耋候馬首遮慶兹襞赫蹏寫此茂恱亹亹薄將祗瀆繳奏藁上中書札子時吳復齋當國某惟軍國萬微日至黃閣不敢為竿櫝區區懼瀆威峻惟鈞宥是祈某頃罹人子之厄曽拜仁人親親之恩感激榮光永矢無斁不自意今春伏遇先生衮繡來歸為國柱石遂得密邇陶鈞以庶幾一日履屐之役幸甚莫大先生當國以來上迎聖主悔悟之機下慰蒼生蘇息之望所謂垂紳不動聲色而措天下於泰山之安先生有焉乃一日伏讀明詔許中外臣庶得實封言事皇心光明言路軒豁恭惟啓沃至深也某私念今事變至此衝决横潰使宗社有不測之憂者誰實為之病根在内膠結不去終不可以為國是以積忱具書先陳其愚慮之一而痛哭流涕終之人非不知愛身何苦如此冒死今日之事急矣懼其至於一旦則亦不免於死也惟是言輶如毛懼不足以感悟天聽尚賴先生徇通國之心出回天之力以措世道於清夷光晏之域某九殞無悔謹繳奏藁具申伏惟鈞慈俯賜鑒察賀簽書樞密江端明古心某夏五之月伏從下土切聽朝命共惟天子蒐選洪儒布滿侍從而先生以海内達尊居然冠文昌之首僕自惟念正人登崇天下誠幸誠賀不敢以草野有踈輒奉狀以為斯人之慶記史登録及徹巖視私心欣喜莫可涯涘山澤深逺與廊廟本不相接一日閭巷風傳歡呼則謂先生以某日踐政地參樞筦主上聖明君子終為大用莫不舉首加額以為其相天子活百姓遂在旦夕以一方推而放諸知懽欣交通人情莫不皆然人望有所宗而斯民之譽猶出於直道僕為之舞之蹈之中夜以思不能成寐夫以穹壤之大人倫之衆而先生之進大夫士庶民皆欣欣然相告如其父兄親屬之得用將有所利賴於己者此其心豈千金之所可得而家至户曉所能同哉我朝先正得此氣象惟前有范文正後有司馬公范自諫府以來以言事傾動中外後來出帥西邊入班兩地岩穴之士慕下風而望餘光蓋皆延頸企踵以庶幾其一日之為相司馬居洛中十餘年當時兒童婦女識與不識競曰司馬相公元祐初衞士之感泣都人之遮留其所由來者漸矣非一朝一夕之故也范公得經世之望司馬公得救民之望嘗恨士大夫所以積望於平日得望於當時蓋幾世幾年而後得此二公有心厭服天下之心口聳動時人之耳目而范公不及用司馬公不及盡用天之未欲平治天下其如之何哉今先生早以言語妙天下中以政事動中朝後以氣槩風度上結人主之知而下為四海所傾慕則先生都范馬之望於一身蓋二公之後又凡幾世幾年而後得此天下之所以責望於先生者豈與伈伈睍睍笑與秩終而丼同草木俱腐者同日而語哉方今西有叛將東自逆離而江淮與强敵為鄰强兵富財之道無所於講主上不得怡宰相以為憂其顯證莫過於此而學士大夫私相擬議痛心疾首以為方來無窮之變伏於不足慮之中而發於不測而不可禁者其幾尤切凜凛天下無事則代天理物之地猶可從事於牽補架漏以庶幾不至於敗缺不幸搶攘憂危之間倘非碩徳重名積孚於人心一日舉之以從民望則鎮服危疑收拾渙散精神氣勢未能一旦動天下之聽也今當揆身定大亂奠安方極不敢自以為功而方嘉與天下之賢者共圖久安長治之策先生從容於廟朝訏謨於帷幄則當揆所以隆體貌敷腹心未能或之先也酇侯所以舉代於平陽茂𢎞所以深器於安石其為天下國家計者甚悉豈曰身為功業而已哉則夫先生之一身其關繫於方來之世道誠重且大而閭閻之内父子骨肉私憂過計以為脫有倉卒則所以寄命而幸全者非先生疇依然則先生之望近世以來絶無而僅有者將范馬不及為之事先生將來雖欲逃之而不為其亦何辭以謝天地神人之所期哉僕鄙野無足道又執方不通於世修門之書毎視以為甚重而未敢輒發其於先生獨亹亹不倦自天下之公而言則僕之喜談樂道與人情若不相逺自一身之私而言則僕誠何人而辱先生特達之知此其所以伸紙行墨樂為四海誦其情而不自覺其僭且瀆也伏惟先生少垂察焉某仰惟三台熒煌之精藐在雲漢下土之人夜詹􅋕􅋕曽無羽翰可飛簉於經天光耀之側間者不揆雖荒繆之筆墨時得以上登㳙史而觀道徳聽教誨自謂未有疇昔則左右亦以其人為何如先生度越常情嘉惠後學采於窮約之素以為可進而教之廬陵之士凡來謁先生者未嘗不深念其姓名至於造化人物之地先生所以提撕薦進使之得以齒下士於朝則既有日矣乃者祕府之命從天而下空山不頴之蹤跡一日有聞於人自宰相鈞陶而言曽無所偏私而某心口相謂山澤之人何以及此是蓋有所從來而不敢忘也當泰之世必有均調皇極之輔深思逺計周及人物雖遐逺僻陋如不肖亦使之無所曠棄九二曰不遐遺得尚于中行今當揆以之泰之未成也必有一陽為之先而後衆陽之氣類隨其汲引以進今正人滿朝大抵以先生為朋來之倡至於晚陋亦得依乘以前初九曰拔茅茹以其征先生當之屯之六二曰匪冦婚媾女子貞不字十年乃字二嫌於初不願為應徘徊不字至於十年某雖不足語此顧惟刼而從之者衆矣蓋至今日得先生為之宗主奉命驅馳惟此時為然某他無能為役至於守其本心不與流俗為軒輊以求上不負知已下不負嵬瑣之所存則或可無愧怍於此尚惟先生終斆之某欽惟新命亟應祗赴顧以未服外庸不敢即造朝班區區欲俟宫觀兩考批滿日徐拜恩渥蓋已顓狀控於朝矣諒先生當許可之遥睇清崇未即詹侍輙奉狀臨拜懇悃與前人時以前宰相帥湖南回某半生出門下幸甚乃從湖南以一節奔走閫部去年此時拜長沙壽星甫償分願潭衡相望郵置信宿奉令承教王事一家以父兄師弟子之情而行於連率方伯之際湘人或云前未見此比而某也受賜為不貲矣先生之入湘也某後三數日而來先生之出湘也某後三數日而去何其步亦步而趨亦趨也璧弟於臨江候迓使艎獨蒙一再予進所以愛之誨之不令兄弟無間然者曽不自意先生及豐城以下乃有門内之戚盛徳大業如山如河存神過化之學先生其講之也熟矣某所得郡去家一葦而近奉八十七之祖母與老母俱闔門長幼無慮二百指悉從官居糜費俸粟是皆公朝錫類之造郡事頗簡四方無竊發之告日來風雨亦以調順使茍禄之日得免曠瘝非大播之賜而誰賜秦孟四者久焉逋誅湖湘未了公事殊切介介比日來連得舊同官書閻計議駐兵永明誘孟四而生獲之為廣兵所奪尋且告斃經司取其尸寸斬以謝兩路先是田定二據平原秦小九據鹽田為秦孟四聲援引孟四以屠永明正田定二之為也抲倅權全州首禽二兇磔於市自二兇死而孟四遂不能免先生一畨出師其終條理如此孟四不死非但遺患南方其於根本關繫甚不細且得竣事功之在彼在此無足計也蕭獻可失其令嗣如塤廬陵生此士有數可為痛惜詹望泰階中夕九起薄言顧冩有懐忡忡伏乞鈞照與吉守李侍丞芾號肯齋某居廬陵南陬蓋受㕓之最逺者也其於當世人物無所交際惟從田間側聽輿論則天下伯淳雖隔在僻逺烏得不聞風稽首吾州自前守去後無主宰幾一年舞鱔號狐郡政泥濁斯人無辜亦云甚矣執事不鄙下土惠然此來天開日明是在今日某實為郷國稱慶仰籍矞雲在上區區非才叨恩入舘極知負乗月朔嘗造州關印申免時聞千騎且入關某遂止旅間伺候攀迓前茅繼聞少展適頭目受病旋暈不可耐不得已載舟兼輿以歸相距兩月交臂失之不敏之咎其當如何方僥倖平復造謁以敘悃愊顓駛及門寵授翰墨山林踈賤之人乃得殊禮郡大夫之徳為不可及而某缺典之愧益加多矣祗誦來辱避席再拜有懐輪囷具嚴初櫝謹具劄子繳申職事之記所有台翰謹謹歸璧示不敢當也修布草率顓圖侍見以謝回廣東曹提刑伏以炎日正夏薫風自南恭惟某官玉節霄明華絲雲度穆清簡注穹壤棐扶台候動止曼福某瀹頴廉清通箋奎碧惠徼書月却立下風某遥企美蓉上挿牛斗儼繡衣之持斧屑璚靡以為粻𢎞鋪太和勿問元吉某欽以某官簫鐘鏗戛玉尺端方廬阜青蒼毓白石清泉之勝北斗魁傑挺碧梧翠竹之標或弭節於人間或彯纓於帝所既盤礴而鬱積復周遊以逍遥流水青山奪司馬尋春之志荒崖絶島行濂溪澤物之心欽哉刑之恤哉使也言有光也樓臺映白日絲轡小馳衣冠拜紫宸綸音遄下某起觀宣夜跂敬明河方濶焉北樹之題乃贈以南金之寵跫然三復愧此七襄某頃綴楚軺毎懐綿來牋天從欲回卭坂之車便地養親得江南之舎永惟錫類不隔善隣襞積阻心熒煌在目某袖分㽔露才劣錦雲雜下俚於九成發宗工之一莞隃瞻蓬翠工輯蕋珠氷桃碧藕之清凉福英禄華之郁穆臺容所戒鞭影是趨回陳侍郎某伏以回車卭坂請自效於林烏得郡江南取已捐之竹馬綢繆錦覆緹襲衮華恭惟某官麾斥八極之風雷巻懐九天之星斗古靈䄂中之藁屢薦時賢温公洛下之評不遺人物遂使忝求芻之寄從而諧啜菽之私某半竹奚堪儷花甚寵想五畝青山之樂願請訂金懐四愁明月之詩曷酬贈璧謹具劄子申謝伏乞台照與湖南交代廖提刑某汲濂香裹側厘裔忞忞于主進吏昭交好也首祈䊹省兹者伏審濡絲星轡弭節霜臺紫蓋撑空開雲烟之五色繡衣立漢灑冰雪於九州號令一新江山胥動恭惟某官金井玉淵之丰度簫鐘瑶虡之聲名老氣崢嶸吐鼇頭之山碧清文流灑貫龍影之潭星凡踐敭中外以來皆推行忠恕之學惟刀劍狃楚氛之惡賴旗旄指漢坂而驅于疆于理于南來宣王命其刑其罰其審曰惟民中汲湘水而滌瘡痍豁衡雲而燭幽枉禮樂遣使臣也於昭原隰之光衮繡歸我公兮遄任朝廷之重某頃從􅒖嶁下一拜狀後繼得㫖以臬事屬之宋史君某遂於正月末解維而西先花朝之四日抵雲舍禊前奉重闈至空同上俯仰半菽皆矞燾賜也第念夙縁結習實開衣冠百世之好乃不克迎拜馬前面奉龜組江海契濶有足念者近得之東西行人始知􅢴節前玉節道盱境以時考之此際久建牙楚觀上矣某不勝為湖南一道賀舞後木人蕭然音節納之錦覆過者化之亦以自賀也某春杪得府第所遣荅書仰佩篤敘數月念念嗣音相望泬寥邃坐不敏慈想建臺有俶謹跽下風傾此襞積臨拜無任馳泝之至伏乞台照與前浙西安撫李大卿肯齋某頃從湘花間解維而西也故人意厚掉酒壺三十里而飲餞之風飄飄兮吹衣芳菲菲兮襲予呴喻篤緻一何勤也回首江空明月千里因念向留楚觀望午橋鐘鼓不隔簷陰從容玉麈曽不能以數數矧今去之汀洲杜若間蓬弱三萬不趐明河在天瞻仰夙夜如此悁結何某共以某官懸黎垂棘瑶簴簫鐘崢氷雪走雷霆精神麾乎八極沮金石諧韶濩文采被乎五音維今江濤正須人物外之而北門筦鑰内之而西府樞機亶惟老成具有經濟青山五畝未容寄傲之深黄道九天佇看傳呼之近某丕承矞燾先花朝之四日抵雲舍又十日奉重闈泝灘而上禊前抵郡抵賤事乍入沸糜不免轇轕既三閲月遂就簡平親老安徤如常半菽俯仰皆錫類之及惟起視四境山長谷荒赤子龍蛇未易帖服商距馳河凜乎其未濟教思無窮惟勿替宿昔重訓飭之泰寇一段某未了事而去日夜念此半年師旅數州抒抽為空疽根仍存憂曷有極今聞罪人斯得黨類悉就殱夷我愛桐郷屐齒為折顧撫摩凋瘵鎮定危疑湖嶺間方來正欠工夫耳洛中花竹平安悠然長思當必及之某數月念念專襞立起居及今方走一介不敏甚矣未繇佳晤暑氣方服願言金䕶玉持以副蒼生之望孤臺有委一唯鞭影所向某臨風馳泝之至與劉吉州漢傳某介恃薄雲之誼忘其爲瀆僭有願陳吾郷歐陽巽齋先生講學天出從㳺滿門登科三十年獨處環堵晩見召擢一再登朝先生居之淡如也其修於家終日清言接引後進未嘗為儋石謀捐舘之日槖無贏貲諸生為集䘮事悠悠人生惟死乃見真實嗚呼先生之風可使懦夫立也其子沒字資深世先生之學頽然布衣禁路諸公毎以郷先生殁而無澤為闕典有欲從化地言者人情好徳信不相逺先生不以貨財遺其子而資深亦復能守拙甘貧酷與乃翁相似區區謂文獻所屬吾輩當相與輔成之大監樂善若不及又於巽齋為庚午同朝儻念其孤侍分廩俸月資送之使先生有子不至乏絶非惟使為善者知勸而名公念舊下士之盛心所風厲逺矣某旦夕亦謀具辭幣聘資深至郡齋庶幾前軰之典刑斯文之宿昔念同志孰有如門牆者故輒以書至焉當暑紊聽慚汗瀋流伏乞台照回兩淮制使李端明庭芝伏惟龍虎魁傑手提鈇鉞重鎮東郊淮山崇崇江水不波施於南土𨽻也跽敬階符等威有截不圖親灑衮翰賁之榮光下土伏讀感激某仰承寵戒信豐趙宰真古大臣勤小之威心趙於某同年宿相厚今又得以郡邑聨好人事結習非偶然矧知出自晉公門下他日稱吾榜得人有所受之矣謹具劄子百拜控謝藁秸萬罪伏乞鈞照回岳縣尉惟中興之初先武穆王手扶天戈忠義與日月爭光名在旂常功在社稷天報勲勞克昌厥後雖百世可知也縣尉生北平龍虎家而又偉然植立誰不知敬幸出結習乃託一日之嘗僚刋諭批厯亦既欽承逺畀鱗緘為禮過矣與洪端明雲巖名燾十歲在湘中專人詣越拜起居遄沐報教以門牆一介之舊撫問所及勿替引之相望廓寥感戴不可言喻繼閱邸狀欣審端殿陞班安車就第于彊于理既了旬宣某水某丘逕歸遊釣恭惟驩慶欽以某官中朝耆舊前輩典刑早歲驅馳持國子華之並出晚年脫灑盤洲野處之所無今世浮沉畏途不知止足者勿論固有掛冠請老欲一日婆娑里門而不可得者先生袖手版還丞相天目山中逍遥野服獨立於得喪寵辱之表眞天人哉左轄頻虛上方側席只恐禁中朝出傳宣天使夕至未容公久作碧山學士耳某堂有重慈今年八十有七昨者將指而出牽於行路鶴􅄠不容迎養歲晚力扣化地乃畀麾章貢家園相去三百里一葦可杭闔門二百指皆仰禄焉此先生矞雲所覃某到郡後頗與郡人相安日來四境無虞早收中熟覺風雨如期晚稻亦可望惟是力綿求牧來自方長凜乎淑後先生襦袴舊譜出其一二以惠緩之蒙戴而行敢不知賜某於左右缺禮久矣謹寅奉赤紙申緑野平安之問采采澗芹犯嚴悚仄未卜誾侍願言觀頥視履益扶神明以慰中外屬望臨風拳拳與贑州屬縣宰顓有公稟保伍本領在於隅團比者郡家稟使者之命欲於十縣從新整刷一畨見之公文固已詳盡所謂差過隅團蓋所在積弊有公差者有買充者正在賢令尹用其明焉可因者因可革者革按之舊籍參之僉言一日而可決也使者屢問及此却望辦以敏手月末如期申來隅團定則保伍周保伍周則盜賊弭郡之所以蒙成也而縣亦職有利焉申嚴出甲榜比想皆已家至今有賞罰鏤搒煩更徧揭回袁永州某引首三吾環清匯碧神仙人居之坐隔千里方嘆衡鴈之參差緹騎秋風落我虹翠跫然瑶華音之在耳也恭惟某官以羔羊素􅁝為節槩以清霜紫電為精神以布帛菽栗為政事自擁千車來照二水發舒家學一二便足以破奸膽甦民氣期月而可百廢具興萬石山中遂為古潁川渤海郡眞刺史敏手也清廟訪落諸侯來朝風聲堂堂歸植千載某承乏便州僥倖娱侍庭空無事年穀粗登凡前此龍蛇之淵皆屏跡絶影要是忝教宿昔陰有以惠利之然親意亦復念家旦夕皈命香火歸哺山之南水之北矣逺道寄將有實其庭吾味之厚不翅懐連城而佩明月也臨風慷慨亟此馳謝尚猷緝􅗀申候起居伏乞台照賀京尹曽尚書某兹者共審露綸渙渥星履陞華東澗西瀍冠十連之元帥南昌北斗表六典之地官丹屏雲開紅牙日麗恭惟某官依乗日月吞吐江湖直氣摩空金天晶之錯落清規照世玉井水之紺寒自嵗歲於鸞聲遄峩峩乎豸角文章大手南豐先生政事十條小范老子出袖摩霜之鉞坐吟巻雨之簾眞侍從歸拜於甘泉慈父母來臨於京兆乃由太一徑陟文昌氷懸雪夸而朝望孚日暖潮平而民氣恱儼衣冠於建禮益鎮千籌帷幄於延和遄歸兩地某喜傳除綍阻趂賀綦五緯明霄望龍泉之秋色九河流潤懐虹翠之春暉謹具劄子賀申伏乞台照回曽知縣晞顔號東軒後除御史某去秋知紫氣飛度鴈峯法不得相候西風徹棘新雨來車知必不我遐棄也未幾喜聞玉垣飛檄榮甚錦歸交臂參差殊重回首今年出湘之日乃千騎載入湘之時又不得相隨雞豚社中一數契濶相隔耿耿心知不圖帳犀逺持五雲下賁虹翠笔墨淋漓起敬英妙而繰藉所及不敢當不敢當某堂有重慈自髙安歸後十年不克迎侍昨嵗叨節本不能出請祠不獲命姑以單騎驅馳非其欲也轇轕白雲情表連上君師天地之造畀之便州非徼福頴遺端不及此千里逺將折寄何厚衣被重襲其宏多矣乍理摩沸稟對皋晏薄附芹心非所以為報也蓬萊玉雪小寘之松竹間㑹有新編倚布婁賀回曹連推宗甫名尹某瀹頴廉清起而謝所蒙東嚮亹亹一拜幾何年西方美人豈不夙夜飛鴻踏雪閴其廓寥去年漫浪行湘於東軒公甚相厚朅來入境又日從巖山先生遊獨於吾泰宇何其濶如也春榜既開聞謝家鳯毛世科盛事芙渠勝處僅隔庾梅毎念擘牋冩此襞積乍入沸糜中墮此不敏而琳琅金薤巻五仙雲氣下之言念知心喜而不寐吾泰宇以乾坤清氣皛皛銀河朝發軔兮咸池暯曝鱗於沃焦以其時可矣河陽幕中雲飛川泳老子倚胡床誇有此客佇由黄金臺徑上青瑣闥某單車馳岣螻下十閱月大行白雲繚繞清夢陳情一再天髙聽下畀以便符奉重闈抵空同三見蓂莢矣郡稍簡靜得遂半菽歡皆錫類所及也渠渠然頌不以規望塵辟易芳菲逺道第懐我私聞車馬行色且旦夕出領某倘未以罪去得握手道舊豈不快哉占謝蕝如馳遡一碧回李本中某一節稍踈聞問千里相望方賦所思得手書讀之展轉清話􅇺此契濶某數年以兒女講授為琴書累發初啓蔽作成方來三世交遊此意不敢忘去區區出山親老不任行役雲龍隔絶不得日奉從容本中獨處寒齋覺户外屨不至靜中倍有方冊工夫然門可張羅庖𨽻自放所以奉師者必甚􅒾缺負愧奈何諭及小子年漸長當學聲律尤認眞至第此兒自以為得師甚欲從師學而學焉又念吾先人以賦起門重於改作貪賢且奈何今姑遵來教擇賦師為代但未知來年有意他出否倘有圖回某雖江湖懸隔豈無可效綿者拳拳此𠂻亦以屬之新昌弟唯命東西矣敬憑使稟控别牋薄物少寄芹私令祖困學老先生尊候多福侍邊乞道起居回長沙傅縣尉合某他日接玉泉於㳙涓中去之十年君且撫汗漫神變化而為龍已髙言軋霄自當向上位置需雲岳翠不淹騰踔乎豸府知心貽書道君出處之槩廣文又緹襲琳琅以來目中將快見緇之好也敢不預戒行窩汛掃以俟雖然落木荒凉之境飄風潏蕩之蹤以君堂堂發軔而肯相從於庖俎問此意攜持琬琰者不屑也吾意不薄惟君熟裁之持對不敏切惟照寛文山集巻八欽定四庫全書文山集巻九宋文天祥撰
