front:
  text: 國陳節推容去年闕下拜書稍得數數未幾聞捧檄校文不知陶鑄何處人物某自是即汰斥去閉門深山遂無復鱗鴻一日之便忽使者來山中欣得妙帖見示小録方知昨日衡鑑所嚮近想歸舟蕩􅃞彭蠡吾知心正在香爐峯白雲下耳宣之弛征執事首從臾之幸而集事僅足了吾輩之責非相與為賜也書來乃知宣人以此為多祠之以識其不忘之意怵惕於孺子之入井豈為内交要譽設抑桐鄉父老此意亦能使人感激耳宣為郡凋劇極力扶持幕畫間想見勞苦盤錯紏結以試利器天下事正有賴於方來耳某前冬一出去秋一歸進退行藏惟其所遇而無心焉今則奉親課子彈琴讀書流水青山悠然獨往不煩故人江雲渭樹之思也史記見貺家藏本皆不及尚當朝夕以稱所䝉明善録一部謾侑歸箋臨墨馳泝之至
