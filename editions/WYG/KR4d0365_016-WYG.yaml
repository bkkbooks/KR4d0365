body:
  text: 吟嘯集生朝五月二日客中端二日風雨送牢愁昨歳猶潘母今年更楚囚田園荒吉水妻子老幽州莫作長生祝吾心在首丘西𤓰吟拔出金佩刀斫破蒼玉瓶千㸃紅櫻桃一團黄水晶下􅍋頓除煙火氣入齒便作氷雪聲長安清富說邵平争如漢朝作公卿中原中原方萬里明日是重陽桑棗人家近蓬蒿客路長引弓虛射鴈失馬為尋獐見說今年旱青青麥又秧石三峯為示十字云昔日乘龍貴今朝汗馬勞為足六句雲低昏海日風急沸江濤昔日乘龍貴今朝汗馬勞紈綺汙塵土珠玉委蓬蒿若作凄然賦吾将僕命騷蚤秋寒魄澹𤣥河商飇慓明發羈人坐環堵壮士衣穿褐晉陵誰復新秦陵尚云秣夫君百世心患不在飢渇懐友人二首乆要何落落末路重依依風雨連兵幕泥途滿客衣人間龍虎變天外燕鴻違死矣煩公傳北方人是非涯海真何地驅來坐戰場家人半分合國事决存亡一死不足道百憂何可當故人髯似㦸起舞為君傷寄恵州弟五十年兄弟一朝生别離鴈行長已矣馬足逺何之𦵏骨知無地論心更有誰親喪君自盡猶子是吾兒感傷地維傾渤澥天柱折崑崙清夜為揮淚白雲空㫁魂死生蘇子節貴賤翟公門髙廟神􅂕在乾坤付不言自歎海闊南風慢天昏北斗斜孤臣傷失國逰子歎無家官飯身如寄征衣鬢欲華越王䑓上望家國在天涯虎頭山蚤不逃秦帝終然陷楚囚故園春草夢舊國夕陽愁妾婦生何益男兒死未休虎頭山下路揮淚憶䖍州髙沙道中道逢死人骨委積萬有千魂魄侵蠅蚋膏脂飽烏鳶使我先朝露其事亦復然丈夫竟如此吁嗟彼蒼天古人擇所趍肯蹈不測淵奈何以遺體糞土同棄捐初學蘇子卿終慕魯仲連求仁而得仁寕怨溝壑填自古皆有死死不愧前賢秦客載張禄吳人納伍員季布疑在魯樊期托於燕國士急人病倜儻何拘攣伊人莫知我此恨付重泉戰場三年海嶠擁貔貅一日蹉跎白盡頭垓下雌雄羞故老長安咫尺泣孤囚魚龍沸海地為泣􅃄雨滿山天也愁萬死小臣無足憾蕩隂誰共侍中逰哭崖山寳蔵如山席六宗樓船千疊水晶宫吳兒進退尋常事漢氏存亡頃刻中諸老丹心付流水孤臣血淚洒南風早來朝市今何處始悟人間萬法空元帥謂余曰國亡矣殺身以為忠誰復書之余謂商雖亡夷齊不食周粟人臣自盡其心豈論書與不書元帥為之改容髙人名若凂烈士死如歸智滅猶吞炭商亡正采薇豈因徼後福方肯蹈危機萬古春秋義悠悠雙淚揮上塜吟湘人有登科者初授武岡尉單車赴官守名家正擇婿尉夲有室隠其實而取焉官滿随婦翁入京自是捨桑梓去墳墓終身不歸後官至侍從其糟糠妻居母家不復嫁歳時為夫家上􅊘婦禮不廢友人作古詩一首曰上塚吟某讀之為之感慨因更廣其意賦五言一篇余昔從君時堂上拜姑嫜相携上祖塚歳時持酒漿姑嫜相繼沒馬鬛不在鄉共君甌盂飯清涕流襦裳君貧初赴官有家不得将妾無應書兒松檟自成行君别不復歸歳月何茫茫長安擁朱綬執鴈事侯王豈無一紙書道路阻且長年年酹寒食妾心良自傷君家舊巾櫛至今襲且蔵諒君霜露心白首遥相望塟無主墓碑風雨中見道傍一碑題云𦵏無主墓之記乃大定戊申所立雨衣淋漓字畫漫滅惜不得下馬讀之路逢一石碑亭亭傲風雨停驂髣髴看云是無主墓末書戊申歳屈指九十秋是時龍渡江甲子恍一周借問𦵏者誰承平百世祖亦有周餘民戰骨委黄土太祖下江南誓不戮一人神孫再立國天以報至仁大河流血丹屠毒誰之罪潼關忽不守皇皇依汴蔡螗蜋知捕蝉不知黄雀來今古有興廢重為生人哀邳州哭母小祥我有母聖善鸞飛星一周去年哭海上今年哭邳州遥想仲季間木主布筵几我躬己不閲祀事付支子使我早淪落如此終天何及今畢親喪於分亦已多母嘗教我忠我不違母志九泉㑹相見鬼神共歡喜哭母大祥九月七日先母夫人大祥之辰某為子不孝南望嗚咽為哀章一首前年恵州哭母歛去年邳州哭母朞今年飄泊在何處燕山獄裏菊花時哀哀王化如昨日兩度星周俄箭疾人間送死一大事生兒富貴不得力祗今誰人守墳墓零落瘴鄉一堆土大兒狼狽勿復道下有二兒併二女一兒一女亦在燕佛廬設供捐金錢一兒一女家下祭病脱麻衣日晏眠夜來我夢歸故國忽然海上見顔色一聲雞呌淚滿牀化為清血衣裳濕當年􅄔緯意謂何親曽撫我夜枕戈古來全忠不全孝世事至此甘滂沱夫人開國分齊魏生榮死哀送天地悠悠國破與家亡平生無憾惟此事二郎已作門戸謀江南𦵏母麥滿舟不知何日歸兄骨狐死猶應正首丘哭妻文烈女不嫁二夫忠臣不事二主天上地下惟我與汝嗚呼哀哉先太師忌日太師忌汗漫二紀似跳丸弟妹俱成立家鄉忍破殘衣冠晨月暗墳墓夜風寒萬里逢先忌無言把淚弹告先太師墓文維巳卯五月朔越二十有六日孝子某自嶺被執至南安軍謹具香幣遣人馳告于先太師革齋先生墓下嗚呼人誰不為臣而我欲盡忠不得為忠人誰不為子而我欲盡孝不得為孝天乎使我至此極邪始我起兵赴難勤王仲弟将家遁于南荒宗廟不守遷我異疆大臣之誼國亡家亡􅂕武師興觧后歸國再相出督身荷憂責江南之役義聲四克為親拜墓以剪荆棘大勲垂集一跌﨑嶇妻妾子女六人為俘収拾散亡息于海隅庶㡬奮厲以為後圖惡運推遷天所廢弃有母之喪尋失嫡子哭泣未乾兵臨其壘倉皇之間二女夭逝剪為囚虜形影獨存仰藥不濟竟北其轅係頸縶足過我里門望墓相從恨不九原爰指松楸有言若誓繼令支子實典祀事有姪曰陞我身是嗣興言及此血淚如雨嗚呼自古危亂之世忠臣義士孝子慈孫其事之不能兩全也乆矣我生不辰罹此百㐫求仁得仁抑又何怨幽明死生一理也父子祖孫一氣也􅁳漠有知尚哀鍳之余始至南安軍即絶粒為告墓文遣人馳歸白之祖禰瞑目長徃含笑入地矣乃水盛風駛五日過廬陵又二日至豐城知所遣人竟不得行余至是不食垂八日若無事然私念死廬陵不失為首丘今心事不逹委命荒江誰知之者盍少從容以就義乎復飲食如初因記左傳申包胥哭秦庭七日勺飲不入口不聞有它廼知餓踣西山非一朝夕之積也余嘗服腦子二兩不死絶食八日又不死未知死何日死何所哀哉已卯十月一日至燕越五日罹狴犴有感而賦一十七首一直絃不似曲如鈎自古聖賢多被囚命有死時名不死身無憂處道還憂可憐杜宇空流血惟願嚴顔便斫頭結束長編猶在此竈間婢子見人羞二落落南冠自結纓桁楊卧起影縱横坐移白日知何世夢㫁青燈問㡬更國破家亡雙淚暗天荒地老一身輕黄粱得失俱成幻五十年前元未生范􅁮在獄中為士題扇云去白日之皎皎即長夜之悠悠三心期耿耿浮雲上身事悠悠落日西千古興亡何限錯百年生死夲來齊沙邉莫待哀黄鵠雪裏何須問牧羝此處曽埋雙寳劍虹光夜指楚天低四寥陽殿上步黄金一落顛崖地獄深蘇武窖中偏喜卧劉琨囚裏不妨吟生前已見夜义面死去只因菩薩心萬里風沙知已盡誰人㑹得廣陵音五亦知戛戛楚囚難無奈天生一寸丹鐡馬行鏖南地熱赭衣坐擁北庭寒朝食淡薄神還爽夜睡﨑嶇夢自安亡國大夫誰為傳祗饒野史與人看六風雪重門老楚囚夢回長夜意悠悠熊魚自古無雙得鵠雀如何可共謀萬里山河真堕甑一家妻子枉填溝兒時愛讀忠臣傳不謂身當百六秋七聼着鵑啼淚滿襟國亡家破見忠臣關河歴落三生夢風雪飄零萬死身丞相豈能堪獄吏故侯安得作園人神農虞夏吾誰適囬首西山繼絶塵八風前泣燈影日下泣霜花鐘信忽然動屋隂俄又斜悶中聊度歳夢裏尚還家地獄何須問人間見夜义九風霜隂忽忽天地澹悠悠我自操吳語誰來問楚囚寂中惟㓕想達處盡忘憂手有韋編在朝聞夕死休十環堵塵如屋纍然一故吾解衣烘稚蝨匀鏁救殘鬚坐處心如忘吟餘眼己枯不應㽞滯乆何日裹籧篨呉殺諸葛恪以籩篨裹而弃之十一浩刼風塵暗衣冠痛百罹静傳方外學晴冩獄中詩烈士惟名殉真人與物違世間忙㑹錯認取去來時十二儼然楚君子一日造王庭議論探堅白精神入汗青無書求出獄有舌到臨刑宋故忠臣墓真吾五字銘十三兩月縲囚裏一年憂患餘踈因随事直忠故有時愚道在身何拙心安體自舒近來都勘破人世只蘧廬十四衮衣坐縲絏世事亦堪哀枕外親炊黍爐邉細畫灰無人淚垂血何地骨生苔風雪江南路夢中行探梅十五我自憐人醜人方笑我愚身生豫讓癩背發范増疽已愧功臣傳猶堪烈士書衣冠事至此命也欲何如十六乆矣忘榮辱今兹一死生理明心自裕神定氣還清欲了男兒事㡬無妻子情出門天宇濶一笑暮雲横十七拱璧衣冠十六傳更無一士死君前自慚重趙非九鼎猶幸延韓更数年孟愽囊頭真自愛杲卿鈎舌要誰憐人間信有綱常在萬古西山皎月懸和夷齊西山歌謌曰登彼西山兮採其薇矣以暴易暴兮不知其非矣神農虞夏忽然没兮我安適歸矣吁嗟徂兮命之衰矣後二千餘年某人廼倚歌而和之曰小雅盡廢兮出車采薇矣吁嗟中國兮宋祚非矣明王不興兮吾誰與歸矣抱春秋以沒世兮甚矣吾衰矣又從而歌之曰彼美人兮西山之薇矣北方之人兮為吾是非矣異域長絶兮不復歸矣鳳不至兮徳之衰矣十二月二十日作家國哀千古星霜忽一周黄沙漫故道白骨委荒丘許逺死何晚李陵生自羞南來冠不改吾且任吾囚二十四日俗云小年夜壮心負光岳病質落幽燕春節前三日江鄉正小年歳時有如水風俗不同天家廟荒苔滑誰人燒紙錢立春已邜十二月二十六日無限斜陽故國愁朔風吹馬上幽州天翻地覆三生刼歳晚江空萬里囚烈士喪元端不惜達人知命復何憂祇應四十三年死兩度無端見土牛遇靈陽子談道贈以詩昔我愛泉石長揖離公卿結屋青山下咫尺蓬與瀛至人不可見世塵忽相纓業風吹浩刼蝸角争浮名偶逢大吕翁如有宿世盟相從語寥廓俯仰萬念輕天地不知老日月交其精人一隂陽性本來自長生指㸃虛無間引我歸圓明一針透頂門道骨由天成我如一逆旅乆欲躡屩行聞師此妙訣蘧廬復何情歳祝犁单閼月赤奮若日焉逢涒灘遇異人指示以天光明正法於是死生脫然若遺矣作五言八句誰知真患難忽悟大光明日出雲俱静風消水自平功名㡬㓕性忠孝大勞生天下惟豪傑神仙立地成己卯歳除歳除破衣裳夜半刺針線游子長夜思佳人不可見草枯稚驢吼燈暗饑䑕現深室閉星斗輕裘臥風霰大化忽流斡浩刼蕩回轉冠屨失其位侯王化畸賤弓戈叱竒宇刀鋸摧䪻弁至性詎可遷㣲軀不足戀真人坐冲漠死生一乘傳日月行萬古神光索九縣右自己卯十月一日至歳除所賦當時望旦夕死不自意蹉跎至今詩凡二十餘首明日為商横執除歳不知又當賦若干首而後絶筆云己邜除日姓某題元日庚辰歳鐵馬風塵暗金龍日月新衣冠懐故國鼓角泣離人自分流年晚不妨吾道春方來有千載兒女枉悲辛庚辰四十五歳東風昨夜忽相過天地無情奈老何千載方來那有盡百年未半已為多君傳南海長生藥我愛西山餓死謌泡影生來随自在悠悠不管世間魔感興萬里雲山㫁客魂浮雲心事向誰言月侵鄉夢夜推枕風送牢愁晝掩門蘇子窖中閒日月石郎家裏舊乾坤朝聞夕死吾何恨坐把春秋仔細論正月十三日去年今日遁崖山望見龍舟咫尺間海上樓䑓俄已變河陽車駕不湏還可憐羝乳煙横塞空想鵑啼月掩關人世流光忽如此東風吹雪􅁂毛斑上元懐舊禁門三五金吾夜回首青春忽二毛池上昔陪王母宴斗中今直貴人牢風生江海龍逰逺月滿關山鶴唳髙夢到鈞天燈火閙依然彩筆照宫袍讀史自古英雄士還為薄命人孔明登四十韓信過三旬壮志摧龍虎髙詞泣鬼神一朝事千古何用怨青春感傷家國傷冰冸妻孥歎陸沉半生遭萬刼一落下千尋各任汝曹命那知吾輩心人誰無骨肉恨與海俱深遣興一落顛崖不自由春風相對說牢愁稚驢黒月光中吼饑䑕青燈影下逰豈料乾坤成堕甑始知身世是虛舟遥憐海上今塵土前代風流不肯休又東風吹草日髙眠試把平生細問天燕子愁迷江右月杜鵑聲破洛陽煙何從林下尋元亮只向塵中作魯連莫笑道人空打坐英雄収斂便神仙四月八日今朝浴佛舊風流身落山前第一州贑上瑶桃俄五稔海中玉果已三周人生聚散真成夢世事悲歡一轉頭坐對薫風開口笑滿懐耿耿復何求夜起夢破東窓月半明此身雖在只堪驚一春花裏離人淚萬里燈前故國情龍去想應回海島鴈飛猶未出江城客愁多似西山雨一任蕭條白髪生端午感興千金鑄鏡百神愁功與當年禹服侔荆棘故宫魑魅走空餘揚子水東流又當年忠血堕讒波千古荆人祭汨羅風雨天涯芳草夢江山如此故都何又流棹西來恨未銷魚龍寂寞暗風潮楚人猶自貪兒戲江上年年奪錦標見艾有感過眼驚初夏回頭憶晚春已憐花結子又見艾為人故國丹心老中原白髪新􅂕修觧化清夢楚江濵自嘆綠槐雲影弄黄昏月照牢愁半掩門一片心如千片碎十分鬚有二分存沙邉黄鵠長回首江上杜鵑空㫁魂竪子溷人漫不省紅纓白馬意軒軒自遣詩餘眠白日飲後坐清風萬事乘除裏平生寵辱中心無随境變意自與天通莫笑郸邯夢惺惺更是空自述赤舄登黄道朱旗上紫垣有心扶日月無力報乾坤徃事飛鴻渺新愁落照昏千年滄海上精衞是吾魂不睡終夕起推枕五更聞打鐘精神入朱鳥形影落盧龍弭節蓬萊島揚旗太華峰奔馳竟何事回首謝喬松七夕大地風塵惡長天歳月奔憂來渾是感夢破與誰言緱鶴空回首河牛暗㫁魂吾今拙又拙無復問天孫有感石郎草草割山川一落人手三百年八州風雨暗連天三皇五帝如飛煙人人野祭伊水邉春秋㫁爛不復傳白頭潦倒今魯連夜深危坐日晏眠聞季萬至去年我别旋出嶺今年汝來亦至燕弟兄一囚一乘馬同父同母不同天可憐骨肉相聚散人間不滿五十年三仁生死各有意悠悠白日横蒼煙有感丁丑歳八月十七日家人陷今恰三周而予在行既十閱月矣有感而賦平生心事付悠悠風雨燕南老楚囚故舊相思空萬里妻孥不見滿三秋絶憐諸葛隆中意贏得子長天下遊一死皎然無復恨忠魂多少暗荒丘感懐己邜八月二十四日予以楚囚發金陵十月一日至燕越五日罹狴犴今為庚辰中秋後九日感懐四十字去歳趨燕路今晨發楚津浪名千里客剩作一年人鏡裏秋容别燈前暮影親魯連疑未死聊用托芳塵重陽庚辰飄零萬里若為家一夜西風吹鬢華祇有新詩題甲子更無故舊對黄花又江南秋色滿梧桐回首青山萬里空怕見鏡中新白髪長将破帽裹西風又風捲車塵弄曉寒天涯流落寸心丹去年醉與茱萸别不把今年作健看己卯十月一日予入燕城歳月冉冉忽復周星而予猶未得死也因賦八句去冬陽月朔吾始至幽燕浩刼真千載浮生又一年天南照天北山後接山前夢裏乾坤老孤臣雪咽氊己卯十月五日予入燕獄今二十有六旬感興一首石晉舊燕道鍾儀新楚囚山河千古痛風雨一年周過鴈催人老寒花送客愁捲簾雲滿坐抱膝意悠悠去年十月九日余至燕城今周星不報為賦長句君不見常山太守罵羯奴天津橋上舌盡刳又不見睢陽将軍怒切齒三十六人同日死去冬長至前一日朔庭呼我弗為屈丈夫開口即見膽意謂生死在頃刻赭衣冉冉生蒼苔書雲時節忽復來鬼影青燈照孤坐夢啼死血丹心破只今便作渭水囚食粟已是西山羞悔不當年跳東海空有魯連心獨在冬至書雲今日事夢破曉鳴鐘家禍三生刼年愁兩度冬江山乏小草霜雪見孤松春色蒙泉裏煙蕪㡬萬重冬晴北國天寒少南方地氣來年光如箭去世事正輪廻可怪新祈雪相思乆别梅夜闌燈坐暗獨自撥殘灰自嘆可憐大流落白髪魯連翁毎夜瞻南斗連年坐北風三生遭際處一死笑談中贏得千年在丹心射碧空戊寅臈月二十日空坑敗被執于今二周年矣感懷八句横磨十萬坐無謀回首蹉跎海上州太傅祇圖和藥了将軍便謂斫頭休乾坤顛倒真千刼身世㽞連復一周一死到今如送佛空窻淡月夜悠悠所懐萬里青山兩鬢華老臣無國又無家乾坤局促籠中鳥風雪飄零糞上花歳晚江空人已逝天寒日短路何賖書生不作綱常計聞是東門已種𤓰除夜庚辰門掩千山黒孤燈伴不眠故鄉在何處今夕是窮年住世真無係為囚已自然勞勞空歳月得死似登仙又歳暮難為客天涯况是囚乾坤還許大歳月忽如流夢過元無夢憂多更不憂屠蘇兒女態肯作百年謀元日辛巳金虬銜日出鐡騎勒春回天上青門隔人間白髪催霜寒欺舊草山晚放新梅環堵甘牢落東風枉却來又慙愧雲䑓客飄零雪滿氊不圖朱鳥影猶見白蛇年宫殿荒煙隔門庭宿草連乾坤自春色回首一澘然初六日即事車馬燕山閙誰家早管絃開門忽見雪擁被不知年箧破書猶在爐殘火復燃偷桃昨日事回首哭堯天人日今年為蛇年此日是人日江右一龍鍾山中舊佔畢獨坐守大元一笑發狂疾悠悠王正意哀涕感麟筆自嘆功業羞前輩形骸感故吾屡判嵇紹血㡬誤慶公鬚落落惟心在蒼蒼有意無江流總遺淚何止失吞吳元夕燈火喧三市衣冠宴九宸金吾不禁夜公子早行春夢㫁青山逺愁侵白髪新燕山今夕月清影伴孤臣又飄零竟如此元夕㡬堪憐南國張燈火燕山沸管絃相思雲萬里剰看月三年笑與東風道浮生信偶然文山集巻二十欽定四庫全書文山集巻二十一
