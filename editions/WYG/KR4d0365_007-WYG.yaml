body:
  text: 啓上權郡陳通判􆃰謝解乙夘舉送時弟璧同薦是邦大夫賢者聿新道藝之賔興吾黨小子斐然得遇功名之主宰僧彌出法護之右越石居楚金之先人羨二難已叢百媿竊惟奎開我宋箕壽斯文堯叟以壯歲拏魁堯咨為之接武子由以弱冠登第子瞻至於聨芳孫何齊孫僅之名宋祁遜宋郊之榜韓家閥閱呉氏簪纓皆一時兄弟之傑然乃我朝科目之盛者甲於江右未若廬陵名耀帖金以一門而五董筆香氊墨不十歲而七劉或踵接於童科或肩摩於胄監輝煌簡冊雜還衣冠至今文水仁山猶想流風遺俗雖巫步亦期似禹然賜賢何敢望回如某者技等飛鼯才長縮蚓故家喬木借秭歸舊峽之陰宦録雲萍分白鷺餘波之潤勘皇祐牓帖久寒石室青氊閱癸丑狀頭曽入本心墨譜恐負前人之弓冶勉為今日之箕裘有嚴君焉唾棄萬年之諂味難為弟者誓齊兩到之英聲故唯諾怡愉之間皆切磋琢磨之地晨窻花露滴乾硯眼之鴝夜帳木油剔盡案頭之蠧以孝弟忠信為實地以功名富貴為飄風非六六餘子之儔有飄飄凌雲之氣自染指時文之鼎即梯身季考之階愈出愈竒頗類黄絹外孫之虀臼屢選屢中幾成翰林學士之葫蘆遂令伯氏吹塤仲氏吹篪過辱庖人繼肉廩人繼粟方嗟雌伏未遂雄飛適槐粟之揉黄偕棣華而拈采擲畨骰子同拏喝六之籌彎起弓弦共上中紅之垜天開雙眼地放一頭渴睡漢平白解嘲揶揄鬼分明束首二旬賜第皆以沈内翰相期十八奏名僉謂劉學士可繼使小子自此升矣皆先生進而教之兹蓋恭遇某官秀孕天台英蜚帝學萬乘器可擎唐桂五色線要補舜裳器古罍於盆盎之中韻黄鍾於雜優之地一從分刺名雖沂郡之王祥兩屈䕶麾實則潁川之黄霸斯民廣厦吾道泰山螺川醉多㫖之春風燕寢樂近民之暇日政安赤子解弄挺之亂繩兵撫清人戢攘釵之横蘖雖借我二天之有幸恐尹京五日以趣還兹以題輿委之勸駕至若豆箕之朽質亦該花帖之榮恩是宜拂楮雪以牋誠候屏星而布謝誓當鞭策不負揄揚諒大賢何所不容知孺子尚或可教晉公得二俊才士不無汗赭於前修古靈薦三十餘人尚冀牙緋於後進上倉守李愛梅謝解執鞭而御於君風裁乆欽司𨽻推轂而輦其正天人幸遇翰林欲借方寸地吐氣而言敢操盈尺紙循廊而進切謂烏河陽方司鎮鉞石生隨就禮羅王豫章未下使車荀爽已騰辟剡蓋人非卞和玉閟石竅而世無伯樂駒困鹽車必假先容乃梯後進切念某策非魯客材僅莊林自垂髫逮二十年知肄業為第一事家庭自為庠序要祖廬江興學之風文字懶傍門牆帷準石室立言之法遥睇故家之木勉為良冶之弓子玉應而父金舂伯塤唱而仲篪和夜桉剪燈帳幾成墨凍窻呵筆火不思爐每因染教於芹香屢獲聨輝於萼集角能戰蟻占序榜龜朋社陽秋過許洛中之陸郷評月旦謂非呉下之蒙曩踏黄槐聊窺斑管合三萬餘於圍棘争六十八之帖花如小子者車載斗量况有司之沙披石汰誰謂燭几駒窻之際遽蒙黄鍾罍洗之褒風健鴒披騰北海一雙之鶚雲横鴈趐摶漆園九萬之鵬必侍郎氊筆嘘而送之則進士虎榜自此升矣兹蓋共遇某官百梅風格八桂雲仍羅􅇇門兵甲於胸中漱淮水淵源於筆下風檣陣馬不足為勇長吉之文章景星鳯凰快覩爭先王濬之名望早躋顯第徧歴要途嘗膺北闕之詔綸出領西江之衣繡兒童猶誦君實野老皆識元城惟虎城舊治嘗屈典麾故螺水重來又新持節蘇疲民於恩露清奸吏於壺氷坐念鉛為銛跖為廉安有書如絲官如眊粲連檣粧執樂舊句重賡繒閱庫粟埋梁新謡繼作兹屈皇華之使就延鳴鹿之賔某忝以釡箕玷兹玉笋敢不淬庖人之刄誓無荒陸氏之莊云云賀呉丞相革再登鉉路首冠鈞庭以進士為名臣兩朝倚重以儒宗為宰相四海具瞻天啓聖衷國有生氣某官洪深而肅括光大而直方喬嶽泰山微細悉歸於涵育青天白日奴𨽻皆知其清明頃天子以為股肱舉海内望其風采霖雨未浹而收斂神功泰階未平而韜閟光耀共借温公之歸洛猶期潞國之還朝偃逸藩維久鬱衮繡歸公之望均調鼎味復端鹽梅用汝之司公卿大夫交笏相慶兒童走卒舉手懽呼顧中外不謀同辭在古今未始多見斯人之望既切賢者之責方新維今言路之不通最為天下之大弊縉紳以開口為諱事城闕以㳺談為危機如人一家情睽離而衆侮起如人四體氣壅底而百病生多故之由一類諸此枰更子改柁轉舟移惟從衆謀可以合天心惟廣忠益可以布公道盡解羣疑衆難之㑹克有榮名成功之休其惟我公望在今日某瞻依有素慕戀惟深適造闕以戒嚴聞揚庭而増抃以書上光範先伸賀厦之私於人見歐陽行展摳衣之敬其為懇切罔既敷宣謝吴丞相渙號揚庭方慶昭文之命蒙恩詣闕適修進士之恭喜當風雲際㑹之秋得囿天日照臨之下輒陳短淺爰叩髙明伏念某才不逾人學未聞道雖家庭唯諾之教動欲行其本心然山林朴野之資知無補於當世頃得備地官之貢遂及登天子之庭一第策名既有慚於負乗三年讀禮幾無意於驅馳宸命光華自天而下聖恩廣大如海斯涵遂令參京兆之謀仍許奉團司之表靖循僥冒端出庇存載冊戒行將下天威之拜彈冠稱慶遽傳公衮之歸重惟栁氏之碑曾辱燕公之筆讀聖主偏親之語佩教方新仰先生長者之風銘恩莫報矧復更新於弦轍自今密邇於鈞陶喜如其辭有莫能賛兹蓋共遇某官兩朝舊德一代偉人金鼎調元曾接沂公之轍玉龍擎重再持忠憲之鈞屬逢當軸之初與有得輿之慶某敢不勉攄素學圖報明時仰台宿之麗天既近輝光之照占赤雲而赴幕尚依覆燾之仁先生之父革齋先生墓誌銘乃江古心撰履齋題蓋道體堂書謝丞相除祕書省正字日竊禄叢祠方重素餐之媿備員蓬館遽叨黄紙之除由大鈞之無垠故小子之有造輒攄短淺庸瀆髙深伏念某大江以西一介之下幼蒙家庭之訓毎欲行其本心長讀聖賢之書初何補於當世從事一研起身諸生偶遭際於聖明獲僥逾於科第君恩天大若為報稱之圖流俗波頽常有激昂之志當前年之赴闕適强冠之臨江親見主憂之時不勝臣辱之義陳師江滸悵無一障以宣勞奏疏公車倘冀九重之易聽奔命而歸田里舉目而盡干戈江逈川平非賴整頓乾坤之手糜沸雲擾幾無戴履天地之身骨肉幸全於山林頂踵皆歸於造化琳宫香火揆始分而已逾石室詩書尋初心而未究敢圖菲采獲備茹連使當登崇俊良之時而秉校雙圖籍之筆賢人在内幸無正朋字之譏世運方平雅有讀祕書之暇顧兹甚寵非所宜蒙有懐負乗之慚無任循牆之懼使之得進退之正所以報知遇之隆兹蓋恭遇某官勲在王家澤被天下圭瓚秬鬯侈召伯之來宣衮衣繡裳大周公之歸相既仗笞箠而定大難將興禮樂而開太平遂使乾清坤夷之餘轉為小往大來之㑹至如公選亦及凡材某敢不勉企前修恪持素節彦博未至堂上已先蒙許國之知器之既入舘中當不辱温公之薦其為懇悃罔既敷陳謝皮樞密龍榮領香火於祠宫幸書下考校丹鉛於冊府誤玷中除由泰階六符之光為廣厦萬間之地輒裁牘記仰謝鈞慈切以登羣玉山夙號麒麟之勝持三寸筆將刋魚豕之訛是為朝露之清班必極人材之公選我聞在昔公惟其人晏殊之學問楊億之文章仲淹之聲名器之之氣節苟非其類不在此科伏念某學不知方仕未能信尋千年之蠧簡早慕伊顔得一第之鵜梁終慚晁董深考國家之典毎由舘閣之途知負乗之懐慚恐顛隮之速咎故方筮仕已即丐祠尚口乃窮頗愛山深而林密觀頥自養徒羞月費以歲縻敢圖楓陛之䟽恩俾處蘭臺而正字正恐不免耳其何以堪之靖循僥冒之由端出陶成之辱兹蓋伏遇某官清朝良弼名世大才燮贊化原大尊主庇民之道均調皇極普薦賢報國之心遂使䟽庸與叨拔擢某敢不恪持素節勉企前修讀木天汗漫之書尚求指教陪丹地深嚴之幄何幸身親懇悃罙深敷宣罔既謝何樞密夢然范質傳衣曾侈和公之遇仲淹入舘復蒙元獻之知使諸公而與同升豈門生而不知報輒伸下悃庸叩中樞伏念某石室孤寒青原落魄幼被家庭之訓頗欲得其本心長讀聖賢之書初無補於當世從事一研起身諸生偶持觚翰於南宫獲遇鑑衡於北面鸞鳯杞梓舉集權公之門款段駑駘誤登伯樂之廐名姓雖塵於函丈足迹未造於仞牆山斗之望彌久而彌穹畎畝之蹤愈踈而愈隔閉門自守知尚口之乃窮遯世無求惟觀頥而自養凡竊禄奉祠之日皆省身念咎之時承明之廬著任之庭未嘗意想寂寞之濵寛閑之野遽拜寵光胡為乎來哉是有其故矣想木天之清峻望丹地以凌兢顧非麒麟鸑鷟之英其如亥豕魯魚之謬深有慚於負乗敢自己於循牆兹蓋恭遇某官名世鉅公清朝良弼持樞贊化共調傅鼎之梅報國薦賢不種狄門之李遂令公選亦及凡材某敢不勉企前修恪持素節就中書而見座主將求一介之先容以進士而為名臣尚賴終身之保任謝江樞密萬里領祠宫之香火敢望彈冠掌冊苑之丹鉛誤蒙推轂薦非由於識面事眞可以語人頂踵衘私額手奏記切以觀逺臣以所主孟子以言進退之閑遇大賢而相知韓公以為遭逢之盛蓋受恩非天下之所少而知己得君子之為難乃若初無左右之先容獨受門牆之隆遇以古道之相與尤人生之至榮伏念某才不逾人學未聞道雖家庭疇昔之教動欲行其本心然山林朴野之資知無補於當世執經而後承恩以來念景行在四海之達尊而科第非終身之能事頗欲自拔於常人之類庶幾無負於上帝之衷頃趨闕下之時適際江干之警主憂臣辱念我生之不時外阻内訌繄禍至之無日因撫躬而思奮遂投匭而獻言當時破腦而刳心何啻􅞆頭而爛額有倉卒等死之慮無毫髮近名之心六太息之陳豈曰賈生少年之過三十字之獻幸寛邭模東市之誅逮時事之既平滋人言之無據小體者戚其失措好事者髙其得名痛痒無知者以文采為賢操挟不正者以譁競為議匪躬之故俱莫諒於初心尚口乃窮嗟難行於直道既奉祠而竊禄顓閉門而讀書未可與俗人言姑盡吾分内事不謂見知於長者遂勤延譽於諸公承明之廬著作之庭未嘗夢想寂寞之濵寛閑之野遽沐寵光非華衮有一字之褒何弊帚増千金之重雖深慚於負乗然幸出於鈞陶永堅乃心欲報之德兹蓋伏遇某官清朝碩輔昭代真儒胸中括石渠東觀之藏海内仰天球河圖之瑞睠惟世道深屬我公整頓乾坤共屹江流之柱獻納日月入旋斗極之樞非徒耀不世之功名將有意太平之禮樂凡今小往大來之㑹多出前推後輓之功遂使踈庸例叨拔擢某敢不力持素節勉企前修稱彦博於都堂幸借郇公之譽薦仲淹於舘職敢忘元獻之知賀江左相大老造朝元台正席歸公有衮繡我來自東用汝作鹽梅王置諸左三台明概八表清夷洪惟我朝相業之隆莫如元祐家法之懿潞公平章軍國司馬實位昭文正獻議論廟堂微仲嘗升左轄或以學術眞純而輔君德或以人物直諒而當帝心續遺響於先秦兩漢之前文章鉅麗挺雄姿於黄河泰山之上器量崇深此自古之難兼蓋于今而獨見共惟某官行關百聖名塞兩間于前寧人期之以伊尹傅説今從學者尊之如韓愈孟軻尚論公之平生有報國之大節以君子不用為我恥以小人未退為已憂童兒婦女知其血忱搢紳大夫想其風采自其驅馳外服出入中朝洛中偃仰之年江上經營之日以至贊先皇之大政參嗣聖之初元賢與不賢一言定其可否用或弗用四海視以重輕卓然一時人望之宗展也三代王佐之事屬登庸之伊始問夢卜以孰賢朕安得斯人哉固無踰老臣者乃申帝指乃穆師言金甌覆崔相之名銀信趣鄴侯之覲朝士舉笏相賀都民遮道聚觀天子引見以勞歸東朝出饌以錫宴遂由政路徑秉國鈞先天下而憂斯能後天下而樂有聖人之任將以行聖人之時莫難得者海内相望之深最罕遇者君子氣類之合方今師維尚父右舉皋陶贊襄於都俞之間寅恊於和同之際鈞無垠而播物相天地理陰陽鼎有足於承君安國家定社稷昔講於洙泗者困道路之厄而學於河汾者抱禮樂之慚道之行歟時則可矣俾我后五三之盛眞吾儒千一之榮某猥在山棲欣逢庭冊親見上下龍雲之㑹豈從門闌燕雀之私陽翟歸耕回首舊時之學士徂徠作頌傾心今日之太平慶抃情深刋摩語淺馬右相庭鸞號碧梧紫宸播告金鉉登崇歸周公於東方來大老舉皋陶於右復得良臣九鼎尊安三靈開懌自馬服君之著姓至伏波氏之封侯燧進侍中特超居於外府璘遷僕射姑借重於將壇惟賔王起自書生在貞觀號為眞宰然以草茅之踈逺出於羈旅之遭逢未有親拔巍科素居清望布衣之極以一編為帝師都門之中不十年至相位於皇盛舉夐掩前聞共惟某官得聖人之和抱王佐之學髙山蓄泄有潤澤萬物之功太極渾涵無運用四時之迹自顒昂搢紳之日已雍容廟堂之風告后惟良有謀猷則順于外敬王如我非仁義不陳於前其出處不可瑕疵其喜怒未嘗形色龍潛羽翼栽培不世之風雲鼇禁絲綸醖釀後來之魚水先帝㽞之為宰輔之備主上待之以師傅之尊徑邁羣公徧登兩社或主東聽之典故或參西事之經營鄴侯之跡大竒安石之名愈重兩宫明聖一老辯章既峻昭文之迁遂正集賢之拜朝家用元祐之故事學館獻慶厯之頌詩儒者之遇僅有而絶無天下之望方來而未已簡淡獨周於事物晦叔所以有立於潞國司馬之間忠恕不離於須㬰堯夫所以無媿於正獻㣲仲之際前哲之風流未逺太平之幾㑹有開豈特輝簡冊於二百年之前直將植風聲於千萬世之下某喜傳鴉字驚起牛衣知廊廟之有人為國家而増氣昔通政府無書或詭於門人今誦相庥交賀敢遲於朝士其為抃蹈罔既刋摩通章簽書鑑號枕山兹者共審渙號明廷晉籌宥府風生黄道衛宸殿之凝嚴星度紫清煥斗杓之赫奕眞儒無敵中國有人竊惟我朝之盛明最繫君子之翕合永叔之參兵柄在魏國位平章之時堯夫之贊樞庭當潞公判重事之日于以笙磬治平之政于以塤篪元祐之功若稽前聞復見今日共惟某官知周而道逺仁熟而義精和風甘雨慶雲備四時之正氣髙山深林鉅谷名一代之魁人當屬者為小官之初已淵乎有大臣之器誰起諸國人之謗我衣而䄍之我田而伍之公眞大丈夫所為匪席可巻也匪石可轉也突兀南都之鐵壁巻舒滕閣之朱簾在江湖在朝廷時人望其大用為臺諫為侍從識者恨其已遲六飛之馬莊重而不馳萬斛之舟舒徐而後進厥今天助順而人助信大在廷而細在邊江漢沔水朝宗載揚我武夙夜基命宥密無競維人遂升兩社之班爰贊五兵之本宰相計安宗社太師時游廟堂參之以運籌帷幄之神輔之以折衝樽俎之密衣冠盛事具四方巖石之瞻衮舄一堂有三公鼎足之勢適觀大業丕建隆平某盥耳山棲傾心廷播親見天地雲龍之㑹非為門闌燕雀之私傳江兩宗𣲖之圖敢云入社誦徂徠聖徳之句請繼作歌抃蹈之深敷棻則淺賀倉守趙編修端齋侯藩課最庾節陞華常平專斂散之功㢘察展澄清之志有識交頌不謀同辭共惟某官璿𣲖清流玉班雅望早贊樞庭之畫遄躋府寺之崇結知前旒試庸外服幸甚趙大夫之日來臨歐六一之卿廟堂知其為循良田野誦其為豈弟二天不啻兩年于兹雖明公屢上丐閑之章而天子正深倚重之眷爰畀茶鹽之任聿増麾節之光鮮于一道福星式快輿情之望晉公三司眞使行膺御札之除某仰席庇休倍深欣抃大厦成而燕賀敢修奏記之恭六轡沃而駰馳實􅋀執鞭之戀其為贊慶罔既敷宣回瑞州羅權府遥瞻松雪久羨檗氷簾捲西山撫輿圖於錦水書移東里醒午枕於桐郷寵委新編輝生棄弁天髙地逈諒碧落之知心日光月華看紫微之潤色謝私何限嗣敬以陳回吉州繆守送端午端午賜衣漸傳璽召昌陽薦俎忽沐珍頒行人賁然來思野老為之驚見某官心清於水仁行如春岐麥詠漁陽方騰善政角黍記荆楚尚念流風亦分百索之餘逺及一㕓之陋某倐驚晼晚良感慇勤剪綵艾以為嬉强酧佳節對燈花而作報多謝故人回朱約山賀生日郷有達尊獲在嫡孫之行我生初度誤蒙大老之知庭實駢羅使華驚見共惟某官世間活佛天上壽星棄萬户如張子房而壽考逺甚頷諸孫似郭中令而精神過之尚憐蒲栁之新姿分以松椿之餘福既受賜矣細吟香山三十六之詩何以報之還祝崆同千二百之壽餽朱約山嵗禮歲無多子驚爆竹之倐來盤有五辛喜屠蘇之未至􅔔時大老萃止繁禧喧􅇫馬散林鴉遥傳嵗頌臥籠兔横盤鯉聊見郷風回前人餽歲一壑棲遲不覺歲年之晚五雲飛墜頓生草木之春分四老之玉塵起初平之白石某官陽和著物壽極當霄門有垂車換桃符之新句庭多戱綵沸竹爆之驩聲猶推椒柏之芳馨散作茅茨之光寵某肅登嘉貺祗佩盛心嘆巷北之揶揄吾癡未醒祝樽前之强徤翁醉何妨回前人賀生日富公七十九歲嗟九老之不如潘岳三十二年覺二毛之已見方揆余之初度忽惠我以好音疇昔折輩行之謙從今悦親戚之話永為好也長歌白雪之章還以事之願壽青山之約回彭知縣賀生日潘岳閑居已覺二毛之見盧仝破屋忽驚三印之來愛之欲生錫以難老親戚情話若是綢繆宇宙吾生不勝感慨矧復贈我永言好之讀三星行誰解嘲於南斗壽八百歲尚徼福於彭城回太和趙宰賀生日三載淵明幸相望於五栁今年潘岳覺已見於二毛懐哉好音賀我初度愛之欲其生也忠焉能勿誨乎一鶴自隨約青山於未老双鳬何許感流水之相知回太和趙尉賀生日潘岳閑居已覺二毛之見盧仝破屋忽驚三印之來為此大小年之光異哉神仙尉之寵錫以難老愛之欲生陽春白雪之詞眞成寡和流水髙山之約安得相逢回胡宣教賀生日春華如水驚三紀之流光夏緑滿園又一年之初度方拾薪而煑瀑拈擷草以供茶敢意虛谷有來庭實錫之厨珍以起其牢落將之篚厚以申其慇勤門外桑弧自歎男兒之老里中羊酒敢忘親戚之情回蕭子蒼賀造居杜門掃軌方尋歸隱之盟依山結廬聊作奉親之計正辛勤於結構辱折寄於芳馨室虛分坱北之春庭實委繽紛之既想兒郎之歡喜共舉草堂謝介使之勤渠寄將梅驛賀朱太傅得祠楓陛䟽榮蕋宫領秩平分風月暫横緑水之舟寄倣烟霞新入壺天之宇相羊得所進退有階共惟某官一世精英盛年華要春風滿座人知公掞之懐雲谷讀書我得晦翁之樂聞已速䕫龍之武未容髙鴻鵠之飛某同志有人相期何許臥篔簹谷正尋白水之盟望麻姑山輒致黄冠之賀送韋主簿成功赴宏詞科徑辭矮屋前赴大科開五十難以試教官是名上等分十二體以取詞學尤見宏材慶熊魚之得兼觀龍象之第一某冬烘白昔晚歲相期乆此妙音不到蓬宫之處看君名第又光杏苑之年回廬陵趙簿投贄我輩蓬蒿正堪羅雀美人錦綉上有棲鸞懐哉六謙持此三過某官鳯其翽翽麟兮振振吹大乙之烟藜歘然特起織天孫之雲錦􅂱乎相輝有是簿耶自此升矣某細敲白石遥想緑綈看南山之雲惠而好我穿東郭之履欲往從之回吉州陳守緯台州人葉西澗表親大常丞分牧龍藩此非子坐退耕鶴隴乃得公書紛六轡之光華亶一㕓之榮寵某官照人白雪有脚陽春蒙福凡十萬家民歌載路薦人至二千石相譜滿門籍甚嘘枯居然起廢某豈堪作吏眞足為垊儻一壑之無他維五雲之在上吟詩自樂退求元亮之心設榻相看徒感陳蕃之意稟酧不敏摧謝未央賀前人除福建倉藩條報政庾節敭綸雲閣森嚴上接神奎之府天囷明概下臨須女之虛天啓九遷民爭二竟共惟某官渾金璞玉甘雨祥風家有旂常籍甚東山之名姪身雖朱紫依然太學之儒生蚤騰駿馬於雲霄遂主神螺之風月人懐惠政帝有恩言奪南國之二天遺東甌之一佛常平典在武夷之文獻可尋宰相時來文穆之聲猷孔邇某退耕滕野喜趣曹裝輒持行李之恭庸展塗芝之慶事大夫賢者庶自附於攀轅以我公歸兮將不勝其賀厦其為頌抃曷竟敷陳賀劉省元夢薦登科辛未省元甲科第九人衢教蘭宫拔頴甲第傳臚過千曰俊過萬曰英人間徤筆第一為魁第九為弼斗北修名柯峰翠濕於飛纓泮水清摇於振鐸行撤皋比之席即歸鷺翿之班某正僻耕寛遂稽箋賀賦雲山之紅𣗳焉得往從摩石室之蒼苔不堪持贈迎寧國交代孟知府共審肅將一札言牧雙溪紫馬西來照旌旗而出色玉麟外遣覺篆籀之生輝上日先庚懽聲旁午竊深慶抃欽以某官羔裘豹裒玉質金相說書而動京師素積行祕書之學把麾而去江海重為賢刺史之勞少稽漢郡之三公嘉惠建州之千里某久哉望歲際此行春宛水明樓已敬虛於中舎昭亭簇騎敢先候於前茅謹具申聞伏惟丙照除湖南憲通交代李樓峰李改除漕東風一道喜鵲錦之生花元日十行愧牛衣之換繡幸甚葵丘之新好託於杏苑之舊盟一介施先七襄敢後共惟某官負宇宙之志出文獻之傳髙山深林世載其魁傑青天白日人知其清明地望接乎西平聲名垂於北斗瑶編玉牒參天上之神仙紫界粉牆隔人間之風雨盍鳴珮而登馺娑乃弭節而下崆同民五袴而牛瀆滿家米萬檣而蠶桑遍野屬凝旒之西顧遂持斧以湘行風動褰帷祝融七十二峯之雲曉星沉貫索太微二十五宿之芒寒江春洗蘅荰之愁庭晝臥桁楊之影方山摇而岳動俄斗轉而星移五丈原之流馬木牛運於樽俎八景畫之晩鐘沙鴈同是江山我公之二界無爭先君之四封如舊然而江濤如許原隰謂何温公嘆子駿之福星不宜居外文正服張公之大體引以歸朝爰重中權式光前軌某生而骯髒分也嶔﨑飲蘭露餐菊英哺烏有味裂荷衣焚芰製夢鹿何心毎為梁甫之吟有感長沙之賦曩於飛輓徒觸危機今見平郊猶驚曲木賴有同年之宿昔互為一日之交承春為秋先秋為春後甲入乙舎乙入甲家曲江㑹上之風流南岳雲邊之禮樂荆俗相傳於佳話蕭規幸淑於前猷睇駰駱之光華敢云並駕隨雲龍而上下儻許執鞭欣蹈之私誦言莫既賀前人改除湖北漕兼知鄂州日陛揚綸氷軺作屏北斗丹梯勾陳玉檻聨郎宿於天階渚宫碧樹巫峽青山迎福星於江夏光稠符玉色動轡絲共惟某官鐵馬行空金虬騖海離離珠璧府懸黎垂棘之光耿耿斗牛虛干將莫邪之氣洒翠竹碧梧之韻度發清霜紫電之神竒太㣲二十五星旌摇江漢祝融九千餘丈節倚雲霄當驅馳吟遣使之詩毎慷慨讀出師之表落落襄樊之事㑹悠悠江漢之風寒局面一新機神頓聳師垣制勝集忠益而開誠心帥閫請行從便宜而上方畧武承先志孰與明公乃峻氷臺乃陞寳庋練鵲錦之廉車改觀黄鶴樓之衞㦸生風餉髙密之師借恂河内詔西平之子贊度淮堧節鉞合而氣勢張弓矛重而精神壯北伐歌功于六月中興刻頌於萬年樓船過洞庭旌旗直下閶闔開黄道衮舃遄歸某方恊寅衷喜傳卯詔界上爭杜衍想共戴於我公方面待乖崖將遂誇於吾榜行行㑹弁亹亹賀牀賀前人生日暢月先春福星初度朱綬錦艾聨赤壁之六絲蓬矢桒弧絢紫微之五色玉書吐燄繡紱生輝共惟某官風骨清剛精神大耐仙人駕黄鶴色照渚宫老子跨青牛氣浮函谷壽八荒而裒福律九寸以迎長棠陰照岣嶁之央十分翠曉桃影近蓬萊之水一朶紅雲其夙分碧落之香逺認瑶池之色一車以南一車以北軫軫相望千歲為春千歲為秋心心持壽賀化池冬舞雲門而奏至六琯函和占星壁之正中三階齊色芝香丹禁穀介黄扉共惟某官心見乾坤身扶元㑹御牀親捧耀五龍夾日之光寳鼎密調胚萬象皆春之意燦火城之鶴燄領圭舄於鴛行宜裒坱圠之和茂集陶鈞之福一陽出地露玉燭之光芒五色書天開金穰之瑞慶某叨繼乗軺之乏殊慚把繡之長絢色線於帝寰乃心上衮跂黄雲於仙韈莫尾賀綦頌詠情深敷棻喙短賀化地正帝堯授厯肇開平秩之端周公為師實主泰和之運光華絶席坱圠方維共惟某官玉燭際蟠鈞陶動植調元神鼎心包太極之春捧日扶桑色照蒼精之角條鬯東南之温厚塤篪上下之明良拜晉國大夫人慶祥符之真宰邁潞公平章事登元祐之昌期億載敬休八荒開壽某囿身洪播稽首獨班三陽君子泰來仰贊茹茅之盛四牡王事靡盬俯同苞杞之生致賀輪囷牋忱稿秸賀簽書冬晷躔南陸一線迎長星麗西樞三階齊色裒時茨祉穀我英髦共惟某官元㑹運之經綸天地心之槖籥黄雲乗韈肅劒履於大昕繡日補裳領衣冠於亞歲鼓舞黄鍾之雅陶鎔緹幔之温萬物生輝回餘光於草木八荒開壽鬯新渥於乾坤某承乏湘軺馳瞻魯觀芸香透暖尚憐采苦之寒梅意先春預闖和羮之候葵葵是祝草草奚殫賀參政正簽書樞密院兼東角耀芒開三朝之景運西樞齊色轉萬象之洪鈞碩輔均𢎞方輿錫羨共惟某官明謨贊化熙績亮天金鼎調元共斡太和之運玉衡測影首參平秩之功塤篪宥密之經綸鼓舞明良之際㑹薇歌中國壽細栁之春風花滿上林掲扶乗之曉日四方來賀三壽作朋某身逖馳驅神傾坱圠拔茅蓮茹言觀君子之風集杞方苞尚念使臣之逺輪囷致頌藁秸箋忱文山集巻九欽定四庫全書文山集巻十宋文天祥撰啓駢劄子賀江丞相除湖南安撫大使判潭州舊弼起家价藩建閫姬公相周而為左方遂明農召保分陜而守西又新維翰威行夷夏運在東南恭惟某官壽俊兩朝禮樂四代修名偉節以日月為明泰山為髙奥學精言為天地立心生民立命水火不爭於鼎鼐泥金各就於陶鈞本之身心暴秋陽而濯江漢措諸事業膺戎狄而懲荆舒起觀一世之安危端繫大人之出處當世道未寧之日正遼人相戒之時乃攽一道之玉麟乃授三公之金鵲謂捍荆門吞夏汭寄莫重於星沙豈挹浮丘拍洪崖閒可專於緑野安石起東山而苻秦潰孔明渡瀘水而孟獲擒維兹銀濤青壁之雄倚我錦艾朱綬之重功隱存於宗社書不盡於旂常三軍百姓之歡迎天開玉悵一馬二童之促召再築沙堤佐興唐虞誕保文武某及門甚晩知己何深薦不識面官毎嘆先生之古道自號報恩子豈在衆人之下風鳯凰出而羽毛朝蛟龍驤而雲氣族一日偃繙之際㑹同時誤節之走趨方當聖哲馳騖之秋無限師友從游之感孝子回車忠臣叱馭將交盡於君親司空副相太保上公惟深期於造化潔蠲拜下傾倒由中賀前人除特進碩輔在藩優恩加秩撫淳熈左相之舊鎮赫奕十連冠元豐特進之新衘巍峩一品星馳汗號雷動驩音恭惟某官耆壽具瞻宗師先覺東問典故西問文學錦堂丞相之規模公見庻僚府見監司潞國太師之度量維時台宿來茨軫邦熊當道而貉子之贍寒龍居淵而象罔之迹逺上思舊徳時有思言進左右僕射之官増詩書元帥之重在師中吉承天寵也既都錫命之榮以我公歸有衮衣兮即轉征東之馭某猥塵馳轡阻赴賀牀載酃渌之清指玉麟而為壽遡斗樞之紫徯金鵲於方來回前人除特進送禮上公國輔相望龜紱之華特進天人忽枉鸞飛之字溥乾坤之新渥賁岣嶁之行雲庭實熒煌鈞和坱北芳洲杜若被紫馳翠金之榮驛路梅花看赤舄繡裳之覲熏香跪謝伏繭泝馳行部潭州謝江丞宴古之學必有師甫趨函丈子使人歌而善肅拜初筵春風渭北之旗夜月洞庭之樂簫韶俗身氷雪征塵車攻賡六月之詩先聞吉語帝所聽九成之奏再相太平送前人九日禮宴龍山九九之節夙侈雄藩開鶴林七七之花今逢真宰風清六纛霜肅九州恭惟某官赤舄元圭琱戈錫盾酌長沙酒快春水之曉行賦北門詩喜秋花之晩㸔小馳戱馬重補衮龍某記影星垣驚心颷館跂芙蓉之頂想千乗之登髙折茱萸之房為三公而持壽回前人送九日禮天開紫蓋秋髙淡圃之香星下碧泉春到長沙之酒飛巻五雲之風雨光華九日之山川味也罙深恩斯曷稱北門看菊幸與分玉帳之清内殿傳柑聞已下金甌之信賀前人冬春入重緹欣聽雷􅀢之奏台明上衮具瞻井鉞之輝穀我龎臣裒時疇社恭惟某官量包元氣心見先天冠漢殿之仙班火城如晝補舜裳之五色宫線猶香巻舒昭文館之春風布濩祝融峰之曉露茝蘭出色芸荔含和愛日迎長開一氣八荒之壽瑞雲促覲領五更三㸃之朝某迹囿轉鈞心馳獻履近依星軫愧直指之綉衣遥贊陰門歸碩膚之赤舄薄言燕賀永矢螽鳴送前人折筵肇九寸律柄屬洪鈞建十丈旗光生几舄馳想雲和之瑟莫陪壽軫之觴薄注酃清式歌魯瑞出乗仙韈遥修南至之恭入捧御牀預致東歸之慶瀆嚴増惕錫頓為榮回前人送冬酒噓嶰谷之陽方覃鈞播照酃湖之渌忽拜衮題有華舞袖之春風増賁繡絲之曉日淺深存燮理滿傾北斗之天漿徳澤布光輝跪沐南山之雲氣輪囷鏤感槀秸刋申賀前人正龍杓麗曉天開泰内之陽驛騎明春星起軫中之壽和薫青琯喜動黄麻恭惟某官心㑹陽宗身扶人統黻明帝衮迎瑞日於東郊繅煥公圭照蒼精於左角巻劔氣玉烟之彩増繡裳赤舄之榮東作有三百六旬陶鈞一轉中書歴二十四考鼎鼐重新戒前路之鸞凰沸歡聲於童馬某喜逢雞朔隃贊熊旂光近火城又獻大椿之歲寒嘘雲舍敢忘寸草之春跂賀心馳箋忱喙短送前人酒開條風於獻節瑞藹三朝介壽酒於公堂春生四履斂神光於雲岳拓喜氣於沙堤輒持酃渌之窪樽聊贊鈞天之和鼎不匱錫爾類懐哉萱草之詩再入福蒼生如此椒花之頌薄將凌躐賜頓欣榮回前人送春春回太蔟開雲氣於南山曉醉長沙酌天漿於北斗挹注偏提之閏薫蒸統部之和緑淨生香洪鈞轉煥八仙池隔莫陪左相之杯太乙風生隃贊東皇之席巻巻跂謝草草箋忱賀前人赴召銀信騰霄金書照閫映南雲之紫蓋春滿江湖歸東雨之衮衣天開閶闔行官絡繹統部歡呼共惟某官以大宗師為眞宰相文章若雷霆河漢玉色金聲言行質天地鬼神丹心白髪出納祝融峯之日月巻舒昭文舘之星辰北門小煩魏公盡寛上顧中國再相司馬坐懾衆心仙人駕綵鳯以傳音老子馭青牛而入覲碧涵汀芷曉清沙路之塵黄把庭麻夜轉火城之影某囿身化治舞手揚綸大老盍歸乎來共致巖瞻之喜君子永錫爾類終徼鈞播之私跂賀欲飛牋詞甚秸通羅提舉京子號牧隱天囷照楚瞻駰轡之濡絲雨耒耕綿愧牛衣之易繡合臺容之永好嚴牘贄之先㳟欽惟某官氷浸玉淵雲崢鐵壁沮金石諧韶濩音振蓬萊踞虎豹登虬龍氣摩岣嶁覽德輝翔千仭而下迴狂瀾障百川而東萬鍾何加一介不取寧航選海掉頭不揖於王公使夢鈞天平步可登於卿相莫屈英英之氣何求赫赫之名以恢乎玉山璧府之才亦屑於金署犀監之屬再命而俯一車以南霜飛暑路旗展春山輝煌周隰金聲中朝玉振江左照映熊湘起視西北之風濤誰是東南之砥柱必平居曰法家曰佛士則臨事為孝子為忠臣參文公之政於浙西舉行殆遍凜清獻之風於殿上植立方來某政酣啜菽之甘不作覆蕉之夢長鑱為命忽持斧以重來曲木猶驚雖循牆而莫避幸甚星臺之近聿為鄰燭之輝繼自今為王事之圖増昔者寘周行之氣九折回王尊之馭為範馳驅四方隨東野之龍願從鞭弭匪伊拜下莫既由中回前人手批書舊例監司交疇庸天庾趣駕星闈戒嚴繫日月之書茂對照乾坤之渥某稟承有恪占署知榮謹具劄子復申槀秸萬愧送前人七夕瞻兩旗之耀獨立秋風依六轡之光相望七夕來繡口錦心之巧贈玉盤金錯之英鄰酒春深客堂凉透牽牛織女看夜度於天街語燕㽞人且曉吟於湘水請前人宴濯錦湘江欣覩乾坤之渥巻簾楚觀頗懐風月之談忘蒙瀆之為嫌冀謙尊之肯訪薄言卜日為慶朝天富以其鄰且細論於尊酒德將無醉願小駐於鋒車某輒擬翌日敬邀崇重回前人折送錦闈星度喜渙禁綸畫舫雲來特開臺宴為折瀟川之渌頓生楚觀之春酌郎官清巻碧筩而遥謝懐美人贈慚荆璧之無酬請前人九日宴紅杏舊陰甫迓天囷之綵黄花佳節又飛氷篆之丹膏車已動於行雲流馬聿來於今雨偶龜明日薄宴清風莫置錦屠蘇且拚小飲巳鑄黄金印行慶異除送前人折筵鵠立春霄帥雲霓而來御鴈拖秋色喜風月之共談欲挹注於黄流盍招呼於緑凈跽效折枝之瀆想為㑹節之煩飲露供騷何取水中之薜荔倚雲同味共㸔江上之芙蓉通董提舉楷號克齋永嘉人前知瑞州魏闕揚綸熊湘授庾刺史二千石雲度錦河天囷十三星春浮絲隰六條先曉一道生風恭惟某官閥冠雲霄樓髙湖海沮金石諧韶濩音振蓬萊踞虎豹登虬龍氣摩鴈蕩清泚二蘇之潁水崢嶸二陸之象山自崑丘鳯穴之鳴陽即溟海鵬雲之増翮上下浙江之明月早透金閨翶翔輦路之春風曉聽魚鑰灑灑清都之人物飄飄碧落之神仙張乖崖斬叛卒於益州騷動之餘富鄭公活飢民於青山荒殘之後璽書選表環召歸班大府上士之清聨帝思前席常平使者之新轡公念南湘以醴泉芝草之春為芳芷杜蘅之澤九郡顒顒而望賜四牡業業以戒嚴霜飛暑路旗展春山已揺翠岳烟傍衮龍日臨仙掌遄侍紅雲某夙出年盟今諧鄰好萬里風雲之天濶一襟草木之味同祝融山外之芙蓉肅迎紫氣泰華峰頭之氷雪佇沐清風回前人到狀夙綴鴈題今聨駱轡欽傒清風之戾止亟馳新雨以恭先甫快低簪居厪飛翰天囷星近喜不隔於光華湘水月明尚嗣承於談笑迎前人星槎度漢天庾明湘丹鳯銜書光照朱維之色蒼龍授節清揺緑淨之波禮樂輝煌旄倪鼓舞恭惟某官文章大雅節概真清玉立九關徹芒寒於霄漢春行千里蓄精鋭於雷霆屢培後户之本根少屈廉車之步武任一道常平之寄推九重博濟之仁不待突黔趣歸橐紫某寅同下隰蔭接芳隣太史新占看德星之照軫故人舊識喜今雨之來車送前人洗拂振衣碧落弭節朱陵祝融驅海若藏江山揺動風伯清雨師洒原隰昭蘇言解征驂驩傳回鴈某年盟有夙鄰蔭方新吉日來思已慶拂龜之喜皇華近止輒陳秣馬之恭回前人送私覿今雨來車方連雲於回雁清風落䄂忽分貺於懸魚捧旅實以若驚恍使華之如對報青玉案頗懐客况之寒望黄金臺惟謝年情之厚謝前人招宴樂語雲垂臺蔭偶陪湘水之行風度伶音侊聽洞庭之奏和氣一堂之律吕年情四海之弟兄矧燕花飛舞之時正鵲錦交輝之旦充庭有喜滿座為春故永歌之尚想五章之禮樂式相好矣永懐一片之宫商送前人新除禮峰回秋色謇誰㽞兮中洲臺立春氷歴余征於吉日舄奕車輿之彩葳㽔袍鵲之花注緑凈以傾馳睨青空而折寄洞庭霜熟是為正好景之時閶闔雲開嗣貢真福星之賀薄言巻俎莫究衷旌送前人折俎臺氷正色錦袍生春馳華轡之六絲軫星増煥鑄黄金之一節融岳如新條令具孚耄倪胥抃某阻奉即真之賀輒修攝飲之恭禮無體樂無聲慇懃直寄南有箕北有斗清淺相望持瀆忞忞麾㽞荷荷回前人中秋請宴照江疊節載書舫之清氷待月舉杯呼芳樽於緑淨拜華星之墜几約明月之浮槎風雨滿城何幸兩重陽之近江山如畫尚從前赤壁之遊槀秸申酬輪囷嗣布回前人折俎注􅌕湖之渌昉慶臺春然楚竹之清倍分鄰燭載厪巻俎如侍秩籩援北斗以酌天漿既知賜矣醉長沙而行湘水悵莫從之回前人送酒福星明處甫羞北斗之漿今雨來時又報長沙之酒起立寒梅之月影坐添凁芋之春萌雖軫軫之相望真心心之不隔白絹之封三印報不成章黄麻之似六經又將來賀賀前人冬春入重緹欣聽雷鼗之奏星垂練錦泝瞻沙軫之輝履此一陽賁然雙節恭惟某官聲名震動意度春融大雅正音得黄鍾之渾厚純和元氣探寳鼎之絪緼巻夜月於蓬萊布曉雲於岣嶁茝蘭出色芸荔生香君子得輿開千載一時之㑹使臣濡轡催五更三㸃之朝某斧繡何功臺雲借蔭暖回鄰壁先鳴鳯之六筩光近福躔㑹牽牛之七曜通忞喙短馳賀心長又送冬至酒五紋添繡線日麗旌旗一節鑄黄金春生霄漢馳想雲和之瑟莫陪壽軫之觴薄注酃清式歌魯瑞九疑仙人之韈正快曉行四牡使臣之車即催元㑹瀆嚴増惕賜頓為榮送前人歲節酒條風開獻節琯玉更端春酒躋公堂壺氷薦祉皇華六轡和氣九州輒蠲杜若之清持向屠蘇之末軫中星轉隃瞻練鵲之輝緜上雲歸為喚林烏之夢薄將増恧賜頓知榮賀前人正龍杓曉轉天開泰内之陽駰轡春行星揭軫中之壽雙旌郁穆疊節焜煌恭惟某官清澈壺氷和鍾琯玉葱珩剡剡輝瑞日於東郊練錦煌煌映蒼精於左角小駐祝融峯之雨露遄催含光殿之風雲某幸接臺容欣周律暖酌屠蘇酒願均八荒壽之心詠萱草詩曷謝三春暉之賜傾心來賀引領欲馳回前人送春杓攜龍角煥天上之星辰壽介兕觥分軫中之和氣喚醒年華之舊移來夜酌之春折芳芷與杜蘅永懐騷雅挼紫藟坐碧草隃企湘深什襲知榮七襄莫報得贑送前人禮上堂拜家慶偶忝近麾痛飲讀離騷有懐疊節持此清泠之寒渌進于沆瀣之朝霞望美人兮一方特慚蕝禮問征夫以前路尚肅藥規輶瀆有慚麾留斯寵回前人請宴堂有白髪親誤塵便組公鑄黄金印為舉初筵移來長沙酒之芬馨喚起章貢臺之顔色君子永錫爾類已懐既醉之歌使臣言逺有光尚借如濡之潤送前人别㑹折俎楚節易麾深味慈烏之哺湘花舞席隃瞻練鵲之輝思君渥之綢繆膏吾車而繾綣上堂拜家慶逺借光華痛飲讀離騷隃同慷慨區區折寄盼盼麾留回前人别㑹送酒俎回卭坂之車方随檣燕贈蒲城之酒忽枉帳犀慇懃折栁之情流麗飛花之影丈夫豈無别淚不洒於東西同年亦有情雲相隨於上下銘感娓娓馳泝沄沄小人有毋聊分竹以懐歸君子錫朋指飛花而賦别慷慨執袪之意慇勤祖帳之文巻倚良稠銘感不足日暮碧雲合喚游子於他郷月明今霄多耿美人於河漢揭麗軫之福星隃詹正色呼歸航之明月尚沐餘光雖已催南浦之春更為醉長沙之曉公方行冀部即聨獻納之班吾亦念桐郷終席澄清之潤懐哉折寄罪甚刋酬賀衡州宋吏部赴上鳯池絢曉鴈岫行春天近蓬山玉檻照西清之直風髙湘水朱旗壯南國之游童竹生驩騷蘭出色恭惟某官山輝川媚雪跨霜懸逺景樓高拂西眉之意氣靈光殿炯接東魯之風流砥柱百川大車九軌金鑰玉珂之凌厲粉牆紫界之蹁蹮海荔晴雲曽度兩轓之影溪苕夜雨尚留六轡之光巻紫氣於河球韜神芒於浦劍屈訪禹碑之竒字小凝韋㦸之清香驅龍蛇放之菹春生敏手椉騏驥道夫路雷動先聲佇風幕之圍春聽今􅃭之歌暮朱陵道院暫分翠岳之輝碧落仙人行侍紅雲之近某牡驅何補鼯技已窮地帶九州輝最親於鄰燭月明千里影即對於明簪盥露沄沄遡風亹亹回前人到任狀小車戒曉猥隨竹馬之塵森㦸臨風快覩梧鸞之彩纚纚􅁭期之新雨煌煌手畢之華星封侯識荆州已諗度關之氣低頭拜東野願從開岳之雲儲謝輪囷刋酬梗槩請前人到任宴虎符新渥聿來聚軫之輝鴈嶠初春喜接浮關之氣粲梅花之照眼擷杜若以論心欲龜告朔之朝薄燕行春之色共剪西窻燭迎桃李之春風為酌北斗漿巻瀟湘之夜雨送前人洗拂露溶朱斾已空縁淨之塵烟淡繡隅莫侑清香之宴來新多喜飲至有彛花邊立馬竹裏行厨木末搴蓉聊將綿蕝水中采薜謾贊春容輶瀆知慚麾留為寵謝前人招宴致語衡陽虎竹之春新輝碧落湘水燕花之夜共醉清吟藹僎介之倡酧發伶倫之揄詠恭惟某官黄鍾䟽越丹井甘寒咳唾珠璣五鳯樓之錯落擊撞金石九龍􅒶之舂容妙言語之齊諧寄音容於趙舞某味深登席寵復歌詩相如文豈類俳敬肅齊心之謝魯侯永錫難老莫酧思樂之章什襲意長七襄辭訥送前人特㑹折俎慶棨㦸之遥臨幸依香燕講尊彛之特試敢去餼羊折騷客之芳聲效野人之綿蕝樂無聲禮無體聊寓慇勤北有斗南有箕相望清淺忞忞持瀆盼盼麾留回前人送物詹新府之䄡帷有光下隰來美人之錦繡於粲西珍庭實生香江空出色緑文赤字徒深什襲之榮青玉明珠莫寓七襄之報填膺多謝待面縷陳回前人賀雪行湘水之春天開光霽呼霍山之雪風起繽紛手提五袴之温心出六花之瑞幻塗鴉之玉界賞回鴈之璚田清憶廣平公莫形容於天巧白戰潁水上預贊詠於年豐回前人饋歲官居佳節坐閲壘荼兵衛清香特分滫􅔱來使華於千乗雜侯餽之八珍喚醒春意之繽紛倍覺寒聲之辟易歌椒頌而懐杜甫隃贊凝森持梅花以謝廣平莫酬清絶謝前人聚宴折俎諸侯應郎宿之躔來從劍外太史奏德星之聚偶與席間傳風味於酃湖斂陽和於楚觀黄堂一杯酒良佩交情青烟五侯家隃馳謝臆送前人聚宴折俎凝香森衞㦸近揖春和舉瓢酌天漿有懐星聚爰采澗溪之末薄陳俎豆之前為細民斟隃想賦西園之雪從太守樂駕言隨東野之雲瀆餉懐慚麾㽞為幸回前人賀正斗指蒼龍轉陽和於雄律尊分白獸來瑞氣於雌堂曉酣柏葉之秀暖轉梅花之色稱壽觥而頌魯散作春和下褒璽以徴黄佇看天渥有華什襲莫報七襄回前人請元宵宴麗譙龍炬春輝左角之星碧落燕香夜對西眉之月特枉金玉章之貺許從雲霞佩之遊遶建章立通明預祝六鼇之宴醉長沙行湘水且聽五馬之謡請前人元霄宴轉西樓之梅月喜對銀花持北斗之桂漿擬陪畫㦸僭卜仍圓之夕共流引滿之霞敲鐵馬之春氷肯來楚觀賦石犀之夜燭細説巴山回前人請聚宴虛危出福星光生鴈嶠斗牛有紫氣喜動燕香為開北海之尊如㑹長沙之節益者三友懐練錦之新輝襄我二人歌緇衣之永好感深緹襲愧後刋酧除贑守回宋衡州䄂劄請宴馳隰何功沐崆峒之新雨秩筵有命岣嶁之春風鏗然出銜袖之音為我助回車之喜江湖千里將聨麾影之光桃李一杯尚聽􅃭歌之譜彌襟傾感走筆刋酬請前人宴太行望吾親舍偶遂陳情合江和使君詩正堪握手敬龜明日薄燕清風衘杯接慇勤聊盡湘行之趣上堂拜家慶敢忘頴錫之私徼惠賁然坐邀恧甚請前人别㑹致節言歸借末光於郎錦飛花執别馳逺夢於客帆小湔祓於詰朝更徘徊於勺水日暮碧雲合不勝乍逺之情月明今宵多且盡相親之興坐邀凌躐惠肯知榮回前人還請把太守之新符獲傳民譜問征夫以前路乃辱祖筵方繾綣於飛花更慇懃於折栁南有箕北有斗所願挹漿君向湘我向秦若為聞笛懐哉傾倒帥是刋酧謝送禮物棒檄江城喜囿二天之照折梅驛使歡傳千里之音煌煌麾節之夏盟纚纚雲仍之新好某官誼隆金石香溢芷蘭誰將西歸懐之好音莫殫深謝詩曰不匱永錫爾類惟戴殊知蕝禮將忱靦顔匪報道胡都承石壁叨臬湖南余征上日摳衣洛下伊邇中台亟裁書而敘心將考德而問業恭惟某官出入文武闔闢樞機龍虎變化山林髙深間出魁傑氷雪聰明雷霆精鋭獨步艱難肯綮十九年而刀如新扶揺九萬里而風斯下連麾江海春浮五袴之聲疊節東南星度六絲之影自任以天下之重獨賢於王事之勞金署犀監之翶翔奎殿紫樞之凌厲赫奕將磨於浯石逍遥遽薄於蓬萊此聲梁楚之間英雄籍甚長江南北之限人物𦕈然馳旌夜召於長沙乗驛曉行於湘水亟躋兩地試韓范之規模𢎞濟中天遡趙張之事業某味方酣於啜菽夢不到於覆蕉換烟雨之緑簔方深澗媿起波濤之舊繡曷稱臺容􅃡懐冀北之風喜近髙陽之里王尊九折坂願聞叱馭之規元龍百尺樓即展下牀之拜登龍在望濡兔莫殫回楊祕監就賀貳書璧府晉金華太乙藜青煥玉山之黼黻邇英槐翠照丹井之綸絲開岳雲回度墀春早恭惟某官岷峨一璧關路單傳玉井氷輪洒落神仙之韻簫鐘瑶簴和平典則之音自歘起而霆轟毎徐行而山立稱真侍講在淳夫正叔之間號小司成負安定康侯之望雉監沐天光之近螭坳居地望之嚴羞崐崘而薄蓬萊枕湘江而㑹瀟水萬家燈火雨籠絃誦之聲千里桑麻雲度袴􅃭之曉君不淮陽之薄上深渤海之嘉圖書歸領於瀛洲鐘皷行尋於長樂銅印水蒼佩亟紓宣室之思白馬金盤陀浸近文昌之拜某相望千里一别六年緑蓑風雨之中方兹餐菊舊繡波濤之後復爾夢蕉喜追東海之龍來趂衡陽之鴈恍絶塵而瞠後乘半夜之召前懐駰駱之載馳敢安絲轡騎騏驥以先路遥想雲旗贄賀葵葵刋酧草草
