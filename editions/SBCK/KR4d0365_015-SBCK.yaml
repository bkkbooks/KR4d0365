body:
  text: 吟嘯集生朝五月􅀄二日客中端二日風雨送牢愁昨􅀊猶潘母今年更楚囚田園荒吉水妻子老幽州莫作長生祝吾心在首丘西瓜吟㧞出金佩刀斫破蒼玉瓶千􅀧紅櫻桃一團黃水晶下咽䪺除烟火氣入齒便作氷雪聲長安清富􅀃卲平争如漢朝作公卿石三峯爲示十字云昔日乗龍貴今朝汗馬勞爲足六句雲低昏海日風急沸洪濤昔日乗龍貴今朝汗馬勞紈綺汙塵􅁟珠玉委蓬蒿􅀂作凄然賦吾􅀅僕命騷蚤秋寒魄􅌿玄河啇颷慓明發覊人坐環堵壮士衣穿􅄄晋陵誰復新秦陵尚云秣夫君百世心患不在饑渇􅀉惠州弟五十年兄弟一朝生别離鴈行長已矣馬足逺何之􅌾骨知無地論心更有誰親䘮君自盡猶子是吾兒感傷地維傾渤澥天柱折崑崙清夜爲揮淚白雲空斷魂死生蘇子節貴賤翟公門高廟神靈在乾坤付不言自歎海闊南風慢天昏北斗斜孤臣傷失國遊子歎無家官飯身如􅀉征衣􅁂欲華越王臺上望家國在天涯虎頭山蚤不逃秦帝終然䧟楚囚故園春草夣舊國夕陽愁妾婦生何益男兒死未休虎頭山下路揮涙憶䖍州高沙道中道逢死人骨委積萬有千魂魄侵蠅蚋膏脂飽烏鳶使我先朝露其事亦復然丈夫竟如此吁嗟彼蒼天古人擇所趍肯蹈不測淵柰何以遺體糞􅁟同棄􅂢􅀄學蘇子卿終慕魯仲連求仁而得仁寜死溝壑填自古皆有死死不汚腥羶秦客載張禄吴人納伍貟季布疑在魯樊期托於燕國士急人病倜儻何拘攣伊人莫知我此恨付重泉戰塲三年海嶠擁􅆛貅一日蹉跎白盡頭垓下雌雄羞故老長安咫尺泣孤囚魚龍沸海地爲泣烟􅀨滿山天也愁萬死小臣無足憾蕩隂誰共侍中逰哭崖山寳蔵如山席六宗樓船千疊水晶宫吴兒進退尋常事漢氏存亡頃刻中諸老丹心付流水􅀌臣血淚洒南風早來朝市今何䖏始悟人間萬法空上塜吟湘人有登科者􅀄授武岡尉單車赴官守名家正擇婿尉本有室􅀮其實而取焉官滿随婦翁入京自是捨乗梓去墳墓終身不歸後官至侍從其糟糠妻居母家不復嫁􅀊時爲夫家上􅊘婦禮不廢友人作古詩一首曰上塜吟某讀之爲之感慨因更廣其意賦五言一篇余昔從君時上堂拜姑嫜相携上祖塜􅀊時持酒􅄴姑嫜相繼􅃿馬鬛不在郷共君甌盂飯清涕流􅃭裳君貧􅀄赴官有家不得􅀅妾無應書兒松檟自成行君别不復歸􅀊月何茫茫長安擁朱綬執鴈事侯王豈無一􅁓書道路阻且長年年酧寒食妾心良自傷君家􅃇巾櫛至今襲且蔵諒君霜露心白首遥相望􅌾無主墓碑風􅀨中見道傍一碑題云􅌾無主墓之記乃大定戊申所立雨衣淋漓字晝漫㓕惜不得下馬讀之路逢一石碑亭亭傲風􅀨停驂髣髴㸔云是無主墓末書戊申􅀊屈指九十秋是時龍渡江甲子恍一周借問􅌾者誰承平百世祖亦有周餘民戰骨委黃􅁟大祖下江南誓不戮一人神孫再立國天以報至仁大河流血丹屠毒誰之罪潼􅀜忽不守皇皇依汴蔡螳螂知捕蟬不知黄雀來今古有興廢重爲生人哀邳州哭母小祥我有母聖善鸞飛星一周去年哭海上今年哭邳州遥想仲季間木主布筵几我躬巳不閱祀事付支子使我早淪落如此終天何及今畢親䘮於分亦巳多母甞教我忠我不違母志及泉㑹相見􅀑神共歡喜哭母大祥九月七日先母夫人大祥之辰某爲子不孝南望嗚咽爲哀章一首前年惠州哭母歛去年邳州哭母朞今年飄泊在何䖏燕山獄裏菊花時哀哀黄花如昨日兩度星周俄箭疾人間送死一大事生兒富貴不得力秪今誰人守墳墓零落瘴鄕一堆􅁟大兒狼狽勿復道下有二兒并二女一兒一女亦在燕佛廬設供􅂢金錢一兒一女家下􅀕病脫麻衣日晏眠夜來好夣歸故國忽然海上見顔色一聲鷄呌淚滿床化爲清血衣裳濕當年􅄔緯意謂何親曾撫我夜枕戈古來全忠不全孝世事至此甘滂沱夫人開國分齊魏生榮死哀送天地悠悠國破與家亡平生無憾惟此事二􅀰巳作門戸謀江南􅌾母麥滿舟不知何日歸兄骨狐死猶應正首丘哭妻文烈女不嫁二夫忠臣不事二主天上地下惟我與汝嗚呼哀哉先太師忌日太師忌汗漫二紀似跳丸弟妹俱成立家郷忍破殘衣冠晨月暗墳墓夜風寒萬里逢先忌無言把淚彈告先太師墓文維巳卯五月朔越二十有六日孝子某自嶺􅀍執至南安軍謹具香幣遣人馳告于先太師革齋先生墓下嗚呼人誰不爲臣而我欲盡忠不得爲忠人誰不爲子而我欲盡孝不得爲孝天乎使我至此極耶始我起兵赴難勤王仲弟􅀅家遁于南荒宗廟不守遷我異􅆠大臣之􅁩國亡家亡靈武師興解后歸國再相出督身荷憂責江南之􅃥義聲四克爲親拜墓以剪荆􅁄大勲垂集一跌﨑嶇妻妾子女六人爲俘收拾散亡息于海隅庶㡬􅁬厲以爲後啚惡運推遷天所廢棄有母之䘮尋失嫡子􅂘泣未乾兵臨其壘倉皇之間二女夭逝剪爲囚虜形影獨存仰藥不癠竟北其轅繋頸縶足過我里門望墓相從恨不九原爰指松楸有言􅀂誓繼令支子實典祀事有姪曰昇我身是嗣興言及此血涙如􅀨嗚呼自古危亂之世忠臣義士孝子慈孫其事之不能兩全也乆矣我生不辰罹此百㐫求仁得仁抑又何怨幽明死生一理也父子祖孫一氣也􅁳漠有知尚哀鍳之余始至南安軍即絶粒爲告墓文遣人馳歸白之祖禰瞑目長徃含􅀏入地矣乃水盛風駛五日過廬陵又二日至豐城知所遣人竟不得行余至是不食垂八日􅀂無事然􅀻念死廬陵不失爲首丘今心事不逹委命荒江誰知之者盍少從容以就義乎復飲食如􅀄因記左傳申包胥哭秦庭七日勺飲不入口不聞有他廼知餓踣西山非一朝夕之積也余甞服腦子二兩不死絶食八日又不死未知死何日死何所哀哉巳卯十月一日至燕越五日罹狴犴有感而賦一十七首一直絃不似曲如鈎自古聖賢多􅀍囚命有死時名不死身無憂䖏道還憂可憐杜宇空流血惟願嚴顔便斫頭結束長編猶在此竈間婢子見人羞二落落南冠自結纓桁楊卧起影縱横坐移白石知何世夣斷青燈問㡬更國破家亡􅀟淚暗天荒地老一身輕黃梁得失俱成幻五十年前元未生范曄在獄中爲士題扇云去白日之皎皎即長夜之悠悠三心期耿耿浮雲上身事悠悠落日西千古興亡何限錯百年生死本来齊沙􅁁莫待哀黄鵠雪裏何須問牧羝此䖏曽埋􅀟寳劍虹光夜指楚天低四寥陽殿上歩黄金一落顛崖地獄深蘇武窖中偏喜卧劉琨囚裏不妨吟生前巳見夜义靣死去只因菩薩心萬里風沙知巳盡誰人㑹得廣陵音五亦知戞戞楚囚難無柰天生一寸丹鐡馬行鏖南地􅀬赭衣坐擁北庭寒朝飡淡薄神還爽夜睡﨑嶇夣自安亡國大夫誰爲傳秪饒野史與人㸔六風雪重門老楚囚夣回長夜意悠悠熊魚自古無􅀟得鵠雀如何可共謀萬里山河真堕甑一家妻子枉填溝兒時愛讀忠臣傳不謂身當百六秋七聴着啼䳌淚滿􅁭國亡家破見忠臣􅀜河瀝落三生夣風雪飄零萬死身丞相豈能堪獄吏故侯安得作園人神農虞夏吾誰適回首西山繼絶塵八風前泣燈影日下泣霜花鍾信忽然動屋隂俄又斜悶中􅂓度􅀊夣裏尚還家地獄何須問人間見夜义九風霜隂忽忽天地􅌿悠悠我自操吴語誰來問楚囚寂中惟㓕想逹䖏盡忠憂手有􅅊編在朝聞夕死休十環堵塵如屋纍然一故吾解衣烘稚蝨勻鏁救殘鬚坐䖏心如忘吟餘眼巳枯不應留滯乆何日褁籧篨吴殺諸􅁑謹以籧篨褁而棄之十一浩刼風塵暗衣冠痛百罹静傳方外學晴冩獄中詩烈士惟名殉真人與物違世間忙㑹錯認取去來時十二儼然楚君子一日造王庭議論探堅白精神入汗青無書求出獄有舌到臨刑宋故忠臣墓真吾五字銘十三兩月縲囚裏一年憂患餘踈因随事直忠故有時愚道在身何拙心安躰自舒近來都勘破人世只􅕋廬十四衮衣坐縲絏世事亦堪哀枕外親炊􅁰爐􅁁細畫􅁅無人涙垂血何地骨生苔風雪江南路夣中行探梅十五我自憐人醜人方笑我愚身生豫譲􅋪背發范増疽巳愧功臣傳猶堪烈士書衣冠事至此命也欲何如十六乆矣忘榮辱今兹一死生理明心自􅁉神定氣還清欲了男兒事㡬無妻子情岀門天宇闊一􅀏暮雲横十七珙璧衣冠十六傳更無一士死君前自慚重趙非九􅂦猶幸延韓更數年孟􅀶嚢頭真自愛杲卿鈎舌要誰憐人間信有綱常在萬古西山皎月懸和夷齊西山謌謌曰登彼西山􅀆採其􅅔矣以仁易􅁀􅀆不知其非矣神農虞夏忽然􅃿􅀆我安適歸矣吁嗟徂􅀆命之衰矣後二千餘年某廼􅀝歌而和之曰小雅盡廢􅀆岀車采􅅔矣戎有中國􅀆人􅁼熄矣明王不興􅀆吾誰與歸矣抱春秋以􅃿世􅀆甚矣吾衰矣又從而歌之曰彼美人􅀆西山之􅅔矣北方之人􅀆爲吾是非矣異域長絶􅀆不復歸矣鳯不至􅀆德之衰矣十二月二十日作家國哀千古星霜忽一周黄沙漫故道白骨委荒丘許逺死何晚李陵生自羞南來冠不改吾且任吾囚二十四日俗云小年夜壮心􅀒光岳病質落幽燕春節前三日江郷正小年􅀊時如有水風俗不同天家廟荒苔滑誰人燒紙錢立春巳卯十二月二十六日無限斜陽故國愁朔風吹馬上幽州天翻地覆三生刼􅀊晚江空萬里囚烈士䘮元端不惜逹人知命復何憂秪應四十三年死兩度無端見􅁟牛遇靈陽子談道贈以詩昔我愛泉石長揖離公卿結屋青山下咫尺蓬與瀛至人不可見世塵忽相纓業風吹浩刼蝸角争浮名偶逢大吕翁如有􅀫世盟相從語廖廓俯仰萬念輕天地不知老日月交其精人一隂陽性本来自長生指􅀧虚無間引我歸員明一針透頂門道骨由天成我如一逆旅乆欲躡屩行聞師此妙訣􅕋廬復何情􅀊祝犂单閼月赤􅁬􅀂日焉逢涒灘遇異人指示以太光明正法於是死生脫然􅀂遺矣作五言八句誰知真患難忽悟大光明日岀雲俱静風消水自平功名㡬㓕性忠孝大勞生天下惟豪傑神仙立地成巳卯􅀊除􅀊除破衣裳夜半刺針線遊子長夜思佳人不可見草枯稚驢吼燈暗饑䑕現深室閉星斗輕裘卧風霰大化忽流斡浩刼蕩回轉冠屨失其位侯王化畸賤􅃓戈叱竒字刀鋸摧䪻弁至性詎可遷㣲軀不足戀真人坐冲漠死生一乗傳日月行萬古神光索九縣右自巳卯十月一日至􅀊除所賦當時望旦夕死不自意蹉跎至今詩凡二十餘首明日爲啇横執徐􅀊不知又當賦􅀂干首而後絶筆云巳卯除日姓某題元日庚辰􅀊鐡馬風塵暗金龍日月新衣冠懐故國鼓角泣離人自分流年晚不妨吾道春方來有千載兒女枉悲辛庚辰四十五􅀊東風昨夜忽相過天地無情柰老何千載方來那有盡百年未半巳爲多君傳南海長生藥我愛西山餓死謌泡影生來随自在悠悠不管世間魔感興萬里雲山斷客魂浮雲心事向誰言月侵郷夣夜推枕風送牢愁晝掩門蘇子窖中閑日月石􅀰家裏􅃇乾坤朝聞夕死吾何恨坐把春秋子細論正月十三日去年今日遁崖山望見龍舟咫尺間海上樓䑓俄巳變河陽車駕不須還可憐羝乳煙横塞空想䳌啼月掩􅀜人世流光忽如此東風吹雪􅁂毛班上元懐􅃇禁門三五金吾夜回首青春忽二毛池上昔陪王母宴斗中今直貴人牢風生江海龍遊逺月滿􅀜山鶴唳高夣到鈞天燈火閙依然彩筆照宫􅂁讀史自古英雄士還爲薄命人孔明登四十韓信過三旬壮志催龍虎高詞泣􅀑神一朝事千古何用怨青春感傷家國傷氷泮妻孥歎陸沉半生遭萬刼一落下千尋各任如曹命那知吾軰心人誰無骨肉恨與海俱深遣興一落顛崖不自由春風相對􅀃牢愁稚驢黒月光中吼饑䑕青燈影下遊豈料乾坤成堕甑始知身世是虚舟遥憐海上今塵􅁟前代風流不肯休又東風吹草日髙眠試把平生細問天燕子愁迷江右月杜䳌聲破洛陽烟何從林下尋元亮只向塵中作魯連莫􅀏道人空打坐英雄收歛便神仙四月八日今朝浴佛􅃇風流身落山前第一州贑上瑶桃俄五稔海中玉果巳三周人生聚散真成夣世事悲懽一轉頭坐對薫風開口􅀏滿懐耿耿復何求夜起夣破東窓月半明此身雖在只堪驚一春花裏離人涙萬里燈前故國情龍去想應回海島鴈飛猶未岀江城客愁多似西山􅀨一任蕭條白髮生端午感興千金鑄鏡百神愁功與當年禹服侔荆􅁄故宮魑魅走空餘楊子水東流又當年忠血堕䜛波千古荆人􅀕汨羅風􅀨天涯芳草夣江山如此故都何又流棹西來恨未銷魚龍寂寞暗風潮楚人猶自貪児戯江上年年奪錦標見艾有感過眼驚􅀄夏回頭憶晚春巳憐花結子又見艾爲人故國丹心老中原白髪新靈修那解化清夣楚江濵自歎緑槐雲影弄黄昏月照牢愁半掩門一片心如千片碎十分􅂡有二分存沙􅁁黃鵠長回首江上杜䳌空㫁魂􅆆子溷人漫不省紅纓白馬意軒軒自遣詩餘眠白日飲後坐清風萬事乗除裏平生寵辱中心無随境變意自與天通莫笑邯鄲夣惺惺更是空自􅄒赤舄登黄道朱旗上紫垣有心扶日月無力報乾坤徃事飛鴻􅄅新愁落照昏千年滄海上精衛是吾魂不睡終夕起推枕五更聞打鍾精神入朱鳥形影落盧龍弭節蓬莱島􅀭旗大華峰奔馳竟何事回首謝喬松七夕大地風塵惡長天􅀊月奔􅁨來渾是感夣破與誰言緱鶴空回首河牛暗斷魂吾今拙又拙無復問天孫有感石郎草草割山川一落人手三百年八州風􅀨暗連天三皇五帝如飛煙人人野􅀕伊水􅁁春秋㫁爛不復傳白頭潦倒今魯連夜深危坐日晏眠聞季萬至去年别我旋岀嶺今年汝來亦至燕弟兄一囚一乗馬同父同母不同天可憐骨肉相聚散人間不滿五十年三仁生死各有意悠悠白日横蒼煙有感丁丑􅀊八月十七日家人䧟今恰三周而予在行既十閱月矣有感而賦平生心事付悠悠風􅀨燕南老楚囚故􅃇相思空萬里妻孥不見滿三秋絶憐諸􅁑􅂭中意嬴得子長天下逰一死皎然無復恨忠魂多少暗荒丘感懐巳卯八月二十四日予以楚囚發金陵十月一日至燕越五日罹狴犴今爲庚辰中秋後九日感懐四十字去􅀊趍燕路今晨發楚津浪名千里客剰作一年人鏡裏秋容别燈前暮影親魯連疑未死􅂓用托芳塵重陽庚辰飄零萬里􅀂爲家一夜西風吹鬂華秪有新詩題甲子更無故􅃇對黄花又江南秋色滿梧桐回首青山萬事空怕見鏡中新白髪長􅀅破㡌褁西風又風捲車塵弄暁寒天涯流落寸心丹去年醉與茱茰别不把今年作徤㸔巳卯十月一日予入燕城􅀊月冉冉忽復周星而予猶未得死也因賊八句去冬陽月朔吾始至幽燕浩刼真千載浮生又一年天南照天北山後接山前夣裏乾坤老孤臣雪咽氊巳卯十月五日予入燕獄今三十有六旬感興一首石晋􅃇燕趙鍾儀新楚囚山河千古痛風􅀨一年周過鴈催人老寒花送客愁捲簾雲滿座抱􅂰意悠悠去年十月九日余至燕城今周星不報為賦長句君不見常山太守罵羯奴天津橋上舌盡刳又不見㫿陽􅀅軍怒切齒三十六人同日死去冬長至前一日朔庭呼我弗爲屈丈夫開口即見膽意謂生死在頃刻赭衣冉冉生蒼苔書雲時節忽復來􅄦影青燈照孤坐夣啼死血丹心破只今便作渭水囚食粟巳是西山羞悔不當年跳東海空有魯連心獨在冬至書雲今日事夣破暁鳴鍾家禍三生刼年愁兩度冬江山乏小草霜雪見孤松春色􅂪泉裏煙蕪㡬萬重冬晴北國天寒少南方地氣來年光如箭去世事正輪廻可恠新祈雪相思乆别梅夜䦨燈坐暗獨自撥殘􅁅自歎可憐大流落白髪魯連翁每夜曕南斗連年坐北風三生遭際䖏一死􅀏談中嬴得千年在丹心射碧空戊寅臈月二十日空坑敗􅀍執于今二周年矣感懐八句横磨十萬坐無謀回首蹉跎海上州太傅只圗和藥了􅀅軍便謂斫頭休乾坤顛倒真千刼身世留連復一周一死到今如送佛空牎淡月夜悠悠所懐萬里青山兩鬂華老臣無國又無家乾坤局促籠中鳥風雪飄零糞上花􅀊晚江空人巳逝天寒日短路何賖書生不作綱常計聞是東門巳種瓜除夜庚辰門揜千山黒孤燈伴不眠故郷在何䖏今夕是窮年住世真無係爲囚巳自然勞勞空􅀊月得死似登仙又􅀊暮難爲客天涯况是囚乾坤還許大􅀊月忽如流夣過元無夣憂多更不憂屠蘇兒女態肯作百年謀元日辛巳金虬㗸日出鐵􅀐勒春回天上青門隔人間白髪催霜寒欺􅃇草山晚放新梅環堵甘牢落東風枉􅁍來又慙愧雲䑓客飄零雪滿氊不圖朱鳥影猶見白蛇年宮殿荒烟隔門庭􅀫草連乾坤自春色囬首一澘然􅀄六日即事車馬燕山閙誰家早管絃開門忽見雪擁􅀍不知年篋破書猶在爐殘火復燃偷桃昨日事回首􅂘堯天人日今年爲蛇年此日是人日江右一龍鍾山中􅃇佔畢獨坐守大玄一􅀏發狂疾悠悠王正意衰涕感麟筆自歎功業羞前軰形骸感故吾屢判嵇紹血㡬無慶公鬚落落惟心在蒼蒼有意無江流總遺淚何止失吞吴元夕燈火喧三市衣冠宴九宸金吾不禁夜公子早行春夣斷青山逺愁侵白髮新燕山今夕月清影伴孤臣又飄零竟如此元夕㡬堪憐南國張燈火燕山沸管絃相思雲萬里剰㸔月三年笑與東風道浮生信偶然文山先生全集卷之十五終
