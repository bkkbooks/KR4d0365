body:
  text: 對䇿御試䇿一道有題盖聞道之大原出於天超乎無極大極之妙而實不離乎日用事物之常根乎隂陽五行之􅄨而實不外乎仁義禮智剛柔善惡之際天以澄著地以靖謐人極以昭明何莫由斯道也聖聖相傳同此一道由修身而治人由致知而齊家治國平天下本之精神心術逹之禮樂刑政其體甚微其用則廣歴千萬世而不可易然功化有淺􅀷證效有遲速者何歟朕以寡昧臨政願治于茲歴年志愈勤道愈遠窅乎其未朕也朕心疑焉子大夫明先聖之術咸造在廷必有切至之論朕將虛己以聽三墳而上大道難名五典以來常道始著日月星辰順乎上鳥獸草木􅀂於下九功惟叙四夷來王百工熈哉庻事康哉非聖神功化之驗歟然人心道心寂寥片語其危微精一之妙不可以言旣歟誓何爲而畔㑹何爲而疑俗何以不􅀂結繩治何以不􅀂􅀞像以政凝民以禮凝士以天保采􅅔治内外憂勤危懼僅克有濟何帝王勞逸之殊歟抑隨時損益道不同歟及夫六典建官盖爲民極則不過曰治曰教曰禮曰政曰刑曰事而巳豈道之外又有法歟自時厥後以理欲之消長驗世道汙隆隂濁之日常多陽明之日常少刑名雜覇佛老異端無一毫㡬乎道駁乎無以議爲然務德化者不能無上郡鴈門之警施仁義者不能無末年輪臺之悔甚而無積仁累德之素紀綱制度爲足維持憑藉者又何歟朕上嘉下樂夙興夜􅄰靡遑康寜道乆而未洽化乆而未成天變洊臻民生寡遂人才乏而士習浮國計殫而兵力弱符澤未清邉備孔􅁄豈道不足以御世歟抑化裁推行有未至歟夫不息則乆乆則徴今胡爲而未徴歟變則通通則乆今其可以屢更歟子大夫熟之復之勿激勿泛以副朕詳延之意寳祐四年五月八日臣對恭惟皇帝陛下處常之乆當㤗之交以二帝三王之道㑹諸心將三紀于此矣臣等鼓舞於鳶飛魚躍之天皆道體流行中之一物不自意得旅進于陛下之庭而陛下且嘉之論道道之不行也乆矣陛下之言及此天地神人之福也然臣所未觧者今日巳當道乆化成之時道洽政治之候而方歉焉有志勤道遠之疑豈望道而未之見耶臣請泝太極動静之根推聖神功化之驗就以聖問中不息一語爲陛下勉幸陛下試垂聽焉臣聞天地與道同一不息聖人之心與天地同一不息上下四方之宇徃古來今之宙其間百千萬變之消息盈虛百千萬事之轉移闔闢何莫非道所謂道者一不息而巳矣道之􅀮於渾淪藏於未琱未琢之天當是時無極太極之體也自太極分而隂陽則隂陽不息道亦不息隂陽散而五行則五行不息道亦不息自五行又散而爲人心之仁義禮智剛柔善惡則乾道成男坤道成女穹壤間生生化化之不息而道亦與之相爲不息然則道一不息天地亦一不息天地之不息固道之不息者爲之聖人出而爲天地立心爲生民立命爲徃聖􅁇絶學爲萬世開太平亦不過以一不息之心充之充之而修身治人此一不息也充之而致知以至齊家治國平天下此一不息也充之而自精神心術以至於禮樂刑政亦此一不息也自有三墳五典以來以至於太平六典之世帝之所以帝王之所以王皆自其一念之不息者始秦漢以降而道始離非道之離也知道者之鮮也雖然其間英君誼辟固有號爲稍稍知道矣而又沮於行道之不力知務德化矣而不能不尼之以黄老知施仁義矣而不能不遏之以多欲知四年行仁矣而不能不畫之以近效上下二三千年間牽􅀘過時架漏度日毋恠夫駁乎無以議爲也獨惟我朝式克至于今日休陛下傳列聖之心以㑹藝祖之心㑹藝祖之心以叅帝王之心叅天地之心三十三年間臣知陛下不貳以二不叅以三茫乎天運窅爾神化此心之天混􅀆闢􅀆其無窮也然臨御浸乆持循浸熟而筭計見效猶未有以大快聖心者上而天變不能以盡無下而民生不能以盡遂人才士習之未甚純國計兵力之未甚充以至盗賊兵戈之警所以貽宵旰之憂者尢所不免然則行道者殆無驗也邪臣則以爲道非無驗之物也道之功化甚􅀷也而不可以爲迂道之證效甚遲也而不可以爲速維天之命於穆不巳天地之所以爲天地也之德之純純亦不巳聖人之所以爲聖人也爲治顧力行何如耳焉有行道於歳月之暫而遽責其驗之爲迂且遠邪臣之所望於陛下者法天地之不息而巳姑以近事言則責躬之言方發而隂􅀨旋霽是天變未甞不以道而弭也賑饑之典方舉而都民歡呼是民生未甞不以道而安也論辯建明之詔一頒而人才士習稍稍渾厚招填條具之㫖一下而國計兵力稍稍充實安吉慶元之小􅀗維􅀭瀘水之雋功無非憂勤於道之明驗也然以道之極功論之則此淺效耳速效耳指淺效速效而􅃍以爲道之極功則漢唐諸君之用心是也陛下行帝而帝行王而王而肯襲漢唐事邪此臣所以賛陛下之不息也陛下儻自其不息者而充之則與隂陽同其化與五行同其運與乾坤生生化化之理同其無窮雖充而爲三紀之風移俗易可也雖充而爲四十年圄空刑措可也雖充而爲百年德洽於天下可也雖充而爲􅁲世過暦億萬年敬天之休可也豈止如聖問八者之事可徐就理而巳哉臣謹昧死上愚對臣伏讀聖䇿曰盖聞道之大原出於天超乎無極太極之妙而實不離乎日用事物之常根乎隂陽五行之􅄨而實不外仁義禮智剛柔善惡之際天以澄著地以靖謐人極以昭明何莫由斯道也聖聖相傳同此一道由修身而治人由致知而齊家治國平天下本之於精神心術逹之於禮樂刑政其體甚㣲其用則廣歴千萬世而不可易然功化有淺􅀷證效有遲速何歟朕以寡昧臨政願治于兹歴年志愈勤道愈遠窅乎其未朕也朕心疑焉子大夫明先王之術咸造在庭必有切至之諭朕將虛巳以聽臣有以見陛下遡道之本原求道之功效且疑而質之臣等也臣聞聖人之心天地之心也天地之道聖人之道也分而言之則道自道天地自天地聖人自聖人合而言之則道一不息也天地一不息也聖人亦一不息也臣請遡其本原言之茫茫堪輿坱圠無垠渾渾元氣變化無端人心仁義禮智之性未賦也人心剛柔善惡之氣未禀也當是時未有人心先有五行未有五行先有隂陽未有隂陽先有無極太極未有無極太極則太虛無形冲漠無朕而先有此道未有物之先而道具焉道之體也旣有物之後而道行焉道之用也其體則微其用甚廣卽人心而道在人心卽五行而道在五行即隂陽而道在隂陽即無極太極而道在無極太極貫顯微兼費􅀮包小大通物我道何以􅀂此哉道之在天下猶水之在地中地中無徃而非水天下無徃而非道水一不息之流也道一不息之用也天以澄著則日月星辰循其經地以靖謐則山川草木順其常人極以昭明則君臣父子安其倫流行古今綱紀造化何莫由斯道也一日而道息焉雖三才不能以自立道之不息功用固如此夫聖人體天地之不息者也天地以此道而不息聖人亦以此道而不息聖人立不息之體則歛於修身推不息之用則散於治人立不息之體則寓於致知以下之工夫推不息之用則顯於齊家治國平天下之效驗立不息之體則本之精神心術之微推不息之用則逹之禮樂刑政之著聖人之所以爲聖人者猶天地之所以爲天地也道之在天地間者常乆而不息聖人之於道其可以頃刻息邪言不息之理者莫如大易莫如中庸大易之道至於乾道變化各正性命保合太和而聖人之論法天乃歸之自強不息中庸之道至於􅄎􅀶淵泉上天之載無聲無臭而聖人之論配天地乃歸之不息則乆豈非乾之所以剛徤中正純粹精也者一不息之道耳是以法天者亦以一不息中庸之所以高明愽厚悠乆無􅆠者一不息之道耳是以配天地者亦以一不息以不息之心行不息之道聖人即不息之天地也陛下臨政願治于兹歴年前此不息之歳月猶日之自朝而午今此不息之歳月猶日之至午而中此正勉強行道大有功之日也陛下勿謂數十年間我之所以擔當宇宙把握天地未甞不以此道至于今日而道之驗如此其迂且遠矣以臣觀之道猶百里之途也今日則適六七十之􅀱也進於道者不可以中道而廢游於途者不可以中途而畫孜孜矻矻而不自巳焉則適六七十里者固所以爲至百里之階也不然自止於六七十里之間則百里雖近焉能以一武到哉道無淺功化行道者何可以􅀷爲迂道無速證效行道者何可以遲爲遠惟不息則能極道之功化惟不息則能極道之證效氣機動盪於三極之間神采灌注於萬有之表要自陛下此一心始臣不暇遠舉請以仁宗皇帝事爲陛下陳之仁祖一不息之天地也康定之詔曰祗勤抑畏慶暦之詔曰不敢荒寜皇祐之詔曰􅃡念爲君之難􅀷惟履位之重慶暦不息之心即康定不息之心也皇祐不息之心即慶暦不息之心也當時仁祖以道徳感天心以福禄勝人力國家綏静邉鄙寜謐􅀂可以巳矣而猶未也至和元年仁祖之三十三年也方且露立仰天以畏天變碎通天犀以救民生處賈黯吏銓之職擢公弼殿柱之名以厚人才以昌士習納景初减用之言聽范鎮新兵之諌以􅁉國計以強兵力以至講周禮薄征緩刑而拳拳以盗賊爲憂選將帥明紀律而汲汲以西戎北虜爲慮仁祖之心至此而不息則與天地同其悠乆矣陛下之心仁祖之心也范祖禹有言欲法堯舜惟法仁祖臣亦曰欲法帝王惟法仁祖法仁祖則可至天德願加聖心焉臣伏讀聖䇿曰三墳以上云云豈道之外又有法歟臣有以見陛下慕帝王之功化證效而亦意其各有淺􅀷遲速也臣聞帝王行道之心一不息而巳矣堯之兢兢舜之業業禹之孜孜湯之慄慄文王之不巳武王之無貳成王之無逸皆是物也三墳逺矣五典猶有可論者臣甞以五典所載之事推之當是時日月星辰之順以道而順也鳥獸草木之􅀂以道而􅀂也九功惟叙以道而叙也四夷來王以道而來王也百工以道而熈庻事以道而康光天之下至於海隅蒼生盖無一而不拜帝道之賜矣垂衣拱手以自逸于􅁟階巖廊之上夫誰曰不可而堯舜不然也方且考績之法重於三歳無歳而敢息也授暦之命嚴於四時無月而敢息也凛凛乎一日二日之戒無日而敢息也此猶可也授受之際而堯之命舜乃曰􅁢執厥中夫謂之執者戰兢保持而不敢少放之謂也味斯語也則堯之不息可見巳河圖出矣洛書見矣執中之說未聞也而堯獨言之堯之言贅矣而舜之命禹乃復益之以人心惟危道心惟㣲惟精惟一之三言夫致察於危㣲精一之間則其戰兢保持之念又有甚於堯者舜之心其不息又何如哉是以堯之道化不惟驗於七十年在位之日舜之道化不惟驗於五十年視阜之時讀萬世永頼之語則唐虞而下數千百年間天得以爲天地得以爲地人得以爲人者皆堯舜之賜也然則功化抑何其􅀷證效抑何其遲歟降是而王非固勞於帝者也太樸日散風氣日開人心之機械日益巧世變之乗除不息而聖人之所以綱維世變者亦與之相爲不息焉俗非結繩之淳也治非􅀞象之古也師不得不誓侯不得不㑹民不得不凝之以政士不得不凝之以禮内外異治不得不以采􅅔天保之治治之以至六典建官其所以曰治曰政曰禮曰教曰刑曰事者亦無非扶世道而不使之窮耳以􅀔而論之則夏之治不如唐虞商之治又不如夏周之治又不如商帝之所以帝者何其逸王之所以王者何其勞慄慄危懼不如非心黄屋者之爲適也始於憂勤不如恭巳南靣者之爲安也然以心而觀則舜之業業即堯之兢兢禹之孜孜即舜之業業湯之慄慄即禹之孜孜文王之不巳武王之無貳成王之無逸何莫非兢兢業業孜孜慄慄之推也道之散於宇宙間者無一日息帝王之所以行道者亦無一日息帝王之心天地之心也尚可以帝者之爲逸而王者之爲勞􅁘臣願陛下求帝王之道必求帝王之心則今日之功化證效或可與帝王一視矣臣伏讀聖䇿曰自時厥後云云亦足以維持憑藉者何歟臣有以見陛下陋漢唐之功化證效而且爲漢唐世道發一􅁣也臣聞不息則天息則人不息則理息則欲不息則陽明息則隂濁漢唐諸君天資敏地位高使稍有進道之心則六五帝四三王亦未有難能者柰何天不足以制人而天反爲人所制理不足以御欲而理反爲欲所御陽明不足以勝隂濁而陽明反爲隂濁所勝是以勇於進道者少沮於求道者多漢唐之所以不唐虞三代也歟雖然是爲不知道者言也其間亦有號爲知道者矣漢之文帝武帝唐之太宗亦不可謂非知道者然而亦有議焉先儒甞論漢唐諸君以公􅀻義利分數多少爲治亂三君之心徃徃不純乎天不純乎人而出入於天人之間不純乎理不純乎欲而出入乎理欲之間不純乎陽明不純乎隂濁而出入乎陽明隂濁之間是以專務德化雖足以陶後元泰和之風然而尼之以黄老則鴈門上郡之警不能無外施仁義雖足以致建元富庻之盛然而遏之以多欲則輪臺末年之悔不能免四年行仁雖足以開真觀升平之治然而畫之以近效則紀綱制度曽不足爲再世之憑藉盖有一分之道心者固足以就一分之事功有一分之人心者亦足以召一分之事變世道汙隆之分數亦係於理欲消長之分數而巳然臣甞思之漢唐以來爲道之累者其大有二一曰雜伯二曰異端時君世主有志於求道者不䧟於此則䧟於彼姑就三君而言則文帝之心異端累之也武帝太宗之心雜伯累之也武帝無得於道憲章六經綂一聖真不足以勝其神仙􅁟木之􅀻干戈刑罰之􅃤其心也荒太宗全不知道閨門之耻将相之誇末年遼東一行終不能以克其血氣之􅁀其心也驕雜伯一念憧憧徃來是固不足以語常乆不息之事者􅀂文帝稍有帝王之天資稍有帝王之地歩一以君子長者之道待天下而􅄯錯軰刑名之說未甞一動其心是不累於雜伯矣使其以二三十年恭儉之心而移之以求道則後元氣象且將駸駸乎啇周進進乎唐虞柰何帝之純心又間於黄老之清净是以文帝僅得爲漢唐之令主而不得一儕於帝王嗚呼武帝太宗累於雜伯君子固不敢以帝王事望之文帝不爲雜伯所累而不能不累於異端是則重可惜巳臣願陛下監漢唐之跡必監漢唐之心則今日之功化證效將超漢唐數等矣臣伏讀聖䇿曰朕上嘉下樂云云抑化裁推行有未至歟臣有以見陛下念今日八者之務而甚有望乎爲道之驗也臣聞天變之來民怨招之也人才之乏士習蠱之也兵力之弱國計屈之也虜冦之警盗賊因之也夫陛下以上嘉下樂之勤夙興夜寐之勞悵歳月之逾邁亦欲以少見吾道之驗耳俯視一世未能差強人意八者之弊臣知陛下爲此不滿也陛下分而以八事問臣合而以四事對請得以熟數之於前何謂天變之來民怨招之也天視自我民視天聽自我民聽天明畏自我民明威人心之休戚天心所因以爲喜怒者也熈寜間大旱是時河陜流民入京師監門鄭俠畫流民圗以獻且曰陛下南征北伐皆以勝捷之圗來上料無一人以父母妻子遷移困頓皇皇不給之状爲圗以進者覽臣之圗行臣之言十日不雨乞正欺君之罪上爲之罷新法十八事京師大雨八日天人之交間不容髪載在經史此􅀋甚多陛下以爲今之民生何如邪今之民生因矣自瓊林大盈積於􅀻貯而民困自建章通天頻於營繕而民困自獻􅂇疊見於豪家巨室而民困自和䊮不間於閭閻下戶而民困自所至貪官􅁀吏視吾民如家雞圈豕惟所咀啖而民困嗚呼東南民力竭矣書曰怨豈在明不見是圗今尚可謂之不見乎書曰怨不在大亦不在小今尚可謂之小乎生斯世爲斯民仰事俯育亦欲各遂其父母妻子之樂而操斧斤淬鋒鍔日夜思所以斬伐其命脉者滔滔皆是然則臘雪靳瑞蟄雷愆期月犯於木星殞爲石以至􅁟􅀨地震之變無恠夫屢書不一書也臣願陛下持不息之心急求所以爲安民之道則民生旣和天變或於是而弭矣何謂人才之乏士習蠱之也臣聞窮之所養逹之所施㓜之所學壮之所行今日之修於家他日之行於天子之庭者也國初諸老甞以厚士習爲先務寕􅀵落韻之李迪不取鑿說之賈邉寕收直言之􅂫轍不取險恠之劉㡬建學校則必欲崇經術復鄕舉則必欲參行藝其後國子監取湖學法建經學治道邉防水利等齋使學者因其名以求其實當時如程頥徐積吕希哲皆出其中嗚呼此元祐人物之所從出也士習厚薄最􅀜人才從古以來其語如此陛下以爲今之士習何如邪今之士大夫之家有子而教之方其㓜也則授其句讀擇其不戾於時好不震于有司者俾熟復焉及其長也細書爲工累牘爲富持試於鄕校者以是較藝於科舉者以是取青紫而得車馬也以是父兄之所教詔師友之所講明利而巳矣其能卓然自㧞於流俗者㡬何人哉心術旣壊於未仕之前則氣節可想於旣仕之後以之領郡邑如之何責其爲卓茂黄霸以之鎮一路如之何責其爲􅂫章何武以之曵朝紳如之何責其爲汲黯望之奔競於􅀔要之路者無恠也趍附於權貴之門者無恠也牛維馬縶狗苟蠅營患得患失無所不至者無恠也悠悠風塵靡靡媮俗清芬消歇濁滓横流惟皇降衷秉􅃔之懿萌蘖於牛羊斧斤相尋之衝者其有㡬哉厚今之人才臣以爲變今之士習而後可也臣願陛下持不息之心急求所以爲淑士之道則士風一淳人才或於是而可得矣何謂兵力之弱國計屈之也謹按國史治平間遣使募京畿淮南兵司馬光言邉臣之請兵無窮朝廷之募兵無巳倉庫之粟帛有限百姓之膏血有涯願罷招禁軍訓練舊有之兵自可備禦臣聞古今天下能免於弱者必不能免於貧能免於貧者必不能免於弱一利之興一害之伏未有交受其害者今之兵財則交受其害矣自東海城築而調淮兵以防海則兩淮之兵不足自襄樊復歸而併荆兵以城襄則荆湖之兵不足自腥氣染於漢水􅁈血濺於寳峯而正軍忠義空於死徙者過半則川蜀之兵又不足江淮之兵又抽而入蜀又抽而實荆則下流之兵愈不足矣荆湖之兵又分而䇿應分而鎮撫則上流之兵愈不足矣夫國之所恃以自衞者兵也而今之兵不足如此國安得而不弱哉扶其弱而歸之強則招兵之䇿今日直有所不得巳者然召募方新調度轉急問之大農大農無財問之版曹版曹無財問之餉司餉司無財自歳幣銀絹外未聞有畫一䇿爲軍食計者是則弱矣而又未免於貧也陛下自肝鬲近又創一安邉太平庫專一供軍此藝祖積縑帛以易賊首之心也仁宗皇帝出錢帛以􅂇兵革之心也轉易之間風采立異前日之弱者可強矣然飛芻輓粟給餉餽粮費於兵者㡬何而琳宮􅆊宇照耀湖山􅁟木之費則漏巵也列竈雲屯樵􅂫後㸑費於兵者㡬何而霓裳羽衣靡金飾翠宫庭之費則尾閭也生熟口劵月給衣糧費於兵者㡬何而量珠輦玉倖寵希恩戚畹之費則濫觴也盖天下之財專以供軍則財未有不足者第重之以浮費重之以冗費則財始瓶罄而罍耻矣如此則雖欲足兵其何以給兵耶臣願陛下持不息之心急求所以爲節財之道則財計以充兵力或於是而可強矣何謂虜冦之警盗賊因之也謹按國史紹興間楊么冦洞庭連跨數郡大將王􅊛不能制時僞齊挾虜使李成冦襄漢么與交通朝廷患之始命岳飛措置上流巳而逐李成擒楊么而荆湖平臣聞外之虜冦不能爲中國患而其來也必待内之變内之盗賊亦不能爲中國患而其起也必將納外之侮盗賊而至於通虜冦則腹心之大患也巳今之所謂虜者固可畏矣然而逼我蜀則蜀帥䇿瀘水之勲窺我淮則淮帥奏維􅀭之凱狼子野心固不可以一捷止之然使之無得棄去則中國之技未爲盡出其下彼亦猶畏中國之有其人也獨惟舊海在天一隅逆雛穴之者數年于兹􅄓風􅕿息一葦可航彼未必不朝夕爲趍淅計然而未能焉短於舟踈於水懼吾唐島之有李寳在耳然洞庭之湖烟水沉寂而浙右之湖濤瀾沸驚區區妖孽且謂有楊么之漸矣得之京師之􅂄老皆以爲此冦出沒倐閃徃來翕霍駕舟如飛運柂如神而我之舟師不及焉夫東南之長技莫如舟師我之勝兀术於金山者以此我之斃逆亮於采石者以此而今此曹反挾之以制我不武甚矣萬一或出於楊么之計則前日李成之不得志於荆者未必今日之不得志於淅也曩聞山東荐饑有司貪市􅅦之利空􅂫湖根本以資之廷紳猶謂互易安知無爲其鄉道者一夫登岸萬事瓦裂又聞魏村江灣福山三寨水軍興販鹽課以資逆雛廷紳猶謂是以扞衞之師爲商賈之事以防拓之卒開鄕道之門憂時識治之見徃徃如此肘腋之蜂蠆懐䄂之蛇蝎是其可以忽乎哉陛下近者命發運兼憲合兵財而一其權是將爲㓕此朝食之圗矣然屯海道者非無軍控海道者非無將徒有王􅊛數年之勞未聞岳飛八日之捷子太叔平符澤之盗恐不如此長此不巳臣懼爲李成開道地也臣願陛下持不息之心求所以弭冦之道則冦難一清邉備或於是而可寛矣臣伏讀聖䇿日夫不息則乆乆則徵今胡爲而未徴歟變則通通則乆今其可以屢更歟臣有以見陛下乆於其道而甚有感乎中庸大易之格言也臣聞天乆而不墜也以運地乆而不隤也以轉水乆而不腐也以流日月星辰而常新也以行天下之凡不息者皆以乆也中庸之不息即所以爲大易之變通大易之變通即所以驗中庸之不息變通者之乆固肇於不息者之乆也盖不息者其心變通者其跡其心不息故其跡亦不息㳺乎六合之内而縱論乎六合之外生乎百世之下而追想乎百世之上神化天造天運無端發㣲不可見充周不可窮天地之所以變通固自其不息者爲之聖人之乆於其道亦法天地而巳矣天地以不息而乆聖人亦以不息而乆外不息而言乆焉皆非所以乆也臣甞讀無逸一書見其享國之乆者有四君焉而其間三君爲最乆臣求其所以乆者中宗之心嚴恭寅畏也高宗之心不敢荒寕也文王之心無滛于逸無遊于畋也是三君者皆無逸而已矣彼之無逸臣之所謂不息也一無逸而其效如此然則不息者非所以乆歟陛下之行道盖非一朝夕之暫矣寳紹以來則􅆂養此道端平以來則發揮此道嘉熈以來則把握此道嘉熈而淳祐淳祐而寳祐十餘年間無非持循此道之歳月陛下處此也庭燎未輝臣知其宵衣以待日中至昃臣知其玉食弗遑夜漏巳下臣知其丙枕無寐聖人之運亦可謂不息矣然旣徃之不息者易方來之不息者難乆而不息者易愈乆而愈不息者難昕臨大庭百辟星布陛下之心此時固不息矣暗室屋漏之􅀮試一警省則亦能不息否乎日御經筵學士雲集陛下之心此時固不息矣宦官女子之近試一循察則亦能不息否乎不息於外者固不能保其不息於内不息於此者固不能保其不息於彼乍勤乍怠乍作乍輟則不息之純心間矣如此則陛下雖欲乆則證臣知中庸九經之治未可以朝夕見也雖欲通則乆臣知繫辭十三卦之功未可以歳月計也淵蜎蠖濩之中虚明􅀿物之地此全在陛下自斟酌自執持頃刻之力不􅁇則懲乆之功俱廢矣可不戒哉可不懼哉陛下之所以䇿臣者悉矣臣之所以忠於陛下者亦旣畧陳於前矣而陛下䇿之篇終復曰子大夫熟之復之勿激勿泛以副朕詳延之意臣伏讀聖䇿至此陛下所謂詳延之意盖可識巳夫陛下自即位以來未甞以直言罪士不惟不罪之以直言而且導之以直言臣等甞恨無由以至天子之庭以􅄍其素所蓄積幸見録於有司得以借玉階方寸地此正臣等披露肺肝之日也方將明目張膽謇謇諤諤言天下事陛下乃戒之以勿激勿泛夫泛固不切矣􅀂夫激者忠之所發也陛下胡併與激者之言而厭之邪厭激者之言則是將胥臣等而爲容容唯唯之歸邪然則臣將爲激者歟將爲泛者歟抑將遷就陛下之說而姑爲不激不泛者歟雖然奉對大庭而不激不泛者固有之矣臣於漢得一人焉曰董仲舒方武帝之䇿仲舒也􅁣然以欲聞大道之要爲問帝之求道其心盖甚銳矣然道以大言帝将求之虛無􅄅􅄀之郷也使仲舒於此過言之則激淺言之則泛仲舒不激不泛得一說曰正心武帝方將求之虛無􅄅􅄀之鄕仲舒乃告之以真實淺近之理兹陛下所謂切至之論也柰何武帝自恃其區區英明之資超􅊆之識謂其自足以淩跨六合籠駕八表而顧如此語忽焉仲舒以江都去而武帝所與論道者他有人矣臣固甞爲武帝惜也堂堂天朝固非漢比而臣之賢亦萬不及仲舒然亦不敢激不敢泛切於聖問之所謂道者而得二說焉以爲陛下獻陛下試采覽焉一曰重宰相以開公道之門臣聞公道在天地間不可一日壅閼所以昭􅂫而滌决之者宰相責也然扶公道者宰相之責而主公道者天子之事天子而侵宰相之權則公道巳矣三省樞宻謂之朝廷天子所與謀大政出大令之地也政令不出於中書昔人謂之斜封墨勑非盛世事國初三省紀綱甚正中書造命門下審覆尚書奉行宫府之事無一不綂於宰相是以李沆猶得以焚立妃之詔王旦猶得以沮節度之除韓􅄾猶得出空頭勑以逐内侍杜衍猶得封還内降以裁僥倖盖宰相之權尊則公道始有所依而立也今陛下之所以爲公道計者非不悉矣以夤縁戒外戚是以公道責外戚也以裁制戒内司是以公道責内司也以舎法用例戒群臣是以公道責外廷也雷霆發蔀星日燭幽天下於此咸服陛下之明然或謂比年以來大庭除授於義有所未安於法有所未便者悉以聖㫖行之不惟諸司陞􅀘上瀆宸奎而綂帥躐級閣職超遷亦以夤縁而得恩澤矣不惟姦贓湔洗上勞渙汗而選人通籍姦胥逭刑亦以鑚刺而拜寵命矣甚至閭閻􅃈屑之闘訟皂隷猥賤之干求悉逹内庭盡由中降此何等蟣蝨事而陛下以身親之大臣㡬於爲奉承風㫖之官三省㡬於爲奉行文書之府臣恐天下公道自此壅矣景祐間罷内降凡詔令皆出中書樞宻院仁祖之所以主張公道者如此今進言者猶以事當間出􅐶㫁爲說嗚呼此亦韓綘告仁祖之辭也朕固不憚自有處分不如先盡大臣之慮而行之仁祖之所以諭綘者何說也柰何復以綘之說啓人主以奪中書之􅁠是何心哉宣靖間創御筆之令蔡京坐東廊專以奉行御筆爲職其後童貫梁師成用事而天地爲之分裂者數世是可鑒矣臣願陛下重宰相之權正中書之體凡内批必經由中書樞宻院如先朝故事則天下幸甚宗社幸甚二曰􅀵君子以壽直道之脉臣聞直道在天地間不可一日頺靡所以光明而張主之者君子責也然扶直道者君子之責而主直道者人君之事人君而至於沮君子之氣則直道巳矣夫不直則道不見君子者直道之倡也直道一倡於君子昔人謂之鳳鳴朝陽以爲清朝賀國朝君子氣節大振有魚頭參政有鶻擊臺諌有鐡靣御史軍國之事無一不得言於君子是以司馬光猶得以殛守忠之姦劉摯猶得以折李憲之横范祖禹猶得以罪宋用臣張震猶得以擊龍太淵曽覿盖君子之氣伸則直道始有所附而行也今陛下之所以爲直道計者非不至矣月有供課是以直道望諌官也日有輪劄是以直道望廷臣也有轉對有請對有非時召對是以直道望公卿百執事也江海納汙山藪藏疾天下於此咸服陛下之量然或謂比年以來外廷議論於已有所未恊於情有所未􅃘者悉以聖意㫁之不惟言及乗輿上勤節貼而小小予奪小小廢置亦且寢罷不報矣不惟事闗廊廟上煩調停而小小抨彈小小紏劾亦且宣諭不巳矣甚者意渉區區之貂璫論侵􅃈􅃈之姻婭不恤公議反出諌臣此何等狐䑕軰而陛下以身庇之御史至於來和事之譏臺吏至於重訖了之報臣恐天下之直道自此沮矣康定間歐陽脩以言事出未㡬卽召以諌院至和間唐介以言事貶未㡬即除以諌官仁祖之所以主直道者如此今進言者猶以臺諌之􅀔日横爲疑嗚呼兹非富弼忠於仁祖之意也弼傾身下士寜以宰相受臺諌風㫖弼之自處何如也柰何不知弼之意反啓人君以厭君子之言是何心哉元符間置看詳理訴所而士大夫得罪者八百餘家其後鄒浩陳瓘去國無一人敢爲天下伸一喙者是可鑒巳臣願陛下壮正人之氣養公論之鋒凡以直言去者悉召之于霜臺烏府中如先朝故事則天下幸甚宗社幸甚盖大道之行天下爲公周道如砥其直如矢自古帝王行道者無先於此也臣來自山林有懐欲􅄍陛下悵然疑吾道之迂遠且􅁣論乎古今功化之淺􅀷證效之遲速而􅀂有大不滿於今日者臣則以爲非行道之罪也公道不在中書直道不在臺諌是以陛下行道用力處雖勞而未遽食道之報耳果使中書得以公道總政要臺諫得以直道紏官邪則陛下雖端冕凝旒於穆清之上所謂功化證效可以立見何至積三十餘年之工力而志勤道逺􅄅焉未有際邪臣始以不息二字爲陛下勉終以公道直道爲陛下獻陛下萬㡬之暇儻於是而加三思則躋帝王軼漢唐由此其階也巳臣賦性踈愚不識忌諱握筆至此不自知其言之過於激亦不自知其言之過於泛冒犯天威罪在不赦惟陛下留神臣謹對廷試前兩日先生苦河魚且不能食試之日丑寅間強起乗籃輿趋馳道外㡬不能支吾至昕諸進士趋麗正門之旁門先生随群擁併而入頂踵汗流頓覺􅂫醒至殿廊恭受御䇿題就題命意文思湧泉運筆如飛所對且萬言未時己出矣或謂有神物者盪滌其中以􅄍其竒是豈偶然之故哉道體堂謹書封事巳未上皇帝書十一月吉日勑賜進士及第臣文天祥昧死百拜謹奉詔獻書于皇帝陛下臣一介踈賤遭逢聖明猥以庸愚早膺親擢世道悠悠風塵流靡臣於其間盖甞感激􅁬發以爲由今之道無變今之俗一日有關於天下國家之故懼以無辱使令杜門四年讀禮之外盖未甞一日不思以自效也乃夏五陛下臨軒䇿士偶垂記憶起臣於家居進臣於仕籍臣伏􅀍宸命感激不自勝追惟􅂪恩之初阻於朝謝北望天路輙奉表以聞伏􅂪聖慈許臣詣拜闕下德至渥也臣就道以來不圗國事浸艱邉烽頓迫陛下引咎責躬改過更始召還舊德斥去元姦凡可以當天意回人心者無所不用其至伏惟陛下不自神聖猶親灑宸翰誕布詔書庻㡬中外臣庻危言極論以有􅀘於今日之故陛下悔悟之意上通於天天下於此感服陛下之勇臣甫及趍謝闕庭兩讀綸音爲之哽咽下泣君臣之義與天地並立况臣􅂪􅀍厚恩非衆人比使於此時泯泯黙黙上􅀒陛下内􅀒帝衷尚何以飲食於載􅂂間哉是用不避斧􅃏輙􅁬愚衷條其說以獻惟陛下裁幸一曰簡文法以立事夫貴爲天子富有四海垂衣拱手以雍容於穆清之上至尊之體也不幸際時艱難兵革四起俯仰成敗呼吸變故此非用馬上治不濟今國􅀔搶攘固猶未至如馬上之急然冦入腹心事干宗社陛下爲皇皇拯救之謀不得不畧倣馬上治之之意今陛下焦勞於上兩府大臣黽勉於下君臣之間不可謂非日計軍實而申儆之者然尊卑闊絶禮節繁多陛下平旦視朝百官以次奉起居宰相搢笏出奏從容不踰時軍國大事此雖陛下日夜與宰相汲汲而圖之猶懼不旣謀王斷國之設施尊主庇民之藴蓄豈能以頃刻交際而䆒竟之哉陛下退食之睱雖時出内批以與宰相商論宰相又時有奏報以出其建明然天下事得於靣論者利害常决於一言筆墨所書或反覆數百言而不足事機交投寸隂可惜使宰相常有此等酬酢則一事之末固有費其日力者矣其於㡬務豈不有所妨哉古者天子之於大臣或賜坐或賜食或奏事至日昃或論事至夜分凡皆以通上下之情爲國家至計也賜茶之典五代時猶有之惟國初范質王􅄎頗存形迹此事遂廢陛下莫􅀂稍復古初脫去邉幅於禁中擇一去處聚兩府大臣日與議軍國大事陛下賜之􅅃宻親是非可否於其間衆議惟􅁢則三省畫時施行上下如一都俞嘘咈之間必將有超然度外之舉天下何事不可爲何難不可濟至於除授尤有􅀜繫且如近者重臣建閫之事方帥海門随遷建鄴甫鎮建鄴又進上饒布置變換如奕棋然卯詔辰行奔命不給大者措畫之如此小者遷徙之更多人無定志事無成謀當此艱危豈不誤事􅁇自今始陛下宜與大臣熟議某人備某職某人任某事人物權衡當而後用朝廷命令奠而後􅀤如此則觀聽者不至皇惑驅馳者不至遲回人知其令出惟行則無輕朝廷之心士大夫知其可以展布四體則鞠躬盡瘁而無觀望其於國事厥非小􅀘又如用一人也或出於陛下之㧞擢或出於宰相之啓擬中書巳費行移後省方及書讀或有不當又至繳駁比其不繳駁也則書黄徑下其人徑受命矣臺諫始從而有所指陳是致國論紛紜而内外職守遷移如傳舍施之平時雖有體綂用之今日恐悞事機臣愚以爲陛下宜倣唐諌官随宰相入閣故事令給舍臺諌從兩府大臣日入禁中聚議其有不可應時論難不使退有後言如此則國事無聚訟之譏宸命無反汗之失事㑹無濡滯蹉跌之悔豈不簡便易行哉􅀂夫中書乃王政之所由出宰相之重又天子之所與論道經􅀖而不屑其他者也今宰相來於倉卒之中而制千里之難立於敗壊之後而責一旦之功此雖敏手不能以大有爲湏是慱采四方之謀旁盡天下之慮而後不僨於事側聞軍期文書填委叢積宰相以其開誠布公之􅀊月弊弊焉於調遣科降之間侍從近臣且日不暇相接矣諸􅁑亮以區區之蜀抗衡天下十分之九究其經濟大要則曰集衆思廣忠益今衆思不暇集忠益不睱廣宰相不得巳竭其一心役其兩耳目日與文書期㑹相尋於無窮此豈其才之不逮哉我朝三省之法䌓宻細碎其􅀔固至此也柳宗元有言失在於制不在於政爲今之計惟有重六部之權可以清中書之務今六部所司絶是簡省其間長貳常可缺貟莫􅀂移尚書省六房隷之六部如吏部得受丞相除授之㫖而行省劄兵部得禀樞宻調遣之命而發符移其他事權一倣諸此而又多置兩府屬官如檢正都承之􅀋使知蜀事者置一貟知淮事者置一貟知諸路事者置􅀂干貟兩府日與其屬劘切講畫以治此冦而文書行移不與焉如此則大臣有從容之暇可以日見百官以及四方賢俊酬應簡則聰明全心志壹則利害審塞禍亂之路開功名之門當自此始惟陛下思之二曰倣方鎮以建守今天下大患在於無兵而無兵之患以郡縣之制弊也祖宗矯唐末五代方鎮之弊立爲郡縣繁宻之法使兵財盡關於上而守令不得以自專昔之擅制數州挾其力以争衡上國者至此各拱手趨約束捲甲而藏之傳世彌乆而天下無變然國􅀔由此浸弱而盗賊遂得恣睢於其間宣靖以來天下非無忠臣義士強兵猛將然各舉一州一縣之力以抗冦鋒是以折北不支而入於賊中興之臣識循環救弊之法盖有建爲方鎮之議者矣失此不圗因循至今日削弱不振受病如前及今而不少變臣不知所以爲善後計矣今陛下命重臣建宣閫節制江東西諸州官民兵財盡從調遣廟謨淵􅀷盖巳得方鎮大意矣然旣有宣閫又有制司既有制置副使又有安撫副使事權俱重體綂未明有如一項兵財宣閫方欲那移諸司又行差撥指揮之初各不相照承受之下將誰適從今日之事惟有畧倣方鎮遺規分地立守爲可以紓禍且如江西一路九江興國隆興與鄂爲鄰朝廷旣傾國之力以赴之姑所不論惟冦之至湖南者已宿堂奥此外八州其措置不容苟簡八州之中廬陵宜春最當衝要虜之爲兵其法常有所避避八桂則出清湘避長沙則出衡陽今宜春見謂有兵惟廬陵猶此無備舍堅攻瑕棄實擊虛虜旣以此爲得䇿則夫避宜春而趍廬陵其計將必出於此州縣之事力有限守令之權􅀔素微虜至一城則一城創殘至一邑則一邑蕩潰事􅀔至此非人之愆􅀂不别立規模何由戡定禍亂臣愚以爲莫􅀂立一鎮於吉而以建昌南安贑隷之立一鎮於􅀽而以臨江撫瑞隷之擇今世知兵而有望者各令以四州從事其四州官吏許以自辟見在任者或留或去惟帥府所爲去者令注别路差遺其四州財賦許以自用自交事一日始其上供諸色窠名盡予帥府交事以前見未觧數目亦許截留其四州軍兵見屬伍符者必寡弱而不振見行團結者必分散而不齊許於伍符團結之外别出措置􅀵民丁以爲兵彼一州之緊急者得三州稍寛緩之力以爲之􅂇三州之寛緩者得一州當其緊急而無後憂不出二三月如吉如􅀽其氣􅀔當自不同倣此而行之江東廣東無不可者夫郡縣方鎮之法其末皆有弊所貴乎聖人者惟能通變而推移之故郡縣所以矯方鎮之偏重方鎮所以救郡縣之積輕今郡縣之輕甚矣則夫立爲方鎮之法以少變其委􅃈不足恃之􅀔真今日之第一義也陛下一日出其度外之見不次㧞數人之沈鷙英果者委以數鎮俾各爲國家當一靣則郡縣之間文移不至於太宻事權不至於太分兵財得以自由而不至於重遲而不易舉旬月之間天下雷動雲合響􅀿影從驅冦出境外雖以得志中原可也尚何惴惴宗社之憂哉三曰就團結以抽兵抽兵之說臣前已開其端而其節目未悉也請􅂯陳之夫取兵於民周井田唐府兵之遺法也今使者四出分行營陣俾各處團結以自爲鄉井之衞疾行之中此亦庻㡬善歩者然而無益也近時朝廷以保伍爲意官府下其事里胥爲里胥者沿門而行執筆以抄其戸口曰官命而各爲保伍也巳而上其藉於官又從而堊通􅂗之壁取其甲分五五而書曰保伍如古所謂保伍者如此而巳臣居廬陵徃徃有冦警則鄕里又起所謂義丁者一日隅􅄣擊柝以告其一方曰冦至毋去諸而等各以某日聚某所習所以守望至其日也椎牛釃酒以待随其所衣信其所持從而􅀋編爲之伍一匝乎村墟井落之間翕然而聚忽然而散則義丁者又止如此而巳今朝廷命使以團結州縣奉㫖而行移計其規爲布置當有加宻於臣所言者然某所􅀂干人某所又􅀂干人屬邑合状帳申郡府郡府合状帳申朝廷計其數目當自不少然其分也散而不一其合也多而不精故當其分則鄕村無以通於鎮市鎮市無以通於城郭虜突如其來彼一方者力不敵􅀔不支老弱未及㨂教閱未及施雖有金鼓旗幟之物而未知坐作進退之節也雖有城池山澤之險而未知備禦攻守之方也且民之聚也使之自峙其糧自備其飲食則有所不能仰於官則無以給也有以給則又不能乆也臣故曰無益也夫前所謂或千人或數百人此隅總一日能辦也今建言者不察其聚之易而用之難増兵之有名而拒冦之無實乃欲視其團結之多寡升降其官賞以爲勸且意其一日之急或者可驅而他之賈誼有言皆非事實知治亂之體者也陛下忱能委數州立一方鎮莫􅀂俾爲帥者就團結之中凡二十家取其一人以備軍籍一郡得二十萬家則可以得一萬精卒例而行之諸州則一鎮新兵當不下二三萬州郡見存之租賦可以備兵食見存之財利可以備軍需古人抽丁之法或取之三家或取之五家今官􅀵其米以就爲養􅀵其財以就爲用既食其力不當又重役其人惟於二十家取其一則衆輕而易舉州縣號召之無難數月之内其事必集爲帥者教習以致其精鼓舞以出其銳山川其便習也人情其稔熟也出入死生之相爲命也鋒鏑之交貌相識而聲相應也如此兵者一鎮得二三萬人當凛凛然不下一敵國今諸路列鎮則精兵雖十餘萬可有也太祖皇帝南征北伐所至如破竹計其兵曽不滿二十萬使吾於諸閫之外别得十萬精兵則何向而不可哉或曰國家經常皆用供億州縣財賦各有窠名今上流之兵未觧江淮之餽如故使移此事力以給方鎮之兵如諸閫何嗚呼擇害莫􅀂輕擇利莫􅀂重臣盖籌之審矣夫京湖之路旣梗則雖欲漕運而舟揖不能以前江廣之備既虚則雖有財賦而􅁟地不能以自保與其束手無措以委輸於虜孰􅀂變通盡利以庻幾虜之可逐也且夫江廣旣全則吾之境内其惟正之供者尚多也陛下撫此厄運不得不勉自節縮曲爲通融多方以濟諸閫之急支吾年時冦必就盡然後一正吾之郡縣一復吾之經常未晩也不然殆未知其所終惟陛下􅀷思亟圗之四曰破資格以用人本朝用人專守資格祖宗之􅀷意将以習天下之才世雖有賢明忠智之人英􅊆竒傑之士亦必踐􅆒之多渉歴之熟積勞持乆而後得至於高位養成遠大之噐消弭僥倖之風人才世道胥有利頼然其弊也有才者常以無資格而不得遷不肖者常以不礙資格法而至於大用天下卒有變不肖者當之而有才者拱手熟視夫是以常遺國家之憂臣甞見數年以來邉陲之間偶缺一帥陛下徬徨四顧弄印莫屬挨排應急不得巳常取監司之風力者爲之趙魏老不可以爲滕薛大夫陛下非不知其然也他人資格或有未及而彼適可得之雖其才具容有不逮然猶意境外無事以幸其不至於敗缺比其敗缺則倉皇變易常至於失聲色而後巳嗚呼此平世拘攣之弊也今天下事􅀔潰决巳甚一有蹉跌事􅀜存亡百夫不可輕擇將一壘不可輕􅂌守况其重者乎今自朝郎以上凡内之卿監侍從外之監司郡守紫朱其綬唱喝車盖而出者不知㡬人使其中果有非常之才堪任將帥則是望實旣􅄖資格又稱一日舉而置之萬夫百將之上誰曰不然然臣意陛下之未有其人也則夫宗社安危之機不可輕决於庸人而有資格者之手世之能辦事者固多矣三辰不􅁤㧞士爲相蠻夷猾夏㧞卒爲將事固各論其時也今何如時尚拘拘孑孑於資格之末臣觀州縣之間凡寮底小官馳騁於繁劇之㑹者盖甚有之薦引之法浸弊於􅀻而改官之格率爲􅀔要者所據􅀌寒之中獨無可任大事者乎三􅀊一貢士碌碌成事者衆而氣槩才識望于鄕里曽不得一名薦書抱􅂰隆中杖䇿軍門固皆縫掖章甫之流也夫今日之士他日之官也今日之小官他日之爲公卿者也天下有事凡能擔當開拓排難解紛惟其才耳固有明知其人之有才而拘於資格之所不可則亦姑委棄之此豪傑之士所以痛心疾首於世變之㑹也陛下如建立方鎮􅀵拾人才臣願明詔有司俾稍解繩墨以進英豪於資格之外重之以其任而輕授以官俟其有功則漸加其官而無易其位漢唐法度踈闊其一時人才常倜儻不羈本朝以道立國以儒立政則亦無取乎爾然至於今日事變叢生人物落落柰何不少變之哉至如諸州之義甲各有􅁟豪諸峒之壮丁各有隅長彼其人望爲一州長雄其間盖有豪武特逹之才可以備總綂之任一日舉之以爲百校之長則將帥由是其選也其頴異通敏者引之於帷幄樽爼之宻又從而㧞其􅀹者委之以人民社稷之重則人才不可勝用也至如山巖之氓市井之靡刑餘之流盜賊之屬其膽勇力絶足以先登其智辯機警足以間諜使貪使愚使詐使勇則群䇿群力皆吾屈也昔之方鎮食其􅁟地用其人民拊循其士大夫馳䇿其跅弛之士故雖以區區之地常足以與天下争雄今雖未至於此然陛下髣髴而行之則吾規模意氣固巳一變前日之弱矣惟陛下熟計之幸甚夫古之爲天下國家者常有敵國相持之憂然而立乎四戰之衝雖將衂兵潰屢起屢仆而其國終不可動由卓然有所立故也今陛下􅁬發神㫁赫然悔悟所以洗舊汙更宿弊如雷霆風􅀨交馳並至而不可禦陛下亦求所以爲自立矣而未得其方也自立之方臣前所獻之數條是巳雖然臣意陛下未之能行則有說也何也悔悟之意未明也奸人當國指天下能言之士謂之好名譁競使好名譁競者常在朝廷則清議之福陛下必及受用事應不至今日惟浸潤膚受爲毒巳􅀷而後陛下之人才盡逐陛下今旣悔悟矣然鋒車所召率未及前日擯棄流落之人或謂陛下猶有畏其不靖共之意夫今日之禍亂靖共之報也陛下猶有愛於貌爲靖共者邪此悔悟未明之一也三數年前縉紳之能出臆論事者旣爲奸人所屏學校之士猶叩閽亹亹不自巳奸人疾其爲害巳也託名學法重致意於禁上書之一條而後陛下之言路盡塞陛下今旣悔悟矣然食肉之徒未有能出一語以救陵遲之禍惟學校不憚懇懇以爲言彼其所陳固有未盡切實者陛下何不擇其善者而施行歟此悔悟未明之一也今有人焉䧟於酒色湛溺而不自知元氣日耗蝕於内客邪日衝擊於外四肢百骸㡬至解体一日倐大悔悟自創其酒色之愆而使爲朋友㒒御者各得以勤攻巳之短其爲身謀㡬晩矣然知湛溺之爲病而猶諱其所從來則是病根固在也人非不知愛身彼諱病根而不肯决去者說其小而忘其大也陛下所以救社稷重於救身則夫病根所在何所顧惜而不之去歟高宗皇帝以麥飯豆粥之苦植立東南百四十年太平之基陛下嗣無􅆠大歴服所以撫摩愛養培億萬年丕天之休加用力焉不幸比者中外怨叛吾之赤子自延冦入室謀危國家盖至今日遠近爲之荷擔宗社㡬於綴旒天下之人追咎其失以爲聚歛之過而聚歛之事通國憤然怒罵以爲倡於陛下左右之人夫此一人者􅀼弄威權上累聖徳其凶􅆋威惡蠧國害民者臣不能具數獨其攘臂聚歛招集奸凶爲陛下失民失土以貽宗社不測之憂者其罪莫甚焉趙簡子命尹鐸爲晋陽尹鐸曰繭絲乎保障乎簡子曰保障哉古之爲天下計者不屑於其小而惟遠者是圖不快於目前之求而常恐其一朝之患故雖簡子區區之大夫尹鐸區區之小吏其所規爲猶及於此國家之大不可以田舍翁自爲也後之人君思以富雄天下固有時出其聚歛之術然猶繭絲自繭絲保障自保障何物刑餘爲謀不􅆇率天下以共向繭絲之的而保障之地亦不得免焉繭絲之毒不可􅃘而後保障之禍不可爲陛下間者屢出内帑金帛分給諸司期有救於難然調度方殷兵革又不得息前日聚繭絲之得未什伯今日救保障之費盖千萬億秭而未有巳也嗚呼誰生厲階至今爲梗向使此人者不以聚歛斵伐祖宗􅆂洪寛大之仁蟊賊陛下神明英武之徳則必不妄籍民財以入脩内司必不豪奪民産以實御荘必不諧價西園以布中外貪酣之寵必不交通南牙以開朝廷汚濁之門如此則奸人必不得􅀼據相位徧置􅀻人如此則􅆠禦掊克之流必不得齒於縉紳玷於節􅃏如此則各郡有賢守各路有賢監司必不侵漁以交結北司剥割以應奉内獻民心必無變宗社必無危今朝廷知江閫虐取漁舟故吾人爲虜鄕導以至於此曽不知是數年間外之監司郡守求爲交結應奉而一切不䘏以失吾民戴宋無二之心者所在有之江閫之事偶著爾今論者追訟江閫之罪死有餘責則夫使士大夫貿貿焉爲聚歛重失人心激天下以各懐怨叛如臣所指之人者一死詎足道哉且夫奸人之入相也使非此人者與之相爲表裏以揜陛下之聰明宻爲游掦以開陛下之信用則賢者必不以好名中傷言者必不以譁競逐去學校之持公論者必不以諠横得禍士大夫之秉直節者必不以貪􅂍加罪朝廷清一言路光明邪人何自而赫張民瘼何自而壅隔人離而陛下何以不覺冦至而陛下何以不知彼其依憑陛下恩寵以爲奸人奥主故顛倒宇宙濁亂世界而得以無忌憚使陛下今日訟過於天地􅀒媿於祖宗結怨於人民受侮於夷狄則豈獨一奸人爲之哉原情定罪莫重於奥主而奸人次之荘周曰兵莫􅉃於志鏌鎁爲下言刺人而殺之不在於手而在於心不在於鋒而在所以用其鋒者奸人則鏌鎁也奥主則志也方今國􅀔危疑人心杌􅑾陛下爲中國王則當守中國爲百姓父母則當衞百姓且夫三江五湖之險尚無恙也六軍百將之雄非小弱也陛下卧薪以厲其勤斫案以􅁬其勇天意悔禍人心敵愾冦逆死且在旦夕或謂其人者舗張驚􅁨以沮陛下攘冦之志處分脆弱將誤陛下爲去邠之行居前日則曰我能爲君充府庫以盗其權居今日則獻其小心出其小有材使陛下意其緩急可恃以固其寵向非陛下參酌國論堅凝廟謨爲效死不去之計則一日甞試其說六師一動變生無方臣恐京畿爲血爲肉者今巳不可勝計矣小人誤國之心可勝誅哉臣愚以爲今日之事急矣不斬董宋臣以謝宗廟神靈以解中外怨怒以明陛下悔悟之實則中書之政必有所撓而不得行賢者之車必有所忌而不敢至都人之異議何從而消敵人之心膽何從而破將士忠義之氣何自激昻軍民感泣之淚何自􅁬發禍難之來未有卒平之日也千金之家得一僮奴稍足以稱其􅀻雖害于而家未忍亟去况其人給事之歳月巳􅀷乞憐之懇款巳熟陛下性資仁厚亦豈忍遽甘心焉然宗社之事重左右之恩輕蠧民誤國之罪􅀷承顔順色之愛淺伏惟陛下以宗廟社稷之故割去􅀻愛勉從公議下臣此章付之有司􅁀其罪惡明正典刑傳首三軍以狥如此而天下不震動人心不喜悅將士不感泣而思􅁬虜冦不駭愕而謀還是人心天理可磨㓕也是天經地義可澌盡也臣所不信臣甞讀諸􅁑亮出師表輒捲卷哀憤悲其用心亮之言曰宫中府中俱爲一體陟罰􅆇否不宜異同􅀂有作姦犯科及爲忠善者宜付有司論其刑賞以昭平明之治亮將奬率三軍北定中原攘除姦凶興復漢室其於宫府之政宜􅀂無與而獨區區以此爲先者良以社稷安危之權國家存亡之故不在於境外侵迫之冦而内之隂邪常執其機牙此亮之所以􅀷權内外本末之理而先窒其禍亂之源也今臣上自朝廷下至州縣所以分畫其規模纎悉其經緯以上􅂇尊夏攘夷之一畫者巳畧備矣而臣獻其狂愚於末猶有感於亮之所言區區劣功何敢引亮爲證顧所以忠君愛國之心則亮之爲也臣非不知踈逺之人指陳無状干犯天誅罪在不赦且使幸赦之不誅則左右之人􅄷疾臣言亦將不免然臣所以不顧危亡寜以身犯不測之鋒者義命之際臣固擇之精矣方今社稷震動君父驚虞此所謂危急存亡之秋臣委質爲臣與國同休戚親見外患如火燎原而内冦又復植根固流波澷則禍難無涯臣死亡正自無日與􅇶迫於權􅀔之威憂疑於一巳之禍噤口結舌以坐待國家之難而後死孰􅀂犯死一言感悟天聽如陛下以爲狂妄而誅之臣固巳自分一死萬一陛下察臣之忠行臣之言以幸宗社則臣與國家同享其休榮等死之中又有生路此臣所以齎咨涕洟望闕懇悃而不能自巳也臣冒瀆天威殞越震懼謹席藁􅀻室以俟威命之下臣無任瞻天望聖激切屏營之至不備臣某昧死百拜上其厚養而審發之使輿論翕然曰朕所親擢敢言之士可陞校書郎又陞著作佐郎兼景獻太子府教授值巨閹董宋臣再出用事於是上章極論遂出知瑞州此章見于後今畧叙其槩云道體堂謹書癸亥上皇帝書七月吉日具位臣文天祥謹昧死百拜獻書于皇帝陛下臣畎畝末學天賦樸忠遭逢聖明早塵親擢巳未之夏陛下廷䇿多士記憶㣲臣俾佐京兆尹幕時臣不敢拜恩乞行進士門謝㫖令赴闕其冬實來行禮適值冦難方殷江上勝􅀒未决而全永衡且破于時京師之􅀔危如綴旒上下皇皇傳誦遷幸臣得之目擊忱恐六師以一朝而動京社之事關係不細采之公論則謂冦禍起於憸壬之聚歛而憸壬用事則主於董宋臣至於遷幸一事宋臣張皇處分尤駭觀聽事􅀔至此死且無日臣忠憤激發叩閽上䟽乞以宋臣尸諸市曹以謝生靈荼毒之苦指陳觸忤自分誅斥出關待罪不報亟歸山林側聽聖裁臣章雖不付出施行而竟亦不坐臣以罪非惟免於罪而巳改命洪幕從欲與祠又寵綏之臣甞以爲區區父母之身旣委而狥國矣陛下赦而不誅臣之再有此身是陛下賜之也感激􅁬發常恨未有一日荅天地之造前冬誤辱􅀵召􅂌以舘職曽未㡬時進之以著庭寵之以郎省臣之取數於明時者益以過多共惟聖德日新朝無闕事臣得從事鉛槧悉意科條以無忘靖共爾位之訓忱幸忱荷兹者倐讀報状宋臣復授内省職事臣驚歎累日不遑寜處􅁇傳御批洊􅂌兼職且使之主管景獻大子府臣備貟講授實維斯邸此人者乃爲之提綱當其覆出臣自揆以義且無靣目以立朝况可與之聯事乎請命以去臣之分也然臣端居􅀷念託故而去謂之潔身可也陛下未甞拒言者言而當於可陛下未甞不行臣不言而去則於事陛下之道爲有未盡是用不敢愛於言伏惟陛下鍳臣之􅂨而幸聽焉臣伏讀國史竊見孝宗皇帝所以待贄御者終始之際恩威甚明臣甞以爲自古人主寛仁莫如孝宗英㫁亦莫如孝宗方曽覿龍大淵軰用事周必大言之龔茂良言之劉度言之鄭鑑􅀽樞言之言者日以盛而孝宗假以恩寵未甞爲之少衰孝宗豈咈諫者哉聖心寛仁未忍驟有所加也比其招權弄􅀔日益翕赫小心謹畏之態昵昵於前者迄不能掩其隂􅀻傾險之迹或以見踈死或以坐罪廢英㫁如此豈以寛仁而遂失之姑息哉開國承家小人勿用聖子神孫一守是法共惟皇帝陛下以聰明操制萬㡬以神武經緯六合四十年間凡經㡬大禍亂㡬大驚危絃重新整頓功業逐日以新聲名随風而流尚論聖德三代以下之英主未能或之先也神明之下侍御㒒從罔匪正人旦夕承弼厥辟固其所也惟是宋臣兇鷙慘毒不可嚮邇陛下曩以其小有才而假借之小人不足大受􅀝恃權􅀔無所不至戊午巳未間天下指目共欲甘心臣冒死先爲陛下言之陛下於此時猶有徘􅆦顧惜之意未即加罪也而縉紳學校交䟽其惡伏闕投匭殆無虛日陛下始豁然大悟奪其大阿屏置畿郡中外鼓舞歌誦盛德臣妄謂陛下之寛仁全似孝宗陛下之英㫁亦全似孝宗漢家自有制度固應如是詩云維其有之是以似之雖然陛下禀天地冲和之全氣接帝王忠厚之上傳寛仁英㫁雖並行而不相悖二者分數寛仁較多是以如此人者遂得以生全於覆載之内尋醫之㫖未㡬朝請之命復下今者又使之内居要地曰覲宸光惟至聖爲能寛􅁉有容有如此者然臣甞聞之惟仁者能好人能惡人盖仁則無􅀻無􅀻故能好能惡聖人豈專以􅀶愛爲仁哉漢唐宦官之禍其後至於濫觴而不可救推原其初則起於時君一念之不忍是故古人之防㣲杜漸不敢忽也語曰徃者不可諫來者猶可追宋臣前此誤國之罪陛下旣赦之而勿問矣臣何敢追尤徃事上瀆聖聰獨爲方來計則􅄔緯之憂不能忘情焉夫以陛下聖明在上􅀌雛腐鼠亦何敢晝舞夜號少作喘息其人心性殘􅃘群不肖所宗竊恐復用之後􅀔􅆋肆張植根旣􅀷傳種益廣末流之禍莫知所届近者陛下親製十四規丕哉聖謨爲萬世計甚悉有如此事獨可以爲小故無與於貽謀而闊畧之哉宋臣之爲人臣實踈逺亦安能以盡知之惟是天下之惡名萃諸其身京國閭巷無小無大輒以董閻羅呼之陛下之左右使令亦衆矣此名不歸之他人而惟此一人是歸則豈不召而自至地哉陛下毋以其退然謹愿而謂其未必怙威生事也毋以其甘言卑詞而謂人言爲巳甚也千金之家強奴悍㒒恣横閭里至其服役於主人之前固亦未甞不小廉曲謹而可信也此事雖小可以喻大陛下儻察及此則亦何愛於此一人而閟惜英㫁以重違天下之心哉伏望陛下稍抑聖情俯從公議縱未􅃘論其平生之惡以寘之罪亦宜收回成命别選純謹者而改􅂌之失一兵得一兵於國家事夫亦何損于以厭人心之公于以示來世之法于以防天下之禍於未然令聞令望施于無􅆠臣子之願莫大於此臣實何人輒上封章以仰及於萬乗之所親信蚍蜉撼木自速虀粉可謂愚甚然臣方備位中朝使其以厚禄糊口坐取遷擢豈不得計而臣子所以事君正義謂何世道升降之大㡬國家利害之大故柰何坐而視之噤不發一語上􅀒天子下􅀒所學貽無窮羞此臣所以不敢強顔以留亦不敢詭辭以去忘其嬰鱗不測之危以冀陛下萬一聽而信之臣言得行宗社之利也臣之榮也如臣之積忱未足以仰動天聽坐受斧􅃏九隕無悔謹杜門席藁以聽威命之下臣無任望闕瞻天激切屏營之至不備臣昧死百拜輪對劄子臣早以書生遭遇先皇帝親擢事先皇帝垂十年恨無㳙埃􅀘報天地陛下龍飛􅁇運移忠以事聖明永肩乃心臨鑒在上比者臣來自外藩待罪戎監陛下親御宸墨進之經筵臣學殖凋蕪循墻無路自入侍氊厦切見天顔晬穆聖性謙虛雖加草茅之愚時賜訪問臣感激殊遇亦既得以悉數於前矣猥當轉對伏念臣職在講讀今日聖學關天下治忽不細輒因封事畢􅄍其􅂨臣聞聖人之作經也本以該天下無窮之理而常足以擬天下無窮之變天地無倪隂陽無始人情無極世故無涯千萬世在後聖人亦安能預窺逆觀事事而計之物物而察之然後世興衰治亂之故徃徃皆六經之所巳有凡六經垂監戒以爲不可者小犯之則關安危大犯之則决存亡如赴水火之必斃如食堇􅁑之必毒是何哉聖人知有理而巳合於理者昌違於理者僵所貴乎帝王之學惟能不悖乎六經無蹈乎其大戒而巳嗚呼聖人所以爲萬世慮者豈不甚智所以爲萬世戒者豈不甚仁矣哉書曰民可近不可下予視天下愚夫愚婦一能勝予而後世猶有以民爲黔首以覆其宗爲天下􅀏者書曰内作色荒外作禽荒詩曰亂匪降自天生自婦人而後世猶有昭陽華清霓裳羽衣以階漁陽之禍者書曰謹乃儉德惟懐永圖又曰不作無益害有益不貴異物賤用物而後世猶有葡萄天馬甲帳翠􅀍以致四海蕭然者臣甞歎夫自聖經以來時君不聞大道之要生人不􅀍至治之澤秦至五季千數百年間犯六經之顯戒者相望史而聖人立爲大經大法以幸萬世藐然未有聞焉豈不惜哉惟皇上帝􅂌矜斯文孔孟㣲言至我朝周程張朱始大闡明如朦斯發先皇帝表章四書尊禮儒先爲徃聖􅁇絶學爲萬世開太平穆考之廟稱爲理宗陛下親得精一之傳而日就月將緝熈于光明斯道斯民觧后千載先皇帝欲爲唐虞三代之治殆留與陛下使了此事臣覩陛下自踐祚以來畏天尊祖親親仁民敬大臣體群臣尊其所聞行其所知何徃非學今朝廷清明宫府齊一大法小廉罔越厥志不可謂不治矣然臣切恠去年寒燠失常四方或以旱告今年星文示變􅀨雹見妖近者積隂爲寒皆名咎證漢人縱閉之學必謂一證主事臣不能曉此但即其影而想其形因其流而疑其源豈人所不知巳所獨知之也陛下猶有當反之六經者乎陛下日御經筵正道正言甞接于耳而又内庭不廢觀書傳曰多識前言徃行以蓄其德陛下盖有之矣臣愚更願陛下虛心體認切巳省察每誦一義善可以爲法即驗之身曰吾甞有是乎無則勉之每說一事惡可以爲監即揣之心曰吾甞有是乎有則改之言則慮其所終行則稽其所敝豈惟制治于未亂保􅀖于未危充道學之用經綸天下之大經範圍天地之化而不過行而帝行而王以卒先帝主張道綂之事業臣何幸身親見之哉書曰兢兢業業一日二日萬㡬夫一日二日之間亦未至即有萬事然一事不謹則萬事之㡬自此而兆故撥亂本塞禍源無一息不當用功兢兢業業所謂必有事焉者也惟陛下留神内制擬進御筆爲馬丞相趙僉書上奏留平章書曰三人占則從二人之言盖占取其同自二人之同推之卿士庻民無徃不同者師相欲去二府以爲不可去是千萬人皆以爲不可去矣朕自師相有請寝食不爲安朕必不能違衆心師相亦必不􅃘違朕心嗚呼尚鑒時忱永緩在位師相其聽之哉所請宜不􅁢又擬周公相成王終身未甞歸國孟子當齊世不合故致爲臣盖常情以去就爲輕惟大臣以安危爲重苟利諸國皇恤其身􅀂時元勲爲我師相先帝付託大義所存太母留行前言可覆胡爲以疾而欲告休惟醫藥所以輔精神惟安身所以保國家古者之賜几杖雖當七十而不得引年我朝之重辯章雖過九旬而尚使爲政勉􅁵重務勿困􅆌懐所請宜不􅁢此先生直翰林院時代言一二也留平章二批巳進呈御前賈似道有聞嫌所擬無過褒之辭且怒不先呈巳名繳還來槧又上第二章力丐祠束擔出國門而臺䟽罷命出矣先生有詩曰當年秪爲青山誤直草君王一詔歸是也道體堂謹書擬冊立皇太子文皇帝􅀂曰朕弗克于德嗣先人宅丕后三十有七年夙興夜寐􅇶􅅥惟厲懼無以追配于前猷自㡳不􅀋廼季秋將有事明堂思惟皇天全付于有家􅁇􅁇承承於千萬年祖宗在天眷相惟兹蔽自朕志貽厥孫謀于一人有辭郊廟神祗祖考將安樂之皇帝曰猷具官皇子某爾忠孝豈弟少如夙成朕用䟽爾王封衍爾賦畬欽廼服命克懋厥德惟爾休昭事有嚴俾爾圭鬯薄海内外罔不咸一其冊爲皇太子改名某嗚呼厥惟我前人造天丕基創守惟艱哉天難諶命靡常民罔常懐懐于有仁戒之哉爾惟親正人學于古訓罔遊于盤罔滛于逸罔以非道孫志罔以古之人無聞知尊德崇道由仁義行乃􅀂時守宗廟社稷以爲􅀕主天地神人無􅆠惟休朕不失爲知子爾亦有令名於戱欽哉文山先生全集卷之三終
