front:
  text: 文山先生全集卷之二文集
  hash: sha256:cd035579dd4a29b7ae7de18d87f9b10088f186fb66df81d94d624361428ab5e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_002-1a}
body:
  text: 詩楽府并詞附文山卽事宇宙風烟闊山林日月長䦕灘通燕尾代石割羊腸盤谷堪居李廬山偶姓康知名摠閑事一醉棹滄浪出山日日􅀐馬來山中歸時明月長在地但願山人一百年一年三百餘畨醉闢山􅀉朱約山一笠一簑三釣磯歸來不費買山貲洞天福地􅀷數里石璧湍流清四時樵牧􅃇蹊今可馬􅀑神天巧不容詩先生曽有空同約那裏江山未是竒山中卽事擕壼藉草醉斜陽白鶴飛來月下􅀟蘆葉西風驚别浦芭蕉夜􅀨隔踈窓千年帝子朱簾夣一曲仙人鐡笛腔􅀂問山翁還痩否手持漁竹下寒江宿山中用前韻南山之隩北山陽羽扇輕風共影􅀟晝槳菰蒲明月笛青燈蟋蟀白雲窓半生遊子成行債一夜佳人作别腔􅀝釣重來此簑笠梅花十里雪空江山中滄州棹影荻花凉款乃一聲江水長頼有蓴風堪斫膾便無花月亦飛觴山中世巳驚東晉席上人多賦晚唐何處魚􅅅不可飯蚤􅂸泉石入膏肓山中謾成柬劉方齋名夣桂居南湖太師公玄孫東風觧凍出行嬉一閧烟塵隔翠㣲自有溪山真樂地從來冨貴是危機二三軰行惟湏醉多少公卿未得歸明日主人酬一座小船旋網鱖魚肥山中載酒用蕭敬夫韻賦江漲拍拍春風滿􅆕浮出門一􅀏大江流坐中狂客有醉白物外閑人惟奕秋晴抹􅀨粧􅄣西子日開雲􅊕一滁州忽傳十萬軍聲至如在浙江亭上遊山中立夏用坐客韻歸來泉石國日月共溪翁夏氣重淵底春光萬象中窮吟到雲黒淡飮勝裙紅一陣絃聲好人間觧愠風山中和韻白扇揮殘暑青鞋􅂿嫩晴花床尋小􅀮石鼎引長鳴紗㡌有時去酒壼惟意傾山僧癡與坐閑却痩彌明山中自賦門外蒼松一水脩不必清高逼巢許秪教瀟灑勝由求空花自滿三千界老􅀣相看五百秋坐有鷹􅀭人物在怕牽昨夣上漁舟入山卽事江流風㶁㶁雲薄􅀨絲絲上馬忙呼繖廵簷静看棋露天厨作濘沙地水生池秉燭留前夕兹遊更絶竒山中感興三首載酒之東郊東郊草新緑一􅀨生江波洲渚失其足青春豈不惜行樂非所欲采芝復采芝終朝不盈掬大風從何來竒響振空谷我馬何玄黄息我西山麓山中有流水霜降石自出驟􅀨東南來消長不終日故人書問至爲言北風急山􅀷人不知塞馬誰得失挑燈看古史感淚縱横發幸生聖明時漁樵以自適桃花何夭夭楊柳何依依去年白鳥集今年黄鵠飛昔爲江上潮今爲山中雲江上潮有聲山中雲無情一年足自念况復百年長但存松栢心天地真茫茫山中呈聶心遠諸客誰入山來問野舟一篙花外渡􅀷流小顰風􅀣蹁躚鶴淺約湍沙浩蕩鷗湖上有時思洛社人間何處不滁洲徘徊才是黄昏候短笛先催月上樓再用前韻黄葉婆娑上釣舟喚囘􅃇夣到江流多情政自憐檣燕兩􅁂終當付野鷗未說離懐向南浦湏知詩意在䕫州朔風昨夜吹沙急早覺寒聲戰玉樓山中六言三首兩兩漁舟摇下􅀟􅀟紫燕飛囘流水白雲芳草清風明月蒼苔鶴外竹聲簌簌座邉松影踈踈夜静不􅀵棋局日高猶卧紗厨風煖江鴻海燕􅀨晴簷鵲林鳩一段青山顔色不随江水俱流用蕭敬夫韻庭院芭蕉碎緑隂高山一曲􅀉瑶琴西風遊子萬山影明月故鄕千里心江上断鴻随我老天涯芳草爲誰􅀷雪中􅀂作梅花夣約莫􅀌山人姓林山中烟雲開􅆼緲荆􅁄剪離披蠟屐上下齒竹枝長短詞半山江色透獨􅀣午隂遲世上兒孫老有人猶看棋倐忽當年遇􅂪茸㡬度披水霞明􅀞卷草􅀣幻騷詞鳥過目不瞬江流意自遲世人空黒白一色看坡棋竹花黄家紫家闘魏姚夷齊玉立青蕭蕭便是人間小天地不特水上作萍浮夜歸市橋燈火未闌􅃢一簇人家􅀣影間想把神仙争羡我不知我正羡渠間八月十六日見梅廣寒殿裏玉樓開那得􅀌山處士來半夜西風半身影夣中􅀐得雪驢囘和蕭秋屋韻蘆花作雪照波流黄葉聲中一半秋明月嬋姢千里夣扁舟汗澷五湖遊星辰活動驚歌􅀏風露輕寒敵拍浮贏得年年清賞處山河全影入金甌月夜月到中天雲劃開断橋幻出玉樓臺夜􅀷一鶴掠舟過疑是坡仙赤壁來江行日日看山好山山山色蒼忘機鷗下早戀廐馬行忙松曉清風濕荷秋流水香短簑吹鐡笛年嵗大江長􅁓帳􅁓帳白如雪上有坐客影一白不自由黒光蕩無定人倦影巳散依然雪花瑩湏􅁷秉燭眠相忘心目静爲劉定伯索油蕨我欲登山去采􅅔江南秋􅀨正霏霏仙家觧有逡巡手一筯西風落翠㣲山中小集江山閑勝賞萬戸不湏留客醉客多事吾詩吾自酬夕風吹綘蠟春色􅃞黄流賔從歸來夜滁翁無此遊新年梅花枕上聽司晨起綰金章候拜親喜對慈顔看鋪􅁂髪雖踈脫未如銀生日和聶吉甫五月初二日青蒲花未老黄竹筍􅀄生細味詩工部閑評字率更大江流日影時鳥說春榮共作千年計身謀政自輕生日和謝愛山長句崧老字伯華余屏跡山間誦昌􅀺三星行政自多感亦何有扵初度客謝愛山翩然逺來貽我長句噓拂而繅籍之者至矣􅀝歌而和愧不成章寓形落落大塊間噓吸一氣自徃還枽弧未了男子事何能局促甘囚山昔年此日作初度賔客如雲劇歡舞今年避影􅁍閉門捧觴自壽白頭母故人憶我能遠來虹光滿䄂生瓊瑰一桮相屬慰岑寂使我發􅀏愁顔開簸􅀭且聽箕張口丈夫壮氣湏衝斗夜闌拂劍碧光寒握手相期出雲表生日謝朱約山和來韻元豐五年正月日洛中耆英佳話出當時韓公七十九歡噱賡酬老吟筆􅊆然冠劍照孔鸞鮐背鳩枤蒲輪安韓公而下文寛夫相高以壽不以官洛塵巳随流水急雲仍相逢松下石顧我行軰真我來兼謩故事強安排約對青山共長乆醉歌要賽滁州守願随後社著􅀷衣闌風伏􅀨從是非便令􅂝樽西墅去山花山鳥爲歌舞招招瑶母來庭闈拍手共􅀏偷桃兒吾山陂陀白雲滿猿鶴司我北門管紫霞隔㫁雞犬聲下有琥珀滋長齡向來福地七十二此亦清高仙地位朝遊崑崙暮崆峒駕風鞭霆迎我公丹厓翠壁千萬丈與公上上上上上生日山中和蕭敬夫韻山􅀷不用結凉棚風起江蘋暑氣輕處士林泉自今古男兒弧矢付豪英客來不必籠中羽我愛無如橘裏枰一任蒼松栽十里他年猶見茯苓生與朱古平飲山中和蕭敬夫韻古平名植字聖陶丙辰賦魁太傳卒江山自足引千杯况有如今此客哉石室只還湖守住蘆峯曽屈晦翁來酒酣剰有詩酬唱歩倦何妨車馬囘遊徧此山方可别北厓莫遣曉雲開所懐英英香蕙瑩朝華収拾東風作一家燕語鶯啼春又夏燈花剔盡暗窓斜山中偶成白鶴飛來牽我衣東風吹我下漁磯當年祗爲青山誤直草君王一詔歸次約山賦杏花韻名花韻在午晴初􅀨沁臙脂臉更敷蒲驛莫妨娯刺史錦坊豈不勝中書時無艶曲臨軒縱公莫巍壇韞匱沽春老緑隂青子近東風來徃一吹噓贈南安黄梅峯清淺風流聖得知黄昏歸鶴月來時嶺頭更有高寒處􅁍是江南第一枝送人徃湖南鴈拖秋月洞庭邉客路凄凉野菊天雲隔酒尊横北海風吹詩史落西川夜􅀷􅀑火千山雪春後䳌花一􅀣烟爲我祝融峯上看朝暾白處禮蓬仙題張景召簿尉梅墅并餞入南喚醒三影燕支魂一枝半􅀣專黄昏江南暗香欝不住霜風吹入羅浮村踈枝不入輞川畫暗香不到東山棋雲階一枕棃花夣參横月落無人知和謝愛山晩吟韻日晩與客散歩因誦夕陽雖好不多時之句謝愛山欣然賦之余亦率然口占以和亦一時之樂也日落未落天凔凉懸厓掛壁留餘光紫烟翠霧空迷茫颼颼度􅊤松風長牛背短笛催歸忙飄飄逸興空悠􅀭􅁭懐灑落萬慮亡湏􅁷薄􅊕山色藏長歌浩浩相激昻淡雲弄月㣲昏黄别謝愛山緑綺知音早青燈對語遲那知今􅀨别又重故人思山隔詩情逺雲含容思悲小樓今夜笛莫向月中吹君今拂衣去我獨枕書眠一片過林􅀨数聲當戸蟬情長空有恨吟苦不成篇後㑹知何日西風老鴈天和胡琴窓名日宣字徳昭買得青山貴似金痩笻上下費沉吟花開花落相関意雲去雲來自在心夜􅀨一江漁唱小秋風兩䄂客愁􅀷夾堤密與栽楊柳剰有行人待緑隂七月十三夜用燈牌字韻湊成一詩與諸賔一􅀏赤壁當年賦子虛西風忽復到菰蒲蟾蜍影裏千秋鑑蟋蟀聲中七月圖詩思飄飄入雲漢歌聲􅀮􅀮動江湖萬家簫鼓連燈火見說來年此事無病中作􅀊月侵尋見二毛劍花冷落鸊鵜膏睡餘吸海龍身痩渇裏奔雲馬骨高百忌不容親酒具千愁那觧减詩豪起來大作屠門嚼自􅀏我非兒女曹又二絶瞿塘隘處真重險勾漏坡前又一灘世事不容輕易看翻雲覆􅀨等閑間病中忽悞通真理静處專尋入定工􅀨汗淋頭都不管湏􅁷和氣自冲融又賦一病忽兩月蓬頭夏渉秋形羸心自壮手弱筆仍遒昨夜燈如喜今宵諜莫愁問誰驅五瘧正與五窮謀一病四十日西風草木凉􅀝床腰見骨覽鏡眼留眶倦䇿吟詩杖頻燒讀易香夜􅀷排果餌乞巧太醫王又賦病裏心如故閑中事更生睡猫随我􅈸􅃛鼠向人鳴羽扇看棋坐黄冠扶杖行燈前翻自喜痩得此詩清驟􅀨知何處一溪秋水生苦吟肩鶴痩多病耳蟬鳴􅀮几惟便睡挑包正倦行山􅀷明月夜乞我半窓清􅀉興迯吾病吟詩老此生風高鳴鴈起晴乆鵓鳩鴻野􅀣辭秋落溪雲􅅁􅀨行晩凉便􅂴坐移傍竹隂清借道冠有賦病中蕭散服黄冠􅀏倒群兒指爲彈祕監賀君曽道士翰林蘇子亦祠官酒壼釣具有時樂茶竈筆床随處安幸有山隂􅀷宻處他年煉就九還丹又賦時以草果數百枝作枕遂得汗一畨潮信過時暫脫熬煎心似轆轤轉身如徽纆纏夜聽飢鼠嘯晝看伏雌眠急􅀨千山動應知爲觧弦病甚夣召至帝所􅀗宥覺而頓愈遂賦卧聽風雷叱天官赦小臣平生無害物不死復爲人道德門庭遠君親念慮新自憐螻蟻軰豈意動蒼旻病愈簡劉小村秋光沁人骨意氣曉來新古鼎龍團雪虛簷麈尾春商山奕棋老赤壁洞簫賔風月真倉扁招呼入屋頻倦餘心似醉病起首如蓬黄竹㫁橋􅀨白蘋長笛風僊僊鷗屢舞咄咄鴈書空􅀌􅀒秋來眼閑挑㸑下桐夜坐偶成蕭蕭秋夜凉明月入我戸􅄃衣起中庭仰見牛與女坐乆寒露下悲風動紈素不遇王子喬此意誰與語簡琴窓雲屋竹軒諸友世情千萬變險甚劍頭炊嗜傳姑成癖登山且作癡烟霞非􅍚痼泉石自心馳獨喜精神徤山中剰有詩用前韻留琴窓百年矛上浙萬事枕中炊病苦還思老貪嗔未􅀂癡雲低天欲動江長岸如馳明月西風徤山頭賦别詩又用韻簡李􅀷之名道大號􅀷齋晩尊和月吸早飯􅅁星炊鵬鷃從高下螳蟬任􅃛癡水澄神自止雲遠意俱馳門外誰車馬故人來課詩早起偶成澹澹池光曙沉沉野色秋片雲生北舎􅃗鴈過南樓有見皆成趣無言􅄣是愁芭蕉夜來水嚥罷自搔頭又用韻江山如有意天地可無秋夜月馮驩鋏西風王粲樓露蛩令我喜烟草爲誰愁且醉桮中物相看尚黒頭曉起夣破風烟逈衾寒不自由鍾聲到枕曙月影入簾秋鴈過江山老蛩吟草􅀣愁整冠人共􅀏兩月不梳頭遠寺鳴金鐸踈窓試寳熏秋聲江一片曙影月三分倦鶴行黄葉癡猿坐白雲道人無一事抱􅂰看囘文夜坐淡烟楓葉路細􅀨􅖋花時􅀫鴈半江畫寒蛩四壁詩少年成老大吾道付逶遲終有劍心在聞雞坐欲馳和朱松坡學醫未至太醫王􅀏殺年年折臂傷屏裏江山如出色亭臯松菊巳成行細叅不語禪三昧静對無弦琴一張多謝嶺頭詩􅀉我滿園梅意弄春光陳貫道摘坡詩如􅀉以自號逹者之流也爲賦浩浩歌一首浩浩歌人生如􅀉可奈何春秋去來傳鴻燕朝暮出沒奔羲娥青絲冉冉上霜雪百年歘􅀂彈指過封侯未必勝􅀲圃青門老子􅂓婆娑江湖流浪何不可亦曽力士爲脫靴清風明月不用買何處不是安樂窩鶴脛豈長鳬豈短䕫足非少蚿非多浩浩歌人生如􅀉可柰何不能高飛與逺舉天荒地老懸網羅到頭北邙一杯􅁟萬事碌碌空奔波金張許史乆寂寞古來賢聖聞丘軻乃知世間爲長物惟有真我難㓕磨浩浩歌人生如􅀉可奈何春夣婆春夣婆拍手􅀏呵呵是亦一東坡非亦一東坡借朱約山韻就賀桂冠身徤尚堪松下飯眼明正好橘中棋青山有約當朱戸白首何心上彩闈栗里田園供雅興午橋鍾鼓賞清時晩來倦客秋江上坐看半天黄鵠飛用前人韻賦招􅀮釣魚船上聽吹笛煨芋爐頭看下棋賸有晚愁歸别浦巳無春夣到端闈去年尚憶桃紅處好景重逢橘緑時珎重山人招􅀮意猿啼鶴嘯白雲飛用前人韻招山行以春爲期掃殘竹徑随人坐鑿破苔磯到處棋一水樓臺開曉鏡萬山花水放春闈雪中便有囘舟興林下豈無燒筍時莫待東風吹柳絮眼穿籠鶴遶湖飛翰林權直罷歸和朱約山韻閑雲舒卷無聲畫醉石􅃻推一色棋試問挂瓢棲碧洞何如襆􅀍卧彤闈夣中芳草還成路别後黄花又是時羞殺今年堂上燕片心􅀉與鴈南飛慶羅氏祖母百􅀊羅氏慶門壽母百􅀊父老見所未甞鄕閭夸以爲盛某旣交朋升堂爲壽退布席㕔事與横舟昆弟子姪舉酒盡歡酒酣賦詩志喜也麗日萱花照五雲升堂風采見乾淳蓬萊㑹上逢王母婺女光中見老人􅀨露一門華髪潤江山滿座綵衣新只将千載苓爲壽更住人間九百春拜羅氏百􅀊母之明日主人舉酒客張千載心賦詩某喜賛不自巳見之趂韻翠㣲三鳥近畫閣五雲横春水鷗聲滑夕陽鴉背明尊前持一􅀏花下卧餘醒曽見瑶池母不爲虚此生醉清湖上三日存叟獨不在坐卽席有懐石鼎吟方透瑶觴醉未䦨踈林花宻綴舊壘燕新安春半湖山好夜􅀷江海寒王孫隔芳草初月正相看羅山長存􅅱兄弟來謝宴山中存􅅱名耕登科天開盤谷􅀮春到浣溪家一水樓臺影滿山桃李花春風􅀉横笛夜月擬乗槎政好逢佳客江空北斗斜壽朱約山八十韻九月十三日翠䄂瓊樓八十翁平安曉宇看􅀌鴻五湖圖裏添彭祖南極光中約祝融日日青山醉春色年年黄菊飽西風鷹􅀭但願無施處臣老婆娑一釣蓬壽朱約山八十三􅀊八十餘翁雪滿顛􅀷衣大􅅁耳垂肩磻溪囘首今三載絳縣論心又十年歸去來􅀆真富貴羙哉壽也活神仙門前燕雀紛如􅀨媿我白雲􅀷處眠賀祕書歐陽巽齋先生遷居名守道字公權先生挾冊當菑畬不待辛勤有屋廬宅様只還齊里􅃇鄕風好似頴川居鏡湖今日賀外監瀛舘前年虞祕書天下經綸猶一室時人尚敢說吾迂挽李制帥二首名遇龍字叔典上下荆淮劍氣雄進擔全蜀凛英風將壇㰱血金湯志白腹填天竹帛功治法征謀関世道精忠定力簡皇衷傷哉生出瞿塘險翻落黄粱一夣中世変江河渺未涯如公真是濟時危㡬年荆益龍驤譽一日瀟湘鵩䜟悲天下皆傳清獻節人心自有武候碑􅀰君昔共慈恩約抆泪西風􅀉些詞挽孫庸齋樞宻兄淮水竒人物樞星􅊆弟兄泰山開學譜雲谷發時源委吏初行志脩文莫返䰟功名傳乆逺頼有二􅀰存挽龚用和結屋南陵三十秋田園􅃇􅀮隔江流鄜州避乱杜工部下澤乗車馬少遊名利無心付隍鹿詩書有種出烟樓長淮清野難歸玉䰟􅅎猶應恋故立挽万監丞益之文華時軰右質朴古風餘壁上春陵記屏間太極圗雲山居士屋風雪故人書一夣中􅀚化堯夫以後無􅂘祕書彭止所名方逈丙辰省元人物􅀌中祕神山返異仙日穿陪紼處夣断曝書年玉質應無死􅅊編豈不傳奠芻和泪遣此月向誰圓挽湖守呉西林名道夫字深㴟沒於湘凛凛千軍筆堂堂一靣威荆流春浪湧峽􅀣莫雲飛素壁鯨猶在中橋鶴不歸劍亭遺跡古豐石照山輝傾盖􅀊年晚相知江海􅀷春天思北􅀣夜􅀨話西林五嶺生前夣中原地下心英雄凋落尽慷􅁣一霑􅁭挽高郵守晏桂山名陶字復之祕書丞淮南巳仙去桂􅀣欝青青五馬賢聲望三丞􅃇典刑􅀖人多感嘆諸老半凋零何日持雞酒傷心請葬銘挽鄢晋叔主簿名晋同榜此君何坦坦􅅆首杏園遊䰟􅅎湘潭去聲名彭澤休百年中道短千里故鄕愁六子三方㓜遺言可泪流挽王逺叔孟甞生五日白首嘆遭逢燈火殘編􅀨虀鹽短􅄄風八天下鵰鶚半水􅅯蛟龍原上諸生哭黄花衰草中挽蕭帥機虎溪名了翁字明可世以千金重誰能學􅀮君一門名似雨滿座客如雲志願生無憾聲華死有聞韓碑照原草含􅀏有斯文挽朱尚書􅆛孫一代文昌貴千年諌議名天球聲渾厚元酒韻和平巖穴思風采朝廷惜老成東西生死别江水泪爲傾挽太􅀶朱古平白氏賢司馬昌􅀺真學官江湖驚落筆朝野望彈冠天馬高風骨秋鷹折羽翰萊庭人白髪烟􅀨萬松寒鐡硯傷同志青燈憶舊游臨軒朝鳳闕馳道聽雞籌魏野神仙宅元龍湖海樓西風一揮泪世事盖棺休挽􅀺致政􅀺探花祖楚峯天地闊四世百年家鶴髪垂􅂁葉龍孫上榜花詩書新􅀨露松栢老烟霞白馬蒼山路斯人忽巳遐古心江先生以舊弼出鎮長沙癸酉十月乙亥是爲七十六嵗門人文某以一節趨走部内謹擬古體一首爲壽炎圖啓丕運皇路熈以平蜿蟺發令姿有羙洵一人鴻藻舒朝華大音鏘韶鈞黼珽麗三階火龍昭紞紘桓圭殿南服熊旂􅀍金城瞻彼鶉爲火翼軫宣其精祥鸞舞瑶席鳴鳳翔媧笙孟冬兆陽氣西北無浮雲駕言酌春酒可以寫我情􅀭旍下祝融躧􅂂朝奉清嘉猷扇九垓還以遂古淳君子保金石所以永國成純嘏􅃬千􅀊綿綿賛休明送張宗甫兄弟䠂觀登舟赴湖北試金螺曉氣照人寒手把天漿領佩環夜月送魚來赤壁秋風吹鴈發衡山東南折處旗花見牛女光中槎影還見說青年文賦好士龍一􅀏共雲間衡州送胡端逸赴漕號􅀚齋時八月十五日発兵討賊䠂觀簷花曉舟人擊鼓東蛟龍噀靈􅀨鵰鶚展雄風此客雲霄士斯文造化工捷來君飲此我亦凱元戎題䠂觀樓西風吹感􅁣曉氣薄登臨半壁䠂雲立一川湘􅀨􅀷乾坤横笛影江海􅀝樓心遺恨飛鴻外南來訪逺音安序宋吏部來牧衡陽某將指聮事好也㑹以便郡歸養􅀗忝交承臨發賦詩湘水千里傾盖年華晩行人早發湘白雲虹浪小明月燕花香明浦春何急巴山日正長祝君加一板我意爲桐鄕贈周東卿畫魚觀君瀟湘圖起我濠上心短􅄄波濤􅃇秋雨菰蒲􅀷某叨臬衡湘􅂪恩以便郡歸養肯齋大卿實寓衡我十年前􅀖君也一再見間即分南北五言啓之所以致今舊丙繾綣云李肯斋名芾瀟湘一夜􅀨湖海十年雲相見皆成老重逢便作分啼䳌春浩蕩囘鴈曉殷勤江闊人方徤月明思對君幕客載酒舟中即席序别故人滿江海遊子下瀟湘夣載月千里意行雲一方櫓聲人語小岸影客心長􅄣是浮萍迹飛花莫近檣用韻謝諸客和章傳鼓發船去我秦君向湘持螯思太白占鵲問東方世味秋雲薄交情江水長相期天路曉陣馬度風檣湘潭道中贈丁碧眼相士自詭衡山道士孫至今句法有軒轅世人未見題堯廟盡把昌􅀺作寓言收拾衡雲作羽衣便如屈子逺遊歸離騷忘却題天柱爲立斜陽問翠㣲咸淳甲戌第二朔予道櫧洲里徐畋方諌自長沙來爲别問客㡬何曰半年矣臨别爲賦君爲湘水燕我作衡陽鴈鴈去燕方留白雲草迷岸和衡守宋安序送行詩并序某將指罔功叨符便養初聯寅誼近依清燕之香末忝交盟親授朱提之印冠盖一時之盛事縉紳百世之􅀷情别集殷勤歌詞鄭重夣囘雲舍􅀷懐萱草之詩思乏雪車􅓽和梅花之賦瞻言作逺覽擲爲榮玉立湘西第一州丹梯小爲嶽雲留東風城郭人行樂春日旌旗公出遊便趂綈香摩碧漢莫嫌綉影涴清流兩君相見衣冠好記取兒孫好話頭方共衡雲把酒杯春風吹向鬰􅀌臺鴈將囘處驚帆落花未開時怯笛催别草可堪遊子去􅀉梅應爲故人來臨行􅀏覔凝香譜十駕那追逸驥材贈萍鄕道士道上觀行人半似重相見古云性相近性豈不如􅆕萬形本一性萬心方一殊世固難絶聖亦恐難絶愚白髭行憶昔守宣時白上一根髪去之四五年一化爲七八今年客衡湘黒髭巳多黄衆黄忽一白驚見如陵陽白髪巳爲常白髭何足恠歳月不可歇雪霜日長大世人競染緇厭之固足􅅓誰服蘆菔湯避老亦奚爲少老如春秋造物以爲儔吾方樂吾天樂天故不憂將母赴贑道西昌重來鷗閣曉帆影漲新晴􅀝檻雲來去閉簾花送迎江湖春汗澷歳月老峥嶸手把忘憂草䕫䕫繞太清快閣遇􅀨觀瀾一􅀏登臨晚江流接太虛自慚雲出岫争訝􅀨随車慷􅁣十圍柳周囘千里魚故園隄好在夜夣繞吾廬題鬰􅀌臺城郭春聲闊樓臺晝影遲並天浮雪界盖海出雲旗風􅀨十年夣江湖萬里思􅀝闌時北顧空翠濕朝曦予題鬰􅀌泉筦五湖翁姚濓爲之和翁官滿歸里因韻䞇别并謝前辱巢􅀛君往好涌翠我來遲夜􅀨呼三韭春風試一旗飛花行客夣芳草故人思何日五湖上同看浴海曦用韻謝前人兹遊良邂逅吾道未逶遲斗野横􅀟劍牛津直兩旗此風應小住明日便相思輸與君家近扶桒五色曦翠玉樓晩􅀨晩樓一曲轉梅花官事無多報放衙林木蔽虧烟㫁續江流曲折􅀨横斜年華冉冉風前影􅀊莫悠悠客裏家一鴈近從沙觜落更饒片雪入天涯翠玉樓觀雪矯矯臨清泚濛濛認翠㣲綈春生客䄂鐡冷上戎衣柳眼驚何老梅花覺半肥新來有公事白戰破重圍翠玉樓和胡端逸韻客影魚千里年華柳十圍白雲栖石宻黄鵠出烟㣲江海秋風老湖山晚日暉鬰􅀌臺上望野闊犢初肥翠玉樓昏鴉何處落野渡少人行黄葉聲在地青山影入城江湖行客夣風􅀨故鄕情試問南來信梅花三兩英合江樓天上名鶉尾人間說虎頭春風千萬岫秋水兩三洲客晚驚黄葉官閑􅀏白鷗􅀟江日東下我欲賦扁舟西䠂驚鴻晚東淮落木秋蒸湘今石鼓句宛古宣州白日􅂓清賞青山􅄣􅃇遊不知滄海水何處接天流皂盖樓一水樓臺繞半空圖晝開蝸涎行薜荔雀影上苟苔碧落人千載青山酒一杯晚烟看不盡待月􅁍歸來石樓曉色重簾捲春聲疊鼓催長垣連草􅀣逺水照樓臺八境烟濃淡六街人徃來平安消息好看到嶺頭梅馬祖巖曽將飛錫破苔㾗一片雲根鎻洞門山外人家山下路石頭心事付無言禪関秋風吹日上禪関路入松花第一彎只願四時烟霧少滿城樓閣見青山吸江絶壁千尋俯雪湒春花秋草有䰐鬖當年誤著蒲團坐惹得人稱馬祖巖塵外半山風􅀨截江城未脫人間􅄣是塵中夜起看衣上月青天如水露華新雲端半空夭矯起層臺傳道劉安車馬來山上自晴山下􅀨􅀝闌平立看風雷清江何漢英再見於空同讀歐陽先生詩感􅁣爲賦采芝雲滿山采檗瀑垂澗當年有清徽爲􅀉南來鴈鴈去人巳逝􅀊月剨云晏流水失聲音西河老憂患徃日志士悲窮途行子慣君爲梁宋遊我復江漢宦十年耿相逢千里欠一盻玄機􅀉糟䄸美疢堕芻豢贈子歸東方􅂓薦呉興莧送曹倅巖山官滿歸里名夫發贑倅春陵光霽落蒼苔􅁑水神仙立翠槐萬里雲霞麒驥路三年風月鳯凰臺興同老子復不淺歌曰先生歸去來􅁃嶺梅花開漸徧一枝就與􅀉蓬萊和前人賦别翠松三萬頃松雪著神仙柳院催金鑰江花送玉鞭曉巖雲壁立晩棹浪規圓未了醉翁事重尋頴上田當年童子見今見二毛翁海月三秋别江雲一日同鷗心馳舍北龍尾曵天東定有延和奏南來􅀉一通贈明脉蕭信叔枚乗擅七發郭玉明四難㣲言起沈痼此道今澷澷云何東海生而乃緒真要砉然以神遇契彼鏡經玅我欲炊彫胡俯鑿菊水泉壽彼方輿人六氣何由諐贈林碧鑑相士咸陽宮中四尺鏡照人五臓何烱烱桒田滄海千餘年百錬依然化爲鑛君從何處得此物鑄就􅀟瞳敵秋月向未照心今照形不事瀾翻三寸舌逺衝風雪肯我過看來猶未􅀷知我我方簑笠立釣磯萬事浮雲都勘破噫嘻吁只今神目􅀑眼紛道途暗中許負􅀿盧胡試問何如林家老碧鑑不知天津橋上復有龍鍾無送吉州陳守觧任羙人䇿良馬弭節螺江湄歳年忽晼晚桃李已成蹊遥遥一水間復復東與西晴川夾􅁱楊行舟何能維朱鳯翔海山層漢􅀭音徽高岡有梧桐駕言覽朝暉贈君以白雲白雲不我持贈君以明月明月不我携白雲與明月遠道相追随贈蜀醫鍾正甫炎皇覽衆草異種多西州爲君望岷岷使我􅀟泪流向來秦越人朝洛夕邯鄲子持鵲經來自西亦徂南江南有羈羽豈不懐故營何當同皇風六氣和且平改題萬安縣凝祥觀古道松花空翠香風前􅁂影照滄浪飛泉半璧朝雲濕啼鳥滿山春日長湏信神仙元有國不知蠻觸是何鄕道人横笛招歸鶴坐到斜暉上璧璫相如遊獵賦華􅴰璧璫注壁璫以玉爲椽頭西昌倪氏有山谷書杜陵山水圖障歌作江山堂堂廢其後人以黄書求題䟦感􅁣一絶杜二巳無黄九去長歌大字落江山百年風物今何似春水晚烟飛白鷴山中再次胡德昭韻不將顔色汙黄金落得㶚橋驢上吟是處江山生酒興滿天風雪得梅心觥籌堂裏春聲沸燈火林臯夜色􅀷人世可能行樂耳重游不用上晴隂人生柳絮闘堅牢過眼春光歎伯勞蜀道􅓽傳千古險廬山方許一人高眼前見赤徒妨道耳後生風未當豪明月盧花随處有扁舟自在不湏篙曽見尊前此客哉􅀏携麈尾拂苺苔水邉飛鴈年年見湖上新亭日日來酹菊醉餘披草坐􅊥梅吟罷帶花囘北厓尚􅀍剛風隔􅀏按匆匆上馬杯山中泛舟觴客便作乗槎客蕭蕭骨髪清尊前山月過笛裏水風生半夜魚龍沸三秋河漢明雪堂眠二客夣與白鷗盟病中作六月廿四夜人間􅀬欲炊病懐如酒困倦睫似書癡夣與千年接心随萬里馳客來相問訊􅀉語有新詩山中卽事山中方􅀨笠天外忽晴絲夕釣江澄練春行路布棋乾坤供俯仰􅀊月任差池有酒如澠在何妨日問竒挽巽齋先生歐陽大著徘徊河西上月落衆星稀哲人萎中道􅀨絶将安之昔者麗鴻藻玉振含清暉名理軼晋魏雅言襲軻思連駕覲馳道並坐侍端闈及門懐燕婉升堂接逶迤方期黄鵠翔忽作朝露晞黔婁不盖體延陵有遺悲層阿翳寒樹平䠂曖布㣲帷㡛衣廣柳縞冠涕如縻水從章江去雲遶䠂山飛巳矣如有聞斯文不在兹送劉其發入蜀秋風凄巳寒蜀道阻且長虎狼伏原野欲濟川無梁客從何處來云我之西方蕭蕭驌驦鳴熠熠湛盧光昔時榮華地今爲争戰􅂣将軍楊天戈壮士發戎行江南有覊鳥悠悠懐故鄉駕言與子遊雲天何茫茫周蒼厓入吾山作圖詩贈之三生石上結因縁􅂁笏横斜學米顛漁父㡬忘山下路仙人時訪嶺頭船烏猨白鶴無根􅀣淡月踈星一線天爲我醉呼添濛澒倦來平卧看雲烟題羅次說竹巖摘藁游子西南來出門道何悠文章㑹有用意氣輕身謀紛紛食梁肉藜藿當其憂君看百川水何處不東流挽劉知縣名元高字仲山實齋之子玉海淵源懿金閨歩武高功名千載意翰墨一時豪天馬含風骨秋鷹折羽毛相逢俱白髪流涕濕征􅂁古樂府壽人母􅃢瑚香􅀧胭脂雪芙蓉帳壓春雲􅀬明朝早㺯燈前月㶑灔九霞碧藕析璇杓高聳􅄔女明金波􅃞曉輝郞星赤瓊曲裏長眉青頭上更有經池君六九五十四東風西蟠桃花花未紅鳴鸞鼓玉聲玲瓏緑毛􅂪茸蓮水􅀛斒斕五色人間稀春多瑞葉不敢飛氷壼光滿魚龍轉􅀏中低舞玉􅁫燕明年今日長秋殿安輿入侍金桃宴齊天樂慶湖北漕知卾州李樓峯南樓月轉銀河曙玉簫又吹梅早鸚鵡沙晴蒲萄水暖一縷燕香清裊瑶池春透想桃露霏霞菊波沁曉􅂁錦風流御仙花􅅁瑞虹繞玉􅀜人正未老喚磯頭黄鶴岸巾談􅀏劍拂淮清槊横楚黛􅀨洗一川烟草印黄似斗看半硯薔􅅔滿鞍楊柳沙路歸來金貂蟬翼小齊天樂甲戌湘憲種德堂燈屏夜來早得東風信瀟湘一川新緑柳色含晴梅心沁暖春淺千花如束銀蟬乍浴正沙鴈將還海鼇初矗雲擁旌旗􅀏聲人在􅀞闌曲星虹瑶􅀣縹緲珮環鳴碧落瑞籠華屋露耿銅虬氷翻鐡馬簾幙光摇金粟遲遲􅀝竹更爲把瑶樽滿斟􅙩醁囘首宫蓮夜􅀷歸院燭文山先生全集卷之二終
