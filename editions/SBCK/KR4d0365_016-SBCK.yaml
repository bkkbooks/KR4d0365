front:
  text: 文山先生全集卷之十六别集
  hash: sha256:879b36705ef0ab04679334d24123999c94c2bb06dadbd6047eb4666daf549a13
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_016-1a}
body:
  text: 集杜詩自序余坐幽燕獄中無所爲誦杜詩稍習諸所感興因其五言集爲絶句乆之得二百首凡吾意所欲言者子羙先爲代言之日玩之不置伹覺爲吾詩忘其爲子羙詩也乃知子羙非䏻自爲詩詩句自是人情性中語煩子羙道耳子羙於吾隔數百年而其言語爲吾用非情性同哉昔人評杜詩爲詩史盖其以詠歌之辭寓紀載之實而抑揚褒貶之意燦然於其中雖謂之史可也予所集杜詩自余顛沛以來世變人事槩見於此矣是非有意於爲詩者也後之良史尚庻㡬有攷焉歳上章執徐月祝犂单閼日上章恊洽文天祥􅂂善甫叙是編作於前年不自意流落餘生至今不得死也斯文固存天将誰屬嗚呼非千載心不足以語此壬午正月无日文天祥書社稷第一三百年宗廟社稷爲賈似道一人所破壊哀哉南極連銅柱送李晋肅入蜀煌煌太宗業北征始謀誰其間苦􅀬呈陽中丞風􅀨秋一葉故李光弼司徒理宗度宗第二先帝弓劒逺送譚二判官永懐侍芳茵送汝南郡王璡今朝漢社稷喜逹行在所爲話涕沾巾送司馬入京誤國權臣第三似道䘮􅀖之政不一而足其覊虜使開􅁁釁則兵連禍結之始也哀哉蒼生􅀝大臣送韋中丞之晋北風破南極北風開􅁁一何多前出塞至死難塞責呉侍御江上宅瀘州大将第四西南失大将客居帶甲滿天地送逺高人憂禍胎山寺感歎亦歔欷􅆧村襄陽第五十年殺氣盛北風百萬攻一城遣懐賊臣表逆節徃在胡􅀐忽縱横嚴公武荆湖諸戍第六長嘯下荆門春日梓州登樓湖行速如􅀑塞蘆子門戸無人持水檻社稷堪流涕西閣呈元三十二黄州第七始謂虜以襄陽船自漢入江後乃知虜之未渡蘄黄巳先降故其渡也襄漢蘄黄之船皆在焉桓桓陳将軍北征東屯大江北行官張望化作虎與豹夏日歎楚星南天黒晚登瀼上堂陽羅堡第八夏貴自陽羅堡之敗順流而下沿江南岸縱兵放火歸廬州觧甲當是時其心巳無國矣似道建督至江上夏貴不得已出見斬以釁皷東南􅂯造之機也失此不圖社稷爲墟哀哉日色􅀮孤戍發秦州大江聲怒號大􅀨朝廷任猛将又上後園􅀫昔恨滔滔送王砅便南海京湖宣閫第九開慶巳未江陵閫帥自上而下奔救鄂渚令朱禩孫任宣閫乃自鄂渚走還岳陽朱與夏通任長江之責一上而一下使中流蕩然虜安行入無人之境國安得不亡嗚呼痛哉正當艱難時送樊侍御漢中豈無濟時䇿遣興連檣荆州船􅀨悠悠回赤壁過南岳入洞庭渡江第十常時江水風波不可狎視虜渡江時水乃鏡平豈非天哉濟江元自闊行次古城泛江輕船下吳㑹逄劉簿弟南紀收波瀾衡州縣呈陸宰吾将罪真宰劎門鄂州第十先時李雷􅁬爲郡守十月以臺論罷至是無正官張宴然以城䧏金湯重鎮正風寒中而去正守當國者獨何心哉鄂渚分雲樹過南岳入洞庭春城帶􅀨長入行軍六第宅惜哉形勝地懐鎮水居河岳空金湯入衡州江州第十二戎馬暗天宇送魏六丈交廣落日九江流送李功曹荆州元惡迷是似入衡州化作長黃虬奉同郭給事安慶府第十三岸轉異江湖過南岳入洞庭江水流城郭春日梓州登樓䲭鴞志意滿病柏山􅀑獨一脚懐台州鄭戸魯港之遁第十四巳未鄂渚之戰何勇也魯港之遁何衰也人心巳去國事瓦觧當是時惟豪傑㧞起首禍之權奸無救禍之理哀哉岀師亦多門後岀塞水陸迷畏途贈鄭十八賁蹭蹬麒麟老贈射洪李四丈危檣逐夜烏過南岳入洞庭建康府第十五亭亭鳳凰臺鳯凰臺江城孤照日登牛頭山亭胡來滿彤宫徃在驅馬一萬匹北征相陳宜中第十六魯港敗後陳宜中當國首斬殿帥韓震脅遷之議差強人意宜中實無經綸至秋託故遁歸及不得已十月再來則國事去矣哀哉蒼生起謝安宴王使君宅翠華擁吳岳壮遊可以一木支水檻俯恐坤軸弱青陽峽召張世傑第十七京師内空頼張世傑一軍自荆湖至詔發西山将送郭中丞熊虎亘阡陌贈王思禮司空笳皷凝皇情贈左僕射嚴武佳氣向金闕北征鎮江之戰第十八張世傑率舟師趨金山約殿帥張彦自當州陸岀京口揚州兵岀􅀲洲三路交進同日用事既而揚州失期先岀取敗常州竟不岀世傑多海舟無風不能動江水平虜以水哨馬徃來如飛遂以潰敗嗚呼豈非天哉海潮舶千艘送王砅使南海肉食三十萬昔遊江平不肯流陪王使君泛江到今有遺恨壯遊将相棄國第十九丙子正月十八日虜至高亭山是夜四皷宜中逃翌日世傑逃扈聖登黄閣贈嚴八閣老大将赴朝廷草堂胡爲入雲霧送髙司且閬州浩蕩乘滄溟橋陵韻呈縣官京城第二十當宁䧟玉座徃在兩宫棄紫􅅔詠懐北城悲笳發夏夜歎失涕萬人揮送盧十四弟京城二十黄屋朔風卷故秘監蘇源明園林殺氣平送郭中丞太僕宫殿青門隔送賈閣老岀汝永懐丹鳳城送覃二判官陵􅆍第二十二五陵花滿眼别何邕霜露在草根閬州東樓􅄀􅄀子規呌法鏡寺重是古帝魂杜䳌陵􅆍第二十三旄頭彗紫㣲衡州縣呈陸宰蚩􅀹塞寒空奉先縣末懐愚智心盡死聽何氏歌漂蕩随高風遣興江陵第二十四高逹京湖名将己未觧圍鄂州賈似道許以建節竟不與而移以與吕文徳逹怨望乆矣至是爲京湖制置以城降宣閫不能制城初䧟朱禩孫仰藥不得死既而亦降焉聞說江陵府陜隘今又降元戎客居甲外控鳴鏑贈王司空思禮肩輿強老翁王十五前閣㑹淮西帥第二十五夏貴既失長江惟恐督府有成無所逃罪又恐孫虎臣以後進爲将有功􅄣綂出巳上日夜幸其敗覆督府既潰歸廬州竟不岀朝廷屢詔勤王􅀂罔聞知國亡乃以淮西全境獻北爲巳功焉於是貴年八十餘矣老而不死是爲賊其貴之謂歟借問大将誰後岀塞戰骨當速杇前岀塞逆節同所歸詠懐水花笑白首送王砅使南海􅀭州第二十六李庭芝在􅀭州十餘年畏怯無逺謀惟閉門自守無救於國及景炎登極以爲首相乃引兵輕岀渡海南歸朱煥尋以城獻虜哀哉城峻随天壁自帝城明來但自守潼􅀜史士卒終倒㦸贈王司空思禮仰望嗟嘆乆九成宫京湖兩淮第二十七東南兵力盡在江北金城湯池國之根本高以荆州降夏以淮西降李死淮東盡失無復中原之望矣哀哉荆揚風􅁟暖秋行官張望大城鐡不如潼関吏泰山忽破碎登慈恩塔流落随丘墟五盤景炎擁立第二十八予自蘇州歸闕建議岀二王於閩廣及虜至二王方岀宫蘇刘義陸秀夫遇二王於温時陳宜中海船泊清㠗門諸人徃邀之共圗興復益王始建元帥及張世傑自定海至同趋三山以五月一日益王登極改元景炎漢運初中興述懐扶顛待柱石入衡州疇䏻􅀘天漏􅀉岑叅登階捧玉冊徃在福安府第二十九崔嵬扶桑日幽人闊㑹滄海潮桔柏渡傾都看黄屋送班司馬入京此意竟蕭條贈􅅊左丞幸海道第三十自三山登極世傑遣兵戰邵武大捷人心翕然世傑不爲守國計即治海船識者於是知其陋矣至冬聞警即浮海南去天下事是以不可復爲哀哉天王守大白九成宫立國自有􅆠前岀塞舎此復何之後遊脩覺寺巳具浮海航壮遊景炎賔天第三十一御舟離三山至惠州之甲子門駐焉巳而遷宫冨場丁丑冬虜舟來移次仙澳與戰得利尋望南去止碙川景炎賔天盖戊寅四月望日也嗚呼痛哉隂風西北來北征青海天軒輊送從第亞白水暮東流新安吏魂㫁蒼梧帝贈秘書監李邕祥興登極第三十二戊寅四月十七日衛王登極於碙川浮龍􅀝長津别蔡十四著作參錯走洲渚入衡州蒼梧雲正愁登慈恩塔初日翳復􅄍法鏡寺祥興第三十三六月世傑自碙川北還至崖山止焉厓山乃海中之山兩山相對延袤中一衣帶水山口如門世傑以爲形勝安之南遊炎海甸送魏六丈沃野開天庭橋陵韻呈縣官真龍竟寂寞雷乾坤水上萍衡州送李大夫祥興第三十四己卯正月十三日虜舟直造厓山世傑不守山門作一字陣以待之虜入山門作長蛇陣對之二月六日虜乗潮進攻半日而破死溺者數萬人哀哉弧矢暗江海草堂百萬化爲魚潼関吏帝子留遺恨過南岳入洞庭故園莾丘墟逃難祥興第三十五世傑於戰敗後乗霧􅀨晦􅄀以數舟遁去朱厓雲日高遣過風浪無晨暮懐台州鄭司戸􅄀􅄀翠龍駕􅀨今復在何許宿清溪驛祥興第三十六􅀄行朝有船千餘艘内大船極多張元帥大小船五百而二百舟失道乆而不至北人乍登舟嘔暈執􅃓矢不支待又水道生踈舟工進退失據使虜初至行朝乗其未集撃之蔑不勝矣行朝依山作一字陣幇縳不可復動於是不可以攻人而專受攻矣先是行朝以游舟數岀得小捷他船皆閩浙水手其心莫不欲南向􅀂南船摧鋒直前閩浙水手在北舟中必爲變則有盡殱之理惜世傑不知合變專守法嗚呼豈非天哉六龍忽蹉跎别唐十五誡川廣不可泝送汝陽王璡東風吹春水送程録事乾坤莾回互懐台州鄭司戸祥興第三十七幽燕盛用武昔遊六合巳一家後出塞眼穿當落日喜逹行在滄海有靈查喜晴祥興第三十八客從南􅈚來客從黄屋今在否留别張使君天高無消息幽人未忍即開口􅄒懐祥興第三十九南嶽配朱烏望北地軸爲之翻晦日尋崔戢皇網未爲絶北征雲臺誰􅂯論覧柏中丞官制陳宜中第四十丁丑冬御舟自謝女峽歸碙川陳宜中船相失莫知所之管􅁑本時湏别張十二建封經綸中興業述古有志乗鯨鰲送王砅使南海南紀阻歸檝贈李光弼張世傑第四十一世傑得士卒云毎言北方不可信故無降志閩之再造實頼其力然其人無逺志擁重兵厚貲惟務遠遁卒以䘮敗哀哉南國卷雲水舟中苦􅀬黄金傾有無遣懐蛟龍亦狼狽溪漲反復乃湏􅁷草堂張世傑第四十二長風駕高浪龍門􅅯蹇龍虎姿病柏蕭條猶在否止水遣懐寒日岀霧遲早發射洪蘇劉義第四十三蘇京湖老将雖岀吕氏乃心專在王室永嘉推戴實建大功後世傑用事志欝欝不得展其人剛躁不可近然能服義終始不失大節厓山與其子俱得脫亦不知所終驊騮事天子送高司直龍怒㧞老湫送􅅊十六評事皷枻視青旻􅀉薛三郎中烈風無時休登慈恩塔曽淵子第四十四曽淵子元貶雷州御舟南廵復與政事厓山之敗曽欲赴水爲􅂫父子所留同得脫其家竟沒虜後還五羊有人見其子雷􅀰者焉哀哉子􅀒經濟才别唐十五欝陶抱長䇿始華陽吕少府安得萬里風夏夜歎南圗回羽翮送嚴公入朝江丞相萬里第四十五先生居饒州虜入城先生投府第中池水死其弟萬頃於㕔事上􅀍執殺死哀哉星折台衡地送蘇州李長史斯文去矣休送王信州厓北湖光與天逺過洞庭屈注滄江流奉同郭給事趙倅􅄧發第四十六虜至池州倅􅄧發蜀人夫婦自經死風雷颯萬里大􅀨大江動我前水㑹渡青衿一憔悴衡州縣學名與日月懸陳拾遺故宅将軍王安節第四十七常州敗虜生􅀗王安節不屈而死虜謂過江以來武人忠義者惟王安節一人安節乃節度使王堅子也激烈傷雄才金華山􅀚直氣横乾坤别李義惆悵汙血駒別張建封見此忠孝門柏中丞降官制李安撫芾第四十八肯齋先生蜀人寓居衡陽乙亥留夣炎為潭帥夣炎歸相始起先生為代先生倉卒運掉城守甚備及城䧟先生殺其家人乃自焚死哀哉殺氣吹沅湘入衡州高興激荆衡李八判官城中賢府主課伐木千秋萬歳名夣李白李制置庭芝第四十九庭芝得爰立之命引兵至泰州為虜所困泰州孫九賣城庭芝􅀍執誅於揚州市雖無功於國一死為不􅀒國矣空留玉帳衛送嚴公那免白頭翁陪章留後死者長巳矣石壕吏淮海生清風送高司直姜都綂才第五十淮東猛将揚州前後主戰皆其人也及泰州破􅀍執虜愛其才勇啖以官爵不肯降罵諸􅀒國者臨刑含血以噴罵虜不絶口其英風義烈淮人言之無不傷歎惜哉屹然強冠敵贈王司空古人重守􅁁後岀塞惜哉功名忤薛大保死亦垂千年義鶻張制置珏第五十一蜀之徤将元與昝萬壽齊名昝降張獨不降行朝擢授制閫未知得拜命否蜀雖糜碎珏竟不降為左右所賣珏覺而逃遁􅀍囚鎻入北不肯屈後不知如何氣敵萬人将楊監􅀞鷹獨在天一隅遣懐向使國不忙九成宫功業竟何如别張建封陸樞宻秀夫第五十二字君實文筆英妙自維􅀭幕入朝京師䧟永嘉推戴有力及駐厓山兼宰相凡朝廷事皆秀夫潤色綱紀之厓山䧟與全家赴水死哀哉文彩􅃢瑚鈎奉同郭給事淑氣含公鼎張九齡烱烱一心在嚴武天水相與永渼陜西南臺勤王第五十三甲戌冬詔天下勤王予守章貢首􅀿詔意同志者當接踵而􅁬已而竟無􅀿者予遂以孤軍赴闕世亊不濟殆由於此哀哉出師亘長雲後岀塞盡驅詣闕下徃在首唱恢大義衡州縣學垂之俟來者蘇源明蘇州第五十四予領兵赴闕時陳宜中歸永嘉留丞相夣炎當國夣炎意不相楽岀予以制閫守呉門尋以獨松亊急陳丞相留丞相陳樞宻文龍連書趣还宿衛予不得已行未㡬姑蘇䧟哀哉嵯峨閶門北北遊朱旗散廣川餞裴二端控帶莾悠悠送韋十六評亊惨淡陵風煙草堂拜相第五十五予自吳門還遣守獨松戍餘杭丙子正月初二日除知臨安府辞不拜引輕兵至闕陳大義不得見十八夜宜中逃次日早子除樞宻使午拜丞相樞宻使都督諸路軍馬然亊巳無及無可柰何矣予不敢當亡國之名請有危難捐軀而已我來屬時危九成宫朝野色枯槁送長孫待御􅀝君金華省張九齡不在相逢早贈射洪李四丈岀使第五十六初宜中􅂪蔽外庭如遣使北軍求議和約見伯顔於長安堰已而不如約故虜徑至高亭山要以相見宜中遂逃上下皆莫知其詳予既辞相印不拜遂奉上命以議和為名在虜营虜強以降余見伯顔開陳大義詞氣慷慨虜頗傾動尋留不遣而丞相呉堅右丞賈餘􅂟同知樞宻院謝堂以下竟自納欵余責伯顔留使失信及数虜罪惡以死自誓而一無所及矣痛哉隔河見胡􅀐前岀塞朝進東門营後出塞皇皇使臣體􅀉崔部亊詞氣浩縱横春陵行發京師第五十七自國都失守􅀿降表及行下省札播告歸附皆不敢使余聞知予居虜中欲求速死虜衛守甚嚴務為􅂗塞耳目二月八日大臣吳堅賈餘􅂟家鉉翁刘岊皆以祈請使為名下船詣北庭虜忽驅余並行余不肯徃􅀍其捽迫不得巳行至謝村㡬逃去東下姑蘇臺壮遊揮涕戀行在北征蒼茫雲霧浮發秦州風㠶􅀝翠盖凼人去鎮江第五十八余至京口北行有日矣余欲引决同行士杜滸曰且逃逃不􅀗死未晚也遂謀走真州時江中皆北船偶物色一空船在虜籍外捐重貲約之二月晦日夕一更後予約同行十一人潜岀邸挾刃自随不済則自殺幸而安行無虞遂泝流而上虜船綿亘江上㡬不得出三月朔抵真州今而後喜可知也京口渡江航送許八十遺窮途仗神道送魏六丈蕭條向水陸入衡州雲􅀨白浩浩送長孫侍御至真州第五十九余至真州登城四望徘徊感歎守苗再成慷慨有志畧聞余言踴躍思􅁬余即作書報制閫李庭芝及約淮西夏貴又作諸州太守書約以興復苗守遣人四岀導意兩日乆與余講進取方畧使天命再宋是行也中興之機也一人狐疑亊乃大繆惜哉萬里長江􅁁送高司直去國同王􅙾蓬泉驛青山意不盡上牛頭寺皇天照嗟嘆舟中苦􅀬行淮東第六十李庭芝聞余至真州以為來說城遣使数十軰來涖殺予苗再成不肯然不得不岀予以自白以上巳日紿余岀城門閉城不荅余欲赴濠死未㡬苗遣五十人送行行五十里布刃於野詰問甚乆使一語可疑即為草間血矣其人信余言為之歎惋送至州境夜至􅀭州西門欲扣城入前􅁍􅂾四四人逃去余與七人走荒野空屋中是日虜萬􅀐自屋後過幸而苟免自是変姓名趨高郵初五夜行屡迷失道且虜哨各鳥獸竄伏縳去一人殺傷一人又幸喜脫余時日夜在死亡中驚惴危懼飢餓無􅂓人生逆境有如此者哀哉客子中夜發赴奉先縣月照白水山彭衙行悲辛但狂頋懐鄭十八戸處浩蕩前後間清溪自淮歸浙東第六十一余高郵道中遇哨得脫行数十里匍匐不䏻行幸遇村夫雇倩籮擡入郡又有􅀍傷者扶持強行血衣淋漓見者傷惜初七日至郡地分官盤詰甚至稱制置司有報文丞相來說城合一路覺察不納南來人余等既変姓名地分官見有傷者不疑聽下船去沿途歴盡艱險得至泰州城下伏十餘日趋通州自下船後哨􅀐或隔五里或隔十里驚惶連日逹通州城反覆詰問􅂾日不納不得已從地分官􅄍實語太守楊思復遂得覆䕶主圃子内大舟中然後以海舟送歸浙東船中遇風波屡覆又遇賊追逼数四是行􅀉一生於萬死不復望見天日至永嘉惟存六人北走驚險難彭衙行十歩一回首相從歌碧海吹衣裳又上後園山脚掛席上南斗别張使君至福安第六十二益王以天下兵馬都无帥衞王以副元帥建號於永嘉随趋三山開府予四月八日到永嘉則元帥舟去巳一月矣亟使副守李珏驛報行府陳丞相即遣人來議擁立亊余􅀷賛大議五月一日登極予以􅀚文殿學士侍讀召赴行在二十六日至行都即􅂯相然國方草創陳宜中尸其亊專制於張世傑余名宰相徒取􅂶位遂不敢拜議岀督握節漢臣回鄭駙馬麻鞋見天子述懐感激動四極嚴武壮士淚如􅀨聽楊氏歌福安宰相第六十三余至通州地分官以制置司文移爲說甚作難阻余不得已􅄍實以通楊帥守思復乃云諜報許浦有馬根尋文丞相甚信余言不直制司予然後得楊守存恤遂遵南歸及過明州東門有列岸数百艘初不知為虜把隘船也後問之東門道士云是目虜頭目見船過聞左右曰此何船皆以漁舟對遂得善去嗚呼危哉楊守為余言欲得海船数百艘當約許帥文徳擁兵勤王慨然有誓清之志予至永嘉即詳報陳丞相不以為信乃遣毛浚之通州而不以告余浚至通州守間予何以無書遂發怒浚㡬不免浚岀而通遂降虜矣惜哉紛然䘮亂際柏中􅁢制反覆歸聖朝鄭䖍秉鈞孰為偶贈李八判官扶顛永蕭條李光弼南劒州督第六十四始余至永嘉留一月候命永嘉及台處豪傑皆來自獻願從海道作戰守規模予至福安欲还永嘉謀進取廟謨不以為然遂議開督于廣廣䧟乃出南劒開府聚兵財爲收復江西計于時幕府選辟皆一時名士宜中既棄臨安及三山登極欲􅀝世傑復浙東西以自洗濯所以阻予永嘉之行後取定海兵敗李珏為制閫衆方思用予悔巳不及惜哉劒外春天逺送班司馬入京江閣鄰石靣蕳嚴雲幕府盛才賢次古城店意氣今誰見白馬汀州第六十五予在劒朝廷嚴趣之汀十月行十一月至汀州而福安随䧟車駕幸海道矣亊㑹之不齊如此哀哉雷霆走精銳送樊侍御斧􅃏下青􅄀送李大夫江城今夜客出郭惨淡飛雲汀薛判官梅州第六十六予至汀汀守可疑汀兵非素所拊循㓂兵自贑自劒交至丁丑正月行府遂引兵趨漳州龍巖謀入衛漳潮道阻三月入梅州時麾下頗不循法斬二都綂軍政一新焉楼角凌風逈東楼孤城􅀮霧􅀷野望萬亊随轉燭佳人秋光近青岑伐木贑州第六十七五月引兵自梅出嶺時贑吉兵皆來㑹六月大捷於雩都進攻興國縣縣返正於是駐屯遣大兵攻贑州又以偏師岀吉州贑諸縣皆復虜號令惟行於城中吉水永豐萬安永新龍泉以次皆復臨洪􅀽瑞莫不響􅀿詣軍門請約束者相継興國黄州新復皆來請命汀州有偽天子黃從斬首至府上下翕合氣勢甚盛天􅀂祚宋則是舉也幸而一捷國亊垂成之候也崆峒殺氣黒壮遊灑血暗郊垌薛判官哀笳曉幽咽留花門石壁断空青西閣江西第六十八行府偏師岀吉州者戰于鍾歩不利攻贑兵不幸相継而敗行府孤立時處置安撫鄒􅘶聚兵数萬在永豐境行府引兵就之㑹其軍亦潰而虜自後追及不可支雖人謀之不􅆇殆天意之未順每一念此氣殪欲絶哀哉東望西江永第􅀚高義在雲臺建封到今用􅃏地草堂霜鴻有餘哀金華山江西第六十九旄頭初俶􅅰将適江陵義士皆痛憤草堂乾坤空峥嵘􅀞鶻嚮者留遺恨空靈岸復入廣第七十行府敗於江西收散兵復入汀尋岀㑹昌入安逺趨循州是冬屯南嶺戊寅二月岀惠州海豐縣駐於麗江涌徧遣間使沿海訪問車駕六月翠華至厓山行府移船澳八月進少保信國公職任依舊行府欲赴闕張世傑阻隔於中不果行東浮滄海漘薛郎中南為祝融客詠懐漂轉混泥沙柴門迫此短景急龍門駐惠境第七十一朱鳯日威垂北風羅浮展衰歩詠懐北風吹蒹葭秋行官張望送此齒􅄠暮􅀨駐潮陽第七十二十月引兵趋朝陽稍平群盗人心翕然寒城朝煙淡呉侍御宅江沫擁春沙逺遊群盗亂射虎雷回首白日斜熹晴同府之敗第七十三十一月諜報虜大衆至漳泉度势不敵移屯将趋海豐為虜􅀐追及於中道時行巳数日不為備倉卒潰散遂􅀍執送兵五千人北征散足盡兩靡種萵苣留滯一老翁􅀨盖棺亊則巳奉先縣行府之敗第七十四自國難後行府白手起兵展轉患難東南䟦渉萬餘里亊不幸不濟然臣子盡心焉爾矣成敗天也獨柰何哉翠盖􅂪塵飛詠懐仗􅃏􅁬忠烈北征千秋滄海南張九齡亊與雲水白王思禮南海第七十五今􅀍執後即服腦子約二兩昏眩乆之竟不䏻死及至張元帥所衆脅之跪拜誓死不屈張遂以客禮見尋置海船中守䕶甚謹至厓山令作書招張世傑手冩詩一首復命末句云人生自古誰無死留取聲名照漢青張不強而止厓山之敗親所目撃痛苦酷罰無以勝堪時日夕謀䧟海而防閉不可出矣失此一死困苦至於今日可勝恨哉開㠶駕洪濤遣遇血戰乾坤赤送李判官風􅀨聞號呼草堂流涕灑丹極别蔡著作南海第七十六南海春天外送叚功曹秪􅀿學水仙舟中自傷遅暮眼寓目為我一澘然李使君至廣州第七十七自厓山至五羊壮哉郡真形勝之國也徃年虜平其城收復後不䏻完整為守國計哀哉吾國之無人乎南方瘴癘地雷白馬東北來白馬長城掃遺堞李弼涙落強徘徊鄭附馬楼臺至南安軍第七十八予四月二十二日離五羊五月四日岀梅嶺至南安軍錀置舟中予不食擬至虜陵得􅉂日庻㡬首丘之義云短日行梅嶺􅂘李常侍天門欝嵯峨别唐誡江西萬里船春夜留宴歸期無柰何何将軍山林過章貢第七十九崆峒地無軸送從弟亞江山雲霧昏别李茂萍漂􅃘流涕入行軍六弟宅故里但空存後岀塞至吉州第八十掛颿逺色外􅀨􅃡邈懐舊丘破船江水風蕭蕭桔柏渡烏啼滿城頭發秦州吉州第八十一泊舟滄江岸課伐木身輕一鳥過送蔡師魯請為父老歌羗村歌長撃樽破屏跡吉州第八十二戚戚去故里前岀塞我生苦飄零通泉驛回身視緑野送李校書伹見西嶺青揚旗過臨江第八十三自離南安軍五日而至廬陵七日過臨江八日至豐城余雖不食未見其殆衆以飲食交相逼迫予念既過鄕州巳失初望委命荒濵立節不白且聞暫止金陵郡岀坎之㑹或者有隕自天未可知也遂復飮食勉狥衆情初衆議以予漸殆欲行無禮掩鼻以􅈅粥酪至是遂止乃知夷齊之心亊由其獨處荒山故得行其志耳獨㠶如飛鳴贈蘇傒清江轉山急早發射洪回首白雲多何􅀅軍山林山寒夜中泣龍門鎮過􅂭興第八十四􅂭興自䧟沒後忠義􅁬起㡬於返正屠㓕殆盡過而傷之臨江乆徘徊山寺再讀徐孺碑張九齡交遊颯向盡餞裴二端公到今􅂄舊悲病橘江行第八十五畏途随長江白沙渡萬里滄茫水憶鄭南玭遊子去日長成都壮心不肯巳戯贈友江行第八十六江水東流去陪王侍御宴浮雲終日行夣李白别離經死地鄭附馬池飮啄愧殘生草堂江行第八十七蕭蕭白􅀭路李邕死人積如丘遣興大江東流去成都蒼山旌斾愁􅅊評亊江行第八十八連山暗烽燧送從第亞川谷血横流送樊侍御揮泪臨大江送􅅊諷上有行雲愁遣興江行第八十九六月六日過􅂭興十二日至金陵囚邸八月二十三日渡江北行亊㑹多有可慨尚何言哉朔風飄胡鴈遣興江城􅅁素月聽楊氏歌安得覆八􅈚客居滂泥洗吳越喜􅀨北行第九十八月二十六日至揚州九月初一日􅂘母小祥於邳門外初九日至徐州弔項羽故宫地登黄楼臺讀子由賦十二日至沛縣縣有歌風臺十五日至東平府十七日至高唐州十八日過平原二十日至河間府二十一日至保定府浮雲暮南征前出塞我馬向比嘶日沙渡荆􅁄暗長原園官送莱子規晝夜啼客居北行第九十一清秋望不極野望中原杳茫茫成都游子悵寂寥桔柏渡下馬古戰場遣興北行第九十二浮雲連海岱兖州城楼寒蕪際碣石昔遊落景惜登臨杜侍御江楼人煙􅄅蕭瑟北征北行第九十三平野入青徐兖州城楼桑柘葉如􅀨昔遊信美無所適成都沉思情延佇􅀨北行第九十四乾坤㡬反覆蘇侍御渙乗凌惜俄頃渼陂西南臺懐古視平蕪遣懐令人發􅀷省奉先寺北行第九十五游子無根株贈李四文世梗悲路澀送程録亊関山雪􅁁看秋行官張望愁思胡笳夕喜逹行在所至燕城第九十六十月一日至燕城越五日送千戸所枷禁十一月初一日蘇枷初九日領赴北庭引問余不跪抗詞不屈尋復還獄待死以至今日云徃在西京時徃在胡星墜燕地别唐誠登臨意惘然登惠義千秋一拭涙酧薛判官至燕城第九十七浩蕩想幽冀夏日歎行行郡國遥野望天寒落萬里遣興回首向風颷至燕城第九十八百年不敢料龍門閤先後無醜好遣興絶境與誰同送裴二飄泊南庭老舟中入獄第九十九隂房􅀑火青玉華宫白日亦寂寞昔遊自非曠士懐登慈恩塔居人莾牢落送樊侍御入獄第一百天黒閉春院大雲寺今如􅆯中兎懐鄭司戸人間夜寥閴夜聽許十誦許永日不可暮夏夜歎入獄第一百一行行見覊束寫懐斯人獨憔悴夣李白欲覺聞晨鍾遊奉先寺青燈死分翳宿鑿石浦入獄第百二劳生共乾坤寫懐何時有終極别賛上人燈影照無睡大雲寺今夕復何夕贈衛公處士入獄第一百三眼前列杻械草堂熊掛玄蛇吼上水遣懐夜看豐城氣詠懐朝光入甕牗晦月入獄第一百四徘徊虎穴上􅀉賛上人吾道正覊束觀水漲落日将何如宴歴下亭清文動哀玉别薛判官懐舊第一百五自百五至百九皆懐念故人為王亊而沒者固多不䏻盡紀嗚呼哀哉自百二十六至百三十八皆師友之際同列之情死生契闊不䏻自已也風塵淹白日􅀉第五弟乾坤霾漲海将􅆘江陵為我問故人送高司直離别今誰在懐灞上遊懐舊第一百六天寒昏無日石龕故鄕不可思赤思訪舊半為􅀑贈衛處士惨惨中膓悲送方書記懐舊第一百七故園花自彂憶弟無復故人來昔遊乱離朋友盡遣懐幽珮為誰哀􅀨懐舊第一百八故人入我夣夣李白相視涕闌干彭衙行四海一􅂗炭逃難焉用身獨完垂老別懐舊第一百九中夜懐朋友宿清溪驛百年見存沒鄭公䖍風吹蒼江􅀣􅀨寒月照白骨北征金􅀿第一百一十承信郎路分金􅀿元備筆扎使令性剛知義随勤王入京余䧟虜左右星散惟􅀿無叛去志在鎮江得同脫狼狽淮東備嘗艱苦至通州以􅁨欝病死葬城下哀哉追随三十載送顧文學艱難愧􅀷情􅆧材何處埋爾骨鹿頭山呼號傍孤城懐鄭司戸張雲第一百一十一路鈐張雲元吉州敢勇将官随閫勤王余既䧟虜張雲引兵自婺建劒汀歸里虜巳據吉城雲不勝憤七月引所部袭虜於南柵門擊殺甚衆本爲散退之計㑹天明戰渇赴江飲水尋􅀍衝溺死使䏻少忍當爲吾用哀哉痛憤􅀉所宣義鶻四方服勇决北征壮士歛精魂客居里巷猶嗚咽赴奉先縣劉欽貢元第一百一十二字敬徳吉州貢士素有志氣好功名上下今古徤於議論余開府汀城敬徳來寕都就招諭使鄒􅘶㑹虜􅁀至竟死乱兵中同時死者鞠華叔顔斯立顔起巖皆郡之英俊䏻爲時立亊功者天生人才􅀂此曽未施一技速折乃爾哀哉文章日自􅀒蘇公源明去家死路傍上後園山脚高視見覇王劒門感子故意長贈衛處士吕武第一百一十三環衛官吕武太平人靣旗爲軍余䧟虜􅀿募随從北行其人勁烈靣折人觸忌諱不避然忠鯁人皆服之余與同脫鎮江行淮東患難中頼以自壮及開府南劒遣其結約江淮道尋阻武間関数千里即余於汀梅挺身㓂寨化賊為兵方将将数千人出江西以無禮於士大夫遭横逆死死之日一軍為流涕哀哉疾惡懐剛腸壮遊世人皆欲殺不見魂魄猶正直南池回首肺肝􅀬鐡堂鞏宣使信第一百一十四團練使都統招諭使鞏信荆湖老􅀅沉勇有謀奉朝命引所部随府予自興國趋永豐虜追在後於東固方石嶺下失戰信據險堅立不動中数箭死􅁟人葬之如生尋奏贈清逺軍承宣使立廟戰所而迄未有以慰忠魂也哀哉壮士血相視嚴公武斯人巳云亡楊監草書圗哀哀失木􅎜呉侍郎江上宅夜􅀷經戰場北征張秘撰汴第一百一十五秘閤􅁱撰廣東提舉督府参謀張汴蜀人嘗為二呉客佐荆湖幕習兵亊予自贑勤王汴即入幕開督後領䄂一府知無不為空坑之敗秘撰易軍士皂衣伏草中死乱兵後鄒處置得其尸棺歛焉哀哉入幕旌旗動别魏侍郎揮翰綺繡揚汝陽王璡煙霧􅂪玉質赴奉先縣斯人今則亡遣興繆朝宗第一百一十六環衛官知梅州繆朝宗淮人有意氣嘗為常熟邠氏客從余於平江予歸福安自婺間道來相從精練幹实孜孜奉公軍府器械悉岀其手空坑之敗自經於山間哀哉空荒咆熊羆課伐木摧殘沒藜莠枯棲平生江海心破船其人骨巳杇喜晴閩三士第一百一十七督機秘書謝􅂎督幹架閣許由督幹架閣李㓜節閩士之秀皆登科􅂎太學名士空坑之敗不知所終哀哉俊逸鮑参軍憶李白􅄖游謝康樂石櫃閣􅉘虎正縱横乆客南行道彌惡青陽陜諸幕客第一百一十八督府架閣吳文煥督遣林棟等皆閩士有幹實宣劳幕府空坑之敗􅀍執尋遇害哀哉入幕未展才贈李八判官辛苦在道路送高司直回首一茫茫送李判官風悲浮雲去遣興趙太監時賞第一百一十九直寳章閣軍噐太監督府参議官江西招討副使趙時賞宗室有志氣首宰旌徳以一縣抗虜数有功京師䧟入閩行朝擢知邵武軍以棄城罪去自余開督随府典兵数将偏師以當一靣神采明雋議論慷慨空坑之敗走之吳溪尋􅀍執於􅂭興遇害哀哉豪傑貴勲業送殿中楊豊宗支神堯後贈李入判官平生白羽扇嚴武公欝結回我首述懐劉沐第一百二十宣教郎督府機宜帶行大府寺簿刘沐字淵伯予隣曲朋友從勤王􅀘官予䧟淵伯領諸軍還及予歸國淵伯收部曲赴府㑹於汀專将一軍為督帳親衛沉實有謀圓機􅀿物凢江西忠義皆淵伯所號召晝夜酬􅀿精力不倦㑹病劇乍起空坑之敗不得脫遇害於􅂭興長子同日刑次子貢元死空坑乱兵余收其第三㓜子亦沒於廣哀哉王翰願􅁲隣贈韋左丞稽康不得死遣興落月滿屋梁夣李白悲風為我起金華山􅀚孫􅙫第一百二十一宣教郞帶行監官告院知吉州龍泉縣孫􅙫予長妹夫也予引兵岀贑其邑人奉􅙫以邑返正尋為親黨所䧟遇害於􅂭興哀哉故人有孫宰彭衙行義均骨肉地餞裴二端分連為糞􅁟叢徃在揮手灑衰泪别建封彭司令震龍第一百二十二宣教郎帶行大社令知吉州永新縣彭震龍予次妹夫也性跌宕喜功名起兵随勤王及帰郡邑巳䧟乃結湖南諸峒豪傑謀興復余岀江西即以縣返正虜遣軍攻之其親黨内􅀿􅀍執遇害於郡城哀㢤堂上㑹親戚送李校書可憐馬上􅀰白馬呻吟更流血北征干戈浩茫茫南池䔥從事燾夫第一百二十三從亊郎䔥燾夫永新人工詩與字從予山中乆其兄敬夫詩􅀹豪俊亦嘗客吾門燾夫從勤王得官及歸賛彭司令收復郷邑規以正道予至興國詣府白亊意氣慷慨邑城䧟兄弟俱不免哀㢤灑翰銀鈎連陳合遺故宅翩躚山顛鶴西閣曝日惨淡􅃲龍蛇喜晴及兹歎􅄀漠青陽候䔥架閣第一百二十四督幹架閣監軍䔥明哲字元甫吉州貢士性剛毅遇亊有膽氣明於大節予至汀梅來從督府幕及出江西監贑縣義兵收復萬安縣尋復龍泉行府敗元甫入野陂連結諸寨拒虜􅀍執死於洪哀哉諸生􅃇短􅄄橋陵張目視冦讐送韋評亊髙義終焉在送王信州白骨更何􅁨得弟􅀚書陳督幹第一百二十五督幹監軍陳子敬贑人以貲力雄郷里舊從予逰行府至汀子敬招集義兵置屯皂口以㩀贑下流以遏虜船徃來及行府攻贑子敬行其謀功效甚著行府敗舉兵黄塘連結山寨不降重兵袭潰不聞􅀁終哀哉挺身艱難際送韋評亊虎穴連里閭課伐木髙天意悽惻送韋諷同盡随丘墟謁文公上方陳少卿第一百二十六帶行太府少卿福建提刑督府参議官陳龍復泉州老儒號清陂先生丙辰登科沈厚朴茂有前軰風流平生􅀁歷州縣皆以清儉著名余開府南劍辟入幕老成重一府尋遣徃漳潮計亊行府自江南再入廣先生聚兵循梅來㑹後分司潮陽􅀿接諸路四方豪傑翕然響􅀿積糧治兵行府由是趍潮陽及移屯爲虜􅀁追袭先生遂不免時年七十三哀哉卿月昇金掌江陵送髙大卿老氣横九州送韋評亊前軰復誰紀李公邕吾道長悠悠發秦州鄒䖏置第一百二十七兵部侍􅀰江東西䖏置副使督府参賛軍亊鄒􅘶字鳯叔吉水人慷慨有大志以豪俠行䑓郡間從予勤王􅀘武資至􅀅軍景炎換文以寺丞領江西招諭副使聚兵寕都氣􅀔甚盛寕都􅀍執変姓名為卜者虜不知其為招諭使也入贑城得脱尋聚兵永豐興國間行府奏授江西安撫副使統兵数萬攻興國縣尋㑹行府至縣返正别軍復永豐進授江東西䖏置副使屯兵永豐境上以烏合一日而潰行府失􅂇於是有空坑之敗哀哉東郊暗長戰吴侍御江上宅死地脫斯須􅀅適江陵􅁃公興不淺張九齡居然屈壮圗别蘇溪鄒䖏置第一百二十八行府再入廣奏以公充都督府分司置司永豐興國間接􅀿江淮虜自􅂭興遣大兵攻袭公萬死一生備經艱難竟得脫引江西兵入廣㑹行府於潮陽及移屯公爲殿亊岀不虞虜至麾下火急自剄扶入南嶺踰十日死是行公􅀁􅀅皆江西頭目以取行府爲名使行府入江西十萬衆立辦天之未啓中興也柰何公有子甚俊先卒家人散失無餘公嘗謂予欲立富田鄒氏子爲嗣不果至是絶哀哉方當用節􅃏相中􅁢不返舊征魂東楼凄凉餘部曲送郭中丞發聲爲爾吞别李義劉監簿第一百二十九宣教􅀰帶行軍噐監簿督府機宜刘子俊字民章吾郷之傑也嘗領漕貢余開督興國民章來計亊行府敗民章收散兵於洞源接􅀿諸郡縣尋引軍入廣道遇虜潰亡未㡬再招集與鄒䖏置同詣行府㑹於潮陽越二十日而行府敗民章􅀍執莫知􅀁終哀哉艱難􅁬長戰潼関吏髙義薄行雲􅀞街行死為殊方􅄦客堂三夜頻夣君夣李白劉監簿第一百三十秀氣衝星斗贈李八丈壮筆過飛泉李十五丈舊遊易磨㓕汝陽王璡魂傷山寂然妻子入蜀䔥資第一百三十一閤門路鈴䔥資本書吏也小年給使令稍長通文墨圎機善䖏亊性和厚上下信爱予家先避地入廣資於難中扶持盡力及行府江西之敗衛護大夫人全督府印有功後在兵間調和諸􅀅􅀿府中碎務皆其領攝腹心之良也潮陽移屯道遇虜資以病体􅀍害哀哉王當風雲㑹病栢謝爾從者劳遣興感恩義不小送廬侍郎魂獨委蓬嵩送王砅杜大卿滸第一百三十二司農卿廣東提舉招討副使督府謀官杜滸字貴卿丞相立齋之姪也性剛猛為㳺俠京師予北行滸願從鎮江之脫滸之力也匍匐淮甸衛護艱虞忠劳備盡嗚呼可謂義士昔沒賊中時送韋評亊中夜間道歸後出塞辛苦救衰朽遭田父泥飲㣲爾人盡非北征杜大卿滸第一百三十三滸從予南還佐府南劍尋遣徃台温招集兵財福安䧟相失滸趍行朝乆之奉朝命至行府值江西之敗又與䟦渉艱難者年餘及得府移屯潮陽滸護海舟尋趍厓山與行府遂隔及厓山潰滸并䧟焉余至五羊滸來見病無復人形在虜網羅中無􅀁容力尋聞死焉哀哉髙随海上查夜宴子豈無扁舟􅀉薛􅀰中白日照執􅃑送樊侍御埋骨巳經秋破船徐榛第一百三十四詩􅆣正􅀅徐榛温州人其父官湖北榛徃省迷失道歸行府後生精練以筆扎典機宻小心可信予􅀍執榛得脫自惠州來五羊願從北行扶持患難備殫忠欵道病至豐城死焉林檢院􅄾第一百三十五宣教􅀰督機檢院林􅄾閩士余屯餘杭時􅄾結集赭山忠義捍禦海道得官及南劍開府􅄾來外有文采内甚忠实数随患難劳而不怨及行府湖陽之敗􅄾不䏻脫虜屯惠境逃去尋又􅀍􅀗虜遇之不以禮至建康病死虜自謂􅄾不肯自爱如於沿道浸水務自殘㓕之􅁼􅄾可謂不降其志者矣哀哉時危挹佳士貽柳少府惨淡随回鶻北征佯狂真可哀不見死淚終映睫李光弼曽先生第一百三十六秀峰曽先生鳯予師也太學釋􅄄累遷監丞㑹京師亂走衢衢尋䧟及景炎登極衢添倅䔥雷龍首倡返正先生自衢來劍随行府之汀丁丑春以梅州添差通判􅀅行㑹行府移屯先生挈家避地於汀之郷落六月以病死其子三貴自吉來奔䘮不䏻返䘮幸其一家歸至瑞金三貴復病死於道先生妻亦卒惟女在不知􅀁之先生遭值虜難以清文粹徳一不施於世流落以死家乃俱䘮哀哉江海日凄凉遣興賢聖盡䔥索西関西河共風味衡山縣學顧歩涕横落郭代公故宅鄧禮部第一百三十七光薦字中甫予郡人自虜度嶺及廣䧟避地深山適強冦至妻子兒女等匿暗室冦無􅀁暏焚其居十二口同時死中甫随駕至厓山除禮部侍􅀰巳卯春除斈士院􅁠直未数日虜至厓山潰中甫赴海虜舟㧞出之張元帥待以客禮與余俱岀嶺别於建康嗚呼中甫禍難之􅆭不减予而獨免北行幸而脫歸為管寕為陶潜不亦善乎南宫無故人才名三十年問鄭景文江城秋日落贈侍􅀰四舅此别意蒼然送􅅊書記家樞宻鉉翁第一百三十八則堂先生家鉉翁蜀名家有學問舉動必以禮朝中老成典刑也當國都不守先生簽書樞宻見虜持正議左丞相吴堅右丞相賈餘􅂟以省札遍告天下令以城歸附先生不押字虜自省中脅以無禮公不為動竟末如之何後以祈請使為名群詣北庭既至上書申祈請之議忤北庭意留燕邸巳而移漁陽又移河間如我朝覊置特官給飲食而已余過河間得一二相見先生風采非復宿昔而忠貞儼然使人望而知敬嗚呼其可謂正人矣岀䖏同世網鄭公䖍高􅁩邁等倫别蔡著作異方驚㑹靣送􅅊别駕慰此真良臣􅀉唐使君墳墓第一百三十九予甲戌春自衡陽憲節歸赴贑州省拜墳墓及乙亥五月奔祖母䘮至門以起復六月望日岀從戎亊與宗族郷黨永訣云别離巳五年贈蘇四不及祖父茔後園山脚霜露晚凄凄岀郭痛􅂘松風廻北征宗族第一百四十西江接錦城送李粛山隂一茅宇遣興宗族忍相遺送崔都水乾坤此深阻􅀫清溪驛母第一百四十一先母齊魏國大夫人盖自虜難後弟璧奉侍赴惠州弟璋從焉已而之廣之循之梅余來梅州母子兄弟始相見既而魚軒岀江西尋復入廣夫人遊二子間無適無莫雖兵革紛􅅰䖏之怡然戊寅行府駐船澳弟璧仍知惠州弟璋復在侍夫人薬八月兩國之命下時巳得疾九月七日寅時薨逝弟璧卜地於惠循之深山間不肖孤巳矣未有返葬夫人期不知二弟何時畢此大亊身䧟萬里縲絏中􅀊時南望嗚咽云何時太夫人送李校書上天回哀眷大􅀨墓乆狐兎隣汝陽王璡嗚呼淚如霰白馬舅一百四十二予以楚囚過西昌聞舅家机􅑾自是南望孤雲每念我母不勝渭陽之情萱草秋巳死從孫済􅀊暮有嚴霜北遊落日渭陽情送翁統軍涕淚濺我裳貼華陽李少府妻第一百四十三丁丑八月十七日空坑之敗夫人歐陽氏女柳娘環娘子佛生環之生母顔佛之生母黄並䧟失尋聞自􅂭興北行惟佛生巳死人世禍難有如此者哀哉結髪為妻子新婚别倉皇避乱兵破船生離與死别别賀蘭銛回首涙縱横示宗文宗武二女第一百四十四床前兩小女北征各在天一厓送髙書記􅀁愧為人父赴奉先縣風物長年悲送楊監入蜀次子第一百四十五渥洼騏􅂹兒送李校書衆中見毛骨送魏六丈别來怱三載四松殘害為異物北征妻子第一百四十六妻子隔絶乆􅄒懐飄颻􅀂埃塵􅀉薛郎中漠漠世間黒贈蜀僧性命由地人懐鄭司戸妻子第一百四十七世乱遭飄蕩􅆧村飛藿共徘徊昔逰十口隔風雪赴奉先縣反畏消息來􅄒懐長妹第一百四十八余長妹適孫氏不幸孫氏傾覆家沒入燕妹奉孫氏生母携子肖翁約翁及一女零丁孤苦客食萬里妹雖患難中侍飬撫教各盡其所可謂賢矣哀哉聞韋氏妹元日零落依草木佳人深􅀒鶺鴒詩得舎弟消息臨風欲痛􅂘閬州東楼長子第一百四十九予二子長曰道生姿性可教不幸乱離随家飄泊空坑之敗䏻脫身自全鍾爱於大夫人以疾後大夫人六十日死於恵陽郡治中生十三年矣哀哉大兒聦明到刘少府山水障青􅀊巳摧頺昔逰回風吹獨􅀣樊侍御吾寕舎一哀赴奉先縣二女第一百五十予六女長定娘次柳娘次環娘次監娘次奉娘次寿娘丙子定娘寿娘以病死於河源之三角丁丑柳娘環娘䧟惟監娘奉娘得存戊寅潮陽之敗復死亂兵中哀哉癡女飢咬我彭衙行欝沒一悲魂遣懐不得收骨肉佳人痛􅂘蒼烟根送樊侍御弟第一百五十一余二弟長璧次璋璋自船澳奉母䘮趍惠州别璧来五羊别自是骨肉因縁堕寥廓矣哀哉兄弟分離苦送弟頻凄凉憶去年􅀝杖何以有羽翼夣李白飛去墮爾前彭衙行弟第一百五十二棣華晴􅀨好和宋太少府風急手足寒水㑹渡百戰今誰在憶弟覊捿見汝難􅀉弟弟第一百五十三沙晚鶺鴒寒􅀉弟豊風吹紫荆􅀣得弟消息忍涙獨含情郭中丞江湖春欲暮宴胡侍􅀰弟第一百五十四不見江東弟元日示宗武急難心惘然義鵠念君經世乱送班司馬入京卧病海雲􅁁􅀁思次妹第一百五十五予次妹自永新歸寕不與彭氏之難乱離中随母兩國夫人上下自船澳奉䘮趍惠陽兄妹不復見矣哀哉大際傷愁别岀郊江山憔悴人送孟倉曹團圎思弟妹又示兩兒傳語故郷春贈别何邕思故郷第一百五十六自一百五十六至一百六十二共七首皆思故郷懐故山之情余始創文山其間水石竹木䔥然有􅡞川盤谷之趣盖将終焉承平時郷曲賔朋日夕宴聚楽以忘􅁨真人世之清福今思之非惟平生故人半為塵􅁟而故郷萬里并隔世外惟死則魂識歸吾故郷耳哀哉天地西江逺送崔侍郎無家問死生憶舎弟凉風起天末憶李白萬里故郷情江楼宴第一百五十七江漢故人少贈弟賛善東西消息稀憶弟異花開絶域遊何􅀅軍山林野風吹征衣别賛上人第一百五十八老夫悲華年聴楊氏歌天涯故人少送弟每望東南雲遣興决􅗃入飛島望岳第一百五十九人生無家别無家别親故傷老醜述懐剪􅁓招我魂彭衙行何時一樽酒憶李白第一百六十春水滿南國遣寓惨淡故園烟陳拾遺三年門巷空遣興永為隣里憐草第一百六十一迢迢萬里餘前岀塞絶域誰慰懐贈李五丈我圃日蒼翠􅀨回首望兩厓柴門第一百六十二春日漲雲岑過津口故園當北斗月窈窕桃李花喜晴紛披為誰秀九日第一百六十三自一百六十三至一百九十一共二十九首雜然冩其本心陶潜避俗翁遣興龎公竟獨徃􅀨明明君臣契牽牛織女牢落吾安放鄭公䖍第一百六十四吴楚東南坼登岳陽楼風雲地一隅地隔蹉跎暮容色重過何氏不敢恨危途北風第一百六十五風煙􅄅吴蜀柴門雲㠶轉遼海後岀塞䘮乱紛嗷嗷遣寓尚愧㣲軀在與嚴二奉礼别第一百六十六驚風翻河漢有懐鶉首麗泥􅂗􅀅適江陵吾衰􅀅焉託遣懐愁絶付摧枯北征第一百六十七隂風千里來吴侍御江上宅驚浪滿吴楚􅀨世亊兩茫茫贈衞䖏士飄泊欲誰訴又􅀨第一百六十八平生方寸心舟中苦􅀬誓開玄􅄀北後出塞􅀊暮日月疾冩懐我嘆黒頭白酧薛判官第一百六十九今吾抱何恨贈别恨無匡復姿送樊侍郎含􅀏㸔吴鈎後岀塞回首蛟龍池詠懐第一百七十天長眺東南鄭公䖍衰謝多酸辛汝陽王璡丈夫誓許國前岀塞直筆在史臣李公光弼第一百七十一天衢隂峥嵘赴奉先縣􅀊寒心匪他送嚴使君平生獨徃願立秋後題零落首陽阿過宋之問舊荘第一百七十二済時肯殺身􅀉唐使君惨淡苦士志送李大夫百年䏻㢤何别唐誠終古立忠義陳拾遺故宅第一百七十三絶域三冬暮送十七舅垂老見飄零送李大夫林氣森噴薄過郭代公故宅意鍾老栢青送程録亊還郷第一百七十四仰㸔八尺軀别張建封不要懸黄金蘇公源明青青􅀊寒栢枯㧞乃知君子心張九齡第一百七十五小人困馳驟九日後生血氣豪遣懐世亊固堪論園官送芙我何随爾曹飛仙閣第一百七十六天地日蛙蠅張九齡劳生苦柰何餞嘉州程都督􅂓欲從此逝送樊侍御人少􅉘虎多别唐誡第一百七十七男兒生世間後出塞居然成濩落赴奉先縣鵉鳯有鎩翮􅀉唐使君虹蜺就掌握􅀭旗第一百七十八鵉凰不相待暇日小園白魚困宻網過津口但訝鹿皮翁遣興㝠㝠任􅀁徃蘇少保第一百七十九威鳯髙其翔尋崔戢老鶴萬里心遣興脫略誰䏻馴薛少保兀兀遂至今赴奉先縣第一百八十天寒霜雪繁赤谷䔥䔥北風勁􅆧村髙鳥黄雲暮送殷参軍斗上捩孤影義鶻第一百八十一乾坤沸嗷嗷送王砅名繋朱鳥影張九齡寥落寸心違送何侍御斯文亦吾病早發第一百八十二儒冠多誤身贈韋右丞識字用心苦阮􅀮居斯文􅁨患餘宿鑿石浦欝欝流年度􅀨第一百八十三名賢慎出䖏自施州歸志士懐感傷贈李四丈猶殘数行涙登牛頭山引古惜興亡壯遊第一百八十四讀書破萬卷贈韋右丞許身亦何愚赴奉先縣赤􅂹頓長纓􅄒古徤兒勝腐儒草堂第一百八十五䔥條四海内别唐誡慷慨有餘悲水檻路逢相識人前出塞開懐無愧辞詠懐第一百八十六高歌激宇宙衡山縣學􅀊晚寸心違贈韋賛善忠貞􅀒􅁈恨李公邕姦雄多是非詠懐第一百八十七丈夫四方志前出塞䘮乱飽經過寓目清心聴鳴鏑聴許十誦詩衰老强髙歌别唐誡第一百八十八茫然阮籍途早發射洪益歎身世拙北征零落蛟龍匣李公光弼開視化爲血客從第一百八十九天地有逆順崔少府惘然難乆留發秦州當歌欲一放尋崔戢河漢聲西流登慈恩塔第一百九十萬古一死生詠懐誰是長年者玉華宫我何良歎嗟塩井短􅄄即長夜遣興第一百九十一髙官何足論佳人寂寞身後亊夣李白物理固自然塩井願聞第一義謁文公上方歎世道第一百九十二自一百九十二起至二百泛然為世道感歎古來遭䘮乱西閣滕日丈夫多英雄牽牛織女悠悠委薄俗入衡州豈非吾道東贈蘇四第一百九十三蝮蛇暮􅅯蹇簡崔評亊猛虎慿其威遣興真宰意茫茫遣興六合人煙稀北風第一百九十四􅀺民困逆節登㐮上堂殘孽駐艱虞過南岳孰云網恢恢夣李白自及梟獍徒草堂第一百九十五眼中萬少年别張建封得志行􅀁為詠懐白馬蹴㣲雪遣興追随燕薊兒王公思礼第一百九十六客從何郷來病栢挾矢射漢月留花門殺身傍􅁠要三歌門戸有旌節遣興第一百九十七関河霜雪清送逺故人亦流落送裴五赴夷歌奉玉盤楊六判官悲君随燕雀贈何邕第一百九十八漁陽豪俠地後出塞圵里富熏天遣興快馬金纒轡送從弟亞但遇新少年遣懐第一百九十九南北逃世難逃難始聞蕃漢殊草堂天下今一家鹿須山中原有驅除留花門第二百茫茫天造間宿花石戍髙岸尚爲谷水檻百川日東流别賛上人􅀔閱人代速􅀚山川水漲文山先生全集卷之十六終
