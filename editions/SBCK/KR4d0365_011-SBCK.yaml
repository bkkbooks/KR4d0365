body:
  text: 講義西澗書院釋菜講義知瑞州目孟子曰人之患在好爲人師韓子犯之而世恠且罵柳子厚所謂惴惴然而不敢也某承乏此􅀖其於教化號爲有一日之責盖嘗告朔而􅂂乎學宫得聞諸君之所以授受者而親陟臯比與逢掖講師弟子禮則僣之爲􅀹書堂有事乎先賢諸君不鄙而固以請則雖寡陋夫焉得辭某􅀄􅀍命來守嘗啓政路曰古之爲諸侯先政化而後簿書期㑹世之不淑乃倒置此則相與病夫風俗之􅁦而士行不立且傷夫教道之乆廢而未有一救之也固嘗有及於君子德業之義而重反覆焉輙誦所聞并繹其㫖與諸君茂明之易曰君子進德脩業忠信所以進德也脩辭立其誠所以居業也中心之謂忠以實之謂信無妄之謂誠三者一道也夫所謂德者忠信而巳矣辭者德之表則立此忠信者脩辭而巳矣德是就心上説業是就事上説德者統言一善固德也自其一善以至於無一之不善亦德也德有等級故曰進忠信者實心之謂一念之實固忠信也自一念之實以至於無一念之不實亦忠信也忠信之心愈持飬則愈充實故曰忠信所以進德脩辭者謹􅅚其辭也辭之不可以妄發則謹􅅚之故脩辭所以立其誠誠即上靣忠信字居有守之之意盖一辭之誠固是忠信以一辭之妄間之則吾之業頓􅈥而徳亦随之矣故自其一辭之脩以至於無一辭之不脩則守之如一而無所作輟乃居業之義德業如形影德是存諸中者業是德之著於外者上言進下言脩業之脩所以爲德之表也上言脩業下言脩辭辭之脩即業之脩也以進德對脩業則脩是用力進是自然之進以進德對居業則進是未見其止居是守之不變惟其守之不變所以未見其止也辭之義有二發於言則爲言辭發於文則爲文辭子以四教文行忠信雖􅀂岐爲四者然文行安有離乎忠信有忠信之行自然有忠信之文能爲忠信之文方是不失忠信之行子曰言忠信行篤敬則忠信進德之謂也言忠信則脩辭立誠之謂也未有行篤敬而言不忠信者亦未有言不忠信而可以語行之篤敬者也天地間只一箇誠字更攧撲不碎􅀚德者只􅀚人之辭一句誠實便是一德句句誠實便是德進而不可禦人之於其辭也其可不謹其口之所自出而苟爲之哉嗟乎聖學浸逺人僞交作而言之無稽甚矣誕謾而無當謂之大言悠􅀭而不根謂之浮言浸潤而膚受謂之㳺言遁天而倍情謂之放言此數種人其言不本於其心而害於忠信不足論也最是號爲能言者卒與之語出入乎性命道德之奥宜若忠信人也夷考其􅀻則固有行如狗􅇾而不掩焉者而其於文也亦然滔滔然冩出來無非貫串孔孟引接伊洛辭嚴義正使人讀之肅容歛袵之不暇然而外頭如此中心不如此其實則是脱空誑謾先儒謂這様無縁做得好人爲其無爲善之地也外靣一幅當雖好裏靣却踏空永不足以爲善盖由彼以聖賢法語止可借爲議論之􅂇而使之實躰之於其身則曰此迂闊也而何以便吾􅀻是以心口相反所言與所行如出二人嗚呼聖賢千言萬語教人存心飬性所以存飬此真實也豈以資人之口躰而巳哉俗學至此遂使質實之道衰浮僞之意勝而風俗之不競從之其䧟於惡而不知反者旣以妄終其身而方來之秀習於其父兄之教良心善性亦漸漬汨沒而堕於不忠不信之歸昔人有言今天下溺矣吾黨之士猶幸而不盡溺於波頺瀾倒之衝纓冠束帶相與於此求夫救溺之䇿則如之何噫宜亦知所勉矣或曰至誠無息不息則乆積之自然如此豈卒然旦暮所及哉今有人焉平生無以議爲而一日警省欲於誠學旋生用工夫則前妄猶可贖乎曰無傷也温公五六􅀊時一婢子以湯脱胡桃皮公紿其女兄曰自脱也公父呵之曰小子何得謾語公自是不敢謾語然則温公脚踏實地做成九分人盖自五六􅀊時一􅁴基之温公猶未免一語之疵也元城事温公凢五年得一語曰誠請問其目曰自不妄語入元城自謂予􅀄甚易之及退而自􅕍括日之所行與凡所言自相掣肘矛盾者多矣力行七年而後成然則元城造成一箇言行一致表裏相應盖自五年從遊之乆七年持飬之熟前乎此元城猶未免乎掣肘矛盾之媿也人患不知方耳有能一日渙然而悟盡改心志求爲不謾不妄日積月累守之而不􅈈則凢所爲人僞者出而無所施於外入而無所蔵於中自􅀅銷磨泯沒不得以爲吾之病而縱横妙用莫非此誠乾之君子在是矣或曰誠者道之極致而子直以忠信訓之反以爲入道之始其語誠􅀂未安曰誠之爲言各有所指先儒論之詳矣如周子所謂誠者聖人之本即中庸所謂誠者天之道盖指實理而言也如所謂聖誠而巳矣即中庸所謂天下至誠指人之實有此理而言也温公元城之所謂誠其意主於不欺詐無矯僞正學者立心之􅀄所當從事非指誠之至者言之也然學者其自温公元城之所謂誠則由乾之君子以至於中庸之聖人􅀂大路然夫何逺之有不敏何足以語誠抑不自省察則不􅁴而䧟於人僞之惡是安得不與同志極論其所終以求自㧞於流俗哉愚也請事斯語諸君其服之無斁熈明殿進講敬天圖周易賁卦􅂏曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸徃天文也文明以正人文也􅀚乎天文以察時變􅀚乎人文以化成天下臣聞賁文􅅚也色相間則成文故柔來文剛剛上文柔剛柔相間所以爲賁賁離下艮上離之躰中以一柔間兩剛是柔來文剛艮之躰上以一剛乗兩柔是剛上文柔使獨剛獨柔不相爲用則不成文矣此言賁之卦義也天之文爲二曜五行􅁚緯交錯故曰􅀚乎天文此言天之賁也人之文爲三綱五常倫理次序故曰􅀚乎人文此言人之賁也以上像易􅂏大意臣竊窺先皇帝作圖之㫖以敬天爲名其於賁卦實摘取􅀚乎天文以察時變一條臣謹按圖義而爲之辭臣竊惟天一積氣耳凢日月星辰風􅀨霜露皆氣之流行而發見者流行發見䖏有光彩便謂之文然有順有逆有休有咎其爲證不一莫不以人事爲主時時世也􅂏易聖人不曰天變而曰時變盖常變雖麗於天而所以常變則係於時人君一身所以造化時世者也故天文順其常則可以知吾之無失政一有變焉咎即在我是故天文者人君之一鏡也􅀚鏡可以察妍媸觀天文可以察善否且如曆家筭日食云某日當食㡬分固是定數然君德足以消弭變異則是日隂雲不見天雖有變而實制於其時又如旱魃灾也才側身脩行則爲之銷去熒惑妖也才出一善言則爲之退舎天道人事實不相逺自古人君凢知畏天者其國未有不昌先皇帝深識此理故凢六經之言天文者􅁼聚而爲之圖以便􅀚覧且恐懼脩省焉聖明知敬嚴父之圖即敬天在此矣嗚呼􅂚其柰何不敬此先生兼崇政殿説書日講篇也講篇非一如講詩之定之方中一篇諷當時脩繕事今亡其辭云道體堂謹書行實先君子革齋先生事實先君子諱儀字士表生嘉定乙亥八月二十四日寳祐丙辰五月二十八日殁于京次年九月九日封于郷之佛原嗚呼天乎仁者夀有德者禄先君子乃止是邪不肖孤上累先君子乆于旅飲膳醫藥失節用速禍非天實不德有悪子至此釁戾丘淵身百莫贖柴骨欒心不自意偷視息至今日得黽勉啚大事猶瀝血苫塊以字先德嗚呼尚忍言之先君子甞考次譜系文氏繇成都徙吉五世祖炳然居永和鎮高祖正中繇永和徙富川曽祖利民妣郭氏祖安世妣劉氏考時用妣鄒氏繼母劉氏世有吉德郷以君子長者稱一是方寸􅅏耕于子子孫孫先君子甞言滯學守固化學來新以一革字志􅅊佩人皆稱革齋性愛竹依竹闢一室傍竹居或稱竹居不肖孤聞之諸父先君子㓜頴慧噐質端重進止如有尺寸書經目輒曉大義越時㪯全文不一遺見郷曲前軰必肅容請益暨長天才逸發志聞道嗜書如飴終日忘飲飱夜擎燈宻室至丙丁或逹旦􅀺明挾冊簷立認蝇字不敢抗聲愕􅄰者人雖苦之甘焉蓄書山如經史子集皆手自標序無一紊朱黄勘􅀧纎屑促宻靡不到至天文地理醫卜等書㳺䳱殆徧手録積帙以百揮汗呵凍弗斁鈎引貫穿㪯大包小各有條間質難疑剖柝響應某事出某書某卷且指數以對爲文發持滿無不的中機軸必巳出命意時娓娓談他事􅀂莾於尋繹一援筆雲行水流無凝滯中年文氣益老拾汗漫歸諸約不峭峭刺目有温醇渾厚之風焉閒居侃侃春意溢出顔靣蚤事祖盡敬祖母􅄖㳺暮齒視薬膳卧興扶持華髪鍾爱父􅃊母慈侍夙夜省燠寒一出忱意不視顔色爲肅愉事継母篤至始終無纎芥間一家氣象藹如和風郷黨稱孝於宗族厚待季父削藩町悲忻同情季父殁不幸子病廢經紀其家撫㓜姪等巳子䟽從遺孤振翼之俾蒙于成闢居居無居者􅀊時衣粒各有節度甞謂宗族一本􅁩不得不恤愛范文正公義田記規模次第曰吾得志當放此行之親婣孤貧者哀矜勞苦撫字無遺力䘮不克理辦之棺至巳所服用􅂢以歛雖在䟽末次序情文各惟其稱與人交好大躰不爲細家迫速戸外􅋰日滿絶甘分少無䟽宻皆􅀍和氣交􅁩天至聞貧困患難赴急如不及忱意感人有臨終握手欷歔流涕託之以孤者􅀊大比凢與大夫待􅀶士選者皆有約首􅁩綿數科間不能與自􅂢貲籍其名暨充賦就奉爲􅂇約所不及以意告傾巳有爲行資至貸以應􅁩聲錚然對人氣語和易鄙夫窶人亦曲加體接無一失聲氣去里有蹈非􅃔悉忠愛援􅁩開陳聞者感動見後進片善奨予不容口孜孜誘掖如子弟給飦數􅅕畊者多不輸寕令􅀒巳不忍直于有司蒔園漁池相傚無一償亦不較間􅅓不武則曰彼貧且殆吾柰何攟之有竊􅀒其貲去旣而困還不惟不加責恤其人終身􅀅作室絫木齊垣時癘死多露骼惻然曰吾可無居人不可無歛匠棺惠貧者􅀊賑饑随所有不給至市粟以應顛連無告過目輙怵􅅥随力爲謀一日讀書至晏子敝車嬴馬事愀然曰使吾族吾親吾郷人休休有餘至願也惜嗟再三家居門䕃茂木睱日相羊芳隂間雅嗜茶煎㵸多手出時邀朋遊文字語移日樂極浩歌縱奕視世間融融沄沄漠不介胸次性凱樂惟恐咈人事經然諾雖不利於巳不悔一言話傾盡肺腑無留蔵應酧一切任真事不可直濟或道以詭御寕事不濟不爲耻巳勝語及不平辭和氣舒無忤色有以欺心至知其􅀻不發且無章於人欺者多愧悔感泣人皆嘆爲有德君子謂當於古人中求之誄者曰我公之德言矩行䂓世智黄間我心坦夷市利血刃我範驅馳生平所爲事皆可質􅀑神而無疑嗚呼是得其槩矣始天祥兄弟㓜且長先君子不疾其不令昭蘇䝉滯納之義方日授書痛䇿砅夜呼近燈誦日課誦竟旁摘曲詰使不早恬以習于弗懈小失睡即示顔色雖盛寒暑不縱檢束天祥兄弟慄慄擎槃水無敢色于偷自此名師端友招聘仍年至時先疇給費乆之室罄力弗逮廼率天祥兄弟蔵脩于竹居陳所衰籖軸俾抉精剔華鈎索遐奥董綱要竟日夕弗倦雖貧浩然自怡有未見書􅂺質衣以市得書注意鑚砅又以授天祥俾轉教諸弟繇是程督益峻書警語徧窓壁如三尺在目見爲文章撥􅓯正氣輒不懌必維以法度天祥兄弟奉嚴訓蚤暮侍􅂰下唯諾怡愉不趐師友或書聲吾伊或歛􅁭各静坐潜諷或掩卷相與戚嗟人情世道此時氣􅁚父母俱存兄弟無故天下之樂莫加焉􅀊乙卯天祥壁俱叨與計偕時仲弟霆孫年十有六未試墨于窓曰出師未捷身先死長使英雄涙滿􅁭竟以疾先撤􅁄一月卒先君子及是擥涕竚眙悒悒痛悼天祥璧􅀅進禮部欲董于征顧先君子􅂘子方新天祥璧復去左右恐益重哀出可寛襟抱且旦夕定省得不缺不敢辭以臈月望行次年天祥璧俱僥倖奏名夏五戊戌廷對踰挾先君子病暑投凉劑立甦方徙一静室規便攝理甲寅集英賜第天祥以不肖冐首唱歸拜寓舘移時之期集所越一日聞疾復侵告于朝不俟命亟去侍藥省劄下玉音給假三日時先君子雖病神色不改視脉者聚伺變􅀱僉曰無虞戊午向申忽病革進藥卻弗服曰度吾不能起此疾汝兄弟勉之天祥璧震怖號慟請命于天祈促齡壽親筭不􅀗命椎心禱呼冀殞㓕以代又不􅀗命入夜寂然而逝嗚呼痛哉嗚呼痛哉厥明畿漕聞于朝朝命官吏來治䘮事六月庚申朔天祥璧奉柩出國門臮歸郷士庶人無不失聲痛嗟路祭巷􅂘以返于先廬時七月癸丑也嗚呼先君子一至此邪不肖孤二十有一載弟方冠且髫承顔菽水􅀊月㡬何天乎不使終飬而蹙之于中身邪􅃤焉逆旅睇親舍越在二千里外天乎不使終于正寝而忍至於客歛邪徃時征衣拜堂上舉觴飲餞親賔祖道外期嚮何許天乎遂以是爲永訣邪天祥璧奉貢剡時先君子巳哀仲弟不見孰謂方階禄釡先君子纔見而禍遄作天乎天祥璧何以竊第爲邪嗚呼不肖孤事先君子不孝奉起居無状有疾病而闇不知不能積忱􅂨臆倉卒無以動天聽罪生不贖眥血􅀍靣摧决肝胸顛頓躑躅裁以必死顧属纊一語忍痛受命不敢不勉恐無以祗訓于前人以忝盛德廼相宅兆筮曰吉排􅁟濡涕墳以竣役􅀅奉躰魄安焉嗚呼􅄅音容隔幽隂終天而止矣先君子妃曽氏今男三人天祥璧璋女三人懿孫淑孫順孫遺墨有寳蔵三十卷随意録二十卷痛惟先君子利澤不施于人名聲不昭于時匪石遺德恐乆遂沈泯天祥不揆不孝裒録事實沈痛刺骨荒忽惝怳世有大手筆能表章幽潜光昭于無窮稽首百拜以請知潮州寺丞東巖先生洪公行状東巖先生洪公盖陽巖先生文毅公族諸弟也文毅公以􅀌忠遺直著聞當世其平生言論風㫖講切上下公未嘗不在其間文毅公屢召不赴公浸嚮用輙落落不合去時論稱爲二洪文毅公旣沒泉南文獻之望書属公識者謂文毅公未爲者􅀅有爲也而公又不及大用以死天之生才倐忽代謝安得不深􅁣於此叙次行事諗諸方來門人之責奚以辭公諱天􅂹字逸仲自號東巖世晋江縣人嘉定戊辰七月庚戌公以生生有異質沈静專一自少講求㣲言通念曉柝乃巳故於經史諸子百家之辭無不貫串文章自成一家以紹定改元薦于郷名聲振一時學子蹐門願求模楷者日衆公坦明夷粹専以􅀫於道爲教逮事王太母一夕疾甚殆公不解帶不交睫至剔股肉雜湯藥進公一念之切通于神明然終身不以語人登淳祐七年進士第􅀄筮卲武軍建寕縣尉發擿姦伏當官無所回撓時有刼冦王􅀂曾嘯聚千餘人騷動兩路諸所委捕多畏沮公􅁬不顧身提兵擣其巢一舉空之僞造成風爲楮幣蠧公宻設方畧動中肯綮李􅀂聶凢三大黨與無不各就􅅞薙獮之石壁胡公頴秋崖方公岳交章以公善状聞于朝十二年循從政􅀰調連州推官未上寳祐改元㫖差監惠民南局四年較藝南宫公考鏡詳宻精力不間晝夕所賞㧞士多根柢理致當時號明有司公雖浸近周行然無所附麗恂恂侃侃望之山立徐公清叟吴公燧馬公光徂顔公頥仲俱剡上其能􅀅用矣㑹有言者徒歩西歸泊如也六年淮閫擇士自從首辟致公爲属景定二年通班授宣教􅀰知廣州香山縣至之日以教飬人才爲第一義脩復大成殿明倫有堂主敬羙身賔賢豋俊有齋皆􅂢俸入爲之歛不及民其爲政一裁於義俗譁徤戢其􅀹桀黠者曰此囚牙訟師去則吾民妥矣邑以大治洪公勲趙公汝暨雷公宜中及倉憲交以邑最上咸淳元年轉奉議􅀰二年差監行在搉貨務都都茶􅂣四年吴公革馮公夣得趙公順孫劉公黻皆以吏才爲薦差監都進奏院轉朝奉郎馮公時爲刑侍及戸侍劉公應龍交委以書擬本部文字公皆樂爲知巳盡于時上即位逾年􅀄政新美公輪當陛對􅀫齋豫戒兾積忱意悟上心取虞廷君臣時㡬之説寓規焉其一曰君心勤怠之㡬二曰人心離合之㡬三曰君子小人消長之㡬四曰中國外夷强弱之㡬及朱文公天理人欲之辨首尾二千餘言其辭諄􅃨懇切深刺腧髄玉音嘆美又言泉有屯戍左翼一軍乏興之害米舟捜糴生變之虞而朝廷籍沒翁林二氏之田可􅀊得榖萬斛以紓戍卒兩月廪食或有不濟寺院及單丁住持令本州覈實區䖏併撥爲軍餉之􅂇餉足則糴寛糴寛則米通民永無貴糴患矣朝論翕然以爲論事有陽巖風除大理寺簿五年轉朝散􅀰知潮州公之在潮也視民事如家視敝政如巳疾􅂢金以􅁉學廪傾囷以粟饑民梁川以利病渉知無不爲爲無不盡潮與漳汀接壤塩冦輋民郡聚剽刧累政以州兵單弱山徑多蹊不能討公應變設竒降者相属又欲於接境置屯多者三百人少者二百人掎角爲援郡爲創撙節庫以贍之具有條畫悉以言于朝并下之漳汀放此且嚴保伍之令以澄其源大抵公智慮深逹如􅀫􅀅持重而規畫綿絡不以鄰爲壑也又潮有護田舊堤多囓於水貤俸與民築石爲堤民號之曰洪公堤且刻賦頌其旁曰此我公東巖生佛所爲也去之日垂髫戴白者擁車下不忍去公雅意林壑至是則曰吾可優㳺樂吾真矣九年得㫖主管華州雲䑓􅀚公時益暢於詩數與婣族觴詠從從容而學徒有志於考德問業者多授以外聲利及終身受用之要暇日登臨徜徉愛南安之間風氣明秀取所謂小陂山者曰樂哉斯丘我死則塟焉預􅅚美檟治壽藏澹然塵外蟬蛻之意十年正月公始属㣲疾即乞以本官生前致仕八日忽索水自浴衣冠休于正􅃦翛然而逝嗚呼􅀂公者可謂啓手足而不亂其風流篤厚真足以追配文毅公於九原而無怍者矣某於公之門實丙辰省屋諸生戊辰之春待罪中朝諗日拜公床下矣未及而去國然於公之踐脩出䖏之槩盖心識之共惟穆陵豐􅉮菁莪之澤􅆂育天下天下士蝟然勃興温陵邈在海隅人物相望陽巖之氣節煥發乎其前東巖之抱􅀒翼承乎其後使二公誠得盡展拓又未知孰後孰前也嗚呼今復見斯人哉曽祖遇妣陳祖德明妣李父伯道贈宣教􅀰妣陳贈安人元妃陳先二十六年卒贈安人継趙封安人先三年卒子男􅀿午􅀿申􅀿夀俱業進士女四適胡登龍丘公賜王毓竒一尚㓜􅀿午力斈克肖􅀵拾公遺稿􅀂干卷曰東巖集蔵于家􅀅以是年十月巳未奉治命以塟趙安人附殯􅀿午千里貽書俾某状行姑序其本末以俟立言之君子謹状墓誌銘知韶州刘容齋墓誌銘咸淳四年四月十二日容齋先生刘公元剛卒于家年八十有二先生官至郡守死之日㡬無以為歛附扵身者稱家之有無郷黨之士莫不髙先生之風而哀其志焉其邑子文天祥與人言欷歔慷􅁣重懼前軰言行乆逺沈泯無以訓來者㑹其子昌孫以先生状來請銘某雖不敏其可以辭先生字南夫一字南强世為吉州吉水縣人治毛氏詩早為郷校知名士嘉定十年入太學後六年登進士第授迪功􅀰信州永豐縣主簿陞從政􅀰調静江軍莭度推官丁外艱服除差江州教授兼濂溪書院山長自故丞相董公槐今丞相江公萬里以下舉親民五貟淳祐五年班見以通直􅀰知抚州崇仁縣縣政以理民以佛子為謡先生奉母夫人在官間日與其弟自提板輿相羊爲娱邑人化之以憂去十年通判鄂州以磨勘轉奉議郎承議􅀰董丞相當國入爲左蔵東庫時将薦先生試舘職㑹董丞相去不果􅀄東庫日進㑹于􅁓􅀂干丁丞相以􅃐辦爲才風有司頓増十萬先生以職力争忤其意展磨勘兩年出爲㤗州􅄈差通判景定元年某月差知昭州皇上登極轉朝奉郎適郡當次稱疾不果行㫖差主管建昌軍仙都􅀚居二年再任自江上平凢􅁠奸用事所擯斥朝廷奨㧞殆盡時論以先生爲屈未㡬詔還磨勘月日駸駸向用而先生前一月逝矣嗚呼豈非命邪早刻意詞科書無不讀其餘佛老精言亦各深到平生居官所至清謹家無餘貲蕭然環堵四方學者執經問字相繼于門先生誘掖懇懇不啻父兄之遇子弟􅀹工爲文章雖逰戱之筆鮮不竒古江湖之士得品題一語足自表扵其徒與人盡恭應接終日無倦意客至雅言之外談玄演空聞者徃徃忘去世人以聲利爲門戸先生惡之如惡惡􅆨登第垂五十年郡縣官吏知敬先生不見其可畏出入不設車徒間歩行井陌中不以爲苦甘心屢空以至死而不悔噫此真所謂善人長者矣曾祖致道妣周氏祖圭妣李氏考次朔累贈至奉直大夫妣陳氏熊氏俱贈恭人妃凃氏先十六年卒贈安人子男三人昌孫其長也次信孫愚孫皆蚤世女長夭次適太學生陳應發又次適進士胡淵孫男一人洵武女一人許適龍氏以某月某日塟某縣某郷某里之原遺墨有詩書孝經論語孟子演義􅀂干卷詞科􅁼稿􅀂干卷客齋雜著􅀂干卷家庭謾録􅀂干卷任左蔵日以孝經論語孟子演義上進有㫖降付資善堂銘曰文彪彪德恂恂貴如單門死如齊民約而家豐而身我作銘詩永懐古人義陽逸叟曾公墓誌銘公諱珏字天􅃬號義陽逸叟天祥外王父也天祥不肖頼公教誨由記事以來周旋三十年於公無所不知盖至於其䖏死生之變然後知他日􅀚公者未盡而公誠有大過人者焉嗚呼異哉公性頴悟志不樂凢近讀書百家雖渉獵靡不通逹所自得徃徃於佛老氏其見之服行敬恭神天一言動不輕口不御肉月常十四五對人敷闡玄寂四座輙悚然傾聽最後遇異人與語㡬欲棄人間事求長生之術年踰六十始聞正學恍然自失死生之說􅄦神之情状講探幽􅆌頓改吾意旣卧疾服藥外無所問戒左右勿以巫祝從事間祈禳厭勝揜公不知公􅁴輙撫床怒呼病日乆骨立如束聲􅄍精爽不變兾猶足支􅀊月一日召天祥至公乃鈎稽卜筮指諸掌曰今日老夫當訣故令爾來時聞命震愕止公勿易言公曰吾豈不省事哉形神合則爲人吾形憊乆矣今腰足如㫁心火益燥神且㳺散居常謂不識死死則如是又曰始吾崇信異説今且死目中無怪見顧二子令必不爲佛事周身一切雖絲縷亦公所䖏分殯宫哭位與凢䘮塟祭具有成説天祥弟璧任京府尹椽公口授數十言令爲書遺之强起字􅁓尾句讀筆畫曽不㒹錯集諸孫各付謹􅅚語令羅拜床下辭去衆泣漸􅀭公曰死生如晝夜不足多憾麾止之索酒飲之三連三言曰吾真去矣聲脱口而逝嗚呼隂陽魂魄升䧏飛􅀭氣之適至雖夣寐莫適爲主公幽明隔呼吸而從容􅀂此世􅀎言死者不少此非甞試事臆度料想靡所依㩀公去來一息實天祥所親見道之粲然莫此深切嗚呼異哉嗚呼異哉公事父母孝待族婣以厚與人交乆要不忘倜儻尚義不事生産作業惻􅀮貧困能推食解衣議論剛正好靣折人不藏怒􅀫怨有古君子之風焉公有子有孫早授家政天祥旣奉偏慈迎公就飬居數年甚適間出徐歩幅巾野服人羡其􅄖㳺公亦論文賦詩圍栱命酒自謂天壤間陶陶人也得疾於景定辛酉二月九日始復正寝殁之日壬戌二月癸丑得年七十有二曽氏世家旴江徙吉之㤗和梅溪族號長者曽祖􅀖寕祖知和考昌􅁠妃張氏先公十九年卒子二棐榘女四適錢光延康師顔于天秩其仲天祥母也孫男六端孺淳儒文孺俊孺良孺明孺女一適郭泳曽孫甫申以次年九月丙午塟吉水縣永昌郷藥陂之原成公志也􅀄公先世重卜塟塟師譸張爲幻封鬛無定居公憮然曰吾詎忍吾先至此吾不可自求之乎乃從兄瑾載資越竟旁叅􅀶扣逾十年得其說以歸由是髙曽而下一奠不再徙公對塟師言甞斷㫁不可不售不傳故秘莫得聞焉公命未革命天祥曰老夫一日不起無潜德傳世記􅀊月非爾其誰属臨終申其詞再三天祥泣不敢當重念靖節作孟長史傳東坡書程公逸事徃蹟漫㓕猶勤追述矧公靣命惡得辭顧方繋官于朝不􅀗哭拜填祖营視丘􅉎南望欷歔輙紀家世行實而表其死生大事爲誌并爲銘銘曰維二氏之蔽於死生􅀆小其用於一身一䧟溺而忘返􅀆鮮不惑於恠神公曰昃之離􅀆羗出駁而入純㣲臨絶之琅琅兮公㡬混於常人朝聞而夕死􅀆何憾乎幽􅄀藥陂之欝欝􅀆遺躅之所經存而以爲志􅀆殁􅀅以爲寕既固既安以利嗣人􅀆萬古萬古如斯銘羅融齋墓誌銘廬陵有􅀮君曰融齋羅公嗚呼可謂有德人矣予甞詣公入其門肅肅如也僮僕訢訢如也公出雍雍如也坐申申如也語愉愉如也予聞公燕居之槩晨起盥櫛畢正衣冠堂中就胡床坐不隋不􅀝􅌂然終日雖盛寒暑以爲常不好狎不侵侮無易由言對賔客賔客或不自持左右置司馬公家訓一通保家擇婦常自以爲名言閨中無敢疾呼女􅀠無敢近几席執事左右唯諾無敢涕唾諸子無敢晏起早卧聞公􅄃衣聲欬就學惟恐後夜至公所各以所業次第誦説奨掖磨厲交發互出凛然義方之意由是吾里之言家法與善教子者皆曰羅公羅公云公生而頴發五􅀊即篤志强記容止如成人旣長嗜書忘寢食爲文不事銛巧惟意所到自然成章學書入揩得蔡氏風度蚤有意塲屋四詣京師試諸生晚年始以此事付兒軰然公所爲強學者雖老且病不衰也公未弱冠而􅀌經紀門戶即不爲細家迫速先世積逋劵如疊一日悉􅂌炎火曰是先人所親厚其一切勿問聞者義其勇宗族親黨孤子者貧乏者或給之田或予之金終其身恩意浹至外内無間言四屨滿戸外設榻無虚日推食解衣至者無不得分願而去􅀊青黄不接㑹其閭里輟時直㡬半隆寒給散有差環公之境無以饑告郷鄰有難畢力排解㡬㣲不見顔靣不摘抉人過有􅀒公者未甞示以聲色其人乆之自愧悔有愧悔且死而恤其妻子益恩者與人語傾盡肺腑巳諾必誠不以利害爲二三其忠信如此戒庖厨勿殺凢登諸爼者悉自外致有生饋禽魚必解放之其仁厚如此自奉不逮中人衣服十有餘年不改亦不煩澣濯其儉素如此里之稱公無大小必曰君子長者有不善相戒勿爲公所知嗚呼真可謂有德人矣公之中身諸子各㧞頴而起其一兩名薦書登開慶元年第調臨江軍清江縣主簿公時敕簿君曰汝爲亷吏即不辱吾子簿素脩謹聞訓益厲有名聲於時生母蕭氏以上夀􅃬封孺人諸孫競秀長㓜五葉人世樂事畢赴一門天之扶持吉㐫悔吝先定如􅆱􅀛以公平生孰不可書獨嚴重整肅能使人鄙慢消去福德莫盛於此昔伊川見人静坐輙嘆其善學徐節孝因安定頭容直一語自此不敢有邪心使公得二先生爲之依歸因其資以至於道所成其可限量乎哉公諱士友字熹善一字晋卿融齋所自號景定元年該明堂恩告授承務郎致仕咸淳二年二月十四日終于正寢年六十有八遺文有史編十卷諸家詩躰十五卷羅氏由金陵徙吉之吉水五世祖居廬陵之新安曽祖暉祖時英考莘老妣孫氏趙氏妃蕭氏封孺人子男五人濬煜植畊垕畊簿君也再調贑州濓溪書院山長女一人汝順適今文林郎新廣南東路提􅀧刑獄司幹辦公事周夀申先公卒孫男十人女六人曽孫男二人女一人俱㓜卜以四年某月某日歸于順化郷三陂周家山之原其孤前期請銘於予予視公丈人行也公之子於予同充賦於予弟璧同年進士予之任江西臬事也以公子上之公車通家孰先焉矧公行􅁩著於郷則所欲稱美而論撰之者豈獨孝子慈孫之心哉銘曰不言躬行萬石君教子義方竇禹鈞行其庭不見其人雖無老成人尚有典刑封孺人羅毋墓誌銘廼咸淳九年廬陵融齋居士羅氏生母滿百􅀊融齋之夫人時年七十六白髮在堂事百􅀊母如婦禮子孫孫子環侍起居爲男女三十有竒予郷稱慶門必曰新安羅氏其年二月朔予從里中士奉幣載酒拜百􅀊母堂上母荅拜諸孫皆拜飲母毋釂酢賔諸孫各執從旣成禮夫人視予年家子不聽去爲之留三日爲詩以歌其事好事者或爲圖以傳國家承平休飬生息用康于人眉夀無有害傳曰豊水有􅉮數世之仁也夏予􅀅指于湘未數月聞夫人訃欷歔失聲問百􅀊母安乎曰安母于今盖百踰一矣夫人􅀅塟其孤以是母命來請銘予後母生六十三年得載筆承命銘夫人自昔能言所未有廼叙次其凢繫之辭夫人姓蕭氏吉水人曽祖琢祖曽父異郷貢進士妣廖氏繼張氏徐氏歸承務􅀰致仕士友是爲融齋居士先七年卒子男五濬先五年卒煜植畊脩職􅀰前監行在奉口酒庫垕女一適儒林􅀰侍班周夀申先二十九年卒孫男九宷寯宦寔寓宜紹顥平女十一長適張棟曽孫男七舉孫頴孫元孫滿孫怡孫真孫復孫女二夫人以庚申明禋恩封孺人卒之年七月十日次年十二月某日封于所居里柘逕之原銘曰昔唐夫人之爲崔母􅀆逮事長孫皇姑􅀆姑年髙嚙落以枯􅀆升堂乳之劬劬􅀆姑曰婦恩之不可孤􅀆願世世子孫之不渝􅀆夫人五世崔如􅀆母年踰百崔所無􅀆胡不與夀爲徒􅀆爲此母憮􅀆爲夫人吁􅀆鄒月近墓誌銘廬陵南方之上㳺支水自贑興國而下曰冨川鄒氏族焉鄒故出范陽五季始有籍斯土有昶者冨而禮瀘溪王公平園周公誠齋楊公艮齋謝公皆與之㳺川流在門能不愛重貲疊石爲屋以脫徃來於戹周公記之一時稱爲長者其殁也文敏洪公銘其墓鄒氏福禄方來而未艾長者之所種植也昶生􅀅仕􅀰時飛甞伏闕上􅁉民十䇿時飛生大淵大淵生澹是爲月近君月近云者君以名亭而郷人因之以爲號也君蚤孤母張氏勤儉自􅀣立紹定辛卯該東朝恩以夀封安人君於其時奉親愉愉無子弟之失張氏殁始經紀家事循循如不勝衣人不見其聲色而充盈􅁉大之福自然日進而不止族黨之不自給者親戚之無所歸者朋友之逺􅃥而不能行者君意性所到皆能随事爲義􅀂夫脩浮梁甃通逵􅀊發廪以倡賑荒守望有警則裒丁以耀于衆皆義之凢也俯仰三十年矣君於其間無郷曲之過君性最緩或以佩弦進曰吾豈不知出此吾所見呌呼號呶自取僨敗者衆吾誠緩不失事盖老而益審焉然君終身無悪名變容動色之警不及乎其門􅄖㳺和平永保終吉嗚呼真可謂長者孫矣君字次清登仕􅀰生嘉定元年六月丁酉殁咸淳元年九月巳未配吴氏迪功􅀰江州司戸叅軍懋之女子三文孫振孫俱登仕郎癸孫㓜卜以四年正月塟于順化郷新安社之原其􅀌前期以奉議􅀰劉君惠祖状來乞銘劉君戚也聞而知之予君鄰也見而知之敢無以銘銘曰長者之澤子孫頼之去之百年有以似之天於善人􅂚不壽之善人有後天􅀅與之鄒仲翔墓誌銘景定五年予奉親髙安除提􅀧江西刑獄謝弗拜適冦起興國之東廬陵犬牙相錯所在騷動余所居郷一閧千室大家以去爲望鄒君仲翔中人之金也率郷人柵東門山爲備山下阻衣帶水君恐倉卒渉者爲魚梁浮梁以濟明年春冦一日蓐食行三百里薄太和之王山距余郷半舎而近郷人扶携老稚走險㣲一不善脫君經紀山寨當是時一郷之命懸於君訖冦去君保護無有害時余避節弗􅀗命㑹樞宻督以捕逐文移旁午余以郷部嫌􅀅重以請􅁣然曰柰何以我辭受坐視龍蛇爲赤子困乎於是即日受印下令㑹兵諸山寨皆署長君與焉未㡬冦平余罷歸里于溪之上游斬荆莾燔椔翳得竒􅀚焉君欣然從予山中匹馬一童朝至而暮忘歸率以爲常余每集賔從君輙在其間聞余語中理解未甞不解頥間從余言人生何爲碌碌棄家事從公㳺可乎余謝非余所知君曰吾意决矣乃盡以伏臘属其子而頺然以休訪予南北厓某水某丘􅀂􅀅終身焉癸酉夏四月余行湘君送余於香城後一月君以疾死余聞之欷歔不自禁湘之歸也未及門望見其子來哽不能言嗚呼余豈􅀻君君與人必以情聞義輙赴見有不善靣折不少回而不蔵怒不􅀫怨曠如也君雖赤手起家而好施出其性􅀊饑發粟給其比鄰二百戸能􅂢殖以自損道太和甃十里道廬陵甃六十里衣寒者食饑者病者饋藥死者予棺䘮無歸者塟其􅁟度其能爲輙不少􅈔君之族前有長者以善植門爲益國周文忠公所知去之百年風流相接焉余甞謂君慈而樂舎大率浮屠家所尚至臨難急病能禦灾捍患以有德於郷閭大夫士或愧之君名鳯仲翔其字世爲富川人曽祖大明祖人傑考世興妣梁氏娶蕭氏梁氏皆先卒子男一人曰成女三人適郭鏐王鎔劉鋒孫男二人夣龍復生君得年六十有四以甲戌十一月某日塟于其郷沙洲平之原治命也君之先人甞卜地于東門山之下曰吾父塟于是泝山而上爲龍頭得一丘焉曰吾蔵骨焉吾後其興乎君晚而優㳺有子治生有孫業于學咸以爲驗銘曰東門之原君之父􅀆東門之麓君之母􅀆東門之巔君所構􅀆瞻彼東門相爾後􅀆樂庵老人劉氏墓誌銘余讀漢陸賈傳甚羡余鄰翁樂庵劉氏賈擇田地家好畤出槖中千金析其五男安居過之數擊鮮十日而更以夀終余甞謂人生晚福優㳺宜莫如賈當是時韓彭爼􅊽鄼侯周勃猶不免械繋求爲賈一日得乎翁生四子皆有才智四十年即棄家政就飬諸子以次第循環五日一更其設饌務爲相髙惟恐不得其􅂬心翁饑來得食渇來得飲早眠晏起一切不顧人間事惟時時接方外士講鉛汞之術間取松栢惟意咀啖翁年過七十而顔色如童攝生有􅂇焉或爲陸生作新語爲漢逹官非翁匹余曰不然賈艱難􅑿項間從馬上公爲客一再使越﨑嶇萬里翁生於世長於世老於世不出郷終其天年有樂於其身無憂於其心設賈復生校翁失得未必以彼易此翁又有數事異甚里傳􅀑車鳴者未夜相戒威明屏息户内翁開樓大呼願見􅀑車卒無有有神以禍福驚人翁過其祠持牛炙如常人莫不危恐翁休休如也甞有所营造忌某星直某方翁曰犯者殆乎請身當之某星迄不驗爲子簡婦或云婦不利於長翁不爲奪自是諸昏嫁曆家說格不用中年卧疾家人􅀻召女巫謀爲厭勝翁㢘知之强起逐之出門未属纊翁黙自念作其像賛􅀂辭而逺逰著顧左右曰吾死勿事緇黄吾志也醫以藥進麾使去問日入乎曰然反靣而逝江南之俗尚􅀑其人畏死而信巫翁能自不惑非由耳傳口授殆一至之性然也翁名􅀖美字才卿樂庵其自號也始祖邽長沙人爲吉州刺史家西昌九洲後徙廬陵富川三世曰德逺文煥子玉妣曽氏娶陳氏先三十七年卒􅁇祁氏其子孫實蕃濟生機洪生桂槐植模深生朴柚郷貢進士浩生樞楫槐復生癸孫女二適于夣牛曹雷應孫女五適鄒曹許曹羅一㓜翁八􅀊䘮母十六􅀊䘮父移其事父母事兄長終身􅀊時上丘塜拜祖禰率諸後生尚有典刑翁富壽安逸推其一念孝友殆命物所知諸孫方􅀅以詩書大其門翁必爲人宗乎翁生慶元戊午二月庚午殁咸淳癸酉正月丙辰後二年正月塟干享化郷鳬塘之原余家距翁一垣翁年吾祖之下吾父之上諗翁有年數矣深與余游且厚來請銘銘曰其生也有涯其死也有時爾世其昌匪我銘其誰劉定伯墓誌銘余東家詩人劉君定伯􅁼晋宋間矌逹自余辟山水南北崖落然不可人意君時從予招或不約徑造至則善爲言譚名理蠭出意所左右辯者不可詰江山朝暮四時之變嘲詠賞嘨興出物外常使人諷念不可忘嗜奕最入幽􅆌兎起鶻落目不停瞬解剥摧擊其􅀔如風􅀨不可禦勝敗不落一􅀏飲酒可一二斗酒酣浩歌聲振林木或􅄬冠袒禓旁􅀂無人或鼻息雷鳴徑卧坐上君豪縱沛然以爲自得當其樂時不知天之髙地之下老之􅀅至焉爾予前在宣州君以詩來思致清邁恨不即􅄬印綬從君煙霞之表旣歸君好日以怡詩日以張大於是盖年五十三矣廼孟夏一日過予極論當世事抑􅀭不少挫詰旦報曰君痰厥逝矣予駭亟視之不復可爲􅂘失聲狂三日不能止非予爲然凢與君交者談君輙揮涕里之人不問倪旄嘆傷如出一口噫可人在天地間􅄦神所忌邪君長身五尺餘堅壮耐寒暑􅂡髪如􅃮性落魄不問家事家才三四口粗了伏臘不爲求􅑿有錢輙不惜雞􅁰送客無虚日朋友有無相通急難於我乎赴平生於人無諾責郷人有爲芥蔕君一語輙化有不善開譬之無以爲望和氣薫浹蒸然善鄰一􅀊半爲四方客主君者所至􅄬轄惟恐亟去雖兒童僕厮無不誠愛君者君破崖岸削邉幅不爲拘拘孑孑至道理所在􅃀然守之不變其執䘮爲孝子按䘮禮門内不入緇黄一子二姪命以先疇􅆶分而三無􅑿縮薄厚子曰敢不共命姪曰敢固辭一家興仁興遜郷曲相傳爲盛門非好德疇至是君始祖邽長沙人爲吉州長史家于西昌之九洲十世祖德逺徙廬陵富川君之三世曰文煥子玉􅀖賢妣鄒氏娶張氏子男梓女淑容適彭天麟卜以次年咸淳癸酉十一月壬辰封于淳化郷扶竹坑楓􅀣搪之原君名澄定伯字也自號前村有詩集自編曰前村􅀄稿君詩不爲深苦而清㧞雄徤如其爲人有子能力學不墜義方君死何憾予所憾者君死獨何蚤泣而爲之銘銘曰其堅也驟折其勁也蚤摧命之􅆇㐫匪繋其材生也逹死也何怛君墓我銘我心則結王推官母仇氏墓誌銘東廬王先生母垂塟命其門人文某銘噫某何以銘先生之母之墓哉廼景定三禩進士䇿御前某以覆校待罪殿廬一日􅀄考官第一卷擬上一覧某稍細復之傳􅀚同官驚訝得人㑹一字近廟中嫌名某以才難白詳定官請所以䖏臨軒之日賜出身乃吾東廬先生也嗚呼使先生以名第取先天下歸拜母堂上斷機調熊庶㡬夙昔乃累先生以不釋乎此某其何以銘先生之母之墓哉雖然事孰爲大事親爲大守孰爲大守身爲大使先生失身爲親憂雖髙科如之何先生雖不得髙科爲臣忠爲子孝身在焉親固榮也諗先生曰然銘無所辭銘曰母性􅄷氏世居廬陵之白沙考諱彦誠生二十二年歸于贈迪功􅀰致政君諱化􅁠逮事姑兩世左右無違祭塟以禮相夫子貞調娱中和靡失節度子始就學篝燈夜分督厲吟諷及􅀒笈從師端以上手自紉綴連寒暑彌不倦以子入大學甲寅明禋封孺人從子赴永州戸曹禄飬夀康稱其命服咸淳七年三月十九日終于家年八十有三子二長大琮先孺人一年卒次國望從政郎前􅀽州軍事推官女四一夭二適李穆之三適蕭應祥四適劉起岩二與四先卒孫六男長困餘未名五女長適劉煥次許彭麟餘㓜九年三月壬申厝于城西黄膄山之原是爲銘贈承事􅀰徐溪荘墓誌銘咸淳九年夏六月壬午朔天子親擢徐君卿孫爲監察御史旌縣最也於是某不佞適叨一節按部湖右親見衡山之父老子弟歌思遺愛餘績於嶽雲湘波間皆曰徐公字我民六年我父母之其敢忘及聞聖天子所以褒擢選表又皆手額距踊爲朝端賀爲天下賀某退以語客曰麟仲信才且賢何以得此於邑之人去而不忘如此哉木則有本水則有源􅀂靈芝俄現醴泉滃出居然瑞世其鍾和孕秀豈伊一夕之積盍相與論其世可乎客曰徐氏居清江於廬陵東西家御史君之考曰溪荘公溪荘公厚徳人也余聞而心識之亡何麟仲自京以書走湘抵某曰卿孫不夭生而二十有五年而先妣即世又五年先人棄其孤露濡霜降於今二十有五年禄飬弗可及也欲報之德罔極柰何今不肖􅀌藉先人之教有位于朝乃去秋九月天子有事於明堂推􅃬􅁼恩我先考妣實該􅀄贈惟先世之志行事治未有以詔子孫傳無窮敢稽䫙下拜以請某發書愴然念所見聞不謬因不果辭乃摭御史君所撰行􅄒而書之徐氏祖伯翳宗􅅯王􅅯王子孫散䖏徐楊二州間江右之徐以南州髙士重其後泝豫章而上今家清江縣崇學郷之檀溪溪荘公諱森字壽叔曽祖諱徹祖諱源皆􅀮而能詩考諱大經桂山謝公題其所居曰溪雲小􅀮里人因稱爲溪雲先生溪雲性嚴介家人嗃嗃然好客車轍滿門溪荘天分寛平春和玉温撰杖屦侍琴瑟書冊左右色飬無違族居千指融融怡怡無一間言少㳺郷校文聲籍甚嘉定丙子待試成均繼以詞賦爲郡諸生第一士論翕然中年幹蠱用譽晚謝塲屋益雅淡謙謹䟽戚一致未甞言人過失其尊尊親親賢賢老老㓜㓜無不得其􅂬故郷里逺近一以吉德厚善歸之而徐爲德門矣淳祐壬子得末疾越五年殁實寳祐丙辰十二月三日也享年六十有七妃熊氏豐城著姓既歸奉尊章相夫子主饋治家延師教子賔嘉䘮祭常黽勉有亡間必如禮乃止有昔人剪䯻斷機風子男二稺孫先七年卒女二適黄一鶚鄭一䕫孫男三垕震必茂震亦早卒女二曾孫男二以開慶巳未十二月奉二柩合塟于所居之西園嗚呼家之􅀅興非必其先世有竒節異事足以聳動流俗耳目也風流篤厚之意多孝友睦婣之味長君子長者之澤有餘而不盡所謂有是父有是子或曰非此母不生此子者非偶然也徐氏之澤始基於溪雲浸大於溪荘今御史君玉立山峙川増日起由邑最結主知􅀊中三遷遂陟䑓端爲國綱紀駸駸且大任少頃暇之瀧岡之阡何患不表顧墓上之刻不鄙以余属余其敢不銘諸以昭徐氏徳盛流光之懿以對􅀭天子之休命銘曰江西徐宗宗䖏士介臨洪間盖其徙䆄溪源委深且長溪雲爲父溪荘子溪荘恂恂􅁢誠篤温􅀆如玉天鍾美融爲瑞芝溢爲體積慶綿綿開御史朝爲卓魯暮汲魏公朝旌擢清風起西阡雖􅃇命則新我銘宰上材可梓立身􅀭顯殊未巳木杪􅀛趺此其始蕭明􅁢墓誌銘君􅀄名堅字子固後改應新字明􅁢廬陵珠川人廬陵故多蕭氏而珠川亦望族君㧞起其間自㓜岐嶷長益嶄絶種績文學􅋕􅋕與逢掖争鳴三赴天子學銳不少衰氣岸孤聳與人􅁄􅁄不阿號其讀書室曰介林甞謂吾幸守先人廬弗克䂓拓是不肯堂構樓其前曰逼雲復出其旁相我攸宇通之爲園花竹横從朋賔嘨歌脩然有物表之趣㑹予釣逰荒閑位置水石君時一造沛然􅀂自得予以是知君所自􅀒翹如也咸淳二年十二月九日以疾終年四十六曾祖炳文祖國老父景伯妣李氏􅁇毋曾氏妃劉氏男曰宋翁女曰淑慧淑慈淑懿皆㓜卜以四年正月八日歸于淳化郷王田􅀟園之原前期某弟至與其孤造門以銘請銘曰嗟予介林􅀆孑孑而無成大輿之壮􅀆羗中道而折衡意衣冠之雖塟􅀆不能塟其英英瞻雲山之莾蒼􅀆尚骯􅗣之如生􅀚察支使蕭從事墓誌德安府􅀚察支使蕭君安中中大夫江南西路安撫副使兼知吉州諱逢辰第二子撫使公發聞顯庸克開厥家於時爲鉅人長德自其宗族鄰里郷黨待公而舉火者百數十家咸淳四年六月不幸公捐舘君於是年四十有五矣持抱孤姪臨䘮如不勝至經紀其家上下調娱是似是續罔有越厥度􅂘撫使公者􅁇于門􅂘巳則􅀻相語曰我公未􅃍亡乎迄服除如其􅀄􅀖人士莫不嘉君之志而嗟嘆感發以爲撫使公之有子云君字和仲號介􅔴儼然端重人也喜讀書爲文辭倜儻有才氣在􅂰下幹蠱服勤左右無違及論世事有􅁬然自􅀣立事功之意咸淳十二年領江西漕舉寳祐二年以恩授登仕􅀰後三年銓試第一授脩職􅀰􅀽州宜春縣主簿開慶元年以撫使公兼郷郡奏充書冩機宜文字明年改注壽昌軍武昌縣主簿景定五年取舉江西漕咸淳改元循從事􅀰授支使自吕武公以下舉􅀜陞三員親民四員六年十月以疾卒于正寢乃卜塟於永豐百蛟之原朝奉郎文天祥以其子元永哭請銘爲之銘語曰三年無改於父之道可謂孝矣嗚呼蕭君克蹈聖言雖不得禄與不得年見於先人無忝爾生有子有孫以莫不承祭文祭歐陽巽齋先生維􅀊次癸酉正月乙􅆗朔越七日辛酉學生具位文某謹致祭於故先生殿講大著刑部巽齋歐陽公棺前嗚呼先生􅀅安歸邪先生之學如布帛菽粟求爲有益於世用而不爲髙談虚語以自標榜於一時先生之文如水之有源如木之有本與人臣言依於忠與人子言依於孝不爲曼衍而支離先生之心其真如赤子寕使人謂我迂寕使人謂我可欺先生之德其慈如父母常恐一人寒常恐一人饑而寕使我無卓錐其與人也如和風之着物如醇醴之醉人及其義形於色如秋霜夏日有不可犯之威其爲性也如槃水之静如珮玉之徐及其赴人之急如雷霆風􅀨互發而交馳其持身也如􅂂氷如奉􅄹如䖏子之自㓗及其爲人也發於誠心摧山岳沮金石雖謗興毀來而不悔其所爲天子以爲賢縉紳以爲善􅁼海内以爲名儒而學者以爲師鳯翔千仞遥增擊而去之柰何一蹶而不復支以先生仁人之心而不及試一郡以行其惠愛以先生作者之文而不及登兩制以彷彿乎盤誥之遺以先生之論議而不及與聞國家之大政令以先生之學術而不及朝夕左右獻納而論思抑童而習之白紛如也雖孔孟聖且賢猶不免與世而差池先生官二著不爲小年六十五不爲夭有子有孫而又何憾於斯死而死耳所以不死者其文在名山大川詔百世而奚疑某弱冠登先生之門先生愛某如子弟某事先生如執􅀴盖有年于兹先生與他人言或終日不當意至某雖拂意逆志莫不爲之解頥世有從師於千里尚友於異代而同人于門適相值而不違其死也哀斯文之不幸吊生民之無禄其塟也􅃗雞斗飯竊慕古人之義匍匐奔走泫然而􅂘吾􅀻嗚呼巳而巳而哀哉尚享祭都承胡石壁文嗚呼世婉孌以偷生公指九天以爲正也人巵蠟以自矜公玉雪而不曜明也俗􅄦域以誑人於􅄀􅄀公掲日月而撑雷霆也石壁之鋒神入天出金鐡可摧孰爲公直石壁之藴尊華賤質㤗華可移孰爲公筆四海一雲我卷我舒大川獨航予紼予纚萬㣲未燭吾蓍吾􅀛更㡬千百載之祝融而復爲此竒嗟乎余乎登門何晚􅂘野何􅃍操几杖􅀆焉從持佩玦􅀆何所紛雲委􅀆川流化經綸􅀆爲􅁟羗蘭艾􅀆荃茨蹇離騷􅀆􅀫莾苟余情乎得當質九京􅀆千古余有言􅀆孰聞􅀉浪浪􅀆雕爼祭郭正言閶維公㧞起海隅有志天下䖏膩如氷知德者寡鳯音􅄀􅄀朝光作之烏䑓峩峩霜氣薄之公遷諌坡􅀊月㡬何白首丹心之死靡他吁嗟人生死見真實如公一節天地可質神􅂌東返返于五羊曲江吾師菊老未亡不愧二賢公可千古爲酌㢘泉一涕如雨祭道州徐守宗斗温州人文武兩科嗚呼龍虎變化􅀆人物之英風霆流行􅀆宇之名天下之嗇􅀆一州之􅑿三年而一日􅀆侯度是程及召驛之垂駕􅀆胡疢之嬰􅃿而可食於南􅀖􅀆憂民憂國之誠某交􅁩􅀆雲仍王事􅀆弟兄樂莫樂􅀆知心悲莫悲􅀆余哭之㷀㷀下神與􅀆臨蒸桂棹􅀆積雪斵氷操弧矢􅀆上征絶虎虺􅀆縦横噫至人􅀆無死歆余奠􅀆如生祭鄒主簿寕縣嗚呼德元少吾三􅀊自其應門及我交際德元之賢服我以義以我爲兄我胡不弟折節讀書􅀵科入仕子簿臨武語子􅀄筮時予赴宣亦有行事同日出戸舉觴祝子自予汰歸子告還里雍容進趍循循唯唯士别三日刮目相視人十巳干其進未止子之復徃得于吏師幕謀邑事勉焉孜孜子替巳乆子歸何遲輿疾在寢忽不自持子方壮年何質之衰瞀于􅀑神􅁋于禱祠死不相聞歛不與知殯不及夕棄禮如遺哀哀德元而至于斯弱稚惸惸青燈一􅄔吾甚憐子亦復何爲子尚有後念無巳而吾欲匍匐哭子墓垂適有王事載驅載馳明發不寐永懐吾􅀻􅀉情一奠臨文涕洟祭秘書彭止所嗚呼仲至氣和色荘如水之清如玉之剛出而瑞世麒麟鳯凰南宫第一今世歐陽方其退居深自晦蔵蟬蛻衆濁視世如忘展如之人衣錦綗裳覧德斯下吾道彌章頃者刑臣再玷天綱善􅁼相顧驚疑徬徨君首丐去其氣昻昻聞者爲􅁬進言始昌貽書司諌陳義􅁣慷表表愈偉于歐有光我年視君匪鴈其行第也同年居也同郷仕也同舘志也同方用折軰行腹心腎腸我之出守君酌我觴君亦有志方外翺翔王宫爲師秘書爲􅀰君雖欲去志不果償由此而升紫㣲玉堂道以光大亦我所望誰歟西來􅃍報膏肓旦旦引領巳劑其良好音不嗣我心皇皇柰何哲人竟罹于殃嗚呼仲至今也則亡如瑳如磨其孰我相凡百君子罔不䀌傷况我孔厚如我淚滂我有官守我縶我疆君疾云革莫克造床君柩來歸莫哭道傍嗟我有心遡風茫茫嗚呼仲至婉其清􅀭其命也短其存也長生芻一束我意其􅀅庶㡬監兹尚有洋羊嗚呼哀哉祭安撫蕭撿詳名逢辰號平林嗚呼江右之望偉哉我公驅馳白首惟孝惟忠異時廊廟謀選元戍惟公老成必在其中開慶之警四國交訌吉爲樂􅀖飄風其衝拜公于家麾節崇崇公起倉卒談􅀏從容臣有一死惟義之從不敢震鄰不敢震躬事平上印訖不言功優㳺里居惟以壽終鳴呼尚論公之平生􅀆撫蒼莾而歔欷命之通塞􅀆毁譽随之議論之所從始􅀆惟桒梓之不可欺方淮漢之落落􅀆猶曰風馬牛之不相追亦旣與我父兄同生死􅀆寕不我知天有萬分於人􅀆而或猶有怨咨自公之旣殁􅀆使人方感激而追思曰何爲予室之不漂揺􅀆予子之不流離思而不可作􅀆父老至於涕洟豈非生而有定論􅀆尚或接於愛憎之􅀻死而愛憎無所麗􅀆忽天定其奚疑嗟乎見危臨事而不苟􅀆所以委質而爲臣吾亦自盡乎吾心􅀆固非欲求知於人然自古固非抱屈於一世􅀆俟百世而方伸亦有百世不可俟􅀆聽諸天地與􅀑神公死而有遺思􅀆斯人豈不靈是不爲無所遇於當世􅀆尚何憾乎􅄀􅄀議論定於其郷􅀆而傳之天下後世無不本諸人心禦大灾捍大患而得祀􅀆以不忘其德音贈以嘉有功􅀆謚以尊名天下有道􅀆天王聖明吉山之陽公魄所歸素車盈盈白馬纍纍我思古人􅀆斗酒􅃗鷄尚不憚於千里􅀆何百里之辭即公墓􅀆酹酒以致哀作文以諗地下􅀆尚有信於方來祝文過家告廟文昔忝荆臬單車載馳家祀孔嚴曠􅀊弗治靡室靡家中心悵而始告廟朝是縶是維畏此簡書王事敢違悃悃再䟽天髙聽卑解我湘組易贑一麾贑實近止神人具宜人豈及是神之相之載欣載奔薄言還歸千里息肩于廟矢辭代富川酹魁星文維極有斗􅀆垂河漢以耀芒耿衆星之環嚮􅀆儼黄道之開張瞻前杓之烜赫􅀆東枕乎龍角之蒼一水盈盈􅀆咫尺相望一舉手而髙摘􅀆搴萬丈之虹光􅄍竒氣於六合􅀆夕閬風而翊扶桒宇宙之􅆋􅆋􅀆其􅀅見於吾水之涯吾山之陽撃雷鼓􅀆電煌煌酌金罍􅀆􅆽天􅄴代酹解星文維庖人之中肯綮􅀆奏刀騞然􅀂有物以黙運其肘􅀆故利器排割而彌堅矧斯文之新發硎􅀆淬磨乎仁義之淵斫月桂􅀆髙五百丈剸蛟斷犀􅀆奚足言視一朝解十二牛􅀆直㳺刃乎吾前於戱神哉使我頭角露峥嵘相我筆下生雲煙靡靈旗􅀆風翩翩舉天瓢􅀆酌天泉文山先生全集卷之十一終
