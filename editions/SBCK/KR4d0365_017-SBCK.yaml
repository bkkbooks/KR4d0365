front:
  text: 文山先生全集卷之十七文集
  hash: sha256:316c681f65586b4bfba6920567ea80db6ddcb33cddb9df7743d601acc3c54acd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_017-1a}
body:
  text: 宋少保右丞相兼樞宻使信國公文山先生紀年録正文乃公獄中手書附歸全文集註雜取宋禮部侍郎鄧光薦中甫所撰丞相傳附􅀓海上録宋太史氏管發國實至元間經進甲戌乙亥丙子丁丑四年野史平慶安刋行伯顔丞相平宋録參之公􅀁著指南前後録集杜句詩前後卷旁采先友遺老話舊事蹟列䟽各年之下丙申宋理宗端平三年予以五月二日子時生大父夣予騰紫雲而上命名雲孫既長朋友字曰天祥後以字貢于鄕字之者改曰􅂂善理宗覽對策見其名曰此天之祥乃宋之瑞也朋友遂又字之曰宋瑞而通稱之廬陵文氏來自成都公六世祖炳然居永和鎭五世祖正中徙富田曽祖安世贈太保邢國公大父時用贈太傅永國公父儀字士表人稱爲革齋先生贈太師惠國公母曽氏齊魏國夫人丁酉宋理宗嘉熈元年庚子嘉熈四年辛丑宋理宗淳祐元年壬子淳祐十二年癸丑宋理宗寳祐元年甲寅寳祐二年是嵗公夣召至帝所帝震怒責其不孝公哀訴以臣實孝帝曰人言卿不孝卿言卿孝賜以金錢四遣去公岀門而震雷欲擊之自嘆曰幸免不孝之罪而又不免雷擊驚覺汗如􅀨後一舉登第而有父䘮但未觧四金錢爲何義乙卯寳祐三年是􅀊大比以字舉郡貢士弟璧同舉冬俱赴省侍父革齋先生行予既以字爲名字之者改曰􅂂善提舉知郡李迪舉送革齋先生與弟書曰道由玉山遇異僧指長男曰此郎必爲一代之􅊆人然非一家之福也丙辰寳祐四年二月朔禮部開榜中正奏名弟璧同登及大庭試䇿有司寘予第五理宗皇帝覧予對親擢爲第一臨軒唱名盖五月二十四日也時革齋先生卧病客邸予自期集所請朝假侍湯藥二十八日革齋先生棄世天府治䘮榜下士資送道路費粗給兄弟即日扶護還里以君子不家於䘮沿途餽送並不受丁巳寳祐五年九月葬革齋先生戊午寳祐六年八月從吉時丞相丁大全用事或􅂆通書者予曰仕如是其汲汲􅁘郡侯欲爲言于朝除􅀄官力辭謝得止己未宋理宗開慶元年五月臨軒䇿士㫖差簽書寜海軍節度判官㕔公事朝廷檢㑹照格授承事郎予聞命辭免乞行進士門謝禮㫖令朝謝訖之任九月入京時江上有變呉丞相潜􅂯相初入都知董宋臣主遷幸議京師洶􅍅予門謝訖即上䟽乞斬董宋臣以一人心以安社稷建明倣方鎭建守就團結抽兵破資格用人數事書奏不報還里􅃇例三魁唱名罷賜􅂁笏謝恩入幕賜御饌進謝恩詩岀賜席㡌扵闕門上馬迎入期集所又名状元局官給錢物供張皂隷等於此聚同年待賔客刋題名小録賜聞喜宴進謝宴詩如此者一月然後率榜下士詣闕謝恩謂之門謝門謝後授初階内状元授承事郎簽書某軍節度判官㕔公事至後一科放進士榜則前一科状元召入爲秘書省正字名曰對花召庚申宋理宗景定元年二月差簽書鎭南軍節度判官􅈦公事辭免乞祠禄㫖差主管建昌軍仙都觀辛酉景定二年十月除秘書省正字時賈丞相似道當國年餘頗訝不通名及除入舘得予書舉張師徳兩及吾門故事始重嘉歎誥詞曰倫魁登瀛故事也然始進大率以虛名既乆乃知其實踐爾則異於是初以逺士奉董生之對􅁇以卑官上梅福之書天下誦其言高其風知爾素志不在温飽麟臺之召其來何遲語有云居大名難又云保晚節難爾其厚養而審發之使輿論翕然曰朕所親擢敢言之士可劉克荘行壬戌景定三年四月供正字職尋兼景獻府教授五月克殿試考官進校書郎誥詞曰新進士唱第前舉首必召故事也爾以陟岵之故稽登瀛之擢一旦來歸如麟􅀗泰畤鳯集阿閤甫繙黄本俄映青藜在他人爲速在爾爲晚矣人之不可及者年也不磨者名也至哉天下樂者書也朕将老汝之才而極其用焉耳癸亥景定四年正月除著作佐郎二月兼􅁠刑部郎官刑部事最繁重居官者率受成於吏號清流者尤所不屑爲之鈎考裁决晝夜精力不倦吏不能欺懾服焉八月以董宋臣覆出爲都知上䟽論其惡不報束擔将岀􅀜丞相遣人謂公不可差知瑞州十一月赴郡十二月迎親就養郡兵火後瘡痍乍復予撫以寛惠鎮以㢘静郡兵素驕取其桀􅀧寘之法張布綱紀上下肅然於交承外積緍錢萬創便民庫去之日填兵出前窠名爲楮百萬有竒遺愛在民乆益不忘甲子景定五年十月召赴行在尋除禮部郎官十一月除江西提刑辭免不􅁢乙丑宋度宗咸淳元年二月就瑞州交割提刑職事時大赦後推廣德意全宥居多惟平冦扶楮稍振風采四月行部至吉州太和縣伯祖母梁夫人殁予父所生母也申觧官承心制間臺臣黄萬石以不職論罷是歳闢文山臨江城中金地坊銀匠陳見􅀒闗㑹過于市者歎曰我等困苦止欠此䭾耳翼早盗殺􅀒闗㑹人慧力寺後山中捕司跡盗急市荷擔行鬻􅟿餌者以所聞陳語告捕司鞠陳箠楚誣服将受刑辭其母曰爲子不能終養必宿􅁈債無可說者望吾母焚􅁓錢於吾死處告􅁟神乞指引我到盗殺人處又焚􅁓錢於盗殺人處告􅁟神乞指引我到殺人正賊之家母如其言後月餘母夣子告曰謝母巳得正賊乃府衙後李某家所得闗㑹具在暗閣上竹籠内於吾死後止用訖􅀜㑹買牲酒賽謝神福内覆􅁓單籠上用草爲􅃒盖塵􅁅積滿一二日文提刑到請母爲陳訴越數日公到陳母乞屏左右持素􅁓以所夣訴公即命有司同陳母詣卒閣悉如夣遂以李償􅀒􅀜㑹人死推司及元捕人償陳死官贍養陳母終身此趙君厚言也丙寅咸淳二年丙寅戊戌庚戌丙子長男道生生丁卯咸淳三年丁卯壬寅甲午丙寅次男佛生生二月女柳生三月女環生九月除尚左郎官辭免不􅁢十二月赴闕供職誥詞曰蘇軾有云仁宗皇帝在位最乆得人最盛進士高科􅀋至顯位我理宗享國庻㡬仁祖取士之數􅁍又夥焉當時褎然之選今其存者無不登進獨爾以陳情之表讀禮之文淹恤在外尚遲嚮用夫風之積不厚則其􅀒大翼無力􅀂爾之植立不凢非特以高科也而又益培厥栽則其滋長也孰禦尚左高於郎位其以是起家方天之休敬之哉可馮夣得行戊辰咸淳四年正月兼學士院權直兼國史院編修官實録院檢討官是月臺臣黄鏞奏免所居官冬至除福建提刑臺臣陳懋欽奏􅆍新命己巳咸淳五年四月差知寜國府辭免不􅁢十一月領府事府極彫弊始至爬梳條理曠然無亊寜國爲郡居上流斗絶稅務無所取辦則椎剥爲民害予奏罷之别取郡計以􅀘課額百姓􅂬舞去後争醵錢立祠先是乙卯春公家趍城三十里日冷水坑旅店胡翁夜夣門外巨石有龍蛻􅀲其上夣甚著覺而異之昧爽即擁帚掃除石驗所夣巳而公至則坐于石更屨翁言早寒願飯而去詞意甚勤公問故以夣告且曰他日必富貴願埀憐我家公諾焉由是公家人徃還經從必飯其家歳時翁嫗至公家必優贈與至是公載家寕國弭任歸午飯胡店胡以宿諾請公笑曰諸擔中任擔取其一胡屢謝不敢則擇取一擔以告公令衆啓擇視之則扇也公曰此逺方􅁟宜爲郷里親友餽者汝無用焉命衆估時值以其直與之盖胡以公五馬貴如他人皆輜重充溢不知公行槖固枵然是以任其自擇無嫌也公之子孫過之胡之子孫仍奔走迎送不倦公家亦時優恤之一夣之吉乃纒綿受實惠異哉此胡老之言也庚午咸淳六年正月朔除軍噐監兼右司辭免不􅁢四月供監職免兼右司尋兼崇政殿說書兼學士院􅁠直兼玉牒所撿討官㑹平章賈似道託疾歸紹興乞致仕㫖令學士院䧏詔不􅁢賈有要君之志予當制裁之以正義時内制相承皆呈藁當國改竄惟命重失王言之體予直道而行遂忤賈意七月除秘書少監兼職依舊臺臣張志立奏免所居官辛未咸淳七年冬至除湖南運判臺臣陳堅表􅆍新命是年起宅文山山在廬陵南百里居予家上游兩山夾一溪溪中石林立水曲折其間從高注下姿態横岀山下石􅀹竒恠跨溪綿谷低昻卧立各有天趣山上下流泉四出随意灌注無所不之其高處靣􅀔數百里俯視萬􅊤雲烟芊綿真廣大之􅀚也其南曰南涯可五里主人日領客其間窮幽極勝樂而忘疲其北曰北涯以南長潭爲止清逺􅀷絶盖以時至焉宅基在南涯其地平曠長可百丈餘􅀷可三十丈溪水至其前泓渟演迤山􅀔盤礴如拱如趍盖融結非偶然者宅當其㑹青山屋上流水屋下誠􅀮者之居也予於山水之外别無嗜好衣服飲食但取粗􅆘不求鮮美於財利至輕每有所入随至随散不令有餘常歎世人乍有權望即外興獄訟務爲兼并登第之日自矢之天以爲至戒故平生無官府之交無鄉鄰之怨閑居獨坐意常超然雖凝塵滿室􅀂無所睹其天性澹如也於宦情亦然自以爲起身白屋觧逅早逹欲俟四十三歳即請老致仕如錢􅀂水故事使國家無虞明良在上退爲潜夫自求其志不知老之将至矣時之不淑命也何尤山中新宅後聞江上有變即罷匠事惟􅆹堂僅成癸酉咸淳九年正月除湖南提刑辭免不􅁢三月領事䟽决滯淹一路無留獄連平巨冦道路肅清冬乞便郡侍親差知贑州是年夏見古心先生江公萬里於長沙公從容語及國事憫然曰吾老矣觀天時人事當有變吾閱人多矣世道之責其在君乎居一年而難作公家番昜城䧟義不辱自沉而死予灑血攘􅃑顛沛驅馳卒以􅀌軍䧟没無益於天下追念公言輙爲流涕甲戌咸淳十年三月赴贑州平易近民與民相安無事十縣素服威信人自相戒無有岀甲廣人以按堵故具官設位家置香火以報恩六月慶祖母劉夫人年八十七郡民自七十以上與錢酒米帛有差有婦人百三歳者十一月二十一日哀痛詔勑門下先帝傾崩嗣君冲㓜吾至衰耋勉御簾帷曽日月之㡬何凛淵氷之是懼憤兹醜虜闖我長江乘􅂩抵􅇖誘逆犯順古未有純是夷虜之世今何至泯然天地之經嘅國歩之阽危皆吾德之淺薄天心仁愛示以星文而不悟地道變盈警以水患而不思田里有愁嘆之聲而莫之省憂介胄有飢寒之色而莫之撫慰非不受言也而玩爲文具非不恤下也而壅於上聞靖言思之出涕滂􅀂三百餘年之德澤入人也􅀷百千萬姓之生靈祈天之祐亟下哀痛之詔庻回危急之機尚頼文經武緯之臣食君之禄不避其難忠肝義膽之士敵王所愾以獻其功有國而後有家胥保而相胥告體上天福華之意起諸路勤王之師勉䇿勲名不吝爵賞故兹詔諭想宜知悉乙亥宋㓜主德祐元年正月朔日得報虜渡江尋詔下召諸路勤王奉詔起兵二月除右文殿修撰樞宻副都丞㫖江西安撫副使兼知贑州尋兼江西提刑進集英殿修撰江西安撫使四月領兵下吉州除􅁠兵部侍郎職任依舊五月丁祖母劉夫人憂觧官承重六月葬劉夫人起復命下七月七日大軍發吉州至衢州除􅁠兵部尚書職任依舊八月至闕下駐兵西湖上九月除浙西江東制置使兼江西安撫大使知平江府事陛辭乞斬吕師孟釁鼓不報十月十五日入府尋除端明殿學士職任依舊遣軍觧圍常州敗於五木正城守間准朝命以獨松關急趣師入衞辭以呉門空虚願分兵戍守命再下還師進資政殿學士浙西江東制置大使兼江西安撫大使置司餘杭守獨松􅀜管史云正月十三日有㫖文天祥江西提刑照巳䧏㫖揮疾速起發勤王義士前赴行在十六日公移檄諸路聚兵積粮二月賈似道駐師魯港復公書勉以宗忠愍功名二十二日賈似道師潰章鑑乃啓除右文殿修撰等職四月用老将王輔佐爲􅄣綂領兵下吉州王尋卒以廣東綂制方興代之江西副使黃萬石有舊嫌又忌公聲望岀巳右以公軍烏合兒戯無益言於朝近臣與厚者佐之遂有留屯隆興府之命大史氏管發曰人心天理誰獨無之文魁義聲一倡而􅁟豪蠻蜒褁粮景從斯亦壮矣而或者猶以猖狂議之時士友爲之歌曰出師自古尚張皇何况長江恣擾攘聞道義旗離漕口巳驅北􅀐走池陽先将十萬來迎敵最好諸軍自褁粮說與無知饒舌者文魁元不是猖狂有㫖文都承将所部人兵留屯隆興非但爲隆興守禦計異時随機用事其爲效與勤王等今據文都承申所部之兵皆􅁟豪忠義銳氣方新􅀾􅋐可望勝捷不可閉之城郭詞氣甚壮此朝廷之所樂聞劄江西安撫副使提刑知贑州殿撰文都承且照累劄時暫駐隆興府續聴行下以圖雋功奉寳批知察院孫嵘叟奏言江西安撫使文天祥申准省劄令江西副使黄萬石星馳入衛文天祥将所部勤王義兵留隆興府事天祥以身許國義不辭難上下東西惟命奔走伏念天祥猥起書生豈諳兵事昨者恭承太皇太后詔書召天下勤王天祥待罪一州忠憤激發不能坐視移檄諸路兾有盟主願率兵以從人心未易作興世事率多沮撓北兵日迫血淚横流伏􅂪公朝除天祥右文殿修撰樞宻都承㫖江西安撫使續准除江西提刑天祥極知該恩過當所當辭免痛心時危無暇爲平時揖遜亟憑使名召號所部惟是帥司無兵無将無官無吏無錢無米徒手自􅁬立爲司存今巳結約贑州諸豪凡溪峒剽悍輕生之徒悉巳紏集取四月初一日提兵下吉州㑹合諸郡民丁結爲大屯來赴􅊴下忽得留屯隆興指揮觀聽之間便生疑惑縁天祥所統純是百姓率之勤王正以忠義感激使行又有官資在前爲之􅂆勵此曹銳氣方新戰闘可望勝捷􅀂閉之城郭責以守禦日月淹乆烏合之衆不堪安坐必至潰逃此勤王與留屯較然利害之不同也謹􅄋忠忱告鈞慈特與收回留屯隆興之命容天祥照累䧏㫖揮将所部義兵來赴闕下至衢州時以公軍抗徤有紀所過秋毫無犯近臣大驚遂除權工部尚書八月十七日内批文天祥除權工部尚書兼都督府叅賛軍事職任依舊十九日奉詔入衛墨經從戎仰藉朝廷威命奬率江右湖南淮廣諸項軍馬見抵京畿除巳具状中省乞判命重臣交管放令終䘮外謹具兵籍六冊繳中詔勑三省進呈卿状辭免二書兼督賛事具悉自吾有敵難羽檄召天下兵惟卿首倡大義紏合熊羆之士誓不與虜俱生文而有武儒而知兵精忠勁節貫日月質神明惟寵嘉之投􅃑纓冠提兵入衞師律嚴肅勝氣先見宗社生靈恃以爲安繇少常伯進長冬卿未足以酧賢勞相臣督師于外命卿參佐庻㡬集􅁢文采石之功夫移孝爲忠以國爲家古有明訓矧急危之秋其徃求朕攸濟理考親擢魁彦以貽孫謀意其在此又何遜乎故兹詔示想宜知悉二十六日起復朝奉大夫江西安撫使辭免不􅁢内批文天祥依舊工部尚書兼督賛除浙西江東制置使兼江西安撫大使知平江府事二十八日勑三省進呈卿状辭免權工部尚書江東制置使兼知平江府恩命事具悉朕未堪多難􅆠圉孔􅁄御事罔不曰艱大天毖我成功所惟時魁儒秉忠倡義奨率三軍入衞社稷國􅀔爲之増重人心恃以爲安精神折衝文武是憲􅀂稽高廟命臣頥浩開制閫于江浙宏濟中興之業􅂄定敉功卿噐度才猷克邁前哲惟長江之險要未復畿甸之偹守當嚴命卿以大常伯兼領二使表裏撑拓以固吾圉東西運掉以清虜氛儒師一臨士勇百倍用保义我文祖受命民兹惟豐􅉮貽謀之意亟其禡牙紓服宵旰之勞所辭宜不􅁢正言曽唯奏吳門奥區今爲􅁁地倫魁雋至忠孝勤王軍中喧騰小苑甲兵之謡河上尚稽光世節制之命九月初七日勘㑹文尚書奬率義兵入衛王室忠忱義㮣􅀷可嘉尚除巳頒三路制帥之命仍兼督府叅賛知平江府今巳日乆秋風浸致事不可緩合行催促湏議㫖揮㫖令文天祥不候辭朝疾速前去之任所有一行軍兵除巳别議支犒外其餘諸項管軍頭目人合與優加推賞及辟置官屬科䧏錢粮一應合行事件並仰逐項條具開申以憑施行史云文尚書開閫招軍備禦朝廷科䧏十八界二千萬貫金一千兩銀五千兩迪功從事承信崇義郎官誥各五十道校副尉資帖各一百道鹽萬五千袋節次支犒錢十八界四百七十九萬七千五百貫口劵錢米十八界一百二十六萬三千九百五十貫米二萬四千二百五十餘石貼􅂇軍士使用錢十八界一十萬貫截撥錢銀米十八界十八萬八千三百貫銀五千五百五十一兩米四萬九千五百二十餘石起發特支犒錢十八界二百萬貫巳上総計金一千兩銀六千五百五十兩鹽一萬五千袋十八界二千八百三十四萬六千餘貫官誥二百道資帖二百道米七萬三千七百七十餘石十六日除端明殿學士制詞曰勑元戎十乘先行式􅀝真儒之望師中三命承寵遹隆方靣之權朕􅀂稽先朝之舊章最重承明之䆳職内以傳畿廷之彦外亦褒帥閫之賢王素之牧平凉程勘之蒞益部皆膺兹選今得其人某官實學濟時英猷緯國文有武備義槩質于神明儒知軍情忠忱貫于霜日傳檄召兵而志士􅁬纓冠赴難而國􅀔張不􅀒素定之榮􅁢謂寡二之畧予欲復江表之疆宇命爾攘除予欲壮浙西之翰藩咨爾修扞威稜聳前茅之令夷虜折破竹之威惟任之專者位必崇惟名之至者功必集乃躋班規殿之峻以増華帥闑之嚴噫􅀖咸喜戎有良翰茂對陟明之渥身雖外心在王室趣成敵愾之勲二十七日文制使辟周天􅂹帶告院􅄈差江西撫叅留司隆興府揚仔帶行吏架􅄈差江西撫機何時帶工轄􅄈差江西撫㕘並分司吉州文天祐帶史舘檢閱􅄈差江東制幹分司徽州林棟帶禮兵架閣􅄈差浙西制幹分司常州十月弟壁㫖除直秘閣主管崇道觀誥詞曰勑具官某惟爾哲兄以鴻儒魁望倡義勤王忠於爲國而不謀家乃命閫制修扞我難尔競爽有令譽虞侍陔養叔出季處恩義兩盡寓直水天之峻賦禄桐栢之祠清且佚矣孝友是亦爲政徃其祗􅀂季弟璋特與免銓􅂶浙西制司内机十一日賜詔曰卿秉忠忱以濟時難倡義旅以衞王室經营四方如召虎奬率三軍如武侯爰咨常伯之英赴􅁬制閫之􅀉将士用命遂汛掃於虜氛精神折衝益振􅀭於勝氣有嘉體國之志亟奏攘夷之勲元戎啓行周􅀖咸喜載加錫賚式示眷懐今賜卿金二十兩注盌一副金十五兩盤盞一副細色二十匹纈羅二十匹龍涎香三十餅度金香合一具十兩清馥香三十帖龍茶十斤至可領也故兹劄示其體吾注􅀝之意十八日常州破公在平江四十日去三日而通判王矩之環衛王􅀖傑以城迎䧏二十三日北兵破獨松関留夣炎遁十二月内批文天祥簽書樞宻院事十六日隆興府劉槃以城降制置黃萬石移閫撫州聞北兵至而遁都綂宻宥迎敵就擒通判施至道以城䧏丙子宋徳祐二年五月改景炎元年正月二日除知臨安府辭不拜詣門陳大計不得見日賛廟謨救宗社危亡十八日伯顔至臯亭山是夕宰相陳宜中遁十九日早除樞宻使午除右丞相兼樞宻使都督諸路軍馬懇辭間奉㫖詣北軍講觧二十日以資政殿舊職詣北營見伯顔陳大誼詞㫖慨慷虜頗傾動留营中不遣明日宰相吴堅賈餘慶以下以國䧏予責伯顔留使失信罵吕文煥逆賊引虜䧟國并數吕師孟叔姪罪惡求死北營虜置兵衞守遂不復還其勤王兵朝廷放散西歸二月八日虜驅予随祈請使吳堅賈餘􅂟等入北十八日至鎮江二十九日予與杜滸以下十一人夜走真州三月初一日入真州城初三日真州給出西城門閉弗納尋遣兵謢送岀境是夕三更抵揚州西門不敢入從者四人逃初四日伏城西荒山空屋中虜􅀐萬計過屋後㡬不免初五日移止賈家庒卧敗墻糞穢中是夜趍高郵迷失道初六日早遇哨縳去一人殺傷一人餘幸完初七日匍匐至高郵亟下船歴七水寨十一日至泰州伏城下二十二日發舟與虜􅀐相先後二十四日至通州閠三月十七日遵海而南三十日至台州境地名城門鎮自城門陸行四月八日至温州五月朔景炎皇帝於福安登極改元以􅀚文殿學士侍讀召赴行在是月二十六日至行都門授通議大夫右丞相樞宻使都督諸路軍馬連上章辭改樞宻使同都督諸路軍馬七月四日發行都十三日至南劒聚兵十一月入汀州正月初八日乙亥劉察院廷瑞進稱臣表公請以福王沂王判臨安係民望身爲少尹以死衛宗廟不許張世傑􅀫重兵六和塔公又請於世傑京師義士可二十萬背城借一以戰爲守世傑勉公歸據江西巳歸淮堧以爲後圗十五日壬午在朝臣一時俱逸十七日伯顔至高亭山距臨安三十里趙吉甫賈餘慶獻􅀓國玉璽䧏表是夕宰相陳宜中遁世傑遁十八日乙酉北兵至臨安北五十里益王廣王乃從母家出闗渡江大将蘇劉義以兵衛間走永嘉公實陳此議也十九日早除公樞宻使時北兵巳迫修門内戰守迁皆不及施搢紳大夫士萃於吳堅左丞相府㑹伯顔邀當囯者相見㫖令公詣北軍講觧衆謂公一行爲可以紓囯難囯事至此公不得愛身意虜尚可以口舌動也初奉使徃來無留北中者公亦欲覘之歸而求救囯之䇿於是二十日詣北營至則留營中唆都忙古歹舘伴􅀷悔一出之誤從􅁷者有意推䧟公不覺也二十一日宰相呉堅賈餘慶等以國䧏且䧏詔副以省扎俾各州縣歸附左丞相呉堅等五人捧表獻􅁟北庭號祈請使二十四日辛􅆗伯顔遣鎮撫唐兀兒宋趙興相等先罷散文天祥所招義兵一萬餘衆令各歸鄕里給與文榜公聞之流涕不自堪二月初八日驅公随祈請使入北公不在使列盖驅逐之使去耳盡岀賈餘慶計䧟先一夕公作家書巳處置家事擬翼日行則引决家叅政則謂公死傷勇祈而不許死未爲晚公亦以是􅀮忍猶兾一日有以報國先是正月十九日客賛公使北天台杜滸梅􅊤議㫁㫁不可客逐之去後二十日公北行諸客皆散梅􅊤憐公􅀌苦慨然相從朝㫖改宣教郎除禮兵部架閣文字十八日至鎮江請十九日渡江公自父京城外北兵營日夜謀脫不得間至是益急謀舟夜渡杜遂醉遊於市銀三百兩賄老校引間道走十里至江岸以三人􅀉老校家老校余元慶真州故舊也許銀千二百兩得船公於河岸上沈頥家坐卧從公者曰王千戸狼突相随不頃刻離是夕公以明日行買酒辭别鄕􅁟因以其王千戸諸人伺其􅃦熟啓門岀杜狎飲妓家者小卒提官燈公變服從杜岀至人家盡處杜以銀與小卒紿使夾日候某所遂至甘露寺下李成吕武以船至北船連亘十數里至七里港有喝問歹船頼廵船潮退閣淺聞哨齒聲甚清厲舟子拜且禱云江南田相公即得順風各稽首以更生賀二月二十三日阿术平章令諸祈請使手扎勉李庭芝歸附獨公不署名阿荅海左丞入宫召宋太后㓜主即日出宫封府庫以全太后㓜主及福王與苪沂王乃􅁉樞宻使謝堂隆國夫人度宗生母也王昭儀等行三月朔旦至真州守将苗再成迎見語國事感慨流涕越日約觀城王都綂導至城外出制司小引脫回人朱七三等供云軍前見一丞相差徃真州賺城制使遣提舉官來殺丞相安撫不忍加害張路分徐路分來歸行槖衣物五十卒􅃓劍送行海陵唐杜宻謂張徐曰朝廷事未可知文公宰相也今雖奉制司命他日必将移過於下以說汝其審之張徐然之行乆之云安撫令某二人便宜從事某見相公口口是忠義如何敢殺相公遂與張徐以賜金百兩與五十兵以銀百五十兩乃相􅁇辭去明日至􅀭州杜架閣謂制臣欲殺我不如趍高郵通州渡海歸江南見二王伸報國之志徒死城下無益初四日李茂呉亮蕭發余元慶見行止未决携所腰金各百五十兩逃去外既顛躋内又飢渇至半山土圍糞堆中掃净數尺地以衣貼地睡午北􅀐數千自􅁟圍東至忽大風雲雨昏􅉂􅀐馳西去遂得免古廟樵岀槮􅅅乞其餘又迷失道通夕行田間後乃聞北以高郵米擔濟揚州夜遣􅀐截諸津􅀂非迷途當一網無遺􅀂有􅀑神鼓動其間者旦霧􅀮􅀮見哨􅀐趍避竹林􅀐遶林呼噪予藏處馬過傍三四不之見時萬竅怒號雜亂人聲疑有神明相之初七日遇樵夫以簣舁至高郵買舟二十四日至通州得之諜者云上下常與北􅀐隔三四十里又云鎮江走了文丞相大索數日許浦一路馳􅀐追捉聞之駭汗何僥倖甚也通州守楊練使師亮岀郊聞而舘公於郡衣服飲食舟楫皆其爲料理閠月十七日􅀤城下四月八日至温州聞端宗皇帝於福安建大元帥府公奉書勸進議遂决舊客張汴鄒􅘶部曲朱華等皆自閩來迎景炎元年五月朔福安登極以觀文殿學士侍講召赴行在二十六日授通議大夫右丞相樞宻使都督諸路軍馬制詞曰帝王之立中國惟修政所以攘夷輔相之重朝廷惟用儒所以無敵朕作其即位圗厥敉功介臣不二心歴險夷而一致咨汝宅百揆頼文武之全才亟歸右揆之班并授元戎之柄肆􅆒大號專告群工具官某骨鯁魁落之英股肱忠力之佐仁不憂勇不懼坎維心之亨國忘家公忘􅀻蹇匪躬之故敵裔虜之猾夏率義旅以勤王慷慨施給鎧之資豪傑雷動感激灑登舟之淚忠赤天知雖成敗利鈍逆覩之未能然險阻艱難備嘗之巳熟獨簡慈元之愛爰升次輔之聯方單􅀐以行驚破夷虜之膽及免胄而入大慰國人之心天地之所扶持􅀑神亦爲感泣今職方雖非周􅀖之舊而􅀜輔未忘漢室之思伊欲闖輦轂而追三宫復鍾簴而妥九廟非内治􅅚何以實元氣非國威振何以折遐衝披荆􅁄於靈武之初予未知濟􅀵桑榆於澠池之後事尚可爲思昔元勲有如臣浚在思陵巳登於亞相更孝廟乃復於舊班式同今日之中興罔俾前修之專美况同列崇臯陶之遜而初政俟公旦之來庸再秉於國鈞仍惠長於樞宥優督府琱戈之錫峻文階黄繖之除申拓賦㑹式隆寵數於戯春秋以歸季子爲喜朕方徇於􅀻情晉人謂見夷吾何憂爾共扶於興運尚堅忠孝大布公忱迄啚社稷之安茂紀山河之績其祗予命永弼于􅃔連上章辭改樞宻使同都督諸路軍馬十一月入汀州公遣督參趙時賞督諮趙孟濚以一軍取道石城復寜都遣督賛呉浚以一軍屯瑞金復雩都時北軍逼福安車駕航海福安遂䧟丁丑宋景炎二年正月移屯漳州龍巖縣三月至梅州始與一家相見㫖授銀青光禄大夫職任依舊時經畧江西五月入贑州㑹昌縣六月三日戰雩都大捷二十一日入興國縣遣兵攻贑吉斬汀州僞天子黄從臨洪􅀽瑞豪傑響􅀿興國軍黄州新復號令通於江淮不幸攻贑吉兵敗行府趍永豐就處置司㑹兵尋爲追􅀐所及至空坑失歐陽夫人一子二女行府􅀵拾散兵十月入汀州十一月至循州屯南嶺正月北兵大入汀􅀜不守公欲據城拒敵汀守黄去疾聞車駕航海擁郡兵有異志公移次漳州龍巖縣時賞孟濚還軍追及於中途呉浚以虜命來招䧏人情洶洶殛浚乃定時唆都右丞阿刺罕左丞董參政入閩李珏王積翁等巳䧏仍爲福建宣慰招撫等使乃使淮軍羅輝持書來二月復梅州四月斬二大将之䟦扈者曰都綂錢漢英王福以釁皷出江西開府興國縣淮西野人原寨劉源等兵復黄州壽昌軍用景炎正朔者四十日潭州衡山縣趙璠等起兵岳下張琥起兵邵永間跨數縣撫州何時起兵􅀿同都督府分寕武寜建昌三縣豪傑皆遣使詣軍門受要束七月督謀張汴監軍率趙時賞趙孟濚等盛兵薄贑城招諭鄒􅘶率贑諸縣兵擣永豐吉水招撫副使􅀺貴逹率吉諸縣兵攻太和時贑惟存􅀌城吉八縣復其半半垂下臨洪諸郡豪傑送欵無虚日大江以西有席卷包舉之􅀔福建斬汀州僞天子黄從淮西兵復興國軍黄州復壽昌軍湖南所在起義兵不可數計四方響􅀿孔明有云漢事将成也天未悔禍相望旬日間贑吉州皆以驚潰北兵自隆興來適乘其弊戰於廬陵方石嶺下我師不利及永豐空坑軍士觧散妻子爲虜公􅀵拾餘衆奉老母入汀州轉移諸州将請命行朝請益兵再舉㑹北帥劉􅀷自海至唆都自陸至道路梗塞朝訊㫁絶公駐循之南嶺柵險以自全􅀺貴逹􅀚望有隂謀事覺伏誅八月􅀺貴逹以正軍千人民兵數千次鍾歩遇北軍民兵驚潰未旬日汴賞濚率民兵數萬逼贑城北軍以百餘􅀐衝之衆奔潰􅘶聚兵數萬在永豐境亦潰北元帥李恒等以大軍乘其弊追及於東固方石嶺下都綂鞏信率數十卒短兵接􅀾北帥駭其以寡拒衆疑山中有伏歛兵不進信坐巨石餘卒侍左右箭雨集屹不動北愈疑􅀗村夫引間道踰嶺至山後􅞔無人焉就視信等創遍體死未仆耳以此北􅀐稽滯公遂得逺去空坑陳師韓曰二十七日公至空坑潰卒困憊藉地睡公宿山前師韓家夜得報追􅀐巳逼陳送公由間道去諸卒不之知也追􅀐至詰公所在無知之者遂攻破其寨屠之公行山逕逼窄民老㓜􅀒荷奔走填塞公窘迫不能前既而山墜巨石横壅于路追􅀐至迂廻扳縁前公去遠矣至今居民指爲相公石鄷古庭主簿曰公既遁追􅀐将及是早重霧尋丈逺不相覩公猶聞後喧閧聲乃􅀐見轎中人風姿􅊆然問爲誰曰姓文􅀐以爲丞相也群擁至帥所問之必曰姓文問轎夫咸不知也遍求俘虜人識認乃有曰此趙通判時賞也以此追􅀐逗留公又得逺去趙至隆興帥府罵不絶口遂受害歐陽夫人曰空坑敗潰卒意公所向疾至随䕶公命五百拏手斫山􅀣爲鹿角池隘道頃之數人􅀒傷至則五百拏手巳摧踣不支公即去夫人驚問故則追􅀐巳林立于前夫人與佛生柳小娘環小娘顔孺人黄孺人等皆爲俘虜夫人沿路意有􅀷水險崖即投死而一路坦平至元帥所巳失佛生必有愛其俊秀養爲巳子矣戊寅宋景炎三年二月進兵惠州海豐縣三月屯麗江涌衝遣間使沿海訪問車駕六月行朝至厓山行府移船澳䂓入覲八月授少保信國公職任依舊封母曽氏齊魏國夫人九月齊魏國夫人薨㫖起復十一月進屯潮州潮陽縣十二月十五日移屯趍海豐二十日爲虜􅀐追及於道軍潰􅀍執服腦子不死見張元帥抗節不屈張待以客禮四月十六日大行皇帝遺詔曰朕以㓜冲之資當艱厄之㑹方大皇命之南服黽勉于行及三宫胥而北迁悲憂欲死卧薪之憤飯麥不忘柰何乎人猶托於我渉甌而肇覇府次閩而擬行都吾無樂乎爲君天未釋于有宋強􅈾推戴􅀷抱懼慚而夷虜無厭氛祲甚惡海桴浮避澳岸棲存雖國歩之如斯意時機之有待乃季冬之月忽大霧以風舟楫爲之一摧神明㧞於既溺事而至此夫復何言矧驚魂之未安奄北哨其巳及頼師之武荷天之靈連濵於危以相所徃沙洲何所埀閱十旬氣候不齊積成今疾念衆心之鞏固􅃘萬古以違離藥非不良數不可逭惟此一髮千鈞之託幸哉連枝同氣之依衛王某聦明夙成仁孝天賦相從險阻乆繋本根可於枢前即皇帝位傳璽綬䘮制以日易月内庭不用過哀梓宮母得輙置金玉一切務從簡約安便州郡􅁠暫奉陵􅆍嗚呼窮山極川古所未嘗之患難凉德薄祚我乃有􅀒於臣民尚竭至忠共持新運故兹詔示想宜知悉十七日祥興皇帝登寳位詔曰朕勉承丕緒祗􅀂令猷皇天付中國民既勤用德聖人居大寳位曰守以仁藐兹􅄅冲適際危急惟我朝之聖神􅁇綂而家法以忠厚傳心滲漉在人億萬年其未泯遭逢多事百六數之相乗先皇帝聦明岀乎群倫孝友根於天性痛憤三宫之北未嘗一日而忘遺大投艱丕應徯志除􅇯刷耻惟懐永圗托於神明辱在草莾上霧下潦之所􅅯薄洪濤巨浪之所震驚謂多難以殷憂宜祈天而永命胡寜予忍而不其延日月爲之無光社稷凛乎如髪攀髯何及􅁇志其誰以趙􅀌猶幸僅存盍使爲宗祧之主以漢賊不容兩立庶将復君父之讐大義攸􅀜輿情交迫閔予小子遭家不造而况斯今于前寕人圗功攸終其難莫甚尚頼元勲宿将義士忠臣合志而并謀恊心而畢力敵王所愾扞我于難兹用大布寛恩率循􅃔典于以導迎和氣于以迓續洪休可大赦天下於戯人心有感則必通世運無徃而不復成誦雖㓜有周寜後於四征少康之興祀夏實基於一旅徃求攸濟咸與維新十七十八十九日文武百官詣大行皇帝几筵殿早晚臨二十日卒哭行香二十一日以登極差官奏告天地初獻張世傑亞獻趙溍終獻林永年奉禮郎潘岳丁􅀿張太祝陶士遜太官令辛大濟宗廟初獻曽淵子陸秀夫亞獻蘇景瞻辛巖終獻賈純孝茅相奉禮􅀰王子宜張祺孫太祝朱拱戊趙時侉社稷初獻蘇劉義亞獻劉䁀孫終獻趙槖奉禮郎傳半千曹郃太祝徐天麟二十二日内批百官議謚號孝㳟仁􅁉懿聖濬文英武勤政皇帝廟號端宗二十三日太皇太后加上尊號鄧傳云五月公始聞端宗皇帝晏駕干化州之碙川今上即位以明年為祥興初三日碙川神龍見祥臣庻咸覩合議優異碙川可升爲祥龍縣置令丞簿尉􅀠化州免租稅諸色科糴五年五月二十五日内批文璧除􅁠戸部侍郎廣東総領兼知惠州六月公規入覲爲張世傑所格不得進遺使奉表起居仍自劾督師罔功降詔奬諭詔曰勑天祥才非盤錯不足以别利噐時非板蕩不足以識忱臣昔聞斯言乃見今日卿早以魁彦受知穆陵歴事四朝始終一節虜氛正惡鞠旅勤王皇路巳傾􅂢軀徇國脫危機於虎口渉遠道於鯨波去桀就湯可􅀚伊尹之任歸周辟紂咸喜伯夷之來方先皇側席以需賢乃累䟽請身而督戰精神鼓動意氣慨慷以匈奴未㓕爲心棄家弗顧當王事靡盬之日将母承行忠孝兩全神明對越雖成敗利鈍非能逆暏而險阻艱難亦既備甞如精鋼之金百鍊而彌勁如朝宗之水萬折而必東尚遲赤舄之歸巳抱烏號之痛朕勉當􅁇紹未有知思政兹圗任舊人克戡多難倐來候吏疊覧封章巋然靈光之固存此殆造物者隂相胡然引咎益見勞謙至如諗問之勤備悉忱悃之至朕今吉日既戒六月于征􅀝卿愛君憂國之忠成我刷耻除􅇯之志􅃡懐􅂄俊􅀷切嘆嘉公又奏乞除鄒􅘶右文殿修撰樞宻都承㫖江西安撫副使兼同都督府參謀官趙孟濚遥縣郡團練使左驍衞将軍江西招捕使兼同提刑都督府􅖴議官杜滸帶行軍噐監廣東招諭副使兼同都督府叅謀官鄒臻􅅁大府寺丞同都督府叅議官陳龍復􅅁行兵􅀰廣東招諭司使兼同都督府叅議官章從範􅅁行閤門祗候同都督府計議官丘夣雷林􅄾􅁑鍾各􅅁行架閣同都督府幹辦公事朱文翁同都督府准備差遣㫖特依奏除公又奏潮循梅三郡並巳取到返正状乞将陳㦤除右驍衞将軍知潮州兼管内安撫使張順􅅁行環衞官權知循州李英俊􅅁行閤門祗候差梅州通判暫權州事㫖特依奏文璋􅅁行大理寺丞知寜武州公欲移軍入朝優詔不許公欲八廣州凌震王道夫始復廣自恣惮公望重陽遣舟迎中道散回遂不果自去冬宜中遁占城世傑以樞副柄國日以迎候宜中還朝爲辭盖諸大将甞受宜中超擢樂其寛縱忌公英氣或以副貳受節制意不便其至八月授少保信國公封母曽氏齊魏國夫人同都督府官屬各轉五官金三百兩犒軍公以書抵秀夫天子冲㓜宰相遁荒制詔勑令岀諸公之口豈得不恤軍士以游詞相拒秀夫太息不能荅時同督府疫死者數百公亦數病九月六日母曽夫人薨㫖遣使宣􅀕十月長子道生卒陳懿兄弟五人號五虎本劇盗㩀潮州數叛附人苦其虐又不聽同督府節制公聲其罪討之懿走山寨潮士民請移行府于潮十一月進屯潮州潮陽縣殪㐫攻逆稍正天討假以歳月因潮之民阻山海之險増兵峙粮以立中興根本亦吾國之莒即墨也劉興爲潮宿㓂叛服不常據數郡䟦扈殺掠􅀹慘遂誅之十二月十五日聞北帥張弘範自明秀歩􅀐水陸並進乃入南嶺柵險自固二十日弘範以水陸兵奄至公引避山谷行且數日虜輕􅀐疾馳追及於道軍潰􅀍執求死於鋒鏑不可得服腦子以必得冷水乃死告監者以渴甚於田間蹄涔中掬水飲之時公病目旬餘遂泄瀉而目愈竟不得死越七日至虜营踊躍請劍弘範知不能屈乃曰殺之名在彼客之名在我且天祥見伯顔皐亭山吾實在傍遂以平揖相見叙間闊如客禮盖歳除前三日也先是適鄒㵯等自江西以民兵數干至公少留劳之又駐和平市攻陳懿黨與駐軍造粮亦意後隔海港歩􅀐未能遽前陳懿以問罪窘迫百計不能救觧乃挾重賄迎導北帥張弘正潜具舟海岸濟輕􅀐直指督帳公坐虎皮胡床與客飯五坡嶺不意虜至遂􅀍執己卯宋祥興元年正月二日張元帥王海置予舟中初六日發潮陽初八日過官富塲十三日至厓山二月六日厓山行朝潰三月十三日虜舟還至廣州張元帥遣都鎮撫石嵩䕶予北去以四月二十二日行五月二十五日至南安軍明日東下鑰予於船二十八日至贑州六月一日至吉州初五日過隆興十二日至建康囚邸中八月二十四日北行渡江頗有事㑹不濟二十六日至揚州九月七日哭母小祥於邳州初九日至徐州十五日至東平府二十日至河間二十一日至保定府十月一日至燕初至立馬㑹同舘前舘人不受盖謂舘以受投拜人不受罪人也乆之引去一小舘置予於偏室舘人不之顧次日晚供帳飲食如上賔舘人云禀慱羅丞相得語云然初四日張元帥者始至初五日見其用事大臣具言予不屈状至午送予於兵馬司枷項縳手坐一空室衞防甚嚴所携衣物錢銀官爲封識日給鈔一錢五分爲飲食坐十餘日然後觧手縳又坐十餘日得疾十一月二日䟽枷惟繫頸以鎍得出戸􅀒暄初五日赴樞宻院院官不及見自是日赴院輙空歸至初九日院官始引問院官者􅀶羅丞相張平章有所謂院判簽院等不能識也倨坐召見予入長揖通事曰跪予曰南之揖即北之跪吾南人行南禮畢可贅跪乎􅀶羅叱左右曵予於地予坐不起數人者或牽頸或拏手或按足或以􅂰􅀝予背強予作跪状予動不自由通事曰汝有何言予曰天下事有興有廢自古帝王以及将相㓕亡誅戮何代無之天祥今日忠於宋氏社稷以至於此幸早施行通事曰更有何語止此乎予曰我爲宋宰相國亡職當死今日拏來法當死復何言慱羅曰你道有興有廢且道盤古王到今日是㡬帝㡬王我不理㑹得爲我逐一說來予怒甚曰一部十七史從何處說起我今日非赴愽學宏詞科不暇泛言愽羅愧乃云我因興廢故問及古今帝王你既不肯說且道古時曽有人臣􅀅宗廟城郭􅁟地分付與别國人了又逃走去有此人否予曰謂予前日爲宰相奉國與人而後去之􅁘奉國與人是賣國之臣也賣國者有所利而爲之必不去去者必非賣國者也我前日除宰相不拜奉使伯顔軍前尋􅀍拘執已而有賊臣者獻國國亡我本當死所以不死者以度宗皇帝二子在浙東老母在廣故爲去之之啚耳愽羅曰德祐嗣君非爾君􅁘曰吾君也曰棄嗣君别立二王如何是忠臣予曰德祐吾君也不幸而失國當此之時社稷爲重君爲輕吾别立君爲宗廟社稷計所以爲忠臣也從懐􅉖而北者非忠從元帝爲忠從徽欽而北者非忠從高宗爲忠愽羅語塞平章皆􅀏一人忽岀來曰晉元帝宋高宗皆有來歴二王何所受命張平章曰二王是逃走底人立得不正是􅆲也予曰景炎皇帝乃度宗皇帝長子德祐皇帝之親兄如何是不正登極於徳祐巳去天位之後如何是簒陳丞相奉二王岀宫具有太皇太后分付言語如何是無所受命諸人無辭堅以無受命爲觧予曰天與之人與之雖無傳授之命推戴擁立亦何不可諸人但支離不伏予曰仁者見之謂之仁知者見之謂之知各是其是可也愽羅云你既爲丞相􅀂将三宫走方是忠臣不然引兵岀城與伯顔丞相决勝􅀒方是忠臣予曰此說可以責陳丞相不可以責我我不曽當國故也又曰你立二王做得甚功勞予曰國家不幸䘮亡予立君以存宗廟存一日則臣子盡一日之責何功勞之有曰既知做不得何必做曰人臣事君如子事父父不幸有疾雖明知不可爲豈有不下藥之理盡吾心焉不可救則天命也今日文天祥至此有死而已何必多言􅀶羅於是怒見之辭色云你要死我不教你便死禁持你予曰我以義死禁持何害也􅀶羅愈怒云云通事亦不以轉告予不荅遂呼獄令史云将下去别聽言語初十日冬至入假予意假滿即見殺乃囚在獄中乆無消息十二月半後一令史報云丞相語獄官宣差烏馬兒云文丞相性猶硬不硬又二日令史報云􅀶羅語烏馬兒遅數日更與文丞相說話㑹歳終釋放諸囚烏馬兒語愽羅獄囚皆巳寛放惟文丞相一人在獄􅀶羅云我奏􅁍來喚你􅀶羅至今重於一喚者憂予之硬也予誓死决矣此行决死在於再說話之頃昔人云薑桂之性至老愈辣予亦云金石之性要終愈硬性可改􅁘予自記一宗入獄本末於此曰予死矣庻㡬有知予心者所記言語大畧如此當時泛應尚多不能盡記己􅆗除日書自古中興之君如少康以遺腹子起於一旅一成宣王承厲王之難匿於召公之家周召二相立以爲王幽王廢宜臼立伯服爲太子犬戎之亂諸候迎立宜臼是爲平王漢光武起南陽爲帝蜀先主帝巴蜀皆是岀於推戴何論有無傳授之命如唐肅宗即位靈武不禀命於明皇􅁍􅀋於􅆲然功在社稷天下後世猶無甚貶焉禹􅀓益不􅀓啓天下之人曰啓吾君之子謳歌朝覲訟獄者歸之焉漢文帝只是平勃諸臣所立豈有高祖惠帝吕后之命耶春秋亡公子入爲君者何限齊桓晉文其大者也何謂逃走不當立羿之於夏莾丕之於漢方是簒德祐亡而景炎立謂之􅆲何居可惜當時不曽将此一叚言語敷陳頗有餘憾耳鄧􅀓云正月十三日至厓山張元帥索公書諭張世傑䧏公曰我不能救父母乃教人背父母可乎強之急乃書過零丁洋詩與之弘範􅀏而置之二月六日厓山潰公不勝悲憤作長歌哀之南北傅誦三月十三日還至廣州公日俟北方生殺之命弘範於公禮貌日隆盡取公所亡妾婢僕役以奉之十四日弘範置酒海上㑹諸将因舉酒從容謂公曰國亡矣忠孝之事盡矣正使殺身爲忠孝誰復書之丞相其改心易慮以事大宋者事大元大元賢相非丞相而誰公流涕曰國亡不能救爲人臣者死有餘罪况敢逃其死而貳其心乎殷之亡也夷齊不食周粟亦自盡其義耳未聞以存亡易心也弘範爲之改容是日弘範具公不屈與所以不殺状奏於朝四月十一日使臣還言上有誰家無忠臣之歎㫖令善視公以來公曰使予死於兵死於刑則巳矣而萬里行役不得逃焉命也或曰明知其不可而爲之柰何曰吾所謂盡心者人人諉天下之責古今世道不屬之人乎是烏可以成敗爲是非哉二十二日北行與厓山朝士鄧光薦俱發廣州五月二十五日至南安軍石嵩與嚢家歹議出江西慮􅆲奪遂鑰公於船公即絶粒爲告祖禰文别諸友詩遣孫禮取黄金市登岸馳歸約六月二日復命於吉城下公将以心事白諸幽明即􅉂目長徃含􅀏入地矣乃水盛風駛前一日逹廬陵孫禮期不至公且行忍死以待埀至豐城忽有見孫禮在他舟乃悟竟不曽徃爲之痛哭流涕暮始見主者取孫禮還舟明早飯巳送之豐城岸從其自便追之不可及矣公不食巳八日􅀂無事然公􅀻念死廬陵不失爲首丘今使命不逹委身荒江盍從容以就義乎遂復飮食如初從者七人或逃或死或逐僅存一人曰劉榮六月初五日至隆興􅀚者如堵北人有駭其英毅者曰諸􅁑軍師也十三日至建康十三日鄧光薦以病遷寓天慶􅀚就醫留不行八月二十四日石嵩等以公自東陽渡江淮士有謀奪公江岸者不果以弘範命兵衞夾舟陸至揚州故也十月一日公至燕供帳飲饌如上賔公義不􅆍食乃坐逹旦雖示以骨肉而不顧許以穹職而不從南冠而囚坐未甞靣北留夣炎說之􅀍其唾罵瀛國公徃說之一見北靣拜號乞回聖駕平章阿合馬入舘驛坐召公公至則長揖就坐馬云以我爲誰公云適聞人云宰相來馬云知爲宰相何以不跪公云南朝宰相見北朝宰相何跪馬云你何以至此公曰南朝早用我爲相北可不至南南可不至北馬顧左右曰此人生死尚由我公曰亡國之人要殺便殺道甚由你不由你馬黙然去􅀶羅欲殺公而上意及諸大臣不可張弘範病中亦表奏天祥忠於所事願釋勿殺故囚之連年冬於獄中遇靈陽子指示大光明正法公自謂於死生之際脫然􅀂遺自是詩文時有超灑忘世之意公獄中與弟書曰廣州不死者意江西可以去之及出南安繫吾頸縶吾足於是不食􅀅謂及吉州則死首丘之義也乃五日過吉又三日過豐城無飯八日不知飢既過吉思之無義且尚在江南或尚有生意遂入建康居七十餘日果有忠義人約奪我於江上盖真州境也及期失約惘然北行道中求死無其間矣入幽州下之狴犴枷頸鎻手節其飲食今巳二十日吾舎生取義無可言者今千萬􅀉此及詩逹吾弟盖絶筆也庚辰是歳囚五月弟璧自惠州入覲右丞相帖木兒不花奏其畧曰此人是文天祥弟上曰那箇是文天祥愽羅對曰即文丞相上嘆嗟乆之曰是好人也次問璧右丞相奏是将惠州城子歸附底上曰是孝順我底辛巳是歳囚正月元日公爲書付男陞公在縲絏中放意文墨北人争傅之公手編其詩盡辛巳歳爲五卷自譜其平生行事一卷集杜甫五言句爲絶句二百首且爲之叙其詩自五羊至金陵爲一卷自呉門歸臨安走淮至閩詩三卷號指南録以付弟璧歸夏璧與孫氏妹歸公剪髪以􅀉永訣與弟書曰潭盧之西坑有一地巳印元渭陽所献月形下角穴第淺露非其正其右山上有穴可買以藏我如骨不可歸招魂以封之陞子嗣續吾死奚憾女弟一家流落在此可爲悲痛吾弟同氣取之名正言順宜極力岀之自廣逹建康日與中甫鄧先生居具知吾心事吾銘當以属之􅀂時未可岀則姑藏之将來文山宜作一寺我廟於其中七月大􅀨兵馬司墻壁頺落移司宫籍監得一室頗瀟􅎈十一日回舊兵馬司得一室地高燥空凉八日返故處依然臭穢䒱濕壬午是歳春作賛擬終時書之衣帶間叙云吾位居将相不能救社稷正天下軍敗國辱爲囚虜其當死乆矣頃􅀍執以來欲引决而無間今天與之機謹南向百拜以死其賛曰孔曰成仁孟云取義惟其義盡所以仁至讀聖賢書所學何事而今而後庻㡬無媿宋丞相文天祥絶筆鄧傳云正月二十後公卧病發􅀬右臀􅂖道傍患癰二月四日流膿平生痛苦未嘗有此是時南人士于朝者謝昌元王積翁程飛卿青陽夣炎等十人謀合奏請以公爲黄冠師兾得自便青陽夣炎􅀻語積翁曰文公贑州移檄之志鎮江脫身之心固在也忽有妄作我軰何以自觧遂不果八月王積翁奏其畧曰南方宰相無如文天祥上遣諭㫖謀授以大任昌元積翁等以書諭上意公復書數年于兹一死自分舉其平生而盡棄之将焉用我事遂寝後積翁又奏其畧曰文天祥宋状元宰相忠於所事􅀂釋不殺因而禮待之亦可爲人臣好様子上黙然乆之曰且令千戸所好好與茶飯者公聞之使人語積翁吾義不食官廪數年矣今一旦飯於官果然吾且不食積翁乃不敢言公死後有以危言憾積翁者積翁曰得從龍逢比干遊地下足矣言者遂止積翁累以銀物餉公福王與苪聞其不屈嘆曰我家有此人􅁘餉以銀百两獨積翁轉致之公因繋乆翰墨滿燕市時與吏士講前史忠義傳無不傾聽感動其長李指揮魏千戸奉事之􅀹至麥述丁叅政甞開省江西見公出師震動每倡言殺之便又以公罪人下千戸所􅀵其棋奕筆墨書冊初閩僧妙曦號琴堂以談星見是春進言十一月􅁟星犯帝座疑有變群臣有言瀛國公族在京不便者而中山府薛寳住聚數千人聲言是真宋㓜主要來取文丞相又有書于櫝者曰兩衞軍儘足辦事丞相可以無慮又曰先焚城上葦子城外舉火爲􅀿大臣議所謂丞相疑爲天祥太子得櫝以奏京師戒嚴迁趙氏宗族徃開平北十二月初七日司天臺奏三台拆初八日上召天祥入殿中長楫不拜左右強之拜跪或以金撾摘其膝傷公堅立不爲動上使諭之其畧曰汝在此乆如能改心易慮以事亡宋者事我當令汝中書省一處坐者天祥對曰天祥受宋朝三帝厚恩號稱状元宰相今事二姓非所願也上曰汝何所願天祥曰願與一死足矣遂麾之退是夜回宿千戸所初九日宰執奏文天祥既不願附不􅀂如其請賜之死麥述丁力勸之上遂可其奏是日宣使以金皷迎詣市公欣然曰吾事了矣及行顔色不少變至刑所問左右孰南向於是南向再拜曰臣報國至此矣遂受刑得年四十有七時連日大風埃霧日色無光都城門閉甲卒登城街對隣不得徃來行不得偶語時翰林學士趙與禀以宋宗室亦􅀍監閉一室諸衞士􅃓刀環席地坐聞門外􅃓馬馳驟聲者乆之人競穴窓窺乃是出丞相頃之又聞馳􅀐過者及回乃聞有㫖教再聽聖㫖至則巳受刑明日歐陽夫人從東宮得令㫖􅀵屍江南十義士奉柩塟于都城小南門外五里道傍爲他日歸骨便路後大德二年戊戌男陞至都城見公舊婢緑荷巳嫁順承門内石橋織綾人及見劉牢子引到墓所自後留都城春秋必徃酧奠望拜時巳有二僧塔其大塔小石碑刻有信公二字舊殯在大塔南右址又右畔塹外有墓林聚塜在大路傍至元二十年癸未歳公柩歸至故里時弟璧任臨江路緫管兼府尹辦䘮塟男陞祗奉几筵舊歳璧遣家人至廣迁奉母曽夫人靈柩是日適與公柩舟㑹于江滸人咸驚嘆以爲孝念所感不期而㑹二十一年甲申塟公富田東南二十里木湖之原塟師則吉水王仁山也陞廬墓三年世傳吉州太和縣贑江濵黄􅁟潭有神物棲其間歳亢旱邑民禱􅀨澤焉自公之生潭沙清淺公沒之歳潭近居民夣神物歸騶從甚盛即而覩之乃公也既而聞公死諸老驚相語曰公兩任贑州提刑去徃輙江水泛溢其勤王召募江泛溢尤甚師行而水同去又公家居當暑日喜溪浴與奕者周子善於水靣以意爲枰行奕决勝􅀒他人乆浸不自堪皆走惟公逾乆逾樂忘日早暮或取酒炙就飲啖是􅀿神物岀世沒而爲神自其常也潭是後又􅀷黒不可測矣公平生嗜象奕以其危險制勝竒絶者命名自玉金䁀至單􅀐見虜爲四十局􅀔圗悉䜟其岀處始末玉盖公所居山名也又傳公方爲童子時游鄕校見所祀鄕先生歐陽修楊􅀖乂而下咸謚忠節祠祝像設甚嚴意欣然慕之竊嘆曰沒不爼豆是間非夫也故岀而舉事志氣素定雖﨑嶇萬折終不撓屈後至治三年癸亥吉安郡庠奉公貂蝉冠法服像與歐陽文忠公修楊忠襄公􅀖乂胡忠簡公銓周文忠公必大揚文節公萬里胡剛簡公夣昱序列祠于先賢堂士民復於城南忠節祠増設公像以肯齋李芾配廬陵舊有四忠一節之稱余爲五忠一節云歐陽夫人􅀍虜後即到燕都與二女皆留東宮服道冠􅗓日誦道經後随公主下嫁駙馬高唐王居大同路豐州栖真觀日請一正一從分例其女婢曰翠哥大德二年戊戌冬以年老不禁寒凍得請向南去至都城男陞迎養遇時節夫人輙嗟嘆舊家典故陞亦爲辦南食品邀隣嫗伴坐諸士大夫謁拜所餽遺命女侍專􅀵貯不他用大德七年癸卯臘至寜州時從子隆子任寜州判官寜州党知事以夫人歸爲不􅀿赴陳草庵宣撫陳状委南康李清之推官臨問隆子以夫人所受公主㦤㫖高唐王鈞㫖所與路引及支給口食文憑呈之李爲惻然事遂消釋明年歸故里凢親友餽遺仍專􅀵貯之又明年正月夫人曰吾海上禍亂中叩之神祗乞保庇擬建靈寳醮筵以謝又叩佛氏乞保庇擬建水陸齋供以謝寓豐州累申前請今得生還拜神佛之賜合以巳所得餽遺正月元夕酧道醮二月八日酧佛供畢此心願即死􅊕目矣二月望得痰疾越四日家人諸婦侍疾亹亹語平昔事如常時問浣婢索衣上舊香囊浣婢見損汚甚巳棄之矣急拾至夫人持示諸人曰此伴吾未甞湏􅁷離也落齒時得之父母􅀕文云烈女不更二夫忠臣不事二主天上地下惟吾與汝得之丞相吾死必仍懸吾心前将以見吾父母見吾夫於地下爲無媿也頃之命諸人退俟吾少休諸人候窓外聞㐲枕痰響就視則氣巳絶實大德九年乙巳歳二月十九日也塟富田南二十里洞源柳小娘從公主下嫁趙王沙靖州大德年間殁環小娘從公主下嫁岐王西寜州弟姪軰間得㑹于都城至正元年辛巳歳猶傳聞其居河州養老皆無所生
