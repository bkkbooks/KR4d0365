front:
  text: 文山先生全集卷之十四别集指南後録卷之一上
  hash: sha256:06efda9afb2dae4a96c1c7137ee8d06abedf51c4a482079cc6c38f3b19c30efa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_014-1a}
body:
  text: 過零丁洋苦遭逢起一經干戈落落四周星山河破碎風抛絮身世飄揺􅀨打萍皇恐灘頭􅀃皇恐零丁洋裏歎零丁人生自古誰無死留取丹心照汗青上巳日張元帥令李元帥過船請作書招諭張少保􅄬拜遂與之言我自救父母不得乃教人背父母可乎書此詩遺之李不能強持詩以逹張但稱好人好詩竟不能逼元夕南海􅀚无夕兹遊古未曽人間大競渡水上小燒燈世事争强弱人情尚廢興孤臣腔血滿死不愧廬陵懐趙清逸厓海真何地驅來坐戰塲家人半分合國事决存亡一死不足道百憂何可當故人髯似㦸起舞爲君傷二月六日海上大戰國事不濟孤臣天祥坐北舟中向南慟哭爲之詩曰長平一坑四十萬秦人􅂬欣趙人怨大風􅀭沙水不流爲楚者樂爲漢愁兵家勝􅀒常不一紛紛干戈何時畢必有天吏􅀅明威不嗜殺人能一之我生之􅀄尚無疚我生之後遭陽九厥角稽首併二州正氣掃地山河羞身爲大臣義當死城下師盟愧牛耳間􅀜歸國洗日光白麻重宣不敢當岀師三年勞且苦只尺長安不得覩非無虓虎士如林一日不戈爲人擒樓船千艘下天角兩雄相遭争􅁬􅅮古來何代無戰争未有􅄡蝟交滄􅈚遊兵日來復日徃相持一月爲鷸蚌南人志欲扶崑崙北人氣欲黄河吞一朝天昏風雨惡炮火雷飛箭星落誰雌誰雄頃刻分流屍漂血洋水渾昨朝南船滿厓海今朝只有北船在昨夜兩􅁁桴皷鳴今朝船船鼾睡聲北兵去家八千里椎牛釃酒人人喜惟有孤臣􅀨淚垂㝠㝠不敢向人啼六龍杳靄知何䖏大海茫茫隔煙霧我欲借劍斬佞臣黄金横帶爲何人又六噫飈風起􅀆海水飛噫文武盡􅀆火德㣲噫鷹鸇相擊􅀆靡所施噫鴻鵠欲舉􅀆􅀅安歸噫櫂歌中流􅀆任所之噫獨抱春秋􅀆莫我知噫言志九垠化爲魅億醜俘爲虜既不能變姓名卒於呉又不能髠鉗奴於魯逺引不如四皓翁髙蹈不如仲連父㝠鴻堕矰繳長鯨䧟網􅅈鷃燕上下争誰何螻蟻等閑相爾汝狼籍山河歲云杪飄零海角春重暮百年落落生涯盡萬里遥遥行􅃥苦我生不辰逢百罹求仁得仁尚何語一死鴻毛或㤗山之輕之重安所䖏婦女低頭守巾幗男兒嚼齒吞刀鋸殺身慷慨猶易免取義從容未輕許仁人志士所植立横絶地維屹天柱以身狥道不苟生道在光明照千古素王不作春秋廢獸蹄鳥跡交中􅁟閏位適在三七間禮樂終當属真主李陵衛律罪通天遺臭至今使人􅄍種􅆶東門不可得􅁀骨匈奴固其所平生讀書爲誰事臨難何憂復何懼巳矣夫易簀不必如曽參結纓猶當效子路南海朅來南海上人死亂如麻腥浪拍心碎颷風吹􅁂華一山還一水無國又無家男子千年志吾生未有涯有感海闊龍深蟄山空鳥雜鳴花随春共去雲與水俱行壯士千年志征夫萬里程夜凉㸔星斗何䖏是􅍴槍張元帥謂予國巳亡矣殺身以忠誰復書之予謂啇非不亡夷齊自不食周粟人臣自盡其心豈論書與不書張爲改容因成一詩高人名􅀂凂烈士死如歸智㓕猶吞炭啇亡正採􅅔豈因徼後福其肯蹈危機萬古春秋義悠悠􅀟淚揮登樓茫茫地老與天荒如此男兒鐡石腸七十日來浮海道三千里外望江郷高鴻尚􅁴心期闊蹇馬何堪脚跡長獨自登樓時柱頰山川在眼淚浪浪海上天􅁁青鳥逝海上白鷗馴王濟非癡叔陶潜豈醉人得官須報國可􅀮即逃秦身事盖棺定挑燈看劍頻贑州滿城風雨送凄凉三四年前此戰塲遺老猶應愧蜂蟻故交巳乆化􅉘狼江山不改人心在宇宙方來事㑹長翠玉樓前天亦泣南音半夜落滄浪指南後録卷之一下岀廣州第一宿越王䑓下路搔首歎萍蹤城古都招水山髙易得風皷聲殘雨後塔影暮林中一様連營火山同河不同英德道中海近山如沃杼深屋半蕪乾坤正風雨軒冕總泥途自歎鳶肩薄誰憐鶴影孤少年狂不醒夜夜夣伊吾晚渡青山圍萬疊流落此何􅀖雲静龍歸海風清馬渡江汲灘供茗椀編竹當􅅾窓一井沙頭月覊鴻共影􅀟􅃢瑚吟南方有􅈿禽鳴聲天下竒毛羽黒如􅃮兩臉凝璚脂燕趙佳公子籠檻以自随童子重丁寜飲食必以時􅀅獻上林􅁐來巢萬年枝待之豈少恩不免加縶維􅃢瑚真􅃢瑚碎琢良自悲中原寒氣深風􅁟非所宜和中甫端午韻不依次黄茅古道外羸馬發南州有客􅅓齊魯何人念楚囚歲年付流水風雨滿滄洲手把菖蒲看黒頭非所求又呈中齋風雨羊腸道飄零萬死身牛兒朝共載木客夜爲隣􅁃子江南夣蘇􅀰海上貧悠悠㸔晚渡誰是濟川人又萬里論心晚相看慰亂離丹成俄巳化璧碎尚無緇禾􅁰西原夣川原落日悲斯文今巳矣來世以爲期竹間倦來聊歇馬随分此青山流水竹千箇清風沙一灣乾坤醒醉裏身世有無間客路真希絶浮生半日閑越王䑓登臨我向亂離來落落千年一越䑓春事暗随流水去潮聲空逐暮天廻煙横古道人行少月堕荒村􅀑哭哀莫作楚囚愁絶㸔􅃇家歌舞此㗸盃南華山北行近千里迷復忘西東行行至南華忽忽如夣中佛化知㡬塵患乃與我同有形終歸㓕不㓕惟真空􅀏㸔曹溪水門前坐松風六祖禪師真身盖數百年矣爲亂兵刲其心肝乃知有患難佛不免况人乎南安軍梅花南北路風雨濕征衣出嶺誰同出歸郷如不歸山河千古在城郭一時非饑死真吾志夣中行採􅅔黄金市閉􅅾絶粒始南州我過青山欲首丘廵逺應無兒女態夷齊肯作稻􅆝謀人間早見黃金市天上猶遲白玉樓先子神遊今二紀夣中揮淚濺松楸萬安縣青山曲折水天平不是南征是北征舉世更無廵逺死當年誰道甫申生遥知嶺外相思䖏不見灘頭皇恐聲傳語故園猿鶴好夣回江路月風清㤗和書生曽擁碧油幢耻與群兒共竪降漢節㡬回登快閣楚囚今度過澄江丹心不改君臣􅁩清淚難忘父母􅀖惟有郷人知我瘦下帷絶粒坐蓬窓蒼然亭風打船頭繋夕陽亭前老子􅃇胡床青牛過去􅀜山動白鶴歸來城郭荒忠節風流落塵􅁟英雄遺恨滿滄浪故園水月應無恙江上新松㡬許長别里中諸友青山重回首風􅀨暗啼猿楊柳溪頭釣梅花石上尊故人無復見烈士尚誰言長有歸來夣衣冠滿故園發吉州巳卯六月􅀄一日蒼然亭下楚囚立山河顛倒紛􅀨泣巳亥七夕此何夕煌煌斗牛劍光濕戈鋋彗雲雷電撃三百餘年火爲德須􅁷風􅀨天地黒皇綱解紐地維折妾婦偷生自爲賊英雄扼腕怒􅂡赤貫日血忠死窮北首陽風流落南國正氣未亡人未息青原萬丈光赫赫大江東去日夜白臨江軍江岸今多嚙城居昔屢焚市人半傖父豎子亦􅀅軍蛟哭金洲􅀨猿啼玉觀雲周卽墳􅁟上回首淚成㾗予始至南安即絶粒爲告祖檷文别諸友詩遣孫禮取黄金市登岸馳歸約六月二日復命於吉城下予以心事白諸幽明即瞑目長徃含􅀏入地矣乃水盛風駛前一日逹廬陵孫禮期不至予且行􅃘死以待垂至豐城忽有見孫禮於他舟乃悟竟不曾徃爲之痛哭流涕暮始見主者取孫禮還舟明早遂送之豐城縣縱其自便追之不可及矣予至是不食巳八日􅀂無事然􅀻念死廬陵不失爲首丘今使命不逹委身荒江誰知之者盍少湏􅁷以就義乎復飲食如􅀄昔讀左傳申包胥哭􅁗庭七日勺飲不入口亦不聞有它乃知饑踣西山非一朝之積也予甞服腦子二兩不死絶食八日又不死竟不暁其何如從者七人或逃或死或逐今僅存一人曰劉榮楚囚之况宜哉隆興府半生㡬度此登臨流落而今雪滿簮南浦不知春巳晚西山但􅁴日􅀄隂誰憐􅀛鶴千年語空􅀒鵬萬里心無限故人簾􅀨外夜深如有廣陵音湖口江湖一都㑹宇宙㡬興亡走馬蘆林外買魚茅舎傍南人撑快槳北客坐危檣江水交岷水東流日夜長安慶府風􅀨宜城路重來白髪新長江還有險中國自無人梟傹蕃遺育鱣鯨蟄怒鱗泊船休上岸不忍見遺民池州五老湖光逺九華山色昏南冠前進士北部故􅀅軍芳草江頭路斜陽郭外村匆匆十年夣故國黯銷魂魯港方誇金塢築豈料玉床揺國躰真三代江流􅃇六朝鞭􅄬䏻㡬日瓦解不崇朝千古燕山恨西風捲怒潮采石不上峩眉二十歳重來爲堕山河淚今人不見虞􅁢文古人曾有樊􅀂水長江闊䖏平如驛况此介然衣帶窄欲從謫仙捉月去安得然犀照神物建康金陵古㑹府南渡􅃇陪京山􅀔猶盤礴江流巳変更徤兒徙幽􅁟新􅀑哭䑓城一片清溪月偏扵客有情金陵驛草合離宫轉夕睴孤雲飄泊復何依山河風景元無異城郭人民半巳非滿地蘆花和我老􅃇家燕子傍誰飛從今别却江南日化作啼䳌帶血歸萬里金甌失壯圖衮衣顛倒落泥􅂗空流杜宇聲中血半脫驪龍頷下鬚老去秋風吹我惡夣回寒月照人孤千年成敗俱塵􅁟消得人間􅀃丈夫懐忠襄平生王佐心世運蹈衰末齊虜誰復封楚囚詎當脫金陵雖懐古尚友在風烈褒忠侈遺廟夫子我先逹早秋􅃗影飄零天一涯千秋揺落欲何之朝㸔帶緩方嫌瘦夜怯衾單始􅁴衰眼裏㳺從驚死别夣中兒女慰生離六朝無限江山在搔首斜陽獨立時睡起堂堂孤影起聞鷄風起高楼皷角悲江海無情遊子倦歳年如夣美人遲平生管鮑成何事千古夷齊在一時坐乆日斜庭木落浮雲㓕􅃿漏朝曦中秋不教􅀵骨瘴江􅁁驅向胡沙着去鞭􅃇奪宫􅂁空獨歩新食官飯飽孤眠客程恰與秋天半人影何如月倍圓猶是江南佳麗地徘徊把酒看蒼天南康軍和東坡酹江月廬山依􅃇凄凉䖏無限江南風物空翠晴嵐浮汗漫還障天東半壁鴈過孤峯猿歸老嶂風急波翻雪乾坤未歇地靈尚有人傑堪嗟飄泊孤舟河傾斗落客夣催明發南浦閒雲連草􅀣回首旌旗明㓕三十年來十年一過空有星星髪夜深愁聴胡笳吹徹寒月和中齋韻過吉作功業飄零五丈原如今局促傍誰轅侻首北去明妃淚啼血南飛望帝魂骨肉凋殘唯我在形容変盡只聲存江流千古英雄恨蘭作行舟柳作樊再和見􅀃黄沙接五原飄零􅃗影向南轅江山有恨銷人骨風􅀨無情断客魂淚似空花千􅀧落􅁂如碩果数根存肉飛不起真堪歎江水爲籠海作樊和友人落落南冠過故都近來我意亦忘吾􅀐來驛馬身如􅀉遣去家書宇亦無景伯未囚先立後嵇康縱死不爲孤江南只有歸來夣休問田園蕪不蕪驛中言别友人水天空闊恨東風不借世間英物蜀鳥吴花殘照裏忍見荒城頽壁銅雀春情金人秋淚此恨慿誰雪堂堂劍氣斗牛空認竒傑那信江海餘生南行萬里属扁舟齊發正爲鷗盟留醉眼細㸔濤生雲㓕䁛柱吞嬴回旗走懿千古衝冠髮伴人無􅄰秦淮􅀿是孤月和乾坤䏻大筭蛟龍元不是池中物風􅀨牢愁無着䖏那更寒䖝四壁横槊題詩登樓作賦萬事空中雪江流如此方來還有英傑堪􅀏一葉飄零重來淮水正凉風新發鏡裏朱顔都変盡只有丹心難㓕去去龍沙向江山回首青山如髪故人􅀿念杜䳌枝上殘月懐中甫時中甫以病留金陵天􅂟􅀚乆要何落落末路重依依風􅀨連兵幕泥􅂗滿客衣人間龍虎変天外燕鴻違死矣煩公傳北方人是非行宫中齋日十里宫墻一聚塵天津晚過客愁新花啼杜宇歸來血􅀣掛蒼龍脫去鱗福德儻存終有晋秣陵未改巳無秦秋風禾􅁰空南北見􅀃銅駝㑹笑人恠底秦淮一水長㡬多客淚洒斜陽江流本是限南北地氣何曾减帝王䑓沼漸荒基歷落鶯花猶在意凄凉青天畢竟有情否􅃇月東來失女墻廣齋謂柳和王昭儀滿江紅韻惜未之見爲賦一闋中齋作王母仙桃親曾醉九重春色誰信道鹿㗸花去浪翻鰲􅆣眉鎻嬌娥山宛轉䯻梳堕馬雲欹側恨風沙吹透漢宫衣餘香歇䨘裳散庭花㓕斜陽燕應難􅀃想春深銅雀夣殘啼血空有琵琶傳岀塞更無環佩鳴歸月又争知有客夜悲歌壼􅃻缺和王夫人滿江紅韻以庶㡬后山妾薄命之意燕子樓中又捱過㡬畨秋色相思䖏青年如夣乗鸞仙􅊴肌玉暗銷衣帶緩淚珠斜透花鈿側最無端蕉影上窓紗青燈歇曲池合高䑓㓕人間事何堪􅀃向南陽阡上滿􅁭清血世態便如翻覆雨妾身元是分明月􅀏樂昌一叚好風流菱花缺代王夫人作試問琵琶胡沙外怎生風色最苦是姚黄一朶移根仙􅊴王母􅌚䦨璚宴罷仙人淚滿金盤側聴行宫半夜雨淋鈴聲聲歇彩雲散香塵㓕銅駞恨那堪􅀃想男女慷慨嚼穿齦血回首昭陽離落日傷心銅雀迎新月筭妾身不願似天家金甌缺王夫人詞太液芙蓉全不是􅃇時顔色甞記得恩承雨露玉堦金􅊴名播蘭簮妃后裏暈潮蓮臉君王側忽一朝鼙鼓掲天來繁華歇龍虎散風雲㓕今古恨慿誰􅀃顧山河百二涙流􅁭血驛舘夜驚塵􅁟夣宮車曉轉􅀜山月􅀂嫦娥於我肯相容從圓缺王夫人至燕題驛中云云中原傳誦惜末句少啇量浪淘沙中齋踈􅀨洗天晴枕簟凉生井梧一葉做秋聲誰念客身輕似葉千里飄零夣斷古䑓城月淡潮平便携酒訪新亭不見當時王謝宅煙草青青東海集序東海集者友人客海南以來詩也海南詩而曰東海集者何魯仲連天下士友人之志也友人自爲舉子時巳大肆力於詩於諸大家皆甞登其門而渉其流其本贍其飬銳故所詣特深到余甞評其詩渾􅉼有英氣鍜錬如自然美則美矣猶未免有意於爲詩也自䘮亂後友人其家避地遊官嶺海而全家燬於盗孤窮流落困䪺萬状然後崖山除禮部侍􅀰中且權直學士矣㑹南風不競御舟漂散友人倉卒蹈海者再爲北軍所鉤致遂不􅀗死以至于今凡十數年間可驚可愕可悲可憤可痛可悶之事友人備甞無所不至其􅃤戚感慨之氣結而不信皆於詩乎發之盖至是動乎情性自不能不詩杜子美􅇪州柳子厚柳州以後文字也余與友人年相􅀂又同里閈以斯文相好然平生落落不相及及居楚囚中而友人在行同患難者數月其自五羊至金陵所賦皆予目撃或相唱和時余坐金陵驛無所作爲乃取友人諸詩筆之於書與相􅀜者并附爲後之覧者因詩以見吾二人之志其必有感慨於斯巳卯七月壬申文天祥叙送行中齋三首秋風晚正烈客衣早知寒把衣不能别更盡此日􅂬岀門一萬里風沙浩漫漫豈無兒女情爲君思汎瀾百年有時盡千載無餘􅀚明明君臣義公獨爲其難願持丹一寸冩入青琅玕㑹有撫卷人孤燈起長歎神龍蕩失水馴擾終未得威鳯雖在藪肯顧鷄䳱食所以古之人受變心不易亳􅂦巳遷周西山竟肌􅇤豫子身自􅃮長弘血成碧何甞怨廢興而或二心跡堅白不在緇羔裘良自惜此􅁩公素明俗見或未識嗟予抱區區疇昔同里閈過從三十年知心不知靣零落忽重逢家亡市朝變惸惸蹈海餘踽踽南冠殿􅇵談泥􅂗際握手鞍馬倦依依斯文意苦恨十年晚魯仲偶不逢随世本非願靈胥目未抉端欲詣所見及兹萬里别一夕腸百轉余生諒須􅁷孤感横九縣庶㡬太尉事萬一中丞傳此冊爲指南後録第一卷下第二卷起八月二十四日發建康終􅀊除有感尚有零丁洋諸詩及後録本在惠州合􅀠爲一卷而所恨者指南前録叙號存而詩巳不完侍卽弟姑㩀所存本使不泯於世一聯半句使天下見之識其爲人即吾死無憾矣况篇帙之多乎􅀊在庚辰正月二十日文山履善甫書指南後録卷之二予後録詩以廣州至金陵爲第一卷今入淮以後爲第二卷云發建康八月二十四日賞心亭下路拍手唱吾歌樓外梁時塔城中秦氏河江山如夣耳天地柰愁何回首清溪曲長江一鴈過江行有感二十五日蒲萄肥汗馬荆􅁄冷銅駞巫峽朝雲濕洞庭秋水波窮愁空突兀暗淚自滂沱莫恨吾生悞江東才俊多真州驛二十七日山川如識我故􅃇更無人俯仰干戈跡徃來車馬塵英雄遺筭晚天地暗愁新北首燕山路凄凉夜向晨望楊州阮籍臨廣武杜甫登吹䑓高情發慷慨前人後人哀江左遘陽運銅駞化飛􅁅二十四橋月楚囚今日來維楊驛三年别淮水一夕􅀫楊州南極山川古北風江海秋昭君愁岀塞王粲怕登樓千載英雄淚如今况楚囚過卲伯鎮二十八日今朝車馬地昔日戰争場我有楊州鶴誰存卲伯棠一灣流水小數􅅕故城荒回首江南路青山斷夕陽高郵懐􅃇二十九日借問曾遊䖏高沙第㡬山潜行鷹攫道直上虎當􅀜一命虚空裏三年瞬息間自憐今死晚何復望生還發髙郵三十日􅀄岀髙沙門輕舫逺城樓一水何曲折百年此綢繆北望􅄅無際飛鳥翔平疇寒蕪入荒落日薄行人愁行行行湖曲萬頃􅆂清秋大風吹檣倒如盪彭蠡舟欲􅀉故郷淚使入長江流篙人爲我言此水通淮頭前與黄河合同作滄海漚踟蹰忽失意拭淚淚不􅀵呉㑹日巳逺回首重悠悠馳驅梁趙郊壮士何離憂吾道乆矣東陸沈古神州我今戴南冠何異有北􅄬不能裂肝腦直氣摩斗牛但願光岳合休明復啇周不使殊方魄終爲異物羞寳應道中天闊搏南鴈淮途長北驅甘棠成傳舎細柳作康衢田海随時變山河徃日殊征􅂁共衮繡夜壁一燈孤淮安軍九月一日楚州城門外白楊吹悲風纍纍死人塜死向鋒鏑中豈無匹婦􅁈定無萬夫雄中原在其北登城望何窮過淮河􅀫闞石有感北征垂半年依依只南􅁟今晨渡淮河始􅁴非故宇江郷巳無家三年一覊旅龍翔在何方乃我妻子所昔也無柰何忽巳置念慮今行日巳近使我涙如􅀨我爲綱常謀有身不得顧妻􅀆莫望夫子􅀆莫望父天長與地乆此恨極千古來生業縁在骨肉當如故發淮安九月二日九月􅀄二日車馬發淮安行行重行行天地何不寛烟火無一家荒草青漫漫恍如泛滄海身坐玻瓈盤時時逢北人什伍扶征鞍云我戍江南當軍身属官北人適呉楚所憂地少寒江南有遊子風雪上燕山小清口􅀄三日乍見驚胡婦相嗟遇楚兵北來鴻鴈宻南去駱駞輕芳草中原路斜陽故國情明朝五十里錯做武陵行桃源道中􅀄四日漠漠地千里垂垂天四圍隔溪胡􅀐過傍草野鷄飛風露吹青笠塵沙薄素衣吾家白雲下都伴北人歸桃源縣清野百年乆中原千里賖火煙新聚落山水􅃇生涯種麥十􅂾􅅕誅茅千百家我來行正倦何䖏覔桃花崔鎮驛萬里中原􅃥北風天正凉黄沙漫道路蒼耳滿衣裳野闊人声小日斜駒影長解鞍身似夣遊子意茫茫發崔鎮􅀄五日髙鴈空秋興寒螿破暁眠淡烟白似海野水碧於天興廢嗟何及行蔵信自然南人乍􅀐馬北客半乗船發􅀫遷縣夜夣入星槎曉行随斗柄衣暖露自乾􅁂寒氷欲凝􅀅軍戴鐡笠壮士􅃻金鐙白眼睨青天我生不有命中原中原方萬里明日是重陽桒􅀥人家近蓬蒿客路長引弓虚射鴈失馬爲尋羊見􅀃今年旱青青麥又秧望邳州􅀄六日中原行㡬日今日􅅻見山問山在何䖏云在徐邳間邳州山徐州水項籍不還韓信死龍争虎闘不肯止煙草漫漫青萬里古來劉季號英雄樊崇至今巳千􅀊徐州道中􅀄七日彭城古官道日中十馬馳咫尺不見人撲靣黄塵飛白頭漢王縞素師羙人燕罷項羽啼一時混􅀾四十萬天昏地黒睢水湄乃知大風揚沙失白晝自是地利非天時漢王倉皇問道西一兒一女嘻其危太公吕后去不歸爼上寕有生還時未央稱夀太上皇巍然女媧帝中闈終然富貴自有命造物顛倒真小兒彭城行徐洲彭城縣連山四圍合吕梁貫其中河南大都㑹故有項王宫晋牧連楊豫虎視北方雄唐時燕子楼風流張建封西望睢陽城只與汴水通大平黄楼賦尚能想遺風邇來百餘年正朔歸江東遺民死欲盡莾然狐兎叢我從南方來停􅆖撫遺蹤故河蓄潢潦荒城翳秋蓬凄凉戯馬䑓憔悴巨佛峯滄海変桑田陵谷代不同朝爲朱門貴暮作行旅窮乗除信物理感慨繫所逢古來賢逹人一醉萬慮空如此獨巽何悲風逐征鴻燕子樓自别張公子婵姢不下樓遂令樓上燕百􅀊稱風流我遊彭城門來吊楚王闕問楼在何䖏城東草如雪蛾眉代不乏埋􅃿安足論因何張家妾名與山川存自古皆有死忠義長不􅃿但傳美人心不􅀃美人色戯馬䑓九月􅀄九日客遊戯馬䑓黃花弄朝露古人花飛埃今人哀後人後人復今哀世事那可及淚落茱茰杯發彭城今朝正重九行人意遲遲回首戯馬䑓野化發葳􅅋草埋范增塜雲見樊噲旗時節正如此道路􅀅何之我愛陶淵明甲子題新詩白衣送酒來把菊卧東籬沛歌山東藤山沛縣􅀄十日秦世失其鹿豐沛發龍顔王侯與􅀅相不岀徐濟間當時數公起四海王氣閑至今尚想見虹光照人寰我來千載下吊古淚如􅏰白雲落荒草􅀮􅀮芒碭山黄河天下雄南去不復還乃知盈虚故天道如循環盧王􅃇封地今日殺凾􅀜歌風䑓長陵有神氣萬􅀊光如虹有時風雪變魂魄來沛宫壮哉游子郷一覧萬宇空擊筑戒復隍帝業慎所終重瞳愛梁父此情豈不同錦衣絢行晝丈夫何淺中􅃡懐首丘意自足分雌雄尚惜覇心存慷慨懐勇功不見徃來事烹狥與蔵弓早知致兩生禮樂三代􅂭匹夫事巳徃安用責乃翁我來湯沐邑白楊吹悲風永言三侯章􅀮􅀮聞兒童葉落皆歸根飄零獨秋蓬登䑓共悽惻目之南飛鴻固陵道中三首九天雲下垂一􅀨作秋色塵埃化泥􅂗原野轉蕭瑟十里一􅀟堠孤兎卧荆􅁄見􅀃數年來中州乍蘇息茅舎荒􅋽􅃇固陵漢王城對楚王城徐州煙火連豐沛天下還來屋角争固陵城下兩龍争不見齊王來㑹兵勒取河山新分地項王之後到韓彭發魚䑓十二日晨炊發魚䑓碎􅀨飛撃靣團團四野周冥冥萬象變疑是江南山煙霧昏不見豈知此中原今古經百戰英雄化爲􅁟飛霧洒郊甸天寒日欲短游子淚如霰自歎瑟瑟秋風悲烈烈寒氣驕蒲柳先巳零松栢何後凋天意重肅殺造物無不銷强弱有異禀憂患同一朝惟有南山石千載一岧嶤人苦不自足空羡王子喬逺遊黃河流活活太行髙巍巍山以東百山以西鄒魯盛文獻燕趙多雄姿右摩㤗山碑左躡凾谷泥郟鄏吊周公曲阜拜宣尼或登廣武歎或上北邙悲平生㡬兩屐汗漫以爲期絶交天下士要爲男子竒呉㑹徧王業中原隔遺􅀺安得與黄鶴比翼天上飛江河異風景撃楫感且欷陽運遘百六興否俄推移桒田変滄海楚囚発孔悲我本檻車客爲我解縶維青蠅附天􅂹萬里相追随人生尚行樂矧復新相知周道思下泉王風懐􅁰離富貴豈不願􅁨患那自持人命危且淺忽􅀂朝露睎長恐折我軸中道欲差池去我父母􅀖我行且遅遅聽我逺遊曲􅀉我長相思六歌有妻有妻出糟糠自少結髪不下堂亂離中道逢虎狼鳯飛翩翩失其凰􅀅雛一二去何方豈料國破家亦亡不􅃘舎君羅􅃭裳天長地乆終茫茫牛女夜夜遥相望嗚呼一歌􅀆歌正長悲風北來起徬徨有妹有妹家流離良人去後携諸兒北風吹沙塞草凄窮猿􅆭淡􅀅安歸去年􅂘母南海湄三男一女同歔欷惟汝不在割我肌汝家零落母不知母知豈有瞑目時嗚呼再歌􅀆歌孔悲鶺鴒在原我何爲有女有女婉清􅀭大者學帖臨鍾王小者讀字声琅琅朔風吹衣白日黄一􅀟白璧委道傍鴈兒啄啄秋無梁随母北首誰人􅀅鳴呼三歌􅀆歌愈傷非爲兒女淚淋浪有子有子風骨殊釋氏抱送徐卿雛四月八日摩尼珠榴花犀錢絡繡􅃭蘭湯百沸香似酥歘随飛電飄泥􅂗汝兄十二􅀐鯨魚汝今知在三􅀊無嗚呼四歌􅀆歌以吁燈前老我明月孤有妾有妾今何如大者手􅀅玉蟾蜍次者親抱汗血駒晨粧靚服臨西湖英英鴈落飄璚琚風花飛墜鳥嗚呼金莖沆瀣浮汙渠天摧地裂龍鳯殂美人塵􅁟何代無嗚呼五歌􅀆歌欝紆爲尔遡風立斯須我生我生何不辰孤根不識桃李春天寒日短重愁人北風随我鉄馬塵􅀄憐骨肉鍾竒禍而今骨肉相憐我汝在北􅀆嬰我懐我死誰當􅀵我骸人生百年何醜好黄梁得䘮俱草草嗚呼六歌􅀆勿復道出門一笑天地老發潭口十三日吹靣北風來拂􅁂堅氷至軒冕委道途衮繡易氊毳百年雜醜好始酧四方志浩歌激浮雲亭亭復􅄃轡羲馭㡬曽停誰當掃幽翳新濟州借問新済州徐鄆兄弟國昔爲大河南今爲大河北垂雲隂萬里平原望不極百草盡枯死黃花自秋色時時見桒􅀣青青雜阡陌路上無人行煙火􅄅蕭瑟車轍分縱横過者臨岐泣積潦流交衢霜蹄破叢􅁄江南寒未深銅爐獸花赤爲知行路人鐡令衣裳􅊜汶陽道中東平路汶陽縣十四日積􅀨不肯霽行陸如渉川青氊纊我後白氊覆我前我欲正衣冠兩手如紏纒飛沫流􅀍靣代我泣涕漣鴻鴈紛南翔逰子北入燕平楚􅄅四極雪風迷逺天昔聞濟上軍又説汶陽田我今􅂂其地吊古愴蒼煙男兒欲了事長虹射寒泉汶陽舘去􅀊营船隩今朝舘汶陽海空沙漠漠河廣草茫茫家國哀千古男兒慨四方老愧秋􅀨暗􅀌影照淋浪自汶陽至鄆十五日􅄅􅄅中原道勞生歎百非風􅀨吹打人泥濘飛上衣目力去天短心事與時違夫子昔相魯侵疆自齊歸來平舘憔悴江南客蕭條古鄆州􅀨聲連五日月色徹中流萬里山河夣千年宇宙愁欲鞭劉豫骨煙草暗荒丘發鄆州喜晴烈風西北來萬竅號髙秋􅀫雲蔽層空浮潦迷中州行人苦沮洳道阻路且脩流澌􅀍鞍􅌱飛沫綴衣裘昏鴉接趐落原野􅃤以愁城郭何蕭條閉戸寒颼颼中宵月色滿餘光散衾禂余子戒明發飛霧靄郊丘㣲見扶桒紅􅀮􅀮如沉浮身遊大荒野海氣吹蜃樓須􅁷劃當空六合開沉幽千年厭顔色蒼翠光欲流大陽經天行大化不暫留輝光何曽㓕晻靄終當􅀵􅃊霜下豐草長歌夜悠悠明日東阿道方􅁤驟驊騮發東阿十七日東原深䖏所時或見人煙秋􅀨桒麻地春風挑李天貪程頻問堠快馬緩加鞭多少飛檣過噫吁是北船􅀫高唐州博州早發東阿縣暮􅀫高唐州哲人逹㡬㣲志士懐􅀮􅁨山河巳歷歷天地空悠悠孤舘一夜􅀫北風吹白頭平原十八日平原太守顔真卿長安天子不知名一朝漁陽動鼙鼓大河以北無堅城公家兄弟奮戈起一十七郡連夏盟賊聞失色分兵還不敢長驅入咸京明皇父子􅀅西狩由是靈武起義兵唐家􅄪造李郭力􅀂論牽制公威靈哀哉常山􅆭鈎舌心歸朝廷氣不懾﨑嶇坎坷不得志出入四朝老忠節當年幸脫安禄山白首竟䧟李希烈希烈安能􅃍殺公宰相盧􅂎欺日月亂臣賊子歸何䖏茫茫煙草中原􅁟公死于今六百年忠精赫赫雷行天發陵州中原似滄海萬頃與雲連大明朝東出皎月正在天逺􅀣亂如􅀧桒麻欝蒼煙一鴈入髙空千鴉落平田我行天地中如蟻磨上旋􅀨㾗留故衣霜氣襲重氊徤馬嘶北風潜魚樂深淵噫哉南方人囬首空自憐獻州道巾三年戎服行五嶺文玉㑹躋攀上崖磴厲掲渉瀟瀬十歩九﨑嶇山水何破碎坐令管仲小自􅁴伯夷隘乃今來中州萬里如一槩四望登原隰桒麻蔚斾斾驊騮岀清廟過都真歷塊歷歷古戰塲俯仰生感慨吾常渉重湖東海際南海兹遊冠平生天宇更宏大心與太虚際目空九圍内男兒不出居婦人坐帷盖反身以自觀須彌納一芥以此䖏死生超然萬形内滹沱河二首過了長江與大河横流数仞絶滹沱蕭王麥飯曽倉卒囬首中天感慨多風沙睢水終亡楚草木公山竟蹙秦始信滹沱氷合事世間興廢不由人河間夜宿河間恰家則翁寓焉因成三絶空有丹心貫碧霄泮氷亡國不崇朝小臣萬死無遺慨曽見天家十八朝南歸鴈蕩報郎君老子精神徤十分不爲瀛洲復相見阿戎翻隔萬山雲江南車盖走燕山老子旁􅀚䄂手閒見􅀃新詩題甲子桃源元只在人間保州道中二十一日昨日渡滹沱今日望太行白雲何􅄅􅄅天地何茫茫落葉混西風黃塵昏夕陽牛車過不住氊屋行相望小兒􅀐蹇驢壮士駕乗黄髙低葉萬頃黒白草千行村落有古風人間無時粧宋遼􅃇分界燕趙古戰塲􅃖􅀹亂􅃰野共工謫幽􅀖郭隗致樂毅荆軻携舞陽􅆇盧互反覆安史迭坡倡山川一今古人物㡬興亡江南佔畢生徃來習羊腸天馬戴青蝿電秣馳康荘適從何有來如此醉夣郷感時意踟蹰惜徃淚淋浪厲階起玉環左計由石卽天地行日月萬代乗景光晝夜果可廢春秋誠荒唐吾生直須􅁷俯仰際八荒來者不可見逺遊賦彷徨保􅃰州三詩趙太祖墓在保州二十九日起三十日到我行保州塞御河直其東山川猶有靈佳氣何欝䓤顧我巾車因厲氣轉秋蓬辦香欲徃拜惆悵臨長空樓桒故宅近涿縣三十里我過梁門城樓桒在其北元德巳千年青煙遶故宅道傍爲揮淚徘徊秋風客天下卧龍人多少空抱􅂰涿鹿我瞻涿鹿野古來戰􅃖􅀹軒轅此立極玉帛朝諸侯歷歷􅀜河鴈随風鳴寒秋邇來三千年王氣行幽州過梁門一一金甌在􅀟􅀟鎮璧全􅁟花開􅃇國風絮渡江船南北分新統江淮號極􅁁更和天塹失回首􅃤啼䳌白溝河昔時張叔夜統兵赴勤王東都一不守羸馬遷龍荒適過白溝河裂眦鬚欲張絶粒不遄死仰天扼其吭群臣總奄奄一􅁟垂天光讀史識其地撫卷爲凄凉我生何不辰異世忽相望皇圖遘陽九天塹滿飛堭引兵詣􅀜下捧􅁟障瀾狂岀使義不屈持節還中郎六飛獨南海金􅃏􅀅煌煌武侯空威心出狩驚四方吾屬竟爲虜世事吁彼蒼思公有竒節一死何慨慷江淮我分地我欲􅄬滄浪滄浪􅁍不受中原行路長􅀄登項籍宫次覧劉季􅀖渉足河與濟回首嵩與恒下車撫梁門上馬指樓桒戴星渡一水􅃤淡天微茫行人爲我言宋遼此分疆懸知公死䖏爲公出涕滂恨不持束芻徘徊官道傍我死還在燕烈烈同肝腸今我爲公哀後來誰我傷天地垂日月斯人未云亡文武道不墜我軰終堂堂懐孔明斜谷事不濟􅀅星殞營中至今岀師表讀之淚沾胷漢賊明大義赤心貫蒼穹世以成敗論操懿真英雄劉琨中原蕩分崩壮哉劉越石連踪起幽并􅃗手扶晋室福華天意乖匹磾生􅄦蜮公死百世名天下分南北祖逖平生祖豫州白首起大事東門長嘯兒爲遜一頭地何哉戴􅀂思中道􅁬螳臂豪傑事垂成今古爲短氣顔杲卿常山義旗􅁬范陽哽喉咽明雛一狼狽六飛入西川哥舒䧏且拜公舌膏戈鋋人世誰不死尒死千萬年許逺起師􅂘玄元義氣震天地百戰􅁬雄姿臠妾士揮淚睢陽水東流􅀟廟垂百世當時令狐潮乃爲賊遊􅀃過雪橋琉璃橋小橋度雪度琉璃更有清霜滑馬蹄遊子衣裳如鐡冷殘星荒店野鷄啼一作亂鳴鷄指南後録卷之三予指南後録第一卷起正月十二日賦零丁洋第二卷起八月二十四日發建康今第三卷盖自庚辰元日爲始文山履善甫序五月二日生朝北風吹滿楚冠塵笑捧蟠佻夣裏春㡬􅀊巳無籠鴿客去年猶有送羊人江山如許非吾􅁟宇宙柰何多此身不㓕不生在何許静中聊且飬吾真胡笳曲庚辰中秋日水雲慰予囚所援琴作胡笳十八拍取予疾徐指法良可觀也琴罷索予賦胡笳詩而倉卒中未能成就水雲别去是􅀊十月復來予因集老杜句成拍與水雲共啇畧之盖囹圄中不能得死聊自遣耳亦不必一一學琰語也水雲索予書之欲蔵於家故書以遺之浮休道人文山風塵傾洞昏王室天地􅃤􅃤無顔色而今西北自反胡西望千山萬山赤歎息人間萬事非􅀍驅不異犬與鷄不知明月爲誰好来􅀊如今歸未歸右一拍獨立縹緲之飛樓高視乾坤又可愁江風蕭蕭雲拂地笛聲憤怒哀中流鄰鷄野􅂘如昨日昨日晚晴今日黒蒼皇巳就長途徃欲徃城南忘南北右二拍三年奔走空皮骨三年笛裏􅀜山月中天月色好誰㸔􅉘狼塞路人煙絶寒刮肌膚北風利牛馬毛零縮如蝟塞上風雲接地隂咫尺但愁雷􅀨至右三拍黃河北岸海西軍翻身向天仰射雲胡馬長鳴不知數衣冠南渡多崩奔山木􅃤􅃤天欲􅀨前有毒蛇後猛虎欲問長安無使來終日戚戚忍覉旅右四拍北庭數有􅀜中使飄飄逺自流沙至胡人髙鼻動成群仍唱胡歌飲都市中原無書歸不得道路只今多擁隔身欲􅁬飛病在床時獨㸔雲淚沾臆右五拍胡人歸來血滿箭白馬􅀅軍􅀂雷電蠻夷雜種錯相于洛陽宫殿燒焚盡干戈兵革闘未巳魑魅魍魎徒爲爾㷲哭秋原何䖏村千村萬落生荆􅂎右六拍憶昔十五心尚孩莫恠頻頻􅂆酒杯孤城此日腸堪断如何不飲令人哀一去紫䑓連朔漠月岀雲通雪山白九度附書歸洛陽故國三年一消息右七拍只今年􅂊十六七風塵荏苒音書絶胡􅀐長驅五六年弊裘何啻連百結愁對寒雲雪滿山愁㸔冀北是長安此身未知歸定䖏漂泊西南天地間右八拍午夜漏聲催曉箭寒盡春生洛陽殿漢主山河錦繡中可惜春光不相見自胡之反持干戈一生抱恨空咨嗟我巳無家尋弟妹此身那得更無家南極一星朝北斗每依南斗望京華右九拍今年臈月凍全消天涯涕淚一身遥諸􅀅亦自軍中至行人弓箭各在腰白馬嚼嚙黄金勒三尺角􅃓兩斛力胡鴈趐濕髙飛難一箭正墜􅀟飛翼右十拍冬至陽生春又來口雖吟咏心中哀長笛誰能亂愁思呼兒且覆掌中杯雲白山青萬餘里壁立石城横塞起元戎小隊岀郊坰天寒日暮山谷裏右十一拍洛陽一别四千里􅁁庭流血成海水自經䘮亂少睡眠手脚凍皴皮肉死反鏁衡門守環堵稚子無憂走風雨此時與子空歸來喜得與子長夜語右十二拍大兒九齡色清徹驊騮作駒巳汗血小兒五􅀊氣食牛氷壼玉鑑懸清秋罷琴惆悵月照席人生有情淚沾臆離别不堪無限意更爲後㑹知何地酒肉如山又一時只今未絶巳先悲右十三拍北歸秦川多鼓鼙禾生隴􅅕無東西三歩回頭五歩坐誰家搗練風凄凄巳近苦寒月􅃤􅃤中腸悲自恐二男兒不得相追随去留俱失意徘徊感生離十年蹴踘􅀅雛逺目極傷神誰爲携此别還須各努力無使霜露沾人衣右十四拍寒雨颯颯枯􅀣濕坐卧只多少行立青春欲暮急還郷非􅀜使者徴求急欲别上馬身無力去住彼此無消息􅀜塞蕭條行路難行路難行澁如􅁄男兒性命絶可憐十日不一見顔色右十五拍乃知貧賤别更苦况我飄轉無定所心懐百憂復千慮世人那得知其故嬌兒不離􅂰哀哉兩决絶也復可憐人里巷盡嗚咽斷腸分手各風煙中間消息兩茫然自斷此生休問天㸔射猛虎終殘年右十六拍江頭宫殿鎻千門千家今有百家存靣粧首􅅚雜啼痕教我歎恨傷精魂自有兩兒卽忽在天一方胡塵暗天道路長安得送我置汝傍右十七拍事殊興極憂思集足繭荒山轉愁疾漢家山東二百州青是􅇏煙白人骨入門依􅃇四壁空一斛􅃇水蔵蛟龍年過半百不􅁛意此曲哀怨何時終右十八拍上巳予自丙子上巳日真州屏之城門外于今憂患通六年俯仰時節爲之慨然昔自長淮􅀣去㠶今從燕薊眺東南泥沙一命九分九風􅀨六年三月三地下故人那可作天涯遊子竟何堪便從餓死傷遅暮靣對西山巳發慚寒食予不登丘隴拜清明寒食八年矣癸酉湖南甲戌乙亥章貢丙子淮東丁丑梅州戊寅麗江浦庚辰燕山獄中今辛巳猶未得死和上巳韻冩懐苦海周遭斷去㠶東風吹淚向天南龍蛇澤裏清明五燕雀籠中寒食三撲面風沙驚我在滿􅁭霜露痛誰堪何當歸骨先人墓千古不爲丘首慚覧鏡見鬚髯消落爲之流涕萬里飄零等一毫滿前風景恨滔滔淚如杜宇喉中血􅂡似蘇􅀰節上旄今日形骸遅一死何來事業竟徒勞青山是我安魂䖏清夣時時賦大刀讀赤壁賦前後二首昔年仙子謫黃州赤壁磯頭汗漫遊今古興亡真過影乾坤俯仰一虚舟人間憂患何曾少天上風流更有不我亦洞簫吹一曲不知身世是蜉蝣一笑滄波浩浩流􅃗鷄斗酒更扁舟八龍冩作詩中案孤鶴來爲夣裏遊楊柳逺煙連北府蘆花新月對南樓玉仙來徃清風夜還識江山似􅃇不自歎門揜牢愁白日過不應老子坐婆娑雖生得似無生好欲死其如不死何王蠋髙風真可挹魯連大節豈容磨東流不盡銅駞恨四海悠悠緫一波端午􅀄度死所􅀄何怨生朝只自知頗懐常枤意忍誦蓼莪詩浮世百年夣高人千載期楚囚一杯氷勝似九霞巵向來松下鶴今日傍誰門夣見瑶池沸愁㸔玉壘昏所思多死所焉用獨生存可惜菖蒲老風煙滿故園端午即事五月五日午贈我一枝艾故人不可見新知萬里外丹心照夙昔􅁂髪日巳改我欲從靈均三湘隔遼海自述二首當年嚼血灑銅駝風氣悠悠柰􅀂何漢賊巳成千古恨楚囚不􅁴二年過古今咸道天驕子老去忽如春夣婆試把睢陽􅀟廟㸔只今事業愧蹉跎江南啼血送殘春漂泊風沙萬里身漢末固應多死士周餘乃止一遺民乍㸔鬚少疑非我只要心存尚是人坐擁牢愁書眼倦􅁟床伸脚任吾真五月十七夜大雨歌去年五月望流水滿一房今年後三夕大􅀨復没床我辭江海來中原路茫茫舟楫不復見車馬馳康荘矧居圜土中得氷猶得􅄴忽如巨石浸倉卒殊徬徨明星尚未啓大風方發狂呌呼人不譍宛轉水中央壁下有水穴群䑕走踉蹡或如魚潑刺墊溺無所藏周身莫如物患至不得防業爲世間人何䖏逃禍殃朝來闢溝道宛如决陂塘盡室泥濘􅂗化爲縻爛塲炎蒸迫其上臭腐薫其傍惡氣所侵薄疫癘何可當楚囚欲何之􅆍食此一方坐待仆且僵乾坤莾空闊何爲此凉凉逹人識義命此事􅀜綱常萬物方焦枯皇皇禱穹蒼上帝實好生夜半下龍章但願天下人家家足稲􅆝我命渾小事我死庸何傷先太師忌日二月二十八日萬里先人忌呼號痛不天遺孤餘二紀曠祀忽三年永恨丘園隔遥憐弟妹圎義方如昨日地下想興然築房子歌自予居狴犴一室以自治二年二大雨地汙實成池圄人爲我惻畚􅁟以築之築之可二尺宛然水中坻􅀄運朽壤來臭􅁾恨莫追掩鼻不可近牛皂鷄于塒須􅁷􅀓黒墳千杵鳴參差但見如坻平糞􅁟不復疑乃知天下事不在論鎡基苟可掩耳目臭腐誇神竒世人所不辨羊質而虎皮大者莫不然小者又何知深居守我玄黙觀道推移何時蟬蛻去忽與濁世違有感巳矣勿復道安之如自然閑陪黄妳坐倦退白衣眠一死知何地此生休問天恠哉茨野客宿果墮幽燕正氣歌予囚北庭坐一􅁟室室廣八尺深可四尋单扉低小白間短窄汙下而幽暗當此夏日諸氣萃然雨潦四集浮動床几時則爲水氣􅂗泥半朝蒸漚歷瀾時則爲􅁟氣乍晴暴􅀬風道四塞時則爲日氣􅉉隂薪㸑􅂇長炎虐時則爲火氣倉腐􅀉䪺陳陳逼人時則爲米氣駢肩雜還腥臊汙垢時則爲人氣或圊溷屍或腐䑕惡氣雜出時則爲􅁾氣疊是数氣當鮮不爲厲而予以孱弱俯仰其間于兹二年矣是殆有飬致然然爾亦安知所飬何哉孟子曰吾善飬吾浩然之氣彼氣有七吾氣有一以一敵七吾何患焉况浩然者乃天地之正氣也作正氣歌一首天地有正氣雜然賦流形下則爲河嶽上則爲日星於人曰浩然沛乎塞蒼冥皇路當清夷含和􅄍明庭時窮節乃見一一垂丹青在齊太史簡在晋董狐筆在秦張良椎在漢蘇武節爲􅃊将軍頭爲嵇侍中血爲張睢陽齒爲顔常山舌或爲遼東㡌清操厲氷雪或爲岀師表鬼神泣壮烈或爲渡江楫慷慨吞胡羯或爲撃賊笏逆竪頭破裂是随所旁薄凛烈萬古存當其貫日月生死安足論地維頼以立天柱頼以尊三綱實係命道義爲之根嗟予遘陽九􅀠也實不力楚囚纓其冠傳車送窮北􅂦鑊甘如飴求之不可得隂房閴􅄦火春院閟天黒牛驥同一皂鷄棲鳯凰食一朝濛霧露分作溝中􅇤如此再寒暑百沴自辟易嗟哉沮洳塲爲我安樂國豈有他繆巧隂陽不能賊顧此耿耿在仰視浮雲白悠悠我心悲蒼天􅂚有極哲人日巳逺典刑在夙昔風􅉉展書讀古道照顔色七月二日大雨歌燕山五六月氣候苦不常積隂緜五旬畏景淡無光天漏比西極地温等南方今何苦常雨昔何苦常暘七月二日夜天工爲誰忙浮雲黒如墨飄風怒如狂滂沱至夜半天地爲低昻􅀔如蛟龍岀平陸俄懐襄􅀄疑倒巫峽又似翻瀟湘千門各巳閉仰視天茫茫但聞屋側聲人力無支當嗟哉此圜􅁟占勝非高岡赭衣無容足南房并北房北房水二尺聚立唯東箱桎梏猶自可凛然覆穹墻嘈嘈復雜雜烝汗流成􅄴張目以待旦沈沈漏何長南冠者爲誰獨居沮洳場此夕水弥滿浮動八尺床壁老如欲壓守者殊皇皇我方鼾鼻睡逍遥遊帝郷百年一大夣所歷皆黄梁死生巳勘破身世如遺忘雄鷄呌東白漸聞語聲􅀭論言苦飄揚形􅀔猶倉黄起來立泥􅂗一􅀏褰衣裳遺書宛在架吾道終未亡詠懐隂陽相烹然天地一釡􅏦人生居其間便同肉在砧􅀬猶以火燎温猶以湯潯一􅀊一煆煉老形忽駸駸吾生四十六弱質本不任矧當五六年患難長侵尋子卿羝羊節少陵杜䳌心酷罰毒我膚深􅁨煩我􅁭嗟嗟夏渉秋天道何其􅁋或時日杲杲或時􅀨淋淋方如坐蒸甑又似立烘煁水火交相禅益􅀬與益深宛轉兒戯中日夜空呻吟何如真􅂦鑊殊我一寸金脫此寒暑殻誰能復嶇􅋂偶成昨朝門前地寸裂今朝床下泥尺深人生世間一蒲柳豈堪日炙復􅀨淋起來高歌離騷賦睡去細和梁父吟巳矣巳矣尚何道猶有天地知吾心移司即事自大􅀨後兵馬司墻壁頺落地皆沮洳囚不可居七月五日移司官籍監予以詰朝行詩以記之燕山積雨泥塞道大屋欹傾小成倒赭衣􅁄下無顔色倉卒移司避流潦行行桎梏如貫魚憐我龍鍾遲明早我來二十有一月􅀂書下下㡬一考夣回恍憶入新衙不知傳舎何時了寄書痴兒了家事九牛一毛亦云小天門皇皇虎豹立下􅁟􅀌臣泣雲表莫令赤子盡爲魚早願當空日杲杲不睡頻搔白首强􅁨煎細􅀨青燈思欲顛南北東西三萬里古今上下㡬千年只因知事翻成惱未到放心那得眠眼不識丁馬前卒隔床鼾鼻正陶然宫籍􅁥兵馬司移寓宫籍􅁥予􅁥一室頗瀟洒明窓净壁􅀣影横斜可愛也賦五絶塵滿南冠􅀊月深蹔移一室􅀝􅏧林天憐元是青山客分與窓根兩􅀣隂壁間頗自有龍蛇元是誰人小住家不似爲囚似爲客􅀝窓望㫁暮天涯曽過盧溝望塔尖今朝塔影接虚􅉉道人心事真方丈静坐日長雲蒲簾軍衙馬足起黄埃門掩西風夢正回自入燕関人世隔隔墻忽送市聲來新來窓壁頗玲瓏盡把前時臭腐空好醜元來都是幻􅕋廬一付夣魂中還司即事兵馬司苦於地窄其東偏有大宅官買之以廣治所􅃇􅈦事遂爲空閑七月十一日囚自宫籍􅁥悉歸獄􅃇􅈦事之西有一室䖏予其間其地高燥而空凉蕭然獨徃寂無來人又一境界也五言八句二首幙燕方如􅀉屠羊忽復旋霜枝空獨立雪窖巳三遷漂泊知何所逍遥付自然庭空誰共語柱頰望青天秋声滿南國一葉此飄蓬墻外千門逈庭皋四壁空誰家驢吼月隔巷犬嘷風燈暗人無􅄰沉沉夜正中夜起二絶惆悵高歌入睡郷夣中魂魄尚飛􅀭起來露立頻搔首夜静無風自在凉三年獨立巳成僧欲與何人􅀃􅁑藤夜夜隔墻囚呌佛三生因果伴孤燈還獄予自宫籍􅁥還兵馬司止予􅃇􅈦事西偏之室嶽戸既葺以八月七日復返故䖏向之所謂􅆨腐温蒸依然故在回視吾所挾亦浩然而獨存作古風一首人情感故物百年多離􅁨桒下住三􅀫􅀿者猶遅留矧兹方丈室屏居二春秋夜眠與晝坐隤乎安楚囚自罹大雨水圜土俱盪舟此身委傳舎迁徙無定謀去之巳旬月宫室重綢繆今夕果何夕復此搔白頭恍知流浪人一旦歸􅃇遊故家不可復故國巳成丘對此重回首汪然涕泗流人生如空花随風任飄浮哲人貴知命樂天復何求偶賦蒼蒼巳如此梁父共誰吟神有忠臣􅀓床無壮士金􅀵心歸寂㓕随性過光隂一􅀏西山晚門前秋雨深讀杜詩平生蹤跡只奔波偏是文章􅀍折磨耳想杜䳌心事苦眼㸔胡馬涙㾗多千年􅇪峽有詩在一夜采江如酒何黃􅁟一丘随䖏是故郷歸骨任蹉跎感懐二首交遊兵後似蓬飛流落天涯鵲繞枝唐室老臣唯我在柳州先友託誰碑泥􅂗猶幸瞻佳士甘雨如何遇故知一死一生情義重莫嫌􅀵拾老牛屍伏龍欲夾太陽飛獨柱擎天力弗支北海風沙漫漢節浯溪烟胡暗唐碑書空巳恨天時雨惜徃徒懐國士知抱􅂰對人復何語紛紛坐冡卧爲屍先兩國􅀄忌九月􅀄七日北風吹黄花落木寒蕭颼哀哀我慈母玉化炎海秋日月水東流音容隔悠悠小祥哭下邳大祥哭幽州今此復何夕荏苒三星周嗟哉不肖孤宗職矌不脩昔母肉未寒委身堕㓂讐仰藥早云遂庶從地下遊大阿落人手死生不自由南冠坐絶域大期落淹流白華下玄髪碧蘚生緇裘心口自相語形影旁無儔空庭􅄦火閴天黒對牢愁魚軒在何䖏魂魄今安否兒女各北歸墳墓委南陬寒食雨凄凄盂飯誰與􅄬荆􅁄纒蔓草狐兎縁荒丘長夜良寂寞與我同幽幽我心亦劳止我命實不猶昨夕夣堂上樂昔􅂬綢繆􅁴來尚恍惚血涕連衾禂晨興一瓣香痛如螫在頭吾家白雲下萬里同􅀜憂遥憐弟與妹几筵羅庶羞既傷母在殯又念兄在囚兄囚不足念母亦爲母謀三聖去巳逺穹垠莾洪流􅃡懐百世慮白骨甘填溝冥冥先大夫欝欝蒼松揪防山迄合􅌾􅉂目復何求重陽萬里飄零兩􅁂蓬故郷秋色老梧桐鴈棲新月江湖滿燕别斜陽巷陌空落葉何心定流水黄花無主更西風乾坤遺恨知多小前日龍山如夣中又三絶世事濛濛醉不知南山秋意滿東籬黄花何故無顔色􅀿爲元嘉以後詩人間萬事轉頭空皂㡌飄蕭一病翁不學孟嘉往落魄故􅀅白髪向西風老來憂患易凄凉􅀃到悲秋更断腸世事不堪逢九九休言今日是重陽夜秋光連夜色萬里客凄凄落木空山杳孤雲故國迷衾寒霜正下燈晚月平西夣過重城夣千門鷄亂啼􅀨雪秋色金䑓路殷殷半馬蹄因風随作雪有􅀨便成泥過眼驚新夣傷心憶􅃇題江雲愁萬叠遺恨鷓鴣啼偶成二首燈影沉沉夜氣清朔風吹夣度江城覺來知打明鐘未忽聴隣家呌佛聲烏兎東西不住天平生奔走亦茫然向來鞅掌真堪􅀏爛熳如今獨自眠得兒女消息故國斜陽草自春争元作相総成塵孔明巳􅀒金刀志元亮猶憐典午身骯髒到頭方是漢娉婷更欲向何人癡兒莫問今生計還種來生未了因爲或人賦悠悠成敗百年中􅀏看柯山局未終金馬勝逰成􅃇􅀨銅駞遺恨付西風黒頭爾自誇江総冷齒人䏻􅀃禇公龍首黃扉真一夣夣回何靣見江東世事世事孤鴻外人生落日西棋􅁋詩興薄書倦夣魂迷汨汨馳還坐悠悠笑即啼一真吾自得開眼総筌蹄新薦断鴈西江逺無家􅀉萬金乾坤風月老沙漠􅀊年深白日去如夣青天知此心素琴絃巳絶不絶是南音小年燕朔逢窮臘江南拜小年􅀊時生䖏樂身世死爲縁鴉噪千山雪鴻飛萬里天出門意寥廓四顧但茫然除夜乾坤空落落􅀊月去堂堂末路驚風􅀨窮边飽雪霜命随年欲盡身與世俱忘無復屠蘇夣挑燈夜未央壬午丙子上巳前二日予至真州今俯仰六周星矣撫時念事爲之流涕聊冩我心質諸􅄦神爾憶昔三月朔􅀊在火䑕郷朝登迎銮鎮夜􅀫清􅁁堂于時坌颷霧陽精黯無芒胡羯犯彤宫犬戎升御床􅃤淡銅馳泣威垂朱鳥翔我欲䟽河嶽借􅂇金與湯吾道率曠野繞樹空徬徨慷慨撫鰲背艱􅀜岀羊腸扶日上天門随雲拜東皇祖逖誓興晋鄭畋義扶唐人謀豈云及天命不于常泗水沉洛􅂦蘇丘植汶篁瑶宫可敦后玉陛单于王革命曠千古􅀍髪緜八荒海流忽西注天旋俄右方嗟予俘爲馘萬里劳梯航秋風上甌脫夜雪卧桁陽南冠鄭大夫北窖蘇中郎龍蛇共窟穴蟻蝨連衣裳周旋溲渤間宛轉沮洳塲漠漠蒼天黒悠悠白日黃風埃滿沙漠􅀊月稔星霜地下􅀟氣烈獄中孤憤長唯存葵藿心不改鐡石腸断舌􅁬常山􅃑齒厲睢陽此志巳溝壑餘命終岩墻夷吾不可作此連乆云亡王衍􅂆石勒馮道朝徳光末俗正靡靡横流巳湯湯餘子不足言丈夫何可當出門仰天􅀏雲山浩蒼蒼生日憶昔閑居日端二逢始生升堂拜親夀摳衣接賔荣載酒出郊去江花相送迎詩歌和盈軸鏗戞金石聲于時果何時朝野方休明人生足自樂帝力無䏻名譬如江海魚與水俱忘情詎知君父恩天地同生成旄頭忽堕地氛霧迷三精黄屋朔風捲園林殺氣平四海靡所騁三年老于行賔僚半蕩覆妻子同飄零無㡬􅂘慈母有頃遭潰兵束兵獻穹帳囚首送空囹痛甚衣冠烈甘於􅂦鑊烹死生乆巳定寵辱安足驚不圖坐羅網四見槐雲青朱顔日復少玄髪益以星徃事真蕉鹿浮名一草螢牢愁冩玄語􅀄度感騷經朝登蓬萊門暮渉芙蓉城忽復臨故國摇揺我心旌想見家下人念我涕爲傾交朋􅀃疇昔惆悵鷄豚􅉀空花從何來爲吾舞娉婷莫道無人歌時鳥不可聴逹人貴知命俗士空勞形吾生復安適拄頰􅀚蒼􅁳端午五月五日午薰風自南至試爲問大鈞舉杯三酧地田文當日生屈原當日死生爲薜城君死作汨羅􅄦高堂狐兎遊雍門悲涕人命草頭露榮華風過尔唯有烈士心不随水俱逝至今荆楚人江上年年􅀕不知生者荣但知死者貴勿謂死可憎勿謂生可喜萬物皆有盡不㓕唯天理百年如一日一日或千􅀊秋風汾水辞春暮蘭亭記莫作留連悲高歌舞槐翠自歎三首猛思身世事四十七年無鶴髮俄然在鵉飛乆巳殂二兒化成土六女掠爲奴只有南冠在何妨是丈夫北轍更寒暑南冠㡬晦􅁳家山時入夣妻子亦関情惆悵心如失﨑嶇命復輕遭時命如此薄分􅀏三生疾病連三次形容落九分㡬成白宰相誰識故􅀅軍暗坐羞紅日閑眠想白雲蒼蒼竟何意未肯䘮斯文病目二首近來煩惱障左目忽茫茫聶政心雖碎劉伶醉未忘問天天不應食日日何傷萬想由來假􅀵拾太乙光向來巖下電無故眩生花逹磨靣向壁盧仝塌沙燈前心欲碎鏡裏􅁂空華何日㸔明月沈沈斗柄斜有感心在六虚外不知呀網羅病中長日過夢裏好時多夜夜頻能坐時時亦自歌平生此光景回首􅀏呵呵拾遺早起暁日半窓紅隣鷄振翼雄餘子貪慵睡佳人理髪蓬未忘塵俗慮那免是非攻前山渾不見籠翠霧烟中贈許柏溪惟長風吹飛藿清蛚吟野草流光速代謝興懐令人老遊子中夜起悠悠酣且歌明月委清照江湖秋渉多豈無臨淄魚亦有邯鄲酒懐古招王孫登高重回首文山先生全集卷之十四終
