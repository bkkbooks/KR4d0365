body:
  text: 記吉州州學貢士荘記物之在天地間自銖粟以上莫不有主名獨貢士荘所儲以擬夫三􅀊大比士之送上春官者有司不知誰宜得之取什伯於千萬亦無敢自必爲巳得其予奪之殆有物焉逸史稱隋末一書生所居抵官庫有數萬錢欲取之神人訶之曰此尉遲公錢也泉者天之利噐惟天能以與人則夫任貢士荘者殆爲天守利噐以俟夫天之所以與人者充是心以徃真無所爲而爲之其爲仁豈不至而爲義豈不盡乎咸淳六年簡池趙君必禴來爲廬陵教授作興斯文教飬畢具則按貢士荘之􅃇稽其所出内􅀊錢榖㡬何廬陵士甲江右一科數路資送四五百人裒多益寡稱物平施末之云耳於是有増田之議一之日置尹氏租爲米八十斛二之日置彭氏租爲米一千一百九十二斛趙君猶以爲未足則曰傳而益之其來者之事哉添差教授番陽程君申之􅁇至相與詣郡請蠲賦吏持難易閣弗下永嘉繆侯元德甫下車二君申其請侯􅁣然曰柰何與吾黨校瑣瑣乎復之不崇朝予聞而異之以爲侯與廣文之用心皆所以奉天道之不及者也古之爵人言必稱天國家謹惜名噐自他蹊者悉名僥倖惟進士科使四方寒畯操觚而進付得失於外有司而定高下於殿陛之親擢公卿大夫繇此其選當是時天子宰相一不得容心於其間予嘗謂今世惟科舉一事爲有天道行焉士脩於家試於郷如探籌然以信夫天命之所遭而爲貢士計者積倉褁糧共其道路先事而爲之備随天命之所與而後與之是心也豈復有内交要譽之􅀻哉予故曰皆所以奉天道之不及者也是宜書且夫取士於天下將以爲天下用人之常情其窮也不爲利疚則其逹也不可以非義屈後之臨大節㫁大事决非異時簞食豆􅅅見於色者之所能也夫使郡國上其賢能而漢人續食之意􅀮然􅀉於學校士得以直走行都而無僕馬後顧所望於人也􅁿則所以全於巳也大是􅀖學者世修歐周之業人􅀒胡楊之氣如有用我執此以徃是舉也世道㣲有頼焉盖益可書也巳是荘創始於尚書胡公槻隷于學者米二千二百斛有竒前丞相葉公夣􅂦爲郡増六百三十斛有竒前教官黄君愷伯増一千三百六十斛有竒前趙侯典椯増四百一十斛有竒自二教創後施君郁鄭君師臯増二百五十斛有竒合今所増通爲米六千一百斛有竒以學諭提􅀧荘事劉少南張敏子云八年八月記吉州右院獄空記吉州右司理院廼開慶元年五月獄空九月又空明年五月又空吉爲州凡三獄曰州院曰左司理院右院其一也方千里之國未易爲理而物之不齊其情固然省刑罰止獄訟賢者雖欲爲之而格於其􅀔之所不可長老傳說以爲自南渡百餘年惟乾道庚寅嘉定甲申獄嘗空乾道事不知何如嘉定間南昌張别駕􅀍㫖攝廬陵郡初張宰清江得米南宫獄空二字勒諸珉以詔不朽洎來吉摹本遍付諸獄不三月遂皆以空告由今推之爲長民者一念之善感召和氣可也上有所好下從而逢之是未可知夫以百餘年兩見之事可謂稀闊而其可疑又如此然則雖謂之絶無僅有可也今司理君爲政寛􅁢嘗平反死事二法應賞君不自以爲功當路論功亦不及人謂君超然利害之表君曰吾盡吾心而巳而何賞之較君實有愛人利物之心哀矜庶獄無所不用其至人人自以爲不􅁈獄空遂爲常君書三考候代者未至􅀊月有竒獄空之事其二在考内其一在􅀱代時院之設乆矣官此者㡬人得闕而來受替而去其間可紀之盛百餘年僅僅兩見今君受任三考巳能配此曠絶之蹤而書滿巳後迄臻三美君職於其事可謂無愧矣此而不書後將何􅀚雖然予嘗上下世變􅀚之自畫􅁚之化逺人心之樸日以散惟成康時曰刑措不式漢文時㡬致刑措下此則唐􅀄死囚歸獄之事人以爲竒盖唐虞後至今三千餘年而㫁獄之省數不過三四海之大兆民之衆不可以一院比也然聖人得國而爲之持之以道使民遷善逺罪而不自知其效驗近卜於期月三年而逺亦不過於必世夫古今刑措之日旣如此其難而區區空一院之獄又如此其不數聖人之志其遂不可行邪雖然由君之事則百餘年間職業之可書曽不一再而君以􅀊月爲之有餘天下事信不可爲乎神而明之存乎其人此予所以􅀄爲世道感而以其尚可爲者深幸也嗚呼君其母以自足哉君姓洪名松龍嚴陵人龍泉縣太霄􅀚梓潼祠記龍泉邑治左出門行數百歩有太霄老子宫焉辛酉之春予登其巔四山拱趍天宇髙曠會令方營度作梓潼君祠邀予爲字曰元皇之殿旣爲從事六月殿成明年令若士以書諗曰役之􅀄興君寔來辱爲之書請卒記之邑爲吉上㳺山川清㧞民秀而文天聖以來髙科􅂦􅂦出有位至侍從以忠直自􅁬尚論文獻者歸焉維郴實接壌桴鼓數震令􅀄至適江上有警郴冦益乗以譟周旋軍旅不得以間事平令謂吾幸爲禮義邑雖倥偬不容不爲俗化地况少須暇乎稽諸圗志庭廟鱗立吾黨之士獨無所敬祀會賔興詔下乃進諸生謀曰今三􅀊大比試者以文進將文而巳乎意必有造命之神執其予奪於形聲之表者盖元皇是也士之所自爲行爲上文次之神所校壹是法合此者陟違此者黜人謂選舉之􅁠属之有司不知神之定之也乆矣蜀山七曲神所宅之國衣冠文物莾爲風塵惟神元命寔始吴會英靈赫赫將從君父所在而依之是以江湖以南神迹多著此固士之所當欽崇而景仰者舎而不祠惟缺典是懼議遂决予按詩曰相在爾室尚不愧于屋漏又曰昊天曰明及尔出王昊天曰旦及尔㳺衍夫人一動之㣲必有神明焉得其情於幽􅀮易肆之地兹其所以體物而不可遺也惟經傳統謂之神未有所指名近世貴進士科士以得失爲病自元皇廟食於是始有司桂籍之説化書所謂九十四化變遷推移曠千百􅀊雖渉於不可測知然神生爲忠臣孝子殁爲天皇真人取士本末實昉於人心義理之正明有禮樂幽有􅄦神果哉其不誣矣孟子曰天爵仁義忠信人爵公卿大夫古之人脩其天爵而人爵從之聖賢不語怪而教人先内後外未嘗非神之意神雖㳺於太虚而考德問業􅀄無戾於聖賢之言其在祭法茍有以明民成教宜與祀典則神之有祠豈緇黄之宫之埒邑有先民典刑大冠逢掖争志䇿厲爲臣止忠爲子止孝此其内心固油然不自巳而况髙山仰止明神在前則其戒謹恐懼工力當倍他日㧞起諸生彬彬知名則居公卿大夫之位必將有仁義忠信之人令之此舉於人才甚有功於方來世道非無所􅀜繫豈曰以區區科日望其人而惠徼福於神之一顧哉柌翼殿以廡丹堊具鍾鼓供噐如式像設居中内而父母婦子事親之道孝之属也外而待御僕從爲臣之道忠之属也費錢七十萬有竒十萬爲令俸餘裒多迄于城􅀚下古曰龍頭里因其名爲坊扁額校書􅀰姚君勉筆也令方爲逺者計㢘用積餘市田以奉祠事繼今邑之士其受令之賜永永無斁令陳氏名昇三山人􅀄攝事􅁇辟今任云文山觀大水記自文山門而入道萬松下至天圗晝一江撗其前行數百歩盡一嶺爲松江亭亭接堤二千尺盡䖏爲障東橋橋外數十歩爲道體堂自堂之右循嶺而登爲銀灣臨江最高䖏也銀灣之上有亭曰白石青崖曰六月雪有橋曰兩峯之間而止焉天圗􅀞居其西兩峯之間居其東東西相望二三里此文山濵江一直之大槩也戊辰􅀊余自禁廬罷歸日徃來徜徉其間盖開山至是兩年餘矣五月十四日大水報者至時舘中有臨川杜伯􅀭義山蕭敬夫吾里之士以大學試羣走京師惟孫子安未嘗徃輙呼馬戒車與二客疾馳􅀚焉而約子安後至未至天圖􅀞其聲如疾風暴雷轟豗震蕩而不可禦臨岸側目不得徃視而隔江之秧畦菜隴悉爲洪流矣及松江亭亭之對爲洲洲故垤然􅂭起及是僅有洲頂而首尾俱失老松數十本及水者争相跛曵有􅅯蹇不伏之状至障東橋坐而靣上㳺水從六月雪而下如建瓴千萬丈洶湧澎湃直送乎吾前異哉至道體堂堂前石林立􅃇浮出水而如有力者一夜􅀒去酒數行使人􅀱六月雪可進與否圍棋以待之復命曰水㫁道遂止如銀灣山􅀔回曲水至此而旋前是立亭以據委折之會乃不知一覧東西二三里而水之情状無一可迯遁故自今而言則銀灣遂爲􅀚瀾之絶竒矣坐亭上相與諧謔賦唐律一章縱其體状期盡其氣力以庶㡬其萬一予曰風􅀨移三峽雷霆擘兩山伯􅀭曰雷霆真自地中出河漢莫從天上翻敬夫曰八風捲地翻雷穴萬甲從天驟雪􅎸惟子安素不作詩聞吾三人語有會於其中輙拍手捋􅂡捧腹頓足􅀏絶欲倒盖有淵明之琴趣焉􅀝䦨踰時詭異卓絶之􅀚不可終極而漸告晚矣乃令車馬從後四人携手徐歩而出及家而耳目昡顫手足飛動形神不自寕者乆之他日予讀蘭亭記見其感物興懐一欣一戚随時變遷予最愛其説客曰羲之信非曠逹者夫富貴貧賤屈伸得䘮皆有足樂盖于其心而境不與焉欣於今而忘其前欣於後則忘其今前非有餘後非不足是故君子無入而不自得豈以昔而樂今而悲而動心於俯仰之間哉予憮然有間自予得此山予之所欣日新而月異不知其㡬矣人生適意耳如今日所遇霄壤間萬物無以易此前之所欣所過者化巳不可追紀予意夫後之所欣者至則今之所欣者又忽焉忘之故忽起􅁬筆乗興而爲之記且諗同㳺者發一噱鄒文叔垂芳堂記吾郷上㳺有佳木連理生於鄒公長者之地不知㡬何年益公取以􅀘廬陵圖誌木濵水如老蛟夭矯有騰驤怒起之􅀔咸淳八年秋一夕大雷電以風木随水而飛又二年秋有蓮一蔕􅀟華出于文叔北窗下苔池中文叔長者曾孫也連理表章於乾淳間鄒氏始享有其瑞予聞長者一再傳皆恂恂友愛同氣並根旣碩且蕃實生來仍今文叔之庭二季競爽兩孫端美天將昌之其殆視同頴兩􅄮絪緼坱北而未有巳乎文叔喜而命予題其堂曰垂芳夫一草一木之㣲比于太虚僅同毛髮而卾不韡韡兄弟之親小雅所爲賦也於吾心得無感乎予旦夕尚徘徊新堂爲君賡棠棣之一章李氏族譜亭記蘇老泉有族譜引又有族譜亭記引專言父祖子孫出於一本不可忽忘記則以郷人不義不睦者爲戒愚嘗謂引之詞極論骨肉之所從而動其内心之愛此宜與賢者道至於記之所載其言他人􅆷賊之故而惟恐族䧟於不淑羞惡之心人皆有之則此訓又親切焉西山李氏家於龍泉數百年先世有諱榖者與頴濵逰老泉之譜引自以爲得於靣授而切意其亭記尚未及見也今其族放蘇氏作族譜亭以不忘先世頴濵之交以庶㡬老泉之意有名􅁇祖者又修復之以紹前志爲予求字予爲之書而樂道其美夫其譜引先世旣自得之以遺其子孫今其子孫固巳識先世之用心矣予猶以爲未也則告諸􅁇祖􅀊時聚族拜奠亭下更􅂅與蘇公亭記各各􅀚誦一過使爲長上者復申告之曰謹毋爲郷之某人者蕭氏梅亭記廬陵貢士蕭元亨江西帥平林公之孫贑州龍南縣丞之子蚤孤有立克肖厥世於其讀書㳺息之暇有自得焉乃作亭於屋之西偏周之一徑􅀍徑一梅亭後有廊有詩盡壁間前方池廣五尺飼魚而􅀚之鄰墻古􅀣蔽虧映帶清風徐來明月時至君領客于此上下談􅀏客多乃祖父􅃇遊而君樂從之稱其家兒也君名亭曰梅而属其客請記於予予昔者登平林公之門入其園䑓􅀚沼渚卉木竹石曲折靡㬅登覧幽逺公緩歩徐坐杯酒流行古君子也退從賛府與其次子江陵支使昻然野鶴粲然華星南金荆玉應接不暇佳公子也今是園也亭舘日以完美草􅀣日以茂宻元亨兄弟又從而增大之夫髙􅄗曲池百􅀊倐忽此孟甞君之所以感􅁣於雍門周者也予於君不十年間俯仰三世昔也念其門之遭今也賀斯園之幸則告於元亨曰天地閉塞而成冬萬物棣通而爲春方其閉塞也隂風觱栗寒氣贔屭衆芳景㓕萬木僵立何其㣲也及其棣通也木石所壓霜露所濡土膏墳起芽甲怒長何其盛也天地生意無間容息當其巳閉塞之後未棣通之前於是而梅出焉天地生物之心是之謂仁則夫倡天地之仁者盖自梅始今君之樂斯亭而賞斯梅也其何以哉天地莫不有􅀄萬物莫不有􅀄人事莫不有􅀄人心莫不有􅀄君從其􅀄心而充之無非仁者使梅而有知吾知其爲君欣然矣昔東坡記靈璧張氏園亭推本其先人之澤而拳拳然望其子孫且將買田泗上以與張氏㳺焉予里人辱君好舊矣宜其甚於坡之愛張氏也衡州耒陽縣進士題名記衡州進士題名記設於學耒陽隷焉去年歷兵火浸湮毀耒陽宰郴江王某始與其士刻石邑庠以自爲一同人物記􅀖人欝林教授周君道興介予曰縣之立是碑属􅀊大比將作興士氣也兾子爲之記予嘉其勤不得辭按衡進士姓名可考者自祥符省元鄭向而始景祐八人俱擢第郡人侈爲渾化時耒陽居其三嘉定郡貢十八人耒陽又半之間􅀊徃徃多得士今邑人於花州之䜟翹乎其未愸也雖然科第之末不足爲儒者道天下事固有大於此者矣衡有石鼓書院朱文公實爲記其論世俗之書進取之業以爲志於巳者所羞言至謂學校科舉之害不可以是爲適然而莫之救先生所以正人心破俗學者頎乎其志也前軰之流風未逺學者之分内何限属邑之士其得無所聞乎然則縣之此碑􅀅以紀姓名也豈曰使人歆慕誇羡矻矻然爲物外之歸哉夫在上有師道則在下有善人修於家有正學則天子之庭有真儒此令尹與凡邑之士兢兢終日而不能巳者也若夫苟焉而學泛焉而仕冐焉而題則後人指之曰某也若何某也若何嗚呼是可不凛凛乎哉撫州樂安縣進士題名記撫領縣五進士題名記自太平興國樂公史始以迨于今班班然雖然此記諸郡者縣又各有記郡縣皆以本人物之出而縣又近也樂安自紹興十八年始置縣于時士文富義豐頭角嶄出志氣凛然盖文物之發越乆矣三􅀊大比由是而計偕者始而二三人􅁇而四五六七人擢奉常第者始而一人􅁇而二三人斯盛矣而記未立闕也予同年新贑州教授何君時以書來京師曰薦於鄉而仕於國皆仕之逹也追其巳徃之不及記待其方來之不勝記特託諸石以詔不朽􅂅假之一言辭不􅀗按圖志縣始創實割崇仁三鄉與吉之永豐一鄉斯土也盖文明之㑹也山川之英扶輿清淑之所蔵是故名世出於其間歐陽子之於永豐文恭羅公之於崇仁是其人也今縣東跨西并􅀵拾竒山水以爲一國風氣磅礴且百年於此斯文之運䆮以張王此豈偶然之故邪雖然二君子所長非科第也有大焉者矣登斯記也高山仰止景行行止當如何哉當如何哉瑞州三賢堂記瑞有三賢祠堂三賢余襄公蘇文定公楊文節公祠堂舊在水南闤闠景定庚午燬于兵前守嚴陵方君逢辰遷之稍西垂成而去某爲君代相遇於上饒君語及斯堂曰瑞人之敬三賢也如生三年無所於祠意閔閔焉予是以亟新之也然􅂗塈未畢像設未備子其成之成則爲之記某至郡旣敬奉君之教遂率諸生行釋菜禮而君書三至諗記之成某不得辭夫瑞爲郡號江西道院然在汴京盛時爲逺小故余蘇二公皆以謫至淳熈間郡去今行在所爲近而楊公江西人雖自蓬監出守殊不薄淮陽也地一而時不同又守郡者與他謫異然瑞人矜而相語槩曰吾郡以三賢重余公坐黨范文正蘇公坐救其兄東坡先生後又以執政坐元祐黨楊公坐争張魏公配享事使此三賢者皆無所坐安得辱臨吾􅁟噫甚矣瑞人之好是懿德也然三賢所飬猶有可得而竊窺者乎范公忤吕丞相而去也未㡬復用前日寅縁􅀍斥者以次召還襄公自瑞徙㤗乃獨請嶺南便郡以歸愈去愈逺豈非所謂同其退不同其進者耶蘇公世味素薄其記東軒謂顔氏簞瓢之樂不可庶㡬而日與郡家收緇銖之利曽不以爲屈辱異時再謫三徙之餘退老頴濵杜門却掃不怨不􅀹使人之意也消若楊公則肆意吟哦筆墨淋漓在郡自爲一集與疇昔道山群賢文字之樂無以異也若三賢者豈以擯斥踈逺累其心哉夫擯斥踈逺不以累其心者其流或至於翛然逺舉超世遺俗而三賢又不然余公用於慶曆蘇公用於元祐蹇蹇匪躬皆在困躓流落之後楊公當􅁠姦用事屢召不起報國丹心竟以憂死凛然古人尸諌之風嗚呼此其所以爲三賢歟繇前言之吾知在瑞之時樂天安土繇後言之吾知在瑞之時乃心罔不在王室嗚呼此其所以爲三賢歟詩曰髙山仰止景行行止太史公曰雖爲之執鞭所欣慕焉瑞人之敬三賢也又於此思之當有以稱方君所爲欲記斯堂之意某於先正無能爲役建昌軍青雲荘記大農簿趙侯守旰之明年建青雲荘成侯旦夕受代行矣移書請記於廬陵文某曰大江以西縉紳衣冠旴爲盛旰賔興薦士三十七江山竒氣發天地之蔵未艾也郡有庫邑有荘皆以貢士名貢鹿鳴與計偕者僕馬道路而無虞矣則後自念士方奏名待對皇帝王伯之規模造端發􅮾如火始然柰何以旅瑣瑣病寒畯乎會南豐有寺曰安禪燬于冦田若于無所於属於是復其租税爲屋四楹乃積乃倉於寺之廢址命曰青雲荘錢榖有司三􅀊一會凡旴之試御前者贐各有差所爲厚士於方來盖庶㡬焉某復於侯曰自異學興緇黄之宫遍天下其徒蚕食阡陌相望有志之士嘗欲磨以􅀊月聽其消亡士大夫蔽於福田利益之􅀻非惟無救於敝更張之侯也炳然大􅀚右儒而左釋制其膏􅃾移彼于此正合前賢建置可謂執德而不回者矣孟子曰我善飬吾浩然之氣夫浩然者際天地而常存不假外物而爲消長士豈以侯爲凂巳哉詩云菁菁者莪在彼中陵旣見君子􅃬我百朋釋者曰古者貨貝五貝爲朋百朋得祿多也小雅之序菁菁者美其育材變小雅之次菁莪者傷其廢禮以君師在上取其長育人材者禮如何其廢之矧諸侯奉天子命守􅁟有國士賢者能者悉上送春官􅂆駕續食固其所也侯推廣國家樂育之意知盡禮而巳與之者非以爲恩受之者豈以爲不屑哉荘生論鵬􅅮扶揺而上者九萬里風斯在下本放曠者寓言自隋唐以來世人尊異科第若青雲者放之而爲之辭古之人其身益高其心益危人以爲瞻望不可企及乃其憂責之始士之於一旦豈真以發身爲汗漫乎哉易之􅁚雲上於天需君子以飲食宴樂士待對時也雲雷屯君子以經綸士澤物時也侯誠有望於人物有意於世道有以爲需之飲食侯事也無以爲屯之經綸士責也侯不􅀒士士亦不􅀒侯是爲不􅀒所學不􅀒天子侯名孟適董荘事者前通判臨江軍曾君稹新􅀽州萬載縣主學徐公應午貢士庫名存而實湮以白金二十鎰􅀘其籍改庫爲田以利乆逺其出内則􅀠是云贑州重修清獻趙公祠堂記郡所在祠先賢之爲守者守得祠以遺愛然而百世之下君子之澤有存焉者寡矣而聞其風爲之興起尸而祝之不謀同辭識者於是上下世道而􅀚其大節焉故叅知政事贈太子少師清獻趙公抃歷事仁宗英宗神宗以忠亮純直爲時名臣公嘗治䖍治益治杭治越其政本之以清淡行之以簡易寛不爲弛嚴不爲殘使在漢氏課功第能當不在循吏下抑公所爲大過人者不寕惟是當王安石變更祖宗法海内騷動廷臣唯諾趍走莫敢後先獨與司馬文正光范忠文鎮唐質肅介􅋕􅋕争論不少假借至上䟽言財利於事爲輕民心得失爲重不罷青苗使者非宗社之福公卒去位小人相􅁇用事濁亂天經蘖牙禍根􅍮舒之罪􅁾汙簡冊如有一个臣㫁㫁猗無他技中原遺老炳然元􅀛天下後世感憤追想猶凛凛有生氣鳴呼此其所謂大節􅀜繋於世道治亂升降而不可誣也咸淳六年知贑州大宗丞番昜李侯雷應以公嘗辱爲是􅀖始至訪公祠所在郡治故有祠與濂溪並自濂溪移祀于學前守陳公宗禮始建公廟于城之東偏􅀊時妥侑習爲故常屋弊且壓神不顧享侯􅁣然曰是不可憚改㑹􅀊豐人和庭無徴發於是棟楹欄檻之腐敗撓折者瓴甓丹雘之踈漏漶澷者神位祭噐之缺失不如禮者所費儉約一日新美又更爲之門俯臨大衢非徒侈􅀚使過者敬恭焉明年夏五落成侯時巳除湘南刑獄使者􅀅行走書属某記之某惟吏道苟且逐末忘本乆矣侯之先公忠清有風裁於世侯得之見聞獨能尊事文獻景行先哲示􅀖人以繹教思其淵源有自來哉清獻距今二百餘年贑石公所鑿也章貢臺公所創也公之事逺矣而其山川猶有衣􅀍其餘者贑人之思之曰公生而德澤在吾土公之賜也公死而典刑在吾土公之賜也鳴呼公之在熈寕也當時小人號爲得志富貴澌盡終歸無有贑何地也而公祠在焉後公而爲贑者相望亦豈無可以繋去思者而公之祠巋然靈光何其懿也鳴呼士大夫之於當世其大節可不謹哉可不謹哉贑州重脩嘉濟廟記今天子咸淳六禩大宗丞􅁠侍左􅀰官李雷應􅀍㫖知贑州贑地大而俗􅅝山寛而田狹俗􅅝故易以譟田狹故易以饑侯未至以爲難將至以爲憂乃七月下車膏􅀨霈流嘉氣坌集民聲大和四郊以寕侯悦莫喻所從來也百姓歌之曰我土渢渢􅁰稷芁芁孰啓我侯我神之功我氓􅃖􅃖牛犢熈熈孰相我侯我神之威侯驚召父老進而問故曰是何神也父老相率告於庭曰州之東有廟曰嘉濟自秦漢以來血食至今我民司命匪神其孰尸之侯恤然曰我何以得此於神哉抑神實德我我其有不致力扵神廼肅􅇼豆乃㓗牲牷晨起詣廟以謝以祈旣竣事周視庭宇不遑干寕始建議營度刋木于厓浮竹于津厥材既堅厥工惟時植圯支仆撤去庳陋傭力奔走咸􅂆於事堂皇言言廊廡嚴嚴有門秩然有亭翼然於是神位具宜廟制大備王宫皇皇衮冕裳衣柌既畢則以其餘脩道逵以便來㳺者葺二浮梁以便絶江者錢竒二百萬粟竒二百碩悉出侯所節縮故役成而人不知明年四月侯除荆湖南路提􅀧刑獄未行粟米在市􅁞麥滿野雞犬相聞逹于嶺表訖侯去視始至如一日焉百姓復歌之曰奕奕廟貌我侯新之侯爲我民匪神是􅀻田有稲粱野無干戈㣲侯之賜胡以室家屢舞􅋖􅋖伐鼓淵淵何以報侯萬有千年予時卧山中州從事具本末來属予言其事予按祭法能禦大菑則􅂎之能捍大患則祀之神之爲靈昭昭矣謹叙次下方納諸廟門爲記贑州興國縣安湖書院記贑興國縣夫子廟在治之北門縣六郷其五郷之人來㳺來歌􅀍服儒雅東二百里曰衣錦郷其民生長斗絶險寒或爲龍蛇瀆于􅀖經有司黽勉以惠文從事咸淳八年宣教􅀰臨川何時來爲宰憫然曰使人不可化則性命之道熄矣顧邑校曠越不克施乃夏四月即其地得山水之勝議建書堂以風來學召其豪長率勵執事堂庭畢設講肄有位彚試舘下録爲生員凡二十八人又㧞其望四人爲之長冬十月令率諸生以牲幣薦于先聖先師樽爼旗章等威孔嚴環􅀚愕􅇇屏息胥忭黧老婦子轉相傳呼然後翕然以儒者爲重令曰吾教可行矣載命胥正秩其比伍家使有塾人使有師如黨庠術序之意置進學日記令躬課其凡督以無怠又上諸府改其郷曰儒學植之風聲於是山長谷荒人是用􅂆咸􅂅進嚮文事率由訓程傳曰天地之道浸言化以漸也風俗之積㡬千百年而令一朝變之固若是速歟共惟國家五星聚奎實開文明皇祖制詔天下州縣立學所在表章儒先復創書院三代以下斯文彬彬焉先民有言地氣自北而南粤從衣冠正朔啓我吴會自江以南悉爲鄒魯今也遐荒陋僻沐浴教恩如狂得瘳如迷得呼王澤之滲漉日深地氣之推移日至此豈偶然之故哉予於令爲同年進士適守是州今奉天子明訓以字民爲職能廣學愛宣德化是爲不辱威命將上其事於朝復諗之諸生曰昔有文翁興學于蜀受業慱士時則張叔學官弟子畏而懐之彼何人哉叔􅀆叔􅀆又進諸生之長諗之曰昔有文公設教于潮潮人趙德以士見招維文與行倡于齊民其則不逺德哉􅀂人諸生拱而前曰某等幸生明世惟師帥不鄙夷之俾􅀗有聞雖不敏敢不受教請刻諸石以詔百世書院之制前爲燕居直以杏壇旁爲堂左先賢祠祠後爲直舎繚齋以廡不侈不隘臨溪爲之門堂名絜矩齋名篤志求敏明辨主善率性成德其門總曰安湖書院某山中所題云道林寺衍六堂記余行歩長沙道湘西登道林寺􅃇有四絶堂指沈􅀓師裴休筆札宋之問杜甫篇章也堂之顔吾郷益國周公書之至是百二十年公又有記􅄒􅃽之竒語之竒取歐陽詢書韓愈詩而黜裴宋公獨合古今異同有衍四爲六之􅀃人之意度相逺如此僧志茂以屋壓字澷夀公字于石取公之意易名衍六將掲于新堂予嘉其有二善焉􅀘唐賢故事寶乾淳遺墨非俗衲所爲爲之嘉歎而記其後五色賦記孟春之二十五日發舟石鼓越三日過衡山宰趙孟傃送縣志遺逸門一叚云冦豹與謝觀同在唐崔裔孫門下以文藻知名豹謂􅀚曰君白賦有何佳語對曰暁入梁王之􅁐雪滿群山夜登􅁃亮之樓月明千里􅀚謂豹曰君胡不作赤賦豹曰田單破燕之日火燎于原武王伐紂之年血流漂杵前軰游戱文字足以觧人頥如此客曰更倣之作黒賦如何予應聲曰孫臏䘖枚之際半夜失踪逹磨面壁以來九年閉目客絶倒予曰君盍賦黄賦青如何一客云杜甫柴門之外􅀨漲春流衛青塞馬之前沙含夕照又一客云帝子之望巫陽逺山過􅀨王孫之别南浦芳草連天曰黄曰青不于其蹟而于其神亦一時興致所到因反􅀚冦謝前作惟月明千里得白之神曰雪曰火曰血皆不免着迹且漂杵是武王一䖏事燎原與田單不相干一客改之曰堯時十日並出爍石流金秦宮三月延燒照天燭地一客又曰夜登􅁃亮之樓月明千里如何對或對曰秋泊􅀽宏之渚水浸一天予謂前作巳是劣劇後來者又進乎滑稽矣因次第其高下赤豪雄第一黒深妙第二黄神俊第三白脱灑第四青風韻第五或以黒爲冠予亦莫知其定因記之以諗􅀚者衡州上元記􅀊正月十五衡州張燈火合樂宴憲若倉于庭州之士女傾城來􅀚或累數舎竭蹷而至凡公府供張所在聽其徃來一無所禁盖習俗然也咸淳十年吏部宋侯主是州予適忝陳臬事常平以王事請長沙㑹改除於是侯與予爲客主禮是晚予從城南竟城東夾道􅀚者如堵入州從者殆不得行旣就席左右楹及階階及門駢肩累足􅋾􅋾如魚頭其聲如風􅀨潮汐咫尺音􅄍不相辨侑者集三靣之人趨而前執事㡬不可曲折酒五行升車詣東㕔㕔之後稍偏爲燕坐爼豆設焉主人旣肅賔車不得御乃歩入燕坐之次至兒童婦女雜襲而争先男子冠以上徃徃引去及獻酬州民爲百戱之舞撃鼓吹笛斕斑而前或􅂪倛焉極其俚野以爲樂㳺者益自外至不可復次序婦女有老而秃者有羸無齒者有傴僂而相携者冠者髽者有盛􅂗澤者有無飾者有携兒者有􅀒在手者有任在肩者或哺乳者有睡者有睡且蘇者有啼者有啼不止者有爲兒弁髦者有爲緫角者有解后叙契闊者有自相􅀏語者有甲􅀏乙者有傾堂􅀏者有無所覩随人􅀏者跛者􅀝者走者趨者相牽者相扶擎者以力相拒觸者有醉者有勌者咳者唾者嚏者欠伸者汗且扇者有正簮珥者有整冠者有理裳結襪者有􅂂閾者有􅀝屏者有攀檻者有執燭跂惟恐堕者有酒半去者有方來者有至席徹者兒童有各随其親且長者有無所随而自至者立者半坐於地者有半坐杌下者有環客主者有坐復立者有立復坐者視婦女之數多寡相當盖自數月之孩以至七八十之老靡不有焉其望於燕坐之門外趑趣而不及近者又不知其㡬千計也當是時舞者如儺之奔狂之呼不知其䙝也􅀚者如立通都大衢與俳優上下不知其肆也予與侯頺然其間如爲家人之長坐於堂而驕兒騃女充斥其間不知其偪也予起而舉酒祝侯曰以平易近民而民近之豈弟父母侯之謂矣侯醻且執爵前曰惟使者使民不􅁈無湮欝其和我是以大有民予避且謝則復諸侯曰使時和􅀊豐日星明穊舉海内得以安其生而樂其時衡與賜焉維天子之功臣等何力之有侯拱而立侯蜀人也因與予言益州承平時元夕宴遊其風流所親見盖出于祖宗德澤天地􅆂育之乆而今不可復得矣予愍然􅀻念之開慶景定間衡以中州不得免於難今城郭室廬公􅀻文物猶草創綿蕝云爾然以㡬世㡬年所爲郡而十數年間卒然脩復得其大體非國家忠厚積累於民力愛飬有素豈望如今所成立哉蜀自秦以來更千餘年無大兵革至于本朝侈繁鉅麗遂甲於天下不幸蕩析􅀂􅀑神之忌盈者今衡之民務本而勤力􅀊時一􅀚㳺之外衣食其耕桒儉而不㤗風氣淳厚猶南方建徳之國其將進而未巳者乎予爲親懐歸得郡且行侯選表於朝有日矣惟一時民物之槩得於目擊相與嗟嘆闊絶而欣喜不厭於心者不當無所紀且懼夫可愛可愕之状俯仰蹉跌忽不可以復追也燕之明日亟􅁬筆記之以庶㡬􅀚風之意且使後來者於侯政有考焉侯名遇今居延平雷州十賢堂記國朝自天禧乾興迄建炎紹興百五十年間君子小人消長之故凡三大節目於雷州無不與焉按雷志丞相冦公凖以司戸至丁謂以崖州司戸至紹聖後端明翰林學士蘇公軾正言任公伯􅀨以渡海至門下侍􅀰蘇公轍以散官至蘇門下正字秦公􅀚至樞宻王公巖􅅱雖未嘗至而追授别駕猶至也未㡬章惇亦至其後丞相李公綱丞相趙公􅂦叅政李公光樞宻院編脩官胡公銓皆由是之瓊之萬之儋之崖正邪一勝一􅀒世道以之爲軒輊雷視中州爲逺且小而世道之㑹乃於是􅀚焉我度皇之九年詔大府寺簿虞侯應龍知雷州侯雍公曽孫有文學凡登朝必與史事諸所衮􅃏得春秋大㫖植之風聲尚有典刑其至雷也考圖諜訪􅂄老顧瞻山川惄如有懐乃黜丁氏章氏自萊公以至澹菴凡十賢爲祠於西之上使海􅀖興起前聞一朝皂白知所以􅂆敬賢如師疾惡如􅄷侯所爲豈刀筆細故哉嗟乎雷何地也諸賢冠冕於此儼然而威自太守諸生以下敬恭登降制幣薦奠如先聖先師人有常言惟是風馬牛不相及也諸賢何以得此於南海南海何以得此於諸賢乎哉我祖宗待士大夫忠厚而有禮稽諸司敗嶺海則止此事上配帝王非漢唐所及雖施之姦回容有傷惠而賢者失路靡不􅀗全祈天永命萬有斯年噫嘻盛德事也祠經始于十年九月十月吉日落成侯謂予同舘走書數千里至贑属予記予不敏叙其凡復爲迎送神辭使祀則歌之辭曰飈風起􅀆雲黄萬里􅀆故郷桃茢􅀆祓不祥何懐乎斯宇􅀆惟獨有此衆芳海可竭􅀆神不可忘五嶽爲質􅀆三辰爲光保我有國􅀆萬年其昌雷州重建譙樓記凡並海而爲州皆有􅄓風而雷爲甚中州多山地氣固宻城郭公府苟非水火兵革之難雖累數千百年存焉可也南方􅀊有􅄓風㧞大木蜚大屋以爲常矧雷三靣際海當風之衝豈獨城樓難哉太史氏虞侯應龍來爲守是爲咸淳十年六月十有二日夜半􅄓風作厥明視譙壓而城壊方風之來也其暈如虹有蜃氣如樓䑓及其歘霍凌轢訇哮撞搪其聲不可名状侯曰斯樓郡以晝夜者非大且壮無以支永乆乃筏鉅材鳩工並興設爲巍峩下臨鯨波人聞而撫然曰天下猶海也世變猶風也昔人有言大厦非一木可支又曰震風凌􅀨而後知厦屋之帡幪也侯所建立有安天下之道焉侯之爲雷也寛而有制嚴不爲􅁀始至蒐軍明律戮澤中爲龍蛇者獄有三年淹破其貨内者覈丁籍實民賦老壮以時富貧有經又爲之表賢哲興學校開其倫常示人有耻陶爲清淳訟是用希凡此皆侯所爲反風徙鱷之本也天子聖神文武克有天命祝融受職海若順令侯爲政知所本价人維藩式是南􅀖城樓云乎哉序孫容菴甲藁序容菴孫先生早以文學自􅀒授徒里中門下受業者常數十晚與世不偶發其情性於詩今其家集甲乙丙彚爲三帙當先生無恙時乙官湖王公介爲序丙今念齋陳公彬筆也獨甲篇首無所属太史公將以自序云爾不幸未就賫志以殁後二十二年先生之子演之孫應角出其本命予序以􅀘其遺先生之爲詩縱横變化千態萬状前二公模冩極矣後生小子於前軰畦徑不能窺也獨嘗徃來容菴知先生所以爲詩者今夫山一卷石之多及其廣大草木生之禽獸居之寳藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉天下之竒􅀚莫具於山水山水非有情者莫之爲而爲何哉傳曰山藪蔵疾江海納汙則其所容者衆也先生之菴介於闤闠敞二尋髙爲楹不踰丈求其領畧江山􅀵拾風月則亦無有乎爾然先生讀書白首不輟皇王帝覇之迹聖經賢傳之遺下至百家九流閭閻委巷人情物理纎悉委曲先生旁捜逺紹盖朝斯夕斯焉是百世之上六合之外無能出於尋丈之間也以一室容一身以一心容萬象所爲容如此此詩之所以爲詩也先生名光庭字懋居廬陵富川以詩書世家今其子惟終放情哦諷爲詩門再世眷属其孫􅅷於文學方翹翹自厲發矢於持滿流波於旣溢以卒先生爲詩之志詩之道其昌矣乎予里人也知先生爲詩之故與其所以積累􅁇述因發之以􅀘二序之未及云危恕齋論序近世有驪塘巽齋二危論行於世予讀其文庶㡬前軰之彷彿者矣吾州恕齋危先生其所爲論積成帙學者争傳爲矜式先生學爲桒梓之宗行爲章甫逢掖之望放而爲文所謂仁義之人其言藹如臨川廬陵之危是或一道也抑二危以此决科發身而先生不偶於􅂣屋以死則所遇之足悲也雖然遇不遇無足計也于其人而巳然則學恕齋爲文尚從其人求之金匱歌序金匱歌者郷前軰王君良叔之秘醫方也􅀄良叔以儒者渉獵醫書不欲以一家名一日遇病數十軰同一證醫者曰此證隂也其用某藥無疑數人者駢死醫者猶不變良叔曰是證其必他有以合少更之遂服陽證藥自是皆更生焉良叔􅁈前者之死也遂發念取諸醫書研精探索如其爲學然乆之無不通貫辨證察脉造神入妙如庖丁解牛傴僂承蜩因自撰爲方劑括爲歌詩草􅁓蠅字連帙累牘以遺其後人曰吾平生精神盡在此矣其子季浩以是爲名醫其子庭舉蚤刻志文學中年始取其所蔵讀之今醫遂多竒中一日出是編予然後知庭舉父子之有名於人其源委盖有所自來矣天下豈有無本之學哉世道不淑清淳之時少乖戾之時多人有形氣之􅀻不能免於疾世無和扁􅀉命於甞試之醫斯人無􅇳同於巖墻桎梏之歸者何可勝數齊高彊曰三折肱知爲良醫楚辭曰九折臂而成醫言屢甞而後知也曲禮曰醫不三世不服其藥言甞之乆而後可信也人命非細事言醫者􅁼致謹如此然則良叔齊楚人所云醫也􅀂庭舉承三世之澤其得不謂之善醫矣乎予因謂庭舉曰凡物之精造物者秘之幸而得之者不敢輕然其乆未有不發周公金縢之匱兄弟之秘情也至成王時而發藝祖金匱之誓母子之秘言也至大宗時而發君所謂金匱歌者雖一家小道然祖宗之蔵本以爲家傳世守之寳其爲秘一也子之發之也以其時考之則可矣庭舉曰大哉斯言予祖之澤百世可以及人予爲子孫不能彰悼先志恐乆遂沈泯上貽先人羞敢不承教以廣之於人予嘉庭舉之用心因爲序其本末如此良叔諱朝弼季浩諱淵庭舉名槐云張宗甫木雞集序三百五篇優柔而篤厚選出焉故極其平易而極不易學予嘗讀詩以選求之如曰駕言陟崔嵬我馬何虺隤我姑酌金罍維以不永懐如曰自子之東方我首如飛蓬豈無膏與沭爲誰作春容詩非選也而詩未嘗不選以此見選實出於詩特從魏而下多作五言耳故嘗謂學選而以選爲法則選爲吾祖宗以詩求選則吾視選爲兄弟之國予言之而莫予信也一日吉水張彊宗甫以木雞集示予何其酷似選也從宗甫道予素宗甫欣然便有平視曹劉沈謝意思三百五篇家有其書子歸而求之所謂吾道東矣趙維城洗􅁈録序漢法殺人者死我國家式敬由獄􅀹於人命重致意焉情法輕重相去一毛轉移蔽欺其謬千里吾儒坐論書史志其大者固自以司空城旦之書柱後惠文之學爲不必講不必講可也而一日臨事懵然受成其爲誤不少愛人利物之心謂之何哉近世宋氏洗􅁈録於檢覆爲甚備宋氏多所􅆒歷盖􅂂之而後知吾􅀖趙君與揲甫階一命而能有志乎民反覆駁難推䆒其極於宋氏有羽翼之功矣使君自此有中外之迹日增月益豈曰小􅀘之哉書曰獄貨非寳惟府􅇳功又曰無或􅀻家于獄之兩辭祥刑之本也讀趙君此編而於書再三焉雖不中不逺矣龔知縣帥正録序訟九五曰尚中正下四爻竟至於不訟子曰子帥以正孰敢不正惟上九一爻犯終㐫至􅃬帶三禠豈帥之者之罪哉居卦之終爲險徤之極兾其矯操非百倍其力有所不能兹易所以爲憂患之書也龔君子輝宰吾廬陵其聽訟必据經守法不肯少委折以貮民聽凡斷筆備書之冊踰年㡬三帙名曰帥正録大哉君之用心乎廬陵訟最繁自君視事日以銷殺從所帥也然猶不免於有録而録不免於再且三風俗所積其􅅝也乆矣夫豈一朝一夕之故縣古諸侯也使君􅀻其土子其人教化之入人也深則是録可以無作今之縣三年一替君之所試曾㡬何時讀是録也庶㡬期月而可者矣子路問政子曰先之勞之請益曰無倦君而以無倦行之是録也固筌蹄之粗也歟君名曰升豫章人蕭燾夫采􅀂集序選詩以十九首爲正體晋宋間詩雖通曰選而藻麗之習盖日以新陸士衡集有擬十九首是晋人巳以十九首爲不可及十九首竟不知何人作也後江文通作三十首詩擬晋宋諸公則十九首邈乎其愈逺矣予友雲屋蕭君燾夫五年前善作李長吉體後又學陶自從予㳺又學選今則駸駸顔謝間風致惟十九首悠逺慷􅁣一唱三嘆而有遺音更數年雲屋進又未可量也十九首上有風雅頌四詩俟予山居旣成俯仰温故又將與君細評之羅主簿一鶚詩序詩所以發性情之和也性情未發詩爲無聲性情旣發詩爲有聲閟於無聲詩之精宣於有聲詩之迹前之二謝後之一蘇其詩􅉞偉卓犖今世所膾炙然此句之韻之者耳夣草池塘精神相付属對床風雨意思相怡愉傳曰立見其叅於前在輿見其􅀝於衡謝有焉樂則生生則惡可巳蘇有焉東溪君嗜詩叔曰北谷而雲谷又其弟鶴鳴子和塤龡箎應天和流動雍于一堂所謂無聲之詩也噫謝之樂不能兼蘇蘇之樂不能兼謝東溪君合蘇謝而一之其樂庸有旣乎􅀂夫君所以句之韻之者予非能詩又焉能評其歸問之二谷新淦曽季輔杜詩句外序杜詩舊本病於篇章之雜出諸家註釋人爲異同淦北山子曽季輔平生嗜好於少陵最篤編其詩倣文選體􅁔行律絶各爲一門而紛紛註釋自以意爲去取意之所合列於本文下方如東萊詩記例而緫目之曰少陵句外予受而讀其凡盖甚愛之旣録其副則復􅁣然曰世人爲書務出新說以不蹈襲爲髙然天下之能言衆矣出乎千載之上生乎百世之下至理則止矣虚其心以􅀚天下之善凡爲吾用皆吾物也是意也東萊意也而北山子得之􅀚舞劍而悟字法因解牛而知飬生予也受教於北山子矣忠孝提綱序江流滔滔日夜無聲水之常也至於有觸之鳴風激之爲波則水之所遭拂乎常矣爲臣忠爲子孝出於夫人之内心有不待學而知勉而行者古之人都俞吁咈定省温清行乎忠孝之實而不必以名知於人此人道之自然也􅀂夫䖏時之變遭事之不幸始有不得巳而忠孝之名歸焉則亦有可憫者矣帚齋郭君某有感於忠孝之事旣取古人之大節昈分而爲之書又裒皇朝事爲後卷君之用心所謂先立其大者吾讀其書盖世變存焉非徒纂集之末而巳抑有􅂅與君講者率土之濵莫非王臣守孰爲大守身爲大士君子之於天下固不必食君之祿而後爲忠親存而後爲孝也語曰仁以爲巳任死而後巳義理之責庸有旣乎君更以是推廣其説使人人知忠孝之爲切巳事常也由其道變也不失其節則於世教豈曰小􅀘之哉八韻􅀜鍵序八韻􅀜鍵者義山朱君時叟所編賦則也魏晋以來詩猶近於三百五篇至唐法始精晚唐之後條貫愈宻而詩愈漓矣賦亦六藝中之一􅀚雅頌大約可考騷辨作而體巳變風氣愈降賦亦愈下由今視乾淳以爲古由乾淳視金在鎔有物混成等作又爲古矧長楊子虚而上胡可復見然國家以文取人亦随時爲髙下雖有甚竒傑之資有不得不俛首於此􅀂朱君立例嚴用功深盖亦深逹於時宜者朱君執此以徃一日取先􅂣屋然後舎而棄之肆力於爲文其於古也孰禦雖然又豈爲文哉壬戌童科小録序景定壬戌童子十人挑誦國子監既中試中書如􅀄考吾里王元吉爲首該恩許兩試太常以次九人一試童子歸而課業當爲來科新進士否則再試能又中即待年出官矣噫其亦咄嗟乎哉山林之士白首佔畢有終身不得名薦書齒下士於朝者童子未離㓜學巳得以所長頡頏當時雖其得於天者不凡而貴之也人無異辭然世之厄於命者何限􅀂此獨不以自幸哉童子􅀊月方來而未艾也天下事有大於科目之學者矣則將何如韓子送張童子序曰暫息乎其所巳學者而勤乎其所未學者予謂童子其所巳學者經也經載道書也童子向記其言語而巳而沉潜義理變化氣質藴之爲德行行之爲事業未之及也童子而能自其所巳學者温習紬繹深加􅂂踐希賢希聖求之有餘師而其所未學者徐徐而勤之不爲後也大學之法禁於未發之謂豫當其可之謂時童子有之予也有志乎兢辰者日斯邁而月斯征愧悔多矣敢無以相童子童子倘有利於予言矣乎題家保状序吾郷孫㓜賔善與人周旋受人託必忠吾黨之士多與爲知識三􅀊大比其欲結保就試者率以状轉授俾上之有司㓜賔無所愛力每科輙結至數百保榜掲之日籍中多得人由是中禮部者常有之從事數科今又將詔􅀊人争以㓜賔爲有驗雖㓜賔亦不能自巳一日持其籍以告予曰君疇昔籍中人也其爲我序之予不能辭焉按周禮大司徒以郷三物教萬民而賔興之此郷舉里選之風也考諸族師則五家十家五人十人又使相保相愛刑罰慶賞相及相共凡保必有連坐古以德行取人於此猶有取爾周官之法度與􅀜雎麟趾之意固不相悖也進士始於隋唐本朝沿襲不改日引月長弊悻浸出上之所以􅀜防禁治者務盡其術􅀂家保状其一也科目與郷舉里選自不同然其所以立法之意殆相似然吾州士風接歐周胡楊之遺知所自愛其麗於族師之禁固鮮矣㓜賔作事必􅂂實其所受託亦不輕所任刑罰之相及相共者吾又固爲㓜賔一保吉爲州鉅應試二萬餘然他日得之率是知名之翹翹者㓜賔自此網羅無遺使千佛之名盡萃於一籍則㓜賔繼今皆慶賞之日也吾爲子賀不旣多乎㓜賔曰嗜欲將至有開必先君言且驗矣吾籍屢驗不一驗將徼福於君請執此以徃又家保状序吾嘗􅀚李肇記唐科舉事都會謂之舉􅂣通稱謂之秀才投刺謂之郷貢俱捷謂之同年有司謂之座主籍而入選謂之春闈將試相保謂之合保旣捷列姓名於慈恩寺塔謂之題名大宴於曲江亭謂之曲江㑹進士之爲貴於天下其來尚矣某吉水人肯爲吾黨裒梓家保状使不煩自投於官殆好事者介予所知識以其籍求序予前一夕夣有持一卷來曰桂籍得此夣􅀂驗焉者是籍之人由秀才試舉􅂣出郷貢試春闈拜座主叙同年赴題名所入曲江㑹􅀅必自此合保始雖然使君籍而止得科目人也吾何􅀚焉天下事盖有大於此者矣仁山蒼蒼文水泱泱歐周胡楊休有耿光獨無追遺芳而昌之者歟吾之望君籍也如此新淦曽叔仁義約籍序名公􅉮財利在天地間爲義理之賊三代以下選舉不以德行則士雖爲聖賢猶􅀅從科目以進舉于郷里固得時行道之發􅮾也然士方窮時驟得一舉属有千里之役無所取資不得巳侻首屈意以爲此之求是不待仕固巳賊其心矣此義約之所以不可廢也予至新淦親黨曾君叔仁出其所謂青雲約魁星約者其爲約視他郡特有寓公􅂇送之例可以􅀚是􅀖之風矣吾黨之士凡與斯籍名薦書走在所居者無深責行者無復顧昌其氣以從事於文蹇蹇諤諤進奉天子之對由此培植爲他日賢公卿大夫殆此籍有􅂇焉然則區區周急義之末者耳其於人才有􅀜係則於後之世道不爲無益其爲義不亦大哉送􅂭興鄒道士序新吴昭德􅀚或傳西晋劉仙人飛昇之地其􅀚前井猶仙人時丹井也今鄒髙士居其􅀚亦以煉丹名或曰髙士仙人之徒與予詰其所以爲丹則髙士之丹非仙人之丹也仙人之所謂丹求飛昇也髙士之所謂求丹伐病也仙人之心狹於成巳髙士之心溥於濟人且夫兼人巳爲一致合體用爲一原吾儒所以爲吾儒也重巳而遺人知體而忘用異端之所以爲異端也髙士非學吾儒者而能以濟人爲心噫髙士不賢於仙人歟送彭叔英序彭叔英以秀才精􅄤度推予命謂剛星居多意􅀂他日可爲國家當一靣者巽齋歐陽先生以三命折之具爲之説與叔英辨予命叔英旣錯下一筭又累先生齒頰顧區區何足以當之抑叔英所以許予謂主命得火行限得金孛羅計故至於有主殺伐等語雖然此以論項籍􅀜羽敖曹擒虎之流則可而世固有不必如此而爲名將帥者矣非叔英之所知也予獨以爲隂陽大化絪緼磅礴人得之以生其爲性不出乎剛柔而變化氣質則在學力如叔英之説某星主剛某星主柔得剛者必不能柔得柔者必不能剛則是學力全無所施而一切聽於天命聖賢論性等書俱可廢巳予性或謂稍剛殆柳子所謂竒偏者凛焉朝夕惟克治矯揉懼䧟於惡敢以命爲一定不易之歸乎叔英憮然曰予言命君言性命之矣抑予所以爲君言者自謂不誣士固各有志子之志􅂅聞所向請轉與巽齋直之昔諸􅁑孔明與石廣元徐元直孟公威遊學荆州嘗曰卿三人仕進可至郡守刺史三人問其所志孔明􅀏而不言予非孔明也予之志豈叔英得窺哉送王山立序官湖王先生以文章名家其子山立無忝於弓冶之業蚤携琴書相從諸公筆硯間旣而曰士不爲司馬子長逰不足以爲學於是上下四方者㡬年于行今逰且倦矣湖海之風波浸惡山林之􅀊月漸長歛其如川方至之鋭以就于霜䧏水涸之實山立􅀅從事乎此昔孫㤗山爲飬索遊范文正公給以月俸三千遂得留意於學卒爲一世師表誠齋素貧得劉氏舘以故旁捜逺紹及讀世間未見之書南渡以來稱儒宗焉二先生之事夫人而可爲也㑹有拈出故事以嘉惠山立者其静以待之與山人􅀺端吉序與癡兒説夣終日悶悶使人欲索枕僵卧明者了了不踰頃刻能解人數百年中事恨相見晚矣山人􅀺端吉客吾門旬日風􅀨旦稍霽入吾山一瞬而還􅀂有德色問之則山川巨細情状變態信手圗􅀞如山中生長然者何其敏也􅀺氏祖爲吾郷羅氏葬地百年效驗翁不見端吉食其報又能以術世其家翁信未死哉端吉遺予地予方撰屨出郊而端吉又泝十八灘上矣臨别敘其說其歸也爲予復來乎贈林梅所序何所無花屈擅蘭陶擅菊林擅梅乃􅀂有定所然古者以功爲地之封建後世以文爲花之封建屈之騷陶之辭林之詩皆有功於花是故花托於斯文而後得其所焉噫九畹三徑今無復存林之孫羲獨能世襲孤山與花周旋所謂居其所而不遷者君充拓門庭於詩道益進豈惟克有其土地抑亦光昭其先君之功懋哉懋哉送項巽可入南序東坡作韓文公廟碑詩云作書詆佛譏君王要􅀚南海窺衡湘坡在南方亦云兹逰最竒絶又云兹逰竒絶冠平生當文公諌佛骨豈故欲爲掲陽之行坡不幸罹黨禍乃以炎方爲夸自古詩人大言而非情徃徃如此吾郷項兄巽可與􅁠之度嶺也訪予於玉虹予問子非不得巳是行何爲則曰巽可生也有四方之志弱冠時甞一至番禺巳而走上饒參疊山拜東岡古爲然後經潯陽出赤壁登黄鶴樓今也又將徃見東岡吾所學子長逰也他時入南者以風土爲憚與􅁠年未三十神澤而氣強擔簦行數千里如適其東家是其要􅀚南海而從竒絶之逰者非詩人大言􅁼也子長南逰江淮上㑹稽闚九疑浮于沅湘北渉汶泗講學齊魯過梁楚以歸而平生車轍獨未至廣與􅁠今㳺子長之所未㳺從而徧歷吴楚按子長東南故跡登淮山以望中原以庶㡬盡見天下之竒子長作史記序三千年事爲五十萬言漢至今又千有餘年不知與􅁠後之所書其詳畧如何書成以諗我送頼伯玉入贑序頼君成孫伯玉號竹澗五雲人自幼巳好詩長而浸癖有甲乙藁行於人戊午出宜春道中得詩三十歸而裒以附於乙自是以行爲趣一日以書抵予曰某也􅀅泝十八灘踐空同非子寵兹行彼之山靈水神未易屈䧏頼君之行殆不苟然贑之勝䖏如欝孤如八境如㢘泉如塵外寺則如慈雲天竺在唐有香山品題至今墨蹟如新入本朝東坡山谷之流交有以發其竒而長其光價而東坡蹤跡之宻精神之著又其􅀹者也頼君觸目爲思開口成句而騷人墨客之遺又有以動其亹亹焉者虚而徃實而歸此行粹宜春章貢之得其自足以成丙藁可知也君之兹役予何能賛一辭抑予有請焉君方盛年於詩之道其所造巳非他人以一句一字名世者比以君之資其當他有所進乎司馬子長足迹㡬徧天下後來竟能成就史記一部或議子長所用小於所得少陵號詩史或曰讀書破萬卷止用資得下筆如有神耳頗致不滿韓昌􅀺因爲文章浸有見於道德之説前軰譏其倒學然猶不爲徒文卒得以自附於知道横渠早年縱􅀚四方上書行都超然有凌厲六合之意范文正因􅂆讀中庸遂與二程講學異時德成道尊卓然爲一世師表其視韓公所爲盖益深逺矣今君挑包􅀒笈􅀅四方上下以求爲詩予也不止望其爲前所稱騷人墨客者因誦言諸公之失得如此君且行矣歸而求之有餘師送李秀實序三月二日予有行役宿郊外次日昧爽有來謁者視之李君秀實也李君􅀄不之識一見察其爲能言士坐定出詩三首其自序末句曰他事無求求者道莫教徒手只空轅今人有好爲尊大以道統属巳自任終日暝目夜半授佞巳者二三言曰道在是矣􅀮君授書孺子取􅂂昔人以爲近於􅀑物徃徃􅁼是李君之求其諸此之求歟李君曰予知不及此予丈夫也桒弧蓬矢之志􅀅於子長逰發之噫嘻子長盡天下之觀一部史記取資於此先民有言杜子美讀書萬卷止用資得下筆有神耳予固爲子長惜也横渠先生早年英邁之氣􅁬不可禦上書行都縱觀四方後乃精思力踐以其學接孔孟之緒朱文公賛之曰早恱孫吴晚迯佛老勇徹臯比一變至道懿哉淵乎李君所欲求者道也則子長之終身不足師法横渠何可當也顔何人哉晞之則是於李君之别也書此以贈送彭和父逰學序彭江西三瑞之一和父其孫也家傳詩書半世以教人爲業以兩􅀊無所於舘􅀅遊學以問於四方命予曰可行乎今夫大冠峩如大裙䄡如談道理非不纚纚可聴一旦有飲食之累則棄三尺蕩四維茍可以求無飢者無所不至和父雖失舘夷然無慼容所爲皇皇問舘之外無他筭此之謂不失其本心悠悠穹壤獨無知心者歟贈談命朱斗南序天下命書多矣五星勿論􅀂三命之􅀃予大槩病其泛而可以意推出入禍福特未可知也惟太乙統紀鈎索深逺以論世之貴人鮮有不合然閭閻賤㣲有時而適相似者倉卒不可辨予嘗謂安得一書爲之旁證以窺見造化之庶㡬哉最後得朱斗南出白顧山人秘傳書一卷以十干十二支五行二十七字旁施午竪錯綜交互之中論其屈伸刑衝六害察其變動生旺官印空而爲衰敗死絶衰敗死絶破而爲生旺官印禄馬不害爲貧賤孤刼未甞不富貴盈虚消息􅀚其所歸和平者爲福反是爲禍其言親切而有證予切愛之獨其所著之文可以意得不可以辭解乃循其本文變其􅃇讀槩之以其凢表之以其例其不可臆見者闕疑焉統紀十干干各一詩其辭雖􅀂專指一干而云而十干取用無不相通故詩雖以百數其大指數十而巳亦復如白顧之例别爲之篇以附見其後使二書貫穿於一人之手彼此以􅀘其所不及年月日時雖相去一字之差而於銖兩輕重爲不可誣矣斗南吉水人㧞起田間談命皆自得之玅予謂􅀄事統紀失之者十之二三也繼得白顧書失之者百之二三也予􅀚斗南用二書竒中所不在論偶然而不中則反求之吾書書未甞失顧用書者或未盡耳予又恨白顧書有闕疑也天命之至矣出於人之所俄度者不可一言而盡也吾所見斗南論命就其一家真白眉哉是爲序又贈朱斗南序甲巳之年生月丙寅甲巳之日生時甲子以六十位􅁼推之其數極於七百二十而盡以七百二十之年月加七百二十之日時則命之四柱其數極於五十一萬八千四百而無以復加矣考天下盛時凡州主客戸有至千四五百萬或千七八百萬而荒服之外不與焉天地之間生人之數殆未可量也生人之數如此而其所得四柱者皆不能越於五十一萬八千四百之外今人閭巷間固有四柱皆同而禍福全不相似者以耳目所接推之常有一二則耳目之所不接者安知其非千非百而命亦難乎斷矣且夫五十一萬八千四百之數散在百二十期中人生姑以百􅀊爲率是百􅀊内生人其所受命止當六分之四有竒則命愈加少而其難斷亦可知矣甞試思之宇宙民物之衆謂一日止於生十二人豈不厚誣而星辰之向背日月之逺近東西南北天地之氣所受各有淺深則命之布於十二時者不害其同而吉㐫夀夭變化交錯正自不等譬之生物松一􅁼也竹一本也或千焉或萬焉同時而受氣也然其後榮者枯者長者短者曲者直者􅀍斧斤者歷落而傲年􅀊者其所遭遇了然不侔夫命之同有矣而其所到豈必盡同哉然則叅天地之運􅀜盛衰之數此其間氣或数百年或百年或數十年而後一大發􅂥必非常人所得與者於五十餘萬造化之中不知㡬何可以當此而天地寳之不常出􅀑神秘之不使世人可測知也嗚呼論至此則命書可廢也􅁘因書于歐陽先生贈月窗說後贈曹子政劍客序江西劍客吾郷曹子政筭命標榜也予曰子卜也而取劍何居曰世人賣卜事謟媚􅂢苦口皇皇於一食之末予恨其道之不直也如是而福如是而禍一無所回護故予剛者之爲也予言必剛者而後能聽劍是以得名予曰噫嘻昔人有學字􅀚公孫大娘舞劍而神劍無與於字而廻朔赴仆之間乃足以相發今子雖爲卜而有取於劍之剛者亦詎曰不宜哉或曰然則是腹劍也予曰惡是何言子政豈口如􅁡者邪或人語塞因書以遺之贈山人黄煥甫序黄景文煥甫乃祖贑風水名術也予里大家祖地多出其手而煥甫以術世其家前十三四年予甞以詩送之又數年􅁴煥甫小異亟取詩更其辭而實未深知煥甫也煥甫逰從日以宻講辨日以多今也而後探其胸中之所存果有大異乎時人者噫知煥甫晚矣煥甫甞與予上下阡隴凡予動心駭目以爲竒詭雄特輙掉頭不謂然至淡然平夷澷不起人意徃徃稱不容口予始甚訝之乆而服其爲名言也大槩煥甫之術以爲崇岡復嶺則傷於急平原曠野則病於散􅀚其變化審其融結意則取其静􅀔則取其和地在是矣舎是而求地亦固有之而非煥甫之所謂地也山人之獻地者日至吾門予使煥甫徃􅀚常不滿一􅀏煥甫曠數年始獻一地所獻真如其説予爲山人所欺者多矣􅀂煥甫真不欺我者惜也煥甫汲汲餬口以奔走於四方以予之近且乆㡬不相知卒然使人一見使人愛其術而不疑斯亦難矣予甞謂能爲煥甫百指計使煥甫安居一年必能時發天地之蔵以使予欣然而不厭予方煑石山中計必不能及此姑遂其説庶㡬有因予而信煥甫煥甫必能出所學以報所知是楚人亡弓楚人得之予又何幸焉贈黄璘翠㣲序黄璘吾鄰人得祖父風水之學間與之登山鋪張造化口角瀾翻亦可愛吾舘人議以翠㣲名之翠㣲山之腰蒼蒼欝欝之􅁚山人所得稱抑㣲乎㣲者地理書所謂􅀮􅀮􅂭􅂭吉在其中此則麤心者所不能得其彷彿黄生齒新而意鋭更下入細工夫以庶㡬吾所謂㣲者贈仰顛峯拆字序顛峯仰宗臣以拆字之術行京師諸公贈言陳徃驗甚悉予未即信試之且數年每言輙酬竒矣哉予問顛峯曰禍福將至必先知之吾聖人則有教矣就字而言字心畫也得於心應於手夫固動乎四體之一也由此而推資禀之強弱操術之正邪生死夀夭貧賤富貴之理於其字畫之大體而夫人之平生可一言而盡是則予固能知之今夫卒然而遇人曰請所欲書夫人者亦倘然應之曽不經意而子於其偏旁上下之間紬繹解說曰某宜禍某宜福則其臨書之際豈亦有􅀑神壓乎其上誘其中而運之肘歟不然字而字耳何靈之有顛峯曰未也天下禍福之占于其動而巳木之榮枯康節不能索之於其静一葉之墜筭法生焉世人見墜葉多矣誰知大化􅀉此􅆌末子之􅀚字也于其心予之􅀚字也于其心之動是法也得之異人異人誡勿言君退思之予推其理不可得而又動於顛峯之異則思夫聖人之於事其存而弗論者不少矣相視一􅀏就用其言贈焉送僧了敬序萬安僧了敬丙辰年來謁示予以夫子像予􅀄怪之與之語彷彿儒者氣􅁚閱諸公賞音則知其能爲詩能讀先儒語録又能築讀書堂以與邑之逢掖者䖏而後嘉其來意之有以也越五年予至其宫求其所謂讀書堂者􅀚之則方裒緡歛材召審曲靣􅀔者而啇度焉因知諸公所以亟稱之者書其志也敬師之竟就是役者志之不忘也自佛入中國其徒牢護其説遂與儒者之教並立於天下太顛止於海上韓公屈與之交當時覊窮寂寞之餘以其聦明識道理姑與之委曲於人情世故之内其於變化其氣質移易其心志攘除其師之教未必有焉以今敬觀之則其崛起於浮屠之中而􅀂有得於聖賢君子之説而凡精業勤行以學韓之學者又與之周旋一室以上下於其間其爲聦明識道理也多矣陳良楚産也恱周公仲尼之道北學於中國孟子推爲豪傑然則敬師非僧之豪傑也歟吉水縣永昌郷義役序吉水縣永昌郷某都建義役復淳熈成䂓也予同升陳君某旣爲序則貽書於予曰􅂅賛一言使郷黨鄰里有所慿依且庶㡬徼福於君之筆俾勿壊予懼不敢當以其爲義設不得辭嗚呼義役之不行而差役之紛紛何甚也民無以相友􅂇相扶持乙曰甲當役甲推之乙乙復曰甲展轉而聽命於長民者之一語時則其􅁠在於官官無以自爲也鴈䳱行鉗􅁓尾而進曰某宜差某有以􅀻其人則改曰宜某時則其權在於吏一方之版籍吏胥主之髙下其手紊於多寡之實時則其權在於郷胥閭閻之間紛争之㣲桀􅃛者乗間而起告訐因之而差法以亂時則其權在於姦民受役者有二三年迄無一事有不幸而殺傷盗賊䴡於其境不旋踵家破時則其􅁠在於天今陳君與其鄉約曰爾役月日􅀂干爾末减􅀂干爾費􅀂干至􅀂干以上􅂇􅀂干一齊惟公是㨿䖏之者無媿辞承之者無拒色是役之􅁠不在官與吏與鄉胥與奸民與適至之天而在吾鄉里和氣間義之用大矣利乆逺而無訟仁也使人知有遜譲禮也不以資奸智也盟而無敢後先信也一舉而五常備焉豈惟義哉鄉之長上其申告子弟曰如是而福如是而禍守約者乆處敗群者交罰使一守是法永永無斁則其於是􅀖之風俗不為無小􅂇噫亦安能下其法於天下哉燕氏族譜序嘗謂人之有祖也如水之有源木之有本也夫源之深者流必長本之固者末必茂此自然之理巳然之騐也燕氏榮㤗來自龍潭循州好山水之勝通隂陽之理歴吉之東鄕大北溪見其江山秀䴡地􅀔盤旋於是遂徙居之榮㤗生男貴玉勤而力斈未遂厥志而早卒孫長曰祐字天益號爱月領職都差次曰祺字天祥號瑞軒領職通判淂其禄淂其名㢘公可畏治政有方年逾耳順乞歸骸骨故􅃙誥以還鄕積善成徳冝永享其悠乆也益生男宗羙清白傳家謙恭處巳以金石締交盟以詩書立門戸善継人之志善述人之事㔙業守成實有光於前聞人矣羙生三子長曰希禹次曰希仁三曰希舜兄弟俱有文名以仁睦族以礼待人􅀂河東之三鳯謝氏之彦秀者也自是子孫蕃衍食指浩繁常於餘睱之際從容啇略故有陸賈之分長禹受永昌鄉渀灘居焉次仁受永昌鄉青峒居焉三舜受祖基家焉禹生國賢國賢三子曰徳祥徳勝徳卿徳祥領職司舉徳勝領職司户徳卿領職司理徳祥之子曰均治徒㤗和城南徳勝之孫曰子實徙廬陵華羙坊徳卿之孫曰子昇徙永豊桃源雖星羅棋布是皆同一源也恐後世乆逺真偽不辯故命予修諸譜系載諸詳悉以見先公一人而來迄今有年矣雖族属䟽逺長幼尊卑按此譜歴歴殆可見矣􅀂夫水源木本培植深固支流柯葉蕃衍盛大亦在乎基之於前而有􅂋諸後矣為賢子孫者可不鍳哉龍泉縣監漕鄕舉題名引恭惟祖宗以取士為國三歳大比所謂從数路得人古遂江吾廬陵佳山水邑也廬陵諸老發身六一公澹庵以學舎益公誠齊以鄕舉獻簡公以漕貢而獻簡生遂江文獻風流又其最近且親者山川毓靈人物代興高山作止景行行止是為題名引文山先生全集卷之九
