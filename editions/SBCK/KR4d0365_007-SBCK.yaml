  text: 文山先生全集卷之七文集
  hash: sha256:8e817a9267013214d2dbde946596fc4b10170ca7ad80264845f8c58ad9884d53
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_007-1a}
body:
  text: 啓上權郡陳通判卨謝觧是􅀖大夫賢者聿新道藝之賓興吾黨小子斐然得遇功名之主宰僧彌出法䕶之右越石居楚金之先人羡二難巳叢百媿竊惟奎開我宋箕壽斯文堯叟以壮歳拏魁堯咨爲之接武子由以弱冠登第子瞻至於聮芳孫何齊孫僅之名宋祈遜宋郊之榜韓家閥閱呉氏簮纓皆一時兄弟之傑然乃我朝科目之盛者甲於江右未􅀂廬陵名耀帖金以一門而五董笔香氊墨不十歳而七劉或踵接於童科或肩摩於胄監輝煌簡冊雜遝衣冠至今文水仁山猶想流風遺俗雖巫歩亦期似禹然賜賢何敢望回如某者技等飛鼯才長縮蚓故家喬木借秭歸舊峽之隂宦録雲萍分白鷺餘波之􅃳勘皇祐牓帖乆寒石室青氊閱癸丑状頭曽入本心墨譜恐􅀒前人之􅃓冶勉爲今日之箕裘有嚴君焉唾棄萬年之謟味難爲弟者誓齊兩到之英聲故唯諾怡愉之間皆切磋􅅣磨之地晨窓花露滴乾硯眼之鴝夜帳木油剔盡按頭之蠧以孝弟忠信爲實地以功名富貴爲飄風非六六餘子之儔有飄飄凌雲之氣自染指時文之鼎卽梯身季考之階愈出愈竒頗􅀋黄絹外孫之虀臼屢選屢中幾成翰林學士之葫蘆遂令伯氏吹塤仲氏吹箎過辱庖人􅁇肉廪人􅁇粟方嗟雌伏未遂雄飛適槐粟之揉黃偕棣華而拈采擲畨骰子同拏喝六之籌彎起􅃓弦共上中紅之垜天開􅀟眼地放一頭渇睡漢平白觧嘲揶揄􅀑分明束首二旬賜第皆以沈内翰相期十八奏名僉謂劉學士可􅁇使小子自此升矣皆先生進而教之兹盖恭遇某官秀孕天台英蜚帝學萬乗噐可檠唐柱五色線要􅀘舜裳噐古罍於盆盎之中韻黄鍾於雜優之地一從分刺名雖沂郡之王祥兩屈䕶麾實則頴川之黄覇斯民廣厦吾道泰山螺川醉多㫖之春風燕􅆍樂近民之暇日政安赤子觧弄挺之亂繩兵撫清人戢攘􅁫之横蘖雖借我二天之有幸恐尹京五日以趣還兹以題輿委之勸駕至􅀂豆箕之朽質亦該花帖之榮恩是宜拂楮雪以牋誠候屏星而布謝誓當鞭䇿不􅀒揄􅀭諒大賢何所不容知孺子尚或可教晉公得二俊才士不無汗赭於前脩古靈薦三十餘人尚冀牙緋於後進上倉守李愛梅謝觧執鞭而御於君風裁乆欽司隷推轂而輦其正天人幸遇翰林欲借方寸地吐氣而言敢操盈尺􅁓循廊而進切謂烏河陽方司鎭􅃏石生随就禮羅王豫章未下使車荀爽已騰辟剡盖人非卞和玉閟石竅而世無伯樂駒困鹽車必假先容乃梯後進切念某筞非魯客材僅荘林自垂髫逮二十年知肄業爲第一事家庭自爲庠序要祖廬江興學之風文字􅂴傍門墻惟凖石室立言之法遥睇故家之木勉爲良冶之􅃓子玉應而父金舂伯塤唱而仲箎和夜按剪燈帳幾成墨凍窓呵笔火不思爐每因染教於芹香屢􅀗聯輝於蕚集角能戰蟻占序榜􅀛朋社陽秋過許洛中之陸鄕評月旦謂非呉下之􅂪􅇮踏黄槐􅂓窺班管合三萬餘於圍􅁄争六十八之帖花如小子者車載斗量况有司之沙披石汰誰謂燭几駒窓之際遽􅂪黄鍾罍洗之褒風徤鴒披騰北海一􅀟之鶚雲横鴈翅摶􅃮園九萬之鵬必侍郎氊笔噓而送之則進士虎榜自此升矣兹盖恭遇某官百梅風格八桂雲仍羅􅇇門兵甲於胸中潄淮水淵源於笔下風檣陣馬不足爲勇長吉之文章景星鳯凰快覩争先王濬之名望早躋顯第徧歴要途甞膺北闕之詔綸出領西江之衣綉兒童猶誦君實野老皆識元城惟虎城舊治甞屈典麾故螺水重來又新持節􅂫疲民於恩露清奸吏於壼氷坐念鉛爲銛跖爲㢘安有書如絲官如眊燦連檣粧執樂舊句重賡繒閱庫粟埋梁新謡􅁇作兹屈皇華之使就延鳴鹿之賓某忝以釡箕玷兹玉笋敢不淬庖人之刃誓無荒陸氏之庒云云賀呉丞相革再登鉉路首冠鈞庭以進士爲名臣兩朝􅀝重以儒宗爲宰相四海具瞻天啓聖􅂨國有生氣某官洪􅀷而肅括光大而直方喬嶽㤗山㣲細悉歸於􅆂育青天白日奴隷皆知其清明頃天子以爲股肱舉海内望其風采霖􅀨未浹而収歛神功泰階未平而韜閟光耀共惜温公之歸洛猶期潞國之還朝􅅯逸藩維乆欝衮綉歸公之望均調鼎味復端鹽梅用汝之司公卿大夫交笏相慶兒童走卒舉手懽呼顧中外不謀同辭在今古未始多見斯人之望旣切賢者之責方新維今言路之不通最爲天下之大弊縉紳以開口爲諱事城􅊴以游談爲危機如人一家情睽離而衆侮起如人四體氣壅底而百病生多故之由一􅀋諸此枰更子改柁轉舟移惟從衆謀可以合天心惟廣忠益可以布公道盡觧群疑衆難之㑹克有榮名成功之休其惟我公望在今日某瞻依有素慕戀惟􅀷適造􅊴以戒嚴聞􅀭庭而増抃以書上光範先伸賀厦之􅀻於人見歐陽行展摳衣之敬其爲懇切罔旣敷宣謝吳丞相渙號􅀭庭方慶昭文之命􅂪恩詣闕適修進士之㳟喜當風雲際㑹之秋得囿天日照臨之下輙陳短淺爰叩高明伏念某才不逾人學未聞道雖家庭唯諾之教動欲行其本心然山林朴野之資知無􅀘於當世頃得備地官之貢遂及登天子之庭一第筞名旣有慚於􅀒乗三年讀禮㡬無意於驅馳宸命光華自天而下聖恩廣大如海斯􅆂遂令叅京兆之謀仍許奉團司之表靖循僥冒端出庇存載冊戒行將下天威之拜彈冠稱慶遽􅀓公衮之歸重惟柳氏之碑曽辱燕公之笔讀聖主偏親之語佩教方新仰先生長者之風銘恩莫報矧復更新於弦轍自今宻邇於鈞陶喜如其辭有莫能賛兹盖恭遇某官兩朝舊德一代􅊆人金鼎調元曽接沂公之轍玉龍擎重再持忠憲之鈞屬逢當軸之初與有得輿之慶某敢不勉攄素學圖報明時仰台宿之麗天旣近輝光之照占赤雲而赴幕尚依覆燾之仁先生之父革齋先生墓誌銘乃江古心撰􅂂齋題盖道體堂書謝丞相除秘書省正字日竊禄叢祠方重素餐之媿備員蓬舘遽叨黄􅁓之除由大鈞之無垠故小子之有造輒攄短淺庸瀆高􅀷伏念某大江以西一介之下㓜􅂪家庭之訓每欲行其本心長讀聖賢之書初何􅀘於當世從事一研起身諸生偶遭際於聖明􅀗僥逾於科第君恩天大􅀂爲報稱之圖流俗波頽常有激昻之志當前年之赴闕適強冦之臨江親見主憂之時不勝臣辱之義陳師江滸悵無一障以宣勞奏䟽公車倘冀九重之易聽奔命而歸田里舉目而盡干戈江逈川平非頼整頓乾坤之手糜沸雲擾幾無戴履天地之身骨肉幸全於山林頂踵皆歸於造化琳宫香火揆始分而巳逾石室詩書尋初心而未䆒敢圖菲采􅀗備茹連使當登崇俊良之時而秉校讐圖籍之笔賢人在内幸無正朋字之譏世運方平雅有讀秘書之睱顧兹甚寵非所宜􅂪有懐􅀒乗之慚無任循墻之懼使之得進退之正所以報知遇之隆兹盖恭遇某官勲在王家澤􅀍天下圭瓉秬鬯侈召伯之來宣衮衣綉裳大周公之歸相旣仗笞箠而定大難將興禮樂而開太平遂使乾清坤夷之餘轉爲小徃大來之㑹至如公選亦及凡材某敢不勉企前修恪持素節彦􅀶未至堂上巳先􅂪許國之知噐之旣入舘中當不辱温公之薦其爲懇悃冈旣敷陳謝皮樞宻龍榮領香火於祠宫幸書下考校丹鉛於冊府誤玷中除由泰階六符之光爲廣厦萬間之地輒裁牘記仰謝鈞慈切以登群玉山夙號麒麟之勝持三寸笔將刋魚豕之訛是爲朝露之清班必極人材之公選我聞在昔公惟其人晏殊之學問楊億之文章仲淹之聲名噐之之氣節茍非其􅀋不在此科伏念某學不知方仕未能信尋千年之蠧簡早慕伊顔得一第之鵜梁終慚􅄯董􅀷考國家之典每由舘閣之途知􅀒乗之懐慚恐顛隮之速咎故方筮仕巳卽丐祠尚口乃窮頗愛山􅀷而林宻觀頥自養徒羞月費以歳縻敢圖楓陛之䟽恩俾處蘭臺而正字正恐不免耳其何以堪之靖循僥冐之由端出陶成之辱兹盖伏遇某官清朝良弼名世大才爕賛化原大尊主庇民之道均調皇極普薦賢報國之心遂使䟽庸與叨㧞擢某敢不恪持素節勉企前修讀木天汗漫之書尚求指教陪丹地􅀷嚴之幄何幸身親懇悃罙􅀷敷宣罔旣謝何樞宻夣然范質傳衣曽侈和公之遇仲淹入舘復􅂪元獻之知使諸公而與同升豈門生而不知報輙伸下悃庸叩中樞伏念某石室􅀌寒青原落魄㓜􅀍家庭之訓頗欲得其本心長讀聖賢之書􅀄無􅀘於當世從事一研起身諸生偶持觚翰於南宫􅀗遇鑑衡於北􅆕鸞鳳􅂎梓舉集權公之門欵叚駑駘誤登伯樂之厩名姓雖塵於凾丈足迹未造於仞墻山斗之望彌乆而彌穹畎畝之蹤愈踈而愈隔閉門自守知尚口之乃窮遯世無求惟觀頥而自養凡竊禄奉祠之日皆省身念咎之時承明之廬著作之庭未甞意想寂寞之濵寛閑之野遽拜寵光胡爲乎來哉是有其故矣想木天之清峻望丹地以凌兢顧非麒麟鸑鷟之英其如亥豕魯魚之謬􅀷有慚於􅀒乗敢自巳於循墻兹盖㳟遇某官名世鉅公清朝良弼持樞賛化共調傳鼎之梅報國薦賢不種狄門之李遂令公選亦及凡材某敢不勉企前修恪持素節就中書而見座主将求一介之先容以進士而爲名臣尚頼終身之保任謝江樞宻萬里領祠宫之香火敢望彈冠掌冊苑之丹鉛誤􅂪推轂薦非由於識靣事真可以語人頂踵衘􅀻額手奏記切以觀遠臣以所主孟子以言進退之閑遇大賢而相知韓公以爲遭逢之盛盖受恩非天下之所少而知巳得君子之爲難乃若初無左右之先容獨受門墻之隆遇以古道之相與尤人生之至榮伏念某才不逾人學未聞道雖家庭疇昔之教動欲行其本心然山林朴野之資知無􅀘於當世執經而後承恩以來念景行在四海之逹尊而科第非終身之能事頗欲自㧞於常人之􅀋庻幾無􅀒於上帝之􅂨頃趍闕下之時適際江干之警主憂臣辱念我生之不時外阻内訌繄禍至之無日因撫躬而思􅁬遂投匭而獻言當時破腦而刳心何啻燋頭而爛額有倉卒等死之慮無毫髪近名之心六太息之陳豈曰賈生少年之過三十字之獻幸寛郇模東市之誅逮時事之旣平滋人言之無據小體者戚其失措好事者髙其得各痛痒無知者以文采爲賢操挾不正者以譁競爲議匪躬之故俱莫諒於初心尚口乃窮嗟難行於直道旣奉祠而竊禄顓閉門而讀書未可與俗人言姑盡吾分内事不謂見知於長者遂勤延譽於諸公承明之廬著作之庭未甞夣想寂寞之濵寛閑之野遽沐寵光非華衮有一字之褒何弊帚増千金之重雖􅀷慚於􅀒乗然幸出於鈞陶永堅乃心欲報之德兹盖伏遇某官清朝碩輔昭代真儒胸中括石渠東􅀚之藏海内仰天球河圗之瑞􅔔惟世道􅀷屬我公整頓乾坤共屹江流之柱獻納日月入旋斗極之樞非徒耀不世之功名将有意太平之禮樂凡今小徃大來之㑹多出前推後輓之功遂使踈庸例叨㧞擢某敢不力持素節勉企前修稱彦􅀶於都堂幸借郇公之譽薦仲淹於舘職敢忘元獻之知賀江左相大老造朝元台正席歸公有衮綉我來自東用汝作鹽梅王置諸左三台明槪八表清夷洪惟我朝相業之隆莫如元祐家法之懿潞公平章軍國司馬實位昭文正獻議論廟堂㣲仲甞升左轄或以學術真純而輔君德或以人物直諒而當帝心續遺響於先秦兩漢之前文章鉅麗挺雄姿於黄河泰山之上噐量崇􅀷此自古之難兼盖於今而獨見共惟某官行􅀜百聖名塞兩間於前軰人期之以伊尹傳說今從學者尊之如韓愈孟軻尚論公之平生有報國之大節以君子不用爲我耻以小人未退爲巳憂童兒婦女知其血忱縉紳大夫想其風采自其驅馳外服出入中朝洛中􅅯仰之年江上經營之日以至賛先皇之大政參嗣聖之初元賢與不賢一言定其可否用或弗用四海視以重輕卓然一時人望之宗展也三代王佐之事屬登庸之伊始問夣􅁲以孰賢朕安得斯人哉固無踰老臣者乃申帝指乃穆師言金甌覆崔相之名銀信趣鄴侯之覲朝士舉笏相賀都民􅃒道聚􅀚天子引見以勞歸東朝出饌以錫宴遂由政路徑秉國鈞先天下而憂斯能後天下而樂有聖人之任将以行聖人之時莫難得者海内相望之􅀷最罕遇者君子氣􅀋之合方今師維尚父右舉皋陶賛襄於都俞之間寅恊於和同之際鈞無垠而播物相天地理隂陽鼎有足於承君安國家定社稷昔講於洙泗者困道路之厄而學於河汾者抱禮樂之慚道之行歟時則可矣俾我后五三之盛真吾儒千一之榮某猥在山棲欣逢庭冊親見上下龍雲之㑹豈徒門闌燕雀之􅀻陽翟歸耕囬首舊時之學士徂徠作頌傾心今日之太平慶抃情􅀷刋摩語淺馬右相庭鸞號碧梧紫宸播告金鉉登崇歸周公於東方來大老舉皋陶於右復得良臣九鼎尊安三靈開懌自馬服君之著姓至伏波氏之封侯燧進侍中特超居於外府璘遷僕射姑借重於將壇惟賔王起自書生在貞觀號爲真宰然以草茅之踈遠出於覊旅之遭逢未有親㧞巍科素居清望布衣之極以一編爲帝師都門之中不十年至相位於皇盛舉􅗥掩前聞恭惟某官得聖人之和抱王佐之學高山蓄泄有潤澤萬物之功太極渾㴠無運用四時之迹自顒昻縉紳之日巳雍容廟堂之風告后惟良有謀猷則順于外敬王如我非仁義不陳於前其出處不可瑕疪其喜怒未甞形色龍潜羽翼栽培不世之風雲鰲禁絲綸醖醸後來之魚水先帝留之爲宰輔之備主上待之以師傳之尊徑邁群公徧登兩社或主東􅆹之典故或參西事之經營鄴侯之跡大竒安石之名愈重兩宮明聖一老辯章旣峻昭文之遷遂正集賢之拜朝家用元祐之故事學舘獻慶暦之頌詩儒者之遇僅有而絶無天下之望方來而未巳簡淡獨周於事物晦叔所以有立於潞國司馬之間忠恕不離於湏􅁷堯夫所以無媿於正獻㣲仲之際前哲之風流未遠太平之㡬㑹有開豈特輝簡冊於二百年之前直將植風聲於千萬世之下某喜傳鴉字驚起牛衣知廊廟之有人爲國家而増氣昔通政府無書或詭於門人今誦相麻交賀敢遲於朝士其爲抃蹈罔旣刋摩通章簽書鑑號杭山兹者恭審渙號明廷普籌宥府風生黄道衞宸殿之凝嚴星度紫清煥斗杓之赫奕真儒無敵中國有人竊惟我朝之盛明最繫君子之翕合永叔之參兵柄在魏國位平章之時尭夫之賛樞庭當潞公判重事之日於以笙磬治平之政於以塤箎元祐之功􅀂稽前聞復見今日㳟惟某官知周而道遠仁熟而義精和風甘􅀨慶雲備四時之正氣髙山􅀷林鉅谷名一代之魁人當屬者爲小官之初巳淵乎有大臣之噐誰起諸國人之謗我衣而禇之我田而伍之公真大丈夫所爲匪席可卷也匪石可轉也突兀南都之鐡壁卷舒􅅬閣之朱簾在江湖在朝廷時人望其大用爲臺諌爲侍從識者恨其巳遲六飛之馬荘重而不馳萬斛之舟舒徐而後進厥今天􅂇順而人􅂇信大在廷而細在邉江漢􅃆水朝宗載􅀭我武夙夜基命宥宻無競維人遂升兩社之班爰賛五兵之本宰相計安宗社大師時游廟堂參之以運籌帷幄之神輔之以折衝樽爼之宻衣冠盛事具四方巖石之瞻衮舄一堂有三公鼎足之􅀔遹􅀚大業丕建隆平某盥耳山棲傾心廷播親見天地雲龍之㑹非爲門䦨燕雀之􅀻傳江西宗􅂀之圖敢云入社誦徂徠聖德之句請􅁇作歌抃蹈之􅀷敷棻則淺賀倉守趙編修端齋侯藩課最􅁃節陞華常平專歛散之功㢘察展澄清之志有識交頌不謀同辭恭惟某官璿􅂀清流玉班雅望早賛樞庭之畫遄躋府寺之崇結知前旒試庸外服幸甚趙大夫之日來臨歐六一之鄕廟堂知其爲循良田野誦其爲豈弟二天不啻兩年於兹雖明公屢上丐閑之章而天子正􅀷􅀝重之眷爰􅂌茶鹽之任聿増麾節之光鮮于一道福星式快輿情之望晉公三司真使行膺御札之除某仰席庇休倍􅀷欣抃大厦成而燕賀敢修奏記之恭六轡沃而駰馳實切執鞭之戀其爲賛慶罔旣敷宣回瑞州羅􅁠府遥瞻松雪乆羡檗氷䈴捲西山撫輿圖於錦水書移東里醒午枕於桐鄕寵委新編輝生棄弁天高地逈諒碧落之知心日光月華看紫􅅔之潤色謝􅀻何限嗣敬以陳回吉州繆守送端午端午賜衣漸傅璽召昌陽薦爼忽沐珍頒行人賁然來思野老爲之驚見某官心清於水仁行如春岐麥詠漁陽方騰善政角􅁰記荆楚尚念流風亦分百索之餘遠及一㕓之陋某倐驚晼晩良感慇勤剪綵艾以爲嬉強酧佳節對燈花而作報多謝故人回朱約山賀生日鄕有逹尊􅀗在嫡孫之行我生初度誤􅂪大老之知庭實駢羅使華驚見共惟某官世間活佛天上壽星棄萬戸如張子房而壽考遠甚頷諸孫似郭中令而精神過之尚憐蒲柳之新姿分以松椿之餘福旣受賜矣細吟香山三十六之詩何以報之還祝崆峒千二百之壽餽朱約山歳禮歳無多子驚爆竹之倐來盤有五辛喜屠􅂫之末至睠時大老萃止繁橲喧􅇫馬散林鴉遥傳歳頌臥籠兎横盤鯉􅂓見鄕風回前人餽歳一壑棲遲不覺歳年之晚五雲飛墜頓生草木之春分四老之玉塵起初平之白石某官陽和着物壽極當霄門有垂車換桃符之新句庭多戯綵沸竹爆之驩聲猶推椒柏之芳馨散作茅茨之光寵某肅登嘉貺祗佩盛心嘆巷北之椰榆吾癡未醒祝樽前之強徤翁醉何妨回前人賀生日富公七十九歳蹉九老之不如潘岳三十二年􅁴二毛之巳見方揆余之初度忽惠我以好音疇昔折軰行之謙從今悗親戚之話永爲好也長歌白雪之章還以事之願壽青山之約回彭知縣賀生日潘岳閑居巳覺二毛之見盧仝破屋忽驚三印之來愛之欲生錫以難老親戚情話􅀂是綢繆宇宙吾生不勝感􅁣矧復贈我永言好之讀三星行誰觧嘲於南斗壽八百歳尚徼福於彭城回太和趙宰賀生日三載淵明幸相望於五柳今年潘岳覺巳見於二毛懐哉好音賁我初度愛之欲其生也忠焉能勿誨乎一鶴自随約青山於未老􅀟鳬何許感流水之相知回太和趙尉賀生日潘岳閑居巳覺二毛之見盧仝破屋忽驚三印之來爲此大小年之光異哉神仙尉之寵錫以難老愛之欲生陽春白雪之詞真成寡和流水髙山之約安得相逢回胡宣教賀生日春華如水驚三紀之流光夏緑滿園又一年之初度方拾薪而煑瀑姑擷草以供茶敢意谷虚有來庭實錫之厨珍以起其牢落將之篚厚以申其慇勤門外桒弧自嘆男兒之老里中羊酒敢忘親戚之情回蕭子蒼賀造居東門掃􅁤方尋歸􅀮之盟依山結廬􅂓作奉親之計正辛勤於結構辱折􅀉於芳馨室虛分坱圠之春庭實委􅌭紛之既想兒郎之歡喜共舉草堂謝介使之勤渠􅀉將梅驛賀朱太慱得祠楓陛䟽榮蕋宫領秩平分風月暫横緑水之舟􅀉傲烟霞新入壼天之宇相羊得所進退有階共惟某官一世精英盛年華要春風滿座人知公掞之懐雲谷讀書我得晦翁之樂聞巳速􅇪龍之武未容髙鴻鵠之飛某同志有人相期何許卧篔簹谷正尋白水之盟望麻姑山輒致黄冠之賀送􅅊主簿成功赴宏詞科徑辭矮屋前赴大科開五十難以試教官是名上等分十二體以取詞學􅀹見宏材慶熊魚之得兼觀龍象之第一某冬烘自昔晚歳相期乆此妙音不到蓬宫之處看君名第又光杏􅁐之年回廬陵趙簿􅄬贄我軰蓬蒿正堪羅雀美人錦誘上有棲鸞懐哉六謙持此三過某官鳯其翽翽麟􅀆振振吹大乙之烟藜歘然特起織天孫之雲錦燁乎相輝有是簿􅁘自此升矣某細􅃻白石遥想緑綈看南山之雲惠而好我穿東郭之􅂂欲徃從之回吉州陳守緯台州人葉西澗表親大常丞分牧龍藩此非子坐退耕鶴隴乃得公書紛六轡之光華亶一㕓之荣寵某官照人白雪有脚陽春􅂪福凡十萬家民歌載路薦人至二千石相譜滿門籍甚嘘枯居然起廢某豈堪作吏真足爲氓儻一壑之無他維五雲之在上吟詩自樂退求元亮之心設榻相看徒感陳蕃之意禀酧不敏摧謝未央賀前人除福建倉藩條報政􅁃節􅆒綸雲閣森嚴上接神奎之府天囷明槪下臨湏女之虚天啓九遷民争二竟共惟某官渾金璞玉甘􅀨祥風家有旂常籍甚東山之名姪身雖朱紫依然太學之儒生蚤騰駿馬於雲霄遂主神螺之風月人懐惠政帝有恩言奪南國之二天遺東甌之一佛常平典在武夷之文獻可尋宰相時來文穆之聲猷孔邇某退耕滕野喜趣曹装輒持行李之㳟庸展􅂗芝之慶事大夫賢者庻自附於攀轅以我公歸􅀆將不勝其賀厦其爲頌抃􅂚竟敷陳賀劉省元夣薦登科辛未省元甲科第九人衢教蘭官㧞頴甲第傳臚過千曰俊過萬曰英人間徤笔第一爲魁第九爲弼斗北脩名柯峰翠濕於飛纓泮水清摇於振鐸行徹􅆏比之席即歸鷺翿之班某正僻耕寛遂稽箋賀賦雲山之紅􅀣焉得徃從摩石室之蒼苔不堪持贈迎寜國交代孟知府共審肅將一札言牧􅀟溪紫馬西來照旌旗而出色玉麟外遣覺􅂐籕之生輝上日先庚懽聲旁午竊􅀷慶抃欽以某官羔裘豹䄂玉質金相說書而動京師素積行秘書之學把麾而去江海重爲賢刺史之勞少稽漢郡之三公嘉惠建州之千里某乆哉望歳際此行春宛水明樓巳敬虛於中舎昭亭簇􅀐敢先候於前茅謹具申聞伏惟丙照除湖南憲通交代李樓峰李改除漕東風一道喜鵲錦之生花元日十行愧牛衣之換繡幸甚葵丘之新好託於杏苑之舊盟一介施先七襄敢後共惟某官􅀒宇宙之志出文獻之傳高山􅀷林世載其魁傑青天白日人知其清明地望接乎西平声名垂於北斗瑶編玉牒參天上之神仙紫界粉墻隔人間之風􅀨盍鳴珮而登馺娑乃弥節而下崆同民五袴而牛犢滿家米萬檣而蚕桑遍野属凝旒之西顧遂持斧以湘行風動褰帷祝融七十二峯之雲暁星沉貫索太㣲二十五宿之芒寒江春洗蘅荰之愁庭晝卧桁楊之影方山摇而岳動俄斗轉而星移五丈原之流馬木牛運於樽爼八景畫之晚鍾沙鴈同是江山我公之二界無争先君之四封如舊然而江濤如許原隰謂何温公嘆子駿之福星不宜居外文正服張公之大體引以歸朝爰重中權式光前􅁤某生而骯髒分也嶔﨑飲蘭露餐菊英哺烏有味裂荷衣焚芰製夣鹿何心每爲梁甫之吟有感長沙之賦􅇮於飛輓徒觸危機今見平郊猶驚曲木頼有同年之宿昔互爲一日之交承春爲秋先秋爲春後甲入乙舎乙入甲家曲江㑹上之風流南岳雲邉之禮楽荆俗相傳於佳話蕭規幸淑於前猷睇駰駱之光華敢云並駕随雲龍而上下儻許執鞭欣蹈之私誦言莫旣賀前人改除湖北漕兼知鄂州日陛􅀭綸氷軺作屏北斗丹梯勾陳玉檻聯郎宿於天階渚宫碧􅀣巫峽青山迎福星於江夏光稠符玉色動轡絲㳟惟某官鐡馬行空金虬騖海離離珠璧府懸黎垂􅁄之光耿耿斗牛虛干將莫邪之氣灑翠竹碧梧之韻度發清霜紫電之神竒太㣲二十五星旌摇江漢祝融九千餘丈節􅀝雲霄當驅馳吟遣使之詩每慷􅁣讀出師之表落落襄樊之事會悠悠江漢之風寒局靣一新機神頓聳師垣制勝集忠益而開誠心帥閫請行從便宜而上方畧武承先志孰與明公乃峻氷臺乃陞寳庋練鵲錦之㢘車改􅀚黄鶴樓之衞㦸生風餉高宻之師借恂河内詔西平之子賛度淮堧節􅃏合而氣􅀔張􅃓矛重而精神壮北代歌功於六月中興刻頌於萬年樓船過洞庭旌旗直下閶闔開黄道衮舄遄㱕某方恊寅􅂨喜傳卯詔界上争杜衍想共戴於我公方􅆕待乖崖將遂誇於吾榜行行㑹弁亹亹賀床賀前人生日暢月先春福星初度朱綬錦艾聮赤壁之六絲蓬矢桒弧絢紫㣲之五色玉書􅄍􅆋繡􅌧生輝恭惟某官風骨清剛精神大耐仙人駕黄鶴色照渚宫老子跨青牛氣浮凾谷夀八荒而裒福律九寸以迎長棠隂照岣嶁之央十分翠暁桃影近蓬萊之水一朶紅雲某夙分碧落之香遠認瑶池之色一車以南一車以北軫軫相望千歳爲春千歳爲秋心心持壽賀化地冬舞雲門而奏至六琯凾和占星壁之正中三階齊色芝香丹禁榖介黄扉恭惟某官心見乾坤身持元㑹御床親捧耀五龍夾日之光寳鼎宻調胚萬􅁚皆春之意燦火城之鶴􅆋領圭舄之鴛行宜裒坱圠之和茂集陶鈞之福一陽出地露玉燭之光芒五色書天開金穣之瑞慶某叨􅁇乗軺之乏殊慚把繡之長絢色線於帝裳乃心上衮跂黄雲於仙韈莫尾賀綦頌詠情􅀷敷棻喙短賀化地正帝尭授暦肇開平秩之端周公爲師實主㤗和之運光華絶席坱圠方維㳟惟某官玉燭際蟠鈞陶動植調元神鼎心包太極之春捧日扶桒色照蒼精之角條鬯東南之温厚塤箎上下之明良拜􅀳國大夫人慶祥符之真宰邁潞公平章事登元祐之昌期億載敬休八荒開壽某囿身洪播稽首獨班三陽君子泰來仰賛茹茅之盛四牡王事靡監俯同苞􅂎之生致賀輪囷牋忱稿秸賀簽書冬晷􅄤南陸一線迎長星麗西樞三階齊色裒時茨祉榖我英髦恭惟某官元㑹運之經綸天地心之槖籥黄雲乗韈肅劒􅂂於大昕繡日􅀘裳領衣冠於亞歳鼓舞黄鍾之雅陶鎔緹幔之温萬物生輝回餘光於草木八荒開壽鬯新渥於乾坤某承乏湘軺馳瞻魯􅀚芸香透暖尚憐采􅀂之寒梅意先春預闖和􅅅之候葵葵是祝草草奚殫賀參政正簽書樞宻院兼東角耀芒開三朝之景運西樞齊色轉萬􅁚之洪鈞碩輔均弘方輿錫羡㳟惟某官明謨賛化熈績亮天金鼎調元共斡太和之運玉衡測影首參平秩之功塤箎宥宻之經綸鼓舞明良之際㑹􅅔歌中國壽細柳之春風花滿上林掲扶桒之暁日四方來賀三壽作朋某身逖馳駈神傾坱圠㧞茅連茹言􅀚君子之風集􅂎方苞尚念使臣之逺輪囷致頌藁桔箋忱賀江丞相除湖南安撫大使判潭州舊弼起家价潘建閫􅁎公相周而爲左方遂明農召保分陜而守西又新維翰威行夷夏運在東南㳟惟某官壽俊兩朝禮樂四代修名􅊆節以日月爲明泰山爲高奥學精言爲天地立心生民立命水火不争於鼎鼐泥金各就於陶鈞本之身心暴秋陽而濯江漢措諸事業􅈾戎狄而懲荆舒起觀一世之安危端繫大人之出處當世道未寜之日正遼人相戒之時乃攽一道之玉麟乃授三公之金鵲謂捍荆門吞夏汭􅀉莫重於星沙豈挹浮丘拍洪崖閑可專於緑野安石起東山而符秦潰孔明渡瀘水而孟􅀗擒維兹銀濤青壁之雄􅀝我錦艾朱綅之重功􅀮存於宗社書不盡於旂常三軍百姓之歡迎大開玉帳一馬二童之促召再築沙堤佐興唐虞誕保文武某及門甚晩知巳何􅀷薦不識靣官每嘆先生之古道自號報恩子豈在衆人之下風鳯凰出而羽毛朝蛟龍驤而雲氣簇一日􅅯潘之際㑹同時誤節之走趋方當聖哲馳騖之秋無限師友從遊之感孝子回車忠臣叱馭司空副相將交盡於君親太保上公惟􅀷期於造化㓗蠲拜下傾倒由中賀前人除特進碩輔在藩優恩加秩撫淳熈左相之舊鎮赫奕十連冠元豐特進之新衘巍峩一品星馳汗號雷動驩音㳟惟某官􅂄壽具瞻宗師先覺東問典故西問文學錦堂丞相之規模公見庻僚府見監司潞國太師之度量維時台宿来茨軫􅀖熊當道而貉子之膽寒龍居淵而􅁚罔之迹逺上思舊德時有恩言進左右僕射之官増詩書元帥之重在師中吉承天寵也旣都錫命之榮以我公歸有衮衣􅀆即轉征東之馭某猥塵馳轡阻赴賀床載􅼸渌之清指玉麟而爲壽遡斗樞之紫徯金鵲於方來回前人除特進送禮上公國輔相望􅀛􅌧之華特進天人忽枉鸞飛之字漙乾坤之新渥賁岣嶁之行雲庭實熒煌鈞和坱圠芳洲杜􅀂􅀍紫駞翠釡之榮驛路梅花看赤舄繡裳之覲熏香詭謝伏繭泝馳行部潭州謝江丞宴古之學必有師甫趍凾丈子使人歌而善肅拜初筵春風渭北之旗夜月洞庭之樂簫韶俗耳氷雪征塵車攻􅆳六月之詩先聞􅁻語帝所聽九成之奏再相太平送前人九目禮宴龍山九九之節夙侈雄藩開鶴林七七之花今逢真宰風清六纛霜肅九州共惟某官赤舄元圭琱戈錫盾酌長沙酒快春水之暁行賦北門詩喜秋花之晩看小馳戱馬重􅀘衮龍某記影星垣驚心颷館跂芙蓉之頂想千乗之登高折茱莄之房爲三公而持壽回前人送九日禮天開紫盖秋高淡圃之香星下碧泉春到長沙之酒飛卷五雲之風􅀨光華九日之山川昧也冞􅀷恩斯􅂚稱北門看菊幸與分玉帳之清内殿傳柑聞巳下金甌之信賀前人冬春入重緹欣聽雷鼗之奏台明上衮具瞻井􅃏之輝􅂖我龎臣裒時疇祉共惟某官量包元氣心見先天冠漢殿之仙班火城如晝􅀘舜裳之五色宫線猶香卷舒昭文舘之春風布􅇴祝融峰之暁露􅉅蘭出色芸荔含和愛日迎長開一氣八荒之壽瑞雲促覲領五更三􅀧之朝某迹囿轉鈞心馳獻􅂂近依星軫愧直指之綉衣遥賛雲門歸碩膚之赤舄薄言燕賀永矢螽鳴送前人折筵肇九寸律柄屬洪鈞建十丈旗光生几舄馳想雲和之瑟莫陪壽軫之觴薄注􅼸清式歌魯瑞出乗仙韈遥修南至之㳟入棒御床預致東歸之慶瀆嚴増􅅥錫頓爲荣回前人送冬酒噓嶰谷之陽方覃鈞播照􅌕湖之渌忽拜衮題有華舞䄂之春風増賁綉􅁝之暁日淺􅀷存爕理滿傾北斗之天漿德澤布光輝􅷷沐南山之雲氣輪囷鏤感槀桔刋申賀前人正龍杓麗暁天開泰内之陽驛􅀐明春星起軫中之壽和薫青琯喜動黄麻共惟某官心㑹陽宗身扶人統黻明帝衮迎瑞日於東郊繅煥公圭照蒼精於左角卷劒氣玉烟之彩増綉裳赤舄之荣東作有三百六旬陶鈞一轉中書歴二十四考鼎鼐重新戒前路之鸞凰沸歡聲於童馬某喜逢雞朔隃賛熊旂光近火城又獻大椿之歳寒噓雲舍敢忘寸草之春跂賀心馳箋忱喙短送前人酒開條風於獻節瑞藹三朝介壽酒於公堂春生四􅂂歛神光於雲岳拓喜氣於沙堤輙持􅌕渌之窪樽􅂓賛鈞天之和鼎不匱錫爾􅀋懐哉萱草之詩再入福蒼生如此椒花之頌薄將凌躐賜頓欣荣回前人送春春回大簇開雲氣於南山暁醉長沙酌天漿於北斗挹注偏提之潤薫蒸綂部之和緑净生香洪鈞轉燠八仙地隔莫陪左相之杯太乙風生隃賛東皇之席卷卷跂謝草草箋忱賀前人赴召銀信騰霄金書照閫映南雲之紫盖春滿江湖歸東􅀨之衮衣天開閶闔行宫絡繹綂部歡呼共惟某官以太宗師爲真宰相文章􅀂雷霆河漢玉色金聲言行質天地􅀑神丹心白髪出納祝融峯之日月卷舒昭文舘之星辰北門小煩魏公盡寛上顧中國再相司馬坐懾衆心仙人駕綵鳳以傳音老子馭青牛而入覲碧􅆂汀芷暁清沙路之塵黄把庭麻夜轉火城之影某囿身化治舞手􅀭綸大老盍歸乎來共􅆀巖瞻之喜君子永􅃬爾􅀋終徼鈞播之􅀻􅉥賀欲飛牋詞甚桔通羅提舉京子號牧􅀮天囷照楚瞻駰轡之濡􅁝􅀨耒耕綿愧牛衣之易綉合臺容之永好嚴牘贄之先㳟欽惟某官氷浸玉淵雲峥鐡壁沮金石諧韶􅇴音振蓬萊踞虎豹登虬龍氣摩岣嶁覽德輝翔千仞而下迴狂瀾障百川而東萬鍾何加一介不取寜航選海棹頭不揖於王公使夣鈞天平歩可登於卿相莫屈英英之氣何求赫赫之名以恢乎玉山壁府之才亦屑於金署犀監之屬再命而俯一車以南霜飛暑路旗展春山輝煌周隰金聲中朝玉振江左照映熊湘起視西北之風濤誰是東南之砥柱必平居曰法家曰拂士則臨事爲孝子爲忠臣參文公之政於浙西舉行殆遍凛清獻之風於殿上植立方來某政酣啜菽之甘不作覆蕉之夣長鑱爲命忽持斧以重來曲木猶驚雖循墻而莫避幸甚星臺之近聿爲鄰燭之輝􅁇自今爲王事之啚増昔者寘周行之氣九折回王尊之馭爲範馳驅四方随東野之龍願從鞭弭匪伊拜下莫旣由中回前人干批書舊例監司交批疇庸天􅁃趣駕星闈戒嚴繫日月之書茂對照乾坤之渥某禀承有恪占署知榮謹具劄子復申藁桔萬愧送前人七夕瞻􅀨旗之耀獨立秋風依六轡之光相望七夕來綉口錦心之巧贈玉盤金錯之英鄰酒春􅀷客堂凉透牽牛織女看夜度於天街語燕留人且曉吟於湘水請前人宴濯錦湘江欣覩乾坤之渥卷簾楚觀頗懐風月之談忘􅂪瀆之爲嫌冀謙尊之肯訪薄言􅁲日爲慶朝天富以其鄰且細論於尊酒德將無醉願小駐於鋒車某輒擬翌日敬邀崇重回前人折送錦闈星度喜渙禁綸􅀞舫雲來特開臺宴爲折瀟川之渌頓生楚觀之春酌郎官清卷碧筩而遥謝懐美人贈慚荆壁之無酬請前人九日宴紅杏舊隂甫迎天囷之綵黄花佳節又飛氷􅂐之丹膏車巳動於行雲流馬聿來於今􅀨偶􅀛明日薄燕清風莫置錦屠􅂫且拚小飲巳鑄黄金印行慶異除送前人折筵鵠立春霄帥雲霓而來御鴈拖秋色喜風月之共談欲挹注於黄流盍招呼於緑净跽效折枝之瀆想爲㑹節之煩飲露供騷何取水中之薜荔􅀝雲同味共看江上之芙蓉通董提舉楷號克齋永嘉人前知瑞州魏􅊴􅀭綸熊湘授􅁃刺史二千石雲度錦河天囷十三星春浮􅁝隰六條先暁一道生風共惟某官閥冠雲霄樓高湖海沮金石諧韶􅇴音振蓬萊踞虎豹登虬龍氣摩鴈蕩清泚三蘇之頴水峥嶸二陸之象山自崑丘鳳穴之鳴陽卽􅈚海鵬雲之増翮上下浙江之明月早透金閨翺翔輦路之春風暁聽魚鑰灑灑清都之人物飄飄碧落之神仙張乖崖斬叛卒於益州騷動之餘富鄭公活飢民於青社荒殘之後璽書選表環召歸班大府上士之清聯帝思前席常平使者之新轡公念南湘以醴泉芝草之春爲芳芷杜蘅之澤九郡顒顒而望賜四牡業業以戒嚴霜飛暑路旗展春山巳摇翠岳烟傍衮龍日臨仙掌遄侍紅雲某夙出年盟今諧鄰好萬里風雲之天闊一􅁭草木之味同祝融山外之芙蓉肅迎紫氣泰華峰頭之氷雪佇沐清風回前人到状夙綴鴈題今聯駱轡欽傒清風之戾止亟馳新􅀨以㳟先甫快低簮居厪飛翰天囷星近喜不隔於光華湘水月明尚嗣承於談􅀏迎前人星槎度漢天􅁃明湘丹鳯㗸書光照朱維之色蒼龍授節清摇緑净之波禮樂輝煌旄􅌼皷舞㳟惟某官文章大雅節㮣真清玉立九関徹芒寒於霄漢春行千里蓄精銳於雷霆屢培後戸之本根少屈㢘車之歩武任一道常平之􅀉推九重愽濟之仁不待突黔趣歸槖紫某寅同下隰䕃接芳隣太史新占看德星之照軫故人舊識喜今􅀨之來車送前人洗拂振衣碧落彌節朱陵祝融驅海􅀂藏江山摇動風伯清􅀨師灑原隰昭􅂫言觧征驂驩􅀓回鴈某年盟有夙鄰䕃方新吉日來思巳慶拂􅀛之喜皇華近止輒陳秣馬之恭回前人送􅀻覿今􅀨來車方連雲於回鴈清風落䄂忽分貺於懸魚捧旅實以􅀂驚恍使華之如對報青玉案頗懐客况之寒望黄金臺惟謝年情之厚謝前人招宴樂語雲垂臺䕃偶陪湘水之行風度伶音恍聽洞庭之奏和氣一堂之律吕年情四海之弟兄矧燕花飛舞之時正鵲錦交輝之旦充庭有喜滿座爲春故永歌之尚想五章之禮樂式相好矣永懐一片之宫商送前人新除禮峰回秋色謇誰留􅀆中洲臺立春氷歴余征於吉日舄奕車輿之彩葳蕤􅂁􅍎之花注緑净以傾馳睨青空而折􅀉洞庭霜熟是爲正好景之時閶闔雲開嗣貢真福星之賀薄言卷爼莫䆒􅂨旌送前人折爼臺氷正色錦􅂁生春馳華轡之六􅁝軫星増煥鑄黄金之一節融岳如新條令具孚耄倪胥抃某阻奉卽真之賀輒修攝飲之㳟禮無體樂無聲慇懃直􅀉南有箕北有斗清淺相望持瀆忞忞麾留荷荷回前人中秋請宴照江疊節載􅀞舫之清氷待月舉杯呼芳樽於緑净拜華星之墜几約明月之浮槎風􅀨滿城何幸兩重陽之近江山如􅀞尚從前赤壁之遊槀秸申酬輪囷嗣布回前人折爼注􅌕湖之渌昉慶臺春然楚竹之清倍分鄰燭載厪卷爼如侍秩􅇼援北斗以酌天槳旣知賜矣醉長沙而行湘水悵莫從之回前人送酒福星明處甫羞北斗之漿今􅀨來時又報長沙之酒起立寒梅之月影坐􅄈凍芋之春萌雖軫軫之相望真心心之不隔白絹之封三印報不成章黄麻之似六經又将來賀賀前人冬春入重緹欣聽雷鼗之奏星埀練錦沂瞻沙軫之輝􅂂此一陽賁然􅀟節共惟某官聲名雷動意度春融大雅正音得黄鍾之渾厚純和元氣探寳鼎之絪緼卷夜月於蓬萊布曉雲於岣嶁􅉅蘭出色芸荔生香君子得輿開千載一時之㑹使臣濡轡催五更三􅀧之朝某斧綉何功臺雲借䕃暖回鄰壁先鳴鳳之六筩光近福􅄤㑹牽牛之七曜通忞喙短馳賀心長又送冬至酒五紋添綉線日麗旌旗一節鑄黄金春生霄漢馳想雲和之瑟莫陪壽軫之觴薄注􅌕清式歌魯瑞九疑仙人之韈正快曉行四牡使臣之車即催元會瀆嚴増􅅥賜頓爲榮送前人歳節酒條風開獻節琯玉更端春酒躋公堂壼氷薦祉皇華六轡和氣九州輙蠲杜􅀂之清持向屠􅂫之末軫中星轉隃瞻練鵲之輝緜上雲歸爲喚林烏之夣薄將増恧賜頓知榮賀前人正龍杓曉轉天開泰内之陽駰轡春行星掲軫中之壽􅀟旌郁穆疊節焜煌㳟惟某官清徹壼氷和鍾琯玉䈡珩剡剡輝瑞日於東郊練錦煌煌映蒼精於左角小駐祝融峯之􅀨露遄催含光殿之風雲某幸接臺容欣同律暖酌屠􅂫酒願均八荒壽之心詠萱草詩􅂚謝三春睴之賜傾心來賀引領欲馳回前人送春杓携龍角煥天上之星辰壽介兕觥分軫中之和氣喚醒年華之舊移來夜酌之春折芳芷與杜蘅永懐騷雅挼紫藟坐碧草隃企湘􅀷什襲知榮七襄莫報得贑送前人禮上堂拜家慶偶忝近麾痛飲讀離騷有懐疊節持此清冷之寒渌進于沆瀣之朝霞望美人􅀆一方特慚蕝禮問征夫以前路尚肅藥規輶瀆有慚麾留斯寵回前人請宴堂有白髪親誤塵便組公鑄黄金印爲舉初筵移來長沙酒之芬馨喚起章貢臺之顔色君子永錫尔􅀋巳懐旣醉之歌使臣言逺有光尚借如濡之潤送前人别㑹折爼楚節易麾􅀷味慈烏之哺湘花舞席隃瞻練鵲之輝思君渥之綢繆膏吾車而繾綣上堂拜家慶遠借光華痛飲讀離騷隃同慷􅁣區區折􅀉盻盻麾留回前人别㑹送酒折爼回卭坂之車方随檣燕贈蒲城之酒忽枉帳犀慇勤折柳之情流麗飛花之影丈夫豈無别淚不灑於東西同年亦有情雲相随於上下銘藏娓娓馳泝沄沄小人有母􅂓分竹以懐歸君子錫朋指飛花而賦别慷􅁣執祛之意慇勤祖帳之文卷􅀉良稠銘感不足日暮碧雲合喚游子於他鄕月明今霄多耿美人於河漢掲麗軫之福星隃詹正色呼歸航之明月尚沐餘光雖巳催南浦之春更爲醉長沙之曉公方行冀部即聯獻納之班吾亦念桐鄕終席澄清之􅃳懐哉折􅀉皋甚刋酬賀衡州宋吏部上鳯池絢曉鴈岫行春天近蓬山玉檻照西清之直風高湘水朱旗壮南國之游童竹生驩騷蘭出色㳟惟某官山輝川媚雪跨霜懸遠景樓高拂西眉之意氣靈光殿炯接東魯之風流砥柱百川大車九􅁤金鑰玉珂之凌厲粉墻紫界之蹁蹮海荔晴雲曽度兩轓之影溪苕夜雨尚留六轡之光卷紫氣於河球韜神芒於浦劍屈訪禹碑之竒字小凝􅅊戟之清香驅龍蛇放之菹春生敏手椉騏驥道夫路雷動先聲佇風幕之圍春聽今􅃭之歌暮朱陵道院暫分翠岳之輝碧落仙人行侍紅雲之近某牡驅何􅀘鼯技巳窮地􅅁九州輝最親於鄰燭月明千里影卽對於朋簮盥露沄沄遡風亹亹回前人到任状小車戒曉猥随竹馬之塵森㦸臨風快覩梧鸞之彩纚纚􅁭期之新􅀨煌煌手畢之華星封候識荆州巳諗度􅀜之氣低頭拜東野願從開岳之雲儲謝輪囷刋酬梗槩請前人到任宴虎符新渥聿來聚軫之輝鴈嶠初春喜接浮関之氣粲梅花之照眼擷杜􅀂以論心欲􅀛告朔之朝薄燕行春之色共剪西窓燭迎桃李之春風爲酌北斗漿卷瀟湘之夜􅀨送前人洗拂露溶朱斾巳空緑净之塵烟淡綉隅莫侑清香之宴來新多喜飲至有􅃔花邉立馬竹裏行厨木未搴蓉􅂓將綿蕝水中采薜謾賛㫪容輶瀆知慚麾留爲寵謝前人招宴致語衡陽虎竹之春新輝碧落湘水燕花之夜共醉清吟藹僎介之倡酧發伶倫之揄詠㳟惟某官黄鍾䟽越丹井甘寒咳唾珠璣五鳳樓之錯落擊橦金石九龍􅒶之舂容妙言語之齊諧􅀉音容於趙舞某味􅀷登席寵復歌詩相如文豈􅀋徘敬肅齊心之謝魯侯永錫難老莫酧思樂之章什襲意長七襄辭訥送前人特㑹折爼慶棨㦸之遥臨幸依香燕講尊􅃔之特試敢去餼羊折騷客之芳馨效野人之綿蕝樂無聲禮無體􅂓寓慇勤北有斗南有箕相望清淺忞忞持瀆盻盻麾留回前人送物詹新府之䄡帷有光下隰來美人之錦綉於粲西珍庭實生香江空出色緑文赤字徒􅀷什襲之荣青玉明珠莫寓七襄之報填􅈾多謝待靣縷陳回前人賀雪行湘水之春天開光霽呼霍山之雪風起􅌭紛手提五袴之温心出六花之瑞幻􅂗鴉之玉界賞回鴈之璚田清憶廣平公莫形容於天巧白戰頴水上預賛詠於年豐回前人饋歳官居家節坐閱壘荼兵衞清香特分滫􅔱來使華於千乘雜侯餽之八珍喚醒春意之􅌭紛倍覺寒聲之辟易歌椒頌而懐杜甫隃賛凝森持梅花以謝廣平莫酬清絶謝前人聚宴折爼諸侯應􅀰宿之􅄤來從劍外太史奏德星之聚偶與席間傅風味於􅌕湖歛陽和於楚觀黄堂一杯酒良佩交情青烟五侯家隃馳謝臆送前人聚宴折爼凝香森衞㦸近揖春和舉瓢酌天漿有懐星聚爰采澗溪之末薄陳爼豆之前爲細民斟隃想賦西園之雪從太守樂駕言随東野之雲瀆餉懐慚麾留爲幸回前人賀正斗指蒼龍轉陽和於雄律尊分白獸來瑞氣於雌堂曉酣栢葉之香暖轉梅花之色稱壽觥而頌魯散作春和下褒璽以徴黄佇看天渥有華什袭莫報七襄回前人請元宵宴麗譙龍炬春輝左角之星碧落燕香夜對西眉之月特枉金玉章之貺許從雲霞佩之遊遶建章立通明預祝六鼇之宴醉長沙行湘水且聽五馬之謡請前人元宵宴轉西樓之梅月喜對銀花持北斗之桂漿擬陪􅀞㦸僣􅁲仍圓之夕共流引滿之霞􅃻鐡馬之春氷肯來楚觀賦石犀之夜燭細說巴山回前人請聚宴虛危出福星光生鴈嶠斗牛有紫氣喜動燕香爲開北海之尊如㑹長沙之節益者三友懐練錦之新輝襄我二人歌緇衣之永好感􅀷緹袭愧後刋酧除贑守回宋衡䄂劄請宴馳隰何功沐崆峒之新雨秩筵有命開岣嶁之春風鏗然出衘䄂之音爲我􅂇回車之譜江湖千里将聯麾影之光桃李一杯尚聽􅃭歌之譜彌襟傾感走筆刋酬請前人宴太行望吾親舍偶遂陳情合江和使君詩正堪握手敬􅀛明日薄燕清風衘杯接慇勤聊盡湘行之趣上堂拜家慶敢忘頴錫之􅀻徼惠賁然坐邀恧甚請前人别㑹致節言歸借末光扵郎錦飛花執别馳逺夣扵客帆小湔祓扵詰朝更徘徊扵勺水日暮碧雲合不勝年遠之情月明今宵多且盡相親之興坐邀凌躐惠肯知榮回前人還請把太守之新符􅀗傳民譜問征夫以前路乃辱祖筵方繾綣於飛花更慇懃於折柳南有箕北有斗所願挹槳君向湘我向秦􅀂爲聞笛懐哉傾倒帥是刋酧謝送禮物棒檄江城喜囿二天之照折梅驛使歡傳千里之音煌煌麾節之夏盟纚纚雲仍之新好某官誼隆金石香溢芷蘭誰将西歸懐之好音莫殫􅀷謝詩曰不匱永錫爾􅀋惟戴殊知蕝禮将忱􅌤顔匪報通胡都承石壁叨臬湖南余征上日摳衣洛下伊邇中台亟裁書而叙心将考德而問業㳟惟某官出入文武闔闢樞機龍虎變化山林高􅀷間出魁傑氷雪聦明雷霆精銳獨歩艱難肯綮十九年而刀知新扶摇九萬里而風斯下連麾江海春浮五袴之聲疊節東南星度六絲之影自任以天下之重獨賢於王事之勞金署犀監之翶翔奎殿紫樞之凌厲赫奕將磨於浯石逍遥􅃍薄於蓬萊此聲梁楚之間英雄籍甚長江南北之限人物􅆌然馳旌夜召於長沙乘驛曉行於湘水亟躋兩地試韓范之䂓模弘濟中天遡趙張之事業某味方酣於啜菽夣不到於覆蕉換烟雨之緑蓑方􅀷澗媿起波濤之舊綉􅂚稱臺容緬懐冀部之風喜近高陽之里王尊九折坂願聞叱馭之規元龍百尺樓即展下床之拜登龍在望濡兎莫殫回楊秘監就賀貳書壁府􅀳講金華太乙藜青煥玉山之黼黻邇英槐翠照丹井之綸絲開岳雲回度墀春早㳟惟某官岷峨一壁􅀜洛单傳玉井氷輪灑落神仙之韻簫鍾瑶􅒶和平典則之音自歘起而霆轟每徐行而山立稱真侍講在淳夫正叔之間號小司成􅀒安定康侯之望雉監沐天光之近螭􅉾居地望之嚴羞崑崙而薄蓬萊枕湘江而㑹瀟水萬家燈火􅀨籠絃誦之聲千里桒麻雲度袴􅃭之曉君不淮陽之薄上􅀷渤海之嘉圗書歸領於瀛州鍾皷行尋於長樂銅印水蒼佩亟紓宣室之思白馬金盤陀浸近文昌之拜某相望千里一别六年緑蓑風􅀨之中方兹餐菊舊綉波濤之後復爾夣蕉喜追東海之龍來趣衡陽之鴈恍絶塵而瞠後剨半夜之召前懐駰駱之載馳敢安絲轡􅹋騏􅂹以先路遥想雲旗贄賀葵葵刋酧草草文山先生全集卷之七終
