  text: 文山先生全集卷之五文集
  hash: sha256:d9d959b9679e8646b012b406c166706e43c4d6e2b76c615cbfde8a79dbeed651
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_005-1a}
body:
  text: 書囘胡僉判請交割除寕海軍節度判官􅆹公事日某仰徳􅁭期比布之竿牘顓􅅚謝言兹不贅吐首祈崇烱某幸甚區區此來得忝交代意者天將開攀拊之縁使之拉湊一至於此惟是天賦偏於愚戅親見聖主懇焉求言意應詔者必有中今日之故側聽逾乆無能爲國家陳大計者􅀻念上悔悟勇决如此而某􅂪恩至厚他人旣不言則雖踈逺豈容避其責是以積忱累日冐死投匭以冀一感悟天聽出􅀜席藁以來首領且不自保况苟官職乎高誼不薄猶以同宷爲情連屈軒車復􅂌翰墨一吏至又持公文以來周旋曲折無非眷愛某感激不自勝惟如前之義則有不可􅀌長者之意不敏謂何某尚留此待㫖􅀂數日後威命不下則是上憐其愚而寛宥之某當歸且念咎矣而非所敢望也所有添差僉判􅆹公用某一切不曽祗受或郡府不以某爲不肖他有情文則恐吏軰爲欺而亦某所不與知也本湏具状申府惟身爲罪人不敢自擬於屬吏之列得於畫諾之次叙其􅂨情則某之受賜甚厚也臨風拳拳賀呉提舉西林己未某自九月赴京師時請叩門墻􅂪警䇿備至玅語天然式相行色篋笥間至今耿耿有光氣第某解舟至豐城及聞新局肇更鄰麾茂􅂌細讀仕􅀮不同轍之句則雲駛月運舟行岸移轉􅕿之間已成兩樣雖然此非爲明公榮也纓冠褰裳世道有頼焉某來上下以鄂鄂故爲之􅐓洞聞諸閫雲集而正不多以此爲不足慮獨賜教時則衡陽之事明公盖巳及之而中外未之信某以十月晦至脩門則聞聚毒巳并流波浸澷秣陵荷擔之事盖凛凛巳兩月中間新相至則又得月十日定帖耳然我之緩急徃徃視敵之起息爲之則定帖者未可保也譬如一間屋前人放火已燒及旁舍僅僅得全宅未動卒急得一曉事人率衆拯救雖千百擔水未足以頃刻沃滅明公盖防防一大頭項也今事莫如袁吉之急袁以改􅂌明公而鄕里又得平林爲重時有明公諸人必能一心同力以障潰堤之衝籍此無恐帷内間則病根未去􅂂翁掣肘尚多雖言路大開而奸䛕熏注之􅀷搢紳多不能自㧞􅑫聞􅀿詔投匭則學校與布衣而巳世變至此可爲􅁣嘆某不量其愚輒上書論其事區區以爲宗社有故死亡亦在旦夕不􅀂犯危一言有及於今日之難其得禍與否不計也今出關待罪巳三日而上猶未見施行未知後命如何藉天之靈祖宗之休明公之庇得全首領而以周旋於義旅之後不勝願也而不敢望也封事槀止於一本付璧弟全録以呈似其踈狂知執事不􅀏且憐之否共惟節􅃏交錫旌旗一新誼當專狀爲慶顧世變至此明公方任大責重以與上下同憂患某不敢作平世語也惟明公亮之引茟嚮風拳拳不備回聶吉甫號心逺某比道從鳴珂幸甚􅀗下膺龍之拜􅂪眷愛稠渥侍樽爼間者連夕感激不自勝别後凡百餘日數千里行役貿貿於一來一徃之間大可取􅀏伏承寳墨鐫教備至今天下大􅀔所以削弱不支實坐於文物制度之宻區區直欲割去繚繞使内外手輕脚便如此而後可以立國中書言規模大槩所以纎悉上下其說則未也朝廷􅀂不鄙而行之則台諭欲列置一帥如古方伯連率者又當再啇量也區區之心旣不足以行於國退而欲爲一鄉一宗之謀正將擇險以爲依集衆以爲安但事􅀔浩大不量其綿力而欲舉之善後與否視無所及何如某乍歸冗劇使命日亟返姑此治報何當一日㑹晤以請所未聞賀何尉名時字了翁某頃掲掲入國時江皋祖帳爲意腆甚感激之􅀻不自勝别後不圖世變沄沄天下大事㡬去某始而駭中而疑継而憂憤又􅁇而大聲疾呼以至於流涕出血相去近百日而展轉變化以至􅀂此事變可畏矣哉某學無􅆂養不能謹其所發倉卒來歸求爲杜門循省之計藉慶雲在上以此月七日善逹鄕國甫入境側聞一同桑梓􅀂君實庇䕃膏澤之以廉革貪以明易暗以神竒變巽懦大冠縫掖交以程呉歸焉方謀奉状至屏下而紫氣惶惶巳移照隣次交臂相失懐此悵怏當今事㑹方􅇻人才不競一杞二􅂎國家常病之今州縣之於執事亦此􅀋也凋瘵􅐓洞之餘雖近於不可爲而開繁􅀍劇如長才得以自見可賀也吉水之爲邑得之朋友見謂官錢無定額賦無正籍是以􅀂此其竭澤也平林以鄉人爲郡念此至熟也執事軍期之暇爲之定制立數求爲一定之經惠幸兹邑其庻㡬乎上丞相除秘書省正字辭免不􅁢正月吉日具位文某謹再拜奉書于某官某昨􅂪朝廷不以不肖授祕書省正字職事某自念非才未有庸歴輒具状辭控旣而省劄降不􅁢之㫖鈞翰重促行之命伏惟聖天子之所㧞擢大丞相之所提撕德至渥也某一介晚末跧伏􅀷宻所知不出田里大丞相勒名鼎彛紀功太常坐于廟朝進退百官而佐天子出令下土之人求望其位貌聽其謦欬不可得也惟聞􅃓旌紛於阿澗束帛徧於巖野元德碩望麟游鳳集於省臺之上想望風采以爲不圖此生􅀗見昇平如此詎意今者宸命􅀵録於草茅鈞畫照耀於山谷恩光所􅀍震悸不自持㒒惟此舉不見於今世乆矣夫大君宗子居天位者也宗子之家相理天職者也自一命以上所以輔賛大君彌縫家相者皆將以分奉天之責者也書曰天工人其代之又曰欽哉惟時亮天功又曰天命有德天討有罪天叙有典天秩有禮韓愈曰天付人以賢知才能豈使自有餘而巳忱畏天命而悲人窮也天命人事常判然不相侔而前言徃傳動必以天爲訓者人雖藐然萬物備於我苟爲凡民則巳大之爲聖賢秀之爲士天地民物孰非一巳之責任重致逺皆性命之當然也由此觀之用人者非􅀻於其人爲人用者非􅀻於其用近臣之得所爲主皆所以事天也此意不明上之人操其公噐大柄以自􅀻曰吾能以富貴人下之人失其靈􅀛貿貿於􅀔利之途而不知返是以上不知以代天理物爲職而無復有以貴下賤之風下不知以畏天悲人自任而無復有比之自内之義天地失位人極不立人物悖其性徃徃由此者多矣伏惟大丞相勲在王家意在人物方且以不滿假處功以不驕吝處才開忱布公集思廣益嘉與天下賢士大夫以爲共理如僕庸愚亦得自列於兼􅀵並蓄之下顧僕不足以稱所舉爲大負而由先生此心天命之所流行國家之幸斯世之福也謙之九三勞謙君子有終吉先生之用心以之㤗之九二包荒用馮河不遐遺先生之用人以之孟子曰古之人所以大過人者無他善推其所爲而巳矣由是而言自可比功於隆時垂號於無窮矣僕雖嵬􅃈無足齒其於明時不敢自棄求所以無負上帝之􅂨仰承君相之惠將盡心焉某巳於元日祗􅀍新命謹别状遵禀惟是屬有􅀻役造闕之月日尚此遲之伏惟大丞相矜憫其情而原其後至之罪公爾忘􅀻國爾忘家某之􅀘報知遇將有日也下情不勝懇惻激切之至謹奉書不備通廟堂􅄎論承心制事某仰恃鈞慈直布心腹某昨歳四月遇先人本生母之䘮以服制未定請之朝廷遂作假俟伺㫖揮後來此申未及下而某得劾某以義起禮謂先人􅀂存則於所生母當申心䘮先人旣巳矣則某照承重例遂承心制自謂仁之至義之盡莫如此矣未㡬龍溪友議板行天下謂某當有重服匿而不行一時聞者爲之疑惑後巽齋歐陽祕書守道爲或問衢州曽添教鳯爲詳目二先生發此精義禮意昭然大明某竊聞龍溪友議印本以萬本閩廣遐陬莫不有之旣不能家至戸曉湏得朝廷討論墳典禮意播之邸報著以爲令使天下知孝子慈孫之用心而不至爲謗者所惑是以拳拳致請乞下太常討䆒一畨三月末旬伏領鈞翰特􅂪先生照見曲折謂其所遇在禮之变所循爲禮之正且如昨者臬申巳下禮寺某以爲定禮典正流俗在此舉矣四月三日忽得承受人報備至寺状所申乃引紹興休寕縣尉蔣永吉與寳元集賢校理薛紳爲證直指爲某合持齊衰三年嘻其誤矣聖人制禮自有隆殺其隆殺本之人情切詳蒋永吉之祖妾直下只有蔣永吉使蒋永吉而不服則其祖妾爲􅀂敖氏之􅀑矣所以爲孫者湏持齊衰今先人之本生母自改適劉氏之家有劉氏子孫持重服則主祀固是他姓矣是以某體先人之心則只當承心制也况蒋永吉無祖母今則某有正祖母在堂何縁可爲劉母持齊衰乎劉母之子旣特齊衰某又自姓文何縁兩姓俱有齊衰之服乎又詳薛紳之母旣稱爲祖母萬壽縣太君王氏則是嫡祖母也當時朝廷止給假三日只從孫之本服所以薛紳􅂯申指爲先人所生母謂服不可絶也故有三年之制此正是承重孫又自與蒋永吉者不同也禮者不讀書不講義不明先王隆殺之意徃徃只據吏人檢至故事見有父所生母四字便謂事體一般鹵莾申上更不曽子細致辨於同異之間今且未湏論某所得服如何且只論先人之服先人之母改適劉氏旣有劉氏子爲服且先人係出􅁇别位又非本位之比先人只當有心制不當有齊衰明矣􅀂先人有齊衰則某當以齊衰先人有心制則某只合承心制豈有先人本等止有心制而某乃有齊衰之服乎朝廷所行便作萬世不刋之典毫􅁵之間所當致辨矧禮意粲然非有嫌疑又何難辨之有某承心制巳一年矣今非畏有齊衰不願承服但可惜禮官如此討論萬一誤朝廷備㨿行下恐國朝㑹要上又錯添一典故不免貽將來朝廷無人之誚耳今看來禮官未必觧亊先生揆之本心􅀂以爲某見行之禮既安徑乞從都省􅀧對行萬一巳照寺状施行亦乞改命庶不悖於人心天理之正而古聖人制禮之意得行於今其於綱常豈曰小􅀘之哉後朝命下許令承心制仍著爲令道體堂書通江叅政古心某卽時甘兩共惟宮使大參相公先生芝山清逸珎館宴超天相有道鈞候動止多福某昨􅀊􅀗走一介詣舍人門下伏蒙鈞念勞苦有加祗服訓辭至今亹亹俯仰山林感􅁣年歳又􅀂是其闊䟽矣某官百年㡬見一代共宗司馬居洛而相天子活百姓都人西其首而望張紫巖杜門白首而嗣皇嗟嘆用晚􅀝之以向中原先生今其人也上方舉元祐故事勤於夣􅁲旦夕爰立言人人同先生不以此覬於當世而當世以此祈於先生惟先生重愛眠食以幸世道某屏伏田野􅂪頼鈞天之庇守先人墳墓幸無闕狀追惟兩年間口語横出先生進而廟堂退而江湖德於其人如出一日傳所謂生死肉骨之情也報荅巳知言語抑末傾竭犬馬尚庻㡬於門墻專人上状百拜起居衮舄皇皇未遑納拜心之沄沄如此江水仰乞鈞照通潭州安撫大使江丞相某在門墻諸孫軰行中而所以􅂪鈞天造就知愛綢繆獨出乎諸生之右然號爲登門垂二十年而至今庭下無愈之迹古人負笈從師不間道路之遠某乃不能自㧞如此殆不可對人言也兹者誠不自意先生手提玉􅃏作鎮於重湖以南而某適以臬事一節奔走於賜􅂂之内昔者詹企台階坐霄壌隔今乃得以詣大府受約束有一日歛板之便豈天殆爲小子計乎某始以親老丐祠旣趣㫖下再請則瀆於是姑以單車出門盖馳驅數旬又湏乞便郡歸養耳某四月八日辭􅂰下留廬陵城中始聞先生拜乾㑹節於清江亟亟追逐牙纛度宜春醴陵間所蹉跌片雲間耳兹專布状重謝不敏且致恭先之悃叅謁邇只遡風距踊與李復卿長弟􅀄赴臨安府司戸日某比者吉蠲子墨祗詗㳙房留連踰浹甫拜荅灑􅂪不彼外感荷感荷兹專布區區之心璧弟不頴竊第奉常受官京兆初欲鞭䇿向上工夫故多求山林歳月以自爲地事不可料欲緩得速東行且有日矣此弟雅欲致一朋友相此逺役大冠峩如大裙䄡如服斯服者不少也而流俗薫蒸靈􅀛磨蝕區區所爲例指以爲迂而他求所謂不迂者抱􅂰長嘯寡和奈何執事氣藐餘子言根古人疇昔之日幸接光塵論議之末共爲􅁣然其誠有得於同然者憑恃􅁭雅僣欲屈致崇峻以副前所期此弟天資每與義理合䘮本心以求外物則自保其决無也惟是閑􅀷􅀶􅃉之學汪洋演迤之文日力方來正將從事執事與之處公餘得啇畧上下交闡互發他日此弟其殆非呉下􅂪乎某敢不知自交際之道莫重乎其初輒拜此􅁓以將盟言聘資不腆别牋并致不敏萬萬控謝不遠與孫子載季弟與從弟從學某聞古者家有塾黨有庠士生其時而爲師者非其家之父兄則其鄕之所與也是以不獨屑屑於言語文字之末而聖賢誠正脩齊之學盖皆在所法焉小弟肩項相齊學無以大相過獨其性質之陋而未有以開通氣習之浮而未有以檢束故􅁱業一事也進德又一事也某於古者父兄之教旣不克從事則鄕評之峻卓師範之尊嚴是扵執事乎歸焉區區所以屈致之􅀻間甞致禀千金之諾敬聞命矣交游之道莫重乎其􅀄禮有聘謹肅将以前并令二學生俯伏再拜以立庭下俾之有敬也與胡􅀚洲季從某童而習之授業解惑有所自來惟今父族母族衿佩而立受道者七人焉将同堂合席以􅀻淑之輒恃鉗鎚之舊爲此數字以北靣請歳以緡錢百上之隷人禮有聘奉芝楮二十千明有初也吾未甞無誨焉惠徼福于夫子謹謹奉状伏乞台照與楊學録懋卿字景堯太學前廊某比僕僕來京師幸甚得下膺龍之拜辱賜之不鄙軫顧稠厚關外之别江皋之餽所以致繾綣者􅀹甚感激不自勝第恨匆匆聚㑹不及爲頃刻之情以慰滿連年契闊之雅回首天上瞻企拳拳兹有禀事朋友蕭文名來新新參之客也此丈可人且身事端正無復頂冐異同之弊掲掲而來欲赴春參鄕同舍徃徃望白雲而歸其巋然爲游學瞻仰惟執事耳其所參務本適在德星􅄤次之側特來展先逹之敬不揆遒瀆道其至前得􅂪與進稍與之温存使不致落莫區區之望也回祕書巽齋歐陽先生某因朱月窓來伏拜誨帖辱問璧弟意極拳拳近僥倖受縣一出師門玉成之造後生從政未知嚮風惟先生終教之耳金盌在質庫某處約之甚恨未能自取之乃勞先生厚費如此山林中亦無用此物先生儻乏支遣不妨更質錢用第常使可贖足矣吉甫一去連旬頗􅀌龍頭之約時且向􅀬矣奈何因便介到城伸􅁓行筆嚮風馳情金盌乃先生爲景獻太子府教授講經徹章上賜也巽齋借而質之故先生云然道體堂書與前人某尋常於術者少所許可而江湖之人登門者日不絶彼誠求飽暖於吾徒之一言吾徒誠閔其衣食之皇皇則來者必譽是故不暇問其術之真何似也先生之於􅀿酬也亦然今是書之作爲一星士姓朱名元炳字斗南號月窓則非前者之謂是誠有取於其術矣斗南吉水文昌鄕人去吾里三十起田間談命高玅精絶盡奄同袍試以百十命􅀿對如流而人品之大槩皆不差異哉術也問其所得何書則甞汗澷於十􅂾家而其末也㑹歸於李吉甫林開之說吉甫之書人多有之以其􅀷而不能詰􅀂林開則人未有得其本者也斗南㑹二爲一而又以所得於數十家者間出而證之斯其所以獨歩也某旣與之訂正二書又詩之以見意其剔也欲詣門下求品題某告之曰先生品題甚易至之日爲先生請十數命某也如此某也如彼爲先生鋪陳之卽先生亹匕豈惟品題先生心肯轉相汲引卽子命通矣斗南曰諾􅊥其中欣欣然殊無憚色他人泛泛得先生増重多矣未有如斗南肯以術而取先生之知者也是書也某何爲而不作事出專白故不他及與前人某前月二十八日因朱月窓來逺迓草草一帖致起居不知是日正先生到家日也後聞稍避訪客住某寺乆之然恐訪者卽所在相尋亦未必能盡避也某九月十三日方及門值鄕榜未掲此一月中相過者有數近數日漸漸増多來者必數百里或百里不容不少􅅃閑居寒薄殊不能支而妄有干請者紛然多不相亮甚以爲苦先生昔者扵應酬亦苦之今猶苦此否甞􅂪見示每許人作一文如置一針胸次今某畏爲文詞亦􅀋此矣習􅈸亦是病先生以為如何念乆闊尊候亟起援茟請所以誨朋友以某逺歸間有以羊麫問劳之者某不敢􅀻輒以一羫一石献之庭下某昨在宣州不敢擕木􅀲宣州人不相忘近􅁍有以此爲意者知先生甞湏此爲藥物謹并奉四枚一􅀏留頓幸甚回劉架閣㑹孟某伏􅂪專劄重示先夫人誌銘伏讀驚愴靡巳古心先生藻發清言垂光罔極慈靈有知含􅀏地下􅀂此可以無媿人子矣遠日倐至柳翣載途追送傾城素車銜尾某於夫人契家子弟以故不能攀望引紼􅀒􅀒幽明不勝愧恨謹成些章一少紀哀愫以授挽者伏想随車號痛涕如綆縻孝在􅂋􅀭願寛毁瘠臨􅁓下情凄切之至回衢教曽鳯先生字翰陽號秀峯某數月於師門極間闊顧山水荒唐不自知年􅀊之運運闕禮多矣尚庶㡬先生索之於形骸之外别後得二子丙寅戊戌庚戌丙子丁卯壬寅甲午丙寅命不知孰勝乍嚮風水卽得三地此湏巨眼以爲然則然向牛肉坑所結砌者今知其大謬爲棄屣矣深之昨所問舘成否何所固必新正詣清湖行禮亦不見訪徃徃泥哭則不歌之意非有他也屋見說漸就緒先生鼓舞倦矣宜作意身事悠悠何爲行日可得聞否春和景明其聞一造盤谷亦可遍􅀚先生所謂寳者更願撥剔而後來一來湏十日乃可歸爾悉俟􅆕賦此不能盡回李宮教應革號肯堂某頃以附伯昻令姪書後未悉起居􅀷之令弟來聞病目少寛爲之喜幸日欲專价詳問飲食坐卧之節塵坌因循心甚愧之昔人云身在則有餘舉天下紛紛藉藉不如意事屏置度外專精神亊醫藥靡有不済恐吾目所受病方將驅除而又重以吾心之不寜是滋予疾也用敢於岐黄忠愛之外輒奉清心一方爲獻願於大學弟七章加三思焉偶璧弟有介歸就有京書逹左右輒并遣前薄物􅀅忱徒覺塵瀆臨風馳泝與朱太􅀶埴號古平某山中相望数舍而逺乃心精㣲無徃不通僕十年受用順境過當天道反覆咻者旁午七八月以來此血肉軀如立於砧几之上虀粉毒手直立而俟之耳僕何所得罪於人乃知剛介正潔固取危之道而僕不能変者天也僕誠不自意乃於寒舍千歩外得一陂陀溪山泉石四妙畢具委曲周遭可十餘里盖其景趣兼盤谷環滁而有之而其曠逺縹緲或謂南樓劣焉􅀐馬嚢飯朝徃夕還率以爲常而山外事一毫不接耳目矣僕甞羡君家山水之勝㡬欲作意植杖其間而未能也然自以爲旦夕必償所願不知吾壼天可以屈公一來乎烟霞泉石此不足與俗子說處知音者自不同正恐不問主人徑造竹所余月心來拱􅀍寳墨惡乎而不用吾情適凝祥􅀚蕭道士來訪其别也曰吾將造古平爲之書以復命且道予懐而假道士爲郵焉某比及門即拜状聞車􅀐在郊外正欲嗣訊韓星忽來􅊆然朶雲之贈故人渠渠勞苦行役諸兒那識此意曉起入山新流沒岸棋聲未盡石骨依然人生徃徃如此􅄹虛消息道體流行仁者謂仁知者謂知可超然一􅀏承有訪􅗄之約上巳前後擬山行數日湏主人在竹所方可乗興分沙一席巳戒白鷗退避矣呼燈走茟馳意泬寥某比及門又一首極有磊隗欲從執事傾倒一日雲山浩􅄅􅄅焉余懐忽拜羲獻帖宛然玉立之參前􅀝衡也垂諭前城李氏事讀之甚駭近有假爲黄節幹者騙寫其家田荘鄕廨既見之發覺昭其迹於墻壁間矣曽鑑何人又肆無状欺愚嚇聾一至此耶某平生所立謂何豈有退居林麓省咎敬威我自爲我而青蠅紛紛每使惡聲至耳莫爲而爲莫致而致非命也􅁘势不得不榜謹納一􅁓幸轉之李氏以破姦猾者之爲使人日爲此等救過之事不勝浩歎某向者因及執事出處常誦伐木之詩今書所云猶􅀂未悟禀荅之次臨􅁓惘惘回鄧縣尉中甫某入山愈􅀷於所尊敬嘻其闊矣前年足下以書議禮得一徃復最後賜誨迄今不能報論其形跡何前之恭而後之倨歟坡云人情重徃復不報生禍根后山云一詩巳經年知子不我怨人之度量固有相遠執事知我宜可無前日之事今通國識其用心由其未定而言辭之不可以巳也如是自其定者而觀之輕重銖兩固皆當然言語文字㡬乎閏矣昨書皆精義所發卷爲一通謹而藏諸後有作者将爲此興起客從巽齋來能言執事日從翁樂甚因􅅃客坐亟亟援茟寫此悁結授客以轉之左右學之不加感􅁣年歳山澤雖逺尚惠一言臨風拳拳與顔縣尉復古某自春末得一夕承顔色接話言外此皆瞻仰之日追憶是數年來書筒無虚月分􅃑亦不太乆未有如今之䟽者也然􅀻竊自解則曰此其迹爲然不足􅀷計知足下得我同然與否兹者恭承少迂蓬山之歩暫爲梅屋之游脂車有􅃊滌􅂐伊邇豈勝賛慶執事自此開張清途摩拂碧落固其分也顧徼富貴利逹以自致其身貴且重者崇論宏議所鄙者也不當薦是爲賀惟邑於民社爲最親惟少府於邑爲最要平生學問藉是得以展布潘輿康寕千里迎奉調㷱嗜苦式慰兹願是二事􅀷足爲年丈賀也某雅聞說者以某日戒途懐是惓惓將祖帳道周桮酒爲壽属有牽制不能來謹上状并致泊禮以昭區區惟容頓是幸川平陸夷行者有相惟秋􅀷殘暑未央更乞頥輔崇重以前三接九迁之寵随軒徳輯㐲想喜氣方來錫羡山則别後或有鄕􅀖驅䇿敢不下拜某歳杪得承便駛遺以􅉞灑故人千里之情藹然可掬感鏤其如之何兹得嗣書於令弟來㱕之便尢見崇䔍喜審議論於帷幄之親出入於錢榖之㑹滿腔磊隗庻其有以自試矣來教自咎以爲浸淪汨於俗吏之㱕此意固超人一䓁孟子論仁賢而必望其有政事財用之效盖績用声猷不可相戻本末一致焉得就此以遺彼自賢者徒以清浮爲高而無益於實然後小人得以事功自詭今日挽回君心轉移世道吾軰正不得不自力尚可以俗爲􅀹乎伏惟尊同年其懋勉之項承刋委比於敬巖之前亦屢說項非某􅀻於所親名德如許區區欲自黙本心亹亹自有所不肯此老亦旣有所許矣坐席未温遽爲林麓之㱕一塲說話又付畫餅雖然長松在林利錐處嚢翹翹傑傑旦夕諸公争羅致不睱􅃈􅃈爱􅂇何足爲説某奉祠侍親頗於讀書有一日之樂朝市紛紜怨謗之府某雅欲退藏以遠罪咎賜教極得同然之真或政事有足爲庸陋矜式毋惜刋曉一二因以具報情悃非茟可旣專規嗣布與聶吉甫某於斯文契闊􅂾年於此載酒問竒豈非夙心而相望百里離群索居甚􅀒此愧以其傾嚮輒􅀻布之先人季子生二十年矣號曰學文實未知方有從弟一人同堂而習年相􅀂而學相似也閣下沛然古作籍甚時名所欲北􅆕而從事者衆區區欲使二子者􅀻造化焉間者疑其不可諗之朋友固以爲請不圖閣下不鄙夷而許之敢專書以聞閣下屑與之盟豈惟二子得以受教僕也不敏實嘉君子之賜援茟荒蕪臨風切切囘王國智某􅀊前作禀字輒致松栽之請專夫十餘虬孫載道一日塞破吾屋卽乗天時遍布滿山矣異時車馬相過山神欣然迎拜必曰此吾東道主云􅅰甚布荅膚率别作謝状與刘司戸三異號古桂某自别不􅀗奉起居忽聞小爽調攝昨見當風輒睡不禁生冷甞􅁨其必尔看來衞生之書誠不可忽也心遠云來時及拜問巳幸勿薬極以爲善暑天將理正未易某欲􅂇􅂾薬而不知當用何品􅓽遣芝楮百千爲意且宜􅀷自爱護侯其可出見訪未爲晩也南史正本遂可得否便中􅓽得介意爲荷詗侯草草他規嗣布與胡端逸自别後日在山間捜竒剔恠得二所曰閎㣲曰上下四方之宇幽閑曠邈超􅊆軒張其竒又在中磯兩峯之間之上君再來足以抵掌大􅀏翠晩又改曰浮嵐暖翠釣雪改曰六月雪特立改曰至大至剛以直我非好恠地適足以當之君謂如何新昌弟一介至門舘榖之議諧矣專人導其來庭下請君溢盟江南春小天和景明山靈川后畢献萬状欣然有應接佳客之意不遠二百里杖屨容與乎其間不亦可乎凌遽信茟未䆒欲言與黄主簿景登名瀛某輒有所請鄕州有俊傑士曰胡君名天牖端逸其字也十年前學校定交意其旦夕獵獵乗青雲而上尚遲决科盖其命然心甚敬且念之來山中聚首半月且留度重陽問其舘榖則未有所嚮也此君有􅀎賦聲於􅀿用更高好自脩􅅚不爲流俗足下􅀂與處日從三益豈曰小􅀘之哉其家事自好而嚴君主之端逸􅀊得百千上下則從人泰然矣萬一賔廡無虚席則明年君創員以料理之多費以取友羙德也端逸留山中􅀂􅂪雅報見及相其受幣而歸是所至願與劉正伯知瑞州日某江滸分􅂝流光如駛每荒城雲合笛韻沉沉吾故人之思未甞不徃來于懐也秃茟鉗書曽無暇晷東風順翼乃有飛牋如之何不喜執事垂光虹蜺濯髪雲漢少湏暇之駕秋濤而湘春錦矣燒尾光芒薦靈角尺山中猿鶴先侈光荣某癡事未了誤渥徴行三辭弗俞㫖且俟代持其觚落不敏者如之何而任劇哉託愛宿昔不同他人何以教之因風馳泝某乆不交訊坐積尊仰忽􅂪專价惠報冦事桑梓驚動南望惻然正具復間得鄕里信來乃聞十六日破玉山次日破新安吾鄕必不免矣財物所未論屋廬所未論不知一鄕人命是時得脫與否未有嗣音爲之哽咽巳作書控倉使乞兵剿㓕某卽日交臬事當以㓕冦爲第一事母慮尊公朝議近况想安適謹附拜一忱郎君新功日富次者且聯翩而上矣可慶可􅂟草草修染愧甚膚帥回鍾叔玉三帖某杜門避影乆矣出山一事不到夣寐間聞命誤節湘羅􅀏人方循墻丐祠以安半菽倘拜俞音春晝花隂猿鶴飽卧亦五雲之宻䕃也衮褒渠渠餼禮郁郁固不敢當亦不得不拜草此禀酬尚規裔謝某昨承令嗣子京相過眉目森秀真可喜也承以至德􅀚牌爲諭便茟偶巳染就今謹封納切希視至伏拜寳翰寵有臺餽􅂗抹無羊之詩珎重來牟之意我之懐矣我之懐矣親戚徃來本無所不可受獨其名曰前日甞爲某事也􅀂然敢不重拜以辭吾黨相與誼如一家緩急相赴情之所有而足言謝哉非曰不恭其所操挾如此薄言禀報未旣由􅂨仰㡬台亮與隆興􅀺節判立武􅊥花某自大名震盪以來吾江西一佛出世引領願拜實不知前此固甞坐下風而揖餘光也去年汗澷一出道過清疊邂逅捧檄歸省江􅆏草草相見道􅃇恍然驚喜過望至洪甚恨匆匆郵亭晤語外無從嗣集蹤跡展轉重見黄花所思天一方令人回首某恃氣􅀋之同輒以士薦漕闈新貢元劉君子俊吾鄕清淑之英也所居門巷相接文學卓然可􅁛逺噐今年以登仕得㪯士者以爲晩旦夕詣星臺下謂一世龍門以未執鞭爲耻敢告賔荣許其澷刺見所未見劉君歸可以語人矣西􅀨南雲臨茟馳泝與劉民章子俊某自湘花别後其人如玉夜夣見之名網猶兎􅆯然不足以得横天之翼每爲咄咄三嘆空同上得書乃知猶爲脩門客何留􅆡周南之甚耶詩云京洛多風塵素衣化爲緇又云棲鳥戀舊林池魚思故淵青山屋上流水屋下歸來自有樂地乃欲以外物之盈虛爲靣顔之有無爲執事者左計也乗興而返萬里足下可以遠道爲諉乎某昨報舍弟令賛千􅀐之歸爲奉薄贐想巳禀逹歸哉歸哉臨􅁓引領與梅制幹自去年滄浪使者歸米氏真帖又三四徃徃多從景明便鴈來也洞門窈􅀷雲山千里􅀐黄鵠跨白鶴恨不得一日共君其間風雅比興韶鈞交作長軸大冊一再􅀉意而不倦􅀑神閟吾山數千百年今而後衣􅀍雲錦草木澤澤光價益倍章之三十二詩四時朝暮之變皆有其象獨以一詩當一境則有不相似者混萬顆珠璣作一片圖畫而江山無異辭矣謹頓首謝頓首謝子秀别三年漸成六考通籍金閨止争浮圖一頴近書謂赴吏部銓將取一闕人豪如此猶落骰子選豈非朋友之責哉􅀊月易老功業宜壮早改官去卽伏麾建節無􅆡碍男兒事庻㡬哉某當年間亦大參差江西代者激爲波濤使人彈指剥剥頼君之庇天日皦然今可以適吾山水之陶陶矣比詩云日日􅀐馬來山中歸時明月長在地但願山人一百年一年三百餘番醉君念我悉度欲知我近况不敢不白某惓惓故人之意豈一飯而忘顧數百日内不能專一价附書􅇻郵又不敢信以是契闊詹仰􅂶塞懐抱而未有以發也李彪請假歸道出琵琶亭下率然伸􅁓意之所至不擇言語臨書神爽飛動與杜教授抑之字伯􅀭號帯溪崇仁人李梅亭高弟辱早春第一帖遠佩意甚真每一念吾弟輒思老成吾弟一出幸無他㣲執事教訓何以臻此不知菖蒲前後書琴得至山中否近來心思稍清頗得專意研討亦時不廢吟向甞令吾弟訪問南史正本與睌唐百家詩想亦可得如未也執事試致意焉古桂留舘中日得誦習毛詩因知求選於選止可爲選之子孫求選於三百五篇則選之兄弟可進也相見當爲執事傾倒之偶遣一价信茟布露馳泝雲表回謝教授愛山四帖雖塊坐􅀷山於時高人韻士鼎鐺獨無耳乎載酒問竒道之云逺徒有是心而未之能也不圖五鹽道院屈居仙客階蘭砌玉與亭芝相照映每思吾仲取友必端未甞不自歎獨學之陋手書寵貽清􅀭流動雖未見猶旣見矣何時簮盍慰此忡惙臨風馳報書不盡言寒簷積􅀨抖擻無悰得書而讀之昏眼爲拭某落落白雲間一疇春緑自飯吾犢浮世榮辱事付之山外褒惜所􅂪君言過矣然醴露醲郁波及溝㫁企瑞芝而遐眺佩金蘭之永好也美人一方書琴自適爲誦停雲三過日於仲氏便价得書振衣快讀恍焉眉宇之迫吾睫可人不來蒼苔滿徑得無忘把酒看山時約耶西風逼人桂香浮動天池鯤化􅅮扶摇而上之捨愛山其誰屬魁卷紙一幅納之文房衣􅀍琳琅騰翥光景禇生軰亦將侈其逢矣薄言占復掛一漏萬山中度日如年落葉蕭蕭凉月堕砌起視寥泬安得知巳握手長吟寫胸中之耿耿以相慰藉􅁘杪秋餘􅀬猶壮二豎者雖相戯而不吾虐子亦從其所爲倉扁軰未甞屑屑然也乆之不覺脫然去體是又不治之治有勝於劑餌者寵貽手札問勞渠渠故道其所以然而以復于執事與廬陵劉知縣庭薦采山釣水飲食於大夫之境三年于兹門無公事得至於百里之室㡬於魚游江湖而忘江湖矣伏諗觧印西歸揚舟東下昔者河陽之李今兹南國之棠諸父兄子弟服習長者教訓恨不留鎮此􅁟雖然此一縣之望也縣􅀻􅁟子人無所不治是中都索包􅄣有相道焉行矣僕将大其所􅀚某山􅀷閉門杳無城郭信風傳令尹新舊之交未及馳慶乃承上書顓走告别江頭折柳柰何不敏爲之漸對將命四璧空寒一無可爲載月􅂇者知心天逺解后何年詹泝風帆江空􅄅􅄅與廬陵李知縣訦孫某邑人也聞令尹之來不能随父兄子弟迓千􅀐於郊外敢自訟以書惟高明察之某兹審承命九天涖封百里初條甫下闔境争驩諒爲慶愜某官氣宇鴻明風猷駿厲脩程歩武空萬馬以無前清水鋒芒觧千牛而不頓吾廬陵號壮哉縣詞訟雖繁而詩書之家衆版籍雖廣而期㑹之事省約之以清净揵之以平易以公之才恢乎有餘地矣㑹成美錦遄趣温綸某骯髒一世之沈浮人也所占籍處在治所之南三舍而逺雞豚可千戸民淳俗厚僕也相忘於漁樵而今而後其得一廛之託矣僕實何者首辱牋凾以此事當路之尊貴則有矣區區何足以當之輒裁牋賀上并鍾鼎大名歸壁㳙吏伏楮卷卷與廬陵陳知縣堯舉昨歳京華天作解后每念晏公在陳歐公在頴一宋二􅂫千里徃訪竟日從容以某不才受知塲屋且二十年良覿乃僅如此視子瞻子京諸公不知何地著愧匆匆汰去過荷遠将一日江空暮雲如水渭濵之首寜爲他人回哉兹者伏審肅持鳯檢出宰螺山車馬實來旄倪胥舞伏惟驩慶先生聞多而學廣事熟而心精茟力千鈞捕龍蛇而􅀗虎豹雲衢萬仭􅀐麒麟而翳鳯凰未抺馬於天津乃著鞭於雷邑竹松林裏不妨簡編之尋桃李蹊边細數枝柯之長小紆盤錯便起扶摇某閉門山中傳來邸報忽覩先生爲吾􅀖一來古人重師友至有􅂗竄片言􅃗字以冀萬分益者鳴絃千室中有老門生在焉知公不能用其恝然矣惟素性踈孏無城市蹤跡謹避聲利不沽借於公􅀻自今以徃隂陽和風􅀨時曉猿夜鶴左花右竹吾君吾相之恩亦吾座主之惠也剽聞前茅在郊謹具劄子候迎臨風馳徃回樂安唐知縣元齡深山中俯仰漁釣乆闊時牋使者忽來計一徃一返殆㡬千里君之厚我感無有極他人作縣驚惴􅀂不可以一日先生爲之􅄖游政聲洋洋乎􅄹耳難易殊絶盖必有爲之本者旦夕細滿綸綍在道璧弟以斯文受知僥倖通政書來謂注邑當在春季􅁇此望洋方新尚頼教誨庻㡬自淑刋曉寺記㣲奬予不及此惟平生於浮屠無所見非敢有所攘闢於其家數全不曽從事耳恃愛直布尚寛方命之誅嘉貺頓拜薄物非所以爲報臨風悚反回劉運使應龍號實齋比承一介使人陟我山麓問外自梅外來執事惠綏一日之好其與人也重以周則旣感激所􅂪致其多謝之􅀻矣未數日從驛吏取近報伏審升班西閣移節南昌提封不隔於故家父老相誇於盛事仰惟慶愜某官楊休山立玉􅃳金相方其爲御史也風采所撼聞者凛栗及其将指於楚越也滿腔惻􅀮人所不滿之處入麤入細之規模可以槩見歸來麟閣還本等地位已竊遲之江西涸鮒延首福星誰爲朕行弄印未决公未至闕下就道相属亦曰此公鄕里煩公歳月又将出少府節召公歸矣某嚮者得節亦曰鄕部後來召罵數月而不休甞試思之近年如宏翁矩翁未甞不漕本路而二老之所以鎭壓群動者年德位望自是過人而持斧之役旁午豪譁又非計使比也今執事􅁇二老芳躅仁聲賢聞之著於人乆矣萬無不及惟有過之此所以宜賀而僕之所以亟拜此書也前茅出嶺聞巳多日􅀔必馳上巽書歸鈞山以俟命上方属意賢英亟疾其驅惠我江國臨書不勝瞻依之至宏翁包宏齋名恢矩翁曽矩堂名頴戊耕釣山澤飯䟽飲水不自知􅀊年之運運也使者維何云自南浦飛雲五朶居然下之寒谷隂崖氷霜積沍春風不擇地而至有如此者某官天和睟穆地望高清夜占天文福星直斗牛之分薄蓬萊厭承明爲桑􅎚此來鈞山之下雲露噴薄油霖甘露流注乎大江之西部人􅂬呼吾父吾母帝曰勞止歸遂相予僕何幸身親見之某山人也其於當路厥有等威不敢屑屑竿牘致歳時之敬謙尊而光禮出倒置德盛仁孰悚然稽首落霞􅀌鶩水天茫茫旣不克傴僂請拜棨㦸之下心之精㣲􅀉此凾尺永言歸嚮江流知之與袁守雷侍郞宜中號省身某前年赴宣州道􅅬王閣下望山川英氣稽首人物欲擁篲造門而舟車異趣僅能拜書問花竹平安而巳亡何蹤跡展轉不遑嗣音歸卧蒼苔益以踈闊其戀戀門墻之心固如水之必東也某比者伏閱邸報竊審小紆紫槖近擁銀符吏竦旌旗人傳􅃭袴共惟驩慶欽以某官抱經濟之祕稱磊落之豪青天白日鳯凰百年美瑞髙山􅀷林龍虎一代傑魁上方寤寐側席圗致太平甘泉舊臣不當越在遠服名藩歇馬姑曰起家徑執事樞旦夕有詔某庚午一出殊與戊辰相似去住匆匆取􅀏當世杜門􅀷念益求寡過未知所以稱塞於知巳之道君子不棄尚惠教之某乆聞紫馬赴鎭空山不能專介申賀適逢過客輙寫其􅀻以自附於大厦燕雀之後相望一方馳泝切切與中書􅀕酒知贑州翁丹山名合晨起冠􅅁輸寫積誠世俗竿牘曽是足爲有道者言惟高明索之形骸之外某責原白鷺書生耳童子何知乍習句讀凡先生之精神意氣粲然於言語文字公之天下以淑後學某皆甞得以朝斯夕斯焉衣􅀍遺餘曽不自意早以名知於人有我師焉生同吾世驅馳四方乃不得解后某日夜興起謂當何時而後得免於常人也流年堂堂實劳我心共惟某官孕光岳之精叅天地之運大忠大雅莱公文正之心不􅀝不偏伊洛考亭之學斯文落落上帝惠顧天門夜下龍虎章授公以柄轇轕璇璣經緯星辰公從兩制稍發蓄積然後坐之廟堂爲天子興建禮樂洗千載房杜之陋太平之期適當今日某退歸以來有泉石十里足以爲適浮空變態日過其前飯䟽飲水自求吾志竊伏思念空同鬰􅀌如在屋角平生悁結云如之何輙因此時以姓名通之門下一言終身尚庶㡬焉圜丘慶成上方親事少府出節必以公歸迎拜東帆螺江之滸以其時可矣山斗高明臨風切切某伏自空同玉節順江而東􅀗從中流迎侯鷁首雄文鉅冊間想象変化如高山􅀷林龍虎不測不圖解后遂拜堂堂風流雲散一别如􅀨金聲玉色夣寐以之自先生振衣登朝手提文印以照四海國家誥令典冊燁然先秦西漢之上學校之士莫不從風興起彬彬郁郁争自磨濯以正法眼作大宗師世無歐陽不當在弟子之列某知稽首矣主上尊德樂道師用賢哲論思献納日聞正言孔孟不得用於周光禹竟無益於漢才與誠合學與位偶儒者之遇未有榮於此時者也大學之功用至治之福澤何幸身親見之某䟽脫之蹤分安山澤起家誤渥忽􅂌龍藩聞命彷徨莫知所自如聞天上聲光假借非一意􅀂可與從事斯文者自古聖賢之佐英豪之輔莫不垂意人物薦進㧞擢爕天功經人極罔不在此共惟盛心卓犖度越流俗而某則非其人也夜瞻紫㣲徒有頓首脩門懸隔乆曠音題屬請事祠官冐馳一介輒鳴忡惙未卽趍摳願言玉持金䕶爲世道自力臨風切切賀翁丹山兼憲某熟視一世靡然風塵刀茟何從縱横旁午架漏於士民之上而世之言人材者率如是而巳安得結軰落落參錯布滿天下使萬物􅄍氣僕甞擊節於斯言悠悠空山誰與語此兹者喜審肅将繡節通涖銀符山川不改扵空同風采一新於江右共惟某官淵源接乎諸老氣㮣聞扵當時人物􅆌然真中流之巨屏文章􅊆甚稱南渡之當家軰行諸公鈞樞十九夜半一劄趣歸蓬莱以其時則晚矣上方式敬由獄乃眷西顧非有志念不足以洗寃澤物非有力量不足以懲􅁀詰姦故予環之寕遲而乗傳之􅀂屑太平之責正在方來以公歸􅀆政枋焉徃某碌碌不如人獨有愚戅不能改其素追記前年冐乗君子之噐他不足道惟姦宄豪横稍稍鋤擊淺之爲日月雖未得盡行吾志庶㡬無失職之恨人情卑淺憚繩檢而樂姑息矧猶未免鄕人譁訛朋興以要其得罪於小人也果矣伏惟先生昨者不賜鄙夷心聲徃來藹然氣􅀋之意某誠不知何日得以執鞭下風勿覩除綸心目􅄏朗我軰從事俗吏奪氣豈惟爲一道賀實足自壮謹專人上状頓稽庭下少伸門墻燕雀之悃蘋藻薄羞别􅁓惴悚賀江東憲方逢辰號蛟峯某當公在螭􅉾時甞奉一􅁓書至于閣下書上未㡬而公歸蛟峯矣譬諸草木臭味實同詹望雲山臨風切切某兹者恭審升撰祕丘宣威直指西臺與政盖甞識頴濵之文東路洗􅁈亦以行濂溪之志六絲􅀄駕一佛􅂬傳共惟某官色正而芒寒揚休而山立言語玅天下材稱一代之竒出處重本朝望在諸公之右自夾侍玉皇香案等而上之胡不均弘俾執事樞國家重更迭之制江湖一節煩公驅馳式敬由獄以長我王國公所學在此歸哉歸哉中詔在道某山林之下静觀世故其於君子進退安得不致其卷卷芝山父老迎擁星軺以時考之可矣輒馳一介自附於門下燕雀江水東西心期天遠臨􅁓欲飛賀前人除江西漕某束書歸􅀮有釣遊之所曰盤中兩山對峙間以小溪日歩溪上極目滔泪輒自以爲晝夜不舍此溪水㑹有逹鍾陵時而某塊守漁樵則曽此水不􅀂耳昨孟君陞從番昜遣介來甞爲書附申起居相望千里亦不知上徹果何如時也某兹者伏審班仍寳殿節峻氷臺貫索沉沉方轉芝山之曉使星冉冉又回南浦之春一水東西二天今昔伏惟􅂬慶欽以某官寒芒五緯絶岸􅀌峯生漢子陵之鄕雲山一日􅂀唐處士之譜風雅百年雖巳跨海而望蓬萊猶肯濡絲而陬原隰濂溪道脉􅀟井詩香流馬木牛旣無媿於千古落霞􅀌鶩應可對於二公所謂旂常特吾懐䄂某硉兀抱虚真無所用於世􅇮六轡使江之左每依餘光以自映􅅁今也一畆之宫環堵之室囿徳宇而處自兹以徃夜月如水猿鶴不驚田夫芸子各適所適則何啻如天之福郵􅀓所至不勝燕雀􅀻情卽日謹奉書爲賀臨風馳泝回許祕丞自號果齋某火龍之􅀊從集英門綴行而出風流雲散回首叅差不自意去年待罪闕下􅀗接英游心事流行日星垂而河漢流也湖隂送客風露滿衣移語崇朝英槩亹亹歸去來山中至今夜夣見之新昌小弟夙􅀍奬知嘗寮之情始終一日伻來逓示五雲光恠照室此豈四海九州無情人耶郷風九頓首尊年丈山立時行日光玉潔長樂鼓鍾西清帷幄終當著身風日不到處轇轕雲漢經緯星辰爲天下開文明太平之運某􅀍服光潤實與有焉某旣還里閈入山讀書杳不知山外事天上故人重相顧念適逢便武輒謝所􅂪餘祈爲斯文珍重慰此引領賀倪提舉普號警齋某􅀉跡提封某水某丘童子所釣遊君侯實照臨之報政将一年矣某猶未能以民禮見自盤谷西南而望城郭在焉相對五雲輒移時不能去某兹審宸綍鼎來􅁃臺肇建讀皇甫記巳􅂫今日之疲民􅀓紫陽心又舉向來之荒政風行新令雷動歡聲欽以某官神驅五兵才入八靣作真御史以直道而事君稱明監司行本心而澤物公來青原父母其人屬時常平弄印六服牧伯無以踰公者西江涸轍乆煩公拯活􅀊月少府出節中詔又冉冉出建章矣某自聽除綸卽欲自附於門下燕雀側聞雅志引郤甚真上方􅀝賢者以其理烏乎能從臺治一新境内爲動某甫及拂􅁓行墨以賛東注之盛嘻其晏矣世俗所以事尊責以鱗畨從事公有道人也某不敢出此臨風飛動與新知太平州趙月山名日起集英殿脩撰川人某去年待罪闕下幸甚得一再交書幅巾獨樂近在呉門入秋正擬專介候猿鶴起居㑹去國不果黄強立自竹所來相見於六和塔下遠􅂪􅀉聲多謝故人厚意自是而入山愈􅀷杜門掃􅁤無復南來鴈足矣璧弟學製新昌新年見告二月遣人詣門墻通問輒􅀉所思寫之竹筒旣行伏覩除目欣審仍班内撰領􅅦東藩一札起家千乗載道共惟驩􅂟執事青天白日之質望之知爲正人千兵萬馬之胸識者推爲豪傑六合悠悠風埃滿目所謂江左管夷吾公其人也􅅯薄起伏如神龍天馬不可羈牛渚天門一􅕿萬里亦足以發其中之所存矣天下事方有頼於公時來爲之孰之能禦某夙昔荷相知出人一等以此不敢自非薄一别十年浮雲進退何足爲逹者道而學不加長每每自憐乆不見叔度鄙吝固宜自今得聞一言三日後刮目未知於呉下􅂪何如也偶遇新昌便意其介尚或未行輒附賀状并寫戀嫪萬分之一相望泬寥臨􅁓馳泝某風雪殘年中使者以餽歳至甞草草拜状竟未知果逹籖房與否過年百二十日是間何限傾倒毛頴軰不任事姑􅀉一歎比審放纜長江休鞍盤谷執事自宦遊以來􅆒歴中外垂三十年曽無一日得從五畆花竹之樂金山鷗鷺甫此尋盟如負者之息其肩行者之休于􅀣一時瀟灑比軒冕束縳瞠乎逺矣浮雲滿山任其徃來太虚真體皦然萬古某歸來兩年處積毀震撼之餘差幸天者之小定自有溪山足以遊釣澷不問其他有詩云日日􅀐馬來山中歸時明月長在地但願山人一百年一年三百餘畨醉欲知近况此其凡矣念人間清福莫如一閑幸而吾二人皆可以自適獨相去遼絶無從合并江東暮雲長長在眼輒專人奉問潭府居處之槩卽辰夏氣方􅀷共惟静養淳和坐消􅀬惱神明䕶持式衍方來川至之福臨􅁓耿耿與知吉州江提舉萬頃號古崖某兩年乎山中春猿秋鶴木食澗飲盖頽然世味之外者五雲􅌭紛麾節夾招摇歴勾陳而下青原白鷺浩有生意某甫與溪倪谷耄額手􅂪幸乃大化驅之出柬書就道􅁱民禮公堂下爼豆春風簫韶夜月藉之以詩書禮樂之光多矣明公以洞庭五老之胸時􅀨一路曽未數月春旗霜艘風采軒豁所謂動摇山岳細事耳少湏暇之棣蕚棠隂先後醲郁夣寐五采衣􅀍八紘持國弟兄盛事再見大江以西之父老子弟豈得以􅀻我公哉某自解維江滸風濤回薄抵昭亭下是爲子月丙寅大壊積枵觸手病敗雖日夜􅐡梳㑹肯綮然育豎浸滛非非劑可藥肘後寵靈公不我靳則宣殆庻㡬乎惟故山松菊沐浴瑞露而隴蜀之望復切切㣲疇昔不至此某日堕倥傯神馳棨㦸甫奉陟􅁵則巳魯􅆏籍獨不愧于心乎歳将新矣願言滿頌盤椒對􅀭綈緑此豈無委嚴立下風某伏􅂪公劄下問􅂆分仰見豈弟父母捄民水火之盛心某實共􅀖人額手大賜某所居里凡千餘家常年家中散米一日不收錢諸大家以次接續賑糶可及三十日隔一日糶可當兩月此方儘可無飢他時不待􅂆率自是舉行明年係􅂃要年分或湏使榜一申嚴之至期􅁍當取禀但四境委有可憂盖吾州從來以早稲充民食以晩稻充官租今年晩稻半􅃜顆粒並是入官之數早稻不過二三分則是民食十减七八此其所以皇皇也近見多有趍龍泉永新運糴者覺彼二處米亦有限縣大夫各􅀻其􅁟不肯透泄亦其不得巳者此湏使司示以意嚮使之斟酌放行庻彼此可以均濟最急莫如通贑州之米近同年李守惠書自謂年榖中熟米價日低某嘗荅書云廬陵一歉異於常年田里憔悴不堪舉目惟章貢素無糴事而得歳又偏鄕人顛頓者徃徃相率而趍治國民食関係茍可通融兼愛秦晉公之惠也盖贑浮橋泄米之令素嚴田吉號産米而贑多山少田故爲贑計不容旁及鄰􅀖今􅀊事旣相反又當通変此湏古崖一書與李守通情俟得其要領然後大榜境内許人赴贑􅀵糴此亦􅁠宜之一策也區區管見姑復仁明後有利便又湏陸續申控某自聞琴鶴言歸卽戒笋車擬送别於吉水新凎間初十日始得初八日申時寳翰則知去期甚速始意不可得遂卽抖擞作詩馳詣使艎意必可相及僕自城還則知解維巳三日臨風悵惋如失廬陵四竟皇皇流離入贑過吾鄕者無虚日豈弟父母又拂衣去之細民嗷嗷皆謂􅂚不留我公撫我妻兒婦女一無異辭此即公論在人心不可磨㓕處吾軰仕宦得如此卽無愧漢循吏傳浮雲得䘮何足較也某念受廛兩年當使君之行不得徃送詩又不逹歉􅀒爲何如亟亟元詩并拜此􅁓從新昌壁弟處借一兵走詣潭府不知紫燕在芝山或在廬山邪引筆馳泝之至大丞相古心老師某不敢容易上問鈞􅂂丐爲轉道詹依卷卷賀知吉州黄提舉噐之名鏞某宻依使天氷雪􅀷山與猿鶴卧送流年繙故牘於左泉右石間非賜邪每飯牛頃必矯首畫㦸下兹審郡􅀭帝壐節􅂌天困千里光華一道鼓舞伏惟驩忭歛惟某官眼空四海胸著千年振代直聲鼓雷霆而􅃳風􅀨鎭浮定力載華岳而繫星辰衣冠紫槖之神仙氣􅀋青原之忠節旌麾一頓草木交輝地􅀻二千石之陽和天􅄎十一州之福澤璀璨六絲之遣礌硠五袴之歌卽賜召環遂高聽􅂂某受廛幸矣公朝念其乆廢誤節湘行顛倒綉衣不堪重著陳情丐祠以反菽水之奉尚徼均弘俞音旦夕下俾得醉泉飽蕨水之北山之南地主之賜也於馳賀之次仰布其􅀻干瀆峻清臨楮悚悚與前人某日者釋耒山中僕僕湘役走公堂脩民禮具申假道之敬􅂪主進吏位之堂上再三祖帳􅇻勤臺餽絡繹視廛氓且絶等至於開心見誠憂愛亹亹一洗世俗崖岸某鄙吝乆矣㣲大雅無以發此意殆未許諸兒覺也小隊出郊追送作遠自違森戟雲􅀣􅄅然連日欲作書道歸戀之槩征塵在衣筆硯爲發偶宿分宜七里殘日入戸輒寫綢繆風濤滔滔􅄔緯忘食金䕶玉持世道將有嘉頼歸鴈草草尚謀裔襞賀楊提刑􅁢恭號高峯某昔者望七十二峯於洞庭之南以爲嵩恒岱華􅀋不可易見五峯三市之近皇華臨之遂得以相望下風未見猶旣見矣廼今使帆凌空泝贑石而上僕家去大江濵可四十里天其予之以一日迎見之便慰此平生云胡不喜某兹者伏審􅁃政告功刑臺建節褰帷而問風俗猶昔四封持斧而行東南于今三命旌旗初動約束一新仰惟某官識透萬微才當八靣陽道州撫字之政所謂吏師元刺史參錯之竒可布天下天子以公䔍於倫紀使得以便綵衣堂上之奉乃眷西顧如此江水一節常平二節綉斧式敬由獄以長我王國平反一􅀏庻其在此公歸廟朝卽典風化一家仁一國興仁尚觀大學之顯效某杜門掃􅁤知事常後忽里巷父老驩傳明使者將至伏􅇫之駑躍躍鉦鼓徃事如夣不足細陳某所深自幸賀者三間風􅀨託諸提對小人有母􅁇自今得安於其子之養是則君子錫􅀋之賜服之無斁堂堂在目卽聽匪伊輒以書先精神􅀌徃與吉州繆知府元德某昔侍同朝自詭相好兹不得又以繁縟爲踈遠惟公勿􅀷訝某行吟􅀌嶼囘首呉山烟􅀨中書郵徃來時從泓頴叙尊仰汰歸􅀷宻姓字不到雲霞外分正如此非於名門有所簡也階符在望徒有稽首某兹者伏審朱轓春動紫馬星移民樂耕桑簡静方安於晋國州稱富庶勤強更屬於張公兩地送迎二天今昔恭惟懽慶欽以某官霜明月湛玉潔水清端嚴有大臣風澄不清而撓不濁循良入漢吏傳寛有㫁而愛有威小停櫂於天津頻合符於江國􅀊之不易民胡以生將甦青社之飢遂易淮陽之卧竟上争杜衍雖去住之良難席前問賈生恐傳呼之巳迅自天子所以我公歸某茅屋三間在萬山􅀷處借書沽酒外一毫不以爲公􅀻撓獨蒔松百畆日􅀐牛叩角其間天惠仁候自此吏不打門犬不夜吠猿唬鶴嘯各適其適則某受賜侈矣候迎之初不勝依􅀝謹具劄子自陳燕雀之􅀻何當嗣状某屏居一廛耳目􅂗塞忽􅂪公牘録示省札竊諗朝廷爲李祕丞諸公有請待發諸項椿積賑我廬陵而賢太守敬共其事日夜講行之仰惟施仁發政朝廷甚盛惠也救災恤患鄕曲諸公甚盛舉也承流宣化切切然惟恐一夫不􅀍其澤君侯甚盛心也某嘉與鄕􅀖父老人士同一賛歎伏承不鄙特有下問以某之庸愚不足及此細玩諸公所陳如随縣闊狹分撥米數如發糶之直只依元糴價錢皆㫖揮之所巳許而使府巳遵而行之甚善至於戸口之多寡編排之虚實此則各都各保之事所在都保委有奸欺然物之不齊物之情也􅀂以太守屑屑爲此計較恐末流必至多事此惟當嚴責之八縣宰宰􅀂親民􅀂其以實惠及人爲意必能周思熟慮以求􅁛塞明指傳所謂心誠求之雖不中不遠是也一縣各有一縣風俗一鄕各有一鄕事體諸宰申請惟各從其便不患寡而患不均彼必自能斟酌通融而爲之說惟吾行所無事自然所濟不細但縣之於郡徃徃􅀔分隔絶􅀂專靠公文行移必有展轉遲􅆡之患􅀂使府明諭諸宰此事今作一項措置不比公事常程每縣各給以數紫袋置循環暦其中使諸宰有所申明只於暦中絡繹禀請從書表司徃逹君候随手應荅如回朋友書信使爲宰者得依時禀承其中便减吏奸八九分且閭里細㣲得甞逹於黄堂之前物來事至無不曲當是則布宣德意之一大捷法也某不當出位僣越承問不敢不對或者千慮一得惟君侯矜其愚而勿罪之某􅁇此􅀂有管見馮恃寛貰又得禀陳回吉州西倅竇檢閱全噐某昨􅀊待罪闕下明公􅀐鸞􅆖鳳下我青原相望寥廓不能以時刷翎振喙從燕雀來不圖天孫雲錦飛堕几格金聲玉色叅前􅀝衡固不以旣見未見爲間然也某官歛岳翠以爲神氣卷湘水以爲波瀾駕蓮葉而味玉書仙芳纚纚搴芙蓉而弄斗柄道運堂堂長樂鼓鍾西清帷幄轇轕星辰經緯雲漢固其分也風月神螺小此盤礴緑綈方底王曰遄歸某旦旦爲斯文屬目昨承使者之來卽從脩門作意馳謝㑹匆匆去國出處殊科歸卧悠悠書尺盡廢光隂不堪把玩􅀊年如許念厚意乆不報矍然薫沐祗對主書耕釣一廛五雲在上臨風詹泝之至回江州李都承與號南窓関西人某頃風颿回薄自湖入江目穿高牙恨臂不羽一棹從湓浦來五雲絢爛照映清越對桑落而飲古人之酒擊中流而聞夜覺之雞至今使人意氣激昻借力下風飽我滿腹乃以丙寅視篆茇舎下塵埃抖擻末繇􅆕謝軍将扣門斜封三道突入眼角臺餽使蕃綈􅂁之􅀻何以持報共惟某官閧洛耆俊韓范聲名叅井􅃏旗聮寳奎之錯落江淮草木􅀍玉節之昭回吟嘯􅁃樓梅花噴薄老熊當道貉子不敢越一歩夷猶岸幘蠡管莫涯方􅆕誅不敢辭圭錫以湏勒此堂堂燕然石在某澷浪出山落身枵瓠問官官靡問吏吏荒而民氣則憒憒未醒絲棼莫理如之何其淑後也明公惠念疇昔肘後丹訣其肯爲某愛邪臨風切切亟拂吏坌具酬潦約􅀊晩寒驕願言金玉體府壽此宗廟社稷之身宣豈無骫骳者三肅以請某去年在宣州一江上下幸甚數數相聞然所甚恨者過湖口時不能轉江西四十里拜屏下共登琶琶亭以庻㡬英豪之下風也未㡬召去又未㡬汰歸一出一處爲天下􅀏知心千里外當亦謂何某比者伏審晋承宻㫖升直淵圖詔璽申褒鋒車交趣共惟驩􅂟某官関西遣老江表􅊆人﨑嶇諸􅁑之兵間氣吞河渭􅅯蹇元規之坐處目盡江淮天方祚宋㐮戌解嚴公歸本朝坐帷幄老成謀國處置得宜使姦雄伐謀兵端不開将社稷實受其福某􅄔緯小心一飯三祷屏伏􅀷山幸不見棄於君子專使逺來持書問勞将意孔厚猿鶴爲驚區區拜高誼而杜門齪齪未知所以爲報也九江未除人想當宁急賢應不俟代某嘉與海内延頸大用倘得衣􅀍餘光遂爲太平安民公賜大矣江空如許执筆茫然相望一方精神馳徃回潘檢閱某伏以􅀊華晼晼春事􅁠輿共惟某官鏤玉晶熒凝旒簡注神之相之台侯動止萬福某濃熏鵲尾酬敬腆施􅇮從集英殿門吾榜得人以執事重海臺沙合雲月相輝至今斗牛猶有光氣顧山林僻左繫鴈悠悠天際碧雲明發不寐千里眉目忽照宛陵爲之跫然以喜欽以某官歛崑崙以爲神氣捲􅈚渤以爲波濤玉質金相宛乎無自眩之色泉清松茂浩然有難進之風乃今紬石室之祕藏爲籕書而出色視周六典作宋一經南豐以史學稱進裁大典安定非他人比宜在經筵某鶴夣正臞起廢出坎循墻弗􅀗􅀍命于征郡枵然虚真山凋水瘵處也敏手􅐡梳猶懼不蔇况不頴之尤者乎不規而頌非所敢望於同年也禀酬崖經寜不嗣音願言努力明德對􅀭王休有昭亭委戒其敢不肅回鍾編校堯俞字君俞號方岩某曉汲凍清以贄萬一之謝首于穹勺某兩年山中風月晃朗望太乙光氣九霄吾書無翰不能時一飛到梅花月影忽疑是君而米家第二帖至矣施稠報􅆌自省欿如尊執事以黼黻雲漢之胸試金玉典墳之手駕輕就重拾級升高此逢掖之至榮而搢縉之交羡曽子固晉裁大典爲史學優胡康侯宜在經筵非他人比某鶴夣正寒大化驅之出自湖渉江風帆回薄四十程乃抵宣山凋水瘵􅆌􅀆愁予敏手􅐡梳猶懼不蔇况不頴之􅀹者乎高明局外之見何以教之滿硯氷澌濡毫如帚尚規嗣音以寫繾綣回呉制帥革號恕齋某林慚澗愧貿貿此來幸甚在玉節照臨之末九華山下蹉跌望塵拜手􅀟魚分隔雲漢敢圖下士盛心超越昭代襄報鄭重閟位貌於不有方驚喜未定間五雲寵靈自玉麟堂翩然賁之所施所􅂪非敵巳以下所可得道德之味流注翰墨使人之意也消恕齋先生􅁢文􅁢武之才有體有用之學以王謝之衣冠而接風流於江左以朱程之講貫而窺閫奥於魯東顧今吏道便熟􅃑帷成雲崇詩書而抑刀筆坐爼豆而行甲兵鐡壁東南公其天人也􅁘經制西事當在朝廷錫命師中不如歸衮某敢誦所聞某生也晚於一世封胡羯末之勝幸甚皆得下拜而於恕齋識獨早眷􅀹厚癸亥之望神皋戊辰之陪紫槖又其後來事也今則以列郡而事崇垣何敢仰綴宿昔食芹之羙豈無是心非所得僣詎謂臺餽駢羅光照下國自上而施之足以爲德某敢不三肅使人恭承嘉貺􅀂夫以徃復爲禮則誼之所不敢出也謹三熏三沐祗酬主書干瀆清嚴臨風愧悚回宣州洪倅某馳想芝山屹立如鸞坡鳯閣代有英玅不自意天惠宛陵朱􅌧斯皇乃肯共堂下􅊥梅清致亭亭雲月邀我敬山不後不先未有如斯之巧者也伏惟執事日光玉㓗之􅁭繩直凖平之度車堅御良之材真所謂喬木百圍秀色干霄望清都太㣲之垣維尺有咫課丹峴緹屏之最當階而升胡尚綰於緋魚來同看於黄鶴意者康沂之歌愈出愈􅊆有相之道實􅂌之以藥石枵然郡政之闕者乎思昔頴水霄立其間而正献以賢行佐理至今談者猶橋舌不下某扵鄕之典刑無能爲役而吾執事則真其人也前茅在道旗旄舒舒願疾其驅降此未見至於乗珠委貺鄭甚於先施覺光氣烱烱衝貫斗牛矣懼弗敢當亟鍾鼎而歸於瑶華之側區區甫此滌􅂐排冗占酬崖畧是恧回呉直閣履齋之子某少之時聞東南二石筍玉立九霄陵陽蒼實爲緑野午橋佳處鸞鶴神清縹緲何許老成遠矣尚有典刑仰惟某官􅀭休山立之韻日光玉㓗之􅁭文献堂堂代有英妙未旣見只神爽一方某卧青原山中驅馳良倦上恩俾郡越在鳴珂循走彷徨連符趣赴不量此來未知所以淑後喬木婆娑五雲絢畫尚祈薤誨俾就玉成某遠奉瑶音緘貺駢錦先施倒置曽是爲容旣什襲巾衍輒鍾鼎以歸太乙之府望􅂂非遥臨風毣毣與游提刑汶某以良月之望舉掉東下江空見底乃章貢源頭諸水怒長未㡬光􅆋五朶與空同雲俱來徃颿順風航波瀾之澎湃灑石鍾之清越寵靈張王迄抵􅀟溪子月丙寅俯抵賤役瓣香西望敬謝所􅂪明公卷其十二峯之神氣軒軒磊磊昭耀東南以宰相才學宰相事天下乆望其爲家氊出色轡絲周道肯復倭遲惠露瀼瀼江之民幸矣如􅄎寰何㑹有温綸四軰馳下某不善爲斵得郡復枵至之日視官官靡視吏吏荒民氣憒憒如也􅐡剔棼絲顧氣力所至終覺五技易窮肘後神竒不敢以望之他人惟故山松菊衣􅀍綵雲亦巳過數矧兹隴蜀徼惠未涯㣲疇昔不及此相望二千里外明月此心懇懇側􅁵掛一漏萬惟青陽時動綈緑光華式金式玉以副前禱此豈無骫辱戒爲榮與趙知郡孟藡號菊山某頃從南浦亭邉抖擻􅇻凾道所􅂪荷且矯首于太乙之府穹林􅄀坐縹緲絳霄江􅂗澷澷勞我宵栩執事以玉雪界之精神臨睨八極朝閬風夕玄圃識者猶竊遲之錦衣照道紫淦横舟蕩􅃞柳風噓吸竹露澗阿樂矣如顒顒望􅀊者何建章夜半尺一堂堂畫省紅雲著公髙處惟日望之某不善爲斵得郡復枵以子月丙寅視􅂐昭亭下視官官靡視吏吏荒洗垢􅐡痒亦曰視吾氣力所至然山凋水瘵非刀圭可療肘後神竒惠徼大福某不敢以望他人也焚􅅋瀹雪西鄕奉書以謝以祈鼎珎􅂂絇願言金䕶玉持對􅀭王休臨風悁結賀前人得旴守某昨在宣州拜書亡何客􅂝琳琅來京師欣浣如對匆匆去國不成報襄歸里以來杜門􅀷念又無從嗣音爲謝徒有清夣夜遶金峯忽讀邸状欣審丹鳳􅀭綸銀莵擁鎮八百國封爵莫如同姓之親二千石起家共讃惟良之牧先聲載道闔境爲春伏􅀷歡忭欽以某官景緯光華仙潢清潤淮南桂􅀣了無貴介之風李白桃園綽有神仙之韻軒陛宜當於三錫轅和肯涖於十同睠惟東盰實介南服紅泉碧澗髣髴丹丘白玉紫烟參差綉陌􅂓商羊於朱􅌧供衎燕於青香大宗維翰价人維藩丕動袴􅃭之喜九卿執羔三公執壁言觀衮舄之歸某辱在眷知􅂇喜百倍旣不能振翎刷喙從燕雀來謹奉書􅀉便申慶迓兵當巳在道不知開藩㳙􅁲何日某尚當屢賀不一臨風馳泝與趙監丞淇號平遠某乃􅀊之秋緹􅀐來山中嶽翠蒼寒琳琅照映章不成報内有欿然寜不嗣音僻左之以世道如許風起雲飛中夜人物之思爲此耿耿上念井絡丹詔起家峽月棧雲先聲浩蕩盖有望木牛流馬再立武􅀱之事業又壁窺萬一意必與南山洎予秀諸公上下雲龍共此光明俊􅊆之舉縮手䄂間臨睨天半此其大本領大經綸政不易涯之野水横舟蒼虬縹緲山君川后日有䟽附卽日恭惟台候萬福某漁隈半席自分小休誤渥自天俾尋􅁃謝舊盟意此是抆拭笭箵之陋耳三辟弗可乃以陽月之望束書出山渉重湖越大江整整四十日抵戍以是月丙寅抵賤事凋城敗屋枵然大瓠耳搔首踟蹰望洋氣縮維宣距鄴僅隔一雲東望熏香奉尺書􅀱起處惠徼藥石立我沈痼梅花晴昊拄笏神馳慰前人某昔讀檀􅃓文子之䘮旣除䘮而後越人來弔其居使之然也伏惟先太傅大丞相冀國公之䘮旣有日矣地不千里不能徃弔一介奉禮今也而後能來死罪死罪嗚呼皇天祚宋國有元老數百年宗社之靈長千萬里風寒之險要蛟龍在淵虎豹在山屹然長城爲此突兀天乎不使愸遺遽奪之去主上震悼傾動朝野伏想生平翹舘之英俊舊日麾下之將士與夫三邉之百姓四塞之英豪見碑而涙望城而悲者不能巳巳矧夫家門之竒禍父子之至情攀擗奈何嗚呼痛哉某生也晚當公佩天下安危分不得勇徃執鞭今而追恨則巳無及獨念䄂有瓣香歸依平生亦旣不克爲公壽惟有爲天下慟哭敢西望靈輀揮涙百拜而獻之公而可作尚其我許嗚呼悲哉親䘮所自盡也抑先王制禮之意是有節文士君子爲孝之道在於顯􅀭伏惟執事重致意焉卽日孝􅂂支持某頓首奉状起居臨􅁓哽塞回安福趙宰與􅼭號勿齋某追記疇昔同到蓬萊慈恩之題杏園之宴吾以故不與焉然同年之情豈以四海九州爲藐然哉王孫乃龍鍾世有籋雲鱗今不遡紫清上岧嶤顧得百里之地而君之簾隂晝寂千室鳴絃實鄰吾父母􅀦人誦子産今其時乎某􅀻獨念今天下豈有可爲之縣縣不可爲而可爲者人如君者以可而臨不可於是知材具之超常流百倍矣長書下貽燁然春華溜􅀂清風與我之厚昭仭至情多言不足以殫謝意也某守郡無􅀘誤渥爲郎縮縮循墻行且歸里當觀棠隂以與􅀖人共談政化之㣲亟推吏塵具報記室揆諸來施不敏流汗比一馬二僮日在泉石􅀷處聞山外塵埃亦頗作惡坐對浮雲亦開口􅀏不自巳耳君觧墨綬去意紅光紫氣冉冉帝側乃猶廬陵客琅畫至前矍然起仰黄柑紅柚二美并貺杏􅁐論情我之懐矣冬江雪涸萬里安流目送征鴻知有順帆天際如駛伏楮拳拳中書不中書復字蕪纇併希錫察回寜國交代孟兵部之縉某去國之前一二日宣州弛征之命下某旣爲桐鄕百姓頓足起舞即拜書望􅀟溪疊嶂爲賢主人賀吾軰讀書臨民正爲今日行志凡此者各盡其分固非相與爲賜也旣汰斥歸里卽閉門不與人事山巔水涯翛然獨徃而使者忽持五雲來君子之有情於人也卽勞問之將以厚禮復申其綢繆焉某誠不自知其何以得此也宣人歌舞賢侯之徳教冠冕像設祝廣成千二百年令公二十四考盖人心之天也某何人斯偶以一日出位言語乃得因見大夫以自附於去思之義某㣲德以堪回首碧落山川􅀑神猶有餘愧宣敗壊至矣弛之則期㑹散繩之則撫字􅃜公折回蟻封從容不迫期年而變古語不誣方今論選表無出頴川右者􅂚不均弘俾執事樞某一飯三禱使者之歸也謹東望熏祓身心致敬陵峯堂下有日延見父老尚願道山林不忘之􅀻與其所以不敢當之意進之惟命退之惟命某臨書不勝拳拳文山先生全集卷之五終
