body:
  text: 講義西澗書院釋菜講義知瑞州目孟子曰人之患在好為人師韓子犯之而世怪且罵柳子厚所謂惴惴然而不敢也某承乏此邦其於教化號為有一日之責蓋嘗告朔而履乎學宫得聞諸君之所以授受者而親陟臯比與逢掖講師弟子禮則僣之為尤書堂有事乎先賢諸君不鄙而固以請則雖寡陋夫焉得辭某𥘉𬒳命來守嘗啓政路曰古之為諸侯先政化而後簿書期㑹世之不淑乃倒置此則相與病夫風俗之弊而士行不立且傷夫教道之久廢而未有一救之也固嘗有及於君子德業之義而重反覆焉輒誦所聞并繹其㫖與諸君茂明之易曰君子進德修業忠信所以進德也修辭立其誠所以居業也中心之謂忠以實之謂信無妄之謂誠三者一道也夫所謂德者忠信而巳矣辭者德之表則立此忠信者修辭而巳矣德是就心上說業是就事上說德者統言一善固德也自其一善以至於無一之不善亦德也德有等級故曰進忠信者實心之謂一念之實固忠信也自一念之實以至於無一念之不實亦忠信也忠信之心愈持飬則愈充實故曰忠信所以進德修辭者謹飾其辭也辭之不可以妄發則謹飾之故修辭所以立其誠誠即上靣忠信字居有守之之意蓋一辭之誠固是忠信以一辭之妄間之則吾之業頓墮而德亦隨之矣故自其一辭之修以至於無一辭之不修則守之如一而無所作輟乃居業之義德業如形影德是存諸中者業是德之著於外者上言進下言修業之修所以為德之表也上言修業下言修辭辭之修即業之修也以進德對修業則修是用力進是自然之進以進德對居業則進是未見其止居是守之不變惟其守之不變所以未見其止也辭之義有二發於言則為言辭發於文則為文辭子以四教文行忠信雖若岐為四者然文行安有離乎忠信有忠信之行自然有忠信之文能為忠信之文方是不失忠信之行子曰言忠信行篤敬則忠信進德之謂也言忠信則修辭立誠之謂也未有行篤敬而言不忠信者亦未有言不忠信而可以語行之篤敬者也天地間只一箇誠字更攧撲不碎觀德者只觀人之辭一句誠實便是一德句句誠實便是德進而不可禦人之於其辭也其可不謹其口之所自出而苟為之哉嗟乎聖學浸逺人僞交作而言之無稽甚矣誕謾而無當謂之大言悠揚而不根謂之浮言浸潤而膚受謂之遊言遁天而倍情謂之放言此數種人其言不本於其心而害於忠信不足論也最是號為能言者卒與之語出入乎性命道德之奧宜若忠信人也夷考其私則固有行如狗彘而不掩焉者而其於文也亦然滔滔然寫出來無非貫串孔孟引接伊洛辭嚴義正使人讀之肅容斂袵之不暇然而外頭如此中心不如此其實則是脫空誑謾先儒謂這樣無緣做得好人為其無為善之地也外靣一幅當雖好裏靣却踏空永不足以為善蓋由彼以聖賢法語止可借為議論之助而使之實躰之於其身則曰此迂闊也而何以便吾私是以心口相反所言與所行如出二人嗚呼聖賢千言萬語教人存心飬性所以存飬此真實也豈以資人之口躰而巳哉俗學至此遂使質實之道衰浮僞之意勝而風俗之不競從之其陷於惡而不知反者既以妄終其身而方來之秀習於其父兄之教良心善性亦漸漬汨沒而墮於不忠不信之歸昔人有言今天下溺矣吾黨之士猶幸而不盡溺於波頺瀾倒之衝纓冠束帶相與於此求夫救溺之䇿則如之何噫宜亦知所勉矣或曰至誠無息不息則久積之自然如此豈卒然旦暮所及哉今有人焉平生無以議為而一日警省欲於誠學旋生用工夫則前妄猶可贖乎曰無傷也溫公五六歲時一婢子以湯脫胡桃皮公紿其女兄曰自脫也公父呵之曰小子何得謾語公自是不敢謾語然則溫公腳踏實地做成九分人蓋自五六歲時一覺基之溫公猶未免一語之疵也元城事溫公凡五年得一語曰誠請問其目曰自不妄語入元城自謂豫𥘉甚易之及退而自􅕍括日之所行與凡所言自相掣肘矛盾者多矣力行七年而後成然則元城造成一箇言行一致表裏相應蓋自五年從遊之久七年持飬之熟前乎此元城猶未免乎掣肘矛盾之愧也人患不知方耳有能一日渙然而悟盡改心志求為不謾不妄日積月纍守之而不懈則凡所為人僞者出而無所施於外入而無所藏於中自將銷磨泯沒不得以為吾之病而縱橫妙用莫非此誠乾之君子在是矣或曰誠者道之極致而子直以忠信訓之反以為入道之始其語誠若未安曰誠之為言各有所指先儒論之詳矣如周子所謂誠者聖人之本即中庸所謂誠者天之道蓋指實理而言也如所謂聖誠而巳矣即中庸所謂天下至誠指人之實有此理而言也溫公元城之所謂誠其意主於不欺詐無矯僞正學者立心之𥘉所當從事非指誠之至者言之也然學者其自溫公元城之所謂誠則由乾之君子以至於中庸之聖人若大路然夫何逺之有不敏何足以語誠抑不自省察則不覺而陷於人僞之惡是安得不與同志極論其所終以求自拔於流俗哉愚也請事斯語諸君其服之無斁熙明殿進講敬天圖周易賁卦彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以正人文也觀乎天文以察時變觀乎人文以化成天下臣聞賁文飾也色相間則成文故柔來文剛剛上文柔剛柔相間所以為賁賁離下艮上離之躰中以一柔間兩剛是柔來文剛艮之躰上以一剛乘兩柔是剛上文柔使獨剛獨柔不相為用則不成文矣此言賁之卦義也天之文為二曜五行象緯交錯故曰觀乎天文此言天之賁也人之文為三綱五常倫理次序故曰觀乎人文此言人之賁也以上像易彖大意臣竊窺先皇帝作圖之㫖以敬天為名其於賁卦實摘取觀乎天文以察時變一條臣謹按圖義而為之辭臣竊惟天一積氣耳凡日月星辰風雨霜露皆氣之流行而發見者流行發見處有光彩便謂之文然有順有逆有休有咎其為證不一莫不以人事為主時時世也彖易聖人不曰天變而曰時變蓋常變雖麗於天而所以常變則係於時人君一身所以造化時世者也故天文順其常則可以知吾之無失政一有變焉咎即在我是故天文者人君之一鏡也觀鏡可以察妍媸觀天文可以察善否且如曆家算日食云某日當食幾分固是定數然君德足以消弭變異則是日隂雲不見天雖有變而實制於其時又如旱魃灾也才側身修行則為之銷去熒惑妖也才出一善言則為之退舍天道人事實不相逺自古人君凡知畏天者其國未有不昌先皇帝深識此理故凡六經之言天文者類聚而為之圖以便觀覽且恐懼修省焉聖明知敬嚴父之圖即敬天在此矣嗚呼曷其奈何不敬此先生兼崇政殿說書日講篇也講篇非一如講詩之定之方中一篇諷當時修繕事今亡其辭云道體堂謹書行實先君子革齊先生事實先君子諱儀字士表生嘉定乙亥八月二十四日寶祐丙辰五月二十八日殁于京次年九月九日封于鄉之佛原嗚呼天乎仁者夀有德者祿先君子乃止是邪不肖孤上纍先君子久于旅飲膳醫藥失節用速禍非天實不德有惡子至此釁戾丘淵身百莫贖柴骨欒心不自意偷視息至今日得黽勉啚大事猶瀝血苫塊以字先德嗚呼尚忍言之先君子嘗考次譜系文氏繇成都徙吉五世祖炳然居永和鎮高祖正中繇永和徙富川曽祖利民妣郭氏祖安世妣劉氏考時用妣鄒氏繼母劉氏世有吉德鄉以君子長者稱一是方寸留耕于子子孫孫先君子嘗言滯學守固化學來新以一革字志韋佩人皆稱革齊性愛竹依竹闢一室傍竹居或稱竹居不肖孤聞之諸父先君子幼頴慧器質端重進止如有尺寸書經目輒曉大義越時舉全文不一遺見鄉曲前輩必肅容請益暨長天才逸發志聞道嗜書如飴終日忘飲飱夜擎燈密室至丙丁或逹旦黎明挾冊簷立認蠅字不敢抗聲愕寐者人雖苦之甘焉蓄書山如經史子集皆手自標序無一紊朱黃勘點纎屑促密靡不到至天文地理醫卜等書遊䳱殆遍手録積帙以百揮汗呵凍弗斁鈎引貫穿舉大包小各有條間質難疑剖柝響應某事出某書某卷且指數以對為文發持滿無不的中機軸必巳出命意時娓娓談他事若莾於尋繹一援筆雲行水流無凝滯中年文氣益老拾汗漫歸諸約不峭峭刺目有溫醇渾厚之風焉閒居侃侃春意溢出顔靣蚤事祖盡敬祖母優遊暮齒視藥膳卧興扶持華髮鍾愛父嚴母慈侍夙夜省燠寒一出忱意不視顔色為肅愈事繼母篤至始終無纎芥間一家氣象藹如和風鄉黨稱孝於宗族厚待季父削藩町悲欣同情季父殁不幸子病廢經紀其家撫幼姪等巳子疏從遺孤振翼之俾蒙于成闢居居無居者歲時衣粒各有節度嘗謂宗族一本誼不得不恤愛范文正公義田記規模次第曰吾得志當放此行之親姻孤貧者哀矜勞苦撫字無遺力喪不克理辦之棺至巳所服用捐以斂雖在疏末次序情文各惟其稱與人交好大躰不為細家迫速戶外屨日滿絶甘分少無疏密皆𬒳和氣交誼天至聞貧困患難赴急如不及忱意感人有臨終握手欷歔流涕託之以孤者歲大比凡與大夫待博士選者皆有約首誼綿數科間不能與自捐資籍其名暨充賦就奉為助約所不及以意告傾巳有為行資至貸以應誼聲錚然對人氣語和易鄙夫窶人亦曲加體接無一失聲氣去里有蹈非彛悉忠愛援誼開陳聞者感動見後進片善奬豫不容口孜孜誘掖如子弟給飦數𤱔耕者多不輸寧令負巳不忍直于有司蒔園漁池相效無一償亦不較間嗤不武則曰彼貧且殆吾奈何攟之有竊負其資去既而困還不惟不加責恤其人終身將作室絫木齊垣時癘死多露骼惻然曰吾可無居人不可無斂匠棺惠貧者歲賑饑隨所有不給至市粟以應顛連無告過目輒怵惕隨力為謀一日讀書至晏子敝車嬴馬事愀然曰使吾族吾親吾鄉人休休有餘至願也惜嗟再三家居門䕃茂木睱日相羊芳隂間雅嗜茶煎㵸多手出時邀朋遊文字語移日樂極浩歌縱奕視世間融融沄沄漠不介胸次性凱樂惟恐咈人事經然諾雖不利於巳不悔一言話傾盡肺腑無留藏應酬一切任真事不可直濟或道以詭御寧事不濟不為耻巳勝語及不平辭和氣舒無忤色有以欺心至知其私不發且無章於人欺者多愧悔感泣人皆嘆為有德君子謂當於古人中求之誄者曰我公之德言矩行規世智黃間我心坦夷市利血刃我範驅馳生平所為事皆可質鬼神而無疑嗚呼是得其槩矣始天祥兄弟幼且長先君子不疾其不令昭蘇䝉滯納之義方日授書痛䇿砅夜呼近燈誦日課誦竟旁摘曲詰使不早恬以習于弗懈小失睡即示顔色雖盛寒暑不縱檢束天祥兄弟栗栗擎槃水無敢色于偷自此名師端友招聘仍年至時先疇給費久之室罄力弗逮乃率天祥兄弟藏修于竹居陳所衰籖軸俾抉精剔華鈎索遐奧董綱要竟日夕弗倦雖貧浩然自怡有未見書輒質衣以市得書注意鑽砅又以授天祥俾轉教諸弟繇是程督益峻書警語遍窗壁如三尺在目見為文章撥􅓯正氣輒不懌必維以法度天祥兄弟奉嚴訓蚤暮侍膝下唯諾怡愈不趐師友或書聲吾伊或斂襟各靜坐潜諷或掩卷相與戚嗟人情世道此時氣象父母俱存兄弟無故天下之樂莫加焉歲乙卯天祥壁俱叨與計偕時仲弟霆孫年十有六未試墨于窗曰出師未捷身先死長使英雄淚滿襟竟以疾先撤棘一月卒先君子及是攬涕竚眙悒悒痛悼天祥璧將進禮部欲董于征顧先君子哭子方新天祥璧復去左右恐益重哀出可寬襟抱且旦夕定省得不缺不敢辭以臘月望行次年天祥璧俱僥幸奏名夏五戊戌廷對踰挾先君子病暑投凉劑立蘇方徙一靜室規便攝理甲寅集英賜第天祥以不肖冒首唱歸拜寓館移時之期集所越一日聞疾復侵告于朝不俟命亟去侍藥省劄下玉音給假三日時先君子雖病神色不改視脉者聚伺變候僉曰無虞戊午向申忽病革進藥卻弗服曰度吾不能起此疾汝兄弟勉之天祥璧震怖號慟請命于天祈促齡壽親算不獲命椎心禱呼冀殞滅以代又不獲命入夜寂然而逝嗚呼痛哉嗚呼痛哉厥明畿漕聞于朝朝命官吏來治喪事六月庚申朔天祥璧奉柩出國門臮歸鄉士庶人無不失聲痛嗟路祭巷哭以返于先廬時七月癸丑也嗚呼先君子一至此邪不肖孤二十有一載弟方冠且髫承顔菽水歲月幾何天乎不使終飬而蹙之于中身邪慘焉逆旅睇親舍越在二千里外天乎不使終于正寢而忍至於客斂邪往時征衣拜堂上舉觴飲餞親賔祖道外期嚮何許天乎遂以是為永訣邪天祥璧奉貢剡時先君子巳哀仲弟不見孰謂方階祿釡先君子才見而禍遄作天乎天祥璧何以竊第為邪嗚呼不肖孤事先君子不孝奉起居無狀有疾病而暗不知不能積忱衷臆倉卒無以動天聽罪生不贖眥血𬒳靣摧决肝胸顛頓躑躅裁以必死顧屬纊一語忍痛受命不敢不勉恐無以祗訓于前人以忝盛德乃相宅兆筮曰吉排土濡涕墳以竣役將奉躰魄安焉嗚呼渺音容隔幽隂終天而止矣先君子妃曽氏今男三人天祥璧璋女三人懿孫淑孫順孫遺墨有寶藏三十卷隨意録二十卷痛惟先君子利澤不施于人名聲不昭于時匪石遺德恐久遂沈泯天祥不揆不孝裒録事實沈痛刺骨荒忽惝恍世有大手筆能表章幽潜光昭于無窮稽首百拜以請知潮州寺丞東巖先生洪公行狀東巖先生洪公蓋陽巖先生文毅公族諸弟也文毅公以孤忠遺直著聞當世其平生言論風㫖講切上下公未嘗不在其間文毅公屢召不赴公浸嚮用輒落落不合去時論稱為二洪文毅公既沒泉南文獻之望書屬公識者謂文毅公未為者將有為也而公又不及大用以死天之生才倐忽代謝安得不深慨於此叙次行事諗諸方來門人之責奚以辭公諱天驥字逸仲自號東巖世晋江縣人嘉定戊辰七月庚戌公以生生有異質沈靜專一自少講求微言通念曉柝乃巳故於經史諸子百家之辭無不貫串文章自成一家以紹定改元薦于鄉名聲振一時學子蹐門願求模楷者日衆公坦明夷粹専以宿於道為教逮事王太母一夕疾甚殆公不解帶不交睫至剔股肉雜湯藥進公一念之切通于神明然終身不以語人登淳祐七年進士第𥘉筮卲武軍建寧縣尉發擲姦伏當官無所回撓時有劫冦王若曾嘯聚千餘人騷動兩路諸所委捕多畏沮公奮不顧身提兵搗其巢一舉空之僞造成風為楮幣蠧公密設方略動中肯綮李若聶凡三大黨與無不各就縛剃獮之石壁胡公頴秋崖方公嶽交章以公善狀聞于朝十二年循從政郎調連州推官未上寶祐改元㫖差監惠民南局四年較藝南宫公考鏡詳密精力不間晝夕所賞拔士多根柢理致當時號明有司公雖浸近周行然無所附麗恂恂侃侃望之山立徐公清叟吳公燧馬公光徂顔公頥仲俱剡上其能將用矣㑹有言者徒步西歸泊如也六年淮閫擇士自從首辟致公為屬景定二年通班授宣教郎知廣州香山縣至之日以教飬人才為第一義修復大成殿明倫有堂主敬美身賔賢登俊有齊皆捐俸入為之斂不及民其為政一裁於義俗譁健戢其尤桀黠者曰此囚牙訟師去則吾民妥矣邑以大治洪公勳趙公汝暨雷公宜中及倉憲交以邑最上咸淳元年轉奉議郎二年差監行在榷貨務都都茶埸四年吳公革馮公夢得趙公順孫劉公黻皆以吏才為薦差監都進奏院轉朝奉郎馮公時為刑侍及戶侍劉公應龍交委以書擬本部文字公皆樂為知巳盡于時上即位逾年𥘉政新美公輪當陛對宿齊豫戒兾積忱意悟上心取虞廷君臣時幾之說寓規焉其一曰君心勤怠之幾二曰人心離合之幾三曰君子小人消長之幾四曰中國外夷强弱之幾及朱文公天理人欲之辨首尾二千餘言其辭諄復懇切深刺腧髓玉音嘆美又言泉有屯戍左翼一軍乏興之害米舟搜糴生變之虞而朝廷籍沒翁林二氏之田可歲得榖萬斛以紓戍卒兩月廪食或有不濟寺院及單丁住持令本州核實區處併撥為軍餉之助餉足則糴寬糴寬則米通民永無貴糴患矣朝論翕然以為論事有陽巖風除大理寺簿五年轉朝散郎知潮州公之在潮也視民事如家視敝政如巳疾捐金以𥙿學廪傾囷以粟饑民梁川以利病涉知無不為為無不盡潮與漳汀接壤鹽冦輋民郡聚剽劫纍政以州兵單弱山徑多蹊不能討公應變設竒降者相屬又欲於接境置屯多者三百人少者二百人掎角為援郡為創撙節庫以贍之具有條畫悉以言于朝并下之漳汀放此且嚴保伍之令以澄其源大抵公智慮深逹如宿將持重而規畫綿絡不以鄰為壑也又潮有護田舊堤多囓於水貤俸與民築石為堤民號之曰洪公堤且刻賦頌其旁曰此我公東巖生佛所為也去之日垂髫戴白者擁車下不忍去公雅意林壑至是則曰吾可優遊樂吾真矣九年得㫖主管華州雲臺觀公時益暢於詩數與姻族觴詠從從容而學徒有志於考德問業者多授以外聲利及終身受用之要暇日登臨徜徉愛南安之間風氣明秀取所謂小陂山者曰樂哉斯丘我死則葬焉預飾美檟治壽藏淡然塵外蟬蛻之意十年正月公始屬微疾即乞以本官生前致仕八日忽索水自浴衣冠休于正寢翛然而逝嗚呼若公者可謂啓手足而不亂其風流篤厚真足以追配文毅公於九原而無怍者矣某於公之門實丙辰省屋諸生戊辰之春待罪中朝諗日拜公床下矣未及而去國然於公之踐修出處之槩蓋心識之共惟穆陵豐芭菁莪之澤涵育天下天下士蝟然勃興溫陵邈在海隅人物相望陽巖之氣節煥發乎其前東巖之抱負翼承乎其後使二公誠得盡展拓又未知孰後孰前也嗚呼今復見斯人哉曽祖遇妣陳祖德明妣李父伯道贈宣教郎妣陳贈安人元妃陳先二十六年卒贈安人繼趙封安人先三年卒子男應午應申應夀俱業進士女四適胡登龍丘公賜王育竒一尚幼應午力學克肖收拾公遺稿若干卷曰東巖集藏于家將以是年十月巳未奉治命以葬趙安人附殯應午千里貽書俾某狀行姑序其本末以俟立言之君子謹狀墓志銘知韶州劉容齊墓志銘咸淳四年四月十二日容齊先生劉公元剛卒于家年八十有二先生官至郡守死之日幾無以為斂附于身者稱家之有無鄉黨之士莫不髙先生之風而哀其志焉其邑子文天祥與人言欷歔慷慨重懼前輩言行久逺沈泯無以訓來者㑹其子昌孫以先生狀來請銘某雖不敏其可以辭先生字南夫一字南强世為吉州吉水縣人治毛氏詩早為鄉校知名士嘉定十年入太學後六年登進士第授迪功郎信州永豐縣主簿升從政郎調靜江軍莭度推官丁外艱服除差江州教授兼濂溪書院山長自故丞相董公槐今丞相江公萬里以下舉親民五貟淳祐五年班見以通直郎知撫州崇仁縣縣政以理民以佛子為謡先生奉母夫人在官間日與其弟自提板輿相羊為娛邑人化之以憂去十年通判鄂州以磨勘轉奉議郎承議郎董丞相當國入為左藏東庫時將薦先生試館職㑹董丞相去不果𥘉東庫日進㑹于𥿄若干丁丞相以趣辦為才風有司頓增十萬先生以職力爭忤其意展磨勘兩年出為泰州添差通判景定元年某月差知昭州皇上登極轉朝奉郎適郡當次稱疾不果行㫖差主管建昌軍仙都觀居二年再任自江上平凡權奸用事所擯斥朝廷奬拔殆盡時論以先生為屈未幾詔還磨勘月日駸駸向用而先生前一月逝矣嗚呼豈非命邪早刻意詞科書無不讀其餘佛老精言亦各深到平生居官所至清謹家無餘資蕭然環堵四方學者執經問字相繼于門先生誘掖懇懇不啻父兄之遇子弟尤工為文章雖逰戲之筆鮮不竒古江湖之士得品題一語足自表于其徒與人盡恭應接終日無倦意客至雅言之外談玄演空聞者往往忘去世人以聲利為門戶先生惡之如惡惡臭登第垂五十年郡縣官吏知敬先生不見其可畏出入不設車徒間步行井陌中不以為苦甘心屢空以至死而不悔噫此真所謂善人長者矣曾祖致道妣周氏祖圭妣李氏考次朔纍贈至奉直大夫妣陳氏熊氏俱贈恭人妃凃氏先十六年卒贈安人子男三人昌孫其長也次信孫愚孫皆蚤世女長夭次適太學生陳應發又次適進士胡淵孫男一人洵武女一人許適龍氏以某月某日葬某縣某鄉某里之原遺墨有詩書孝經論語孟子演義若干卷詞科類稿若干卷客齊雜著若干卷家庭謾録若干卷任左藏日以孝經論語孟子演義上進有㫖降付資善堂銘曰文彪彪德恂恂貴如單門死如齊民約而家豐而身我作銘詩永懷古人義陽逸叟曾公墓志銘公諱珏字天錫號義陽逸叟天祥外王父也天祥不肖賴公教誨由記事以來周旋三十年於公無所不知蓋至於其處死生之變然後知他日觀公者未盡而公誠有大過人者焉嗚呼異哉公性頴悟志不樂凡近讀書百家雖涉獵靡不通逹所自得往往於佛老氏其見之服行敬恭神天一言動不輕口不御肉月常十四五對人敷闡玄寂四座輒悚然傾聽最後遇異人與語幾欲棄人間事求長生之術年踰六十始聞正學恍然自失死生之說鬼神之情狀講探幽眇頓改吾意既卧疾服藥外無所問戒左右勿以巫祝從事間祈禳厭勝掩公不知公覺輒撫床怒呼病日久骨立如束聲吐精爽不變兾猶足支歲月一日召天祥至公乃鈎稽卜筮指諸掌曰今日老夫當訣故令爾來時聞命震愕止公勿易言公曰吾豈不省事哉形神合則為人吾形憊久矣今腰足如斷心火益燥神且遊散居常謂不識死死則如是又曰始吾崇信異說今且死目中無怪見顧二子令必不為佛事周身一切雖絲縷亦公所處分殯宫哭位與凡喪葬祭具有成說天祥弟璧任京府尹椽公口授數十言令為書遺之强起字𥿄尾句讀筆畫曽不㒹錯集諸孫各付謹飾語令羅拜床下辭去衆泣漸揚公曰死生如晝夜不足多憾麾止之索酒飲之三連三言曰吾真去矣聲脫口而逝嗚呼隂陽魂魄升降飛揚氣之適至雖夢寐莫適為主公幽明隔呼吸而從容若此世能言死者不少此非嘗試事臆度料想靡所依據公去來一息實天祥所親見道之粲然莫此深切嗚呼異哉嗚呼異哉公事父母孝待族姻以厚與人交久要不忘倜儻尚義不事生産作業惻隱貧困能推食解衣議論剛正好靣折人不藏怒宿怨有古君子之風焉公有子有孫早授家政天祥既奉偏慈迎公就飬居數年甚適間出徐步幅巾野服人羡其優遊公亦論文賦詩圍栱命酒自謂天壤間陶陶人也得疾於景定辛酉二月九日始復正寢殁之日壬戌二月癸丑得年七十有二曽氏世家旴江徙吉之泰和梅溪族號長者曽祖邦寧祖知和考昌權妃張氏先公十九年卒子二棐矩女四適錢光延康師顔于天秩其仲天祥母也孫男六端孺淳儒文孺俊孺良孺明孺女一適郭泳曽孫甫申以次年九月丙午葬吉水縣永昌鄉藥陂之原成公志也𥘉公先世重卜葬葬師譸張為幻封鬛無定居公憮然曰吾詎忍吾先至此吾不可自求之乎乃從兄瑾載資越竟旁參博扣逾十年得其說以歸由是髙曽而下一奠不再徙公對葬師言嘗斷斷不可不售不傳故祕莫得聞焉公命未革命天祥曰老夫一日不起無潜德傳世記歲月非爾其誰屬臨終申其詞再三天祥泣不敢當重念靖節作孟長史傳東坡書程公逸事往蹟漫滅猶勤追述矧公靣命惡得辭顧方繫官于朝不獲哭拜填祖營視丘窆南望欷歔輒紀家世行實而表其死生大事為志并為銘銘曰維二氏之蔽於死生兮小其用於一身一陷溺而忘返兮鮮不惑於怪神公曰昃之離兮羌出駁而入純微臨絶之琅琅兮公幾混於常人朝聞而夕死兮何憾乎幽冥藥陂之鬱鬱兮遺躅之所經存而以為志兮殁將以為寧既固既安以利嗣人兮萬古萬古如斯銘羅融齊墓志銘廬陵有隱君曰融齊羅公嗚呼可謂有德人矣豫嘗詣公入其門肅肅如也僮僕欣欣如也公出雍雍如也坐申申如也語愈愈如也豫聞公燕居之槩晨起盥櫛畢正衣冠堂中就胡床坐不隋不倚􅌂然終日雖盛寒暑以為常不好狎不侵侮無易由言對賔客賔客或不自持左右置司馬公家訓一通保家擇婦常自以為名言閨中無敢疾呼女隸無敢近几席執事左右唯諾無敢涕唾諸子無敢晏起早卧聞公攬衣聲咳就學惟恐後夜至公所各以所業次第誦說奬掖磨厲交發互出凛然義方之意由是吾里之言家法與善教子者皆曰羅公羅公云公生而頴發五歲即篤志强記容止如成人既長嗜書忘寢食為文不事銛巧惟意所到自然成章學書入揩得蔡氏風度蚤有意場屋四詣京師試諸生晚年始以此事付兒輩然公所為強學者雖老且病不衰也公未弱冠而孤經紀門戶即不為細家迫速先世積逋劵如疊一日悉卑炎火曰是先人所親厚其一切勿問聞者義其勇宗族親黨孤子者貧乏者或給之田或豫之金終其身恩意浹至外內無間言四屨滿戶外設榻無虛日推食解衣至者無不得分願而去歲青黃不接㑹其閭里輟時直幾半隆寒給散有差環公之境無以饑告鄉鄰有難畢力排解幾微不見顔靣不摘抉人過有負公者未嘗示以聲色其人久之自愧悔有愧悔且死而恤其妻子益恩者與人語傾盡肺腑巳諾必誠不以利害為二三其忠信如此戒庖厨勿殺凡登諸爼者悉自外致有生饋禽魚必解放之其仁厚如此自奉不逮中人衣服十有餘年不改亦不煩浣濯其儉素如此里之稱公無大小必曰君子長者有不善相戒勿為公所知嗚呼真可謂有德人矣公之中身諸子各拔頴而起其一兩名薦書登開慶元年第調臨江軍清江縣主簿公時敕簿君曰汝為亷吏即不辱吾子簿素修謹聞訓益厲有名聲於時生母蕭氏以上夀錫封孺人諸孫競秀長幼五葉人世樂事畢赴一門天之扶持吉凶悔吝先定如蓍龜以公平生孰不可書獨嚴重整肅能使人鄙慢消去福德莫盛於此昔伊川見人靜坐輒嘆其善學徐節孝因安定頭容直一語自此不敢有邪心使公得二先生為之依歸因其資以至於道所成其可限量乎哉公諱士友字熹善一字晋卿融齊所自號景定元年該明堂恩告授承務郎致仕咸淳二年二月十四日終于正寢年六十有八遺文有史編十卷諸家詩躰十五卷羅氏由金陵徙吉之吉水五世祖居廬陵之新安曽祖暉祖時英考莘老妣孫氏趙氏妃蕭氏封孺人子男五人濬煜植耕垕耕簿君也再調贑州濓溪書院山長女一人汝順適今文林郎新廣南東路提點刑獄司幹辦公事周夀申先公卒孫男十人女六人曽孫男二人女一人俱幼卜以四年某月某日歸于順化鄉三陂周家山之原其孤前期請銘於豫豫視公丈人行也公之子於豫同充賦於豫弟璧同年進士豫之任江西臬事也以公子上之公車通家孰先焉矧公行誼著於鄉則所欲稱美而論撰之者豈獨孝子慈孫之心哉銘曰不言躬行萬石君教子義方竇禹鈞行其庭不見其人雖無老成人尚有典刑封孺人羅毋墓志銘乃咸淳九年廬陵融齊居士羅氏生母滿百歲融齊之夫人時年七十六白髮在堂事百歲母如婦禮子孫孫子環侍起居為男女三十有竒豫鄉稱慶門必曰新安羅氏其年二月朔豫從里中士奉幣載酒拜百歲母堂上母答拜諸孫皆拜飲母毋釂酢賔諸孫各執從既成禮夫人視豫年家子不聽去為之留三日為詩以歌其事好事者或為圖以傳國家承平休飬生息用康于人眉夀無有害傳曰豐水有芭數世之仁也夏豫將指于湘未數月聞夫人訃欷歔失聲問百歲母安乎曰安母于今蓋百踰一矣夫人將葬其孤以是母命來請銘豫後母生六十三年得載筆承命銘夫人自昔能言所未有乃叙次其凡繫之辭夫人姓蕭氏吉水人曽祖琢祖曽父異鄉貢進士妣廖氏繼張氏徐氏歸承務郎致仕士友是為融齊居士先七年卒子男五濬先五年卒煜植耕修職郎前監行在奉口酒庫垕女一適儒林郎侍班周夀申先二十九年卒孫男九宷寯宦實寓宜紹皓平女十一長適張棟曽孫男七舉孫頴孫元孫滿孫怡孫真孫復孫女二夫人以庚申明禋恩封孺人卒之年七月十日次年十二月某日封于所居里柘徑之原銘曰昔唐夫人之為崔母兮逮事長孫皇姑兮姑年髙嚙落以枯兮升堂乳之劬劬兮姑曰婦恩之不可孤兮願世世子孫之不渝兮夫人五世崔如兮母年踰百崔所無兮胡不與夀為徒兮為此母憮兮為夫人吁兮鄒月近墓志銘廬陵南方之上遊支水自贑興國而下曰冨川鄒氏族焉鄒故出范陽五季始有籍斯土有昶者冨而禮瀘溪王公平園周公誠齊楊公艮齊謝公皆與之遊川流在門能不愛重資疊石為屋以脫往來於厄周公記之一時稱為長者其殁也文敏洪公銘其墓鄒氏福祿方來而未艾長者之所種植也昶生將仕郎時飛嘗伏闕上𥙿民十䇿時飛生大淵大淵生淡是為月近君月近云者君以名亭而鄉人因之以為號也君蚤孤母張氏勤儉自樹立紹定辛卯該東朝恩以夀封安人君於其時奉親愈愈無子弟之失張氏殁始經紀家事循循如不勝衣人不見其聲色而充盈𥙿大之福自然日進而不止族黨之不自給者親戚之無所歸者朋友之逺役而不能行者君意性所到皆能隨事為義若夫修浮梁甃通逵歲發廪以倡賑荒守望有警則裒丁以耀于衆皆義之凡也俯仰三十年矣君於其間無鄉曲之過君性最緩或以佩弦進曰吾豈不知出此吾所見呌呼號呶自取僨敗者衆吾誠緩不失事蓋老而益審焉然君終身無惡名變容動色之警不及乎其門優遊和平永保終吉嗚呼真可謂長者孫矣君字次清登仕郎生嘉定元年六月丁酉殁咸淳元年九月巳未配吳氏迪功郎江州司戶參軍懋之女子三文孫振孫俱登仕郎癸孫幼卜以四年正月葬于順化鄉新安社之原其孤前期以奉議郎劉君惠祖狀來乞銘劉君戚也聞而知之豫君鄰也見而知之敢無以銘銘曰長者之澤子孫賴之去之百年有以似之天於善人曷不壽之善人有後天將與之鄒仲翔墓志銘景定五年豫奉親髙安除提點江西刑獄謝弗拜適冦起興國之東廬陵犬牙相錯所在騷動余所居鄉一閧千室大家以去為望鄒君仲翔中人之金也率鄉人柵東門山為備山下阻衣帶水君恐倉卒涉者為魚梁浮梁以濟明年春冦一日蓐食行三百里薄太和之王山距余鄉半舍而近鄉人扶携老稚走險微一不善脫君經紀山寨當是時一鄉之命懸於君訖冦去君保護無有害時余避節弗獲命㑹樞密督以捕逐文移旁午余以鄉部嫌將重以請慨然曰奈何以我辭受坐視龍蛇為赤子困乎於是即日受印下令㑹兵諸山寨皆署長君與焉未幾冦平余罷歸里于溪之上游斬荆莾燔椔翳得竒觀焉君欣然從豫山中匹馬一童朝至而暮忘歸率以為常余每集賔從君輒在其間聞余語中理解未嘗不解頥間從余言人生何為碌碌棄家事從公遊可乎余謝非余所知君曰吾意决矣乃盡以伏臘屬其子而頺然以休訪豫南北崖某水某丘若將終身焉癸酉夏四月余行湘君送余於香城後一月君以疾死余聞之欷歔不自禁湘之歸也未及門望見其子來哽不能言嗚呼余豈私君君與人必以情聞義輒赴見有不善靣折不少回而不藏怒不宿怨曠如也君雖赤手起家而好施出其性歲饑發粟給其比鄰二百戶能捐殖以自損道太和甃十里道廬陵甃六十里衣寒者食饑者病者饋藥死者豫棺喪無歸者葬其土度其能為輒不少吝君之族前有長者以善植門為益國周文忠公所知去之百年風流相接焉余嘗謂君慈而樂舍大率浮屠家所尚至臨難急病能禦灾捍患以有德於鄉閭大夫士或愧之君名鳯仲翔其字世為富川人曽祖大明祖人傑考世興妣梁氏娶蕭氏梁氏皆先卒子男一人曰成女三人適郭鏐王鎔劉鋒孫男二人夢龍復生君得年六十有四以甲戌十一月某日葬于其鄉沙洲平之原治命也君之先人嘗卜地于東門山之下曰吾父葬于是泝山而上為龍頭得一丘焉曰吾藏骨焉吾後其興乎君晚而優遊有子治生有孫業于學咸以為驗銘曰東門之原君之父兮東門之麓君之母兮東門之巔君所構兮瞻彼東門相爾後兮樂庵老人劉氏墓志銘余讀漢陸賈傳甚羡余鄰翁樂庵劉氏賈擇田地家好畤出槖中千金析其五男安居過之數擊鮮十日而更以夀終余嘗謂人生晚福優遊宜莫如賈當是時韓彭爼醢鄼侯周勃猶不免械繫求為賈一日得乎翁生四子皆有才智四十年即棄家政就飬諸子以次第循環五日一更其設饌務為相髙惟恐不得其歡心翁饑來得食渴來得飲早眠晏起一切不顧人間事惟時時接方外士講鉛汞之術間取松柏惟意咀啖翁年過七十而顔色如童攝生有助焉或為陸生作新語為漢逹官非翁匹余曰不然賈艱難􅑿項間從馬上公為客一再使越﨑嶇萬里翁生於世長於世老於世不出鄉終其天年有樂於其身無憂於其心設賈復生校翁失得未必以彼易此翁又有數事異甚里傳鬼車鳴者未夜相戒威明屏息户內翁開樓大呼願見鬼車卒無有有神以禍福驚人翁過其祠持牛炙如常人莫不危恐翁休休如也嘗有所營造忌某星直某方翁曰犯者殆乎請身當之某星迄不驗為子簡婦或云婦不利於長翁不為奪自是諸昏嫁曆家說格不用中年卧疾家人私召女巫謀為厭勝翁廉知之强起逐之出門未屬纊翁默自念作其像贊若辭而逺逰著顧左右曰吾死勿事緇黃吾志也醫以藥進麾使去問日入乎曰然反靣而逝江南之俗尚鬼其人畏死而信巫翁能自不惑非由耳傳口授殆一至之性然也翁名邦美字才卿樂庵其自號也始祖邽長沙人為吉州刺史家西昌九洲後徙廬陵富川三世曰德逺文煥子玉妣曽氏娶陳氏先三十七年卒繼祁氏其子孫實蕃濟生機洪生桂槐植模深生朴柚鄉貢進士浩生樞楫槐復生癸孫女二適于夢牛曹雷應孫女五適鄒曹許曹羅一幼翁八歲喪母十六歲喪父移其事父母事兄長終身歲時上丘塜拜祖禰率諸後生尚有典刑翁富壽安逸推其一念孝友殆命物所知諸孫方將以詩書大其門翁必為人宗乎翁生慶元戊午二月庚午殁咸淳癸酉正月丙辰後二年正月葬干享化鄉鳬塘之原余家距翁一垣翁年吾祖之下吾父之上諗翁有年數矣深與余游且厚來請銘銘曰其生也有涯其死也有時爾世其昌匪我銘其誰劉定伯墓志銘余東家詩人劉君定伯類晋宋間矌逹自余辟山水南北崖落然不可人意君時從豫招或不約徑造至則善為言談名理蜂出意所左右辨者不可詰江山朝暮四時之變嘲詠賞嘨興出物外常使人諷念不可忘嗜奕最入幽眇兔起鶻落目不停瞬解剝摧擊其勢如風雨不可禦勝敗不落一笑飲酒可一二斗酒酣浩歌聲振林木或投冠袒禓旁若無人或鼻息雷鳴徑卧坐上君豪縱沛然以為自得當其樂時不知天之髙地之下老之將至焉爾豫前在宣州君以詩來思致清邁恨不即投印綬從君煙霞之表既歸君好日以怡詩日以張大於是蓋年五十三矣乃孟夏一日過豫極論當世事抑揚不少挫詰旦報曰君痰厥逝矣豫駭亟視之不復可為哭失聲狂三日不能止非豫為然凡與君交者談君輒揮涕里之人不問倪旄嘆傷如出一口噫可人在天地間鬼神所忌邪君長身五尺餘堅壯耐寒暑鬚髮如􅃮性落魄不問家事家才三四口粗了伏臘不為求􅑿有錢輒不惜雞黍送客無虛日朋友有無相通急難於我乎赴平生於人無諾責鄉人有為芥蒂君一語輒化有不善開譬之無以為望和氣薰浹蒸然善鄰一歲半為四方客主君者所至投轄惟恐亟去雖兒童僕厮無不誠愛君者君破崖岸削邉幅不為拘拘孑孑至道理所在確然守之不變其執喪為孝子按喪禮門內不入緇黃一子二姪命以先疇瓜分而三無􅑿縮薄厚子曰敢不共命姪曰敢固辭一家興仁興遜鄉曲相傳為盛門非好德疇至是君始祖邽長沙人為吉州長史家于西昌之九洲十世祖德逺徙廬陵富川君之三世曰文煥子玉邦賢妣鄒氏娶張氏子男梓女淑容適彭天麟卜以次年咸淳癸酉十一月壬辰封于淳化鄉扶竹坑楓樹搪之原君名澄定伯字也自號前村有詩集自編曰前村𥘉稿君詩不為深苦而清拔雄健如其為人有子能力學不墜義方君死何憾豫所憾者君死獨何蚤泣而為之銘銘曰其堅也驟折其徑也蚤摧命之臧凶匪繫其材生也逹死也何怛君墓我銘我心則結王推官母仇氏墓志銘東廬王先生母垂葬命其門人文某銘噫某何以銘先生之母之墓哉乃景定三祀進士䇿御前某以覆校待罪殿廬一日𥘉考官第一卷擬上一覽某稍細復之傳觀同官驚訝得人㑹一字近廟中嫌名某以才難白詳定官請所以處臨軒之日賜出身乃吾東廬先生也嗚呼使先生以名第取先天下歸拜母堂上斷機調熊庶幾夙昔乃纍先生以不釋乎此某其何以銘先生之母之墓哉雖然事孰為大事親為大守孰為大守身為大使先生失身為親憂雖髙科如之何先生雖不得髙科為臣忠為子孝身在焉親固榮也諗先生曰然銘無所辭銘曰母性仇氏世居廬陵之白沙考諱彥誠生二十二年歸于贈迪功郎致政君諱化權逮事姑兩世左右無違祭葬以禮相夫子貞調娛中和靡失節度子始就學篝燈夜分督厲吟諷及負笈從師端以上手自紉綴連寒暑彌不倦以子入大學甲寅明禋封孺人從子赴永州戶曹祿飬夀康稱其命服咸淳七年三月十九日終于家年八十有三子二長大琮先孺人一年卒次國望從政郎前袁州軍事推官女四一夭二適李穆之三適蕭應祥四適劉起岩二與四先卒孫六男長困餘未名五女長適劉煥次許彭麟餘幼九年三月壬申厝于城西黃膄山之原是為銘贈承事郎徐溪莊墓志銘咸淳九年夏六月壬午朔天子親擢徐君卿孫為監察御史旌縣最也於是某不佞適叨一節按部湖右親見衡山之父老子弟歌思遺愛餘績於嶽雲湘波間皆曰徐公字我民六年我父母之其敢忘及聞聖天子所以褒擢選表又皆手額距踊為朝端賀為天下賀某退以語客曰麟仲信才且賢何以得此於邑之人去而不忘如此哉木則有本水則有源若靈芝俄現醴泉滃出居然瑞世其鍾和孕秀豈伊一夕之積盍相與論其世可乎客曰徐氏居清江於廬陵東西家御史君之考曰溪莊公溪莊公厚德人也余聞而心識之亡何麟仲自京以書走湘抵某曰卿孫不夭生而二十有五年而先妣即世又五年先人棄其孤露濡霜降於今二十有五年祿飬弗可及也欲報之德罔極奈何今不肖孤藉先人之教有位于朝乃去秋九月天子有事於明堂推錫類恩我先考妣實該𥘉贈惟先世之志行事治未有以詔子孫傳無窮敢稽䫙下拜以請某發書愴然念所見聞不謬因不果辭乃托御史君所撰行𫐠而書之徐氏祖伯翳宗偃王偃王子孫散處徐楊二州間江右之徐以南州髙士重其後泝豫章而上今家清江縣崇學鄉之檀溪溪莊公諱森字壽叔曽祖諱徹祖諱源皆隱而能詩考諱大經桂山謝公題其所居曰溪雲小隱里人因稱為溪雲先生溪雲性嚴介家人嗃嗃然好客車轍滿門溪莊天分寬平春和玉溫撰杖屨侍琴瑟書冊左右色飬無違族居千指融融怡怡無一間言少遊鄉校文聲籍甚嘉定丙子待試成均繼以詞賦為郡諸生第一士論翕然中年幹蠱用譽晚謝場屋益雅淡謙謹疏戚一致未嘗言人過失其尊尊親親賢賢老老幼幼無不得其歡故鄉里逺近一以吉德厚善歸之而徐為德門矣淳祐壬子得末疾越五年殁實寶祐丙辰十二月三日也享年六十有七妃熊氏豐城著姓既歸奉尊章相夫子主饋治家延師教子賔嘉喪祭常黽勉有亡間必如禮乃止有昔人剪髻斷機風子男二稚孫先七年卒女二適黃一鶚鄭一䕫孫男三垕震必茂震亦早卒女二曾孫男二以開慶巳未十二月奉二柩合葬于所居之西園嗚呼家之將興非必其先世有竒節異事足以聳動流俗耳目也風流篤厚之意多孝友睦姻之味長君子長者之澤有餘而不盡所謂有是父有是子或曰非此母不生此子者非偶然也徐氏之澤始基於溪雲浸大於溪莊今御史君玉立山峙川增日起由邑最結主知歲中三遷遂陟臺端為國綱紀駸駸且大任少頃暇之瀧岡之阡何患不表顧墓上之刻不鄙以余屬余其敢不銘諸以昭徐氏德盛流光之懿以對揚天子之休命銘曰江西徐宗宗處士介臨洪間蓋其徙䆄溪源委深且長溪雲為父溪莊子溪莊恂恂允誠篤溫兮如玉天鍾美融為瑞芝溢為體積慶綿綿開御史朝為卓魯暮汲魏公朝旌擢清風起西阡雖舊命則新我銘宰上材可梓立身揚顯殊未巳木杪龜趺此其始蕭明允墓志銘君𥘉名堅字子固後改應新字明允廬陵珠川人廬陵故多蕭氏而珠川亦望族君拔起其間自幼岐嶷長益嶄絶種績文學額額與逢掖爭鳴三赴天子學鋭不少衰氣岸孤聳與人棘棘不阿號其讀書室曰介林嘗謂吾幸守先人廬弗克規拓是不肯堂構樓其前曰逼雲復出其旁相我攸宇通之為園花竹橫從朋賔嘨歌修然有物表之趣㑹豫釣逰荒間位置水石君時一造沛然若自得豫以是知君所自負翹如也咸淳二年十二月九日以疾終年四十六曾祖炳文祖國老父景伯妣李氏繼毋曾氏妃劉氏男曰宋翁女曰淑慧淑慈淑懿皆幼卜以四年正月八日歸于淳化鄉王田雙園之原前期某弟至與其孤造門以銘請銘曰嗟豫介林兮孑孑而無成大輿之壯兮羌中道而折衡意衣冠之雖葬兮不能葬其英英瞻雲山之莾蒼兮尚骯􅗣之如生觀察支使蕭從事墓志德安府觀察支使蕭君安中中大夫江南西路安撫副使兼知吉州諱逢辰第二子撫使公發聞顯庸克開厥家於時為巨人長德自其宗族鄰里鄉黨待公而舉火者百數十家咸淳四年六月不幸公捐館君於是年四十有五矣持抱孤姪臨喪如不勝至經紀其家上下調娛是似是續罔有越厥度哭撫使公者繼于門哭巳則私相語曰我公未遽亡乎迄服除如其𥘉邦人士莫不嘉君之志而嗟嘆感發以為撫使公之有子云君字和仲號介軒儼然端重人也喜讀書為文辭倜儻有才氣在膝下幹蠱服勤左右無違及論世事有奮然自樹立事功之意咸淳十二年領江西漕舉寶祐二年以恩授登仕郎後三年銓試第一授修職郎袁州宜春縣主簿開慶元年以撫使公兼鄉郡奏充書寫機宜文字明年改注壽昌軍武昌縣主簿景定五年取舉江西漕咸淳改元循從事郎授支使自吕武公以下舉關升三員親民四員六年十月以疾卒于正寢乃卜葬於永豐百蛟之原朝奉郎文天祥以其子元永哭請銘為之銘語曰三年無改於父之道可謂孝矣嗚呼蕭君克蹈聖言雖不得祿與不得年見於先人無忝爾生有子有孫以莫不承祭文祭歐陽巽齊先生維歲次癸酉正月乙卯朔越七日辛酉學生具位文某謹致祭於故先生殿講大著刑部巽齊歐陽公棺前嗚呼先生將安歸邪先生之學如布帛菽粟求為有益於世用而不為髙談虛語以自標榜於一時先生之文如水之有源如木之有本與人臣言依於忠與人子言依於孝不為曼衍而支離先生之心其真如赤子寧使人謂我迂寧使人謂我可欺先生之德其慈如父母常恐一人寒常恐一人饑而寧使我無卓錐其與人也如和風之著物如醇醴之醉人及其義形於色如秋霜夏日有不可犯之威其為性也如槃水之靜如珮玉之徐及其赴人之急如雷霆風雨互發而交馳其持身也如履氷如奉盈如處子之自潔及其為人也發於誠心摧山嶽沮金石雖謗興毀來而不悔其所為天子以為賢縉紳以為善類海內以為名儒而學者以為師鳯翔千仞遙增擊而去之奈何一蹶而不復支以先生仁人之心而不及試一郡以行其惠愛以先生作者之文而不及登兩制以倣佛乎盤誥之遺以先生之論議而不及與聞國家之大政令以先生之學術而不及朝夕左右獻納而論思抑童而習之白紛如也雖孔孟聖且賢猶不免與世而差池先生官二著不為小年六十五不為夭有子有孫而又何憾於斯死而死耳所以不死者其文在名山大川詔百世而奚疑某弱冠登先生之門先生愛某如子弟某事先生如執經蓋有年于兹先生與他人言或終日不當意至某雖拂意逆志莫不為之解頥世有從師於千里尚友於異代而同人于門適相值而不違其死也哀斯文之不幸吊生民之無祿其葬也隻雞斗飯竊慕古人之義匍匐奔走泫然而哭吾私嗚呼巳而巳而哀哉尚享祭都承胡石壁文嗚呼世婉孌以偷生公指九天以為正也人巵蠟以自矜公玉雪而不曜明也俗鬼域以誑人於冥冥公揭日月而撑雷霆也石壁之鋒神入天出金鐡可摧孰為公直石壁之藴尊華賤質泰華可移孰為公筆四海一雲我卷我舒大川獨航豫紼豫纚萬微未燭吾蓍吾龜更幾千百載之祝融而復為此竒嗟乎余乎登門何晚哭野何遽操几杖兮焉從持佩玦兮何所紛雲委兮川流化經綸兮為土羌蘭艾兮荃茨蹇離騷兮宿莾苟余情乎得當質九京兮千古余有言兮孰聞寄浪浪兮雕爼祭郭正言閶維公拔起海隅有志天下處膩如氷知德者寡鳯音冥冥朝光作之烏臺峩峩霜氣薄之公遷諌坡歲月幾何白首丹心之死靡他吁嗟人生死見真實如公一節天地可質神卑東返返于五羊曲江吾師菊老未亡不愧二賢公可千古為酌廉泉一涕如雨祭道州徐守宗斗溫州人文武兩科嗚呼龍虎變化兮人物之英風霆流行兮宇之名天下之嗇兮一州之􅑿三年而一日兮侯度是程及召驛之垂駕兮胡疢之嬰沒而可食於南邦兮憂民憂國之誠某交誼兮雲仍王事兮弟兄樂莫樂兮知心悲莫悲兮余哭之㷀㷀下神與兮臨蒸桂棹兮積雪斫氷操弧矢兮上征絶虎虺兮縱橫噫至人兮無死歆余奠兮如生祭鄒主簿寧縣嗚呼德元少吾三歲自其應門及我交際德元之賢服我以義以我為兄我胡不弟折節讀書收科入仕子簿臨武語子𥘉筮時豫赴宣亦有行事同日出戶舉觴祝子自豫汰歸子告還里雍容進趍循循唯唯士别三日刮目相視人十巳干其進未止子之復往得于吏師幕謀邑事勉焉孜孜子替巳久子歸何遲輿疾在寢忽不自持子方壯年何質之衰瞀于鬼神淫于禱祠死不相聞斂不與知殯不及夕棄禮如遺哀哀德元而至于斯弱稚惸惸青燈一婺吾甚憐子亦復何為子尚有後念無巳而吾欲匍匐哭子墓垂適有王事載驅載馳明發不寐永懷吾私寄情一奠臨文涕洟祭祕書彭止所嗚呼仲至氣和色莊如水之清如玉之剛出而瑞世麒麟鳯凰南宫第一今世歐陽方其退居深自晦藏蟬蛻衆濁視世如忘展如之人衣錦綗裳覽德斯下吾道彌章頃者刑臣再玷天綱善類相顧驚疑倣徨君首丐去其氣昻昻聞者為奮進言始昌貽書司諌陳義慨慷表表愈偉于歐有光我年視君匪鴈其行第也同年居也同鄉仕也同館志也同方用折輩行腹心腎腸我之出守君酌我觴君亦有志方外翺翔王宫為師祕書為郎君雖欲去志不果償由此而升紫微玉堂道以光大亦我所望誰歟西來遽報膏肓旦旦引領巳劑其良好音不嗣我心皇皇奈何哲人竟罹于殃嗚呼仲至今也則亡如瑳如磨其孰我相凡百君子罔不䀌傷况我孔厚如我淚滂我有官守我縶我疆君疾云革莫克造床君柩來歸莫哭道傍嗟我有心遡風茫茫嗚呼仲至婉其清揚其命也短其存也長生芻一束我意其將庶幾監兹尚有洋羊嗚呼哀哉祭安撫蕭撿詳名逢辰號平林嗚呼江右之望偉哉我公驅馳白首惟孝惟忠異時廊廟謀選元戍惟公老成必在其中開慶之警四國交訌吉為樂邦飄風其衝拜公于家麾節崇崇公起倉卒談笑從容臣有一死惟義之從不敢震鄰不敢震躬事平上印訖不言功優遊里居惟以壽終鳴呼尚論公之平生兮撫蒼莾而歔欷命之通塞兮毁譽隨之議論之所從始兮惟桑梓之不可欺方淮漢之落落兮猶曰風馬牛之不相追亦既與我父兄同生死兮寧不我知天有萬分於人兮而或猶有怨咨自公之既殁兮使人方感激而追思曰何為豫室之不漂搖兮豫子之不流離思而不可作兮父老至於涕洟豈非生而有定論兮尚或接於愛憎之私死而愛憎無所麗兮忽天定其奚疑嗟乎見危臨事而不苟兮所以委質而為臣吾亦自盡乎吾心兮固非欲求知於人然自古固非抱屈於一世兮俟百世而方伸亦有百世不可俟兮聽諸天地與鬼神公死而有遺思兮斯人豈不靈是不為無所遇於當世兮尚何憾乎冥冥議論定於其鄉兮而傳之天下後世無不本諸人心禦大灾捍大患而得祀兮以不忘其德音贈以嘉有功兮諡以尊名天下有道兮天王聖明吉山之陽公魄所歸素車盈盈白馬纍纍我思古人兮斗酒隻雞尚不憚於千里兮何百里之辭即公墓兮酹酒以致哀作文以諗地下兮尚有信於方來祝文過家告廟文昔忝荆臬單車載馳家祀孔嚴曠歲弗治靡室靡家中心悵而始告廟朝是縶是維畏此簡書王事敢違悃悃再疏天髙聽卑解我湘組易贑一麾贑實近止神人具宜人豈及是神之相之載欣載奔薄言還歸千里息肩于廟矢辭代富川酹魁星文維極有斗兮垂河漢以耀芒耿衆星之環嚮兮儼黃道之開張瞻前杓之烜赫兮東枕乎龍角之蒼一水盈盈兮咫尺相望一舉手而髙摘兮搴萬丈之虹光吐竒氣於六合兮夕閬風而翊扶桑宇宙之𦦨𦦨兮其將見於吾水之涯吾山之陽擊雷鼓兮電煌煌酌金罍兮㪺天漿代酹解星文維庖人之中肯綮兮奏刀騞然若有物以默運其肘兮故利器排割而彌堅矧斯文之新發硎兮淬磨乎仁義之淵斫月桂兮髙五百丈剸蛟斷犀兮奚足言視一朝解十二牛兮直遊刃乎吾前於戲神哉使我頭角露峥嶸相我筆下生雲煙靡靈旗兮風翩翩舉天瓢兮酌天泉文山先生全集卷之十一終
