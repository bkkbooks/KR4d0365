front:
  text: 文山先生全集卷之十六别集
  hash: sha256:879b36705ef0ab04679334d24123999c94c2bb06dadbd6047eb4666daf549a13
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_016-1a}
body:
  text: 集杜詩自序余坐幽燕獄中無所為誦杜詩稍習諸所感興因其五言集為絶句久之得二百首凡吾意所欲言者子美先為代言之日玩之不置伹覺為吾詩忘其為子美詩也乃知子美非能自為詩詩句自是人情性中語煩子美道耳子美於吾隔數百年而其言語為吾用非情性同哉昔人評杜詩為詩史蓋其以詠歌之辭寓紀載之實而抑揚褒貶之意燦然於其中雖謂之史可也豫所集杜詩自余顛沛以來世變人事槩見於此矣是非有意於為詩者也後之良史尚庶幾有考焉歲上章執徐月祝犂單閼日上章協洽文天祥履善甫敘是編作於前年不自意流落餘生至今不得死也斯文固存天將誰屬嗚呼非千載心不足以語此壬午正月無日文天祥書社稷第一三百年宗廟社稷為賈似道一人所破壞哀哉南極連銅柱送李晉肅入蜀煌煌太宗業北征始謀誰其間苦熱呈陽中丞風雨秋一葉故李光弼司徒理宗度宗第二先帝弓劒逺送談二判官永懷侍芳茵送汝南郡王璡今朝漢社稷喜逹行在所為話涕沾巾送司馬入京誤國權臣第三似道喪邦之政不一而足其羈虜使開邊釁則兵連禍結之始也哀哉蒼生倚大臣送韋中丞之晉北風破南極北風開邊一何多前出塞至死難塞責吳侍御江上宅瀘州大將第四西南失大將客居帶甲滿天地送逺高人憂禍胎山寺感歎亦歔欷羌村襄陽第五十年殺氣盛北風百萬攻一城遣懷賊臣表逆節往在胡騎忽縱橫嚴公武荆湖諸戍第六長嘯下荆門春日梓州登樓湖行速如鬼塞蘆子門戶無人持水檻社稷堪流涕西閣呈元三十二黃州第七始謂虜以襄陽船自漢入江後乃知虜之未渡蘄黃巳先降故其渡也襄漢蘄黃之船皆在焉桓桓陳將軍北征東屯大江北行官張望化作虎與豹夏日歎楚星南天黑晚登瀼上堂陽羅堡第八夏貴自陽羅堡之敗順流而下沿江南岸縱兵放火歸廬州解甲當是時其心巳無國矣似道建督至江上夏貴不得已出見斬以釁鼓東南再造之機也失此不圖社稷為墟哀哉日色隱孤戍發秦州大江聲怒號大雨朝廷任猛將又上後園宿昔恨滔滔送王砅便南海京湖宣閫第九開慶巳未江陵閫帥自上而下奔救鄂渚令朱祀孫任宣閫乃自鄂渚走還嶽陽朱與夏通任長江之責一上而一下使中流蕩然虜安行入無人之境國安得不亡嗚呼痛哉正當艱難時送樊侍御漢中豈無濟時䇿遣興連檣荆州船雨悠悠回赤壁過南嶽入洞庭渡江第十常時江水風波不可狎視虜渡江時水乃鏡平豈非天哉濟江元自闊行次古城泛江輕船下吳會逄劉簿弟南紀收波瀾衡州縣呈陸宰吾將罪真宰劎門鄂州第十先時李雷奮為郡守十月以臺論罷至是無正官張宴然以城降金湯重鎮正風寒中而去正守當國者獨何心哉鄂渚分雲樹過南嶽入洞庭春城帶雨長入行軍六第宅惜哉形勝地懷鎮水居河嶽空金湯入衡州江州第十二戎馬暗天宇送魏六丈交廣落日九江流送李功曹荆州元惡迷是似入衡州化作長黃虬奉同郭給事安慶府第十三岸轉異江湖過南嶽入洞庭江水流城郭春日梓州登樓鴟梟志意滿病柏山鬼獨一腳懷台州鄭戶魯港之遁第十四巳未鄂渚之戰何勇也魯港之遁何衰也人心巳去國事瓦解當是時惟豪傑拔起首禍之權姦無救禍之理哀哉出師亦多門後出塞水陸迷畏途贈鄭十八賁蹭蹬麒麟老贈射洪李四丈危檣逐夜烏過南嶽入洞庭建康府第十五亭亭鳳凰臺鳯凰臺江城孤照日登牛頭山亭胡來滿彤宫往在驅馬一萬匹北征相陳宜中第十六魯港敗後陳宜中當國首斬殿帥韓震脅遷之議差強人意宜中實無經綸至秋託故遁歸及不得已十月再來則國事去矣哀哉蒼生起謝安宴王使君宅翠華擁吳嶽壯遊可以一木支水檻俯恐坤軸弱青陽峽召張世傑第十七京師內空賴張世傑一軍自荆湖至詔發西山將送郭中丞熊虎亘阡陌贈王思禮司空笳鼓凝皇情贈左僕射嚴武佳氣向金闕北征鎮江之戰第十八張世傑率舟師趨金山約殿帥張彥自當州陸出京口揚州兵出瓜洲三路交進同日用事既而揚州失期先出取敗常州竟不出世傑多海舟無風不能動江水平虜以水哨馬往來如飛遂以潰敗嗚呼豈非天哉海潮舶千艘送王砅使南海肉食三十萬昔遊江平不肯流陪王使君泛江到今有遺恨壯遊將相棄國第十九丙子正月十八日虜至高亭山是夜四鼓宜中逃翌日世傑逃扈聖登黃閣贈嚴八閣老大將赴朝廷草堂胡為入雲霧送髙司且閬州浩蕩乘滄溟橋陵韻呈縣官京城第二十當寧陷玉座往在兩宫棄紫薇詠懷北城悲笳發夏夜歎失涕萬人揮送盧十四弟京城二十黃屋朔風卷故祕監蘇源明園林殺氣平送郭中丞太僕宫殿青門隔送賈閣老出汝永懷丹鳳城送覃二判官陵寢第二十二五陵花滿眼别何雍霜露在草根閬州東樓冥冥子規呌法鏡寺重是古帝魂杜鵑陵寢第二十三旄頭彗紫微衡州縣呈陸宰蚩尤塞寒空奉先縣末懷愚智心盡死聽何氏歌漂蕩隨高風遣興江陵第二十四高逹京湖名將己未解圍鄂州賈似道許以建節竟不與而移以與吕文德逹怨望久矣至是為京湖制置以城降宣閫不能制城初陷朱祀孫仰藥不得死既而亦降焉聞説江陵府陜隘今又降元戎客居甲外控鳴鏑贈王司空思禮肩輿強老翁王十五前閣會淮西帥第二十五夏貴既失長江惟恐督府有成無所逃罪又恐孫虎臣以後進為將有功總統出巳上日夜幸其敗覆督府既潰歸廬州竟不出朝廷屢詔勤王若罔聞知國亡乃以淮西全境獻北為巳功焉於是貴年八十餘矣老而不死是為賊其貴之謂歟借問大將誰後出塞戰骨當速杇前出塞逆節同所歸詠懷水花笑白首送王砅使南海揚州第二十六李庭芝在揚州十餘年畏怯無逺謀惟閉門自守無救於國及景炎登極以為首相乃引兵輕出渡海南歸朱煥尋以城獻虜哀哉城峻隨天壁自帝城明來但自守潼關史士卒終倒戟贈王司空思禮仰望嗟嘆久九成宫京湖兩淮第二十七東南兵力盡在江北金城湯池國之根本高以荆州降夏以淮西降李死淮東盡失無復中原之望矣哀哉荆揚風土暖秋行官張望大城鐡不如潼關吏泰山忽破碎登慈恩塔流落隨丘墟五盤景炎擁立第二十八豫自蘇州歸闕建議出二王於閩廣及虜至二王方出宫蘇劉義陸秀夫遇二王於溫時陳宜中海船泊清嶴門諸人往邀之共圗興復益王始建元帥及張世傑自定海至同趨三山以五月一日益王登極改元景炎漢運初中興述懷扶顛待柱石入衡州疇能輔天漏寄岑參登階捧玉册往在福安府第二十九崔嵬扶桑日幽人闊會滄海潮桔柏渡傾都看黃屋送班司馬入京此意竟蕭條贈韋左丞幸海道第三十自三山登極世傑遣兵戰邵武大捷人心翕然世傑不為守國計即治海船識者於是知其陋矣至冬聞警即浮海南去天下事是以不可復為哀哉天王守大白九成宫立國自有疆前出塞舍此復何之後遊修覺寺巳具浮海航壯遊景炎賔天第三十一御舟離三山至惠州之甲子門駐焉巳而遷宫冨場丁丑冬虜舟來移次仙澳與戰得利尋望南去止碙川景炎賔天蓋戊寅四月望日也嗚呼痛哉隂風西北來北征青海天軒輊送從第亞白水暮東流新安吏魂斷蒼梧帝贈祕書監李雍祥興登極第三十二戊寅四月十七日衛王登極於碙川浮龍倚長津别蔡十四著作參錯走洲渚入衡州蒼梧雲正愁登慈恩塔初日翳復吐法鏡寺祥興第三十三六月世傑自碙川北還至崖山止焉崖山乃海中之山兩山相對延袤中一衣帶水山口如門世傑以為形勝安之南遊炎海甸送魏六丈沃野開天庭橋陵韻呈縣官真龍竟寂寞雷乾坤水上萍衡州送李大夫祥興第三十四己卯正月十三日虜舟直造崖山世傑不守山門作一字陳以待之虜入山門作長蛇陳對之二月六日虜乘潮進攻半日而破死溺者數萬人哀哉弧矢暗江海草堂百萬化為魚潼關吏帝子留遺恨過南嶽入洞庭故園莾丘墟逃難祥興第三十五世傑於戰敗後乘霧雨晦冥以數舟遁去朱崖雲日高遣過風浪無晨暮懷台州鄭司戶冥冥翠龍駕雨今復在何許宿清溪驛祥興第三十六𥘉行朝有船千餘艘內大船極多張元帥大小船五百而二百舟失道久而不至北人乍登舟嘔暈執弓矢不支待又水道生踈舟工進退失據使虜初至行朝乘其未集擊之蔑不勝矣行朝依山作一字陳幫縳不可復動於是不可以攻人而專受攻矣先是行朝以遊舟數出得小捷他船皆閩浙水手其心莫不欲南向若南船摧鋒直前閩浙水手在北舟中必為變則有盡殱之理惜世傑不知合變專守法嗚呼豈非天哉六龍忽蹉跎别唐十五誡川廣不可泝送汝陽王璡東風吹春水送程録事乾坤莾回互懷台州鄭司戶祥興第三十七幽燕盛用武昔遊六合巳一家後出塞眼穿當落日喜逹行在滄海有靈查喜晴祥興第三十八客從南𬈑來客從黃屋今在否留别張使君天高無消息幽人未忍即開口𫐠懷祥興第三十九南嶽配朱烏望北地軸為之翻晦日尋崔戢皇網未為絶北征雲臺誰再論覽柏中丞官制陳宜中第四十丁丑冬御舟自謝女峽歸碙川陳宜中船相失莫知所之管葛本時須别張十二建封經綸中興業述古有志乘鯨鰲送王砅使南海南紀阻歸楫贈李光弼張世傑第四十一世傑得士卒云每言北方不可信故無降志閩之再造實賴其力然其人無逺志擁重兵厚資惟務遠遁卒以喪敗哀哉南國卷雲水舟中苦熱黃金傾有無遣懷蛟龍亦狼狽溪漲反復乃須臾草堂張世傑第四十二長風駕高浪龍門偃蹇龍虎姿病柏蕭條猶在否止水遣懷寒日出霧遲早發射洪蘇劉義第四十三蘇京湖老將雖出吕氏乃心專在王室永嘉推戴實建大功後世傑用事志鬱鬱不得展其人剛躁不可近然能服義終始不失大節崖山與其子俱得脫亦不知所終驊騮事天子送高司直龍怒拔老湫送韋十六評事鼓枻視青旻寄薛三郎中烈風無時休登慈恩塔曽淵子第四十四曽淵子元貶雷州御舟南巡復與政事崖山之敗曽欲赴水為蘇父子所留同得脫其家竟沒虜後還五羊有人見其子雷郎者焉哀哉子負經濟才别唐十五鬱陶抱長䇿始華陽吕少府安得萬里風夏夜歎南圗回羽翮送嚴公入朝江丞相萬里第四十五先生居饒州虜入城先生投府第中池水死其弟萬頃於廳事上𬒳執殺死哀哉星折台衡地送蘇州李長史斯文去矣休送王信州崖北湖光與天逺過洞庭屈注滄江流奉同郭給事趙倅昴發第四十六虜至池州倅昴發蜀人夫婦自經死風雷颯萬里大雨大江動我前水會渡青襟一憔悴衡州縣學名與日月懸陳拾遺故宅將軍王安節第四十七常州敗虜生獲王安節不屈而死虜謂過江以來武人忠義者惟王安節一人安節乃節度使王堅子也激烈傷雄才金華山觀直氣橫乾坤别李義惆悵汙血駒別張建封見此忠孝門柏中丞降官制李安撫芾第四十八肯齋先生蜀人寓居衡陽乙亥留夢炎為潭帥夢炎歸相始起先生為代先生倉卒運掉城守甚備及城陷先生殺其家人乃自焚死哀哉殺氣吹沅湘入衡州高興激荆衡李八判官城中賢府主課伐木千秋萬歲名夢李白李制置庭芝第四十九庭芝得爰立之命引兵至泰州為虜所困泰州孫九賣城庭芝𬒳執誅於揚州市雖無功於國一死為不負國矣空留玉帳衛送嚴公那免白頭翁陪章留後死者長巳矣石壕吏淮海生清風送高司直薑都統才第五十淮東猛將揚州前後主戰皆其人也及泰州破𬒳執虜愛其才勇啖以官爵不肯降罵諸負國者臨刑含血以噴罵虜不絶口其英風義烈淮人言之無不傷歎惜哉屹然強冠敵贈王司空古人重守邊後出塞惜哉功名忤薛大保死亦垂千年義鶻張制置珏第五十一蜀之健將元與咱萬壽齊名咱降張獨不降行朝擢授制閫未知得拜命否蜀雖糜碎珏竟不降為左右所賣珏覺而逃遁𬒳囚鎖入北不肯屈後不知如何氣敵萬人將楊監畫鷹獨在天一隅遣懷向使國不忙九成宫功業竟何如别張建封陸樞密秀夫第五十二字君實文筆英妙自維揚幕入朝京師陷永嘉推戴有力及駐崖山兼宰相凡朝廷事皆秀夫潤色綱紀之崖山陷與全家赴水死哀哉文彩珊瑚鈎奉同郭給事淑氣含公鼎張九齡炯炯一心在嚴武天水相與永渼陜西南臺勤王第五十三甲戌冬詔天下勤王豫守章貢首應詔意同志者當接踵而奮已而竟無應者豫遂以孤軍赴闕世事不濟殆由於此哀哉出師亘長雲後出塞盡驅詣闕下往在首唱恢大義衡州縣學垂之俟來者蘇源明蘇州第五十四豫領兵赴闕時陳宜中歸永嘉留丞相夢炎當國夢炎意不相樂出豫以制閫守吳門尋以獨松事急陳丞相留丞相陳樞密文龍連書趣還宿衛豫不得已行未幾姑蘇陷哀哉嵯峨閶門北北遊朱旗散廣川餞裴二端控帶莾悠悠送韋十六評事慘淡陵風煙草堂拜相第五十五豫自吳門還遣守獨松戍餘杭丙子正月初二日除知臨安府辭不拜引輕兵至闕陳大義不得見十八夜宜中逃次日早子除樞密使午拜丞相樞密使都督諸路軍馬然事巳無及無可奈何矣豫不敢當亡國之名請有危難捐軀而已我來屬時危九成宫朝野色枯稿送長孫待御倚君金華省張九齡不在相逢早贈射洪李四丈出使第五十六初宜中蒙蔽外庭如遣使北軍求議和約見伯顔於長安堰已而不如約故虜徑至高亭山要以相見宜中遂逃上下皆莫知其詳豫既辭相印不拜遂奉上命以議和為名在虜營虜強以降余見伯顔開陳大義詞氣慷慨虜頗傾動尋留不遣而丞相吳堅右丞賈餘慶同知樞密院謝堂以下竟自納欵余責伯顔留使失信及數虜罪惡以死自誓而一無所及矣痛哉隔河見胡騎前出塞朝進東門營後出塞皇皇使臣體寄崔部事詞氣浩縱橫春陵行發京師第五十七自國都失守應降表及行下省札播告歸附皆不敢使余聞知豫居虜中欲求速死虜衛守甚嚴務為塗塞耳目二月八日大臣吳堅賈餘慶家鉉翁劉岊皆以祈請使為名下船詣北庭虜忽驅余並行余不肯往𬒳其捽迫不得巳行至謝村幾逃去東下姑蘇臺壯遊揮涕戀行在北征蒼茫雲霧浮發秦州風帆倚翠蓋凼人去鎮江第五十八余至京口北行有日矣余欲引決同行士杜滸曰且逃逃不獲死未晚也遂謀走真州時江中皆北船偶物色一空船在虜籍外捐重資約之二月晦日夕一更後豫約同行十一人潛出邸挾刃自隨不濟則自殺幸而安行無虞遂泝流而上虜船綿亘江上幾不得出三月朔抵真州今而後喜可知也京口渡江航送許八十遺窮途仗神道送魏六丈蕭條向水陸入衡州雲雨白浩浩送長孫侍御至真州第五十九余至真州登城四望徘徊感歎守苗再成慷慨有志略聞余言踴躍思奮余即作書報制閫李庭芝及約淮西夏貴又作諸州太守書約以興復苗守遣人四出導意兩日久與余講進取方略使天命再宋是行也中興之機也一人狐疑事乃大繆惜哉萬里長江邊送高司直去國同王􅙾蓬泉驛青山意不盡上牛頭寺皇天照嗟嘆舟中苦熱行淮東第六十李庭芝聞余至真州以為來説城遣使數十輩來涖殺豫苗再成不肯然不得不出豫以自白以上巳日紿余出城門閉城不答余欲赴濠死未幾苗遣五十人送行行五十里布刃於野詰問甚久使一語可疑即為草間血矣其人信余言為之歎惋送至州境夜至揚州西門欲扣城入前却𢾗四四人逃去余與七人走荒野空屋中是日虜萬騎自屋後過幸而苟免自是變姓名趨高郵初五夜行屢迷失道且虜哨各鳥獸竄伏縳去一人殺傷一人又幸喜脫余時日夜在死亡中驚惴危懼飢餓無聊人生逆境有如此者哀哉客子中夜發赴奉先縣月照白水山彭衙行悲辛但狂顧懷鄭十八戶處浩蕩前後間清溪自淮歸浙東第六十一余高郵道中遇哨得脫行數十里匍匐不能行幸遇村夫雇倩籮擡入郡又有𬒳傷者扶持強行血衣淋漓見者傷惜初七日至郡地分官盤詰甚至稱制置司有報文丞相來説城合一路覺察不納南來人余等既變姓名地分官見有傷者不疑聽下船去沿途歷盡艱險得至泰州城下伏十餘日趨通州自下船後哨騎或隔五里或隔十里驚惶連日逹通州城反覆詰問𢾗日不納不得已從地分官吐實語太守楊思復遂得覆護主圃子內大舟中然後以海舟送歸浙東船中遇風波屢覆又遇賊追逼數四是行寄一生於萬死不復望見天日至永嘉惟存六人北走驚險難彭衙行十步一回首相從歌碧海吹衣裳又上後園山腳挂席上南斗别張使君至福安第六十二益王以天下兵馬都無帥衛王以副元帥建號於永嘉隨趨三山開府豫四月八日到永嘉則元帥舟去巳一月矣亟使副守李珏驛報行府陳丞相即遣人來議擁立事余深贊大議五月一日登極豫以觀文殿學士侍讀召赴行在二十六日至行都即再相然國方草創陳宜中尸其事專制於張世傑余名宰相徒取充位遂不敢拜議出督握節漢臣回鄭駙馬麻鞋見天子述懷感激動四極嚴武壯士淚如雨聽楊氏歌福安宰相第六十三余至通州地分官以制置司文移為説甚作難阻余不得已吐實以通楊帥守思復乃云諜報許浦有馬根尋文丞相甚信余言不直制司豫然後得楊守存恤遂遵南歸及過明州東門有列岸數百艘初不知為虜把隘船也後問之東門道士云是目虜頭目見船過聞左右曰此何船皆以漁舟對遂得善去嗚呼危哉楊守為余言欲得海船數百艘當約許帥文德擁兵勤王慨然有誓清之志豫至永嘉即詳報陳丞相不以為信乃遣毛浚之通州而不以告余浚至通州守間豫何以無書遂發怒浚幾不免浚出而通遂降虜矣惜哉紛然喪亂際柏中允制反覆歸聖朝鄭虔秉鈞孰為偶贈李八判官扶顛永蕭條李光弼南劒州督第六十四始余至永嘉留一月候命永嘉及台處豪傑皆來自獻願從海道作戰守規模豫至福安欲還永嘉謀進取廟謨不以為然遂議開督于廣廣陷乃出南劒開府聚兵財為收復江西計于時幕府選辟皆一時名士宜中既棄臨安及三山登極欲倚世傑復浙東西以自洗濯所以阻豫永嘉之行後取定海兵敗李珏為制閫衆方思用豫悔巳不及惜哉劒外春天逺送班司馬入京江閣鄰石靣蕳嚴雲幕府盛才賢次古城店意氣今誰見白馬汀州第六十五豫在劒朝廷嚴趣之汀十月行十一月至汀州而福安隨陷車駕幸海道矣事會之不齊如此哀哉雷霆走精鋭送樊侍御斧鉞下青冥送李大夫江城今夜客出郭慘淡飛雲汀薛判官梅州第六十六豫至汀汀守可疑汀兵非素所拊循寇兵自贑自劒交至丁丑正月行府遂引兵趨漳州龍巖謀入衛漳潮道阻三月入梅州時麾下頗不循法斬二都統軍政一新焉樓角凌風逈東樓孤城隱霧深野望萬事隨轉燭佳人秋光近青岑伐木贑州第六十七五月引兵自梅出嶺時贑吉兵皆來會六月大捷於雩都進攻興國縣縣返正於是駐屯遣大兵攻贑州又以偏師出吉州贑諸縣皆復虜號令惟行於城中吉水永豐萬安永新龍泉以次皆復臨洪袁瑞莫不響應詣軍門請約束者相繼興國黃州新復皆來請命汀州有偽天子黃從斬首至府上下翕合氣勢甚盛天若祚宋則是舉也幸而一捷國事垂成之候也崆洞殺氣黑壯遊灑血暗郊垌薛判官哀笳曉幽咽留花門石壁斷空青西閣江西第六十八行府偏師出吉州者戰于鍾步不利攻贑兵不幸相繼而敗行府孤立時處置安撫鄒􅘶聚兵數萬在永豐境行府引兵就之會其軍亦潰而虜自後追及不可支雖人謀之不臧殆天意之未順每一念此氣殪欲絶哀哉東望西江永第觀高義在雲臺建封到今用鉞地草堂霜鴻有餘哀金華山江西第六十九旄頭初俶優將適江陵義士皆痛憤草堂乾坤空峥嶸畫鶻嚮者留遺恨空靈岸復入廣第七十行府敗於江西收散兵復入汀尋出會昌入安逺趨循州是冬屯南嶺戊寅二月出惠州海豐縣駐於麗江涌遍遣間使沿海訪問車駕六月翠華至崖山行府移船澳八月進少保信國公職任依舊行府欲赴闕張世傑阻隔於中不果行東浮滄海漘薛郎中南為祝融客詠懷漂轉混泥沙柴門迫此短景急龍門駐惠境第七十一朱鳯日威垂北風羅浮展衰步詠懷北風吹蒹葭秋行官張望送此齒髮暮雨駐潮陽第七十二十月引兵趨朝陽稍平群盜人心翕然寒城朝煙淡吳侍御宅江沫擁春沙逺遊群盜亂射虎雷回首白日斜熹晴同府之敗第七十三十一月諜報虜大衆至漳泉度勢不敵移屯將趨海豐為虜騎追及於中道時行巳數日不為備倉卒潰散遂𬒳執送兵五千人北征散足盡兩靡種萵苣留滯一老翁雨蓋棺事則巳奉先縣行府之敗第七十四自國難後行府白手起兵展轉患難東南跋涉萬餘里事不幸不濟然臣子盡心焉爾矣成敗天也獨奈何哉翠蓋蒙塵飛詠懷仗鉞奮忠烈北征千秋滄海南張九齡事與雲水白王思禮南海第七十五今𬒳執後即服腦子約二兩昏眩久之竟不能死及至張元帥所衆脅之跪拜誓死不屈張遂以客禮見尋置海船中守護甚謹至崖山令作書招張世傑手寫詩一首復命末句云人生自古誰無死留取聲名照漢青張不強而止崖山之敗親所目擊痛苦酷罰無以勝堪時日夕謀陷海而防閉不可出矣失此一死困苦至於今日可勝恨哉開帆駕洪濤遣遇血戰乾坤赤送李判官風雨聞號呼草堂流涕灑丹極别蔡著作南海第七十六南海春天外送假功曹秪應學水仙舟中自傷遲暮眼寓目為我一澘然李使君至廣州第七十七自崖山至五羊壯哉郡真形勝之國也往年虜平其城收復後不能完整為守國計哀哉吾國之無人乎南方瘴癘地雷白馬東北來白馬長城掃遺堞李弼淚落強徘徊鄭附馬樓臺至南安軍第七十八豫四月二十二日離五羊五月四日出梅嶺至南安軍錀置舟中豫不食擬至虜陵得瞑日庶幾首丘之義云短日行梅嶺哭李常侍天門鬱嵯峨别唐誡江西萬里船春夜留宴歸期無奈何何將軍山林過章貢第七十九崆洞地無軸送從弟亞江山雲霧昏别李茂萍漂忍流涕入行軍六弟宅故里但空存後出塞至吉州第八十挂帆逺色外雨𬗟邈懷舊丘破船江水風蕭蕭桔柏渡烏啼滿城頭發秦州吉州第八十一泊舟滄江岸課伐木身輕一鳥過送蔡師魯請為父老歌羌村歌長擊樽破屏迹吉州第八十二戚戚去故里前出塞我生苦飄零通泉驛回身視緑野送李校書伹見西嶺青揚旗過臨江第八十三自離南安軍五日而至廬陵七日過臨江八日至豐城余雖不食未見其殆衆以飲食交相逼迫豫念既過鄉州巳失初望委命荒濵立節不白且聞暫止金陵郡出坎之會或者有隕自天未可知也遂復飮食勉徇衆情初衆議以豫漸殆欲行無禮掩鼻以灌粥酪至是遂止乃知夷齊之心事由其獨處荒山故得行其志耳獨帆如飛鳴贈蘇傒清江轉山急早發射洪回首白雲多何將軍山林山寒夜中泣龍門鎮過隆興第八十四隆興自陷沒後忠義奮起幾於返正屠滅殆盡過而傷之臨江久徘徊山寺再讀徐孺碑張九齡交遊颯向盡餞裴二端公到今耆舊悲病橘江行第八十五畏途隨長江白沙渡萬里滄茫水憶鄭南玭遊子去日長成都壯心不肯巳戲贈友江行第八十六江水東流去陪王侍御宴浮雲終日行夢李白别離經死地鄭附馬池飮啄愧殘生草堂江行第八十七蕭蕭白揚路李雍死人積如丘遣興大江東流去成都蒼山旌斾愁韋評事江行第八十八連山暗烽燧送從第亞川谷血橫流送樊侍御揮泪臨大江送韋諷上有行雲愁遣興江行第八十九六月六日過隆興十二日至金陵囚邸八月二十三日渡江北行事會多有可慨尚何言哉朔風飄胡鴈遣興江城帶素月聽楊氏歌安得覆八𬈑客居滂泥洗吳越喜雨北行第九十八月二十六日至揚州九月初一日哭母小祥於邳門外初九日至徐州弔項羽故宫地登黃樓臺讀子由賦十二日至沛縣縣有歌風臺十五日至東平府十七日至高唐州十八日過平原二十日至河間府二十一日至保定府浮雲暮南征前出塞我馬向比嘶日沙渡荆棘暗長原園官送萊子規晝夜啼客居北行第九十一清秋望不極野望中原杳茫茫成都遊子悵寂寥桔柏渡下馬古戰場遣興北行第九十二浮雲連海岱兖州城樓寒蕪際碣石昔遊落景惜登臨杜侍御江樓人煙渺蕭瑟北征北行第九十三平野入青徐兖州城樓桑柘葉如雨昔遊信美無所適成都沉思情延佇雨北行第九十四乾坤幾反覆蘇侍御渙乘凌惜俄頃渼陂西南臺懷古視平蕪遣懷令人發深省奉先寺北行第九十五遊子無根株贈李四文世梗悲路澀送程録事關山雪邊看秋行官張望愁思胡笳夕喜逹行在所至燕城第九十六十月一日至燕城越五日送千戶所枷禁十一月初一日蘇枷初九日領赴北庭引問余不跪抗詞不屈尋復還獄待死以至今日云往在西京時往在胡星墜燕地别唐誠登臨意惘然登惠義千秋一拭淚酬薛判官至燕城第九十七浩蕩想幽冀夏日歎行行郡國遙野望天寒落萬里遣興回首向風颷至燕城第九十八百年不敢料龍門閣先後無醜好遣興絶境與誰同送裴二飄泊南庭老舟中入獄第九十九隂房鬼火青玉華宫白日亦寂寞昔遊自非曠士懷登慈恩塔居人莾牢落送樊侍御入獄第一百天黑閉春院大雲寺今如罝中兔懷鄭司戶人間夜寥閴夜聽許十誦許永日不可暮夏夜歎入獄第一百一行行見羈束寫懷斯人獨憔悴夢李白欲覺聞晨鍾遊奉先寺青燈死分翳宿鑿石浦入獄第百二勞生共乾坤寫懷何時有終極别贊上人燈影照無睡大雲寺今夕復何夕贈衛公處士入獄第一百三眼前列杻械草堂熊挂玄蛇吼上水遣懷夜看豐城氣詠懷朝光入甕牗晦月入獄第一百四徘徊虎穴上寄贊上人吾道正羈束觀水漲落日將何如宴歷下亭清文動哀玉别薛判官懷舊第一百五自百五至百九皆懷念故人為王事而沒者固多不能盡紀嗚呼哀哉自百二十六至百三十八皆師友之際同列之情死生契闊不能自已也風塵淹白日寄第五弟乾坤霾漲海將適江陵為我問故人送高司直離别今誰在懷灞上遊懷舊第一百六天寒昏無日石龕故鄉不可思赤思訪舊半為鬼贈衛處士慘慘中腸悲送方書記懷舊第一百七故園花自彂憶弟無復故人來昔遊亂離朋友盡遣懷幽珮為誰哀雨懷舊第一百八故人入我夢夢李白相視涕闌干彭衙行四海一塗炭逃難焉用身獨完垂老別懷舊第一百九中夜懷朋友宿清溪驛百年見存沒鄭公虔風吹蒼江樹雨寒月照白骨北征金應第一百一十承信郎路分金應元備筆扎使令性剛知義隨勤王入京余陷虜左右星散惟應無叛去志在鎮江得同脫狼狽淮東備嘗艱苦至通州以憂鬱病死葬城下哀哉追隨三十載送顧文學艱難愧深情羌材何處埋爾骨鹿頭山呼號傍孤城懷鄭司戶張雲第一百一十一路鈐張雲元吉州敢勇將官隨閫勤王余既陷虜張雲引兵自婺建劒汀歸里虜巳據吉城雲不勝憤七月引所部襲虜於南柵門擊殺甚衆本為散退之計會天明戰渴赴江飲水尋𬒳衝溺死使能少忍當為吾用哀哉痛憤寄所宣義鶻四方服勇決北征壯士斂精魂客居里巷猶嗚咽赴奉先縣劉欽貢元第一百一十二字敬德吉州貢士素有志氣好功名上下今古健於議論余開府汀城敬德來寧都就招諭使鄒􅘶會虜暴至竟死亂兵中同時死者鞠華叔顔斯立顔起巖皆郡之英俊能為時立事功者天生人才若此曽未施一技速折乃爾哀哉文章日自負蘇公源明去家死路傍上後園山腳高視見霸王劒門感子故意長贈衛處士吕武第一百一十三環衛官吕武太平人靣旗為軍余陷虜應募隨從北行其人徑烈靣折人觸忌諱不避然忠鯁人皆服之余與同脫鎮江行淮東患難中賴以自壯及開府南劒遣其結約江淮道尋阻武間關數千里即余於汀梅挺身寇寨化賊為兵方將將數千人出江西以無禮於士大夫遭橫逆死死之日一軍為流涕哀哉疾惡懷剛腸壯遊世人皆欲殺不見魂魄猶正直南池回首肺肝熱鐡堂鞏宣使信第一百一十四團練使都統招諭使鞏信荆湖老將沉勇有謀奉朝命引所部隨府豫自興國趨永豐虜追在後於東固方石嶺下失戰信據險堅立不動中數箭死土人葬之如生尋奏贈清逺軍承宣使立廟戰所而迄未有以慰忠魂也哀哉壯士血相視嚴公武斯人巳云亡楊監草書圗哀哀失木狖吳侍郎江上宅夜深經戰場北征張祕撰汴第一百一十五祕閣修撰廣東提舉督府參謀張汴蜀人嘗為二吳客佐荆湖幕習兵事豫自贑勤王汴即入幕開督後領袖一府知無不為空坑之敗祕撰易軍士皂衣伏草中死亂兵後鄒處置得其尸棺斂焉哀哉入幕旌旗動别魏侍郎揮翰綺繡揚汝陽王璡煙霧蒙玉質赴奉先縣斯人今則亡遣興繆朝宗第一百一十六環衛官知梅州繆朝宗淮人有意氣嘗為常熟邠氏客從余於平江豫歸福安自婺間道來相從精練幹實孜孜奉公軍府器械悉出其手空坑之敗自經於山間哀哉空荒咆熊羆課伐木摧殘沒藜莠枯棲平生江海心破船其人骨巳杇喜晴閩三士第一百一十七督機祕書謝𣏌督幹架閣許由督幹架閣李幼節閩士之秀皆登科𣏌太學名士空坑之敗不知所終哀哉俊逸鮑參軍憶李白優遊謝康樂石匱閣豺虎正縱橫久客南行道彌惡青陽陜諸幕客第一百一十八督府架閣吳文煥督遣林棟等皆閩士有幹實宣勞幕府空坑之敗𬒳執尋遇害哀哉入幕未展才贈李八判官辛苦在道路送高司直回首一茫茫送李判官風悲浮雲去遣興趙太監時賞第一百一十九直寶章閣軍器太監督府參議官江西招討副使趙時賞宗室有志氣首宰旌德以一縣抗虜數有功京師陷入閩行朝擢知邵武軍以棄城罪去自余開督隨府典兵數將偏師以當一靣神采明雋議論慷慨空坑之敗走之吳溪尋𬒳執於隆興遇害哀哉豪傑貴勳業送殿中楊豐宗支神堯後贈李入判官平生白羽扇嚴武公鬱結回我首述懷劉沐第一百二十宣教郎督府機宜帶行大府寺簿劉沐字淵伯豫鄰曲朋友從勤王輔官豫陷淵伯領諸軍還及豫歸國淵伯收部曲赴府會於汀專將一軍為督帳親衛沉實有謀圓機應物凡江西忠義皆淵伯所號召晝夜酬應精力不倦會病劇乍起空坑之敗不得脫遇害於隆興長子同日刑次子貢元死空坑亂兵余收其第三幼子亦沒於廣哀哉王翰願卜鄰贈韋左丞稽康不得死遣興落月滿屋梁夢李白悲風為我起金華山觀孫􅙫第一百二十一宣教郎帶行監官告院知吉州龍泉縣孫􅙫豫長妹夫也豫引兵出贑其邑人奉􅙫以邑返正尋為親黨所陷遇害於隆興哀哉故人有孫宰彭衙行義均骨肉地餞裴二端分連為糞土叢往在揮手灑衰泪别建封彭司令震龍第一百二十二宣教郎帶行大社令知吉州永新縣彭震龍豫次妹夫也性跌宕喜功名起兵隨勤王及歸郡邑巳陷乃結湖南諸洞豪傑謀興復余出江西即以縣返正虜遣軍攻之其親黨內應𬒳執遇害於郡城哀哉堂上會親戚送李校書可憐馬上郎白馬呻吟更流血北征干戈浩茫茫南池蕭從事燾夫第一百二十三從事郎蕭燾夫永新人工詩與字從豫山中久其兄敬夫詩尤豪俊亦嘗客吾門燾夫從勤王得官及歸贊彭司令收復鄉邑規以正道豫至興國詣府白事意氣慷慨邑城陷兄弟俱不免哀哉灑翰銀鈎連陳合遺故宅翩躚山顛鶴西閣曝日慘淡鬪龍蛇喜晴及兹歎冥漠青陽候蕭架閣第一百二十四督幹架閣監軍蕭明哲字元甫吉州貢士性剛毅遇事有膽氣明於大節豫至汀梅來從督府幕及出江西監贑縣義兵收復萬安縣尋復龍泉行府敗元甫入野陂連結諸寨拒虜𬒳執死於洪哀哉諸生舊短褐橋陵張目視冦讐送韋評事髙義終焉在送王信州白骨更何憂得弟觀書陳督幹第一百二十五督幹監軍陳子敬贑人以資力雄鄉里舊從豫逰行府至汀子敬招集義兵置屯皂口以據贑下流以遏虜船往來及行府攻贑子敬行其謀功效甚著行府敗舉兵黃塘連結山寨不降重兵襲潰不聞所終哀哉挺身艱難際送韋評事虎穴連里閭課伐木髙天意悽惻送韋諷同盡隨丘墟謁文公上方陳少卿第一百二十六帶行太府少卿福建提刑督府參議官陳龍復泉州老儒號清陂先生丙辰登科沈厚朴茂有前輩風流平生所歷州縣皆以清儉著名余開府南劍辟入幕老成重一府尋遣往漳潮計事行府自江南再入廣先生聚兵循梅來會後分司潮陽應接諸路四方豪傑翕然響應積糧治兵行府由是趍潮陽及移屯為虜所追襲先生遂不免時年七十三哀哉卿月升金掌江陵送髙大卿老氣橫九州送韋評事前輩復誰紀李公雍吾道長悠悠發秦州鄒處置第一百二十七兵部侍郎江東西處置副使督府參贊軍事鄒􅘶字鳯叔吉水人慷慨有大志以豪俠行臺郡間從豫勤王輔武資至將軍景炎換文以寺丞領江西招諭副使聚兵寧都氣勢甚盛寧都𬒳執變姓名為卜者虜不知其為招諭使也入贑城得脫尋聚兵永豐興國間行府奏授江西安撫副使統兵數萬攻興國縣尋會行府至縣返正别軍復永豐進授江東西處置副使屯兵永豐境上以烏合一日而潰行府失助於是有空坑之敗哀哉東郊暗長戰吳侍御江上宅死地脫斯須將適江陵庾公興不淺張九齡居然屈壯圗别蘇溪鄒處置第一百二十八行府再入廣奏以公充都督府分司置司永豐興國間接應江淮虜自隆興遣大兵攻襲公萬死一生備經艱難竟得脫引江西兵入廣會行府於潮陽及移屯公為殿事出不虞虜至麾下火急自剄扶入南嶺踰十日死是行公所將皆江西頭目以取行府為名使行府入江西十萬衆立辦天之未啓中興也奈何公有子甚俊先卒家人散失無餘公嘗謂豫欲立富田鄒氏子為嗣不果至是絶哀哉方當用節鉞相中允不返舊征魂東樓凄涼餘部曲送郭中丞發聲為爾吞别李義劉監簿第一百二十九宣教郎帶行軍器監簿督府機宜劉子俊字民章吾鄉之傑也嘗領漕貢余開督興國民章來計事行府敗民章收散兵於洞源接應諸郡縣尋引軍入廣道遇虜潰亡未幾再招集與鄒處置同詣行府會於潮陽越二十日而行府敗民章𬒳執莫知所終哀哉艱難奮長戰潼關吏髙義薄行雲畫街行死為殊方鬼客堂三夜頻夢君夢李白劉監簿第一百三十秀氣衝星斗贈李八丈壯筆過飛泉李十五丈舊遊易磨滅汝陽王璡魂傷山寂然妻子入蜀蕭資第一百三十一閣門路鈴蕭資本書吏也小年給使令稍長通文墨圎機善處事性和厚上下信愛豫家先避地入廣資於難中扶持盡力及行府江西之敗衛護大夫人全督府印有功後在兵間調和諸將應府中碎務皆其領攝腹心之良也潮陽移屯道遇虜資以病體𬒳害哀哉王當風雲會病柏謝爾從者勞遣興感恩義不小送廬侍郎魂獨委蓬嵩送王砅杜大卿滸第一百三十二司農卿廣東提舉招討副使督府謀官杜滸字貴卿丞相立齋之姪也性剛猛為遊俠京師豫北行滸願從鎮江之脫滸之力也匍匐淮甸衛護艱虞忠勞備盡嗚呼可謂義士昔沒賊中時送韋評事中夜間道歸後出塞辛苦救衰朽遭田父泥飲微爾人盡非北征杜大卿滸第一百三十三滸從豫南還佐府南劍尋遣往台溫招集兵財福安陷相失滸趍行朝久之奉朝命至行府值江西之敗又與跋涉艱難者年餘及得府移屯潮陽滸護海舟尋趍崖山與行府遂隔及崖山潰滸并陷焉余至五羊滸來見病無復人形在虜網羅中無所容力尋聞死焉哀哉髙隨海上查夜宴子豈無扁舟寄薛郎中白日照執𬒮送樊侍御埋骨巳經秋破船徐榛第一百三十四詩闕正將徐榛溫州人其父官湖北榛往省迷失道歸行府後生精練以筆扎典機密小心可信豫𬒳執榛得脫自惠州來五羊願從北行扶持患難備殫忠欵道病至豐城死焉林檢院琦第一百三十五宣教郎督機檢院林琦閩士余屯餘杭時琦結集赭山忠義捍禦海道得官及南劍開府琦來外有文采內甚忠實數隨患難勞而不怨及行府湖陽之敗琦不能脫虜屯惠境逃去尋又𬒳獲虜遇之不以禮至建康病死虜自謂琦不肯自愛如於沿道浸水務自殘滅之類琦可謂不降其志者矣哀哉時危挹佳士貽柳少府慘淡隨回鶻北征佯狂真可哀不見死淚終映睫李光弼曽先生第一百三十六秀峰曽先生鳯豫師也太學釋褐纍遷監丞會京師亂走衢衢尋陷及景炎登極衢添倅蕭雷龍首倡返正先生自衢來劍隨行府之汀丁丑春以梅州添差通判將行會行府移屯先生挈家避地於汀之鄉落六月以病死其子三貴自吉來奔喪不能返喪幸其一家歸至瑞金三貴復病死於道先生妻亦卒惟女在不知所之先生遭值虜難以清文粹德一不施於世流落以死家乃俱喪哀哉江海日凄涼遣興賢聖盡蕭索西關西河共風味衡山縣學顧步涕橫落郭代公故宅鄧禮部第一百三十七光薦字中甫豫郡人自虜度嶺及廣陷避地深山適強冦至妻子兒女等匿暗室冦無所暏焚其居十二口同時死中甫隨駕至崖山除禮部侍郎巳卯春除學士院權直未數日虜至崖山潰中甫赴海虜舟拔出之張元帥待以客禮與余俱出嶺别於建康嗚呼中甫禍難之慘不減豫而獨免北行幸而脫歸為管寧為陶潛不亦善乎南宫無故人才名三十年問鄭景文江城秋日落贈侍郎四舅此别意蒼然送韋書記家樞密鉉翁第一百三十八則堂先生家鉉翁蜀名家有學問舉動必以禮朝中老成典刑也當國都不守先生簽書樞密見虜持正議左丞相吳堅右丞相賈餘慶以省札遍告天下令以城歸附先生不押字虜自省中脅以無禮公不為動竟末如之何後以祈請使為名群詣北庭既至上書申祈請之議忤北庭意留燕邸巳而移漁陽又移河間如我朝羈置特官給飲食而已余過河間得一二相見先生風采非復宿昔而忠貞儼然使人望而知敬嗚呼其可謂正人矣出處同世網鄭公虔高誼邁等倫别蔡著作異方驚會靣送韋别駕慰此真良臣寄唐使君墳墓第一百三十九豫甲戌春自衡陽憲節歸赴贑州省拜墳墓及乙亥五月奔祖母喪至門以起復六月望日出從戎事與宗族鄉黨永訣云别離巳五年贈蘇四不及祖父塋後園山腳霜露晚凄凄出郭痛哭松風回北征宗族第一百四十西江接錦城送李肅山隂一茅宇遣興宗族忍相遺送崔都水乾坤此深阻宿清溪驛母第一百四十一先母齊魏國大夫人蓋自虜難後弟璧奉侍赴惠州弟璋從焉已而之廣之循之梅余來梅州母子兄弟始相見既而魚軒出江西尋復入廣夫人遊二子間無適無莫雖兵革紛優處之怡然戊寅行府駐船澳弟璧仍知惠州弟璋復在侍夫人藥八月兩國之命下時巳得疾九月七日寅時薨逝弟璧卜地於惠循之深山間不肖孤巳矣未有返葬夫人期不知二弟何時畢此大事身陷萬里縲絏中歲時南望嗚咽云何時太夫人送李校書上天回哀眷大雨墓久狐兔鄰汝陽王璡嗚呼淚如霰白馬舅一百四十二豫以楚囚過西昌聞舅家機􅑾自是南望孤雲每念我母不勝渭陽之情萱草秋巳死從孫濟歲暮有嚴霜北遊落日渭陽情送翁統軍涕淚濺我裳貼華陽李少府妻第一百四十三丁丑八月十七日空坑之敗夫人歐陽氏女柳娘環娘子佛生環之生母顔佛之生母黃並陷失尋聞自隆興北行惟佛生巳死人世禍難有如此者哀哉結髮為妻子新婚别倉皇避亂兵破船生離與死别别賀蘭銛回首淚縱橫示宗文宗武二女第一百四十四床前兩小女北征各在天一崖送髙書記所愧為人父赴奉先縣風物長年悲送楊監入蜀次子第一百四十五渥窪騏驥兒送李校書衆中見毛骨送魏六丈别來匆三載四松殘害為異物北征妻子第一百四十六妻子隔絶久𫐠懷飄颻若埃塵寄薛郎中漠漠世間黑贈蜀僧性命由地人懷鄭司戶妻子第一百四十七世亂遭飄蕩羌村飛藿共徘徊昔逰十口隔風雪赴奉先縣反畏消息來𫐠懷長妹第一百四十八余長妹適孫氏不幸孫氏傾覆家沒入燕妹奉孫氏生母携子肖翁約翁及一女零丁孤苦客食萬里妹雖患難中侍飬撫教各盡其所可謂賢矣哀哉聞韋氏妹元日零落依草木佳人深負鶺鴒詩得舍弟消息臨風欲痛哭閬州東樓長子第一百四十九豫二子長曰道生姿性可教不幸亂離隨家飄泊空坑之敗能脫身自全鍾愛於大夫人以疾後大夫人六十日死於惠陽郡治中生十三年矣哀哉大兒聰明到劉少府山水障青歲巳摧頺昔逰回風吹獨樹樊侍御吾寧舍一哀赴奉先縣二女第一百五十豫六女長定娘次柳娘次環娘次監娘次奉娘次壽娘丙子定娘壽娘以病死於河源之三角丁丑柳娘環娘陷惟監娘奉娘得存戊寅潮陽之敗復死亂兵中哀哉癡女飢咬我彭衙行鬱沒一悲魂遣懷不得收骨肉佳人痛哭蒼煙根送樊侍御弟第一百五十一余二弟長璧次璋璋自船澳奉母喪趍惠州别璧來五羊别自是骨肉因緣墮寥廓矣哀哉兄弟分離苦送弟頻凄涼憶去年倚杖何以有羽翼夢李白飛去墮爾前彭衙行弟第一百五十二棣華晴雨好和宋太少府風急手足寒水會渡百戰今誰在憶弟羈捿見汝難寄弟弟第一百五十三沙晚鶺鴒寒寄弟豐風吹紫荆樹得弟消息忍淚獨含情郭中丞江湖春欲暮宴胡侍郎弟第一百五十四不見江東弟元日示宗武急難心惘然義鵠念君經世亂送班司馬入京卧病海雲邊所思次妹第一百五十五豫次妹自永新歸寧不與彭氏之難亂離中隨母兩國夫人上下自船澳奉喪趍惠陽兄妹不復見矣哀哉大際傷愁别出郊江山憔悴人送孟倉曹團圎思弟妹又示兩兒傳語故鄉春贈别何雍思故鄉第一百五十六自一百五十六至一百六十二共七首皆思故鄉懷故山之情余始創文山其間水石竹木蕭然有􅡞川盤谷之趣蓋將終焉承平時鄉曲賔朋日夕宴聚樂以忘憂真人世之清福今思之非惟平生故人半為塵土而故鄉萬里并隔世外惟死則魂識歸吾故鄉耳哀哉天地西江逺送崔侍郎無家問死生憶舍弟涼風起天末憶李白萬里故鄉情江樓宴第一百五十七江漢故人少贈弟贊善東西消息稀憶弟異花開絶域遊何將軍山林野風吹征衣别贊上人第一百五十八老夫悲華年聽楊氏歌天涯故人少送弟每望東南雲遣興決􅗃入飛島望嶽第一百五十九人生無家别無家别親故傷老醜述懷剪𥿄招我魂彭衙行何時一樽酒憶李白第一百六十春水滿南國遣寓慘淡故園煙陳拾遺三年門巷空遣興永為鄰里憐草第一百六十一迢迢萬里餘前出塞絶域誰慰懷贈李五丈我圃日蒼翠雨回首望兩崖柴門第一百六十二春日漲雲岑過津口故園當北斗月窈窕桃李花喜晴紛披為誰秀九日第一百六十三自一百六十三至一百九十一共二十九首雜然寫其本心陶潛避俗翁遣興龎公竟獨往雨明明君臣契牽牛織女牢落吾安放鄭公虔第一百六十四吳楚東南坼登嶽陽樓風雲地一隅地隔蹉跎暮容色重過何氏不敢恨危途北風第一百六十五風煙渺吳蜀柴門雲帆轉遼海後出塞喪亂紛嗷嗷遣寓尚愧微軀在與嚴二奉禮别第一百六十六驚風翻河漢有懷鶉首麗泥塗將適江陵吾衰將焉託遣懷愁絶付摧枯北征第一百六十七隂風千里來吳侍御江上宅驚浪滿吳楚雨世事兩茫茫贈衛處士飄泊欲誰訴又雨第一百六十八平生方寸心舟中苦熱誓開玄冥北後出塞歲暮日月疾寫懷我嘆黑頭白酬薛判官第一百六十九今吾抱何恨贈别恨無匡復姿送樊侍郎含笑看吳鈎後出塞回首蛟龍池詠懷第一百七十天長眺東南鄭公虔衰謝多酸辛汝陽王璡丈夫誓許國前出塞直筆在史臣李公光弼第一百七十一天衢隂峥嶸赴奉先縣歲寒心匪他送嚴使君平生獨往願立秋後題零落首陽阿過宋之問舊莊第一百七十二濟時肯殺身寄唐使君慘淡苦士志送李大夫百年能哉何别唐誠終古立忠義陳拾遺故宅第一百七十三絶域三冬暮送十七舅垂老見飄零送李大夫林氣森噴薄過郭代公故宅意鍾老柏青送程録事還鄉第一百七十四仰看八尺軀别張建封不要懸黃金蘇公源明青青歲寒柏枯拔乃知君子心張九齡第一百七十五小人困馳驟九日後生血氣豪遣懷世事固堪論園官送芙我何隨爾曹飛仙閣第一百七十六天地日蛙蠅張九齡勞生苦奈何餞嘉州程都督聊欲從此逝送樊侍御人少豺虎多别唐誡第一百七十七男兒生世間後出塞居然成濩落赴奉先縣鵉鳯有鎩翮寄唐使君虹霓就掌握揚旗第一百七十八鵉凰不相待暇日小園白魚困密網過津口但訝鹿皮翁遣興冥冥任所往蘇少保第一百七十九威鳯髙其翔尋崔戢老鶴萬里心遣興脫略誰能馴薛少保兀兀遂至今赴奉先縣第一百八十天寒霜雪繁赤谷蕭蕭北風徑羌村髙鳥黃雲暮送殷參軍斗上捩孤影義鶻第一百八十一乾坤沸嗷嗷送王砅名繫朱鳥影張九齡寥落寸心違送何侍御斯文亦吾病早發第一百八十二儒冠多誤身贈韋右丞識字用心苦阮隱居斯文憂患餘宿鑿石浦鬱鬱流年度雨第一百八十三名賢慎出處自施州歸志士懷感傷贈李四丈猶殘數行淚登牛頭山引古惜興亡壯遊第一百八十四讀書破萬卷贈韋右丞許身亦何愚赴奉先縣赤驥頓長纓𫐠古健兒勝腐儒草堂第一百八十五蕭條四海內别唐誡慷慨有餘悲水檻路逢相識人前出塞開懷無愧辭詠懷第一百八十六高歌激宇宙衡山縣學歲晚寸心違贈韋贊善忠貞負冤恨李公雍姦雄多是非詠懷第一百八十七丈夫四方志前出塞喪亂飽經過寓目清心聽鳴鏑聽許十誦詩衰老強髙歌别唐誡第一百八十八茫然阮籍途早發射洪益歎身世拙北征零落蛟龍匣李公光弼開視化為血客從第一百八十九天地有逆順崔少府惘然難久留發秦州當歌欲一放尋崔戢河漢聲西流登慈恩塔第一百九十萬古一死生詠懷誰是長年者玉華宫我何良歎嗟鹽井短褐即長夜遣興第一百九十一髙官何足論佳人寂寞身後事夢李白物理固自然鹽井願聞第一義謁文公上方歎世道第一百九十二自一百九十二起至二百泛然為世道感歎古來遭喪亂西閣滕日丈夫多英雄牽牛織女悠悠委薄俗入衡州豈非吾道東贈蘇四第一百九十三蝮蛇暮偃蹇簡崔評事猛虎慿其威遣興真宰意茫茫遣興六合人煙稀北風第一百九十四黎民困逆節登襄上堂殘孽駐艱虞過南嶽孰云網恢恢夢李白自及梟獍徒草堂第一百九十五眼中萬少年别張建封得志行所為詠懷白馬蹴微雪遣興追隨燕薊兒王公思禮第一百九十六客從何鄉來病柏挾矢射漢月留花門殺身傍權要三歌門戶有旌節遣興第一百九十七關河霜雪清送逺故人亦流落送裴五赴夷歌奉玉盤楊六判官悲君隨燕雀贈何雍第一百九十八漁陽豪俠地後出塞圵里富熏天遣興快馬金纒轡送從弟亞但遇新少年遣懷第一百九十九南北逃世難逃難始聞蕃漢殊草堂天下今一家鹿須山中原有驅除留花門第二百茫茫天造間宿花石戍髙岸尚為谷水檻百川日東流别贊上人勢閲人代速觀山川水漲文山先生全集卷之十六終
