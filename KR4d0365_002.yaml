  text: 文山先生全集卷之二文集
  hash: sha256:cd035579dd4a29b7ae7de18d87f9b10088f186fb66df81d94d624361428ab5e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_002-1a}
body:
  text: 詩樂府并詞附文山即事宇宙風煙闊山林日月長閛灘通燕尾代石割羊腸盤谷堪居李廬山偶姓康知名總間事一醉棹滄浪出山日日騎馬來山中歸時明月長在地但願山人一百年一年三百餘畨醉闢山寄朱約山一笠一簑三釣磯歸來不費買山資洞天福地深數里石璧湍流清四時樵牧舊蹊今可馬鬼神天巧不容詩先生曽有空同約那裏江山未是竒山中即事擕壼藉草醉斜陽白鶴飛來月下雙蘆葉西風驚别浦芭蕉夜雨隔踈窗千年帝子朱簾夢一曲仙人鐡笛腔若問山翁還瘦否手持漁竹下寒江宿山中用前韻南山之隩北山陽羽扇輕風共影雙晝槳菰蒲明月笛青燈蟋蟀白雲窗半生遊子成行債一夜佳人作别腔倚釣重來此簑笠梅花十里雪空江山中滄州棹影荻花涼款乃一聲江水長賴有蓴風堪斫膾便無花月亦飛觴山中世巳驚東晉席上人多賦晚唐何處魚羔不可飯蚤拚泉石入膏肓山中謾成柬劉方齋名夢桂居南湖太師公玄孫東風解凍出行嬉一閧煙塵隔翠微自有溪山真樂地從來冨貴是危機二三輩行惟須醉多少公卿未得歸明日主人酬一座小船旋網鱖魚肥山中載酒用蕭敬夫韻賦江漲拍拍春風滿面浮出門一笑大江流坐中狂客有醉白物外間人惟奕秋晴抹雨粧總西子日開雲暝一滁州忽傳十萬軍聲至如在浙江亭上遊山中立夏用坐客韻歸來泉石國日月共溪翁夏氣重淵底春光萬象中窮吟到雲黑淡飮勝裙紅一陳絃聲好人間解愠風山中和韻白扇揮殘暑青鞋踏嫩晴花床尋小隱石鼎引長鳴紗帽有時去酒壼惟意傾山僧癡與坐間却瘦彌明山中自賦門外蒼松一水修不必清高逼巢許秪教瀟灑勝由求空花自滿三千界老樹相看五百秋坐有鷹揚人物在怕牽昨夢上漁舟入山即事江流風㶁㶁雲薄雨絲絲上馬忙呼繖巡簷靜看棋露天厨作濘沙地水生池秉燭留前夕兹遊更絶竒山中感興三首載酒之東郊東郊草新緑一雨生江波洲渚失其足青春豈不惜行樂非所欲采芝復采芝終朝不盈掬大風從何來竒響振空谷我馬何玄黃息我西山麓山中有流水霜降石自出驟雨東南來消長不終日故人書問至為言北風急山深人不知塞馬誰得失挑燈看古史感淚縱橫發幸生聖明時漁樵以自適桃花何夭夭楊柳何依依去年白鳥集今年黃鵠飛昔為江上潮今為山中雲江上潮有聲山中雲無情一年足自念况復百年長但存松柏心天地真茫茫山中呈聶心遠諸客誰入山來問野舟一篙花外渡深流小顰風樹蹁躚鶴淺約湍沙浩蕩鷗湖上有時思洛社人間何處不滁洲徘徊才是黃昏候短笛先催月上樓再用前韻黃葉婆娑上釣舟喚回舊夢到江流多情政自憐檣燕兩鬢終當付野鷗未説離懷向南浦須知詩意在夔州朔風昨夜吹沙急早覺寒聲戰玉樓山中六言三首兩兩漁舟搖下雙雙紫燕飛回流水白雲芳草清風明月蒼苔鶴外竹聲簌簌座邉松影踈踈夜靜不收棋局日高猶卧紗厨風暖江鴻海燕雨晴簷鵲林鳩一段青山顔色不隨江水俱流用蕭敬夫韻庭院芭蕉碎緑隂高山一曲寄瑶琴西風遊子萬山影明月故鄉千里心江上斷鴻隨我老天涯芳草為誰深雪中若作梅花夢約莫孤山人姓林山中煙雲開窈眇荆棘剪離披蠟屐上下齒竹枝長短詞半山江色透獨樹午隂遲世上兒孫老有人猶看棋倐忽當年遇蒙茸幾度披水霞明畫卷草樹幻騷詞鳥過目不瞬江流意自遲世人空黑白一色看坡棋竹花黃家紫家鬪魏姚夷齊玉立青蕭蕭便是人間小天地不特水上作萍浮夜歸市橋燈火未闌珊一簇人家樹影間想把神仙爭羡我不知我正羡渠間八月十六日見梅廣寒殿裏玉樓開那得孤山處士來半夜西風半身影夢中騎得雪驢回和蕭秋屋韻蘆花作雪照波流黃葉聲中一半秋明月嬋姢千里夢扁舟汗漫五湖遊星辰活動驚歌笑風露輕寒敵拍浮贏得年年清賞處山河全影入金甌月夜月到中天雲劃開斷橋幻出玉樓臺夜深一鶴掠舟過疑是坡仙赤壁來江行日日看山好山山山色蒼忘機鷗下早戀廄馬行忙松曉清風濕荷秋流水香短簑吹鐡笛年嵗大江長𥿄帳𥿄帳白如雪上有坐客影一白不自由黑光蕩無定人倦影巳散依然雪花瑩須臾秉燭眠相忘心目靜為劉定伯索油蕨我欲登山去采薇江南秋雨正霏霏仙家解有逡巡手一筯西風落翠微山中小集江山間勝賞萬戶不須留客醉客多事吾詩吾自酬夕風吹綘蠟春色漾黃流賔從歸來夜滁翁無此遊新年梅花枕上聽司晨起綰金章候拜親喜對慈顔看鋪鬢髮雖踈脫未如銀生日和聶吉甫五月初二日青蒲花未老黃竹筍𥘉生細味詩工部間評字率更大江流日影時鳥説春榮共作千年計身謀政自輕生日和謝愛山長句嵩老字伯華余屏迹山間誦昌黎三星行政自多感亦何有于初度客謝愛山翩然逺來貽我長句噓拂而繅籍之者至矣倚歌而和愧不成章寓形落落大塊間噓吸一氣自往還枽弧未了男子事何能局促甘囚山昔年此日作初度賔客如雲劇歡舞今年避影却閉門捧觴自壽白頭母故人憶我能遠來虹光滿袖生瓊瑰一杯相屬慰岑寂使我發笑愁顔開簸揚且聽箕張口丈夫壯氣須衝斗夜闌拂劍碧光寒握手相期出雲表生日謝朱約山和來韻元豐五年正月日洛中耆英佳話出當時韓公七十九歡噱賡酬老吟筆偉然冠劍照孔鸞鮐背鳩枤蒲輪安韓公而下文寬夫相高以壽不以官洛塵巳隨流水急雲仍相逢松下石顧我行輩真我來兼謨故事強安排約對青山共長久醉歌要賽滁州守願隨後社著深衣闌風伏雨從是非便令攜樽西墅去山花山鳥為歌舞招招瑶母來庭闈拍手共笑偷桃兒吾山陂陀白雲滿猿鶴司我北門管紫霞隔斷雞犬聲下有琥珀滋長齡向來福地七十二此亦清高仙地位朝遊崑崙暮崆洞駕風鞭霆迎我公丹崖翠壁千萬丈與公上上上上上生日山中和蕭敬夫韻山深不用結涼棚風起江蘋暑氣輕處士林泉自今古男兒弧矢付豪英客來不必籠中羽我愛無如橘裏枰一任蒼松栽十里他年猶見茯苓生與朱古平飲山中和蕭敬夫韻古平名植字聖陶丙辰賦魁太傳卒江山自足引千杯况有如今此客哉石室只還湖守住蘆峯曽屈晦翁來酒酣剩有詩酬唱步倦何妨車馬回遊遍此山方可别北崖莫遣曉雲開所懷英英香蕙瑩朝華收拾東風作一家燕語鶯啼春又夏燈花剔盡暗窗斜山中偶成白鶴飛來牽我衣東風吹我下漁磯當年祗為青山誤直草君王一詔歸次約山賦杏花韻名花韻在午晴初雨沁胭脂臉更敷蒲驛莫妨娛刺史錦坊豈不勝中書時無艷曲臨軒縱公莫巍壇韞匱沽春老緑隂青子近東風來往一吹噓贈南安黃梅峯清淺風流聖得知黃昏歸鶴月來時嶺頭更有高寒處却是江南第一枝送人往湖南鴈拖秋月洞庭邉客路凄涼野菊天雲隔酒尊橫北海風吹詩史落西川夜深鬼火千山雪春後鵑花一樹煙為我祝融峯上看朝暾白處禮蓬仙題張景召簿尉梅墅并餞入南喚醒三影燕支魂一枝半樹專黃昏江南暗香鬱不住霜風吹入羅浮村踈枝不入輞川畫暗香不到東山棋雲階一枕梨花夢參橫月落無人知和謝愛山晚吟韻日晚與客散步因誦夕陽雖好不多時之句謝愛山欣然賦之余亦率然口占以和亦一時之樂也日落未落天滄涼懸崖挂壁留餘光紫煙翠霧空迷茫颼颼度􅊤松風長牛背短笛催歸忙飄飄逸興空悠揚襟懷灑落萬慮亡須臾薄暝山色藏長歌浩浩相激昻淡雲弄月微昏黃别謝愛山緑綺知音早青燈對語遲那知今雨别又重故人思山隔詩情逺雲含容思悲小樓今夜笛莫向月中吹君今拂衣去我獨枕書眠一片過林雨數聲當戶蟬情長空有恨吟苦不成篇後會知何日西風老鴈天和胡琴窗名日宣字德昭買得青山貴似金瘦笻上下費沉吟花開花落相關意雲去雲來自在心夜雨一江漁唱小秋風兩袖客愁深夾堤密與栽楊柳剩有行人待緑隂七月十三夜用燈牌字韻湊成一詩與諸賔一笑赤壁當年賦子虛西風忽復到菰蒲蟾蜍影裏千秋鑑蟋蟀聲中七月圖詩思飄飄入雲漢歌聲隱隱動江湖萬家簫鼓連燈火見説來年此事無病中作歲月侵尋見二毛劍花冷落鸊鵜膏睡餘吸海龍身瘦渴裏奔雲馬骨高百忌不容親酒具千愁那解減詩豪起來大作屠門嚼自笑我非兒女曹又二絶瞿塘隘處真重險勾漏坡前又一灘世事不容輕易看翻雲覆雨等間間病中忽誤通真理靜處專尋入定工雨汗淋頭都不管須臾和氣自沖融又賦一病忽兩月蓬頭夏涉秋形羸心自壯手弱筆仍遒昨夜燈如喜今宵諜莫愁問誰驅五瘧正與五窮謀一病四十日西風草木涼倚床腰見骨覽鏡眼留眶倦䇿吟詩杖頻燒讀易香夜深排果餌乞巧太醫王又賦病裏心如故間中事更生睡貓隨我懶黠鼠向人鳴羽扇看棋坐黃冠扶杖行燈前翻自喜瘦得此詩清驟雨知何處一溪秋水生苦吟肩鶴瘦多病耳蟬鳴隱几惟便睡挑包正倦行山深明月夜乞我半窗清寄興逃吾病吟詩老此生風高鳴鴈起晴久鵓鳩鴻野樹辭秋落溪雲帶雨行晚涼便懶坐移傍竹隂清借道冠有賦病中蕭散服黃冠笑倒群兒指為彈祕監賀君曽道士翰林蘇子亦祠官酒壼釣具有時樂茶竈筆床隨處安幸有山隂深密處他年煉就九還丹又賦時以草果數百枝作枕遂得汗一畨潮信過時暫脫熬煎心似轆轤轉身如徽纆纏夜聽飢鼠嘯晝看伏雌眠急雨千山動應知為解弦病甚夢召至帝所獲宥覺而頓愈遂賦卧聽風雷叱天官赦小臣平生無害物不死復為人道德門庭遠君親念慮新自憐螻蟻輩豈意動蒼旻病愈簡劉小村秋光沁人骨意氣曉來新古鼎龍團雪虛簷麈尾春商山奕棋老赤壁洞簫賔風月真倉扁招呼入屋頻倦餘心似醉病起首如蓬黃竹斷橋雨白蘋長笛風仙仙鷗屢舞咄咄鴈書空孤負秋來眼間挑㸑下桐夜坐偶成蕭蕭秋夜涼明月入我戶攬衣起中庭仰見牛與女坐久寒露下悲風動紈素不遇王子喬此意誰與語簡琴窗雲屋竹軒諸友世情千萬變險甚劍頭炊嗜傳姑成癖登山且作癡煙霞非􅍚痼泉石自心馳獨喜精神健山中剩有詩用前韻留琴窗百年矛上浙萬事枕中炊病苦還思老貪嗔未若癡雲低天欲動江長岸如馳明月西風健山頭賦别詩又用韻簡李深之名道大號深齋晚尊和月吸早飯帶星炊鵬鷃從高下螳蟬任黠癡水澄神自止雲遠意俱馳門外誰車馬故人來課詩早起偶成淡淡池光曙沉沉野色秋片雲生北舍隻鴈過南樓有見皆成趣無言總是愁芭蕉夜來水咽罷自搔頭又用韻江山如有意天地可無秋夜月馮歡鋏西風王粲樓露蛩令我喜煙草為誰愁且醉杯中物相看尚黑頭曉起夢破風煙逈衾寒不自由鍾聲到枕曙月影入簾秋鴈過江山老蛩吟草樹愁整冠人共笑兩月不梳頭遠寺鳴金鐸踈窗試寶熏秋聲江一片曙影月三分倦鶴行黃葉癡猿坐白雲道人無一事抱膝看回文夜坐淡煙楓葉路細雨􅖋花時宿鴈半江畫寒蛩四壁詩少年成老大吾道付逶遲終有劍心在聞雞坐欲馳和朱松坡學醫未至太醫王笑殺年年折臂傷屏裏江山如出色亭臯松菊巳成行細參不語禪三昧靜對無弦琴一張多謝嶺頭詩寄我滿園梅意弄春光陳貫道摘坡詩如寄以自號逹者之流也為賦浩浩歌一首浩浩歌人生如寄可奈何春秋去來傳鴻燕朝暮出沒奔羲娥青絲冉冉上霜雪百年歘若彈指過封侯未必勝瓜圃青門老子聊婆娑江湖流浪何不可亦曽力士為脫靴清風明月不用買何處不是安樂窩鶴脛豈長鳬豈短夔足非少蚿非多浩浩歌人生如寄可奈何不能高飛與逺舉天荒地老懸網羅到頭北邙一杯土萬事碌碌空奔波金張許史久寂寞古來賢聖聞丘軻乃知世間為長物惟有真我難滅磨浩浩歌人生如寄可奈何春夢婆春夢婆拍手笑呵呵是亦一東坡非亦一東坡借朱約山韻就賀桂冠身健尚堪松下飯眼明正好橘中棋青山有約當朱戶白首何心上彩闈栗里田園供雅興午橋鍾鼓賞清時晚來倦客秋江上坐看半天黃鵠飛用前人韻賦招隱釣魚船上聽吹笛煨芋爐頭看下棋賸有晚愁歸别浦巳無春夢到端闈去年尚憶桃紅處好景重逢橘緑時珍重山人招隱意猿啼鶴嘯白雲飛用前人韻招山行以春為期掃殘竹徑隨人坐鑿破苔磯到處棋一水樓臺開曉鏡萬山花水放春闈雪中便有回舟興林下豈無燒筍時莫待東風吹柳絮眼穿籠鶴繞湖飛翰林權直罷歸和朱約山韻間雲舒卷無聲畫醉石𫾣推一色棋試問挂瓢棲碧洞何如襆𬒳卧彤闈夢中芳草還成路别後黃花又是時羞殺今年堂上燕片心寄與鴈南飛慶羅氏祖母百歲羅氏慶門壽母百歲父老見所未嘗鄉閭夸以為盛某既交朋升堂為壽退布席廳事與橫舟昆弟子姪舉酒盡歡酒酣賦詩志喜也麗日萱花照五雲升堂風采見乾淳蓬萊會上逢王母婺女光中見老人雨露一門華髮潤江山滿座綵衣新只將千載苓為壽更住人間九百春拜羅氏百歲母之明日主人舉酒客張千載心賦詩某喜贊不自巳見之趂韻翠微三鳥近畫閣五雲橫春水鷗聲滑夕陽鴉背明尊前持一笑花下卧餘醒曽見瑶池母不為虛此生醉清湖上三日存叟獨不在坐即席有懷石鼎吟方透瑶觴醉未闌踈林花密綴舊壘燕新安春半湖山好夜深江海寒王孫隔芳草初月正相看羅山長存叟兄弟來謝宴山中存叟名耕登科天開盤谷隱春到浣溪家一水樓臺影滿山桃李花春風寄橫笛夜月擬乘槎政好逢佳客江空北斗斜壽朱約山八十韻九月十三日翠袖瓊樓八十翁平安曉宇看孤鴻五湖圖裏添彭祖南極光中約祝融日日青山醉春色年年黃菊飽西風鷹揚但願無施處臣老婆娑一釣蓬壽朱約山八十三歲八十餘翁雪滿顛深衣大帶耳垂肩磻溪回首今三載絳縣論心又十年歸去來兮真富貴美哉壽也活神仙門前燕雀紛如雨愧我白雲深處眠賀祕書歐陽巽齋先生遷居名守道字公權先生挾册當災畬不待辛勤有屋廬宅樣只還齊里舊鄉風好似頴川居鏡湖今日賀外監瀛館前年虞祕書天下經綸猶一室時人尚敢説吾迂挽李制帥二首名遇龍字叔典上下荆淮劍氣雄進擔全蜀凛英風將壇歃血金湯志白腹填天竹帛功治法征謀關世道精忠定力簡皇衷傷哉生出瞿塘險翻落黃粱一夢中世變江河渺未涯如公真是濟時危幾年荆益龍驤譽一日瀟湘鵩讖悲天下皆傳清獻節人心自有武候碑郎君昔共慈恩約抆泪西風寄些詞挽孫庸齋樞密兄淮水竒人物樞星偉弟兄泰山開學譜雲谷發時源委吏初行志修文莫返魂功名傳久逺賴有二郎存挽龔用和結屋南陵三十秋田園舊隱隔江流鄜州避亂杜工部下澤乘車馬少遊名利無心付隍鹿詩書有種出煙樓長淮清野難歸玉魂魄猶應戀故立挽万監丞益之文華時輩右質朴古風餘壁上春陵記屏間太極圗雲山居士屋風雪故人書一夢中觀化堯夫以後無哭祕書彭止所名方逈丙辰省元人物孤中祕神山返異仙日穿陪紼處夢斷曝書年玉質應無死韋編豈不傳奠芻和泪遣此月向誰圓挽湖守吳西林名道夫字深㴟沒於湘凛凛千軍筆堂堂一靣威荆流春浪湧峽樹莫雲飛素壁鯨猶在中橋鶴不歸劍亭遺迹古豐石照山輝傾蓋歲年晚相知江海深春天思北樹夜雨話西林五嶺生前夢中原地下心英雄凋落盡慷慨一霑襟挽高郵守晏桂山名陶字復之祕書丞淮南巳仙去桂樹鬱青青五馬賢聲望三丞舊典刑邦人多感嘆諸老半凋零何日持雞酒傷心請葬銘挽鄢晉叔主簿名晉同榜此君何坦坦回首杏園遊魂魄湘潭去聲名彭澤休百年中道短千里故鄉愁六子三方幼遺言可泪流挽王逺叔孟嘗生五日白首嘆遭逢燈火殘編雨虀鹽短褐風八天下雕鶚半水偃蛟龍原上諸生哭黃花衰草中挽蕭帥機虎溪名了翁字明可世以千金重誰能學隱君一門名似雨滿座客如雲志願生無憾聲華死有聞韓碑照原草含笑有斯文挽朱尚書貔孫一代文昌貴千年諌議名天球聲渾厚元酒韻和平巖穴思風采朝廷惜老成東西生死别江水泪為傾挽太博朱古平白氏賢司馬昌黎真學官江湖驚落筆朝野望彈冠天馬高風骨秋鷹折羽翰萊庭人白髮煙雨萬松寒鐡硯傷同志青燈憶舊遊臨軒朝鳳闕馳道聽雞籌魏野神仙宅元龍湖海樓西風一揮泪世事蓋棺休挽黎致政黎探花祖楚峯天地闊四世百年家鶴髮垂𫀆葉龍孫上榜花詩書新雨露松柏老煙霞白馬蒼山路斯人忽巳遐古心江先生以舊弼出鎮長沙癸酉十月乙亥是為七十六嵗門人文某以一節趨走部內謹擬古體一首為壽炎圖啓丕運皇路熙以平蜿蟺發令姿有美洵一人鴻藻舒朝華大音鏘韶鈞黼珽麗三階火龍昭紞紘桓圭殿南服熊旗𬒳金城瞻彼鶉為火翼軫宣其精祥鸞舞瑶席鳴鳳翔媧笙孟冬兆陽氣西北無浮雲駕言酌春酒可以寫我情揚旍下祝融屣履朝奉清嘉猷扇九垓還以遂古淳君子保金石所以永國成純嘏錫千歲綿綿贊休明送張宗甫兄弟楚觀登舟赴湖北試金螺曉氣照人寒手把天漿領佩環夜月送魚來赤壁秋風吹鴈發衡山東南折處旗花見牛女光中槎影還見説青年文賦好士龍一笑共雲間衡州送胡端逸赴漕號觀齋時八月十五日發兵討賊楚觀簷花曉舟人擊鼓東蛟龍噀靈雨雕鶚展雄風此客雲霄士斯文造化工捷來君飲此我亦凱元戎題楚觀樓西風吹感慨曉氣薄登臨半壁楚雲立一川湘雨深乾坤橫笛影江海倚樓心遺恨飛鴻外南來訪逺音安序宋吏部來牧衡陽某將指聮事好也會以便郡歸養獲忝交承臨發賦詩湘水千里傾蓋年華晚行人早發湘白雲虹浪小明月燕花香明浦春何急巴山日正長祝君加一板我意為桐鄉贈周東卿畫魚觀君瀟湘圖起我濠上心短褐波濤舊秋雨菰蒲深某叨臬衡湘蒙恩以便郡歸養肯齋大卿實寓衡我十年前邦君也一再見間即分南北五言啓之所以致今舊丙繾綣云李肯齋名芾瀟湘一夜雨湖海十年雲相見皆成老重逢便作分啼鵑春浩蕩回鴈曉殷勤江闊人方健月明思對君幕客載酒舟中即席序别故人滿江海遊子下瀟湘夢載月千里意行雲一方櫓聲人語小岸影客心長總是浮萍迹飛花莫近檣用韻謝諸客和章傳鼓發船去我秦君向湘持螯思太白占鵲問東方世味秋雲薄交情江水長相期天路曉陳馬度風檣湘潭道中贈丁碧眼相士自詭衡山道士孫至今句法有軒轅世人未見題堯廟盡把昌黎作寓言收拾衡雲作羽衣便如屈子逺遊歸離騷忘却題天柱為立斜陽問翠微咸淳甲戌第二朔豫道櫧洲里徐畋方諌自長沙來為别問客幾何曰半年矣臨别為賦君為湘水燕我作衡陽鴈鴈去燕方留白雲草迷岸和衡守宋安序送行詩并序某將指罔功叨符便養初聯寅誼近依清燕之香末忝交盟親授朱提之印冠蓋一時之盛事縉紳百世之深情别集殷勤歌詞鄭重夢回雲舍深懷萱草之詩思乏雪車謾和梅花之賦瞻言作逺覽擲為榮玉立湘西第一州丹梯小為嶽雲留東風城郭人行樂春日旌旗公出遊便趂綈香摩碧漢莫嫌繡影涴清流兩君相見衣冠好記取兒孫好話頭方共衡雲把酒杯春風吹向鬱孤臺鴈將回處驚帆落花未開時怯笛催别草可堪遊子去寄梅應為故人來臨行笑覔凝香譜十駕那追逸驥材贈萍鄉道士道上觀行人半似重相見古云性相近性豈不如面萬形本一性萬心方一殊世固難絶聖亦恐難絶愚白髭行憶昔守宣時白上一根髮去之四五年一化為七八今年客衡湘黑髭巳多黃衆黃忽一白驚見如陵陽白髮巳為常白髭何足怪歲月不可歇雪霜日長大世人競染緇厭之固足嗤誰服蘆蔔湯避老亦奚為少老如春秋造物以為儔吾方樂吾天樂天故不憂將母赴贑道西昌重來鷗閣曉帆影漲新晴倚檻雲來去閉簾花送迎江湖春汗漫歲月老峥嶸手把忘憂草夔夔繞太清快閣遇雨觀瀾一笑登臨晚江流接太虛自慚雲出岫爭訝雨隨車慷慨十圍柳周回千里魚故園隄好在夜夢繞吾廬題鬱孤臺城郭春聲闊樓臺晝影遲並天浮雪界蓋海出雲旗風雨十年夢江湖萬里思倚闌時北顧空翠濕朝曦豫題鬱孤泉管五湖翁姚濓為之和翁官滿歸里因韻贄别并謝前辱巢龜君往好涌翠我來遲夜雨呼三韭春風試一旗飛花行客夢芳草故人思何日五湖上同看浴海曦用韻謝前人兹遊良邂逅吾道未逶遲斗野橫雙劍牛津直兩旗此風應小住明日便相思輸與君家近扶桑五色曦翠玉樓晚雨晚樓一曲轉梅花官事無多報放衙林木蔽虧煙斷續江流曲折雨橫斜年華冉冉風前影歲莫悠悠客裏家一鴈近從沙觜落更饒片雪入天涯翠玉樓觀雪矯矯臨清泚濛濛認翠微綈春生客袖鐡冷上戎衣柳眼驚何老梅花覺半肥新來有公事白戰破重圍翠玉樓和胡端逸韻客影魚千里年華柳十圍白雲栖石密黃鵠出煙微江海秋風老湖山晚日暉鬱孤臺上望野闊犢初肥翠玉樓昏鴉何處落野渡少人行黃葉聲在地青山影入城江湖行客夢風雨故鄉情試問南來信梅花三兩英合江樓天上名鶉尾人間説虎頭春風千萬岫秋水兩三洲客晚驚黃葉官間笑白鷗雙江日東下我欲賦扁舟西楚驚鴻晚東淮落木秋蒸湘今石鼓句宛古宣州白日聊清賞青山總舊遊不知滄海水何處接天流皂蓋樓一水樓臺繞半空圖晝開蝸涎行薜荔雀影上苟苔碧落人千載青山酒一杯晚煙看不盡待月却歸來石樓曉色重簾捲春聲疊鼓催長垣連草樹逺水照樓臺八境煙濃淡六街人往來平安消息好看到嶺頭梅馬祖巖曽將飛錫破苔䀶一片雲根鎖洞門山外人家山下路石頭心事付無言禪關秋風吹日上禪關路入松花第一彎只願四時煙霧少滿城樓閣見青山吸江絶壁千尋俯雪湒春花秋草有䰐鬖當年誤著蒲團坐惹得人稱馬祖巖塵外半山風雨截江城未脫人間總是塵中夜起看衣上月青天如水露華新雲端半空夭矯起層臺傳道劉安車馬來山上自晴山下雨倚闌平立看風雷清江何漢英再見於空同讀歐陽先生詩感慨為賦采芝雲滿山采檗瀑垂澗當年有清徽為寄南來鴈鴈去人巳逝歲月剨云晏流水失聲音西河老憂患往日志士悲窮途行子慣君為梁宋遊我復江漢宦十年耿相逢千里欠一盻玄機寄糟䄸美疢墮芻豢贈子歸東方聊薦吳興莧送曹倅巖山官滿歸里名夫發贑倅春陵光霽落蒼苔葛水神仙立翠槐萬里雲霞麒驥路三年風月鳯凰臺興同老子復不淺歌曰先生歸去來庾嶺梅花開漸遍一枝就與寄蓬萊和前人賦别翠松三萬頃松雪著神仙柳院催金鑰江花送玉鞭曉巖雲壁立晚棹浪規圓未了醉翁事重尋頴上田當年童子見今見二毛翁海月三秋别江雲一日同鷗心馳舍北龍尾曵天東定有延和奏南來寄一通贈明脈蕭信叔枚乘擅七發郭玉明四難微言起沈痼此道今漫漫云何東海生而乃緒真要砉然以神遇契彼鏡經妙我欲炊雕胡俯鑿菊水泉壽彼方輿人六氣何由愆贈林碧鑑相士咸陽宮中四尺鏡照人五臟何炯炯桑田滄海千餘年百錬依然化為礦君從何處得此物鑄就雙瞳敵秋月向未照心今照形不事瀾翻三寸舌逺衝風雪肯我過看來猶未深知我我方簑笠立釣磯萬事浮雲都勘破噫嘻吁只今神目鬼眼紛道途暗中許負應盧胡試問何如林家老碧鑑不知天津橋上復有龍鍾無送吉州陳守解任美人䇿良馬弭節螺江湄歲年忽晼晚桃李已成蹊遙遙一水間復復東與西晴川夾修楊行舟何能維朱鳯翔海山層漢揚音徽高岡有梧桐駕言覽朝暉贈君以白雲白雲不我持贈君以明月明月不我携白雲與明月遠道相追隨贈蜀醫鍾正甫炎皇覽衆草異種多西州為君望岷岷使我雙泪流向來秦越人朝洛夕邯鄲子持鵲經來自西亦徂南江南有羈羽豈不懷故營何當同皇風六氣和且平改題萬安縣凝祥觀古道松花空翠香風前鬢影照滄浪飛泉半璧朝雲濕啼鳥滿山春日長須信神仙元有國不知蠻觸是何鄉道人橫笛招歸鶴坐到斜暉上璧璫相如遊獵賦華􅴰璧璫注壁璫以玉為椽頭西昌倪氏有山谷書杜陵山水圖障歌作江山堂堂廢其後人以黃書求題跋感慨一絶杜二巳無黃九去長歌大字落江山百年風物今何似春水晚煙飛白鷴山中再次胡德昭韻不將顔色汙黃金落得灞橋驢上吟是處江山生酒興滿天風雪得梅心觥籌堂裏春聲沸燈火林臯夜色深人世可能行樂耳重遊不用上晴隂人生柳絮鬪堅牢過眼春光歎伯勞蜀道謾傳千古險廬山方許一人高眼前見赤徒妨道耳後生風未當豪明月盧花隨處有扁舟自在不須篙曽見尊前此客哉笑携麈尾拂莓苔水邉飛鴈年年見湖上新亭日日來酹菊醉餘披草坐探梅吟罷帶花回北崖尚𬒳剛風隔笑按匆匆上馬杯山中泛舟觴客便作乘槎客蕭蕭骨髮清尊前山月過笛裏水風生半夜魚龍沸三秋河漢明雪堂眠二客夢與白鷗盟病中作六月草四夜人間熱欲炊病懷如酒困倦睫似書癡夢與千年接心隨萬里馳客來相問訊寄語有新詩山中即事山中方雨笠天外忽晴絲夕釣江澄練春行路布棋乾坤供俯仰歲月任差池有酒如澠在何妨日問竒挽巽齋先生歐陽大著徘徊河西上月落衆星稀哲人萎中道雨絶將安之昔者麗鴻藻玉振含清暉名理軼晉魏雅言襲軻思連駕覲馳道並坐侍端闈及門懷燕婉升堂接逶迤方期黃鵠翔忽作朝露晞黔婁不蓋體延陵有遺悲層阿翳寒樹平楚曖布微帷㡆衣廣柳縞冠涕如縻水從章江去雲繞楚山飛巳矣如有聞斯文不在兹送劉其發入蜀秋風凄巳寒蜀道阻且長虎狼伏原野欲濟川無梁客從何處來云我之西方蕭蕭驌驦鳴熠熠湛盧光昔時榮華地今為爭戰埸將軍楊天戈壯士發戎行江南有羈鳥悠悠懷故鄉駕言與子遊雲天何茫茫周蒼崖入吾山作圖詩贈之三生石上結因緣𫀆笏橫斜學米顛漁父幾忘山下路仙人時訪嶺頭船烏猿白鶴無根樹淡月踈星一線天為我醉呼添濛澒倦來平卧看雲煙題羅次説竹巖摘藁遊子西南來出門道何悠文章會有用意氣輕身謀紛紛食梁肉藜藿當其憂君看百川水何處不東流挽劉知縣名元高字仲山實齋之子玉海淵源懿金閨步武高功名千載意翰墨一時豪天馬含風骨秋鷹折羽毛相逢俱白髮流涕濕征𫀆古樂府壽人母珊瑚香點胭脂雪芙蓉帳壓春雲熱明朝早㺯燈前月瀲灔九霞碧藕析璇杓高聳婺女明金波漾曉輝郎星赤瓊曲裏長眉青頭上更有經池君六九五十四東風西蟠桃花花未紅鳴鸞鼓玉聲玲瓏緑毛蒙茸蓮水龜斒斕五色人間稀春多瑞葉不敢飛氷壼光滿魚龍轉笑中低舞玉叉燕明年今日長秋殿安輿入侍金桃宴齊天樂慶湖北漕知卾州李樓峯南樓月轉銀河曙玉簫又吹梅早鸚鵡沙晴蒲萄水暖一縷燕香清裊瑶池春透想桃露霏霞菊波沁曉𫀆錦風流御仙花帶瑞虹繞玉關人正未老喚磯頭黃鶴岸巾談笑劍拂淮清槊橫楚黛雨洗一川煙草印黃似斗看半硯薔薇滿鞍楊柳沙路歸來金貂蟬翼小齊天樂甲戌湘憲種德堂燈屏夜來早得東風信瀟湘一川新緑柳色含晴梅心沁暖春淺千花如束銀蟬乍浴正沙鴈將還海鼇初矗雲擁旌旗笑聲人在畫闌曲星虹瑶樹縹眇珮環鳴碧落瑞籠華屋露耿銅虬氷翻鐡馬簾幕光搖金粟遲遲倚竹更為把瑶樽滿斟􅙩醁回首宫蓮夜深歸院燭文山先生全集卷之二終
