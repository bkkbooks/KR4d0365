front:
  text: 文山先生全集卷之六
  hash: sha256:4cad29deb35256dc01ef0cc2d50351c1992b01304df8efa1e77ed4a650dfef99
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_006-1a}
body:
  text: 書回寕國陳節推容去年闕下拜書稍得數數未㡬聞捧檄校文不知陶鑄何䖏人物某自是即汰斥去閉門深山遂無復鱗鴻一日之便忽使者来山中欣得妙帖見示小録方知昨者衡鑑所嚮近思想歸舟蕩漾彭蠡吾知心正在香爐峯白雲下耳宣之弛征執事首從臾之幸而集事僅足了吾軰之責非相與爲賜也書来乃知宣人以此爲多祠之以識其不志之意怵惕於孺子之入井豈爲内交要譽設抑桐郷父老此意亦能使人感激耳宣爲郡凋劇極力扶持幕畫間想見勞苦盤錯紏結以試利噐天下事正有頼於方來耳某前冬一出去秋一歸進退行蔵惟其所遇而無心焉則今奉親課子彈琴讀書流水青山悠然獨徃不煩故人江雲渭樹之思也史記見貺家蔵本皆不及尚當朝夕以稱所蒙明善録一部謾侑歸牋臨墨馳泝之至與吴提刑觀某頃待罪闕下薄奉凾書僕𬒳来歸嗣音杳邈上下人物感念世道未嘗不與門墻拳拳也某比者㐲讀邸報欣審玉陛出綸繡衣移節夜醉長沙暁行湘水巳著平反風酣章貢日麗崆峒更煩輕熟江湖相望原隰増輝某官宣慈而恵和髙明而正直義豐授受孔孟氏之淵源江左聲名王謝家之門第蚤立登於閶闔遄坐厭於蓬萊竹馬相呼春生𥜗袴星軺所至雨卧桁楊兹洊捧於英凾乃肯臨於梓部刺史故人按事飲酒情法相當忠臣孝子畏道驅車君親交盡靡需席暖巳趣詔温某杜門深山去城郭甚逺而於太和差近𥘉謂旦夕使艎泝贑石而前可於快閣上下迎候一拜忽傳英簜小駐青原某揆之始望則蹉跌矣瞻睇行臺輙易奉状代叙燕雀之萬一若夫揚清激濁洗冤澤物閭閻欣欣無所患苦使屏退之蹤亦得從畎畆以自放適是則某之所自賀者也臨楮切切與湖南陳提舉合號中山某猶記乙丑之夏從江西提幹得徃來行書江闊雲空斗光如水每懐世道上下人物未嘗不中夜耿耿某兹者恭審奉少府節駕常平車衡嶽連雲逺挹海山之秀天囦麗漢近垂椘分之光原隰春深旌旗風動伏惟歡慶某前年與公同除郎去年與公同除節不才安得追附名勝自分却立下風猶幸時論不磨得公軰落落叅錯使民物吐氣國庶㡬耳相望千里北斗在天何時執鞭寫此冲惙回林學士希逸號竹溪某夙有幸獲與介弟爲寅恭因之有以詢居䖏著作之萬一不戚戚得喪而言語文章足以詔今傳後竹溪先生何憾㦲一日之赫赫者多矣千載而赫赫者㡬人爲一日計者無千載也决矣回贑守李宗丞雷應號樓峯某偃薄林阿不虞使者之渉吾境也廼自空同来顧我猿鶴米家書畫光怪滿山此豈四海九州同年無情者邪僕家青原深䖏實與君侯黄童白叟接畛而䖏自下車以來但見年糓獨登鼪鼯屏息不需數月報政赫然兹豈千里能事環君侯四境鷄鳴犬吠晝夜相聞實共受賜僕也弹琴讀書於其間其賜多矣敢圗高誼厚鎮撫之委貺盈箱非所當得睇瞻霄立頓首知歸吾郷宰邑於使天之下者三人焉其一爲陳行夫若羅子逺蔡濟甫皆曲江齊盟者奉令承教必有可觀廬陵一歉異於常年田里憔悴不堪舉目惟章貢素無糴事而得歲又偏郷人顛頓者徃徃相率而趍治國民食關繫苟可通融兼愛秦晉公之惠也謹復書空山白雲無足持報薄言采藻臨風如馳回交代湖南憲新除湖北漕李宗丞某既專鱗幅奉起居猶有腹心不嫌裔擘某屏卧寛閑無復山外想公朝念其流落卑節起家使之繼明公印綬之後聞命憮然不知所爲堂有重諼盖年耄矣湘行且千里舟車迎侍不堪顛頓是以懇悃丐祠兾便私飬天髙聽邈促㫖且頒叱馭回車進退維谷将從鶴髪而來耶則非飬志将又以香火請耶是何爲者而爲是瀆也謀之乃心禀之親老旦夕姑以㫖甘属弟軰單車将指以明不敢自棄於明時而復以不得将母重告之造命俟驅馳數旬即乞身以歸爲臣子稍盡㡬分耳某於門墻知巳論交非一日天又開之以奉令承教之機是其與四海九州之同年其有情益倍倫等誠不圗觧后及此古之君子其爲人也謀之必忠愛其人也惟恐其不入於德故敢亹亹陳出䖏之槩惟執事啓誨而圗利之言不盡意臨風如馳與江西黄提刑震某幸托年盟夙依㕓部竊跡萬山底衣𬒳末光飲墜露飡落英粗安半菽公之餘也乆踈晤寫滿目春雲一水盈盈遡詹河漢某兹者共審出綸鳯闕移節虎城春信𥘉傳立變桁楊之舊天光下照重瞻禮樂之新依然故部之江山籍甚先庚之號令伏惟驩慶某官剛不吐而柔不茹寛有㫁而愛有威發爲文章正諧韶濩勁沮金石凛然節㮣光垂虹霓聲揚紫㣲早分頴川二千石之符就秉天囷十三星之節㩀案叱吏笑比黄河清開門賑飢功過中書考上乆簡孟博登車之志公遂爲勝之持斧之行春風遍地而狴犴虚夜月當天而鼪鼯伏載馳載驅維驥維駱靡憚周咨来㳺来歌如圭如璋言觀肆覲某避影杜門乆矣不作山外想不圗元㑹之日上恩覃及流落卑相讞於珠玉之側虎䑕同噐猿鶴笑人云云回林司業應炎某夣想巍巍堂堂於朝花院柳間追随猶昨日事也玉烟劍氣轇轕峥嵘杳然在碧雲崔嵬之外江月流水實照沄沄某官以氷輪金井之心胸發黼黻火龍之光𦦨而又慥慥乎言行皦皦乎進退若汲長孺若陸敬輿若慶曆元祐諸賢充公之爲表裏庶㡬其無愧領䄂斯文旗翼元命天下以此望公者殆人人同碩玉立以需之某自歸来乎山中俯仰半菽不復得與四方書牘從事比從戸曹黄文得誨凾草木同味玉雪照心欣懌之餘感慨係之某踸踔之蹤何可爲者大化驅之一節誤落湘雲避走陳情俞音竟閟單車徊徨且此首涂行復求返吾屠羊而巳渺渺天一方重此懸泝專容陸續貢敬回信豐羅宰子逺名椅號澗谷某去年聞雙鳬南上落落空山不如燕雀之爲有情也大化驅人作江東客數月􅐡梳枵瓠未見端倪㑹誤恩召環洿班過當亡何狼狽而去盖踈闊以來居多道路之日出䖏乖方滋可爲笑杜門息影中高情厚鎮撫之􅌹介持書勞苦臨風馳感可人天一方信豐山水邑見謂讀書松竹晝影滿簾著吟人其中所謂予方有公事此豈錢榖吏比耶勿需終更西清有詔璧弟何爲者赴新昌且百日商蚷馳河未知攸濟恵徼如天之福寡過多取數矣贑瑞皆佳邑藹藹吉人鼎立空同真一時之盛當路或令舉所知某幸甚有以藉手薄言修布小附芹心非敢謂報倚筆詹泝與前人某臘前凾書徃來庶㡬契闊之意年光冉冉驚見雙璧盖曽兄季囦專紀綱寔來仰惟同年長者所以恵綏荒寒皆可感也某雲卧深山世意落落一起一仆非人爲之上天盖高匪怒伊教敬威念咎安得不力執事昔爲之助喜今亦有以救其不逮乎敢請季囦值儒者之窮執事以氣類遇合所以位置之者寵甚萬間寒士公将溥其施於一時所謂兆足以行矣某爲之歛袵新年喜雨燈前報命馳想一方臨𥿄悁悁回羅子逺就賀除京榷某俯仰歲年甚知聞問頃知捲斾來歸衣錦有爛且趣舎人装于于然東矣凾欲擘牋所思雲頺鶴倦不可拈拾竟堕夣寐外時一動寥廓想江邉鷗鷺爲之悵然忽得手書賁我空谷華衮流離辟易乆之共審帝闕出綸天京司轄姑飬簉鴛之望佇博峩豸之音伏惟驩慶明公契古胸襟吞雲夣者八九外物瑣瑣遲速何心積之厚發之弘宇宙間華軌清貫将次第而取之以其時考之則過矣某風雨深山避影却走乃元㑹之日公朝以一節起其流落回首三湘驚心蕉夣請隷香火㫖更趣行慈親以逺役爲憚進退維谷莫甚此時旦夕黽勉拜命姑單騎之戍驅馳數旬乞身歸卧綿上同年有情不隔四海九州之逺毋金玉尔音兾一語以自壮拂拭過情非所敢當也占對梗槩尚猷嗣牋某一之日既端拜敬謝芳題并報信豊薄欇雩之槩二之日謹遣介馳諸席間寅奉起居不敢繁叙首祈委鍳某臨歲入湘後堕身徽纒中詹泝宇下闊焉嗣音繼聞趣戒朝装榮司京榷某念欲牋忱賀慶以申風雲發軔之慶一春屑屑行路浸堕因循既抵空同後潼川趙同年來爲縣實在河陽舊桃李䖏鴻沙指瓜猶記東西所以告新者甚厚因得切諗修門近况大帶深衣長身玉立道徳福澤方來而未艾也吾郷諸老行軰落落巋然靈光惟今澗谷先生依星辰傍日月一日騎麟翳鳯朝閬風夕玄圃勢正順耳某衯隂杏集素辱心期慕王陽之回車學毛義之捧檄得郡山深俯仰半菽君師天地之造知巳錫類之餘也惟是求牧力綿未知攸淑回首蔽芾我愛桐郷豈無一言益其故人并寄父老因風東向頓首以請與汪安撫立信號紫源某仰惟曠度絶人不作邉幅僕安得以書生刀尺從事髙明幸察之某昨者爲高安受容受察於玉斧之下公不以衆人畜我我實德公未㡬公去之而僕亦以憂患連年卧山中蹤跡䟦疐不足爲知心道也撫念江流人物如此未嘗不中夜耿耿某兹者伏審揚綸九陛建纛三湘人無異辭國有生氣共惟慶愜欽以某官名髙九牧氣盖群公江左管夷吾足係英雄之望軍中范老子能寒冦賊之心徃者金湯中流忠績簡在上方以南事爲慮詔公方靣隱然長城一代數人百年㡬見公不得不力紀勲旂常歸衮廊廟自此等而上之某退在漁樵未忘婺緯聞公此來爲世道擊節偶逢黄君強立長沙便介率然上状仰闖賀床強立名至道某昨嘗薦至舘下強立每謂公以意氣動人能使人不愛其軀其感激知巳可見今兹適在兾府從諸公逰公不以生客視強立強立奉筆墨以佐大閫豈直一日之長而巳慿筆僣越向風如馳回前人某望五雲多䖏以駑劣下乗幸甚自託於禮樂之下風既奉儷凾布親牘修大閫府之敬廼不我後先使者銜命即之於深山中翰墨陸離光動蔀屋拜而後敢讀讀巳而亟拜居今天下論人物一方一曲之士随世以就功名謂之無益於成敗之數可也當大方靣建大将旗鼓使國有龍虎馬不敢南向其周公瑾祖士雅之流乎天子召拜樞近脩勞還故事少府且出節付以西北煩公辦此金戈凱馳歸衮廟堂作太平六典四海以此望公亦公志也某少也驅馳嘗有意事功鷄鳴奮發壮懐固在然而亦少衰矣𬒳㫖行湘顛倒繡衣豈堪重著惟宿昔於門墻辱知巳厚恵徼宇下恃此敢求適三月移卜先塋有山間之役受印之期尚在夏五竊聞四軰在道車馬有行色天殆嗇其一見之機平何爲屢得之而屢失之也退憶前年自直廬汰歸公以書存問推許不薄海内時流得此於名公者正恐無㡬今承奨翰益佩卷卷江濤渺然事㑹何極何時執鞭寫此傾盖某臨風無任馳泝之至與胡都丞頴號石壁某巳端具儷櫝候敬籖房心之精㣲敢嗣陳之某於當代知名夙有取履結韈之碩寄書梅外嘗寫我心逺道報襄如見顔色伏自牙纛卷零雨而還鴈闊湘深馳泝寥廓伏惟以任重道逺爲心以難進易退爲節巍巍堂堂卓然佩安危而繋輕重乃今聖哲馳騖上下焦然金城圗出師表㣲公孰與於斯追鋒在道不俟駕行矣某家畏壘山下麋鹿之與群而猿狖之爲曹也公朝起其流落山衣易繡舊夣恍然一節走趍幸在通德里九轉寵靈亹亹肘後某行當掃門以請拜状梗槩臨風卷卷某一節出山指碧雲崔嵬八風吹不動䖏知爲神龍卧洛所也前者幸甚脫屨堂下進瞻芒寒適子之舘授子之粲胸中經綸之竒傾倒敷露中夜慷慨音落九霄使人驚且喜今而後知宇宙間未嘗無劉玄德軰某持以去岣嶁襟䄂尚有萬丈光此殆未可與俗人言也某以踈决故一􅓗下長沙𥘉約先拜見而後徃帥垣下偶有牽制稍違息壤之舊今兹回棹潭濵将由便道單車負荆門屏之外輙遣一介先道其私幸豫戒猿鶴勿以俗駕爲拒率然馳控倚卜靣叙慰饒州胡通判石壁之姪某兹者不圗先令叔某官石壁先生遽捐里舘風馳上征哲人云亡邦國殄瘁執事者骨肉至慟爲國受弔撫孤大誼定力如山足可以對岳雲之崔嵬矣顧惟某落落後出辱二阮之知乃在一日之間老仙用意慷慨與之上下古今撫念人物䄂中瓣香僅僅拈出一再老仙所以命之者更在度外㸑桐之音方希而化人之𥚑巳不可追矣出聲慟哭悲不自持謹裒綴壹欝洩爲奠詞徃者如生尚爲我惻惟一賜宣燎豈勝感涕之至與安撫李大卿芾號肯齋某巳専具儷櫝申敬記室私心梗槩不嫌裔襞某辱知愛門墻非一日之故風流雲散一别如雨每一念此神爽飛馳江湖一雲本不甚相隔彼此出䖏觧后參差至闊絶乃尔僕之罪多矣明公當世人物卷韜山林四方顒顒望其一出方時多艱婺緯忘食然見王茂弘者固以爲江左有管夷吾某有計日以俟鋒車耳某避影深山乆不作馳騖想公朝念其流落卑節起家釋緜上耒而于征未知所以淑後幸甚區區走趍實在中台之里十年契闊一旦逢迎豈命物者開其親炙之機而恵顧之乎如聞閉門謝客雅意絶塵然待故人固自有情猿鶴必不我拒相望寖近凝泝如馳回永州楊守履順巨源之後某嘗論一世人物紫朱其綬唱呵車塵若是者駢肩矣求其忠義貫日月䖏漢賊危疑之間臨大節而不可奪至扵殺賊奴取纍纍金印此事付度外豈不凛凛大丈夫㦲父母講傳百年間吾見先太師一人而已某官鍾岷峨之秀嗣彛鼎之勲忠臣之門天人之所共祐國士之噐君相之所柬知石崖齊天唐中興頌功䖏也公来其間寕不感慨今蜀道難蜀道難公收拾群人手揮天戈一節之还從甘棠刻第二頌旂常濯濯光于前聞人某何幸身親見之歸隱空山望湘雲千里不圗使者遽渉吾竟仰惟明公張主斯文經始棘院以相龍飛興賢之盛大張門顔使某也得執事從君侯所以厚我不同他人小人雖無能爲役烏乎敢辭貢院二字僣易奉上進之退之惟命未諧握手徃來心聲庶㡬古道之槩臨𥿄拳拳回林侍郎卿孫號雲屋在臺時某從望闕山矯首五雲多䖏寖踈起居長沙少府傳仙書惠并繳貺琳琅之翰仰惟緇衣宛孌古道顔色爲之歆拜傳仙不肯望然而來以書先訂出䖏此意亦頗謹重巳遣禮聘之且告以𥘉筮如九層臺基湏令堅壮可耐静以待次不失雅道未知傳仙何所嚮若其來訪敢不惟命戒之共回前知衡州楊秘監文仲某巳端飾儷櫝致敬心之精㣲不嫌裔擘首祈垂烱某於足下非敢以氣類詭流俗之縱尚想疇昔載色載笑相遇不同他人至今歷歷在夣時方孔艱荆吴多壘坐廟朝籌帷幄折衝爼豆正張趙韓范之事業湘水以西勤勞一障天子曰歸借徑斯文本色俾執事樞歎見之晚某閉関念咎不復作馳騖想公朝出節誤及荒濵回顧黔驢曷對湘鴈趣命且攽單車于役稍盡君親之誼即尋香火之縁衡雲照人垂執鞭弭乃天上笙鶴不復顧鷄犬矣所恃襟期有素且未忘甘棠則其居中庇之誨之某與蒸湘之人均利頼焉昻首慶雲伏楮耿切與劉尚書黻某夜拜文昌朝馳凾敬感激亹亹不嫌裔擘首祈穹采某庚午待罪底班望英躔萬丈於絲綸閣天章澗色衣𬒳青黄雋永味言稱於天下曰知巳歸伏山阿分霄壤絶不敢以世俗書尺候主進吏熏香宣夜北斗以南共惟某官文章稷言而皐謨器度商彛而周鼎陶鎔帝皇轇轕造化燭六合蕩八垠吾道之福布濩流衍翠幄青瑣之從容文劍紫荷之凌厲由八座而間兩社使天下再見希文稚圭之風流某嘉與人士旦旦稽首某瓠落之蹤一意返哺夣寐不到山外公朝未忍捐棄抆拭而起之復令效湘節牛馬走烟霄流眄不進不止盖疇昔之盛心未悠也某始以私養丐閑廪天髙聽邈且趣之再奉明命以趍一之日甫履回鴈布宣德意唯謹湘人尚力抵氣末俗輕生蘇息而調服之旣竭吾力焉垂天之雲覆燾其上訖濟我後某爲之夙夜碩言因謝有祈臨風悁結與陳察院文龍號如心某夙在眷知屢牋契闊杓粲奎明經緯碧落暁夕詹馳伏惟執事以光明俊偉之胸負法家拂士之望鳯鳴朝陽萬物吐氣氊厦宻勿熈明日新陸贄䖏中汲黯居禁精神強而本根充外難不足平也上方属以經濟俾執事樞某歷落之蹤豈堪使事公朝不忍終棄盡出噓揚始以私計不使迎侍冐干閑廪趣㫖且攽單車于役以五月一日受印司存旣見父老具宣上德意然兇猾相挺山凋水瘵扶持調習庻㡬一日非晚且再陳情爲歸飬計侯誰在矣張仲孝友儷語循比藉手不足以當劍首之一吷臨楮無任某輒有禀瀆某昔者以臬敗由書生本色只當在斯文一邉不應以刑獄爲職故凡寛厚惻怛䖏人皆由之而不知其有不可以詘令甲者則譁然以爲過當所䖏非其位故也自後諸公速有論列皆不實知其人不過以前䟽潤色而爲之辭某甞碩一日有以自見於天下使知吾所謂衡氣機者而未易遂也今年復除憲實不碩就丐祠不遂鋭欲再請又念起自廢閑豈當重瀆巳甚故且黽勉驅馳亦謂姑以平平䖏之可也旣入竟乃知湖南風俗大不然某若以身事懲創靡然風采懼無以肅一路觀聽又坐失職故𥘉至不免見之榜掲謹録本以逹台覽夫如此𥘉未嘗有嚴厲之事特示之以警戒之意盖於職分不得不然然才作此差遣便是惡滋味兩日刷具一路獄案數目甚多莫非刼掠嘯聚等事他時審覆旣圎皆不容付之輕典某且獨柰何㦲某此來不及侍親䖏此亦大不安俟踈决後惟有乞身歸飬所恃知已肝膽相照臨書不憚傾倒念其乆要其必有以教之嚮風卷卷之至與鄧校勘林某頃繇春中走赫蹏闖輦下知上徹五雲閣乆矣一節奔走行役曠焉嗣音矯首河漢盈盈一水某蒙頼如天之庇以孟夏八日辭膝下五月朔吉受印於衡陽𥘉見吏民旣宣上德意退坐棘木塵中與徽纒相尔汝爲之弊弊焉江去湖不甚相逺始者殊不念其風氣之悉至此始知尚力抵氣以血人爲嬉九城一波莫障其瀾某以爲怒之而不教非古祥刑意也見諸榜掲嚴而不爲殘椘人亦頗爲動悟其肯綮中也然某以書生爲之非其本色不諒者衆此十年所以有申韓之謗以至于今日是安得而忘吹虀之想乎且重闈以老不得就飬單車彷徨雲舎切切旦夕踈决後且即丐還屠羊使叱馭回車於君親兩不爲失此其所以謝夙昔君子之教而庶幾乎年盟之盛心也厚德錫類某恵徼福于宇下盖方新焉偶逢便武亟詗起居且叙其所以跛躄馳驅者遥對清切臨楮泝詹與陳直院維善名合號中山某睮睇紫霄寅致儷櫝心之精㣲敢嗣陳之某昨承鵲𫀆出使驛騎歸班嘗領廬山下所賜手書光氣垂虹下照空谷撫歲年而如雨恍河漢之一色也中山先生文運斤而成風氣振䇿而奔電元龍湖海突兀宇宙支架明堂曲摺萬丈光芒緯國典華帝制天下固以爲未也大明奎璧晋執事樞使士者顒顒歌仲淹弼一䕫一卨某落落青山自返吾哺公朝未忍捐棄卑之一節使與衡鴈相周遭草木吾味一引手馮翼之端出緇好某始以私計求閑廪聖恩閟俞且趣之載道遂以朔日見吏民宣德意然楚俗尚力抵氣殺人爲嬉撫存而調習之未易爲力明公夙昔褰帷棠隂如屋五雲緯霄影落衡杜某爲之夙夜願言因謝有祈臨風依遡某頃侍親抵郡輙持尺素􅌹貢紫清懐今雨之綢繆望下風而慷慨也璧弟來京師拜夫子之門黄河泰華天下鉅麗之觀璧也所遇多矣今天下稱文章大手筆落落可數平園西山諸老之風流散在三光五岳間日月磅礴河漢經緯吾紫㣲公實當之南州之士僕将帥以聽某讀書渉獵筆墨空踈方青山蕭然水上之風猶吾意㑹一行作吏此事便廢間於故牘中掇拾親親長長之説見於行事邇來千里民氣覺稍洽和書生不知向方能終不迂闊於事否昔人云未識意先感水火流燥記吾味乆矣教思無窮勿替引之某豈勝惓惓與曾縣尉先之字孟參某自前拜書後回首鴈峯不勝拳拳水口吴權寨來及承手書備見繾綣故舊之意百單二歲之姥孟參發揚之安序表章之真足以爲衡陽一叚佳話某六月朔日祖母𥘉度亦及與一城老者相周旋人生七十古來稀是以自七十爲始千數百名中其最高者爲九十六延此母於堂進趍語言殊覺不衰惜未有過百者郷間有羅提幹存叟祖母去歲滿一百歳某嘗偕朋友十餘人徃拜之當時有詩歌成軸今年又百單一矣此母大家諸孫皆儒者提幹登科有福有夀又非衡嫗比劉守却未知某旦夕亦當爲文以白之贑斗絶與湘問乆相隔適有自建昌來者云五月二日廖恕齋過建昌知五月末主人到臺觀上矣司存事首尾關繋無如孟參在恕齋必不能相舎安序權事半年添此繁劇想一旦釋重負甚以爲喜某於賀恕齋書中巳備道孟參一叚人将争出我門下此自無説但願足下歛以静鈍守以廉朴一如平日則天下之竒材青雲之逺業也贑事稍簡親老以下俱安平亶出雲庇但有疲於竿櫝以一人之寡應四方之多覺甚苦之郷人相過者随分䖏之亦不至甚相炒中間只一榜禁假託大者歸之臺小者聽之縣或以爲得體贑只有出甲一項未易杜絶今春此軰在廣聞某新上皆急於歸就保五乗其畏向之機近日未免先事諭暁度今冬可得安靖湘中旣獲諸渠魁後想道州一帶巳無事湘郷諸䖏冦攘之風當是乆巳帖息兹因專介信筆傾倒薄芹并瀆向風如馳與曽架閣某曠不奉状者累月杜門山居無由四方上下以相從於顧盻咳唾之末馳仰中得㑹李文復卿㢘知起居之詳甚慰子曰苟患失之無所不至百千年間天地不位萬物不育推尋其咎常於患失之私基之閣下出其浩然之蓄積與當世之大人論成敗争曲尺言不合艴然竟去榮途引於前禍機怵於後而毅然不變由閣下自䖏則本心内事也自惴惴持固者觀之則豈不患此失哉歐公所謂我軰中人敬歎敬歎因復卿歸并介以有請先通判託孤與先侍郎先侍郎以其責歸之架閣事至重也執事不以某弟爲不頴使昏名門講好以來渉四年矣中間歲月雖多機會甚少以故告成吉禮猶切遲之獨至今日則造物若有巧於其間者執事當驅馳江淮而某赴闕就道執事卷風雲蔵林􅊤而某恰亦骯髒来歸兩家𥘉意誠不期有此暇也某方尋香火之縁自分閑散而執事氣宇槩諸公名聲動中朝扶揺九霄匪蚤伊莫則川駛月流舟飛岸奔非復有此之暇執事終先子之託而某了同氣之責今其時乎區區肺肝巳具告之復卿并䟽其事兾以関徹幸執事終恵之回吉守王提舉佖號敬岩某僻居林薄間望旌麾所涖逺在霄漢道德朝望蔚乎輝光可仰而不可親是其分也乃蒙寵戒令有聞教之便忻快何如入冬暄寒相泊適有采薪之憂莫醻隆厚滋負皇恐謹具状謝他容叅謁并叙區區與廬陵龔知縣日昇號竹鄉自螺水而東望西山廬阜與三江五湖如拱揖知蜿蟺扶輿有名勝宅其間相去蓬弱良覿差池北斗芒耀徒耿耿心目爾不自意桒梓幸㑹牛刀大手姑爲此試共惟明和介潔之譽此邑不占巳孚跂予望之艱難之秋得君子之政與拜燾覆之貺滌篆云俶未能躬闖賀庭謹具劄子代布忱悃非晚當圗禀謝不敏與贑縣許權縣惟廬陵與安成爲比郡山川同在吉志今兹遂得自附於郷黨之末幸甚休甚某徃者於諸公間得聞政事一二有司敬謹莫重於獄後世苟簡㡬以民命爲戯濂溪爲小官不肯殺人以奉其上東坡謂今人争减半年磨勘雖殺人亦爲之聖賢愚不肖之用心其異如此頗傳㢘明與同州推官事前後照映辱在同里與切増氣銅章墨綬賁止空同一同風化姑此相属奏最匪伊騰太清凌扶揺錢公之歩武也某疇昔學校曽於名門子姪略有相知者獨絇履末光未有下拜之日其如傾企何適陳文成甫來以爲託身桃李之國輙拜此以識惓惓陳文并乞公庇也率文上状末繇參侍仍兾自爱不貲之寳以湏逺至賀刘敬德𥙷入太學名欽號絜矩兹審捷來南渚聲振西雍才名三十年説屠龍之老手冠帶億萬計快走馬之脩程儒荣有開士論稱服共惟驩慶某相期半生聞榜折屐無繇造慶謹奉顓凾芝楮二百千敬爲犒捷之助不腆皇恐臨風馳泝賀鍾有謙𥙷入太學名山甫兹審氷闈獻藝璧水蜚聲月旦評中説八义之老手朝雲飛䖏艶三合之修名下同與周德甫爲季弟從弟聘某比者牽率朝從一相過兩日夜陪接議論之末極慰翹企獨恨去之匆匆未遑属饜耳中間妄欲以二弟相累陶冶荷不鄙棄許之以相周旋甚幸甚休鄰敵相交則有盟市道相質則有劵吾徒相與一諾巳足政不在要約區區也然君子義以爲質禮以行之莘郊之幣際可而幡然雖虞人之㣲非其招不徃非義無以将禮非禮無以昭義交際之道不以節文将之終必有弊况爲弟子擇師乎此書之所以不敢廢也歲禮之數息壤在前無俟贅𫐠官楮一百貫顓人送上以少将聘致之敬告幸麾頓小弟差劣不可大脱鈐束燈前後早賜垂訪乃所碩望觀德聽教行有日矣尚及傾倒其餘與文侍郎及翁號本心川人後叅政某乆曠起居逓申連得誨帖仰佩至愛邸状間屢見丐祠尊性樂在簡淡急流勇退仙風道骨人也但老文學爲諸儒興刑真侍從爲朝路風采上必不聽去耳舎弟璧來拜侍辱以家人進之得與教誨玉成實受尊賜某向在湘承命問一路書籍後某去之匆匆諸州來者不齊今約見存可二百冊贑書爲一萬九千三百餘版亦巳陸續印背别容一日專兵賫申某治郡以來書生迂濶之説頗有效驗祖母六月生日集城中内外老人自七十一至九十六爲男女一千三百九十名犒恤有差老者既踴躍而少者始皆知以老爲貴禮遜興行詞訟希省又風雨以時早禾甚稔晚稲亦可望諸縣民皆樂業無持挺爲盗如宿昔者稍逭曠􅘃皆尊誨所逮宗老去國後今寄居何䖏想甚清徤耻堂先生居霅川近况如何批示幸甚遇郵拜書不宣備高耻堂名斯得川人叅政本心癸丑榜眼後來廬陵省其叔可則先生時年十八邑校簾試全篇論題曰中道狂狷郷原如何冠榜遂通譜焉道體堂謹書與楊大卿文仲某頃繇岣嶁申敬群玉之府爾後僕僕西還爲空同之役一息半㫷海山一碧秋風凌凌翹企不勝五雲紛郁比審䟽榮文石晋武頌䑓制作一新縉紳交慶伏深歡忭某官貞元朝士西學宗師玉雪照天寒露清氷之操璧奎行世懸黎垂棘之光属時訪落朝有老成真天聖之蓍龜元祐之麟鳯也入告辰猷條天章十事冥之兩社以福溥寰某顒顒延睫烏哺萬山間於芻牧何𥙷亦惟召父杜母之政是則是傚蒙被吾味至於今兹璧弟來修門得親炙典型以濯去舊意浸潤新雨愛其兄施及其弟此感殆未易名言也念間起居輙此馳泝空明並候所以教尚祈金玉式副前禱與趙戸部平遠某嫋嫋秋風中若有天人噓新雨而沐之者眄摇落之􅌭紛把鉅麗而舒卷則夏六月錦闈蛟龍字也西平有子惟我有臣春秋書曰季子來歸國人貴之麒麟游泰畤鳳凰集阿閣之候乎朝廷清明再天聖元祐對揚訪落為東諸侯先洗耳琅琅為天下誦之某為養承乏於此何補芻牧所以朝夕其民亦惟親親長長之推庶幾萬一云耳諸邑大夫之相承通融一家痛痒一體緇衣之宜兮若田君尤所謂用吾情者執事惠以所知於此見田君益奇而某得納交幸也結幽蘭兮延伫此意襞積專猷嗣箋某繇空同起睨海山虹氣緯霄靡罅不照吾石樓大地一粟也輙倚空明來詗起處惟偉人照以度外某惟明世雜遝英賢以綱紀生人金玉新政豈弟君子來游來歌經緯乎文武轇轕乎風雲伯塤仲篪叔出季處無非吉日車攻間眞實經濟臂指西北本在中書植之風聲旂常世世某拭目延和殿新綸之下烏哺且半期餐素祗益愧耳旦夕歸命香火奉輕車歸即所安居中引重允然終恵之望泚筆㢘泉馳訊碧落豈不嗣音更僕以請臨風無任悁結與陳侍郎伯大號篤齋某熏沭薇露闖敬高寒恵徼五行俱下之瞩某玉峽撑空水沙一碧神仙人弭節其間春花秋竹鍾鼓餘閑真神龍深卧䖏也咫尺五雲不得時候猿鶴則吏鞅實丹􅉳之夜瞻明河自訟不置仰惟一代翔鸞神駿騰踔凌厲駕廖廓而振汗漫也舒爲慶雲卷爲清颷其磅礴帝所則福在海宇其夷猶山澤則望在廟朝六合一握天地一瞬也厥今訪落廟謀雲漢爲章詔書出延和公且兩社某嘉與顒顒額手某區區烏鳥之情俯仰半菽枌隂蔽芾實持燾之宿昔拊摩凋疲曾㣲芒忽而髮皤皤間亦念家旦夕皈命香火奉輕車即所安玻瓈一江光氣上下某服媚之無斁蕝禮寄之九霄間忘其蒙瀆倘沭涵茹幸甚與宋衡州某介倚心知不敢徒亹亹西曹道邉幅首祈紆省某自抵空同兩厪蜚翰忽殷勤以寫心折芳菲其寄逺春風千里著人如醉至如骫骳之作不足乎揚繅藉而琮璜之大好大慚退却三舎顧區區定交才數月宇宙意氣不啻平生忽飄風其相離不勝回首明河一方如耿耿何某官氷輪金井雪栢霜松西岷太白之精九霄經緯南平莫邪之氣萬丈光芒馳玉軼而坐朱陵轡華絲而當銀漢洗鼪鼯之窟穴飽鴻鴈之稲粱巳收暴公子之威名小燕汲淮陽之清净緑綈方底竚垂岣嶁之雲綘幘䁱筹催傍􅒀稜之月某視郡印巳十旬𥘉至如人家風雨四壁逐䖏經理乆之方成綸緒日來甘霔應期粗慰農望想福星所次時雨膏之早熟必巳可卜恕齋新上以同里而講交承觧后非偶然者逺想楚觀五雲衣冠玉立不任馳羡采采澗芹薄旌一髪不足當莞頓欲徃從之湘水深三復是詩神爽飛越與知江州錢運使某日戴五雲茍且爲治自省其私則統部中一支壘也等威有截不得以杏園宿昔自詭乃者辱不彼賜之書草木吾味䔍實嘔喻畧分際之崇卑申度外之繾綣言念君子終不可諼兮某惟湓浦控上下流古用武之國陶士行庾元䂓諸公藉此以鷹揚江表虎視河洛乃今天移福星作鎮此土激西江蘇鮒轍屹長淮而断鯨波作宋長城真北平變化傑魁人也東南金湯施及虹翠隷也受賜多矣某私竊自念贑山長谷荒赤子龍蛇雜襲而䖏芻牧之責大恨不任而欲以詩書揉強暴衣冠化刀劍書生迂闊而不至敗缺者㡬希明公回首曲江風誼一世果不以九川四海之人例視之則鞭辟其不迨包蓄其未閑如天之福也某頓首下風以請馳一介上䛛起居薄采空青以自附於潢汗有敬之誼犯嚴忸然控露潦略某撫揺落之􅌭紛泝空明而延佇龍光射牛斗福星出虚危殆一夕九起也某之為郡寔隷照臨月詗有典當不懈益䖍寕不嗣音童瀆是懼五雲九霄凌倒景而下空同歛爲清氷溥爲膏雨地雖辟絶而天人顧復之益深豈無他人不如我同味足下塤箎五老之嶙峋襟帶九河之汗漫要其胸中磊磊落落倬彼雲漢爲章于天者曾未䆒也忽而身作長城手提半壁嘉與一道桒麻而菽粟之西人之子幸則幸矣然六轡如濡王事一方孰與入坐中書經制天下聞延和殿議召公矣某強顔芻牧何𥙷毫分目前四境無虞年榖粗豐皆澄清餘潤所覃也區區素餐是愧倘使者猶以故人未即舉法旦夕丐香火奉䡖軒歸即所安徼福年盟尚終恵之逺道寵賚雜遝充庭翠玉春暉緹襲無斁謹具剳申聞伏覩新綸専容郵賀與廣東曹提刑某曉挹薇露注之赫蹏上之東壁府昭有敬也某惟紫㣲雲烟衣𬒳炎海若經若緯紛郁輪囷施及虹翠間山媚川暉浩蕩何極隷也旦旦稽首欽以某官才足以截蛟剸犀文足以鏗鯨躍鳯力量足以扶巨鰲之贔屭東都韓吕家聲猷奕奕江濤如許更當坐玉關爲天子當一靣繡衣霄漢尚逶迤五嶺間邪䄂青冥之鈇鉞行黄道之星辰方底緑綈巳落天半某丕戴五雲奉重諼空同小院烏鳥私情自揣逾分起視四境山長谷荒赤子龍蛇未易帖服越鷄伏鵠卵何以克濟邇只臺容如靣鐡壁某恃此無恐郡中舊例以八九月間申嚴編氓出甲之禁徃徃此時兇儔陳脚巳動履霜不戒堅氷柰何近者妄意預行暁掲使家至户暁人人知所避就今年僥倖梅關以南無一草一木之驚僕之責始塞榜檢求教吏師尚不彼發藥之某比爲五羊羅僉判拜書強聒持寸莛撞巨鍾多見其不知量飛剡公車不俟終日明公有意天下士如此感拜盛心謹馳一价脩詗節下謝巳徃而祈方來亹亹如也東望芙蓉玉立萬仞伏諸䄂馳回汀州陳守某惟自古民流爲盗有受病淺者有受病深者淺者調其血氣時其餧飼不待針艾而病巳除昔之人有行之者龔少卿施於漢之渤海是巳深者參苓之所不能可湯熨之所不能瘳則大承氣湯證矣昔之人有行之者子太叔用於鄭之萑苻是已今者使部弭盗一事鰲峯先生豈弟之心高明之識見諸巳行者其成效固班班著矣賞一人而勸者百罸一人而戒者亦百春風之和秋霜之栗施及鄰境胥有嘉頼特在更酌其受病之淺深而㫁以行之是殆非浮想懸度者所敢與知也贑之爲州雖曰以五城兵馬鈐轄繋之衘顧建立司存本意不過爲贑民出他境使郡将得行通制之權要其實則依然一列城也若有所徴調下郡禀承實視朝命謹布腹心以謝委戒之辱膏秸恐悚與趙大卿孟傳號松壑前知贑州某汲㢘泉澡栗尾通忞忞主書吏昭𥘉好也某昨從湘花間奉盈尺牘一舒泄其宿昔雲龍之私明河七㐮流麗空碧地中之山謙水上之風渙十襲九緹至今耿耿光氣蓬萊水清淺縹緲環佩渇心湧泉一日千里某兹者共審玉宸渙寵金掌升班維城維翰維藩磐石大宗之續厥貢厥包厥篚綱維六府之司禁篽雲開神塗風動伏惟慶抃欽以某官祥源異禀若木殊輝綺繡揮揚汝陽天人之相龍虎變化北平魁傑之風勞侍從而厭承明經駘盪而出馺娑公不淮海之薄上爲宣室之思玉珂金鑰之玲瓏花綬藻衣之舄奕徑摩馳道渙周卿六命之頒不出都門竚唐相九人之拜某頃單車馳岣嶁下鶴髪重重一夕九起效矉洗馬歷歷陳情君師天地之造爲擇便州夫子奔逸絶塵乃使隷也瞠若乎其後雖鴻燕差池不克靣拜龜組然天開百世之好山川其忘諸惟是求牧力綿未知攸淑一規一随頼有柯則在我愛桐郷不隔風雨肘後寵靈不彼而惠綏之此固憇棠中父老之所共望賜者也謹具劄子申詗起居未諧良晤願言金護玉持式副前禱應舊治要來敢請其凡與前江西趙倉與椯號端齋某澤露焚𬎼闖敬五𤱔花竹下盡脱櫝彛惟高明垂詧某沐滕㕓舊雨今十六七年立兾部下風則又六年僕以荒落之資跧伏扵青原山中如啇蚷馳河逺莫致之先生如驚雲㳺龍舒卷九霄其歩武不可俄度宜乎其欲徃之而瞻望不可及也區區九十之親就飬空同今繡衣洛社中軰行也間得訪問獨樂起䖏先生玩心神明之表㳺目日月之上蓄爲清氛蒸爲非霖一日舉而措之沛然江河孰能禦之我有宗老爲國之幹訪于落止以公歸兮某半生出䖏無足爲明公道宿昔受教所以護持其元龜者至今不敢渝世人自有一種毁譽道眼自有一等高下先生度外大觀謂其人竟何如也某因諗趙令君居中台之里又出門下值其良使亟裒此墨少叙戀思臨楮馳泝與吉州劉守漢傳某澤頴祓𬎼寫忞忞銅壼閣下昭鄰好也某日從郵置得澣我私盈盈一水間鼓宫宫動鼓角角動精神流注絶出翰墨町畦芳菲菲兮浩蕩何極欽以某官吐吞玉櫃之風烟披拂青藜之光𦦨卿雲甘雨含天地之至和古栢蒼松炯雪霜而獨立小駐星河之棹頻分江國之符春靄袴𥜗神螺黼黻雨籠絃誦振鷺漣漪鈍爲銛而頑爲㢘痿者膏而憒者醒兵衛森畫㦸小宴清香衣冠拜紫宸佇班黄道某宿盟園杏又尾朝花蒙霧一㕓稽首錫類朅來空同宻倚五雲多䖏楚波之及晋魯柝之聞邾川媚山暉沐浴今雨則所以講信脩睦者柰何以簡陋廢采采澗蘋以明有敬玻瓈一碧此心俱東某日摩挲空翠端飾側厘以進之集古主書之側盖於門墻辱好有三焉園杏之齊盟也朝花之末至也三間風雨託於君侯之土地也而豈但曰小國之扵大國也有交鄰之道焉謙齋先生不以小人之美芹者爲僣而察其明有敬之私是能容之其弘多矣介使踵來辭曰報聘庭實維旅芳菲彌章是何君子施禮之周執德之信而僕何以當之抑傳有云長者賜不敢辭取數之多亦祗以媿贑去吉一水三百里而氣候風土習俗事事不同未春巳花才晴即熱山川之綢繆人物之伉徤大㮣去南漸近得天地陽氣之偏㸔來反不可以刑威懾而可以義理動書生出其迂闊之說嘗試一二觀聽之間稍覺丕變奉令承教於君子尚願維今有聞以淑厥後廬陵之政識與不識皆云一佛出世山川出雲時雨流動此爲霖之善者机也民歌路謡徹聞京師天子明聖恩光言逺某雖不敏尚能取皇甫公韻歌和之占謝之次寫其輪囷寕不嗣音如此江水回吉州趙倅某首春携便符㱕省道五臺下華𥚑葱蒨照我征衣雪跨氷懸灑灑清味至今彷彿霄栩間投膠沸糜不克闖屏星西来以修賀上之禮琳琅金薤忽落虹翠三過跫然以喜某兹者伏審緹軾行春晝堂開暁䄂槐雲之五色爼樓月之千峯共惟歡慶某官瑶簴簫鍾秋濤瑞錦駕玉虹垂蒼兕凌紫清而上之固其所也鞙鞙珮璲乃翺翔石泉松雪間邪輿藤簾繡小燕屏題方底緑緹又㸔環召某視郡印十旬云云皆矞燾之賜也自省於㳙曹正負不敏圎椷鄭重此禮奚宜至哉鯨錦卷還猶有餘媿折寄芳菲今雨何厚頓首拜嘉謹謝将命尚容專致厦成之慶回袁州鄒倅朱明逾半南薫之時共惟𥜗袴行春旌旗麗曉有燕有翼某對㢘泉飾側厘東嚮以謝主書吏某頃叨節南馳得符㱕省三峽烟雨中一再獲拜瑶林瓊樹之側亹亹吾味我心冩兮執祛㡬何時明月千里惠而好我錯落華音下照虹翠赤脚踏層氷忘其執熱也共審龜臺借重鳯岳凝清時雨誦絃和風條教伏惟歡慶某官東山芝蘭之韻北斗梧竹之標朝発軔兮扶桒夕攬轡兮玄圃識者巳竊遲之兩樓山水能乆著神仙人邪竚文組之即真以介圭而入覲某禊前一日奉重闈抵空同下旣三閲月公事稍清得小遂半菽歡錫類之餘也實篚勤斯芳菲袭予新雨洒濯感在下風采采一芹效矉隴寄非所以報也馳遡一方回臨江婁倅夏鳴仲琯良苗懐新共惟風月滿樓江山入自百神僎价某焚𬎼㵸露專謝中㳙若兩廂氍毹五鼎芍薬無庸爲仙人瀆某於東都韓吕家鼎鐺獨無耳乎頃一節湘行獲從衡陽廣文君亹亹簷花情味甚㫪容也清江之上頡頏飛霞獨不得四方爲雲追軼清絶琳琅金薤光堕玉虹執熱以濯我心冩兮欽以某官氷壼玉露之泠泠瑶林瓊樹之英英黄琮蒼璧之荧荧上之清都盛之紫㣲便當還家氊本色石泉松雪可乆爲麒麟係耶方底緑綈自天子所某将指罔功叨恩便飬空同小院粗可從容半菽歡皆矞燾之賜惟芻牧之才单龍蛇之俗險凛乎未知攸濟渠渠逺道頌不以規旣謝下風尚沐新雨畫堂高䖏槐桂成行春蚓秋蛇覺我形穢明公不以覆瓿而顯設之鍾軸爛然一見頳發謹復将命不勝馳泝回隆興熊倅震龍某撫今雨懐清風其契闊未有甚於此時者也挹色絲於浦碧追流水於㸑焦其慰浣有甚於斯今乎澹圃先生以氷懸雪跨爲風骨以鸞漂鳯泊爲文章以規圎矩折爲政事挈其堂堂著之高䖏以經緯河漢舟楫江濤萬夫一喙也陳仲舉千載風流乃獨與歲寒結印倐霆轟颷怒而起有不磊磊落落者乎時來則爲當仁無遜某雨别十年無非俯仰林烏之日祖母行年八十有七切切便飬承乏此來公朝䔍棐人紀之造而諸君子錫類之餘也第五閱朔于此塵而入鞅而出於民無絲分𥙷行矣丐一縷香火縁奉輕軒以歸亹亹襟期明月千里折寄芳菲厚意不敢不拜薄将石間一髮非所以爲美芹也廬陵廣文玉戞金鏗長沙識衡山簿猶昻昻鷄群之鶴中峯有以服乎兩峯觀者爲此膽慄何當簮盍上下慷慨目送征翰臨染馳去與楊縣尉如圭某他日上下紫淦間草木吾味未必無觧后之雅者也廬陵少仙之庭數有英㳺發軔其間而君年又不可及當官風采東西行者亹亹誦言知爲清修知爲縝栗培風怒飛霄漢一碧跂予望之某誤恩便壘夣繞松楸間伏戎于莾有乗虚而干法犯禁者霜臺遽以煩執事知敏手爲可託也寒泉白骨蒙頼方新惟牽師從者重愧重愧草草持慁高明臨染無任回唐書記某一節湘行得挹寳烟玉氣於芙蓉池渌間亹亹吾味歡如平生岸花催路吹絮滿衣燁其五雲落我店月厚意乆不報所思逺道回首􅋏然執事以瓊琚玉佩照映東西鵉凰先驅朝閬風夕玄圃可也赤雲瑞氣黄花歸期當仁勿遜某花朝前四日抵雲舎又十日奉重闈泝灘而上禊前一日抵空同郡事稍簡俯仰半菽皆矞燾賜也江湖寥落鴻影參差安得素心人相與數晨夕每誦此詩明發不寐輙持只赤小澣我私采采澗芹臨風如結回黄強立某薄㳺空同繾綣半菽故人知心千里寄瑶華音以繅藉之讀之宛然促膝接語也強立以排淮决漢之胸行駕風鞭霆之氣鑄爲雄辭能使京師𥿄貴新豐舎中誦天下事一日騰上風聲千載某來此訟簡事稀餘力可及故讀四境倍稔絶南剽之跡皆五雲所照映也乆缺報襄輙郵專筒薄将聊奉一笑回文教名寳某乆徯亢宗無從通譜璧弟幸托年盟雲杏集中不知曽得納拜否巳巳之歲千騎過廬陵有意來山中時某適赴鶴書取愧薜荔失此交情悵然一方之感書來空同陳誼天出欲徃從之湘水深令人亹亹柳子厚謂南方之靈鍾而爲石故有多石少人之論某常以爲未也地氣自北而南古有斯語意者人物之數斯文之運亦莫不然玉篸羅帶之勝中州山川所未有也磅礴欝積而振發之以其時可矣吾宗文寔當之乎令業方來雲湧川至樹之風聲快覩𦦨𦦨某半生落魄無足爲宗盟道去年單車馳岣嶁下堂有重慈白雲間之陳情至於一再遂授今壘闔門就禄亶出過數力綿求牧未知向方宗丈宦逰海外坐隔一関一介相先是不以他人待同姓者委貺所及拜而受之薄物非所以報何當嗣音與胡節推㓜黄某他日盤之中辱玉山朗然照之舉㠶凌斗牛掛席拾海月巳占吾成玉堂堂於此時矣空同落葉間快讀千佛喜見榜花雙峯巽山嶙峋蒼翠布濩轇轕何盛大如之國家三百年代有英傑樹之風聲五緯聚奎之符彪炳未巳㓕沒草根者固復何限吾成玉一大振起之青原劖空忠節生氣是則草木同味也隃計晝綉娱雙親時某當以奉祠歸里尚從鄉稚耋候馬首遮慶兹襞赫􅕭寫此茂悦亹亹薄将祗瀆繳奏藁上中書札子時吴履齋當國某惟軍國萬㣲日至黄閣不敢爲竿櫝區區懼凟威峻惟釣宥是祈某頃罹人子之厄曽拜仁人親親之恩感激榮光永矢無斁不自意今春伏遇先生衮綉來歸爲國柱石遂得宻邇陶鈞以庶㡬一日履屐之役幸甚莫大先生當國以來上迎聖主悔悟之機下慰蒼生蘇息之望所謂垂紳不動聲色而措天下於㤗山之安先生有焉乃一日伏讀明詔許中外臣庶得實封言亊皇心光明言路軒豁恭惟啓沃至深也某私念今事變至此衝决横潰使宗社有不測之憂者誰實爲之病根在内膠結不去終不可以爲國是以積忱具書先陳其愚慮之一而痛哭流涕終之人非不知爱身何苦如此冐死今日之事急矣懼其至於一旦則亦不免扵死也惟是言輶如毛懼不足以感悟天聽尚頼先生狥通國之心出回天之力以措世道於清夷光晏之域某九殞無悔謹􅌳奏藁具申伏惟鈞慈俯賜鍳察賀簽書樞宻江端明古心某夏五之月伏從下土切聽朝命共惟天子蒐選洪儒布滿侍從而先生以海内逹尊居然冠文昌之首僕自惟念正人登崇天下誠幸誠賀不敢以草野自踈輒奉状以爲斯人之慶記史登録及徹巖視私心欣喜莫可涯涘山澤深逺與廊廟本不相接一日閭巷風傳歡吹則謂先生以某日踐政地參樞筦主上聖明君子終爲大用莫不舉手加額以爲共相天子活百姓遂在旦夕以一方椎而放諸知懽欣交通人情莫不皆然人望有所宗而斯民之譽猶出於直道僕爲之舞之蹈之中夜以思不能成寐夫以穹壤之大人倫之衆而先生之進大夫士庶民皆欣欣然相告如其父兄親属之得用将有所利頼於巳者此其心豈千金之所可得而家至户暁所能同哉我朝先正得此氣象惟前有范文正後有司馬公范自諌府以來以言事傾動中外後來出帥西邉入班兩地岩穴之士慕下風而望餘光盖皆延頸企踵以庶㡬其一日之爲相司馬居洛中十餘年當時兒童婦女識與不識競曰司馬相公元祐𥘉衛士之感泣都人之遮留其所由來者漸矣非一朝一夕之故也范公得經世之望司馬公得救民之望嘗恨士大夫所以積望於平日得望於當時盖㡬世㡬年而後得此二公有以厭服天下之心口聳動時人之耳目而范公不及用司馬公不及盡用天之未欲平治天下其如之何哉今先生早以言語妙天下中以政事動中朝後以氣槩風度上結人主之知而下爲四海所傾慕則先生都范馬之望於一身盖二公之後又凡㡬世㡬年而後得此天下之所以責望於先生者豈與伈伈晛晛笑與秩終而甘同草木俱腐者同日而語哉方今西有叛将東有逆離而江淮與強敵爲隣強兵富財之道無所於講主上不得怡宰相以爲憂其顯證莫過於此而學士大夫私相擬議痛心疾首以爲方来無窮之變伏於不足慮之中而發於不測而不可禁者其㡬尤切凛凛天下無事則代天理物之地猶可從事於牽𥙷架漏以庶㡬不至於敗缺不幸槍攘憂危之間倘非碩徳重名積孚於人心一日舉之以從民望則鎮服危疑收拾渙散精神氣勢未能一旦動天下之聽也今當揆身定大亂莫安方極不敢自以爲功而方嘉與天下之賢者共圗乆安長治之策先生從容於廟朝訏謨於帷幄則當揆所以隆體貌敷腹心未能或之先也鄼侯所以舉代於平陽茂弘所以深噐於安石其爲天下國家計者甚悉豈曰身爲功業而已哉則夫先生之一身其關繋於方來之世道誠重且大而閭閻之内父子骨肉私憂過計以爲脫有倉卒則所以寄命而幸全者非先生疇依然則先生之望近世以來絶無而僅有者将范馬不及爲之事先生将來雖欲逃之而不爲其亦何辭以謝天地神人之所期哉僕鄙野無足道又執方不通扵世修門之書每視以爲甚重而未敢輒發其扵先生獨亹亹不倦自天下之公而言則僕之喜談樂道與人情若不相逺自一身之私而言則僕誠何人而辱先生特逹之知此其所以伸𥿄行墨樂爲四海誦其情而不自覺其僣且凟也伏惟先生少垂察焉某仰惟三台熒煌之精藐在雲漢下土之人夜詹頟額曽無羽翰可飛簉於經天光耀之側間者不揆雖荒繆之筆墨時得以上登㳙史而觀道德聽教誨自謂未有疇昔則左右亦以其人爲何如先生度越常情嘉恵後學采於窮約之素以爲可進而教之廬陵之士凡來謁先生者未嘗不深念其姓名至於造化人物之地先生所以提撕薦進使之得以齒下士於朝則旣有日矣乃者秘府之命從天而下空山不頴之蹤跡一日有聞於人自宰相鈞陶而言曽無所偏私而某心口相謂山澤之人何以及此是盖有所從來而不敢忘也當㤗之世必有均調皇極之輔深思逺計周及人物雖遐逺僻陋如不肖亦使之無所曠棄九二曰不遐遺得尚于中行今當揆以之㤗之未成也必有一陽爲之先而後衆陽之氣類随其汲引以進今正人滿朝大抵以先生爲朋來之倡至扵晚陋亦得依乗以前初九曰㧞茅茹以其彚征先生當之屯之六二曰匪冦婚媾女子貞不字十年乃字二嫌扵𥘉不願爲應徘徊不字至於十年某雖不足語此顧惟刼而從之者衆矣盖至今日得先生爲之宗主奉命驅馳惟此時爲然某他無能爲役至扵守其本心不與流俗爲軒輊以求上不負知巳下不負嵬瑣之所存則或可無愧怍於此尚惟先生終斆之某欽惟新命亟應祗赴顧以未服外庸不敢即造朝班區區欲俟宫觀兩考批滿日徐拜恩渥盖巳顓状控扵朝矣諒先生當許可之遥睇清崇未即詹侍輒奉状臨拜懇悃與前人時以前宰相帥湖南回某半生出門下幸甚乃從湖南以一節奔走閫部去年此時拜長沙夀星甫償分願潭衡相望郵置信宿奉令承教王事一家以父兄師弟子之情而行扵連率方伯之際湘人或云前未見此比而某也受賜為不貲矣先生之入湘也某後三數日而來先生之出湘也某後三數日而去何其歩亦歩而趍亦趍也璧弟扵臨江候迓使艎獨蒙一再予進所以愛之誨之不令兄弟無間然者曽不自意先生及豐城以下乃有門内之戚盛德大業如山如河存神過化之學先生其講之也孰矣某所得郡去家一􅓗而近奉八十七之祖母與老母俱闔門長㓜無慮二百指悉從官居糜費俸粟是皆公朝錫類之造郡事頗簡四方無竊發之告日來風雨亦似調順使苟禄之日得免曠􅘃非大播之賜而誰賜秦孟四者乆焉逋誅湖湘未了公事殊切介介比日來連得舊同官書閻計議駐兵永明誘孟四而生獲之爲廣兵所奪尋且告斃經司取其屍寸斬以謝兩路先是田定二㩀平原秦小九㩀塩田爲秦孟四聲援引孟四以屠永明正田定二之爲也柯倅權全州首禽二兇磔於市自二兇死而孟四遂不能免先生一畨出師其終條理如此孟四不死非但遺患南方其於根本関繋甚不細旦得竣事功之在彼在此無足計也蕭獻可失其令嗣如塤廬陵生此士有𢾗可爲痛惜詹望㤗階中夕九起薄言傾寫有懐忡忡伏乞鈞照與吉守李寺丞芾號肯齋某居廬陵南陬盖受㕓之最逺者也其於當世人物無所交際惟從田間側聽輿論則天下伯淳雖隔在僻逺烏得不聞風稽首吾州自前守去後無主宰㡬一年舞鱔號狐郡政泥濁斯人無辜亦云甚矣執事不鄙下土恵然此來天開日明是在今日某實爲郷國稱慶仰藉矞雲在上區區非才叨恩入舘極知負乗月朔甞造州関印申免時聞千騎且入関某遂止旅間伺候攀迓前茅繼聞少展適頭目受病旋暈不可耐不得巳載舟兼輿以歸相距兩月交臂失之不敏之咎其當何如方僥倖平復造謁以叙悃愊顓駛及門寵授翰墨山林踈賤之人乃得殊礼郡大夫之德爲不可及而某缺典之愧益加多矣祗誦來辱避席再拜有懐輪囷具嚴𥘉櫝謹具劄子繳申職事之記所有台翰謹謹歸璧示不敢當也修有草率顓圗侍見以謝囬廣東曹提刑伏以炎日正夏薫風自南共惟某官玉節霄明華絲雲度穆清簡炷交壌棐扶台候動止曼福某㵸頴㢘清通箋奎碧恵徼書月却立下風某遥企芙蓉上挿牛斗􅌂繡衣之持斧而璚靡以爲粻弘鋪太和勿問元吉某欽以某官簘鍾鏗戞玉尺端方廬阜青蒼毓白石清泉之勝北斗魁傑挺碧梧翠竹之標或弭節於人間或彯纓於帝所旣盤礴而欝積復周逰以逍遥流水青山奪司馬尋春之志荒崖絶島行濂溪流物之心欽哉刑之恤哉使也言有先也樓臺映白日絲轡小馳衣冠拜紫宸綸音遄下某起觀宣夜跂敬明河方闊焉北樹之題乃贈以南金之寵跫然三復愧此七襄某頃綴楚軺每懐綿耒牋天從欲回卭坂之車便地飬親得江南之舎永惟錫類不隔善鄰襞積阻心熒煌在目某䄂分𬎼露才劣錦雲雜下俚於九成發宗工之一莞隃瞻蓬翠工輯蕋珠氷桃碧藕之清凉福英禄華之郁穆臺容所戒鞭影是趍回陳侍郎某伏以回車卭坂請自效於林烏得郡江南取巳捐之竹馬綢繆錦覆緹襲衮華共惟某官麾斥八極之風雷卷懐九天之星斗古靈䄂中之藁屢薦時賢温公洛下之評不遺人物遂使忝求芻之寄從而諧啜菽之私某半竹奚堪􅓻花甚寵想五𤱔青山之樂碩請訂金懐四愁明月之詩曷酬贈璧謹具劄子申謝伏乞台照與湖南交代廖提刑某汲濂香褁側厘裔忞忞于主進吏昭交好也首祈紆省兹者伏審濡絲星轡弭節霜臺紫盖撑空開雲烟之五色綉衣立漢􅎈氷雪於九州號令一新江山胥動共惟某官金井玉淵之丰度簫鍾瑶簴之聲名老氣峥嵘吐鰲頭之山碧清文流􅎈貫龍影之潭星凢踐􅏡中外以來皆推行忠恕之學惟刀劍狃楚氛之悪頼旌旗指漢坂而驅于疆于理于南來宣王命其刑其罰其審曰惟民中汲湘水而滌瘡痍豁衡雲而燭幽枉禮樂遣使臣也於昭原隰之光衮綉歸我公兮遄任朝廷之重某頃從岣嶁下一拜状後繼得㫖以臬事属之宋使君某遂於正月末觧維而西先花朝之四日抵雲舎禊前奉重闈至空同上俯仰半菽皆矞燾賜也第念夙縁結習實開衣冠百世之好乃不克迎拜馬前面奉龜組江海契闊有足念者近得之東西行人始知歜節前玉節道盱境以時考之此際乆建牙楚觀上矣某不勝爲湖南一道賀舞後木人蕭然音節納之錦覆過者化之亦以自賀也某春杪得府第所遣荅書仰佩篤叙數月念念嗣音相望泬寥邃坐不敏兹想建臺有俶謹跽下風傾此襞積臨拜無任馳泝之至伏乞台照與前浙西安撫李大卿號肯齋某頃從湘花間觧維而西也故人意厚棹酒壼三十里而飲餞之風飄飄兮吹衣芳菲菲兮襲予呴喻篤緻一何勤也回首江空明月千里因念向留楚觀望午橋鍾鼔不隔簷隂從容玉塵曽不能以數數矧今去之汀洲杜若間蓬弱三萬不趐明河在天瞻仰夙夜如此悁結何某共以某官懸黎垂棘瑶簴簫鍾峥氷雪走雷霆精神麾乎八極金石諧韶濩文采𬒳乎五音維今江濤正湏人物外之而北門筦鑰内之而西府樞機亶惟老成具有經濟青山五𤱔未容寄傲之深黄道九天佇看傳呼之近某丕承矞燾先花朝之四日抵雲舎又十日奉重闈泝灘而上禊前抵郡邸賤事乍入沸糜不免轇轕旣三閲月遂就簡平親老安徤如常半菽俯仰皆錫類之及惟起視四境長山谷荒赤子龍蛇未易帖服商蚷馳河凛乎其未濟教思無窮惟勿替宿昔重訓飾之秦冦一叚某未了事而去日夜念此半年師旅數州杼柚爲空疽根仍存憂曷有極今聞罪人斯得黨類悉就殱夷我愛桐鄕屐齒爲折顧撫摩凋瘵鎮定危疑湖嶺間方來正欠工夫耳洛中花竹平安悠然長思當必及之某數月念念專襞上起居及今方走一介不敏甚矣未繇佳晤暑氣方殷碩言金護玉持以副蒼生之望孤臺有委一唯鞭影所向某臨風馳泝之至與劉吉州漢傳某介恃薄雲之誼忘其爲凟僣有碩陳吾郷歐陽巽齋先生講學天出從㳺滿門登科三十年獨䖏環堵晚見召擢一再登朝先生居之淡如也其修於家終日清言接引後進未嘗爲擔石謀捐舘之日槖無嬴貲諸生爲集䘮事悠悠人生惟死乃見真實嗚呼先生之風可使懦夫立也其子浚字資深世先生之學頺然布衣禁路諸公每以郷先生殁而無澤爲闕典有欲從化地言者人情好德信不相逺先生不以貨財遺其子而資深亦復能守拙甘貧酷與乃翁相似區區謂文獻所属吾軰當相與輔成之大監樂善若不及又於巽齋爲庚年同朝儻念其孤時分廪俸月質送之使先生有子不至乏絶非惟使爲善者知勸而名公念舊下士之盛心所風厲逺矣某旦夕亦謀具辭幣聘資深至郡齋庶㡬前軰之典刑斯文之宿昔念同志孰有如門墻者故輒以書至焉當暑紊聽慚汗瀋流伏乞台照回兩淮制使李端明庭芝伏惟龍虎魁傑手提鐡鉞重鎮東郊淮山崇崇江水不波施於南土隷也跽敬階符等威有截不圗親􅎈衮翰賁之榮光下土伏讀感激某仰承寵戒信豐趙宰真古大臣勤小之威心趙於某同年宿相厚今又得以郡邑聮好人事結習非偶然矧知出自晋公門下他日稱吾榜得人有所受之矣謹具劄子百拜控謝藁􅮘萬罪伏乞鈞照回岳縣尉惟中興之𥘉先武穆王手扶天戈忠義與日月争光名在旂常功在社稷天報勲勞克昌厥後雖百世可知也縣尉生北平龍虎家而又偉然植立誰不知敬幸出結習乃託一日之甞僚判諭批暦亦旣欽承逺卑鱗緘爲禮過矣與洪端明雲巖名燾去歲在湘中專人詣越拜起居遄沐報教以門墻一介之舊撫問所及勿替引之相望廓寥感戴不可言喻繼閱邸狀欣審端殿陞班安車就第于疆于理旣了旬宣某水某丘逕歸逰釣共惟驩慶欽以某官中朝耆舊前軰典刑早歲驅馳持國子華之並出晚年脱􅎈盤洲野䖏之所無今世浮沉畏途不知止足者勿論固有掛冠請老欲一日婆婆里門而不可得者先生䄂手版還丞相天目山中逍遥野服獨立於得䘮寵辱之表真天人哉左轄頻虚上方側席只恐禁中朝出傳宣天使夕至未容公乆作碧山學士耳某堂有重慈今年八十有七昨者将指而出牽於行路鶴髪不容迎飬歲晩力扣化地乃卑麾章貢家園相去三百里一􅓗可杭闔門二百指皆仰禄焉此先生矞雲所覃某到郡後頗與郡人相安日來四境無虞早收中熟覺風雨如期晚稲亦可望惟是力綿求牧來日方長凛乎淑後先生𥜗袴舊譜出其一二以恵綏之蒙戴而行敢不知賜某於左右缺禮乆矣謹寅奉赤𥿄申緑野平安之問采采澗芹犯嚴悚仄未卜誾侍碩言觀頥視履益扶神明以慰中外属望臨風拳拳與贑州属縣宰顓有公禀保伍本領在於隅團比者郡家禀使者之命欲於十縣從新整刷一畨見之公文固巳詳盡所謂差過隅團盖所在積弊有公差者有買充者正在賢令尹用其明焉可因者因可革者革按之舊籍參之僉言一日而可决也使者屢問及此却望辦以敏手月末如期申來隅團定則保伍周保伍周則盗賊弭郡之所以蒙成也而縣亦職有利焉申嚴出甲榜比想皆巳家至今有賞罰鏤榜煩更徧掲回袁永州某引首三吾環清匯碧神仙人居之坐隔千里方嘆衡鴈之參差緹騎秋風落我虹翠跫然瑶華音之在耳也共惟某官以羔羊素絲爲節㮣以清霜紫電爲精神以布帛菽粟爲政事自擁千車來照二水發舒家學一二便足以破奸膽甦民氣期月而可百廢具興萬石山中遂爲古頴川渤海郡真刺史敏手也清廟訪落諸侯來朝風聲堂堂歸植千載某承乏便州僥倖娱恃庭空無事年榖粗登凡前此龍蛇之淵皆屏跡絶影要是奉教宿昔隂有以恵利之然親意亦復念家旦夕皈命香火歸哺山之南水之北矣逺道寄将有實其庭吾味之厚不翅懐連城而佩明月也臨風慷慨亟此馳謝尚猷緝繭申候起居伏乞台照賀京尹曽尚書某兹者共審露綸渙渥星履陞華東澗西瀍冠十連之元帥南昌北斗表六典之地官丹屏雲開紅牙日麗共惟某官依乗日月吞吐江湖直氣摩空金天晶之錯落清規照世玉井水之紺寒自􅎪􅎪於鵉声遄峩峩乎豸角文章大手南豐先生政事十條小范老子出䄂摩霜之鉞坐吟卷雨之簾真侍從㱕拜於甘泉慈父母來臨於京兆乃由太一徑陟文昌氷懸雪夸而朝望孚日暖潮平而民氣悦􅌂衣冠於建禮益鎮千幾籌帷幄於延和遄歸兩地某喜傳除綍阻趂賀綦五緯明霄望龍泉之秋色九河流潤懐虹翠之春暉謹具劄子申賀伏乞台照回曽知縣晞顔號東軒後除御史某去秋知紫氣飛度鴈峯法不得相候西風徹棘新雨來車知必不我遐棄也未㡬喜開玉垣飛檄荣甚錦歸交臂參差殊重回首今年出湘之日乃千騎載入湘之時又不得相随鷄豚社中一𢾗契闊相隔耿耿心知不圗帳犀逺持五雲下賁虹翠筆墨淋漓起敬英妙而繰藉所及不敢當不敢當某堂有重慈自高安歸後十年不克迎侍昨歲叨節本不能出請祠不獲命姑以單騎驅馳非其欲也轇轕白雲情表連上君師天地之造卑之便州非徼福隷遺端不及此千里逺将折寄何厚衣𬒳重襲其宏多矣乍理糜沸禀對皋晏薄附芹心非所以爲報也蓬萊玉雪小置之松竹間㑹有新綸倚布婁賀回曽連推宗甫名尹某㵸頴㢘清起而謝所蒙東嚮亹亹一拜㡬何年西方美人豈不夙夜飛鴻踏雪閴其廓寥去年漫浪行湘於東軒公甚相厚朅來八境又日從巖山先生遊獨於吾㤗宇何其闊如也春榜旣開聞謝家鳯毛世科盛事芙渠勝䖏僅隔庾梅每念擘牋寫此襞積乍入沸糜中堕此不敏而琳琅金薤卷五仙雲氣下之言念知心喜而不寐吾㤗宇以乾坤清氣皛皛銀河朝發軔兮咸池暝曝鱗於沃焦以其時可矣河陽幕中雲飛川泳老子倚胡床誇有此客佇由黄金臺徑上清瑣闥某單車馳􅒖嶁下十閲月太行白雲繚繞清夣陳情一再天高聽下卑以便符奉重闈抵空同三見蓂莢矣郡稍簡静得遂半菽歡皆錫類所及也渠渠然頌不以䂓望塵辟易芳菲逺道第懐我私聞車馬行色且旦夕出領某倘未以罪去得握手道舊豈不快哉占謝蕝如馳遡一碧回李本中某一節稍踈聞問千里相望方賦所思得手書讀之展轉情話慰此契闊某𢾗年以児女講授爲琴書累發𥘉啓蔽作成方來三世交逰此意不敢忘去區區出山親老不任行役雲龍隔絶不得日奉從容本中獨䖏寒齋覺户外屨不至静中倍有方冊工夫然門可張羅庖隷自放所以奉師者必甚鹵缺負愧柰何諭及小子年漸長當學聲律尤認真至第此児自以爲得師甚欲從師學而學焉又念吾先人以賦起門重於改作貪賢且柰何今姑尊来教擇賦師爲代但未知来年有意他出否倘有啚回某雖江湖懸隔豈無可效綿者拳拳此衷亦以属之新昌弟唯命東西矣敬慿使禀控別牋薄物少寄芹私令祖困學老先生尊候多福侍邉乞道起居回長沙傳縣尉合某他日接玉泉於㳙㳙中去之十年君且撫汗漫神変化而爲龍巳高言軋霄自當向上位置需雲岳翠不淹騰踔乎豸府知心貽書道君出䖏之槩廣文又緹襲琳琅以來目中将快見緇之好也敢不預戒行窩汛掃以侯雖然落木荒凉之境飄風潏蕩之蹤以君堂堂発軔而肯相從於庖爼間此意携持琬琰者不屑也吾意不薄惟君熟裁之持對不敏切惟照寛文山先生全集卷之六終
