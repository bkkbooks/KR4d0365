  text: 文山先生全集卷之二十附録
  hash: sha256:d79106bf655ef8714c834184913157b13e87c54ef12092adc854e3ae5d5678ce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_020-1a}
body:
  text: 生祭文丞相文王炎午丞相再執就義未聞慷慨之見固難測識因與劉堯舉對床共賦感慷嗟惜之堯舉先賦云天留中子墳孤竹誰向西山飯伯夷予聞其下句義則謂伯夷乆不死必有飯之矣予謂向字有憂其饑而願人餉之之意請改作在字如何堯舉然之予以寂寥短章不足用吾情遂不復賦盖丞相初起兵僕甞赴其召進狂言有云願明公復毁家産供給軍餉以猖士民助義之心請購淮卒參錯戎行以訓江廣烏合之衆他所議論狂斐尤多慷慨戅愚丞相嘉納令何見山進之幕府授職從戎僕以身在大學父沒未􅌾母病危殆屬以時艱恐進難效忠退復虧孝倥偬感泣以母老控辭丞相憐而從之僕於國恩爲巳負於丞相之德則未報遂作生祭丞相文以速丞相之死堯舉讀之流涕遂相與謄録數十本自贑至洪於驛途水歩山墻店壁貼之兾丞相經從一見雖不自揣量亦求不負此心耳堯㪯名應鳳黄甲科第授簽判與其兄堯哲文章超卓爲安成名士維年月日里學生舊大學觀化齋生王炎午謹採西山之薇酌汨羅之水哭祭于文山先生未死之靈而言曰嗚呼大丞相可死矣文章鄒魯科第郊祁斯文不朽可死䘮父受公卿祖奠之榮奉母極東西迎養之樂爲子孝可死二十而巍科四十而将相功名事業可死仗義勤王使命不辱不負所學可死華元踉蹡子胥脫走丞相自叙死者數矣誠有不幸則國事未定臣節未明今鞠躬盡瘁則諸葛矣保捍閩廣則田單即墨矣倡義勇出則顔平原申包胥矣雖舉事率無所成而大節亦巳無媿所欠一死耳柰何再執渉月踰時就義寂寥聞者驚惜豈丞相尚欲脫去耶尚欲有所爲耶或以不屈爲心而以不死爲事耶抑舊主尚在不忍棄捐耶㐲橋於厠舍之後投筑於目矐之餘於是希再縱求再生則二子爲不知矣尚欲有所爲耶識時務者在俊傑昔東南全勢不能觧㐮圍今以亡國一夫而欲抗天下况趙孤蹈海楚懐入関啇非前日之頑周無未獻之地南北之勢既合天人之際可知彼齊廢齊興楚亡楚復皆兩國相當之勢而國君大臣固無恙耳今事勢無可爲而國君大臣皆爲執矣臣子之於君父臨大節决大難事可爲則屈意忍死以就義必不幸則仗大節以明分故身執而勇於就義當於杲卿張廵諸子爲上李陵降矣而曰欲有爲且思刎頸以見志其言誠僞既不可知况刑拘勢禁不及爲者十常八九惟不刎刎豈足以見志况使陵降後死他故則頸且不及刎志何自而明哉丞相之不爲陵不待知者而信柰何慷慨遲回日乆月積志消氣餒不陵亦陵豈不惜哉欲不屈而不死耶惟蘇子卿可漢室方隆子卿使耳非有興復事也非有抗誓師讐也丞相事何事降與死當有分矣李光弼討史思明方戰納劍于靴曰夫戰危事也吾位三公不可辱于賊萬一不利自當刎李存朂伐梁梁帝朱友貞謂近臣皇甫麟曰晉吾世讐也不可俟彼刀鋸卿可盡我命麟於是哀泣進刃於帝而亦自刎今丞相以三公之位兼睚䀝之讐投機明辨豈堪在李光弼朱友貞下乎屈且不保况不屈乎丞相不死當有死丞相者矣自死於義死於势死於人以怒罵爲烈死於怒罵則肝腦腸腎有不忍言者矣雖鑊湯刀鋸烈士不辞苟可就義以歸全豈不因忠而成孝事在目睫丞相何所俟乎以舊主尚在未忍棄捐也李昇簒楊行宻之業遷其子孫于廣陵嚴兵守之至子孫自爲匹耦然猶得不死周世宗征淮南下詔撫安楊氏子孫景升驚疑盡殺其族夫撫安本以爲徳而反速禍㡬微一失可不懼哉蜀王衍既歸唐荘宗發三辰之誓全其宗族未㡬信伶人景進之計衍族盡誅㡬㣲之倚伏可不畏哉夫以趙祖之遇降主天固巧於報施然建共暫處倨坐苟安舊主正坐於危疑覊臣尤事於骯髒而聲氣所逼猜嫌必生豈無李昇之疑或有景進之計則丞相於舊主不足爲情而反爲害矣炎午丞相鄕之晚進士也前成均之弟子員也進而父沒退而國亡生雖媿陳東報汴之忠死不效陸機入洛之耻丞相起兵次鄕國時有少年狂子持斐牘呌軍門丞相察其憂憤而進之憐其親老而退之非僕也耶痛惟千載之事既負於前一得之愚敢黙於後進薄昭之素服先元亮之挽歌願與丞相啇之廬陵非丞相父母邦乎趙太祖語孟昶母曰勿戚戚行遣女歸蜀昶母曰妾太原人願歸太原不願歸蜀契丹遷晉出帝及李太后安太妃于建州太后疾死謂帝曰我死焚其骨送范陽僧寺無使我爲虜地鬼也安太妃臨卒亦謂帝曰當焚我爲灰向南颺之庻遺魂得返中國也彼婦人彼國后一死一生尚眷眷故鄕不忍飄棄仇讐外國况忠臣義士乎人不七日糓則斃自梅嶺以出縱不得留漢廐而從田横亦當吐周粟而友孤竹至父母邦而首丘焉廬陵盛矣科目尊矣宰相忠烈合爲一傳矣舊主爲老死於降邸宋亡而趙不絶矣不然或拘囚而不死或秋暑冬寒五日不汗瓜蔕噴鼻而死溺死畏死排墻死盗賊死毒蛇猛虎死輕一死於鴻毛虧一簣於泰山而或遺舊主憂縱不断趙盾之弑君亦将悔伯仁之由我則鋳錯巳無鐡噬臍寜有口乎嗚呼四忠一節待公而六爲位其間聞訃則哭又望祭文丞相文相國文公再𬒳執時予甞為文生祭之巳而廬陵張千載心弘毅自燕山持丞相髮與齒歸丞相既得死矣嗚呼痛哉謹痛望奠再致一言嗚呼扶顛持危文山諸葛相囯雖同而公死節倡義㪯勇文山張廵殺身不異而公秉鈞名相烈士合為一傳三千年間人不兩見事繆身執義當勇决祭公速公童子昜簀何知天意佑忠憐才留公一死昜水金臺乗氣捐軀壮士其或乆而不昜雪霜松栢嗟哉文山山高水深難回者天不負者心常山之髮侍中之血日月韜光山河改色生爲名臣死爲列星不然勁氣爲風爲霆干将莫耶或寄良冶出世則神入土不化今夕何夕斗轉河斜中有光芒非公也耶文丞相祠重修記楊士竒孟子曰我知言我善養吾浩然之氣知言者盡心知性而有以䆒極天下之理浩然之氣即天地之正氣具於吾身至大而不可屈撓者知之至養之充而後足以任天下之大事天下之大事莫大於君父文丞相甫冠奉廷對即極口論國家大計未㡬元兵渡江又上書乞斬嬖近之主遷幸議者以一人心安社稷固巳氣盖天下矣自是而断断焉殚力竭謀扶顛持危以興復為巳任雖險阻艱難百挫千折有進而無退不幸國亡身執而大義愈明盖公志正而才廣識遠而器閑浩然之氣以為之主而卒之其志弗遂者盖以天命去宋也雖天命去宋而天理在公必不可巳故宋亡其臣之殺身成仁者不少論者必以公為稱首公亊具宋史而公郷人刘岳申摭公所著日録吟嘨集指南録集杜二百首及宋禮部郎官鄧光薦所述督府忠義傳以作公傳視史加詳實焉北京之有公祠洪武九年前北平按察副使刘崧始建於教忠坊今順天府學之右而作塑像焉永楽六年太常愽士刘履節奉命正祀典始有春秋之祭於有司歳以順天府尹行亊宣徳四年府尹李庸始至謁公祠下顧瞻祠宇弊陋弗稱遵用詔㫖葺而新之而凢祀神之噐靡不備具又求刘傳刻石将使人人皆知世之為臣者光明震動焜焜烈烈有公也於乎忠孝人道之大節治化所先而崇禮先賢表勵後人尤守令之急務庸其逹為政之本歟庸字執中保定唐縣人寛厚明敏自大學生授工科給亊中上親擢為順天府尹爱人之心剸繁之才上下皆稱之而盡心學校敬賢尚徳如飾昌平之狄梁公劉諌議祠而嚴其祀事之類皆其知大之務皆可書也因并書之以示來者宋丞相文信國公祠堂記羅倫爲臣死忠爲子死孝死一也可以動天地可以感鬼神可以貫日月可以孚木石可以正萬世之人心可以位萬世之天常孟子曰我善養吾浩然之氣以塞乎天地之間夫殺身成仁舍生取義非浩然塞于天地之間者能與於斯乎若宋丞相信國文公是巳公名天祥甫弱冠奉廷對陳君道之大本經世之急務文思神發萬言立就可謂天下之大材也董宋臣主議遷幸公上章乞斬之賈似道誤國要君公嘗以義裁之吕師孟偃蹇傲命公又上章乞斬之勤王詔下重臣宿将縮頸駭汗公提孤兵獨徃當之虜次臯亭三軍震動宰相遁荒公挺身獨徃說之可謂天下之大勇也夫慷慨就義决死生於一旦中人猶或能也若歴履萬死其执彌堅其志彌励非仁者其能然乎方公之使虜詆大酋罵逆賊當死脫京口走真州如揚州趨高郵抵通州苗再成逐之李庭芝疑之外迫於虜冦内煎於饑餓無日而不當死然後遵海道渉鯨波歸立二王開督南劍敗績於空坑當死仰薬於潮陽當死絶粒於南安當死卒至就囚燕獄從容南向再拜而死震動天地照耀萬世可謂天下之大忠也夫公之誠能墜空山之石能通七里之神能作廣陵之風雨能起夷狄豺狼之敬悚而不能免賈似道之沮黃萬石之嫉李庭芝之疑張世傑陳宜中之忌何也蘇子曰其所能者天也其不能者人也其斯之謂歟宋之亡也死國事者多矣陸秀夫張世傑死於海李芾死於潭趙昴發死於池江萬里死於饒姚峕死於常趙時賞死於洪先君武罔公死於吉督府行朝死者不可勝數雖然死矣未有如公之出萬死而後死㣲子之去箕子之囚龍逢比干之諌伯夷叔齊之餓諸葛武侯之鞠躬盡瘁備干公之一身矣自古亡國之臣未有如公之烈也收宋三百年養士之功立千萬載爲臣之極不在於公乎公非仁者之勇浩然塞于天地之間者乎公去今二百年順天府祠公于學宫鄕郡祠公于城南公之子孫祠公于富田富田之祠元季兵燹爲横民所奪龍鳳間僉事李公歛氷復之正綂間知府陳公本深継之景㤗間都憲韓公雍奏加謚號録用子孫今成化二年僉憲李公齡來掌學事以公九世孫継宗入學俾公郷人周丕憲割田贍之是皆有功於名教可書故書之以詔後世之爲人臣者墓田記羅元㤗墓田非古也田以義起不害其非古墓祭亦非古也祭以仁存亦不害其非古有宋信國文先生成仁取義三代而下一人耳墓在鶩湖大坑之原距先生桑梓僅十里許田冝有也祭亦宜有也當六庚之訖籌捐一元以狥國斯時墓不墓祭不祭先生弗計及岳枝向南王塚獨青後世嘅先生之百挫間関仰先生之再拜從容此墓之所以脩田之所以出祭之所以起也豐嶺羅高字峻極於先生爲同邑爲同鄕飮先生清光佩先生幽馥多歴年所每自興嘆無以識景行之私爰就封下置圭田十畆爲先生子孫歳時拜掃之供吾意春雨秋霜奉甞謁祀爼豆席芻欝鬯酹茆皐亭潮陽之英風凛凛有時黯然萃於此乎南劍空坑之寸丹耿耿有時勃然見於此乎燕京柴市之正氣堂堂有時浩然來於此乎於戯先生之忠義並泰華塞宇宙精神雖無所不之而體魄所棲以安者實在於兹然則峻極之舉誠盛心也田入如千年峻極之冢嗣絞恐父之名雖著於郡乗爲可信不若有辞勒諸祠琰爲可乆用是先生之裔孫承䕃恊謀請記於予詞慚皇甫語愧淮西奚敢贅隻字於其間哉雖然事又不容於不紀也刲田以祀墓者固峻極仰止之良心舊時祭田間亦有漁侵蚕食之者又不識此心爲何物継今而後抑不知是山間有覬覦之否乎所可恃者先生之特忠鉅節与烏兎争光覆載同乆百千萬世之所敬慕者也萬一晦蝕必有泰山喬嶽者体峻極之盛心爲之恢復云文信國公祠堂祭田記彭序宋丞相文信國公祠在廬陵文山之麓舊有祭田爲豪強侵奪世遠人亡漫不可復成化丁酉春一峯羅先生謁祠聞而悵嘆者累日時副憲洪君性萬善觀風至郡一峯爲書令公九世孫継宗馳逹行臺盖欲求田以供祭也副憲嘉納了無難色適萬安縣民䔥麗漢得無主古窖銀遂獻于官洪顧郡守曰此銀自天來也得非信國之靈乎不擾官不病民而田資巳具有能以田售者宜倍直以償於是售者益衆乃得膏膄十畆即公舊隱基也元季兵燹廃以爲田洪益喜曰是田匪直得以供公之祭祀抑且得以復公之舊基一舉兩得不可無文以示乆遠乃屬記於序序日信國忠義冠絶古今顧序何人而敢置喙其間洪曰以子之才於性爲同年於信囯爲同鄕是記義不容辭於乎宋之不振播遷嶺海公起兵艱棘中千挫百折志不少衰意圖恢復柰何天不助宋宋運訖録公從容就義視死如歸而忠肝義膽昭天地貫金石與日月争光千萬世猶一日也後之論者謂收有宋三百年養士之功公一人耳雖世享鄕邦之祀理亦宜矣此一峯先生之悵嘆副憲太守之用心非私於公爲世教慮忠義勸也故今鄕有忠烈祠四時之奠獻官有忠節祠春秋祭祀享瞻其祠視其田雖四方行道之人猶将敬慕愛䕶之不暇矧鄕邑里鄰可萌一毫慢侮侵奪之心乎而華夏外夷亦知公之孤忠大節者猶能景仰師法其萬一况子孫承祀可不激昻奮發襲芳趾羙以求無愧於其先乎是記之作非徒詔其後亦以表勵鄕國云重修富田祠堂記羅洪先文山先生生於廬陵富田岀而仕邅廻於臨安更歴筠宣洪䖍湖南諸地赴國之難間関於平江毘陵真楊閩淅流離顛頓於空坑五坡嶺海之間而死於燕京之柴市世以先生之死足以風萬世之人臣也蹤跡所至皆特祠嚴奉之而郡中祠故不特其在富田則又隘迫至無以布爼豆君子悲之将毀淫祠以就其役持議不果乆乃特祠于郡東之螺山富田去郡稍遠無相念者夫先生功行應祭法其缺典猶若此今佛老之廬一郡至數十而一廬直且千萬獨不之厭曷故耶士庻服舍有定制閭里憑凌貲畜居擬王者而先生爵列上公茅茨不掩觀風者亦将謂何今祠堂廣三十餘尺後寝前廊僅可旋武則嗣孫熈請於分守叅政張公元冲得廢永寜寺基而半給公帑始議而盡力者富田廵檢蔡五羙也蔡以㣲官乃急其職之所不及彼何求哉議之始在某年某月歴數年重門猶不能俻盖熈等之力也或言先生捐身死國何有於家炎社巳屋而故鄕乃享特祀夫豈其所欲哉嗚呼是固先生之心而非所以風也宋室不綱崩裂勢有緩急此一時矣滄桑變革骨肉仳離善和之墟若敖之鬼亦豈其所欲哉猶子吾兒之句先生固巳計之而未嘗大遠於人情此亦一時也當其在國也國爲重而身爲輕及其不捄重其身者亦所以重人之國而豈悻悻於溝瀆之見哉使元而果於不殺則黃冠故里出備顧問彼固以箕子之事自待而或摧殘以畢旦夕之謀引决以絶飲食之奉取必於一死而不免矯俗以立異宜其甚不屑矣惜也言不卒騐使萬世之下徒仰其忠而不見先生之大比之取必於一死者之所爲而未有深知其心者此非意及也夫取必於一死者大抵激發於意氣蹙迫於利害拚割於倉卒而是三者又多係其所遭謂非忠於事主固不可槩之以大則未也功名㓕性忠孝勞生非悟後語乎必至於是而後深逹夫死生之故夫逹死生之故者生貴乎順不以生自嫌死貴乎安不以死塞責與人同情而不爲人情之所牽人皆易從而非示人以絶徳此先生之大所以能風萬世而所在祠之者也神遊八極無乎弗在風馬雲車亦或徘徊先世丘壠而欷歔過其故鄕歳時蒸嘗随感而至有不望之洋洋者乎夫忘家而家存捐其身而身乃萬世同其姓者咸以不獲屬昭穆効駿奔爲深耻而當時赴難之人竊伏鄕園首䑕喙息敢於負國者抑亦何限卒之煙沉澌盡迄無噍類使人入其里聞姓名則唾詈之即令子孫有遺亦不敢直書爲祖故墅雖存曽不得享麦盂之獻其於得失何如哉嗚呼此亦萬世之鑒也因大息而附于記文丞相傳序許有壬宋養士三百年得人之盛軼唐漢而過之遠矣盛時忠賢雜遝人有餘力及天命巳去人心巳離有挺然獨岀於百萬億生民之上而欲舉其巳墜續其巳絶使一時天下之人後乎百世之下洞知君臣大義之不可廢人心天理之未嘗泯其有功於名教爲何如哉丞相文公少年趠厲有經濟之志中爲賈沮徊翔外僚其以兵人援也大事去矣其付以鈞軸也降表具矣其徃而議和也兾萬一有濟耳平生定力萬變不渝父母有疾雖不可爲無不用薬之理公之語公之心也是以當死不死可爲即爲逸于淮振干海真不可爲矣則惟死尔可死矣而又不死非有他也等一死尔昔則在巳今則在天一旦就義視如歸焉光明俊偉俯視一世顧膚敏祼将之士不知爲何如也推此志也雖與嵩華争高可也宋之亡守節不屈者有之而未有有爲若公者事固不可以成敗論也然則收宋三百年養士之功者公一人耳孫富爲湖廣省檢校官始出遼陽儒學副提舉廬陵劉岳申所爲傳将刻之􅎚俾有壬序之有壬早讀指南録吟嘯集見公自述甚明三十年前遊京師故老能言公者尚多而訝其傳之未見于世也伏讀慷慨惜京師故老之不見及也公之事業在天地間炳如日星自不容泯而史之取信世之取法則有待於是焉若富也可謂能後者也元綂改元十二月朔叅議中書省相臺許有壬序文山先生文集序韓雍古今論文者僉曰觀文可以知人夫文者言之精華而言則心之聲也心之所存有邪正則發言爲文有純駁而人之忠否見焉故讀岀師二表而知諸葛孔明之忠讀天門掉臂一詩而知丁謂之不忠卒之皆如其言信乎人可以言而觀然校獵長楊等作雖工且美而其爲人終不能無可議又若難觀以言盖必心有定志則言有定論而後見諸行事有定守觀於宋丞相文山先生可徴矣先生負豪傑之才蓄剛大之氣而充之以正心之斈自其少時游學宫見鄕先生忠節祠慨然曰沒不爼豆其間非夫也及舉進士奉廷對識者論其所對古誼若龜鑑忠肝如鐡石巳而值時多艱詔諸路勤王先生捧詔涕泣且曰樂人之樂者憂人之憂食人之食者死人之事其心盖巳有定志矣志發於言而爲文其詩辞序記等作或論理叙事或寫懐詠物或弔古而傷今大篇短章宏衍鉅麗嚴峻剴切皆惓惓焉愛君憂國之誠匡濟恢復之計至其自誓盡忠死節之言未甞輟諸口讀之使人流涕感奮可以想見其爲人其言可謂有定論矣惟其志定論定故以一身任天下之重盡心力而爲之艱難險阻千態萬状不惮其勞不易其心既而國事巳去𬒳執乆繋挾之以刀鋸而不屈誘之以大用而不從卒之南向再拜從容就義以成光明俊偉之事業非其守之一定不移能若是乎傳曰有志者事竟成又曰言顧行行顧言先生有之而視世之静言庸違者異矣宜其文之足徴而傳世也雖然文章傳世以其闗世教也使無𥙷於世教雖工何益今斯集也傳之天下後世之人争先快覩皆知事君之大義守身之大節不宜以成敗利鈍而少變以扶天常以植人紀以沮乱臣賊子之心而増志士仁人之氣其於世教重有𥙷焉故予因按察副使陳价維藩請序其編次之由不辭謭陋而書之盖将以爲同志勸且爲天下後世之爲臣子者厲也文山别集序王守仁文山别集者宋丞相文山文先生自述其勤王之所經歴後人因而採集之以成者也其間所值險阻艱難顛沛萬状非先生之自述世固無從而盡知者先生忠節盖宇宙皆於是爲有㨿後之人因詞考迹感先生之大義油然興起其忠君愛國之心固有泫然涕下裂眥扼腕思䘮元之無地者是集之有益於臣道豈小小哉古之君子之忠於其君所盡其盡心焉以自慊而巳亦豈屑屑言之以靳知於世然而仁人之心忠於其君亦欲夫人之忠於其君也忠於其君則盡心焉巳欲夫人忠於其君而思以吾之忠於其君者啓其良心固有人弗及知之者非盡言之何由以及乎人斯先生之所爲自述将以教世之忠也當其時仗節死義之士無不備載亦因是有以傳是又與人爲善也是集也在先生之自盡若嫌於靳世之知以先生之教人則吾惟恐其知之不盡也在先生之自盡若可以無傳以先生之與人爲善則吾惟恐其傳之不逺也先生之族裔今大僕少卿公宗嚴将是集屬守仁爲之序守仁之爲廬陵也公之族兄承䕃命其子庠生継宗嘗以序請兹故不可得而辞嗚呼當顛沛之餘而不忘乎與人爲善者節之𥙿也致自盡之心而欲人同歸於善者忠之推也不以靳知爲嫌而行其教人之誠者仁之篤也象賢崇徳以彰其先世之羙之謂孝明訓述事以廣其及人之教之謂義吾於是集之序無愧辭尔巳文山先生全集序鄢懋卿京府先師廟之西隅有故宋信國公文山文先生祠乃我皇祖驅胡之後即於就義之所追祀之所以闡忠烈風世教也予祗役京府之三日行釋莱禮于先師廟得遂展謁先生神爽耿耿若生良用感愴乃進諸生於堂相與下上其事者移時既又得先生之文集而讀焉三復嘆息不忍置乃作而言曰武興而伯夷叩馬漢亡而武侯討賊夫豈昧於時勢哉盖有見於君臣之義不可觧焉者也採薇一歌萬世傳誦出師二表讀者流涕亦其義之相感而然耳古之君子必於天理民彛大倫大法而見之明守之固行之决然大節不虧而其文章勲業愈遠而彌章雖死而不杇也宋元之際乾綱絶紐禽獸制人姦者遁荒懦者俛降胥天下以與夷狄而以免死爲幸奉君后以臣妾於禽獸而不以爲耻皐亭之使先生挺然獨徃而無忌京口之脫﨑嶇萬状思以一木支大厦之傾雖瀕萬死而無悔死之日宋亡巳七年崖山亡亦四年報宋一心愈挫愈厲而竟無渝於其初故其發諸文詞昭若日星轟若雷霆而慷慨激烈無非忠義所形至今誦其言想其風㫖真足以寒姦邪之膽而起吾人凌厲之氣先生盖後伯夷武侯而作者而精忠峻節貫日凌霜天綱頼以立民彛頼以正萬世之大防頼以植其身雖死其文固未䘮也視昔之賈餘慶陳宜中軰直糞苴耳語曰篤信好學守死善道言守死非篤信不能也篤信則誠誠則明明則自足以善道孔子之所以不惑不憂不懼孟子之所以不滛不移不屈皆此道也先生以弘毅之資而充之以聖賢之學故大廷之對以法天不息爲言而帶留之賛以仁至義盡終焉匪誠積於中何至死不変若是耶人徒知先生之忠之文也而不知其一本於誠故特表而出之於是乎反覆是集而編次之綂而名之曰文山先生全集中有文集有别集有附録如先生所作集有未載者爲拾遺後世爲先生而作継附録者爲續録凡若干卷遂以授河間守董君䇿俾教諭嚴順校正知縣寗寵刻之文山舊隱祠記王育仁宋丞相文文山先生從容就義于國祚旣終之餘報宋室養士之功数百年來仰其忠者以先生生前蹤跡之所至即其精神之所寓故所在咸立祠䖍祀之距富田里許南崖之隩有所謂文山者其山水之林立亭橋之棊置具先生所為觀大水記及自叙紀年録中可按也以今考之則先生以湖南運判免歸之日嘗搆道體堂於其地無日不與賔友徜徉其間而讀其獄中所貽弟壁書又特諄諄於作寺文山我廟其中之語然則先生生前蹤跡之所歴與其精神之所鍾其眷戀於此者視之他所為尤篤矣顧可無祠以慰其靈哉更元之世廢於兵燹夷為田疇明興成化中一峯羅先生嘗白諸臬司贖以淡金得腴田十畆然未有以祠之嘉靖丁亥余宗之居富田古城者其彦曰喬相嘗徘徊南北崖中慨然捐巳貲若千金鳩工聚材託先生十一世孫毓彦者測前田十之二而搆祠焉其制瞰江潭為門題曰文山舊隠門之後為堂仍其故額曰道體而其外則曰慕忠祠塑先生之像巋坐其中堂之後為傑閣其下額曰南崖書院俾郷之人士群而習讀焉其上則取先生所自述其閑居獨樂意嘗超然之語而額之曰超然閣祠之東復葺庵一所令持齋呪者居守其中則又􅎥取先生貽書之旨而名之曰廟中庵由門而堂而閣其間皆延以廊墀繚以周垣其材唯榱楹用木四周墻壁則盡以磚為之用備不戒先生生於宋丙申仲夏二日就義於元壬午季冬九日祠既訖二相復就近買田十畆以供祭費每歲舉祀在冬令先生之裔主之而夏則主以相之後歴千百世納為常相之用意良亦悉且勤矣文氏之裔熈等謂其善不可没也欲上其事於郡邑旌異之相固謝不可曰此吾郷子弟所以敬事郷先生之分也奚名之敢居相傾貲舉義竟其身無餘積以遺其嗣故其子化鵬家徒四壁立然每與仁相過從論天地萬物一體之學間及厥父建祠于末輙欣欣然歲時益嚴掃奠之役相没之六年熈等乃刻其主奉之閣中每祭畢則拜奠之頃仁徃逰其地文勲及其從姪孫學柳等又属為記以傳之有永仁因諗於化鵬曰子觀諸先生之忠與爾先人所以祠先生之意尚何疑於一體之說乎夫人臣之忠其君根於所性無智愚無古今感於此應於彼勃乎其不可遏者也先生没必爼豆之志已見於逰觀郷祠之日則其國亡與亡之情根於一體者䆳矣故其終身所歴分冝自盡不敢忍黙以便身身所當全未嘗冐死以快心心旣無媿不復偷生以害義仁為已任之語嘗序之忠孝提綱矣夫豈以倖倖爲節而又何計其人之諒否名之顯晦世之祠與不祠哉然當其時豪悍萬人隨之淮潭諸路響應之趙時賞代之督府諸忠義翼之王炎午爲文速之十義士瘞之而迨其後世則順天祠之於學宮郷郡祠之於螺山於富田里人羅高者又割田祭之於其墓而文山舊隱則爾先人之經紀其祠祭也如經紀其家其敬事先生也如祀其先且不欲以其名聞於世而子又䏻継其志噫彼有教化之責者其爲之尚欲以風於世如二郷彦所營則奚所利而孳孳若是哉毋亦忠君之心人人所同即四海之逺間世之乆觸之斯動扣之斯應有不知其所以然者此或爾先人所以建祠之心而彼自忘之也化鵬聞予言躍然曰使先子可作聆子斯論當有戚戚然於心者矣因次第其言授之學柳鑱諸道體堂中以朂於二姓之後禆相與世守夫祠祀以不墜其先徳云時則大明萬暦二年甲戌仲春望日也䟦文山先生遺墨蘇伯衡天下宗周矣而伯夷叔齊終不食其粟遂餓而死韓趙魏共分晉地矣而豫讓必爲智伯報仇竟殺其身仁者之志存亡不易義者之節盛衰不改固如是乎三宫北上矣益王殂于井澳矣衛王赴海死矣而丞相文公志節益堅困辱之摧折之甘言以甞之重禄以啖之迄莫能奪之而竟死之噫盖與三子者同諒矣公此數詩意其在燕獄時所書其歳當别攷也今去宋一百四十年忠義之氣感激之詞筆勢勁㧞猶燁燁楮素間如龍跳虎躍不可褻玩狎視二心之臣見之而不裭魄則吾弗信文丞相像賛孫燧偉哉文公千古之士方國脉尚存也流離顛沛惟恐不得其生及國脉既絶也慷慨從容惟恐不得其死求生匪生求死匪死生死惟求成就一是丈夫事業固每如此百世聞風孰不興起浮丘道人招魂歌汪水雲有客有客浮丘翁一生能事今日終囓氊雪窖身不容寸心耿耿摩蒼空睢陽臨難氣塞充大呼南八男兒忠我公就義何從容名垂竹帛生英雄嗚呼一歌兮歌無窮魂招不來何所從有母有母死南國天氣黯淡殺氣黒忍埋玉骨崖山側蓼莪劬勞淚沾臆孤兒以忠報罔極㧞舌剖心命何惜地結萇弘血成碧九泉見母無言責嗚呼二歌兮歌復憶魂招不來長嘆息有弟有弟隔風雪音息不通鴈飛絶獨處空廬坐縲絏短衣凍指不能結天生男兒硬如鐡白刃飛空肢体裂此時與汝成永訣汝於何地收兄骨嗚呼三歌兮歌聲咽魂招不來淚流血有妹有妹天一方良人去後逢此殃黃塵暗天道路長男呻女吟不得将汝母巳死埋炎荒汝兄跣足行雪霜万里相逢淚滂滂驚定拭淚還悲傷嗚呼四歌兮歌欲狂魂招不來歸故鄕有妻有妻不得顧饑走荒山汗如雨一朝中道逢狼虎不肯偷生作人婦左挾虞姬右陵母一劍捐身剛自許天上地下吾與汝夫爲忠臣妻烈女嗚呼五歌兮歌聲苦魂招不來在何所有子有子衣裳單皮肉凍死傷其寒蓬空煨燼不得安呌怒索飯饑無餐乱離走竄千里山荆棘蹲坐膚不完失身𬒳繋淚不乾父聞此語摧肺肝嗚呼六歌兮歌欲殘魂招不來心鼻酸有女有女清且淑學母曉粧顔如玉憶昔狼狽走空答不得還家收骨肉関河䘮乱多殺戮白日驅人夜燒屋一雙白壁委溝瀆日暮潜行向天哭嗚呼七歌兮歌不足魂招不來淚盈掬有詩有詩吟嘨集𥿄上飛蛇歕香汁杜陵宝唾手親拾滄海月明老珠泣天地長留囯風什鬼神呵䕶六丁立我公筆势人莫及每一呻吟淚㾗温嗚呼八歌兮歌轉急魂招不來風習習有官有官位卿相一代儒宗一敬譲家亡囯破身漂蕩鐡漢生擒今北向忠肝義膽不可状要與人間留好様惜哉斯文天巳䘮我作哀章淚悽愴嗚呼九歌兮歌始放魂招不來黙惆悵哭文丞相詩虞伯生徒把金戈挽落暉南冠無柰北風吹子房本為韓仇出諸葛寕知漢祚移雲暗鼎湖龍去遠月明華表鶴歸遅不湏更上新亭望大不如前洒淚時文山先生全集卷之二十終
