front:
  text: 文山先生全集卷之十八文集
  hash: sha256:01344c2b71d9856611c33c2a104a42b306efe3da82aad32afaa8a8baa6f321e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_018-1a}
body:
  text: 拾遺與方伯公書天祥百拜覆梅溪尊舅舅天祥爲子不孝老母巳矣每誦如母存焉之詩今惟此一舅矣每一南望未甞不爲之澘然也天祥自國難以來間関兵革鞠躬盡力百折而不悔以致家國俱斃爲之何哉當倉皇時仰藥不劑以致身落人手死生竟不自由及至朔廷抗辭奉節留連幽囚曠閱年歳孟氏云夭壽不貳脩身以俟之如此而巳矣老母年方望七客殯餘憾然生荣死哀粗慰人子之情以此故應刀鋸在前亦含笑入地矣不肖固不能躬畢大事天地鬼神諒昭鍳之母䘮歸􅌾巳戒仲氏八哥來復審尊候萬福仰惟德人動履神物䕶持優游餘年萬萬珍重兒子道生不幸夭折今立陞姪爲子凢百惟舅公教之誨之是望區區拆骨巳分溝壑當具衣冠藏於文山之陽疇昔舅所指之處也并哀而窆之謹奉書永訣萬古萬古正月書天祥皇恐奉禀制使都承侍郎天祥至汀後即移建以次論失朝廷養士三百年無死節者如心先生差強人意不知今果死否哀哉哀哉坐孤城中勢力窮屈泛觀宇宙無一可爲甚負吾平生之志三年不見老母燈前一夕自汀移屯至龍巖間道得與老母相見即下從先帝游復何云都相公去年舘伴用情甚至常念之不忘故回書復遣羅輝來永訣永訣伏乞台照齊魏两國夫人行實先母两國夫人諱徳慈吉泰和縣義陽曽氏中女也曽祖知和祖昌權父珏以端平甲午㱕于先君子太師公革齋先生先夫人生有摯性事舅姑盡孝相夫子以儉勤自奉極菲泊惟延師教子至鬻簮珥給費無吝色宝祐乙卯天祥璧俱忝鄕貢先公携二子如京師又俱忝丙辰奏名天祥赴大對後先公属疾臚句傅天祥進士第一未㡬日先公不幸即世璧兄弟扶柩㱕先廬先夫人號痛欲絶尔後與継祖母劉夫人相依爲命執婦道至老益恭天祥累更麾節催任瑞贑時奉重闈以行然先夫人雅意澹薄曽不以迎養易家居之樂德祐乙亥祖母沒于贑先夫人悲不自勝璧侍先夫人䕶柩㱕里天祥時以兵部侍郎江西安撫使聀事起復詣行在所璧以直秘書閣主管台州崇道觀母于家復以知惠州迎養属時多艱版輿無定所璧深惧以隕越遺憂先夫人處之泰然歳在丁丑天祥自閩來諗兄弟迭娯侍意頗自適戊寅天祥以樞宻使開府潮惠間九月駐海濵之船澳璧以戸部侍郎再任惠州倐報先夫人感疾扶服省侍中道得訃音號呼奔赴及與天祥璋次妹淑孫哭歛惟長妹懿孫不在側是月璧兄弟各起復天祥趍潮璧與弟妹奉柩還治所十月權殯于河源縣義合鄉古氏之里是冬大兵至廣諸郡瓦觧不能支天祥以身狥明年春宋祚終焉璧以宗祀不絶如線皇皇無所於㱕遂以城附粤一歳巳卯寔惟至元十六年璧以仲冬携家出嶺庚辰累起詔入覲辛巳宣授臨江路總管兼府尹九月赴官日夜痛念先夫人旅殯遐陬欲迎奉歸􅌾而東廣冦攘道梗癸未秋八月聞道稍通令惠之舊属林端荣與其徒取建昌路逹循即河源殯所十二月林䕶柩至循以暴疾卒路總管李英俊俾林之徒日夜守視甲申夏璧将令孫礼入循嘱李總管差人赴江西省禀事就令其親彭縣尹與僧方燦及林之徒持護由贑之龍南而出時璧以省委部粮南安竣事還至吉先夫人旅襯適至遂得與長妹懿孫於值夏江口哭迎其棺衾昜歛先夫人靣如生髪如沐扶柩㱕故里權奉于先廬近之别舘且三載璧幸授代㱕枚卜宅兆於廬陵淳化鄕靖居里三采之原得吉山口丙午向日壬子璧率弟妹将以七月十七日壬午奉柩窆焉先夫人生於嘉定甲戌十二月十四日戌時殁於戊寅九月初七日子時得年六十有五初天祥行秘書省正字先夫人始授封至齊魏國夫人子男四天祥璧霆孫璋霆孫早卒女三懿孫淑孫順孫順孫早天孫男十人隆子道生陞子新子真老寜老佛生辰子京子申子道生後夫人兩月卒于惠佛生亦早夭孫女十有六人先夫人婦德母教上應圗史當世非無大手筆可以発幽潜者然正亦不待賛也刻石納壙如以識歳月云爾嗚呼痛哉嗚呼痛哉時至元丙戌七月十五日孤哀子文璧泣血百拜謹書遺墨文山先生全集卷之十八終
