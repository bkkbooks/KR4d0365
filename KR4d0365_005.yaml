front:
  text: 文山先生全集卷之五文集
  hash: sha256:d9d959b9679e8646b012b406c166706e43c4d6e2b76c615cbfde8a79dbeed651
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_005-1a}
body:
  text: 書回胡僉判請交割除寧海軍節度判官廳公事日某仰德襟期比布之竿牘顓飾謝言兹不贅吐首祈崇炯某幸甚區區此來得忝交代意者天將開攀拊之緣使之拉湊一至於此惟是天賦偏於愚戅親見聖主懇焉求言意應詔者必有中今日之故側聽逾久無能為國家陳大計者私念上悔悟勇决如此而某蒙恩至厚他人既不言則雖踈逺豈容避其責是以積忱纍日冒死投匭以冀一感悟天聽出關席藁以來首領且不自保况苟官職乎高誼不薄猶以同宷為情連屈軒車復卑翰墨一吏至又持公文以來周旋曲折無非眷愛某感激不自勝惟如前之義則有不可孤長者之意不敏謂何某尚留此待㫖若數日後威命不下則是上憐其愚而寬宥之某當歸且念咎矣而非所敢望也所有添差僉判廳公用某一切不曽祗受或郡府不以某為不肖他有情文則恐吏輩為欺而亦某所不與知也本須具狀申府惟身為罪人不敢自擬於屬吏之列得於畫諾之次叙其衷情則某之受賜甚厚也臨風拳拳賀吳提舉西林己未某自九月赴京師時請叩門墻蒙警䇿備至妙語天然式相行色篋笥間至今耿耿有光氣第某解舟至豐城及聞新局肇更鄰麾茂卑細讀仕隱不同轍之句則雲駛月運舟行岸移轉瞬之間已成兩樣雖然此非為明公榮也纓冠褰裳世道有賴焉某來上下以鄂鄂故為之􅐓洞聞諸閫雲集而正不多以此為不足慮獨賜教時則衡陽之事明公蓋巳及之而中外未之信某以十月晦至修門則聞聚毒巳并流波浸漫秣陵荷擔之事蓋凛凛巳兩月中間新相至則又得月十日定帖耳然我之緩急往往視敵之起息為之則定帖者未可保也譬如一間屋前人放火已燒及旁舍僅僅得全宅未動卒急得一曉事人率衆拯救雖千百擔水未足以頃刻沃滅明公蓋防防一大頭項也今事莫如袁吉之急袁以改卑明公而鄉里又得平林為重時有明公諸人必能一心同力以障潰堤之衝籍此無恐帷內間則病根未去履翁掣肘尚多雖言路大開而奸諛熏注之深搢紳多不能自拔􅑫聞應詔投匭則學校與布衣而巳世變至此可為慨嘆某不量其愚輒上書論其事區區以為宗社有故死亡亦在旦夕不若犯危一言有及於今日之難其得禍與否不計也今出關待罪巳三日而上猶未見施行未知後命如何藉天之靈祖宗之休明公之庇得全首領而以周旋於義旅之後不勝願也而不敢望也封事槀止於一本付璧弟全録以呈似其踈狂知執事不笑且憐之否共惟節鉞交錫旌旗一新誼當專狀為慶顧世變至此明公方任大責重以與上下同憂患某不敢作平世語也惟明公亮之引茟嚮風拳拳不備回聶吉甫號心逺某比道從鳴珂幸甚獲下膺龍之拜蒙眷愛稠渥侍樽爼間者連夕感激不自勝别後凡百餘日數千里行役貿貿於一來一往之間大可取笑伏承寶墨鐫教備至今天下大勢所以削弱不支實坐於文物制度之密區區直欲割去繚繞使內外手輕腳便如此而後可以立國中書言規模大槩所以纎悉上下其說則未也朝廷若不鄙而行之則台諭欲列置一帥如古方伯連率者又當再啇量也區區之心既不足以行於國退而欲為一鄉一宗之謀正將擇險以為依集衆以為安但事勢浩大不量其綿力而欲舉之善後與否視無所及何如某乍歸冗劇使命日亟返姑此治報何當一日㑹晤以請所未聞賀何尉名時字了翁某頃揭揭入國時江皋祖帳為意腆甚感激之私不自勝别後不圖世變沄沄天下大事幾去某始而駭中而疑繼而憂憤又繼而大聲疾呼以至於流涕出血相去近百日而展轉變化以至若此事變可畏矣哉某學無涵養不能謹其所發倉卒來歸求為杜門循省之計藉慶雲在上以此月七日善逹鄉國甫入境側聞一同桑梓若君實庇䕃膏澤之以廉革貪以明易暗以神竒變巽懦大冠縫掖交以程吳歸焉方謀奉狀至屏下而紫氣惶惶巳移照鄰次交臂相失懷此悵怏當今事㑹方殷人才不競一杞二𣏌國家常病之今州縣之於執事亦此類也凋瘵􅐓洞之餘雖近於不可為而開繁𬒳劇如長才得以自見可賀也吉水之為邑得之朋友見謂官錢無定額賦無正籍是以若此其竭澤也平林以鄉人為郡念此至熟也執事軍期之暇為之定制立數求為一定之經惠幸兹邑其庶幾乎上丞相除祕書省正字辭免不允正月吉日具位文某謹再拜奉書于某官某昨蒙朝廷不以不肖授祕書省正字職事某自念非才未有庸歷輒具狀辭控既而省劄降不允之㫖鈞翰重促行之命伏惟聖天子之所拔擢大丞相之所提撕德至渥也某一介晚末跧伏深密所知不出田里大丞相勒名鼎彛紀功太常坐于廟朝進退百官而佐天子出令下土之人求望其位貌聽其謦咳不可得也惟聞弓旌紛於阿澗束帛遍於巖野元德碩望麟游鳳集於省臺之上想望風采以為不圖此生獲見升平如此詎意今者宸命收録於草茅鈞畫照耀於山谷恩光所𬒳震悸不自持㒒惟此舉不見於今世久矣夫大君宗子居天位者也宗子之家相理天職者也自一命以上所以輔贊大君彌縫家相者皆將以分奉天之責者也書曰天工人其代之又曰欽哉惟時亮天功又曰天命有德天討有罪天叙有典天秩有禮韓愈曰天付人以賢知才能豈使自有餘而巳忱畏天命而悲人窮也天命人事常判然不相侔而前言往傳動必以天為訓者人雖藐然萬物備於我苟為凡民則巳大之為聖賢秀之為士天地民物孰非一巳之責任重致逺皆性命之當然也由此觀之用人者非私於其人為人用者非私於其用近臣之得所為主皆所以事天也此意不明上之人操其公器大柄以自私曰吾能以富貴人下之人失其靈龜貿貿於勢利之途而不知返是以上不知以代天理物為職而無復有以貴下賤之風下不知以畏天悲人自任而無復有比之自內之義天地失位人極不立人物悖其性往往由此者多矣伏惟大丞相勳在王家意在人物方且以不滿假處功以不驕吝處才開忱布公集思廣益嘉與天下賢士大夫以為共理如僕庸愚亦得自列於兼收並蓄之下顧僕不足以稱所舉為大負而由先生此心天命之所流行國家之幸斯世之福也謙之九三勞謙君子有終吉先生之用心以之泰之九二包荒用馮河不遐遺先生之用人以之孟子曰古之人所以大過人者無他善推其所為而巳矣由是而言自可比功於隆時垂號於無窮矣僕雖嵬瑣無足齒其於明時不敢自棄求所以無負上帝之衷仰承君相之惠將盡心焉某巳於元日祗𬒳新命謹别狀遵禀惟是屬有私役造闕之月日尚此遲之伏惟大丞相矜憫其情而原其後至之罪公爾忘私國爾忘家某之𥙷報知遇將有日也下情不勝懇惻激切之至謹奉書不備通廟堂溥論承心制事某仰恃鈞慈直布心腹某昨歲四月遇先人本生母之喪以服制未定請之朝廷遂作假俟伺㫖揮後來此申未及下而某得劾某以義起禮謂先人若存則於所生母當申心喪先人既巳矣則某照承重例遂承心制自謂仁之至義之盡莫如此矣未幾龍溪友議板行天下謂某當有重服匿而不行一時聞者為之疑惑後巽齊歐陽祕書守道為或問衢州曽添教鳯為詳目二先生發此精義禮意昭然大明某竊聞龍溪友議印本以萬本閩廣遐陬莫不有之既不能家至戶曉須得朝廷討論墳典禮意播之邸報著以為令使天下知孝子慈孫之用心而不至為謗者所惑是以拳拳致請乞下太常討䆒一畨三月末旬伏領鈞翰特蒙先生照見曲折謂其所遇在禮之變所循為禮之正且如昨者臬申巳下禮寺某以為定禮典正流俗在此舉矣四月三日忽得承受人報備至寺狀所申乃引紹興休寧縣尉蔣永吉與寶元集賢校理薛紳為證直指為某合持齊衰三年嘻其誤矣聖人制禮自有隆殺其隆殺本之人情切詳蔣永吉之祖妾直下只有蔣永吉使蔣永吉而不服則其祖妾為若敖氏之鬼矣所以為孫者須持齊衰今先人之本生母自改適劉氏之家有劉氏子孫持重服則主祀固是他姓矣是以某體先人之心則只當承心制也况蔣永吉無祖母今則某有正祖母在堂何緣可為劉母持齊衰乎劉母之子既特齊衰某又自姓文何緣兩姓俱有齊衰之服乎又詳薛紳之母既稱為祖母萬壽縣太君王氏則是嫡祖母也當時朝廷止給假三日只從孫之本服所以薛紳再申指為先人所生母謂服不可絶也故有三年之制此正是承重孫又自與蔣永吉者不同也禮者不讀書不講義不明先王隆殺之意往往只據吏人檢至故事見有父所生母四字便謂事體一般鹵莾申上更不曽子細致辨於同異之間今且未須論某所得服如何且只論先人之服先人之母改適劉氏既有劉氏子為服且先人係出繼别位又非本位之比先人只當有心制不當有齊衰明矣若先人有齊衰則某當以齊衰先人有心制則某只合承心制豈有先人本等止有心制而某乃有齊衰之服乎朝廷所行便作萬世不刋之典毫釐之間所當致辨矧禮意粲然非有嫌疑又何難辨之有某承心制巳一年矣今非畏有齊衰不願承服但可惜禮官如此討論萬一誤朝廷備據行下恐國朝㑹要上又錯添一典故不免貽將來朝廷無人之誚耳今看來禮官未必解事先生揆之本心若以為某見行之禮既安徑乞從都省點對行萬一巳照寺狀施行亦乞改命庶不悖於人心天理之正而古聖人制禮之意得行於今其於綱常豈曰小𥙷之哉後朝命下許令承心制仍著為令道體堂書通江參政古心某即時甘兩共惟宮使大參相公先生芝山清逸珍館宴超天相有道鈞候動止多福某昨歲獲走一介詣舍人門下伏蒙鈞念勞苦有加祗服訓辭至今亹亹俯仰山林感慨年歲又若是其闊疏矣某官百年幾見一代共宗司馬居洛而相天子活百姓都人西其首而望張紫巖杜門白首而嗣皇嗟嘆用晚倚之以向中原先生今其人也上方舉元祐故事勤於夢卜旦夕爰立言人人同先生不以此覬於當世而當世以此祈於先生惟先生重愛眠食以幸世道某屏伏田野蒙賴鈞天之庇守先人墳墓幸無闕狀追惟兩年間口語橫出先生進而廟堂退而江湖德於其人如出一日傳所謂生死肉骨之情也報答巳知言語抑末傾竭犬馬尚庶幾於門墻專人上狀百拜起居衮舄皇皇未遑納拜心之沄沄如此江水仰乞鈞照通潭州安撫大使江丞相某在門墻諸孫輩行中而所以蒙鈞天造就知愛綢繆獨出乎諸生之右然號為登門垂二十年而至今庭下無愈之迹古人負笈從師不間道路之遠某乃不能自拔如此殆不可對人言也兹者誠不自意先生手提玉鉞作鎮於重湖以南而某適以臬事一節奔走於賜履之內昔者詹企台階坐霄壤隔今乃得以詣大府受約束有一日斂板之便豈天殆為小子計乎某始以親老丐祠既趣㫖下再請則瀆於是姑以單車出門蓋馳驅數旬又須乞便郡歸養耳某四月八日辭膝下留廬陵城中始聞先生拜乾㑹節於清江亟亟追逐牙纛度宜春醴陵間所蹉跌片雲間耳兹專布狀重謝不敏且致恭先之悃參謁邇只遡風距踊與李復卿長弟𥘉赴臨安府司戶日某比者吉蠲子墨祗詗㳙房留連踰浹甫拜答灑蒙不彼外感荷感荷兹專布區區之心璧弟不頴竊第奉常受官京兆初欲鞭䇿向上工夫故多求山林歲月以自為地事不可料欲緩得速東行且有日矣此弟雅欲致一朋友相此逺役大冠峩如大裙䄡如服斯服者不少也而流俗薰蒸靈龜磨蝕區區所為例指以為迂而他求所謂不迂者抱膝長嘯寡和奈何執事氣藐餘子言根古人疇昔之日幸接光塵論議之末共為慨然其誠有得於同然者憑恃襟雅僣欲屈致崇峻以副前所期此弟天資每與義理合喪本心以求外物則自保其决無也惟是間深博邃之學汪洋演迤之文日力方來正將從事執事與之處公餘得啇略上下交闡互發他日此弟其殆非吳下蒙乎某敢不知自交際之道莫重乎其初輒拜此𥿄以將盟言聘資不腆别箋并致不敏萬萬控謝不遠與孫子載季弟與從弟從學某聞古者家有孰黨有庠士生其時而為師者非其家之父兄則其鄉之所與也是以不獨屑屑於言語文字之末而聖賢誠正修齊之學蓋皆在所法焉小弟肩項相齊學無以大相過獨其性質之陋而未有以開通氣習之浮而未有以檢束故修業一事也進德又一事也某於古者父兄之教既不克從事則鄉評之峻卓師範之尊嚴是于執事乎歸焉區區所以屈致之私間嘗致禀千金之諾敬聞命矣交游之道莫重乎其𥘉禮有聘謹肅將以前并令二學生俯伏再拜以立庭下俾之有敬也與胡觀洲季從某童而習之授業解惑有所自來惟今父族母族襟佩而立受道者七人焉將同堂合席以私淑之輒恃鉗鎚之舊為此數字以北靣請歲以緡錢百上之隸人禮有聘奉芝楮二十千明有初也吾未嘗無誨焉惠徼福于夫子謹謹奉狀伏乞台照與楊學録懋卿字景堯太學前廊某比僕僕來京師幸甚得下膺龍之拜辱賜之不鄙軫顧稠厚關外之别江皋之餽所以致繾綣者尤甚感激不自勝第恨匆匆聚㑹不及為頃刻之情以慰滿連年契闊之雅回首天上瞻企拳拳兹有禀事朋友蕭文名來新新參之客也此丈可人且身事端正無復頂冒異同之弊揭揭而來欲赴春參鄉同舍往往望白雲而歸其巋然為游學瞻仰惟執事耳其所參務本適在德星躔次之側特來展先逹之敬不揆遒瀆道其至前得蒙與進稍與之溫存使不致落莫區區之望也回祕書巽齊歐陽先生某因朱月窗來伏拜誨帖辱問璧弟意極拳拳近僥幸受縣一出師門玉成之造後生從政未知嚮風惟先生終教之耳金碗在質庫某處約之甚恨未能自取之乃勞先生厚費如此山林中亦無用此物先生儻乏支遣不妨更質錢用第常使可贖足矣吉甫一去連旬頗孤龍頭之約時且向熱矣奈何因便介到城伸𥿄行筆嚮風馳情金碗乃先生為景獻太子府教授講經徹章上賜也巽齊借而質之故先生云然道體堂書與前人某尋常於術者少所許可而江湖之人登門者日不絶彼誠求飽暖於吾徒之一言吾徒誠閔其衣食之皇皇則來者必譽是故不暇問其術之真何似也先生之於應酬也亦然今是書之作為一星士姓朱名元炳字斗南號月窗則非前者之謂是誠有取於其術矣斗南吉水文昌鄉人去吾里三十起田間談命高妙精絶盡奄同袍試以百十命應對如流而人品之大槩皆不差異哉術也問其所得何書則嘗汗漫於十𢾗家而其末也㑹歸於李吉甫林開之說吉甫之書人多有之以其深而不能詰若林開則人未有得其本者也斗南㑹二為一而又以所得於數十家者間出而證之斯其所以獨步也某既與之訂正二書又詩之以見意其剔也欲詣門下求品題某告之曰先生品題甚易至之日為先生請十數命某也如此某也如彼為先生鋪陳之即先生亹匕豈惟品題先生心肯轉相汲引即子命通矣斗南曰諾探其中欣欣然殊無憚色他人泛泛得先生增重多矣未有如斗南肯以術而取先生之知者也是書也某何為而不作事出專白故不他及與前人某前月二十八日因朱月窗來逺迓草草一帖致起居不知是日正先生到家日也後聞稍避訪客住某寺久之然恐訪者即所在相尋亦未必能盡避也某九月十三日方及門值鄉榜未揭此一月中相過者有數近數日漸漸增多來者必數百里或百里不容不少𣢾間居寒薄殊不能支而妄有干請者紛然多不相亮甚以為苦先生昔者于應酬亦苦之今猶苦此否嘗蒙見示每許人作一文如置一針胸次今某畏為文詞亦類此矣習懶亦是病先生以為如何念久闊尊候亟起援茟請所以誨朋友以某逺歸間有以羊麵問勞之者某不敢私輒以一羫一石獻之庭下某昨在宣州不敢擕木瓜宣州人不相忘近却有以此為意者知先生嘗須此為藥物謹并奉四枚一笑留頓幸甚回劉架閣㑹孟某伏蒙專劄重示先夫人志銘伏讀驚愴靡巳古心先生藻發清言垂光罔極慈靈有知含笑地下若此可以無愧人子矣遠日倐至柳翣載途追送傾城素車銜尾某於夫人契家子弟以故不能攀望引紼負負幽明不勝愧恨謹成些章一少紀哀愫以授挽者伏想隨車號痛涕如綆縻孝在顯揚願寬毁瘠臨𥿄下情凄切之至回衢教曽鳯先生字翰陽號秀峯某數月於師門極間闊顧山水荒唐不自知年歲之運運闕禮多矣尚庶幾先生索之於形骸之外别後得二子丙寅戊戌庚戌丙子丁卯壬寅甲午丙寅命不知孰勝乍嚮風水即得三地此須巨眼以為然則然向牛肉坑所結砌者今知其大謬為棄屣矣深之昨所問館成否何所固必新正詣清湖行禮亦不見訪往往泥哭則不歌之意非有他也屋見說漸就緒先生鼓舞倦矣宜作意身事悠悠何為行日可得聞否春和景明其聞一造盤谷亦可遍觀先生所謂寶者更願撥剔而後來一來須十日乃可歸爾悉俟面賦此不能盡回李宮教應革號肯堂某頃以附伯昻令姪書後未悉起居深之令弟來聞病目少寬為之喜幸日欲專價詳問飲食坐卧之節塵坌因循心甚愧之昔人云身在則有餘舉天下紛紛藉藉不如意事屏置度外專精神事醫藥靡有不濟恐吾目所受病方將驅除而又重以吾心之不寧是滋豫疾也用敢於岐黃忠愛之外輒奉清心一方為獻願於大學弟七章加三思焉偶璧弟有介歸就有京書逹左右輒并遣前薄物將忱徒覺塵瀆臨風馳泝與朱太博埴號古平某山中相望數舍而逺乃心精微無往不通僕十年受用順境過當天道反覆咻者旁午七八月以來此血肉軀如立於砧几之上虀粉毒手直立而俟之耳僕何所得罪於人乃知剛介正潔固取危之道而僕不能變者天也僕誠不自意乃於寒舍千步外得一陂陀溪山泉石四妙畢具委曲周遭可十餘里蓋其景趣兼盤谷環滁而有之而其曠逺縹眇或謂南樓劣焉騎馬囊飯朝往夕還率以為常而山外事一毫不接耳目矣僕嘗羡君家山水之勝幾欲作意植杖其間而未能也然自以為旦夕必償所願不知吾壼天可以屈公一來乎烟霞泉石此不足與俗子說處知音者自不同正恐不問主人徑造竹所余月心來拱𬒳寶墨惡乎而不用吾情適凝祥觀蕭道士來訪其别也曰吾將造古平為之書以復命且道豫懷而假道士為郵焉某比及門即拜狀聞車騎在郊外正欲嗣訊韓星忽來偉然朵雲之贈故人渠渠勞苦行役諸兒那識此意曉起入山新流沒岸棋聲未盡石骨依然人生往往如此盈虛消息道體流行仁者謂仁知者謂知可超然一笑承有訪􅗄之約上巳前後擬山行數日須主人在竹所方可乘興分沙一席巳戒白鷗退避矣呼燈走茟馳意泬寥某比及門又一首極有磊隗欲從執事傾倒一日雲山浩渺渺焉余懷忽拜羲獻帖宛然玉立之參前倚衡也垂諭前城李氏事讀之甚駭近有假為黃節幹者騙寫其家田莊鄉廨既見之發覺昭其迹於墻壁間矣曽鑑何人又肆無狀欺愚嚇聾一至此耶某平生所立謂何豈有退居林麓省咎敬威我自為我而青蠅紛紛每使惡聲至耳莫為而為莫致而致非命也耶勢不得不榜謹納一𥿄幸轉之李氏以破姦猾者之為使人日為此等救過之事不勝浩歎某向者因及執事出處常誦伐木之詩今書所云猶若未悟禀答之次臨𥿄惘惘回鄧縣尉中甫某入山愈深於所尊敬嘻其闊矣前年足下以書議禮得一往復最後賜誨迄今不能報論其形跡何前之恭而後之倨歟坡云人情重往復不報生禍根后山云一詩巳經年知子不我怨人之度量固有相遠執事知我宜可無前日之事今通國識其用心由其未定而言辭之不可以巳也如是自其定者而觀之輕重銖兩固皆當然言語文字幾乎閏矣昨書皆精義所發卷為一通謹而藏諸後有作者將為此興起客從巽齊來能言執事日從翁樂甚因𣢾客坐亟亟援茟寫此悁結授客以轉之左右學之不加感慨年歲山澤雖逺尚惠一言臨風拳拳與顔縣尉復古某自春末得一夕承顔色接話言外此皆瞻仰之日追憶是數年來書筒無虛月分𬒮亦不太久未有如今之疏者也然私竊自解則曰此其迹為然不足深計知足下得我同然與否兹者恭承少迂蓬山之步暫為梅屋之游脂車有嚴滌篆伊邇豈勝贊慶執事自此開張清途摩拂碧落固其分也顧徼富貴利逹以自致其身貴且重者崇論宏議所鄙者也不當薦是為賀惟邑於民社為最親惟少府於邑為最要平生學問藉是得以展布潘輿康寧千里迎奉調㷱嗜苦式慰兹願是二事深足為年丈賀也某雅聞說者以某日戒途懷是惓惓將祖帳道周杯酒為壽屬有牽制不能來謹上狀并致泊禮以昭區區惟容頓是幸川平陸夷行者有相惟秋深殘暑未央更乞頥輔崇重以前三接九遷之寵隨軒德輯伏想喜氣方來錫羡山則别後或有鄉邦驅䇿敢不下拜某歲杪得承便駛遺以瓌灑故人千里之情藹然可掬感鏤其如之何兹得嗣書於令弟來㱕之便尢見崇䔍喜審議論於帷幄之親出入於錢榖之㑹滿腔磊隗庶其有以自試矣來教自咎以為浸淪汨於俗吏之㱕此意固超人一等孟子論仁賢而必望其有政事財用之效蓋績用聲猷不可相戻本末一致焉得就此以遺彼自賢者徒以清浮為高而無益於實然後小人得以事功自詭今日挽回君心轉移世道吾輩正不得不自力尚可以俗為尤乎伏惟尊同年其懋勉之項承刋委比於敬巖之前亦屢說項非某私於所親名德如許區區欲自默本心亹亹自有所不肯此老亦既有所許矣坐席未溫遽為林麓之㱕一場說話又付畫餅雖然長松在林利錐處囊翹翹傑傑旦夕諸公爭羅致不睱瑣瑣愛助何足為說某奉祠侍親頗於讀書有一日之樂朝市紛紜怨謗之府某雅欲退藏以遠罪咎賜教極得同然之真或政事有足為庸陋矜式毋惜刋曉一二因以具報情悃非茟可既專規嗣布與聶吉甫某於斯文契闊𢾗年於此載酒問竒豈非夙心而相望百里離群索居甚負此愧以其傾嚮輒私布之先人季子生二十年矣號曰學文實未知方有從弟一人同堂而習年相若而學相似也閣下沛然古作籍甚時名所欲北面而從事者衆區區欲使二子者私造化焉間者疑其不可諗之朋友固以為請不圖閣下不鄙夷而許之敢專書以聞閣下屑與之盟豈惟二子得以受教僕也不敏實嘉君子之賜援茟荒蕪臨風切切回王國智某歲前作禀字輒致松栽之請專夫十餘虬孫載道一日塞破吾屋即乘天時遍布滿山矣異時車馬相過山神欣然迎拜必曰此吾東道主云優甚布答膚率别作謝狀與劉司戶三異號古桂某自别不獲奉起居忽聞小爽調攝昨見當風輒睡不禁生冷嘗憂其必爾看來衛生之書誠不可忽也心遠云來時及拜問巳幸勿藥極以為善暑天將理正未易某欲助𢾗藥而不知當用何品謾遣芝楮百千為意且宜深自愛護侯其可出見訪未為晚也南史正本遂可得否便中謾得介意為荷詗侯草草他規嗣布與胡端逸自别後日在山間搜竒剔怪得二所曰閎微曰上下四方之宇幽間曠邈超偉軒張其竒又在中磯兩峯之間之上君再來足以抵掌大笑翠晚又改曰浮嵐暖翠釣雪改曰六月雪特立改曰至大至剛以直我非好怪地適足以當之君謂如何新昌弟一介至門館榖之議諧矣專人導其來庭下請君溢盟江南春小天和景明山靈川后畢獻萬狀欣然有應接佳客之意不遠二百里杖屨容與乎其間不亦可乎凌遽信茟未䆒欲言與黃主簿景登名瀛某輒有所請鄉州有俊傑士曰胡君名天牖端逸其字也十年前學校定交意其旦夕獵獵乘青雲而上尚遲决科蓋其命然心甚敬且念之來山中聚首半月且留度重陽問其館榖則未有所嚮也此君有能賦聲於應用更高好自修飾不為流俗足下若與處日從三益豈曰小𥙷之哉其家事自好而嚴君主之端逸歲得百千上下則從人泰然矣萬一賔廡無虛席則明年君創員以料理之多費以取友美德也端逸留山中若蒙雅報見及相其受幣而歸是所至願與劉正伯知瑞州日某江滸分攜流光如駛每荒城雲合笛韻沉沉吾故人之思未嘗不往來于懷也秃茟鉗書曽無暇晷東風順翼乃有飛箋如之何不喜執事垂光虹霓濯髮雲漢少須暇之駕秋濤而湘春錦矣燒尾光芒薦靈角尺山中猿鶴先侈光榮某癡事未了誤渥徴行三辭弗俞㫖且俟代持其觚落不敏者如之何而任劇哉託愛宿昔不同他人何以教之因風馳泝某久不交訊坐積尊仰忽蒙專價惠報冦事桑梓驚動南望惻然正具復間得鄉里信來乃聞十六日破玉山次日破新安吾鄉必不免矣財物所未論屋廬所未論不知一鄉人命是時得脫與否未有嗣音為之哽咽巳作書控倉使乞兵剿滅某即日交臬事當以滅冦為第一事母慮尊公朝議近况想安適謹附拜一忱郎君新功日富次者且聯翩而上矣可慶可慶草草修染愧甚膚帥回鍾叔玉三帖某杜門避影久矣出山一事不到夢寐間聞命誤節湘羅笑人方循墻丐祠以安半菽倘拜俞音春晝花隂猿鶴飽卧亦五雲之密䕃也衮褒渠渠餼禮郁郁固不敢當亦不得不拜草此禀酬尚規裔謝某昨承令嗣子京相過眉目森秀真可喜也承以至德觀牌為諭便茟偶巳染就今謹封納切希視至伏拜寶翰寵有臺餽塗抹無羊之詩珍重來牟之意我之懷矣我之懷矣親戚往來本無所不可受獨其名曰前日嘗為某事也若然敢不重拜以辭吾黨相與誼如一家緩急相赴情之所有而足言謝哉非曰不恭其所操挾如此薄言禀報未既由衷仰幾台亮與隆興黎節判立武探花某自大名震蕩以來吾江西一佛出世引領願拜實不知前此固嘗坐下風而揖餘光也去年汗漫一出道過清疊邂逅捧檄歸省江皋草草相見道舊恍然驚喜過望至洪甚恨匆匆郵亭晤語外無從嗣集蹤跡展轉重見黃花所思天一方令人回首某恃氣類之同輒以士薦漕闈新貢元劉君子俊吾鄉清淑之英也所居門巷相接文學卓然可稱逺器今年以登仕得舉士者以為晚旦夕詣星臺下謂一世龍門以未執鞭為耻敢告賔榮許其漫刺見所未見劉君歸可以語人矣西雨南雲臨茟馳泝與劉民章子俊某自湘花别後其人如玉夜夢見之名網猶兔罝然不足以得橫天之翼每為咄咄三嘆空同上得書乃知猶為修門客何留滯周南之甚耶詩云京洛多風塵素衣化為緇又云棲鳥戀舊林池魚思故淵青山屋上流水屋下歸來自有樂地乃欲以外物之盈虛為靣顔之有無為執事者左計也乘興而返萬里足下可以遠道為諉乎某昨報舍弟令贊千騎之歸為奉薄贐想巳禀逹歸哉歸哉臨𥿄引領與梅制幹自去年滄浪使者歸米氏真帖又三四往往多從景明便鴈來也洞門窈深雲山千里騎黃鵠跨白鶴恨不得一日共君其間風雅比興韶鈞交作長軸大冊一再寄意而不倦鬼神閟吾山數千百年今而後衣𬒳雲錦草木澤澤光價益倍章之三十二詩四時朝暮之變皆有其象獨以一詩當一境則有不相似者混萬顆珠璣作一片圖畫而江山無異辭矣謹頓首謝頓首謝子秀别三年漸成六考通籍金閨止爭浮圖一頴近書謂赴吏部銓將取一闕人豪如此猶落骰子選豈非朋友之責哉歲月易老功業宜壯早改官去即伏麾建節無滯礙男兒事庶幾哉某當年間亦大參差江西代者激為波濤使人彈指剝剝賴君之庇天日皎然今可以適吾山水之陶陶矣比詩云日日騎馬來山中歸時明月長在地但願山人一百年一年三百餘番醉君念我悉度欲知我近况不敢不白某惓惓故人之意豈一飯而忘顧數百日內不能專一價附書殷郵又不敢信以是契闊詹仰充塞懷抱而未有以發也李彪請假歸道出琵琶亭下率然伸𥿄意之所至不擇言語臨書神爽飛動與杜教授抑之字伯揚號帶溪崇仁人李梅亭高弟辱早春第一帖遠佩意甚真每一念吾弟輒思老成吾弟一出幸無他微執事教訓何以臻此不知菖蒲前後書琴得至山中否近來心思稍清頗得專意研討亦時不廢吟向嘗令吾弟訪問南史正本與睌唐百家詩想亦可得如未也執事試致意焉古桂留館中日得誦習毛詩因知求選於選止可為選之子孫求選於三百五篇則選之兄弟可進也相見當為執事傾倒之偶遣一價信茟布露馳泝雲表回謝教授愛山四帖雖塊坐深山於時高人韻士鼎鐺獨無耳乎載酒問竒道之云逺徒有是心而未之能也不圖五鹽道院屈居仙客階蘭砌玉與亭芝相照映每思吾仲取友必端未嘗不自歎獨學之陋手書寵貽清揚流動雖未見猶既見矣何時簮盍慰此忡惙臨風馳報書不盡言寒簷積雨抖擻無悰得書而讀之昏眼為拭某落落白雲間一疇春緑自飯吾犢浮世榮辱事付之山外褒惜所蒙君言過矣然醴露醲郁波及溝斷企瑞芝而遐眺佩金蘭之永好也美人一方書琴自適為誦停雲三過日於仲氏便價得書振衣快讀恍焉眉宇之迫吾睫可人不來蒼苔滿徑得無忘把酒看山時約耶西風逼人桂香浮動天池鯤化搏扶搖而上之捨愛山其誰屬魁卷紙一幅納之文房衣𬒳琳琅騰翥光景禇生輩亦將侈其逢矣薄言占復掛一漏萬山中度日如年落葉蕭蕭凉月墮砌起視寥泬安得知巳握手長吟寫胸中之耿耿以相慰藉耶杪秋餘熱猶壯二豎者雖相戲而不吾虐子亦從其所為倉扁輩未嘗屑屑然也久之不覺脫然去體是又不治之治有勝於劑餌者寵貽手札問勞渠渠故道其所以然而以復于執事與廬陵劉知縣庭薦采山釣水飲食於大夫之境三年于兹門無公事得至於百里之室幾於魚游江湖而忘江湖矣伏諗解印西歸揚舟東下昔者河陽之李今兹南國之棠諸父兄子弟服習長者教訓恨不留鎮此土雖然此一縣之望也縣私土子人無所不治是中都索包總有相道焉行矣僕將大其所觀某山深閉門杳無城郭信風傳令尹新舊之交未及馳慶乃承上書顓走告别江頭折柳奈何不敏為之漸對將命四璧空寒一無可為載月助者知心天逺解后何年詹泝風帆江空渺渺與廬陵李知縣諶孫某邑人也聞令尹之來不能隨父兄子弟迓千騎於郊外敢自訟以書惟高明察之某兹審承命九天涖封百里初條甫下闔境爭歡諒為慶愜某官氣宇鴻明風猷駿厲修程步武空萬馬以無前清水鋒芒解千牛而不頓吾廬陵號壯哉縣詞訟雖繁而詩書之家衆版籍雖廣而期㑹之事省約之以清净揵之以平易以公之才恢乎有餘地矣㑹成美錦遄趣溫綸某骯髒一世之沈浮人也所占籍處在治所之南三舍而逺雞豚可千戶民淳俗厚僕也相忘於漁樵而今而後其得一廛之託矣僕實何者首辱箋函以此事當路之尊貴則有矣區區何足以當之輒裁箋賀上并鍾鼎大名歸壁㳙吏伏楮卷卷與廬陵陳知縣堯舉昨歲京華天作解后每念晏公在陳歐公在頴一宋二蘇千里往訪竟日從容以某不才受知場屋且二十年良覿乃僅如此視子瞻子京諸公不知何地著愧匆匆汰去過荷遠將一日江空暮雲如水渭濵之首寧為他人回哉兹者伏審肅持鳯檢出宰螺山車馬實來旄倪胥舞伏惟歡慶先生聞多而學廣事熟而心精茟力千鈞捕龍蛇而獲虎豹雲衢萬仭騎麒麟而翳鳯凰未抹馬於天津乃著鞭於雷邑竹松林裏不妨簡編之尋桃李蹊邊細數枝柯之長小紆盤錯便起扶搖某閉門山中傳來邸報忽覩先生為吾邦一來古人重師友至有塗竄片言隻字以冀萬分益者鳴絃千室中有老門生在焉知公不能用其恝然矣惟素性踈孏無城市蹤跡謹避聲利不沽借於公私自今以往隂陽和風雨時曉猿夜鶴左花右竹吾君吾相之恩亦吾座主之惠也剽聞前茅在郊謹具劄子候迎臨風馳往回樂安唐知縣元齡深山中俯仰漁釣久闊時箋使者忽來計一往一返殆幾千里君之厚我感無有極他人作縣驚惴若不可以一日先生為之優游政聲洋洋乎盈耳難易殊絶蓋必有為之本者旦夕細滿綸綍在道璧弟以斯文受知僥幸通政書來謂注邑當在春季繼此望洋方新尚賴教誨庶幾自淑刋曉寺記微奬豫不及此惟平生於浮屠無所見非敢有所攘闢於其家數全不曽從事耳恃愛直布尚寬方命之誅嘉貺頓拜薄物非所以為報臨風悚反回劉運使應龍號實齊比承一介使人陟我山麓問外自梅外來執事惠綏一日之好其與人也重以周則既感激所蒙致其多謝之私矣未數日從驛吏取近報伏審升班西閣移節南昌提封不隔於故家父老相誇於盛事仰惟慶愜某官楊休山立玉潤金相方其為御史也風采所撼聞者凛栗及其將指於楚越也滿腔惻隱人所不滿之處入粗入細之規模可以槩見歸來麟閣還本等地位已竊遲之江西涸鮒延首福星誰為朕行弄印未决公未至闕下就道相屬亦曰此公鄉里煩公歲月又將出少府節召公歸矣某嚮者得節亦曰鄉部後來召罵數月而不休嘗試思之近年如宏翁矩翁未嘗不漕本路而二老之所以鎮壓群動者年德位望自是過人而持斧之役旁午豪譁又非計使比也今執事繼二老芳躅仁聲賢聞之著於人久矣萬無不及惟有過之此所以宜賀而僕之所以亟拜此書也前茅出嶺聞巳多日勢必馳上巽書歸鈞山以俟命上方屬意賢英亟疾其驅惠我江國臨書不勝瞻依之至宏翁包宏齊名恢矩翁曽矩堂名頴戊耕釣山澤飯疏飲水不自知歲年之運運也使者維何云自南浦飛雲五朵居然下之寒谷隂崖氷霜積沍春風不擇地而至有如此者某官天和睟穆地望高清夜占天文福星直斗牛之分薄蓬萊厭承明為桑􅎚此來鈞山之下雲露噴薄油霖甘露流注乎大江之西部人歡呼吾父吾母帝曰勞止歸遂相豫僕何幸身親見之某山人也其於當路厥有等威不敢屑屑竿牘致歲時之敬謙尊而光禮出倒置德盛仁孰悚然稽首落霞孤鶩水天茫茫既不克傴僂請拜棨㦸之下心之精微寄此函尺永言歸嚮江流知之與袁守雷侍郎宜中號省身某前年赴宣州道滕王閣下望山川英氣稽首人物欲擁篲造門而舟車異趣僅能拜書問花竹平安而巳亡何蹤跡展轉不遑嗣音歸卧蒼苔益以踈闊其戀戀門墻之心固如水之必東也某比者伏閲邸報竊審小紆紫槖近擁銀符吏竦旌旗人傳𥜗袴共惟歡慶欽以某官抱經濟之祕稱磊落之豪青天白日鳯凰百年美瑞髙山深林龍虎一代傑魁上方寤寐側席圗致太平甘泉舊臣不當越在遠服名藩歇馬姑曰起家徑執事樞旦夕有詔某庚午一出殊與戊辰相似去住匆匆取笑當世杜門深念益求寡過未知所以稱塞於知巳之道君子不棄尚惠教之某久聞紫馬赴鎮空山不能專介申賀適逢過客輒寫其私以自附於大厦燕雀之後相望一方馳泝切切與中書祭酒知贑州翁丹山名合晨起冠帶輸寫積誠世俗竿牘曽是足為有道者言惟高明索之形骸之外某責原白鷺書生耳童子何知乍習句讀凡先生之精神意氣粲然於言語文字公之天下以淑後學某皆嘗得以朝斯夕斯焉衣𬒳遺餘曽不自意早以名知於人有我師焉生同吾世驅馳四方乃不得解后某日夜興起謂當何時而後得免於常人也流年堂堂實勞我心共惟某官孕光嶽之精參天地之運大忠大雅萊公文正之心不倚不偏伊洛考亭之學斯文落落上帝惠顧天門夜下龍虎章授公以柄轇轕璇璣經緯星辰公從兩制稍發蓄積然後坐之廟堂為天子興建禮樂洗千載房杜之陋太平之期適當今日某退歸以來有泉石十里足以為適浮空變態日過其前飯疏飲水自求吾志竊伏思念空同鬱孤如在屋角平生悁結云如之何輒因此時以姓名通之門下一言終身尚庶幾焉圜丘慶成上方親事少府出節必以公歸迎拜東帆螺江之滸以其時可矣山斗高明臨風切切某伏自空同玉節順江而東獲從中流迎侯鷁首雄文巨冊間想象變化如高山深林龍虎不測不圖解后遂拜堂堂風流雲散一别如雨金聲玉色夢寐以之自先生振衣登朝手提文印以照四海國家誥令典冊燁然先秦西漢之上學校之士莫不從風興起彬彬郁郁爭自磨濯以正法眼作大宗師世無歐陽不當在弟子之列某知稽首矣主上尊德樂道師用賢哲論思獻納日聞正言孔孟不得用於周光禹竟無益於漢才與誠合學與位偶儒者之遇未有榮於此時者也大學之功用至治之福澤何幸身親見之某疏脫之蹤分安山澤起家誤渥忽卑龍藩聞命倣徨莫知所自如聞天上聲光假借非一意若可與從事斯文者自古聖賢之佐英豪之輔莫不垂意人物薦進拔擢燮天功經人極罔不在此共惟盛心卓犖度越流俗而某則非其人也夜瞻紫微徒有頓首修門懸隔久曠音題屬請事祠官冒馳一介輒鳴忡惙未即趍摳願言玉持金護為世道自力臨風切切賀翁丹山兼憲某熟視一世靡然風塵刀茟何從縱橫旁午架漏於士民之上而世之言人材者率如是而巳安得結輩落落參錯布滿天下使萬物吐氣僕嘗擊節於斯言悠悠空山誰與語此兹者喜審肅將繡節通涖銀符山川不改于空同風采一新於江右共惟某官淵源接乎諸老氣概聞于當時人物眇然真中流之巨屏文章偉甚稱南渡之當家輩行諸公鈞樞十九夜半一劄趣歸蓬萊以其時則晚矣上方式敬由獄乃眷西顧非有志念不足以洗寃澤物非有力量不足以懲暴詰姦故豫環之寧遲而乘傳之若屑太平之責正在方來以公歸兮政枋焉往某碌碌不如人獨有愚戅不能改其素追記前年冒乘君子之器他不足道惟姦宄豪橫稍稍鋤擊淺之為日月雖未得盡行吾志庶幾無失職之恨人情卑淺憚繩檢而樂姑息矧猶未免鄉人譁訛朋興以要其得罪於小人也果矣伏惟先生昨者不賜鄙夷心聲往來藹然氣類之意某誠不知何日得以執鞭下風勿覩除綸心目開朗我輩從事俗吏奪氣豈惟為一道賀實足自壯謹專人上狀頓稽庭下少伸門墻燕雀之悃蘋藻薄羞别𥿄惴悚賀江東憲方逢辰號蛟峯某當公在螭拗時嘗奉一𥿄書至于閣下書上未幾而公歸蛟峯矣譬諸草木臭味實同詹望雲山臨風切切某兹者恭審升撰祕丘宣威直指西臺與政蓋嘗識頴濵之文東路洗冤亦以行濂溪之志六絲𥘉駕一佛歡傳共惟某官色正而芒寒揚休而山立言語妙天下材稱一代之竒出處重本朝望在諸公之右自夾侍玉皇香案等而上之胡不均弘俾執事樞國家重更迭之制江湖一節煩公驅馳式敬由獄以長我王國公所學在此歸哉歸哉中詔在道某山林之下靜觀世故其於君子進退安得不致其卷卷芝山父老迎擁星軺以時考之可矣輒馳一介自附於門下燕雀江水東西心期天遠臨𥿄欲飛賀前人除江西漕某束書歸隱有釣遊之所曰盤中兩山對峙間以小溪日步溪上極目滔泪輒自以為晝夜不舍此溪水㑹有逹鍾陵時而某塊守漁樵則曽此水不若耳昨孟君升從番昜遣介來嘗為書附申起居相望千里亦不知上徹果何如時也某兹者伏審班仍寶殿節峻氷臺貫索沉沉方轉芝山之曉使星冉冉又回南浦之春一水東西二天今昔伏惟歡慶欽以某官寒芒五緯絶岸孤峯生漢子陵之鄉雲山一日派唐處士之譜風雅百年雖巳跨海而望蓬萊猶肯濡絲而陬原隰濂溪道脉雙井詩香流馬木牛既無愧於千古落霞孤鶩應可對於二公所謂旗常特吾懷䄂某硉兀抱虛真無所用於世曩六轡使江之左每依餘光以自映帶今也一畝之宫環堵之室囿德宇而處自兹以往夜月如水猿鶴不驚田夫藝子各適所適則何啻如天之福郵傳所至不勝燕雀私情即日謹奉書為賀臨風馳泝回許祕丞自號果齊某火龍之歲從集英門綴行而出風流雲散回首參差不自意去年待罪闕下獲接英游心事流行日星垂而河漢流也湖隂送客風露滿衣移語崇朝英槩亹亹歸去來山中至今夜夢見之新昌小弟夙𬒳奬知嘗寮之情始終一日伻來遞示五雲光怪照室此豈四海九州無情人耶鄉風九頓首尊年丈山立時行日光玉潔長樂鼓鍾西清帷幄終當著身風日不到處轇轕雲漢經緯星辰為天下開文明太平之運某𬒳服光潤實與有焉某既還里閈入山讀書杳不知山外事天上故人重相顧念適逢便武輒謝所蒙餘祈為斯文珍重慰此引領賀倪提舉普號警齊某寄跡提封某水某丘童子所釣遊君侯實照臨之報政將一年矣某猶未能以民禮見自盤谷西南而望城郭在焉相對五雲輒移時不能去某兹審宸綍鼎來庾臺肇建讀皇甫記巳蘇今日之疲民傳紫陽心又舉向來之荒政風行新令雷動歡聲欽以某官神驅五兵才入八靣作真御史以直道而事君稱明監司行本心而澤物公來青原父母其人屬時常平弄印六服牧伯無以踰公者西江涸轍久煩公拯活歲月少府出節中詔又冉冉出建章矣某自聽除綸即欲自附於門下燕雀側聞雅志引郤甚真上方倚賢者以其理烏乎能從臺治一新境內為動某甫及拂𥿄行墨以贊東注之盛嘻其晏矣世俗所以事尊責以鱗畨從事公有道人也某不敢出此臨風飛動與新知太平州趙月山名日起集英殿修撰川人某去年待罪闕下幸甚得一再交書幅巾獨樂近在吳門入秋正擬專介候猿鶴起居㑹去國不果黃強立自竹所來相見於六和塔下遠蒙寄聲多謝故人厚意自是而入山愈深杜門掃軌無復南來鴈足矣璧弟學製新昌新年見告二月遣人詣門墻通問輒寄所思寫之竹筒既行伏覩除目欣審仍班內撰領榷東藩一札起家千乘載道共惟歡慶執事青天白日之質望之知為正人千兵萬馬之胸識者推為豪傑六合悠悠風埃滿目所謂江左管夷吾公其人也偃薄起伏如神龍天馬不可羈牛渚天門一瞬萬里亦足以發其中之所存矣天下事方有賴於公時來為之孰之能禦某夙昔荷相知出人一等以此不敢自非薄一别十年浮雲進退何足為逹者道而學不加長每每自憐久不見叔度鄙吝固宜自今得聞一言三日後刮目未知於吳下蒙何如也偶遇新昌便意其介尚或未行輒附賀狀并寫戀嫪萬分之一相望泬寥臨𥿄馳泝某風雪殘年中使者以餽歲至嘗草草拜狀竟未知果逹籖房與否過年百二十日是間何限傾倒毛頴輩不任事姑寄一歎比審放纜長江休鞍盤谷執事自宦遊以來敡歷中外垂三十年曽無一日得從五畝花竹之樂金山鷗鷺甫此尋盟如負者之息其肩行者之休于樹一時瀟灑比軒冕束縳瞪乎逺矣浮雲滿山任其往來太虛真體皎然萬古某歸來兩年處積毀震撼之餘差幸天者之小定自有溪山足以遊釣漫不問其他有詩云日日騎馬來山中歸時明月長在地但願山人一百年一年三百餘畨醉欲知近况此其凡矣念人間清福莫如一間幸而吾二人皆可以自適獨相去遼絶無從合并江東暮雲長長在眼輒專人奉問潭府居處之槩即辰夏氣方深共惟靜養淳和坐消熱惱神明護持式衍方來川至之福臨𥿄耿耿與知吉州江提舉萬頃號古崖某兩年乎山中春猿秋鶴木食澗飲蓋頽然世味之外者五雲􅌭紛麾節夾招搖歷勾陳而下青原白鷺浩有生意某甫與溪倪谷耄額手蒙幸乃大化驅之出柬書就道修民禮公堂下爼豆春風簫韶夜月藉之以詩書禮樂之光多矣明公以洞庭五老之胸時雨一路曽未數月春旗霜艘風采軒豁所謂動搖山嶽細事耳少須暇之棣蕚棠隂先後醲郁夢寐五采衣𬒳八紘持國弟兄盛事再見大江以西之父老子弟豈得以私我公哉某自解維江滸風濤回薄抵昭亭下是為子月丙寅大壞積枵觸手病敗雖日夜􅐡梳㑹肯綮然育豎浸淫非非劑可藥肘後寵靈公不我靳則宣殆庶幾乎惟故山松菊沐浴瑞露而隴蜀之望復切切微疇昔不至此某日墮倥傯神馳棨㦸甫奉陟釐則巳魯皋籍獨不愧于心乎歲將新矣願言滿頌盤椒對揚綈緑此豈無委嚴立下風某伏蒙公劄下問勸分仰見豈弟父母救民水火之盛心某實共邦人額手大賜某所居里凡千餘家常年家中散米一日不收錢諸大家以次接續賑糶可及三十日隔一日糶可當兩月此方儘可無飢他時不待勸率自是舉行明年係緊要年分或須使榜一申嚴之至期却當取禀但四境委有可憂蓋吾州從來以早稻充民食以晚稻充官租今年晚稻半虧顆粒並是入官之數早稻不過二三分則是民食十减七八此其所以皇皇也近見多有趍龍泉永新運糴者覺彼二處米亦有限縣大夫各私其土不肯透泄亦其不得巳者此須使司示以意嚮使之斟酌放行庶彼此可以均濟最急莫如通贑州之米近同年李守惠書自謂年榖中熟米價日低某嘗答書云廬陵一歉異於常年田里憔悴不堪舉目惟章貢素無糴事而得歲又偏鄉人顛頓者往往相率而趍治國民食關係茍可通融兼愛秦晉公之惠也蓋贑浮橋泄米之令素嚴田吉號産米而贑多山少田故為贑計不容旁及鄰邦今歲事既相反又當通變此須古崖一書與李守通情俟得其要領然後大榜境內許人赴贑收糴此亦權宜之一策也區區管見姑復仁明後有利便又須陸續申控某自聞琴鶴言歸即戒笋車擬送别於吉水新凎間初十日始得初八日申時寶翰則知去期甚速始意不可得遂即抖擻作詩馳詣使艎意必可相及僕自城還則知解維巳三日臨風悵惋如失廬陵四竟皇皇流離入贑過吾鄉者無虛日豈弟父母又拂衣去之細民嗷嗷皆謂曷不留我公撫我妻兒婦女一無異辭此即公論在人心不可磨滅處吾輩仕宦得如此即無愧漢循吏傳浮雲得喪何足較也某念受廛兩年當使君之行不得往送詩又不逹歉負為何如亟亟元詩并拜此𥿄從新昌壁弟處借一兵走詣潭府不知紫燕在芝山或在廬山邪引筆馳泝之至大丞相古心老師某不敢容易上問鈞履丐為轉道詹依卷卷賀知吉州黃提舉器之名鏞某密依使天氷雪深山與猿鶴卧送流年翻故牘於左泉右石間非賜邪每飯牛頃必矯首畫㦸下兹審郡揚帝璽節卑天困千里光華一道鼓舞伏惟歡忭斂惟某官眼空四海胸著千年振代直聲鼓雷霆而潤風雨鎮浮定力載華嶽而繫星辰衣冠紫槖之神仙氣類青原之忠節旌麾一頓草木交輝地私二千石之陽和天溥十一州之福澤璀璨六絲之遣礌硠五袴之歌即賜召環遂高聽履某受廛幸矣公朝念其久廢誤節湘行顛倒繡衣不堪重著陳情丐祠以反菽水之奉尚徼均弘俞音旦夕下俾得醉泉飽蕨水之北山之南地主之賜也於馳賀之次仰布其私干瀆峻清臨楮悚悚與前人某日者釋耒山中僕僕湘役走公堂修民禮具申假道之敬蒙主進吏位之堂上再三祖帳殷勤臺餽絡繹視廛氓且絶等至於開心見誠憂愛亹亹一洗世俗崖岸某鄙吝久矣微大雅無以發此意殆未許諸兒覺也小隊出郊追送作遠自違森戟雲樹渺然連日欲作書道歸戀之槩征塵在衣筆硯為發偶宿分宜七里殘日入戶輒寫綢繆風濤滔滔婺緯忘食金護玉持世道將有嘉賴歸鴈草草尚謀裔襞賀楊提刑允恭號高峯某昔者望七十二峯於洞庭之南以為嵩恆岱華類不可易見五峯三市之近皇華臨之遂得以相望下風未見猶既見矣乃今使帆凌空泝贑石而上僕家去大江濵可四十里天其豫之以一日迎見之便慰此平生云胡不喜某兹者伏審庾政告功刑臺建節褰帷而問風俗猶昔四封持斧而行東南于今三命旌旗初動約束一新仰惟某官識透萬微才當八靣陽道州撫字之政所謂吏師元刺史參錯之竒可布天下天子以公䔍於倫紀使得以便綵衣堂上之奉乃眷西顧如此江水一節常平二節繡斧式敬由獄以長我王國平反一笑庶其在此公歸廟朝即典風化一家仁一國興仁尚觀大學之顯效某杜門掃軌知事常後忽里巷父老歡傳明使者將至伏櫪之駑躍躍鉦鼓往事如夢不足細陳某所深自幸賀者三間風雨託諸提對小人有母繼自今得安於其子之養是則君子錫類之賜服之無斁堂堂在目即聽匪伊輒以書先精神孤往與吉州繆知府元德某昔侍同朝自詭相好兹不得又以繁縟為踈遠惟公勿深訝某行吟孤嶼回首吳山烟雨中書郵往來時從泓頴叙尊仰汰歸深密姓字不到雲霞外分正如此非於名門有所簡也階符在望徒有稽首某兹者伏審朱轓春動紫馬星移民樂耕桑簡靜方安於晋國州稱富庶勤強更屬於張公兩地送迎二天今昔恭惟歡慶欽以某官霜明月湛玉潔水清端嚴有大臣風澄不清而撓不濁循良入漢吏傳寬有斷而愛有威小停櫂於天津頻合符於江國歲之不易民胡以生將蘇青社之飢遂易淮陽之卧竟上爭杜衍雖去住之良難席前問賈生恐傳呼之巳迅自天子所以我公歸某茅屋三間在萬山深處借書沽酒外一毫不以為公私撓獨蒔松百畝日騎牛叩角其間天惠仁候自此吏不打門犬不夜吠猿唬鶴嘯各適其適則某受賜侈矣候迎之初不勝依倚謹具劄子自陳燕雀之私何當嗣狀某屏居一廛耳目塗塞忽蒙公牘録示省札竊諗朝廷為李祕丞諸公有請待發諸項椿積賑我廬陵而賢太守敬共其事日夜講行之仰惟施仁發政朝廷甚盛惠也救災恤患鄉曲諸公甚盛舉也承流宣化切切然惟恐一夫不𬒳其澤君侯甚盛心也某嘉與鄉邦父老人士同一贊歎伏承不鄙特有下問以某之庸愚不足及此細玩諸公所陳如隨縣闊狹分撥米數如發糶之直只依元糴價錢皆㫖揮之所巳許而使府巳遵而行之甚善至於戶口之多寡編排之虛實此則各都各保之事所在都保委有奸欺然物之不齊物之情也若以太守屑屑為此計較恐末流必至多事此惟當嚴責之八縣宰宰若親民若其以實惠及人為意必能周思熟慮以求稱塞明指傳所謂心誠求之雖不中不遠是也一縣各有一縣風俗一鄉各有一鄉事體諸宰申請惟各從其便不患寡而患不均彼必自能斟酌通融而為之說惟吾行所無事自然所濟不細但縣之於郡往往勢分隔絶若專靠公文行移必有展轉遲滯之患若使府明諭諸宰此事今作一項措置不比公事常程每縣各給以數紫袋置循環曆其中使諸宰有所申明只於曆中絡繹禀請從書表司往逹君候隨手應答如回朋友書信使為宰者得依時禀承其中便减吏奸八九分且閭里細微得嘗逹於黃堂之前物來事至無不曲當是則布宣德意之一大捷法也某不當出位僣越承問不敢不對或者千慮一得惟君侯矜其愚而勿罪之某繼此若有管見馮恃寬貰又得禀陳回吉州西倅竇檢閲全器某昨歲待罪闕下明公騎鸞驂鳳下我青原相望寥廓不能以時刷翎振喙從燕雀來不圖天孫雲錦飛墮几格金聲玉色參前倚衡固不以既見未見為間然也某官斂嶽翠以為神氣卷湘水以為波瀾駕蓮葉而味玉書仙芳纚纚搴芙蓉而弄斗柄道運堂堂長樂鼓鍾西清帷幄轇轕星辰經緯雲漢固其分也風月神螺小此盤礴緑綈方底王曰遄歸某旦旦為斯文屬目昨承使者之來即從修門作意馳謝㑹匆匆去國出處殊科歸卧悠悠書尺盡廢光隂不堪把玩歲年如許念厚意久不報矍然薰沐祗對主書耕釣一廛五雲在上臨風詹泝之至回江州李都承與號南窗關西人某頃風帆回薄自湖入江目穿高牙恨臂不羽一棹從湓浦來五雲絢爛照映清越對桑落而飲古人之酒擊中流而聞夜覺之雞至今使人意氣激昻借力下風飽我滿腹乃以丙寅視篆茇舍下塵埃抖擻末繇面謝軍將扣門斜封三道突入眼角臺餽使蕃綈𫀆之私何以持報共惟某官閧洛耆俊韓范聲名參井鉞旗聮寶奎之錯落江淮草木𬒳玉節之昭回吟嘯庾樓梅花噴薄老熊當道貉子不敢越一步夷猶岸幘蠡管莫涯方面誅不敢辭圭錫以須勒此堂堂燕然石在某漫浪出山落身枵瓠問官官靡問吏吏荒而民氣則憒憒未醒絲棼莫理如之何其淑後也明公惠念疇昔肘後丹訣其肯為某愛邪臨風切切亟拂吏坌具酬潦約歲晚寒驕願言金玉體府壽此宗廟社稷之身宣豈無骫骳者三肅以請某去年在宣州一江上下幸甚數數相聞然所甚恨者過湖口時不能轉江西四十里拜屏下共登琶琶亭以庶幾英豪之下風也未幾召去又未幾汰歸一出一處為天下笑知心千里外當亦謂何某比者伏審晋承密㫖升直淵圖詔璽申褒鋒車交趣共惟歡慶某官關西遣老江表偉人﨑嶇諸葛之兵間氣吞河渭偃蹇元規之坐處目盡江淮天方祚宋襄戌解嚴公歸本朝坐帷幄老成謀國處置得宜使姦雄伐謀兵端不開將社稷實受其福某婺緯小心一飯三禱屏伏深山幸不見棄於君子專使逺來持書問勞將意孔厚猿鶴為驚區區拜高誼而杜門齪齪未知所以為報也九江未除人想當寧急賢應不俟代某嘉與海內延頸大用倘得衣𬒳餘光遂為太平安民公賜大矣江空如許執筆茫然相望一方精神馳往回潘檢閲某伏以歲華晼晼春事權輿共惟某官鏤玉晶熒凝旒簡注神之相之台侯動止萬福某濃熏鵲尾酬敬腆施曩從集英殿門吾榜得人以執事重海臺沙合雲月相輝至今斗牛猶有光氣顧山林僻左繫鴈悠悠天際碧雲明發不寐千里眉目忽照宛陵為之跫然以喜欽以某官斂崑崙以為神氣捲𬈑渤以為波濤玉質金相宛乎無自眩之色泉清松茂浩然有難進之風乃今紬石室之祕藏為籕書而出色視周六典作宋一經南豐以史學稱進裁大典安定非他人比宜在經筵某鶴夢正臞起廢出坎循墻弗獲𬒳命于征郡枵然虛真山凋水瘵處也敏手􅐡梳猶懼不蔇况不頴之尤者乎不規而頌非所敢望於同年也禀酬崖經寧不嗣音願言努力明德對揚王休有昭亭委戒其敢不肅回鍾編校堯俞字君俞號方岩某曉汲凍清以贄萬一之謝首于穹勺某兩年山中風月晃朗望太乙光氣九霄吾書無翰不能時一飛到梅花月影忽疑是君而米家第二帖至矣施稠報眇自省欿如尊執事以黼黻雲漢之胸試金玉典墳之手駕輕就重拾級升高此逢掖之至榮而搢縉之交羡曽子固晉裁大典為史學優胡康侯宜在經筵非他人比某鶴夢正寒大化驅之出自湖涉江風帆回薄四十程乃抵宣山凋水瘵眇兮愁豫敏手􅐡梳猶懼不蔇况不頴之尤者乎高明局外之見何以教之滿硯氷澌濡毫如帚尚規嗣音以寫繾綣回吳制帥革號恕齊某林慚澗愧貿貿此來幸甚在玉節照臨之末九華山下蹉跌望塵拜手雙魚分隔雲漢敢圖下士盛心超越昭代襄報鄭重閟位貌於不有方驚喜未定間五雲寵靈自玉麟堂翩然賁之所施所蒙非敵巳以下所可得道德之味流注翰墨使人之意也消恕齊先生允文允武之才有體有用之學以王謝之衣冠而接風流於江左以朱程之講貫而窺閫奧於魯東顧今吏道便熟𬒮帷成雲崇詩書而抑刀筆坐爼豆而行甲兵鐡壁東南公其天人也耶經制西事當在朝廷錫命師中不如歸衮某敢誦所聞某生也晚於一世封胡羯末之勝幸甚皆得下拜而於恕齊識獨早眷尤厚癸亥之望神皋戊辰之陪紫槖又其後來事也今則以列郡而事崇垣何敢仰綴宿昔食芹之美豈無是心非所得僣詎謂臺餽駢羅光照下國自上而施之足以為德某敢不三肅使人恭承嘉貺若夫以往復為禮則誼之所不敢出也謹三熏三沐祗酬主書干瀆清嚴臨風愧悚回宣州洪倅某馳想芝山屹立如鸞坡鳯閣代有英妙不自意天惠宛陵朱􅌧斯皇乃肯共堂下探梅清致亭亭雲月邀我敬山不後不先未有如斯之巧者也伏惟執事日光玉潔之襟繩直凖平之度車堅御良之材真所謂喬木百圍秀色干霄望清都太微之垣維尺有咫課丹峴緹屏之最當階而升胡尚綰於緋魚來同看於黃鶴意者康沂之歌愈出愈偉有相之道實卑之以藥石枵然郡政之闕者乎思昔頴水霄立其間而正獻以賢行佐理至今談者猶橋舌不下某于鄉之典刑無能為役而吾執事則真其人也前茅在道旗旄舒舒願疾其驅降此未見至於乘珠委貺鄭甚於先施覺光氣炯炯衝貫斗牛矣懼弗敢當亟鍾鼎而歸於瑶華之側區區甫此滌篆排冗占酬崖略是恧回吳直閣履齊之子某少之時聞東南二石筍玉立九霄陵陽蒼實為緑野午橋佳處鸞鶴神清縹眇何許老成遠矣尚有典刑仰惟某官揚休山立之韻日光玉潔之襟文獻堂堂代有英妙未既見只神爽一方某卧青原山中驅馳良倦上恩俾郡越在鳴珂循走倣徨連符趣赴不量此來未知所以淑後喬木婆娑五雲絢畫尚祈薤誨俾就玉成某遠奉瑶音緘貺駢錦先施倒置曽是為容既什襲巾衍輒鍾鼎以歸太乙之府望履非遙臨風毣毣與游提刑汶某以良月之望舉掉東下江空見底乃章貢源頭諸水怒長未幾光𦦨五朵與空同雲俱來往帆順風航波瀾之澎湃灑石鍾之清越寵靈張王迄抵雙溪子月丙寅俯抵賤役瓣香西望敬謝所蒙明公卷其十二峯之神氣軒軒磊磊昭耀東南以宰相才學宰相事天下久望其為家氊出色轡絲周道肯復倭遲惠露瀼瀼江之民幸矣如溥寰何㑹有溫綸四輩馳下某不善為斫得郡復枵至之日視官官靡視吏吏荒民氣憒憒如也􅐡剔棼絲顧氣力所至終覺五技易窮肘後神竒不敢以望之他人惟故山松菊衣𬒳綵雲亦巳過數矧兹隴蜀徼惠未涯微疇昔不及此相望二千里外明月此心懇懇側釐掛一漏萬惟青陽時動綈緑光華式金式玉以副前禱此豈無骫辱戒為榮與趙知郡孟藡號菊山某頃從南浦亭邉抖擻殷函道所蒙荷且矯首于太乙之府穹林冥坐縹眇絳霄江塗漫漫勞我宵栩執事以玉雪界之精神臨睨八極朝閬風夕玄圃識者猶竊遲之錦衣照道紫淦橫舟蕩漾柳風噓吸竹露澗阿樂矣如顒顒望歲者何建章夜半尺一堂堂畫省紅雲著公髙處惟日望之某不善為斫得郡復枵以子月丙寅視篆昭亭下視官官靡視吏吏荒洗垢􅐡癢亦曰視吾氣力所至然山凋水瘵非刀圭可療肘後神竒惠徼大福某不敢以望他人也焚𬎼瀹雪西鄉奉書以謝以祈鼎珍履絇願言金護玉持對揚王休臨風悁結賀前人得旴守某昨在宣州拜書亡何客攜琳琅來京師欣浣如對匆匆去國不成報襄歸里以來杜門深念又無從嗣音為謝徒有清夢夜繞金峯忽讀邸狀欣審丹鳳揚綸銀莵擁鎮八百國封爵莫如同姓之親二千石起家共讃惟良之牧先聲載道闔境為春伏深歡忭欽以某官景緯光華仙潢清潤淮南桂樹了無貴介之風李白桃園綽有神仙之韻軒陛宜當於三錫轅和肯涖於十同眷惟東盰實介南服紅泉碧澗髣佛丹丘白玉紫烟參差繡陌聊商羊於朱􅌧供衎燕於青香大宗維翰價人維藩丕動袴𥜗之喜九卿執羔三公執壁言觀衮舄之歸某辱在眷知助喜百倍既不能振翎刷喙從燕雀來謹奉書寄便申慶迓兵當巳在道不知開藩㳙卜何日某尚當屢賀不一臨風馳泝與趙監丞淇號平遠某乃歲之秋緹騎來山中嶽翠蒼寒琳琅照映章不成報內有欿然寧不嗣音僻左之以世道如許風起雲飛中夜人物之思為此耿耿上念井絡丹詔起家峽月棧雲先聲浩蕩蓋有望木牛流馬再立武候之事業又壁窺萬一意必與南山洎豫秀諸公上下雲龍共此光明俊偉之舉縮手䄂間臨睨天半此其大本領大經綸政不易涯之野水橫舟蒼虬縹眇山君川后日有疏附即日恭惟台候萬福某漁隈半席自分小休誤渥自天俾尋庾謝舊盟意此是抆拭笭箵之陋耳三辟弗可乃以陽月之望束書出山涉重湖越大江整整四十日抵戍以是月丙寅抵賤事凋城敗屋枵然大瓠耳搔首踟蹰望洋氣縮維宣距鄴僅隔一雲東望熏香奉尺書候起處惠徼藥石立我沈痼梅花晴昊拄笏神馳慰前人某昔讀檀弓文子之喪既除喪而後越人來弔其居使之然也伏惟先太傅大丞相冀國公之喪既有日矣地不千里不能往弔一介奉禮今也而後能來死罪死罪嗚呼皇天祚宋國有元老數百年宗社之靈長千萬里風寒之險要蛟龍在淵虎豹在山屹然長城為此突兀天乎不使愸遺遽奪之去主上震悼傾動朝野伏想生平翹館之英俊舊日麾下之將士與夫三邉之百姓四塞之英豪見碑而淚望城而悲者不能巳巳矧夫家門之竒禍父子之至情攀劈奈何嗚呼痛哉某生也晚當公佩天下安危分不得勇往執鞭今而追恨則巳無及獨念䄂有瓣香歸依平生亦既不克為公壽惟有為天下慟哭敢西望靈輀揮淚百拜而獻之公而可作尚其我許嗚呼悲哉親喪所自盡也抑先王制禮之意是有節文士君子為孝之道在於顯揚伏惟執事重致意焉即日孝履支持某頓首奉狀起居臨𥿄哽塞回安福趙宰與􅼭號勿齊某追記疇昔同到蓬萊慈恩之題杏園之宴吾以故不與焉然同年之情豈以四海九州為藐然哉王孫乃龍鍾世有籋雲鱗今不遡紫清上岧嶤顧得百里之地而君之簾隂晝寂千室鳴絃實鄰吾父母國人誦子産今其時乎某私獨念今天下豈有可為之縣縣不可為而可為者人如君者以可而臨不可於是知材具之超常流百倍矣長書下貽燁然春華溜若清風與我之厚昭仭至情多言不足以殫謝意也某守郡無𥙷誤渥為郎縮縮循墻行且歸里當觀棠隂以與邦人共談政化之微亟推吏塵具報記室揆諸來施不敏流汗比一馬二僮日在泉石深處聞山外塵埃亦頗作惡坐對浮雲亦開口笑不自巳耳君解墨綬去意紅光紫氣冉冉帝側乃猶廬陵客琅畫至前矍然起仰黃柑紅柚二美并貺杏苑論情我之懷矣冬江雪涸萬里安流目送征鴻知有順帆天際如駛伏楮拳拳中書不中書復字蕪纇併希錫察回寧國交代孟兵部之縉某去國之前一二日宣州弛征之命下某既為桐鄉百姓頓足起舞即拜書望雙溪疊嶂為賢主人賀吾輩讀書臨民正為今日行志凡此者各盡其分固非相與為賜也既汰斥歸里即閉門不與人事山巔水涯翛然獨往而使者忽持五雲來君子之有情於人也即勞問之將以厚禮復申其綢繆焉某誠不自知其何以得此也宣人歌舞賢侯之德教冠冕像設祝廣成千二百年令公二十四考蓋人心之天也某何人斯偶以一日出位言語乃得因見大夫以自附於去思之義某微德以堪回首碧落山川鬼神猶有餘愧宣敗壞至矣弛之則期㑹散繩之則撫字虧公折回蟻封從容不迫期年而變古語不誣方今論選表無出頴川右者曷不均弘俾執事樞某一飯三禱使者之歸也謹東望熏祓身心致敬陵峯堂下有日延見父老尚願道山林不忘之私與其所以不敢當之意進之惟命退之惟命某臨書不勝拳拳文山先生全集卷之五終
