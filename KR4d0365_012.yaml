front:
  text: 文山先生全集卷之十二文集
  hash: sha256:341b710859b131a24655a428eeffe80e7258a826617f75f93797e83421925780
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_012-1a}
body:
  text: 樂語宴交代寧國孟知府致語粉省望郎來向雙溪領牧玉堂學士將從五馬歸班文章太守兩風流新舊使君同意氣三生結習千里逢迎筮吉日以交龜秩𥘉筵而式燕共惟某官一中體假萬卷工夫風來湖靣月到天心眼小衡峯勘破是間造化胸吞震澤充開裏許規模靜觀時仁意無邉自得處生香不斷那許山房獨樂便須朝步髙騫淡月踈星繞建章步凌紫界燕寢清香森畫戟駕熟朱􅙲東遊方喜於行春西嚮又歌於來暮好是當年孟夫子肯為今日謝宣城况也江雲鄰哉雩水鳯函飛下又傳嶽牧得詞人熊軾馳來重見神仙遊碧落少遲表選即看中環我判府報政趍朝及時受代子孫永好非徒契結金蘭賔主相歡要是味同草木説賣劍買牛故事誦無𥜗有袴新謡真成官羽相宣正好豆籩有踐地衣繡毯風袖瑶琴海棠開後燕子來時猶自青春未減楊柳舞低桃花歌徹莫令紅影堂搖且從容東野雲龍更領會醉翁山水陽坡瓜好此畨賸講齊盟西掖花香他日重尋舊約某等四工樂部執藝台階上奉清歡下陳俚語玉堂學士催班鷺粉省潛郎趣佩麟來往神仙同碧落後先嶽牧總詞人陽坡共喜瓜時及朝路相期柳色新握手論交拚一醉東風散作滿城春宴交代湖南提刑李運使致語錦帳尚書郎手持金節繡衣直指使面授銀龜二十年虎榜同盟第一假熊湘佳話豆籩𥘉秩英簜增輝某官紫薇垣裏星辰太華峯頭霜雪黃簾緑幕閉朱戶天子門生氷壼玉衡懸清秋神仙人物插天髙雲霄閥拔地起湖海樓湧翠浪流玉虹璽書􅊜􅊜拊翠濤拍青璧琴轡垂垂依然彈壓舊江山總是快活新條貫綸巾羽扇便追赤壁功名流馬木牛要做中原事業了却燕然山勒石歸來文德殿宣麻我提刑同看長安花新聽衡陽鴈茅舍竹籬玉堂金馬到處無心青天白日芝草鳯凰舊時相識自是平生管鮑合成一會蕭曹共讀禮樂字三千好吞雲夢澤八九瀟湘雨煙寺鍾洞庭月遙看八靣玪瓏蓬萊盞金蕉業海山螺散作九州歡喜某等叨居伶部幸際華筵欲助歡顔敢陳韻語河漢雙星會使槎分明徹夜照長沙轡絲曉轉金龜影衣繡春隨錦鵲花雲杏舊隂浮緑淨野萍新韻度朱華明年共侍蓬萊宴回首丹墀日未斜宴朱衡守致語粉省郎星來坐朱陵堂上繡衣公子相逢紫蓋雲邉麾節同春豆籩永夕某官寶劍雙峯意氣錦機五色文章北斗丹梯我玉皇香案吏西方雲界公佛地位中人旗蓋東西雲龍上下羅軒冕朝天闕秉刀尺贊仙臺荒政七州祕閣常平再見勝遊三峽吏部刺史重來移太薇垣二十五星照祝融峯九千餘丈朝樹夜濤入詠汀蘭岸芷生香桑麻深燕雀成須信隂崖轉䁔虎豹逺蛟龍遁從今後户無塵桍樗歌春腳方新絲綸閣天風又下我提刑交情四海王事一家石鼓話頭謾對芳洲杜若玉堂何意要歸茅屋梅花一堂聚會天人千里逢迎地主細話巴山雨共酌古酃春好將席上歡聲散作人間和氣鮮鯽銀絲香芹碧澗小對歌筵宫花玉仗御水金溝同催宣宴敬陳古語聊贊歡顔翩翩紫馬絢銀潢春入梅花新雨香牛斗劍芒浮翼軫岷峨佩影度瀟湘東南麾節精神合上下風雲意氣長且為緑酃拚一醉傳呼聮轡覲明光宴湖南董提舉致語前知瑞州碧落使君來坐皇華堂上繡衣公子相逢紫蓋雲邉二十年虎榜同盟第一假熊湘佳話招呼風月酹獻豆籩共惟某官精神緑水天河節操丹崖鐡筆一椿獨老霜皮􅘇雨黛色參天雙萼齊芳紅杏倚雲碧桃和露插天髙雲霄閥拔地起湖海樓心白玉堂肘黃金印劍池丹井提携翠越風流天柱祝融脫活青雲標格盡道常平老子移來上界神仙英簜照空霜飛暑路鋒車度曉煙傍衮衣我提刑同看長安花共聽衡陽鴈風雲一氣朱結綬貢彈冠車馬同途翰卜鄰雍識靣霄漢瞻佳士瀟湘逢故人共談禮樂字三千好吞雲夢澤八九度斗牛跨麟鶴襟期交注樽罍縹鸞鳯拏虎螭勳業同刋彛鼎某等叨居伶部聊獻工歌西風八月楚江濵爭看星槎會漢津露濕紅綾旗影舊雲連翠簜轡華新東西杜若洲連月先後瑞芝堂上春回首瓊林拚一醉使還總是鳯池人宴交代權贑州孫提刑致語太守奉親歡迎綵鷁使臣領牧新收銀莵班行兩度襟期臺群百年交好豆籩酹獻金石綢繆某官一襟禹穴氷霜萬丈剡溪玉雪淡墨慈恩塔光射斗牛妙音遂萊宫清諧韶鳯入領圜橋冠帶出聽湓浦琵琶捫左角歷天田記方流疏玉水旌旗日暖下太微垣裏星辰鼓角雲和種干越亭前花木𥜗袴方歌夜雨幨帷又轉春風白馬金盤陀摩娑贑石三百里玉節青絲纜約束江城十一州金池與玉節相輝繡斧共朱􅙲出色崆山絶處移來琴鶴髙寒廉水光中洗出劍刀清淨岩開曉日灘蟄晴雷小駐英函歌虹流吟翠浪快持荷槖飛鳯尾來虎頭我判府勇撤楚車新依冀部白雲舍近移來簾繡輿藤先月臺髙記得朝花院柳喚起十年膠􅃮盡歸一日樽罍麾節同春笙歌永夕海山螺金蕉葉散為八境和風禁苑鳯青瑣闈行共九天清露某等叨居伶部敢獻俚歌麾節東南會一堂蘭亭昨日記流觴六絲星度銀潢影五綵春浮玉翠香院柳舊雲懷燕語野蘋新雨挹虹光鳯池對秉他年事佇看天街接佩璫又宴前人致語粉省望郎繡衣弭節碧山學士綵袖分符好看翠浪乘虹重酌廉泉飛雪某官函關老子姑射仙人金鍾氷壼玉衡精神流麗青天鳯凰芝草表裏光明昔為天子好門生今是玉皇香案吏移下半空水鏡清照鄱湖鎔成萬疊氷花春浮贑石澄江分一道老氣橫九州明弼堂中快活條貫籌思樓外逺大規模發揮清獻江山張主濂溪風月人行膮日吏立秋霜使節上青霄有華冠蓋吏部提英鑒佇入鈞樞我判府金石交情塤箎王事上堂拜家慶方報行春知府見監司來依先月更醉燈前花雨共遊雪外煙林肯為二千石徘徊散作十一州歡喜鮮鯽銀絲香芹碧澗小對歌筵宮花玉仗御水金溝同催春宴某等敢陳吉語上贊台顔簾影晴絲落舞茵崆洞雲晚聚星辰翠虹光度樓臺月香燕先浮霄漢春一道清風華轡逺雙江緑水綵衣新相逢屢有朝花約又看貂蟬會紫宸上梁文山中堂屋上梁文戴符尋隱久矣買山潘嶽奉親昉兹築室未説胸中之全屋姑營面北之一堂凡私計之綢繆皆上恩之旁薄自昔園林臺館之勝難乎溪山泉石之全琅琊兩峯似大行之盤谷建陽九曲類武夷之桃源然而有窈而深者無曠而夷有清而厲者無雄而峭所在罕并於四美其間各檀於一長而况索之於杖屨之餘去人逺甚未有納之於戶庭之近奉親居之主人白髮重闈綵衣四世出隨園鵠付軒冕於何心歸對林烏覺簟瓢之有味頃闢上遊之叢翳偶逢小隱之坡陀江村八九家得重洲小溪澄潭淺渚之勝山行六七里有詭石怪木竒卉美箭之饒攀飛雪而窺空谾度修蕪而陟穹巘雲奔虎鬪根穴相呀斗折蛇行嵁巗差互看輞川畫如登南垞過華子岡讀黃溪詩如上西山至袁家渚其遐詭足以騁懷而遊目其深靚足以飬道而棲真自天作之非人力也未為仙翁釋子之所物色惟有樵童牧豎之相往來偶然幻出種竹齋見山堂尚欲敝為拂雲亭澄虛閣先生酒壼釣具無日不來夫人步輿輕軒有時而至乃若波濤洶歘雪月紛披煙雨吐吞虹霞變現將使山間四時之樂盡為堂上百歲之娛啜菽水盡其歡先廬固在得諼草植之背别墅何妨乃相南隅乃規中奧有護田一水排闥兩山之勢得栽芋百區種魚千里之基問之隂陽天與我時地與我所若有神物水增而廣山增而髙不管相如四壁之蕭條且作樂天三間之瀟灑窗中列岫庭際俯林舍北生雲籬東出日或積土室編蓬戶或通竹溜縳柴門宛然林壑坻島之中更有花木樓臺之意眼前突兀見此屋人生富貴何須時苟美苟完爰居爰處謳吟月露供燕喜之詩判斷煙霞博平反之笑何必瑶池崑崙閬風玄圃方是神仙不須終南太華天台赤城亦云山水𬒳褐而環堵卻軌而杜門彈琴以詠先王之風髙卧自謂羲皇之上不知老將至聊復得此生今日幽居便可號為祕書外監他年全宅亦無華於昌黎先生小住郢斤齊聽巴唱東紅日照我茅屋東繞盡湖隂橋上看世間無水不流東南説與山人住水南江上梅花都自好莫分枝北與枝南西隄東千頃到隄西往來各任行人意湖水東流江水西北濁酒一杯北窗北白雲去住總何心或在山南或山北上莫道青山在屋上青山一疊又青山有錢連屋青山上下試看流水在屋下他時戲綵畫堂前福祿來崇更來下伏願上梁之後千山歡喜萬竹平安舉夀觴和慈顔兒童稚齒昆弟斑白濯清泉坐茂木虎豹逺迹蛟龍遁藏隂陽調而風雨時神祗安而祖考樂一新門戶永鎮江山山中廳屋上梁文舍一𤱔之白雲巳開别業屋四圍之流水更啓前榮發揮巳定之規模展拓方來之閥閲有相之道乃績于成主人未了書癡頗有山癖先人之敝廬在苟安風雨之餘慈母以輕軒來亦愛園林之近頃斸蒼苔之地昉營諼草之堂雖環堵之間粗云具體然闔廬之制未畢全功相協厥居聿來胥宇階戺所以行僎價屏著所以肅賔嘉不日成之以時可矣是用戒良梓筮吉辰茀蚴蟉於水端架蜿蟺於雲表然後翼之以廡承之以門移石而立庭臯通泉而周戶外清湍峻嶺為不斷之藩垣野草幽花作自然之丹雘老之將至訖可小休昔晦翁愛武夷而不能家歐公卜頴水而非吾土余何為者乃幸得之未問君王便比賜鑑湖之宅何須將相方謀歸緑野之堂凡與同工齊聽善頌東日光穿竹翠玲瓏坡茅屋柴門在半峯荆風𬒮欲挹浮丘翁谷南水靣沙邉緑正涵荆道人為作小蒲庵坡山上仙風舞檜杉坡西雨過橫塘水滿隄豐漁簑背雨向前溪荆水聲秋碎入簾幃豐北澄碧泓渟涵玉色歐夜深山月吐半壁谷誰來共枕溪中石坡上亂峯深處開方丈歐風雨戶牗當塞向谷五更曉色來書幌坡下門前白練長江㵼坡鼓吹却入農桑社坡翠浪舞翻紅䆉稏坡伏願上梁之後山輝川媚神比天同俾耆俾艾俾熾俾昌壽母多祉爰居爰處爰笑爰語君子攸寧自此定居永為安宅代曾衢教秀峯上梁文居香城𥘉任衢教日永新歐陽楚方自其邑買見屋除拆浮江而來兒郎偉香城拔地為廬陵之名山大厦連雲新廣文之甲第結廬在人境幽居近物情竊以買宅買鄰元號千百萬之價有廬有屋或待三十年之勤未有不崇朝之間而能使二美之具誰為之地乃有此竒一片乾坤淡菴先生之里隔墻鍾鼎文昌兄弟之家况方其何蕃之在齊巳有為戴公而起宅至今日歸之斯受亦有數行乎其間川浮陸運以無遺水到渠成而甚易移彼置此換舊添新疑半天之飛來忽平地而卓起尋引繩墨規矩曰用舊人丹雘塗塈垣墉特其餘事多助之至不日而成彼有室築而道謀此則事半而功倍我府博才高一柱胸洞八窗大學館中飛黃騰去大成殿下釋褐歸來安能鬱鬱居乎是以汲汲如也向時荼壘曾寫千萬間之心此日規模便作十二樓之樣由柯山而徑上遡木天而橫飛何官不為餘地甚綽青山如許聊且號工部草堂緑野後來以此為大祝廳事輒陳韻語共舉修梁東穹秀峥嶸華蓋峯卓筆雲霄天下獨曹劉班馬避詩鋒南翡翠英中碧玉篸一抹罘罳生畫色府中氣象巳潭潭西鄰有文昌瑞色齊乃祖紹興光價在重噓真氣磔鯨鯢北山腰帶曵清江曲滄江歷歷現雙魚倣佛黃金繫橫玉上一朵紅雲只尋丈瓊樓髙處不勝寒轇輵乾坤夌萬象下不是求田并問舍要令突兀在眼前俯拾八荒歸廣厦伏願上梁之後閥閲增髙室家嚮用堂前龜鶴親見金桃天上麒麟聯輝玉樹大耐官職自立門庭以無愧於前修用永傳於佳話公牘與湖南大帥江丞相論秦冦事宜劄子某于犯師嚴輒有申請秦冦之在廣西優動二十五郡為梗纍年去年破賀之富川官民荼毒不細經司不問今破我永明殺死知縣殺傷縣尉主學捲去縣印屠居民虜婦女掠去財物繼而又破永明之下澤又冦我江華移其所以毒廣西者施之湖南此而不討失刑莫大廣西以前獨力不能捕滅今何幸湖南肯與會合宿兵以待師期朝廷之主張方新言路之指陳甚力此掃清巢穴之一機為兩路官民舒泄冤憤不可失之時也前經帥不足望滿望新經帥之來不料意見參差施行矛盾兹得經司牒報捕賊以官授賊以職犒賊以酒賞賊以錢凡懷忠憤無不彈指自昔化賊為民固有稱為盛德事者蓋賊有出於田里之飢荒激於官吏之貪黷弄兵之情出不獲巳故仁人處之念其為赤子姑惟安之勿庸勝之今秦冦招募無徒建置將校橫行兩路嘯聚千群戕天子之命吏劫公府之鑄印殺人盈野罪如丘山既非脅從又非烏合渠魁縱有求降之説官司亦在不受之科而况𥘉無出首之真情僅取改過之文狀謾曰回鄉而安業何曾束身以歸官得之廣人所云一靣受招一靣劫殺刑政無章宜其至此天下之大勢相維所仗者義而巳若名義不著大之不可以立國小之不可以立家今觀廣西成何宇宙先生不忍斯人之塗炭一再調兵必欲罪人斯得然後巳此真扶持人極綱維世變盛心之所推也但今來廣西既作此可笑舉措未必不以龔遂渤海之事自詭上感聖聽本路冒然進兵非惟蹊徑不熟乏隅總鄉導之助有悔吝之慮亦恐鄰閫反以本路為張皇壞其兒戲之前功或者隂設陷穽今直須申審朝省看指揮如何朝旨主招諭本路只得撤兵後有衝突廣西當任其咎朝旨如以招諭為不然自是督兩路會合至時湖南不求廣西而廣西自當約湖南共事此利害自是坦然謹具公申欲望備申朝省仍乞鈞翰與當揆啇訂必須計一例斷行下曰招則招曰捕則捕使人無中立之疑則亦無事後之悔所有永明縣見駐劄有使閫之兵有本州之兵有謝隅官之義丁約近千人日費春陵供憶比來徐守巳費支吾郡力凋薄亦為可念今髙節所部兵若到山前不過又是坐食愚意謂不若候朝旨行下確許討捕然後調往今乞且喚回髙節一行軍兵歸營聽候朝命某非敢違使閫約束本司去山前頗近的見利害如此恃師門相與之真故敢傾臆以請拱聽處分以慿尊守提刑節制司與安撫司平冦循環曆某猥以迂踈承乏湘臬適值冦發昭賀兩路弗寧兹承大使丞相與廣西經略都承選將調兵各以重僚為之督是行賊不足平矣某偶以職事獲忝與聞奉令承教於兩閫間自是無虛日公移失幾密私櫝近文貌求其脈絡貫穿報應迅速莫若循環曆為便司存以紫袋從郵置往來去潭日有半去桂可三日從其中而稟命焉庶幾昔人道二國之言無私之義云耳某謹書於曆首為序十月十三日某荐凖牒報大閫調兵一千人以宇文帥參王環衛任其事甚盛舉也自秦冦之作廣西前此調兵不過五百人以下去年吕師方調一千人而皆委之小小將校氣勢單泊不能為功今南窗調三千人以唐貮軍督之以趙總制統之而使閫與之掎角大作規模賊授首行有日矣事關西戶國家之所嘉賴豈直兩路之所蒙福而巳然聞之兵家利鈍不能逆覩蜂蠆有毒困獸猶鬪語曰臨事而懼好謀而成某𢾗月以來聀思其憂亦頗采取衆議薄有管見及今山前之所當行者因悉𢾗之於前乞賜鈞照一秦孟四者纍據山前探報其狡兔之窟稱在賀州管下地名下界然實無一定可攻之巢穴亦無一定可擊之隊伍前此經司非不起兵臨之然兵來則賊散兵去則賊聚見吾強則避之知吾弱則乘之方官軍之始至也整齪精明部分齊一問冦則失之矣無可蹤迹者而秦之黨或為平民買賣於軍市之間甚者秦孟四亦在焉及淹旬越月之後我軍氣竭意衰闌珊零落冦則忽以百十輩突出草舍以掩我軍從前往往憤軍蹶將大率坐此今兩閫會兵鼓行而前冦出故智必且散去及其久也則有乘虛襲我之憂此一不可不知也一秦孟四所出沒巢穴處其山重岡復嶠連跨數州林翳深密薈蔚延袤山猺木客聚族其間將四靣而褁之則山腳綿亘無合圍之理將赭山而蹙之則林木疏曠無延燎之勢我軍望之遙遙空駐山下而彼之軼出他境猖獗自如且如近年嘗遣二將曰吳曰孫屯駐屏山者年餘僅能免靜江境內之擾而不能禁昭賀諸州之剽掠是也我軍若入其巢搜原剔藪豈不甚快然彼又竄入大山愈去愈逺迄不可誰何如近年蕭路分日張者提兵徑搗其巢而不獲一人是也今兩閫兵力甚重非前此千百人單弱之比雖山勢連延不可合圍只是一步趲一步可直造其所謂下界者然吾極其辛苦得至其間彼則又巳遁散且兵在山前又無救於彼之橫出此二不可不知也一所在平冦専藉土人惟今廣西則不然方秦冦之起也某村𬒳害訴於閫閫為之調兵巳而賊不可追撒軍而去未幾則冦巳復至尋讐於所訴之家曰汝敢訴我從而盡殺滅之官不能為之主而適重其荼毒自此應有𬒳劫者皆不復告官此一類是主人畏賊而不敢與為敵者也又秦冦所至攫剽財物之外出其餘以散之貧者善良𬒳害惡小蒙利是以鄉井間略無𬒳髮纓冠之義常有幸災樂禍之心此一類是土人喜賊而不復與為讐者也今兩閫會兵而前若無土人嚮導是猶肓者索途何往而可然由前言之則或平民畏冦後禍而不欲為我軍之用或惡少以冦為恩而不樂為我軍之役縱強而驅之未必不首鼠二三陽順官而隂附賊此處最是誤事此三不可不知也一今日之事全在兩路督捕察前三者之弊各作一䇿處之必使有以避三者之病然後一舉而得志不然必墮賊計中南方用兵如今日大舉者自有數此行必須如狄武襄之於儂蠻了事而後可巳君子作事謀始則籌之也可不熟而講之也可不精乎一聞有張虎者石壁嘗遣之將兵幾擒秦孟四常有張大蟲來我便怕之語若取賊之所怕者表而用之亦破賊膽之一也張虎者近為郭察所劾押下雍管效用今以鈞閫求之以屬王環衛使之以功輔過其人勇悍有餘必能自效此上計也一今自湖南入昭賀有兩塗一曰全州灌陽自灌陽入昭賀皆經縣鎮即近日𬒳虜去處而去秦孟四下界巢頗逺一曰道州永明自永明入昭州界曰平源便是賊巢自平源至下界賊寨連珠相望其去秦孟四巢甚近今兩督捕先合啇量打併附和諸賊此却宜以告諭為先告諭之説以為兩路之所誅者惟秦孟四汝曹脅從在不殺之科若得一寨下我軍直是不殺則所謂連珠賊寨必從風而靡非惟可以離賊之黨因而用之則擒秦孟四或在此徒未可知也但一賊寨來降其中有老幼有財物軍人不免殺戮攫拿此須督捕總統先明秋毫無犯不殺一人之令使降者以我為信則可此收捕之第一機也一昨來使閫所調不過戍寨一百人又令本司擇將當時頭勢稍輕所以且差桂文政總統桂雖淮將體統不為嚴重故鈐束倍覺費力向嘗以紊鈞聽乞賜改差未蒙垂許今幸王環衛此來即當抽回桂文政盡以其兵付王環衛伏乞鈞照一髙節二百人今在全州灌陽駐劄合係王環衛總統伏乞鈞照一聞諸軍取十六日戒嚴以行二十後可到衡陽應平冦之説筆舌所不盡者候宇文帥參王環衛相會又得對面較量伏乞鈞照大使司回萬里承示循環曆讀之綱目備具公而幾密之周防私而文貌之簡約甚徑便也所當遵而守之十月十六日報十三日所批畫如後一來示前四畫備見臨事好謀詳謹之至巳即語之帥參計議其至明臺必親從節下求啇確也一所諭張虎者使臺既聞其可用必詳審之矣但其人為言路所劾朝旨押下雍管自效本司若只求之桂閫恐桂閫亦必以申取朝旨為辭且桂閫若知其人可用彼必自取而用之亦應未必肯以與我也但得其能辨此賊則州來在吳猶在楚正不必付王環衛也更惟髙明裁之一行師之道亦須任事者擇利而行當令就節下決所嚮一抽併桂路分一項軍人付王環衛此具見使司欲使歸一之意却亦須王環衛至使司熟議然後聽使司處分一髙節一項三百人前此係聽使司調用亦合更俟王環衛議之惟使司所處分右報如前其詳巳共帥參計議籌之當以靣控也萬里糊塗畫鴉不宜載之於櫝輒次第所為對口占以授贊此筆者膚率必在所恕也萬里十月二十二日一二十一日宇文帥參王環衛至衡是日留議軍事至三鼓而别二十二日早軍巳行一前此奉大閫之命調戍寨兵四項共二百人令本司擇將本司遂差杜通判督捕桂路分總統此一時也今則大閫調兵千人輟元僚貴將以行與廣兵大為掎角此又一時也以事體論之所合抽回桂路分盡以其兵屬王環衛又須令杜通判解督捕職事盡以軍務屬之宇文帥參庶幾事權盡屬大閫司存不過奉行旨揮每事無所專輒此則尊大閫之體也而宇文丈之來傳諭鈞意與其所以自處一切欲使其與聞某以職事而言則盜賊正屬司存固自無以諉其責但當如廣西章憲之所以自處者章憲但為其憲司之所能為若軍事皆是經閫任之章不與知也今某自有章憲樣子豈敢事事干與犯僣越之誅而宇文丈堅謂長沙去山前迢遞報應不免遲緩恐誤事機必欲凡事從本司豫決行又謂鈞意所望正如此某舊出門墻先生待某如子弟某事先生如父師今不自意以一節趍走閫部之內適門戶間有酹應以子弟自命則所當為父師代勞豈所敢辭者然事固有輕重大小難於槩言今巳與宇文丈斷應山前文字申到本司在某可以豫決不犯專輒者某徑自區處報山前却申大閫照會其有非司存所得擅處者則取鈞筆旨揮如此不失門墻奔走之誼又不失大閫崇重之體所有靣與宇文丈講論數項今一一乞鈞旨速作施行一桂路分巳牒報從王環衛調用乞作批牌鈞判更劄付桂路分照應庶一切出於閫命而後事體歸一桂文政只是衡州路分名位尚小鈞判中或加一權攝名色在路分向上者以寵之蓋既減其實姑華其名鼓舞之術也一宇文丈自謂以客軍深入實不知地分賊情苦不容本司解杜通判督捕職事以為杜文任事數月講切諳熟今日正要資其用欲以同督捕處之又道州錢糧倍費支吾山前若有不繼立見利害須得一人通融於其間則杜通判其人也此説亦甚有理欲乞徑作批牌鈞判令杜通判充同督捕職事兼督發錢糧官却望鈞筆褒拂數旬庶其樂於趍事赴功此一大節奏也一近日道州只供億戍寨二百人錢糧巳自斷續可憂今驟添千餘人劵食支遣小郡氣力何以堪之若不念其痛癢先與區處將來必坐困乏關係不細昨得倉漕書亦閔然及此不知還可申明朝廷於苗糴內作一道理否先生寫與都堂必無不從乞鈞照一山前事體重大臨機喝犒為費不資恨司存寡薄不能出氣力問之宇文丈所携似少宇文丈子細應非妄費者望更那融發下若干就山前凖備若無所於用仍是庫中之物宇文丈於此甚以為憂而不敢請軍無財士不來軍無賞士不往勝負之微權所係某不敢不備言之取鈞旨一應山前事宜凡可以助臨事好謀之槩悉從大帥參環衛亹亹道之不必以瀆鈞聽者皆不布於此乞鈞照大使司回十月二十九報二十二所批教者畫一如後一勦暴除凶固在兵力之強尤在心力之一前此或招或捕議論未一故使此賊得延旦夕之命今既一於討矣所謂選將調兵餽糧本司當思一一措置但司存於山前逺而使臺為近周匝體探量度應酹惟使司協一是望來示以廣西經憲為比非所願聞鄭丙為廣西憲激厲流人世堅立功贖罪卒擒劇賊章憲果以是為心前所謂張虎者豈不能率以自效往往南窗不以是勉章憲耳萬里舊見胡致堂與張紫巖書云永明之冦未平桂郴之盜方作帥司兵力不支憲司計無從出未嘗不嘆當時既不強於力又不一於謀致使鼠輩猖獗今官軍氣勢巳合我輩心事素孚崇臺可徑豫決者毋以迹嫌本司所合施行者却望賜報庶不致久以賊貽中朝之憂幸甚一杜通判桂路分各以處之兼職見之公移矣師克在和更望嚴賜勉勵總統不總統均是要立功督捕同督捕均是要敵愾宇文參議及王環衛之行也萬里嘗以是語之矣一道州錢糧前已申到巳劄令其於有係官錢內那融應副却與備申朝省出豁又考之前比例係是運司措辦并告之公朝其申檢亦巳見之公移矣一宇文總督所携備用錢特司存遣兵之舊比政恐支遣未敷見議措置樁管俟其申到便與科撥也一山前事宜凡有可以運掉扶植者切望徑自行下總督司等是王事等是僚屬政不必以本司差官為礙餘有誨日拱俟垂示萬里十一月𥘉五日一當來廣西止有秦孟四一火賊只因稽於勦捕致上下相挺於是遍昭賀境皆冦今據山前連日所申則秦孟四巳遁杳不知其蹤迹如近日廣西所報禽毛丫頭唐督捕所約夾攻倪崇七桂路分所申打扶靈源寨皆枝葉去處而渠魁則失之矣某前嘗畫稟以此冦必祖故智逃散今乃果然重兵為錢糧所牽無持久之理班師則禍本仍存頓兵則吾力不繼此事大欠結束今宇文帥參王環衛兵此時方至山前且看申來如何一秦冦實未易驅除若下得細密工夫千百人亦可取若只持堂堂之陳則髙飛逺舉無如之何今廣西既失了秦賊看來諸軍逢一賊村便打遇一賊寨便攻此等相挺脅從却使得招諭前日之所謂招諭乃是姑息之政若兵臨其境告以禍福使降宜有必下之理此時若憤招安之非䇿只一槩殺去却又欠斟酌主其事在廣西本路又不得而專大閫以為如何一本路所仇者秦冦耳今兵入廣之後秦不可蹤迹於是亦不免到一處攻一處恐壞生靈過多而失吾尋仇於秦賊之意草間狐兔無盡滅之理大要只當去其渠既失其渠所在而專泛及於其他心甚念之大閫何以處此一廣西備白劄子所陳牒報本路全州有鹽田洞秦小九窟穴在其中此事誠有之陳巡檢者與賊通此則未必可信訪聞此洞形如葫廬前尖後濶所以秦小九入而據之蓋以其地形險巧故寄迹於其間而前後則不擾全州之境賊不欲召兵意將以自存也今亦安知秦孟四不竄其間但其地既有一夫當關萬夫莫前之勢未容輕於進攻須以術而後可破之前日見王環衛申將來乘破竹之勢一掃空之詞氣若容易然凡言語輕率便有取敗之道當一靣報山前子細調用仍與全州土人密議措置若不甚煩兵力尤為上上䇿也伏乞鈞照大使司回十一月𥘉七日領十一月𥘉五日所批曆備悉本司去山前逺不若使司去差近所報當得其實一行出師皆難坐籌隃制向巳申諭帥參及王環衛在行者遇機應變先申使司一聽行下若一一從本司施行則不貴巧遲矣王事一家政不必以形迹拘也嗣有當從啇確者即垂示如前所批則高明自了了矣萬里冗不及親染十一月十八日一秦冦竟無蹤迹分曉公文中或曰在大明村小明村或曰在大花山或曰在螺溪源南上坪或曰在南團平山白石山腳其説不一巳難信慿今得王總統報直謂二十餘日秦孟四全無風路則兩路用兵以來此賊之出沒可謂神矣大槩平賊全要地腳土兵之謂也今本路以客軍望望而前固巳失之廣西為地主而全無地人問探雖東兵甚多要亦徒孟浪耳某前嘗采之南士皆謂秦賊狡猾詭祕之甚見吾強則避之知吾弱則乘之固嘗畫一塵徹鈞聽矣今果出避他所則日下工夫止當探實秦孟四所在然後可言進討不然泛泛而往果何所為廣西牒報謂湖南兵不當越界深入止宜在兩界上伺俟會合殆有所激而云今巳報山前且回兵駐泊湖南界上一靣遣人關會唐督捕探問秦孟四所閃著實若秦賊有的所唐倅有密約方可鼓行而前緣兵在昭賀境內則糧運在路亦不無憂虞偶或為賊所梗立見狼狽是以回師界上乃十分持重之舉亦巳語之僉舍載之公文當必先徹鈞覽不免專輒仰乞鈞察一廣西昨報本路義丁生事可畏遇人則殺遇屋則燒遇財則搶此輩素不知紀律所至殘賊可惡巳行下杜督捕桂路分嚴與禁戢今續得廣牒以義丁越界深入肆行劫殺大不可令衆庶見只得抽回緣昨來桂路分𥘉遣之時止有二百兵故須義丁為助今使閫調兵既多則亦不須此輩吾運掉自有餘故抽回義丁者所以隨時取中也伏乞鈞照一扶靈源打寨之舉頓覺泛泛當來本路止於問罪秦賊朝廷旨揮所討亦秦賊耳諸軍在扶靈源枉費辛苦一畨可謂失本旨是役也王總統申來是一説桂路分申來是一説見之宇文帥參點對二將覺巳微不和又義丁乃桂路分所彈壓而廣西纍有云云今既抽回義丁則桂路分亦不當更任事巳别作稟議名色喚桂路分赴司而其本兵則令戍將髙成統之一則二將若果不和末流必費處置不若解於其微一則以其不能鈐轄義丁即奪其職亦御諸將之微權也伏乞鈞照一道州供億委有可憂緣自七月以來郡中巳極其剗刷至近日覺運幹之術漸窮雖曰於有管錢米內通融支遣然苗糴亦自無多此豈可動不得巳盡指凖為劵米亦無可繼之䇿若劵錢一項一日須三百千則十日三千緡其何所措畫而可徐守不幸末路當自重擔秋冬間無日不病此月十二日忽至大故雖有數行焉而其困於憂勞亦云至矣甚可痛念今幸而王守巳來數數過從欲脫而去之前日得其肯往約二十四日可交事忽得徐守訃山前生劵間斷中間新守未到巳前有數日無官主張於是亟差教授護印而以十日軍劵責都副吏以私財應副違從軍制此從權甚不得巳之行移也今既抽回義丁約千人既可為道州解小半支吾然尚有千四五百兵留竟上軍劵不可謂少頃刻不容稽違方來者亦不知所措使閫雖申朝廷從運司應辦然旨揮遲速未可必今合有救急之䇿不全仰於道州若因循處之則道州必有一日乏絶誤事此時噬臍何濟於難此最關係幸先生深入思慮亟謀所以救此某不勝拳拳一全州鹽田洞為秦小九所據其洞地形險絶未易以兵力取昨王總統申來云俟回軍掃清言之甚易某殊未以為然今得宇文帥參公文果亦訝其輕發山前得宇文丈以審重持之亦大濟事此洞中百姓皆耕他人之田田主皆在洞外秦小九不過寄巢其間洞民元不隨從之為冦儘可從土人上作工夫某近巳得一全州土豪與之計事巳畫為三説或誘或逐或擒於中忽濟焉則禍本拔矣柯倅赴全州迂道來訪巳悉計授之若不動聲色而集事又羅飛之於晏九五也伏乞鈞照大使司回十一月二十日答十八日所批畫于後一秦賊蹤迹兩路皆不得其的大率擒賊無出地腳之説此李訴用李祐取吳元濟之䇿也以地分言之廣西督捕司體探為便此中既出兵會合亦不當專諉其責須是重賞購募土人為之嚮導問探全在軍前審察其人而用之又恐因此反落賊計故不欲見之公移今使司因廣中文移檄回竟上駐劄固便於運餉然若俟廣西的報而後遣兵使其果知秦賊所在則彼欲自取之以為功其肯先聞于我乎回軍竟上以示持重厚募土人以啚進取二説並行計之善者也一廣西所報義丁越界生事恐或有之但此項義丁元與桂路分所部軍參錯在彼不應縱容如此借使桂路分受欺於其黨杜督捕亦豈得全然不知本司頗疑其説故只行下道州密切契勘或謂廣西以我兵既入彼界連日攻打頗獲賊徒又無軍前申説廣將陳明見賊不捕遂為此説不欲本司兵在彼特借義丁騷擾之名併欲退我師耳蓋在彼則自欲飬冦於我則欲害成或出于此今義丁既巳放散固西人之所欲但恐自此脫有緩急再調又難惟髙明審之一道州錢糧切切在念且如軍劵增支一項本司巳行下總督司於隨軍錢內移支但所憂者朝廷科降之命猝未得分曉又撥一項錢赴軍前恐本州或有不繼今總督司與之暫時挨那支遣近又從司存剗刷别項窠名少應本州乏絶以俟朝廷之命方此降遣巳見之公移矣兹承開論敢詳以聞一鹽田洞近見軍前所申欲乘破竹之勢談何容易同官唐書記説鹽田雖號曰洞而實非洞其間多是富人所居今秋亦有領舉者只擒秦小九一人政不須如此鄭重今台諭土豪三説巳得要領矣一永明之冦自廣閫易招安之説為會兵之舉其名甚正且疊承諄諭不容不發兵應之桂去賊近兵又先發更不俟本軍之至故秦賊得以逃散今廣兵遇賊不捕本司軍連日攻打終未得其要領使司檄回境上又抽回桂路分放散義丁而柯倅自徑回舂陵豈逆料此賊為終不可得故示以班師之漸耶重兵屯駐不容越境而問可否之幾須要早決若果不可以月日圖當早議撤戍只慮撤戍之後賊復猖獗則本司有諸處戍寨之例斟酌留兵亦可行也使司去山前稍近事體必所深悉幸細籌之萬里不克親染乞恕十一月二十六日一數日前諸處報來事體襞積一則道州以糧道為苦山前謂昭賀路梗宜寄糧於扶靈源口殊覺未便一則我軍連日或打扶靈源或打申家洞於秦賊不相干而陳亡石損者多恐攻擊不巳或落賊姦非細故也一則義丁不依紀律人衆難於加刑廣西報得既可畏而宇文督軍中來亦云然恐末流猖獗難制一則道州以供億為病覺巳窘束不可當如人數可減亦是為道州略省人數之一端一則王總統與路分所申扶靈源事言語參差見之宇文丈點對覺巳有釁昨與帥參議以髙成易之宜及此時舉行元説所以本司一畨區處事宜欲諸軍駐界上欲義丁且抽回欲桂路分來稟議此一時也纍日不見山前報來繼得曆中鈞批則未以所行為照某退伏自念殊坐專輒方議所以稟承鈞命今得宇文帥參申到則巳提兵越昭賀入靜江之南團與督捕聲迹相聞矣據備𫐠陳忠所報云南團十八村村老陳狀乞免洗蕩自認捉出秦孟四則是秦孟四巳見端的所在村老既認捉出此即鈞諭所謂地腳者却有可望捕獲之期自今我軍如唐督捕之説與廣軍同在南團四路匝住不容透漏以待村老捉其渠魁是機鋒相湊漸有著落此又一時也即巳飛報山前既是唐督捕有明報秦賊有實迹一靣乘機進取矣一義丁昨者抽回為在昭賀境生事且前無秦賊可攻故隨時施宜如此今既同大軍深入靜江見匝住南團賊路則此時亦無緣可以抽回矣巳飛報山前盡從便宜調用如仍前生事作過則照元行放散仍十分丁寧頭目極意鈐束以自贖矣一昨以秦賊無蹤迹檄桂路分赴司稟議靣授方略今髙成暫總本軍不曽明其有過今覺鈞意亦不欲抽回亦巳報桂路分既是山前巳見秦賊蹤迹不妨乘機集事如未離軍不須稟議復往一以前言之秦孟四杳無風路我軍深入真有未便以今日言之村老既認捉出秦孟四我軍又巳得廣回報向前會合獲賊有期班師有漸纍月為此憂窘今才得伸眉耳一杜通判聞徐守之訃篤同官之誼歸理其後事申來云一見新太守即復往山前此時想巳離春陵矣一凖牒報巳借道州二萬芝楮二千石米中流一壼為濟不小昨見道州申來謂山前一日支錢二百貫米百石以此數凖之使閫所借之錢可支七八日所借之米可支二十日今覺歲前此事須可結束姑以歲前約之尚有三十餘日道州儘有米特錢未有從出使閫所申朝廷從運司應辦若早晚便得回降道州尚庶幾焉一鹽田洞之事昨巳靣與柯權郡議以土豪誘之或誘或逐或擒只消得如此措置却未見柯權郡申來容更密叩之一伏凖使閫行下議置寨留屯此乃是湖南防制廣冦之第一䇿聞全道州邉廣去處無歲不避冦大抵兵來則去兵去則來以為苦若建寨更戍有數百人常在界上則廣冦無敢復犯湖南此一勞永定之規模非但禦今日秦冦而巳是議也王判官壵當與董倉漕言之倉漕巳見報會王判官到司巳與靣議見歸道州與王守條畫申來今不待道州有請而使閫計慮巳及之此事甚計緊切不論秦冦巳獲未獲此一舉乃是為湖南永久保障之計公文申折甚詳更在鈞意裁處大使司回二十九日答二十六日所批畫一于後一承報軍前所申事與前日規模又異大率兵難隃度只得隨機應變使十八村村老果能任責束縳渠賊以來則撤戍可期豈非深望度此兩日必有捷報尚快聞之亦須密諭山前所認捉出秦賊者是真秦冦乃可一留屯之議本司固有舊比今詳公移尤為縝密不妨行下道州及宇文總督一靣啇議庶獲賊之後便可摘留兵將伺其回報又從靣審訂之一科撥一事巳嘗三申公朝至今未凖回降見議申催更得使司備道州所申與之申請亦一助也一餘説不殊前稟髙明區畫巳得其當矣萬里别巳專布後先生授將校以計擒秦孟四冦遂平道體堂書文判宣州勸農文太守到郡踰月𬒳命造朝辭允不免且旦夕去矣猶以職事得出郊與爾農父老告語一次因記李參政莊簡公名光曾守此土後有一帖云僕頃守宣州今巳二十八年東望雙溪疊嶂之勝感嘆而巳因見諸父老為祝率勵子弟為士為農仰事俯育為忠為孝戮力以事田疇先時而畢租稅立身揚名以顯父母是所望也李參政去郡巳久尚拳拳於宣人如此今太守與爾父老方此相處遽然去之其拳拳又可知因取李參政之意衍為勸農五詩又别為五詩以寓戒酌酒與爾父老誦之爾父老其以轉語鄉曲子弟能從吾戒而不為惡即能從吾勸而為善矣他日太守在他所遇宣人來必問曰爾父老安否爾農曽從吾勸戒否爾等尚勉􅏧以副太守去後之思第一勸爾勤耕作布種及時休落魄惟有鋤頭不悮人飽食暖衣良快樂第二勸爾行孝弟敬重爺娘比天地前人做樣後人看滴滴相承簷溜水弟三勸爾勤教子有子讀書家道起若還飽暖不知書十萬莊田不禁使弟四勸爾常修善糶米救荒極方便但從心上做隂功管取兒孫多貴顯弟五勸爾了王租莫教人喚作頑都年年早納早收鈔那有公人來呌呼弟一戒爾莫妄狀須知官府難欺誑從來反坐有專條重者徒流輕者杖弟二戒爾莫避役既有田園那避得今朝經漕明朝倉到底費錢又何益弟三戒爾莫拒追擔刀使捧欲何為有事到官猶可説殺人償命悔時遲弟四戒爾莫尤賴故殺子孫罪名大縱逃人禍有天刑害人不得畨自害弟五戒爾莫奪路做賊不休終敗露斬斫徒配此中來能得幾錢受此苦湖南憲司咸淳九年隆冬踈決批牌判本司照朝省指揮見以隆冬委官諸州縣踈決凡情輕當放釋者從所委官逐名點對取判施行其有情理重惡纍經踈決及恩赦不原而手足未經槌折膂力正自精強者與其幽囚於牢柵之中駸尋而死不若驅於極邉𬒳堅執鋭庶幾死中求生此一種人請所委官令項分剔作一狀指實申來以慿喚上赴司審視發往荆蜀淮海古之強兵猛將得之於盜賊髠囚者正自不少此亦推明國家忠厚之一事也取各官遵稟申斷配典吏侯必隆判近世以來天下以吏姦為病士大夫臨事惴惴然惟恐吏之欺巳馭之以束縳事無大小一切以法繩之當職以為不必立的無罪不必尋有罪不必恕為得之矣本司諸吏頗似謹畏從前固有違慢者當職諒其不及每每止於薄懲爾輩非但不敢欺直不忍欺可也侯必隆何為者輒敢於呈押之時脫套花字於行移之後揍掇公文顯然靣謾行其胸臆此非先有無忌憚之心而後動於惡乎送之有司自稱為無他情弊殊不思情莫惡於脫套弊莫大於揍掇豈必計囑取受而後謂之情弊哉看來此吏於諸吏中頗機警而膽最大以小人之小有才不施之於奉公而施之於罔上若以姑息行之留此人在案中將來必為司存無窮之蠧矧所犯關係臺綱雖欲恕之不可得也侯必隆決脊杖十五刺配千里州軍本當更捶碎右指以為箝𥿄尾作弊者之戒姑以贓狀未明特免斷訖長枷臺前五日押發仍榜委僉幕審問楊小三死事批牌判使職一日斷一辟事今日看楊小三身死一欵看頗不入不能無疑一則當來無大緊要驟有謀殺似不近人情二則殺人無證只據三人自説取安知不是揑合三則捉發之𥘉乃因楊小三揣摩而訴三名何為三名恰皆是凶身似不入官信今文字巳圎只爭一行字則死者配者一成而不可變矣今仰僉廳一看此欵盡夜入獄喚三名一問若問得果無翻異明日便斷如囚口有不然只得又就此上平反文字是密封來忽然而往人所不覺則囚口得矣平反楊小三死事判律諸謀殺人巳殺者斬從而加功者絞又律故殺人者斬又律諸同謀共毆傷人者各以下手重者為重罪元謀減一等從者又減一等至死者隨所因為重罪今楊小三之死也施念一捽其胸塞其口顔小三斧其脅羅小六擊共吭其慘甚矣再三差官審究則三人者於楊小三元無深忿特其積怨之深欲伺其間而共捶打之則謂之同謀其毆至死宜不在謀殺之例顔小三者施斧於脅肋之間為致命是下手重者也然其不用斧之鋒而止以斧腦行打是殆非甚有殺心者羅小六雖不加之以縊楊小三亦必以肋斷致死然始也謀毆之終也遂縊之是其心處以必死非獨下手重而巳是故以下手論之顔小三之先傷要害當得重罪以誅心論之羅小六獨坐故殺不止加功準法皆當處死以該咸淳八年明禋霈恩特引貸命顔小三羅小六各決脊杖二十刺配廣南逺惡州軍施念一於同謀為元謀於下手為從合減一等決脊杖七十刺配千里州軍牒州照斷訖申門示茶陵周上舍為訴劉權縣事判孟子曰有人於此其待我以橫逆則君子必自反也我必不仁也必無禮也此物奚宜至哉此君子處巳法度也子曰居是邦也事其大夫之賢者子貢曰禮居是邦不非其大夫此君子居鄉法度也今茶陵劉權縣申周監稅父子為豪強把持且謂不法不可枚舉必非無故而為之辭者使周監稅父子果善人也則曰我無是事何恤人言閉門逺嫌人誰得以瞷我如此則處巳居鄉皆得之矣今因權縣所申周上舍不勝其忿訐其短以相攻擊一則曰劉某二則曰劉某自反之君子肯然乎不非其大夫當如是乎抑大學曰有諸巳而後求諸人無諸巳而後非諸人併備詞帖劉權縣果如所訴則宜盡與改更布過失於境內洗手以勤公砥行以為如此而盜賊不畏威豪強不屏迹吾不信也仍門示周上舍宜知自愛文山先生全集卷之十二終
