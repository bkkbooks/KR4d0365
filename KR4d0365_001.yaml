front:
  text: 文山先生全集卷之一文集
  hash: sha256:83bb52013fc130765dae5bc323ae788ef3596d41c9736ca9e395fd361cbc88c3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_001-1a}
body:
  text: 詩次鹿鳴宴詩時提舉知郡李愛梅迪舉送弟璧同薦禮樂皇皇使者行光華分似及鄉英貞元虎榜雖聯捷司隸龍門幸綴名二宋高科猶易事兩蘇清節乃真榮囊書自負應如此肯遜當年禰正平集英殿賜進士及第恭謝詩於皇天子自乘龍三十三年此道中悠逺直參天地化升平奚羡帝王功但堅聖志持常久須使生民見泰通第一臚傳新渥重報恩惟有厲清忠御賜瓊林宴恭和詩壬戌以祕書省官南宴奉詔新彈入仕冠重來軒陛望天顔雲呈五色符旗蓋露立千官雜珮環燕席巧臨牛女節鸞章光映璧奎間獻詩陳雅愚臣事况見賡歌氣象還明堂慶成恭進詩於皇藝祖德乘乾聖主宣光奕葉前運再庚申皇建極祀同癸亥數參天中嚴外辨三千禮纍洽重熙四十年願贊帝心長對越至忱功用貫垓埏敬和道山堂慶瞻御書韻墨灑天奎映籕紅斯堂殿閣與俱隆方壼圓嶠神仙宅溫洛榮河造化工列聖文章千載重諸孫聲氣一時同著庭更有邦人筆稽首承休學二忠著作之庭乃胡忠簡公書周文忠公立次韻劉左司前以著作郎主祕書省營繕事時落成適潘祕丞得郡檇李并餞行有詩蓬壼日月四時春金碧新來絢帝宸爼豆幸陪麟省雋衣冠中有虎符新詩餘和氣生談麈坐久風光入醉茵多謝蘭臺舊盟主好歸群玉領儒珍祕省再會次韻蓬萊春宴聚文星多荷君恩錫百朋四座衣冠陪賀監一時梁棟盛吳興圗書光動青藜杖人物溫如古玉升好是水天新境界螢窗容我種金燈古玉升見隋律曆志送曹大著知廣德軍暫屈瀛洲客來臨汭水民山川歸史記嶽牧屬詞人館舍朋簮舊都門祖帳新儒林官可紀何止吏稱循贈祕書王監丞君不見祕書外監賀放翁鏡湖一曲高清風又不見太子師傳兩疏氏東門祖帳羅群公人生晚節良不易頽波直下誰障東使人知有在我者二三君子為有功我公金華山下住赤松安期白雲處風骨細瘦真神仙急流勇退不肯顧我昔山中想風采幾回擊節歸田疏適來追陪水蒼佩親見辭歸白雲路御筆擢公領蓬山師表玉立東宫官兩年苦口一去字未許鷗鷺從公間瑶池深深鎖䇿府玉皇宫闕僑其間暫分赤符管下界半空雲氣常往還多少持麾辭上國悠悠風塵見此客莫作尋常太守看疏賀以來偉人物夜瞻婺女次舍中一點光明射南極公歸眠食重調護世道尚憑公氣力贈莆陽卓大著順寧精舍三十韻人生天地間一死非細事識破此條貫八九分地位趙岐圖壽藏杜牧擬墓志祭文潛自撰荷􅓩伶常醉此等蛻浮生見解巳不易齊物逍遙遊大抵蒙莊意聖門有大法學者必孔自知生未了了未到知死地原始則返終終始本一致後來得西銘精藴彂洙泗吾體天地塞吾氣天地帥一節非踐形終身莫繼志舜功禹顧養參全頴錫類伯竒令無違申生恭不二聖賢當其生無日不惴惴彼豈不大觀何苦勤興寐吾順苟不虧吾寧始無愧人而有所沗曠達未足智卓哉居士翁方心不姿媚蒙讒以去國七年無怨懟風雨三間茅松楸接蒼翠斯丘亦樂哉未老先位置宇宙如許大豈以為敝屣當其歸去來致命聊自遂天之生賢才初意豈無為民胞物同與何莫非巳纍君方仕于朝名高貴所萃乾坤父母身方來日川至西銘一篇書順事為大義請君觀我生姑置末四字送卓大著知漳州蓬山隔風雨藝觀司陽秋厭作承明直出為漳浦遊問俗便桑梓過家拜松楸錦堂事相儷棠舍隂易留何來瀾蠡間何物輒負舟翻覆十年事行止隨坎流倘來豈不再遲取終無尤太守執此往邦人庶其瘳昔豫援西銘期子以前修願覿弘濟學四海放一舟陸氏登三閣源明出一麾清聲光漳浦便道拜長基赤子歌來暮同寅賦去思西銘功用大佇驗順寧詩大陸登三閣源明出一麾臨軒親䇿後上冡過家時秋色吳山外春風漳水涯斯文交獨厚羌賦送行詩此𥘉詩也不及用今附見此和蕭安撫平林送行韻逢辰字應父樞密檢詳江西安撫得失元來付塞翁何心桃李問東風人皆有喜榮三仕我尚無文謝五窮祕苑固知朋可正畏途猶恐甲方衷欲酬長者殷勤祝坎止流行學四忠和朱衡守約山韻渙字行父大理寺丞昔人一出正朋字今我慚非行祕書人樣相看願元祐詩章甚雅突黃初競言汲戇猶須復或謂顔愚亦可如把酒對花姑勿論春行後長莫妨徐題玄潭觀雪浪閣用誠齋韻棄官學道勾山許學到至人本無怒赤子􅋾􅋾如魚頭不堪妖孽腥上流鉗鍵長潭鐡樹立摩挲穹石寶劍濕當時豈忍如是觀毒流不可開眼看英風凛凛萬古寒玄潭觀和龔宰韻晉代何曽谷此陵到今樓觀隱居亭幻成鷗鷺乾坤闊陶盡魚龍雲水腥仙有神功參造化人將故事入丹青我來欲去長橋孽祠下徘徊夜乞靈送朱制幹象祖一官聲漫任如何屢疏箋天氣不磨宋祚萬年陳大計周圖五字訂前訛重尋范老憂時箸旁竪文公衛道戈投匭近年殊不少有人説似此君麼送三山林溶孫歸省束書遊京師孤雲瞻太行辭歸慕何蕃捨養殊歐陽山林乾坤靜菽水日月長好味諸公詩勝讀寒泉章京城借永福寺漆臺口占似王城山名孟孫字長翁後太常丞心如明鏡臺此言出浮屠後來彂精義并謂此臺無此臺巳是贅何况形而器圓釋正超然點頭會意思多謝城山翁一語迎禪鋒顧我塵俗人與物方溶溶景定壬戌司戶弟生日有感賦詩夏中與秋仲兄弟客京華椒柏同歡賀萍蓬可歎嗟孤雲在何處明歲却誰家料想親幃喜中堂自點茶梅梅花耐寒白如玉干涉春風紅更黃若為司花示薄罰到底不能磨滅香香者梅之氣白者梅之質以為香不香鼻孔有通窒我有天者在一白自不易古人重伐木惟恐變顔色大雅久不作此道豈常息詩翁言外意不能磨滅白暑布送王廷舉用蕭敬夫韻平生涼薄資埏陶誤大窑誰知此石怪愈沃乃愈焦昆崘織火鼠頓易鶉衣飄榮我絲蘿附免此蒲柳凋服之雪漫白長𬒮風搖搖表之以霧縠緣之以煙綃振衣從姬滿佩玉遊西瑶髙人不煙火跳出天地窰掀然立千仞塊視金與焦香𬒮拂雪冷紫髯逐風飄摩挲雲冥樹豈隨群卉凋但知仙骨輕不學倒影搖人間盡描貌妙不在生綃揭斗斟天漿霞衣却瓊瑶題陳國秀小園席地自乾坤半樹閲今古池館豈不寬每換壯丹主園公非隴傭獨捎占春風弄影不在多臭香知乃翁長鶴展輕翮逺棲松桂林故宇入清夢盤盤亦苦心中林風月賖十畝團幽隂林下有竒士繞樹從之吟題靜山地得一以寧凝然者卷石嵁巗及培塿異形不異質古之能定者悟此為一極春榮秋以悴一嵗百態出鳥鳴花落句此意誰與詰所以尼丘人仁智不廢一萬象此緯經死灰彼何物明彂此乎遊參入觀水術贈拆字嗅衣相士水火坎離紫陽怪滑波皮骨長坡駭解州得解解中膠費家封鋪同一解吟字從金詩反窮貝何為分田何同黃絹幼婦我自樂竹犬多事鴉鶴翁阿英薰蒸透肌理不潔未蒙好西子芙蓉浪中薔薇水蘇合蜣蜋忘彼巳馬嵬新襪釣新月腥臊千年天地裂是間曽著鼻孔麼梅香竇臭無如何贈閭丘相士急流勇退識真臞昔有麻衣撥地爐我亦愛君雲水趣莫言雷雨趄江湖言余遇水則發故云贈神目相士道茂數遁甲長房得役鬼風鑑麻衣仙地理青烏子擇術患不精精義本無二竒哉夢筆生熊魚掩前氏贈鏡湖相士五月五日揚子江心水鑄作道人雙睡子吾面碟子大安用鏡照二百里贈秋月葉相士急流勇退神仙跛蹩龍鐘將相借問華山山中何似天津橋上贈曽蘭谷相士許負眼禰衡口巧言甘莠言醜贈月洲相士月洲月眼閲人多且道西州事若何朱紫貴人皆好命不知中有孔明麼贈劉矮跛相士鍊石為形鏗金為音世方好圓癡守方心隂陽絪緼人一氣質善惡之微證于聲色意所欲發雖吾不知彼美子劉洞其先幾骯髒難合今世道病如子所言生稟巳定戅夫勇士往往一偏以視妾婦豈不猶賢洪範得三二曰剛克會其歸其好是正直學問工夫氣質用微汝能觀形安知其餘子術巳定吾情巳成子執子術吾安吾情媻姍三尺軀舉止如不揚瞻視照肝膽音吐何琅琅君看水中鳬不及鶴脛長昔聞夔憐蚿未聞一足僵萬物各自適形色安足量子言良有理與子持酒漿贈梅谷相士當年壽陽額春風點顔色後來廣平腸氷雪峙氣骨世人識花靣識花還自淺花有歲寒心清貞堅百鋉君家在梅谷自詭知梅熟須得花性情不假花頭目莫説和羔事花𬒳和羔纍突兀煙水村我梅自林氏贈碧眼相士蒼蒼垂天雲靈照行下土秋江浸草木魚􅡉歷可數眉山老麻衣偷入此阿堵色界只點頭從人道吾瞽贈鏡齋徐相士鄒忌不如徐公美引鏡自窺得真是門下食客才有求昏昏便與妻妾比徐家耳孫却不然自名一鏡京師市世人無用看青銅此君雙眼明秋水君以無求遊公卿勿令此鏡生瑕滓堞子太面何難知從今光照二百里贈鑑湖相士瘦竹凌風弄碧漪山光雲影共熹微月黃昏裏踈枝外認取半天孤鶴飛贈趙神眼一絛一褐髯如鐡神為秋水眼為月欲從壼子􅟪三機劍首終然吹一吷贈桂巖楊相士榮悴紛粉未可期夕多未振巳朝披得剛難免於今世行好須看有驗時萱晝堂前惟有母槐隂庭下豈無兒好官要做無難做身後生前是兩岥宣州罷任再贈貧賤元無富貴思泥塗滑滑總危機世無徐庶不如卧見到淵明便合歸流落丹心天肯未峥嶸青眼古來稀西風為語巖前桂若更多言却又非贑州再贈此别重逢又幾時贈君此是第三詩衆人皆醉從教酒獨我無爭且看棋凡事誰能隨物競此心只要有天知自知自有天知得切莫逢人説項斯贈彭别峯太極數手把先天巳後書當來一畫本全無白雲山下泠泠水自在人間太極圖贈黃生銀河數乘槎人從天上來天上知有君平術黃生能談君平書不知曽認支機石贈楊樵隱應炎談命莘郊一介堯舜君民薇山二難百世忠清富春耕叟涕洟雲臺終南遁士仕宦梯媒是數公者俱以隱名木石一迹霄淵異情九華山人賣樵江湖請算世間幾種樵夫贈葉大明大明標榜葉氏子自稱後村門下士誤言木吉孛為災後村曽發一笑來其師流傳説如此寧知禍福乃不爾犀腰貂首徒勞人甘藜豢藿無苦辛我生有命殊六六木孛循環相起伏袖中莫出將相圖盡洗舊學讀吾書贈舒片雲麻源謫仙人噓呵成隂陽向來懷袖間冉冉天孫裳一夕大雷電六丁下取將仙人乘風來帝鄉乂從膚寸起飛揚仙術亦如此天機神翕張有時行渾天周遊十三萬里強往來仙馭不可韁正恐問命人望氣蓬萊隔渺茫贈彭神機挽強二石徒碌碌學到穿楊精藝熟百發百中無虛弦百中一跌前功辱彭君絶識透黃間不師逢弄師珞琭天度三百六十強一算不容失正鵠吾聞天機難語人往來了了拈衆鏃君姑藏用疑於神矢口莫輕談禍福贈劉忠朴楹何為折劍何借鬚肯為拂糞肯嘗馬公布衾王公飯石家錦障丁家香忠邪倿邪兩無定一雕一璞異其性忠朴先生躔法高古今四者豈關命五九六餘能善惡鐡算不是并州錯便從忠朴問如今忠果誰忠朴誰朴贈金稱我有一叢籬下花黃金滿眼無人拾夜看璇璣度玉衡猿啼雨外青山濕贈余月心五首月之所在謂之身朝市山林幾樣人靜看一輪如此潔莫將身著軟紅塵我生之辰月宿斗如何謗譽由箕口月明只合醒眼看斗亦何須挹漿酒月比於人歷世多才圓又缺幾消磨只因受用長生藥嗟爾死蛙如月何一種黃州月曹蘇善惡幾吾磯連月釣此月是邪非子心月其明子術星之數為月詰衆星不知何以故贈塗內明老云五色令人育靣壁不視佛慧生彼皆去眼絶人偽孰知塗者出天成有口能談貴人命有耳能聽貴人聲此中一片光明藏嗜欲淺處天機深贈一壼天李日者汝南市人眼壼小天地大誰知賣藥翁壼寬天地隘李君血肉身大化中一芥天度三百餘滿腔粲蓍蔡仙翁以過謫長房以術敗造化多漏泄鬼神爭訝怪君歸視斯壼口匏深覆蓋得錢且沽酒日晚便罷賣贈蕭巽齋未有大撓書先有伏羲易古人尚卜筮今人信命術八卦與五行皆自河圗出易中元有命道一萬事畢卦義六十四蕭君得其一江湖旅瑣瑣談命以巽入人情愛委曲喉舌嫌棘棘言言依忠孝君平意未失我生獨骯髒動取無妄疾是有命流行誰隕復誰詘安能從兒女朝夕談昵昵若卦有人買不妨君賣直贈曽一軒磨蝎之宫星見斗簸之揚之箕有口昌黎安身坡立命謗毀平生無不有我有斗度限所經適然天尾來臨丑雖非終身事干涉一年貝錦紛雜糅吾家祿書成巨編往往日者迷幾先惟有一軒曽正德其説巳在前五年隂陽造化蕩晝夜世間利鈍非偶然未來不必更臆度我自存我謂之天贈龔豫軒數術挾策考休徴巫甘邁何追君亦布靈草乃復探其微載觀河洛書今也休明時天高鳳鳥翔擊拊遨以嬉贈剋擇徐吉甫東望會稽山穆陵鬱岧嶤卜壤藏劍履伯也昭其勞昔者遊仙人龍耳致君王君家世其傳芳踵疇可量青囊落君手辨語如流河尋雲履高阜湯湯俯長波朔風渺天垂萬里草離離安得結方軌為君起遐思贈魏山人君不見而家直臣犯天怒身死未寒碑巳仆又不見而家處士承天渥閉門水竹以自樂雲仍妙參曽揚訣謂余地宅誰優劣小煩穩作子午針靈於巳則靈於人贈老菴廖希説短屐平生幾兩穿錦囊真得當家傳山中老去稱菴主天上將來説地仙靣皺不妨筋骨健舌存何必齒牙全金精深處苓堪飯更住人間八百年彭通伯衛和堂理身如理國用藥如用兵人能保天和於身為太平外邪姦其間甚於寇搶攘守護一不謹乘間敵益勍古有黃帝書猶今六韜經悍夫命雄喙仁將資參苓羽衣為其徒識破隂陽爭指授别生死錚然震能名道家攝鉛汞膚腠如重扃到頭關鍵密六氣無敢嬰君方建旗鼓不敢走且驚他時櫜吾弓閉門讀黃庭贈適菴丹士本是儒家子學為方外事此身恨鳬短有意求蟬蛻猶留鼎餘藥還授人間世從君卧山中共談弘景祕贈劉可軒寫真燕頷鳶肩都易寫從前只道點睛難近來阿堵君休問燈下時將頰影看慧和尚三絶畫我郎潛先帝時而今白髮漸參差若交傳入都人眼疑汝前身妙善師傳神風雪衡山涕滿膺懶殘不管自家身殷勤撥火分煨芋却有工夫到别人相花光老矣墨婆娑無賴梅花一白何為問西來宗旨道世間色相是空麼畫象奕各有等級四絶品四人高下螳臂初來攫晚蟬那知黃雀沫饞涎王孫挾彈無人處一夜雕盤薦玳筵右一為周子善言蕭耕山能勝二劉不覺敗於子善子善敗於我射虎將軍髮欲枯茫茫沙草正迷途小兒謾取封候去還是平陽公主奴右二為耕山言老夫敗於子善也坐踞河南百戰雄少年飛槊健如龍世間只畏兩人在上有高公下慕容右三為劉淵伯言所畏者惟吾與子善擊柱論功不忍看築壇刑馬誓河山當年絳灌知何似只在春秋魯衛間右四為劉定伯言與淵伯上下也贈樂軒彭善之吾家小黃溪其間石甚巨可寫歸來辭可刻盤谷序晉唐文章手誰敢以自負異時此重來煩君作玉筯贈墨林曹大嵩巍峩幼婦碑伶俜七步詩又得墨林墨淋漓湊作曹家三絶竒贈刋圗書蕭文彬蒼籕書法祖斯氷篆家豪昔人鋒在筆今子鋒在刀收功棠溪金不禮中山毛囊錐脫頴出鐫崖齊天高題周山甫錦繡假客從西北來遺我錦繡假上有雙鳯凰文彩何燦燦置之篋笥中歲月亦巳晏天孫顧七襄雷電下河漢鳳凰忽飛去遽然失把玩貧家機杼寒秋蟲助豫嘆題梅尉詩軸乃翁聖俞君瑰辭燦琳琅吾鄉歐陽子逸韻諧宫啇人物雄中原園囿盛洛陽醲郁追皇風詭怪抑晚唐雲仍四方志生長百戰場憂國杜少陵感興陳子昻我亦青原人君遺明月光掩卷不能和握手談肝腸贈羅雪崖樵青蕭蕭山下人閉門衣裘單春心動溪谷曉起捫松看題得魚集史評男兒生作事豪傑死留名天運常相禪江流自不平百年多險夢千古有間評諸父淵源在吾猶及老成題彭小林詩稿其父號雅林晚識宗文憶浣花刪餘今見雅名家牙籖料理西風讀共笑鍾山説老鴉題王聲甫松坡樵苦唱後倚柯睨蒼髯短簑挾風雨談道誰我知對奕者其侣狂吟發悲調谷鳴相律吕扊扅豈不怨寧售大夫股長鑱斸仙苓穫薪為吾煮題毛霆甫詩集雲澗美毛霆甫詩也英英白雲在澗之濆彼美人兮其德孔純英英白雲在澗之阿彼美人兮其思孔多白雲英英澗水泱泱彼美人兮碩大且昌雲澗三章章四句送趙王賔三首風流不比賀家狂瀟灑黃冠意更長自有武夷溪九曲鑑湖何必問君王蕭然𬒳褐不求知歸倚溪船理釣絲却笑荆山空自售未應有智不如葵懶從原上訪桃花又不青門去種瓜傳得神仙蟬蛻法君如覔我問煙霞又送前人琴棋書畫四首不知甲子定何年題滿柴桑日醉眠意不在言君解否壁間琴本是無絃琴我愛啇山茹紫芝逍遙勝似橘中時紛紛玄白方龍戰世事從他一局棋棋蔡雍去後右軍死誰是風流入品題只少蛟龍大師字至今風骨在浯溪書欲覔龍眠舊時事相傳此本世間無黃金不買昭君本只買嚴陵歸釣圖畫題延真羅道士玉澗雙巖夾方流知有至妙藴山石發清暉草木得餘潤泉源皆寶氣樵牧駭潛蜃仙翁獨危坐華池養水性神澤溫而栗骨峭老益徑苔磯枕泓碧時有魚出聽糜瓊飯潺湲沖淡意無朕聽羅道士琴斷崖千仞碧下有寒泉落道人揮絲桐清風轉寥廓飄飄襟𬒮舉氷紈不禁薄紫煙護丹霞雙舞天外鶴吾聞泗濵磬暗含角與徴又聞天樂泉淨洗筝笛耳如何碧一泓乃此并二美藍田滄海意請問玉溪子間居和雲屋道士一樽共此時心文字追隨落醉吟仙子樓臺修竹外行人冠蓋畫橋隂一年芳草東風老五月空江夜雨深且作蘭亭歡喜集更論誰後又誰今遊集靈觀時奉祠祿小洞煙霞國重陽風雨秋歐公嵩嶽步朱子武夷舟香火真吾識觥籌且此遊龍山馬臺事粳粃舊王候題疑祥觀前路風塵走且僵我來一日此徜徉歐公自是遊嵩觀迂叟原非過太行始信神仙還有國不知蠻觸是何鄉世間如此紛紛者贏得山林作道場遊青源二首鍾魚間日月竹樹老風煙一徑溪聲滿四山天影圓無言都是趣有想便成緣夢破啼猿雨開元六百年空庭橫螮蝀斷碣偃龍蛇活火參禪筍真泉透佛茶晚鍾何處雨春水滿城花夜影燈前客江西七祖家題碧落堂知瑞州日大厦新成燕雀歡與君聊此共清間地居一郡樓臺上人在半空煙雨間修復盡還今宇宙感傷猶記舊江山近來又報秋風緊頗覺憂時鬢欲斑和龔使君韻名琦知瑞州日淡和心事葛天民回首歸來清渭濵長倩君賔孫子行道原義仲輩流人一生受用忘非是萬事升沉等故新近日貞元朝士少蒲輪有命出楓宸餞新班弟送君天上去當戶理瑶琴萬里白鷗逺千山黃葉深江空行路影日暮倚門心若見西湖雪霸橋人正吟别弟赴新昌十載從遊久諸公講切精天淵分理欲內外一知行立政須規範修身是法程對床小疏隔戀戀弟兄情和韻送逸軒劉民章庚午科名子俊少日屠龍事巳勞送人千里發江濤蓬萊地近風方細閭闔門開日正髙春裏看花須款款雨中剪韭且陶陶金吾巳辦長安月雙鳯扶雲立海鰲題宣州疊嶂樓初日照髙樓輕煙在踈樹峨峨逺岫出泯泯清江去簷隙委殘籕屋隅連宿莾薈蔚互低昻熹微分散聚城郭諒非昔山川儼如故童鬒巳零落姝顔慰遲莫沈沈淡忘歸欲歸重回顧題宣州推官廳覽翠堂前宣州推幕季君於其𪠘作亭梅聖俞以覽翠名之而為之記今去之二百餘年碑埋沒久矣天台陳君客實來發而得之復表之亭上江山如昨翰墨宛然廬陵文某時守兹土既為作顔間二字復詩以志之都官自楚産文采光陸離當年從事君如與山川期歲月忽巳遒天球落塵土豈曰無嘉賔過者不我顧誰令赤城子發坎出方珉靈物必復見其見乃以人回視城南端飛甍俯蒼舊物理有屈伸流峙豈云變寥寥南樓月至今有遐音千年一邂逅共調風中琴亦欲結方軌攬􅉅事幽尋行行且言邁踟蹰思何深登雙溪閣碧落神仙宅當年庾謝來煙雲連草樹山水近樓臺萬雉銀缸舉千鴉鐡騎回梅花衣上月把玩為徘徊題吳城山龍行人鬼外神在地天間彭蠡石砮出洞庭啇舶還秋風黃鵠闊春雨白鷗間雲際青如粟河流接海山貧女吟四首春夏秋冬柴門寒自閉不識賞花心春筍翠如玉為人拈繡針竹扇掩紅顔辛苦紉白苧人間羅雪香白苧汗如雨西風兩鬢鬆涼意次伶俜百巧不救貧誤拜織女星巧梳手欲氷小顰為寒怯有時襟肘露頗與雪爭潔名姝吟丈夫至白首鍾鼎垂功名未有朱門中而無絲竹聲與主共富貴不見主苦辛名姝從何來婉變出神京京人薄生男生女即不貧東家從王侯西家事公卿吾行天下多朱紫稀晨星大都不一一甚者曠數城如何世上福冉冉歸娉婷乃知長安市家家生貴人東方有一士萬金結遊俠千金買歌舞丹青映第宅從者塞衢路身為他人役名聲落塵土他人一何傷富貴還自苦東方有一士敗垣半風雨不識絲與竹飛雀滿庭戶一飯或不飽夜夢無驚窹此事古來多難與俗人語和故人韻去歲湟中榖醫瘡咸糶新一言堪救藥三秩敢貪嗔自是仁由已休論哲保身當時若瘖默何靣見鄉人人情嗟愈變世法合何如氣以心平定才因意廣踈時行或時止無咎亦無譽第一嚴交際琴紳敢不書賦吉州隆慶寺塔火玉塔穿空不可梯剨然霹靂暗招提四城決破吳居眼一炷然成漢卓臍風雨滿山連地捲鬼神現世覺天低時人子細回頭看萬事悠悠落日西寄故人劉方齋溪頭濁潦擁魚蝦笑殺漁翁下釣差掉取扁舟湖海去悠悠心事寄蘆花題高君寶紺泉渟渟巖下泓澄碧落梧影寒瑶披清猋殘月照濎濙俯淵測浮雲流日蕩苕頴向來滄浪歌孺子不可詗載霑衣上塵懷古意深永招招素心人相期發深省題曽氏連理木皇后嘉樹生僪佹四衢五衢合一軌德澤純洽八方一乘木而王固如此大明香琴橘貞觀玉華李一時啚傳傳竒觀榮華過眼轉九易惟有武城宅前樹不知何年巳連理從來縣官不以聞武城子孫世專美人言協氣薰嘉生此家孝友陶協氣朱門多少鎖喬木百年瞬息滋一喟焉得鼎鼎為輪菌受命不遷相曽氏傳聞此木更八世方遇麻陽大夫記誠齊先生字麻陽又幾年却入青螺地輿志北來徹當路表名連瑞里有日捧啚上嘉禾靈草共青史物生隱顯殆有時展如之人亦應爾楩楠𣏌梓離竒生繼此廬陵城北不止稱三瑞題滕王閣五雲窗戶瞰滄浪猶帶唐人翰墨香日月四時黃道闊江山一片畫啚長回風何處搏雙鴈凍雨誰人駕獨航回首十年此漂泊閣前新柳巳成行題黃岡寺次吳履齋韻名潛丞相長江幾千里萬折必歸東南浦驚新鴈廬山隔晚風人行荒樹外秋在斷蕪中何日洗兵馬車書四海同龍霧洲覺海寺次李文溪壁間韻名昴英侍郎闍黎鍾後訪團蒲江色漫漫晝欲晡一笛梅邊何滿子千簑蘆外筆頭奴急風吹鴈還家未新雨生濤到海無本是白鷗隨浩蕩野田漂泊不為孤題鍾聖舉積學齋東家築黃金西家列珊瑚嘆此草露晞良時聊斯須古人重孜孜殖學乃災畬彼美不琢雕櫝中竟何如空同白雲深君子式其廬棐几照初陽垂籖動涼噓方寸起岑樓一勺生龍魚辰乎曷來遲競諸復競諸題顔景彛八窗玲瓏我闥無纎埃風日自清好靣靣有芙蓉何如交翠草吾聞開十牖不及一戶明泰宇有天光八荒盡夷庚豫鄧洞巽齋歐陽先生為淦鄧洞賦詩以孝子慈孫望於人先生之盛心也敢不拜手敬贊鄧君勉之乃翁猶旅殯霜露哉焄蒿日與清江遊雲連桂嶺高時無郭元振夢有令孤綯日斷方田墓招魂我欲騷題陳正獻公六梅亭相府亭前梅六株四圍香影護琴書月華猶帶玉堂色風味曽分金鼎餘五柳門前空寂寞三槐堂上竟蕭踈惟渠不變凌霜操千古風標只自如文山先生全集卷之一終
