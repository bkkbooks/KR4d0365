front:
  text: 文山先生全集卷之一文集
  hash: sha256:83bb52013fc130765dae5bc323ae788ef3596d41c9736ca9e395fd361cbc88c3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_001-1a}
body:
  text: 詩次鹿鳴宴詩時提舉知郡李愛梅迪舉送弟璧同薦禮樂皇皇使者行光華分似及鄕英貞元虎榜雖聯捷司隷龍門幸綴名二宋高科猶易事兩蘇清節乃真榮囊書自負應如此肯遜當年禰正平集英殿賜進士及第恭謝詩於皇天子自乗龍三十三年此道中悠逺直叅天地化昇平奚羡帝王功但堅聖志持常乆湏使生民見泰通第一臚傳新渥重報恩惟有厲清忠御賜瓊林宴恭和詩壬戌以秘書省官南宴奉詔新彈入仕冠重來軒陛望天顔雲呈五色符旗盖露立千官雜珮環燕席巧臨牛女節鸞章光映璧奎間獻詩陳雅愚臣事况見賡歌氣象還明堂慶成恭進詩於皇藝祖德乗乾聖主宣光奕葉前運再庚申皇建極祀同癸亥數叅天中嚴外辨三千禮累洽重熈四十年願賛帝心長對越至忱功用貫垓埏敬和道山堂慶瞻御書韻墨灑天奎映籕紅斯堂殿閣與俱隆方壼圓嶠神仙宅温洛榮河造化工列聖文章千載重諸孫聲氣一時同著庭更有邦人筆稽首承休學二忠著作之庭乃胡忠簡公書周文忠公立次韻劉左司前以著作郎主祕書省營繕事時落成適潘祕丞得郡㰎李并餞行有詩蓬壼日月四時春金碧新來絢帝宸爼豆幸陪麟省雋衣冠中有虎符新詩餘和氣生談麈坐乆風光入醉茵多謝蘭臺舊盟主好歸群玉領儒珎祕省再㑹次韻蓬萊春宴聚文星多荷君恩錫百朋四座衣冠陪賀監一時梁棟盛呉興圗書光動青藜杖人物溫如古玉升好是水天新境界螢窓容我種金燈古玉升見隋律暦志送曹大著知廣德軍暫屈瀛洲客來臨汭水民山川歸史記岳牧屬詞人舘舍朋簮舊都門祖帳新儒林官可紀何止吏稱循贈祕書王監丞君不見祕書外監賀放翁鏡湖一曲高清風又不見太子師傳兩䟽氏東門祖帳羅群公人生晚節良不易頽波直下誰障東使人知有在我者二三君子爲有功我公金華山下住赤松安期白雲處風骨細瘦真神仙急流勇退不肯顧我昔山中想風采㡬回撃節歸田䟽適來追陪水蒼佩親見辭歸白雲路御筆擢公領蓬山師表玉立東宫官兩年苦口一去字未許鷗鷺從公閑瑶池深深鎻䇿府玉皇宫闕僑其間暫分赤符管下界半空雲氣常徃還多少持麾辭上國悠悠風塵見此客莫作㝷常太守看䟽賀以來偉人物夜瞻婺女次舍中一點光明射南極公歸眠食重調護世道尚憑公氣力贈莆陽卓大著順寜精舍三十韻人生天地間一死非細事識破此條貫八九分地位趙岐圖壽藏杜牧擬墓志祭文潜自撰荷􅓩伶常醉此等蜕浮生見觧巳不易齊物逍遥游大抵蒙荘意聖門有大法學者必孔自知生未了了未到知死地原始則返終終始本一致後來得西銘精藴彂洙泗吾體天地塞吾氣天地帥一節非踐形終身莫繼志舜功禹顧養參全頴錫類伯竒令無違申生恭不貳聖賢當其生無日不惴惴彼豈不大觀何苦勤興寐吾順苟不虧吾寜始無愧人而有所沗曠達未足智卓哉居士翁方心不姿媚蒙䜛以去國七年無怨懟風雨三間茅松楸接蒼翠斯丘亦樂哉未老先位置宇宙如許大豈以爲敝屣當其歸去來致命聊自遂天之生賢才初意豈無爲民胞物同與何莫非巳累君方仕于朝名高貴所萃乾坤父母身方來日川至西銘一篇書順事爲大義請君觀我生姑置末四字送卓大著知漳州蓬山隔風雨芸觀司陽秋厭作承明直岀爲漳浦遊問俗便桑梓過家拜松楸錦堂事相儷棠舍隂易留何來瀾蠡間何物輙負舟翻覆十年事行止随坎流倘來豈不再遲取終無尤太守執此徃邦人庶其瘳昔予援西銘期子以前脩願覿弘濟學四海放一舟陸氏登三閣源明岀一麾清聲光漳浦便道拜長基赤子歌來暮同寅賦去思西銘功用大竚騐順寜詩大陸登三閣源明出一麾臨軒親䇿後上冡過家時秋色呉山外春風漳水涯斯文交獨厚羗賦送行詩此𥘉詩也不及用今附見此和蕭安撫平林送行韻逢辰字應父樞宻檢詳江西安撫得失元來付塞翁何心桃李問東風人皆有喜榮三仕我尚無文謝五窮秘苑固知朋可正畏途猶恐甲方衷欲酬長者殷勤祝坎止流行學四忠和朱衡守約山韻渙字行父大理寺丞昔人一出正朋字今我慚非行祕書人様相看願元祐詩章甚雅突黄初競言汲戇猶湏復或謂顔愚亦可如把酒對花姑勿論春行後長莫妨徐題玄潭觀雪浪閣用誠齋韻棄官學道勾山許學到至人本無怒赤子􅋾􅋾如魚頭不堪妖孽腥上流鉗鍵長潭鐡樹立摩挲穹石寳劍濕當時豈忍如是觀毒流不可開眼看英風凛凛萬古寒玄潭觀和龔宰韻晉代何曽谷此陵到今樓觀隱居亭幻成鷗鷺乾坤闊陶盡魚龍雲水腥仙有神功叅造化人将故事入丹青我來欲去長橋孽祠下徘徊夜乞靈送朱制幹象祖一官聲澷任如何屢䟽牋天氣不磨宋祚萬年陳大計周圖五字訂前訛重尋范老憂時箸旁竪文公衛道戈投匭近年殊不少有人說似此君麽送三山林溶孫歸省束書遊京師孤雲瞻太行辭歸慕何蕃捨養殊歐陽山林乾坤静菽水日月長好味諸公詩勝讀寒泉章京城借永福寺漆臺口占似王城山名孟孫字長翁後太常丞心如明鏡臺此言出浮屠後來彂精義并謂此臺無此臺巳是贅何况形而噐圓釋正超然㸃頭會意思多謝城山翁一語迎禪鋒顧我塵俗人與物方溶溶景定壬戌司戸弟生日有感賦詩夏中與秋仲兄弟客京華椒柏同歡賀萍蓬可歎嗟孤雲在何處明歲却誰家料想親幃喜中堂自點茶梅梅花耐寒白如玉干渉春風紅更黄若爲司花示薄罰到底不能磨㓕香香者梅之氣白者梅之質以爲香不香鼻孔有通窒我有天者在一白自不易古人重伐木惟恐變顔色大雅乆不作此道豈常息詩翁言外意不能磨㓕白暑布送王廷舉用蕭敬夫韻平生凉薄資埏陶誤大窑誰知此石恠愈沃乃愈焦崐崘織火䑕頓易鶉衣飄榮我絲蘿附免此蒲柳凋服之雪澷白長𬒮風揺揺表之以霧縠縁之以烟綃振衣從姬滿佩玉遊西瑶髙人不烟火跳出天地窰掀然立千仞塊視金與焦香𬒮拂雪冷紫髯逐風飄摩挲雲冥樹豈随群卉凋但知仙骨輕不學倒影揺人間盡描貌玅不在生綃掲斗斟天漿霞衣却瓊瑶題陳國秀小園席地自乾坤半樹閲今古池舘豈不寛每換壮丹主園公非隴傭獨捎占春風弄影不在多臭香知乃翁長鶴展輕翮逺棲松桂林故宇入清夣盤盤亦苦心中林風月賖十畆團幽隂林下有竒士繞樹從之吟題静山地得一以寜凝然者卷石嵁巗及培塿異形不異質古之能定者悟此爲一極春榮秋以悴一嵗百態出鳥鳴花落句此意誰與詰所以尼丘人仁智不廢一萬象此緯經死灰彼何物明彂此乎遊參入觀水術贈拆字嗅衣相士水火坎離紫陽恠滑波皮骨長坡駭解州得解解中膠費家封鋪同一解唫字從金詩反窮貝何爲分田何同黄絹㓜婦我自樂竹犬多事鴉鶴翁阿英薫蒸透肌理不㓗未蒙好西子芙蓉浪中薔薇水蘇合蜣蜋忘彼巳馬嵬新韈釣新月腥臊千年天地裂是間曽著鼻孔麽梅香竇臭無如何贈閭丘相士急流勇退識真臞昔有麻衣撥地爐我亦愛君雲水趣莫言雷雨趄江湖言余遇水則發故云贈神目相士道茂數遁甲長房得役鬼風鑑麻衣仙地理青烏子擇術患不精精義本無二竒哉夣筆生熊魚掩前氏贈鏡湖相士五月五日揚子江心水鑄作道人雙睡子吾面碟子大安用鏡照二百里贈秋月葉相士急流勇退神仙跛蹩龍鐘将相借問華山山中何似天津橋上贈曽蘭谷相士許負眼禰衡口巧言甘莠言醜贈月洲相士月洲月眼閲人多且道西州事若何朱紫貴人皆好命不知中有孔明麽贈劉矮跛相士鍊石爲形鏗金爲音世方好圓癡守方心隂陽絪緼人一氣質善惡之㣲證于聲色意所欲發雖吾不知彼美子劉洞其先㡬骯髒難合今世道病如子所言生禀巳定戅夫勇士徃徃一偏以視妾婦豈不猶賢洪範得三二曰剛克㑹其歸其好是正直學問工夫氣質用㣲汝能觀形安知其餘子術巳定吾情巳成子執子術吾安吾情媻姗三尺軀舉止如不揚瞻視照肝膽音吐何琅琅君看水中鳬不及鶴脛長昔聞䕫憐蚿未聞一足僵萬物各自適形色安足量子言良有理與子持酒漿贈梅谷相士當年壽陽額春風點顔色後來廣平腸氷雪峙氣骨世人識花靣識花還自淺花有歲寒心清貞堅百鋉君家在梅谷自詭知梅熟湏得花性情不假花頭目莫說和羔事花𬒳和羔累突兀烟水村我梅自林氏贈碧眼相士蒼蒼垂天雲靈照行下土秋江浸草木魚􅡉歴可數眉山老麻衣偷入此阿堵色界只點頭從人道吾瞽贈鏡齋徐相士鄒忌不如徐公美引鏡自窺得真是門下食客纔有求昏昏便與妻妾比徐家耳孫却不然自名一鏡京師市世人無用看青銅此君雙眼明秋水君以無求㳺公卿勿令此鏡生瑕滓堞子太面何難知從今光照二百里贈鑑湖相士瘦竹凌風弄碧漪山光雲影共熹㣲月黄昏裏踈枝外認取半天孤鶴飛贈趙神眼一絛一褐髯如鐡神爲秋水眼爲月欲從壼子􅟪三機劍首終然吹一吷贈桂巖楊相士荣悴紛粉未可期夕多未振巳朝披得剛難免於今世行好湏看有騐時萱晝堂前惟有母槐隂庭下豈無兒好官要做無難做身後生前是兩岥宣州罷任再贈貧賤元無富貴思泥塗滑滑總危機世無徐庶不如卧見到淵明便合歸流落丹心天肯未峥嵘青眼古來稀西風爲語巖前桂若更多言却又非贑州再贈此别重逢又㡬時贈君此是第三詩衆人皆醉從教酒獨我無争且看棋凡事誰能随物競此心只要有天知自知自有天知得切莫逢人說項斯贈彭别峯太極數手把先天巳後書當來一畫本全無白雲山下泠泠水自在人間太極圖贈黄生銀河數乗槎人從天上來天上知有君平術黄生能談君平書不知曽認支機石贈楊樵隱應炎談命莘郊一介堯舜君民薇山二難百世忠清富春耕叟涕洟雲䑓終南遯士仕宦梯媒是數公者俱以隱名木石一跡霄淵異情九華山人賣樵江湖請筭世間㡬種樵夫贈葉大明大明標榜葉氏子自稱後村門下士誤言木吉孛爲災後村曽發一笑來其師流傳說如此寜知禍福乃不爾犀腰貂首徒勞人甘藜豢藿無苦辛我生有命殊六六木孛循環相起伏䄂中莫岀將相圖盡洗舊學讀吾書贈舒片雲麻源謫仙人嘘呵成隂陽向來懐䄂間冉冉天孫裳一夕大雷電六丁下取將仙人乗風來帝鄉乂從膚寸起飛揚仙術亦如此天機神翕張有時行渾天周游十三萬里強徃來仙馭不可韁正恐問命人望氣蓬萊隔渺茫贈彭神機挽強二石徒碌碌學到穿楊精藝熟百發百中無虚弦百中一跌前功辱彭君絶識透黄間不師逢弄師珞琭天度三百六十強一筭不容失正鵠吾聞天機難語人徃來了了拈衆鏃君姑藏用疑於神矢口莫輕談禍福贈劉忠樸楹何爲折劍何借鬚肯爲拂糞肯甞馬公布衾王公飯石家錦障丁家香忠邪倿邪兩無定一琱一璞異其性忠樸先生躔法高古今四者豈関命五九六餘䏻善惡鐡筭不是并州錯便從忠樸問如今忠果誰忠樸誰樸贈金稱我有一叢籬下花黄金满眼無人拾夜看璇璣度玉衡猿啼雨外青山濕贈余月心五首月之所在謂之身朝市山林㡬様人静看一輪如此潔莫將身著輭紅塵我生之辰月宿斗如何謗譽由箕口月明只合醒眼看斗亦何湏挹漿酒月比於人歴世多纔圓又缺㡬消磨只因受用長生藥嗟尔死蛙如月何一種黄州月曹蘇善惡㡬吾磯連月釣此月是邪非子心月其明子術星之數爲月詰衆星不知何以故贈涂内明老云五色令人育靣壁不視佛慧生彼皆去眼絶人僞孰知涂者出天成有口能談貴人命有耳能聽貴人聲此中一片光明藏嗜欲淺處天機深贈一壼天李日者汝南市人眼壼小天地大誰知賣藥翁壼寛天地隘李君血肉身大化中一芥天度三百餘滿腔粲蓍蔡仙翁以過謫長房以術敗造化多漏泄鬼神争訝恠君歸視斯壼口匏深覆盖得錢且沽酒日晚便罷賣贈蕭巽齋未有大撓書先有伏羲易古人尚卜筮今人信命術八卦與五行皆自河圗岀易中元有命道一萬事畢卦義六十四蕭君得其一江湖旅瑣瑣談命以巽入人情愛委曲喉舌嫌棘棘言言依忠孝君平意未失我生獨骯髒動取無妄疾是有命流行誰隕復誰詘安䏻從兒女朝夕談昵昵若卦有人買不妨君賣直贈曽一軒磨蝎之宫星見斗簸之揚之箕有口昌黎安身坡立命謗毀平生無不有我有斗度限所經適然天尾來臨丑雖非終身事干渉一年貝錦紛雜糅吾家禄書成巨編徃徃日者迷㡬先惟有一軒曽正徳其說巳在前五年隂陽造化蕩晝夜世間利鈍非偶然未來不必更臆度我自存我謂之天贈龔豫軒數術挾筴考休徴巫甘邁何追君亦布靈草乃復探其㣲載觀河洛書今也休明時天高鳳鳥翔擊拊遨以嬉贈剋擇徐吉甫東望㑹稽山穆陵欝岧嶤卜壤藏劍履伯也昭其勞昔者遊仙人龍耳致君王君家世其傳芳踵疇可量青囊落君手辯語如流河尋雲履高阜湯湯俯長波朔風渺天垂萬里草離離安得結方軌爲君起遐思贈魏山人君不見而家直臣犯天怒身死未寒碑巳仆又不見而家處士承天渥閉門水竹以自樂雲仍玅叅曽揚訣謂余地宅誰優劣小煩穏作子午針靈於巳則靈於人贈老菴廖希說短屐平生㡬兩穿錦嚢真得當家傳山中老去稱菴主天上將來說地仙靣皺不妨䈥骨徤舌存何必齒牙全金精深處苓堪飯更住人間八百年彭通伯衞和堂理身如理國用藥如用兵人能保天和於身爲太平外邪奸其間甚於㓂搶攘守護一不謹乗間敵益勍古有黄帝書猶今六韜經悍夫命雄喙仁將資參苓羽衣爲其徒識破隂陽争指授别生死錚然震䏻名道家攝鉛汞膚腠如重扃到頭關鍵密六氣無敢嬰君方建旗鼓不敢走且驚他時櫜吾弓閉門讀黄庭贈適菴丹士本是儒家子學爲方外事此身恨鳬短有意求蟬蜕猶留鼎餘藥還授人間世從君卧山中共談弘景祕贈劉可軒寫真燕頷鳶肩都易寫從前只道點睛難近來阿堵君休問燈下時將頰影看慧和尚三絶畫我郎潜先帝時而今白髪漸參差若交傳入都人眼疑汝前身妙善師傳神風雪衡山涕滿膺懶殘不管自家身殷勤撥火分煨芋却有工夫到别人相花光老矣墨婆娑無頼梅花一白何爲問西來宗㫖道世間色相是空麽畫象奕各有等級四絶品四人高下螳臂初來攫晚蟬那知黄雀沫饞涎王孫挾彈無人處一夜琱盤薦玳筵右一爲周子善言蕭耕山能勝二劉不覺敗於子善子善敗於我射虎將軍髪欲枯茫茫沙草正迷途小兒謾取封候去還是平陽公主奴右二爲耕山言老夫敗於子善也坐踞河南百戰雄少年飛槊徤如龍世間只畏兩人在上有高公下慕容右三爲劉淵伯言所畏者惟吾與子善擊柱論功不忍看築壇刑馬誓河山當年絳灌知何似只在春秋魯衞間右四爲劉定伯言與淵伯上下也贈樂軒彭善之吾家小黄溪其間石甚巨可寫歸來辭可刻盤谷序晋唐文章手誰敢以自負異時此重來煩君作玉筯贈墨林曹大崧巍峩㓜婦碑伶俜七歩詩又得墨林墨淋漓湊作曹家三絶竒贈刋圗書蕭文彬蒼籕書法祖斯氷篆家豪昔人鋒在筆今子鋒在刀收功棠谿金不禮中山毛囊錐脫頴出鐫崖齊天高題周山甫錦綉叚客從西北來遺我錦綉叚上有雙鳯凰文彩何燦燦置之篋笥中歲月亦巳晏天孫顧七襄雷電下河漢鳳凰忽飛去遽然失把玩貧家機杼寒秋蟲助予嘆題梅尉詩軸乃翁聖俞君瑰辭燦琳琅吾鄉歐陽子逸韻諧宫啇人物雄中原園囿盛洛陽醲郁追皇風詭恠抑晚唐雲仍四方志生長百戰塲憂國杜少陵感興陳子昻我亦青原人君遺明月光掩卷不䏻和握手談肝腸贈羅雪厓樵青蕭蕭山下人閉門衣裘單春心動溪谷曉起捫松看題得魚集史評男兒生作事豪傑死留名天運常相禪江流自不平百年多險夣千古有閑評諸父淵源在吾猶及老成題彭小林詩稿其父號雅林晚識宗文憶浣花刪餘今見雅名家牙籖料理西風讀共笑鍾山說老鴉題王聲甫松坡樵苦唱後倚柯睨蒼髯短簑挾風雨談道誰我知對奕者其侣狂吟發悲調谷鳴相律吕扊扅豈不怨寜售大夫股長鑱斸仙苓檴薪爲吾煮題毛霆甫詩集雲澗美毛霆甫詩也英英白雲在澗之濆彼美人兮其德孔純英英白雲在澗之阿彼美人兮其思孔多白雲英英澗水泱泱彼美人兮碩大且昌雲澗三章章四句送趙王賔三首風流不比賀家狂瀟灑黄冠意更長自有武夷溪九曲鑑湖何必問君王蕭然𬒳褐不求知歸倚溪船理釣絲却笑荆山空自售未應有智不如葵懶從原上訪桃花又不青門去種瓜傳得神仙蟬蛻法君如覔我問烟霞又送前人琴棋書畫四首不知甲子定何年題滿柴桑日醉眠意不在言君解否壁間琴本是無絃琴我愛啇山茹紫芝逍遥勝似橘中時紛紛玄白方龍戰世事從他一局棋棋蔡邕去後右軍死誰是風流入品題只少蛟龍大師字至今風骨在浯溪書欲覔龍眠舊時事相傳此本世間無黄金不買昭君本只買嚴陵歸釣圖畫題延真羅道士玉澗雙巖夾方流知有至玅藴山石發清暉草木得餘潤泉源皆寳氣樵牧駭潜蜃仙翁獨危坐華池養水性神澤温而栗骨峭老益勁苔磯枕泓碧時有魚出聽糜瓊飯潺湲冲淡意無朕聽羅道士琴㫁厓千仞碧下有寒泉落道人揮絲桐清風轉寥廓飄飄襟𬒮舉氷紈不禁薄紫烟護丹霞雙舞天外鶴吾聞泗濵磬暗含角與徴又聞天樂泉浄洗筝笛耳如何碧一泓乃此并二美藍田滄海意請問玉溪子閑居和雲屋道士一樽共此時心文字追随落醉吟仙子樓臺脩竹外行人冠盖畫橋隂一年芳草東風老五月空江夜雨深且作蘭亭歡喜集更論誰後又誰今遊集靈觀時奉祠禄小洞烟霞國重陽風雨秋歐公嵩嶽歩朱子武夷舟香火真吾識觥籌且此遊龍山馬臺事糠粃舊王候題疑祥觀前路風塵走且僵我來一日此徜徉歐公自是遊嵩觀迂叟原非過太行始信神仙還有國不知蠻觸是何鄉世間如此紛紛者贏得山林作道場遊青源二首鍾魚間日月竹樹老風烟一徑溪聲满四山天影圓無言都是趣有想便成縁夣破啼猿雨開元六百年空庭横螮蝀㫁碣偃龍蛇活火叅禪筍真泉透佛茶晚鍾何處雨春水满城花夜影燈前客江西七祖家題碧落堂知瑞州日大厦新成燕雀歡與君聊此共清閑地居一郡樓臺上人在半空烟雨間脩復盡還今宇宙感傷猶記舊江山近來又報秋風緊頗覺憂時鬢欲斑和龔使君韻名琦知瑞州日淡和心事葛天民囘首歸來清渭濵長倩君賔孫子行道原義仲軰流人一生受用忘非是萬事升沉等故新近日貞元朝士少蒲輪有命岀楓宸餞新班弟送君天上去當戸理瑶琴萬里白鷗逺千山黄葉深江空行路影日暮倚門心若見西湖雪霸橋人正吟别弟赴新昌十載從遊乆諸公講切精天淵分理欲内外一知行立政湏規範脩身是法程對床小䟽隔戀戀弟兄情和韻送逸軒劉民章庚午科名子俊少日屠龍事巳勞送人千里發江濤蓬萊地近風方細閭闔門開日正髙春裏看花湏款款雨中剪韭且陶陶金吾巳辦長安月雙鳯扶雲立海鰲題宣州疊嶂樓初日照髙樓輕烟在踈樹峨峨逺岫出泯泯清江去簷隙委殘籕屋隅連宿莾薈蔚互低昻熹㣲分散聚城郭諒非昔山川儼如故童鬒巳零落姝顔慰遲莫沈沈澹忘歸欲歸重囘顧題宣州推官廳覽翠堂前宣州推幕季君於其𪠘作亭梅聖俞以覽翠名之而爲之記今去之二百餘年碑埋沒乆矣天台陳君客實來發而得之復表之亭上江山如昨翰墨宛然廬陵文某時守兹土既爲作顔間二字復詩以志之都官自楚産文采光陸離當年從事君如與山川期歲月忽巳遒天球落塵土豈曰無嘉賔過者不我顧誰令赤城子發坎岀方珉靈物必復見其見乃以人囘視城南端飛甍俯蒼舊物理有屈伸流峙豈云變寥寥南樓月至今有遐音千年一邂逅共調風中琴亦欲結方軌擥􅉅事幽尋行行且言邁踟蹰思何深登雙溪閣碧落神仙宅當年庾謝來烟雲連草樹山水近樓臺萬雉銀缸舉千鴉鐡騎囘梅花衣上月把玩爲徘徊題吴城山龍行人鬼外神在地天間彭蠡石砮岀洞庭啇舶還秋風黄鵠闊春雨白鷗閑雲際青如粟河流接海山貧女吟四首春夏秋冬柴門寒自閉不識賞花心春筍翠如玉爲人拈繡針竹扇掩紅顔辛苦紉白苧人間羅雪香白苧汗如雨西風兩鬢鬆凉意次伶俜百巧不救貧誤拜織女星巧梳手欲氷小顰爲寒怯有時衿肘露頗與雪争潔名姝吟丈夫至白首鍾鼎垂功名未有朱門中而無絲竹聲與主共富貴不見主苦辛名姝從何來婉變出神京京人薄生男生女卽不貧東家從王侯西家事公卿吾行天下多朱紫稀晨星大都不一一甚者曠數城如何世上福冉冉歸娉婷乃知長安市家家生貴人東方有一士萬金結遊俠千金買歌舞丹青映第宅從者塞衢路身爲他人役名聲落塵土他人一何傷富貴還自苦東方有一士敗垣半風雨不識絲與竹飛雀滿庭戸一飯或不飽夜夣無驚窹此亊古來多難與俗人語和故人韻去歲湟中榖醫瘡咸糶新一言堪救薬三秩敢貪嗔自是仁由已休論哲保身當時若瘖黙何靣見鄉人人情嗟愈変世法合何如氣以心平定才因意廣踈時行或時止無咎亦無譽第一嚴交際琴紳敢不書賦吉州隆慶寺塔火玉塔穿空不可梯剨然霹靂暗招提四城决破呉居眼一炷然成漢卓脐風雨滿山連地捲鬼神現世斍天低時人子細回頭看萬亊悠悠落日西寄故人刘方齋溪頭濁潦擁魚鰕笑殺漁翁下釣差掉取扁舟湖海去悠悠心亊寄蘆花題高君寳紺泉渟渟巖下泓澄碧落梧影寒瑶披清猋殘月照濎濙俯渊測浮雲流日蕩苕頴向來滄浪歌孺子不可詗載霑衣上塵懐古意深永招招素心人相期發深省題曽氏連理木皇后嘉樹生僪佹四衢五衢合一軌徳澤純洽八方一乗木而王固如此大明香琴橘貞觀玉華李一時啚傳傳竒覌荣華過眼轉九易惟有武城宅前樹不知何年巳連理從來縣官不以聞武城子孫世專美人言恊氣薫嘉生此家孝友陶恊氣朱門多少鎻喬木百年瞬息滋一喟焉得鼎鼎為輪菌受命不遷相曽氏傳聞此木更八世方遇麻陽大夫記誠斎先生字麻陽又㡬年却入青螺地輿志北來徹當路表名連瑞里有日捧啚上嘉禾靈草共青史物生隱顯殆有時展如之人亦應爾楩楠𣏌梓離竒生継此廬陵城北不止稱三瑞題滕王閣五雲窓戸瞰滄浪猶帶唐人翰墨香日月四時黄道闊江山一片畫啚長廻風何處搏雙鴈凍雨誰人駕獨航回首十年此漂泊閣前新柳巳成行題黄岡寺次呉履齋韻名潜丞相長江㡬千里萬折必歸東南浦驚新鴈廬山隔晚風人行荒樹外秋在断蕪中何日洗兵馬車書四海同龍霧洲斍海寺次李文溪壁間韻名昴英侍郎闍黎鍾後訪團蒲江色漫漫晝欲晡一笛梅邊何满子千簑蘆外筆頭奴急風吹鴈还家未新雨生濤到海無本是白鷗随浩蕩野田漂泊不為孤題鍾聖舉積斈齋東家築黄金西家列珊瑚嘆此草露晞良時聊斯湏古人重孜孜殖斈乃菑畬彼美不琢琱櫝中竟何如空同白雲深君子式其廬棐几照初陽垂籖動凉嘘方寸起岑楼一勺生龍魚辰乎曷來遲競諸復競諸題顔景彛八窓玲瓏我闥無纎埃風日自清好靣靣有芙蓉何如交翠草吾聞開十牖不及一戸明泰宇有天光八荒盡夷庚予鄧峒巽齋歐陽先生為淦鄧峒賦詩以孝子慈孫望於人先生之盛心也敢不拜手敬賛鄧君勉之乃翁猶旅殯霜露㦲焄蒿日與清江遊雲連桂嶺高時無郭元振夣有令孤綯日断方田墓招䰟我欲騷題陳正獻公六梅亭相府亭前梅六株四圍香影護琴書月華猶帶玉堂色風味曽分金鼎餘五柳門前空寂寞三槐堂上竟蕭踈惟渠不変凌霜操千古風標只自如文山先生全集卷之一終
