body:
  text: 啓通丁侍郎應奎號璜溪誤節讞湘馳驅上日摳衣過洛咫尺中台拜下有期恭先告至恭惟某官黄河㤗山之望咸池大濩之音學問單傳安定公之藴奥文章獨歩歐陽子之聲名空萬馬以無前領衆星而直上慷慨玉廬之給札聮翩璧府之彯纓一麾江海以翺翔載駕風雲而磅礴翠帷麟觀螭陛鸞臺天子穆穆以親賢海内顒顒而望賜方千仞翔而覧下乃六月息以圗南矧如聖哲馳騖之秋正切廊廟論思之益胡不起金魚而垂帶而乃新瑶象以爲車弭節愈窮履星罙近賈生見宣室亟紓半夜之思安石起東山大衍蒼生之福某相望千里一間十年緑簑風雨之中菊餐有味舊綉波濤之地蕉夣何心詎期漢節之來喚醒楚騷之讀夤縁通德親切依仁瀟湘逢故人尚軫蓬鰲之舊霖雨思賢佐佇看芝鳯之新傾耳一言拜手三肅通楊提刑允恭號高峯誤節讞湘載驅上日摳衣過洛伊邇下風望履有期擘牋告至欽惟某官𬈑南徤翮斗北修名玉尺氷莖洒落絶塵之韻瑶琴錦瑟和平瑞世之音自炊起而霆奔每徐行而山立提振㫪陵之風月縱横周序之皷鍾日暖旌旗一麾玉帳春明霄漢三道綉衣驅馳靡惮於賢勞出入有関於民命方千仞翔而覧下乃六月息以啚南矧今聖哲馳騖之秋正切英雄經濟之略江濤如許泉石謂何召賈誼於長沙上心乆渇見夷吾於江左天下何憂某飲菊悠然夣蕉儻爾起家乗傳念舊綉之波濤畏道回車想緑蓑之風雨幸近十洲之島冀沾九里之河滕壤舊㕓曽識平反之譜周原新轡願承鞭辟之方拜下非遥由中莫旣回李安撫肯齋叨臬湘南余征上日摳衣洛下伊邇中台亟裁書而叙心将考德而問業恭惟某官名門人傑昭代吏師醴泉芝草麒麟天生瑞質高山深林龍虎代出魁人見謂西珍蔚爲南望自覧德翔千仞而下即回瀾障百川之東粉墻紫界之蹁躚玉檻丹梯之凌厲連麾江海風馳五袴之聲疊節荆吴星度六絲之影以天下而自任何王事之獨勞迨授鉞於千畿乃進書於九扈俄動平地神仙之想來尋徃時鍾皷之盟湘水春深未許放情於黄老虞廷日永行㸔翔舞於䕫龍某飲菊悠然夣蕉儻爾起家乗傳念舊綉之波濤畏道回車想緑簑之風雨幸近十洲之島冀沾九里之河滕壤舊㕓曽識平反之譜周原新轡碩承鞭辟之方拜下非遥由中莫既回前人賀遷秩影縻下隰奚𥙷毫釐歩進貟階忽饒分寸未謝玉淵之潤先厪金薤之華自笑竿魚爲官何拓落也尚随書鶴振德而輔翼之未悉刋酧餘啚嗣布送前人冬灰管移新律暖轉􅉅蘭鍾皷楽清時春生花竹隔幔緹之醲郁阻履韈之從容薄注鄠清式歌魯瑞俯慚雲繡又添愛日之紋隃聽雷鼗趣侍含光之宴㣲芹馳瀆采菲知榮賀前人冬黄鍾噓暖繡線紀長錦堂増履韈之春緑野換荔芸之色某謾馳今雨阻造下風隃睇翠蓬莫遂前茅之拜第瞻鶴𦦨早催元㑹之朝餽前人歲朱泥貼歲驚殘爆竹之寒緑野回春喚起屠蘇之暁欲賛喧馬散鴉之集曽㣲横鯉卧兎之供柏葉浮香隃想午橋之宴梅花轉暖即迎卯詔之來輶瀆包羞麾留爲龍賀前人正攝提貞孟􅑍春回甲胙祝融接天柱雲度午橋元氣與㳺夀祺來介某官㤗内君子西方美人楽鍾皷於園林聲和緑净拜衣冠於閶闔光近清都表新渥於鶴書催窮班於鼇禁某迹縻俗駕心遶賀星遥指於軫中拳拳公壽雪立殘於門外耿耿于懐送前人元宵火樹銀花簇朱陵之明月羅幃綉幙開緑野之春風莫陪鍾皷之勝逰敬效豆籩之攝飲醉長沙行湘水忍賦岸花遶建章立通明佇依雲朶區區輶凟盻盻麾留賀前人納子婦歡聲噪鵲喜氣乗尨日耀屏金春生堂錦伏惟歡抃某永塵賀履敢後慶箋猥此将芹菲然采若倘蒙鍳茹無任欣榮送前人别㑹楚節易麾有味林烏之哺湘花舞席隃瞻湖鴈之飛感水薤之風規持金蕉而雨别日暮碧雲合耿河漢之相忘月明今霄多劳江湖之逺夣薄言折寄徼惠麾留謝章簽書鑑綿田負耒投分一丘楚澤乗軺皈忱兩地公造化吹嘘之賜廣詳明欽恤之仁昉履南維輒箋西筦伏念某遭逢雖早零落亦多一壑白雲對哺烏而俯仰十年流水忘夣鹿之去來不啚元日之㑹同猶記壮年之奔走我牛我車我輦方堕影於湘波維駒維閣維駰胡強顔於衡麓未許賦東方之粟乃趣涖南冠之囚尊叱馭陽回車展轉於君親之際皋明刑契敷教剤量於政化之間吏民甫接於咨詢風俗重爲之感激龍蛇行而赤子瘁羔羊冺而素絲傷非扶内地之本根曷壮重湖之保障曹劌之戦長勺或云察魯獄之功孔明之駐臨蒸正在破荆賊之後恍聞風而興起凛受命之艱難兹盖恭遇某官德業两朝人物三代頌慶曆之聖徳政府經綸用淳熈之真儒中天黼黻誕篤緇衣之造齊調金鼎之和遂沐匿瑕亦叨将指某敢不靈承清問恵迪嘉師奉使登車敢自詭范滂之操爲親拜表尚曲全李宻之私激切未央敷荣祗淺先生前除湖南漕即報罷復除本路憲道體堂謹書謝高尚書斯得負耒耕綿方省愆於私室乗軺使楚忽拜命於公朝昉履朱維敬箋丹屏㐲念某同前兹盖恭遇某官拱璧元圭泰山喬嶽迩交殿之勸講總是經綸古灵槀之薦人不遺氣類遂令起廃復忝司平某敢不迪恵嘉師靈承清問鞭辟虺隤之陳迹濯磨鞅掌之新功自與心謀敢比范滂之攬轡未以罪去尚容李宻之陳情㱕倚方長敷棻祗淺謝陳尚書宜中耕綿負耒方私室之省愆使楚乗軺忽公朝之錫命旣履朱維而陳臬亟瞻紫槖以修辞㐲念某學極攴離性惟骯髒宿昌黎之南斗自嘆我辰事元亮之西疇每懐前路撫陳編而慷慨恍𥘉服之流離題柱而乗駟車不量巳力叱馭而馳九坂徒負壮心山川尚有於鬼神草木自全於霜露迹巳陳於芻狗影屢落於杯蛇一壑白雲十年流水當元㑹彰綸於日月乃一朝移綉於波濤血指創深貽羞巧匠折肱痛定莫詭良醫請東方之粟以閟俞爲南冠之囚而趣載周爰伊始汔濟柰何起觀今日之重湖正抵北風之一靣曹劌之戦長勺或云察魯獄之功孔明之駐臨蒸正在破荆賊之後歘聞風而興起凛受命於艱難兹盖恭遇某官大吕黄鍾元圭拱璧天章閣之論事行展經綸古靈藁之薦賢不遺氣類遂令起廢復忝司平某敢不激厲新知濯磨旧玷沐浴蓬萊之風露昭蘇蘅芷之江山皇帝清問何擇非人碩言奉教王事靡盬不遑将母儻遂陳情㱕倚意長敷宣喙短謝陳正言堅省愆私室方負耒以耕綿拜命公朝忽乗軺而使楚𥘉咨詢而咨度終受察以受容隃跂拾遺敬箋主進某名浮實淺意廣才踈早歲飛騰真有終軍之銳中年閲歷始知元亮之非頃飯牛吉水之陽有秣馬湘江之㫖此運使大躰旣無士遜之良去監司不才聊見希文之志進退用舎固各有命栽培傾覆亦因其材此真生我之孟孫安得酖人之叔子歲年忽忽空懐躍冶之羞風雨悠悠乆断問鈞之夣不謂一寒之零落未爲諸老之棄捐取彼蒼葭謂粗嘗於霜露憐其舊綉使復出於波濤血指創深見嗤巧匠折肱痛定敢詭良醫方祈偃息於支離俄責驅馳於跛躄慨念重湖之今日浸憐一靣之北風孔明之駐臨蒸正在破荆賊之後曹劌之戦長勺或云察魯獄之功凛受任於艱難恍聞風而興起孰主張是遂躋登兹兹盖伏遇某官寒露清氷㤗山北斗雖剛不吐柔不茹卓然論事之風然過者化存者神偉甚容人之度遂使山林之深宻復叨原隰之光華某敢不祗若平反對揚欽恤鞭辟􅳐隤之陳迹濯磨鞅掌之新功元龍百尺樓知将展下床之拜王尊九折坂其敢忌叱馭之規皈倚方長敷棻祗淺謝陳侍郎存省愆私室方負耒以耕綿拜命公朝忽乗軺而使楚𥘉咨詢而咨度終受察以受容稽首席間通忞閣下㐲念某名浮實淺意廣才踈生平事可對人粗有聞於涑水仕太早不及學或見笑於乖崖捫心每念於息肩回首不堪於鑄錯司馬橋乗駟豈應聞命以疾驅管城子免冠正當爲法而受惡然而兩停漢傳再黜周行皆縁一日之瑕疵自取十年之坎坷悠悠白日空懐毀瓦之思落落青山乆㫁問鈞之夣不謂元日闢門之始猶在皇華遣使之中追天上之雲龍望不到此詠人間之蕉鹿意若安之血指創深見嗤巧匠折肱痛定敢詭良醫方祈偃息於支離俄責驅馳於跛躄慨念重湖之今日浸隣一靣之北風孔明之駐臨蒸正在破荆賊之後曹劌之戦長勺或云察魯獄之功凛受命於艱難恍聞風而興起孰主張是遂濟登兹兹盖恭遇某官拱璧元圭㤗山喬嶽迩英殿之勸講總是經綸古靈藁之薦賢不遺氣類遂令起廃復忝司平某敢不激厲新知濯磨舊玷沐浴蓬萊之風露昭蘇蘅芷之江山皇帝清問何擇非人碩言奉教王事靡塩不遑将母倘遂陳情㱕倚意長敷宣喙短賀曹尚書孝慶兼給事中選高春伯光映夕郎創履摩雲煥清朝之文物簮𥚑照日侈丹地之恩輝皷舞風雷動揺鴛鷺恭惟某官名高二陸才備百參風雲上下之交撝呵龍虎天日清明之瑞鞭駕鳯凰春行霄漢之三麾星煥江湖之四節蘭臺壁水安定龜山彤管青蒲歐陽司馬出柚磨霜之鉞浩吟捲雨之簾階轉松隂旗翻柳色白馬盤陀之覲日紫囊筆槖之生風矧批敕瑣闈任朝廷之綱紀而侍言經幄啓帝學之光明用頒一命再命三命之榮特𢡟大書特書屢書之績卻高䴡使止西蕃馬讀青史而猶香還諌臣敕繳内侍官凛清遊其未逺必兼廣申公之十論必細陳温國之五規要看乆逺之功名盡展平生之經濟某濫巾逺服望履層霄星度文昌遥想蓬萊宫之氣雲行石鏡尚磨蛟龍字之碑心曲葵葵毫端草草賀劉尚書黻命渙九旒光升双履風清畫省凖䋲帝世之百工雲擁仙臺刀尺周官之群吏濡毫緑净拜手紫㣲恭惟某官吞吐龍湫卷舒鴈蕩清規映日耀西華之金晶直氣摩空屹南都之鐡璧威鳯祥麟之出䖏慶雲瑞日之文章一䟽辨姦少日老泉之氣識十條論事平生小范之精神自塤箎堂陛之交而黻藻帝皇之度獨到古人之未到能言天下之難言爲御史爲諌官張膽論事真舎人真侍講吐辭爲經儒荣方試於一時柄用遄開於九軌乃霈三命再命之渥徑通前行後行之班細氊廣厦之席重龍泉文淵之劍二時方艱大公竭論思余安道决邉議於朝廷真工部長蘇子容戒功臣於彊埸爲史銓師發揮黄旗紫盖之精靈盡掃枉矢攙搶之芒角前籌彪炳疊紐蝉聮采石江流更展中書之畧海潭沙漲遄符宰相之謡某覊足馳原阻心賀厦文昌星度衣冠徒想於後塵􅒖嶁雲飛草木碩濡於今雨鋪陳喙短激躍心長賀趙侍郎月山太平州赴召選表揚綸㱕中持槖采石洲之明月光照海山通明殿之紅雲影揺河漢介圭覲只㑹元驩如恭惟某官玉粹金剛氷懸雪跨清廟生民之作膾炙諸公干将莫邪之鋒指麾餘子自傍天而行斗牛之渚便㧞地而起湖海之樓出入兵間月柝燈碁之耿耿驅馳江上參旂井鉞之堂堂儒臣知兵從古所少天子謀帥必在其中方建纛而前千軍遶帳而不動及還笏而去二童随馬而有餘悠悠四顧於山河落落一麾於江海嘯吟水石酧謫徃展月之魂上下風穡訪舎人麾軍之迹慨然有神州陸沉之歏發而爲中流撃楫之歌属傳風景於峴山忽駭波濤於天塹長江爲備不𢾗䖏可共險於萬人朝廷飬兵三十年當成功於儒者乃疇庸於東掖乃趣貳於西曹太乙靈旗出陪豹尾鈎陳玉檻進逼鰲頭青天白日鳯凰之聲名高山深林龍虎之氣勢前行爲兵部小紓帷幄之謀大本在中書亟正鈞樞之拜某濫巾劇部望履修門班漢從於甘泉宫喜稱知巳勒唐功於吾溪石巳戒有司賀荆湖汪制帥立信中禁出綸上流易鎮尚書天之北斗光動玉垣荆楚國之西門勢雄鐡壁氊帷膽落旗盖風生恭惟某官意氣吴鈎胸襟彭蠡蒼龍捲四海之水㧞地威風巨鰲戴三神之山擎天砥柱表表二三豪傑恢恢數万甲兵起觀江漢之危枰政急波濤之巨楫峴山落日追思羊太傳之經营江左流風孰奮管夷吾之慷慨乃易長沙之節乃高建禮之門北繞頴沔南卷沅湘一新牙纛東逹吴㑹西通巴蜀重整金湯然且許充國以便宜授孔明以節制真儒無敵於天下此虜巳在吾日中箭青海弓天山槖鞬敵愾盃長河塊㤗華樽爼折衝陳六月北伐之詩刻萬年中興之頌式歸几几晋位巖巖某隃睇齋壇阻陳賀履星輝翼軫莫随東野之雲龍月滿関河尚䇿祁山之流馬衷旌揺曳舌筆單踈廣西李經略經過迎状圭裳東覲牙纛西來畫鷁鏡秋懸桂林之明月綉屏悵暁拂石廩之行雲雷馭先驅天吴起舞某摩挲脫履飛遶前茅逐東野之龍乆懐上下拜北平之馬重覩傑魁請廣帥㑹傳皷上清湘桂舟度曉舉杯激明月楚觀生秋輒扳千乗之光華重話六年之契闊舳龍飛動豈敢爲從者之淹檣燕慇懃且爲盡故人之飲折送諸監司廵歷㑹問楚囚而返棹幸接席間傳􅌕渌以稱觴㡬成瓦後欲洊邀於金轡恐重溷於氷壼獻芹而效野人顔之厚矣折枝以奉長者禮亦宜之區區卷爼不腆僣易馳獻如沭肯留萬有餘荣回朱帥參疇庸紅斾賛畫油幢羅帶玉簮卷嶺麾之雲氣銀濤青壁籌湘柳之春風五朶施先七襄禮後某官春容之度贍蔚之文飈起雷轟掲修名於干佛霜懸雪跨歛神氣於九仙弓矛洛下之耆英領䄂湖南之賔客月暗秋城燈明夜觀日臨仙掌烟傍衮龍小駐籌帷促歸輦路某居慚未見切幸寅同訪赤字於山尖喜陪新雨望氷壼於幕下隃結飛霞繾綣情深敷棻詞約回劉運管志叔周隰馳駰恍波濤之移綉祁山流馬催帷幄之運籌一介施先七襄報後某官鞭駕英雄之意氣攅吸霞雨之文章雲杏露桃艶神仙於蓬島燈碁月柝重賔客於湖南小泛紅蓮佇歸青瑣某俯慚小草仰辱􅓻花逢故人於瀟湘尚珍金玉跂天孫於雲漢莫報䄡䄖回葉茶埸車來今雨載征濡轡之塵旗展春山逺聽杖藜之句感君雙尺華我六絲捧雲漢之織裳莫将瑶報撫波濤之舊綉尚籍瑱規賀桂陽劉守䟽綸鼇掖作鎮熊湖天上仙班猶帶􅒀稜之月湖南道院新行棨㦸之春條貫昭蘇耄倪驩舞恭惟某官真霄漢土爲文章翁䄂五老之風烟挿天秀色卷三神之霧雨摶海壮啚自騰翔殿角之雲巳錯落班心之玉飽㸔美蓉之輝媚尋歸芍藥之從容記大史之名山金匱石室籌将軍之武庫紫電清霜小横桂水之烟歡戱萊衣之綵椉騏驥道夫路雷動先聲驅蛇龍放之菹春生敏手𥜗歌鼎鼎綈召堂堂某息䕃載騏叨恩便飬東馳西騖迹将逺於江湖夜醉曉行心相望於霄漢輪囷抒謝藁秸包羞賀寳慶王守丹詔起家彤幨就國跨茅山鶴來從勾曲之洞天分竹使符出領濂溪之霽月感先未識樂在寅同恭惟某官鴈蕩孤峰梅溪的派激龍湫而和妙墨箋古史倚相之書執牛耳而主齊盟負大學何蕃之望大車九軌砥柱百川峩峩天上之神仙佩蒼鳴曉纚纚水邉之花氣㦸畫闈春風行蘭國之江山燠轉梅峰之草木銀莵出色畫鹿生光川暖玻瓈小駐挿天之紅斾花深翡翠佇馳度漢之紫泥某舊綉􅌤顔新麾照眼九州地接獨先鄰燭之光一水江連飽聽今𥜗之頌衷旌揺曳舌筆單踈賀道州王守鳯撿揚庭熊旂赴鎭翩翩趙公子星煥九霄粲粲元道州風行千里騷蘭香度童竹歡傳恭惟某官簫鍾瑶簴之音金井玉輪之操當家清白撫千佛之青氊上界葱蒼接九仙之玉佩出則蟺蜿於湖海入而黼黻於周行衣冠照湏女之珠樽爼總從戎之柝卷紫電清霜之氣主光風霽月之盟驅龍蛇放之菹春生敏手椉騏驥當夫道雷動驩聲發㳺刃於新硎走神丸於迅坂民歌來暮公快行春香㦸凝清和墨剰吟於碧落璽書照渥追鋒促覲於紅雲某鼯技巳窮牡驅何𥙷九州襟帶喜親鄰燭之輝萬井旌旗滿聽今𥜗之頌溶溶新雨亹亹下風賀永州袁守交割春生騎竹吉耀兎銀揚照軫之旌旗布先庚之條貫風行千里庭迅三吾某喜滌籕之辰良即盍簮而申慶亟馳泓頴預訊轅和回前人懐􅌧湘源荣分半竹飛書楚觀光挹前茅爲華緑净之江山猶帶紫清之烟霧沸歡聲於稚籜浮喜氣於寒薌瞻鵉鵠於北平跫然撃節爲雲龍於東野喜甚執鞭槀秸占酧輪囷覿謝請雷州虞守領􅌧海邦低簮楚觀太史紬金石契闊十年故人逢瀟湘㑹并一日喜來今雨碩欵清風送前人别礼剪燭空凉喜話巴山之雨觧維浩渺莫追𬈑海之風隃聞傳皷之麾呵曷䆒執祛之繾綣折梅花於岣嵝愧我騷騷随雲氣於蓬萊爲君娓娓回諸郡守冬陽氣應黄鍾時哉南至兵衞森畫㦸貺我東風昭黼黻於魯臺嘘塵埃於楚觀恭惟某官陽明人物雷動聲名䴡曉旌旗照映壼氷之㓗行春皷角發舒圭影之和近七日之朋來進三朝之元㑹某坐馳梅影隃借芸香宫線添長正􅌤顔於把綉雲門入奏惟洗耳於歌襦回諸郡送年酒開荆楚之畫鷄舊梅如夣賦蘇州之清燕新麯生香挹宫錦之淋漓醉屠蘇之先後從太守楽知同元日之春爲細民斟願廣東風之賜回諸郡賀年條風開獻節雄律鳴春㦸衞森清香雌堂䴡暁茨梁介祉草水生輝恭惟某官氣度陽明精神雷動玉珂舊影光揺白獸之尊皂盖清塵彩照蒼龍之角小聽歌𥜗之暖即來召綍之溫某坐閱一期隃曕五馬回車雲近方懐卭坂之思化犢日長尚味海瀕之譜送徐權府折爼舟泝鴈回載沭瀟湘之雨雲連燕寝渇陪桃李之春恐廢聽棠薄言羞藻乞爲寒水玉恨莫對於氷清走置錦屠蘇敢坐将於􅌕渌回前人請宴折爼㠶浦乍歸沭東風之飛錦鈐齋相望荷北海之開樽清來畫㦸之香緑折瓊芝之草碧筩隃卷如坐使君之林玉案無酧有愧美人之綉回前人送轉官折爼影縻下隰奚𥙷毫釐歩進貟階忽僥分寸正自憐於磨蟻乃特枉於緘魚感折寄之慇懃佩相期之汗漫共明日千里肯分此光賦終日七㐮若何爲報回前人送冬陽氣應黄鍾時哉南至兵衞森畫㦸貺我東風昭黼黻於魯雲嘘塵埃於楚觀芸香在手梅意彌襟日表迎長正􅌤顔於把綉雷鼗入奏惟洗耳於歌𥜗回柯權郡謝舉薦爲仲舉題坐彼羙監州薦侯喜有詩薄言報國度清風於燕寝洒今雨於鴈回大丈夫即真佇膺莵􅌧我郷人未免聊謝貂䄖回前人賀得贑對􅒖嵝之行雲何功将指沭空同之新雨爲飬叨恩志甫遂於循陔音首勤於傳驛某官以錦裳手誦緇衣詩王事靡塩豈敢定居同心心而體國君子不匱永錫爾類推老老以及人遂令回卭坂之車亦猥捧江城之檄某感深烏哺愧甚鵜濡顧影躊躇漸有雲東西之迹懐人飛越相望斗南北之輝回李潭倅謝上渥渙紫泥光紆朱􅌧蓬萊雲氣随太祝之輕裘湘水月明照監州之緹軾兹慿回鴈薄謝來魚某官大雅孤標真清偉度玉珂金鑰聮天上之神仙青壁銀濤重湖南之賔客佇携風幘歸趂屋靴某隃奉􅓻花相輝芳杜拂山尖之科斗敬袭清霜聽江上之琵琶更傳白雪回諸郡倅賀冬九寸黄鍾律和動緹帷五丈畫堂旗春生錦叚芸香在手梅意彌襟某官氣類陽明精神氷㓗𢋫庾樓之曲聲徹雷鼗續湓浦之吟文裁宮線清露曉濡於驥尾韶風夜度於鴛行某隅綉何工屏泥借潤瀟湘波暖照明月於胡床􅒖嵝烟寒倚行雲於仙韈回諸郡倅賀正攝提貞孟陬青規絢綵風流半刺史朱􅌧生輝陽德斯升元氣之㑹恭惟某官聲名雷動氣度春溫緹軾清塵色照蒼龍之角玉珂舊影光揺白獸之樽小分千里之辰旌即下十行之卯詔某坐驚歲始隃賛州端波暖江湖未趣東西之駕風和山水相望南北之樓回諸簽幕賀冬黄鍾陽氣應緹幔香深氷壼幕下清彩毫燠轉芸香在手梅意彌襟某官氣類陽明聲名雷動胸蟠五色卷舒宫線之紋音度尢韶出入雲和之瑟小分光於烏幕即翔舞於鴛行某軫野相望綉隅何𥙷招呼和氣隃㸔仙韈之華上下春輝宻賛賔帷之勝回諸司諸郡幕賀正閱鷄户之年頓驚元日賞龍門之雪隃企光風暖透荔芸意行蘭芷某官聲名雷動氣度春融緑幕生輝光照龍杓之彩朱絃奏雅音諧鳯律之陽衣冠小立於金臺環珮即趍於玉府某相逢甲換猶喜寅同夜醉曉行漸作江湖之隔雲飛川泳永言霄漢之期回施帥凖送别望氷壼於幕下遥結飛霞映赤字於山尖喜來垂露寵先一介禮後七襄某官氷雪孤標雲霄名閱玉珂金鑰接江左之衣冠青壁銀濤賛山南之鼎軸籌帷小駐輦路遄歸某服膺夾袋之儲决意緇衣之好南轅北轍迹遽隔於江湖左弭右鞬心相期於霄漢輪囷欲謝槀秸是慚回洪凖遣到任衮鉞掄材油幢䟽渥花明湘水分曉月於紅牙柝静郾城生春風於色筆一箋愧後六􅓻施先某官威鳯鳴陽神駒奔電貂金奕奕發五彩之芝英簮玳翹翹結九歌之蘭佩小駐清壼之下即陪赤舄之東某隃企芳塵喜聞新雨從軍古云楽剩羡燈碁織女不成章莫酧裳錦回趙檢法馳絲無𥙷愧行湘水之春賛幕多竒逺洒縉雲之雪施先一介禮後七襄某官瑚璉英姿泉阿神物洛陽龍門之清賞吞吐風雲軒轅鳯楽之妙音鏗鍧金石小㳺緑水近即紅雲某乆徯寅同未諧辰見云云回諸郡教官賀冬吹琯動浮灰時哉南至講道出新貫貺我東風挴意彌襟芸香在手某官精神氷凛氣類陽明文鐸聲揚一片雲和之瑟書氊色䴡五花宫線之紋徑携三鱣之春入慶六鰲之曉某何功把綉徒愧織裳􅒖嵝烟寒自笑庭楊之影瀟湘波暖第傳泮藻之清回諸郡教官送别星馳隰轡空浮棘影之塵日麗堂氊喜邇槐隂之翠輒慿回鴈占謝來魚某官蓬萊文章華岳瑚璉曉開雲杏纚纚聲猷清蒞泮芹源源教思聊汲清湘而変鄒魯行瞻黄繖而講唐虞某将指何功同心有味南轅北轍迹似逺於江湖左啚右書情相期於霄漢回桂陽劉教授日麗鱣堂喜近枌榆之翠星華鴈嶠有來芹藻之清知在歲寒舞慚地窄謂草木吾味賦聊誦於梅花母金玉爾音振隃聆於杏鐸七㐮匪報三宥爲荣回林教授時雨鶴峯新𬎼度暁清風鴈嶠塵臬生秋不言而意已傳未識而氣先感謂草木吾味賦聊誦於梅花母金玉爾音振隃聆於杏鐸回張教授春滿鱣堂覃藻芹之教思書來鴈嶠出草木之味言先舉所知豈非吾碩南轅北轍迹遽逺於江湖左弭右鞬心相期於霄漢回胡山長挹西山之新雨如見其人納北窓之清風喜有此客亟慿回鴈占謝來魚某官蓬萊文章華岳瑚璉曉開雲杏文采九霄清照川花書香五色重濯濂泉而浴洙泗行趍廣厦而講唐虞某恍舊綉之濡絲捧􅓻花之盈䄂永爲好也愧莫稱於報瓊能無誨乎尚有聞於振鐸回邢山長開帝舘之雲秋𬎼度曉織天孫之錦晴綺絢空一介施先七襄禮後某官岷峨鋒鍔蓬萊文章紅杏碧桃艶神仙於天上粉墻紫界重賔客於湖南小對簷花即歸院柳某幸償未見且賀寅同自笑黔驢難䇿再衰之鈍相逢衡鴈碩聞三益之規回衡州江判官從軍帷幄欣雲近於蓬萊贈我瓊瑶施先一介禮後七襄某官玉尺懸氷金莖㵸露紫霄縻頂扶揺𬈑海之風緑水飄纓談笑郾城之月佇㸔飛鶚即遂簉鴛某欣捧色絲有華舊綉擷瀟湘之草隃寄鴈回望江漢之雲莫将貂報回趙判官芙蓉幕畫見推三語之清桑梓年情僅效一言之鴈舞䄂方慚於地窄織裳乃逐於雲來瀟湘逢故人薄酧今雨霄漢瞻佳士徒竚下風回郭判官雲近熊山有美芙蓉之影書來鴈嶠頓生杜若之香三語施先七襄愧後某官珊瑚文采氷雪聦明空冀北之群神行贔屭望湖南之幕鋒淬鉅鉟小賛凝森遄班清切某偶諧聚軫多幸同寅意重氷清深謝宜敖之句贈隆錦織莫酬㓜婦之辭回陳撫属張監倉馳絲何𥙷愧岣嵝之春風畫幕多竒賁瀟湘之華月施先一介禮後七襄某官絶俗精神識時俊傑洛陽龍門之清賞吞吐雲烟軒轅鳯樂之好音鏗鍧金石少凭玉帳即覲璧璫某多幸寅同有懐未見南轅北轍迹似間於江湖左弭右鞬心相期於霄漢回黎知録李司理驅馳逺使空搴杜若之雲俊逸叅軍辱贈梅花之雪舞慚地窄知在歲寒某官巧鑄鉅鉟清摩贔屭剛風度筆廣平賦之淋漓寒露照襟何遜詩之洒落小需鞠草即㸔攅花某共客瀟湘期君霄漢重緹錦叚莫酬明月之珠空羡紫鱗擬結横江之網回永州司理司戸梅花鐡石心相知巳晩金薤琳琅字多謝何厪味也同吾惠而好我緇兮又改嘆舞䄂之地寒白也不群喜録屏之天近回謝司法星馳周隰将爲飬以懐歸春度燕臺乃覧輝而來下載慿回鴈薄謝來魚某官華岳清氷海水明月鏗鍧金石軒轅鳯楽之好音上下風雲洛陽龍門之清賞小吟蕖緑徑照藜青某夙幸同寅隃贍聚軫南轅北轍雖遽隔於江湖左弭右鞬正相期於霄漢回諸縣宰賀冬觀臺雲物曉㸔五色之書彭澤風流春度一同之詠駢花委艶芳杜生香某官氣類陽明精神氷㓗霞飛錦織卷舒宫線之紋春落弦聲上下雲和之瑟佇翔鳬影晋簉鵷行某迩只畫簾翛然隅綉撫庭楊於岣嵝空負分隂培浦柳於瀟湘隃㸔一碧回諸縣宰賀正攝提貞孟􅑍八荒開夀連城得茂宰萬象皆春花柳無私茨梁有慶某官聲名雷動韻度天和文艶錦機光照龍杓之彩風生玉軫音諧鳯律之陽舒舒蒲榖之香進進蓬萊之武某坐驚甲換猶喜寅同為秋浦官孰禦春風之舄送長沙客相望明月之舟回衡山趙宰孟傃謝舉陛陟效顰一鶚力何𥙷於培風照眼雙鳬手忽承於垂露一謙過矣三復跫然某官文采珊瑚歌聲金石融峰九千餘丈氣埒青蒼郎垣二十五星光生銅墨裒時正直簡在凝嚴某借助鞭長汲清綆短頌言美瑞知麟鳯之在郊趣覲通明戒鸞凰兮先路回善化韓宰出宰山水縣喜調新琴爲織雲錦裳有華舊綉載慿回鴈占謝來魚某官玉尺清方金莖晶潤融峰九千餘丈氣埒青蒼郎垣二十五星光生銅墨暫翔鳬影佇入鵷行某自賀寅同豈云未見姢姢一碧共㸔貫索之沉耿耿七襄莫效聯珠之報回鄠縣爰宰移綉波濤愧将絲轡出宰山水先度絃歌隃寄鴈回敬酧魚遣某官琳珪清越氷雪聦明雲傍碧桃千丈蓬萊之光氣月明緑野一簾秋浦之清風小種縣花佇歸院柳某俯慚舊斧仰辱聯珠味黄絹之辭永爲好也乏貂䄖之報受言蔵之回牧縣郭宰舊綉塵深閱八􅕴於楚觀晝簾花度飛五朶於雲陽新雨同心清氷照目某官光華尚錦盤錯投刀横巴水之野舟肯煩期㑹聞楚萍之更鼓終覺分明迩只鳬飛翩其鵠立某馳驅技短嗟切意長皎皎織女終不成章駕言匪報駪駪征夫每懐靡及尚克相規回湘潭張權縣雲移松影調新韻於宓堂春滿桃隂來清風於周轡懐哉今雨遺此華星小生欲相吏耶碩同衷恊丈夫即爲真耳佇聽除音一水姢姢七襄耿耿回求興趙權縣鶴岑琴好相望明月之心鴈嶠書來不隔同年之靣以雍容之雋軌将慷慨於公車北轍南轅遽江湖之相逺左鞬右弭尚霄漢以爲期占對甚臯垂孚爲寵回瀏陽任丞晴紋照綬曉入新花逺素飛雲春回舊綉辱施先於一介愧禮後於七襄跂天孫之織雲莫将瑶報望美人兮明月尚藉瑱規回寕逺簿到任地鄰棲鳯喜聆千玉之吟風度鳴鸞恍聽九韶之奏縣花出色汀若生香然太乙之藜佇聽令業織天孫之錦莫敵腴施回浟縣趙簿衡陽易尉馳隰無功愧行雲於岣嵝佐琴有韻捧明月於瀟湘小車來映於縣花春佩相輝於岸芷某喜瞻聚軫樂在同寅北轍南轅漸覺江湖之隔左鞬右弭尚爲霄漢之期回衡陽歐陽尉挹春花於拂綬喜見青撑垂星字於乗槎有華緑净重此湖南之賔客美㦲日下之神仙牡轡何功自笑再衰之技貂䄖莫報更求三益之規回楊料院司㑹名藩有美同年之子委書下隰聿來異事之僚峩簮玳於賔筵粲糜瓊於騷圃湖南幕貴良懐支使之賢水北價高寕乆山人之索遥慿回鴈隃謝來魚回宋稅院萬年篁竹嘯鼪䑕僅免失刑岣嵝挐虎螭劃傳得句怒飛鐡畫光照錦機撫劍首於􅃮園敢當一吷間簫聲於赤壁莫遂倚歌回劉學録胡石壁客我馬維駒訪岣嵝之竒字有鶯其羽發蓬萊之妙音亦來見我乎甞有此客否某人語洗烟火書籠山川張生手持石鼓文氣涵緑净揚雄自有河東賦聲透明光亟呼熊耳之雲立近鰲頭之日某味同草木影合江湖扶揺萬里南𬈑相期汗漫上下四方東野此意輪囷通交代廖提刑邦杰號恕齋共審䟽恩象魏易節熊湘星度天囷光照武陵之雪風生春綉神開衡岳之雲翠蕩凌烟華絲絢曉恭惟某官傳心正學行世清規雲霄閥之高寒蜿蜒浦劍湖海樓之突兀坱圠參旗屹砥柱於中流行大車於九軌出擁康沂之駕入提建禮之門犀監重弓武絢将軍之電金曹曵組輝聯湏女之珠佩聲雜遝於蓬萊麾影横斜於牛斗誰謂寒露清氷之勝屑爲春山暑露之行收海苦之波濤定夫正學布淛江之雨露朱子常平便當跨汗漫而擺雷硍于以經駘蕩而出馺娑属天顔之西顧念民命于南維不有仁人孰長王囯乃輟神仙扵海上乃移星宿于軫中惟君子之祥刑自聖門之恕學推廣不冤之條貫發揮無訟之本原轉陽和扵芙蓉薜荔之間沛生意扵槢椄桁楊之外盖以臯䕫之長者而行孔孟之本心皇華咨度咨詢盡展平反之業清問惟明惟畏即陪啓沃之聯某乆把短鑱偶塵綉斧撫王事而集苞𣏌坐隔白雲望美人而結幽蘭喜逢今雨俯仰十年之同味夤縁百世之交情尊叱馭陽回車豈是秋春之鴻燕貢弹冠朱結綬尚将上下扵雲龍舌筆踈單衷旌揺曵與袁州安守到状叨符便飬假道言歸西水分江喜接九河之潤東雲捲雨重瞻三峽之春即遂樞趍預深欣忭回袁守不赴請馳白雲之下幸甚假途卷今雨而來言将授舘華髪之典刑甚厚清風之籩豆有加薄言還歸何速卭崍之馭碩安承教第懐䑓峽之春方命負慚嗣音抒謝回交代權贑州孫提刑炳炎南節易麾爲慈親而拜命西臺就牧屈膚使以論交温朝花雨别之盟借堂草春暉之色施先一介禮後七襄恭惟某官大雅風流真清人物氷懸雪跨吐吞禹穴之玉書鳯躍韶鳴鏗戞天台之金賦雷轟歘起山立徐行巍冠參卿月之班雜珮峻郎星之直侍女護衣鷄人傳箭擬翠殿之賦詩衞兵森㦸燕寝凝香肯芝山之携酒豈弟十萬家之春意精神三百里之湖光前席興思此佳吏部西人則曰真好監司寕遲履接於星辰便報綉行於霄漢春風扉影草卧桁楊夜雨灘聲雲銷貫索暫屈玻瓈之六轡更聯虹玉之半符昔清獻典州而三川之琴有韻而濂溪行部則五嶺之獄無冤每惟八境之有縁皆著兩賢之遺迹盛徳可稱於百世明公乃合於一人麾蕩照江劍刀易俗玉節青絲䌫小駐虎頭白馬金盤陀遄陪豹尾某無功将指有味陳情王陽回刺史車庶乎爲子毛義捧郡守檄專以爲親昔随振鷺之英㳺今忝傳龜之雅好夣回舊綉恍慚揚秕之前手把新符早托絶塵之後㑹趣綸之來下辱飛檄之逺臨皇華之禮有加南陔之詩復作安有十一州之㢘察屑爲二千石之交承行縣録平反喜不隔望雲之舎詣府受約束碩遂依近月之臺舌筆單踈衷旌揺曵回陳侍郎篤齋回車卭坂請自效於林烏得郡江南取巳捐之竹馬綢繆錦製緹襲衮華恭惟某官麾斥八極之風雷卷懐九天之星斗古靈䄂中之槀屡薦時賢温公洛下之評不遺人物遂使忝求芻之寄從而諧啜菽之私某半竹奚堪􅓻花甚寵想五𤱔青山之樂碩請訂金懐四方明月之詩曷酬贈璧賀曽京尹淵子號留逺露綸渙渥星履陞華東澗西瀍冠十連之元帥南昌北斗表六典之地官丹屏雲開紅牙日䴡某官抉分雲漢吞吐江湖直氣摩空金天晶之錯落清規照世玉井水之甘寒自􅎪􅎪於鸞聲遄峩峩乎豸角文章大手南豐先生政事十條小范老子䄂出摩霜之鉞坐吟捲雨之簾真侍從歸拜於甘泉慈父母來臨於京兆乃由太乙徑陟文昌水懸雪跨而朝望孚日暖潮平而民氣樂􅓻衣冠於建禮坐鎮千畿籌帷幄於延和遄歸兩地某喜傳除綍阻趂賀綦五緯明霄望龍泉之秋色九河流潤懐虹翠之春暉回曽主簿清老曽王堂秀溪之孫千里明月隃企停鸞一字華星劃開湧翠恵而好我粲然有文某官地胄穹華天資潤美北平王之閥閱梧竹蒼蒼東山氏之衣冠芝蘭奕奕盍騎麒麟而凌厲乃從猿鶴以徜徉展也怒飛翩其孰禦某頃馳楚傳切志綿田卭坂回車庶乎爲子江城捧檄正以便親永懐寸草之睴更感粲花之寵式相好矣莫酧錦綉叚之華遡洄從之如此玻瓈江之碧回吉州權府賀新除某寖䟽棨座倐𬒳絹封身到木天誤辱九重之眷詞垂金薤過蒙十部之臨方切循墻敢勤褒衮盖如庸晚徒抱迂愚山林自分於投深畎𤱔空存於愛上朝清道㤗幸遭際於明時小徃大來慶挽回於正氣猥令忝竊例沐登崇恭惟某官瑞毓長庚福移子駿家有甘棠之笏凛凛典刑人蒙别駕之春陶陶生遂適郡符之𥘉綰覩帝綍之誤頒盖惟大夫之曰賢遂令小子之有造正朋一字恐慚讀秘閣之書肅使載還尚擬致監州之謝回吉守李寺丞芾光膺芝檢榮剖竹符吉爲大邦望二天之正急公有異政爲百姓而一來新令風馳歡聲雷動恭惟某官雪山氷壑天球河啚居南岳風土之竒夙鍾清淑得西堂議論之正綽著典刑早啓雋途荐升華貫天官宫正持衡稍食之平穡臣司農挈領扈丞之重惟絶海迅颿可以開鯨浸惟倚天長劍可以破浮雲故當搶攘杌􅑾之秋常任撫字澄清之寄昔四郊洶洶帝每興當饋之嗟今二水湯湯公迄收按堵之效惟我廬陵郡之劇爲今東蒙主之難莫非王事我獨賢勞旁諸縮手所謂世臣必有喬木上遂傾心向來二千石之除曽擬六一翁之里惟蒼生之有福故珠浦之重還期㑹餘間雖異坡老作詩之舊道理最大喜聞韓王有徳之言今庶㡬乎侯來暮矣青原鷺渚未容坐席之溫紫殿鵷班正恐召環之速某幸備受㕓之數得同載道之歡已進迓於前驅乃退慚於後至欲陳情而未果先賜汗而謂何謝劉公𥿄書姑附鴻翔之便望皇甫壁記即修燕賀之恭嚮戀罙深敷陳罔旣回前人某荐蒙顓翰再遺駢緘辭遜一出於肺肝義理各存於肯棨螺浦之珠旣去復返足以爲竒夜光之璧無因至前受之甚懼輒裁尺素庸叙寸丹仰兾融清俯垂澄察回前人送冬禮周曆紀正魯臺書至袴謡雷動恰先七日之來棨座春生共慶一陽之長頌聲盈耳和氣滿城某未薦賀言猥厪餽禮岸容待臘正棲寂寞之濵谷律先春多謝溫存之貺赧然登受略此控酧餘俟别陳仰干情亮回黄主簿伏以春華如水驚三紀之流光夏緑滿園又一年之𥘉度方拾薪而煑瀑即嚼茗而嚥花敢意一謙有來多貺厚之厨珍以起其牢落将之篚实以申其慇懃童喜相誇爲里中之羊酒児癡不了笑門外之桒蓬拜而受之我之懐矣輪囷感臆拍塞謝言回監魁錢昇叟賀新除某偶膺光寵实沐庇庥将爲行人之辞先承君子之餽樽來工部有光臨别之桮荷鵝贈右軍以比大鳴於鴈木登嘉以徃感徳惟深姑此占酧嗣容禀謝賀府簿錢昇叟兹審錫命中朝職書大府宻運良畫恊賛大功伏惟慶愜某正深蒙頼倍切忻愉亟此叙賀切㦲委照回大庾縣尉刘天聲昨因歸鴈獲附殷勤歲月如馳曠音弗嗣五朶雲箋翩翩復來山林郍記𥘉度桒梓拳拳黼藻过矣就審一麾知巳三尺司平楊州梅花何如庾嶺本色吟哦小駐倚聽横飛庭实磊落分不得拜興言逺意若之何速之粛使知慚㐮拜不敏何當裔状文山先生全集卷之八終
