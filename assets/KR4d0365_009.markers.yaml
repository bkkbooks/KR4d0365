  - {type: indent, offset: 19984, content: 　　, id: KR4d0365_krp_009-bkkind55}
  - {type: variant, offset: 19984, length: 489, content: 燕氏族譜序嘗謂人之有祖也如水之有源木之有本也夫源之深者流必長本之固者末必茂此自然之理巳然之騐也燕氏榮㤗來自龍潭循州好山水之勝通隂陽之理歴吉之東鄕大北溪見其江山秀䴡地勢盤旋於是遂徙居之榮㤗生男貴玉勤而力斈未遂厥志而早卒孫長曰祐字天益號爱月領職都差次曰祺字天祥號瑞軒領職通判淂其禄淂其名㢘公可畏治政有方年逾耳順乞歸骸骨故敕誥以還鄕積善成徳冝永享其悠乆也益生男宗羙清白傳家謙恭處巳以金石締交盟以詩書立門戸善継人之志善述人之事㔙業守成實有光於前聞人矣羙生三子長曰希禹次曰希仁三曰希舜兄弟俱有文名以仁睦族以礼待人若河東之三鳯謝氏之彦秀者也自是子孫蕃衍食指浩繁常於餘睱之際從容啇略故有陸賈之分長禹受永昌鄉渀灘居焉次仁受永昌鄉青峒居焉三舜受祖基家焉禹生國賢國賢三子曰徳祥徳勝徳卿徳祥領職司舉徳勝領職司户徳卿領職司理徳祥之子曰均治徒㤗和城南徳勝之孫曰子實徙廬陵華羙坊徳卿之孫曰子昇徙永豊桃源雖星羅棋布是皆同一源也恐後世乆逺真偽不辯故命予修諸譜系載諸詳悉以見先公一人而來迄今有年矣雖族属䟽逺長幼尊卑按此譜歴歴殆可見矣若夫水源木本培植深固支流柯葉蕃衍盛大亦在乎基之於前而有顯諸後矣為賢子孫者可不鍳哉, WYG: ''}
