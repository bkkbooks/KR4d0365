  - {type: variant, offset: 14184, length: 1, content: 卷, WYG: 賢校理薛紳為證直指為某合持齊衰三年嘻其誤矣聖人制禮自有隆殺其隆殺本}
  - {type: variant, offset: 14186, length: 0, content: '', WYG: 人情切詳蔣永吉之祖妾直下只有蔣永吉使蔣永吉而不服則其祖妾為若敖氏之鬼矣所以為孫者須持齊衰今先人之本生母自改適劉氏之家有劉氏子孫持重服則主祀固是他姓矣是以某體先人之心則只當承心制也况蔣永吉無祖母今則某有正祖母在堂何縁可為劉母持齊衰乎劉母之子既持齊衰某又自姓文何縁兩姓俱有齊衰之服乎又詳薛紳之母既稱為祖母萬壽縣太君王氏則是嫡祖母也當時朝廷止給假三日只從孫之本服所以薛紳再申指為先人所生母謂服不可絶也故有三年之制此正是承重孫又自與蔣永吉者不同也禮官不讀書不講義不明先王隆殺之意往往只據吏人檢至故事見有父所生母}
