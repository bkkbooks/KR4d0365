  - {type: variant, offset: 14188, length: 0, content: '', WYG: 教之耳金盌在質庫某處約之甚恨未能自取之乃勞先生厚費如此山林中亦無用此物先生儻乏支遣不妨更質愛用第常使可贖足矣吉甫一去連旬頗孤龍頭之約時且向熱矣奈何因便介到城伸紙行筆嚮風馳情金盌乃先生為景獻太子府教授講經徹章上賜也巽齋借而質之故先生云然道體堂書與前人某尋常於術者少所許可而江湖之人登門者日不絶彼誠求飽暖於吾徒之一言吾徒誠閔其衣食之皇皇則來者必譽是故不暇問其術之真何似也先生之於應酧也亦然今是書之作為一星士姓朱名元炳字斗南號月窓則非前者之謂是誠有取於其術矣斗南吉水文昌鄉人去吾里三十起田間談命髙妙精絶盡奄同袍試以百十命應對如流而人品之大槩皆不差異哉術也問其所得何書則當汗漫於卜數家而其末也㑹歸於李吉甫林開之説吉甫之書人多有之以其深而不能詰若林開則人未有得其本者也斗南㑹二為一而又以所得於數十家者間出而證之斯其所以獨步也某既與之訂正二書又詩之以見意其別也欲詣門下求品題某告之曰先生品題甚易至之日為先生請十數命某也如此某也如彼為先生鋪陳之即先生亹亹豈惟品題先生心肯轉相汲引即子命通矣斗南曰諾探其中欣欣然殊無憚色他人泛泛得先生増重多矣未有如斗南肯以術而取先生之知者也是書也某何為而不作事出専白故不他及與前人某前月二十八日因朱月窓來逺迓草草一帖致起居不知是日正先生到家日也後聞稍避訪客住某寺久之然恐訪者即所在相尋亦未必能盡避也某九月十三日方及門值鄉榜未掲此一月中相過者有數近數日漸漸増多來者必數百里或百里不容不少款閒居寒薄殊不能支而妄有干請者紛然多不相亮甚以為苦先生昔者於應酧亦苦之今猶苦此否嘗䝉見示毎許人作一文如置一針胷次今某畏為文詞亦類此矣習懶亦是病先生以為何如念久闊尊候亟起援筆請所以誨朋友以某逺歸間有以羊麪問勞之者某不敢私輒以一羫一石獻之庭下某昨在宣州不敢攜木𤓰宣州人不相忘近却有以此為意者知先生嘗須此為藥物謹并奉四枚一笑留頓幸甚囘劉架閣㑹孟某伏蒙専劄垂示先夫人誌銘伏讀驚愴靡已古心先生藻發清言垂光罔極慈靈有知含笑地下若此可以無媿人子矣逺日倐至栁翣載途追送傾城素車銜尾某於夫人契家子弟以故不能攀望引紼負負幽明不勝愧恨謹成些章一少紀哀愫以授挽者伏想隨車號痛涕如綆縻孝在顯揚願寛毁瘠臨紙下情凄切之至囘衢教曽鳳先生字朝陽號秀峯某數月於師門極間闊顧山水荒唐不自知年歳之運運闕禮多矣尚庶幾先生索之於形骸之外別後得二子丙寅戊戌庚戌丙子丁夘壬寅甲午丙寅命不知孰勝乍嚮風水即得三地此須具眼以為然則然向牛肉坑所結砌者今知其大謬為棄屣矣深之昨所問館成否何所固必新正詣清湖行禮亦不見訪往往泥哭則不歌之意非有他也屋見説漸就緒先生鼓舞倦矣宜作意身事悠悠何為行日可得聞否春和景明其間一造盤谷亦可遍觀先生所謂寳者更願撥剔而後來一來須十日乃可歸爾悉俟面賦此不能盡囘李宫教應革號肯堂某頃以附伯昻令姪書後未悉起居深之令弟來聞病目少寛為之喜幸日欲專价詳問飲食坐卧之節塵坌因循心甚愧之昔人云身在則有餘舉天下紛紛藉藉不如意事屛置度外專精神事醫藥靡有不濟恐吾目所受病方將驅除而又重以吾心之不寧是滋予疾也用敢於岐黄忠愛之外輒奉清心一方為獻願於大學第七章加三思焉偶璧弟有介歸就有京書達左右輒并遣前薄物將忱徒覺塵瀆臨風馳泝與朱太博埴號古平某山中相望數舍而逺乃心精微無往不通僕十年受用順境過當天道反覆咻者旁午七八月以來此血肉軀如立於砧几之上虀粉毒手直立而俟之耳僕何所得罪於人乃知剛介正潔固取危之道而僕不能變者天也僕誠不自意乃於寒舍千步外得一陂陀溪山泉石四妙畢具委曲周遭可十餘里葢其景趣兼盤谷環滁而有之而其曠逺縹緲或謂南樓劣焉騎馬囊飯朝往夕還率以為常而山外事一毫不接耳目矣僕嘗羨君家山水之勝幾欲作意植杖其間而未能也然自以為旦夕必償所願不知吾壺天可以屈公一來乎烟霞泉石此不足與俗子説處知音者自不同正恐不問主人徑造竹所余月心來拱被寳墨惡乎而不用吾情適凝祥觀蕭道士來訪其別也曰吾將造古平為之書以復命且道予懐而假道士為郵焉某比及門即拜狀聞車騎在郊外正欲嗣訊韓星忽來偉然朶雲之贈故人渠渠勞苦行役諸兒那識此意曉起入山新流没岸棊聲未盡石骨依然人生往往如此盈虛消息道體流行仁者謂仁知者謂知可超然一笑承有訪剡之約上已前後擬山行數日須主人在竹所方可乗興分沙一席已戒白鷗退避矣呼燈走筆馳意泬寥極有磊隗欲從執事傾倒一日雲山浩𣺌𣺌焉余懐忽拜羲獻帖宛然玉立之參前倚衡也垂諭前城李氏事讀之甚駭近有假為黄節幹者騙寫其家田莊鄉􅅟既見之發覺昭其迹於牆壁間矣曽鑑何人又肆無狀欺愚嚇聾一至此耶某平生所立謂何豈有退居林麓省咎敬威我自為我而青蠅紛紛每使惡聲至耳莫為而為莫致而致非命也耶勢不得不榜謹納一紙幸轉之李氏以破奸猾者之為使人日為此等救過之事不勝浩嘆某向者因及執事出處常誦伐木之詩今書所云猶若未悟稟答之次臨紙惘惘回鄧縣尉中甫某入山愈深於所尊敬嘻其闊矣前年足下以書議禮得一往復最後賜誨迄今不能報論其形跡何前之恭而後之倨歟坡云人情重往復不報生禍根后山云一詩已經年知子不我怨人之度量固有相逺執事知我宜可以無前日之事今通國識其用心由其未定而言辭之不可以已也如是自其定者而觀之輕重銖兩固皆當然言語文字幾乎閏矣昨書皆精義所發巻為一通謹而藏諸後有作者將為此興起客從巽齋來能言執事日從翁樂甚因款客坐亟亟援筆寫此悁結授客以轉之左右學之不加感慨年歳山澤雖逺尚惠一言臨風拳拳與顔縣尉復古某自春末得一夕承顔色接話言外此皆瞻仰之日追憶是數年來書筒無虛月分袂亦不太久未有如今之疏者也然私竊自解則曰此其迹為然不足深計知足下得我同然與否兹者恭承少迂蓬山之步暫為梅屋之游脂車有嚴滌篆伊邇豈勝贊慶執事自此開張清途摩拂碧落固其分也顧徼富貴利達以自致其身貴且重者崇論宏議所鄙者也不當薦是為賀惟邑於民社為最親惟少府於邑為最要平生學問藉是得以展布潘輿康寧千里迎奉調熊嗜苦式慰兹願是二事深足為年丈賀也某雅聞説者以某日戒途懐是惓惓將祖帳道周桮酒為壽屬有牽制不能來謹上狀并致薄禮以昭區區惟容頓是幸川平陸夷行者有相惟秋深殘暑未央更乞頥輔崇重以前三接九遷之寵隨軒徳輯伏想喜氣方來錫羨山則別後或有鄉邦驅䇿敢不下拜某嵗抄得承便駛遺以􅅛洒故人千里之情藹然可掬感鏤其如之何兹得嗣書於令弟來歸之便尤見崇篤喜審議論於帷幄之親出入於錢穀之㑹滿腔磊隗庶其有以自試矣來教自咎以為浸淪汨於俗吏之歸此意固超人一等孟子論仁賢而必望其有政事財用之效葢績用聲猷不可相戾本末一致焉得就此以遺彼自賢者徒以清浮為髙而無益於實然後小人得以事功自詭今日挽回君心轉移世道吾輩正不得不自力尚可以俗為尤乎伏惟尊同年其懋勉之須承刋委比於敬岩之前亦屢説項非某私於所親名徳如許區區欲自黙本心亹亹白有所不肯此老亦既有所許矣坐席未温遽為林麓之歸一場説話又付畫餅雖然長松在林利錐處囊翹翹傑傑旦夕諸公爭羅致不暇瑣瑣愛助何足為説某奉祠侍親頗於讀書有一日之樂朝市紛紜怨謗之府某雅欲退藏以逺罪咎賜教極得同然之真或政事有足為庸陋矜式毋惜刊曉一二因以具報情悃非筆可既専規嗣布與聶吉甫某於斯文契闊數年於此載酒問竒豈非夙心而相望百里離羣索居甚負此愧以其傾嚮輒私布之先人季子生二十年矣號曰學文實未知方有從弟一人同堂而習年相若而學相似也閣下沛然古作籍甚時名所欲北面而從事者衆區區欲使二子者私造化焉間者疑其不可諗之朋友故以為請不圖閣下不鄙夷而許之敢専書以聞閣下屑與之盟豈惟二子得以受教僕也不敏實嘉君子之賜援筆荒蕪臨風切切某作別近一月是一月中稍從事魏晉間歌行若不能彷彿魏晉間人不可作那復問向上非獨自歎世代亦可感念安得英妙沈著如心逺即日執手共論此事某平生斯文幸甚此數月心迹相親近方自歎解后之晩而執事即欲舍而去之奈何僕恐於主賓之禮實有未盡輒托絜矩謝過并為弭節從容之請憐其至情不曰麾之門牆豈非三生之至願俟命切切回}
