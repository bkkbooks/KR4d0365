  - {type: variant, offset: 14180, length: 0, content: '', WYG: 集巻四欽定四庫全書文山集巻五宋文天祥撰書回胡簽判請交割除寧海軍節度判官廳公事日某仰徳襟期比布之竿牘顓飭謝言兹不贅吐首祈崇炯某幸甚區區此來得忝交代意者天將開攀附之縁使之拉湊一至於此惟是天賦偏於愚戅親見聖主懇焉求言意應詔者必有中今日之故側聽逾久無能為國家陳大計者私念上悔悟勇決如此而某蒙恩至厚他人既不言則雖疎逺豈容避其責是以積忱累日冒死投匭以冀一感悟天聽出闗席藁以來首領且不自保况茍官職乎髙誼不薄猶以同寀為情連屈軒車復畀翰墨一吏至又持公文以來周旋曲折無非眷愛某感激不自勝惟如前之義則有不可孤長者之意不敏謂何某尚留此待㫖若數日後威命不下則是上憐其愚而寛宥之某當歸且念咎矣而非所敢望也所有添差簽判㕔公用某一切不曽祇受或郡府不以某為不肖他有情文則恐吏輩為欺而亦某所不與知也本須具狀申府惟身為罪人不敢自擬於屬吏之列得於畫諾之次叙其衷情則某之受賜甚厚也臨風拳拳賀吳提舉西林已未某自九月赴京師時請叩門牆蒙警䇿備至妙語天然式相行色篋笥間至今耿耿有光氣第某解舟至豐城及聞新局肇更鄰麾茂畀細讀仕隠不同轍之句則雲駛月運舟行岸移轉瞬之間已成兩様雖然此非為明公榮也纓冠褰裳世道有賴焉某來上下以鄂鄂故為之􅐓洞聞諸閫雲集而某正不多以此為不足慮獨賜教時則衡陽之事明公葢已及之而中外未之信某以十月晦至修門則聞聚毒已并流波浸漫秣陵荷擔之事葢凜凜已兩月中間新相至則又得月十日定帖耳然我之緩急往往視敵之起息為之則定帖者未可保也譬如一間屋前人放火已燒及旁舍僅僅得全宅未動卒急得一曉事人率衆拯救雖千百擔水未足以頃刻沃滅明公葢防火一大頭項也今事莫如袁吉之急袁已改畀明公而鄉里又得平林為重時有明公諸人必能一心同力以障潰堤之衝藉此無恐惟内間則病根未去履翁掣肘尚多雖言路大開而奸䛕熏注之深搢紳多不能自拔徒聞應詔投匭則學校與布衣而已世變至此可為慨嘆某不量其愚輒上書論其事區區以為宗社有故死亡亦在旦夕不若犯危一言有及於今日之難其得禍與否不計也今出闗待罪已三日而上猶未見施行未知後命如何藉天之靈祖宗之休明公之庇得全首領而以周旋於義旅之後不勝願也而不敢望也封事藁止於一本付璧弟全録以呈似其疎狂知執事不笑且憐之否共惟節鉞交錫旌旗一新誼當専狀為慶顧世變至此明公方任大責重以與上下同憂患某不敢作平世語也惟明公亮之引筆嚮風拳拳不備囘聶吉甫號心逺某比道從鳴珂幸甚獲下膺龍之拜蒙眷愛稠渥侍樽俎間者連夕感激不自勝別後凡百餘日數千里行役貿貿於一來一往之間大可取笑伏承寳墨鐫教備至今天下大勢所以削弱不支實坐於文物制度之宻區區直欲割去繚繞使内外手輕脚便如此而後可以立國書中言規模大槩所以纎悉上下其説則未也朝廷若不鄙而行之則台諭欲列置一帥如古方伯連率者又當再商量也區區之心既不足以行於國退而欲為一鄉一宗之謀正將擇險以為依集衆以為安但事勢浩大不量其綿力而欲舉之善後與否視吾所及何如某乍歸冗劇使命日亟返姑此治報何當一日㑹晤以請所未聞賀何縣尉名時字了翁某頃掲掲入國時江皋祖帳為意腆甚感激之私不自勝別後不圖世變沄沄天下大事幾去某始而駭中而疑繼而憂憤又繼而大聲疾呼以至於流涕出血相去近百日而展轉變化以至若此事變可畏矣哉某學無涵養不能謹其所發倉卒來歸求為杜門循省之計藉慶雲在上以此月七日善達鄉國甫入境側聞一同桑梓若君實庇䕃膏澤之以廉革貪以明易暗以神竒變巽懦大冠縫掖交以程吳歸焉方謀奉狀至屏下而紫氣煌煌已移照鄰次交臂相失懐此悵怏當今事㑹方殷人才不競一杞二杞國家常病之今州縣之於執事亦此類也凋瘵􅐓洞之餘雖近於不可為而開繁破劇如長才得以自見可賀也吉水之為邑得之朋友見謂官錢無定額賦無正籍是以若此其竭澤也平林以鄉人為郡念此至熟也執事軍期之暇為之定制立數求為一定之經恵幸兹邑其庶幾乎上丞相除秘書省正字辭免不允正月吉日具位文某謹再拜奉書于某官某昨䝉朝廷不以不肖授秘書省正字職事某自念非才未有庸厯輒具狀辭控既而省札降不允之㫖鈞翰重促行之命伏惟聖天子之所拔擢大丞相之所提撕徳至渥也某一介晚末跧伏深宻所知不出田里大丞相勒名鼎彛紀功太常坐於廟朝進退百官而佐天子出令下土之人求望其位貌聽其謦欬不可得也惟聞弓旌紛於阿澗束帛徧於巖野元徳碩望麟遊鳳集於省臺之上想望風采以為不圖此生獲見昇平如此詎意今者宸命收録於草茅鈞畫照耀於山谷恩光所被震悸不自持僕惟此舉不見於今世久矣夫大君宗子居天位者也宗子之家相理天職者也自一命以上所以輔賛大君彌縫家相者皆將以分奉天之責者也書曰天工人其代之又曰欽哉惟時亮天功又曰天命有徳天討有罪天叙有典天秩有禮韓愈曰天付人以賢知才能豈使自有餘而已忱畏天命而悲人窮也天命人事常判然不相侔而前言往傳動必以天為訓者人雖藐然萬物備於我茍為凡民則已大之為聖賢秀之為士天地民物孰非一已之責任重致逺皆性命之當然也由此觀之用人者非私於其人為人用者非私於其用近臣之得所為主皆所以事天也此意不明上之人操其公器大柄以自私曰吾能以富貴人下之人失其靈龜貿貿於勢利之途而不知返是以上不知以代天理物為職而無復有以貴下賤之風下不知以畏天悲人自任而無復有比之自内之義天地失位人極不立人物悖其性往往由此者多矣伏惟大丞相勲在王家意在人物方且以不滿假處功以不驕吝處才開忱布公集思廣益嘉與天下賢士大夫以為共理如僕庸愚亦得自列於兼收並蓄之下顧僕不足以稱所舉為大負而由}
