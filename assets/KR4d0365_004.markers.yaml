  - {type: variant, offset: 14187, length: 0, content: '', WYG: 字便謂事體一般鹵莽申上更不曽子細致辨於同異之間今且未須論某所得服如何且只論先人之服先人之母改適劉氏既有劉氏子為服且先人係出繼別位又非本位之比先人只當有心制不當有齊衰明矣若先人有齊衰則某當以齊衰先人有心制則某只合承心制豈有先人本等止有心制而某乃有齊衰之服乎朝廷所行便作萬世不刋之典毫釐之間所當致辨矧禮意粲然非有嫌疑又何難辨之有某承心制已一年矣今非畏有齊衰不願承服但可惜禮官如此討論萬一誤朝廷備據行下恐國朝㑹要上又錯添一典故不免貽將來朝廷無人之誚耳今看來禮官未必解事先生揆之本心若以為某見行之禮既安徑乞從都省㸃對行萬一已照寺狀施行亦乞改命庶不悖於人心天理之正而古聖人制禮之意得行於今其於綱常豈曰小補之哉後朝命下許令承心制仍著為令道體堂書通江㕘政古心某即時甘雨共惟宫使大㕘相公先生芝山清逸珍館宴超天相有道鈞候動止多福某昨歳獲走一介詣舍人門下伏蒙鈞念勞苦有加祇服訓辭至今亹亹俯仰山林感慨年歳又若是其闊疏矣某官百年幾見一代共宗司馬居洛而相天子活百姓都人西其首而望張紫岩杜門白首而嗣皇嗟嘆用晩倚之以向中原先生今其人也上方舉元祐故事勤於夢卜旦夕爰立言人人同先生不以此覬於當世而當世以此祈於先生惟先生重愛眠食以幸世道某屏伏田野蒙賴鈞天之庇守先人墳墓幸無闕狀追惟兩年間口語横出先生進而廟堂退而江湖徳於其人如出一日傳所謂生死肉骨之情也報答已知言語抑末傾竭犬馬尚庶幾於門牆専人上狀百拜起居衮舄皇皇未遑納拜心之沄沄如此江水仰乞鈞照通潭州安撫大使江丞相某在門牆諸孫輩行中而所以蒙鈞天造就知愛綢繆獨出乎諸生之右然號為登門垂二十年而至今庭下無愈之迹古人負笈從師不間道路之逺某乃不能自拔如此殆不可對人言也兹者誠不自意先生手提玉鉞作鎮於重湖以南而某適以臬事一節奔走於賜履之内昔者詹企台階坐霄壤隔今乃得以詣大府受約束有一日斂板之便豈天殆為小子計乎某始以親老丐祠既趣㫖下再請則瀆於是姑以單車出門葢馳驅數旬又須乞便郡歸養耳某四月八日辭膝下留廬陵城中始聞先生拜乾㑹節於清江亟亟追逐牙纛度宜春醴陵間所蹉跌片雲間耳兹専布狀重謝不敏且致恭先之悃㕘謁邇只遡風距踊與李復卿長弟初赴臨安府司户日某比者吉蠲子墨祇詗涓房留連踰浹再拜答洒蒙不彼外感荷感荷兹專布區區之心璧弟不穎竊第奉常受官京兆初欲鞭䇿向上工夫故多求山林歳月以自為地事不可料欲緩得速東行且有日矣此弟雅欲致一朋友相此逺役大冠峩如大裙襜如服斯服者不少也而流俗薰蒸靈龜磨蝕區區所為例指以為迂而他求所謂不迂者抱膝長嘯寡和奈何執事氣藐餘子言根古人疇昔之日幸接光塵論議之末共為慨然其誠有得於同然者慿恃襟雅僭欲屈致崇峻以副前所期此弟天資每與義理合喪本心以求外物則自保其決無之惟是閎深博邃之學汪洋演迤之文日力方來正將從事執事與之處公餘得商略上下交闡互發他日此弟其殆非吳下蒙乎某敢不知自交際之道莫重乎其初輒拜此紙以將盟言聊資不腆別牋并致不敏萬萬控謝不逺與孫子載季弟與從弟從學某聞古者家有塾黨有庠士生其時而為師者非其家之父兄則其鄉之所與也是以不獨屑屑於言語文字之末而聖賢誠正修齊之學葢皆在所法焉小弟肩項相齊學無以大相過獨其性質之陋而未有以開通氣習之浮而未有以檢束故修業一事也進徳又一事也某於古者父兄之教既不克從事則鄉評之峻卓師範之尊嚴是於執事乎歸焉區區所以屈致之私間嘗致稟千金之諾敬聞命矣交游之道莫重乎其初禮有聘謹肅將以前并令二學生俯伏再拜以立庭下俾之有敬也與胡觀洲季從某童而習之授業解惑有所自來惟今父族母族衿佩而立受道者七人焉將同堂合席以私淑之輙恃鉗鎚之舊為此數子以北面請歳以緡錢百上之𨽻人禮有聘奉芝楮二十千明有初也吾未嘗無誨焉恵徼福於夫子謹謹奉狀伏乞台照與楊學録懋卿字景堯太學前廊某比僕僕來京師幸甚得下膺龍之拜辱賜之不鄙軫顧稠厚闗外之別江皋之餽所以致繾綣者尤甚感激不自勝第恨匆匆聚㑹不及為頃刻之情以慰滿連年契闊之雅回首天上瞻金拳拳兹有稟事朋友蕭文名來新新參之客也此企可入且身事端正無復頂冒異同之弊掲掲而來欲赴春參鄉同舍往往望白雲而歸其巋然為游學瞻仰惟執事耳其所參務本適在徳星躔次之側特來展先達之敬不揆道瀆道其至前得䝉與進稍與之温存使不致落莫區區之望也回祕書巽齋歐陽先生某因朱月窓來伏拜誨帖辱問璧弟意極拳拳近僥倖受縣一出師門玉成之造後生從政未知嚮風惟先生}
