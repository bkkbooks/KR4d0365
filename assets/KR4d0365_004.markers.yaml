  - {type: variant, offset: 14182, length: 1, content: 全, WYG: 此心天命之所流行國家之幸斯世之福也謙之九三勞謙君子有終吉先生之用心以之泰之九二包荒用馮河不遐遺先生之用人以之孟子曰古之人所以大過人者無他善推其所為而已矣由是而言自可比功於隆時垂號於無窮矣僕雖嵬瑣無足齒其於明時不敢自棄求所以無負上帝之衷仰承君相之恵將盡心焉某已於元日祇被新命謹別狀遵稟惟是屬有私役造闕之月日尚此遲之伏惟大丞相矜憫其情而原其後至之罪公爾忘私國爾忘家某之補報知遇將有日也下情不勝懇惻激切之至謹奉書不備通廟堂溥論承心制事某仰恃鈞慈直布心腹某昨歳四月遇先人本生母之喪以服制未定請之朝廷遂作假俟伺㫖揮後來此申未及下而某得劾某以義起禮謂先人若存則於所生母當申心喪先人既已矣則某照承重例遂承心制自謂仁之至義之盡莫如此矣未幾龍溪友議板行天下謂某當有重服匿而不行一時聞者為之疑惑後巽齋歐陽祕書守道為或問衢州曽添教鳳為詳自二先生發此精義禮意昭然大明某竊聞龍溪友議印本以萬本閩廣遐陬莫不有之既不能家至户曉須得朝廷討論墳典禮意憣之邸報著以為令使天下知孝子慈孫之用心而不至為謗者所惑是以拳拳致請乞下太常討究一畨三月末旬伏領鈞翰特䝉先生照見曲折謂其所遇在禮之變所循為禮之正且如昨者臬申巳下禮寺某以為定禮典正流俗在此舉矣四月三日忽得承受人報備至寺狀所申乃引紹興休寧縣尉蔣永吉與寳元}
