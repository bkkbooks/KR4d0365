  - {type: variant, offset: 9063, length: 3, content: 長秋殿, WYG: 已當道久化成之時道洽政治之候而方歉焉有志勤道逺之疑豈望道而未之見耶臣請泝太極動靜之根推聖神功化之驗就以聖問中不息一語為陛下勉幸陛下試垂聽焉臣聞天地與道同一不息聖人之心與天地同一不息上下四方之宇往古來今之宙其間百千萬變之消息盈虛百千萬事之轉移闔闢何莫非道所謂道者一不息而已矣道之隠於渾淪藏於未琱未琢之天當是時無極太極之體也自太極分而陰陽則陰陽不息道亦不息陰陽散而五行則五行不息道亦不息自五行又散而為人心之仁義禮智剛柔善惡則乾道成男坤道成女穹壤間生生化化之不息而道亦與之相為不息然則道一不息天地亦一不息天地之不息固道之不息者為之聖人出而為天地立心為生民立命為往聖繼絶學為萬世開太平亦不過以一不息之心充之充之而修身治人此一不息也充之而致知以至齊家治國平天下此一不息也充之而自精神心術以至於禮樂刑政亦此一不息也自有三墳五典以來以至於太平六典之世帝之所以帝王之所以王皆自其一念之不息者始秦漢以降而道始離非道之離也知道者之鮮也雖然其間英君誼辟固有號為稍稍知道矣而又沮於行道之不力知務徳化矣而不能不尼之以黄老知施仁義矣而不能不遏之以多欲知四年行仁矣而不能不畫之以近效上下二三千年間牽補過時架漏度日母怪夫駁乎無以議為也獨惟我朝式克至于今日休陛下傳列聖之心以㑹藝祖之心㑹藝祖之心以叅帝王之心㕘天地之心三十三年間臣知陛下不貳以二不叅以三茫乎天運窅爾神化此心之天混兮闢兮其無窮也然臨御浸久持循浸熟而筭計見效猶未有以大快聖心者上而天變不能以盡無下而民生不能以盡遂人才士習之未甚純國計兵力之未甚充以至盜賊兵戈之警所以貽宵旰之憂者尤所不免然則行道者始無驗也邪臣則以為道非無驗之物也道之功化甚深也而不可以為迂道之證效甚遲也而不可以為速維天之命於穆不已天地之所以為天地也文徳之純純亦不已聖人之所以為聖人也為治顧力行何如耳焉有行道於嵗月之暫而遽責其驗之為迂且逺邪臣之所望於陛下者法天地之不息而已姑以近事言則責躬之言方發而陰雨旋霽是天變未嘗不以道而弭也賑飢之典方舉而都民歡呼是民生未嘗不以道而}
