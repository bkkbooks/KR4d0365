  - {type: variant, offset: 9067, length: 7, content: 輿入侍金桃宴齊, WYG: 也論辯建明之詔一頒而人才士習稍稍渾厚招填條具之㫖一下而國計兵力稍稍充實安吉慶元之小獲維揚瀘水之雋功無非憂勤於道之明驗也然以道之極功論之則此淺效耳速效耳指淺效速效而遽以為道之極功則漢唐諸君之用心是也陛下行帝而帝行王而上而肯襲漢唐事邪此臣所以贊陛下之不息也陛下儻自其不息者而充之則與陰陽同其化與五行同其運與乾坤生生化化之理同其無窮雖充而為三紀之風移俗易可也雖充而為四十年圄空刑措可也雖充而為百年徳洽於}
