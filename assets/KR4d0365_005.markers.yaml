  - {type: variant, offset: 0, length: 7593, content: 文山先生全集卷之五文集書囘胡僉判請交割除寕海軍節度判官廳公事日某仰徳襟期比布之竿牘顓飾謝言兹不贅吐首祈崇烱某幸甚區區此來得忝交代意者天將開攀拊之縁使之拉湊一至於此惟是天賦偏於愚戅親見聖主懇焉求言意應詔者必有中今日之故側聽逾乆無能爲國家陳大計者私念上悔悟勇决如此而某蒙恩至厚他人旣不言則雖踈逺豈容避其責是以積忱累日冐死投匭以冀一感悟天聽出關席藁以來首領且不自保况苟官職乎高誼不薄猶以同宷爲情連屈軒車復卑翰墨一吏至又持公文以來周旋曲折無非眷愛某感激不自勝惟如前之義則有不可孤長者之意不敏謂何某尚留此待㫖若數日後威命不下則是上憐其愚而寛宥之某當歸且念咎矣而非所敢望也所有添差僉判廳公用某一切不曽祗受或郡府不以某爲不肖他有情文則恐吏軰爲欺而亦某所不與知也本湏具状申府惟身爲罪人不敢自擬於屬吏之列得於畫諾之次叙其衷情則某之受賜甚厚也臨風拳拳賀呉提舉西林己未某自九月赴京師時請叩門墻蒙警䇿備至玅語天然式相行色篋笥間至今耿耿有光氣第某解舟至豐城及聞新局肇更鄰麾茂卑細讀仕隱不同轍之句則雲駛月運舟行岸移轉瞬之間已成兩樣雖然此非爲明公榮也纓冠褰裳世道有頼焉某來上下以鄂鄂故爲之􅐓洞聞諸閫雲集而正不多以此爲不足慮獨賜教時則衡陽之事明公盖巳及之而中外未之信某以十月晦至脩門則聞聚毒巳并流波浸澷秣陵荷擔之事盖凛凛巳兩月中間新相至則又得月十日定帖耳然我之緩急徃徃視敵之起息爲之則定帖者未可保也譬如一間屋前人放火已燒及旁舍僅僅得全宅未動卒急得一曉事人率衆拯救雖千百擔水未足以頃刻沃滅明公盖防防一大頭項也今事莫如袁吉之急袁以改卑明公而鄕里又得平林爲重時有明公諸人必能一心同力以障潰堤之衝籍此無恐帷内間則病根未去履翁掣肘尚多雖言路大開而奸䛕熏注之深搢紳多不能自㧞􅑫聞應詔投匭則學校與布衣而巳世變至此可爲慨嘆某不量其愚輒上書論其事區區以爲宗社有故死亡亦在旦夕不若犯危一言有及於今日之難其得禍與否不計也今出關待罪巳三日而上猶未見施行未知後命如何藉天之靈祖宗之休明公之庇得全首領而以周旋於義旅之後不勝願也而不敢望也封事槀止於一本付璧弟全録以呈似其踈狂知執事不笑且憐之否共惟節鉞交錫旌旗一新誼當專狀爲慶顧世變至此明公方任大責重以與上下同憂患某不敢作平世語也惟明公亮之引茟嚮風拳拳不備回聶吉甫號心逺某比道從鳴珂幸甚獲下膺龍之拜蒙眷愛稠渥侍樽爼間者連夕感激不自勝别後凡百餘日數千里行役貿貿於一來一徃之間大可取笑伏承寳墨鐫教備至今天下大勢所以削弱不支實坐於文物制度之宻區區直欲割去繚繞使内外手輕脚便如此而後可以立國中書言規模大槩所以纎悉上下其說則未也朝廷若不鄙而行之則台諭欲列置一帥如古方伯連率者又當再啇量也區區之心旣不足以行於國退而欲爲一鄉一宗之謀正將擇險以爲依集衆以爲安但事勢浩大不量其綿力而欲舉之善後與否視無所及何如某乍歸冗劇使命日亟返姑此治報何當一日㑹晤以請所未聞賀何尉名時字了翁某頃掲掲入國時江皋祖帳爲意腆甚感激之私不自勝别後不圖世變沄沄天下大事㡬去某始而駭中而疑継而憂憤又繼而大聲疾呼以至於流涕出血相去近百日而展轉變化以至若此事變可畏矣哉某學無涵養不能謹其所發倉卒來歸求爲杜門循省之計藉慶雲在上以此月七日善逹鄕國甫入境側聞一同桑梓若君實庇䕃膏澤之以廉革貪以明易暗以神竒變巽懦大冠縫掖交以程呉歸焉方謀奉状至屏下而紫氣惶惶巳移照隣次交臂相失懐此悵怏當今事㑹方殷人才不競一杞二𣏌國家常病之今州縣之於執事亦此類也凋瘵􅐓洞之餘雖近於不可爲而開繁𬒳劇如長才得以自見可賀也吉水之爲邑得之朋友見謂官錢無定額賦無正籍是以若此其竭澤也平林以鄉人爲郡念此至熟也執事軍期之暇爲之定制立數求爲一定之經惠幸兹邑其庻㡬乎上丞相除秘書省正字辭免不允正月吉日具位文某謹再拜奉書于某官某昨蒙朝廷不以不肖授祕書省正字職事某自念非才未有庸歴輒具状辭控旣而省劄降不允之㫖鈞翰重促行之命伏惟聖天子之所㧞擢大丞相之所提撕德至渥也某一介晚末跧伏深宻所知不出田里大丞相勒名鼎彛紀功太常坐于廟朝進退百官而佐天子出令下土之人求望其位貌聽其謦欬不可得也惟聞弓旌紛於阿澗束帛徧於巖野元德碩望麟游鳳集於省臺之上想望風采以爲不圖此生獲見昇平如此詎意今者宸命收録於草茅鈞畫照耀於山谷恩光所𬒳震悸不自持㒒惟此舉不見於今世乆矣夫大君宗子居天位者也宗子之家相理天職者也自一命以上所以輔賛大君彌縫家相者皆將以分奉天之責者也書曰天工人其代之又曰欽哉惟時亮天功又曰天命有德天討有罪天叙有典天秩有禮韓愈曰天付人以賢知才能豈使自有餘而巳忱畏天命而悲人窮也天命人事常判然不相侔而前言徃傳動必以天爲訓者人雖藐然萬物備於我苟爲凡民則巳大之爲聖賢秀之爲士天地民物孰非一巳之責任重致逺皆性命之當然也由此觀之用人者非私於其人爲人用者非私於其用近臣之得所爲主皆所以事天也此意不明上之人操其公噐大柄以自私曰吾能以富貴人下之人失其靈龜貿貿於勢利之途而不知返是以上不知以代天理物爲職而無復有以貴下賤之風下不知以畏天悲人自任而無復有比之自内之義天地失位人極不立人物悖其性徃徃由此者多矣伏惟大丞相勲在王家意在人物方且以不滿假處功以不驕吝處才開忱布公集思廣益嘉與天下賢士大夫以爲共理如僕庸愚亦得自列於兼收並蓄之下顧僕不足以稱所舉爲大負而由先生此心天命之所流行國家之幸斯世之福也謙之九三勞謙君子有終吉先生之用心以之㤗之九二包荒用馮河不遐遺先生之用人以之孟子曰古之人所以大過人者無他善推其所爲而巳矣由是而言自可比功於隆時垂號於無窮矣僕雖嵬瑣無足齒其於明時不敢自棄求所以無負上帝之衷仰承君相之惠將盡心焉某巳於元日祗𬒳新命謹别状遵禀惟是屬有私役造闕之月日尚此遲之伏惟大丞相矜憫其情而原其後至之罪公爾忘私國爾忘家某之𥙷報知遇將有日也下情不勝懇惻激切之至謹奉書不備通廟堂溥論承心制事某仰恃鈞慈直布心腹某昨歳四月遇先人本生母之䘮以服制未定請之朝廷遂作假俟伺㫖揮後來此申未及下而某得劾某以義起禮謂先人若存則於所生母當申心䘮先人旣巳矣則某照承重例遂承心制自謂仁之至義之盡莫如此矣未㡬龍溪友議板行天下謂某當有重服匿而不行一時聞者爲之疑惑後巽齋歐陽祕書守道爲或問衢州曽添教鳯爲詳目二先生發此精義禮意昭然大明某竊聞龍溪友議印本以萬本閩廣遐陬莫不有之旣不能家至戸曉湏得朝廷討論墳典禮意播之邸報著以爲令使天下知孝子慈孫之用心而不至爲謗者所惑是以拳拳致請乞下太常討䆒一畨三月末旬伏領鈞翰特蒙先生照見曲折謂其所遇在禮之变所循爲禮之正且如昨者臬申巳下禮寺某以爲定禮典正流俗在此舉矣四月三日忽得承受人報備至寺状所申乃引紹興休寕縣尉蔣永吉與寳元集賢校理薛紳爲證直指爲某合持齊衰三年嘻其誤矣聖人制禮自有隆殺其隆殺本之人情切詳蒋永吉之祖妾直下只有蔣永吉使蒋永吉而不服則其祖妾爲若敖氏之鬼矣所以爲孫者湏持齊衰今先人之本生母自改適劉氏之家有劉氏子孫持重服則主祀固是他姓矣是以某體先人之心則只當承心制也况蒋永吉無祖母今則某有正祖母在堂何縁可爲劉母持齊衰乎劉母之子旣特齊衰某又自姓文何縁兩姓俱有齊衰之服乎又詳薛紳之母旣稱爲祖母萬壽縣太君王氏則是嫡祖母也當時朝廷止給假三日只從孫之本服所以薛紳再申指爲先人所生母謂服不可絶也故有三年之制此正是承重孫又自與蒋永吉者不同也禮者不讀書不講義不明先王隆殺之意徃徃只據吏人檢至故事見有父所生母四字便謂事體一般鹵莾申上更不曽子細致辨於同異之間今且未湏論某所得服如何且只論先人之服先人之母改適劉氏旣有劉氏子爲服且先人係出繼别位又非本位之比先人只當有心制不當有齊衰明矣若先人有齊衰則某當以齊衰先人有心制則某只合承心制豈有先人本等止有心制而某乃有齊衰之服乎朝廷所行便作萬世不刋之典毫釐之間所當致辨矧禮意粲然非有嫌疑又何難辨之有某承心制巳一年矣今非畏有齊衰不願承服但可惜禮官如此討論萬一誤朝廷備㨿行下恐國朝㑹要上又錯添一典故不免貽將來朝廷無人之誚耳今看來禮官未必觧亊先生揆之本心若以爲某見行之禮既安徑乞從都省點對行萬一巳照寺状施行亦乞改命庶不悖於人心天理之正而古聖人制禮之意得行於今其於綱常豈曰小𥙷之哉後朝命下許令承心制仍著爲令道體堂書通江叅政古心某卽時甘兩共惟宮使大參相公先生芝山清逸珎館宴超天相有道鈞候動止多福某昨歲獲走一介詣舍人門下伏蒙鈞念勞苦有加祗服訓辭至今亹亹俯仰山林感慨年歳又若是其闊䟽矣某官百年㡬見一代共宗司馬居洛而相天子活百姓都人西其首而望張紫巖杜門白首而嗣皇嗟嘆用晚倚之以向中原先生今其人也上方舉元祐故事勤於夣卜旦夕爰立言人人同先生不以此覬於當世而當世以此祈於先生惟先生重愛眠食以幸世道某屏伏田野蒙頼鈞天之庇守先人墳墓幸無闕狀追惟兩年間口語横出先生進而廟堂退而江湖德於其人如出一日傳所謂生死肉骨之情也報荅巳知言語抑末傾竭犬馬尚庻㡬於門墻專人上状百拜起居衮舄皇皇未遑納拜心之沄沄如此江水仰乞鈞照通潭州安撫大使江丞相某在門墻諸孫軰行中而所以蒙鈞天造就知愛綢繆獨出乎諸生之右然號爲登門垂二十年而至今庭下無愈之迹古人負笈從師不間道路之遠某乃不能自㧞如此殆不可對人言也兹者誠不自意先生手提玉鉞作鎮於重湖以南而某適以臬事一節奔走於賜履之内昔者詹企台階坐霄壌隔今乃得以詣大府受約束有一日歛板之便豈天殆爲小子計乎某始以親老丐祠旣趣㫖下再請則瀆於是姑以單車出門盖馳驅數旬又湏乞便郡歸養耳某四月八日辭膝下留廬陵城中始聞先生拜乾㑹節於清江亟亟追逐牙纛度宜春醴陵間所蹉跌片雲間耳兹專布状重謝不敏且致恭先之悃叅謁邇只遡風距踊與李復卿長弟𥘉赴臨安府司戸日某比者吉蠲子墨祗詗㳙房留連踰浹甫拜荅灑蒙不彼外感荷感荷兹專布區區之心璧弟不頴竊第奉常受官京兆初欲鞭䇿向上工夫故多求山林歳月以自爲地事不可料欲緩得速東行且有日矣此弟雅欲致一朋友相此逺役大冠峩如大裙䄡如服斯服者不少也而流俗薫蒸靈龜磨蝕區區所爲例指以爲迂而他求所謂不迂者抱膝長嘯寡和奈何執事氣藐餘子言根古人疇昔之日幸接光塵論議之末共爲慨然其誠有得於同然者憑恃襟雅僣欲屈致崇峻以副前所期此弟天資每與義理合䘮本心以求外物則自保其决無也惟是閑深博邃之學汪洋演迤之文日力方來正將從事執事與之處公餘得啇畧上下交闡互發他日此弟其殆非呉下蒙乎某敢不知自交際之道莫重乎其初輒拜此𥿄以將盟言聘資不腆别牋并致不敏萬萬控謝不遠與孫子載季弟與從弟從學某聞古者家有塾黨有庠士生其時而爲師者非其家之父兄則其鄕之所與也是以不獨屑屑於言語文字之末而聖賢誠正脩齊之學盖皆在所法焉小弟肩項相齊學無以大相過獨其性質之陋而未有以開通氣習之浮而未有以檢束故脩業一事也進德又一事也某於古者父兄之教旣不克從事則鄕評之峻卓師範之尊嚴是扵執事乎歸焉區區所以屈致之私間甞致禀千金之諾敬聞命矣交游之道莫重乎其𥘉禮有聘謹肅将以前并令二學生俯伏再拜以立庭下俾之有敬也與胡觀洲季從某童而習之授業解惑有所自來惟今父族母族衿佩而立受道者七人焉将同堂合席以私淑之輒恃鉗鎚之舊爲此數字以北靣請歳以緡錢百上之隷人禮有聘奉芝楮二十千明有初也吾未甞無誨焉惠徼福于夫子謹謹奉状伏乞台照與楊學録懋卿字景堯太學前廊某比僕僕來京師幸甚得下膺龍之拜辱賜之不鄙軫顧稠厚關外之别江皋之餽所以致繾綣者尤甚感激不自勝第恨匆匆聚㑹不及爲頃刻之情以慰滿連年契闊之雅回首天上瞻企拳拳兹有禀事朋友蕭文名來新新參之客也此丈可人且身事端正無復頂冐異同之弊掲掲而來欲赴春參鄕同舍徃徃望白雲而歸其巋然爲游學瞻仰惟執事耳其所參務本適在德星躔次之側特來展先逹之敬不揆遒瀆道其至前得蒙與進稍與之温存使不致落莫區區之望也回祕書巽齋歐陽先生某因朱月窓來伏拜誨帖辱問璧弟意極拳拳近僥倖受縣一出師門玉成之造後生從政未知嚮風惟先生終教之耳金盌在質庫某處約之甚恨未能自取之乃勞先生厚費如此山林中亦無用此物先生儻乏支遣不妨更質錢用第常使可贖足矣吉甫一去連旬頗孤龍頭之約時且向熱矣奈何因便介到城伸𥿄行筆嚮風馳情金盌乃先生爲景獻太子府教授講經徹章上賜也巽齋借而質之故先生云然道體堂書與前人某尋常於術者少所許可而江湖之人登門者日不絶彼誠求飽暖於吾徒之一言吾徒誠閔其衣食之皇皇則來者必譽是故不暇問其術之真何似也先生之於應酬也亦然今是書之作爲一星士姓朱名元炳字斗南號月窓則非前者之謂是誠有取於其術矣斗南吉水文昌鄕人去吾里三十起田間談命高玅精絶盡奄同袍試以百十命應對如流而人品之大槩皆不差異哉術也問其所得何書則甞汗澷於十𢾗家而其末也㑹歸於李吉甫林開之說吉甫之書人多有之以其深而不能詰若林開則人未有得其本者也斗南㑹二爲一而又以所得於數十家者間出而證之斯其所以獨歩也某旣與之訂正二書又詩之以見意其剔也欲詣門下求品題某告之曰先生品題甚易至之日爲先生請十數命某也如此某也如彼爲先生鋪陳之卽先生亹匕豈惟品題先生心肯轉相汲引卽子命通矣斗南曰諾探其中欣欣然殊無憚色他人泛泛得先生増重多矣未有如斗南肯以術而取先生之知者也是書也某何爲而不作事出專白故不他及與前人某前月二十八日因朱月窓來逺迓草草一帖致起居不知是日正先生到家日也後聞稍避訪客住某寺乆之然恐訪者卽所在相尋亦未必能盡避也某九月十三日方及門值鄕榜未掲此一月中相過者有數近數日漸漸増多來者必數百里或百里不容不少𣢾閑居寒薄殊不能支而妄有干請者紛然多不相亮甚以爲苦先生昔者扵應酬亦苦之今猶苦此否甞蒙見示每許人作一文如置一針胸次今某畏爲文詞亦類此矣習嬾亦是病先生以為如何念乆闊尊候亟起援茟請所以誨朋友以某逺歸間有以羊麫問劳之者某不敢私輒以一羫一石献之庭下某昨在宣州不敢擕木瓜宣州人不相忘近却有以此爲意者知先生甞湏此爲藥物謹并奉四枚一笑留頓幸甚回劉架閣㑹孟某伏蒙專劄重示先夫人誌銘伏讀驚愴靡巳古心先生藻發清言垂光罔極慈靈有知含笑地下若此可以無媿人子矣遠日倐至柳翣載途追送傾城素車銜尾某於夫人契家子弟以故不能攀望引紼負負幽明不勝愧恨謹成些章一少紀哀愫以授挽者伏想随車號痛涕如綆縻孝在顯揚願寛毁瘠臨𥿄下情凄切之至回衢教曽鳯先生字翰陽號秀峯某數月於師門極間闊顧山水荒唐不自知年歲之運運闕禮多矣尚庶㡬先生索之於形骸之外别後得二子丙寅戊戌庚戌丙子丁卯壬寅甲午丙寅命不知孰勝乍嚮風水卽得三地此湏巨眼以爲然則然向牛肉坑所結砌者今知其大謬爲棄屣矣深之昨所問舘成否何所固必新正詣清湖行禮亦不見訪徃徃泥哭則不歌之意非有他也屋見說漸就緒先生鼓舞倦矣宜作意身事悠悠何爲行日可得聞否春和景明其聞一造盤谷亦可遍觀先生所謂寳者更願撥剔而後來一來湏十日乃可歸爾悉俟面賦此不能盡回李宮教應革號肯堂某頃以附伯昻令姪書後未悉起居深之令弟來聞病目少寛爲之喜幸日欲專价詳問飲食坐卧之節塵坌因循心甚愧之昔人云身在則有餘舉天下紛紛藉藉不如意事屏置度外專精神亊醫藥靡有不済恐吾目所受病方將驅除而又重以吾心之不寜是滋予疾也用敢於岐黄忠愛之外輒奉清心一方爲獻願於大學弟七章加三思焉偶璧弟有介歸就有京書逹左右輒并遣前薄物将忱徒覺塵瀆臨風馳泝與朱太博埴號古平某山中相望数舍而逺乃心精㣲無徃不通僕十年受用順境過當天道反覆咻者旁午七八月以來此血肉軀如立於砧几之上虀粉毒手直立而俟之耳僕何所得罪於人乃知剛介正潔固取危之道而僕不能変者天也僕誠不自意乃於寒舍千歩外得一陂陀溪山泉石四妙畢具委曲周遭可十餘里盖其景趣兼盤谷環滁而有之而其曠逺縹緲或謂南樓劣焉騎馬嚢飯朝徃夕還率以爲常而山外事一毫不接耳目矣僕甞羡君家山水之勝㡬欲作意植杖其間而未能也然自以爲旦夕必償所願不知吾壼天可以屈公一來乎烟霞泉石此不足與俗子說處知音者自不同正恐不問主人徑造竹所余月心來拱𬒳寳墨惡乎而不用吾情適凝祥觀蕭道士來訪其别也曰吾將造古平爲之書以復命且道予懐而假道士爲郵焉某比及門即拜状聞車騎在郊外正欲嗣訊韓星忽來偉然朶雲之贈故人渠渠勞苦行役諸兒那識此意曉起入山新流沒岸棋聲未盡石骨依然人生徃徃如此盈虛消息道體流行仁者謂仁知者謂知可超然一笑承有訪􅗄之約上巳前後擬山行數日湏主人在竹所方可乗興分沙一席巳戒白鷗退避矣呼燈走茟馳意泬寥某比及門又一首極有磊隗欲從執事傾倒一日雲山浩渺渺焉余懐忽拜羲獻帖宛然玉立之參前倚衡也垂諭前城李氏事讀之甚駭近有假爲黄節幹者騙寫其家田荘鄕廨既見之發覺昭其迹於墻壁間矣曽鑑何人又肆無状欺愚嚇聾一至此耶某平生所立謂何豈有退居林麓省咎敬威我自爲我而青蠅紛紛每使惡聲至耳莫爲而爲莫致而致非命也耶势不得不榜謹納一𥿄幸轉之李氏以破姦猾者之爲使人日爲此等救過之事不勝浩歎某向者因及執事出處常誦伐木之詩今書所云猶若未悟禀荅之次臨𥿄惘惘回鄧縣尉中甫某入山愈深於所尊敬嘻其闊矣前年足下以書議禮得一徃復最後賜誨迄今不能報論其形跡何前之恭而後之倨歟坡云人情重徃復不報生禍根后山云一詩巳經年知子不我怨人之度量固有相遠執事知我宜可無前日之事今通國識其用心由其未定而言辭之不可以巳也如是自其定者而觀之輕重銖兩固皆當然言語文字㡬乎閏矣昨書皆精義所發卷爲一通謹而藏諸後有作者将爲此興起客從巽齋來能言執事日從翁樂甚因𣢾客坐亟亟援茟寫此悁結授客以轉之左右學之不加感慨年歳山澤雖逺尚惠一言臨風拳拳與顔縣尉復古某自春末得一夕承顔色接話言外此皆瞻仰之日追憶是數年來書筒無虚月分𬒮亦不太乆未有如今之䟽者也然私竊自解則曰此其迹爲然不足深計知足下得我同然與否兹者恭承少迂蓬山之歩暫爲梅屋之游脂車有嚴滌篆伊邇豈勝賛慶執事自此開張清途摩拂碧落固其分也顧徼富貴利逹以自致其身貴且重者崇論宏議所鄙者也不當薦是爲賀惟邑於民社爲最親惟少府於邑爲最要平生學問藉是得以展布潘輿康寕千里迎奉調㷱嗜苦式慰兹願是二事深足爲年丈賀也某雅聞說者以某日戒途懐是惓惓將祖帳道周桮酒爲壽属有牽制不能來謹上状并致泊禮以昭區區惟容頓是幸川平陸夷行者有相惟秋深殘暑未央更乞頥輔崇重以前三接九迁之寵随軒徳輯㐲想喜氣方來錫羡山則别後或有鄕邦驅䇿敢不下拜某歳杪得承便駛遺以瓌灑故人千里之情藹然可掬感鏤其如之何兹得嗣書於令弟來㱕之便尢見崇䔍喜審議論於帷幄之親出入於錢榖之㑹滿腔磊隗庻其有以自試矣來教自咎以爲浸淪汨於俗吏之㱕此意固超人一䓁孟子論仁賢而必望其有政事財用之效盖績用声猷不可相戻本末一致焉得就此以遺彼自賢者徒以清浮爲高而無益於實然後小人得以事功自詭今日挽回君心轉移世道吾軰正不得不自力尚可以俗爲尤乎伏惟尊同年其懋勉之項承刋委比於敬巖之前亦屢說項非某私於所親名德如許區區欲自黙本心亹亹自有所不肯此老亦旣有所許矣坐席未温遽爲林麓之㱕一塲說話又付畫餅雖然長松在林利錐處嚢翹翹傑傑旦夕諸公争羅致不睱瑣瑣爱助何足爲説某奉祠侍親頗於讀書有一日之樂朝市紛紜怨謗之府某雅欲退藏以遠罪咎賜教極得同然之真或政事有足爲庸陋矜式毋惜刋曉一二因以具報情悃非茟可旣專規嗣布與聶吉甫某於斯文契闊𢾗年於此載酒問竒豈非夙心而相望百里離群索居甚負此愧以其傾嚮輒私布之先人季子生二十年矣號曰學文實未知方有從弟一人同堂而習年相若而學相似也閣下沛然古作籍甚時名所欲北面而從事者衆區區欲使二子者私造化焉間者疑其不可諗之朋友固以爲請不圖閣下不鄙夷而許之敢專書以聞閣下屑與之盟豈惟二子得以受教僕也不敏實嘉君子之賜援茟荒蕪臨風切切囘, WYG: ''}
