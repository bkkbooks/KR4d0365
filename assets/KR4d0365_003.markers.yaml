  - {type: variant, offset: 731, length: 1045, content: 極動静之根推聖神功化之驗就以聖問中不息一語爲陛下勉幸陛下試垂聽焉臣聞天地與道同一不息聖人之心與天地同一不息上下四方之宇徃古來今之宙其間百千萬變之消息盈虛百千萬事之轉移闔闢何莫非道所謂道者一不息而巳矣道之隱於渾淪藏於未琱未琢之天當是時無極太極之體也自太極分而隂陽則隂陽不息道亦不息隂陽散而五行則五行不息道亦不息自五行又散而爲人心之仁義禮智剛柔善惡則乾道成男坤道成女穹壤間生生化化之不息而道亦與之相爲不息然則道一不息天地亦一不息天地之不息固道之不息者爲之聖人出而爲天地立心爲生民立命爲徃聖繼絶學爲萬世開太平亦不過以一不息之心充之充之而修身治人此一不息也充之而致知以至齊家治國平天下此一不息也充之而自精神心術以至於禮樂刑政亦此一不息也自有三墳五典以來以至於太平六典之世帝之所以帝王之所以王皆自其一念之不息者始秦漢以降而道始離非道之離也知道者之鮮也雖然其間英君誼辟固有號爲稍稍知道矣而又沮於行道之不力知務德化矣而不能不尼之以黄老知施仁義矣而不能不遏之以多欲知四年行仁矣而不能不畫之以近效上下二三千年間牽𥙷過時架漏度日毋恠夫駁乎無以議爲也獨惟我朝式克至于今日休陛下傳列聖之心以㑹藝祖之心㑹藝祖之心以叅帝王之心叅天地之心三十三年間臣知陛下不貳以二不叅以三茫乎天運窅爾神化此心之天混兮闢兮其無窮也然臨御浸乆持循浸熟而筭計見效猶未有以大快聖心者上而天變不能以盡無下而民生不能以盡遂人才士習之未甚純國計兵力之未甚充以至盗賊兵戈之警所以貽宵旰之憂者尢所不免然則行道者殆無驗也邪臣則以爲道非無驗之物也道之功化甚深也而不可以爲迂道之證效甚遲也而不可以爲速維天之命於穆不巳天地之所以爲天地也之德之純純亦不巳聖人之所以爲聖人也爲治顧力行何如耳焉有行道於歳月之暫而遽責其驗之爲迂且遠邪臣之所望於陛下者法天地之不息而巳姑以近事言則責躬之言方發而隂雨旋霽是天變未甞不以道而弭也賑饑之典方舉而都民歡呼是民生未甞不以道而安也論辯建明之詔一頒而人才士習稍稍渾厚招填條具之㫖一下而國計兵力稍稍充實安吉慶元之小獲維揚瀘水之雋功無非憂勤於道之明驗也然以道之極功論之則此淺效耳速效耳指淺效速效而遽以爲道之極功則漢唐諸君之用心是也陛下行帝而帝行王而王而肯襲漢唐事邪此臣所以賛陛下之不息也陛下儻自其不息者而充之則與隂陽同其化與五行同其運與乾坤生生化化之理同其無窮雖充而爲三紀之風移俗易可也雖充而爲四十年圄空刑措可也雖充而爲百年德洽於天下可也雖充而爲卜世過暦億萬年敬天之休可也豈止如聖問八者之事可徐就理而巳哉臣謹昧死上愚對臣伏讀聖䇿曰盖聞道之大, WYG: ''}
