  - {type: variant, offset: 13, length: 717, content: 大原出於天超乎無極大極之妙而實不離乎日用事物之常根乎隂陽五行之賾而實不外乎仁義禮智剛柔善惡之際天以澄著地以靖謐人極以昭明何莫由斯道也聖聖相傳同此一道由修身而治人由致知而齊家治國平天下本之精神心術逹之禮樂刑政其體甚微其用則廣歴千萬世而不可易然功化有淺深證效有遲速者何歟朕以寡昧臨政願治于茲歴年志愈勤道愈遠窅乎其未朕也朕心疑焉子大夫明先聖之術咸造在廷必有切至之論朕將虛己以聽三墳而上大道難名五典以來常道始著日月星辰順乎上鳥獸草木若於下九功惟叙四夷來王百工熈哉庻事康哉非聖神功化之驗歟然人心道心寂寥片語其危微精一之妙不可以言旣歟誓何爲而畔㑹何爲而疑俗何以不若結繩治何以不若畫像以政凝民以禮凝士以天保采薇治内外憂勤危懼僅克有濟何帝王勞逸之殊歟抑隨時損益道不同歟及夫六典建官盖爲民極則不過曰治曰教曰禮曰政曰刑曰事而巳豈道之外又有法歟自時厥後以理欲之消長驗世道汙隆隂濁之日常多陽明之日常少刑名雜覇佛老異端無一毫㡬乎道駁乎無以議爲然務德化者不能無上郡鴈門之警施仁義者不能無末年輪臺之悔甚而無積仁累德之素紀綱制度爲足維持憑藉者又何歟朕上嘉下樂夙興夜寐靡遑康寜道乆而未洽化乆而未成天變洊臻民生寡遂人才乏而士習浮國計殫而兵力弱符澤未清邉備孔棘豈道不足以御世歟抑化裁推行有未至歟夫不息則乆乆則徴今胡爲而未徴歟變則通通則乆今其可以屢更歟子大夫熟之復之勿激勿泛以副朕詳延之意寳祐四年五月八日臣對恭惟皇帝陛下處常之乆當㤗之交以二帝三王之道㑹諸心將三紀于此矣臣等鼓舞於鳶飛魚躍之天皆道體流行中之一物不自意得旅進于陛下之庭而陛下且嘉之論道道之不行也乆矣陛下之言及此天地神人之福也然臣所未觧者今日巳當道乆化成之時道洽政治之候而方歉焉有志勤道遠之疑豈望道而未之見耶臣請泝, WYG: ''}
