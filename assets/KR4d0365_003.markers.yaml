  - {type: line-break, offset: 17025, content: '', id: KR4d0365_SBCK_003-42a01}
  - {type: variant, offset: 17025, length: 0, content: '', WYG: 此先生開慶己未伏闕書也先生丙辰狀元及第乃穆陵親擢舊例三魁唱名罷賜袍笏謝恩入幕賜御饌進謝恩詩出賜席帽於闕門外上馬迎入期集所者又名狀元局官給錢物供張皂𨽻等於此所聚同年待賔客刋題名小録賜聞喜晏進謝晏詩如此者一月然後率榜下士詣闕門謝恩謂之門謝門謝後命之初階内狀元授承事郎簽書某軍節度判官㕔公事至後一科放進士榜則前一科狀元召入為秘書省正字名曰對花召此舊例也先生入期集所數日嚴侍有疾即謁告還邸侍藥未㡬乃有失怙之變即持服扶柩歸里服除閉門度日後一科當對召日始除簽書寧海軍節度判官㕔公事盖先生未除官而即持服故除初階先生上請未敢受官乞行門謝禮奉㫖允己未冬造朝門謝適有江上之警應求言詔上此書不報而歸未㡬又除簽書鎮南軍節度判官㕔公事先生上請乞奉宫觀香火以安分守除主管建昌軍仙都觀未㡬除秘書省正字誥辭云倫魁登瀛故事也然始進大率以虛名既久乃知其實踐爾則異是初以逺士奉董生之對繼以早官上梅福之書天下誦其言髙其風知爾素志不在温飽麟臺之召其來何遲語有云見大名難又云保晚節難爾}
