  - {type: variant, offset: 7736, length: 377, content: 衆議以予漸殆欲行無禮掩鼻以灌粥酪至是遂止乃知夷齊之心亊由其獨處荒山故得行其志耳獨㠶如飛鳴贈蘇傒清江轉山急早發射洪回首白雲多何将軍山林山寒夜中泣龍門鎮過隆興第八十四隆興自䧟沒後忠義奮起㡬於返正屠㓕殆盡過而傷之臨江乆徘徊山寺再讀徐孺碑張九齡交遊颯向盡餞裴二端公到今耆舊悲病橘江行第八十五畏途随長江白沙渡萬里滄茫水憶鄭南玭遊子去日長成都壮心不肯巳戯贈友江行第八十六江水東流去陪王侍御宴浮雲終日行夣李白别離經死地鄭附馬池飮啄愧殘生草堂江行第八十七蕭蕭白揚路李邕死人積如丘遣興大江東流去成都蒼山旌斾愁韋評亊江行第八十八連山暗烽燧送從第亞川谷血横流送樊侍御揮泪臨大江送韋諷上有行雲愁遣興江行第八十九六月六日過隆興十二日至金陵囚邸八月二十三日渡江北行亊㑹多有可慨尚何言哉朔風飄胡鴈遣興江城帶素月聽楊氏歌安得覆八𬈑客居滂泥洗吳越喜雨北行第九十八月二十六日至揚州九月初一日, WYG: 因記左傳申包胥}
