  - {type: variant, offset: 1842, length: 838, content: 成無所逃罪又恐孫虎臣以後進爲将有功總綂出巳上日夜幸其敗覆督府既潰歸廬州竟不岀朝廷屢詔勤王若罔聞知國亡乃以淮西全境獻北爲巳功焉於是貴年八十餘矣老而不死是爲賊其貴之謂歟借問大将誰後岀塞戰骨當速杇前岀塞逆節同所歸詠懐水花笑白首送王砅使南海揚州第二十六李庭芝在揚州十餘年畏怯無逺謀惟閉門自守無救於國及景炎登極以爲首相乃引兵輕岀渡海南歸朱煥尋以城獻虜哀哉城峻随天壁自帝城明來但自守潼關史士卒終倒㦸贈王司空思禮仰望嗟嘆乆九成宫京湖兩淮第二十七東南兵力盡在江北金城湯池國之根本高以荆州降夏以淮西降李死淮東盡失無復中原之望矣哀哉荆揚風土暖秋行官張望大城鐡不如潼関吏泰山忽破碎登慈恩塔流落随丘墟五盤景炎擁立第二十八予自蘇州歸闕建議岀二王於閩廣及虜至二王方岀宫蘇刘義陸秀夫遇二王於温時陳宜中海船泊清㠗門諸人徃邀之共圗興復益王始建元帥及張世傑自定海至同趋三山以五月一日益王登極改元景炎漢運初中興述懐扶顛待柱石入衡州疇䏻𥙷天漏寄岑叅登階捧玉冊徃在福安府第二十九崔嵬扶桑日幽人闊㑹滄海潮桔柏渡傾都看黄屋送班司馬入京此意竟蕭條贈韋左丞幸海道第三十自三山登極世傑遣兵戰邵武大捷人心翕然世傑不爲守國計即治海船識者於是知其陋矣至冬聞警即浮海南去天下事是以不可復爲哀哉天王守大白九成宫立國自有疆前岀塞舎此復何之後遊脩覺寺巳具浮海航壮遊景炎賔天第三十一御舟離三山至惠州之甲子門駐焉巳而遷宫冨場丁丑冬虜舟來移次仙澳與戰得利尋望南去止碙川景炎賔天盖戊寅四月望日也嗚呼痛哉隂風西北來北征青海天軒輊送從第亞白水暮東流新安吏魂㫁蒼梧帝贈秘書監李邕祥興登極第三十二戊寅四月十七日衛王登極於碙川浮龍倚長津别蔡十四著作參錯走洲渚入衡州蒼梧雲正愁登慈恩塔初日翳復吐法鏡寺祥興第三十三六月世傑自碙川北還至崖山止焉厓山乃海中之山兩山相對延袤中一衣帶水山口如門世傑以爲形勝安之南遊炎海甸送魏六丈沃野開天庭橋陵韻呈縣官真龍竟寂寞雷乾坤水上萍衡州送李大夫祥興第三十四己卯正月十三日虜舟直造厓山世傑不守山門作一字陣以待之虜入山門作長蛇陣對之二月, WYG: ''}
