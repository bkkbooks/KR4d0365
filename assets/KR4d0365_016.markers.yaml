  - {type: variant, offset: 14613, length: 354, content: 地一隅地隔蹉跎暮容色重過何氏不敢恨危途北風第一百六十五風煙渺吴蜀柴門雲㠶轉遼海後岀塞䘮乱紛嗷嗷遣寓尚愧㣲軀在與嚴二奉礼别第一百六十六驚風翻河漢有懐鶉首麗泥塗将適江陵吾衰将焉託遣懐愁絶付摧枯北征第一百六十七隂風千里來吴侍御江上宅驚浪滿吴楚雨世亊兩茫茫贈衞䖏士飄泊欲誰訴又雨第一百六十八平生方寸心舟中苦熱誓開玄冥北後出塞歲暮日月疾冩懐我嘆黒頭白酧薛判官第一百六十九今吾抱何恨贈别恨無匡復姿送樊侍郎含笑㸔吴鈎後岀塞回首蛟龍池詠懐第一百七十天長眺東南鄭公䖍衰謝多酸辛汝陽王璡丈夫誓許國前岀塞直筆在史臣李公光弼第一百七十一天衢隂峥嵘赴奉先縣歲寒心匪他送嚴使君平生獨徃願立秋後題零落首陽阿過宋之問舊荘第一百七十二済時肯殺身寄唐使君惨淡苦士志送李大夫百年䏻㢤何别唐誠終古立忠義陳拾遺故宅第一百七十三絶域三冬暮送十七舅垂老見, WYG: 䑓客}
