  - {type: variant, offset: 12425, length: 919, content: 春以梅州添差通判将行㑹行府移屯先生挈家避地於汀之郷落六月以病死其子三貴自吉來奔䘮不䏻返䘮幸其一家歸至瑞金三貴復病死於道先生妻亦卒惟女在不知所之先生遭值虜難以清文粹徳一不施於世流落以死家乃俱䘮哀哉江海日凄凉遣興賢聖盡䔥索西関西河共風味衡山縣學顧歩涕横落郭代公故宅鄧禮部第一百三十七光薦字中甫予郡人自虜度嶺及廣䧟避地深山適強冦至妻子兒女等匿暗室冦無所暏焚其居十二口同時死中甫随駕至厓山除禮部侍郎巳卯春除斈士院權直未数日虜至厓山潰中甫赴海虜舟㧞出之張元帥待以客禮與余俱岀嶺别於建康嗚呼中甫禍難之慘不减予而獨免北行幸而脫歸為管寕為陶潜不亦善乎南宫無故人才名三十年問鄭景文江城秋日落贈侍郎四舅此别意蒼然送韋書記家樞宻鉉翁第一百三十八則堂先生家鉉翁蜀名家有學問舉動必以禮朝中老成典刑也當國都不守先生簽書樞宻見虜持正議左丞相吴堅右丞相賈餘慶以省札遍告天下令以城歸附先生不押字虜自省中脅以無禮公不為動竟末如之何後以祈請使為名群詣北庭既至上書申祈請之議忤北庭意留燕邸巳而移漁陽又移河間如我朝覊置特官給飲食而已余過河間得一二相見先生風采非復宿昔而忠貞儼然使人望而知敬嗚呼其可謂正人矣岀䖏同世網鄭公䖍高誼邁等倫别蔡著作異方驚㑹靣送韋别駕慰此真良臣寄唐使君墳墓第一百三十九予甲戌春自衡陽憲節歸赴贑州省拜墳墓及乙亥五月奔祖母䘮至門以起復六月望日岀從戎亊與宗族郷黨永訣云别離巳五年贈蘇四不及祖父茔後園山脚霜露晚凄凄岀郭痛哭松風廻北征宗族第一百四十西江接錦城送李粛山隂一茅宇遣興宗族忍相遺送崔都水乾坤此深阻宿清溪驛母第一百四十一先母齊魏國大夫人盖自虜難後弟璧奉侍赴惠州弟璋從焉已而之廣之循之梅余來梅州母子兄弟始相見既而魚軒岀江西尋復入廣夫人遊二子間無適無莫雖兵革紛優䖏之怡然戊寅行府駐船澳弟璧仍知惠州弟璋復在侍夫人薬八月兩國之命下時巳得疾九月七日寅時薨逝弟璧卜地於惠循之深山間不肖孤巳矣未有返葬夫人期不知二弟何時畢此大亊身䧟萬里縲絏中歲時南望嗚咽云何時太夫人送李校書上天回哀眷大雨墓乆狐兎隣汝陽王璡嗚呼淚如霰白馬舅一百四十二予以楚囚過西昌聞舅家机􅑾自是南望孤雲每念我母不勝渭陽之情萱草秋巳死從孫済歲暮有嚴霜北遊落日渭陽情送翁統軍涕淚濺我裳貼華陽李少府妻第一百四十三丁丑, WYG: 歳}
