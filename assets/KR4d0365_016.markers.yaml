  - {type: variant, offset: 8425, length: 1, content: 城, WYG: ''}
  - {type: variant, offset: 8429, length: 1, content: 送, WYG: 罹狴犴有感而賦一十七首一直絃不似曲如鈎自古聖賢多被囚命有死時名不死身無憂處道還憂可憐杜宇空流血惟願嚴顔便斫頭結束長編猶在此竈間婢子見人羞二落落南冠自結纓桁楊卧起影縱横坐移白日知何世夢㫁青燈問㡬更國破家亡雙淚暗天荒地老一身輕黄粱得失俱成幻五十年前元未生范􅁮在獄中為士題扇云去白日之皎皎即長夜之悠悠三心期耿耿浮雲上身事悠悠落日西}
  - {type: page-break, offset: 8429, content: '', id: KR4d0365_WYG_020-36b, image: WYG1184/WYG1184-0764d.png}
  - {type: variant, offset: 8431, length: 4, content: 戸所枷禁, WYG: 古興亡何限錯百年生死夲來齊沙邉莫待哀黄鵠雪裏何須問牧羝此處曽埋雙寳劍虹光夜指楚天低四寥陽殿上步黄金一落顛崖地獄深蘇武窖中偏喜卧劉琨囚裏不妨吟生前已見夜义面死去只因菩薩心萬里風沙知已盡誰人㑹得廣陵音五亦知戛戛楚囚難無奈天生一寸丹鐡馬行鏖南地熱赭衣坐擁北庭寒朝食淡薄神還爽夜睡﨑嶇夢自安亡國大夫誰為傳祗饒野史與人看六風雪重門老楚囚夢回長夜意悠悠熊魚自古無雙得鵠雀如何可共謀萬里山河真堕甑一家妻子枉填溝兒時愛讀忠臣傳不謂身當百六秋七聼着鵑啼淚滿襟國亡家破見忠臣關河歴落三生夢風雪飄零萬死身丞相豈能堪獄吏故侯安得作園人神農虞夏吾誰適囬首西山繼絶塵八風前泣燈影日下泣霜花鐘信忽然動屋隂俄又斜悶中聊度歳夢裏尚還家地獄何須問人間見夜义九風霜隂忽忽天地澹悠悠我自操吳語誰來問楚囚寂中惟㓕想達處盡忘憂手有韋編在朝聞夕死休十環堵塵如屋纍然一故吾解衣烘稚蝨匀鏁救殘鬚坐處心如忘吟餘眼己枯不應㽞滯乆何日裹籧篨呉殺諸葛恪以籩篨裹而弃之}
