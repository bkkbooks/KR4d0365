  - {type: variant, offset: 478, length: 3, content: 氣盛北, WYG: 身以為忠誰復書之余謂商雖亡夷齊不食周粟人臣自盡其心豈論書與不書元帥為之改容髙人名若凂烈士死如歸智滅猶吞炭商亡正采薇豈因徼後福方肯蹈危機萬古春秋義悠悠雙淚揮上塜吟湘人有登科者初授武岡尉單車赴官守名家正擇婿尉夲有室隠其實而取焉官滿随婦翁入京自是捨桑梓去墳墓終身不歸後官至侍從其糟糠妻居母家不復嫁歳時為夫家上􅊘婦禮不廢友人作古詩一首曰上塚吟某讀之為之感慨因更廣其意賦五言一篇余昔從君時堂上拜姑嫜相携上祖塚歳時持酒漿姑嫜相繼沒馬鬛不在鄉共君甌盂飯清涕流襦裳君貧初赴官有家不得将妾無應書兒松檟自成行君别不復歸歳月何茫茫長安擁朱綬執鴈事侯王豈無一紙書道路阻且長年年酹寒食妾心良自傷君家舊巾櫛至今襲且蔵諒君霜露心白首遥相望塟無主墓碑}
