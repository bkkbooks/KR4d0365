  - {type: variant, offset: 9923, length: 0, content: '', WYG: 州贑上瑶桃俄五稔海中玉果已三周人生聚散真成夢世事悲歡一轉頭坐對薫風開口笑滿懐耿耿復何求夜起夢破東窓月半明此身雖在只堪驚一春花裏離人淚萬里燈前故國情龍去想應回海島鴈飛猶未出江城客愁多似西山雨一任蕭條白髪生端午感興千金鑄鏡}
