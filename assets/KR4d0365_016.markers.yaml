  - {type: variant, offset: 11140, length: 974, content: 發秦州鄒䖏置第一百二十七兵部侍郎江東西䖏置副使督府参賛軍亊鄒􅘶字鳯叔吉水人慷慨有大志以豪俠行䑓郡間從予勤王𥙷武資至将軍景炎換文以寺丞領江西招諭副使聚兵寕都氣勢甚盛寕都𬒳執変姓名為卜者虜不知其為招諭使也入贑城得脱尋聚兵永豐興國間行府奏授江西安撫副使統兵数萬攻興國縣尋㑹行府至縣返正别軍復永豐進授江東西䖏置副使屯兵永豐境上以烏合一日而潰行府失助於是有空坑之敗哀哉東郊暗長戰吴侍御江上宅死地脫斯須将適江陵庾公興不淺張九齡居然屈壮圗别蘇溪鄒䖏置第一百二十八行府再入廣奏以公充都督府分司置司永豐興國間接應江淮虜自隆興遣大兵攻袭公萬死一生備經艱難竟得脫引江西兵入廣㑹行府於潮陽及移屯公爲殿亊岀不虞虜至麾下火急自剄扶入南嶺踰十日死是行公所将皆江西頭目以取行府爲名使行府入江西十萬衆立辦天之未啓中興也柰何公有子甚俊先卒家人散失無餘公嘗謂予欲立富田鄒氏子爲嗣不果至是絶哀哉方當用節鉞相中允不返舊征魂東楼凄凉餘部曲送郭中丞發聲爲爾吞别李義劉監簿第一百二十九宣教郎帶行軍噐監簿督府機宜刘子俊字民章吾郷之傑也嘗領漕貢余開督興國民章來計亊行府敗民章收散兵於洞源接應諸郡縣尋引軍入廣道遇虜潰亡未㡬再招集與鄒䖏置同詣行府㑹於潮陽越二十日而行府敗民章𬒳執莫知所終哀哉艱難奮長戰潼関吏髙義薄行雲畫街行死為殊方鬼客堂三夜頻夣君夣李白劉監簿第一百三十秀氣衝星斗贈李八丈壮筆過飛泉李十五丈舊遊易磨㓕汝陽王璡魂傷山寂然妻子入蜀䔥資第一百三十一閤門路鈴䔥資本書吏也小年給使令稍長通文墨圎機善䖏亊性和厚上下信爱予家先避地入廣資於難中扶持盡力及行府江西之敗衛護大夫人全督府印有功後在兵間調和諸将應府中碎務皆其領攝腹心之良也潮陽移屯道遇虜資以病体𬒳害哀哉王當風雲㑹病栢謝爾從者劳遣興感恩義不小送廬侍郎魂獨委蓬嵩送王砅杜大卿滸第一百三十二司農卿廣東提舉招討副使督府謀官杜滸字貴卿丞相立齋之姪也性剛猛為㳺俠京師予北行滸願從鎮江之脫滸之力也匍匐淮甸衛護艱虞忠劳備盡嗚呼可謂義士昔沒賊中時送韋評亊中夜間道歸後出塞辛苦救衰朽遭田父泥飲㣲爾人盡非北征杜大卿滸第一百三十三滸從予南還佐府南劍尋遣徃台温招集兵財福安䧟相失滸趍行朝乆之奉朝命至行府值江西之敗又與䟦渉艱難者年餘及得府移屯潮陽滸護海舟尋趍厓山與行府遂隔及厓山潰滸并䧟焉余至五羊滸來見病無復人形在虜網羅中無所容力尋聞死焉哀哉髙随海上查夜宴子豈無扁舟寄薛郎中, WYG: ''}
