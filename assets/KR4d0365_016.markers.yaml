  - {type: variant, offset: 10671, length: 467, content: 氣慷慨邑城䧟兄弟俱不免哀㢤灑翰銀鈎連陳合遺故宅翩躚山顛鶴西閣曝日惨淡鬪龍蛇喜晴及兹歎冥漠青陽候䔥架閣第一百二十四督幹架閣監軍䔥明哲字元甫吉州貢士性剛毅遇亊有膽氣明於大節予至汀梅來從督府幕及出江西監贑縣義兵收復萬安縣尋復龍泉行府敗元甫入野陂連結諸寨拒虜𬒳執死於洪哀哉諸生舊短褐橋陵張目視冦讐送韋評亊髙義終焉在送王信州白骨更何憂得弟觀書陳督幹第一百二十五督幹監軍陳子敬贑人以貲力雄郷里舊從予逰行府至汀子敬招集義兵置屯皂口以㩀贑下流以遏虜船徃來及行府攻贑子敬行其謀功效甚著行府敗舉兵黄塘連結山寨不降重兵袭潰不聞所終哀哉挺身艱難際送韋評亊虎穴連里閭課伐木髙天意悽惻送韋諷同盡随丘墟謁文公上方陳少卿第一百二十六帶行太府少卿福建提刑督府参議官陳龍復泉州老儒號清陂先生丙辰登科沈厚朴茂有前軰風流平生所歷州縣皆以清儉著名余開府南劍辟入幕老成重一府尋遣徃漳潮計亊行府自江南再入廣先生聚兵循梅來㑹後分司潮陽應接諸路四方豪傑翕然響應積糧治兵行府由是趍潮陽及移屯爲虜所追袭先生遂不免時年七十三哀哉卿月昇金掌江陵送髙大卿老氣横九州送韋評亊前軰復誰紀李公邕吾道長, WYG: ''}
