  - {type: variant, offset: 13813, length: 775, content: 娘次監娘次奉娘次寿娘丙子定娘寿娘以病死於河源之三角丁丑柳娘環娘䧟惟監娘奉娘得存戊寅潮陽之敗復死亂兵中哀哉癡女飢咬我彭衙行欝沒一悲魂遣懐不得收骨肉佳人痛哭蒼烟根送樊侍御弟第一百五十一余二弟長璧次璋璋自船澳奉母䘮趍惠州别璧来五羊别自是骨肉因縁堕寥廓矣哀哉兄弟分離苦送弟頻凄凉憶去年倚杖何以有羽翼夣李白飛去墮爾前彭衙行弟第一百五十二棣華晴雨好和宋太少府風急手足寒水㑹渡百戰今誰在憶弟覊捿見汝難寄弟弟第一百五十三沙晚鶺鴒寒寄弟豊風吹紫荆樹得弟消息忍涙獨含情郭中丞江湖春欲暮宴胡侍郎弟第一百五十四不見江東弟元日示宗武急難心惘然義鵠念君經世乱送班司馬入京卧病海雲邊所思次妹第一百五十五予次妹自永新歸寕不與彭氏之難乱離中随母兩國夫人上下自船澳奉䘮趍惠陽兄妹不復見矣哀哉大際傷愁别岀郊江山憔悴人送孟倉曹團圎思弟妹又示兩兒傳語故郷春贈别何邕思故郷第一百五十六自一百五十六至一百六十二共七首皆思故郷懐故山之情余始創文山其間水石竹木䔥然有􅡞川盤谷之趣盖将終焉承平時郷曲賔朋日夕宴聚楽以忘憂真人世之清福今思之非惟平生故人半為塵土而故郷萬里并隔世外惟死則魂識歸吾故郷耳哀哉天地西江逺送崔侍郎無家問死生憶舎弟凉風起天末憶李白萬里故郷情江楼宴第一百五十七江漢故人少贈弟賛善東西消息稀憶弟異花開絶域遊何将軍山林野風吹征衣别賛上人第一百五十八老夫悲華年聴楊氏歌天涯故人少送弟每望東南雲遣興决􅗃入飛島望岳第一百五十九人生無家别無家别親故傷老醜述懐剪𥿄招我魂彭衙行何時一樽酒憶李白第一百六十春水滿南國遣寓惨淡故園烟陳拾遺三年門巷空遣興永為隣里憐草第一百六十一迢迢萬里餘前岀塞絶域誰慰懐贈李五丈我圃日蒼翠雨回首望兩厓柴門第一百六十二春日漲雲岑過津口故園當北斗月窈窕桃李花喜晴紛披為誰秀九日第一百六十三自一百六十三至一百九十一共二十九首雜然冩其本心陶潜避俗翁遣興龎公竟獨徃雨明明君臣契牽牛織女, WYG: 堵甘}
