  - {type: variant, offset: 15648, length: 400, content: 髙官何足論佳人寂寞身後亊夣李白物理固自然塩井願聞第一義謁文公上方歎世道第一百九十二自一百九十二起至二百泛然為世道感歎古來遭䘮乱西閣滕日丈夫多英雄牽牛織女悠悠委薄俗入衡州豈非吾道東贈蘇四第一百九十三蝮蛇暮偃蹇簡崔評亊猛虎慿其威遣興真宰意茫茫遣興六合人煙稀北風第一百九十四黎民困逆節登㐮上堂殘孽駐艱虞過南岳孰云網恢恢夣李白自及梟獍徒草堂第一百九十五眼中萬少年别張建封得志行所為詠懐白馬蹴㣲雪遣興追随燕薊兒王公思礼第一百九十六客從何郷來病栢挾矢射漢月留花門殺身傍權要三歌門戸有旌節遣興第一百九十七関河霜雪清送逺故人亦流落送裴五赴夷歌奉玉盤楊六判官悲君随燕雀贈何邕第一百九十八漁陽豪俠地後出塞圵里富熏天遣興快馬金纒轡送從弟亞但遇新少年遣懐第一百九十九南北逃世難逃難始聞蕃漢殊草堂天下今一家鹿須山中原有驅除留花門第二百茫茫天造間宿花石戍髙岸尚爲谷水檻百川日東流别賛上人勢閱人代速觀山川水漲文山先生全集卷之十六終, WYG: ''}
