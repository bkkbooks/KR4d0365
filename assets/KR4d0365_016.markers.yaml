  - {type: variant, offset: 13349, length: 0, content: '', WYG: 家人陷今恰三周而予在行既十閱月矣有感而賦平生心事付悠悠風雨燕南老楚囚故舊相思空萬里妻孥不見滿三秋絶憐諸葛隆中意贏得子長天下遊一死皎然無復恨忠魂多少暗荒丘感懐己邜八月二十四日予以楚囚發金陵十月一日至燕越五日罹狴犴今為庚辰中秋後九日感懐四十字去歳趨燕路今晨發楚津浪名千里客剩作一年人鏡裏秋容别燈前暮影親魯連疑未死聊用托芳塵重陽庚辰飄零萬里若為家一夜西風吹鬢華祇有新詩題甲子更無故舊對黄花又江南秋色滿梧桐回首青山萬里空怕見鏡中新白髪長将破帽裹西風又風捲車塵弄曉寒天涯流落寸心丹去年醉與茱萸别不把今年作健看己卯十月一日予入燕城歳月冉冉忽復周星而予猶未得死也因賦八句去冬陽月朔吾始至幽燕浩刼真千載浮生又一年天南照天北山後接山前夢裏乾坤老孤臣雪咽氊己卯十月五日予入燕獄今二十有六旬感興一首石晉舊燕道鍾儀新楚囚山河千古痛風雨一年周過鴈催人老寒花送客愁捲簾雲滿坐抱膝意悠悠去年十月九日余至燕城今周星不報為賦長句君不見常山太守罵羯奴天津橋上舌盡刳又不見睢陽将軍怒切齒三十六人同日死去冬長至前一日朔庭呼我弗為屈丈夫開口即見膽意謂生死在頃刻赭衣冉冉生蒼苔書雲時節忽復來鬼影青燈照孤坐夢啼死血丹心破只今便作渭水囚食粟已是西山羞悔不當年跳東海空有魯連心獨在冬至書雲今日事夢破曉鳴鐘家禍三生刼年愁兩度冬江山乏小草霜雪見孤松春色蒙泉裏煙蕪㡬萬重冬晴北國天寒少南方地氣來年光如箭去世事正輪廻可怪新祈雪相思乆别梅夜闌燈坐暗獨自撥殘灰自嘆可憐大流落白髪魯連翁毎夜瞻南斗連年坐北風三生遭際處一死笑談中贏得千年在丹心射碧空戊寅臈月二十日}
