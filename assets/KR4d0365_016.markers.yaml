  - {type: variant, offset: 9908, length: 0, content: '', WYG: 龍逰逺月滿關山鶴唳髙夢到鈞天燈火閙依然彩筆照宫袍讀史自古英雄士還為薄命人孔明登四十韓信過三旬壮志摧龍虎髙詞泣鬼神一朝事千古何用怨青春感傷家國傷冰冸妻孥歎陸沉半生遭萬刼一落下千尋各任汝曹命那知吾輩}
  - {type: punctuation, offset: 9909, content: (, id: KR4d0365_krp_016-bkkpn949}
  - {type: variant, offset: 9909, length: 0, content: '', WYG: 人誰無骨肉恨與海俱深遣興一落顛崖不自由春風相對說牢愁稚驢黒月光中吼饑䑕青燈影下逰豈料乾坤成堕甑始知身世是虛舟遥憐海上今塵土前代風流不肯休又東風吹草日髙眠試把平生細問天燕子愁迷江右月杜鵑聲}
