  - {type: variant, offset: 477, length: 0, content: '', WYG: 兄弟一朝生别離鴈行長已矣馬足逺何之𦵏骨知無地論心更有誰親喪君自盡猶子是吾兒感傷地維傾渤澥天柱折崑崙清夜為揮淚白雲空㫁魂死生蘇子節貴賤翟公門髙廟神􅂕在乾坤付不言自歎海闊南風慢天昏北斗斜孤臣傷失國逰子歎無家官飯身如寄征衣鬢欲華越王䑓上望家國在天涯虎頭山蚤不逃秦帝終然陷楚囚故園春草夢舊國夕陽愁妾婦生何益男兒死未休虎頭山下路揮淚憶䖍州髙沙道中道逢死人骨委積萬有千魂魄侵蠅蚋膏脂飽烏鳶使我先朝露其事亦復然丈夫竟如此吁嗟彼蒼天古人擇所趍肯蹈不測淵奈何以遺體糞土同棄捐初學蘇子卿終慕魯仲連求仁而得仁寕怨溝壑填自古皆有死死不愧前賢秦客載張禄吳人納伍員季布疑在魯樊期托於燕國士急人病倜儻何拘攣伊人莫知我此恨付重泉戰場三年海嶠擁貔貅一日蹉跎白盡頭垓下雌雄羞故老長安咫尺泣孤囚魚龍沸海地為泣􅃄雨滿山天也愁萬死小臣無足憾蕩隂誰共侍中逰哭崖山寳蔵如山席六宗樓船千疊水晶宫吳兒進退尋常事漢氏存亡頃刻中諸老丹心付流水孤臣血淚洒南風早來朝市今何處始悟人間萬法空元帥謂余曰國亡矣}
