  - {type: variant, offset: 2832, length: 4573, content: 弓矢不支待又水道生踈舟工進退失據使虜初至行朝乗其未集撃之蔑不勝矣行朝依山作一字陣幇縳不可復動於是不可以攻人而專受攻矣先是行朝以游舟數岀得小捷他船皆閩浙水手其心莫不欲南向若南船摧鋒直前閩浙水手在北舟中必爲變則有盡殱之理惜世傑不知合變專守法嗚呼豈非天哉六龍忽蹉跎别唐十五誡川廣不可泝送汝陽王璡東風吹春水送程録事乾坤莾回互懐台州鄭司戸祥興第三十七幽燕盛用武昔遊六合巳一家後出塞眼穿當落日喜逹行在滄海有靈查喜晴祥興第三十八客從南𬈑來客從黄屋今在否留别張使君天高無消息幽人未忍即開口𫐠懐祥興第三十九南嶽配朱烏望北地軸爲之翻晦日尋崔戢皇網未爲絶北征雲臺誰再論覧柏中丞官制陳宜中第四十丁丑冬御舟自謝女峽歸碙川陳宜中船相失莫知所之管葛本時湏别張十二建封經綸中興業述古有志乗鯨鰲送王砅使南海南紀阻歸檝贈李光弼張世傑第四十一世傑得士卒云毎言北方不可信故無降志閩之再造實頼其力然其人無逺志擁重兵厚貲惟務遠遁卒以䘮敗哀哉南國卷雲水舟中苦熱黄金傾有無遣懐蛟龍亦狼狽溪漲反復乃湏臾草堂張世傑第四十二長風駕高浪龍門偃蹇龍虎姿病柏蕭條猶在否止水遣懐寒日岀霧遲早發射洪蘇劉義第四十三蘇京湖老将雖岀吕氏乃心專在王室永嘉推戴實建大功後世傑用事志欝欝不得展其人剛躁不可近然能服義終始不失大節厓山與其子俱得脫亦不知所終驊騮事天子送高司直龍怒㧞老湫送韋十六評事皷枻視青旻寄薛三郎中烈風無時休登慈恩塔曽淵子第四十四曽淵子元貶雷州御舟南廵復與政事厓山之敗曽欲赴水爲蘇父子所留同得脫其家竟沒虜後還五羊有人見其子雷郎者焉哀哉子負經濟才别唐十五欝陶抱長䇿始華陽吕少府安得萬里風夏夜歎南圗回羽翮送嚴公入朝江丞相萬里第四十五先生居饒州虜入城先生投府第中池水死其弟萬頃於㕔事上𬒳執殺死哀哉星折台衡地送蘇州李長史斯文去矣休送王信州厓北湖光與天逺過洞庭屈注滄江流奉同郭給事趙倅昴發第四十六虜至池州倅昴發蜀人夫婦自經死風雷颯萬里大雨大江動我前水㑹渡青衿一憔悴衡州縣學名與日月懸陳拾遺故宅将軍王安節第四十七常州敗虜生獲王安節不屈而死虜謂過江以來武人忠義者惟王安節一人安節乃節度使王堅子也激烈傷雄才金華山觀直氣横乾坤别李義惆悵汙血駒別張建封見此忠孝門柏中丞降官制李安撫芾第四十八肯齋先生蜀人寓居衡陽乙亥留夣炎為潭帥夣炎歸相始起先生為代先生倉卒運掉城守甚備及城䧟先生殺其家人乃自焚死哀哉殺氣吹沅湘入衡州高興激荆衡李八判官城中賢府主課伐木千秋萬歳名夣李白李制置庭芝第四十九庭芝得爰立之命引兵至泰州為虜所困泰州孫九賣城庭芝𬒳執誅於揚州市雖無功於國一死為不負國矣空留玉帳衛送嚴公那免白頭翁陪章留後死者長巳矣石壕吏淮海生清風送高司直姜都綂才第五十淮東猛将揚州前後主戰皆其人也及泰州破𬒳執虜愛其才勇啖以官爵不肯降罵諸負國者臨刑含血以噴罵虜不絶口其英風義烈淮人言之無不傷歎惜哉屹然強冠敵贈王司空古人重守邊後岀塞惜哉功名忤薛大保死亦垂千年義鶻張制置珏第五十一蜀之徤将元與昝萬壽齊名昝降張獨不降行朝擢授制閫未知得拜命否蜀雖糜碎珏竟不降為左右所賣珏覺而逃遁𬒳囚鎻入北不肯屈後不知如何氣敵萬人将楊監畫鷹獨在天一隅遣懐向使國不忙九成宫功業竟何如别張建封陸樞宻秀夫第五十二字君實文筆英妙自維揚幕入朝京師䧟永嘉推戴有力及駐厓山兼宰相凡朝廷事皆秀夫潤色綱紀之厓山䧟與全家赴水死哀哉文彩珊瑚鈎奉同郭給事淑氣含公鼎張九齡烱烱一心在嚴武天水相與永渼陜西南臺勤王第五十三甲戌冬詔天下勤王予守章貢首應詔意同志者當接踵而奮已而竟無應者予遂以孤軍赴闕世亊不濟殆由於此哀哉出師亘長雲後岀塞盡驅詣闕下徃在首唱恢大義衡州縣學垂之俟來者蘇源明蘇州第五十四予領兵赴闕時陳宜中歸永嘉留丞相夣炎當國夣炎意不相楽岀予以制閫守呉門尋以獨松亊急陳丞相留丞相陳樞宻文龍連書趣还宿衛予不得已行未㡬姑蘇䧟哀哉嵯峨閶門北北遊朱旗散廣川餞裴二端控帶莾悠悠送韋十六評亊惨淡陵風煙草堂拜相第五十五予自吳門還遣守獨松戍餘杭丙子正月初二日除知臨安府辞不拜引輕兵至闕陳大義不得見十八夜宜中逃次日早子除樞宻使午拜丞相樞宻使都督諸路軍馬然亊巳無及無可柰何矣予不敢當亡國之名請有危難捐軀而已我來屬時危九成宫朝野色枯槁送長孫待御倚君金華省張九齡不在相逢早贈射洪李四丈岀使第五十六初宜中蒙蔽外庭如遣使北軍求議和約見伯顔於長安堰已而不如約故虜徑至高亭山要以相見宜中遂逃上下皆莫知其詳予既辞相印不拜遂奉上命以議和為名在虜营虜強以降余見伯顔開陳大義詞氣慷慨虜頗傾動尋留不遣而丞相呉堅右丞賈餘慶同知樞宻院謝堂以下竟自納欵余責伯顔留使失信及数虜罪惡以死自誓而一無所及矣痛哉隔河見胡騎前岀塞朝進東門营後出塞皇皇使臣體寄崔部亊詞氣浩縱横春陵行發京師第五十七自國都失守應降表及行下省札播告歸附皆不敢使余聞知予居虜中欲求速死虜衛守甚嚴務為塗塞耳目二月八日大臣吳堅賈餘慶家鉉翁刘岊皆以祈請使為名下船詣北庭虜忽驅余並行余不肯徃𬒳其捽迫不得巳行至謝村㡬逃去東下姑蘇臺壮遊揮涕戀行在北征蒼茫雲霧浮發秦州風㠶倚翠盖凼人去鎮江第五十八余至京口北行有日矣余欲引决同行士杜滸曰且逃逃不獲死未晚也遂謀走真州時江中皆北船偶物色一空船在虜籍外捐重貲約之二月晦日夕一更後予約同行十一人潜岀邸挾刃自随不済則自殺幸而安行無虞遂泝流而上虜船綿亘江上㡬不得出三月朔抵真州今而後喜可知也京口渡江航送許八十遺窮途仗神道送魏六丈蕭條向水陸入衡州雲雨白浩浩送長孫侍御至真州第五十九余至真州登城四望徘徊感歎守苗再成慷慨有志畧聞余言踴躍思奮余即作書報制閫李庭芝及約淮西夏貴又作諸州太守書約以興復苗守遣人四岀導意兩日乆與余講進取方畧使天命再宋是行也中興之機也一人狐疑亊乃大繆惜哉萬里長江邊送高司直去國同王􅙾蓬泉驛青山意不盡上牛頭寺皇天照嗟嘆舟中苦熱行淮東第六十李庭芝聞余至真州以為來說城遣使数十軰來涖殺予苗再成不肯然不得不岀予以自白以上巳日紿余岀城門閉城不荅余欲赴濠死未㡬苗遣五十人送行行五十里布刃於野詰問甚乆使一語可疑即為草間血矣其人信余言為之歎惋送至州境夜至揚州西門欲扣城入前却𢾗四四人逃去余與七人走荒野空屋中是日虜萬騎自屋後過幸而苟免自是変姓名趨高郵初五夜行屡迷失道且虜哨各鳥獸竄伏縳去一人殺傷一人又幸喜脫余時日夜在死亡中驚惴危懼飢餓無聊人生逆境有如此者哀哉客子中夜發赴奉先縣月照白水山彭衙行悲辛但狂頋懐鄭十八戸處浩蕩前後間清溪自淮歸浙東第六十一余高郵道中遇哨得脫行数十里匍匐不䏻行幸遇村夫雇倩籮擡入郡又有𬒳傷者扶持強行血衣淋漓見者傷惜初七日至郡地分官盤詰甚至稱制置司有報文丞相來說城合一路覺察不納南來人余等既変姓名地分官見有傷者不疑聽下船去沿途歴盡艱險得至泰州城下伏十餘日趋通州自下船後哨騎或隔五里或隔十里驚惶連日逹通州城反覆詰問𢾗日不納不得已從地分官吐實語太守楊思復遂得覆䕶主圃子内大舟中然後以海舟送歸浙東船中遇風波屡覆又遇賊追逼数四是行寄一生於萬死不復望見天日至永嘉惟存六人北走驚險難彭衙行十歩一回首相從歌碧海吹衣裳又上後園山脚掛席上南斗别張使君至福安第六十二益王以天下兵馬都无帥衞王以副元帥建號於永嘉随趋三山開府予四月八日到永嘉則元帥舟去巳一月矣亟使副守李珏驛報行府陳丞相即遣人來議擁立亊余深賛大議五月一日登極予以觀文殿學士侍讀召赴行在二十六日至行都即再相然國方草創陳宜中尸其亊專制於張世傑余名宰相徒取充位遂不敢拜議岀督握節漢臣回鄭駙馬麻鞋見天子述懐感激動四極嚴武壮士淚如雨聽楊氏歌福安宰相第六十三余至通州地分官以制置司文移爲說甚作難阻余不得已吐實以通楊帥守思復乃云諜報許浦有馬根尋文丞相甚信余言不直制司予然後得楊守存恤遂遵南歸及過明州東門有列岸数百艘初不知為虜把隘船也後問之東門道士云是目虜頭目見船過聞左右曰此何船皆以漁舟對遂得善去嗚呼危哉楊守為余言欲得海船数百艘當約許帥文徳擁兵勤王慨然有誓清之志予至永嘉即詳報陳丞相不以為信乃遣毛浚之通州而不以告余浚至通州守間予何以無書遂發怒浚㡬不免浚岀而通遂降虜矣惜哉紛然䘮亂際柏中允制反覆歸聖朝鄭䖍秉鈞孰為偶贈李八判官扶顛永蕭條李光弼南劒州督第六十四始余至永嘉留一月候命永嘉及台處豪傑皆來自獻願從海道作戰守規模予至福安欲还永嘉謀進取廟謨不以為然遂議開督于廣廣䧟乃出南劒開府聚兵財爲收復江西計于時幕府選辟皆一時名士宜中既棄臨安及三山登極欲倚世傑復浙東西以自洗濯所以阻予永嘉之行後取定海兵敗李珏為制閫衆方思用予悔巳不及惜哉劒外春天逺送班司馬入京江閣鄰石靣蕳嚴雲幕府盛才賢次古城店意氣今誰見白馬汀州第六十五予在劒朝廷嚴趣之汀十月行十一月至汀州而福安随䧟車駕幸海道矣亊㑹之不齊如此哀哉雷霆走精銳送樊侍御斧鉞下青冥送李大夫江城今夜客出郭惨淡飛雲汀薛判官梅州第六十六予至汀汀守可疑汀兵非素所拊循㓂兵自贑自劒交至丁丑正月行府遂引兵趨漳州龍巖謀入衛漳潮道阻三月入梅州時麾下頗不循法斬二都綂軍政一新焉楼角凌風逈東楼孤城隱霧深野望萬亊随轉燭佳人秋光近青岑伐木贑州第六十七五月引兵自梅出嶺時贑吉兵皆來㑹六月大捷於雩都進攻興國縣縣返正於是駐屯遣大兵攻贑州又以偏師岀吉州贑諸縣皆復虜號令惟行於城中吉水永豐萬安永新龍泉以次皆復臨洪袁瑞莫不響應詣軍門請約束者相継興國黄州新復皆來請命汀州有偽天子黃從斬首至府上下翕合氣勢甚盛天若祚宋則是舉也幸而一捷國亊垂成之候也崆峒殺氣黒壮遊灑血暗郊垌薛判官哀笳曉幽咽留花門石壁断空青西閣江西第六十八行府偏師岀吉州者戰于鍾歩不利攻贑兵不幸相継而敗行府孤立時處置安撫鄒􅘶聚兵数萬在永豐境行府引兵就之㑹其軍亦潰而虜自後追及不可支雖人謀之不臧殆天意之未順每一念此氣殪欲絶哀哉東望西江永第觀高義在雲臺建封到今用鉞地草堂霜鴻有餘哀金華山江西第六十九旄頭初俶優将適江陵義士皆痛憤草堂乾坤空峥嵘畫鶻嚮者留遺恨空靈岸復入廣第七十行府敗於江西收散兵復入汀尋岀㑹昌入安逺趨循州是冬屯南嶺戊寅二月岀惠州海豐縣駐於麗江涌徧遣間使沿海訪問車駕六月翠華至厓山行府移船澳八月進少保信國公職任依舊行府欲赴闕張世傑阻隔於中不果行東浮滄海漘薛郎中南為祝融客詠懐漂轉混泥沙柴門迫此短景急龍門駐惠境第七十一朱鳯日威垂北風羅浮展衰歩詠懐北風吹蒹葭秋行官張望送此齒髮暮雨駐潮陽第七十二十月引兵趋朝陽稍平群盗人心翕然寒城朝煙淡呉侍御宅江沫擁春沙逺遊群盗亂射虎雷回首白日斜熹晴同府之敗第七十三十一月諜報虜大衆至漳泉度势不敵移屯将趋海豐為虜騎追及於中道時行巳数日不為備倉卒潰散遂𬒳執送兵五千人北征散足盡兩靡種萵苣留滯一老翁雨盖棺亊則巳奉先縣行府之敗第七十四自國難後行府白手起兵展轉患難東南䟦渉萬餘里亊不幸不濟然臣子盡心焉爾矣成敗天也獨柰何哉翠盖蒙塵飛詠懐仗鉞奮忠烈北征千秋滄海南張九齡亊與雲水白王思禮南海第七十五今𬒳執後即服腦子約二兩昏眩乆之竟不䏻死及至張元帥所衆脅之跪拜誓死不屈張遂以客禮見尋置海船中守䕶甚謹至厓山令作書招張世傑手冩詩一首復命末句云人生自古誰無死留取聲名照漢青張不強而止厓山之敗親所目撃痛苦酷罰無以勝堪時日夕謀䧟海而防閉不可出矣失此一死困苦至於今日可勝恨哉開㠶駕洪濤遣遇血戰乾坤赤送李判官風雨聞號呼草堂流涕灑丹極别蔡著作南海第七十六南海春天外送叚功曹秪應學水仙舟中自傷遅暮眼寓目為我一澘然李使君至廣州第七十七自厓山至五羊壮哉郡真形勝之國也徃年虜平其城收復後不䏻完整為守國計哀哉吾國之無人乎南方瘴癘地雷白馬東北來白馬長城掃遺堞李弼涙落強徘徊鄭附馬楼臺, WYG: ''}
