  - {type: variant, offset: 9021, length: 534, content: 懐朋友宿清溪驛百年見存沒鄭公䖍風吹蒼江樹雨寒月照白骨北征金應第一百一十承信郎路分金應元備筆扎使令性剛知義随勤王入京余䧟虜左右星散惟應無叛去志在鎮江得同脫狼狽淮東備嘗艱苦至通州以憂欝病死葬城下哀哉追随三十載送顧文學艱難愧深情羌材何處埋爾骨鹿頭山呼號傍孤城懐鄭司戸張雲第一百一十一路鈐張雲元吉州敢勇将官随閫勤王余既䧟虜張雲引兵自婺建劒汀歸里虜巳據吉城雲不勝憤七月引所部袭虜於南柵門擊殺甚衆本爲散退之計㑹天明戰渇赴江飲水尋𬒳衝溺死使䏻少忍當爲吾用哀哉痛憤寄所宣義鶻四方服勇决北征壮士歛精魂客居里巷猶嗚咽赴奉先縣劉欽貢元第一百一十二字敬徳吉州貢士素有志氣好功名上下今古徤於議論余開府汀城敬徳來寕都就招諭使鄒􅘶㑹虜暴至竟死乱兵中同時死者鞠華叔顔斯立顔起巖皆郡之英俊䏻爲時立亊功者天生人才若此曽未施一技速折乃爾哀哉文章日自負蘇公源明去家死路傍上後園山脚高視見覇王劒門感子故意長贈衛處士吕武第一百一十三環衛官吕武太平人靣旗爲軍余䧟虜應募随從北行其人勁烈靣折人觸忌諱不避然忠鯁人皆服之余與同脫鎮江行淮東患難中頼以自壮及開府南劒遣其結約江淮道尋阻武間関数千里即余於汀梅挺身㓂寨化賊為兵方将将数千人出江西以無禮於士大夫遭横逆死死之日一軍為流涕哀哉疾惡懐剛腸壮遊世人皆欲殺不見魂魄猶正直南池, WYG: ''}
