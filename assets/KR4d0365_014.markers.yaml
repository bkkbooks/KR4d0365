  - {type: variant, offset: 14456, length: 0, content: '', WYG: 送武夷趙王賓道士風流不比賀家狂蕭洒黄冠意自長自有武夷溪九曲鑑湖何必問君王蕭然被褐不求知歸傍仙船理釣絲却笑荆山空自售未應有智不如葵􅂴從原上訪桃花又不青門去種𤓰傳得神仙蝉蛻法君如欲覔問􅃄霞琴棊書􅀞四首送趙道士不知甲子定何年題滿柴桑日醉眠意在不言君觧否壁間琴夲是無絃我愛商仙茹紫芝逍遥勝似橘中時紛紛赤白方龍戰世事笑來一局棊蔡邕去後右軍死誰是風流入品題只有蛟龍太師字至今風骨在浯溪欲覔龍眠舊時筆相傳此手世間無黄金不買昭君夲只買嚴陵歸釣圖}
