  - {type: variant, offset: 387, length: 0, content: '', WYG: 安撫不忍加害張路分徐路分來歸行槖衣物五十卒弓劒送行海陵唐杜密謂張徐曰朝廷事未}
  - {type: variant, offset: 388, length: 0, content: '', WYG: 知文公宰相也今雖奉制司命他日必將移過於下以説汝其審之張徐然之行乆之云安撫令某二人便宜從事某見相公口口是忠義如何敢殺相公遂與張徐以賜金百兩與五十兵以銀百五十兩乃相繼辭去明日至揚州杜架閣謂制臣欲殺我不如趍高郵通州渡海歸江南見二王伸報國之志徒}
