  - {type: variant, offset: 3371, length: 862, content: 一人耳墓在鶩湖大坑之原距先生桑梓僅十里許田冝有也祭亦宜有也當六庚之訖籌捐一元以狥國斯時墓不墓祭不祭先生弗計及岳枝向南王塚獨青後世嘅先生之百挫間関仰先生之再拜從容此墓之所以脩田之所以出祭之所以起也豐嶺羅高字峻極於先生爲同邑爲同鄕飮先生清光佩先生幽馥多歴年所每自興嘆無以識景行之私爰就封下置圭田十畆爲先生子孫歳時拜掃之供吾意春雨秋霜奉甞謁祀爼豆席芻欝鬯酹茆皐亭潮陽之英風凛凛有時黯然萃於此乎南劍空坑之寸丹耿耿有時勃然見於此乎燕京柴市之正氣堂堂有時浩然來於此乎於戯先生之忠義並泰華塞宇宙精神雖無所不之而體魄所棲以安者實在於兹然則峻極之舉誠盛心也田入如千年峻極之冢嗣絞恐父之名雖著於郡乗爲可信不若有辞勒諸祠琰爲可乆用是先生之裔孫承䕃恊謀請記於予詞慚皇甫語愧淮西奚敢贅隻字於其間哉雖然事又不容於不紀也刲田以祀墓者固峻極仰止之良心舊時祭田間亦有漁侵蚕食之者又不識此心爲何物継今而後抑不知是山間有覬覦之否乎所可恃者先生之特忠鉅節与烏兎争光覆載同乆百千萬世之所敬慕者也萬一晦蝕必有泰山喬嶽者体峻極之盛心爲之恢復云文信國公祠堂祭田記彭序宋丞相文信國公祠在廬陵文山之麓舊有祭田爲豪強侵奪世遠人亡漫不可復成化丁酉春一峯羅先生謁祠聞而悵嘆者累日時副憲洪君性萬善觀風至郡一峯爲書令公九世孫継宗馳逹行臺盖欲求田以供祭也副憲嘉納了無難色適萬安縣民䔥麗漢得無主古窖銀遂獻于官洪顧郡守曰此銀自天來也得非信國之靈乎不擾官不病民而田資巳具有能以田售者宜倍直以償於是售者益衆乃得膏膄十畆即公舊隱基也元季兵燹廃以爲田洪益喜曰是田匪直得以供公之祭祀抑且得以復公之舊基一舉兩得不可無文以示乆遠乃屬記於序序日信國忠義冠絶古今顧序何人而敢置喙其間洪曰以子之才於性爲同年於信囯爲同鄕是記義不容辭於乎宋之不振播遷嶺海公起兵艱棘中千挫百折志不少衰意圖恢復柰何天不助宋宋運訖録公從容就義視死如歸而忠肝義膽昭天地貫金石與日月争光千萬世猶一日也後之論者謂收有宋三百年養士之功公一人耳雖世享鄕邦之祀理亦宜矣此一峯先生之悵嘆副憲太守之用心非私於公爲世教慮忠義勸也故今鄕有忠烈祠四時之奠獻官有, WYG: 咸諡}
