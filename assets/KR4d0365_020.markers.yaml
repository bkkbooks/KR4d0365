  - {type: page-break, offset: 2146, content: '', id: KR4d0365_WYG_021-44b}
  - {type: variant, offset: 2147, length: 1, content: 身, WYG: 職當死今日拏來法當死復何言博囉曰你道有興有廢且道盤古王到今日是幾帝幾王我不理㑹得為我逐一説來予怒甚曰一部十七史從何處説起我今日非赴博學宏詞科不暇泛言博囉愧乃云我因興廢故問及古今帝王你既不肯説且道古時曽有人臣將宗廟城郭土地分付與别國人了又逃走去有此人否予曰謂予前日為宰相奉國與人而後去之邪奉國與人是賣國之臣也賣國者有所利而為之必不去去者必非賣國者也我前日除宰相不拜奉使巴延軍前尋被拘}
  - {type: page-break, offset: 2147, content: '', id: KR4d0365_WYG_021-45a}
  - {type: variant, offset: 2149, length: 0, content: '', WYG: 已}
  - {type: variant, offset: 2150, length: 8, content: 大義愈明盖公志正, WYG: 有賊臣者獻國國亡我本當死所以不死者以度宗皇帝二子在浙東老母在廣故為去之之圖耳博囉曰徳祐嗣君非爾君邪曰吾君也曰棄嗣君别立二王如何是忠臣予曰徳祐吾君也不幸}
  - {type: substitution, offset: 2154, original: 盖, replacement: 蓋, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-1129}}
  - {type: 'kr:newline', offset: 2158, content: '

      ', id: KR4d0365_krp_020-bkkkrnewl113}
  - {type: line-break, offset: 2158, content: '', id: KR4d0365_SBCK_020-6a05}
  - {type: variant, offset: 2159, length: 9, content: 才廣識遠而器閑浩然, WYG: 失國當此}
  - {type: substitution, offset: 2165, original: 閑, replacement: 間, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4095}}
  - {type: variant, offset: 2169, length: 1, content: 氣, WYG: 時社稷為重君為輕吾别立君為宗廟社稷計所}
  - {type: variant, offset: 2172, length: 0, content: '', WYG: 忠臣也從懐愍而北者非忠從元帝為忠從徽欽而北者非忠從高宗為忠博囉語塞平章皆笑一人忽出來曰晉元帝宋高宗皆有來歴二王何所受命張平章曰二王是逃走底人立得不正是簒也予曰景炎皇帝乃度宗皇帝長子徳祐皇帝}
  - {type: page-break, offset: 2172, content: '', id: KR4d0365_WYG_021-45b}
  - {type: variant, offset: 2173, length: 3, content: 主而卒, WYG: 親兄如何是不正登極於徳祐已去天位}
  - {type: variant, offset: 2177, length: 0, content: '', WYG: 後如何是簒陳丞相奉二王出宫具有太皇太后分付言語如何是無所受命諸人無辭堅以無受命為解予曰天與之人與之雖無傳授之命推戴擁立亦何不可諸人但支離不伏予曰仁者見之謂之仁知者見之謂之知各是}
  - {type: page-break, offset: 2177, content: '', id: KR4d0365_WYG_021-46a}
  - {type: variant, offset: 2178, length: 5, content: 志弗遂者盖, WYG: 是可也博囉云你既為丞相若將三宫走方是忠臣不然引兵出城與巴延丞相決勝負方是忠臣予曰此説可}
  - {type: 'kr:newline', offset: 2180, content: '

      ', id: KR4d0365_krp_020-bkkkrnewl114}
  - {type: line-break, offset: 2180, content: '', id: KR4d0365_SBCK_020-6a06}
  - {type: substitution, offset: 2182, original: 盖, replacement: 蓋, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-1129}}
  - {type: variant, offset: 2184, length: 0, content: '', WYG: 責陳丞相不可以責我我不曽當國故也又曰你立二王做得甚功勞予曰國家不幸喪亡予立君以存宗廟存一日則臣子盡一日之責何功勞之有曰既知做不得何必做曰人臣事君如子事父父不幸有疾雖明知不可為豈有不下藥之理盡吾心焉不可救則}
  - {type: page-break, offset: 2184, content: '', id: KR4d0365_WYG_021-46b}
  - {type: variant, offset: 2186, length: 0, content: '', WYG: 也今日文天祥至此有死而已何必多言博囉於是怒見之辭色云你要死我不教你便死禁持你予曰我以義死禁持何害也博囉愈怒云云通事亦不以轉告予不答遂呼獄令史云將下}
  - {type: variant, offset: 2187, length: 0, content: '', WYG: 别聴言語初十日冬至入假予意假滿即見殺乃囚在獄中久無消息十二月半後一令史報云丞相語獄官宣差烏瑪喇云文丞相性猶硬不硬又一日令史報云博囉語烏瑪喇遲數日更與文丞相説話㑹嵗終釋放諸囚烏瑪喇語博囉獄囚皆已寛放惟文丞相一人在獄博囉云我奏却來喚你博囉至今重於一喚者憂予之硬也予誓死決矣此行決死在於再説話之頃昔人云薑桂之性至老愈辣予亦云金石之性要終愈硬性可改邪予自記一宗入獄本末於此曰予死矣庶幾有知予心者所記言語大畧如此當時泛應尚多不能盡記己夘除日書自古中興之君如少康以遺腹子起於一旅一成宣王承厲王之難匿於召公之家周召二相立以為王幽王廢宜臼立伯服為太子犬戎之亂諸侯迎立宜臼是為平王漢光武起南陽為帝蜀先主帝巴蜀皆是出於推戴何論有無傳授之命如唐肅宗即位靈武不稟命於明皇却類於簒然功在社稷天下後世猶無甚貶焉禹傳益不傳啟天下之人曰啟吾君之子謳歌朝覲訟獄者歸之焉漢文帝只是平勃諸臣所立豈有高祖惠帝吕后之命邪春秋亡公子入為君者何限齊桓晉文其大者也何謂逃走不當立羿之於夏莽丕之於漢方是簒徳祐亡而景炎立謂之簒何居可惜當時不曽將此一段言語敷陳頗有餘憾耳鄧傳云正月十三日至厓山張元帥索公書諭張世傑降公曰我不能救父母乃教人背父母可乎強之急乃書過零丁洋詩與之𢎞範笑而置之二月六日厓山潰公不勝悲憤作長歌哀之南北傳誦三月十三日還至廣州公曰俟北方生殺之命𢎞範於公禮貌日隆盡取公所亡妾婢僕役以奉之十四日𢎞範置酒海上㑹諸將因舉酒從容謂公曰國亡矣忠孝之事盡矣正使殺身為忠孝誰復書之丞相其改心易慮以事大}
  - {type: page-break, offset: 2187, content: '', id: KR4d0365_WYG_021-47a}
  - {type: page-break, offset: 2187, content: '', id: KR4d0365_WYG_021-47b}
  - {type: page-break, offset: 2187, content: '', id: KR4d0365_WYG_021-48a}
  - {type: page-break, offset: 2187, content: '', id: KR4d0365_WYG_021-48b}
  - {type: variant, offset: 2188, length: 0, content: '', WYG: 者事大元大元賢相非丞相而誰公流涕曰國亡不能救為人臣者死有餘罪況敢逃其死而貳其心乎殷之亡}
  - {type: variant, offset: 2189, length: 2, content: 雖天, WYG: 夷齊不食周粟亦自盡其義耳未聞以存亡易心也𢎞範為之改容是日𢎞範具公不屈與所以不殺狀奏於朝四月十一日使臣還言上有誰家無忠臣之嘆㫖令善視公以來公曰使予死於兵死於刑則已矣而萬里行役不得逃焉}
  - {type: page-break, offset: 2189, content: '', id: KR4d0365_WYG_021-49a}
  - {type: variant, offset: 2192, length: 8, content: 去宋而天理在公必, WYG: 也或曰明知其}
  - {type: 'kr:newline', offset: 2202, content: '

      ', id: KR4d0365_krp_020-bkkkrnewl115}
  - {type: line-break, offset: 2202, content: '', id: KR4d0365_SBCK_020-6a07}
  - {type: variant, offset: 2202, length: 4, content: 巳故宋亡, WYG: 而為之奈何曰吾所謂盡心者人人諉天下之責古今世道不属之人乎是烏可以成敗為是非哉二十二日北行與厓山朝士鄧光薦俱發廣州五月二十五日至南安軍石嵩與囊嘉岱議出江西慮簒奪遂鑰公於船公即絶粒為告祖禰文别諸友詩遣孫禮取黄金市登岸馳歸約六月二日復命於吉城下公將以心事白諸幽明即瞑目長往含笑入地矣乃水盛風駛前一日達廬陵孫禮期不至公且行忍死以待垂至豐城忽有見孫禮在他舟乃悟竟不曽往為之痛哭流涕暮始見主者取孫禮還明早飯已送之豐城岸從}
  - {type: page-break, offset: 2202, content: '', id: KR4d0365_WYG_021-49b}
  - {type: variant, offset: 2207, length: 1, content: 臣, WYG: 自便追}
  - {type: variant, offset: 2209, length: 1, content: 殺, WYG: 不可及矣公不食已八日若無事然公私念死廬陵不失為首丘今使命不達委}
  - {type: page-break, offset: 2209, content: '', id: KR4d0365_WYG_021-50a}
  - {type: variant, offset: 2211, length: 2, content: 成仁, WYG: 荒江盍從容以就義乎遂復飲食如初從者七人或逃或死或逐僅存一人曰劉嶸六月初五日至隆興觀者如堵北人有駭其英毅者曰諸葛軍師也十二日至建康十三日鄧光薦以病遷寓天慶觀就醫留不行八月二十四日石嵩等以公自東陽渡江淮士有謀奪公江岸}
  - {type: variant, offset: 2215, length: 2, content: 少論, WYG: 果以𢎞範命兵衛夾舟陸至揚州故也十月一日公至燕供帳飲饌如上賓公義不寢食乃坐達旦雖示以骨肉而不顧許以穹職而不從南冠而囚坐未嘗面北留夢炎説之被其唾罵瀛國公往説之一見北面拜號乞囘聖駕平章阿哈瑪特入館驛坐召公公至則長揖就坐平章云以我為誰公云適聞人云宰相來平章云知為宰相何以不跪公云南朝宰相見北朝宰相何跪平章云你何以至此公曰南朝早用我為相北可不至南南可不至北平章顧左右曰此人生死尚猶我公曰亡國之人要殺便殺道甚由你不由你平章黙去博囉欲殺公而上意及諸大臣不可張𢎞範病中亦表奏天祥忠於所事願釋勿殺故囚之連年冬於獄中遇靈陽子指示大光明正法公自謂於死生之際脱然若遺自是詩文時有洒脫忘世之意公獄中與弟書曰廣州不死}
  - {type: page-break, offset: 2215, content: '', id: KR4d0365_WYG_021-50b}
  - {type: page-break, offset: 2215, content: '', id: KR4d0365_WYG_021-51a}
  - {type: variant, offset: 2218, length: 1, content: 必, WYG: 意江西可}
  - {type: variant, offset: 2220, length: 0, content: '', WYG: 去之及出南安繫吾頸縶吾足於是不食將謂及吉州則死首丘之義也乃五日過吉又三日過豐城無飯八日不知飢既過吉思之無義且尚在江南或尚有生意遂入建康居七十餘日果有忠義人約奪我於江上蓋真州境也及期失約惘然北行道中求死無其間矣入幽州下之狴犴枷頸鎖手節其飲食今已二十日吾舍生取義無可言者今千萬寄此及詩達吾弟蓋絶筆也庚辰是歲囚五月弟璧自恵州入覲右丞相特穆爾布哈奏其畧曰此人是文天祥弟上曰那箇是文天祥博囉對曰即文丞相上嘆嗟久之曰是好人也辛巳是歲囚正月元日}
  - {type: page-break, offset: 2220, content: '', id: KR4d0365_WYG_021-51b}
  - {type: page-break, offset: 2220, content: '', id: KR4d0365_WYG_021-52a}
  - {type: variant, offset: 2222, length: 2, content: 稱首, WYG: 書付男陞}
  - {type: 'kr:newline', offset: 2224, content: '

      ', id: KR4d0365_krp_020-bkkkrnewl116}
  - {type: line-break, offset: 2224, content: '', id: KR4d0365_SBCK_020-6a08}
  - {type: variant, offset: 2225, length: 5, content: 亊具宋史而, WYG: 在縲絏中放意文墨北人爭傳之}
  - {type: substitution, offset: 2225, original: 亊, replacement: 事, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3830}}
  - {type: variant, offset: 2231, length: 17, content: 郷人刘岳申摭公所著日録吟嘨集指南録, WYG: 手編其詩盡辛巳歲為上卷自譜其生平行事一卷}
  - {type: substitution, offset: 2231, original: 郷, replacement: 鄉, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3389}}
  - {type: substitution, offset: 2233, original: 刘, replacement: 劉, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-0214}}
  - {type: substitution, offset: 2234, original: 岳, replacement: 嶽, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4348}}
  - {type: substitution, offset: 2236, original: 摭, replacement: 托, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4100}}
  - {type: 'kr:newline', offset: 2246, content: '

