  - {type: variant, offset: 2, length: 0, content: '', WYG: 臨江城中金地坊銀匠陳見負闗㑹過於市者嘆曰我等困苦止欠此馱耳翼早盜殺負闗㑹人慧力寺後山中捕司跡盜急市荷擔行鬻􅟿餌者以所聞陳語告捕司鞫陳箠楚誣服將受刑辭其母曰為子不能終養必宿寃債無可説者望吾母焚紙錢於吾死處吿土神乞指引我到盜殺人處又焚紙錢於盜殺人處告土神乞指引我到殺人正賊之家母如其言後月餘母夢子告曰謝母已得正賊乃府衙後李某家所得闗㑹具在暗閣上竹籠内於吾死後止用訖關㑹買牲酒賽謝神福内覆紙單籠上用草為遮蓋塵灰積滿一二日文提刑到請母為陳訴越數日公到陳母乞屏左右持素紙以所夢訴公即命有司同陳母詣李閣悉如夢遂以李償負闗㑹人死推司及元捕人償陳死官贍養陳母終身此趙君厚言也丙寅咸淳二年丙寅戊戌庚戌丙子長男道生生丁卯咸淳三年丁卯壬寅甲午丙寅次男佛生生二月女柳生三月女環生九月除尚左郎官辭免不允十二月赴闕供職誥詞曰蘇軾有云仁宗皇帝在位最乆得人最盛進士高科類至顯位我理宗享國庶幾仁祖取士之數却又夥焉當時褎然之選今其存者無不登進獨爾以陳情之表讀禮之文淹恤在外尚遲嚮用夫風之積不厚則其負大翼無力若爾之植立不凡非特以高科也而又益培厥栽則其滋長也孰禦尚左高於郎位其以是起家方天之休敬之哉可闕馮夢得行戊辰咸淳四年正月兼學士院權直兼國史院編修官實錄院檢討官是月臺臣黃鏞奏免所居官冬至除福建提刑臺臣陳􅅷欽奏寢新命己巳咸淳五年四月差知寧國府辭免不允十一月領府事府極彫敝始至爬梳條理曠然無事寧國為郡居上流斗絶税務無所取辦則椎剥為民害予奏罷之别取郡計以補課額百姓歡舞去後爭醵錢立祠先是乙卯春公家趍城三十里曰冷水坑旅店胡翁夜夢門外巨石有龍蜕爪其上夢甚著覺而異之昧爽即擁箒掃除石驗所夢已而公至則坐於石更屨翁言早寒願飯而去詞意甚勤公問故以夢吿且曰他日必富貴願垂憐我家公諾焉由是公家人往還經從必飯其家嵗時翁嫗至公家必優贈與至是公載家寧國弭任歸午飯胡店胡以宿諾請公笑曰諸擔中任擇取其一胡屢謝不敢則擇取一擔以告公令衆啓擔視之則扇也公曰此逺方土宜為鄉里親友餽者汝無用焉命衆估時值以其值與之蓋胡以公五馬貴如他人皆輜重充溢不知公行槖固枵然是以任其自擇無嫌也公之子孫過之胡之子孫仍奔走迎送不倦公家亦時優恤之一夢之吉乃纒綿受實惠異哉此胡老之言也庚午咸淳六年正月朔除軍器監兼右司辭免不允四月供監職免兼右司尋兼崇政殿説書兼學士院權直兼玉牒所檢討官㑹平章賈似道託疾歸紹興乞致仕㫖令學士院降詔不允賈有要君之志予當制裁之以正義時内制相承皆呈藁當國改竄惟命重失王言之體予直道而行遂忤賈意七月除秘書少監兼職依舊臺臣張志立奏免所居官辛未咸淳七年冬至除湖南運判臺臣陳堅表寢新命是年起宅文山山在廬陵南百里居予家上游兩山夾一溪溪中石林立水曲折其間從高注下姿態横出山下石尤竒怪跨溪綿谷低昂臥立各有天趣山上下流泉四出隨意灌注無所不之其高處面勢數百里俯視萬壑雲烟芊綿真廣大之觀也其南曰南涯可五里主人日領客其間窮幽極勝樂而忘疲其北曰北涯以南長潭為止清逺深絶蓋以時至焉宅基在南涯其地平曠長可百丈餘深可三十丈溪水至其前泓渟演迤山勢盤礴如拱如趍蓋融結非偶然者宅當其㑹青山屋上流水屋下誠隱者之居也予於山水之外别無嗜好衣服飲食但取粗適不求鮮美於財利至輕毎有所入隨至隨散不令有餘嘗嘆世人乍有權望即外興獄訟務為兼并登第之日自矢之天以為至戒故平生無官府之交無鄉鄰之怨閒居獨坐意常超然雖凝塵滿室若無所睹其天性澹如也於宦情亦然自以為起身白屋邂逅早達欲俟四十三嵗即請老致仕如錢若水故事使國家無虞明良在上退為潛夫自求其志不知老之將至矣時之不淑命也何尤山中新宅後聞江上有變即罷匠事惟㕔堂僅成癸酉咸淳九年正月除湖南提刑辭免不允三月領事疏決滯淹一路無留獄連平巨寇道路肅清冬乞便郡侍親差知贑州是年夏見古心}
