  - {type: variant, offset: 2145, length: 0, content: '', WYG: 攻贑吉兵敗行府趍永豐就處置司㑹兵尋為追騎所及至空坑失歐陽夫人一子二女行府收合散兵十月入汀州十一月至循州屯南嶺正月北兵大入汀闗不守公欲據城拒敵汀守黃去疾聞車駕航海擁郡兵有異志公移次漳州龍巖縣時賞孟濚還軍追及於中途呉浚以元人之命來招降人情洶洶殛浚乃定時索多右丞阿嘍罕左丞董參政入閩李珏王積翁等已降仍為福建宣慰招撫等使乃使淮軍羅輝持書來二月復梅州四月斬二大將之跋扈者曰都統錢漢英王福以釁鼔出江西開府興國縣淮西野人原寨劉源等兵復黃州壽昌軍用景炎正朔者四十日潭州衡山縣趙璠等起兵岳下張琥起兵邵永間跨數縣撫州何時起兵應同都督府分寧武寧建昌三縣豪傑皆遣使詣軍門受要束七月督謀張汴監軍率趙時賞趙孟濚等盛兵薄贑城招諭鄒􅘶率贑諸縣兵擣永豐吉水招撫副使黎貴達率吉諸縣兵攻太和時贑惟存孤城吉八縣復其半半垂下臨洪諸郡豪傑送款無虛日大江以西有席卷包舉之勢福建斬汀州偽天子黃從淮西兵復興國軍黃州復壽昌軍湖南所在起義兵不可數計四方響應孔明有云漢事將成也天未悔禍相望旬日間贑吉州皆以驚潰北兵自隆興來適乘其弊戰於廬陵萬石嶺下我師不利及永豐空坑軍士解散妻子為虜公收拾餘衆奉老母入汀州轉移循州將請命行朝請益兵再舉㑹北帥劉深自海至索多自陸至道路梗塞朝訊斷絶入駐循之南嶺柵險以自全黎貴達觀望有隂謀事覺伏誅八月黎貴達以正軍千人民兵數千次鍾步遇北軍民兵驚潰未旬日汴賞濚率民兵數萬逼贑城北軍以百餘騎衝之衆奔潰􅘶聚兵數萬在永豐境亦潰北元帥李恒等以大軍乘其弊追及於東固萬石嶺下都統鞏信率數十卒短兵接戰北帥駭其以寡拒衆疑山中有伏歛兵不進信坐巨石餘卒侍左右箭雨集屹不動北愈疑獲村夫引間道踰嶺至山後閴無人馬就視信等鎗遍體死未仆耳以此北騎稽滯公遂得逺去空坑陳師韓曰二十七日公至空坑潰卒困憊藉地睡公宿山前師韓家夜得報追騎已逼陳送公由間道去諸卒不之知也追騎至詰公所在無知之者遂攻破其寨屠之公行山逕逼窄民老幼負荷奔走填塞公窘迫不能前既而山墜巨石橫壅於路追騎至迂迴扳緣則公去逺矣至今居民指為相公石酆古庭主簿曰公既遁追騎將及是早重霧尋丈逺不相覩公猶聞後喧鬨聲追騎見轎中人風姿偉然問為誰曰姓文騎以為丞相也羣擁至帥所問之必曰姓文問轎夫咸不知也遍求俘虜人識認乃有曰此趙通判時賞也以此追騎逗留公又得逺去趙至隆興帥府罵不絶口遂受害歐陽夫人曰空坑敗潰卒意公所向疾至隨護公命五百拏手斫山樹為鹿角扼隘道頃之數人負傷至則五百拏手已摧踣不支公即去夫人驚問故則追騎已林立於前夫人與佛生栁小娘環小娘顏孺人黃孺人等皆為俘虜夫人沿路意有深水險崖即投死而一路坦平至元帥所已失佛生必有愛其俊秀養為己子矣戊寅宋景炎三年二月進兵惠州海豐縣三月屯麗江浦遣間使沿海訪問車駕六月行朝至崖山行府移船澳規入覲八月授少保信國公職任依舊封母曽氏齊魏國夫人九月齊魏國夫人薨㫖起復十一月進屯潮州潮陽縣十二月十五日移屯趍海豐二十日為敵騎追及於道軍潰被執服腦子不死見張元帥抗節不屈張待以客禮四月十六日大行皇帝遺詔曰朕以幼沖之資當艱厄之㑹方太皇命之南服黽勉於行及三宫胥而北遷悲憂欲死臥薪之憤飯麥不忘奈何乎人猶托於我涉甌而肇霸府次閩而擬行都吾無樂乎為君天未釋於有宋強膺推戴深抱懼慚而艱難日深氛祲甚惡海桴浮避澳岸棲存雖國步之如斯意時機之有待乃季冬之月忽大霧以風舟楫為之一摧神明拔於既溺事而至此夫復何言矧驚魂之未安奄北哨其已及賴師之武荷天之靈連濱於危以相所往沙洲何所垂閲十旬氣候不齊積成今疾念衆心之鞏固忍萬古以違離藥非不良數不可逭惟此一髮千鈞之託幸哉連枝同氣之依衛王某聰明夙成仁孝天賦相從險阻久繫本根可於柩前即皇帝位傳璽綬喪制以日易月内庭不用過哀梓宫毋得輙置金玉一切務從簡約安便州郡權暫奉陵寢嗚呼窮山極川古所未嘗之患難涼徳薄祚我乃有負於臣民尚竭至忠共扶新運故兹詔示想宜知悉十七日祥興皇帝登寶位詔曰朕勉承丕緖祇若令猷皇天付中國民既勤用徳聖人居大寶位曰守以仁藐茲𣺌沖適際危急惟我朝之聖神繼統而家法以忠厚傳心滲漉在人億萬年其未泯遭逢多事百六數之相乘先皇帝聰明出乎羣倫孝友根於天性痛憤三宫之北未嘗一日而忘遺大投艱丕應徯志除兇刷恥惟懷永圖托於神明辱在草莽上霧下潦之所匽薄洪濤巨浪之所震驚謂多難以殷憂宜祈天而永命胡寧予忍而不其延日月為之無光社稷凛乎如髮攀髯何及繼志其誰以趙孤猶幸僅存盍使為宗祧之主以漢賊不容兩立庶將復君父之讎大義攸闗輿情交迫閔予小子遭家不造而況斯今于前寧人圖功攸終其難莫甚尚賴元勲宿將義士忠臣合志而並謀恊心而畢力敵王所愾扞我於艱兹用大布寛恩率循彛典於以導迎和氣於以迓續洪休可大赦天下於戲人心有感則必通世運無往而不復成誦雖幼有周寧後於四征少康之興祀夏實基於一旅往求攸濟咸與維新十七十八十九日文武百官詣大行皇帝几筵殿早晚臨二十日卒哭行香二十一日以登極差官奏告天地初獻張世傑亞獻趙溍終獻林永年奉禮郎潘岳丁應張太祝陶士遜太官令幸大濟宗廟初獻曽淵子陸秀夫亞獻蘇景瞻辛岩終獻賈純孝茅相奉禮郎王子宜張祺孫太祝朱拱戊趙時侉社稷初獻蘇劉義亞獻劉鼎孫終獻趙槀奉禮郎傅半干曹郃太祝徐天麟二十二日内批百官議諡號孝恭仁裕懿聖濬文英武勤政皇帝廟號端宗二十三日太皇太后加上尊號鄧傳云五月公始聞端宗皇帝晏駕於化州之碙洲今上即位以明年為祥興初三日碙洲神龍見祥臣庶咸睹合議優異碙洲可升為祥龍縣置令丞簿尉隸化州免租税諸色料糴五年五月二十五日内批文璧除權户部侍郎廣東總領兼知惠州六月公規入覲為張世傑所格不得進遣使奉表起居仍自劾督師罔功降詔奬諭詔曰勑天祥才非盤錯不足以别利器時非板蕩不足以識忱臣昔聞斯言乃見今日卿早以魁彥受知穆陵歴事四朝始終一節邊氛正惡鞠旅勤王皇路已傾捐軀徇國脱危機於虎口涉逺道於鯨波去桀就湯可觀伊尹之任歸周辟紂咸喜伯夷之來方先皇側席以需賢乃累疏請身而督戰精神鼓動意氣慷慨以匈奴未滅為心棄家弗顧當王事靡盬之日將母承行忠孝兩全神明對越雖成敗利鈍非能逆覩而險阻艱難亦既備嘗如精鋼之金百錬而彌勁如朝宗之水萬折而必東尚遲赤舄之歸已抱烏號之痛朕勉當繼紹未有知思政兹圖任舊人克戡多難儵來候吏疊覽封章巋然靈光之固存此殆造物者隂相胡然引咎蓋見勞謙至如諗問之勤備悉忱悃之至朕今吉日既戒六月于征倚卿愛君憂國之忠成我刷恥除凶之志緬懷耆俊深切嘆嘉公又奏乞除鄒􅘶右文殿修撰樞密都承㫖江西安撫副使兼同都督府參謀官趙孟濚遥縣郡團練使左驍衛將軍江西招捕使兼同提刑都督府諮議官杜滸帶行軍器監廣東招諭副使兼同都督府參謀官鄒臻帶大府寺丞同都督府參議官陳龍復帶行兵郎廣東招諭司使兼同都督府參議官章從範帶行閤門祇候同都督府計議官丘夢雷林琦葛鍾各帶行架閣同都督府幹辦公事朱文翁同都督府准備差遣㫖特依奏除公乂奏潮循梅三郡並已取到返正狀乞將陳懿除右驍衛將軍知潮州兼管内安撫使張順帶行環衛官權知循州李英俊帶行閤門祇候差梅州通判暫權州事㫖特依奏文璋帶行大理寺丞知寧武州公欲移軍入朝優詔不許公欲入廣州凌震王道夫始復廣自恣憚公威重陽遣舟迎中道散囘遂不果自去冬宜中遁占城世傑以樞副柄國日以迎候宜中還朝為辭蓋諸大將嘗受宜中超擢樂其寛縱忌公英氣或以副貳受節制意不便其至八月授少保信國公封母曽氏齊魏國夫人同都督府官屬各轉五官金三百兩犒軍公以書抵秀夫天子沖幼宰相遁荒制詔勑令出諸公之口豈得不恤軍士以游詞相拒秀夫太息不能答時同都督府疫死者數百公亦數病九月六日母曽夫人薨㫖遣使宣祭十月長子道生卒陳懿兄弟五人號五虎本劇盜據潮州數叛附人苦其虐又不聴同督府節制公聲其罪討之懿走山寨潮士民請移行府於潮十一月進屯潮州潮陽縣殪㐫攻逆稍正天討假以嵗月因潮之民阻山海之險増兵峙糧以立中興根本亦吾國之莒即墨也劉興為潮宿寇叛服不常據數郡跋扈殺掠尤慘遂誅之十二月十五日聞北帥張𢎞範自明秀步騎水陸並進乃入南嶺柵險自固二十日𢎞範以水陸兵奄至公引避山谷行且數日敵輕騎疾馳追及於道軍潰被執求死於鋒鏑不可得服腦子以必得冷水乃死告監者以渴甚於田間蹄涔中掬水飲之時公病目旬餘遂泄瀉而目愈竟不得死越七日至敵營踊躍請劒𢎞範知不能屈乃曰殺之名在彼容之名在我且天祥見巴延臯亭山吾實在傍遂以平揖相見叙間闊如客禮蓋嵗除前三日也先是適鄒􅘶等自江西以民兵數千至公少留勞之又駐和平市攻陳懿黨與駐軍造糧亦意後隔海港步騎未能遽前陳懿以問罪窘迫百計不能救解乃挾重賄迎導北帥張𢎞正潛具舟海岸濟輕騎直指督帳公坐虎皮胡床與客飯五坡嶺不意敵至遂被執己卯宋祥興元年正月二日張元帥下海置予舟中初六日發潮陽初八日過官富場十三日至厓山二月六日厓山行朝潰三月十三日北舟還至廣州張元帥遣都鎮撫石嵩護予北去以四月二十二日行五月二十五日至南安軍明日東下鑰予於船二十八日至贑州六月一日至吉州初五日過隆興十二日至建康囚邸中八月二十四日北行渡江頗有事㑹不濟二十六日至揚州九月七日哭母小祥於邳州初九日至徐州十五日至東平府二十日至河間二十一日至保定府十月一日至燕初至立馬㑹同館前館人不受蓋謂館以受投拜人不受罪人也久之引去一小館置予於偏室館人不之顧次日晚供張飲食如上賓館人云稟博囉丞相得語云然初四日張元帥者始至初五日見其用事大臣具言予不屈狀至午送予於兵馬司枷項縛手坐一空室衛防甚嚴所攜衣服錢銀官為封識日給鈔一錢五分為飲食坐十餘日然後解手縛又坐十餘日得疾十一月二日疏枷惟繫頸以鎍得出户負暄初五日赴樞密院院官不及見自是日赴院輙空歸至初九日院官始引問院官者博囉丞相張平章有所謂院判簽院等不能識也倨坐召見予入長揖通事曰跪予曰南之揖即北之跪吾南人行南禮畢可贅跪乎博囉叱左右曳予於地予坐不起數人者或牽頸或拏手或按足或以膝倚予背強予作跪狀予動不自由通事曰汝有何言予曰天下事有興有廢自古帝王以及將相滅亡誅戮何代無之天祥今日忠於宋氏社稷以至於此幸早施行通事曰更有何語止此乎予曰我為宋宰相}
