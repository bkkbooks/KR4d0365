  - {type: variant, offset: 465, length: 1272, content: 丞相自叙死者數矣誠有不幸則國事未定臣節未明今鞠躬盡瘁則諸葛矣保捍閩廣則田單即墨矣倡義勇出則顔平原申包胥矣雖舉事率無所成而大節亦巳無媿所欠一死耳柰何再執渉月踰時就義寂寥聞者驚惜豈丞相尚欲脫去耶尚欲有所爲耶或以不屈爲心而以不死爲事耶抑舊主尚在不忍棄捐耶㐲橋於厠舍之後投筑於目矐之餘於是希再縱求再生則二子爲不知矣尚欲有所爲耶識時務者在俊傑昔東南全勢不能觧㐮圍今以亡國一夫而欲抗天下况趙孤蹈海楚懐入関啇非前日之頑周無未獻之地南北之勢既合天人之際可知彼齊廢齊興楚亡楚復皆兩國相當之勢而國君大臣固無恙耳今事勢無可爲而國君大臣皆爲執矣臣子之於君父臨大節决大難事可爲則屈意忍死以就義必不幸則仗大節以明分故身執而勇於就義當於杲卿張廵諸子爲上李陵降矣而曰欲有爲且思刎頸以見志其言誠僞既不可知况刑拘勢禁不及爲者十常八九惟不刎刎豈足以見志况使陵降後死他故則頸且不及刎志何自而明哉丞相之不爲陵不待知者而信柰何慷慨遲回日乆月積志消氣餒不陵亦陵豈不惜哉欲不屈而不死耶惟蘇子卿可漢室方隆子卿使耳非有興復事也非有抗誓師讐也丞相事何事降與死當有分矣李光弼討史思明方戰納劍于靴曰夫戰危事也吾位三公不可辱于賊萬一不利自當刎李存朂伐梁梁帝朱友貞謂近臣皇甫麟曰晉吾世讐也不可俟彼刀鋸卿可盡我命麟於是哀泣進刃於帝而亦自刎今丞相以三公之位兼睚䀝之讐投機明辨豈堪在李光弼朱友貞下乎屈且不保况不屈乎丞相不死當有死丞相者矣自死於義死於势死於人以怒罵爲烈死於怒罵則肝腦腸腎有不忍言者矣雖鑊湯刀鋸烈士不辞苟可就義以歸全豈不因忠而成孝事在目睫丞相何所俟乎以舊主尚在未忍棄捐也李昇簒楊行宻之業遷其子孫于廣陵嚴兵守之至子孫自爲匹耦然猶得不死周世宗征淮南下詔撫安楊氏子孫景升驚疑盡殺其族夫撫安本以爲徳而反速禍㡬微一失可不懼哉蜀王衍既歸唐荘宗發三辰之誓全其宗族未㡬信伶人景進之計衍族盡誅㡬㣲之倚伏可不畏哉夫以趙祖之遇降主天固巧於報施然建共暫處倨坐苟安舊主正坐於危疑覊臣尤事於骯髒而聲氣所逼猜嫌必生豈無李昇之疑或有景進之計則丞相於舊主不足爲情而反爲害矣炎午丞相鄕之晚進士也前成均之弟子員也進而父沒退而國亡生雖媿陳東報汴之忠死不效陸機入洛之耻丞相起兵次鄕國時有少年狂子持斐牘呌軍門丞相察其憂憤而進之憐其親老而退之非僕也耶痛惟千載之事既負於前一得之愚敢黙於後進薄昭之素服先元亮之挽歌願與丞相啇之廬陵非丞相父母邦乎趙太祖語孟昶母曰勿戚戚行遣女歸蜀昶母曰妾太原人願歸太原不願歸蜀契丹遷晉出帝及李太后安太妃于建州太后疾死謂帝曰我死焚其骨送范陽僧寺無使我爲虜地鬼也安太妃臨卒亦謂帝曰當焚我爲灰向南颺之庻遺魂得返中國也彼婦人彼國后一死一生尚眷眷故鄕不忍飄棄仇讐外國况忠臣義士乎人不七日糓則斃自梅嶺以出縱不得留漢廐而從田横亦當吐周粟而友孤竹至父母邦而首丘焉廬陵盛矣科目尊矣宰相忠烈合爲一傳矣舊主爲老死於降邸宋亡而趙不絶矣不然或拘囚而不死或秋暑冬寒五日不汗瓜蔕噴鼻而死溺死畏死排墻死盗賊死毒蛇猛虎死輕一死於鴻毛虧一簣於泰山而或遺舊主憂縱不断趙盾之弑君亦将悔伯仁之由我則鋳錯巳無鐡噬臍寜有口乎嗚呼四忠一節待公而六爲位其間聞訃則哭又望祭, WYG: 了}
