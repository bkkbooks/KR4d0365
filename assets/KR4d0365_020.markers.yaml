  - {type: variant, offset: 123, length: 2, content: 僕甞, WYG: 二月除右文殿修撰樞密副都承㫖江西安撫副使兼知贑州尋兼江西提刑進集英殿修撰江西安撫使四月領兵下吉州除權兵部侍郎職任依舊五月丁祖母劉夫人憂解官承重六月葬劉夫人起復命下七月七日大軍發吉州至衢州除權工部尚書職任依舊八月至闕下駐兵西湖上九月除浙西江東制置使兼江西安撫大使知平江府事陛辭乞斬吕師孟釁鼔不報十月十五日入府尋除端明殿學士職任依舊遣軍解圍常州敗於五木正城守間准朝命以獨松闗急趣師入衛辭以呉門空虛願分兵戍守命再下還師進資政殿學士浙西江東制置大使兼江西安撫大使置司餘杭守獨松關管史云正月十三日有㫖文天祥江西提刑照已降指揮疾速起發勤王義士前}
