  - {type: variant, offset: 182, length: 0, content: '', WYG: 樞密使都督諸路軍馬連上章辭改樞密使都督諸路軍馬七月四日發行都十三日至南劒聚兵十一月入汀州正月初八日乙亥劉察院廷瑞進稱臣表公請以福王沂王判臨安係民望身為少尹以死衞宗廟不許張世傑宿重兵六和㙮公又請於世傑京師義士可二十萬背城借一戰為守世傑勉公歸據江西已歸淮堧以為後圖十五日壬午在朝臣一時俱逸十七日巴延至臯亭山距臨安三十里趙吉甫賈餘慶獻傳國玉璽降表是夕宰相陳宜中遁世傑遁十八日乙酉北兵至臨安北五十里益王廣王乃從母家出闗渡江大將蘇劉義以兵衛間走永}
