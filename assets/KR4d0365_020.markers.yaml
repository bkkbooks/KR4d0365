  - {type: variant, offset: 4, length: 3, content: 全集卷, WYG: 江公萬里於長沙公從容語及國事憫然曰吾老矣觀天時人事當有變吾閲人多矣世道}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 責其在君乎居一年而難作公家番陽城陷義不辱自沉而死予灑血攘袂顛沛驅馳卒以孤軍陷沒無益於天下追念公言輙為流涕甲戌咸淳十年三月赴贑州平易近民與民相安無事十縣素服威信人自相戒無有出甲廣人以按堵故具官設位家置香火以報恩六月慶祖母劉夫人年八十七郡民自七十以上與錢酒米帛有差有婦人百三嵗者十一月}
