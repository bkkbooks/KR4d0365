  - {type: variant, offset: 0, length: 0, content: '', WYG: 一紀年錄正文乃公獄中手書附歸全文集註雜取宋禮部侍郎鄧光薦中甫所撰丞相傳附傳海上錄宋太史氏管發國寶至元間經進甲戌乙亥丙子丁丑四年野史平慶安刋行巴延丞相平宋錄參之公所著指南前後錄集杜句詩前後卷旁采先友遺老話舊事蹟列疏各年之下丙申宋理宗端平三年予以五月二日子時生大父夢予騰紫雲而上命名雲孫既長朋友字曰天祥後以字貢于鄉字之者改曰履善理宗覽對策見其名曰此天之祥乃宋之瑞也朋友遂又字之曰宋瑞而通稱之廬陵文氏來自成都公六世祖炳然居永和鎮五世祖正中徙富田曾祖安世贈太保邢國公大父時用贈太傅永國公父儀字士表人稱為革齋先生贈太師惠國公母曾氏齊魏國夫人丁酉宋理宗嘉熙元年庚子嘉熙四年辛丑宋理宗淳祐元年壬子淳祐十二年癸丑宋理宗寶祐元年甲寅寶祐二年是嵗公夢召至帝所帝震怒責其不孝公哀訴以臣實孝帝曰人言卿不孝卿言卿孝賜以金錢四遣去公出門而震雷欲擊之自嘆曰幸免不孝之罪而又不免雷擊驚覺汗如雨後一舉登第而有父喪但未解四金錢為何義乙卯寶祐三年是嵗大比以字舉郡貢士弟璧同舉冬俱赴省侍父革齋先生行予既以字為名字之者改曰履善提舉知郡李迪舉送革齋先生與弟書曰道由玉山遇異僧指長男曰此郎必為一代之偉人然非一家之福也丙辰寶祐四年二月朔禮部開榜中正奏名弟璧同登及大廷試策有司寘予第五理宗皇帝覽予對親擢為第一臨軒唱名蓋五月二十四日也時革齋先生臥病客邸予自期集所請朝假侍湯藥二十八日革齋先生棄世天府治喪榜下士資送道路費粗給兄弟即日扶護還里以君子不家於喪沿途餽送並不受丁巳寶祐五年九月葬革齋先生戊午寶祐六年八月從吉時丞相丁大全用事或勸通書者予曰仕如是其汲汲邪郡侯欲為言於朝除初官力辭謝得止己未宋理宗開慶元年五月臨軒策士㫖差簽書寧海軍節度判官㕔公事朝廷檢㑹照格授承事郎予聞命辭免乞行進士門謝禮㫖令朝謝訖之任九月入京時江上有變呉丞相潛再相初入都知董宋臣主遷幸議京師洶洶予門謝訖即上疏乞斬董宋臣以一人心以安社稷建明傚方鎮建守就團結抽兵破資格用人數事書奏不報還里舊例三魁唱名罷賜袍笏謝恩入幕賜御饌進謝恩詩出賜席帽於闕門上馬迎入期集所又名狀元局官給錢物供張皂隸算於此聚同年待賓客刋題名小錄賜聞喜宴進謝宴詩如此者一月然後率榜下士詣闕謝恩謂之門謝門謝後授初階内狀元授承事郎簽書某軍節度判官㕔公事至後一科放進士榜則前一科狀元召入為秘書省正字名曰對花召庚申宋理宗景定元年二月差簽書鎮南軍節度判官㕔公事辭免乞祠祿㫖差主管建昌軍仙都觀辛酉景定二年十月除秘書省正字時賈丞相似道當國年餘頗訝不通名及除入館得予書舉張師徳兩及吾門故事始重嘉歎誥詞曰倫魁登瀛故事也然始進大率以虛名既久乃知其實踐爾則異於是初以逺士奉董生之對繼以卑官上梅福之書天下誦其言高其風知爾素志不在溫飽麟臺之召其來何遲語有云居大名難又云保晚節難爾其厚養而審發之使輿論翕然曰朕所親擢敢言之士可劉克莊行壬戌景定三年四月供正字職尋兼景獻府教授五月充殿試考官進校書郎誥詞曰新進士唱第前舉首必召故事也爾以陟岵之故稽登瀛之擢一旦來歸如麟獲泰畤鳯集阿閣甫繙黃本俄映青藜在他人為速在爾為晚矣人之不可及者年也不磨者名也至哉天下樂者書也朕將老汝之才而極其用焉可癸亥景定四年正月除著作佐郎二月兼權刑部郎官刑部事最繁重居官者率受成於吏號清流者尤所不屑為之鈎考裁決晝夜精力不倦吏不能欺懾服焉八月以董宋臣覆出為都知上疏論其惡不報束擔將出闗丞相遣人謂公不可差知瑞州十一月赴郡十二月迎親就養郡兵火後瘡痍乍復公撫以寛惠鎮以廉靜郡兵素驕取其桀黠寘之法張布綱紀上下肅然於交承外積緍錢萬創便民庫去之日填兵出前窠名為楮百萬有竒遺愛在民久益不忘甲子景定五年十月召赴行在尋除禮部郎官十一月除江西提刑辭免不允乙丑宋度宗咸淳元年二月就瑞州交割提刑職事時大赦後推廣徳意全宥居多惟平寇扶楮稍振風采四月行部至吉州太和縣伯祖母梁夫人歿予父所生母也申解官承心制間臺臣黃萬石以不職論罷是嵗闢}
