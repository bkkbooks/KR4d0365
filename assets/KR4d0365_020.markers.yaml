  - {type: variant, offset: 178, length: 2, content: 戅愚, WYG: 敵頗傾動留營中不遣明日宰相呉堅賈餘慶以下以國降予責巴延留使失信罵吕文煥逆賊引敵陷國並數吕師孟叔姪罪惡求死北營乃置兵衛守遂不復還其勤王兵朝廷放散西歸二月八日敵驅予隨祈請使呉堅賈餘慶等入北十八日至鎮江二十九日予與杜滸以下十一人夜走真州三月初一日入真州城初三日真州紿出西城門閉弗納尋遣兵護送出境是夕三更抵揚州西門不敢入從者四人逃初四日伏城西荒山空屋中敵騎萬計過屋後幾不免初五日移止賈家莊臥敗墻糞穢中是夜趍高郵迷失道初六日早遇哨縛去一人殺傷一人餘幸完初七日匍匐至高郵亟下船歴七水寨十一日至泰州伏城下二十二日發舟與敵騎相先後二十四日至通州閏三月十七日遵海而南三十日至台州境地名城門鎮自城門陸行四月八日至温州五月朔景炎皇帝於福安登極改元以觀文殿學士侍讀召赴行在是月二十六日至行都門授通議大夫右}
