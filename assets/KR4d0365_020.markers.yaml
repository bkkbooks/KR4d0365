  - {type: variant, offset: 168, length: 1, content: 他, WYG: 不堪安坐必至潰逃此勤王與留屯較然利害之不同也謹瀝忠忱告鈞慈特與收囘留屯隆興之命容天祥照累降指揮將}
  - {type: page-break, offset: 168, content: '', id: KR4d0365_WYG_021-17b}
  - {type: variant, offset: 170, length: 0, content: '', WYG: 部義兵來赴闕下迨至衢州時以公軍伉健有紀所過秋毫無犯近臣大驚遂除權工部尚書八月十七日内批文天祥除權工部尚書兼都督府參贊軍事職任依舊十九日奉詔入衞墨絰從戎仰藉朝廷威命奬率江右湖南淮廣諸項軍馬見抵京畿除已具狀申省乞判命重臣交管放令終喪外謹具兵籍六冊繳申詔勅三省進呈卿狀辭免工書兼督贊事具悉自吾有敵難羽檄召天下兵惟卿首倡大義糾合熊羆之士誓不與敵俱生文而有武儒而知兵精忠勁節貫日月質神明惟寵嘉之投袂纓冠提兵入衛師律嚴肅勝氣先見宗社生靈恃以為安繇少常伯進長冬卿未足以酬賢勞相臣督師於外命卿參佐庶幾集允文采石之功夫移孝為忠以國為家古有明訓矧急危之秋其徃求朕攸濟理考親擢魁彦以貽孫謀意其在此又何遜乎故兹詔示想宜知悉二十六日起復朝奉大夫江西安撫使辭免不允内批文天祥依舊工部尚書兼督贊除浙西江東制置使兼江西安撫大使知平江府事二十八日勅三省進呈卿狀辭免權工部尚書江東制置使兼知平江府恩命事具悉朕未堪多難疆圉孔棘御事罔不曰艱大天毖我成功所惟時魁儒秉忠倡義奬率三軍入衛社稷國勢為之増重人心恃以為安精神折衝文武是憲若稽高廟命臣頤浩開制閫於江浙宏濟中興之業耆定敉功卿品度才猷充邁前哲惟長江之險要未復畿甸之偹守當嚴命卿以大常伯兼領二使表裏撐拓以固吾圉東西運掉以靖邊氛儒帥一臨士勇百倍用保乂我文祖受命民兹惟豐芑貽謀之意亟其禡牙紓服宵旰之憂所辭宜不允正言曽唯奏呉門奥區今為邊地倫魁雋望忠孝勤王軍中喧騰小范甲兵之謡河上尚稽光世節制之命九月初七日勘㑹文尚書奬率義兵入衛王室忠忱義槩深可嘉尚除已頒三路制帥之命仍兼督府參贊知平江府今已日久秋風浸致事不可緩合行催促須}
