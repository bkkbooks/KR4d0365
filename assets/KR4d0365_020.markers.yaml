  - {type: variant, offset: 7386, length: 689, content: 徒知先生之忠之文也而不知其一本於誠故特表而出之於是乎反覆是集而編次之綂而名之曰文山先生全集中有文集有别集有附録如先生所作集有未載者爲拾遺後世爲先生而作継附録者爲續録凡若干卷遂以授河間守董君䇿俾教諭嚴順校正知縣寗寵刻之文山舊隱祠記王育仁宋丞相文文山先生從容就義于國祚旣終之餘報宋室養士之功数百年來仰其忠者以先生生前蹤跡之所至即其精神之所寓故所在咸立祠䖍祀之距富田里許南崖之隩有所謂文山者其山水之林立亭橋之棊置具先生所為觀大水記及自叙紀年録中可按也以今考之則先生以湖南運判免歸之日嘗搆道體堂於其地無日不與賔友徜徉其間而讀其獄中所貽弟壁書又特諄諄於作寺文山我廟其中之語然則先生生前蹤跡之所歴與其精神之所鍾其眷戀於此者視之他所為尤篤矣顧可無祠以慰其靈哉更元之世廢於兵燹夷為田疇明興成化中一峯羅先生嘗白諸臬司贖以淡金得腴田十畆然未有以祠之嘉靖丁亥余宗之居富田古城者其彦曰喬相嘗徘徊南北崖中慨然捐巳貲若千金鳩工聚材託先生十一世孫毓彦者測前田十之二而搆祠焉其制瞰江潭為門題曰文山舊隠門之後為堂仍其故額曰道體而其外則曰慕忠祠塑先生之像巋坐其中堂之後為傑閣其下額曰南崖書院俾郷之人士群而習讀焉其上則取先生所自述其閑居獨樂意嘗超然之語而額之曰超然閣祠之東復葺庵一所令持齋呪者居守其中則又􅎥取先生貽書之旨而名之曰廟中庵由門而堂而閣其間皆延以廊墀繚以周垣其材唯榱楹用木四周墻壁則盡以磚為之用備不戒先生生於宋丙申仲夏二日就義於元壬午季冬九日祠既訖二相復就近買田十畆以供祭費每歲舉祀在冬令先生之裔主之而夏則主以相之後歴千百世納為常相之用意良亦悉且勤矣文氏之裔熈等謂其善不可没也欲上其事於郡邑旌異之相固謝不可, WYG: ''}
