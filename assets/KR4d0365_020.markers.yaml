  - {type: variant, offset: 10, length: 2, content: 附録, WYG: 一日哀痛詔勅門下先帝傾崩嗣君沖幼吾至衰耋勉御簾帷曽日月之幾何凜淵冰之是懼憤兹小醜闖我長江乘隙抵巇誘逆犯順古未有純是喪亂之世今何至冺然天地之經慨國步之阽危皆吾徳之淺薄天心仁愛示以星文而不悟地道變盈警以水患而不思田里有愁嘆之聲而莫之省憂介胄有飢寒之色而莫之撫慰非不受言也而玩為文具非不恤下也而壅於上聞靜言思之出涕滂若三百餘年之徳澤入人也深百千萬姓之}
