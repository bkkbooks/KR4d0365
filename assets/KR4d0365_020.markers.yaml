  - {type: variant, offset: 2547, length: 1, content: 信, WYG: 天祥絶筆鄧傳云正月二十後公臥病發熱右臀榖道傍患癰二月四日流膿平生痛苦未嘗有此是時南人仕於朝者謝昌元王積翁程飛卿青陽夢炎等十人謀合奏請以公為黃冠師冀得自便青陽夢炎私語積翁曰文公贑州移檄之志鎮江脱身之心固在也忽有妄作我輩何以自解遂不果八月王積翁奏其畧曰南方宰相無如文天祥上遣諭㫖謀授以大任昌元積翁等以書諭上意公復書數年於兹一死自分舉其生平而盡棄之將焉用我事遂寢後積翁又奏其畧曰文天祥宋狀元宰相忠於所事若釋不殺因而禮待之亦可為人臣好様子上黙然乆之曰且令千户所好好與茶飯者公聞之使人語積翁吾義不食官廩數年矣今一旦飯於官果然吾且不食積翁乃不敢言公死後有以危言撼積翁者積翁曰得從龍逄比干遊地下足矣言者遂止積翁累以銀物餉公福王與芮聞其不屈嘆曰我家有此人邪餉以銀百兩屬積翁轉致之公囚繫久翰墨滿燕市時與吏士講前史忠義傳無不傾聴感動其長李指揮魏千户奉事之尤至敏珠爾丹參政嘗開省江西見公出師震動毎言殺之便又以公罪人下千户所收其棋奕筆墨書册初閩僧妙曦號琴堂以談星見是春進言十一月土星犯帝座疑有變羣臣有言瀛}
