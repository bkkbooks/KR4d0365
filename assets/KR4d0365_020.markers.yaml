  - {type: variant, offset: 2918, length: 0, content: '', WYG: 曰臣報國至此矣遂受刑得年四十有七時連日大風埃霧日色無光都城門閉甲卒登城街對隣不得往來行不得偶語時翰林學士趙與稟以宋宗室亦被監閉一室諸衛士弓刀環席地坐聞門外弓馬馳驟聲者乆之人競穴忩窺乃是出丞相頃之又聞馳騎過者及囘乃聞有㫖教再聴聖㫖至則已受刑明日歐陽夫人從東宫得令㫖收屍江南十義士奉柩葬於都城小南門外五里道傍為他日歸骨便路後大徳二年戊戌男陞至都城見公舊婢綠荷已嫁順承門内石橋織綾人及見劉牢子引到墓所自後留都城春秋必往酹奠望拜時已有二僧㙮其大㙮小石碑刻有信公二字舊殯在大㙮南右址又右畔塹外有墓林聚塚在大路傍至元二十年癸未歲公柩歸至故里時弟璧任臨江路總管兼府尹辦喪葬男陞祇奉几筵舊嵗璧遣家人至廣遷奉母曽夫人靈柩是日適與公柩舟㑹於江滸人咸驚嘆以為孝念所感不期}
