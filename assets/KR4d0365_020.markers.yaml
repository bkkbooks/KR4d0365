  - {type: variant, offset: 5127, length: 1, content: 深, SBCK: 􅀷}
  - {type: variant, offset: 5137, length: 753, content: 伏鄕園首䑕喙息敢於負國者抑亦何限卒之煙沉澌盡迄無噍類使人入其里聞姓名則唾詈之即令子孫有遺亦不敢直書爲祖故墅雖存曽不得享麦盂之獻其於得失何如哉嗚呼此亦萬世之鑒也因大息而附于記文丞相傳序許有壬宋養士三百年得人之盛軼唐漢而過之遠矣盛時忠賢雜遝人有餘力及天命巳去人心巳離有挺然獨岀於百萬億生民之上而欲舉其巳墜續其巳絶使一時天下之人後乎百世之下洞知君臣大義之不可廢人心天理之未嘗泯其有功於名教爲何如哉丞相文公少年趠厲有經濟之志中爲賈沮徊翔外僚其以兵人援也大事去矣其付以鈞軸也降表具矣其徃而議和也兾萬一有濟耳平生定力萬變不渝父母有疾雖不可爲無不用薬之理公之語公之心也是以當死不死可爲即爲逸于淮振干海真不可爲矣則惟死尔可死矣而又不死非有他也等一死尔昔則在巳今則在天一旦就義視如歸焉光明俊偉俯視一世顧膚敏祼将之士不知爲何如也推此志也雖與嵩華争高可也宋之亡守節不屈者有之而未有有爲若公者事固不可以成敗論也然則收宋三百年養士之功者公一人耳孫富爲湖廣省檢校官始出遼陽儒學副提舉廬陵劉岳申所爲傳将刻之􅎚俾有壬序之有壬早讀指南録吟嘯集見公自述甚明三十年前遊京師故老能言公者尚多而訝其傳之未見于世也伏讀慷慨惜京師故老之不見及也公之事業在天地間炳如日星自不容泯而史之取信世之取法則有待於是焉若富也可謂能後者也元綂改元十二月朔叅議中書省相臺許有壬序文山先生文集序韓雍古今論文者僉曰觀文可以知人夫文者言之精華而言則心之聲也心之所存有邪正則發言爲文有純駁而人之忠否見焉故讀岀師二表而知諸葛孔明之忠讀天門掉臂一詩而知丁謂之不忠卒之皆如其言信乎人可以言而觀然校獵長楊等作雖工且美而其爲人終不能無可議又若難觀以言盖必心有定志則言有定論而後見諸行事有定守觀於宋丞相文山先生可徴矣先生負豪傑之才蓄剛大之氣而充之以正心之斈自其少時游學宫見鄕先生忠節祠慨然, WYG: 嘆}
