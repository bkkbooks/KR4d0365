  - {type: substitution, offset: 2297, original: 崧, replacement: 嵩, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3633}}
  - {type: variant, offset: 2301, length: 11, content: 教忠坊今順天府學之右而, WYG: 其中七月大雨兵馬司牆壁頽落移司宫籍監得一室頗瀟洒十一日回舊兵馬司得一室地高燥空涼八月返故處依然臭穢蒸濕壬午是嵗春}
