  - {type: variant, offset: 2141, length: 2, content: 無退, WYG: 初政俟公旦之來庸再秉於國鈞仍惠長於樞宥優督府琱戈之錫峻文階黃繖之除申拓賦畬式隆寵數於戲春秋以歸季子為喜朕方徇於私情晉人謂見夷吾何憂爾共扶於興運尚堅忠孝大布公忱迄圖社稷之安茂紀山河之績其祗予命永弼於彛連上章辭改樞密使同都督諸路軍馬十一月入汀州公遣督參趙時賞督諮趙孟濚以一軍取道石城復寧都遣督贊呉浚以一軍屯瑞金復雩都時北軍逼福安車駕航海福安遂陷丁丑宋景炎二年正月移屯漳州龍巖縣三月至梅州始與一家相見㫖授銀青光祿大夫職任依舊時經畧江西五月入贑州㑹昌縣六月三日戰雩都大捷二十一日入興國縣遣兵攻贑吉斬汀州偽天子黃從臨洪袁瑞豪傑響應興國軍黃州新復號令通於江淮}
