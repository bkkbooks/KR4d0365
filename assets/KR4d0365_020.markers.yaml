  - {type: variant, offset: 8524, length: 759, content: 郷彦所營則奚所利而孳孳若是哉毋亦忠君之心人人所同即四海之逺間世之乆觸之斯動扣之斯應有不知其所以然者此或爾先人所以建祠之心而彼自忘之也化鵬聞予言躍然曰使先子可作聆子斯論當有戚戚然於心者矣因次第其言授之學柳鑱諸道體堂中以朂於二姓之後禆相與世守夫祠祀以不墜其先徳云時則大明萬暦二年甲戌仲春望日也䟦文山先生遺墨蘇伯衡天下宗周矣而伯夷叔齊終不食其粟遂餓而死韓趙魏共分晉地矣而豫讓必爲智伯報仇竟殺其身仁者之志存亡不易義者之節盛衰不改固如是乎三宫北上矣益王殂于井澳矣衛王赴海死矣而丞相文公志節益堅困辱之摧折之甘言以甞之重禄以啖之迄莫能奪之而竟死之噫盖與三子者同諒矣公此數詩意其在燕獄時所書其歳當别攷也今去宋一百四十年忠義之氣感激之詞筆勢勁㧞猶燁燁楮素間如龍跳虎躍不可褻玩狎視二心之臣見之而不裭魄則吾弗信文丞相像賛孫燧偉哉文公千古之士方國脉尚存也流離顛沛惟恐不得其生及國脉既絶也慷慨從容惟恐不得其死求生匪生求死匪死生死惟求成就一是丈夫事業固每如此百世聞風孰不興起浮丘道人招魂歌汪水雲有客有客浮丘翁一生能事今日終囓氊雪窖身不容寸心耿耿摩蒼空睢陽臨難氣塞充大呼南八男兒忠我公就義何從容名垂竹帛生英雄嗚呼一歌兮歌無窮魂招不來何所從有母有母死南國天氣黯淡殺氣黒忍埋玉骨崖山側蓼莪劬勞淚沾臆孤兒以忠報罔極㧞舌剖心命何惜地結萇弘血成碧九泉見母無言責嗚呼二歌兮歌復憶魂招不來長嘆息有弟有弟隔風雪音息不通鴈飛絶獨處空廬坐縲絏短衣凍指不能結天生男兒硬如鐡白刃飛空肢体裂此時與汝成永訣汝於何地收兄骨嗚呼三歌兮歌聲咽魂招不來淚流血有妹有妹天一方良人去後逢此殃黃塵暗天道路長男呻女吟不得将汝母巳死埋炎荒汝兄跣足行雪霜万里相逢淚滂滂驚定拭淚還悲傷嗚呼四歌兮歌欲狂魂招不來歸故鄕有妻有妻不得顧饑走荒山汗如雨一朝中道逢狼虎不肯偷生作人婦左挾虞姬右陵母一劍捐身剛自許, WYG: 主}
