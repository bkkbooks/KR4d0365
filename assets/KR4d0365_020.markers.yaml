  - {type: variant, offset: 6200, length: 913, content: 然文章傳世以其闗世教也使無𥙷於世教雖工何益今斯集也傳之天下後世之人争先快覩皆知事君之大義守身之大節不宜以成敗利鈍而少變以扶天常以植人紀以沮乱臣賊子之心而増志士仁人之氣其於世教重有𥙷焉故予因按察副使陳价維藩請序其編次之由不辭謭陋而書之盖将以爲同志勸且爲天下後世之爲臣子者厲也文山别集序王守仁文山别集者宋丞相文山文先生自述其勤王之所經歴後人因而採集之以成者也其間所值險阻艱難顛沛萬状非先生之自述世固無從而盡知者先生忠節盖宇宙皆於是爲有㨿後之人因詞考迹感先生之大義油然興起其忠君愛國之心固有泫然涕下裂眥扼腕思䘮元之無地者是集之有益於臣道豈小小哉古之君子之忠於其君所盡其盡心焉以自慊而巳亦豈屑屑言之以靳知於世然而仁人之心忠於其君亦欲夫人之忠於其君也忠於其君則盡心焉巳欲夫人忠於其君而思以吾之忠於其君者啓其良心固有人弗及知之者非盡言之何由以及乎人斯先生之所爲自述将以教世之忠也當其時仗節死義之士無不備載亦因是有以傳是又與人爲善也是集也在先生之自盡若嫌於靳世之知以先生之教人則吾惟恐其知之不盡也在先生之自盡若可以無傳以先生之與人爲善則吾惟恐其傳之不逺也先生之族裔今大僕少卿公宗嚴将是集屬守仁爲之序守仁之爲廬陵也公之族兄承䕃命其子庠生継宗嘗以序請兹故不可得而辞嗚呼當顛沛之餘而不忘乎與人爲善者節之𥙿也致自盡之心而欲人同歸於善者忠之推也不以靳知爲嫌而行其教人之誠者仁之篤也象賢崇徳以彰其先世之羙之謂孝明訓述事以廣其及人之教之謂義吾於是集之序無愧辭尔巳文山先生全集序鄢懋卿京府先師廟之西隅有故宋信國公文山文先生祠乃我皇祖驅胡之後即於就義之所追祀之所以闡忠烈風世教也予祗役京府之三日行釋莱禮于先師廟得遂展謁先生神爽耿耿若生良用感愴乃進諸生於堂相與下上其事者移時既又得先生之文集而讀焉三復嘆息不忍置乃作而言曰武興而伯夷叩馬漢亡而武侯討賊夫豈昧於時勢哉盖有見於君臣之義不可觧焉者也採薇一歌萬世傳誦出師二表讀者流涕亦其義之相感而然耳古之君子必於天理民彛大倫大法而見之明守之固行之决然大節不虧而其文章勲業愈遠而彌章雖死而不杇也宋元之際乾綱絶紐禽獸制人姦者遁荒懦者俛降胥天下以與夷狄而以免死爲幸奉君后以臣妾於禽獸而不以爲耻皐亭之使先生挺然獨徃而無忌京口之脫, WYG: ''}
