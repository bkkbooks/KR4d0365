  - {type: variant, offset: 3, length: 1, content: 丞, WYG: 經武緯之臣食君之禄不避其難忠肝義膽之士敵王所愾以獻其功有國而後有家胥保而}
  - {type: variant, offset: 5, length: 39, content: 文王炎午丞相再執就義未聞慷慨之見固難測識因與劉堯舉對床共賦感慷嗟惜之堯舉先賦云, WYG: 胥告體上}
