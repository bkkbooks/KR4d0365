  - {type: line-break, offset: 2246, content: '', id: KR4d0365_SBCK_020-6a09}
  - {type: variant, offset: 2250, length: 0, content: '', WYG: 甫五言句為絶句}
  - {type: variant, offset: 2253, length: 6, content: 及宋禮部郎官, WYG: 且為之叙其詩自五羊至金陵為一卷自呉門歸臨安走淮至閩詩三卷號指南錄以付弟璧歸夏璧與孫氏妹歸公剪髮以寄永訣與弟書曰潭盧之西坑有一地已印元渭陽所獻月形下甬穴第淺露非其正其右山上有穴可買以藏我如骨不可歸招魂以封之陞子嗣續吾死奚憾女弟一家流落在此可為悲痛吾弟同氣取之名正言順宜極力出之自廣達建康日與中甫}
  - {type: page-break, offset: 2253, content: '', id: KR4d0365_WYG_021-52b}
  - {type: variant, offset: 2260, length: 9, content: 光薦所述督府忠義傳, WYG: 先生居具知吾心事吾銘當}
  - {type: page-break, offset: 2260, content: '', id: KR4d0365_WYG_021-53a}
  - {type: 'kr:newline', offset: 2268, content: '

      ', id: KR4d0365_krp_020-bkkkrnewl118}
  - {type: line-break, offset: 2268, content: '', id: KR4d0365_SBCK_020-6a10}
  - {type: variant, offset: 2270, length: 0, content: '', WYG: 屬之若時未可出則姑藏之將來文山宜}
  - {type: variant, offset: 2271, length: 29, content: 公傳視史加詳實焉北京之有公祠洪武九年前北平按察副使刘崧始建, WYG: 一寺我廟}
