  - {type: variant, offset: 4253, length: 883, content: 人猶将敬慕愛䕶之不暇矧鄕邑里鄰可萌一毫慢侮侵奪之心乎而華夏外夷亦知公之孤忠大節者猶能景仰師法其萬一况子孫承祀可不激昻奮發襲芳趾羙以求無愧於其先乎是記之作非徒詔其後亦以表勵鄕國云重修富田祠堂記羅洪先文山先生生於廬陵富田岀而仕邅廻於臨安更歴筠宣洪䖍湖南諸地赴國之難間関於平江毘陵真楊閩淅流離顛頓於空坑五坡嶺海之間而死於燕京之柴市世以先生之死足以風萬世之人臣也蹤跡所至皆特祠嚴奉之而郡中祠故不特其在富田則又隘迫至無以布爼豆君子悲之将毀淫祠以就其役持議不果乆乃特祠于郡東之螺山富田去郡稍遠無相念者夫先生功行應祭法其缺典猶若此今佛老之廬一郡至數十而一廬直且千萬獨不之厭曷故耶士庻服舍有定制閭里憑凌貲畜居擬王者而先生爵列上公茅茨不掩觀風者亦将謂何今祠堂廣三十餘尺後寝前廊僅可旋武則嗣孫熈請於分守叅政張公元冲得廢永寜寺基而半給公帑始議而盡力者富田廵檢蔡五羙也蔡以㣲官乃急其職之所不及彼何求哉議之始在某年某月歴數年重門猶不能俻盖熈等之力也或言先生捐身死國何有於家炎社巳屋而故鄕乃享特祀夫豈其所欲哉嗚呼是固先生之心而非所以風也宋室不綱崩裂勢有緩急此一時矣滄桑變革骨肉仳離善和之墟若敖之鬼亦豈其所欲哉猶子吾兒之句先生固巳計之而未嘗大遠於人情此亦一時也當其在國也國爲重而身爲輕及其不捄重其身者亦所以重人之國而豈悻悻於溝瀆之見哉使元而果於不殺則黃冠故里出備顧問彼固以箕子之事自待而或摧殘以畢旦夕之謀引决以絶飲食之奉取必於一死而不免矯俗以立異宜其甚不屑矣惜也言不卒騐使萬世之下徒仰其忠而不見先生之大比之取必於一死者之所爲而未有深知其心者此非意及也夫取必於一死者大抵激發於意氣蹙迫於利害拚割於倉卒而是三者又多係其所遭謂非忠於事主固不可槩之以大則未也功名㓕性忠孝勞生非悟後語乎必至於是而後深逹夫死生之故夫逹死生之故者生貴乎順不以生自嫌死貴乎安不以死塞責與人同情而不爲人情之所牽人皆易從而非示人以絶徳此先生之大所以能風萬世而所在祠之者也神遊八極無乎弗在風馬雲車亦或徘徊先世丘壠而欷歔過其故鄕歳時蒸嘗随感而至有不望之洋洋者乎夫忘家而家存捐其身而身乃萬世同其姓者咸以不獲屬昭穆効駿奔爲深耻而當時赴難之人, WYG: ''}
