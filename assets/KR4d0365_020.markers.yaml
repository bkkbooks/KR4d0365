  - {type: variant, offset: 171, length: 5, content: 論狂斐尤多, WYG: 㫖揮㫖令文天祥不候辭朝疾速前去之任所有一行軍兵除已别議支犒外其餘諸項管軍頭目人合與優加推賞及辟置官屬科降錢糧一應合行事件並仰逐項條具開申以慿施行史云文尚書開閫招軍備禦朝廷科降十八界二千萬貫金一千兩銀五千兩廸功從事承信崇義郎官誥各五十道校副尉資帖各一百道鹽萬五千袋節次支犒錢十八界四百七十九萬七千五百貫口券錢米十八界一百二十六萬三千九百五十貫米二萬四千二百五十餘石貼助運士使用錢十八界一十萬貫截撥錢銀米十八界十八萬八千三百貫銀五千五百五十一兩米四萬九千五百二十餘石起發特支犒錢十八界二百萬貫已上緫計金一千兩銀六千五百五十兩鹽一萬五千袋十八界二千八百三十四萬六千餘貫官告二百道資帖二百道米七萬三千七百七十餘石十六日除端明殿學士制詞曰勑元戎十乘先行式倚真儒之望師中三命承寵遹隆方面之權朕若稽先朝之舊章最重承明之邃職内以傳畿廷之彥外亦褒帥閫之賢王素之牧平涼程勘之涖益部皆膺兹選今得其人某官實學濟時英猷緯國文有武備義概質於神明儒知軍情忠忱貫於霜日傳檄召兵而志士奮纓冠赴難而國勢張不負素定之榮允謂寡二之畧予欲復江表之疆宇命爾攘除予欲壯浙西之翰藩咨爾修扞威稜聳前茅之令兵勢折破竹之威惟任之專者位必崇惟名之至者功必集乃躋班規殿之峻以増華帥闑之嚴噫邦咸喜戎有良翰茂對陟明之渥身雖外心在王室趣成敵愾之勲二十七日文制使辟周天驥帶告院添差江西撫參留司隆興府楊㐵帶行吏架添差江西撫機何時帶工轄添差江西撫參並分司吉州文天祐帶史館檢閲添差江東制幹分司徽州林棟帶禮兵架閣添差浙西制幹分司常州十月弟璧㫖除直秘閣主管崇道觀誥詞曰勑具官某惟爾哲兄以鴻儒魁望倡義勤王忠於為國而不謀家乃命閫制修扞我難爾競爽有令譽虞侍陔養叔出季處恩義兩盡寓直木天之峻賦祿桐柏之祠清且佚矣孝友是亦為政往其祇若季弟璋特與免銓充浙西制司内機十一日賜詔曰卿秉忠忱以濟時艱倡義旅以衛王室經營四方如召虎奬率三軍如武侯爰咨常伯之英趣奮制閫之寄將士用命遂汛掃於邊氛精神折衝益振揚於勝氣有加體國之志亟奏治外之勲元戎啟行周邦咸喜載加錫賚式示眷懷今賜卿金二十兩注盌一副金十五兩盤盞一副細色二十匹纈羅二十匹龍涎香三十餅度金香合一具十兩清馥香三十帖龍茶十斤至可領也故兹札示其體吾注倚之意十八日常州破公在平江四十日去三日而通判王矩之環衛王邦傑以城迎祥二十三日北兵破獨松關留夢炎遁十二月内批文天祥簽書樞密院事十六日隆興府劉槃以城降制置黃萬石移閫撫州聞北兵至而過都統密宥迎敵就擒通判施至道以城降丙子宋徳祐二年五月改景炎元年正月二日除知臨安府辭不拜詣闕陳大計不得見日贊廟謨救宗社危亡十八日巴延至臯亭山是夕宰相陳宜中遁十九日早除樞密使午除右丞相兼樞密使都督諸路軍馬懇辭間奉㫖詣北軍講解二十日以資政殿舊職詣北營見巴延陳大誼詞㫖}
