  - {type: variant, offset: 272, length: 0, content: '', WYG: 不自堪二月初八日驅公隨祈請使入北公不在使列蓋驅逐之使去耳盡出賈餘慶計陷先一夕公作家書已處置家事擬翼日行則引決家參政則謂公死傷勇祈而不許死未為晚公亦以是隱忍猶冀一日有以報國先是正月十九日客贊公使北天台杜滸梅壑議斷斷不可客逐之去後二十日公北行諸客皆散梅壑憐公孤苦慨然相從朝㫖改宣教郎除禮兵部架閣文字十八日至鎮江請十九日渡江公自入京城外北兵營日夜謀脱不得間至是益急謀舟夜渡杜}
  - {type: page-break, offset: 272, content: '', id: KR4d0365_WYG_021-26a}
  - {type: page-break, offset: 272, content: '', id: KR4d0365_WYG_021-26b}
  - {type: variant, offset: 273, length: 0, content: '', WYG: 醉遊於市銀三百兩賄老校引間道走十里至江岸以三人寄老校家老校余元慶真州故舊也許銀千二百兩得船公于河岸上沈頤家坐臥從公者曰王千户狼突}
  - {type: variant, offset: 274, length: 0, content: '', WYG: 隨不頃刻離是夕公以明日行買酒辭别鄉土因以醉王千户諸人伺其寢熟啟門出杜狎飲妓家者小卒提官燈公變服從杜出至人家盡處杜以銀}
  - {type: variant, offset: 275, length: 2, content: 謄録, WYG: 小卒紿使來日候某所遂至甘露寺下李成吕武以船至北船連亘十}
  - {type: page-break, offset: 275, content: '', id: KR4d0365_WYG_021-27a}
  - {type: variant, offset: 278, length: 0, content: '', WYG: 里至七里港有喝問歹船賴巡船潮退閣淺聞哨齒聲甚清厲舟子拜且禱云江南田相公即得順風各稽首以更生賀二月二}
