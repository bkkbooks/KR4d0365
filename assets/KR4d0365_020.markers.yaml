  - {type: variant, offset: 146, length: 0, content: '', WYG: 狂議之時}
  - {type: variant, offset: 147, length: 0, content: '', WYG: 友為之歌曰出師自古尚張皇何況長江􅔤擾攘聞道義旗離漕口已驅北騎走池陽先將十萬來迎敵最好諸軍自裹糧説與無知饒舌者文魁元不是猖狂有㫖文都承將所部人兵留屯隆興非但為隆興守禦計異時隨機用事其為效與勤王等今據文都承申所部之兵皆土豪忠義鋭氣方新戰鬬可望勝捷不可閉之城郭詞氣甚壯此朝廷之所樂聞劄江西安撫副使提刑知贑州殿撰文都承且照累劄時暫駐隆興府續聴行下以圖雋功奉寶批知察院孫嶸叟奏言江西安撫使文天祥申准省劄令江西副使黃萬石星馳入衛文天祥將所部勤王義兵留隆興府事天祥以身許國義不辭難上下東西惟命奔走伏念天祥猥起書生豈諳兵事昨者恭承太皇太后詔書召天祥勤王天祥待罪一州忠憤激發不能坐視移檄諸路冀有盟主願率兵以從人心未易作興世事率多沮撓北兵日迫血淚橫流伏䝉公朝除天祥右文殿修撰樞密都承㫖江西安撫使續淮除江西提刑天祥極知該恩過當所當辭免痛心時危無暇為平時揖遜亟慿使名召號所部惟是帥司無兵無將無官無吏無錢無米徒手自奮立為司存今已結約贑州諸豪凡溪峒剽悍輕生之徒悉已糾集取四月初一日提兵下吉州㑹合諸郡}
