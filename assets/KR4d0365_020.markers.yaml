  - {type: variant, offset: 126, length: 4, content: 其召進狂, WYG: 行在十六日公移檄諸路聚兵積粮二月賈似道駐師魯港復公書勉以宗忠愍功名二十二日賈似道師潰章鑑乃啟除公右文殿修撰等職四月用老將王輔佐為總統領兵下吉州王尋卒以廣東統制方興代之江西副使黃萬石有舊嫌又忌公聲望出已右以公軍烏合兒戲無益}
  - {type: variant, offset: 131, length: 0, content: '', WYG: 於朝近臣與厚者佐之遂}
