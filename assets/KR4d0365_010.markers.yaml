  - {type: variant, offset: 14633, length: 0, content: '', WYG: 講義西澗書院釋菜講義知瑞州日孟子曰人之患在好為人師韓子犯之而世怪且罵桞子厚所為惴惴然而不敢也某承乏此邦其於教化號為有一日之責蓋嘗吉朔而履乎學宫得聞諸君之所以授受者而親陟臯比與逢掖講師弟子禮則僣之為尤書堂有事乎先賢諸君不鄙而固以請則雖寡陋夫焉得辭某初被命來守嘗啓政路曰古之為諸侯先政化而後簿書期會世之不淑乃倒置此則相與病夫風俗之弊而士行不立且傷夫教道之久廢而未有以救之也固嘗有及於君子徳業之義而重反覆焉輒誦所聞并繹其㫖與諸君茂明之易曰君子進徳修業忠信所以進徳也修辭立其誠所以居業也中心之謂忠以實之謂信無妄之謂誠三者一道也夫所謂徳者忠信而已矣辭者徳之表則立此忠信者修辭而已矣徳是就心上說業是就事上說徳者統言一善固徳也自其一善以至於無一之不善亦徳也徳有等級故曰進忠信者實心之謂一念之實固忠信也自一念之實以至於無一念之不實亦忠信也忠信之心愈持養則愈充實故曰忠信所以進徳修辭者謹飭其辭也辭之不可以妄發則謹飭之故修辭所以立其誠誠即上面忠信字居有守之之意蓋一辭之誠固是忠信以一辭之妄間之則吾之業頓隳而徳亦隨之矣故自其一辭之修以至於無一辭之不修則守之如一而無所作輟乃居業之義徳業如形影徳是存諸中者業是徳之著於外者上言進下言修業之修所以為徳之表也上言修業下言修辭辭之修即業之修也以進徳對修業則修是用力進是自然之進以進徳對居業則進是未見其止居是守之不變惟其守之不變所以未見其止也辭之義有二發於言則為言辭發於文則為文辭子以四教文行忠信雖若岐為四者然文行安有離乎忠信有忠信之行自然有忠信之文能為忠信之文方是不失忠信之行子曰言忠信行篤敬行篤敬則忠信進徳之謂也言忠信則修辭立誠之謂也未有行篤敬而言不忠信者亦未有言不忠信而可以語行之篤敬者也天地間只一箇誠字更攧撲不碎觀徳者只觀人之辭一句誠實便是一徳句句誠實便是徳進而不可禦人之於其辭也其可不謹其口之所自出而茍為之哉嗟乎聖學浸逺人偽交作而言之無稽甚矣誕謾而無當謂之大言悠揚而不根謂之浮言浸潤而膚受謂之游言遁天而倍情謂之放言此數種人其言不本於其心而害於忠信不足論也最是號為能言者卒與之語出入乎性命道徳之奥宜若忠信人也夷考其私則固有行如狗彘而不掩焉者而其於文也亦然滔滔然寫出來無非貫串孔孟引接伊洛辭嚴義正使人讀之肅容歛袵之不暇然而外頭如此中心不如此其實只是脫空誑謾先儒謂這様無縁做得好人為其無為善之地也外面一幅當雖好裏面却踏空永不足以為善蓋由彼以聖賢法語止可借為議論之助而使之實體之於其身則曰此迂濶也而何以便吾私是以心口相反所言與所行如出二人嗚呼聖賢千言萬語教人存心養性所以存養此真實也豈以資人之口體而已哉俗學至此遂使質實之道衰浮偽之意勝而風俗之不競從之其陷於惡而不知反者既以妄終其身而方來之秀習於其父兄之教良心善性亦漸漬汨沒而墮於不忠不信之歸昔人有言今天下溺矣吾黨之士猶幸而不盡溺於波頽瀾倒之衝纓冠束帶相與於此求夫救溺之策則如之何噫宜亦知所勉矣或曰至誠無息不息則久積之自然如此豈卒然旦暮所及哉今有人焉平生無以議為而一旦警省欲於誠學旋生用工夫則前妄猶可贖乎曰無傷也温公五六嵗時一婢子以湯脫胡桃皮公紿其女兄曰自脫也公父呵之曰小子何得謾語公自是不敢謾語然則温公脚踏實地做成九分人蓋自五六嵗時一覺基之温公猶未免一語之疵也元城事温公凡五年得一語曰誠請問其目曰自不妄語入元城自謂予初甚易之及退而自櫽括日之所行與凡所言自相掣肘矛盾者多矣力行七年而後成然則元城選成一箇言行一致表裏相應蓋自五年從遊之久七年持養之熟前乎此元城猶未免乎掣肘矛盾之媿也人患不知方耳有能一日渙然而悟盡改心志求為不謾不妄日積月累守之而不懈則凡所偽人為者出而無所施於外入而無所藏於中自將銷磨泯没不得以為吾之病而縱横妙用莫非此誠乾之君子在是矣或曰誠者道之極致而子直以忠信訓之反以為入道之始其語誠若未安曰誠之為言各有所指先儒論之詳矣如周子所謂誠者聖人之本即中庸所謂誠者天之道蓋指實理而言也如所謂聖誠而已矣即中庸所謂天下至誠指人之實有此理而言也温公元城之所謂誠其意主於不欺詐無矯偽正學者立心之初所當從事非指誠之至者言之也然學者其自温公元城之所謂誠則由乾之君子以至於中庸之聖人若大路然夫何逺之有不敏何足以語誠抑不自省察則不覺而陷於人偽之惡是安得不與同志極論其所終以求自拔於流俗哉愚也請事斯語諸君其服之無斁熙明殿進講敬天圖周易賁卦彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下臣聞賁文飾也色相間則成文故柔來文剛上文柔剛柔相間所以為賁賁離下艮上離之體中以一柔間兩剛是柔來文剛艮之體上以一剛乘兩柔是剛上文柔使獨剛獨柔不相為用則不成文矣此言賁之卦義也天之文為二曜五行象緯交錯故曰觀乎天文此言天之賁也人之文為三綱五常倫理次序故曰觀乎人文此言人之賁也以上係易彖大意臣竊窺先皇帝作圖之㫖以敬天為名其於賁卦實摘取觀乎天文以察時變一條臣謹案圖義而為之辭臣竊惟天一積氣耳凡日月星辰風雨霜露皆氣之流行而發見者流行發見處有光彩便謂之文然有順有逆有休有咎其為証不一莫不以人事為主時時世也彖易聖人不曰天變而曰時變蓋常變雖麗於天而所以常變則係於時人君一身所以造化時世者也故天文順其常則可以知吾之無失政一有變焉咎即在我是故天文者人君之一鏡也觀鏡可以察妍媸觀天文可以察善否且如厯家算日食云某日當食幾分固是定數然君徳足以消弭變異則是日陰雲不見天雖有變而實制於其時又如旱魃灾也才側身修行則為之銷去熒惑妖也才出一善言則為之退舍天道人事實不相逺自古人君凡知畏天者其國未有不昌先皇帝深識此理故凡六經之言天文者類聚而為之圖以便觀覽且恐懼修省焉聖明知敬嚴父之圖即敬天在此矣嗚呼曷其奈何不敬此先生兼崇政殿說書日講篇也講篇非一如講詩之定之方中一篇諷當時修繕事今亾其辭云道體堂謹書與府理錢昇叟天祥此畨京師聚會相與有加於丙辰極以為竒遇在他鄉得此可謂甚幸依依之意至今使人不㤀執事去之一日奸腐恰有復用之命國事至此誼不容黙遂上封章以求一去當國者調停數四迄未能動三乞祠三不允正以為苦天生聖明從諫不咈初給之以假繼許以假滿去之於是而仍令復供本職吾君之美不容不將順遂亟亟祇承今一切又如初矣執事才離國門猶未至鄉國詎料此半月中乃有一陣如此之擾疇昔侍教幾曽有一語及此等事變輪雲非人能測有如此者封事藁拜呈不敢效孔光秉畀炎火於以彰吾君天地之為量也方巖造化初甚危之後來左司過堂一禀化地乃謂初判聚字失記已曽禀來前既有兩編校恩例今合當照行更不必啓矣前此兩月徒爾皇皇天下事皆不容人算度吾徒作事只信天去初無毫髪計校或謂失策觀方巖之事益以自信周起宗者送至申狀紙見說内有差符謹謹緘納所有餘文俟其趂逐到手又以見授當又訪問遣歸也明禋之後區區之跡必可得請一出此時梅嶺行事尚或少遲猶可合并傾敘契闊前數日待罪甚有餘間日勝方巖棋不以局數計今兹再入市叢又如前日倥偬不給乗間作此殊不能擇語伏乞台照}
