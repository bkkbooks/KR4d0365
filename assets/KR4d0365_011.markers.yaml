  - {type: variant, offset: 16842, length: 0, content: '', WYG: 六欽定四庫全書文山集巻十七宋文天祥撰樂府古樂府壽人母珊瑚香㸃臙脂雪芙蓉帳壓春雲熱明朝早弄燈前月㶑灔九霞碧藕折璇杓髙聳婺女明金波漾曉輝郎星赤瓊曲裏長眉青頭上更有瑶池君六九五十四東風西蟠桃花花未紅鳴鸞敲玉聲玲瓏緑毛蒙茸蓮水龜斒斕五色人間稀春多瑞葉不敢飛氷壺光滿魚龍轉笑中低舞玉釵燕明年今日長秋殿安輿入侍金桃宴齊天樂慶湖北漕知鄂州李樓峯南樓月轉銀河曙玉簫又吹梅早鸚鵡沙晴蒲萄水暖}
