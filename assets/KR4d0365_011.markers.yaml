  - {type: variant, offset: 0, length: 2331, content: 文山先生全集卷之十一文集講義西澗書院釋菜講義知瑞州目孟子曰人之患在好爲人師韓子犯之而世恠且罵柳子厚所謂惴惴然而不敢也某承乏此邦其於教化號爲有一日之責盖嘗告朔而履乎學宫得聞諸君之所以授受者而親陟臯比與逢掖講師弟子禮則僣之爲尤書堂有事乎先賢諸君不鄙而固以請則雖寡陋夫焉得辭某𥘉𬒳命來守嘗啓政路曰古之爲諸侯先政化而後簿書期㑹世之不淑乃倒置此則相與病夫風俗之弊而士行不立且傷夫教道之乆廢而未有一救之也固嘗有及於君子德業之義而重反覆焉輙誦所聞并繹其㫖與諸君茂明之易曰君子進德脩業忠信所以進德也脩辭立其誠所以居業也中心之謂忠以實之謂信無妄之謂誠三者一道也夫所謂德者忠信而巳矣辭者德之表則立此忠信者脩辭而巳矣德是就心上説業是就事上説德者統言一善固德也自其一善以至於無一之不善亦德也德有等級故曰進忠信者實心之謂一念之實固忠信也自一念之實以至於無一念之不實亦忠信也忠信之心愈持飬則愈充實故曰忠信所以進德脩辭者謹飾其辭也辭之不可以妄發則謹飾之故脩辭所以立其誠誠即上靣忠信字居有守之之意盖一辭之誠固是忠信以一辭之妄間之則吾之業頓墮而徳亦随之矣故自其一辭之脩以至於無一辭之不脩則守之如一而無所作輟乃居業之義德業如形影德是存諸中者業是德之著於外者上言進下言脩業之脩所以爲德之表也上言脩業下言脩辭辭之脩即業之脩也以進德對脩業則脩是用力進是自然之進以進德對居業則進是未見其止居是守之不變惟其守之不變所以未見其止也辭之義有二發於言則爲言辭發於文則爲文辭子以四教文行忠信雖若岐爲四者然文行安有離乎忠信有忠信之行自然有忠信之文能爲忠信之文方是不失忠信之行子曰言忠信行篤敬則忠信進德之謂也言忠信則脩辭立誠之謂也未有行篤敬而言不忠信者亦未有言不忠信而可以語行之篤敬者也天地間只一箇誠字更攧撲不碎觀德者只觀人之辭一句誠實便是一德句句誠實便是德進而不可禦人之於其辭也其可不謹其口之所自出而苟爲之哉嗟乎聖學浸逺人僞交作而言之無稽甚矣誕謾而無當謂之大言悠揚而不根謂之浮言浸潤而膚受謂之㳺言遁天而倍情謂之放言此數種人其言不本於其心而害於忠信不足論也最是號爲能言者卒與之語出入乎性命道德之奥宜若忠信人也夷考其私則固有行如狗彘而不掩焉者而其於文也亦然滔滔然冩出來無非貫串孔孟引接伊洛辭嚴義正使人讀之肅容歛袵之不暇然而外頭如此中心不如此其實則是脱空誑謾先儒謂這様無縁做得好人爲其無爲善之地也外靣一幅當雖好裏靣却踏空永不足以爲善盖由彼以聖賢法語止可借爲議論之助而使之實躰之於其身則曰此迂闊也而何以便吾私是以心口相反所言與所行如出二人嗚呼聖賢千言萬語教人存心飬性所以存飬此真實也豈以資人之口躰而巳哉俗學至此遂使質實之道衰浮僞之意勝而風俗之不競從之其䧟於惡而不知反者旣以妄終其身而方來之秀習於其父兄之教良心善性亦漸漬汨沒而堕於不忠不信之歸昔人有言今天下溺矣吾黨之士猶幸而不盡溺於波頺瀾倒之衝纓冠束帶相與於此求夫救溺之䇿則如之何噫宜亦知所勉矣或曰至誠無息不息則乆積之自然如此豈卒然旦暮所及哉今有人焉平生無以議爲而一日警省欲於誠學旋生用工夫則前妄猶可贖乎曰無傷也温公五六歲時一婢子以湯脱胡桃皮公紿其女兄曰自脱也公父呵之曰小子何得謾語公自是不敢謾語然則温公脚踏實地做成九分人盖自五六歲時一覺基之温公猶未免一語之疵也元城事温公凢五年得一語曰誠請問其目曰自不妄語入元城自謂予𥘉甚易之及退而自􅕍括日之所行與凡所言自相掣肘矛盾者多矣力行七年而後成然則元城造成一箇言行一致表裏相應盖自五年從遊之乆七年持飬之熟前乎此元城猶未免乎掣肘矛盾之媿也人患不知方耳有能一日渙然而悟盡改心志求爲不謾不妄日積月累守之而不懈則凢所爲人僞者出而無所施於外入而無所蔵於中自将銷磨泯沒不得以爲吾之病而縱横妙用莫非此誠乾之君子在是矣或曰誠者道之極致而子直以忠信訓之反以爲入道之始其語誠若未安曰誠之爲言各有所指先儒論之詳矣如周子所謂誠者聖人之本即中庸所謂誠者天之道盖指實理而言也如所謂聖誠而巳矣即中庸所謂天下至誠指人之實有此理而言也温公元城之所謂誠其意主於不欺詐無矯僞正學者立心之𥘉所當從事非指誠之至者言之也然學者其自温公元城之所謂誠則由乾之君子以至於中庸之聖人若大路然夫何逺之有不敏何足以語誠抑不自省察則不覺而䧟於人僞之惡是安得不與同志極論其所終以求自㧞於流俗哉愚也請事斯語諸君其服之無斁熈明殿進講敬天圖周易賁卦彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸徃天文也文明以正人文也觀乎天文以察時變觀乎人文以化成天下臣聞賁文飾也色相間則成文故柔來文剛剛上文柔剛柔相間所以爲賁賁離下艮上離之躰中以一柔間兩剛是柔來文剛艮之躰上以一剛乗兩柔是剛上文柔使獨剛獨柔不相爲用則不成文矣此言賁之卦義也天之文爲二曜五行象緯交錯故曰觀乎天文此言天之賁也人之文爲三綱五常倫理次序故曰觀乎人文此言人之賁也以上像易彖大意臣竊窺先皇帝作圖之㫖以敬天爲名其於賁卦實摘取觀乎天文以察時變一條臣謹按圖義而爲之辭臣竊惟天一積氣耳凢日月星辰風雨霜露皆氣之流行而發見者流行發見䖏有光彩便謂之文然有順有逆有休有咎其爲證不一莫不以人事爲主時時世也彖易聖人不曰天變而曰時變盖常變雖麗於天而所以常變則係於時人君一身所以造化時世者也故天文順其常則可以知吾之無失政一有變焉咎即在我是故天文者人君之一鏡也觀鏡可以察妍媸觀天文可以察善否且如曆家筭日食云某日當食㡬分固是定數然君德足以消弭變異則是日隂雲不見天雖有變而實制於其時又如旱魃灾也才側身脩行則爲之銷去熒惑妖也才出一善言則爲之退舎天道人事實不相逺自古人君凢知畏天者其國未有不昌先皇帝深識此理故凢六經之言天文者類聚而爲之圖以便觀覧且恐懼脩省焉聖明知敬嚴父之圖即敬天在此矣嗚呼曷其柰何不敬此先生兼崇政殿説書日講篇也講篇非一如講詩之定之方中一篇諷當時脩繕事今亡其辭云道體堂謹書, WYG: ''}
