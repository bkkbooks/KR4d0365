  - {type: variant, offset: 16843, length: 1, content: 終, WYG: 縷爇香清裊瑶池春透想桃露霏霞菊波沁曉袍錦風流御仙花帶瑞虹繞玉關人正未老喚磯頭黄鶴㟁巾談笑劍拂淮青槊横楚黛雨洗一川􅃄草印黄似斗㸔半硯薔薇滿鞍楊桞沙路歸来金貂蟬翼小齊天樂甲戌湘憲種德堂燈屏夜来早得東風信瀟湘一川新緑桞色含晴梅心沁暖春淺千花如束銀蟾乍浴正沙鴈將還海鼇初矗雲擁旌旗笑聲人在畫闌曲星虹瑶樹縹緲珮環鳴碧落瑞籠華屋露耿銅虬氷翻鐡馬簾幙光摇金粟遲遲倚竹更為把瑶樽滿斟醽醁回首宫蓮夜深歸院燭}
