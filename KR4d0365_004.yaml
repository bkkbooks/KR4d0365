body:
  text: 表箋門謝表臣某言伏凖省劄五月二十八日三省同奉聖旨文天祥添差簽書寧海軍節度判官􅈦公事仍釐務臣以賜第之初未經門謝未敢祗拜劄命申乞指揮續凖省札七月十一日三省同奉聖旨令朝謝訖之任臣謹遵奉旨揮詣闕庭朝謝者御大廷而發䇿式廣旁招奉清問以攄忠誤承親擢尚阻紫宸之謝遽叨黃𥿄之除曠世遭逢瞻天感激臣切以賔興下詔同天地宗祀之彛科舉取人代造化爵賢之柄豈曰利人才之進取其間實天道之流行肆萬乘之臨軒受諸侯之貢士占小善者率以録咸造在廷取一人焉拔其尤必有名世豈應庸瑣可在搜羅臣稟質既凡聞道猶淺才非洛陽之年少偶玷薦書學非廣川之大儒遽塵舉首自叨異數亦既三年回思臚唱之蒙恩莫與鳬趍而奉表有懷就日無路箋天方倣徨於丘園乃寵綏其祿秩輒請展為臣之禮幸許修詣闕之恭兹蓋伏遇皇帝陛下德體乾行道苻常久世更三紀逺追成周式化之風歲啓後庚近接藝祖開基之運凡際風雲之會咸依日月之光遂令一介之姓名亦𬒳九重之記録臣敢不誓堅素守勉企前修自揆讀書非為平生溫飽之計願言竭節用副上心忠孝之期臣無任瞻天望聖激切屏營之至謹奉表陳謝以聞湖南提刑到任謝皇帝表帝庭敷命昭闢四門天牧播刑誤頒一節申以遄驅之旨疇兹巳試之庸周隰載馳漢條具布伏念臣本無他技惟有孤忠兩朝特逹之知洊塵清要十載行藏之迹秪自悔尤雲雷之義方屯天地之心巳復當元日逹聰之始在皇華遣使之中聖恩靡許於祝釐臣職敢稽於行道瞻蓋髙而下耳冀用譽於折肱茲蓋恭遇皇帝陛下道協重華仁周四表崇德廣業合乾轉坤翕之功折獄致刑得震動離明之用遂令承乏復忝司平臣敢不祗若咨詢對揚欽恤陳時臬事尚弘康乂之圗受王嘉師永迪明清之訓謝皇太后表司平椘甸命出嚴宸告至周原恩歸慈極敢敷􅐶訓仰謝徽音伏念臣一介寒微兩朝知遇傾葵向闕𥘉無輔於使令啜菽杜門秪自深於觀省當元日會同之始拜公朝抆拭之仁言遣使臣往陳臬事華省遄頒於趣旨叢祠竟祕於俞音勉臣子之驅馳見吏民而宣布兹蓋恭遇夀和聖福皇太后陛下心起有極道合無疆長信怡愈贊炎圖之昌運大任肅穆開蒼籙之隆平宜擇攸司俾敬爾獄臣敢不丕承欽恤誕布慈仁乂我黎民尚想無刑之治于其王母敢忘介福之元謝皇后箋君子審官道隆儷極皇華遣使命出治朝德意具宣忱辭告至伏念臣踈庸一介遭遇兩朝早綴班行嘗忝金科之屬繼乘使傳復塵繡指之行曲成每戴於釐明退食難逃於吏議不圖元會復錫恩言抆拭起家往陳時臬驅馳在道寅奉天威涖止攸司欽哉乃職兹蓋伏遇皇后殿下德侔坤地位正家人關雎之化既行用之天下象魏之法使布正自王宫爰取踐更載叨詳讞臣敢不靈承欽恤祗若平反無刑以乂黎民誕敷聖化式敬以長王國永誦徽音皇太子生日賀皇帝表大夏長贏坤二爻之紀季千秋似續震一索之揆𥘉瑞彩緣車歡顔丹扆恭惟皇帝陛下德流芭水業茂蘿圖夀富多男積善必有餘慶本支百世命吉在厥𥘉生記甲觀之瑞分占乙禖之祚逺臣縻身軫野戴目心星誦億子之宜君首歌周雅祝萬年之為父更續唐詩賀皇太后表福于王母際南面之昌期天以神孫娛東朝之永日晝堂瑞節長樂歡聲恭惟夀和聖福皇太后性藴沖和仁培靜夀思齊所以聖也以御于邦螽斯宜爾孫兮克開厥後皇皇穆穆繼繼承承臣迹滯騏原心馳鳯闕本支百世播綿瓞之聲詩怡愈萬年衍含飴之福慶賀皇后箋坤后廣生式協二爻之月震男揆度載逢一索之期慶衍蘿圗喜充椒掖恭惟皇后殿下道柔配地德厚承天以御于家為今京室之婦則樂有子如古周南之風百世本支萬年福祿臣迹縻牲轡心賀燕謀占斯干之詩巳符吉夢美思齊之德益嗣徽音皇子進封左衛上將軍嘉國公賀皇帝表乾父垂仁茂積蘿圗之慶震男鍾美肇基茅土之邦百世可知四方來賀洪惟昭代爰立親親粵有舊章禮優貴貴昉祥符之七載侈慶國之初封綺仗分班璲圭疏寵庸表人倫之厚遹觀王室之疆式于今休監于成憲恭惟皇帝陛下福堷周厚和緝堯雍寶曆無疆方萬年而受祜金枝有煒期億子以宜君錫以嘉名渙其大號地營東井詔爵五之最穹天拱北辰炳心三之相照克昌厥後長發其祥臣有蹇牡騑阻隨虎拜祉歌子施遙陳皇矣之詩道盡君嚴願贊家人之易賀皇太后表東朝保艾方隆堯母之仁西國分茅式篤文孫之慶兩宫喜色萬宇歡聲恭惟夀和聖福皇太后陛下德厚慈元神怡長樂尊之至也上承視膳之勤宜爾繩兮下適含飴之趣瑶池日永玉葉春濃臣逺𬒳繡衣隃瞻綵仗于其王母知介夀之來崇佑我後人碩丕圖之有衍賀皇后箋坤稱乎母儼家服於椒塗震索而男赫龍光於茅土長秋喜色方夏歡聲恭惟皇后殿下含弘承天博厚配地祥鍾長發熾啇後於有娀音繼思齊培文昭於大姒圭瑑焜煌於綺仗芾朱輝映於褘衣臣逺驟華原隃瞻蘂殿想宜君之穆穆茂對王休侈多子之繩繩載歸后美皇女進封同夀公主賀皇帝表乾見大人道夙隆於乾體巽為長女命爰寵於巽申喜溢宫庭歡騰海宇竊惟興君之際必有積善之餘播在正風則曰王姬之美陳于小雅是為女子之祥無非歌福祿之同于以表國家之盛恭惟皇帝陛下和順而理溫柔以容苞體深仁既歲綿瓜之瓞岡陵厚積復培穠李之華始封爰遴於嘉名遐祉永齊於聖夀臣迹縻使事身隔賀班親愛如家遙贊人倫之厚肅雍迪教遹觀王道之成賀皇太后表周家福祿積由任姒之仁堯母聖神親覩娥英之慶宫闈盛典海宇歡聲恭惟夀和聖福皇太后陛下南極景光東朝綦貴有功寶祚既開聖子之傳流澤銀潢爰育天孫之瑞贊𥘉封於沁水同上夀於瑶池臣逺玷皇華隃瞻長樂怡愈太后諒承婉娩之娛雍肅王姬益表儉慈之教賀皇后箋坤萬物之資生實蕃慶積巽一索之謂長昉對命申喜氣宮闈歡聲海宇恭惟皇后殿下關雎孝敬芣苡和平灼灼宜家夙範華桃之懿雍雍成德茂鍾穠李之英賁然錫沁水之封展也同長秋之夀臣逺縻苞𣏌遙睇塗椒風以周南仰化原之洵美觀于堯女願母道之浚明知贑州到任謝皇帝表九重選牧錫類天寬千里承流奉親地近昉共侯度丕戴王休伏念臣某才本空踈分安孤苦身逄盛代夙自厲於丹心家有重親晚相依於白髮頃叨漢傳往即楚封何敬非刑粗殫審克不遑將母私切懷歸嘗懇懇以陳情冀髙高之欲從遄蒙異渥特卑近麾繼朌旨以趣征巳鞠躬而祗上祿及一門之微賤恩同大造之生成兹蓋伏遇皇帝陛下以堯舜之資行曽閔之道嗣寧王之大歷毖我成功奉太后之萬年與天齊夀遂使忝求芻之寄亦獲共啜菽之歡臣敢不老老及人親親為政由家逹國期興遜以興仁以子移臣寓為忠於為孝謝皇太后表東朝鴻慶介夀無疆南國虎符便親有命荷中宸之渙寵望慈極以皈忱伏念臣一介迂踈兩朝遭遇昔備殫於敡歷無以逾人頃間任於驅馳不遑將母惟內懷於烏哺遂上徹於蟻忱果分二水之麾爰易三湘之節惟壤地接故可以供菽水之職惟土風習故可以盡芻牧之心自省叨隃若為報稱兹蓋恭遇夀和聖福皇太后陛下德光堯母功配周薑夀錫萬年享怡愈之福化流四海推慈孝之仁遂令下吏之僥榮獲以邇封而就飬臣敢不祗承德意誕布恩言服膺錫類之詩益崇美化拜手牧民之訓隃贊徽音謝皇后箋慈極承天恩深錫類廉車易地職重分符布聖德之中和便親闈之溫清伏念臣起繇孤逺積有迂踈骯髒半生於事君而何輔驅馳近歲以將母而未能屬為飬以陳情荷卑矜而從欲三湘納節二水授麾回刺史之車庶乎為子捧郡守之檄專以為親僥冒實多糜捐曷稱兹蓋恭遇皇后殿下道隆坤厚德配乾仁大雅思齊媚周薑而穆穆長秋備禮奉漢母以愈愈遂令踈逺之微臣亦效旨甘於便壘臣敢不恪恭侯度茂對王休崇關雎卷耳之風迪惟懿則篤南陔白華之行施及遐萌夀崇節本州賀皇帝表天子有親備四海九州之奉封人祝聖同萬年億載之期凡屬照臨舉同呼舞恭惟皇帝陛下剛建中正緝熙光明燭六合而耀八紘功參天地躋三皇而軼五帝道御家邦紹巍巍蕩蕩之勳盡尊尊親親之飬怡愈誕節光大前聞臣獲布寬條幸逄盛際鵷鸞阻綴莫旅賀於東朝螻蟻傾忱惟仰瞻於南極賀皇太后表於萬斯年慈宸有慶誕彌厥月祖佛同生旒冕敬共縉紳舞蹈恭惟夀和聖福皇太后陛下道超太始德厚重坤關雎周南之風夙陶美化思齊文王之母懋著徽音袗衣𥘉奏於薰絃宫珮畢朝於慈扆親下衮龍之拜載揚韶鳯之音呼萬歲者三歡騰朝野等百世而上福衍子孫臣叨守魚符莫陪鴛序我百而爾九十諒喜溢於舉觴心一而臣三千第神馳於拱極賀皇后箋太姒之嗣太任星重慈極長秋之朝長樂天介夀祺流慶九霄比隆千古恭惟皇后殿下明章德範陶冶化風大練厚繒訓四方之節儉宵衣旰食侑五位之勤勞肖似徽音婉愈誕序厚符坤地吉萃家人臣逖守遐邦欣逢華旦仰瞻帝闕莫陪振鷺之班下與邦民同𬒳關雎之化夀崇節兵馬鈐轄司賀皇帝表天子盡敬事親丕昭瑞節臣下歸美報上同祝修齡覆載兩朝頌歌四洽恭惟皇帝陛下克勤克儉無怠無荒堯以是傳道莫高於虞舜文所以聖德益顯於大任有開麗水之祥適際瑶池之會臣屬縻戎鍵阻綴班聯北面而朝恍天威之尺五南山之夀效臣子之呼三賀皇太后表金闕日長尊處宸闈之極王巵春滿誕膺法駕之朝凡在式圍率均擊壤恭惟夀和聖福皇太后陛下心遊恬淡德著慈仁隆周召之風人倫既正飬黃老之性母道獨尊皇穹申方至之休夀命衍無疆之算臣猥分郡組共二戎韜迹逺觚稜帷幄隃瞻於長樂忱同葵藿笙璈第想於承華賀皇后箋坐於少廣慶慈極之誕彌朝于寢門助聖人之教愛宫庭溢喜宇宙同和恭惟皇后殿下瑞應俔天光昭遡日正始基化歌二南芣荇之詩視膳問安備六寢禕䄖之禮協朱明之律吕鏘綵仗之珮環歡奉玉巵禮同黼扆臣濫紆州􅌧通領兵符聆舜樂之九成遙瞻南面效堯階之三祝竊比華封乾會節本州賀皇帝表一人天拱適符龍御之亨萬國雲從共慶虹流之瑞系隆宗社福𬒳寰瀛恭惟皇帝陛下曰􅐶曰聰乃文乃武金甌有永紹寧人大寶之休翠蹕早朝娛太后萬年之夀當嵩呼之華旦繼夢月之佳辰兩宫同時千載盛事臣猥叨分竹彌切傾葵奉玉巵之恭阻綴班於北闕通銀臺之奏但申頌於西崑賀皇太后表六龍御極增光長發之詩萬國同心推本思齊之聖歡騰宮壼和塞堪輿恭惟夀和聖福皇太后陛下曰希曰夷爰清爰靜以天下飬備百祿之熾昌與元氣遊葆六根之純粹海內樂唐虞之化宮中頌任姒之音臣叨預承流遙伸歸美冬溫夏凊禮嚴東面之朝日升月常福等南山之祝賀皇后箋黼扆端臨交上華封之祝椒塗內助仰承京室之規喜溢六宮和薰八表恭惟皇后殿下靜專成性徽懿秉姿珥簮進庭燎之針雞鳴有度弓韣奉高禖之祀燕翼發祥際上帝生啇之辰懋塗山興夏之德仰占七政日月並明俯鑒四方岡陵齊夀臣分符江右化𬒳周南首贊乾亨體天行之不息更祈坤載協地道之無疆乾會節鈐司賀皇帝表龍首庶物覩天德之照臨虎拜萬年對王休而蹈厲堪輿協氣海宇頌聲恭惟皇帝陛下神聖整齊武文經緯諸福畢至一登再登三登我武維揚五伐六伐七伐虹渚載臨於盛旦鳯音遙想於明庭臣通領鈐符恪共官次葵傾觀闕阻陪就日之班花覆簮紳隃謝需雲之宴賀皇太后表天下傳歸於子降寶册之鴻名聖人教愛以親上玉巵之曼夀非常之慶嘉頌攸同恭惟夀和聖福皇太后陛下沖淡頥神儉慈孚化輔佐先帝夙殫卷耳之勤愈佚東朝允著思齊之聖昉前殿紀誕彌之旦正羣方傾就望之忱肆膺鳯輦之朝親下龍綃之拜臣屬縻戎鍵阻綴班行現五色之雲知獻占於太史舞兩階之羽諒增喜於慈顔賀皇后箋上萬歲之夀咸頌聖人形四方之風實基王化凡居持載罔不歡呼恭惟皇后殿下生稟靜柔安行雍肅躬河洲采荇之潔列聖顧歆翼寢門視膳之恭慈顔和懌合坤其順遡日而明欣聆嵩嶽之呼並受華封之祝臣俯共武服仰贊夀觴星之逺天之髙陛莫瞻於九級漢之廣江之永詩但誦於二南皇子賜名本州賀皇帝表家有嚴君托中興之昌歷天以聖子作大國之宗藩喜溢宫闈慶關宗社恭惟皇帝陛下懋昭聖德厚正人倫保天命以宜君四方無侮貽孫謀而翼子百世可知爰錫嘉名載敡大號敬哉有土肇基二水之邦格于皇天式應三星之曜俾耆而艾長發其祥臣縻迹侯方傾心魏闕監王成憲碩垂謨烈之休啓我後人益壯本支之盛賀皇太后表東朝介福式彰母道之尊南國分封庸迪孫謀之吉兩宮交慶百世彌昌恭惟夀和聖福皇太后陛下長樂怡愈大庭遊衍飬以天下日永瑶池正于家人春生玉葉贊苴茅於浯水壯綿瓞於宗藩臣逖在侯方阻瞻宸仗思齊所以聖遙頌徽音皇矣莫若周益隆世德賀皇后箋母資坤德之生椒塗襲慶男正家人之吉茅土分封宗社延洪宮闈闓懌恭惟皇后殿下承天光大法地靜專成美化於周南言能逮下嗣徽音於京室于以御家屬聖子之勝衣贊嚴君之錫爵臣逺縻外服阻造內班正風俗以厚倫永歌后德輔皇王之維辟丕傒孫謀皇子賜名鈐司賀皇帝表天佑我家篤生聖嗣國有巨典肇建宗藩社稷靈長神人孚洽恭惟皇帝陛下禮行貴貴愛立親親撫寶曆之昌期萬年福祿演銀潢之慶澤百世本支爰重燕謀載頒鴻號于疆于理地營浯水之邦有翼有馮星拱周廬之衛克開厥後俾熾而昌臣逺縶戎韜愈瞻文石施于帝祉德巳動於監觀保我後生命更歌於夀考賀皇太后表堯母怡愈介于景福湯孫岐嶷錫以嘉名慶衍宗枋歡隆慈極恭惟夀和聖福皇太后陛下爰清爰靜曰希曰夷佐先帝之中興雞鳴有度膺嗣王之孝飬燕翼成謀爰鍾受於緑車乃分符於赤社臣恪恭武服阻造王庭以御于家喻贊思齊之德克開厥後佇成皇武之功賀皇后箋坤稱乎母作德配天震索而男建邦有土慶成宗社喜溢宫庭恭惟皇后殿下芣苡和平關雎孝敬嗣母徽於京室在廟在宫明子道於家人正內正外歡動勝衣之拜光昭燾社之封臣共武有嚴稱班云逖風以周南之化隃贊螽斯蒸哉豐水之謀遹觀燕翼皇帝登寶位本州賀皇帝表天作之君表冠倫之大聖父傳於子昭立嫡之至公曆數維新神人胥慶恭惟皇帝陛下以周元子為舜重華大德生知聰明以臨齊莊以敬一人有慶進退可度容止可觀積纍厚而孫謀深謳歌同而神器定無為而治有道之長臣叨領虎符隃瞻龍御建皇極而王天下幸際昌期開明堂而朝群臣聳觀𥘉政賀太皇太后表肇聖德之龍飛運開昌曆垂孫謀之燕翼功出慈宸九廟尊安八紘抃蹈恭惟夀和聖福太皇太后陛下道光任姒行邁塗莘範肅東朝性適含飴之樂規重南面飬親視膳之榮光昭嫡統之傳丕衍皇家之慶臣叨紆守􅌧阻簉賀班頌皇帝之萬年永言齊夀佑寧人之大歷尚克圖功賀皇太后表震出麗天重明繼序坤稱正位一統蒙休基祚斯皇幅貟胥慶恭惟皇太后陛下輔佐先帝憂勤王家思媚周薑履肅雍於京室訓貽禹子服勤勞於塗山瑞昭南面之符光疊東朝之矩臣屬縻侯服隃企慈帷嫡統無疆巳慶大橫之兆嗣徽有秩尚稽小毖之謀皇帝登寶位鈐司賀皇帝表乘時御極宣日月之重光居嫡宅尊大春秋之一統幅貟愛戴宗社安強恭惟皇帝陛下仁孝生知聰明時乂踐寧王之丕祚大歷維新奉文母之徽音皇天有慶宜首正飛龍之御以上承翼燕之貽無疆維休有相之道臣濫巾戎轄阻簉朝班五百歲而生幸親見聖萬億年其永不替惟王賀太皇太后表兆協大橫運在當􅒛之聖謀貽小毖功歸太上之慈嫡統延洪皇圖鞏固恭惟夀和聖福太皇太后陛下躬基美化教闡徽音彤管光華配豐功於祖烈練衣朴素示懿訓於孫謀聿新歷服之傳式副簾帷之託臣司戎共二望闕呼三庶民近天子光欣逢昌曆太極為元氣母永迪𥘉基賀皇太后表震主宅尊光紹寧王之命坤元居正適彰太姒之音一統親傳萬邦胥慶恭惟皇太后陛下功侔持載德備含弘風化二南衍傳家之忠厚本支百世肇繼序之聖明大春秋正嫡之書應日月重光之運臣屬兼鈐􅌧阻造軒帷在天利見大人巳孚文命介福于其王母長詠思齊謝皇帝登極赦文表日月重離開國家之休運雷雨作解溥天地之至仁萬邦咸休一人有慶恭惟皇帝陛下堯文光宅舜德出寧神聖為君丕受皇天之命春秋立嫡聿昭正統之宗爰肆青於端門示湛恩於熙代臣猥分銅虎隃企金雞大人繼照四方聳觀𥘉政皇極敷錫五福第奉寬書太皇太后加尊號本州賀皇帝表御丕圖於南面順應天人崇徽册於東朝重增宗社億年縟典萬國歡心恭惟皇帝陛下皇極之宗人倫之至性同符於堯舜逹孝升聞訓一本於薑任徽音有秩紹寧王之明命彰祖后之尊稱臣分牧有嚴承休胥抃介福于王母難名太上之功肖德以神孫碩共無疆之號賀太皇太后表􅟾名揚厲用彰重慶之尊龍扆繼承懋舉盡倫之制明廷孚號寰宇傾心恭惟壽和聖福太皇太后陛下德備儉慈教修愛敬佐我烈祖成天保之憂勤訓于神孫示思齊之雍肅粹美翟禕之服增華琬琰之章臣屬守銅符欣傳寶册同御延和之殿誕頌前猷尊居慈福之宮永言至飬賀皇太后表統繼堯天重華協德位隆文母太姒嗣音寰宇休明內庭肅穆恭惟皇太后陛下行高配地功大補天輔先帝以重光憂勤夙至肇嗣王之丕緒福祿方來奉寶册於重闈壽皇圗於覆載臣屬縻郡􅌧阻簉廷紳咸曰太皇巳慶元和之壽碩言帝母永肩長樂之名太皇太后加尊號鈐司賀皇帝表皇圗嗣慶著母道於重坤巨册稱尊告王庭而大渙宫闈增重宗社蒙休恭惟皇帝陛下德為聖人孝治天下侍宣仁之聽斷元祐同符稟慈福之起居紹熙儷美播無為之懿號隆太上之徽音臣猥介戎鈐聳觀國典思齊文母既彰有德之雍雍於赫湯孫碩共厥聲之穆穆賀太皇太后表離日方升光傳國寶坤元重慶肇建鴻名福萃三宫歡騰八表恭惟壽和聖福太皇太后陛下佐佑皇祖怡愈東朝德配薑任植丕基於蒼籙功高馬鄧扶洪業於炎圗宜效美於思齊大歸尊於長樂臣偶叨戎轄阻綴朝班丕哉烈丕哉謨共傒嗣王之政得其名得其壽載揚太上之休賀皇太后表晉大號於慈闈位隆長樂紹丕基於萬世慶本慈元命肅治朝禮行廣內恭惟皇太后陛下頥神沖淡履行靜專美紹思齊宜育文王之聖訓垂訪落實開成后之謀贊重慶於御簾推有尊於臨制臣猥分戎轄隃聽恩綸望少廣之宸居莫班獸舞頌長秋之夀曆同播鴻名皇太后加尊號本州賀皇帝表嗣王受此丕基光膺明命文母介以繁祉祇奉嘉名典册流輝幅貟有慶恭惟皇帝陛下一人出震五位乘乾玉質金相嗣延洪之大曆寶椲羽翟奉雍肅之徽音光進瑶編重增鼎祚臣叨分虎壘隃望龍墀保佑恩深巳際大明之運怡愈樂永更揚齊夀之休賀太皇太后表育正神孫方布應門之詔位尊祖后復隆京室之稱重慶萬年丕休四海恭惟夀和聖福太皇太后陛下性超太上德應黃中元祐太功法宣仁之鞠育紹熙新政燕慈福之起居宜旌坤極之嘉名式趾太宸之芳躅臣屬分侯服欽誦王綸天子必有所尊巳光載籍聖德無加於孝長戴兩宮賀皇太后表坤稱正位訓迪嗣王渙號揚庭尊歸文母簾帷介福社稷垂榮恭惟皇太后陛下德著憂勤躬行慈儉虞嬪觀于溈汭密贊聖謨后稷生於薑嫄美鍾神胄晉長信尊尊之號嗣思齊秩秩之音臣忝守藩維阻趍軒陛得其名得其夀幸同萬國之歡宜爾子宜爾孫永頌兩宫之慶皇太后加尊號鈐司賀皇帝表重明以繼大人瑶圗垂慶介福而于王母玉册有光瑞溢簾帷重關宗佑恭惟皇帝陛下敬仁成性曆數在躬惟后綏猷蹈堯舜之孝弟因親教愛奉任姒之肅雍宜申慈極之尊式表聖倫之至臣叨兼兵轄隃企陛簾贊長信之徽稱巳光漢制頌塗山之丕訓益大禹功賀太皇太后表嗣皇奉册尊居長信之名祖后宣猷夙迪思齊之訓萬年集慶八表蒙休恭惟夀和聖福太皇太后陛下德邁維莘道高于汭金車玉路備三世之典章寶翟珍禕示六宮之法度美慈宸之疊矩揚大號以同符臣兼領戎鈐竦聆郵綍德夀早朝之典巳慶淳熙延和同御之功益歌元祐賀皇太后表文母克昌厥後光紹皇圖大德必得其名慶隆寶册四方來賀百志惟熙恭惟皇太后陛下隂教齊家慈元正位推為美化邁周召之二南著在徽音紹薑任之大雅宜膺渙號增重坤稱臣適二韜鈐聳聆綸綍踐其位行其禮莫重尊親求厥寧觀厥成遹追來孝大行皇帝升遐本州慰皇帝表堯父宅尊春秋鼎盛祀天告墜逺邇震驚降割非常銜哀罔極恭以大行皇帝神聖文武濬哲溫恭萬千歲怡愈恪盡東朝之飬十一年寅畏遹祗上帝之威期夀考之惟休俄憂勤而積疢詎圗大漸驟至遐征望欲斷於遺弓命忍傳於慿几恭惟皇帝陛下有仁有孝盡制盡倫克念先猷根聖人之至性誕承慈訓服天下之通喪碩少抑於孝思以永綏於神器臣屬縻守􅌧哀捧告書莫伸奔問之恭徒切攀號之痛慰太皇太后表雞鳴問寢方慈極之深居龍去遺弓忽皇輿之新陟宮闈震悼海宇摧傷恭惟夀和聖福太皇太后陛下德備周薑道光堯母東朝垂訓曽不改於儉慈南面積憂遽忍違於溫凊驟罹國疢諒切聖懷少寬慿几之思式副御簾之託慰皇太后表皇靈新陟變撫遺弓儷極永懷悲興捐玦六宮哀痛九宇摧傷恭惟皇太后陛下坤道宅中家人位正脫簮而諌期共濟於中興綴衣于庭忍遽聞于末命雖委裘之悲至切而定鼎之託方新碩制䀌傷永綏敷遺云云大行皇帝升遐鈐司慰皇帝表王宜日中方慶垂衣之治父有天下遽傳慿几之言宗社憫凶幅貟哀痛共以大行皇帝王道正直帝德簡寬奉長樂之凊溫丕昭仁孝聽邇英之勸誦遹紹文明方嗣服於萬年胡委裘於一旦烏號罔極龍御何追共惟皇帝陛下聖德升聞孝思永慕重華協帝方遏密於八音冡宰總官將諒隂於三祀碩少紓於聖抱以弘濟於皇圗臣逖領戎昭哀傳國疚阻伸奔問惟重摧傷云云慰太皇太后表嚴宸居正痛晏駕之奄聞慈極宅尊悵早朝之遽隔哀傳海宇悲結簾帷其惟夀和聖福太皇太后陛下德厚承天恩深與子夙行恭儉聖方頌於思齊晚享怡愈變忍聞於顧命諒聖情之結戀鑒輿志之攀號碩抑慈懷永謀孫翼慰皇太后表變興梧野九土烏號悲結俶塗六宫縞哭宅憂罔極降割何深臣共惟皇太后陛下志紹徽音躬行美化冬溫夏凊佐孝飬於東朝海潤星暉演慶源於中壼驟撫鼎湖之戚奚堪輿極之哀碩抑慈懷聿扶新政云云百日慰皇帝表烏號浸逺九土同悲駒隙易流十旬如隔撫時哀疚易月倣徨恭惟皇帝陛下曆數有歸羔墻如對雖劈踊哭泣曷勝父子之情而朝覲謳歌當慰臣民之望碩節宅憂之制益成繼志之圗臣承乏偏城阻趍嚴陛云云慰太皇太后表烏號銜恤悵再隔於月逰龍寢闕朝恍十周於日浹流光何速哀思欲摧恭惟夀和聖福太皇太后陛下宮壼宅尊簾帷託重雖道揚王命不勝慈極之懷然燕翼孫謀當念皇圗之本碩體臣民之戴少寬朝夕之思云云慰皇太后表雲升梧野頓隔千秋日短蓂階駕言十浹委裘禍迫捐玦哀深恭惟皇太后陛下教盡人倫慶隆母道雖易月以日難窮伉儷之悲然薦子於天正重攜持之託碩俯從於中制用式副於羣情云云期年慰皇帝表追玉几之遺言制嚴易月服練冠於𥘉祭哀重感時霜露深悲乾坤罔極恭惟皇帝陛下孝治天下統承先王雖見堯於墻克篤終身之慕然纘禹之服所期大器之安碩從禮制之宜少副輿情之望臣屬縻藩屏阻造闕庭云云慰太皇太后表訓豫命汝易月有嚴練而慨然周星何短哀承遺制痛結慈衷恭惟夀和聖福太皇太后陛下德紹宣仁功侔明肅天經地義扶嫡統於方新日邁月征悵宸旒之愈逺碩勉從於衆志姑少抑於至情云云慰皇太后表悲捐玉玦痛極呼天祭服練冠制嚴易月乘雲浸逺濡露何堪恭惟皇太后陛下德佐先猷慶鍾神胄雖倣徨虞汭望欲斷於蒼梧然婉孌周薑任方隆於京室碩少寬於哀抱用丕贊於鴻圗云云再期慰皇帝表龍湖未逺可傷易月之喪駒隙幾何巳舉再期之制羔墻如在霜露孔哀恭惟皇帝陛下道盡人倫位隆世嫡雖終身慕父難窮至性之悲然億載怡親方疊慈顔之飬碩重承休之託少寬追逺之懷臣隃綴蕃宣阻班軒陛云云慰太皇太后表終天巨釁降割一朝易月通喪寓言再歲仙遊未逺慈抱難居恭惟夀和聖福太皇太后陛下功在先朝志勤內治雖變生慿几悵闕問於雞鳴然寄重垂簾方稽謀於燕翼碩抑無疆之恤益昌有大之休慰皇太后表望斷乘雲悵龍驂之浸邈制嚴易月恍鳯曆之再周几屬幬封式同追慕恭惟皇太后陛下承天功大與子仁深雖悼舜陟方不替蒼梧之望然開周嗣歷方隆豐芭之休碩少抑於衰悰用永綏於神器禫祭慰皇帝表龍御何之方切綴衣之痛駒隂未逺巳驚釋禫之期易月從宜感時增疚恭惟皇帝陛下恭默思道愛敬事親天作之君當周艱而即命日致其孝將舜慕以終身碩寬追逺之至情丕慰蒼生之顒望臣濫承郡􅌧阻綴朝班云云慰太皇太后表衮衣萬歲痛隔終天禫服一朝權從易月感時憂戀率土䀌傷恭惟夀和聖福太皇太后陛下德著寶禕功藏金匱撫鼎湖之龍去子保何追懷豐水之燕貽孫將有衍碩副普天之望式紓慈極之悲云云慰皇太后表官車輟駕浸逺翠華國典行權恍終素蹕託言釋禫胡忍免喪恭惟皇太后陛下夙著脫簮驟罹捐玦雖梧雲不返永為禕翟之傷然芭水方來共徯簾惟之助碩釋居諸之感俯從遐邇之情云云賀皇帝聽政表思皇烈考誕受寶龜於穆嗣王甫攽治象慈簾保佑熙政闓明恭惟皇帝陛下德實天生動為世則入于翼室稱元子以宅宗出自應門會諸侯而作誥欽奉怡愈之訓爰親兢業之幾既兩宫垂拱以無為宜四海謳歌而來覲臣屬縻郡國隃戀闕庭御延和殿之正朝碩光祖烈奉紫雲樓之盟誓第守藩條賀太皇太后同聽政表綏夀而右文母高拱慈宸肖德而有神孫共臨幾政徽音洋溢光訓昭宣恭惟夀和聖福太皇太后陛下功邁塗山德髙媯汭施于帝祉巳深慶錫之源保我後生益衍夀寧之福章憲垂簾於天聖宣仁稱制於延和紹昔大猷為今懿範臣屬縻守􅌧欣聽俞綸太易太始太𥘉莫測無為之化四門四聰四目共觀有道之朝天瑞節本州賀皇帝表龍德御天重華于帝虹書流渚長發其祥萬姓歡呼三辰擁佑恭惟皇帝陛下聖德克肖天性自成光北斗之樞篤生黃帝美南山之夀誕命文王節屇千秋時維九月臣縻身侯度拜手王休三千臣同心永言華夀五百年生聖敬贊河清賀太皇太后表聖王垂拱萬年方開燕翼太皇怡愈億載親見虹流海宇春輝宫闈日永恭惟夀和聖福太皇太后陛下身基美化德著慈元正位而定家人功高配祖介福而來王母慶積貽孫律協素商節書金籙臣濫膺藩屏阻賀簾惟假樂命之慶春秋之鼎盛思齊聖也同日月之離明賀皇太后表龍德方升祥書載震燕禖有慶福萃重坤旗翼光華幅貟熙洽恭惟皇太后陛下道侔博厚德備仁明虞汭來嬪女于舜帝周京作配生此武王方觀日上於扶桑隨紀虹流於華渚臣濫叨一障隃企千班大域中王既祝華封之壽為天下母碩齊西極之年天瑞節鈐司賀皇帝表謳歌與子方開捧日之祥福祿宜王𥘉紀流虹之慶光生宗社歡溢堪輿恭惟皇帝陛下天德生知乾元首出載震載夙膺天地之珍符繼聖繼明正春秋之嫡統當瑶光之瑞節際金皓之昌辰臣分虎有嚴抃鰲欲舞呼玉巵之萬歲隃贊王休進金鑑之千秋嗣殫臣職賀太皇太后表萬夀齊天思齊以聖千秋紀日長發其祥廣宇休揚重闈慶洽恭惟夀和聖福太皇太后陛下以女堯舜為今姒任有典有則之貽輔于皇祖立政立事之凖訓乃文孫當月屇於素商喜節書於華渚臣猥塵戎轄阻賀宸闈請祝聖人既效堯封之職亦右文母載賡周頌之章賀皇太后表辛歲重光昔符夢日乾元首出今紀流虹歡溢華封慶歸長信恭惟皇太后陛下徽音大雅美化二南德配重華觀嬪于汭祥開長發立子生商扶暘谷之𥘉升紀髙禖之載誕臣領鈐偏郡銜表明廷五百歲河清既覩聖人之出三千年桃實碩同王母之尊太行皇帝諡號本州慰皇帝表祀以配天致聖人之逹孝廟可觀德彰烈考之隆名典册十年宗祧九鼎恭以端文明武景孝皇帝光宅天下簡在帝心敬直義方煥經天而緯地事名物應昭修政以攘夷大德大功立親立愛自生民而未有熙鴻號於無窮恭惟皇帝陛下離象重光乾龍首出聖盡倫王盡制始于家邦宗有德祖有功行其典禮式崇徽譽昭對皇靈臣叨領虎符欽傳駿命告神明頌盛德巳觀國典之光薦郊廟揚洪休尚述侯邦之職慰太皇太后表居長樂之宮興懷鶴駕瞻顧成之廟肇錫鴻名大册垂榮慈衷悼往恭惟夀和聖福太皇太后陛下以天下飬與元氣遊明肅臨朝親立仁皇之䇿宣仁在御永懷神考之思丕對皇靈昭升熙號臣屬靡侯􅌧阻慰震簾云云慰皇太后表九疑陟逺莫返皇靈七廟升宗聿彰世德洪名有赫哀抱彌深恭惟皇太后陛下位正家人道隆坤母躬葛覃之節儉厥配有光秉清廟之肅雍于嬪增感於惟大册肆對皇穹臣迹繫分符神馳望闕云云大行皇帝諡號鈐司慰皇帝表翼室宅宗考先王之制禮觚壇告帝為烈考以易名大册遹彰皇靈昭假共以端文明武景孝皇帝體元居正持盈守成端獨化之原文經天地明萬幾之理武定邦家景行有容孝思無極上可以配祖宗之德下可以垂子孫之休恭惟皇帝陛下弼我丕基鑒于成憲寧王克綏受命篤棐忱辭嚴父莫大配天答揚光訓奉徽稱於宗祀昭縟典於明時臣通領戎昭竦承帝號堯萬世如見莫名巍蕩之功周諸侯來朝第贊肅雍之相慰太皇太后表盛德之祀百世肇建嘉名太皇之夀萬年興懷縟典慈宸惻椘穹覆鑒觀恭惟夀和聖福太皇太后陛下懿範兩朝仁恩四海為元氣母克篤貽孫育天下君忍聞祔禰裒時大號對越皇靈臣身二戎鈐心懷國典云云慰皇太后表大德得名尊歸昭考嗣王謀廟上奉徽音宗禰休揚宫闈愴極恭惟皇太后陛下儉昭練服中協黃裳嗣任德之肅雍思齊以聖名堯功之巍蕩煥有其章聿深羽翟之懷於赫觚壇之告臣猥兼戎轄隃贊邦彛云云冬至節本州慰皇帝表一陽來復感駒隙之易流三祀諒隂悵烏號之浸邈愴深履襪悲著羹墻恭惟皇帝陛下清明在躬恭默思道水有源木有本方嚴祭祖之時霜既降露既濡不替思親之念少抑居諸之慟仰膺付託之隆臣逖守遐邦阻班嚴陛誦先王省方之戒碩謹起居秉諸侯謀廟之忠聿懷奔走慰太皇太后表暖律吹噓感一陽之初復慈簾擁佑訓三祀之通喪痛在宮闈情均海宇恭惟夀和聖福太皇太后陛下徽音慈福懿範宣仁履襪迎長天休方至冕旒問寢子保奚追碩少抑於慈懷以永綏於孫翼臣屬縻侯服隃企御闈云云慰皇太后表復陽在地氣應黃鐘坤德承天悲深素蹕六宮增疚萬宇永懷恭惟皇太后陛下長信宅尊思齊繼美手扶宫日坐占千歲之長目斷臺雲尚想九疑之逺碩紓哀於儷極以永翼於皇圗臣逖守江城隃瞻禁闕云云啓􅑼慰皇帝表三年諒隂不言悲深翼室七月同軌畢至告啓菆塗逺日戒嚴終天增慕恭惟皇帝陛下外勤謀廟內奉臨朝制爰舉於因山龍輴將駕情永懷於陟岵鳯紼奚追碩寬劍舄之思益重基圗之託臣屬縻斗壘阻慰宸庭云云慰太皇太后表居長樂之漢宫永懷鶴駕卜會稽之禹穴垂戒龍輴悲結慈闈痛均薄海恭惟夀和聖福太皇太后陛下憂勤德備擁佑功高百世可知首正貽孫之則七月而葬豈勝思子之懷碩東望以節哀重外朝之同御臣身縻乘障迹阻趍班云云慰皇太后表龍湖言逺椒掖永懷鳯翣戒嚴菆塗載闢六宫雨泣萬宇雷哀恭惟皇太后陛下儷極勳高正家化洽撫軒皇之劍舄柎賁橋山奉舜帝之衣裳思藏梧野尚軫乾坤之記碩紓朝夕之思臣身繫分符神馳攀紼云云發引慰皇帝表鸞車既駕陟岵哀深龍匣畢塗崇丘制舉新宫永閟翼室增傷恭惟皇帝陛下思道諒暗送終哀戚居喪讀葬禮不愆復土之期因山不起墳尤切望陵之感兾少寬於孺慕以丕重於宗祧臣縻迹侯藩傾心宸陛云云慰太皇太后表日淪西極悵鶴駕之長逰天拱東朝痛龍湖之永閟重闈悲繫九土慕思恭惟太皇太后陛下福備怡愈功高擁佑撫綴衣於翼室億世貽孫念加斧於畢塗千秋望子碩抑思齊之感益昌小毖之謀臣叨領偏城阻趍慈陛云云慰皇太后表國謹重喪龍棺就殯禮襄大事鸞掖興懷海字同哀山陵告備恭惟皇太后陛下憂勤孔夙哀戚謹終媯汭居諸悵虞琴之巳逺會稽咫尺望禹穴以奚追碩紓既葬之悲式相維新之治臣承流有守伸慰無從云云祔廟慰皇帝表先帝之葬衣冠載虞神祐嗣王之奉宗廟丕祔皇靈昭穆用休典章備舉恭惟皇帝陛下以舜大孝居商諒隂如慕如疑既畢因山之禮以享以祀聿嚴升禰之恭勉承翼翼之容深抑煢煢之感臣屬縻牧訓阻奉駿奔云云慰太皇太后表嗣王宅恤奉先祐以升宗聖母思齊感皇靈而悼往禮容有赫祀事孔明恭惟夀和聖福太皇太后陛下夀考維祺儉慈為寶佑我烈祖有典則以貽子孫保豫沖人修宗廟以序昭穆祔既行於永紹哀少釋於慈元臣叨綴蕃宣阻班奔走云云慰皇太后表地隔丹洲畢舉九虞之祭天臨清廟昭升七世之宗檿主思皇椒闈若惕恭惟皇太后陛下性鍾慈儉德備憂勤嬪虞帝以曰欽陟方浸邈對文王之於穆率祀惟恭碩紓坤極之思益衍乾符之慶臣屬縻民牧莫效侯朝云云正旦慰皇帝表王正書月景命維新靈德在天孝思罔極運開曆數哀動几筵恭惟皇帝陛下思道奉先與時更始王受同瑁祭不替於元辰帝見羹墻禮益嚴於上日碩抑居諸之感丕承擁佑之恩臣屬守偏城阻趍嚴陛云云慰太皇太后表正月始和律更太簇昊天不弔痛在思齊曆數維新官闈孔惻恭惟夀和聖福太皇太后陛下為元氣母與太極遊孟春而戒遒人撫時其邁上日而受文祖擁治方新碩寬丕子之思益重神孫之託臣屬縻宣化阻慰履端云云慰皇大后表羲日更新治開泰象虞雲浸逺悲在乾元駒隙易流烏號何及恭惟皇太后陛下光輔先帝敬授人時元會衣冠尚想熙明之政月遊劍舄忍聞永紹之名碩寬悼往之哀悰益撫履端之昌運臣屬縻一障阻慰三朝云云改元賀皇帝表春王會於三朝慶開景運皇天佑于一德治紀初元正朔肇新乾坤有造恭惟皇帝陛下春秋正始曆數在躬仰則定陵開三傳之丕祚近稽哲祖基七葉之昌期攽鳯曆以改絃衍馮圗而卜鼎臣親逢更化適綴承流揚偉迹鋪閎休恪共侯度撫大平應昌歷謹授人時賀太皇太后表天王一統為元載攽正朔太皇萬年齊夀同御邦家日月重明乾坤更始恭惟夀和聖福太皇太后陛下道符烈祖功擁神孫乾德太平訓實承於昭憲元祐盛際政共聽於宣仁洊開更瑟之休實繫垂簾之盛臣叨承侯服丕奉慈宸基正始之風巳新美化播思齊之頌永載徽音賀皇太后表春秋以一為元曆開昌運關雎之化正始本在慈宸正朔更新國家胥慶恭惟皇太后陛下有娀長發太姒思齊齊夀以奉太皇德惟子肖受福而于王母祐自天申宜渙號以繫年示同文而更始臣猥乘一障丕戴三宮當昌歷應休期巳供侯服綏眉夀介繁祉益贊母徽曆日謝皇帝表乘龍御以紀年一元正始詔虎城而頒朔千里承休敬授人時對揚王命恭惟皇帝陛下明哲作則曆數在躬欽若昊天熙春夏秋冬之績建用皇極協雨暘寒燠之疇乃誕布於成書以昭垂於新治臣蕃宣有恪播告惟恭錫厥庶民順中星而平秩佑于一德歌化日之舒長謝太皇太后表歲正孟陬一元改紀朝臨長樂萬國頒正春朔會同神人和洽恭惟夀和聖福太皇太后陛下怡愈萬歲擁佑一人肖德而有神孫光膺昌歷受福而于王母丕輯蕃禧載頒協律之書式重垂簾之政臣欽承鳯紀誕布侯藩聽嶰竹之吹誕敷和氣獻蟠桃之頌益贊夀眉謝皇太后表鳯曆頒春東朝介福虎城告朔北面承休歲定四時天佑一德恭惟皇太后陛下思齊肅穆少廣怡愈訓示塗山曆開禹子教行渭涘紀協周王春朔攸同乾坤交泰臣承流下障奉令孟陬協和萬邦第贊定時之績嚮用五福益陳曰夀之休疏夀崇節本州進功德疏九龍吐水當摩耶産佛之辰萬歲呼嵩上大母延年之請敬慿二氏仰贊千齡夀和聖福皇太后陛下恭碩大安大榮至愈至佚慶雲五色現南極之祥光夀域八荒衍西池之長算鈴司進功德疏三寶曰慈南極衍太皇之福五兵不試西江陶聖化之風仗仙釋之殊因贊宫闈之丕慶夀和聖福皇太后陛下恭碩位隆少廣算等崑丘仰大慈尊誕節正同於盛旦得無量夀長生汞協於先天乾會節本州進功德疏聖瑞虹流開半千之休運官聯虎拜瞻尺五之清光靄玉翠之祥氛裒緇黃之妙果皇帝陛下恭碩駮聲克廣龍德方中地久天長夀命衍洪源之慶兩清海晏皇圖鞏磐石之安鈐司進功德疏天臨寶位夙開繞電之符地領王鈐載罄呼嵩之祝謹率兵戈之屬虔修道𣑽之緣皇帝陛下恭碩玉燭四時金湯萬里元龜大貝梯航來川嶽之珍歸馬放牛旗蓋壯東南之運天瑞節本州進功德疏飛龍在天大橫有兆流虹貫月景命維新演道𣑽之真銓崇聖明之瑞節皇帝陛下恭碩維天其右如日之升五百歲而生巳開昌歷億萬年其永益鞏皇圗鈐司進功德疏為天下君祥書帝武祝聖人夀歡動戎昭闡二氏之真科崇千秋之誕節皇帝陛下恭碩泰元有相長發申休在辛歲曰重光方升如日以乾元正五位多歷斯年大行皇帝升遐本州進功德疏帝棄群臣忍傳末命教宗二氏恭薦殊因慨極烏號戀深蟻慕大行皇帝伏碩遊神極樂觀化太虛十四聖之在天皇靈陟降億萬年之與子丕祚綿洪鈐司進功德疏出宫駕晚縞素興哀望闕臺孤緇黃嚴薦恭裒冥福遹相宸遊大行皇帝伏碩性悟真如道超無極成慶而垂萬世聿齊九廟之靈後天而雕三光長作百神之主皇帝聖躬違和保安諸廟疏天子萬夀詎期無妄之災臣人一心共徯有神之相惟帝齡之悠久實神貺之扶持名山大川尚鑒蘋蘩之意普天率土不勝葵藿之私本州宫寺保安疏皇極九五福合率土以傾心帝夀千萬年籲慈尊而請命皇帝陛下伏碩寅畏享國清明在躬王受命無疆惟休誕迎和氣天行健自強不息丕享修齡鈐司宫寺保安僧疏惟聖宅尊共祝一人之慶以臣請命敬皈三寶之慈皇帝陛下伏碩歷數在躬神明其德九五福曰夀丕享康寧億萬載齊天式臻永久道疏率土傾心均碩聖人之夀籲天請命肅殫臣子之忱同前大行皇帝遺詔本州成服道疏道揚末命忍聞晏駕之音瞻仰昊天上訴遺弓之慟修崇冥果攀慕遐征大行皇帝伏碩返于混元光我烈祖洋洋而在上俯察臣民剡剡以揚靈永綏宗社僧疏捧九天之遺誥帝馭何追皈三寶之真乘臣心欲割鈐司成服道疏昊穹降割悵宸馭之上賔率土興悲望帝庭而哀籲虔資冥福遹相仙逰大行皇帝伏碩靈德昭回皇明陟降衣冠雖邈會烈祖以在天宗廟如存朝百神而為主僧疏昊穹降割慟玉仗之上賔率土興哀望金仙而仰籲虔資冥福遹相仙逰本州成服滿散疏制嚴易月痛君父之通喪望極乘雲薦人天之勝果露香局蹐釋經悲傷大行皇帝伏碩堯性常存舜明不隔成慶而垂萬世聿齊九廟之靈後天而雕三光長作百神之主鈐司成服滿散疏捧易月之制書萬邦哀痛修升遐之冥果三寶證明喪紀有嚴孝思罔極大行皇帝伏碩羔墻不逺劍舄如生帝鄉而乘白雲真遊沖漠孫謀之注豐水遺澤深長大行皇帝本州追嚴道場疏維新陟王悵皇靈之日逺演大乘法資勝果於天遊悼痛罙深薦言有俶大行皇帝伏碩性超清淨德邁圎通生為帝沒為神豐功不泯高配天厚配地明德無疆鈐司追嚴道場疏皇靈沖舉莫追汗漫之逰淨業真如式薦逍遙之果終天哀痛率土慕思大行皇帝伏碩陟降太虛超升無極儼橋山之劍舄云云申省狀辭免新除祕書省正字狀具位文天祥照會十月二十六日伏凖省劄十月三日三省同奉聖旨文天祥除祕書省正字者某猥以踈賤叨𬒳聖恩望闕瞻天莫知所措伏念某自叨親擢未歷外庸以讀書學從政之方以奉祠為書考之日方竊山林之暇敢圗臺省之登負乘非宜循墻無任伏望公朝特賜敷奏令某滿足宫觀兩考日祗𬒳新命其於出處得宜庶幾無負聖明拔擢之意所有省劄未敢祗受除寄本州軍資庫外須至申聞者再狀具位文某照會於去年十月二十六日伏凖省劄十月二日三省同奉聖旨文某除祕書省正字者某伏念一介庸賤叨竊非宜加以從仕以來未有庸歷輒具狀申控乞候宫觀兩考滿日祗被新命十二月二十九日伏凖省劄十二月九日三省同奉聖旨不允某除巳望闕謝恩擇日前來供職外須至申聞者辭免知寧國府狀具位文某照會伏凖尚書省劄子四月十七日三省同奉聖旨文某差知寧國府替朱應元缺者起家超躐望闕徘徊伏念某實無他腸粗有逺志昔年憂國冒當事任之難數歲杜門寧悔身謀之拙屬明良之胥慶念嶽牧之疇庸曽謂栖遲遽叨選用惟是某省愆巳至貶秩猶新雖公論至久而愈明而丹書未謂之無過儻不量於出處是自速於顛隮欲望公朝特賜敷奏收回成命改卑叢祠使某得以讀書飬親安身寡過他有驅馳之日無非報效之年所有省劄巳寄留吉州軍資庫未敢祗受須至申聞者文山先生全集卷之四終
