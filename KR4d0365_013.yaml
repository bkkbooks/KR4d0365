front:
  text: 文山先生全集卷之十三别集指南録
  hash: sha256:685ef71347fc8e0a92723ebb36abe3efe4cb5b1cc4ffaa84b0f27e0e70912412
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_013-1a}
body:
  text: 自序豫自吳門𬒳命入衛守獨松關乃王正二日除浙西大制撫領神臯豫辭尹引帳兵二千人詣行在日夕贊陳樞使宜中謀遷三宫分二王於閩廣元夕後豫所部兵皆聚於富陽朝廷擬除豫江東西廣東西制置大使兼廣東經略知廣州湖南策應大使未及出命陳樞使巳去國十九日大皇除豫右丞相兼樞密使都督諸路軍馬時北兵駐高亭山距修門三十里是日虜帥即引董參政以兵屯榷木教場城中兵將官紛紛自往納降豫欲召冨陽兵入城巳不及事三宫九廟百萬生靈立有魚肉之憂㑹使轍交馳北約當國相見諸執政侍從聚於吳左丞相府不知計所從出交贊豫一行國事至此豫不得愛身且意北尚可以口舌動也二十日至高亭山詰虜帥前後失信虜帥辭屈且謂决不動三宫九廟决不優京城百姓留豫營中既而吕師孟來豫數罵其叔姪愈不放還賈餘慶者逢迎賣國乘風㫖使代豫位於是北兵入城所以誤吾國陷吾民者講行無虛日北知賣國非豫所容也相戒勿令文丞相知未幾賈餘慶吳堅謝堂家鉉翁劉岊皆以府第為祈請使詣比方蓋空我朝廷北將甘心焉二月八日諸使登舟忽北虜遣館伴逼豫同往豫𬒳逼脅欲即引决又念未死以前無非報國之日姑隱忍就船方在京時富陽兵巳退趨婺處等州豫俟間還軍苦不自脫至是欲從道途謀遁亦不可得至京口留旬日始得鹽啇小舟於二月晦夜走真州朔日守苗再成相見論時事慷慨流涕豫致書兩淮間合兵興復苗贊之甚力初三日早制司人來乃出文書謂丞相為賺城欲不利于我苗不以為然送豫出門勸奔淮西豫謂此北反間也否則托辭以逐客也李公仁人使見豫必感動遂之維楊苗遣五十兵四騎從行夜抵西門欲待旦求見呵衛嚴密鼓角悲慘杜架閣謂李公必不可見徒為矢石所陷不如渡海歸從王室豫然之自是日夜奔南出入北衝犯萬萬死道途苦難不可勝述嗚呼豫之得至淮也使豫與兩淮合北虜懸軍深入犯兵家大忌可以計擒江南一舉而遂定也天時不齊人事好乖一夫頓困不足道而國事不競哀哉豫至通聞二王建元帥府于永嘉陳樞使與張少保世傑方以李郭之事為巳任狼狽憔悴之餘喜不自制跋涉鯨波將躡屩以從意者天之所以窮餓困乏而拂亂之者其將有所俟乎德祐二年閏月日廬陵文天祥自序後序德祐二年二月十九日豫除右丞相兼樞密使都督諸路軍馬時北兵已迫修門外戰守遷皆不及施縉紳大夫士萃於左丞相府莫知計所出㑹使轍交馳北邀當國者相見衆謂豫一行為可以紓禍國事至此豫不得愛身意北亦尚可以口舌動也初奉使往來無留北者豫更欲一覘北歸而求救國之䇿於是辭相印不拜翌日以資政殿學士行初至北營抗辭慷慨上下頗驚動北亦未敢遽輕吾國不幸吕師孟構惡於前賈餘慶獻諂於後豫羈縻不得還國事遂不可收拾豫自度不得脫則直前詬虜帥失信數吕師孟叔姪為逆但欲求死不復顧利害北雖貌敬實則憤怒二貴酋名曰館伴夜則以兵圍所寓舍而豫不得歸矣未幾賈餘慶等以祈請使詣北北驅豫并往而不在使者之目豫分當引决然而隱忍以行昔人云將以有為也至京口得間奔真州即具以北虛實告東西二閫約以連兵大舉中興機㑹庶幾在此留二日維楊師下逐客之令不得巳變姓名詭蹤跡草行露宿日與北騎相出沒於長淮間窮餓無聊追購又急天高地逈號呼靡及巳而得舟避渚洲出北海然後渡楊子江入蘇州洋展轉四明天台以至於永嘉嗚呼豫之及於死者不知其幾矣詆大酋當死罵逆賊當死與貴酋處二十日爭曲直屢當死去京口扶匙首以備不測幾自頸死經北艦十余里為巡船所物色幾從魚腹死真州逐之城門外幾倣徨死如楊州過瓜洲楊子橋竟使遇哨無不死楊州城下進退不由殆例送死坐桂公塘土圍中騎數千過其門幾落賊手死賈家庒幾為巡徼所陵迫死夜趨高郵迷失道幾陷死質明避哨竹林中邏者數十騎幾無所逃死至高郵制府檄下幾以捕係死行城子河出入亂尸中舟與哨相後先幾邂逅死至海陵如高沙常恐無辜死道海安如臯凡三百里北與冦往來其間無日而非可死至通州幾以不納死以小舟涉鯨波出無可奈何而死固付之度外矣嗚呼死生晝夜事也死而死矣而境界危惡層見錯出非人世所堪痛定思痛痛何如哉豫在患難中間以詩記所遭今存其本不忍廢道中手自抄録使北營留北關外為一卷發北關外歷吳門昆陵渡瓜洲復還京口為一卷脫京口趍真州楊州高郵泰州通州為一卷自海道至永嘉來三山為一卷將藏之于家使來者讀之悲豫至焉嗚呼豫之生也幸而幸生也何所為求乎為臣主辱臣死有餘僇所求乎為子以父母之遺體行殆而死有餘責將請罪於君君不許請罪於母母不許請罪於先人之墓生無以救國難死猶為厲鬼以擊賊義也賴天之靈宗廟之福修我戈矛從王于師以為前驅雪九廟之耻復高祖之業所謂誓不與賊俱生所謂鞠躬盡力死而後巳亦義也嗟夫若豫者將無往而不得死所矣向也使豫委骨於草莾豫雖浩然無所愧怍然微以自文於君親君親其謂豫何誠不自意返吾衣冠重見日月使旦夕得正丘首復何憾哉復何憾哉是年夏五改元景炎廬陵文天祥自序其詩名曰指南録卷之一赴闕楚月穿春䄂吳霜透曉韉壯心欲填海苦膽為憂天役役慙金注悠悠歎瓦全丈夫竟何事一日定千年所懷豫自高亭山為北所留深悔一出之誤聞故人劉小村陳蒲塘引兵而南流涕不自堪只把初心看休將近事論誓為天出力疑有鬼迷魂明月夜推枕春風晝閉門故人萬山外俯仰向誰言自嘆正月十三夜豫聞陳樞使將以十五日㑹伯顔於長堰豫力言不可陳樞使為尼此行豫自知非不明後卒自蹈殊不可曉也長安不可詣何故㑹高亭倦鳥非無翼神龜弗自靈乾坤增感慨身世付飄零回首西湖曉雨餘山更青鐡錯貔貅十萬衆日夜望南轅老馬翻迷路羝羊竟觸藩武夫傷鐡錯逹士笑金昏單騎見回紇汾陽豈易言和言字韻豫以議論大烈北愈疑憚不得歸關將校官屬日有叛去世道可歎悠悠天地濶世事與誰論清夜為揮涕白雲空斷魂死生蘇子節貴賤翟公門前輩如瓶戒無言勝有言愧故人九門一夜漲風塵何事癡兒竟誤身子産片言圖救鄭仲連本志為排秦但知慷慨稱男子不料蹉跎愧故人玉勒雕鞍南上去天高月冷泣孤臣求客眼看銅駝燕雀羞東風花柳自皇州白雲萬里易成夢明月一間都是愁男子鐡心無地著故人血淚向天流雞鳴曽脫函關厄還有當年此客不紀事豫詣北營辭色慷慨初見大酋伯顔語之云講解一假乃前宰相首尾非豫所與知今大皇以豫為相豫不敢拜先來軍前啇量伯顔云丞相來勾當大事說得是豫云本朝承帝王正統衣冠禮樂之所在北朝欲以為國歟欲毁其社稷歟大酋以虜詔為解說謂社稷必不動百姓必不殺豫謂爾前後約吾使多失信今兩國丞相親定盟好冝退兵平江或嘉興俟講解之說逹北朝看區處如何却續議之時兵巳臨京城紓急之䇿惟有欵北以為後圗故云爾豫與之辨難甚至云能如豫說兩國成好幸甚不然南北兵禍未巳非爾利也北辭漸不遜豫謂吾南朝狀元宰相但缺一死報國刀鋸鼎鑊非所懼也大酋為之辭屈而不敢怒諸酋相顧動色稱為丈夫是晚諸酋議良久忽留豫營中當時覺北未敢大肆無狀及豫既縶維賈餘慶以逢迎繼之而國事遂不可收拾痛哉痛哉三宫九廟事方危狼子心腸未可知若使無人折狂虜東南那箇是男兒春秋人物類能言宗國常因口舌存我亦瀕危專對出北風滿野負乾坤單騎堂堂詣虜營古今禍福了如陳北方相顧稱男子似謂江南尚有人百色無厭不可支甘心賣國問為誰豺狼尚畏忠臣在相戒勿令丞相知慷慨輕身墮蒺藜羝羊生乳是歸期豈無從吏私袁盎恨我從前少侍兒英雄未肯死前休風起雲飛不自由殺我混同江外去豈無曹翰守幽州紀事正月二十日晚北留豫營中云北朝處分皆靣奉聖㫖南朝每傳聖㫖而使者實未曽得到簾前今程鵬飛靣奏大皇親聽處分程回日却與丞相啇量大事畢歸闕既而失信豫直前責虜酋辭色甚厲不復顧死譯者再四失辭豫迫之益急大酋怒且愧諸酋群起呵斥豫益自奮文煥輩勸豫去虜之左右皆唶唶嗟嘆稱男子心狼心那顧㰱銅盤舌在縱橫擊可汗自分身為虀粉碎虜中方作丈夫看紀事正月二十日至北營適與文煥同坐豫不與語越二日豫不得回闕詬虜酋失信盛氣不可止文煥與諸酋勸豫坐野中以少遲一二日即入城皆紿辭也先是豫赴平江入疏言叛逆遺孽不當待以姑息乞舉春秋誅亂賊之法意指吕師孟朝廷不能行至是文煥云丞相何故罵煥以亂賊豫謂國家不幸至今日汝為罪魁汝非亂賊而誰三尺童子皆罵汝何獨我哉煥云襄守六年不救豫謂力窮援絶死以報國可也汝愛身惜妻子既負國又隤家聲今合族為逆萬世之賊臣也孟在傍甚忿直前云丞相上疏欲見殺何為不殺取師孟豫謂汝叔姪皆降北不族滅汝是本朝之失刑也更敢有靣皮來做朝士豫實恨不殺汝叔姪汝叔姪能殺我我為大宋忠臣正是汝叔姪周全我我又不怕孟語塞諸酋皆失色動顔唆都以告伯顔伯顔吐舌云文丞相心直口快男子心唆都間云丞相罵得吕家好以此見諸酋亦不容之不拚一死報封疆忍使湖山牧虎狼當日本為妻子計而今何靣見三光虎頭牌子織金裳北靣三年蟻夢長借問一門朱與紫江南幾世謝君王梟獍何堪共勸酬衣冠塗炭可勝羞䄂中若有擊賊笏便使凶渠靣血流麟筆嚴於首惡書我將口舌擊奸諛雖非周勃安劉手不愧當年産祿誅信雲父信世昌字雲父東平府人公子無忌之後嘗為虜大常丞北方之儒也隸唆都唆都使之來伴豫雲父知古今識道理可語中原遺黎甚惓惓於本朝頗輸情焉作詩見贈內兩句云宗廟有靈賢相出黔黎無害大皇明京師為之傳誦雲父大意以為高麗地方數千里昨喪其半遂稱藩大元喜其不拒并侵疆歸之今傳國如故大宋衣冠正統非高麗比北必不敢無禮於吾社稷也雲父念本朝亦願望之辭東魯遺黎老子孫南方心事北方身幾多江左腰金客便把君王作路人信雲父好為詩而辭極俚近一日問豫詩法豫因學宮詞數章比興悠長意在言外雲父恍有所得明日䄂出一絶云東風吹落花殘英猶戀枝莫怨東風惡花有再開時言豫之不忘王室而王室之必中興也雲甫居近闕里漸染孔氏之遺風故其用意深厚而超悟如此肯從悟室課兒書嚙雪風流却减渠我愛信陵冠帶意阡教句法問何如則堂北入京城賈餘慶迎逢賣國既令學士降詔俾天下州郡歸附之又各州付一省劄惟樞密則堂家先生鉉翁於省劄上不肯押號吳丞相堅號老儒不能自持一切惟賈餘慶之命其愧則堂甚矣程鵬飛見則堂不肯奉命堂中作色欲縛之去則堂云中書省無縛執政之理歸私㕔以待執北竟不敢誰何豫在北以忠義孤立聞其事以自壯云山河四塞舊甌金藝祖高宗實鍳臨一日盡將輸敵手何人賣國獨甘心中書堂帖下諸城搖首庭中號獨清此後方知樞密事從今北地轉相驚思蒲塘陳揚旌來冉冉捲斾去堂堂恨我飛無翼思君濟有航麒麟還共處熊虎巳何鄉南國應無恙中興事㑹長思方將軍始興溪子下江淮曽為東南再造來如虎如熊今固在將軍何處上金臺唆都唆都為豫言大元將興學校立科舉丞相在大宋為狀元宰相今為大元宰相無疑丞相常說國存與存國亡與亡這是男子心天下一統做大元宰相是甚次第國亡與亡四箇字休道豫哭而拒之唆都常恐豫之伏死節也虎牌氊笠號公卿不直人間一唾輕但願扶桑紅日上江南匹士死猶榮二王唆都忙右歹一日問度宗幾子答曰三子問皇帝是第幾子答曰第二子立嫡也問第一子三子封王乎曰一吉王一信王問今何在曰大臣護之去矣駭云去何處曰非閩則廣宋疆土萬里儘有世界在云既是一家何必逺去曰何為恁地說宗廟社稷所關豈是細事北朝若待皇帝好則二王為人臣若待皇帝不是即便别有皇帝出來二酋為之愕眙不能對一馬渡江開晋土五龍夾日復唐天內家苗裔真隆凖虜運從來無百年氣概唆都一日問豫何以去平江豫曰有詔趣入衛問豫兵若干豫對五萬人喟然嘆曰天也使丞相在平江必不降豫問何以知之云相公氣槩如何肯降但纍城內百姓豫謂果厮打亦未見輸嬴唆都大笑氣槩如虹俺得知留吳那肯竪降旗北人不解欺心語正恐南人作淺窺使北北兵入城既劫詔書布告天下州郡各使歸附又逼天子拜表獻土左丞相吳堅右丞相賈餘慶樞密使謝堂參政家鉉翁同知劉岊五人奉表北庭號祈請使賈幸國難自詭北人氣𦦨不可向邇謝無識附和吳老儒畏怯不能爭劉狎邪小人方乘時取美官揚揚自得惟家公非願從者猶以為趙祈請意北主或可語冀一見陳說為國家有一線故引决所未忍也五人之行皆出北意吳初以老病求免且巳許之故表中所述賈謝家劉四人吳不與焉二月初八日四人登舟忽伯顔趣豫與吳丞相俱入北豫不在使者列是行何為蓋驅逐之使去耳豫陷在難中無計自脫初九日與吳丞相同𬒳逼脅黽勉就船先一夕豫作家書處置家事擬翌日定行止行則引决不為偷生及見吳丞相家參政吳殊無狥國之意家則以為死傷勇祈而不許死未為晚豫以是徘徊隱忍猶冀一日有以報國惟是賈餘慶凶狡殘忍出於天性密告伯顔使啓北庭拘豫於沙漠彼則賣國佞北自謂使畢即歸愚不可言也謝堂巳宿謝村初九日忽駕舟而回或謂唆都為之地伯顔得賄而免堂曲意奉北可鄙惡尤多詩記其事自說家鄉古相州白麻風㫖出狂酋中書盡出除元表北渡黃河衣錦游賈至尊馳表獻燕城肉食那知以死爭當代老儒居首揆殿前陪拜率公卿吳江南浪子是何官只當空廬雜劇看撥取公卿如糞土沭猴徒自辱衣冠劉公子方張奉使旗行行且尼復何為似聞傾盡黃金塢辛苦平生只為誰謝廷爭堂堂負直聲飄零沙漠若為情程嬰存趙真公志賴有忠良壯此行家𥘉修降表我無名不是隨班拜舞人誰遣附庸祈請使要教索虜識忠臣客子漂搖萬里程北征情味似南征小臣事主寧無罪只作幽州謫吏行使􅏧盡道有回期獨陷羈臣去牧羝中爾含沙渾小事白雲飛處楚天低卷之二杜架閣天台杜滸字貴卿號梅壑紏合四千人欲救王室當國者不知省正月十三日見豫於西湖上豫嘉其有志頗奬異之十九日客贊豫使北梅壑斷斷不可客逐之去豫果為北所留後二十日驅豫北行諸客皆散梅壑憐豫孤苦慨然相從天下義士也朝㫖特改宣教郎除禮兵架閣文字仗節辭王室悠悠萬里轅諸君皆雨别一士獨星言啼鳥亂人意落花銷客魂東坡愛巢谷頗恨晚登門昔趍魏公子今事霍將軍世態炎凉甚交情貴賤分黃沙揚暮靄黑海起朝氛獨與君携手行吟看白雲聞雞自入北營未嘗有雞唱因泊謝村始有聞是夜幾與梅壑逃去二更遣劉百戶二三十人擁一舟來逼下船遂不果軍中二十日此夕始聞雞塵暗天街靜沙長海路迷銅駝隨雨落鐡騎向風嘶曉起呼詹尹何時脫蒺藜命裏二月初十夜為劉百戶者所迫中原人尚可告語也賈餘慶語鐡木兒曰文丞相心腸别翌日早鐡木兒自駕一舟來令命裏千戶捽豫上船凶𦦨嚇人見者莫不流涕命裏高鼻而深目靣毛而多鬚回回人也熊羆十萬建行臺單騎誰教免胄來一日捉將沙漠去遭逢碧眼老回回留逺亭十一日宿處岸上有留逺亭北人然火亭前聚諸公列坐行酒賈餘慶有名風子滿口罵坐毀本朝人物無遺者以此獻佞北惟亹亹笑劉岊數奉以淫䙝為北所薄文煥云國家將亡生出此等人物豫聞之悲憤不巳及是諸酋專以為笑具於舟中取一村婦至亭中使薦劉寢據劉之交坐諸酋又嗾婦抱劉以為戲衣冠掃地殊不可忍則堂尤憤疾云甘心賣國罪滔天酒後猖狂詐作顛把酒逢迎酋虜笑從頭罵坐數時賢賈落得稱呼浪子劉樽前百媚佞旃裘當年鮑老不如此留遠亭前犬也羞劉平江府豫過吳門感念悽愴向使朝命不令入衛嚴速豫以死守不死於是即至今存可也豫托病卧舟中舊吏三五人來遺民聞吾經過無不垂涕者舟到一時頃即解纜夜行九十里北似防我云樓臺俯舟楫城郭滿干戈故吏歸心少遺民出涕多鳩居無鵲在魚網有鴻過使遂雎陽志安危今若何無錫巳未豫携弟璧赴廷對嘗從長江入裏河趍京口回首十八年復由此路是行驅之入北感今懷昔悲不自勝金山冉冉波濤雨錫水泯泯草木春二十年前曽去路三千里外作行人英雄未死心為碎父老相逢鼻欲辛夜讀程嬰存趙事一回惆悵一沾巾吊五木豫初以朝廷遣張全將淮兵二千救常州以其為淮將必經歷老成遂遣朱華將三千人從之張全無統馭之材自為畦町十月二十六日提淮軍自往橫林設伏虞橋北兵至麻士龍死之張全不救走回五木五木乃朱華軍所駐如掘溝塹設鹿角張全皆不許朱華措置殊不曉其意二十七日北兵薄朱華自辰至未朱華與廣軍與之對北兵自路塘直來死於水者不可勝計至晚北兵繞山後薄贑軍尹玉當之曽全胡遇謝雲曽玉先遁走尹玉死焉張提軍隔岸不發一矢有利灾樂禍之心吾軍渡水挽張全軍船張全令諸軍斷挽船者之指於是溺死者甚衆張全并宵遁惟尹玉殘軍五百人與北兵角一夕殺北兵及馬委積田間質明止有四人得歸無一人降者嗚呼使此戰張全稍施援手可以大勝捷一夫無意而事遂關宗社嗚呼天哉余初欲先斬張全然後取一時敗將並從軍法以張全為朝廷所遣請於都督乃宥張全使自贖豫遂不及行法後詣餘杭發京師姑取曽全以狥衆而噬臍多矣過五木吊戰場為之流涕不可禦續聞張全者淮東之僨將也昨隨許文德復清河兵巳入城張全鳴金散衆許不敢以斬將自專解赴制閫李公以使過期之得不死豫不知受其誤其免罪又出於第二次僥幸卒為降北可歎恨云首赴勤王役成功事則天富平名委地好水淚成川我作招魂想誰為掩骼緣中興須再舉寄語慰重泉哭尹玉尹玉江西憲司將官五木之戰手殺七八十人其麾下與北兵戰併死無一降者朝廷贈濠州團練使立廟與二子官承節郎下江西安撫使撥賜良田二百畝其間以捕冦死者何限惟玉得其死所恤典非細哀榮備焉團練濠州廟贑川官其二子賜良田西臺捕逐多亡將還有焚黃到墓前常州常州宋睢陽郡也北兵憤其堅守殺戮無遺種死者忠義之鬼哀哉山河千里在煙火一家無壯甚睢陽守冤哉馬邑屠蒼天如可問赤子果何辜唇齒提封舊撫膺三嘆吁鎮江至京口豫以十八年曽自鎮江趍京今自京趍鎮江俯仰感嘆為之流涕鐡甕山河舊金甌宇宙非昔隨西日上今見北軍飛豪傑非無志功名自有機中流懷士稚風雨濕雙扉渡瓜洲諸祈請使十八日至鎮江府阿术在瓜洲即請十九日渡江至則鮮腆倨傲令人裂眦諸公皆與之語豫始終無言後得之監守者云阿术言文丞相不語肚裏有僂儸彼知吾不心服也跨江半壁閲千帆虎在深山龍在潭當日本為南制北如今翻𬒳北持南眼前風景異山河無奈諸君笑語何坐上有人正愁絶胡兒便道是僂儸吊戰場連年淮水上死者亂如麻魂魄丘中土英雄糞上花士知忠厥主人亦念其家夷德無厭甚皇天定福華回京口豫回京口幸得間問舟為脫去計連日不如志賦是詩早作田文去終無蘇武留偷生寧伏劍忍死欲焚舟逸驥思超乘飛鷹志脫鞲登樓望江上日日數行艘思小村劉春雲慘慘兮春水漫漫思我故人兮行路難君轅以南兮我轅以北去日以逺兮憂不可以終極蹇豫馬兮江臯式燕兮以遊遨念我平生兮思君鬱陶在師中兮豈造次之可離忠言不聞兮思君忸怩毫釐之差兮天壤易位駟不及舌兮臍不可噬思我故人兮懷我親懷我親兮思故人懷哉懷哉不可忍兮不如速死慨百年之未半兮胡中道而遄止魯連子兮義不帝秦負元德兮羽不名為人委骨草莾兮時乃天命自古孰無死兮首丘為正我行我行兮夢寐所思故人望我兮胡不歸胡不歸沈頥家豫回京口北人欵之府中豫不得離岸上得沈頥家坐卧北不意豫為逃計也孤舟霜月逈曉起入柴門斷岸行簮影荒畦落履㾗江山渾在眼宇宙付無言昨夜三更夢春風滿故園卷之三脫京口二月二十九日夜豫自京口城中間道出江滸登舟泝金山走真州其艱難萬狀各以詩記之定計難豫在京城外日夜謀脫不得間者謝村幾去至平江欲逃又不果至鎮江謀益急議趍真州杜架閣滸與帳前將官余元慶實與謀元慶真州人也杜架閣與豫云事集萬萬幸不幸謀泄皆當死死有怨乎豫指心自誓云死靡悔且辦匙首挾以俱事不濟自殺杜架閣亦請以死自效於計遂定南北人人苦泣岐壯心萬折誓東歸若非斫案判生死夜半何人敢突圍謀人難杜架閣如顛狂人醉游於市遇有言本朝而感憤追思者即捐金與之密告以欲遁之謀無不願自效以無舟而輟前後母慮十數其不謀泄真幸耳一片歸心似亂雲逢人時漏話三分當時若也私謀泄春夢悠悠郭璞墳踏路難京口無城通衢多隘去江向十里偶得一老校馬引間道出三數巷即荒凉野走至江岸路頗近若使不知間道只行市井正路無可出之理煙火連甍鐡甕關要尋間道走江干何人肯為將軍地北府老兵思漢官得船難北船滿江百姓無一舟可問杜架閣與人為謀皆以無船長嘆而止是後余元慶遇其故舊為北管船遂密叩之許以承宣使銀千兩其人云吾為宋救得一丞相回建大功業何以錢為但求批帖為他日趍承之證後授以一批帖約除廉車及強委之白金義人哉使吾無此一遭遇巳矣經營十日苦無舟慘慘椎心淚血流漁父疑為神物遣相逢楊子大江頭紿北難自至鎮江即謀船不可得至二月二十九日方得之喜甚是午催過瓜洲賈餘慶諸人皆渡矣惟豫與吳丞相在河次得報最遲於是托故以來日同吳丞相渡江幸而北不見疑驅迫稍緩是夕遂逃若非得此一紿從前經營皆枉用心惟有死耳豈不痛哉百計經營夜負舟倉皇誰趣渡瓜洲若非紿虜成宵遁哭死界河天地愁定變難老兵即踏路之人杜架閣日與之飮顔情甚狎是夜逃者十二人二人坐舟猶有十人作一陳走恐出門大冗則事易知覺路必過老兵之門於是遣三人先就老兵家伺過門同遁忽老兵中變醉不省其妻詰問之欲喚四鄰發覺一人亟走報杜架閣亟呼老兵出來直至吾前藏之帳中三人者同時而回老兵酒醒以銀三百星係其腰云事至與之遂至二更引路而行是舉垂成幾為老兵老嫗所誤全得杜閣機警故徂詐之將作敵者又隨作使耳危哉危哉老兵中變意差池倉卒呼來朽索危若使阿婆真一吼目生隨後悔何追出門難北始欵諸宰執於鎮江府惟吳丞相以病不離舟豫為遁計宿府治一夕即托故還裏河舟中北亦不之疑豫遂於河近得沈頥家坐卧初北分遣諸酋監諸宰執從豫者曰王千戶狠突可惡相隨上下不離頃刻豫在沈頥家彼亦同卧席前後是夜豫醉居亭主人復醉王千戶者伺其寢熟啓門而出使微有知覺吾事殆哉羅剎盈庭夜色寒人家燈火半䦨珊夢回跳出鐡門限世上一重人鬼關出巷難北遣兵齪巷禁夜不得往來先是有一酋忽入沈頥家豫問何人劉百戶問何職管夜禁問官勾當何如曰官燈提照往來從便杜架閣聞之即隨劉百戶出強與之好巳而約為兄弟拉之飮于妓舍杜強劉宿劉俾杜歡杜云我隨丞相在此夜安置後方可出怕禁夜耳唵送爾燈唵送小畨隨著不妨事杜遂約後歹果如約豫變服色隨杜出諸巷皆不呵問杜至人家漸盡處即以銀與小畨約之便歸來日候于某所小畨方十五六歲無知於是得遁不時徇鋪路縱橫小隊戎衣自出城天假漢兒燈一炬旁人只道是官行出隘難北於市井盡處設險以十餘馬攔路豫等至隘所馬驚意甚恐幸北軍皆睡因得脫䄂携匙首學銜枚橫渡城關馬欲猜夜靜天昏人影散北軍鼾睡正如雷候船難豫先遣二校坐舟中密約侍豫甘露寺下及至船不知所在意窘甚交謂船巳失約奈何豫携匕首不忍自殘甚不得巳有投水耳余元慶褰裳涉水尋一二里許方得船至各稽首以更生為賀待船三五立江干眼欲穿時夜漸闌若使長年期不至江流便作汨羅看上江難豫既登舟意泝流直上他無事矣乃不知江岸皆北船連亘數十里鳴梆唱更氣𦦨甚盛吾船不得巳皆從北船邉經過幸而無問者至七里江忽有巡者喝云是何船稍答以河魨船巡者大呼云歹船歹者北以是名反側奸細之稱巡者欲經船前適潮退閣淺不能至是時舟中皆流汗其不來僥幸耳蒙衝兩岸夾長川鼠伏孤蓬棹向前七里江邉驚一喝天教潮退閣巡船得風難豫方為七里巡船所驚忽有聲如人哨齒甚清麗船稍立船頭拜且禱曰神道來送問何神曰江河田相公也即得順風送上空中哨響到孤蓬盡道江河田相公神物自來扶正直中流半夜一帆風望城難初得順風意五更可逹真州城下風良久遂靜天明尚隔真州二十余里深恐北船自後追躡又懼有哨騎在淮岸一時憂迫不可言在舟之人盡力搖槳撑篙可牽處㳂岸拽纜然心急而力不逮既望見城又不克進甚矣脫虎口之難自來百里半九十望見城頭路愈長薄命只愁追者至人人搖槳渡滄浪上岸難真州濠與江通然潮長舟方可到城是日泊五里遂上岸城外荒凉寂無人影四平如掌一無關防幸而及城門無他慮當行路時盻盻回首惟恐有追騎之猝至既入城門聞昨日早晨哨焉正到五里頭時三月朔云岸行五里入真州城外荒荒鬼也愁忽聽路人嗟嘆說昨朝哨馬到江頭入城難既至真州城下問者群望告以文丞相在鎮江走脫徑來投奔城子諸將校皆出即延入城苗守迎見語國事移時感憤流涕即欵之州治中住清邉堂然後從者之始至也引至直司搜身上軍器既知無他然後見信其䦕防之嚴密如此向使恐疑橫於胸中閉門不受天地茫茫何所歸嘻危哉輕身漂泊入鑾江太守欣然為避堂若使閉城呼不應人間生死路茫茫真州雜賦豫既脫虎口至真州喜幸感嘆靡所不有各係之以七言自正月二十羈縻北營至二月二十九一夜京口得脫首尾恰四十日一入真州忽見中國衣冠如流浪人乍歸故鄉不意重覩天日至此四十羲娥落虎狼今朝騎馬入真陽山川莫道非吾土一見衣冠是故鄉豫入真州聚觀者夾道如堵東坡云𬒳天津橋上人看殺久無此境界矣聚觀夾道捲紅樓奪得南朝一狀頭將謂燕人騎屋看而今馬首向真州京口船與稍人北人皆有籍豫所得船乃並緣北船販私鹽者船與二水手皆籍所不及豫是以得濟豈非天哉賣却私鹽一舸回天教壯士果安排子胥流向江南去我獨倉皇夜走淮豫以夜遁北人來早方覺而吾巳在汶上矣便把長江作界河負舟半夜泝煙波明朝方覺田文去追騎如雲可奈何豫逃之明日北人大索民間纍南人甚多然豫逝矣不可得矣十二男兒夜出關曉來到處捉南冠博浪力士猶難覔要覔張良更是難三月朔旦豫在真州城內賈餘慶在瓜洲皆淮境也而南北分焉哀哉我作朱金沙上游諸君冠蓋渡瓜洲淮雲一片不相隔南北死生分路頭諸宰執自京城陷後無復逺略北人之驅去皆俯首從之莫有謀自拔者豫犯死逃歸萬一有及國事志亦烈矣公卿北去共低眉世事興亡付不知不是謀歸全趙璧東南那箇是男兒天下趙豫至真苗守再成為豫言近有樵人破一樹樹中有生成三字曰天下趙亟取木視之果然木一丈二尺圍其字青而深半樹解楊州半樹留真州三字瞭然不可磨也以此知我朝中興天必將全復故疆真州號迎鑾藝祖發迹于此非在天之靈所為乎皇王著姓復炎圖此是中興受命符獨向迎鑾呈瑞字為言藝祖有靈無議紏合兩淮復興豫至真州守將苗再成不知朝信於是數月矣問豫京師事慷慨激烈不覺流涕巳而諸將校諸幕皆來俱憤北不自堪兩淮兵力足以復興惜天使李公怯不敢進而夏老與淮東薄有嫌隙不得合從得丞相來通兩淮脉絡不出一月連兵大舉先去北巢之在淮者江南可傳檄定也豫問苗守計安出苗云先約夏老以兵出江邉如向建康之狀以牽制之此則以通泰軍義打灣頭以高郵淮安寶應軍義打楊子橋以楊州大軍向瓜洲某與趙刺史孟錦以舟師直搗鎮江並同日舉北不能相救灣頭楊子橋皆㳂江脆兵守之且怨北王師至即下聚而攻瓜洲之三靣再成則自江中一靣薄之雖有智者不能為之謀此䇿既就然後淮東軍至京口淮西軍入金城北在兩浙無路得出虜帥可生致也豫喜不自制不圗中興機㑹在此即作李公書次作夏老書苗各以覆帖副之及欲豫致書戎帥及諸郡并白此意豫已作朱渙姜才蒙亨等書諸郡將以次發時與議者皆勇躍有謂李不能自拔者又有謂朱渙姜才各做起來李不自由者又有謂李恨不得脫重負何幸有重臣輔之豫既遣書盻盻焉望報天之欲平治天下則吾言庶幾不枘鑿乎清邉堂上老將軍南望天家雨濕巾為道兩淮兵定出相公同作㰱盟人楊州兵了約廬州某向瓜洲某鷺州直下南徐侯自管皇親刺史統千舟南八空歸唐壘陷包胥一出楚疆還而今廟社存亡决只看元戎進退間出真州豫既為李制所逐出真州艱難萬狀不可殫紀痛哉豫至真州第三日苗守約云早食後看城子豫欣然諾之有頃陸都統來導豫至小西門城上間看未幾王都統至迤邐出城外王忽云有人在揚州供得丞相不好出制司小引視之乃脫回人供北中所見云有一丞相差往真州賺城王執右語不使豫見豫方歎惋間二都統忽鞭馬入城小西門閉矣不復得入倣徨城外不知死所早約戎裝去看城聯鑣壕上歎風塵誰知關出西門外憔悴世間無告人制使遣一提舉官至真州疑豫為北用苗守二於豫云决無宰相得脫之理縱得脫亦無十二人得同來之理何不以矢石擊之乃開城門放之使入意使苗守殺豫以自明哀哉楊州昨夜有人來誤把忠良按劍猜怪道使君無見解城門前日不應開制使欲殺我苗守不能芘將信將疑而憐之之意多也瓊花堂上意茫然志士忠臣淚徹泉賴有使君知義者人方欲殺我猶憐豫幸脫身至真州即議紏帥兩淮以圖恢復制使乃疑豫為北用欲見殺江南與北中皆知豫為忠義而兩淮不豫信豫平生仕宦聲迹比比不曽至淮天地茫茫與誰語哉秦庭痛哭血成川翻訝中行背可鞭南北共知忠義苦平生只少兩淮緣豫少時曽遊真州至是十八年矣初望紏合復興為國家辦大事乃不為制臣所容天乎哀哉一别迎鑾十八秋重來意氣落旄頭平山老子不收拾南望端門淚雨流始見制臣小引備脫回人朱匙二等供云有一丞相住真州賺城豫頗疑北有智數見豫逃後遣人詐入楊州供吐以行反間既而思之楊州遣提舉官來真州見害乃三月初二日午前發豫以二月晦夕逃朔旦北方覺然不知走何處是日使遣人詐入楊州殆無此理看來只是吾書與苗守覆帖初二日早到制使不暇深省一槩以為奸細而欲殺之哀哉何不審之甚乎天地沉沉夜泝舟鬼神未覺走何州明朝遣間應無是莫恐死戎逐客不豫在門外久之忽有二人來曰義兵頭目張路分徐路分也豫告以故二人云安撫傳語差某二人來送看相公去那裏豫云必不得巳惟有去楊州見李相公路分云安撫謂淮東不可往豫謂夏老素不識且淮西無歸路豫委命於天只往楊州二路分云且行且行良久有五十人弓箭刀劍來隨二路分騎馬以二馬從豫豫與杜架閣連㘘而發人人爭勸走淮西莫犯翁翁按劍疑我問平山堂下路忠臣見詘有天知豫在小西門外皇皇無告同行杜架閣仰天呼號幾赴壕死從者皆無人色莫知所為豫進不得入城城外不測有兵露立荒逈又乏飲食豫心自念豈豫死於是乎為之踟蹰心膂如割後得二路分送行苗守又遣衣𬒳包復等來還遂之楊州是日上巳日也千金犯險脫旃裘誰料南冠反見讐記取小西門外事年年上巳哭江頭二路分引豫行數里猶望見真州城五十兵忽齪刀於野駐足不行豫自後至二路請下馬云有事啇量景色可駭豫下馬問云啇量何事云行幾步行稍逺又云且坐且坐豫意其殺我於此矣與之立談二路分云今日之事非苗安撫意乃制使遣人欲殺丞相安撫不忍加害故遣某二人來送行今欲何往豫云只往楊州更何往彼云楊州殺丞相奈何曰莫管信命去二路分云安撫今送往淮西豫云淮西對建康太平池州江州皆北所在無路可歸只欲見李制使若能信我尚欲連兵以圖恢復否則即從通州路遵海還闕二路分云李制使巳不容不如只在諸山寨中少避豫云做什麼合煞生則生死則死决於楊州城下耳二路分云安撫見辦船在岸下丞相從江行或歸南歸北皆可豫驚曰是何言歟如此則安撫亦疑我矣二路分見豫辭真確乃云安撫亦疑信之間令某二人便冝從事某見相公一箇恁麼人口口是忠臣某如何敢殺相公既真箇去楊州某等部送去乃知苗守亦主張不過實使二路分覘豫語言趍向而後為之處使一時應酬不當𬒳害原野誰復知之痛哉痛哉時舉所携銀一百五十兩與五十兵且許以至楊州又以十兩二路分則許以分賜金百兩遂行荒郊下馬問何之死活元來任便宜不是白兵生眼孔一團冤血有誰知二路分既信豫忠義與豫中路言真州備判司行下有安民榜云文相公巳從小西門外押出州界去訖為之嗟嘆不巳嗚呼豫之不幸乃至於斯其不死於兵豈非天哉戎衣嘖嘖嘆忠臣為說城頭不識人押出相公州界去真州城裏榜安民杜架閣幾赴壕以救免一行人皆謂當死於真州城下矣後得二路分送行惟恐有北哨追之危哉危哉有客倉皇欲赴壕一行性命等鴻毛白兵送我楊州去惟恐北軍來捉逃二路分所引路乃淮西路既見豫堅欲往楊州遂復取楊州路時天色漸晚張弓挾矢一路甚憂疑指處瓜洲也又前某處楊子橋也相距不逺既暮所行皆北境惟恐北遣人伏路上寂如銜枚使所過北有數騎在焉吾等不可逃矣瓜洲相望隔山椒煙樹光中楊子橋夜靜銜枚莫輕語草間惟恐有鴟鶚是日行至暮二路分先辭只留二十人送楊州二十人者又行十數里勒取白金亦辭去不可挽楊州有販鬻者以馬載物夜竊行於途白馬垜子二十人者但令隨馬垜子即至楊州西門豫一行如肓悵悵然行嗚呼客路之危難如此真州送駿巳回城暗裏依隨馬垜行一陳西州三十里摘星樓下打初更至楊州豫至楊州城下進退維谷其倣徨狼狽之狀以詩志其槩豫夜行銜枚至楊州西門憊甚有三十郎廟僅存墻階屋無矣一行人皆枕藉於地時巳三鼓風寒露濕悽苦不可道此廟何神三十郎問郎行客􅑯琅璫荒階枕籍無人問風露滿堂清夜長楊州城中打四更一行人遂入近城西門坐漫地上候啓門者無慮百數城上問何人從他人應答豫等莫敢語恐聲音不同即眼生隨後譙鼓􅕣􅕣入四更行行三五入西城隔壕喝問無人應怕恐人來捉眼生豫出真州實無所往不得巳趍楊州猶翼制臣之或見諒也既至城下風露凄然聞鼓角有殺伐聲倣徨無以處悵悵乾坤靡所之平山風露夜何其翁翁豈有甘心事何故高樓鼓角悲制臣之命真州也欲見殺若叩楊州門恐以矢石相加城外去楊子橋甚近不測又有哨進退不可城上兜鍪按劍看四郊胡騎繞團團平生不解楊朱泣到此方知進退難杜架閣以為制臣欲殺我不如早尋一所逃哨一日却夜趍高郵求至通州渡海歸江南或見二主伸報國之志徒死城下無益吾戴吾頭向廣陵仰天無告可憐生爭如負命投東海猶㑹乘風近玉京金路分謂出門便是哨五六百里而後至通州何以能逹與其為此受苦而死不如死於楊州城下不失為死於南且猶意使臣之或者不殺也海雲渺渺楚天頭滿路胡塵不自由若使一朝俘上去不如制命死楊州豫方未知所進退余元慶引一賣柴人至云相公有福相公有福問能導至高沙否曰能曰何處可暫避一日曰儂家可曰此去幾里曰二三十里曰有哨否曰數日不一至曰今日哨至如何曰看福如何耳路傍邂逅賣柴人為說高沙可問津此去儂家三十里山坳聊可避風塵豫從金之說恐制臣見殺從杜之說恐北騎見捕莫知所决時曉色漸分去數步則金一邉來牽住回數步則杜一邉又來拖行事之難從違未有如此之甚者且行且止正依違髣佛長空曙影微從者倉皇心緒急各持議論泣牽衣同行通十二人行止未决余元慶李茂吳亮蕭發遽生叛心所懷白金各一百五十星上下竟携以走問誰攫去槖中金僮僕雙雙不可尋折節從今交國士死生一片歲寒心豫危急中隨行四人皆負而逃外既顛隮內又饑困行數十步喘甚不能進倒荒草中扶起又行如此數十而天曉矣顛崖一陷落千尋奴僕偏生負主心饑火相煎疲欲絶滿山荒草曉沉沉豫不得巳去楊州城下隨賣柴人趍其家而天色漸明行不能進至十五里頭半山有土圍一所舊是民居毀蕩之餘無椽瓦其間馬糞堆積時惟恐北有望髙者見一隊人行即來追逐只得入此土圍中暫避為謀拙甚聽死生於天矣戴星欲赴野人家曙色紛紛路愈賒倉卒只從山半住頽垣上有白雲遮既入土圍中四山閴然無一人影時無米可飯有米亦無煙火可炊懷金無救也哀哉路逢敗屋作雞棲白屋荒荒鬼哭悲䄂有金錢無米糴假饒有米亦無炊土圍糞穢不可避但掃净數人地以所携衣服貼襯地面睡起復坐坐起復睡日長難過情緒奄奄哀哉掃退蜣蜋枕敗墻一朝何止九回腸睡餘捫風沉沉坐偏覺人間白晝長北法惟午前出哨午後各歸若是日起程至午後􅌚曰今日得命矣忽聞人聲喧啾甚自壁窺之乃北騎數千自東而西於是追咎不死於揚州城下而𬒳捉於此苦矣苦矣時大風忽起黑雲暴興數點微雨下山色昏冥若有神功來救助也飄零無緒嘆途窮搔首踟蹰日巳中何處人聲似潮沂黑雲驟起滿山風數千騎隨山而行正從土圍後過一行人無復人色傍壁深坐恐門外得見若一騎入來即無噍類矣時門前馬足與箭筒之聲歷落在耳只隔一壁幸而風雨大作騎只徑去危哉危哉哀哉哀哉晝䦨萬騎忽東行鼠伏荒村命羽輕隔壁但聞風雨過人人顧影賀更生豫與杜架閣及金應張慶夏仲吕武王青鄒捷共八人在土圍中時巳過午謂哨不來山下一里有古廟廟中有丐婦居之廟前有并遂遣吕武鄒捷下山汲水意或可以得米菜少救饑餓不料哨至二人首𬒳獲二人解所腰白金近三百兩悉以與之比受金得不殺及哨過二人方回相向哀泣又幸性命之苟全青衣山下汲荒泉道遇腥風走不前向晚歸來號且哭胡兒只為解腰纒早從賣柴人行不能前遂至於土圍中約賣柴人入城糴米救性命云不奈何忍饑一日城中衙晡後方開門米至則黃昏矣是日北數百騎薄西城於是門不開賣柴人竟不得出豫等饑窘失措又以土圍中露天不可睡卧於是下山投古廟中與丐婦人同居焉眼穿只候賣柴回今日堡城門不開糴米巳無消息至黃昏惆悵下山來既至廟中坐未定忽有人携挺至良久三四人陸續來吾意不免矣乃知其人自城中來夜討柴來早入城赴賣無惡意也數人煮糝羔出其餘以遺我有未冠者一夕於庭中燒火照明諸樵亦不睡豫等且困且睡是不可言既投古廟覔藜羔三五樵夫不識名僮子似知豫夢惡生柴燒火到天明豫等饑甚樵者飲食輒乞其餘破廟何所風露凄然僅存身猶不自保哀哉苦作江頭乞食翁一層破廟五更風眼前境界身何許始悟人間萬法空豫見諸樵夫幸而可與語告以患難厚許之使導往高沙賴其欣然見從謂此處不是高沙路方駐堡城北門賈家庒少駐一日却為入城糴米買肉以救兩日之饑又顧馬辦乾糧以備行役於是五更隨諸樵夫往焉時樵夫知豫無聊又有所携使萌不肖心得財豈不多於所許淮人依本分感激豈亦有天意行其間乎樵夫偏念客途長肯向城中為褁糧䁱指高沙移處泊司徒廟下賈家庒賈家庒豫初五日隨三樵夫黎明至賈家庒止土圍中卧近糞壤風露凄然時枵腹巳經兩夕一日半懇三樵夫入城糴米買肉至午而得食是夜顧馬趍高沙行邉無鳥雀卧處有腥臊露打鬚眉硬風搜顴頰高流離外顛沛饑渴內煎熬多少偷生者孤臣嘆所遭楊州地分官初五至晚地分官五騎咆哮而來揮刀欲擊人凶𦦨甚於北亟出濡沫方免毒手急令離地分去告以入城云入城必𬒳殺幸而脫北方之難不意困折於我土地天地雖大無所容身哀哉五騎馳來號徼巡咆哮按劍一何嗔金錢買命方無語何必豺狼罵北人便當縞素駕戎車畏賊何當畏虎如看取摘星樓咫尺可憐城下哭包胥思則堂先生初四日豫在桂公塘北騎數千東行莫知其故賈家庒有樵夫云昨夜北營甘泉西去城四十里有白鬚老子設青罣罳飯於救生寺竈前稱南朝相公問其何如曰靣大而體肥以意逆之則堂家先生也因知昨日北驅奉使北去與其所掠老小輜重偕行豫雖不免顛踣道路較諸先生不以彼易此也先生嘗云某四十􅒑行規步今日乃有此厄流涕二十八字白鬚老子宿招提香積厨邉供晚炊借問魚羔何處少北風安得似南枝高沙道中豫雇騎夜趍高沙越四十里至板橋迷失道一夕行田畈巾不知東西風露滿身人馬饑乏旦行霧中不相辨須臾四山漸明忽隱隱見北騎道有竹林亟入避須臾二十餘騎繞林呼噪虞候張慶右眼內中一箭項二刀割其髻祼于地帳兵王青縛去杜架閣與金應林中𬒳獲出所携黃金賂邏者得免豫藏處距杜架閣不遠北馬入林過吾傍三四皆不見不自意得全僕夫鄒揵卧叢蓧下馬過踏其足流血總轄吕武親隨夏仲散避他所是役也豫自分必死當其急時萬竅怒號雜亂人聲北倉卒不盡得疑有神明相之馬既去聞其有焚林之謀亟趍對山復尋叢篁以自蔽既不識路又乏糧食人生窮蹙無以加此未幾呂武報北騎巳還灣頭又知路邉鮎魚埧傳聞不盡信然他無活䇿黽勉趍去僥幸萬一倉皇匍匐不能行先是自楊州來有引路三人牽馬三人至是或執或逃僅存其二二人出於無聊各操挺相隨有無禮之志逡巡行路無可奈何至晚西忽遇樵者數人如佛下降偶得一籮以繩維之坐於籮中雇六夫更迭負送馳至高郵城西天巳曉不得渡常恐追騎之奄至也宿陳氏店以茅覆地忍饑而卧黎明過渡而心始安痛定思痛其涕如雨三月初五日索馬平山邉疾馳趍高沙如走阪上圎夜行二百里望望無人煙迷途呼不應如在盤中旋昏霧腥且濕怒颷狂欲顛流澌在鬚髮塵洙滿槖鞬紅日高十丈方辨山與川胡行疾如鬼忽在林之巔誰家苦竹園其葉青戔戔倉皇伏幽篠生死信天緣鐡騎俄四合鳥落無虛弦繞林勢奔軼動地聲喧闐霜蹄破叢翳出入相貫穿既無遁形術又非縮地仙猛虎驅群羊兔魚落蹄筌一吏射中目頸血僅可濺一隸縛上馬無路脫紏纒一厮􅏳其足吞聲以自全一賔與一從買命得金錢一伻與一校幸不逢戈鋋嗟豫何薄命寄身空且懸蕭肅數竹側往來度飛韉遊鋒幾及膚怒興空握拳跬步偶不見殘息忽復延當其蹙迫時大風起四邉意者相其間神物來蜿蜒更生不自意如病乍得痊須臾傳火攻然眉復相煎一行輒一跌奔命度平田幽篁便自托仰天坐且眠晴曦正當晝焦腸火生咽斷罌汲勺水天降甘露鮮青山為我屋白雲為我椽彼草何荒荒彼水何潺潺首陽既無食隂陵不可前便如失目魚一似無足蚿不見道傍骨委積有萬千魂魄親蠅蚋膏脂飽烏鳶使我先朝露其事亦復然丈夫竟如此吁嗟彼蒼天古人擇所安肯蹈不測淵奈何以遺體糞土同棄捐初學蘇子卿終慕魯仲連為我王室故持此金石堅自古皆有死義不汚腥羶求仁而得仁寧怨溝壑填秦客載張祿吳人納伍員季布走在魯樊期托於燕國士急人病倜儻何拘孿彼人莫我知此恨付重泉鵲聲從何來忽有吉語傳此去三五里古道方平平行人漸復出胡馬覺巳還回首下山阿七人相牽連東野御巳窮而復加之鞭跰足如移山携持姑勉旃行行重狼顧常恐追騎先楊州二游手面目輕且儇自言同脫虜波波口流涎白日各持挺其來何翩翩奴輩殊無聊似欲為鷹鸇逡巡不得避默默同寒蟬道逢採樵子中流得舟船竹畚當安車六夫共赬肩四肢與百骸屈曲如杯棬路人心為惻從者皆涕漣星奔不可止暮逹城西阡饑卧野人廬藉草為針氊詰朝從東渡始覺安且便人生豈無難此難何迍邅重險復重險今年定何年聖世基岱嶽皇風扇垓埏中興奮王業日月光重宣報國臣有志悔往不可湔臣苦不如死一死尚可憐堂上大夫人鬢髮今猶玄江南昔卜宅嶺右今受㕓首丘義皇皇倚門望惓惓波濤避江介風雨行淮堧北海轉萬折南洋泝孤騫周游大夫蠡放浪大史遷倘復游吾盤終當耕我綿夫人生於世致命各有權慷慨為烈士從容為聖賢稽首望南拜著此泣血篇百年尚哀痛敢謂事巳遄北以高郵米擔濟維揚故自灣頭夜遣騎截諸津鮎魚􅄵其一豫是夜若非迷途四更可逹􅄵所當一網無遺乃知一夕倉皇失道亦若有鬼神鼓動於其間顛沛之餘雖幸不死何辜至此極也至高沙豫倉皇至高沙驚魂靡定回思初四土圍中初二竹林裏幾死於是使果不免委骨草莾誰復知之江南自好築金臺何事風花墮向淮若使兩遭豺虎手而今玉也有誰埋豫至高沙奸細之禁甚嚴時豫以籮為轎見者憐之又張慶血流滿靣衣衫皆汚人皆知其為遇北不復以奸細疑然聞制使有文字報諸郡有以丞相來賺城令覺察關防於是不敢入城急買舟去發高沙曉發高沙卧一航平沙漠漠水茫茫舟人為指荒烟岸南北今年幾戰場平淮千里莾為丘墟自出高沙滿空䁧高郵水與灣頭通下海陵入射陽過漣水皆其路也二月六日城子河一戰我師大捷人指某處是戰場城子河邉委亂尸河隂血肉更稀微大行南北燕山外多少遊魂逐馬蹄自至城子河積尸盈野水中流尸無數臭穢不可當上下幾二十里無間斷乃北以二月六日載奉使栁嶽洪雷震併輜重俱北稽家莊擊其前高郵擊其腰北大喪敗柳嶽死焉洪雷震今在高郵見說北入江淮惟此戰我師大勝一日經行白骨堆中流失柁為心摧海陵棹子長狼顧水有船來步馬來是日經行戰場四顧閴然棹人心恙長恐灣頭有人出來又恐岸上有馬來趕正荒急間偶然柂拆整柂良久危哉險哉小泊稽莊月正弦莊官驚問是何船今朝哨馬灣頭出正在青山大路邉自高郵至稽家莊方有一團人家以水為寨統制官稽聳其子德潤請鄉舉其姪昌其館客莆田人林希驥字千里林孔時字願學皆鋭意於事功者稽設醴甚至云今早報灣頭馬出到城子河邉不與之相遇公福人也為之嗟嘆不置願學同德潤送豫至泰州稽莊即事乃心王室故日夜奔南征蹈險寧追悔懷忠莫見明鴈聲連水逺山色與天平枉作窮途哭男兒付死生泰州豫至海陵問程趍通州凡三百里河道北與冦出沒其間真畏途也羈臣家萬里天目鍳孤忠心在坤維外身游坎窞中長淮行不斷苦海望無窮晚鵲傳佳好通州路已通卜神通州三百里茅葦也還無胡騎虎出沒山鼯鬼嘯呼王陽懷畏道阮籍淚窮途人物中興骨神明為國扶旅懷北去通州號畏途固應孝子為回車海陵若也容羈客謄買菰蒲且寄居天地雖寬靡所容長淮誰是主人翁江南父老還相念只缺一帆東海風昨夜分明夢到家飄颻依舊客天涯故園門掩東風老無限杜䳌啼落花懷則堂實堂二先生於豫厚豫之惓惓於二先生知二先生亦惓惓於豫也白頭北使駕雙韉沙闊天長淚曉煙中夜想應發深省故人南北地行仙貴卿貴卿與豫同患難自二月晦至今日無日不與死為鄰平生交游舉目何在貴卿真吾異姓兄弟也天高併地逈與子獨牢愁初作燕齊客今為淮海游半生誰俯仰一死共沉浮我視君年長相看比惠州惠州豫弟璧也憶大夫人三生命孤苦萬里路酸辛屢險不一險無身復有身不忘聖天子幾負大夫人定省今何處新來夢寐頻即事痛哭辭京闕微行訪海門久無雞可聽新有虱堪捫白髮應多長蒼頭少有存但令身未死隨力報乾坤紀間九十春光好周流人鬼關人情輕似土世路險於山俯仰經行處死生談笑間近時最難得旬日海陵間聲苦萬死奔波落一生飄零淮海命何輕近來學得趙清獻呌苦時時數十聲即事船隻時間鎖城孤日閉關驚心常有馬極目奈無山出路相傳險行􅌩愈覺慳歸心風絮亂無奈一身間發海陵自二月十一日海陵登舟連日候伴問占苦不如意㑹通州六交自維揚回有弓箭可仗遂以孤舟於二十一日早徑發十里驚傳馬在塘灣亟回晚乃解纜前途吉凶未可知也自海陵來向海安分明如渡鬼門關若將九折回車看倦鳥何年可得還聞馬二十一夜宿白蒲下十里忽五更通州下文字馳舟而過報吾舟云馬來來於是速張帆去荒迫不可言二十三日幸逹城西門鎖外越一日聞吾舟過海安未逺即有馬至縣使吾舟遲發一時頃巳為囚虜矣危哉過海安來奈若何舟人去後馬臨河若非神物扶忠直世上未應僥幸多如臯如臯縣隸有泰州朱省二者受北命為宰率其民桔道路豫不知而過之既有聞為之驚嘆雄狐假虎之林臯河水腥風接海濤行客不知身世險一窗春夢送輕舠聞諜豫既不為制鉞所容行至通州得諜者云鎮江府走了文相公許浦一路有馬來捉聞之悚然為賦此北來追騎滿江濵那更元戎按劍嗔不是神明扶正直淮頭何處可安身哭金路分應金應以筆札往來吾門二十年性烈而知義不為下流去年從豫勤王𥙷兩武資今春時授承信郎東南第六正將贑州駐劄及豫使北轉三官授江南西路兵馬都監贑州駐劄豫之北行也人情莫不觀望僚從皆散雖親僕亦逃去惟應上下相隨更歷險難奔波數千里以為當然蓋委身以從死生休戚俱為一人者至通州住十餘日矣閏月五日忽伏枕命醫三四熱病增劇至十一日午氣絶豫哭之痛其斂也以隨身衣服其棺如常翌日葬西門雪窖邉棺之上排七小釘又以一小板片覆於七釘之上以為記不敢求備者邉城無主恐貽身後之禍異時遇便取其骨歸葬廬陵而後死者之目可閉也傷哉傷哉為賦二詩焚其墓前我為吾君役而從乃主行險夷寧異趣休戚與同情遇賊能無死尋醫劇不生通州一丘土相望淚如傾明朝吾渡海汝魄在它鄉六七年華短三千客路長招魂情黯黯歸骨事茫茫有子應年長平生不汝忘卷之四懷楊通州江波無奈暮雲隂一片朝宗只此心今日海頭覔船去始知百煉是精金喚渡江沙眼欲枯羈臣中道落﨑嶇乘船不管千金購漁父真成大丈夫范叔西來變姓名綈𫀆曽感故人情而今未識春風靣傾蓋江湖話一生仲連義不帝西秦拔宅逃來住海濵我亦東尋煙霧去扶桑影裏看金輪海船海船與江船不同自狄難以來從淮入浙者必由海而通為孔道也由是海船發盡適三月間方有台州三薑船至巳為曹大監鎮所雇通州有下文字自定回張少保恰豫之以一船亦是三月方到岸而豫適來楊守遂以此舟送豫與曹大監俱南向使有薑船而無張少保一舟豫不能行有張少保而無薑船豫又無伴不我先後適有邂殆神施鬼設而至也海上多時斷去舟公來容易渡南州子胥江上逢漁父莫是神明遣汝否發通州豫萬死一生得至通州幸有海船以濟閏月十七日發城下十八日宿石港同行有曹大監鎮兩舟徐新班廣壽一舟舟中之人有識豫者孤舟漸漸脫長淮星斗當空月照懷今夜分明棲海角未應便道是天涯白骨叢中過一春東將入海避風塵姓名變盡形容改猶有天涯相識人淮水淮山阻且長孤臣性命寄何鄉只從海上尋歸路便是當年不死方石港王陽真畏道季路漸知津山鳥喚醒客海風吹黑人乾坤萬里夢烟雨一年春起看扶桑曉紅黃六六鱗賣魚灣賣魚灣去石港十五里許是日曹大監膠舟候潮方能退風起千灣浪潮生萬頃沙春紅堆蟹子晚白結鹽花故國何時訊扁舟到處家狼山青兩點極目是天涯即事宿賣魚灣海潮至漁人隨潮而上買魚者邀而即之魚甚平飄蓬一葉落天涯潮濺青紗日未斜好事官人無勾當呼童上岸買青蝦北海口淮海本東海地於東中云南洋北洋北洋入山東南洋入江南人趍江南而經北洋者以楊子江中渚沙為北所用故經道於此復轉而南蓋遼繞數千里云滄海人間别一天只容漁父釣蒼煙而今蜃起樓臺處亦有北來蕃漢船出海二十一夜宿宋家林泰州界二十二日出海洋極目皆水水外惟天大哉觀乎一團蕩漾水晶盤四畔青天作護䦨著我扁舟了無礙分明便作混淪看水天一色玉空明便似乘槎上大清我愛東坡南海句兹游竒絶冠平生漁舟二十八日乘風行入通州海門界午拋泊避潮忽有十八舟上風冉冉而來疑為暴客四船戒嚴未幾交語而退是役也非應對足以禦侮即為魚矣危乎殆哉一陳飛帆破碧烟兒郎驚餌理弓弦舟中自信婁師德海上誰知魯仲連初謂悠揚真賊艦後聞欵乃是漁船人生漂泊多磨折何日山林清晝眠楊子江自通州至楊子江口兩潮可到為避渚沙及許浦顧諸從行者故繞去出北海然後渡楊子江幾日隨風北海游回從楊子大江頭臣心一片鎡針石不指南方不肯休使風渺渺茫茫逺愈微乘風日夜趂東歸半醒半困模糊處一似醉中騎馬飛蘇州洋一葉漂搖楊子江白雲盡處是蘇洋便如伍子當年苦只少行頭寶劍裝過楊子江心大海中一條自楊子江直上淡者是此乃長江盡處橫約百二十里吾舟乘風過之一時即醎水渺渺乘風出海門一行淡水帶潮渾長江盡處還如此何日眠山看發源入浙東金鰲山在台州界高宗皇帝曽􅋈舟于此寺藏御書四明既陷不知天台存亡憂心如搗見於此詩厄運一百日危機九十遭孤蹤落虎口薄命付鴻毛漠漠長淮路茫茫巨海濤驚魂猶未定消息問金鰲夜潮雨惡風獰夜色濃潮頭如屋打孤蓬漂零行路丹心苦夢裏一聲何處鴻亂礁洋自北海渡楊子江至蘇州洋其間最難得山僅得蛇山洋山大小山數山而巳自入浙東山漸多入亂礁洋青翠萬叠如畫圗中在洋中者或髙或低或大或小與水相擊觸竒怪不可名狀其在兩傍者如岸上山叢山實則皆在海中非有畔際是日風小浪微舟行石間天巧捷出令人應接不暇殆神仙國也孤憤愁絶中為之心廣目明是行為不虛云海山仙子國邂逅寄孤蓬萬象畫圖裏千崖玉界中風搖春浪軟礁激暮潮雄雲氣東南密龍騰上碧空夜走舟入東海報者云前有賊船行十數里報如前望見十餘舟張帆噢口意甚惡梢人亟取靈山巖路避之一夕搖船極其荒迫際曉幸得脫去鯨波萬里送歸舟倐忽驚心欲白頭何處赭衣操劍㦸同時黃帽理兜䥐人間風雨真成夢夜半江山總是愁鴈蕩雙峯片雲隔明朝躡屩作清游緑漪堂豫自海舟登台岸至城門張氏家蓋國初名將永德之後主人號哲齊闢堂教子扁緑漪為賦八句義方堂上看窗戶翠玲瓏硯裏雲壇月席間洪水風清聲隨地到宜莭與天通庭玉森如笋干霄雨露功過黃巖豫至淮即變姓名及天台境哲齊張為豫覔緣漪詩豫既賦題云清江劉洙書此過黃巖寄二十字魏雎變張祿越蠡改陶朱誰料文山氏姓劉名是洙至溫州萬里風霜鬢巳絲飄零回首壯心悲羅浮山下雪來未楊子江心月照誰秪謂虎頭非貴相不圖羝乳有歸期乘潮一到中川寺暗讀中興第二碑長溪道中和張自山韻潮風連地吼江雨帶天流宫殿扄春仗衣冠鎖月遊傷心今北府遺恨古東洲王氣如川至龍興海上州東州常州也夜靜吳歌咽春深蜀血流向來蘇武節今日子長游海角雲為岸江心石作洲丈夫竟何事底用泣神州和自山去年豫陷北自山自京寄詩時豫巳南歸不及領今明成誦追和作彼時語痛定思痛痛不可當春晚傷為客月明思見君我方慕蘇武誰復從田文龍背夾紅日鴈聲連白雲琶琵漢宫曲馬上不堪聞林附祖林附祖福州秀才去年三月四日在無錫道中忽為數酋擒去指為文相公云你門年四十頭戴笠身著𫀆腳穿黑靴文書上載了你門如何不是縛至京口辨驗然後得釋附祖名元龍至南劍為豫言畫影圖形正捕風書生薄命入罝中胡兒一似冬烘眼錯認顔標作魯公呈小村豫自劍進汀小村過清流來迎不圖此生復相見萬里飄零命羽輕歸來喜有故人迎雷潜九地聲元在月暗千山魄再明疑是倉公回巳死恍如羊祜說前生夜䦨相對真成夢清酒浩歌雙劍橫二月晦元年二月晦豫從鎮江脫北難險阻艱難于今再見仲春下浣追感墮淚八句塞上明妃馬江頭漁父船新讐誰共雪舊夢不堪圓遺恨常千古浮生又一年何時暮春者還我浴沂天有感呈景山校書諸丈北風吹春草陽烏日巳至天時豈云爽人事胡乃異三月方皇皇衣冠道如墜棟撓榱桷折木顛楨幹悴大者懷端憂燋頭求室燬小者嗟行役泥塗跋其尾長平與新安露胔如櫛比賦分本爾殊適與天時值哲人處明夷致命以遂志但令守吾貞死生浩無愧即事去年傷北使今日嘆南馳雲濕山如動天低雨欲垂征夫行未巳游子去何之正好王師出崆峒麥熟時所懷世途嗟孔棘行役苦期頻良馬比君子清風來故人相看千里月空負一年春便有桃源路吾當少避秦自嘆草宿披宵露松餐立晚風亂離嗟我在艱苦有誰同祖逖關河志程嬰社稷功身謀百年事宇宙浩無窮𥙷遺題蘇武忠節圖有序余在京口城外日夜求脫不得間謝村去平江欲逃又不果至鎮江事益急議趣真州余杜密謀杜云事濟萬幸不幸謀泄當死死有怨乎余指心自誓云死靡悔且辦匙首事懼不濟挾以自殺杜云亦請以死自效於是計遂定既至真州城下問者群至告以余在鎮江走脫城子諸校皆出既延入城苗守遂見語國事移時感慨流涕即往住清邉堂時從亡者始至也引至直司搜身上所藏軍器既無他然後見信防間嚴密如此向使一疑字橫於胸中閉門不納天地茫茫何所歸宿嘻其危哉苗守䄂出李龍眠畫漢蘇武忠節圗求余詠題撫卷凄凉浩氣憤發使人慷慨激烈有去國思君之念矣遂賦三詩書于卷後時丙子三月二日也文天祥執筆于清邉堂之寓舍忽報忠圗紀歲華東風吹淚落天涯蘇卿更有歸時國老相兼無去後家烈士喪元心不易逹人知命事何嗟生平愛覽忠臣傳不為吾身亦陷車獨伴羝羊海上遊相逢血淚向天流忠真巳向生前定老節須從死後休不死未論生可喜雖生何恨死堪憂甘心賣國人何處曽識蘇公義膽不漠漠愁雲海戍迷十年何事望京師李陵罪在偷生日蘇武功成未死時鐡石心存無鏡變君臣義重與天期縱饒夜久胡塵黑百煉丹心涅不緇文山先生全集卷之十三終
