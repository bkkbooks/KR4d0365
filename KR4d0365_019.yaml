body:
  text: 文天祥傳宋史文天祥字宋瑞又字履善吉之吉水人也體貌豐偉美晢如玉秀眉而長目顧盻燁然自為童子時見學宫所祠鄉先生歐陽修楊邦乂胡銓像皆諡忠節欣然慕之曰沒不爼豆其間非夫也年二十舉進士對䇿集英殿時理宗在位久政理浸怠天祥以法天不息為對其言萬餘不為稿一揮而成帝親擢為第一考官王應麟奏曰是卷古誼若龜鑑忠肝如鐵石臣敢為得人賀尋丁父憂歸開慶初大元兵伐宋宦官董宋臣説上遷都人莫敢議其非者天祥時入為寧海軍節度判官上書乞斬宋臣以一人心不報即自免歸後稍遷至刑部郎官宋臣復入為都知天祥又上書極言其罪亦不報出守瑞州改江西提刑遷尚書左司郎官纍為臺臣論罷除軍器監兼權直學士院賈似道稱病乞致仕以要君有詔不允天祥當制誥皆諷似道時內制相承皆呈稿天祥不呈稿似道不樂使臺臣張志立劾罷之天祥既數斥援錢若水例致仕時年三十七咸淳九年起為湖南提刑因見故相江萬里萬里素竒天祥志節語及國事愀然曰吾老矣觀天時人事當有變吾閲人多矣世道之責其在君乎君其勉之十年改知贑州德祐初江上報急詔天下勤王天祥捧詔涕泣使陳繼周發郡中豪傑并結溪洞蠻使方興召吉州兵諸豪傑皆應有衆萬人事聞以江西提刑安撫使召入衛其友止之曰今大兵三道鼓行破郊畿薄內地君以烏合萬餘赴之是何異驅群羊而摶猛虎天祥曰吾亦知其然也第國家養育臣庶三百餘年一旦有急徴天下兵無一人一騎入關者吾深恨於此故不自量力而以身徇之庶天下忠臣義士將有聞風而起者義勝者謀立人衆者功濟如此則社稷猶可保也天祥性豪華平生自奉甚厚聲伎滿前至是痛自貶損盡以家資為軍費每與賔佐語及時事輒流涕撫几言曰樂人之樂者憂人之憂食人之食者死人之事八月天祥提兵至臨安除知平江府時以丞相宜中未還朝不遣十月宜中至始遣之朝議方擢吕師孟為兵部尚書封吕文德和義郡王欲賴以求好師孟益偃蹇自肆天祥陛辭上疏言朝廷姑息牽制之意多奮發剛斷之義少乞斬師孟釁鼓以作將士之氣且言宋懲五季之亂削藩鎮建郡邑一時雖足以矯尾大之弊然國亦以寖弱故敵至一州則破一州至一縣則破一縣中原陸沈痛悔何及今宜分天下為四鎮建都督統御於其中以廣西益湖南而建閫於長沙以廣東益江西而建閫於隆興以福建益江東而建閫於番陽以淮西益淮東而建閫於楊州責長沙取鄂隆興取蘄黃番陽取江東楊州取兩淮使其地大力衆足以抗敵約日齊奮有進無退日夜以圖之彼備多力分疲於奔命而吾民之豪傑者又伺間出於其中如此則敵不難却也時議以天祥論闊逺書奏不報十月天祥入平江大元兵已發金陵入常州矣天祥遣其將朱華尹玉麻士龍與張全援常至虞橋士龍戰死朱華以廣軍戰五牧敗績玉軍亦敗爭渡水挽全軍舟全軍斷其指皆溺死玉以殘兵五百人夜戰比旦皆沒全不發一矢走歸大元兵破常州入獨松關宜中夢炎召天祥棄平江守餘杭明年正月除知臨安府未幾宋降宜中世傑皆去仍除天祥樞密使尋除右丞相兼樞密使使如軍中請和與大元丞相伯顔抗論臯亭山丞相怒拘之偕左丞相吳堅右丞相賈餘慶知樞密院事謝堂簽書樞密院事家鉉翁同簽書樞密院事劉岊北至鎮江天祥與其客杜滸十二人夜亡入真州苗再成出迎喜且泣曰兩淮兵足以興復特二閫小隙不能合從耳天祥問計將安出再成曰今先約淮西兵趨建康彼必悉力以扞吾西兵指揮東諸將以通泰兵攻灣頭以髙郵寶應淮安兵攻楊子橋以揚兵攻瓜步吾以舟師直搗鎮江同日大舉灣頭楊子橋皆沿江脆兵且日夜望我師之至攻之即下合攻瓜步之三靣吾自江中一靣薄之雖有智者不能為之謀矣瓜步既舉以東兵入京口西兵入金陵要浙歸路其大帥可坐致也天祥大稱善即以書遺二制置遣使四出約結天祥未至時揚有脫歸兵言密遣一丞相入真州説降矣庭芝信之以為天祥來説降也使再成亟殺之再成不忍紿天祥出相城壘以制司文示之閉之門外久之復遣二路分覘天祥來説降者即殺之二路分與天祥語見其忠義亦不忍殺以兵二十人道之揚四鼓抵城下聞候門者談制置司下令傋文丞相甚急衆相顧吐舌乃東入海道遇兵伏環堵中得免然亦飢莫能起從樵者乞得餘糝羔行入板橋兵又至衆走伏叢篠中兵入索之執杜滸金應而去虞候張慶矢中目身𬒳二創天祥偶不見獲滸應解所懷金與卒獲免募二樵者以簣荷天祥至高郵泛海至溫州聞益王未立乃上表勸進以觀文殿學士侍讀召至福拜右丞相尋與宜中等議不合七月乃以同都督出江西遂行收兵入汀州十月遣參謀趙時賞咨議趙孟濚將一軍取寧都參贊吳浚將一軍取雩都劉洙蕭明哲陳子敬皆自江西起兵來會鄒㵯以招諭副使聚兵寧都大元兵攻之㵯兵敗同起事者劉欽鞠華叔顔斯立顔起巖皆死武岡教授羅開禮起兵復永豐縣巳而兵敗𬒳執死於獄天祥聞開禮死製服哭之哀至元十四年正月大元兵入汀州天祥遂移漳州乞入衛時賞孟濚亦提兵歸獨浚兵不至未幾浚降來説天祥天祥縛浚縊殺之四月入梅州都統王福錢漢英跋扈斬以徇五月出江西入會昌六月入興國縣七月遣參謀張汴監軍趙時賞趙孟濚等盛兵薄贑城鄒㵯以贑諸縣兵搗於求豐其副黎貴逹以吉諸縣兵攻泰和吉八縣復其半惟贑不下臨洪諸郡皆送𣢾潭趙璠張虎張唐熊桂劉斗元吳希奭陳子全王夢應起兵邵永間復數縣撫州何時等皆起兵應天祥分寧武寧建昌三縣豪傑皆遣人如軍中受約束江西宣慰使李恆遣兵援贑州而自將兵攻天祥于興國天祥不意恆兵猝至乃引兵走即鄒􅘶于永豐􅘶兵先潰恆窮追天祥方石嶺鞏信拒戰箭𬒳體死之至空坑軍士皆潰天祥妻妾子女皆見執時賞坐肩輿後兵問謂誰時賞曰我姓文衆以為天祥禽之而歸天祥以此得逸去孫􅙫彭震龍張汴死於兵繆朝宗自縊死吳文炳林楝劉洙皆𬒳執歸隆興時賞奮罵不屈有係纍至者輒麾去云小小簽廳官耳執此何為由是脫者甚衆臨刑洙頗自辨時賞叱曰死耳何必然於是棟文炳蕭敬夫蕭燾夫皆不免天祥收殘兵奔循州駐南嶺黎貴逹潛謀降執而殺之至元十五年三月進屯麗江浦六月入船澳益王殂衛王繼立天祥上表自劾乞入朝不許八月加天祥少保信國公軍中疫且起兵士死者數百人天祥惟一子與其母皆死十一月進趍潮陽縣潮州盜陳懿劉興數叛附為潮人害天祥攻走懿執興誅之十二月趨南嶺鄒􅘶劉子俊又自江西起兵來再攻懿黨懿乃潛道元帥張弘範兵濟潮陽天祥方飯五坡嶺張弘範兵突至衆不及戰皆䪺首伏草莾天祥倉皇出走千戶王惟義前執之天祥吞腦子不死鄒􅘶自剄衆扶入南嶺死官屬士卒得脫空坑者至是劉子俊陳龍復蕭明哲蕭資皆死杜滸𬒳執以憂死惟趙孟濚遁張唐熊桂吳希奭陳子全兵敗𬒳獲俱死焉唐廣漢張拭後也天祥至潮陽見弘範左右命之拜不拜弘範遂以客禮見之與俱入崖山使為書招張世傑天祥曰吾不能救父母乃教人叛父母可乎索之固乃書所過零丁洋詩與之其末有云人生自古誰無死留取丹心照汗青弘範笑而置之崖山破軍中置酒大會弘範曰國亡丞相忠孝盡矣能改心以事宋者事皇上將不失為宰相也天祥泫然出涕曰國亡不能救為人臣者死有餘罪况敢逃其死而二其心乎弘範義之遣使護送天祥至京師天祥在道不食八日不死即復食至燕館人供張甚盛天祥不寢處坐逹旦遂移兵馬司設卒以守之時世祖皇帝多求才南官王績翁言南人無如天祥者遂遣績翁諭旨天祥曰國亡吾分一死矣儻緣寬假得以黃冠歸故鄉他日以方外備顧問可也若遽官之非直亡國之大夫不可以圖存舉其平生而盡棄之將焉用我績翁欲合宋官謝昌元等十人請釋天祥為道士留夢炎不可曰天祥出復號召江南置吾十人於何地事遂巳天祥在燕凡三年上知天祥終不屈也與宰相議釋之有以天祥起兵江西事為言者不果釋至元十九年有閩僧言土星犯帝座疑有變未幾中山有狂人自稱宋主有兵千人欲取文丞相京城亦有匿名書言某日燒蓑城葦率兩翼兵為亂丞相可無憂者時盜新殺左丞相阿合馬命撤城葦遷瀛國公及宋宗室開平疑丞相者天祥也召入諭之曰汝何願天祥對曰天祥受宋恩為宰相安事二姓願賜之一死足矣然猶不忍遽麾之退言者力贊從天祥之請從之俄有詔使止之天祥死矣天祥臨刑殊從容謂吏卒曰吾事畢矣南鄉拜而死數日其妻歐陽氏收其尸靣如生年四十七其衣帶中有贊曰孔曰成仁孟曰取義惟其義盡所以仁至讀聖賢書所學何事而今而後庶幾無愧論曰自古志士欲信大義於天下者不以成敗利鈍動其心君子命之曰仁以其合天理之正即人心之安爾啇之衰周有代德孟津之師不期而會者八百國伯夷叔齊以兩男子欲扣馬而止之三尺童子知其不可他日孔子賢之則曰求仁而得仁宋至德祐亡矣文天祥往來兵間初欲以口舌存之事既無成奉兩孱王﨑嶇嶺海以圖興復兵敗身執我世祖皇帝以天地有容之量既壯其節又惜其才留之數年如虎兕在柙百計馴之終不可得觀其從容伏質就死如歸是其所欲有甚於生者可不謂之仁哉宋三百餘年取士之科莫盛於進士進士莫盛於倫魁自天祥死世之好為高論者謂科目不足以得偉人豈其然乎文丞相傳廬陵劉嶽申撰文丞相天祥字履善吉州廬陵人也父儀鄉稱長者大父時用夢兒乘紫雲下巳復上而丞相生故名雲孫字天祥英姿雋爽目光如電稍長遊鄉校見歐陽文忠公楊忠襄公胡忠簡公周文忠公楊文節公祠像慨然曰沒不爼豆其間非夫也寶祐乙卯年二十以字貢廷對置第五理宗親擢第一尋丁父憂服除授承事郎僉書寧海軍節度判官廳公事時江上有警吳潛再相內都知董宋臣主遷幸議天祥上書乞斬董宋臣以一人心安社稷請效方鎮建守就團結抽兵破資格用人書奏不報自免歸以前職改鎮南軍不拜乞祠得主管建昌軍仙都觀除祕書省正字兼景獻府教授進校書郎著作郎兼權刑部郎官董宋臣復為都知上疏極論不報出守瑞州召為禮部郎官尋除江西提刑伯祖母梁夫人卒夫人其父本生母也即日解官終喪除尚左郎官兼學士院權直兼國史院編修官實録院檢討官臺臣奏免尋除福建提刑臺臣復奏寢改知寧國府民歌舞之為立生祠除軍器監兼右司尋兼崇政殿説書兼學士院權直兼玉牒所檢討官平章賈似道乞致仕有要君意學士院降詔裁責以義賈意不滿除祕書監臺臣迎合賈意奏免除湖南運判臺臣復奏寢始闢文山於其鄉窮山水之樂除湖南提刑平邵永巨寇道路肅清見故相江公萬里於長沙公曰吾老矣觀天時人事必當有變世道之責其在君乎君必勉之是冬乞便郡養親移知贑州明年為德祐元年乙亥至元十二年也正月朔牒報元帥渡江詔諸路勤王奉詔起兵二月似道魯港師潰除右文殿修撰樞密副都承旨江西安撫副使兼知贑州尋兼江西提刑進集英殿修撰江西安撫使加權兵部侍郎丁祖母劉氏夫人憂葬夫人而起復命下纍疏乞終制不許仍趣兵移洪初左相王爚主天祥遷擢屢趣天祥入衛與右相陳宜中不合爚引嫌去國京學生上書訟宜中沮天祥事宜中出關留夢炎代相夢炎素厚宜中又黨江西制置黃萬石至是夢炎奏萬石入衛以天祥移屯於洪經略九江萬石隂與吕師夔通自洪退屯置司撫州有旨趣天祥入衛天祥以兵二萬至衢州除權工部尚書兼都督府參贊軍事至臨安兩月纍奏乞終喪又奏古有墨衰從戎無墨衰登要津者乞仍樞密副都承旨江西安撫使領兵國門皆不許除浙西江東制置使兼江西安撫大使兼知平江府留不遣天祥請分東南為四鎮而以都督統御其中時朝廷方遣吕師孟奉使師孟偃蹇傲朝廷天祥乞斬師孟釁鼓不報常州巳急始遣天祥就戍尋除端明殿學士宜中遣張全將淮兵二千援常州天祥遣朱華將廣贑兵三千從之全自提兵設伏於虞橋麻士龍死之而全不援元師薄華軍廣軍多死於水又薄贑軍尹玉獨當其鋒曽全等皆遁張全擁軍隔河不發一矢華軍渡水者爭挽全軍船全令諸軍盡斷其指軍多溺死全宵遁尹玉孤軍五百人皆殊死戰玉死之及明得脫者四人無一人降者天祥欲斬張全督府竟宥之獨斬曽全以徇奏贈尹玉團練使立廟死所官其二子常州破攻獨松關急夢炎宜中陳文龍議棄平江趣天祥移守餘杭天祥未決兩府劄再至遣環衛王邦傑留平江天祥去平江三日通判王舉之與邦傑開門迎降天祥進資政殿學士浙西江東制置大使兼江西安撫大使置屯餘杭守獨松關未幾夢炎遁明年正月除知臨安府不拜以輕兵赴闕始從天祥初議送吉王信王閩廣大臣日請三宫渡江太皇大后不允天祥請以福王或沂王判臨安以繫人望身為少尹以輔之有急密移三宫當以死衛社稷議不合少保張世傑宿重兵於六和塔又請自將京師義士二十萬與城內外軍數萬人背城借一以戰為守世傑不許十八日伯顔至髙亭山距臨安三十里宜中遣使絡釋講解伯顔邀宜中相見宜中許之而遁明日世傑亦遁除天祥樞密使又除右丞相兼樞密不拜使者至上下震恐莫知所為有旨令天祥詣軍前遂以資政殿學士行因説伯顔曰宋承帝王正統非遼金比今北朝將欲為與國乎將毀其宗社乎若以為與國則宜退兵平江或嘉興然後議歲幣與金帛犒師天祥躬督所議悉輸軍前北朝完師以還此為不戰而全勝䇿之上也若欲毀其宗社則兩淮兩浙閩廣尚多未下窮兵取之利鈍未可知假能盡取豪傑並起兵連禍結必自此始伯顔初以危言折之天祥謂宋狀元宰相所欠一死報國耳宋存與存宋亡與亡刀鋸在前鼎鑊在後非所懼也何怖我為伯顔改容因謝曰前日巳遣程鵬飛詣宋太皇太后簾前親聽處分候鵬飛至即與丞相定議明日左丞相吳堅右丞相賈餘慶同知樞密院事謝堂僉書樞密院事家鉉翁同僉書樞密院事劉岊與吕師孟奉降表至伯顔引天祥同坐堅等各就車歸獨留天祥不遣天祥大罵賈餘慶賣國且責伯顔失信吕文煥從旁慰解之天祥斥言叛逆遺孽當用春秋誅亂賊法文煥謂丞相何故以逆賊見罵天祥曰國家不幸至今日汝為罪魁非逆賊而何三尺童子猶斥罵汝獨我乎文煥曰守襄陽七年不救是以至此天祥曰吕氏一門父子兄弟受國厚恩不幸勢窮挼絶以死報國可也豈有降理汝自愛身惜妻子壞家聲今汝合族為逆矣尚何言文煥慚恚師孟忿怒云丞相今日何不殺師孟天祥謂汝叔姪賣降恨朝廷失刑不族滅汝汝今日能殺我得為大宋忠臣足矣豈懼死哉師孟語塞伯顔聞之吐舌云男子男子然自是益留之不復遣還矣賈餘慶歸令學士院詔天下州郡歸附放還天祥所部勤王義士西歸其渡浙歸閩者惟方興朱華鄒􅘶張抃數人耳二月八日伯顔趣天祥隨祈請使吳堅賈餘慶北行天台杜滸從至京口留十日杜滸與余元慶定計謀趨真州不可得舟元慶遇故舊許以白金千兩求之其人云吾為大宋脫一丞相事成豈止白金千兩哉竟得舟二月二十九日也是午促過瓜洲賈餘慶等巳渡天祥辭以明日同吳丞相渡以是夕逃幸得至真州城下三月朔日也守將苗再成迎宿時真州不知京城消息巳數月聞天祥至無不感憤流涕者諸將皆謂兩淮兵力足以興復恨李制置與淮西夏老不能合從得丞相通兩閫脈絡不出一月連兵大舉江南可傳檄定也天祥問再成計將安出再成為言灣頭楊子橋守者皆沿江脆兵今以通泰軍攻灣頭以高郵寶應淮安軍攻楊子橋以揚州兵向瓜洲再成與刺史趙孟綿以舟師直搗鎮江同日大舉彼軍勢不能相救護以灣頭楊子橋合兵攻瓜州之三面再成自江中一面薄之雖有智者不能為之謀矣然後以淮東軍入京口淮西軍入金陵兩浙無出路其大帥可生致也天祥喜甚即為書李庭芝夏貴庭芝得書反疑丞相無得脫理罪真州不當納之遣官諭再成亟殺天祥以自白再成不忍殺三日紿天祥出視城壕使王陸二都統導之出示以制司文書謂丞相為説城天祥方驚嘆而兩都統鞭馬入城門巳閉矣杜滸赴城壕欲死有張徐二路分自言苗安撫遣送丞相惟丞相所向天祥云今惟往揚州夏老不相識淮西又無歸路委命於天惟往揚州久之有弓刀五十人至張徐各就騎以二騎從天祥天祥與杜滸連騎行數里張徐請下馬天祥既下云且行既行云且坐坐久立談張徐云制使欲殺丞相安撫不忍故遣某二人送行今丞相安往天祥云只往揚州張徐云楊州欲殺丞相不可往天祥云無可奈何今只欲見李制置自白此心庶幾見信共圗恢復否則從通州遵海歸行朝張徐云安撫巳具船令從丞相江行歸南歸北皆可天祥云如此則安撫亦疑我矣張徐方吐實云安撫猶在疑信之間令某二人便宜從事某見丞相忠義如此何敢加害既決欲往揚州當相送是日暮張徐先辭去留二十人從行頃之二十人亦去明日至揚州杜滸謂制使既不相容必且死於城門不如且避哨以夜趍高郵至通州渡海歸江南見二王與徒死城下萬萬不侔金應又謂出門即有哨此去通州尚五百里何由而逹與其死於彼不如死揚州且猶兾未必死天祥計未決而從行者四人巳負腰金逃矣不得巳去揚州城下避哨土圍糞穢中忽數千騎過其後至賈家庒巳兩日不得食又迫巡徼者夜迷失道幸得至髙郵而制司命下關防説城愈急遂不敢入城過城子河至海陵過海安如臯舟與追騎常相距危不免者數矣至通州適牒報鎮江大索文丞相十日且以三千騎追亡於滸浦始釋制司前疑得海舟渡揚子江入蘇州洋展轉四明天台以四月八日至溫州益王建大元帥府於福州天祥上書勸進始以五月朔即位福安改元景炎以觀文殿學士召天祥二十六日行至都門除右丞相時樞密使陳宜中副使張世傑用事丞相具貟天祥辭不拜以樞密使同都督諸路軍馬發行都出南劒號召天下十月趨汀州遣督參趙時賞督咨趙孟濚復寧都督贊吳浚復雩都天祥移屯漳州龍巖縣未幾浚㗸唆都命來招降遂殺浚以定衆志時唆都與左丞阿刺罕參政董某既入閩李珏王積翁以福建宣慰招撫使各致書天祥天祥復書候見老母即從先帝地下無可言者明年三月入梅州始與母弟妻子相見進階銀青光祿大夫四月斬統制錢漢英王福引兵自梅州出江西入會昌戰雩都大捷因開府興國督謀張抃監軍趙時賞孟濚盛兵薄贑城下招諭使鄒􅘶率贑諸縣兵搗永豐吉水招撫副使黎貴逹率吉諸縣兵復太和臨洪諸郡豪傑皆納欵淮西義士劉源以兵復黃州復壽昌軍潭州趙璠張琥撫州何時皆起義兵分寧武寧皆遣使詣軍門受約束福建斬偽天子黃從傳首至督府軍勢大振貴逹以正軍千人民兵數千次太和鍾步張抃趙時賞趙孟濚率民兵數萬逼贑遇騎卒先後衝之皆潰自相蹂藉死孟濚收殘兵保雩都督府聞鄒􅘶聚兵數萬於永豐乃引兵就之會􅘶兵亦潰元帥李恆以大軍乘其弊追及於廬陵東固之方石嶺都統制鞏信駐軍嶺上力戰箭𬒳體不動猶手殺數十人乃自投崖谷死大軍追至空坑同督府兵潰天祥幾𬒳執值山徑險隘有大石忽墜塞其路乃得脫去既而妻妾子女皆陷惟母曽夫人子道生從天祥奔汀州趙時賞吳文炳林棟劉洙皆就執張抃劉欽為亂兵所殺天祥趍循州其冬塔术吕師夔李恆以步卒入嶺唆都蒲壽庚劉深以舟師下海皆會廣州天祥駐循之南嶺黎貴逹有異志伏誅明年二月出海豐三月屯麗江涌命弟璧攻惠州五月端宗凶問至衛王改元祥興天祥奉表起居自劾罔功有詔奬諭陸秀夫當筆其略曰方敵氛之正惡鞠旅勤王及皇路之巳傾捐軀徇國脫危機於虎口涉逺道於鯨波雖成敗利鈍逆暏之未能而險阻艱難備嘗之巳熟如金百鍊而益徑如水萬折而必東天祥乞移軍入朝不許又欲入廣州時廣州新復憚天祥威重佯遣舟來迎而中道去之遂不果入六月祥興舟自䃃州回駐崖山督府纍請入覲世傑日以迎候宜中還朝為辭諸大將多忌天祥又位樞密使出巳上皆不便其人加天祥少保信國公母曽封齊魏國夫人同督府官屬各轉五資以金三百兩犒其軍天祥移書秀夫天子幼沖宰相遁荒制訓勑令出諸公口奈何不恤國事以遊辭相距耶秀夫太息而巳時督府全軍疾疫齊魏國夫人子道生相繼卒遣使宣祭起復初陳懿兄弟皆為劇盜世傑招之叛附不常潮人苦之潮士民請移行府于潮十一月進潮陽縣戮懿黨劉興時張弘範為都元帥以大軍自明秀下海以步卒自漳泉入潮天祥以聞行朝十二月十五日移屯趨海豐入南嶺鄒􅘶劉子俊以民兵𢾗千至自江西時弘範步騎尚隔海港陳懿為迎導具海舟以濟弘範既濟使其弟弘正以輕兵直指督帳二十日午天祥方飯客五坡嶺步騎奄至天祥度不得脫即取懷中腦子盡服之衆擁天祥上馬天祥急索水飲兾速得死巳乃暴下竟不死諸軍皆潰天祥見弘正於和平大罵求死越七日至潮陽踴躍請劍就死弘範必欲以禮見議相見禮天祥曰吾不能跪吾嘗見伯顔阿术惟長揖耳或曰奈何不拜天祥曰吾能死不能拜弘範亦不能強遂以長揖相見明年正月二日弘範驅天祥登海艘十日至崖山弘範索天祥為書招世傑天祥曰巳不能救父母又教人叛父母可乎愈益急索則書過零丁洋一詩示之詩末云人生自古誰無死留取丹心照汗青弘範笑而置之自此守護益謹然禮貌益隆二月六日崖山破先是陸秀夫在行朝以樞密兼宰相至是請於太妃曰臨安母子已𬒳辱殿下不宜再辱言訖即沉其妻孥冠裳抱祥興赴海太妃從之宫人巳下皆從太妃官屬將士爭蹈海死者𢾗萬人十四日弘範置酒大會諸將因舉酒從容謂天祥曰國亡矣忠孝之事盡矣丞相改心易慮以事大宋者事大元大元賢相非丞相而誰天祥流涕曰國亡不能救為人臣者死有餘罪况敢逃其死而二其心乎弘範又謂國亡矣即死誰復書之天祥謂啇亡而夷齊不食周粟亦自盡其心耳豈論書與不書弘範為改容副元帥龎鈔兒赤起行酒天祥不為禮龎鈔兒赤怒罵之天祥亦大罵請速死弘範遣使具奏天祥不屈與所以不殺狀世祖皇帝命護送天祥京師弘範遣督鎮撫石嵩護行且以崖山所得宋禮部郎官鄧光薦與俱二十二日發廣州至南安始繫頸縶足以防江西之奪者明日天祥即絶粒不食計日可首丘盧陵乃為文祭墓為詩别諸友遣人馳歸約日復命廬陵城下即瞑目長逝乃水盛風駛前一日過廬陵至豐城始知所遣人竟不得往於是不食巳八日念不得死廬陵而委命荒江志節不白始從容就義強復飮食十二日至建康囚馹中鄧光薦寓天慶觀八月二十四日天祥北行十月至燕館所供帳如上賔館人云博維丞相命也天祥義不寢處坐逹旦四日張弘範至具言不屈狀五日送兵馬司械繫空宅中十餘日解手縳又十餘日得疾十二月二日去械猶繫頸五日赴樞密院九日見慱羅丞相張平章命之跪天祥曰南人不能跪左右強之終不可問有何言天祥曰自古有興有廢帝王將相滅亡誅戮何代無之盡忠於宋所以至此今日不過死耳有何言又問天祥曰為宋丞相宋亡義當死為北朝所獲法當死何言博羅問自古常有宰相以宗廟城郭與人又遁逃去者否天祥曰為宰相而奉國以與人者賣國之臣也賣國者必不去去者必非賣國之臣前除宰相不拜本使伯顔軍前尋𬒳拘留不幸有賊臣賣國國亡當死但以度宗皇帝二子在浙東老母在廣故去之耳問德祐非君乎曰吾君也曰棄嗣君而立二王果忠臣乎曰德祐不幸失國當此之時社稷為重君為輕立君者所以為宗廟社稷計故為忠臣從懷愍而北者非忠從元帝為忠從徽欽而北者非忠從高宗為忠博羅不能詰有問晉元帝宋高宗有所受命二王何所受命且不正是篡也曰景炎乃度宗皇帝長子德祐親兄不可謂不正即位於德祐去位之後不可謂篡陳丞相以大皇大后命奉二王出宫不可謂無所受命慱羅謂汝為相能挾三宫以往可以為忠不能則與伯顔丞相一戰決勝負可以為忠天祥曰此可以責陳丞相不可以責我我此時未當國故也又問汝立二王竟成何事曰立君以存宗社臣子之責若夫成功則天也又曰既知其不可何必為曰父母有疾雖不可為無不用醫藥之理不用醫藥者非人子也天祥今日至此惟有死不在多言汝所言都不是博羅怒曰汝欲死可得快死耶死汝必不可得快天祥云得死即快何不快為博羅呼引去自是囚兵馬司者四年其為詩有指南前録三卷後録五卷集杜二百首皆有自序天下誦之其翰墨滿燕市又時時為吏士講前史忠義聞者傾動嘗褁所脫瓜齒鬚髮寄弟璧始終未嘗一食官飯上自開平還大興問南北宰相孰賢群臣皆曰北人無如耶律某南人無如文天祥上將付以大任王積翁謝昌元相率以書諭上意天祥復書云諸君義同鮑叔而天祥事異管仲管仲不死而功名顯於天下天祥不死而盡棄其平生遺臭於萬年將焉用之積翁知不能屈猶奏請釋天祥而禮之以為事君者勸上語積翁命兵馬司好與飲食天祥使人語積翁吾義不食官飯𢾗年矣今一旦飯於官吾且不食積翁始不敢言會參知政事奓木丁者嘗開省江西親見天祥出師震動每倡言不如殺之便自是上與宰相每欲釋之輒不果至元壬午十二月八日召天祥至殿中天祥長揖不拜極言宋無不道之君無可弔之民不幸母老子弱權臣誤國用舍失宜北朝用其叛將叛臣入其國都毁其宗社天祥相宋於再造之時宋亡天祥當速死不當久生上使諭之曰汝以事宋者事我即以汝為中書宰相天祥對曰天祥為宋狀無宰相宋亡惟可死不可生又使諭之曰汝不為宰相則為樞密對曰一死之外無可為者遂命之退明日有奏天祥不願歸附當如其請賜之死麥术丁力贊其決遂可其奏天祥將出獄即為絶筆自贊繫之衣帶間其詞云孔曰成仁孟云取義惟其義盡所以仁至讀聖賢書所學何事而今而後庶幾無愧過市揚揚顔色不變觀者如堵問市人孰為南北南面再拜而就死見者聞者無不流涕是日大風揚沙石晝晦咫尺不辨人城門晝閉籍兵馬司得天祥所為詩文上之天祥死時年四十有七矣南人留燕者悲歌慷慨相應和為歌更置酒酬丞相相慰藉更相自賀至有十義士者收葬於都城外初天祥既第誓不倚勢近利自祿賜所入盡以散族姻鄉友之貧者至是官籍其家蕭然方過南安時遣人告墓以弟璧之子升為嗣又寄弟詩曰親喪君自盡猶子是吾兒大德中升奉母歐陽夫人歸自豐州云贊曰文丞相以廬陵年少穆陵親擢進士第一即上書乞斬董宋臣者至再宋垂亡猶乞斬吕師孟釁鼓此豈希合苟生者賈似道沮之留夢炎嫉之宜也陳宜中張世傑亦忌之何也黃萬石嫉之何也李庭芝疑之至欲殺之又何也或謂使庭芝不疑夏貴可合事未可知豈所謂天之所廢不可興者耶方其脫京口走真揚脫真揚走三山出萬死與潮陽仰藥不死南安絶粒不死燕獄不死何異若將以有為者及得死所卒以光明俊偉暴之天下後世殆天以丞相報宋三百年待士之厚且以昌世教也而或者咎其踈闊議其無成謬矣夫非諸葛公所謂鞠躬盡瘁死而後巳者乎死之日宋亡七年崖山亡又五年矣丞相傳吉水胡廣撰宋文丞相天祥字宋瑞一字履善吉州廬陵人也父儀號革齋鄒稱長者大父時用夢兒乘紫雲下巳復上而天祥生故名雲孫字天祥英姿俊爽目光如電稍長遊鄉校見學宫祠鄉先生歐陽文忠公楊忠襄公胡忠簡公周文忠公像慨然曰沒不爼豆其間非夫也寶祐乙卯年二十舉進士對䇿集英殿時理宗在位久政理浸怠天祥以法天不息為對其言萬餘不為藁一揮而成置第五帝親擢為第一考官王應麟奏曰是卷古誼若龜鑑忠肝如鐡石臣敢為得人賀尋丁父憂歸服除授承事郎僉書寧海軍節度判官廳公事開慶初元師圍鄂江上有警左相吳潛倡遷幸議內都知蕫宋臣實主之天祥上書乞斬董宋臣以謝宗廟神靈以解中外怨怒并條陳數事一曰簡文法以立事二曰倣方鎮以建守三曰就團結以抽兵四曰破資格以用人辭旨剴切幾萬餘言書奏不報自免歸以前職改鎮南軍不拜乞祠得主管建昌軍仙都觀除祕書省正字兼景獻府教授充殿試考官進校書郎著作郎兼權刑部郎官董宋臣復入為內都知又上書極言其惡請置之罪亦不報出守瑞州召為禮部郎官尋除江西提刑伯祖母梁夫人卒夫人其父本生母也即日解官而臺臣黃萬石論以不職終喪除尚書左司郎中尋兼權直學士院兼國史院編修官實録院檢討官臺臣黃鏞奏免除福建提刑臺臣陳懋欽復奏寢新命改知寧國府以郡居上流僻塞稅務無所取辦為民害奏罷之别取郡計以輔課額民歌舞之為立生祠除軍器監兼右司尋兼崇政殿説書兼權直學士院兼玉牒所檢討官賈似道稱疾乞致仕以要君有詔不允學士院降詔裁責以義天祥當制時內制相承必先呈藁於相天祥不逆似道意諷别直院改作天祥援楊大年故事亟求解職似道勉留力丐祠束擔出國門遷祕書監似道使臺臣張志立劾罷之除湖南運判臺臣陳堅復奏寢天祥既數斥援錢若水例致仕時年三十七始闢文山於其鄉窮山水之樂咸淳九年起為湖南提刑平邵永巨寇道路肅清見故相江萬里於長沙萬里素竒天祥志節語及國事愀然曰吾老矣觀天時人事當有變吾閲人多矣世道之責其在君乎君其勉之是冬乞便郡養親十年改知贑州明年為德祐元年乙亥元至元十二年也正月朔牒報元師渡江詔諸路勤王天祥捧詔涕泣使陳繼周發郡中豪傑并結溪洞蠻使方興召吉州兵諸豪傑皆應有衆萬人事聞除右文殿修撰樞密副都承旨江西安撫副使兼知贑州尋兼江西提刑進集英殿修撰江西安撫使加權兵部侍郎丁祖母劉夫人憂葬夫人而起復命下纍疏乞終制不許仍趣兵移洪初左相王爚主天祥遷擢屢趣天祥入衛與右相陳宜中不合爚引嫌去國京學生上書訟宜中沮天祥事宜中出關留夢炎代相素厚宜中又黨江西制置黃萬石至是夢炎奏趣萬石入衛以天祥移屯隆興經略九江萬石隂與吕師夔通自隆興退屯置司撫州嗾守臣趙必岊以宜黃令趙時祕狀稱寧都連謝吳唐明戴六家義士劫樂安宜黃將至撫州申樞密院天祥言寧都六姓招募數千人駐吉州候旨入衛未嘗有一足至撫州境內守臣張皇誑惑欲沮撓勤王大計有旨責降必岊時祕趣天祥入衛其友止之曰今元軍薄郊畿君以新集之兵赴之是何異驅群羊搏猛虎天祥曰吾豈不知第國家養育臣庶三百餘年一旦有急徴天下兵無一人一騎入關者吾深恨於此故不自量力而以身徇之庶天下忠臣義士將有聞風而起者義勝者謀立人衆者功濟如此則社稷可保也天祥盡以家資為軍費每與賔佐語及時事輒流涕撫几言曰樂人之樂者憂人之憂食人之食者死人之事八月天祥提兵二萬至衢州除權工部尚書兼都督府參贊軍事至臨安朝論猶以宜中未入為嫌天祥駐兵西湖兩月纍奏乞終喪又奏古有墨衰從戎無墨衰登要津者乞仍以樞密副都承旨江西安撫副使領兵國門皆不許除浙西江東制置使兼江西安撫大使兼知平江府留不遣俟宜中至乃發朝議以吕師孟為兵部尚書封吕文德和義郡王欲賴以求好師孟益偃蹇自肆天祥上疏言朝廷姑息牽制之意多奮發剛斷之義少乞斬師孟釁鼓以作將士之氣不報常州巳急始遣天祥就戍尋除端明殿學士十月天祥入平江宜中遣使張全將淮兵二千援常州天祥遣其將朱華尹王麻士龍將廣贑兵三千從之張全以兵伏虞橋士龍戰死而全不援走回五牧以就朱華華措置守禦全不許元兵薄華軍華戰敗績張全擁軍隔河不發一矢華軍渡水者爭挽全軍船全令軍斷其指華軍多溺死元兵繞山後薄贑軍曽全等先遁張全亦宵遁尹玉獨以孤軍當其鋒人皆殊死戰所殺人馬無算玉死之及明得脫者四人無一人降者天祥欲斬張全請於督府督府竟宥之獨斬曽全以徇奏贈尹玉團練使立廟死所官其二子元師破常州屠其城進攻獨松關急留夢炎陳宜中陳文龍議棄平江趣天祥移守餘杭天祥猶豫未決兩府劄再至乃委印通判王舉之責環衛王邦傑以城守天祥去平江三日舉之邦傑開門迎降都人大駭議天祥棄平江天祥出兩府劄榜朝天門衆始定進資政殿學士浙西江東制置大使兼江西安撫大使置屯餘杭守獨松關未幾留夢炎遁明年正月除知臨安府不拜以輕兵赴闕始從天祥初議送吉王信王閩廣大臣日請三宫渡江太皇太后不允都人競為危言持車駕不欲動天祥請以福王或沂王判臨安以繫人望身為少尹以輔之有急密移三宫當以死衛社稷議不合少保張世傑宿重兵六和塔天祥又請將京師義士二十萬與城內外軍數萬人隸少保背城借一以戰為守世傑不許十八日元丞相伯顔至臯享山距臨安三十里宜中遣使絡繹講解伯顔邀宜中相見宜中許之而遁明日世傑亦遁除天祥樞密使又除右丞相兼樞密使不拜使者至上下震恐莫知所為有旨令天祥詣軍前講解遂以資政殿學士行因説伯顔曰宋承帝王正統非遼金比今北朝將欲以為與國乎將欲毀其宗社乎若以為與國則宜退兵平江或嘉興然後議歲幣金帛犒師天祥躬督所議輸軍前北朝全師以還此不戰而全勝䇿之上也若欲毀其宗社則兩淮兩浙閩廣尚多未下窮兵取之利鈍未可知假能盡取豪傑並起兵連禍結必自此始伯顔以危言拆之天祥謂宋狀元宰相所欠一死報國耳宋存與存宋亡與亡刀鋸在前鼎鑊在後非所懼也何怖我為伯顔為之改容因留天祥且曰前日巳遣程鵬飛詣宋太皇太后簾前親聽處分候鵬飛至即與丞相定議明日左丞相吳堅右丞相賈餘慶同知樞密使謝堂僉書樞密院事家鉉翁同僉書樞密院事劉岊與吕師孟奉降表至伯顔引天祥同坐堅等各就車歸獨留天祥不遣天祥大罵賈餘慶等賣國且責伯顔失信吕文煥從傍慰解之𥘉天祥上疏乞斬吕師孟斥言叛逆遺孽當用春秋誅亂賊法至是文煥謂天祥何故以逆賊見罵天祥曰國家不幸至今日汝為罪魁非逆賊而何三尺童子猶斥罵汝獨我乎文煥曰守襄陽六年不救是以至此天祥曰吕氏一門父子兄弟受國厚恩不幸勢窮援絶以死報國可也豈有降理汝自愛身惜妻子壞家聲今汝闔族為逆矣尚何言文煥慚恚師孟忿怒云丞相今日何不殺師孟天祥謂汝叔姪賣降恨朝廷失刑不族滅汝汝今日能殺我我得為大宋忠臣足矣豈懼死哉師孟語塞伯顔聞之吐舌云男子男子自是愈益留不遣賈餘慶歸令學士院詔天下歸附放還天祥所部勤王義士其渡浙歸閩者惟方興朱華鄒􅘶張抃數人耳二月八日伯顔趣天祥隨吳堅賈餘慶北行𥘉天祥將詣軍前諸客皆贊行天台杜滸獨留行諸客逐滸去至是諸客皆散惟滸從至京口留十日天祥欲引決滸與帳前余元慶定計亡趍真州舟不可得元慶遇故舊以白金千兩求之其人云吾為大宋脫一丞相事成豈止白金千兩哉強委不受竟得舟二十九日午趣過瓜州天祥辭以明日同吳丞相渡江得軀迫稍緩是夕醉主人沈氏與守者王千戶得出門又從沈氏先識巡夜者杜滸強與之飲而宿之酒樓得其官燈出巷至舟幾為邏舟所獲賴潮退彼膠淺適風便幸脫至真州城下三月朔日也守將苗再成延入城時真州不聞京師消息巳數月忽天祥至無不感憤流涕再成與諸將幕皆謂兩淮兵力足以興復恨李制置與淮西夏宣撫不能合從得丞相交通兩閫不一月間連兵大舉江南可傳檄定也天祥問再成計將安出再成言灣頭楊子橋守者皆沿江脆兵今以通泰軍攻灣頭以高郵寶應淮安軍攻楊子橋以揚州兵向瓜州再成與刺史趙孟綿以舟師直搗鎮江同日大舉彼勢不能相救復以灣頭楊子橋兵三靣合攻瓜州再成自江中一靣薄之雖有智者不能為之謀矣然後以淮東軍入京口淮西軍入金陵要兩浙歸路其大帥可生致也天祥喜甚即為書李庭芝夏貴遣使四出約結先是揚州有脫歸卒言密遣一丞相入真州説降矣庭芝得書反疑宰相併十二人無得脫理以天祥來説降罪真州開門納之諭再成遂亟殺天祥以自白再成不忍殺紿天祥出視城壕使王陸二都統導之出城示以制司文書天祥方驚嘆兩都統即鞭馬入城門巳閉矣天祥倣徨門外久之杜滸欲赴城濠死有張徐二路分自言苗安撫遣送丞相惟丞相所向天祥云今惟往揚州路分云安撫謂揚州不可往天祥云夏宣撫不相識淮西又無歸路委命於天惟往揚州久之有弓刀五十人至張徐各就騎以二騎從天祥天祥與杜滸連騎行數里張徐請下馬天祥既下又云且行既行又云且坐坐久立談張徐云制使欲殺丞相安撫不忍故遣某二人送行今丞相安往天祥云只往揚州張徐云揚州欲殺丞相丞相不可往天祥云無可奈何張徐云要送丞相往淮西天祥云淮西無路可歸今只欲見李制置自白此心庶幾見信共圗恢復否則從通州遵海歸行朝張徐云安撫巳具船今從丞相江行歸南歸北皆可天祥云如此則安撫亦疑我矣張徐方吐實云安撫猶在疑信之間令某二人便宜從事某見丞相忠義如此何敢加害既決欲往揚州當相送然猶以淮西路導之見天祥無可疑者然後導以從揚州日暮張徐先辭去留二十人從行頃之亦去明日至揚州杜滸謂制使既不相容必且死於城門矢石之下城外去楊子橋近必有哨騎不如且避哨一日以夜趍髙郵至通州渡海歸江南見二王與徒死城下萬萬不侔金應又謂出門即有哨此去通州尚五百里何由而逹與其死於途不如死楊州且猶兾未必死天祥計未決從者十二人四人巳腰金逃矣不得巳往揚州從賣薪者依其家避哨未至而天明伏土圍糞穢中忽數千騎過其後至賈家庒巳兩日不得食又迫巡徼者夜趍髙郵失道哨兵奄至伏叢條中兵入索之執杜滸金應而去虞候張慶矢中目身𬒳二創天祥偶不見獲滸應解所懷金與卒獲免募二樵者以簣荷天祥得至髙郵而制司命下關防説城愈急遂不敢入城過城子河亂尸中舟與哨相先後至海陵過海安如臯凡三百里舟與追騎常相距其間危不免者數矣至通州幾不納適牒報鎮江大索文丞相十日且以三千騎追亡於滸浦始釋制司前疑而又迫追騎賴通州守楊師亮出郊聞而館於郡衣服飲食皆其料理又得商船通楊子江入蘇州洋展轉四明天台四月八日至溫州益王建大元帥府於福州天祥奉書勸進始以五月朔即位福安改元景炎以觀文殿學士召天祥二十六日行至都門除右丞相時樞密使陳宜中副使張世傑用事丞相具貟天祥辭不拜以樞密使同都督諸路軍馬發行都出劍南號召四方十月趍汀州遣督參趙時賞督咨趙孟濚以一軍取道石城復寧都督贊吳浚以一軍屯瑞金復雩都劉洙蕭明哲陳子敬皆自江西起兵來會天祥覺汀守黃去疾有異志移屯漳州龍岩縣時賞孟濚軍還惟吳浚不至未幾浚降㗸唆都命來説天祥軍士洶洶遂殺浚以安衆心時唆都等既入閩李珏王積翁降之為福建宣撫招討使各致書天祥天祥復書候見老母即從先帝地下無可言者明年三月復梅州始與母弟妻子相見進階銀青光祿大夫都統錢漢英王福有跋扈志斬之引兵自梅州出江西入會昌戰雩都大捷因開府興國督謀張抃監軍趙時賞趙孟濚盛兵薄贑城下招諭使鄒􅘶率贑諸縣兵直搗永豐吉水招諭副使黎貴逹率吉諸縣兵復太和臨洪諸郡豪傑皆響應多遣人詣軍門受約束淮西義士劉源以兵復黃州復夀昌軍潭州趙璠張琥撫州何時皆起義兵張堂熊桂劉斗元吳希奭陳子全王夢應起兵邵永間復數縣以應天祥福建斬偽天子黃從傳首至督府軍勢大振元江西宣慰使李恆遣援贑自將兵攻天祥貴逹以軍千人民兵數千遇騎兵於太和鍾步騎兵突正軍正軍不動遽出民兵後民兵驚潰自相蹂藉死孟濚收殘兵保雩都天祥欲引會鄒􅘶於永豐會􅘶先為恆兵所敗同起事者劉欽鞠華叔顔斯立顔起崖皆死武岡教授羅開禮起兵復永豐兵敗𬒳執死天祥聞之製服哭祭之李恆乘勝追天祥及於廬陵東固之方石嶺都統制鞏信駐軍嶺上力戰箭𬒳體不動猶手殺數十百人乃自投崖谷死恆軍復追空坑天祥兵潰幾𬒳執值山徑險隘忽有大石塞其路故追兵緩不及而妻妾子女皆陷趙時賞𬒳執兵問為誰時賞曰我姓文衆以為天祥擒之歸天祥以此得逸去與母曾夫人子道生俱奔汀州吳文炳劉洙林棟皆就執各自引決不屈張汴劉欽為亂兵所殺天祥趍循州其冬元塔术吕師夔李恆以步卒入嶺唆都莆夀庚劉深以舟師下海天祥駐循之南嶺元兵圍廣州黎貴逹潛謀降斬之明年二月出海豐縣三月屯麗江涌命弟璧復惠州四月端宗凶問至衛王繼立改元祥興天祥奉表起居自劾罔功有詔奬諭陸秀夫當筆其略曰方敵氛之正惡鞠旅勤王及皇路之巳傾捐軀奉國脫危急於虎口涉逺道於鯨波雖成敗利鈍逆覩之未能而險阻艱難備嘗之巳熟如金百煉而益徑如水萬折而必東天祥乞移軍入朝不許乃移書秀夫天子沖幼宰相遁荒詔令出諸公口奈何不恤國事以遊辭相距秀夫太息而巳又欲移廣州時廣州新復憚天祥威重陽遣舟來迎而中道去不果入六月祥興帝自碙州回駐崖山天祥纍請入覲張世傑日以迎候宜中還朝為辭諸大將多忌天祥又位樞密使出巳上皆不便其入加天祥少保信國公母曾封齊魏國夫人官屬各轉五官以金三百兩犒其軍時軍皆疾疫齊魏國夫人子道生相繼卒遣使宣祭起復𥘉陳懿兄弟五人俱為劇盜世傑招之攻閩遂據潮州叛附不常潮人苦之天祥聲罪討懿懿走山寨潮士民請移行府于潮十一月進潮陽縣戮懿黨劉興明州海艘漂至潮陽得水軍二十餘人云元師張弘範以水軍自明秀下海以步卒自漳泉入潮水陸並進天祥以聞行朝十二月十五日移屯趍海豐入嶺南謀結寨據險以自固鄒􅘶劉子俊以民兵數千至自江西時弘範兵尚隔海港陳懿為鄉導具舟以濟其師弘範既濟使弟弘正以輕兵襲天祥二十日午天祥方飯客五坡嶺步騎奄至天祥度不得脫即取懷中腦子盡服之衆擁天祥上馬急索水飲兾得速死巳乃暴下竟不死鄒􅘶自剄未絶衆扶入南嶺死劉子俊陳龍復蕭明哲蕭資張鏜熊桂吳希奭陳子全俱死杜滸𬒳執以憂死惟趙孟濚遁諸軍皆潰天祥見弘正於和平大罵求死越七日至潮陽踴躍請就劍死弘範必欲以禮相見左右命之拜天祥曰吾不能拜吾嘗見伯顔阿术惟長揖耳左右曰奈何不拜天祥曰吾能死不能拜日且昃弘範度不能強即曰見伯顔臯享時吾實在傍遂以客禮長揖相見明年正月二日弘範驅天祥登海艘十日至崖山弘範索天祥為書招世傑天祥曰巳不能救父母又教人叛父母可乎愈亦急索乃書過零丁洋一詩與之末云人生自古誰無死留取丹心照汗青弘範笑而置之自此守護益謹然禮貌益隆二月六日崖山破先是陸秀夫以樞密兼宰相至是請於大妃曰臨安母子巳𬒳辱殿下不宜再辱言訖即沉其妻孥冠裳抱祥興帝赴海死太妃宫人巳下皆從之將士官屬皆蹈海死者數十萬人天祥不勝悲憤為長歌哀之十四日弘範軍中置酒大會因舉酒從容謂天祥曰國亡矣忠孝之事盡矣丞相改心易慮以事大宋者事大元大元賢相非丞相而誰天祥流涕曰國亡不能救為人臣者死有餘罪况敢逃其死以二其心乎弘範又謂國亡矣即死誰復書之天祥曰商亡夷齊不食周粟亦自盡其心耳豈論書與不書弘範為之改容副元師龎鈔兒赤起行酒天祥不為禮龎怒罵之天祥亦大罵請速死弘範遣使具奏天祥不屈與所以不殺狀世祖命送天祥至京師弘範遣都鎮撫石嵩謹護其行且以崖山所獲宋禮部即官鄧光薦與俱四月二十二日發廣州五月二十五日至南安始繫頸縶足以防江西之劫奪者即絶粒不食計日可首丘廬陵乃為文祭墓為詩别諸友遣人馳歸約六月二日復命廬陵城下即瞑目長逝乃水盛風駛前一日過廬陵至豐城始知所遣人竟不得往於是不食巳八日念不得死廬陵而委命荒江志節不白始欲從容就義強復飲食十二日至建康囚驛中鄧光薦遷寓天慶觀八月二十四日天祥北行淮士多謀劫天祥者不果十月一日至燕供張甚盛館人云慱羅丞相命也天祥義不寢處坐逹旦四日弘範至言不屈狀五日送兵馬司械繫空宅中盛設兵衛坐十餘日解手縳又十餘日得疾十一月二日去械繫頸五日赴樞密院九日始一見丞相慱羅平章弘範暨諸院官通使命之跪天祥曰南人不能跪左右力強之終不可通事問有何言天祥曰自古有興有廢帝王將相滅亡誅戮何代無之盡忠於宋所以至此今日不過死耳有何言又問更有何言天祥曰為宋丞相宋亡義當死為北朝所獲法當死何言慱羅問自古嘗有宰相以宗廟城郭土地與人又遁去者否天祥曰為宰相而奉國以與人者賣國之臣也賣國者必不去去者必非賣國之人前除宰相不拜奉使伯顔軍前尋𬒳拘留不幸有賊臣賣國國亡當死但以度宗皇帝二子在浙東老母在廣故去之耳問德祐非君乎曰吾君也曰棄嗣君而立二王果忠臣乎曰德祐不幸失國當此之時社稷為重君為輕立君者所以為宗廟社稷計故為忠臣從懷愍而北者非忠從元帝為忠從徽欽而北者非忠從高帝為忠慱羅不能詰平章以下皆笑有問晉元帝宋髙宗有所受命二王何所受命且不正是篡也天祥曰景炎乃度宗皇帝長子德祐親兄不可為不正即位於德祐去國之後不可謂篡陳丞相以太皇太后命奉二王出宫不可謂無所受命慱羅謂汝為相能挾三宫以往可以為忠不能則與伯顔丞相一戰決勝負可以為忠天祥曰此責在陳丞相我時未當國難以責我又問汝立二王竟成何事天祥曰立君以存宗社臣子之責若夫成功則天也又曰既知其不可何必為天祥曰父母有疾雖不可為無不用醫藥之理不用醫藥者非人子也文天祥今日至此惟有一死不在多言丞相所言多不是博羅怒曰汝欲死得快死耶汝死必不可得快天祥曰得死即快何不快為博羅呼獄吏引去自是囚兵馬司四年其為詩有指南前録三卷後録五卷集杜句二百首皆有自序天下誦之其翰墨滿燕市又時時為吏士講前史忠義傳聞者傾動所脫瓜齒鬚髮嘗褁寄弟妹始終未嘗一食官飯王積翁屢餉以銀物福王與芮王歎曰我家有此人耶亦以銀百兩從積翁轉致之有動舊西域人欲保任歸其家事之積翁又合宋官謝昌元程飛卿等十人謀請釋天祥為黃冠師兾得自便留夢炎私語積翁曰文公贑州移檄之志鎮江脫身之心固在也忽有妄作我輩何以自解遂不果適和禮霍孫為相引用文儒多以天祥為薦者世祖自開平還燕問南北宰相孰賢群臣皆曰北人無如耶律楚材南人無如文天祥世祖將付以大任積翁昌元以書諭上意天祥復書云諸公義同鮑叔天祥事異管仲管仲不死而功名顯於天下天祥不死而盡棄其平生遺臭於萬年將焉用之積翁知不可屈猶奏請釋天祥而禮之以為事君者勸上語積翁命兵馬司好與飲食積翁出語宰相將行之天祥使人語積翁吾義不食官飯數年矣今一旦飯於官吾且不食積翁始不敢言會麥术丁參知政事嘗聞省江西親見天祥出師震動每倡言不如殺之便上與宰相屢欲釋之輒不果會有閩僧妙䂀言土星犯帝座疑有變未幾中山有狂人薛寶住自稱宋主有兵二千人欲取文丞相投匿名書言某日欲舉事燒蓑城葦為亂丞相可無憂者群臣有言瀛國公族在燕不便時盜新殺左丞阿合馬遂命撤城葦驅瀛國公及宋宗室於開平頗疑丞相為天祥十二月𥘉七日司天臺奏三台折𥘉八日召天祥至殿中長揖不拜左右強之堅立不為動極言宋無不道之君無可弔之民不幸母老子弱權臣誤國用舍失宜北朝用其叛將叛臣入其國都毀其宗社天祥相宋於再造之時宋亡矣天祥當速死不當久生上使諭之曰汝以事宋者事我即以汝為中書宰相天祥曰天祥為宋狀元宰相宋亡惟可死不可生碩一死足矣又使諭之曰汝不為宰相則為樞密天祥對曰一死之外無可為者遂命之退明日有奏天祥不碩歸附當賜之死麥术丁力贊其決遂可其奏天祥將出獄即為絶筆自贊繫之衣帶間其詞曰孔曰成仁孟云取義惟其義盡所以仁至讀聖賢書所學何事而今而後庶幾無愧過市意氣揚揚自若觀者如堵臨刑從容謂吏曰吾事畢矣問市人孰為南北南靣再拜就死俄有使使止之至則死矣見聞者無不流涕南人留燕者悲歌慷慨相應和更置酒酹丞相更相慰賀有十義士收尸葬於都城外面如生年四十有七是日大風揚沙石晝晦咫尺不見人城門晝閉籍兵馬司得天祥所為詩文上之觀者咸嗚咽感慟有得其絲履寶藏之𥘉天祥既第誓不倚勢近利自祿賜所入盡以散族姻賔友之貧者至是官籍其家蕭然方過南安遣人告墓時以弟璧之子升為嗣又寄弟詩曰親喪君自盡猶子是吾兒大德中升奉母歐陽夫人歸自豐州適京師有欲官之者輒辭仁宗在潛邸聞其名召見之及即位官以集賢直學士乞歸得代祀南海道卒官其子冨為興文署丞史臣論曰自古志士欲信大義於天下者不以成敗利鈍動其心君子命之曰仁以其合天理之正即人心之安爾啇之衰周有代德盟津之師不期而會者八百國伯夷叔齊以兩男子欲扣馬而止之三尺童子知其不可他日孔子賢之則曰求仁而得仁宋至德祐亡矣文天祥往來兵間𥘉欲以口舌存之事既無成奉兩孱王﨑嶇嶺海以圖興復兵敗身執我世祖皇帝以天地有容之量既壯其節又惜其才留之數年如虎兕在柙百計馴之終不可得觀其從容伏鑕就死如歸是其所欲有甚於生者可不謂之仁哉宋三百餘年取士之科莫盛於進士進士莫盛於倫魁自天祥死世之好為髙論者謂科目不足以得偉人豈其然乎廣集廬陵先賢傳恆病宋史文丞相傳簡略失實蓋後來史臣為當時忌諱多所刪削又事間有抵牾鄉先生前遼陽儒學副提舉劉嶽申為丞相傳比國史為詳大要其去丞相未逺鄉邦遺老猶有存者得於見聞為多又必參諸丞相年譜及指南録諸編故事迹核實可徴故元元統𥘉丞相之孫富既以刻梓後復刋見嶽申文集近年樂平文學郡人夏伯時亦以鋟版於是嶽申所撰丞相傳盛行於天下而史傳人蓋少見廣竊觀二傳詳略不同不能無憾因參互考訂合而為一中主嶽申之説為多并取證於丞相文集芟其繁復正其訛舛庶幾全備使人無惑論贊則並録之國史之論揆諸人事而言嶽申之贊本乎天運而言各有發揚不可偏廢亦以見夫取舍之公也於乎丞相之大忠大節獨立萬古直與日月爭光天地悠久比之夷齊心則不殊而所為反有難者昌黎韓子所謂特立獨行窮天地亘萬古而不顧者也丞相之云豈異於是噫丞相不可尚矣其相從興義之士或出自小官或奮迹庶民雖當榷沮敗衄之餘皆甘心就死不肯屈辱殺之殆盡無一人肯降丞相忠義至誠感動固結於人心牢不可解有如此者使人皆爾則宋豈有亡理彼臨難苟生以就富貴其視丞相厮卒尤有愧焉然則丞相固無待於贊論誦其詩讀其書自有以見之廣齠齔時猶及聞先輩言丞相遺事赫赫悚動人聽雖小夫婦人皆習聞而能道之比年以來老成凋謝而談者益稀雖士夫君子鮮聞盛事蓋漸逺漸踈其勢然耳更後百年恐寖失實惟取信於列傳眩瞀異同莫適是非故忘其淺陋輒復編次第皆因其舊文不敢妄加一筆誠無能有所禆益特盡區區之愚耳知之者其必不以為僣也永樂丙申春二月甲戌翰林學士兼左春坊大學士奉政大夫郡人胡廣謹識文丞相督府忠義傳鄧光薦趙時賞和州宗室也武舉歷任知池州旌德縣以功名自負抗敵數有功入閩行朝擢知邵武軍自同督府建隨府典軍神采明雋議論慷烈空坑之敗走三吳溪𬒳執其事見丞相年譜至隆興遇害時賞任軍中見同列盛輜重飾侍姬嘆曰軍行如春逰其能濟乎及𬒳執有係纍而至者輒麾去之云小僉職耳執此何為由是得脫者衆官至直寶章閣軍器監同督府參議官鞏信安豐軍人荆湖老將也沉勇有謀同督府見信為都統制兼江西招捕使行府永豐兵潰北兵追及丞相於廬陵方石嶺下信駐隊據險殊死戰體中數箭殺敵過當傷重而死土人收葬之事聞贈清逺軍承宣使立廟戰所至今廟食水旱疾疫禱焉信𥘉至丞相付以義士千人信曰此等何用徒纒手耳遂自招募淮卒數千自隨常快快曰有將無兵其如彼何鄒􅘶字鳯叔吉水人也以豪俠行臺郡間貌癯寢挾枯龜不類貴將從丞相勤王輔武資至將軍後以寺丞領江西招諭副使聚兵甚盛寧都陷𬒳執變姓名為卜者得脫攻興國復永豐空坑敗竄身溪洞約結酋傑引兵入廣潮陽敗以丞相𬒳執遂自剄而亡張汴字朝宗蜀人明鋭輕俊嘗從吳丞相潛兄淵於荆湖幕頗習兵事從丞相贑州勤王空坑敗而死仕至祕閣修撰廣東提舉司督府參謀官陳龍復泉州老儒也登丙辰進士第沉厚朴茂有前輩風流敡歷州縣以清勤著名丞相開府南劍舉辟多知名士如三山林俞林元甫皆卒汀州龍復以老成重一府聚兵積糧循梅行府趍潮陽北兵追龍復𬒳執遇害年七十有三吕武太平人丞相陷北營應募隨從北行徑烈喜靣折人然忠鯁人皆服之丞相脫鎮江走淮東患難中賴武自壯及開府南劍遣武結約江淮間關數千里至汀梅以環衛官將數千將出江西死一軍為之流涕繆朝宗淮人有意氣從丞相于平江反歸福安朝宗自婺間道來歸精練幹實孜孜奉公空坑之敗自縊而死官至環衛知梅州尹玉寧都人以捕盜功為贑州三寨巡撿素驍勇敢戰從丞相勤王至平江遣玉同淮將張全廣將朱華救常州拒戰五牧全華等遁惟玉以所部三寨及義士五百人殊死戰玉手殺數十人冒箭如蝟健鬪無如之何北軍橫四鎗於其項以𫾣棍擊死之餘兵夜戰殺人馬蔽積田間及明惟餘四人脫歸事聞贈玉壕州團練使官其二子承節郎給良田二頃立廟于贑州劉子俊字民章丞相同里人也相友善領漕貢從開府興國行府敗子俊收散兵保洞源引軍入廣會行府潮陽越二十日而行府敗子俊遇害官至宣教郎帶行軍器監簿同都督府機宜文字蕭明哲宇元甫吉之泰和人嘗預鄉貢剛毅有膽氣從丞相汀梅督幕出江西以架閣監軍收復萬安龍泉行府敗元甫入野陂連結諸寨為鄉豪所陷走敗𬒳執遇害於隆興臨刑大罵不絶口南北壯之劉洙字淵伯丞相鄰曲丞相喜象奕洙雖不敵然窮思忘日夜言趣俚下亦以是好之從勤王號劉監軍專將一軍為督帳親衛圎機應物酬答不倦會病劇乍起空坑之敗執詣隆興與長子同日受害次子死亂兵幼子沒於廣社滸字貴卿號梅壑天台人遊俠于臨安及臨安危紏合義兵四千人當國者不省二年正月十三日見丞相西湖上丞相奬異之丞相使北營滸力爭不可陳志道逐之去丞相北行諸客莫敢從滸慨然請行丞相鎮江脫走滸之力也忠勞備盡詳著丞相年譜及佐府南劍遣往溫台招集兵財福安陷滸趍行朝奉朝命歸行府江西敗又與跋涉危難者年餘移屯潮陽滸謢海舟官富場至崖山及崖山潰滸𬒳執至廣州貧病無人色尋卒陳繼周字碩卿寧都人以貢士有軍功歷仕州縣者二十八年家居贑郭中詔勤王丞相造門問計繼周具言閭里豪傑子弟與凡起兵方略甚詳其子大學生逢父亦晝夜參預籌畫調度繼周雖若不勝衣以年輩為鄉里所推服率贑義士以從至京丞相使北營有旨放散義兵繼周父子領衆歸則贑巳失守繼周蟄兵於農盤辟草莾將以有為也會景炎登極以繼周知南安軍八月二十二日贑州總管楊子襲執繼周父子殺之事聞旨贈敷文閣侍制諡忠節與諸子恩澤候事平立廟本州次子矩從丞相攻江西死循潮間其家人死亂兵惟繼周幼女廉矩之子英生在繼周兄子逢春投拜為萬戶入燕間見丞相于千戶所丞相為書繼周遺事作行狀後數日而丞相遇害林琦閩士也丞相屯餘杭琦結集赭山忠義捍禦海道及南劍開府琦就辟外文采內忠實患難勞而不怨權惠州通判潮陽敗琦𬒳執逃奔惠州又𬒳獲鎖其項至建康病卒謝𣏌祕書即大學名士督府幹辦架閣許由李幼節皆閩士之秀俱登進士第以文采望一府空坑之敗莫知所終吳文炳林棟皆閩士有幹實俱為督府幹辦帶架閣空坑之敗𬒳執至隆興遇害樊録判言文炳受刑時吏卒捽辱之文炳笑而謂之曰我與爾亦各為其主耳爾何辱我為至死不屈劉欽字敬德吉水雋人也預鄉貢有志氣健議論與丞相友善行府至汀欽來寧都就招諭使鄒􅘶北軍奄至死亂兵同死者鞠華叔顔斯立顔起岩皆吉之英俊欽死其父母妻子皆以流離終曾鳯字朝陽廬陵人丞相嘗從鳯學自太學釋褐為衢州教授纍遷國子監丞隨行府之汀丁丑春添差梅州通判以病卒於汀張雲吉州敢勇軍將官從丞相勤王丞相奉使拘留北營雲引衆歸鄉里吉城巳降雲不勝憤丙子七月引所部夜襲上營前擊殺北軍數百人北軍不測其衆寡與戰於南柵門外雲衆舉炮發噉適北軍經過者來援雲表裏受敵會天明戰渴赴江飲北軍衝擊之雲衆溺而死孫栗字實甫龍泉人丞相長妹夫也丞相兵出興國其邑人奉栗以邑返正北軍來攻衆拒守不能下為親黨所賣遇害於隆興母妻子沒入燕桌日人人官至宣教即知吉州龍泉縣彭震龍字雷可永新人也丞相次妹夫跌宕喜事功起兵隨勤王及歸郡邑巳陷乃結湖南諸洞豪傑謀興復會督府出江西即以永新縣返正行省命劉槃以重兵攻之其親黨張履翁等內應𬒳執遇害於郡城槃亦永新人素無行為士人所疾槃恨之以運判權知隆興府德祐元年十一月北軍至槃以城降至是以私憾導北軍屠永新蕭敬夫燾夫兄弟皆工詩為丞相客相從勤王與彭震龍收復永新縣及縣再陷兄弟俱死焉陳子敬贑人以資力雄鄉里行府至汀子敬請招集義兵置屯皂口據贑下流以遏北船忠效甚著行府敗聚兵黃塘連結山寨不降北以重兵襲其寨寨潰不知所終趙璠衡山人登甲戌進士第歲丁丑三月張虎起兵寶慶府環卲爭應之復卲之新化潭之安化益陽寧鄉湘潭諸縣湖南行省遣薩里㘘提兵屢至虎輒敗失馬動以百計五月朔璠與其叔父漂起兵湘鄉同督府以璠書逹行朝授璠軍器監號召勤王於是朝奉即張唐長沙人南軒張宣公諸孫也前通判贑州熊桂湘潭人進士年七十餘劉斗元别省魁皆起兵復潭之衡山湘潭攸三縣明年同督府敗歸汀州人心大失望潭省兵陷所復諸縣攻焚下嶽祠璠漂走不知所終執唐至行省參致崖斌欲降之唐罵曰紹興至今百五十年乃我祖魏公收拾撑拓者今日降而死何以見魏公於地下遂遇害桂為湘潭人所掩殺并屠其家吳希奭陳子全王夢應皆攸縣士人亦自通於同督府與趙璠相應希奭大家世積善急義鄉里德之子全少剛猛殺人晚入佛學徒千數百人頴悟如髙僧夢應甲戌進士調廬陵尉臨安陷希奭遣間使通行朝通蜀師又遣區仲舉通桂師馬暨及都元帥益王府旬月間逺近響應景炎即位事聞同督府承制各授官有差希奭志有餘而少斷子全聚衆數千善撫禦為衆所懷七月二十一日復袁州萍鄉縣袁州總管聶嵩孫宣差來萬戶舉兵來爭夢應率數百人遇于明府嶺戰數合殺曹千戶大小頭目北軍敗走未幾北益兵再大戰北軍又遁殺來萬戶之子及頭目六人僵尸蔽野餘兵奔袁州會傳永新兵敗督府師潰衆謂事未可圖遂退獨子全所部據險待命巳而湘部諸縣再陷北軍日夜環而攻之子全胸中流矢死子就逮盡殺之妻屬死獄無遺類希奭復醴陵遇北軍衆寡不敵死之一門三十口無免者夢應竄歸收淮潭散遺舊兵善鬪捕者無敢近巳卯春丞相巳執崖山巳亡乃率百餘人間行入永新境依顔明叔後其衆疾復死散夢應母妻兒女皆殁惟一身存陳莘字偉節居饒撫間登乙丑進士第奉同督府命起兵結約弋陽謝夢得謀取信州北軍出捕莘敗走伏窑中不食死夢得死亂兵傳卓旴江人由進士第受同督府命為招諭起兵無成遇害何時字了翁撫之樂安人登丙辰第歷仕知興國縣有才識操守從丞相勤王駐吉聚兵財運軍需至衢信間逹平江丞相奏除知撫州江西陷時家居丞相出江西以時帶行卿監江西提刑聚兵入崇仁返正未幾富室導北軍奄至時伏溝竇中脫走變姓名遊術汀贑間數年隱吉之永豐又數年乃歸久之病卒羅開禮字正甫吉之永豐人會選解褐授武岡軍教授以資力雄鄉里景炎元年受同督府劄命以土兵復永豐縣未哉敗𬒳執死吉州獄劉伯文字致中吉水人以武舉絶倫賜第仕州縣有賢譽從丞相勤王明年義兵散而歸見鄉國淪陷居常憤悒景炎二年同督府駐興國伯文詣府受文書結約逺近七月四日至袁州仰山廟祝湯氏家僕醉漏言巡兵執而搜其行李得同督府文書甚多宣差來萬戶鞠之伯文慷慨自引一不以纍人獨斬于袁市家屬徙於燕二子以屠沽自給李梓發字材甫南安軍南安縣人世為邑豪主溪洞隅保梓發為南安三縣管界巡檢江西陷南安守楊公畿迎降獨南安一縣不下邑人黃賢與梓發共推前南安尉永嘉葉荗為主治守具北軍至城下輒敗景炎元年十二月北丞相塔出與張吕二元帥引大軍萬餘圍之數匝邑猶彈丸地城墻及肩北軍攻之百計梓發率邑人併力死守晝則隨機應變夜則鳴金鼓劫寨殺獲無算塔出等相顧曰城子如堞大人心乃爾硬耶明年正月六日塔出與張吕至城下諭降邑人祼噪大罵俄炮發幾中塔出即日徙寨水南猶力攻凡三十五日北軍死者數千不能克二月葉茂出降北軍乃退梓發與賢堅守如故戊寅冬丞相𬒳執巳卯二月崖山亡三月北參政賈居貞往諭降城上詬罵如𥘉時邑人稍稍徙去心力懈於前時賈命方文等進攻十五日城破屠之梓發全家自焚望煙𦦨五色或以為忠義之感邑人多殺家屬巷戰殺敵猶過當張哲齋台州海上豪也所居曰城門鎮蓋國𥘉名將永德之後丞相自通州泛海過城門哲齋延欵結約舉事張欣然聚海艘移檄海上豪傑聽命會丞相至福安請自取明州為陳宜中張世傑沮止張亦以失約止越二年張弘範南伐見檄文墻壁間屬舟人與之有隙告輔至軍前哲齋知不免語弘範曰某生為宋民死為宋鬼何怪我為弘範殺其父子碎其家劉士昭吉之泰和人為針工與鄉人同謀復泰和縣事敗血指書帛云生為宋民死為宋鬼赤心報國一死而巳以帛自經士人王士敏慷慷不撓題獄中云死生斷不望生還留得虛名在世間大地盡為胡血染好藏吾骨首陽山臨刑歎曰恨吾病失聲不能朗罵又万安縣有僧起兵舉旗號降魔又曰時危聊作將事定復為僧旋亦敗死唐仁南安土豪也奉同督府命通江西音問結約取贑約日舉火為號城內外夾擊仁軍輕先期至北軍浸覺閉營掩捕格殺仁軍不見火遽退贑軍殱焉時丙子冬也巳而仁偽投拜北官要索倨甚仁怒殺其來使置酒臠其肉與同督府來使食之久而仁病死鍾震桂東士豪也與茶陵賀尹二姓稟命同督府間行至崖山末幾崖山潰𬒳虜𬒳脫歸蕭興南雄州摧鋒軍丙子秋趙溍方興等兵復廣摧鋒軍寨於韶州仁化縣山谷間推興為主遣使間受同督府文書號召浸盛丁丑劉自立守韶州乘間襲擊興寨興等力戰不敵潰散不知所之金應蕭資吉水人皆為丞相書史應從丞相間關脫鎮江病死通州城下資隨丞相家入嶺忠勤曲盡丞相之執遂遇害徐榛永嘉良家子為丞相書史丞相執于潮榛得脫自請從行病死于豐城贊曰文丞相僚將賔從牽聮可書者四十餘人其他遙請號令稱幕府文武士者不可悉數雖人品不齊然一念向正至死靡悔蓋貪生畏死人之常情而能夷險一節殺身成仁君子所取焉文山先生全集卷之十九終
