妾士揮淚睢陽水東流雙廟垂百世當時令狐潮乃為賊遊說過雪橋琉璃橋小橋度雪度琉璃更有清霜滑馬蹄遊子衣裳如鐡冷殘星荒店野雞啼一作亂鳴雞指南後録卷之三豫指南後録第一卷起正月十二日賦零丁洋第二卷起八月二十四日發建康今第三卷蓋自庚辰元日為始文山履善甫序五月二日生朝北風吹滿楚冠塵笑捧蟠佻夢裏春幾歲巳無籠鴿客去年猶有送羊人江山如許非吾土宇宙奈何多此身不滅不生在何許靜中聊且飬吾真胡笳曲庚辰中秋日水雲慰豫囚所援琴作胡笳十八拍取豫疾徐指法良可觀也琴罷索豫賦胡笳詩而倉卒中未能成就水雲别去是歲十月復來豫因集老杜句成拍與水雲共啇略之蓋囹圄中不能得死聊自遣耳亦不必一一學琰語也水雲索豫書之欲藏於家故書以遺之浮休道人文山風塵傾洞昏王室天地慘慘無顔色而今西北自反胡西望千山萬山赤歎息人間萬事非𬒳驅不異犬與雞不知明月為誰好來歲如今歸未歸右一拍獨立縹眇之飛樓高視乾坤又可愁江風蕭蕭雲拂地笛聲憤怒哀中流鄰雞野哭如昨日昨日晚晴今日黑蒼皇巳就長途往欲往城南忘南北右二拍三年奔走空皮骨三年笛裏關山月中天月色好誰看豺狼塞路人煙絶寒刮肌膚北風利牛馬毛零縮如蝟塞上風雲接地隂咫尺但愁雷雨至右三拍黃河北岸海西軍翻身向天仰射雲胡馬長鳴不知數衣冠南渡多崩奔山木慘慘天欲雨前有毒蛇後猛虎欲問長安無使來終日戚戚忍羇旅右四拍北庭數有關中使飄飄逺自流沙至胡人髙鼻動成群仍唱胡歌飲都市中原無書歸不得道路只今多擁隔身欲奮飛病在床時獨看雲淚沾臆右五拍胡人歸來血滿箭白馬將軍若雷電蠻夷雜種錯相于洛陽宫殿燒焚盡干戈兵革鬪未巳魑魅魍魎徒為爾㷲哭秋原何處村千村萬落生荆𣏌右六拍憶昔十五心尚孩莫怪頻頻勸酒杯孤城此日腸堪斷如何不飲令人哀一去紫臺連朔漠月出雲通雪山白九度附書歸洛陽故國三年一消息右七拍只今年才十六七風塵荏苒音書絶胡騎長驅五六年弊裘何啻連百結愁對寒雲雪滿山愁看冀北是長安此身未知歸定處漂泊西南天地間右八拍午夜漏聲催曉箭寒盡春生洛陽殿漢主山河錦繡中可惜春光不相見自胡之反持干戈一生抱恨空咨嗟我巳無家尋弟妹此身那得更無家南極一星朝北斗每依南斗望京華右九拍今年臘月凍全消天涯涕淚一身遙諸將亦自軍中至行人弓箭各在腰白馬嚼嚙黃金勒三尺角弓兩斛力胡鴈趐濕髙飛難一箭正墜雙飛翼右十拍冬至陽生春又來口雖吟咏心中哀長笛誰能亂愁思呼兒且覆掌中杯雲白山青萬餘里壁立石城橫塞起元戎小隊出郊坰天寒日暮山谷裏右十一拍洛陽一别四千里邊庭流血成海水自經喪亂少睡眠手腳凍皴皮肉死反鎖衡門守環堵稚子無憂走風雨此時與子空歸來喜得與子長夜語右十二拍大兒九齡色清徹驊騮作駒巳汗血小兒五歲氣食牛氷壼玉鑑懸清秋罷琴惆悵月照席人生有情淚沾臆離别不堪無限意更為後㑹知何地酒肉如山又一時只今未絶巳先悲右十三拍北歸秦川多鼓鼙禾生隴𤱔無東西三步回頭五步坐誰家搗練風凄凄巳近苦寒月慘慘中腸悲自恐二男兒不得相追隨去留俱失意徘徊感生離十年蹴踘將雛逺目極傷神誰為携此别還須各努力無使霜露沾人衣右十四拍寒雨颯颯枯樹濕坐卧只多少行立青春欲暮急還鄉非關使者徴求急欲别上馬身無力去住彼此無消息關塞蕭條行路難行路難行澀如棘男兒性命絶可憐十日不一見顔色右十五拍乃知貧賤别更苦况我飄轉無定所心懷百憂復千慮世人那得知其故嬌兒不離膝哀哉兩决絶也復可憐人里巷盡嗚咽斷腸分手各風煙中間消息兩茫然自斷此生休問天看射猛虎終殘年右十六拍江頭宫殿鎖千門千家今有百家存靣粧首飾雜啼痕教我歎恨傷精魂自有兩兒即忽在天一方胡塵暗天道路長安得送我置汝傍右十七拍事殊興極憂思集足繭荒山轉愁疾漢家山東二百州青是𤇺煙白人骨入門依舊四壁空一斛舊水藏蛟龍年過半百不稱意此曲哀怨何時終右十八拍上巳豫自丙子上巳日真州屏之城門外于今憂患通六年俯仰時節為之慨然昔自長淮樹去帆今從燕薊眺東南泥沙一命九分九風雨六年三月三地下故人那可作天涯遊子竟何堪便從餓死傷遲暮靣對西山巳發慚寒食豫不登丘隴拜清明寒食八年矣癸酉湖南甲戌乙亥章貢丙子淮東丁丑梅州戊寅麗江浦庚辰燕山獄中今辛巳猶未得死和上巳韻寫懷苦海周遭斷去帆東風吹淚向天南龍蛇澤裏清明五燕雀籠中寒食三撲面風沙驚我在滿襟霜露痛誰堪何當歸骨先人墓千古不為丘首慚覽鏡見鬚髯消落為之流涕萬里飄零等一毫滿前風景恨滔滔淚如杜宇喉中血鬚似蘇郎節上旄今日形骸遲一死何來事業竟徒勞青山是我安魂處清夢時時賦大刀讀赤壁賦前後二首昔年仙子謫黃州赤壁磯頭汗漫遊今古興亡真過影乾坤俯仰一虛舟人間憂患何曾少天上風流更有不我亦洞簫吹一曲不知身世是蜉蝣一笑滄波浩浩流隻雞斗酒更扁舟八龍寫作詩中案孤鶴來為夢裏遊楊柳逺煙連北府蘆花新月對南樓玉仙來往清風夜還識江山似舊不自歎門掩牢愁白日過不應老子坐婆娑雖生得似無生好欲死其如不死何王蠋髙風真可挹魯連大節豈容磨東流不盡銅駝恨四海悠悠總一波端午𥘉度死所𥘉何怨生朝只自知頗懷常枤意忍誦蓼莪詩浮世百年夢高人千載期楚囚一杯氷勝似九霞巵向來松下鶴今日傍誰門夢見瑶池沸愁看玉壘昏所思多死所焉用獨生存可惜菖蒲老風煙滿故園端午即事五月五日午贈我一枝艾故人不可見新知萬里外丹心照夙昔鬢髮日巳改我欲從靈均三湘隔遼海自述二首當年嚼血灑銅駝風氣悠悠奈若何漢賊巳成千古恨楚囚不覺二年過古今咸道天驕子老去忽如春夢婆試把睢陽雙廟看只今事業愧蹉跎江南啼血送殘春漂泊風沙萬里身漢末固應多死士周餘乃止一遺民乍看鬚少疑非我只要心存尚是人坐擁牢愁書眼倦土床伸腳任吾真五月十七夜大雨歌去年五月望流水滿一房今年後三夕大雨復沒床我辭江海來中原路茫茫舟楫不復見車馬馳康莊矧居圜土中得氷猶得漿忽如巨石浸倉卒殊倣徨明星尚未啓大風方發狂呌呼人不譍宛轉水中央壁下有水穴群鼠走踉蹡或如魚潑刺墊溺無所藏周身莫如物患至不得防業為世間人何處逃禍殃朝來闢溝道宛如决陂塘盡室泥濘塗化為縻爛場炎蒸迫其上臭腐薰其傍惡氣所侵薄疫癘何可當楚囚欲何之寢食此一方坐待仆且僵乾坤莾空闊何為此凉凉逹人識義命此事關綱常萬物方焦枯皇皇禱穹蒼上帝實好生夜半下龍章但願天下人家家足稻粱我命渾小事我死庸何傷先太師忌日二月二十八日萬里先人忌呼號痛不天遺孤餘二紀曠祀忽三年永恨丘園隔遙憐弟妹圎義方如昨日地下想興然築房子歌自豫居狴犴一室以自治二年二大雨地汙實成池圄人為我惻畚土以築之築之可二尺宛然水中坻𥘉運朽壤來臭穢恨莫追掩鼻不可近牛皂雞于塒須臾傳黑墳千杵鳴參差但見如坻平糞土不復疑乃知天下事不在論鎡基苟可掩耳目臭腐誇神竒世人所不辨羊質而虎皮大者莫不然小者又何知深居守我玄默觀道推移何時蟬蛻去忽與濁世違有感巳矣勿復道安之如自然間陪黃妳坐倦退白衣眠一死知何地此生休問天怪哉茨野客宿果墮幽燕正氣歌豫囚北庭坐一土室室廣八尺深可四尋單扉低小白間短窄汙下而幽暗當此夏日諸氣萃然雨潦四集浮動床几時則為水氣塗泥半朝蒸漚歷瀾時則為土氣乍晴暴熱風道四塞時則為日氣􅉉隂薪㸑助長炎虐時則為火氣倉腐寄䪺陳陳逼人時則為米氣駢肩雜還腥臊汙垢時則為人氣或圊溷尸或腐鼠惡氣雜出時則為穢氣疊是數氣當鮮不為厲而豫以孱弱俯仰其間于兹二年矣是殆有飬致然然爾亦安知所飬何哉孟子曰吾善飬吾浩然之氣彼氣有七吾氣有一以一敵七吾何患焉况浩然者乃天地之正氣也作正氣歌一首天地有正氣雜然賦流形下則為河嶽上則為日星於人曰浩然沛乎塞蒼冥皇路當清夷含和吐明庭時窮節乃見一一垂丹青在齊太史簡在晋董狐筆在秦張良椎在漢蘇武節為嚴將軍頭為嵇侍中血為張睢陽齒為顔常山舌或為遼東帽清操厲氷雪或為出師表鬼神泣壯烈或為渡江楫慷慨吞胡羯或為擊賊笏逆竪頭破裂是隨所旁薄凛烈萬古存當其貫日月生死安足論地維賴以立天柱賴以尊三綱實係命道義為之根嗟豫遘陽九隸也實不力楚囚纓其冠傳車送窮北鼎鑊甘如飴求之不可得隂房閴鬼火春院閟天黑牛驥同一皂雞棲鳯凰食一朝濛霧露分作溝中瘠如此再寒暑百沴自辟易嗟哉沮洳場為我安樂國豈有他繆巧隂陽不能賊顧此耿耿在仰視浮雲白悠悠我心悲蒼天曷有極哲人日巳逺典刑在夙昔風􅉉展書讀古道照顔色七月二日大雨歌燕山五六月氣候苦不常積隂綿五旬畏景淡無光天漏比西極地溫等南方今何苦常雨昔何苦常暘七月二日夜天工為誰忙浮雲黑如墨飄風怒如狂滂沱至夜半天地為低昻勢如蛟龍出平陸俄懷襄𥘉疑倒巫峽又似翻瀟湘千門各巳閉仰視天茫茫但聞屋側聲人力無支當嗟哉此圜土占勝非高岡赭衣無容足南房并北房北房水二尺聚立唯東箱桎梏猶自可凛然覆穹墻嘈嘈復雜雜蒸汗流成漿張目以待旦沈沈漏何長南冠者為誰獨居沮洳場此夕水弥滿浮動八尺床壁老如欲壓守者殊皇皇我方鼾鼻睡逍遙遊帝鄉百年一大夢所歷皆黃梁死生巳勘破身世如遺忘雄雞呌東白漸聞語聲揚論言苦飄揚形勢猶倉黃起來立泥塗一笑褰衣裳遺書宛在架吾道終未亡詠懷隂陽相烹然天地一釡灊人生居其間便同肉在砧熱猶以火燎溫猶以湯潯一歲一煆煉老形忽駸駸吾生四十六弱質本不任矧當五六年患難長侵尋子卿羝羊節少陵杜䳌心酷罰毒我膚深憂煩我襟嗟嗟夏涉秋天道何其淫或時日杲杲或時雨淋淋方如坐蒸甑又似立烘煁水火交相禪益熱與益深宛轉兒戲中日夜空呻吟何如真鼎鑊殊我一寸金脫此寒暑殼誰能復嶇􅋂偶成昨朝門前地寸裂今朝床下泥尺深人生世間一蒲柳豈堪日炙復雨淋起來高歌離騷賦睡去細和梁父吟巳矣巳矣尚何道猶有天地知吾心移司即事自大雨後兵馬司墻壁頺落地皆沮洳囚不可居七月五日移司官籍監豫以詰朝行詩以記之燕山積雨泥塞道大屋欹傾小成倒赭衣棘下無顔色倉卒移司避流潦行行桎梏如貫魚憐我龍鍾遲明早我來二十有一月若書下下幾一考夢回恍憶入新衙不知傳舍何時了寄書癡兒了家事九牛一毛亦云小天門皇皇虎豹立下土孤臣泣雲表莫令赤子盡為魚早願當空日杲杲不睡頻搔白首强憂煎細雨青燈思欲顛南北東西三萬里古今上下幾千年只因知事翻成惱未到放心那得眠眼不識丁馬前卒隔床鼾鼻正陶然宫籍監兵馬司移寓宫籍監豫監一室頗瀟灑明窗净壁樹影橫斜可愛也賦五絶塵滿南冠歲月深暫移一室倚􅏧林天憐元是青山客分與窗根兩樹隂壁間頗自有龍蛇元是誰人小住家不似為囚似為客倚窗望斷暮天涯曽過盧溝望塔尖今朝塔影接虛􅉉道人心事真方丈靜坐日長雲蒲簾軍衙馬足起黃埃門掩西風夢正回自入燕關人世隔隔墻忽送市聲來新來窗壁頗玲瓏盡把前時臭腐空好醜元來都是幻􅕋廬一付夢魂中還司即事兵馬司苦於地窄其東偏有大宅官買之以廣治所舊􅈦事遂為空間七月十一日囚自宫籍監悉歸獄舊􅈦事之西有一室處豫其間其地高燥而空凉蕭然獨往寂無來人又一境界也五言八句二首幕燕方如寄屠羊忽復旋霜枝空獨立雪窖巳三遷漂泊知何所逍遙付自然庭空誰共語柱頰望青天秋聲滿南國一葉此飄蓬墻外千門逈庭皋四壁空誰家驢吼月隔巷犬嘷風燈暗人無寐沉沉夜正中夜起二絶惆悵高歌入睡鄉夢中魂魄尚飛揚起來露立頻搔首夜靜無風自在凉三年獨立巳成僧欲與何人說葛藤夜夜隔墻囚呌佛三生因果伴孤燈還獄豫自宫籍監還兵馬司止豫舊􅈦事西偏之室嶽戶既葺以八月七日復返故處向之所謂臭腐溫蒸依然故在回視吾所挾亦浩然而獨存作古風一首人情感故物百年多離憂桑下住三宿應者猶遲留矧兹方丈室屏居二春秋夜眠與晝坐隤乎安楚囚自罹大雨水圜土俱蕩舟此身委傳舍遷徙無定謀去之巳旬月宫室重綢繆今夕果何夕復此搔白頭恍知流浪人一旦歸舊遊故家不可復故國巳成丘對此重回首汪然涕泗流人生如空花隨風任飄浮哲人貴知命樂天復何求偶賦蒼蒼巳如此梁父共誰吟神有忠臣傳床無壯士金收心歸寂滅隨性過光隂一笑西山晚門前秋雨深讀杜詩平生蹤跡只奔波偏是文章𬒳折磨耳想杜䳌心事苦眼看胡馬淚㾗多千年䕫峽有詩在一夜采江如酒何黃土一丘隨處是故鄉歸骨任蹉跎感懷二首交遊兵後似蓬飛流落天涯鵲繞枝唐室老臣唯我在柳州先友託誰碑泥塗猶幸瞻佳士甘雨如何遇故知一死一生情義重莫嫌收拾老牛尸伏龍欲夾太陽飛獨柱擎天力弗支北海風沙漫漢節浯溪烟胡暗唐碑書空巳恨天時雨惜往徒懷國士知抱膝對人復何語紛紛坐冡卧為尸先兩國𥘉忌九月𥘉七日北風吹黃花落木寒蕭颼哀哀我慈母玉化炎海秋日月水東流音容隔悠悠小祥哭下邳大祥哭幽州今此復何夕荏苒三星周嗟哉不肖孤宗職矌不修昔母肉未寒委身墮寇讐仰藥早云遂庶從地下遊大阿落人手死生不自由南冠坐絶域大期落淹流白華下玄髮碧蘚生緇裘心口自相語形影旁無儔空庭鬼火閴天黑對牢愁魚軒在何處魂魄今安否兒女各北歸墳墓委南陬寒食雨凄凄盂飯誰與投荆棘纒蔓草狐兔緣荒丘長夜良寂寞與我同幽幽我心亦勞止我命實不猶昨夕夢堂上樂昔歡綢繆覺來尚恍惚血涕連衾禱晨興一瓣香痛如螫在頭吾家白雲下萬里同關憂遙憐弟與妹几筵羅庶羞既傷母在殯又念兄在囚兄囚不足念母亦為母謀三聖去巳逺穹垠莾洪流𬗟懷百世慮白骨甘填溝冥冥先大夫鬱鬱蒼松揪防山迄合􅌾瞑目復何求重陽萬里飄零兩鬢蓬故鄉秋色老梧桐鴈棲新月江湖滿燕别斜陽巷陌空落葉何心定流水黃花無主更西風乾坤遺恨知多小前日龍山如夢中又三絶世事濛濛醉不知南山秋意滿東籬黃花何故無顔色應為元嘉以後詩人間萬事轉頭空皂帽飄蕭一病翁不學孟嘉往落魄故將白髮向西風老來憂患易凄凉說到悲秋更斷腸世事不堪逢九九休言今日是重陽夜秋光連夜色萬里客凄凄落木空山杳孤雲故國迷衾寒霜正下燈晚月平西夢過重城夢千門雞亂啼雨雪秋色金臺路殷殷半馬蹄因風隨作雪有雨便成泥過眼驚新夢傷心憶舊題江雲愁萬叠遺恨鷓鴣啼偶成二首燈影沉沉夜氣清朔風吹夢度江城覺來知打明鐘未忽聽鄰家呌佛聲烏兔東西不住天平生奔走亦茫然向來鞅掌真堪笑爛熳如今獨自眠得兒女消息故國斜陽草自春爭元作相總成塵孔明巳負金刀志元亮猶憐典午身骯髒到頭方是漢娉婷更欲向何人癡兒莫問今生計還種來生未了因為或人賦悠悠成敗百年中笑看柯山局未終金馬勝逰成舊雨銅駝遺恨付西風黑頭爾自誇江總冷齒人䏻說禇公龍首黃扉真一夢夢回何靣見江東世事世事孤鴻外人生落日西棋淫詩興薄書倦夢魂迷汨汨馳還坐悠悠笑即啼一真吾自得開眼總筌蹄新薦斷鴈西江逺無家寄萬金乾坤風月老沙漠歲年深白日去如夢青天知此心素琴絃巳絶不絶是南音小年燕朔逢窮臘江南拜小年歲時生處樂身世死為緣鴉噪千山雪鴻飛萬里天出門意寥廓四顧但茫然除夜乾坤空落落歲月去堂堂末路驚風雨窮邊飽雪霜命隨年欲盡身與世俱忘無復屠蘇夢挑燈夜未央壬午丙子上巳前二日豫至真州今俯仰六周星矣撫時念事為之流涕聊寫我心質諸鬼神爾憶昔三月朔歲在火鼠鄉朝登迎鑾鎮夜宿清邊堂于時坌颷霧陽精黯無芒胡羯犯彤宫犬戎升御床慘淡銅馳泣威垂朱鳥翔我欲疏河嶽借助金與湯吾道率曠野繞樹空倣徨慷慨撫鰲背艱關出羊腸扶日上天門隨雲拜東皇祖逖誓興晋鄭畋義扶唐人謀豈云及天命不于常泗水沉洛鼎蘇丘植汶篁瑶宫可敦后玉陛單于王革命曠千古𬒳髮綿八荒海流忽西注天旋俄右方嗟豫俘為馘萬里勞梯航秋風上甌脫夜雪卧桁陽南冠鄭大夫北窖蘇中郎龍蛇共窟穴蟻蝨連衣裳周旋溲渤間宛轉沮洳場漠漠蒼天黑悠悠白日黃風埃滿沙漠歲月稔星霜地下雙氣烈獄中孤憤長唯存葵藿心不改鐡石腸斷舌奮常山𬒮齒厲睢陽此志巳溝壑餘命終岩墻夷吾不可作此連久云亡王衍勸石勒馮道朝德光末俗正靡靡橫流巳湯湯餘子不足言丈夫何可當出門仰天笑雲山浩蒼蒼生日憶昔間居日端二逢始生升堂拜親夀摳衣接賔榮載酒出郊去江花相送迎詩歌和盈軸鏗戞金石聲于時果何時朝野方休明人生足自樂帝力無䏻名譬如江海魚與水俱忘情詎知君父恩天地同生成旄頭忽墮地氛霧迷三精黃屋朔風捲園林殺氣平四海靡所騁三年老于行賔僚半蕩覆妻子同飄零無幾哭慈母有頃遭潰兵束兵獻穹帳囚首送空囹痛甚衣冠烈甘於鼎鑊烹死生久巳定寵辱安足驚不圖坐羅網四見槐雲青朱顔日復少玄髮益以星往事真蕉鹿浮名一草螢牢愁寫玄語𥘉度感騷經朝登蓬萊門暮涉芙蓉城忽復臨故國搖搖我心旌想見家下人念我涕為傾交朋說疇昔惆悵雞豚􅉀空花從何來為吾舞娉婷莫道無人歌時鳥不可聽逹人貴知命俗士空勞形吾生復安適拄頰觀蒼冥端午五月五日午薰風自南至試為問大鈞舉杯三酬地田文當日生屈原當日死生為薜城君死作汨羅鬼高堂狐兔遊雍門悲涕人命草頭露榮華風過爾唯有烈士心不隨水俱逝至今荆楚人江上年年祭不知生者榮但知死者貴勿謂死可憎勿謂生可喜萬物皆有盡不滅唯天理百年如一日一日或千歲秋風汾水辭春暮蘭亭記莫作留連悲高歌舞槐翠自歎三首猛思身世事四十七年無鶴髮俄然在鵉飛久巳殂二兒化成土六女掠為奴只有南冠在何妨是丈夫北轍更寒暑南冠幾晦冥家山時入夢妻子亦關情惆悵心如失﨑嶇命復輕遭時命如此薄分笑三生疾病連三次形容落九分幾成白宰相誰識故將軍暗坐羞紅日間眠想白雲蒼蒼竟何意未肯喪斯文病目二首近來煩惱障左目忽茫茫聶政心雖碎劉伶醉未忘問天天不應食日日何傷萬想由來假收拾太乙光向來巖下電無故眩生花逹磨靣向壁盧同塌沙燈前心欲碎鏡裏鬢空華何日看明月沈沈斗柄斜有感心在六虛外不知呀網羅病中長日過夢裏好時多夜夜頻能坐時時亦自歌平生此光景回首笑呵呵拾遺早起曉日半窗紅鄰雞振翼雄餘子貪慵睡佳人理髮蓬未忘塵俗慮那免是非攻前山渾不見籠翠霧烟中贈許柏溪惟長風吹飛藿清蛚吟野草流光速代謝興懷令人老遊子中夜起悠悠酣且歌明月委清照江湖秋涉多豈無臨淄魚亦有邯鄲酒懷古招王孫登高重回首文山先生全集卷之十四終
