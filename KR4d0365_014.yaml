front:
  text: 文山先生全集卷之十四别集指南後録卷之一上
  hash: sha256:06efda9afb2dae4a96c1c7137ee8d06abedf51c4a482079cc6c38f3b19c30efa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0365_SBCK_014-1a}
body:
  text: 過零丁洋苦遭逢起一經干戈落落四周星山河破碎風拋絮身世飄搖雨打萍皇恐灘頭說皇恐零丁洋裏歎零丁人生自古誰無死留取丹心照汗青上巳日張元帥令李元帥過船請作書招諭張少保投拜遂與之言我自救父母不得乃教人背父母可乎書此詩遺之李不能強持詩以逹張但稱好人好詩竟不能逼元夕南海觀無夕兹遊古未曽人間大競渡水上小燒燈世事爭强弱人情尚廢興孤臣腔血滿死不愧廬陵懷趙清逸崖海真何地驅來坐戰場家人半分合國事决存亡一死不足道百憂何可當故人髯似㦸起舞為君傷二月六日海上大戰國事不濟孤臣天祥坐北舟中向南慟哭為之詩曰長平一坑四十萬秦人歡欣趙人怨大風揚沙水不流為楚者樂為漢愁兵家勝負常不一紛紛干戈何時畢必有天吏將明威不嗜殺人能一之我生之𥘉尚無疚我生之後遭陽九厥角稽首併二州正氣掃地山河羞身為大臣義當死城下師盟愧牛耳間關歸國洗日光白麻重宣不敢當出師三年勞且苦只尺長安不得覩非無虓虎士如林一日不戈為人擒樓船千艘下天角兩雄相遭爭奮搏古來何代無戰爭未有鋒蝟交滄𬈑遊兵日來復日往相持一月為鷸蚌南人志欲扶崑崙北人氣欲黃河吞一朝天昏風雨惡炮火雷飛箭星落誰雌誰雄頃刻分流尸漂血洋水渾昨朝南船滿崖海今朝只有北船在昨夜兩邊桴鼓鳴今朝船船鼾睡聲北兵去家八千里椎牛釃酒人人喜惟有孤臣雨淚垂冥冥不敢向人啼六龍杳靄知何處大海茫茫隔煙霧我欲借劍斬佞臣黃金橫帶為何人又六噫飈風起兮海水飛噫文武盡兮火德微噫鷹鸇相擊兮靡所施噫鴻鵠欲舉兮將安歸噫櫂歌中流兮任所之噫獨抱春秋兮莫我知噫言志九垠化為魅億醜俘為虜既不能變姓名卒於吳又不能髠鉗奴於魯逺引不如四皓翁髙蹈不如仲連父冥鴻墮矰繳長鯨陷網罟鷃燕上下爭誰何螻蟻等間相爾汝狼籍山河歲云杪飄零海角春重暮百年落落生涯盡萬里遙遙行役苦我生不辰逢百罹求仁得仁尚何語一死鴻毛或泰山之輕之重安所處婦女低頭守巾幗男兒嚼齒吞刀鋸殺身慷慨猶易免取義從容未輕許仁人志士所植立橫絶地維屹天柱以身狥道不苟生道在光明照千古素王不作春秋廢獸蹄鳥跡交中土閏位適在三七間禮樂終當屬真主李陵衛律罪通天遺臭至今使人吐種瓜東門不可得暴骨胸奴固其所平生讀書為誰事臨難何憂復何懼巳矣夫易簀不必如曽參結纓猶當效子路南海朅來南海上人死亂如麻腥浪拍心碎颷風吹鬢華一山還一水無國又無家男子千年志吾生未有涯有感海闊龍深蟄山空鳥雜鳴花隨春共去雲與水俱行壯士千年志征夫萬里程夜凉看星斗何處是攙槍張元帥謂豫國巳亡矣殺身以忠誰復書之豫謂啇非不亡夷齊自不食周粟人臣自盡其心豈論書與不書張為改容因成一詩高人名若凂烈士死如歸智滅猶吞炭啇亡正採薇豈因徼後福其肯蹈危機萬古春秋義悠悠雙淚揮登樓茫茫地老與天荒如此男兒鐡石腸七十日來浮海道三千里外望江鄉高鴻尚覺心期闊蹇馬何堪腳跡長獨自登樓時柱頰山川在眼淚浪浪海上天邊青鳥逝海上白鷗馴王濟非癡叔陶潜豈醉人得官須報國可隱即逃秦身事蓋棺定挑燈看劍頻贑州滿城風雨送凄凉三四年前此戰場遺老猶應愧蜂蟻故交巳久化豺狼江山不改人心在宇宙方來事㑹長翠玉樓前天亦泣南音半夜落滄浪指南後録卷之一下出廣州第一宿越王臺下路搔首歎萍蹤城古都招水山髙易得風鼓聲殘雨後塔影暮林中一樣連營火山同河不同英德道中海近山如沃杼深屋半蕪乾坤正風雨軒冕總泥途自歎鳶肩薄誰憐鶴影孤少年狂不醒夜夜夢伊吾晚渡青山圍萬疊流落此何邦雲靜龍歸海風清馬渡江汲灘供茗碗編竹當蓬窗一井沙頭月羈鴻共影雙珊瑚吟南方有珍禽鳴聲天下竒毛羽黑如􅃮兩臉凝璚脂燕趙佳公子籠檻以自隨童子重丁寧飲食必以時將獻上林苑來巢萬年枝待之豈少恩不免加縶維珊瑚真珊瑚碎琢良自悲中原寒氣深風土非所宜和中甫端午韻不依次黃茅古道外羸馬發南州有客嗤齊魯何人念楚囚歲年付流水風雨滿滄洲手把菖蒲看黑頭非所求又呈中齊風雨羊腸道飄零萬死身牛兒朝共載木客夜為鄰庾子江南夢蘇郎海上貧悠悠看晚渡誰是濟川人又萬里論心晚相看慰亂離丹成俄巳化璧碎尚無緇禾黍西原夢川原落日悲斯文今巳矣來世以為期竹間倦來聊歇馬隨分此青山流水竹千箇清風沙一灣乾坤醒醉裏身世有無間客路真希絶浮生半日間越王臺登臨我向亂離來落落千年一越臺春事暗隨流水去潮聲空逐暮天回煙橫古道人行少月墮荒村鬼哭哀莫作楚囚愁絶看舊家歌舞此㗸杯南華山北行近千里迷復忘西東行行至南華忽忽如夢中佛化知幾塵患乃與我同有形終歸滅不滅惟真空笑看曹溪水門前坐松風六祖禪師真身蓋數百年矣為亂兵刲其心肝乃知有患難佛不免况人乎南安軍梅花南北路風雨濕征衣出嶺誰同出歸鄉如不歸山河千古在城郭一時非饑死真吾志夢中行採薇黃金市閉蓬絶粒始南州我過青山欲首丘巡逺應無兒女態夷齊肯作稻粱謀人間早見黃金市天上猶遲白玉樓先子神遊今二紀夢中揮淚濺松楸萬安縣青山曲折水天平不是南征是北征舉世更無巡逺死當年誰道甫申生遙知嶺外相思處不見灘頭皇恐聲傳語故園猿鶴好夢回江路月風清泰和書生曽擁碧油幢耻與群兒共竪降漢節幾回登快閣楚囚今度過澄江丹心不改君臣誼清淚難忘父母邦惟有鄉人知我瘦下帷絶粒坐蓬窗蒼然亭風打船頭繫夕陽亭前老子舊胡床青牛過去關山動白鶴歸來城郭荒忠節風流落塵土英雄遺恨滿滄浪故園水月應無恙江上新松幾許長别里中諸友青山重回首風雨暗啼猿楊柳溪頭釣梅花石上尊故人無復見烈士尚誰言長有歸來夢衣冠滿故園發吉州巳卯六月𥘉一日蒼然亭下楚囚立山河顛倒紛雨泣巳亥七夕此何夕煌煌斗牛劍光濕戈鋋彗雲雷電擊三百餘年火為德須臾風雨天地黑皇綱解紐地維折妾婦偷生自為賊英雄扼腕怒鬚赤貫日血忠死窮北首陽風流落南國正氣未亡人未息青原萬丈光赫赫大江東去日夜白臨江軍江岸今多嚙城居昔屢焚市人半傖父豎子亦將軍蛟哭金洲雨猿啼玉觀雲周即墳土上回首淚成㾗豫始至南安即絶粒為告祖檷文别諸友詩遣孫禮取黃金市登岸馳歸約六月二日復命於吉城下豫以心事白諸幽明即瞑目長往含笑入地矣乃水盛風駛前一日逹廬陵孫禮期不至豫且行忍死以待垂至豐城忽有見孫禮於他舟乃悟竟不曾往為之痛哭流涕暮始見主者取孫禮還舟明早遂送之豐城縣縱其自便追之不可及矣豫至是不食巳八日若無事然私念死廬陵不失為首丘今使命不逹委身荒江誰知之者盍少須臾以就義乎復飲食如𥘉昔讀左傳申包胥哭秦庭七日勺飲不入口亦不聞有它乃知饑踣西山非一朝之積也豫嘗服腦子二兩不死絶食八日又不死竟不曉其何如從者七人或逃或死或逐今僅存一人曰劉榮楚囚之况宜哉隆興府半生幾度此登臨流落而今雪滿簮南浦不知春巳晚西山但覺日𥘉隂誰憐龜鶴千年語空負鵬萬里心無限故人簾雨外夜深如有廣陵音湖口江湖一都㑹宇宙幾興亡走馬蘆林外買魚茅舍傍南人撑快槳北客坐危檣江水交岷水東流日夜長安慶府風雨宜城路重來白髮新長江還有險中國自無人梟傹蕃遺育鱣鯨蟄怒鱗泊船休上岸不忍見遺民池州五老湖光逺九華山色昏南冠前進士北部故將軍芳草江頭路斜陽郭外村匆匆十年夢故國黯銷魂魯港方誇金塢築豈料玉床搖國躰真三代江流舊六朝鞭投䏻幾日瓦解不崇朝千古燕山恨西風捲怒潮采石不上峩眉二十歲重來為墮山河淚今人不見虞允文古人曾有樊若水長江闊處平如驛况此介然衣帶窄欲從謫仙捉月去安得然犀照神物建康金陵古㑹府南渡舊陪京山勢猶盤礴江流巳變更健兒徙幽土新鬼哭臺城一片清溪月偏于客有情金陵驛草合離宫轉夕睴孤雲飄泊復何依山河風景元無異城郭人民半巳非滿地蘆花和我老舊家燕子傍誰飛從今别却江南日化作啼䳌帶血歸萬里金甌失壯圖衮衣顛倒落泥塗空流杜宇聲中血半脫驪龍頷下鬚老去秋風吹我惡夢回寒月照人孤千年成敗俱塵土消得人間說丈夫懷忠襄平生王佐心世運蹈衰末齊虜誰復封楚囚詎當脫金陵雖懷古尚友在風烈褒忠侈遺廟夫子我先逹早秋隻影飄零天一涯千秋搖落欲何之朝看帶緩方嫌瘦夜怯衾單始覺衰眼裏遊從驚死别夢中兒女慰生離六朝無限江山在搔首斜陽獨立時睡起堂堂孤影起聞雞風起高樓鼓角悲江海無情遊子倦歲年如夢美人遲平生管鮑成何事千古夷齊在一時坐久日斜庭木落浮雲滅沒漏朝曦中秋不教收骨瘴江邊驅向胡沙著去鞭舊奪宫𫀆空獨步新食官飯飽孤眠客程恰與秋天半人影何如月倍圓猶是江南佳麗地徘徊把酒看蒼天南康軍和東坡酹江月廬山依舊凄凉處無限江南風物空翠晴嵐浮汗漫還障天東半壁鴈過孤峯猿歸老嶂風急波翻雪乾坤未歇地靈尚有人傑堪嗟飄泊孤舟河傾斗落客夢催明發南浦閒雲連草樹回首旌旗明滅三十年來十年一過空有星星髮夜深愁聽胡笳吹徹寒月和中齊韻過吉作功業飄零五丈原如今局促傍誰轅侻首北去明妃淚啼血南飛望帝魂骨肉凋殘唯我在形容變盡只聲存江流千古英雄恨蘭作行舟柳作樊再和見說黃沙接五原飄零隻影向南轅江山有恨銷人骨風雨無情斷客魂淚似空花千點落鬢如碩果數根存肉飛不起真堪歎江水為籠海作樊和友人落落南冠過故都近來我意亦忘吾騎來驛馬身如寄遣去家書宇亦無景伯未囚先立後嵇康縱死不為孤江南只有歸來夢休問田園蕪不蕪驛中言别友人水天空闊恨東風不借世間英物蜀鳥吳花殘照裏忍見荒城頽壁銅雀春情金人秋淚此恨慿誰雪堂堂劍氣斗牛空認竒傑那信江海餘生南行萬里屬扁舟齊發正為鷗盟留醉眼細看濤生雲滅䁛柱吞嬴回旗走懿千古衝冠髮伴人無寐秦淮應是孤月和乾坤䏻大算蛟龍元不是池中物風雨牢愁無著處那更寒蟲四壁橫槊題詩登樓作賦萬事空中雪江流如此方來還有英傑堪笑一葉飄零重來淮水正凉風新發鏡裏朱顔都變盡只有丹心難滅去去龍沙向江山回首青山如髮故人應念杜䳌枝上殘月懷中甫時中甫以病留金陵天慶觀久要何落落末路重依依風雨連兵幕泥塗滿客衣人間龍虎變天外燕鴻違死矣煩公傳北方人是非行宫中齊日十里宫墻一聚塵天津晚過客愁新花啼杜宇歸來血樹掛蒼龍脫去鱗福德儻存終有晋秣陵未改巳無秦秋風禾黍空南北見說銅駝㑹笑人怪底秦淮一水長幾多客淚灑斜陽江流本是限南北地氣何曾减帝王臺沼漸荒基歷落鶯花猶在意凄凉青天畢竟有情否舊月東來失女墻廣齊謂柳和王昭儀滿江紅韻惜未之見為賦一闋中齊作王母仙桃親曾醉九重春色誰信道鹿㗸花去浪翻鰲闕眉鎖嬌娥山宛轉髻梳墮馬雲欹側恨風沙吹透漢宫衣餘香歇霰裳散庭花滅斜陽燕應難說想春深銅雀夢殘啼血空有琵琶傳出塞更無環佩鳴歸月又爭知有客夜悲歌壼𫾣缺和王夫人滿江紅韻以庶幾后山妾薄命之意燕子樓中又捱過幾畨秋色相思處青年如夢乘鸞仙闕肌玉暗銷衣帶緩淚珠斜透花鈿側最無端蕉影上窗紗青燈歇曲池合高臺滅人間事何堪說向南陽阡上滿襟清血世態便如翻覆雨妾身元是分明月笑樂昌一假好風流菱花缺代王夫人作試問琵琶胡沙外怎生風色最苦是姚黃一朵移根仙闕王母􅌚䦨璚宴罷仙人淚滿金盤側聽行宫半夜雨淋鈴聲聲歇彩雲散香塵滅銅駝恨那堪說想男女慷慨嚼穿齦血回首昭陽離落日傷心銅雀迎新月算妾身不願似天家金甌缺王夫人詞太液芙蓉全不是舊時顔色嘗記得恩承雨露玉階金闕名播蘭簮妃后裏暈潮蓮臉君王側忽一朝鼙鼓揭天來繁華歇龍虎散風雲滅今古恨慿誰說顧山河百二淚流襟血驛館夜驚塵土夢宮車曉轉關山月若嫦娥於我肯相容從圓缺王夫人至燕題驛中云云中原傳誦惜末句少啇量浪淘沙中齊踈雨洗天晴枕簟凉生井梧一葉做秋聲誰念客身輕似葉千里飄零夢斷古臺城月淡潮平便携酒訪新亭不見當時王謝宅煙草青青東海集序東海集者友人客海南以來詩也海南詩而曰東海集者何魯仲連天下士友人之志也友人自為舉子時巳大肆力於詩於諸大家皆嘗登其門而涉其流其本贍其飬鋭故所詣特深到余嘗評其詩渾􅉼有英氣煆錬如自然美則美矣猶未免有意於為詩也自喪亂後友人其家避地遊官嶺海而全家燬於盜孤窮流落困䪺萬狀然後崖山除禮部侍郎中且權直學士矣㑹南風不競御舟漂散友人倉卒蹈海者再為北軍所鉤致遂不獲死以至于今凡十數年間可驚可愕可悲可憤可痛可悶之事友人備嘗無所不至其慘戚感慨之氣結而不信皆於詩乎發之蓋至是動乎情性自不能不詩杜子美䕫州柳子厚柳州以後文字也余與友人年相若又同里閈以斯文相好然平生落落不相及及居楚囚中而友人在行同患難者數月其自五羊至金陵所賦皆豫目擊或相唱和時余坐金陵驛無所作為乃取友人諸詩筆之於書與相關者并附為後之覽者因詩以見吾二人之志其必有感慨於斯巳卯七月壬申文天祥叙送行中齊三首秋風晚正烈客衣早知寒把衣不能别更盡此日歡出門一萬里風沙浩漫漫豈無兒女情為君思泛瀾百年有時盡千載無餘觀明明君臣義公獨為其難願持丹一寸寫入青琅玕㑹有撫卷人孤燈起長歎神龍蕩失水馴擾終未得威鳯雖在藪肯顧雞䳱食所以古之人受變心不易亳鼎巳遷周西山竟肌瘠豫子身自􅃮長弘血成碧何嘗怨廢興而或二心跡堅白不在緇羔裘良自惜此誼公素明俗見或未識嗟豫抱區區疇昔同里閈過從三十年知心不知靣零落忽重逢家亡市朝變惸惸蹈海餘踽踽南冠殿劇談泥塗際握手鞍馬倦依依斯文意苦恨十年晚魯仲偶不逢隨世本非願靈胥目未抉端欲詣所見及兹萬里别一夕腸百轉余生諒須臾孤感橫九縣庶幾太尉事萬一中丞傳此冊為指南後録第一卷下第二卷起八月二十四日發建康終歲除有感尚有零丁洋諸詩及後録本在惠州合隸為一卷而所恨者指南前録叙號存而詩巳不完侍即弟姑據所存本使不泯於世一聯半句使天下見之識其為人即吾死無憾矣况篇帙之多乎歲在庚辰正月二十日文山履善甫書指南後録卷之二豫後録詩以廣州至金陵為第一卷今入淮以後為第二卷云發建康八月二十四日賞心亭下路拍手唱吾歌樓外梁時塔城中秦氏河江山如夢耳天地奈愁何回首清溪曲長江一鴈過江行有感二十五日蒲萄肥汗馬荆棘冷銅駝巫峽朝雲濕洞庭秋水波窮愁空突兀暗淚自滂沱莫恨吾生誤江東才俊多真州驛二十七日山川如識我故舊更無人俯仰干戈跡往來車馬塵英雄遺算晚天地暗愁新北首燕山路凄凉夜向晨望楊州阮籍臨廣武杜甫登吹臺高情發慷慨前人後人哀江左遘陽運銅駝化飛灰二十四橋月楚囚今日來維楊驛三年别淮水一夕宿楊州南極山川古北風江海秋昭君愁出塞王粲怕登樓千載英雄淚如今况楚囚過卲伯鎮二十八日今朝車馬地昔日戰爭場我有楊州鶴誰存卲伯棠一灣流水小數𤱔故城荒回首江南路青山斷夕陽高郵懷舊二十九日借問曾遊處高沙第幾山潜行鷹攫道直上虎當關一命虛空裏三年瞬息間自憐今死晚何復望生還發髙郵三十日𥘉出髙沙門輕舫逺城樓一水何曲折百年此綢繆北望渺無際飛鳥翔平疇寒蕪入荒落日薄行人愁行行行湖曲萬頃涵清秋大風吹檣倒如蕩彭蠡舟欲寄故鄉淚使入長江流篙人為我言此水通淮頭前與黃河合同作滄海漚踟蹰忽失意拭淚淚不收吳㑹日巳逺回首重悠悠馳驅梁趙郊壯士何離憂吾道久矣東陸沈古神州我今戴南冠何異有北投不能裂肝腦直氣摩斗牛但願光嶽合休明復啇周不使殊方魄終為異物羞寶應道中天闊搏南鴈淮途長北驅甘棠成傳舍細柳作康衢田海隨時變山河往日殊征𫀆共衮繡夜壁一燈孤淮安軍九月一日楚州城門外白楊吹悲風纍纍死人塜死向鋒鏑中豈無匹婦冤定無萬夫雄中原在其北登城望何窮過淮河宿闞石有感北征垂半年依依只南土今晨渡淮河始覺非故宇江鄉巳無家三年一羈旅龍翔在何方乃我妻子所昔也無奈何忽巳置念慮今行日巳近使我淚如雨我為綱常謀有身不得顧妻兮莫望夫子兮莫望父天長與地久此恨極千古來生業緣在骨肉當如故發淮安九月二日九月𥘉二日車馬發淮安行行重行行天地何不寬烟火無一家荒草青漫漫恍如泛滄海身坐玻瓈盤時時逢北人什伍扶征鞍云我戍江南當軍身屬官北人適吳楚所憂地少寒江南有遊子風雪上燕山小清口𥘉三日乍見驚胡婦相嗟遇楚兵北來鴻鴈密南去駱駝輕芳草中原路斜陽故國情明朝五十里錯做武陵行桃源道中𥘉四日漠漠地千里垂垂天四圍隔溪胡騎過傍草野雞飛風露吹青笠塵沙薄素衣吾家白雲下都伴北人歸桃源縣清野百年久中原千里賖火煙新聚落山水舊生涯種麥十𢾗𤱔誅茅千百家我來行正倦何處覔桃花崔鎮驛萬里中原役北風天正凉黃沙漫道路蒼耳滿衣裳野闊人聲小日斜駒影長解鞍身似夢遊子意茫茫發崔鎮𥘉五日髙鴈空秋興寒螿破曉眠淡烟白似海野水碧於天興廢嗟何及行藏信自然南人乍騎馬北客半乘船發宿遷縣夜夢入星槎曉行隨斗柄衣暖露自乾鬢寒氷欲凝將軍戴鐡笠壯士𫾣金鐙白眼睨青天我生不有命中原中原方萬里明日是重陽桑棗人家近蓬蒿客路長引弓虛射鴈失馬為尋羊見說今年旱青青麥又秧望邳州𥘉六日中原行幾日今日才見山問山在何處云在徐邳間邳州山徐州水項籍不還韓信死龍爭虎鬪不肯止煙草漫漫青萬里古來劉季號英雄樊崇至今巳千歲徐州道中𥘉七日彭城古官道日中十馬馳咫尺不見人撲靣黃塵飛白頭漢王縞素師美人燕罷項羽啼一時混戰四十萬天昏地黑睢水湄乃知大風揚沙失白晝自是地利非天時漢王倉皇問道西一兒一女嘻其危太公吕后去不歸爼上寧有生還時未央稱夀太上皇巍然女媧帝中闈終然富貴自有命造物顛倒真小兒彭城行徐洲彭城縣連山四圍合吕梁貫其中河南大都㑹故有項王宫晋牧連楊豫虎視北方雄唐時燕子樓風流張建封西望睢陽城只與汴水通大平黃樓賦尚能想遺風邇來百餘年正朔歸江東遺民死欲盡莾然狐兔叢我從南方來停驂撫遺蹤故河蓄潢潦荒城翳秋蓬凄凉戲馬臺憔悴巨佛峯滄海變桑田陵谷代不同朝為朱門貴暮作行旅窮乘除信物理感慨繫所逢古來賢逹人一醉萬慮空如此獨巽何悲風逐征鴻燕子樓自别張公子嬋姢不下樓遂令樓上燕百歲稱風流我遊彭城門來吊楚王闕問樓在何處城東草如雪蛾眉代不乏埋沒安足論因何張家妾名與山川存自古皆有死忠義長不沒但傳美人心不說美人色戲馬臺九月𥘉九日客遊戲馬臺黃花弄朝露古人花飛埃今人哀後人後人復今哀世事那可及淚落茱茰杯發彭城今朝正重九行人意遲遲回首戲馬臺野化發葳𬎼草埋范增塜雲見樊噲旗時節正如此道路將何之我愛陶淵明甲子題新詩白衣送酒來把菊卧東籬沛歌山東藤山沛縣𥘉十日秦世失其鹿豐沛發龍顔王侯與將相不出徐濟間當時數公起四海王氣間至今尚想見虹光照人寰我來千載下吊古淚如􅏰白雲落荒草隱隱芒碭山黃河天下雄南去不復還乃知盈虛故天道如循環盧王舊封地今日殺函關歌風臺長陵有神氣萬歲光如虹有時風雪變魂魄來沛宫壯哉游子鄉一覽萬宇空擊筑戒復隍帝業慎所終重瞳愛梁父此情豈不同錦衣絢行晝丈夫何淺中𬗟懷首丘意自足分雌雄尚惜霸心存慷慨懷勇功不見往來事烹狥與藏弓早知致兩生禮樂三代隆匹夫事巳往安用責乃翁我來湯沐邑白楊吹悲風永言三侯章隱隱聞兒童葉落皆歸根飄零獨秋蓬登臺共悽惻目之南飛鴻固陵道中三首九天雲下垂一雨作秋色塵埃化泥塗原野轉蕭瑟十里一雙堠孤兔卧荆棘見說數年來中州乍蘇息茅舍荒􅋽舊固陵漢王城對楚王城徐州煙火連豐沛天下還來屋角爭固陵城下兩龍爭不見齊王來㑹兵勒取河山新分地項王之後到韓彭發魚臺十二日晨炊發魚臺碎雨飛擊靣團團四野周冥冥萬象變疑是江南山煙霧昏不見豈知此中原今古經百戰英雄化為土飛霧灑郊甸天寒日欲短游子淚如霰自歎瑟瑟秋風悲烈烈寒氣驕蒲柳先巳零松柏何後凋天意重肅殺造物無不銷强弱有異禀憂患同一朝惟有南山石千載一岧嶤人苦不自足空羡王子喬逺遊黃河流活活太行髙巍巍山以東百山以西鄒魯盛文獻燕趙多雄姿右摩泰山碑左躡函谷泥郟鄏吊周公曲阜拜宣尼或登廣武歎或上北邙悲平生幾兩屐汗漫以為期絶交天下士要為男子竒吳㑹遍王業中原隔遺黎安得與黃鶴比翼天上飛江河異風景擊楫感且欷陽運遘百六興否俄推移桑田變滄海楚囚發孔悲我本檻車客為我解縶維青蠅附天驥萬里相追隨人生尚行樂矧復新相知周道思下泉王風懷黍離富貴豈不願憂患那自持人命危且淺忽若朝露睎長恐折我軸中道欲差池去我父母邦我行且遲遲聽我逺遊曲寄我長相思六歌有妻有妻出糟糠自少結髮不下堂亂離中道逢虎狼鳯飛翩翩失其凰將雛一二去何方豈料國破家亦亡不忍舍君羅𥜗裳天長地久終茫茫牛女夜夜遙相望嗚呼一歌兮歌正長悲風北來起倣徨有妹有妹家流離良人去後携諸兒北風吹沙塞草凄窮猿慘淡將安歸去年哭母南海湄三男一女同歔欷惟汝不在割我肌汝家零落母不知母知豈有瞑目時嗚呼再歌兮歌孔悲鶺鴒在原我何為有女有女婉清揚大者學帖臨鍾王小者讀字聲琅琅朔風吹衣白日黃一雙白璧委道傍鴈兒啄啄秋無梁隨母北首誰人將鳴呼三歌兮歌愈傷非為兒女淚淋浪有子有子風骨殊釋氏抱送徐卿雛四月八日摩尼珠榴花犀錢絡繡𥜗蘭湯百沸香似酥歘隨飛電飄泥塗汝兄十二騎鯨魚汝今知在三歲無嗚呼四歌兮歌以吁燈前老我明月孤有妾有妾今何如大者手將玉蟾蜍次者親抱汗血駒晨粧靚服臨西湖英英鴈落飄璚琚風花飛墜鳥嗚呼金莖沆瀣浮汙渠天摧地裂龍鳯殂美人塵土何代無嗚呼五歌兮歌鬱紆為爾遡風立斯須我生我生何不辰孤根不識桃李春天寒日短重愁人北風隨我鐵馬塵𥘉憐骨肉鍾竒禍而今骨肉相憐我汝在北兮嬰我懷我死誰當收我骸人生百年何醜好黃梁得喪俱草草嗚呼六歌兮勿復道出門一笑天地老發潭口十三日吹靣北風來拂鬢堅氷至軒冕委道途衮繡易氊毳百年雜醜好始酬四方志浩歌激浮雲亭亭復攬轡羲馭幾曽停誰當掃幽翳新濟州借問新濟州徐鄆兄弟國昔為大河南今為大河北垂雲隂萬里平原望不極